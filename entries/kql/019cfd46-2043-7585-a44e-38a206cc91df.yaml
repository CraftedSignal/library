id: 019cfd46-2043-7585-a44e-38a206cc91df
name: Stryker Cyber Attack- System Breach and Device Wipe
description: On March 11, 2026, the global medical technology giant Stryker experienced a severe cyberattack when Iranian-linked hackers called Handala Hack affiliated with Iranian Ministry of Intelligence and Security (MOIS) used wiper malware to permanently erase data from its network. Based On the List of IOC’s seen from the previous attacks from the threat group I’ve done threat hunt.
query: "let timeframe = 7d; // Set the lookback period for the hunt.\r\n// Define IOCs from the intelligence report.\r\nlet HandalaHashes = dynamic([\r\n    \"5986ab04dd6b3d259935249741d3eff2\", // Handala Wiper\r\n    \"3cb9dea916432ffb8784ac36d1f2d3cd\", // Handala Powershell Wiper\r\n    \"3236facc7a30df4ba4e57fddfba41ec5\", // VeraCrypt Installer\r\n    \"3dfb151d082df7937b01e2bb6030fe4a\", // NetBird Installer\r\n    \"e035c858c1969cffc1a4978b86e90a30\"  // NetBird\r\n]);\r\nlet AttackerIPs = dynamic([\r\n    \"82.25.35.25\",\r\n    \"31.57.35.223\",\r\n    \"107.189.19.52\",\r\n    \"146.185.219.235\"\r\n]);\r\nlet AttackerHostnames = dynamic([\r\n    \"WIN-P1B7V100IIS\", \"DESKTOP-FK1NPHF\", \"DESKTOP-R1FMLQP\", \"WIN-DS6S0HEU0CA\",\r\n    \"DESKTOP-T3SOB36\", \"WIN-GPPA5GI4QQJ\", \"VULTR-GUEST\", \"DESKTOP-HU45M79\",\r\n    \"DESKTOP-TNFP4JF\", \"DESKTOP-14O69KQ\", \"DESKTOP-9KG46L1\", \"DESKTOP-G2MH4KD\"\r\n]);\r\n// Union of various queries to hunt for Handala TTPs.\r\nunion isfuzzy=true\r\n(\r\n    // TTP: NetBird or VeraCrypt downloaded or executed.\r\n    // Looks for execution of NetBird or file events matching known hashes.\r\n    DeviceProcessEvents\r\n    | where Timestamp > ago(timeframe)\r\n    | where FileName =~ \"netbird.exe\"\r\n        or InitiatingProcessFileName in (\"chrome.exe\", \"msedge.exe\", \"firefox.exe\") and FileName has_any (\"netbird\", \"VeraCrypt\")\r\n    | extend TTP = \"NetBird or VeraCrypt Execution/Download\", Activity = ProcessCommandLine, Technique = \"T1105 - Ingress Tool Transfer\"\r\n    | project-reorder Timestamp, DeviceName, TTP, Activity, Technique, InitiatingProcessCommandLine\r\n),\r\n(\r\n    // IOC: Known Handala tool hashes observed.\r\n    DeviceFileEvents\r\n    | where Timestamp > ago(timeframe)\r\n    | where SHA1 in (HandalaHashes) or MD5 in (HandalaHashes)\r\n    | extend TTP = \"Handala Tooling File Creation\", Activity = strcat(\"File '\", FileName, \"' created in '\", FolderPath, \"' with hash \", coalesce(SHA1, MD5)), Technique = \"T1105 - Ingress Tool Transfer\"\r\n    | project-reorder Timestamp, DeviceName, TTP, Activity, Technique, InitiatingProcessCommandLine\r\n),\r\n(\r\n    // TTP: ADRecon execution for Active Directory enumeration.\r\n    // Looks for PowerShell executing a script named dra.ps1.\r\n    DeviceProcessEvents\r\n    | where Timestamp > ago(timeframe)\r\n    | where FileName in~ (\"powershell.exe\", \"pwsh.exe\")\r\n    | where ProcessCommandLine has \"dra.ps1\"\r\n    | extend TTP = \"ADRecon Execution\", Activity = ProcessCommandLine, Technique = \"T1087.002 - Account Discovery: Domain Account\"\r\n    | project-reorder Timestamp, DeviceName, TTP, Activity, Technique, InitiatingProcessCommandLine\r\n),\r\n(\r\n    // TTP: Handala Wiper execution, potentially via GPO script.\r\n    // Looks for cmd.exe executing handala.bat or direct execution of handala.exe.\r\n    DeviceProcessEvents\r\n    | where Timestamp > ago(timeframe)\r\n    | where (InitiatingProcessFileName =~ \"cmd.exe\" and ProcessCommandLine has \"handala.bat\")\r\n        or FileName =~ \"handala.exe\"\r\n    | extend TTP = \"Handala Wiper Execution\", Activity = ProcessCommandLine, Technique = \"T1485 - Data Destruction\"\r\n    | project-reorder Timestamp, DeviceName, TTP, Activity, Technique, InitiatingProcessCommandLine\r\n),\r\n(\r\n    // TTP: Handala PowerShell Wiper artifacts.\r\n    // Looks for the specific behavior of the PS wiper creating propaganda GIF files in user directories. This is a high-fidelity indicator.\r\n    DeviceFileEvents\r\n    | where Timestamp > ago(timeframe)\r\n    | where FolderPath has @\"C:\\users\" and FileName matches regex @\"Handala_\\d+\\.gif\"\r\n    | extend TTP = \"Handala PowerShell Wiper Artifacts\", Activity = strcat(\"File '\", FileName, \"' created in '\", FolderPath, \"'\"), Technique = \"T1485 - Data Destruction\"\r\n    | project-reorder Timestamp, DeviceName, TTP, Activity, Technique, InitiatingProcessCommandLine\r\n),\r\n(\r\n    // TTP: Potential PowerShell Wiper activity deleting user files.\r\n    // FP-NOTE: This is a broad search for recursive deletion of C:\\Users. This may be noisy as legitimate admin scripts could perform similar actions.\r\n    // Tune this by filtering for specific initiating processes (e.g., from GPO) or correlating with other suspicious activity.\r\n    DeviceEvents\r\n    | where Timestamp > ago(timeframe)\r\n    | where ActionType == \"PowerShellCommand\"\r\n    | where InitiatingProcessFileName in~ (\"gpscript.exe\",\"powershell.exe\",\"cmd.exe\",\"psexec.exe\",\"wmic.exe\")\r\n    | where InitiatingProcessCommandLine has_any ( @\"\\\\SYSVOL\\\\\", @\"GroupPolicy\\\\Machine\\\\Scripts\",@\"GroupPolicy\\\\User\\\\Scripts\")\r\n    | extend TTP = \"Potential PowerShell Wiper Activity\", Activity = InitiatingProcessCommandLine, Technique = \"T1059.001 - PowerShell\"\r\n    | project-reorder Timestamp, DeviceName, TTP, Activity, Technique\r\n),\r\n(\r\n    // TTP: LSASS Dumping via comsvcs.dll, a known credential access technique used by this actor.\r\n    DeviceProcessEvents\r\n    | where Timestamp > ago(timeframe)\r\n    | where FileName =~ \"rundll32.exe\"\r\n    | where ProcessCommandLine has \"comsvcs.dll\" and ProcessCommandLine has_any (\"MiniDump\", \"FullDump\")\r\n    | extend TTP = \"LSASS Dumping via comsvcs.dll\", Activity = ProcessCommandLine, Technique = \"T1003.001 - OS Credential Dumping: LSASS Memory\"\r\n    | project-reorder Timestamp, DeviceName, TTP, Activity, Technique, InitiatingProcessCommandLine\r\n),\r\n(\r\n    // IOC: Network connections to known Handala C2/VPN infrastructure.\r\n    DeviceNetworkEvents\r\n    | where Timestamp > ago(timeframe)\r\n    | where RemoteIP in (AttackerIPs)\r\n    | extend TTP = \"Network Connection to Handala Infrastructure\", Activity = strcat(\"Connection from \", DeviceName, \" to \", RemoteIP, \":\", RemotePort), Technique = \"T1572 - Protocol Tunneling\"\r\n    | project-reorder Timestamp, DeviceName, TTP, Activity, Technique, InitiatingProcessCommandLine\r\n),\r\n(\r\n    // IOC: Activity from devices with known attacker hostnames.\r\n    // This can be joined with other data sources like sign-in logs for further correlation.\r\n    SigninLogs\r\n    | where TimeGenerated > ago(timeframe)\r\n    | where DeviceDetail.displayName in (AttackerHostnames)\r\n    | extend TTP = \"Sign-in from Host with Attacker Name\", Activity = strcat(\"User '\", UserPrincipalName, \"' signed in from \", IPAddress, \" on device '\", DeviceDetail.displayName, \"'\"), Technique = \"T1078.002 - Valid Accounts: Domain Accounts\"\r\n    | project-reorder TimeGenerated, TTP, Activity, Technique\r\n)"
