id: 0199a904-5cc1-72f4-984f-f6f046d3b22a
name: Proactive detection for UNC6040 (aka ShinyHunters)
description: KQL Query
query: "let MullvadVPN =\r\nSigninLogs\r\n| where TimeGenerated > ago(90d)\r\n| where AutonomousSystemNumber == \"216025\"\r\n| project IPAddress;\r\nCloudAppEvents\r\n| where TimeGenerated > ago(1h)\r\n| where Application == \"Salesforce\"\r\n| where IPAddress has_any(MullvadVPN)"
query_type: kql
severity: medium
tactics:
    - TA0009
techniques:
    - T1213.004
tags:
    - kql
author: Steven Lim
version: "2"
references:
    - https://cloud.google.com/blog/topics/threat-intelligence/unc6040-proactive-hardening-recommendations
