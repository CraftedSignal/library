id: 92ff048b-b458-4ff1-8f82-f2e4597a00c1
name: SVG Phishing Campaign Detection via KQL
description: https://www.bleepingcomputer.com/news/security/virustotal-finds-hidden-malware-phishing-campaign-in-svg-files/
query: "let DeviceWithSVGFromOutlook=\r\nDeviceFileEvents\r\n| where Timestamp > ago(1h)\r\n| where ActionType == \"FileCreated\"\r\n| where FileName endswith \".svg\"\r\n| where InitiatingProcessFileName == \"outlook.exe\"\r\n| distinct DeviceName;\r\nDeviceFileEvents\r\n| where Timestamp > ago(1h)\r\n| where ActionType == \"FileCreated\"\r\n| where FileName endswith \".zip\"\r\n| where InitiatingProcessFileName == \"chrome.exe\" or InitiatingProcessFileName == \"msedge.exe\"\r\n| where DeviceName has_any(DeviceWithSVGFromOutlook)"
query_type: kql
severity: medium
tags:
    - kql
version: "1"
references:
    - https://www.bleepingcomputer.com/news/security/virustotal-finds-hidden-malware-phishing-campaign-in-svg-files/
