id: 00e316a0-e116-465a-bce3-66606d5cc63c
name: The Hunt for Blob Phishing Mail Domain
description: 'KQL Query from file: The Hunt for Blob Phishing Mail Domain'
query: "// \U0001D5E7\U0001D5F5\U0001D5F2 \U0001D5DB\U0001D602\U0001D5FB\U0001D601 \U0001D5F3\U0001D5FC\U0001D5FF \U0001D5D5\U0001D5F9\U0001D5FC\U0001D5EF \U0001D5E3\U0001D5F5\U0001D5F6\U0001D600\U0001D5F5\U0001D5F6\U0001D5FB\U0001D5F4 \U0001D5E0\U0001D5EE\U0001D5F6\U0001D5F9 \U0001D5D7\U0001D5FC\U0001D5FA\U0001D5EE\U0001D5F6\U0001D5FB\n\n// In some phishing kit, the attacker generated the landing page in a blob to remain stealthy and all of these emails usually passes the SPF/DKIM/DMNARC/CompAuth. However the blob URL has a URL detonation reputation. Using the below KQL to reverse find all the malicious mail domains that are sending blob phishing URLs and block these mail domains at the Tenant Block List.\n\nEmailUrlInfo\n| where TimeGenerated > ago(90d)\n| where Url contains \"web.core.windows.net/\"\n| join EmailEvents on NetworkMessageId\n| where EmailDirection == \"Inbound\"\n| where DeliveryAction == \"Blocked\"\n| summarize Count=count() by SenderFromDomain\n| sort by Count desc \n\n"
query_type: kql
