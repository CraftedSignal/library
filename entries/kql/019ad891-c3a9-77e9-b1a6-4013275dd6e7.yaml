id: 019ad891-c3a9-77e9-b1a6-4013275dd6e7
name: Shai-hulud 2.0 Campaign Activity
description: This query hunts for various indicators of compromise (IOCs) and behaviors associated with the Shai-hulud 2.0 malware campaign. This includes suspicious command-line activity related to the installation of the Bun runtime, privilege escalation on Linux, defense evasion, credential scanning with TruffleHog, destructive commands, and supply chain poisoning.
query: "//Shai-hulud 2.0 Campaign Activity\r\nlet suspicious_patterns = dynamic([\r\n// Execution: Bun runtime installation from official source\r\n    \"irm bun.sh/install.ps1\",\r\n    \"curl -fsSL https://bun.sh/install\",\r\n // Impact: Destructive commands used as a failsafe\r\n    \"xargs -0 shred -uvz\",\r\n    \"cipher /w:\"\r\n// Privilege Escalation: Docker escape to modify sudoers\r\n    \"docker run --rm --privileged -v /:/host\",\r\n    \"cp /host/tmp/runner /host/etc/sudoers.d/runner\",\r\n// Defense Evasion: Disabling firewall and DNS resolution\r\n    \"systemctl stop systemd-resolved\",\r\n    \"iptables -t filter -F OUTPUT\",\r\n    \"iptables -t filter -F DOCKER-USER\",\r\n // Credential Access: Scanning filesystem for secrets\r\n    \"trufflehog* filesystem\",\r\n    // Command and Control: Self-hosted runner name\r\n    \"SHA1HULUD\"\r\n]);\r\nDeviceProcessEvents\r\n| where Timestamp >= ago(90d)\r\n| where FileName in~ (\"node.exe\", \"npm\", \"npm.cmd\")\r\n| where ProcessCommandLine has_any (\"setup_bun.js\", \"bun_environment.js\", \"bun.sh\") or ProcessCommandLine has_any (suspicious_patterns) or \r\nInitiatingProcessCommandLine has_any (\"setup_bun.js\", \"bun_environment.js\", \"bun.sh\") or InitiatingProcessCommandLine has_any (suspicious_patterns)\r\n| project Timestamp, DeviceName, AccountName, FileName, ProcessCommandLine, InitiatingProcessFileName, InitiatingProcessCommandLine, InitiatingProcessParentFileName"
query_type: kql
severity: medium
tags:
    - kql
version: "2"
