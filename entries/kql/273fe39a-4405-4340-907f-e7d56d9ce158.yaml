id: 273fe39a-4405-4340-907f-e7d56d9ce158
name: Top 10 Most Sprayed UPNs by IPs and Countries using BehaviourAnalytics
description: KQL Query
query: "// Top 10 Most Sprayed UPNs by IPs and Countries using BehaviourAnalytics\n\n// In the past week, my Entra tenant password spray attacks have spiked, originating from IPs marked as “Bruteforce”, “Botnet”, and “Watchlist” in BehaviourAnalytics. This observation can be easily seen from the Entra - Overview blade - Monitoring (Sign-ins) graph. Out of curiosity, I constructed the below KQL query to examine the top 10 most attacked UPNs, and the results for these top 10 UPN attacks are always consistent from approximately 96 unique IP addresses from around 66 countries. \U0001F4A1 Now, associating these IPs with a new named location, create a CA to enforce grant access with conditions: Require Microsoft Entra hybrid joined device, Require multifactor authentication, and Require authentication strength (passwordless MFA) to mitigate the sign-in risk and ensure business as usual for Entra users’ login while lowering the risk.\n\nBehaviorAnalytics\n| where TimeGenerated > ago(7d)\n| where ActivityType == \"FailedLogOn\" and EventSource == \"Azure AD\"\n| where DevicesInsights has \"ThreatIntelIndicatorType\"\n| extend ThreatType = tostring(DevicesInsights.ThreatIntelIndicatorType)\n| where InvestigationPriority > 0\n| where ThreatType has \"Bruteforce\" or ThreatType has \"Botnet\" or ThreatType has \"Watchlist\"\n| summarize NumofIPAttack=dcount(SourceIPAddress), NumofCountryAttack=dcount(SourceIPLocation) by UserPrincipalName\n| top 10 by NumofIPAttack desc\n\n//The MITRE ATT&CK technique for password spray attacks is T1110.0031\n"
query_type: kql
tactics:
    - TA0006
    - TA0042
techniques:
    - T1110
    - T1110.003
    - T1584.005
    - T1583.005
