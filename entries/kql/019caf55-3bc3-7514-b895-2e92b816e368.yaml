id: 019caf55-3bc3-7514-b895-2e92b816e368
name: Chrysalis Backdoor C2 via AI-Themed URL
description: Detects network traffic matching patterns used by the Chrysalis backdoor for C2 communications. The malware was observed using the domain 'api.skycloudcenter.com' and mimicking DeepSeek AI API URL paths to evade detection.
query: "// Name: Chrysalis Backdoor C2 via AI-Themed URL\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-03-02\r\n// Description: Detects network traffic matching patterns used by the Chrysalis backdoor for C2 communications. The malware was observed using the domain 'api.skycloudcenter.com' and mimicking DeepSeek AI API URL paths to evade detection.\r\n// References: https://www.picussecurity.com/resource/blog/notepad-supply-chain-attack-chrysalis-backdoor\r\n// False Positive Sensitivity: Medium\r\n// MITRE TTPs: T1071.001\r\nDeviceNetworkEvents\r\n// Look for network connections to the known C2 domain or matching the specific URL path structure.\r\n| where RemoteUrl has \"api.skycloudcenter.com\" or RemoteUrl matches regex @\"/a/chat/s/[a-z0-9\\-]+\"\r\n// FP Tuning: The regex is designed to be specific to the observed C2 pattern. However, other legitimate services\r\n// might use a similar URL structure. If false positives occur, consider excluding known-good initiating processes or domains.\r\n| project\r\n    Timestamp = TimeGenerated,\r\n    DeviceName,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessCommandLine,\r\n    RemoteUrl,\r\n    RemoteIP,\r\n    RemotePort\r\n"
query_type: kql
severity: medium
tactics:
    - TA0011
techniques:
    - T1071.001
tags:
    - kql
author: Ethan Andrews
version: "2"
references:
    - https://www.picussecurity.com/resource/blog/notepad-supply-chain-attack-chrysalis-backdoor
