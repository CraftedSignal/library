id: 148e470c-2121-42cf-b25f-e69e3f5cf017
name: Logon Events inside Organization Domain
description: This rule identifies all logon events within the organization's domain by querying the IdentityLogonEvents table. It extracts distinct account display names, UPNs, device names, destination device names, action types, account domains, and applications involved in the logon.
query: "#### Hunting query to see Log on events inside organization domain\n#### Query:\n```KQL\nlet Lookback = ago(1d);\nlet Signins = \nIdentityLogonEvents\n| where TimeGenerated > Lookback\n| distinct AccountDisplayName, AccountUpn, DeviceName, DestinationDeviceName, ActionType, AccountDomain, Application\n;\nSignins \n```\n"
query_type: kql
tags:
    - kql
version: "1"
