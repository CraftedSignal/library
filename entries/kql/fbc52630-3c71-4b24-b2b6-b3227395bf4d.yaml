id: fbc52630-3c71-4b24-b2b6-b3227395bf4d
name: Internet Facing NFS Detection
description: 'KQL Query from file: Internet Facing NFS Detection'
query: "let InternetFacing =\r\nDeviceInfo\r\n| where IsInternetFacing == true and isnotempty(PublicIP)\r\n| distinct DeviceId;\r\nDeviceNetworkEvents\r\n| where TimeGenerated > ago(30d)\r\n| where ActionType == \"InboundConnectionAccepted\"\r\n| where LocalPort == 2049\r\n| where DeviceId has_any(InternetFacing)"
query_type: kql
severity: medium
tags:
    - kql
author: Steven Lim
version: "1"
references:
    - https://medium.com/@zoomeye_team/threat-intell-report-nfs-exposed-the-silent-attack-vector-8aa4ea0cbce1
