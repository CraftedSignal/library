id: a0720a2f-27f4-4ee3-a459-df0d52879bfd
name: 'CAR-2021-01-003: Clearing Windows Logs with Wevtutil'
description: Detects when logs are cleared using the legitimate tool "wevtutil". This is usually done by threat actors to clear traces using LOLBins.
query: "// Author: MN\r\n// Rule Name: Clearing Windows Logs with Wevtutil\r\n// MITRE ATT&CK: TA0005: Defense Evasion, T1070.001: Indicator Removal: Clear Windows Event Logs\r\n// Description: Detects when logs are cleared using the legitimate tool \"wevtutil\". This is usually done by threat actors to clear traces using LOLBins.\r\n// Severity: High\r\n//\r\nDeviceProcessEvents\r\n| where ProcessCommandLine has \"wevtutil\"\r\n  and (ProcessCommandLine has \"cl\" or ProcessCommandLine has \"clear-log\")\r\n  and (\r\n        ProcessCommandLine has \"system\"\r\n        or ProcessCommandLine has \"security\"\r\n        or ProcessCommandLine has \"setup\"\r\n        or ProcessCommandLine has \"application\"\r\n      )\r\n| project Timestamp, DeviceId, ReportId, DeviceName, InitiatingProcessAccountName, InitiatingProcessFileName, FileName, ProcessCommandLine, FolderPath, InitiatingProcessFolderPath, InitiatingProcessParentFileName, IsProcessRemoteSession, ProcessRemoteSessionDeviceName, ProcessRemoteSessionIP"
query_type: kql
severity: medium
tactics:
    - TA0005
techniques:
    - T1070
tags:
    - kql
author: Mena Nabil
version: "1"
references:
    - https://car.mitre.org/analytics/CAR-2021-01-003/
