id: 019aa58b-2203-7229-9c24-0be77d98cc4e
name: Gootloader and Supper Backdoor Activity
description: KQL Query
query: "// References: https://www.huntress.com/blog/gootloader-threat-detection-woff2-obfuscation\r\n\r\n// Define known Indicators of Compromise (IOCs) from the report\r\nlet GootloaderHashes = dynamic([\r\n    \"c2326db8acae0cf9c5fc734e01d6f6c1cd78473b27044955c5761ec7fd479964\",\r\n    \"ad88076fd75d80e963d07f03d7ae35d4e55bd49634baf92743eece19ec901e94\",\r\n    \"c2b9782c55f75bb1797cb4fbae0290b44d0fcad51bf4f2c11c52ebbe3526d2ac\",\r\n    \"87cbe9a5e9da0dba04dbd8046b90dbd8ee531e99fd6b351eae1ae5df5aa67439\",\r\n    \"39d980851be1e111c035e4db2589fa3d5f59a5bef7b7b3e36bff5435c78f7049\",\r\n    \"b9a61652dffd2ab3ec3b7e95829759fc43665c27e9642d4b2d4d2f7287254034\",\r\n    \"2f056ce0657542da3e7e43fb815a8973c354624043f19ef134dff271db1741b3\",\r\n    \"7557d5fed880ee1e292aba464ffdc12021f9acbe0ee3a2313519ecd7f94ec5c4\",\r\n    \"5ec9e926d4fb4237cf297d0d920cf0e9a5409f0226ee555bd8c89b97a659f4b0\"\r\n]);\r\nlet SupperBackdoorHashes = dynamic([\r\n    \"cf44aa11a17b3dad61cae715f4ea27c0cbf80732a1a7a1c530a5c9d3d183482a\"\r\n]);\r\nlet SupperBackdoorC2s = dynamic([\r\n    \"103.253.42.91\", \"91.236.230.134\", \"213.232.236.138\", \"146.19.49.177\",\r\n    \"178.32.224.219\", \"37.59.205.2\", \"193.104.58.64\"\r\n]);\r\nlet GootloaderPersistenceFolders = dynamic([\r\n    \"\\\\AppData\\\\Roaming\\\\ISIS Drivers\\\\\",\r\n    \"\\\\AppData\\\\Roaming\\\\PFU\\\\\",\r\n    \"\\\\AppData\\\\Roaming\\\\Nuance\\\\\",\r\n    \"\\\\AppData\\\\Roaming\\\\myHUD\\\\\",\r\n    \"\\\\AppData\\\\Roaming\\\\Canon U.S.A., Inc\\\\\"\r\n]);\r\n\r\nunion isfuzzy=true\r\n(\r\n    // Rule: Gootloader/Supper Backdoor file hashes\r\n    DeviceFileEvents\r\n    | where SHA256 in (GootloaderHashes) or SHA256 in (SupperBackdoorHashes)\r\n    | extend RuleLogic = \"Gootloader/Supper Backdoor File Hash Match\"\r\n    | project-reorder TimeGenerated, DeviceName, RuleLogic, FileName, FolderPath, SHA256, InitiatingProcessCommandLine\r\n),\r\n(\r\n    // Rule: Gootloader persistence via LNK files using 8.3 short filenames\r\n    DeviceProcessEvents\r\n    | where InitiatingProcessFileName endswith \".lnk\"\r\n    // The LNK target path contains a reference to another file using a legacy 8.3 short name (e.g., EMCCON~1.JS)\r\n    | where ProcessCommandLine matches regex @\".*~1\\.(js|lnk)\"\r\n    | extend RuleLogic = \"Gootloader Persistence with 8.3 Short Filename\"\r\n    | project-reorder TimeGenerated, DeviceName, RuleLogic, FileName, ProcessCommandLine, InitiatingProcessFileName, InitiatingProcessCommandLine\r\n),\r\n(\r\n    // Rule: Gootloader persistence file creation in AppData\r\n    DeviceFileEvents\r\n    | where ActionType == \"FileCreated\"\r\n    // Gootloader drops secondary payloads into uniquely named folders under AppData\\Roaming\r\n    | where FolderPath has_any (GootloaderPersistenceFolders) and FileName endswith \".js\"\r\n    | extend RuleLogic = \"Gootloader Persistence File Creation\"\r\n    | project-reorder TimeGenerated, DeviceName, RuleLogic, FileName, FolderPath, SHA256, InitiatingProcessCommandLine\r\n),\r\n(\r\n    // Rule: Gootloader initial execution pattern\r\n    DeviceProcessEvents\r\n    | where InitiatingProcessFileName in~ (\"wscript.exe\", \"cscript.exe\")\r\n    | where FileName =~ \"powershell.exe\"\r\n    // Gootloader launches two instances of PowerShell, with the second one receiving commands\r\n    | where ProcessCommandLine has \"powershell & powershell\"\r\n    | extend RuleLogic = \"Gootloader Initial Execution\"\r\n    | project-reorder TimeGenerated, DeviceName, RuleLogic, FileName, ProcessCommandLine, InitiatingProcessCommandLine\r\n),\r\n(\r\n    // Rule: Supper Backdoor C2 communication\r\n    DeviceNetworkEvents\r\n    | where RemoteIP in (SupperBackdoorC2s) and RemotePort == 443\r\n    | extend RuleLogic = \"Supper Backdoor C2 Communication\"\r\n    | project-reorder TimeGenerated, DeviceName, RuleLogic, InitiatingProcessFileName, RemoteIP, RemotePort\r\n),\r\n(\r\n    // Rule: Post-exploitation AD reconnaissance commands\r\n    DeviceProcessEvents\r\n    | where FileName in~ (\"net.exe\", \"nltest.exe\", \"setspn.exe\", \"quser.exe\")\r\n    | where\r\n        (FileName =~ \"net.exe\" and ProcessCommandLine has_all (\"group\", \"domain admins\", \"/domain\")) or\r\n        (FileName =~ \"net.exe\" and ProcessCommandLine has_all (\"user\", \"/domain\")) or\r\n        (FileName =~ \"nltest.exe\" and ProcessCommandLine has_any (\"/dclist:\", \"/domain_trusts\")) or\r\n        (FileName =~ \"setspn.exe\" and ProcessCommandLine has_all (\"-q\", \"*/*\")) or\r\n        (FileName =~ \"quser.exe\" and isempty(ProcessCommandLine))\r\n    // FP Note: These commands can be legitimate administrative activity. Correlate with other suspicious behaviors.\r\n    | extend RuleLogic = \"Gootloader Post-Exploitation: AD Reconnaissance\"\r\n    | project-reorder TimeGenerated, DeviceName, RuleLogic, FileName, ProcessCommandLine, InitiatingProcessCommandLine\r\n),\r\n(\r\n    // Rule: Post-exploitation PowerShell reconnaissance\r\n    DeviceProcessEvents\r\n    | where FileName =~ \"powershell.exe\"\r\n    | where ProcessCommandLine has_any (\r\n        // Enumerates environment variables\r\n        \"Get-ChildItem env:\",\r\n        // Scans for users with local admin access\r\n        \"Find-LocalAdminAccess\",\r\n        // Searches for sensitive info in AD user descriptions\r\n        \"Get-ADUser -Filter 'description -like\",\r\n        // Enumerates all Windows Server machines in AD\r\n        \"Get-ADComputer -Filter 'operatingsystem -like\"\r\n        )\r\n    // FP Note: These commands can be used for system administration. Look for execution following other Gootloader indicators.\r\n    | extend RuleLogic = \"Gootloader Post-Exploitation: PowerShell Reconnaissance\"\r\n    | project-reorder TimeGenerated, DeviceName, RuleLogic, FileName, ProcessCommandLine, InitiatingProcessCommandLine\r\n),\r\n(\r\n    // Rule: Credential dumping via ntdsutil\r\n    DeviceProcessEvents\r\n    | where FileName =~ \"ntdsutil.exe\"\r\n    // Command to create a copy of the NTDS.dit database\r\n    | where ProcessCommandLine has_all (\"ac i ntds\", \"create\", \"full\")\r\n    | extend RuleLogic = \"Gootloader Post-Exploitation: NTDS.dit Dump\"\r\n    | project-reorder TimeGenerated, DeviceName, RuleLogic, FileName, ProcessCommandLine, InitiatingProcessCommandLine\r\n),\r\n(\r\n    // Rule: Volume Shadow Copy enumeration\r\n    DeviceProcessEvents\r\n    | where FileName =~ \"vssadmin.exe\" and ProcessCommandLine has \"list shadows\"\r\n    // FP Note: This is common for backup software and administrators. Threat actors use it to identify backups before ransomware deployment.\r\n    // Correlate with prior recon or lateral movement activity.\r\n    | extend RuleLogic = \"Gootloader Post-Exploitation: VSSAdmin Enumeration\"\r\n    | project-reorder TimeGenerated, DeviceName, RuleLogic, FileName, ProcessCommandLine, InitiatingProcessCommandLine\r\n),\r\n(\r\n    // Rule: Supper Backdoor self-deletion technique\r\n    DeviceProcessEvents\r\n    | where FileName =~ \"cmd.exe\"\r\n    // The ping command creates a delay to allow the parent process to terminate before the file is deleted\r\n    | where ProcessCommandLine has_all (\"ping\", \"> Nul\", \"& Del\", \"/f\", \"/q\")\r\n    | extend RuleLogic = \"Supper Backdoor Self-Deletion\"\r\n    | project-reorder TimeGenerated, DeviceName, RuleLogic, FileName, ProcessCommandLine, InitiatingProcessCommandLine\r\n)\r\n"
query_type: kql
severity: medium
