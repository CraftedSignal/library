id: 019c95c5-6d84-7768-80ce-d603c8fe0078
name: Fileless Node.js Execution via STDIN or Eval
description: Detects a Node.js process spawning a child Node.js process that executes code from STDIN ('-') or an evaluated string ('-e'). This behavior is characteristic of fileless execution and was observed in a developer-targeting campaign for C2 task execution. The rule specifically looks for a Node.js process where its parent is also a Node.js process, and the command line contains either ' - ' or ' -e '.
query: "// Name: Fileless Node.js Execution via STDIN or Eval\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-02-25\r\n// Description: Detects a Node.js process spawning a child Node.js process that executes code from STDIN ('-') or an evaluated string ('-e'). This TTP was used in a developer-targeting campaign for fileless Stage 2 C2 task execution.\r\n// False Positives: Medium. Some legitimate development tools or package managers might use this pattern. Tuning may be required by filtering on the parent process command line or excluding known safe scripts.\r\n// References: https://www.microsoft.com/en-us/security/blog/2026/02/24/c2-developer-targeting-campaign/\r\n// MITRE TTPs: T1059.007, T1027.002\r\nDeviceProcessEvents\r\n// Look for a node.js process being created\r\n| where FileName in~ (\"node\", \"node.exe\")\r\n// The parent process is also a node.js process, which is characteristic of the Stage 2 tasking loop\r\n| where InitiatingProcessFileName in~ (\"node\", \"node.exe\")\r\n// Detects fileless execution patterns: piping from STDIN ('-') or evaluating a script string ('-e')\r\n| where ProcessCommandLine has \" - \" or ProcessCommandLine has \" -e \"\r\n| project\r\n    Timestamp,\r\n    DeviceName,\r\n    AccountName,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessCommandLine,\r\n    FileName,\r\n    ProcessCommandLine,\r\n    ProcessId,\r\n    InitiatingProcessId\r\n"
query_type: kql
severity: medium
tactics:
