id: 019cd679-65c3-774e-931f-1633a2a793b4
name: Outbound SSH Connection to Public IP from Private IP
description: This rule detects successful outbound SSH (port 22) connections originating from a private IP address on a device to a public IP address. This could indicate unauthorized remote access, data exfiltration, or command and control activity.
query: "DeviceNetworkEvents\r\n| where TimeGenerated > ago(1d)\r\n| where ActionType == \"ConnectionSuccess\"\r\n| where RemotePort == 22\r\n| where LocalIPType == \"Private\"\r\n| where RemoteIPType == \"Public\"\r\n| project\r\n    TimeGenerated,\r\n    DeviceName,\r\n    InitiatingProcessAccountName,\r\n    InitiatingProcessCommandLine,\r\n    LocalIP,\r\n    RemoteIP,\r\n    RemoteUrl"
query_type: kql
severity: medium
tactics:
    - TA0008
techniques:
    - T1021.004
tags:
    - kql
version: "1"
