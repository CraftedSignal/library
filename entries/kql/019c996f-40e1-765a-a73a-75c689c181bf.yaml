id: 019c996f-40e1-765a-a73a-75c689c181bf
name: Azure DevOps Critical Permission Modification
description: Detects critical permission changes in Azure DevOps, specifically focusing on 'allow' changes to sensitive permissions like 'Edit build pipeline', 'Manage permissions', 'Queue builds', 'Administer build', and 'Bypass policies when completing' within key namespaces such as 'Git Repositories', 'ReleaseManagement', 'PipelinesPrivileges', and 'Project-level Permissions'. This rule aims to identify potential privilege escalation or unauthorized access attempts within Azure DevOps environments.
query: "// Detect critical permission changes in Azure DevOps\r\nADOAuditLogs_CL\r\n| where TimeGenerated > ago(1d)\r\n| where ActionId == \"Security.ModifyPermission\"\r\n| extend d=parse_json(Data)\r\n| extend NamespaceName=tostring(d.NamespaceName), EventSummary=d.EventSummary\r\n| mv-expand EventSummary\r\n| extend permissionNames=tostring(EventSummary.permissionNames), change=tostring(EventSummary.change), subjectDisplayName=tostring(EventSummary.subjectDisplayName)\r\n| where change =~ \"allow\"\r\n| where permissionNames in~ (\"Edit build pipeline\",\"Manage permissions\",\"Queue builds\",\"Administer build\",\"Bypass policies when completing\") or NamespaceName in~ (\"Git Repositories\",\"ReleaseManagement\",\"PipelinesPrivileges\",\"Project-level Permissions\")\r\n"
query_type: kql
severity: medium
tactics:
    - TA0003
    - TA0004
    - TA0005
    - TA0001
techniques:
    - T1098.003
    - T1078.004
tags:
    - kql
version: "1"
