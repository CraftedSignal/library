id: 019c8aee-15e0-7389-9f11-db2e9585d0ed
name: JScript Copy to Startup Folder
description: Identifies a Windows Script Host process (wscript.exe or cscript.exe) creating a JScript (.js) file in a Startup folder. This is a common persistence technique used by malware, including the JScript downloader in the Remcos RAT campaign.
query: "// Name: JScript Copy to Startup Folder\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-02-23\r\n// Description: Identifies a Windows Script Host process (wscript.exe or cscript.exe) creating a JScript (.js) file in a Startup folder. This is a common persistence technique used by malware, including the JScript downloader in the Remcos RAT campaign.\r\n// References: https://isc.sans.edu/diary/32738\r\n// Tactic: Persistence\r\n// Technique: T1547.001\r\n// False Positive Sensitivity: Medium\r\n// Detection Comment Level: Medium\r\nDeviceFileEvents\r\n// Look for file creation events.\r\n| where ActionType == \"FileCreated\"\r\n// The action is initiated by the Windows Script Host.\r\n| where InitiatingProcessFileName in~ (\"wscript.exe\", \"cscript.exe\")\r\n// The file being created is a JScript file.\r\n| where FileName endswith \".js\"\r\n// The destination is a user or system Startup folder, a common location for persistence.\r\n| where FolderPath has \"\\\\Microsoft\\\\Windows\\\\Start Menu\\\\Programs\\\\Startup\"\r\n// FP Tuning: Legitimate software installers or logon scripts might perform this action.\r\n// If false positives occur, exclude known good script names, hashes, or initiating processes associated with legitimate software deployment.\r\n| project\r\n    Timestamp,\r\n    DeviceName,\r\n    RequestAccountName,\r\n    ActionType,\r\n    FileName,\r\n    FolderPath,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessCommandLine,\r\n    InitiatingProcessId,\r\n    MD5,\r\n    SHA1,\r\n    SHA256\r\n"
