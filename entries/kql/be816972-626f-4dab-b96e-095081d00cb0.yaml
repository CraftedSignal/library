id: be816972-626f-4dab-b96e-095081d00cb0
name: FortiWeb CVE-2025-25257 Pre-auth SQLi Exploit Attempt
description: Detects SQL injection attempts targeting FortiWeb (CVE-2025-25257) in HTTP GET requests to /api/fabric/device/status. The rule identifies known exploit payloads in the Authorization header, generic SQL injection patterns, and SQL statements like DROP, DELETE, INSERT, UPDATE, CREATE. It also detects known malicious source IPs targeting the vulnerable endpoint.
query: "// Name: CVE-2025-25257 Actively Exploited Pre-auth SQLi from PoC & victim payloads\r\n// Author: Reyben T. Cortes (adapted for KQL)\r\n// Date: 2025-08-25\r\n// Description: Detects SQL injection attempts targeting FortiWeb (CVE-2025-25257) in HTTP GET requests to /api/fabric/device/status with Authorization headers matching known exploit payloads ('aaa' OR '1'='1', ''and('x'='x')') or containing generic SQL injection patterns and SQL statements like DROP, DELETE, INSERT, UPDATE, CREATE. Also detects known malicious source IPs targeting the vulnerable endpoint.\r\n// Severity: Critical\r\n// Tags: CVE-2025-25257, FortiWeb, SQL Injection, Curl\r\n// References: https://labs.watchtowr.com/pre-auth-sql-injection-to-rce-fortinet-fortiweb-fabric-connector-cve-2025-25257\r\n\r\n\r\n// Define a list of web log tables to query. Add or remove tables as needed for your environment.\r\nlet WebData = materialize(union isfuzzy=true CommonSecurityLog, W3CIISLog, AzureDiagnostics);\r\n// Define known exploit payloads for high-fidelity matching.\r\nlet KnownExploits = dynamic([\r\n\"Bearer aaa' OR '1'='1\",\r\n\"Bearer 'and('x'='x')\",\r\n\"Bearer ';drop/**/table/fabric_user\",\r\n\"Bearer 123'/**/or/**/'x'='x\"\r\n]);\r\n// Define known malicious source IP addresses.\r\nlet ThreatIoCs = dynamic([\r\n\"113.25.3.28\",\r\n\"113.25.13.159\",\r\n\"113.25.9.64\",\r\n\"85.237.206.105\",\r\n\"85.237.206.10\",\r\n\"196.75.238.72\",\r\n\"193.138.7.140\",\r\n\"45.11.80.242\",\r\n\"121.122.33.117\",\r\n\"104.28.253.229\"\r\n]);\r\nWebData\r\n// Filter for GET requests to the vulnerable FortiWeb API endpoint.\r\n| where HttpRequestMethod =~ \"GET\" and Url has \"/api/fabric/device/status\"\r\n| where\r\n// Condition 1: High-fidelity match for known exploit payloads.\r\nAuthorization in~ (KnownExploits)\r\nor\r\n// Condition 2: Broad detection for generic SQL injection patterns.\r\n// This condition is broader and may generate false positives from legitimate but unusual Authorization headers or internal testing tools.\r\n// Consider tuning by adding exclusions for trusted source IPs or specific user agents if noise occurs.\r\n(\r\n    isnotempty(Authorization) and\r\n    Authorization has_any (\"' OR \", \"' AND \", \" UNION \", \" SLEEP(\", \" BENCHMARK(\", \" WAITFOR \", \" IF(\", \" CASE \", \" SELECT \", \" DROP \", \" DELETE \", \" INSERT \", \" UPDATE \", \" CREATE \")\r\n    and Authorization has_any (\"'='\", \"--\", \"#\", \"/*\", \"1=1\", \"true\")\r\n)\r\nor\r\n// Condition 3: Match for known malicious source IPs targeting the vulnerable endpoint.\r\nSourceIP in (ThreatIoCs)\r\n// Project the relevant fields for investigation.\r\n| project\r\nTimeGenerated,\r\nSourceIP,\r\nDestinationIP,\r\nUrl,\r\nHttpRequestMethod,\r\nAuthorizationHeader = Authorization,\r\nHttpUserAgent,\r\nResultDescription\r\n"
