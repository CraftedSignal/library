id: 019cf734-33c5-70ca-af0a-c42b41ecb923
name: Suspicious PowerShell RMM MSI Download
description: Detects PowerShell commands using Invoke-WebRequest to download and then execute an MSI file, a technique observed in campaigns deploying RMM tools like ScreenConnect and Tactical RMM. This is often done within a single command line or script block.
query: |
    // Name: Suspicious PowerShell RMM MSI Download
    // Author: detections.ai
    // Date: 2026-03-16
    // Description: Detects PowerShell commands using Invoke-WebRequest to download and then execute an MSI file, a technique observed in campaigns deploying RMM tools like ScreenConnect and Tactical RMM. This is often done within a single command line or script block.
    // False Positive Sensitivity: Medium
    // Tactics: Execution, Defense Evasion
    // Techniques: T1059.001, T1105, T1218.007
    // References: https://www.microsoft.com/en-us/security/blog/2026/03/03/signed-malware-impersonating-workplace-apps-deploys-rmm-backdoors/

    DeviceProcessEvents
    // Focus on PowerShell processes which are executing the core logic.
    | where FileName in~ ("powershell.exe", "pwsh.exe")
    // This pattern identifies the download and execution within the same command line.
    | where (ProcessCommandLine has "Invoke-WebRequest" or ProcessCommandLine has "iwr")
        and (ProcessCommandLine has "Start-Process" or ProcessCommandLine has "saps")
        and ProcessCommandLine contains ".msi"
    // Increase confidence by looking for silent installation flags, which are less common in legitimate user-driven installs, or specific keywords from the observed threat.
    | where ProcessCommandLine has_any ("quiet", "qn", "norestart", "ScreenConnect", "Tactical RMM")
    // FP Tuning: Legitimate software deployment tools (e.g., SCCM, Intune) may use similar patterns to install or update software.
    // To reduce potential false positives, consider excluding processes initiated by known and trusted management tools.
    // For example: | where InitiatingProcessFileName !in~ ("cmexec.exe", "IntuneManagementExtension.exe")
    | project
        TimeGenerated,
        DeviceName,
        AccountName,
        FileName,
        ProcessCommandLine,
        InitiatingProcessFileName,
        InitiatingProcessCommandLine,
        ProcessId,
        InitiatingProcessId
query_type: kql
severity: medium
tactics:
    - TA0002
    - TA0011
    - TA0005
techniques:
    - T1059.001
    - T1105
    - T1218.007
tags:
    - kql
version: "2"
references:
    - https://www.microsoft.com/en-us/security/blog/2026/03/03/signed-malware-impersonating-workplace-apps-deploys-rmm-backdoors/
