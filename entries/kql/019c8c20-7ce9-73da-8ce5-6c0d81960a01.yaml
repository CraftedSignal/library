id: 019c8c20-7ce9-73da-8ce5-6c0d81960a01
name: Malicious NuGet Localhost C2 Proxy
description: Detects network traffic to a local proxy on port 7152, a behavior associated with a malicious NuGet package campaign involving NCryptYo, DOMOAuth2_, IRAOAuth2.0, and SimpleWriter_. This traffic is characterized by communication to a loopback address (127.0.0.1 or ::1) or 'localhost' on the suspicious port, specifically targeting '/api/auth/' endpoints.
query: "// Name: Malicious NuGet Localhost C2 Proxy\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-02-23\r\n// Description: Detects network traffic to a local proxy on port 7152, a behavior associated with a malicious NuGet package campaign involving NCryptYo, DOMOAuth2_, IRAOAuth2.0, and SimpleWriter_.\r\n// False Positives: A developer could theoretically use this non-standard port for a legitimate project. If false positives occur, consider adding process name allowlisting or further scoping the logic to specific URL paths.\r\n// References: https://socket.dev/blog/four-malicious-nuget-packages-target-asp-net-developers-with-jit-hooking-and-credential\r\n// MITRE ATT&CK: T1071.001 (Application Layer Protocol: Web Protocols), T1572 (Protocol Tunneling)\r\nlet suspicious_port = 7152;\r\nlet loopback_ips = dynamic([\"127.0.0.1\", \"::1\"]);\r\nDeviceNetworkEvents\r\n// Look for network events involving the specific port used by the malware's local proxy.\r\n| where LocalPort == suspicious_port or RemotePort == suspicious_port\r\n// Correlate with traffic directed to a loopback address.\r\n| where RemoteIP in (loopback_ips) or RemoteUrl has \"localhost\"\r\n// The malicious packages communicate over specific API endpoints. Filtering for these increases confidence.\r\n| where RemoteUrl has \"/api/auth/\"\r\n| project\r\n    TimeGenerated,\r\n    DeviceName,\r\n    ActionType,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessCommandLine,\r\n    LocalPort,\r\n    RemotePort,\r\n    RemoteIP,\r\n    RemoteUrl\r\n"
query_type: kql
severity: medium
tactics:
    - TA0011
techniques:
    - T1071.001
