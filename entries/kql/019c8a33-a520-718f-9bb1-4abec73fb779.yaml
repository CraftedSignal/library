id: 019c8a33-a520-718f-9bb1-4abec73fb779
name: Anomalous NTDS.dit Theft via Print.exe
description: Detects the use of the print.exe utility to access or copy the Active Directory database (ntds.dit). This is an anomalous and suspicious use of a common utility for credential staging and has been observed in conjunction with SolarWinds WHD exploitation.
query: "// Name: Anomalous NTDS.dit Theft via Print.exe\r\n// Author: adarsh pandey\r\n// Date: 2026-02-23\r\n// Description: Detects the use of the print.exe utility to access or copy the Active Directory database (ntds.dit). This is an anomalous and suspicious use of a common utility for credential staging and has been observed in conjunction with SolarWinds WHD exploitation.\r\n// Tactics: Credential Access\r\n// Techniques: T1003.003\r\n// False Positive Sensitivity: Medium\r\n// References: https://www.microsoft.com/en-us/security/blog/2026/02/06/active-exploitation-solarwinds-web-help-desk/\r\nDeviceProcessEvents\r\n// Look for the execution of the print utility.\r\n| where FileName =~ \"print.exe\"\r\n// Filter for the specific command-line arguments used to target the NTDS.dit file.\r\n| where ProcessCommandLine has_all (\"print\", \"/D:\", \"\\\\windows\\\\ntds\\\\ntds.dit\")\r\n// Potential for False Positives: This is a highly unusual command and is unlikely to be used legitimately.\r\n// An alert from this rule warrants immediate investigation.\r\n// Review the parent process and any subsequent network or file events.\r\n"
query_type: kql
severity: medium
tactics:
    - TA0006
techniques:
    - T1003.003
tags:
