id: 019c965c-f658-75c8-82eb-8c5393828698
name: Linux Useradd with Root Privileges
description: Detects the creation of new user accounts on Linux systems using the 'useradd' command with parameters that grant root (UID 0 or GID 0) privileges, or prevent home directory creation, which can indicate a backdoor account.
query: "// Detects creation of backdoor accounts with high privileges such as root.\n// Mitre: T1136.001\n\nDeviceProcessEvents\n| where FolderPath endswith \"/useradd\" and ((ProcessCommandLine contains \"-u 0\" \nor ProcessCommandLine contains \"-g 0\" or ProcessCommandLine contains \"--uid=0\" \nor ProcessCommandLine contains \"--gid=0\") or (ProcessCommandLine contains \"--no-create-home\" or ProcessCommandLine contains \"-M\"))"
query_type: kql
severity: medium
tactics:
    - TA0003
techniques:
    - T1136.001
tags:
    - kql
author: zendannyy
version: "1"
