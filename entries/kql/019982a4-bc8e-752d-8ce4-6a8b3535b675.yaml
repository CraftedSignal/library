id: 019982a4-bc8e-752d-8ce4-6a8b3535b675
name: 'EDR-Freeze Detection: WerFaultSecure'
description: This rule detects instances of 'WerFaultSecure.exe' being spawned by an unusual or unexpected parent process. 'WerFaultSecure.exe' is a legitimate Windows component responsible for error reporting and crash dumping. Adversaries may abuse this process, particularly for memory dumping (e.g., LSASS dumping) to evade defenses and escalate privileges. The rule identifies parent processes that are not part of a predefined list of legitimate parents (wermgr.exe, svchost.exe, csrss.exe, WerFault.exe). It assigns a suspicion score and risk level based on the initiating process's filename (e.g., PowerShell, CMD, Explorer) and folder path (e.g., Temp, AppData, Users). It also extracts the target Process ID (PID) and dump type from the command line, and checks for suspicious parameters, to provide a comprehensive risk assessment.
query: "// ============================================================================\n// EDR-Freeze Detection: WerFaultSecure Unusual Parent Process\n// Author: KillBillKill98\n// Last Updated: 2025-09-24\n// ============================================================================\n// Tactic(s): Defense Evasion (TA0005), Privilege Escalation (TA0004)\n// Technique(s): Masquerading (T1036), Exploitation for Privilege Escalation (T1068)\n// Description & Rationale:\n//  - Detects WerFaultSecure.exe spawned by unexpected parent processes\n//  - Assigns a SuspicionScore and RiskLevel based on parent, folder path, params\n//  - Extracts target PID and dump type for analyst triage\n// ============================================================================\n \n// EDR-Freeze Detection: WerFaultSecure Unusual Parent Process\nlet lookbackWindow = 1d;                \nlet legitimateParents = dynamic([\n    \"wermgr.exe\",           // Primary legitimate parent - Windows Error Reporting Manager\n    \"svchost.exe\",          // Service host for WER service\n    \"csrss.exe\",            // System crash handling\n    \"WerFault.exe\"          // Standard error reporting\n]);\nDeviceProcessEvents\n| where Timestamp > ago(lookbackWindow)\n| where FileName =~ \"WerFaultSecure.exe\"\n| where InitiatingProcessFileName !in~ (legitimateParents)\n| extend\n    SuspicionScore = case(\n        InitiatingProcessFileName in~ (\"powershell.exe\", \"pwsh.exe\", \"cmd.exe\"), 5,\n        InitiatingProcessFileName in~ (\"explorer.exe\", \"winlogon.exe\"), 4,\n        InitiatingProcessFolderPath matches regex @\".*\\\\(Temp|AppData|Users)\\\\.*\\.exe\", 4,  \n        InitiatingProcessFolderPath matches regex @\".*\\\\[^\\\\]*\\.(exe|scr|com|bat|ps1)$\", 3,\n        2\n    ),\n    // Extract target PID if present in command line\n    TargetPID = tolong(coalesce(\n        extract(@\"/pid\\s+(\\d+)\", 1, ProcessCommandLine),\n        extract(@\"-p\\s+(\\d+)\", 1, ProcessCommandLine),\n        extract(@\"/p\\s+(\\d+)\", 1, ProcessCommandLine)\n    )),\n    // Check for suspicious parameters\n    HasSuspiciousParams = ProcessCommandLine has_any (\"/h\", \"/tid\", \"/encfile\", \"/cancel\", \"/type\"),\n    // Determine dump type\n    DumpType = case(\n        ProcessCommandLine has \"/type 268310\" or ProcessCommandLine contains \"268310\", \"FullDump\",\n        ProcessCommandLine has \"/encfile\", \"EncryptedDump\",\n        ProcessCommandLine has \"/type\", \"CustomDump\",\n        \"StandardDump\"\n    )\n| extend\n    // Final risk assessment\n    RiskLevel = case(\n        SuspicionScore >= 4 and isnotnull(TargetPID), \"Critical\",\n        SuspicionScore >= 4, \"High\",\n        SuspicionScore >= 3 and HasSuspiciousParams, \"High\",\n        SuspicionScore >= 3, \"Medium\",\n        \"Low\"\n    ),\n    // Create detection summary\n    DetectionReason = strcat(\n        \"Unusual parent: \", InitiatingProcessFileName,\n        iff(isnotnull(TargetPID), strcat(\" | Target PID: \", TargetPID), \"\"),\n        iff(HasSuspiciousParams, \" | Suspicious params\", \"\"),\n        iff(DumpType != \"StandardDump\", strcat(\" | Dump type: \", DumpType), \"\")\n    )\n//| where RiskLevel in~ (\"Critical\", \"High\", \"Medium\")  // Filter for actionable alerts\n| project-reorder\n    Timestamp,\n    DeviceName,\n    InitiatingProcessFileName,      // Suspicious parent\n    InitiatingProcessFolderPath,    // Suspicious parent path\n    ProcessCommandLine,             // Full command line\n    TargetPID,                      // PID being targeted\n    DumpType,                       // Type of dump operation\n    SuspicionScore,                 // Numeric risk score\n    RiskLevel,                      // Risk Level shown to analyst\n    DetectionReason                 // Human-readable summary\n| sort by SuspicionScore desc, Timestamp desc\n"
