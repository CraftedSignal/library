id: 019c22a9-4dc8-77bd-b847-2c7bb33a9bc7
name: Leaked App Secret - TruffleHog User-Agent in AAD Service Principal Sign-in Logs
description: This rule detects sign-in attempts to Azure Active Directory (AAD) service principals where the User-Agent string contains "TruffleHog". TruffleHog is an open-source tool used for finding sensitive data (like credentials) in various data sources. Its presence in AAD sign-in logs, especially for service principals, could indicate an attempt to scan for or verify leaked secrets or credentials associated with service accounts.
query: "// leaked secret, TruffleHog scanning secret veryfication \r\nAADServicePrincipalSignInLogs\r\n| where TimeGenerated > ago(30d)\r\n| where UserAgent has \"TruffleHog\"\r\n| project \r\n    TimeGenerated,\r\n    IPAddress,\r\n    Location,\r\n    ResultType,\r\n    UserAgent,\r\n    ServicePrincipalName\r\n| order by TimeGenerated desc"
query_type: kql
severity: medium
tactics:
    - TA0043
techniques:
    - T1589.001
    - T1595
tags:
    - kql
version: "1"
