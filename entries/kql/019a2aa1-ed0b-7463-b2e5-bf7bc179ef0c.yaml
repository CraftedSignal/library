id: 019a2aa1-ed0b-7463-b2e5-bf7bc179ef0c
name: Potential exploitation of CVE-2025-59287
description: This query looks for PowerShell launched by WSUS-related processes, especially with encoded or suspicious commands, which aligns with observed exploitation patterns
query: "// Defender Unified Portal\r\nDeviceProcessEvents\r\n| where InitiatingProcessFileName in~ (\"wsusservice.exe\", \"w3wp.exe\")\r\n| where FileName in~ (\"cmd.exe\", \"powershell.exe\")\r\n| where ProcessCommandLine has_any (\"-EncodedCommand\", \"Invoke-Expression\", \"IEX\", \"FromBase64String\")\r\n| project Timestamp, DeviceName, FileName, ProcessCommandLine, InitiatingProcessFileName, InitiatingProcessCommandLine\r\n| sort by Timestamp desc\r\n"
query_type: kql
severity: medium
tags:
    - kql
version: "1"
references:
    - https://www.huntress.com/blog/exploitation-of-windows-server-update-services-remote-code-execution-vulnerability
