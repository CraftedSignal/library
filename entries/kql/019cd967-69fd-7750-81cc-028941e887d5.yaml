id: 019cd967-69fd-7750-81cc-028941e887d5
name: Dead#Vax Self-Parsing Script Execution
description: Detects a specific script execution pattern where a batch file, often named 'rEgX.cmd', is read by a PowerShell process (or a renamed variant like 'mbs.exe') to extract a hidden, encrypted payload from its own content. This self-parsing technique, used by the Dead#Vax malware, looks for lines starting with a specific marker (e.g., '@') to bypass traditional file-based detection.
query: |
    kql
    // title: Dead#Vax Self-Parsing Script Execution
    // description: Detects a specific script execution pattern where a batch file, often named 'rEgX.cmd', is read by a PowerShell process (or a renamed variant like 'mbs.exe') to extract a hidden, encrypted payload from its own content. This self-parsing technique, used by the Dead#Vax malware, looks for lines starting with a specific marker (e.g., '@') to bypass traditional file-based detection.
    // author: detections.ai
    // date: 2026-03-10
    // id: 2189a65c-1234-5678-9abc-def012345678
    // status: experimental
    // references:
    // - https://www.securonix.com/blog/deadvax-threat-research-security-advisory/
    // tags:
    // - attack.execution
    // - attack.defense_evasion
    // - attack.t1059.001
    // - attack.t1059.003
    // - attack.t1027.001
    // level: high
    DeviceProcessEvents
    | where
        // Look for PowerShell or its known renamed variant 'mbs.exe'
        (ProcessCommandLine has_any ("powershell.exe", "mbs.exe"))
        // The self-parsing logic involves reading the content of 'rEgX.cmd'
        and ProcessCommandLine has "Get-Content"
        and ProcessCommandLine has "rEgX.cmd"
        // The script uses a regex match to find the payload line starting with '@'
        and ProcessCommandLine has "-match"
        and ProcessCommandLine has "'^@"
query_type: kql
severity: medium
tactics:
    - TA0002
    - TA0005
techniques:
    - T1059.001
    - T1059.003
    - T1027.001
tags:
    - kql
version: "2"
references:
    - https://www.securonix.com/blog/deadvax-threat-research-security-advisory/
