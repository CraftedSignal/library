id: 019c8d5f-848c-777f-bc5e-85fa37a3437f
name: Moonrise RAT Execution or Reference
description: This rule detects the execution or referencing of files named 'moonrise-client.exe', 'moonrise.exe', or 'moonriseclient.exe'. These filenames are associated with the Moonrise RAT, indicating potential malware activity on the system. The rule specifically looks for these filenames in the process's file name or command line arguments.
query: "//Masquerading: “moonrise-client.exe” execution or reference related to Moonrise RAT\r\nDeviceProcessEvents\r\n| where TimeGenerated > ago(24h)\r\n| where FileName in~ (\"moonrise-client.exe\", \"moonrise.exe\", \"moonriseclient.exe\")\r\n   or ProcessCommandLine has_any (\"moonrise-client.exe\", \"moonriseclient.exe\", \"moonrise.exe\")\r\n| project TimeGenerated, DeviceName, AccountName, FileName, FolderPath, ProcessCommandLine,\r\n          InitiatingProcessFileName, InitiatingProcessFolderPath, InitiatingProcessCommandLine, SHA256, ReportId\r\n| extend HostCustomEntity = DeviceName, AccountCustomEntity = AccountName"
query_type: kql
severity: medium
tactics:
    - TA0005
techniques:
    - T1036
tags:
    - kql
author: Rudra Verma - CyberHawk
version: "4"
