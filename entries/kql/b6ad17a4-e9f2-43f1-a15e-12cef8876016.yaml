id: b6ad17a4-e9f2-43f1-a15e-12cef8876016
name: SmartScreen + NetworkProtection Correlation with Network Logs
description: This rule correlates Microsoft Defender for Endpoint (MDE) SmartScreen and Network Protection blocks with network activity logs. It specifically looks for instances where SmartScreenUrlWarning or ExploitGuardNetworkProtectionBlocked events occur due to 'CustomBlockList' or 'CustomPolicy' settings. The rule then joins these events with DeviceNetworkEvents to identify the associated URLs, remote IP addresses, and ports involved in the blocked network communication. The primary goal is to identify and provide context for network access attempts that are blocked by custom security policies, indicating potential malicious or unwanted website access.
query: "// ============================================================================\r\n// SmartScreen + NetworkProtection Correlation with Network Logs\r\n// Author: KillBillKill98\r\n// Last Updated: 2025-09-18\r\n// ============================================================================\r\n// Tactic(s): Initial Access (TA0001), Command & Control (TA0011)\r\n// Technique(s): Drive-by Compromise (T1189), Malicious/Compromised Website (T1566 / T1071)\r\n// Description & Rationale:\r\n//  - Correlates DeviceNetworkEvents (HTTP/HTTPS) with SmartScreen/ExploitGuard blocks\r\n//  - Reveals URLs, IPs, ports, and detection context (Custom IoC vs Web Filtering)\r\n// ============================================================================\r\n\r\nlet NetworkLogs = (DeviceNetworkEvents\r\n| where Timestamp > ago(14d)\r\n| where RemotePort in (80, 443)\r\n| extend IPaddress = RemoteIP\r\n| extend Port = RemotePort\r\n| extend URL = RemoteUrl);\r\nDeviceEvents\r\n| where Timestamp > ago(14d)\r\n| where ActionType in (\"SmartScreenUrlWarning\", \"ExploitGuardNetworkProtectionBlocked\")\r\n| extend Parsed = parse_json(AdditionalFields)\r\n| extend SmartScreen = Parsed.Experience\r\n| extend NetworkProtection = Parsed.ResponseCategory\r\n| where SmartScreen in (\"CustomBlockList\", \"CustomPolicy\") or NetworkProtection in (\"CustomBlockList\", \"CustomPolicy\")\r\n| extend DetectionType = case(\r\n            ActionType == \"SmartScreenUrlWarning\" and SmartScreen == \"CustomBlockList\", \"Edge / IoC URL\",\r\n            ActionType == \"SmartScreenUrlWarning\" and SmartScreen == \"CustomPolicy\", \"Edge / Web Content Filtering\",\r\n            ActionType == \"ExploitGuardNetworkProtectionBlocked\" and NetworkProtection == \"CustomBlockList\", \"3rd party / IoC URL\",\r\n            ActionType == \"ExploitGuardNetworkProtectionBlocked\" and NetworkProtection == \"CustomPolicy\", \"3rd party / Web Content Filtering\",\r\n            \"N/A\"\r\n)\r\n| join kind=inner NetworkLogs on RemoteUrl\r\n| project Timestamp, DeviceId, DeviceName, DetectionType, InitiatingProcessFileName, URL, IPaddress, Port\r\n\r\n// This query helps you understand URLs accessed by end-users detected by MDE IoC URL and Web Content Filtering. It also reveals the type of browser launched by the end-user. Furthermore, by combining network data (DeviceNetworkEvents) with URLs, the query provides insights into IP addresses and ports.\r\n\r\n"
