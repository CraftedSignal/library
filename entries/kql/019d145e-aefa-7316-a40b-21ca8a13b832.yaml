id: 019d145e-aefa-7316-a40b-21ca8a13b832
name: Suspicious Azure No-Reply Email with Urgent Keywords
description: This rule detects inbound emails from 'azure-noreply@microsoft.com' that are delivered to the inbox, are the first contact from this sender, and contain specific keywords in the subject line such as 'severity', 'activated', 'deactivated', 'alert', 'invoice', 'payment', 'order', or 'fund'. This could indicate phishing attempts or social engineering campaigns impersonating Microsoft Azure notifications to trick users into taking action on urgent-sounding messages.
query: "let MonitorKeywordSubject = dynamic([\"severity\", \"activated\", \"deactivated\", \r\n\"alert\", \"invoice\", \"payment\", \"order\", \"fund\"]);\r\nEmailEvents\r\n| where Timestamp > ago(30d)\r\n| where SenderFromAddress == \"azure-noreply@microsoft.com\" and EmailDirection == \"Inbound\"\r\n| where DeliveryAction == \"Delivered\" and DeliveryLocation == \"Inbox/folder\"\r\n| where IsFirstContact == true\r\n| where Subject has_any(MonitorKeywordSubject)"
query_type: kql
severity: medium
tactics:
    - TA0001
    - TA0043
techniques:
    - T1566
    - T1598
tags:
    - kql
author: Steven Lim
version: "4"
