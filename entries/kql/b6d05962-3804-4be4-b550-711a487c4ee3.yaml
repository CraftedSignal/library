id: b6d05962-3804-4be4-b550-711a487c4ee3
name: Azure AD Role and Group Membership Changes
description: This rule detects changes to privileged roles and group memberships within Azure Active Directory. It helps identify potential unauthorized privilege escalation, supports compliance and audit requirements, and allows correlation of identity changes with suspicious activity or alerts. The rule specifically looks for operations such as adding/removing members from roles or groups, and updating role memberships or user details, ensuring the operation was successful.
query: "## \U0001F50D KQL Description\n#### This query helps security teams:\n#### 1.Track changes to privileged roles and group memberships.\n#### 2.Identify potential unauthorized privilege escalation.\n#### 3.Support compliance and audit requirements.\n#### 4.Correlate identity changes with suspicious activity or alerts.\n## \U0001F9E9 MITRE ATT&CK Mapping\n#### Tactic:Privilege Escalation / Persistence\n#### Goal: Adversaries may attempt to gain elevated access or maintain persistence by modifying role or group memberships.\n#### Technique: (T1078.004 - Valid Accounts: Privileged Accounts, T1098 - Account Manipulation)\n#### Attackers may add themselves or others to privileged roles or groups to gain elevated access.\n### Query:\n```KQL\nAuditLogs\n| where OperationName in (\n    \"Add member to role\", \n    \"Remove member from role\", \n    \"Add eligible member to role\", \n    \"Remove eligible member from role\", \n    \"Update role membership\", \n    \"Update user\",\n    \"Add member to group\", \n    \"Remove member from group\"\n)\n| where Category contains \"RoleManagement\"\n| where Result == \"success\"\n| extend TargetUser = tostring(TargetResources[0].userPrincipalName)\n| project TimeGenerated, OperationName, InitiatedBy = tostring(InitiatedBy.user.userPrincipalName), TargetUser, TargetResources, AdditionalDetails, Category\n| order by TimeGenerated desc\n```\n"
query_type: kql
tactics:
    - TA0004
    - TA0003
    - TA0005
    - TA0001
techniques:
    - T1078.004
    - T1098
tags:
    - kql
version: "1"
