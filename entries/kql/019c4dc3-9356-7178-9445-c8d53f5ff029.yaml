id: 019c4dc3-9356-7178-9445-c8d53f5ff029
name: CastleLoader Anti-Analysis DNS Check
description: Detects a behavioral pattern associated with CastleLoader's anti-analysis technique, where a process initiates a DNS query that fails (NXDOMAIN) and is immediately followed by a successful network connection to a different destination. This can indicate an attempt to check for sandboxing or sinkholing environments.
query: "// Name: CastleLoader Anti-Analysis DNS Check\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-02-11\r\n// Description: Detects a behavioral pattern associated with CastleLoader's anti-analysis technique, where a process initiates a DNS query that fails (NXDOMAIN) and is immediately followed by a successful network connection to a different destination. This can indicate an attempt to check for sandboxing or sinkholing environments.\r\n// False Positives: Legitimate applications may exhibit failover behavior that resembles this pattern (e.g., trying a hostname and falling back to a hardcoded IP). Common web browsers are a likely source of false positives and have been excluded. Further tuning may be required to exclude other specific applications.\r\n// References: https://www.bleepingcomputer.com/news/security/lummastealer-infections-surge-after-castleloader-malware-campaigns/\r\n// MITRE ATT&CK: T1497.003\r\n// Define the maximum time between the failed DNS query and the successful network connection.\r\nlet TimeFrame = 30s;\r\n// Find DNS queries that failed to resolve to an IP address. This may indicate an NXDOMAIN response.\r\nlet DnsFailures = DeviceNetworkEvents\r\n| where Timestamp > ago(TimeFrame + 1h) // Widen the lookback for the first event in the sequence.\r\n| where ActionType == \"DnsQuery\" and isempty(RemoteIP)\r\n| where isnotempty(RemoteUrl)\r\n| project DnsTime = Timestamp, DeviceId, InitiatingProcessId, InitiatingProcessFileName, DnsQuery = RemoteUrl;\r\n// Find successful outbound network connections to public IP addresses.\r\nlet NetworkSuccess = DeviceNetworkEvents\r\n| where Timestamp > ago(TimeFrame)\r\n| where ActionType in (\"ConnectionSuccess\", \"NetworkConnectionSuccess\") and isnotempty(RemoteIP)\r\n// Focus on external communication by filtering out private IP ranges.\r\n| where not(ipv4_is_private(RemoteIP))\r\n| project NetworkTime = Timestamp, DeviceId, InitiatingProcessId, InitiatingProcessFileName, RemoteUrl, RemoteIP, InitiatingProcessAccountSid, DeviceName, InitiatingProcessAccountUpn;\r\n// Correlate failed DNS queries with subsequent successful network connections from the same process.\r\nDnsFailures\r\n| join kind=inner (\r\n    NetworkSuccess\r\n) on DeviceId, InitiatingProcessId, InitiatingProcessFileName\r\n// The network connection must occur *after* the DNS failure and within the defined timeframe.\r\n| where NetworkTime > DnsTime and (NetworkTime - DnsTime) < TimeFrame\r\n// Core logic: The domain from the failed DNS query must be different from the domain of the successful connection.\r\n| where DnsQuery != tostring(parse_url(RemoteUrl).Host)\r\n// FP Tuning: Exclude common browsers which can exhibit this behavior during normal operation. Consider adding other legitimate applications that use failover mechanisms.\r\n| where InitiatingProcessFileName !in~ (\"chrome.exe\", \"msedge.exe\", \"firefox.exe\", \"iexplore.exe\", \"opera.exe\", \"brave.exe\")\r\n| project-reorder\r\n    NetworkTime,\r\n    DeviceName,\r\n    InitiatingProcessAccountUpn,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessId,\r\n    DnsTime,\r\n    DnsQuery,\r\n    RemoteUrl,\r\n    RemoteIP\r\n| extend\r\n    Host_0_HostName = DeviceName,\r\n    Account_0_UPNSuffix = InitiatingProcessAccountUpn,\r\n    Account_0_Sid = InitiatingProcessAccountSid,\r\n    Process_0_ProcessId = InitiatingProcessId,\r\n    File_0_Name = InitiatingProcessFileName\r\n"
query_type: kql
severity: medium
tactics:
