id: 40cf1a95-1b2c-4536-a1db-76dbda2fc593
name: HTA File Spawning Curl to Download and Execute Payload
description: Detects the execution of an HTA file (via mshta.exe) that spawns a command prompt to silently download and execute a remote payload using curl. This behavior is consistent with the Epsilon Red ransomware campaign that uses malicious HTA files with embedded JScript to run shell commands.
query: |
    // Name: HTA File Spawning Curl to Download and Execute Payload
    // Author: detections.ai
    // Date: 2025-08-01
    // Description: Detects the execution of an HTA file (via mshta.exe) that spawns a command prompt to silently download and execute a remote payload using curl. This behavior is consistent with the Epsilon Red ransomware campaign that uses malicious HTA files with embedded JScript to run shell commands.
    // False Positives: Medium. While uncommon, some legitimate administrative or automation scripts might use a similar command structure. Consider excluding known scripts or parent processes if false positives occur.
    // References: https://www.cloudsek.com/blog/threat-actors-lure-victims-into-downloading-hta-files-using-clickfix-to-spread-epsilon-red-ransomware
    // Tags: T1059.005, T1027, T1059.003, Epsilon Red
    DeviceProcessEvents
    // Look for command prompt being launched by the Microsoft HTML Application Host (mshta.exe)
    | where InitiatingProcessFileName =~ "mshta.exe"
      and FileName =~ "cmd.exe"
    // Check for suspicious command line patterns indicative of silent download and subsequent execution
    | where ProcessCommandLine has_all ("curl", "-o", "&&") and ProcessCommandLine contains ".exe"
      // The '-s' or '--silent' flag is a strong indicator, as it attempts to hide the download activity from the user.
      and (ProcessCommandLine has "-s" or ProcessCommandLine has "--silent")
    | project
        TimeGenerated,
        DeviceName,
        AccountName,
        InitiatingProcessFileName,
        InitiatingProcessCommandLine,
        FileName,
        ProcessCommandLine,
        InitiatingProcessParentFileName,
        InitiatingProcessId,
        ProcessId
query_type: kql
tactics:
    - TA0002
    - TA0005
techniques:
    - T1059.003
    - T1027
    - T1218.005
tags:
    - kql
version: "1"
references:
    - https://www.cloudsek.com/blog/threat-actors-lure-victims-into-downloading-hta-files-using-clickfix-to-spread-epsilon-red-ransomware
