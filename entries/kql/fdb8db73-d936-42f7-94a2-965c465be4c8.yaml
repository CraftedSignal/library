name: Detecting New Copilot Extensions
description: 'KQL Query from file: Detecting New Copilot Extensions'
query: "// Detecting New Copilot Extensions\n// https://www.linkedin.com/posts/0x534c_cybersecurity-generativeai-m365-activity-7250789113249837056-D6rZ/\n\n// I refuse to accept Message Center MC908119, which states that “Admins will lose tenant-level control over who can use Copilot agents” \U0001F624. To counter this, I’ve developed a custom KQL detection in DefenderXDR. This detection identifies any newly installed, non-whitelisted Copilot extensions and alerts the M365 Admin for review. The M365 Admin can then block these extensions in the Integrated Apps section of the admin portal, reclaiming some control.\U0001F4AA\n\n// Added your whitelisted extensions or plugins to WLExtensions\nlet WLExtensions = dynamic([\"BingWebSearch\"]);\nCloudAppEvents\n| where Timestamp > ago(1h)\n| where ActionType == @\"CopilotInteraction\"\n| extend UserID = tostring(RawEventData.UserId)\n| extend CopilotData = todynamic(RawEventData.CopilotEventData)\n| extend CopilotPlugin = tostring(CopilotData.AISystemPlugin[0].Id)\n| where isnotempty(CopilotPlugin)\n| where not (CopilotPlugin has_any (WLExtensions))\n| project Timestamp, AccountObjectId, UserID, CopilotPlugin, ReportId\n\n// MITRE ATT&CK\n// T1116 Browser Extensions\n"
query_type: kql
tactics:
    - TA0005
    - TA0003
techniques:
