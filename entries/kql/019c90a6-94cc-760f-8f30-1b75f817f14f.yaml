id: 019c90a6-94cc-760f-8f30-1b75f817f14f
name: OAuth Device Code Phishing Detection — KQL Hunt Rule for Microsoft Sentinel
description: |-
    With OAuth 2.0 Device Code Flow phishing campaigns actively targeting M365 environments in financial services and beyond, I built a cross-phase KQL detection rule that moves beyond the obvious deviceCode protocol filter — because the real damage happens in tables most hunts never look at.

    The rule correlates three phases across both SigninLogs and AADNonInteractiveUserSignInLogs:

    Phase 1 catches victim-side device code authentications, filtering out primaryRefreshToken (enrolled devices) and known low-risk resources to cut noise at the source.

    Phase 2 surfaces non-interactive single-factor token replay activity — this is where the attacker's stolen OAuth token actually appears, silently blending into background API traffic.

    Phase 3 identifies post-compromise Graph/mail resource access across anomalous IP counts — the data exfiltration and BEC staging layer.

    The key design decisions that make it production-ready: a cross-phase inner join so only users appearing in Phase 1 and Phase 2 surface at all, a MinutesToReplay temporal constraint (>= 0 and <= 2880) to eliminate false correlations where phases are coincidental rather than causal, and a composite risk score with banded severity output.

    Tested against 90 days of real tenant data. Came back clean after tuning — which is the outcome you want before deploying as a scheduled analytics rule.
query: "// ============================================================\r\n// OAuth Device Code Attack Hunt — Cross-Phase Correlation\r\n// Only surfaces users appearing in 2+ phases\r\n// ============================================================\r\nlet LookbackDays     = 90d;\r\nlet ReplayThreshold  = 5;    // Lower = more sensitive, raise if still noisy\r\nlet UniqueIPThreshold = 1;   // Raise to 2 if legitimate remote workers skew results\r\nlet LowRiskApps = dynamic([\r\n    \"Microsoft Authentication Broker\",\r\n    \"Microsoft Account Controls V2\",\r\n    \"OneDrive SyncEngine\",\r\n    \"Microsoft Office\",\r\n    \"Microsoft Teams\",\r\n    \"Windows Sign In\",\r\n    \"Microsoft Azure Active Directory Connect\"\r\n]);\r\nlet LowRiskResources = dynamic([\r\n    \"Device Registration Service\",\r\n    \"Windows Azure Service Management API\"\r\n]);\r\n// ------------------------------------------------------------\r\n// PHASE 1 — Device code victim-side authentications\r\n// Keyed on UserPrincipalName for the join below\r\n// ------------------------------------------------------------\r\nlet Phase1Users = SigninLogs\r\n| where TimeGenerated > ago(LookbackDays)\r\n| where AuthenticationProtocol =~ \"deviceCode\"\r\n    or tostring(AuthenticationDetails) has \"deviceCode\"\r\n| where ResourceDisplayName !in (LowRiskResources)\r\n| where IncomingTokenType != \"primaryRefreshToken\"\r\n| summarize\r\n    P1_Count        = count(),\r\n    P1_FirstSeen    = min(TimeGenerated),\r\n    P1_LastSeen     = max(TimeGenerated),\r\n    P1_IPs          = make_set(IPAddress, 10),\r\n    P1_Locations    = make_set(Location, 5),\r\n    P1_Apps         = make_set(AppDisplayName, 5),\r\n    P1_TokenTypes   = make_set(IncomingTokenType, 5),\r\n    P1_Resources    = make_set(ResourceDisplayName, 5),\r\n    // Score within phase — none is highest risk\r\n    P1_RiskScore    = max(case(\r\n        IncomingTokenType == \"none\",              30,\r\n        IncomingTokenType == \"refreshToken\",      20,\r\n        IncomingTokenType == \"primaryRefreshToken\", 5,\r\n        10\r\n    ))\r\n    by UserPrincipalName;\r\n// ------------------------------------------------------------\r\n// PHASE 2 — Non-interactive token replay\r\n// Single-factor, multi-IP, anomalous volume\r\n// ------------------------------------------------------------\r\nlet Phase2Users = AADNonInteractiveUserSignInLogs\r\n| where TimeGenerated > ago(LookbackDays)\r\n| where AuthenticationRequirement == \"singleFactorAuthentication\"\r\n| where IncomingTokenType in (\"refreshToken\", \"none\")\r\n| where AppDisplayName !in (LowRiskApps)\r\n| where ResourceDisplayName !in (LowRiskResources)\r\n// Step 1: Aggregate first — no case() here\r\n| summarize\r\n    P2_Count        = count(),\r\n    P2_FirstSeen    = min(TimeGenerated),\r\n    P2_LastSeen     = max(TimeGenerated),\r\n    P2_IPs          = make_set(IPAddress, 10),\r\n    P2_Locations    = make_set(Location, 5),\r\n    P2_Apps         = make_set(AppDisplayName, 5),\r\n    P2_UniqueIPs    = dcount(IPAddress),\r\n    P2_TokenType    = any(IncomingTokenType)\r\n    by UserPrincipalName\r\n| where P2_Count > ReplayThreshold or P2_UniqueIPs > UniqueIPThreshold\r\n// Step 2: Score after aggregation — safe to use derived columns here\r\n| extend P2_RiskScore = case(\r\n    P2_TokenType == \"none\"         and P2_Count > 20,   35,\r\n    P2_TokenType == \"none\",                              25,\r\n    P2_UniqueIPs > 3,                                    30,\r\n    P2_UniqueIPs > 1,                                    20,\r\n    10\r\n);\r\n// ------------------------------------------------------------\r\n// PHASE 3 — Post-compromise Graph/mail access\r\n// Multi-IP access to high-value M365 resources\r\n// ------------------------------------------------------------\r\nlet Phase3Users = AADNonInteractiveUserSignInLogs\r\n| where TimeGenerated > ago(LookbackDays)\r\n| where AppDisplayName has_any (\r\n    \"Graph\", \"Outlook\", \"SharePoint\",\r\n    \"OneDrive\", \"Exchange\", \"Office 365\"\r\n)\r\n| where IncomingTokenType in (\"refreshToken\", \"none\")\r\n// Step 1: Aggregate first\r\n| summarize\r\n    P3_Count        = count(),\r\n    P3_FirstSeen    = min(TimeGenerated),\r\n    P3_LastSeen     = max(TimeGenerated),\r\n    P3_IPs          = make_set(IPAddress, 10),\r\n    P3_Locations    = make_set(Location, 5),\r\n    P3_Apps         = make_set(AppDisplayName, 5),\r\n    P3_UniqueIPs    = dcount(IPAddress),\r\n    P3_TokenType    = any(IncomingTokenType)\r\n    by UserPrincipalName\r\n| where P3_UniqueIPs > 2\r\n// Step 2: Score after aggregation\r\n| extend P3_RiskScore = case(\r\n    P3_TokenType == \"none\" and P3_UniqueIPs > 3,    40,\r\n    P3_TokenType == \"none\",                          30,\r\n    P3_UniqueIPs > 4,                                30,\r\n    20\r\n);\r\n// ------------------------------------------------------------\r\n// ------------------------------------------------------------\r\n// CROSS-PHASE JOIN\r\n// ------------------------------------------------------------\r\nPhase1Users\r\n| join kind=inner Phase2Users on UserPrincipalName\r\n| extend MinutesToReplay = datetime_diff('minute', P2_FirstSeen, P1_LastSeen)\r\n| where MinutesToReplay >= 0      // Eliminates negative replay — P2 must follow P1\r\n| where MinutesToReplay <= 2880   // Within 48 hours\r\n| join kind=leftouter Phase3Users on UserPrincipalName\r\n| extend\r\n    TotalRiskScore  = P1_RiskScore + P2_RiskScore + coalesce(P3_RiskScore, 0),\r\n    PhasesMatched   = strcat(\r\n        \"P1\",\r\n        iff(isnotnull(P2_Count),     \" + P2\", \"\"),\r\n        iff(isnotnull(P3_RiskScore), \" + P3\", \"\")\r\n    )\r\n    // MinutesToReplay already calculated above — don't recalculate here\r\n| extend RiskBand = case(\r\n    TotalRiskScore >= 70, \"\U0001F534 Critical  — Likely Active Compromise\",\r\n    TotalRiskScore >= 45, \"\U0001F7E0 High      — Strong Indicator, Investigate\",\r\n    TotalRiskScore >= 25, \"\U0001F7E1 Medium    — Correlate Manually\",\r\n    \"⚪ Low       — Review in Context\"\r\n)\r\n| extend TimeGenerated = P1_LastSeen\r\n| project\r\n    TimeGenerated,\r\n    RiskBand,\r\n    TotalRiskScore,\r\n    PhasesMatched,\r\n    UserPrincipalName,\r\n    MinutesToReplay,\r\n    P1_LastSeen,\r\n    P1_IPs,\r\n    P1_Apps,\r\n    P1_TokenTypes,\r\n    P1_Resources,\r\n    P2_LastSeen,\r\n    P2_Count,\r\n    P2_UniqueIPs,\r\n    P2_Locations,\r\n    P2_Apps,\r\n    P3_LastSeen,\r\n    P3_Count,\r\n    P3_UniqueIPs,\r\n    P3_Apps\r\n| order by TotalRiskScore desc, MinutesToReplay asc"
query_type: kql
severity: medium
