id: 019cfb5c-5464-771d-ad00-089fc42ed388
name: Office Files with Password Keywords Accessed
description: This rule detects the access or creation of Microsoft Office files (docx, xlsx, pptx) that have 'password' or related keywords in their filename or folder path. It also attempts to identify if these files contain password-related content through DLP indicators, suggesting potential sensitive data exposure or staging.
query: "let office_ext = dynamic([\"docx\", \"xlsx\", \"pptx\"]);\r\nlet password_keywords = dynamic([\"password\", \"pwd\", \"credentials\", \"passcode\", \"secret\"]);\r\nlet english_indicators = dynamic([\"password\", \"Password\", \"Credentials\", \"credentials\", \"Secret\", \"secret\", \"Passcode\", \"passcode\"]); // English words\r\n// Step 1: Find Office files with password-related names accessed/created in last 7 days\r\nDeviceFileEvents\r\n| where Timestamp > ago(7d)\r\n| where tolower(split(FileName, \".\")[-1]) in~ (office_ext)\r\n| where FileName has_any(password_keywords) or FolderPath has_any(password_keywords)\r\n// Step 2: Optionally join with DeviceEvents for DLP/SensitiveFileRead or content inspection\r\n| join kind=leftouter (\r\n    DeviceEvents\r\n    | where Timestamp > ago(7d)\r\n    | where ActionType in~ (\"SensitiveFileRead\", \"AsrExecutableOfficeContentAudited\", \"DpapiAccessed\")\r\n    | where FileName has_any(password_keywords)\r\n    | extend DLPIndicator = iff(isnotempty(AdditionalFields) and AdditionalFields has_any(english_indicators), \"English password-related content detected\", \"\")\r\n    | project DeviceName, FileName, FolderPath, Timestamp, DLPIndicator, AdditionalFields\r\n) on DeviceName, FileName, FolderPath\r\n// Step 3: Project required fields\r\n| extend PasswordIndicator = iff(isnotempty(DLPIndicator), DLPIndicator, \"Password keyword in file name or path\")\r\n| project\r\n    Timestamp,\r\n    FileName,\r\n    FolderPath,\r\n    DeviceName,\r\n    UserName = InitiatingProcessAccountName,\r\n    UserUPN = InitiatingProcessAccountUpn,\r\n    PasswordIndicator,\r\n    ContentSnippet = AdditionalFields,\r\n    DeviceId,\r\n    InitiatingProcessAccountSid,\r\n    InitiatingProcessAccountObjectId\r\n| where PasswordIndicator has_any(english_indicators) or PasswordIndicator == \"Password keyword in file name or path\"\r\n// Step 4: Remove duplicates and show most relevant info\r\n| summarize\r\n    FirstSeen=min(Timestamp),\r\n    LastSeen=max(Timestamp),\r\n    FilePaths=make_set(FolderPath, 5),\r\n    Devices=make_set(DeviceName, 5),\r\n    Users=make_set(UserName, 5),\r\n    UserUPNs=make_set(UserUPN, 5),\r\n    Indicators=make_set(PasswordIndicator, 5),\r\n    ContentSnippets=make_set(ContentSnippet, 5),\r\n    DeviceIds=make_set(DeviceId, 5),\r\n    AccountSids=make_set(InitiatingProcessAccountSid, 5),\r\n    AccountObjectIds=make_set(InitiatingProcessAccountObjectId, 5)\r\nby FileName\r\n| project\r\n    FileName,\r\n    FilePaths,\r\n    Devices,\r\n    Users,\r\n    UserUPNs,\r\n    Indicators,\r\n    ContentSnippets,\r\n    DeviceIds,\r\n    AccountSids,\r\n    AccountObjectIds,\r\n    FirstSeen,\r\n    LastSeen\r\n| order by LastSeen desc"
query_type: kql
severity: medium
tactics:
    - TA0007
    - TA0009
techniques:
    - T1083
    - T1005
tags:
    - kql
version: "1"
