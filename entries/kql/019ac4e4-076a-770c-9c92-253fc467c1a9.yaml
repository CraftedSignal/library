id: 019ac4e4-076a-770c-9c92-253fc467c1a9
name: Potential LANDFALL Spyware Staging File
description: Detects the creation of image files on endpoints that match the characteristics of the LANDFALL Android spyware delivery mechanism. LANDFALL is delivered via malformed DNG/JPEG files, often through WhatsApp. This activity could represent a user downloading or staging the malicious file on a corporate endpoint before transferring it to a mobile device. The rule looks for specific filename patterns associated with WhatsApp and known malicious file hashes.
query: |
    // Name: Potential LANDFALL Spyware Staging File
    // Author: detections.ai
    // Date: 2025-11-27
    // Description: Detects the creation of image files on endpoints that match the characteristics of the LANDFALL Android spyware delivery mechanism. LANDFALL is delivered via malformed DNG/JPEG files, often through WhatsApp. This activity could represent a user downloading or staging the malicious file on a corporate endpoint before transferring it to a mobile device. The rule looks for specific filename patterns associated with WhatsApp and known malicious file hashes.
    // False Positive Sensitivity: Medium
    // Reference: https://unit42.paloaltonetworks.com/landfall-is-new-commercial-grade-android-spyware/
    // MITRE TTPs: T1566.001
    // Data Source: DeviceFileEvents
    let LandfallImageHashes = dynamic([
        "9297888746158e38d320b05b27b0032b2cc29231be8990d87bc46f1e06456f93",
        "b06dec10e8ad0005ebb9da24204c96cb2e297bd8d418bc1c8983d066c0997756",
        "c0f30c2a2d6f95b57128e78dc0b7180e69315057e62809de1926b75f86516b2e",
        "b975b499baa3119ac5c2b3379306d4e50b9610e9bba3e56de7dfd3927a96032d",
        "29882a3c426273a7302e852aa77662e168b6d44dcebfca53757e29a9cdf02483",
        "b45817ffb0355badcc89f2d7d48eecf00ebdf2b966ac986514f9d971f6c57d18"
    ]);
    DeviceFileEvents
    | where Timestamp > ago(1d)
    | where ActionType == "FileCreated"
    | where
        // High-fidelity match for known malicious image files.
        SHA256 in (LandfallImageHashes)
        or
        // Behavioral match for suspicious files resembling the delivery mechanism.
        (
            // Filenames match patterns used by WhatsApp.
            (FileName startswith "WhatsApp Image" or FileName matches regex @"^IMG-\d{8}-WA\d+\.(jpg|jpeg)$")
            // File has a common image extension. The exploit targets DNG/TIFF parsing but may use other extensions.
            and FileName has_any (".jpg", ".jpeg", ".dng", ".tiff")
            // File is created by a browser or the WhatsApp desktop client, common for downloads.
            and InitiatingProcessFileName has_any ("chrome.exe", "firefox.exe", "msedge.exe", "safari.exe", "WhatsApp.exe")
        )
    // Potential for False Positives: The filename-based logic may trigger on legitimate WhatsApp images.
    // This is mitigated by checking the initiating process. Further tuning could involve restricting to specific download folders.
    | project
        Timestamp,
        DeviceName,
        FileName,
        FolderPath,
        SHA256,
        InitiatingProcessFileName,
        InitiatingProcessCommandLine,
        ReportId
query_type: kql
tactics:
    - TA0001
techniques:
    - T1566.001
tags:
    - kql
version: "2"
references:
    - https://unit42.paloaltonetworks.com/landfall-is-new-commercial-grade-android-spyware/
