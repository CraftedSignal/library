id: 019c8a63-cb36-71f9-bba3-34975ae4e355
name: Anomalous User Creation by ServiceNow AI Agent
description: This rule detects when a new user is created in ServiceNow shortly after a conversation was initiated by the same user via an "AI Agent" device type. This pattern is highly suspicious and aligns with the final stage of the BodySnatcher (CVE-2025-12420) proof-of-concept exploit, where an attacker impersonates a privileged user to have an AI agent create a backdoor account.
query: "// Name: Anomalous User Creation by ServiceNow AI Agent\r\n// Author: adarsh pandey\r\n// Date: 2026-02-23\r\n// Description: This rule detects when a new user is created in ServiceNow shortly after a conversation was initiated by the same user via an \"AI Agent\" device type. This pattern is highly suspicious and aligns with the final stage of the BodySnatcher (CVE-2025-12420) proof-of-concept exploit, where an attacker impersonates a privileged user to have an AI agent create a backdoor account.\r\n// False Positives: Medium. False positives may occur if your organization has legitimate, automated workflows where an AI agent creates user accounts on behalf of an administrator. To reduce noise, populate the 'privileged_users' list with accounts that should not be performing this activity. If this list is empty, the rule will monitor all users.\r\n// References: https://appomni.com/ao-labs/bodysnatcher-agentic-ai-security-vulnerability-in-servicenow/\r\n// Tactic: Persistence, Privilege Escalation\r\n// Technique: T1136.002, TA0003\r\nlet time_window = 1d;\r\nlet correlation_window = 5m; // The maximum time allowed between the AI conversation start and the user creation event.\r\nlet privileged_users = dynamic([]); // Recommended: Add privileged usernames to monitor, e.g., [\"admin\", \"system.administrator\"]\r\n\r\n// This detection requires logs from ServiceNow's Conversation [sys_cs_conversation] and Audit [sys_audit] tables.\r\n// Please adjust the table name 'ServiceNow_CL' and field names to match your environment's schema.\r\n// Step 1: Identify conversations initiated via an \"AI Agent\" device type.\r\nlet ai_conversations = ServiceNow_CL\r\n| where TimeGenerated > ago(time_window)\r\n| where SysTableName_s == \"sys_cs_conversation\" // Filter for conversation logs\r\n| where DeviceType_s == \"AI Agent\"\r\n| extend ConversationInitiator = tostring(Consumer_s) // The user who started the conversation\r\n// Optional but recommended: Filter for conversations initiated by privileged accounts.\r\n| where isempty(privileged_users) or ConversationInitiator in~ (privileged_users)\r\n| project ConversationTime = TimeGenerated, ConversationInitiator;\r\n\r\n// Step 2: Identify new user creation events from audit logs.\r\nlet user_creations = ServiceNow_CL\r\n| where TimeGenerated > ago(time_window)\r\n| where SysTableName_s == \"sys_audit\" // Filter for audit logs\r\n| where TableName_s == \"sys_user\" and FieldName_s == \"sys_id\" and isempty(OldValue_s) // Identifies a new record insert in the user table\r\n| extend CreatedBy = tostring(UserName_s), NewUserName = tostring(NewValue_s)\r\n| project CreationTime = TimeGenerated, CreatedBy, NewUserName;\r\n\r\n// Step 3: Join the two event streams to find user creations that occurred shortly after a suspicious AI conversation by the same user.\r\nai_conversations\r\n| join kind=inner (\r\n    user_creations\r\n) on $left.ConversationInitiator == $right.CreatedBy\r\n// Correlate events that happened close in time.\r\n| where CreationTime between (ConversationTime .. (ConversationTime + correlation_window))\r\n| project-reorder\r\n    CreationTime,\r\n    ConversationInitiator,\r\n    NewUserName,\r\n    ConversationTime\r\n| extend\r\n    timestamp = CreationTime,\r\n    AccountCustomEntity = ConversationInitiator\r\n"
