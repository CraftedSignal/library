id: 98440649-1f37-4c63-81fb-7c95d9acaecf
name: NotDoor Malware Activity Detection
description: This rule detects various activities associated with the NotDoor malware, including the copying of malicious files to Outlook macro folders, C2 beaconing attempts using nslookup or curl to suspicious domains, registry modifications to disable Outlook macro security or enable macro loading on boot, and the creation of staging files in temporary directories for potential exfiltration. These behaviors are indicative of NotDoor installation, persistence, defense evasion, and data staging.
query: "// References: https://lab52.io/blog/analyzing-notdoor-inside-apt28s-expanding-arsenal/\n\nlet timeframe = 1d;\n// Define IOCs for easier tuning\nlet suspiciousDomains = dynamic([\"dnshook.site\", \"webhook.site\"]);\n// The Office version in the registry path may need to be adjusted for different environments.\nlet officeVersion = \"16.0\";\nlet stagingFileNames = dynamic([\"report\", \"invoice\", \"contract\", \"photo\", \"scheme\", \"document\"]);\n(union \n    (\n        DeviceProcessEvents\n        | where Timestamp > ago(timeframe)\n        | where\n            // copy from a staging location to the Outlook macro folder\n            (ProcessCommandLine has_all (\"copy\", @\"c:\\programdata\\testtemp.ini\", @\"\\Microsoft\\Outlook\")) or\n            // C2 beaconing\n            (ProcessCommandLine has_any (suspiciousDomains) and (FileName =~ \"nslookup.exe\" or FileName =~ \"curl.exe\"))\n        | extend\n            ActivityType = \"Process Execution\",\n            Reason = case( ProcessCommandLine has \"\\\\Microsoft\\\\Outlook\", \"NotDoor Installation: Malicious macro file copied via command line.\",\n                ProcessCommandLine has_any (suspiciousDomains), \"NotDoor Installation: C2 beaconing via nslookup or curl.\",\n                \"Suspicious Process Execution\"\n            )\n        | project Timestamp, DeviceName, AccountUpn, ActivityType, Reason, FileName, ProcessCommandLine, InitiatingProcessFileName, InitiatingProcessCommandLine\n    ),\n    (\n        //Registry modifications \n        DeviceRegistryEvents\n        | where Timestamp > ago(timeframe)\n        | where RegistryKey contains @\"\\\\Microsoft\\\\Office\\{officeVersion}\\Outlook\"\n        | where\n            (RegistryKey endswith @\"\\Outlook\" and RegistryValueName == \"LoadMacroProviderOnBoot\" and RegistryValueData == \"1\") or\n            (RegistryKey endswith @\"\\Outlook\\Security\" and RegistryValueName == \"Level\" and RegistryValueData == \"1\") or\n            (RegistryKey endswith @\"\\Outlook\\Options\\General\" and RegistryValueName == \"PONT_STRING\" and RegistryValueData == \";\")\n        | extend\n            ActivityType = \"Registry Modification\",\n            Reason = case(\n                RegistryValueName == \"LoadMacroProviderOnBoot\", \"NotDoor Persistence: Outlook configured to load macro provider on boot.\",\n                RegistryValueName == \"Level\", \"NotDoor Defense Evasion: Outlook macro security disabled (Level=1).\",\n                RegistryValueName == \"PONT_STRING\", \"NotDoor Defense Evasion: Outlook macro dialogs disabled.\",\n                \"Suspicious Registry Modification\"\n            )\n        | project Timestamp, DeviceName, InitiatingProcessAccountUpn, ActivityType, Reason, RegistryKey, RegistryValueName, RegistryValueData, InitiatingProcessCommandLine\n    ),\n    (\n        DeviceFileEvents\n        | where Timestamp > ago(timeframe)\n        | where FolderPath endswith @\"\\Temp\\Test\\\" and ActionType == \"FileCreated\"\n        | where FileName has_any (stagingFileNames)\n        | extend\n            ActivityType = \"File Creation\",\n            Reason = \"NotDoor Exfiltration: Staging file created in temp directory.\"\n        | project Timestamp, DeviceName, InitiatingProcessAccountUpn, ActivityType, Reason, FileName, FolderPath, InitiatingProcessCommandLine\n    )\n)\n"
