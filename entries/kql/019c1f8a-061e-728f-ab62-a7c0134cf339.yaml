id: 019c1f8a-061e-728f-ab62-a7c0134cf339
name: Masquerading Notepad++ AutoUpdater Execution
description: Detects the execution of 'AutoUpdater.exe' or 'update.exe' with the '/closeRunningNpp' flag. This specific behavior has been observed in hijacked Notepad++ update flows where a malicious binary masquerades as the legitimate updater. 'AutoUpdater.exe' is not a legitimate Notepad++ file.
query: "// Name: Masquerading Notepad++ AutoUpdater Execution\r\n// Author: @jsh0x\r\n// Date: 2026-02-02\r\n// Description: Detects the execution of 'AutoUpdater.exe' or 'update.exe' with the '/closeRunningNpp' flag. This specific behavior has been observed in hijacked Notepad++ update flows where a malicious binary masquerades as the legitimate updater. 'AutoUpdater.exe' is not a legitimate Notepad++ file.\r\n// MITRE TTPs: T1036.005, T1574.002\r\n// References: https://doublepulsar.com/the-notepad-incident-how-a-likely-state-sponsored-threat-actor-is-using-notepad-to-hack-e5375547318d\r\n// False Positive Sensitivity: Medium\r\nDeviceProcessEvents\r\n| where Timestamp > ago(30d)\r\n| where FileName in~ (\"AutoUpdater.exe\", \"update.exe\")\r\n| where ProcessCommandLine has \"/closeRunningNpp\"\r\n| project-reorder Timestamp,DeviceName,AccountName,FileName,FolderPath,ProcessCommandLine,InitiatingProcessFileName,InitiatingProcessCommandLine\r\n"
