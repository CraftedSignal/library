id: c7b69fe8-db97-4f98-8735-5b80b8cd940d
name: 'CVE-2025-8088: WinRAR Zero-Day Used to Deploy RomCom Backdoors'
description: ESET has identified spearphishing campaigns leveraging malicious RAR attachments to exploit CVE-2025-8088—a WinRAR zero-day vulnerability. This technique delivers RomCom backdoors, attributed to threat actor Storm-0978 (aka Tropical Scorpius / UNC2596).
query: "// CVE-2025-8088 Detection: WinRAR zero-day exploited for RomCom backdoors\r\nlet InboundEmailAttachment =\r\nEmailAttachmentInfo\r\n| where Timestamp > ago(1h)\r\n| distinct FileName;\r\nDeviceFileEvents\r\n| where Timestamp > ago(1h)\r\n| where ActionType == \"FileCreated\"\r\n| where InitiatingProcessVersionInfoOriginalFileName == \"WinRAR.exe\"\r\n| where FolderPath has \"\\\\Microsoft\\\\Windows\\\\Start Menu\\\\Programs\\\\Startup\"\r\n| where InitiatingProcessCommandLine has_any(InboundEmailAttachment)"
query_type: kql
severity: medium
techniques:
    - T1203
tags:
    - kql
author: Steven Lim
version: "1"
references:
    - https://www.bleepingcomputer.com/news/security/winrar-zero-day-flaw-exploited-by-romcom-hackers-in-phishing-attacks/
