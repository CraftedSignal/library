id: 019c89d9-e196-7129-b5d2-4f42a802de92
name: Apache Config STOMPing Persistence
description: Detects a specific persistence technique where an attacker rapidly modifies a web server's configuration file, restarts the service to load the malicious config into memory, and then immediately restores the original file to evade detection. This pattern was observed in the exploitation of CVE-2026-1731.
query: "// Name: Apache Config STOMPing Persistence\r\n// Author: Adarsh Pandey\r\n// Date: 2026-02-23\r\n// Description: Detects a specific persistence technique where an attacker rapidly modifies a web server's configuration file, restarts the service to load the malicious config into memory, and then immediately restores the original file to evade detection. This pattern was observed in the exploitation of CVE-2026-1731.\r\n// MITRE TTPs: T1505.003, T1543.002, T1070.006\r\n// References: https://unit42.paloaltonetworks.com/beyondtrust-cve-2026-1731/\r\n// False Positive Sensitivity: Medium\r\n\r\n// Define the time window for the entire sequence of events.\r\nlet TimeFrame = 5m;\r\n// Define the maximum time between each step (e.g., between modification and restart).\r\nlet StepTimeFrame = 2m;\r\n\r\n// Find web server configuration file modification events.\r\nlet FileModificationEvents =\r\n    DeviceFileEvents\r\n    | where Timestamp > ago(TimeFrame)\r\n    // The technique involves overwriting files, which can be logged as FileCreated or FileRenamed (for backup/restore).\r\n    | where ActionType in (\"FileCreated\", \"FileRenamed\")\r\n    // Look in common web server configuration directories. This can be tuned to your environment.\r\n    | where (FolderPath has \"/etc/apache\" or FolderPath has \"/etc/httpd\" or FolderPath has \"/etc/nginx\") and FileName endswith \".conf\"\r\n    | project ModTime = Timestamp, DeviceName, FilePath = strcat(FolderPath, FileName);\r\n\r\n// Find web server restart events.\r\nlet RestartEvents =\r\n    DeviceProcessEvents\r\n    | where Timestamp > ago(TimeFrame)\r\n    // Look for common commands used to restart web servers.\r\n    | where ProcessCommandLine has_any (\"systemctl restart\", \"service restart\", \"apachectl restart\", \"apache2ctl restart\", \"httpd -k restart\", \"nginx -s reload\")\r\n      and ProcessCommandLine has_any (\"apache\", \"httpd\", \"nginx\")\r\n    | project RestartTime = Timestamp, DeviceName, RestartCommand = ProcessCommandLine;\r\n\r\n// Correlate a file modification that occurs *before* a restart.\r\nFileModificationEvents\r\n| as PreModification\r\n| join kind=inner (RestartEvents) on DeviceName\r\n// Ensure the modification happened shortly before the restart.\r\n| where RestartEvents.RestartTime > PreModification.ModTime and (RestartEvents.RestartTime - PreModification.ModTime) < StepTimeFrame\r\n// Correlate a second file modification that occurs *after* the restart to the same file path.\r\n| join kind=inner (FileModificationEvents) on DeviceName, FilePath\r\n| as PostModification\r\n// Ensure the second modification (the restoration) happened shortly after the restart.\r\n| where PostModification.ModTime > RestartEvents.RestartTime and (PostModification.ModTime - RestartEvents.RestartTime) < StepTimeFrame\r\n// This final check ensures we are looking at two distinct modification events around the restart.\r\n| where PostModification.ModTime > PreModification.ModTime\r\n// FP-TUNING: Legitimate configuration management tools (Ansible, Puppet, etc.) may perform similar actions, but typically not with this speed.\r\n// If false positives occur, consider increasing the required time delta between modifications or scoping the rule to hosts not managed by such tools.\r\n| project\r\n    Timestamp = PreModification.ModTime,\r\n    DeviceName,\r\n    FilePath,\r\n    RestartCommand,\r\n    PreRestartModificationTime = PreModification.ModTime,\r\n    RestartTime,\r\n    PostRestartModificationTime = PostModification.ModTime\r\n| extend\r\n    TimeDelta_Pre_to_Post_Seconds = datetime_diff('second', PostRestartModificationTime, PreRestartModificationTime)\r\n"
query_type: kql
severity: medium
