id: 64784c15-3ab5-41cc-9199-8d7a2f9d61f4
name: SonicWall SMA100 Pre-Auth Vulnerability Exploitation Attempts CVE-2025-40596, CVE-2025-40597, CVE-2025-40598
description: 'This rule detects potential exploitation attempts against three pre-authentication vulnerabilities in SonicWall SMA100 series devices: CVE-2025-40596 (stack-based buffer overflow via long URI path), CVE-2025-40597 (heap-based buffer overflow via long Host header), and CVE-2025-40598 (reflected Cross-Site Scripting in /cgi-bin/radiusChallengeLogin).'
query: "// Name: SonicWall SMA100 Pre-Auth Vulnerability Exploitation Attempts CVE-2025-40596, CVE-2025-40597, CVE-2025-40598\r\n// Author: Reyben T. Cortes\r\n// Date: 2025-08-04\r\n// References:\r\n// - https://psirt.global.sonicwall.com/vuln-detail/SNWLID-2025-0012\r\n//\r\n// Description:\r\n// Detects exploitation attempts against SonicWall SMA100 vulnerabilities:\r\n// - CVE-2025-40596: Stack-based buffer overflow via long URI in /__api__/.\r\n// - CVE-2025-40597: Heap-based buffer overflow via long Host header in /__api__/.\r\n// - CVE-2025-40598: Reflected XSS in /cgi-bin/radiusChallengeLogin state parameter.\r\n//\r\n// Note: This query is designed for CommonSecurityLog. You may need to adapt table and field names for other log sources.\r\nlet timeframe = 1h;\r\n// Define a list of common XSS patterns, including URL-encoded variants\r\nlet xss_patterns = dynamic([\"><img\", \"><svg\", \"onerror=\", \"onload=\", \"onmouseover=\", \"javascript:\", \"%3Cimg\", \"%3Csvg\", \"%22%3E\", \"alert(\"]);\r\nCommonSecurityLog\r\n| where TimeGenerated > ago(timeframe)\r\n// Filter for logs from SonicWall SMA devices\r\n| where DeviceVendor == \"SonicWall\" and (DeviceProduct has \"SMA\" or DeviceProduct has \"Secure Mobile Access\")\r\n| where\r\n    // CVE-2025-40596: Detects an overly long URI targeting the /__api__/ endpoint, which may indicate a buffer overflow attempt.\r\n    (RequestURL has \"/__api__/\" and strlen(RequestURL) > 2000 and tostring(ResponseCode) in (\"500\", \"502\")) or\r\n    // CVE-2025-40597: Detects an overly long Host header in requests to the /__api__/ endpoint, which may indicate a buffer overflow attempt.\r\n    (RequestURL has \"/__api__/\" and isnotempty(RequestHost) and strlen(RequestHost) > 256 and tostring(ResponseCode) in (\"500\", \"502\")) or\r\n    // CVE-2025-40598: Detects XSS patterns in the 'state' parameter of the radiusChallengeLogin endpoint.\r\n    (RequestURL has \"/cgi-bin/radiusChallengeLogin\" and RequestURL has \"state=\" and RequestURL has_any (xss_patterns) and tostring(ResponseCode) == \"200\")\r\n// False Positive Tuning:\r\n// - The length thresholds for URI and Host header are set high to avoid flagging legitimate, but long, requests.\r\n// - Specific response codes (500/502 for overflows, 200 for successful XSS reflection) are used to increase fidelity.\r\n// - To further reduce noise, consider excluding known vulnerability scanner IP addresses.\r\n//   Example: | where SourceIP !in (\"192.168.1.10\", \"10.0.0.5\")\r\n| extend\r\n    DetectedCVE = case(\r\n        RequestURL has \"/__api__/\" and strlen(RequestURL) > 2000, \"CVE-2025-40596\",\r\n        RequestURL has \"/__api__/\" and isnotempty(RequestHost) and strlen(RequestHost) > 256, \"CVE-2025-40597\",\r\n        RequestURL has \"/cgi-bin/radiusChallengeLogin\", \"CVE-2025-40598\",\r\n        \"Undetermined\"\r\n    ),\r\n    AttackTechnique = case(\r\n        DetectedCVE == \"CVE-2025-40596\", \"Stack-based Buffer Overflow\",\r\n        DetectedCVE == \"CVE-2025-40597\", \"Heap-based Buffer Overflow\",\r\n        DetectedCVE == \"CVE-2025-40598\", \"Reflected Cross-Site Scripting\",\r\n        \"Undetermined\"\r\n    )\r\n| project-reorder\r\n    TimeGenerated,\r\n    SourceIP,\r\n    DestinationIP,\r\n    RequestMethod,\r\n    RequestURL,\r\n    RequestHost,\r\n    ResponseCode,\r\n    DetectedCVE,\r\n    AttackTechnique,\r\n    DeviceProduct,\r\n    DeviceVendor\r\n"
query_type: kql
severity: medium
tags:
    - kql
author: Reyben T. Cortes
version: "1"
