id: 4ee825be-88df-4abc-8f94-2247db0c8cff
name: Root Shell Spawned via GTFOBin-like Parent (Linux, DeviceProcessEvents)
description: "Detects potential GTFOBins abuse on Linux systems where a root shell is spawned by a suspicious parent process (e.g., find, perl, vim, tar, etc.).\nThis rule relies on DeviceProcessEvents in Microsoft Defender XDR and is intended for environments where Auditd, Sysmon for Linux, or similar native logging is not available.\n\n Note: This detection does not cover all GTFOBins. It focuses specifically on cases where:\n-   A root-owned shell is spawned\n-   The parent process is known to be capable of shell escape or privilege abuse\n-   The child command appears interactive or escape-like\n\nIt does not detect:\n-   Non-shell-based GTFOBin techniques (e.g., file exfiltration via scp, curl, etc.)\n-   GTFOBin usage that doesn't result in a new shell (e.g., privilege escalation via  \n     misconfigured capabilities)\n-   Abuse of GTFOBins run under non-root accounts\n\nThe query includes logic to detect both high-signal exploitation patterns and suspicious shell spawns, while excluding common false positives (e.g., package post-install scripts and benign environment checks)."
query: "// This query detects potential GTFOBins abuse on Linux endpoints in Microsoft Defender Advanced Hunting logs.\r\n// It looks for root-owned shells spawned by suspicious parent processes or known GTFOBin command patterns.\r\n// False positives from package managers (APT/DPKG), unattended upgrades, maintainer scripts, and benign env/TTY checks are excluded.\r\n// The result set highlights high-confidence suspicious activity while reducing noise from normal admin operations.\r\n//\r\n// How to tune:\r\n// 1. Add or remove parent process names in SuspiciousParents to match your environment.\r\n// 2. Extend FP_ParentCmdTerms and FP_ShellCmdTerms to exclude additional known benign processes.\r\n// 3. Adjust InteractiveIndicators if certain shell-escape techniques are more/less relevant to you.\r\n// 4. Change TimeWindow or add thresholds in the final step if you want alert grouping or rate-limiting.\r\n\r\n// ===== Configuration =====\r\nlet TimeWindow = 7d;\r\nlet Shells = dynamic([\"sh\", \"bash\", \"zsh\", \"dash\", \"ksh\", \"fish\"]);\r\nlet SuspiciousParents = dynamic([\"find\", \"tar\", \"awk\", \"vim\", \"less\", \"perl\", \"python\", \"nmap\", \"rsync\", \"ftp\", \"tee\", \"cp\", \"mv\"]);\r\n// ===== Linux devices (latest record per device) =====\r\nlet LinuxDevices =\r\n    DeviceInfo\r\n    | summarize arg_max(TimeGenerated, *) by DeviceId\r\n    | where OSPlatform == \"Linux\";\r\n// ===== FP parent command patterns (APT/DPKG & unattended upgrades) =====\r\nlet FP_ParentCmdTerms = dynamic([\r\n    \"apt-get indextargets\",\r\n    \"/usr/bin/apt\", \"/usr/bin/apt-get\",\r\n    \"unattended-upgrade\", \"apt.systemd.daily\",\r\n    \"/usr/bin/dpkg\"\r\n]);\r\n// ===== Benign shell one-liners (env/TTY checks, etc.) =====\r\nlet FP_ShellCmdTerms = dynamic([\r\n    \"sh -c \"\"stty\", \"stty -a\",\r\n    \"sh -c \"\"infocmp\", \"infocmp -C\",\r\n    \"sh -c tput\", \" tput \"\r\n]);\r\n// ===== Indicators of interactive / shell-escape behavior =====\r\nlet InteractiveIndicators = dynamic([\r\n    \" -i\", \"bash -p\",\r\n    \"import pty\", \"/dev/tcp/\",\r\n    \"/bin/sh -i\", \"/bin/bash -i\",\r\n    \"exec /bin/sh\", \"exec /bin/bash\",\r\n    \"socat exec\", \"mkfifo\",\r\n    \"nc -e\", \"busybox sh\",\r\n    \"0>&1\", \"1>&2\", \" ; /bin/sh\", \"&& /bin/sh\"\r\n]);\r\n// ===== Pattern-based GTFO detection (high signal) =====\r\nlet GTFO_Patterns = datatable(Binary:string, Pattern:string, Tag:string)\r\n[\r\n    \"find\", \"-exec\", \"find_exec_shell\",\r\n    \"tar\", \"--checkpoint-action=exec\", \"tar_exec_shell\",\r\n    \"vim\", \":!sh\", \"vim_shell_escape\",\r\n    \"less\", \"!/bin/sh\", \"less_shell_escape\",\r\n    \"awk\", \"system(\", \"awk_system_shell\",\r\n    \"perl\", \"system\", \"perl_system_shell\",\r\n    \"python\", \"import pty\", \"python_pty_shell\"\r\n];\r\nlet PatternMatches =\r\n    DeviceProcessEvents\r\n    | where TimeGenerated > ago(TimeWindow)\r\n    | join kind=inner LinuxDevices on DeviceId\r\n    | where FileName in (Shells)                // child is a shell\r\n    | where AccountName == \"root\"               // running as root\r\n    | join kind=inner GTFO_Patterns on $left.InitiatingProcessFileName == $right.Binary\r\n    | where InitiatingProcessCommandLine has Pattern\r\n    // Drop apt/dpkg perl wrappers\r\n    | where not (InitiatingProcessFileName == \"perl\" and InitiatingProcessCommandLine has_any(FP_ParentCmdTerms))\r\n    // Drop maintainer scripts like /var/lib/dpkg/info/cloud-init.postinst ...\r\n    | where not (\r\n        ProcessCommandLine has \"/var/lib/dpkg/info/\"\r\n        or ProcessCommandLine hasprefix \"/bin/sh /var/lib/dpkg/info/\"\r\n    )\r\n    | extend GTFO_Type = Tag, Detection = \"pattern\";\r\nlet ParentInteractive =\r\n    DeviceProcessEvents\r\n    | where TimeGenerated > ago(TimeWindow)\r\n    | join kind=inner LinuxDevices on DeviceId\r\n    | where FileName in (Shells)\r\n    | where AccountName == \"root\"\r\n    | where InitiatingProcessFileName in (SuspiciousParents)\r\n    // Drop apt/dpkg perl wrappers\r\n    | where not (InitiatingProcessFileName == \"perl\" and InitiatingProcessCommandLine has_any(FP_ParentCmdTerms))\r\n    // Drop maintainer scripts (e.g., cloud-init.postinst configure ...)\r\n    | where not (\r\n        ProcessCommandLine has \"/var/lib/dpkg/info/\"\r\n        or ProcessCommandLine hasprefix \"/bin/sh /var/lib/dpkg/info/\"\r\n    )\r\n    // Suppress benign env checks\r\n    | where not (ProcessCommandLine has_any(FP_ShellCmdTerms))\r\n    // Keep only shells that look interactive/escape-like, or not simple one-liners using -c\r\n    | where (ProcessCommandLine has_any(InteractiveIndicators)) or (ProcessCommandLine !has \" -c \")\r\n    | extend GTFO_Type = \"parent_interactive\", Detection = \"parent\";\r\n// ===== Merge & dedupe =====\r\nunion PatternMatches, ParentInteractive\r\n| summarize arg_max(TimeGenerated, *) by DeviceId, ProcessUniqueId\r\n| project\r\n    TimeGenerated,\r\n    DeviceName,\r\n    AccountName,\r\n    Shell = FileName,\r\n    ShellCmd = ProcessCommandLine,\r\n    Parent = InitiatingProcessFileName,\r\n    ParentCmd = InitiatingProcessCommandLine,\r\n    GTFO_Type,\r\n    Detection\r\n| order by TimeGenerated desc\r\n\r\n"
query_type: kql
severity: medium
