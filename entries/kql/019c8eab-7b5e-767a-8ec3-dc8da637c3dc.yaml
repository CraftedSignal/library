id: 019c8eab-7b5e-767a-8ec3-dc8da637c3dc
name: Brute Force Login via Windows Security Event 4625
description: This rule detects potential brute force login attempts against Windows systems by monitoring Windows Security Event ID 4625 (failed logon attempts). It aggregates failed attempts by IP address and computer within a 15-minute window and triggers an alert if the number of failed attempts exceeds a defined threshold (default 10). This indicates an adversary systematically guessing passwords to gain unauthorized access.
query: "// Detection: Brute Force Login via Windows Security Events\r\n// Author: Rudra Verma - CyberHawk Threat Intel\r\n// MITRE ATT&CK: T1110.001 - Brute Force: Password Guessing\r\n\r\nlet threshold = 10;\r\nlet timeWindow = 15m;\r\nSecurityEvent\r\n| where TimeGenerated > ago(1h)\r\n| where EventID == 4625\r\n| where AccountType == \"User\"\r\n| summarize\r\n    FailedAttempts   = count(),\r\n    DistinctAccounts = dcount(TargetUserName),\r\n    Accounts         = make_set(TargetUserName, 10),\r\n    FirstAttempt     = min(TimeGenerated),\r\n    LastAttempt      = max(TimeGenerated)\r\n    by IpAddress, Computer, bin(TimeGenerated, timeWindow)\r\n| where FailedAttempts >= threshold\r\n| extend AlertDescription = \"Multiple failed login attempts — potential brute force attack\"\r\n| project-reorder TimeGenerated, IpAddress, Computer,\r\n                  FailedAttempts, DistinctAccounts, Accounts,\r\n                  FirstAttempt, LastAttempt, AlertDescription"
query_type: kql
severity: medium
tactics:
    - TA0006
techniques:
    - T1110
    - T1110.001
tags:
    - kql
author: Rudra Verma - CyberHawk
version: "4"
