id: b6cb0547-26c3-4dd3-a905-07e92a8c8a5a
name: Detection of Commands Executed via Run Dialog
description: This KQL rule detects commands executed via the Run dialog by monitoring changes to the "Runmru" registry key. This key stores a history of commands entered into the Run dialog. Attackers or malicious scripts often use this method to launch tools like PowerShell, cmd, or malicious payloads, particularly in social engineering attacks where users are tricked into running commands.
query: "## \U0001F50D KQL Description\n#### The objective of this KQL script is to detect commands executed via the Run dialog, which is often used by attackers or malicious scripts to launch tools like PowerShell, cmd, or malicious payloads—especially in ClickFix-style attacks, where users are tricked into running commands.\n## \U0001F9E9 MITRE ATT&CK Mapping\n#### Tactic: Execution\n#### Goal: Run unauthorized or malicious code on the system.\n#### Technique: T1059 – Command and Scripting Interpreter\n#### Sub-techniques - T1059.001 – PowerShell, T1059.003 – Windows Command Shell\n### Query:\n```KQL\nDeviceRegistryEvents\n| where RegistryKey contains \"Runmru\"\n| where notempty(RegistryValueData)\n| project TimeGenerated, DeviceName, RegistryKey, RegistryValueData, ActionType\n```\n"
query_type: kql
tactics:
    - TA0002
techniques:
    - T1059
    - T1059.001
    - T1059.003
tags:
