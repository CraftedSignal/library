id: bda35a0d-4075-49a7-bb36-169a968ae6ab
name: CAR-2013-02-003 - Process Spawning cmd.exe
description: Detects processes spawning cmd.exe excluding cmd instances spawned from services.exe or svchost.exe to focus on the most possible suspicious behavior.
query: "// Author: MN\r\n// Rule Name: Processes Spawning cmd.exe\r\n// CAR Analytics: CAR-2013-02-003\r\n// MITRE ATT&CK: TA0002: Execution, T1059\r\n// Description: Detects processes spawning cmd.exe.\r\n// Severity: High\r\n//\r\nDeviceProcessEvents\r\n| where FileName == \"cmd.exe\"\r\n| where AccountName != \"system\"\r\n| where InitiatingProcessParentFileName !in (@\"services.exe\", \"svchost.exe\") \r\n| where InitiatingProcessFileName !in (@\"services.exe\", \"svchost.exe\") \r\n| sort by Timestamp desc\r\n| project Timestamp, DeviceId, ReportId, DeviceName, ActionType, FileName, FolderPath, AccountName, AccountDomain, ProcessCommandLine, InitiatingProcessFileName, InitiatingProcessFolderPath, InitiatingProcessCommandLine, InitiatingProcessParentFileName"
query_type: kql
severity: medium
tactics:
    - TA0002
techniques:
    - T1059
tags:
    - CAR-2013-02-003
    - kql
author: Mena Nabil
version: "1"
references:
    - https://car.mitre.org/analytics/CAR-2013-02-003/
