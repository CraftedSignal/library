id: 019cd38b-2675-7789-8f82-6d0ae3db458a
name: PowerShell Alias Creation for High-Risk Cmdlets
description: This rule detects the creation of PowerShell aliases for high-risk cmdlets or .NET web client patterns. Adversaries may use 'Set-Alias' to create short, obfuscated aliases for common cmdlets like Invoke-WebRequest, Invoke-Expression, or cmdlets related to Defender tampering, making their command-line activity harder to detect and analyze. This detection focuses on the 'ProcessCreated' event for PowerShell processes where 'Set-Alias' is used to map to a predefined list of suspicious cmdlets or patterns.
query: "let HighRiskCmdlets = dynamic([      // Cmdlets & aliases\r\n  \"Invoke-WebRequest\",     // Native PowerShell downloader — fetches payloads, scripts & beacons\r\n  \"iwr\",                   // Alias for Invoke-WebRequest used heavily in obfuscated malware\r\n  \"Invoke-RestMethod\",     // API-capable downloader often used to fetch JSON-configured payloads\r\n  \"irm\",                   // Alias for Invoke-RestMethod, common in commodity loaders\r\n  \"Invoke-Expression\",     // Executes arbitrary strings as PowerShell — core to malware execution\r\n  \"iex\",                   // Short alias widely used in one-liners & infection scripts\r\n  \"Start-Process\",         // Launch external binaries (LOLBAS, payloads, ransomware)\r\n  \"saps\",                  // Alias for Start-Process\r\n  \"start\",                 // Also maps to Start-Process depending on PowerShell version\r\n  \"Invoke-Command\",        // Remote code execution (RCE) over WinRM — used for lateral movement\r\n  \"Import-Module\",         // Load malicious modules / reflectively load offensive tools\r\n  \"Set-ExecutionPolicy\",   // Reduce script execution restrictions for payloads\r\n  \"Add-Type\",              // Load custom C#/.NET code — common in offensive tooling\r\n  \"Start-BitsTransfer\",    // LOLBAS downloader — stealthy file transfer mechanism\r\n  \"Set-ItemProperty\",      // Modify registry keys (persistence, tamper Defender/Firewall configs)\r\n  \"New-Item\",              // Create registry keys or file-system structures used for persistence\r\n  \"Add-MpPreference\",      // Add exclusions & weaken Defender scanning\r\n  \"Set-MpPreference\",      // Disable features, add exclusions, weaken protections (MAJOR RISK)\r\n  \"System.Net.WebClient\",  // .NET downloader class used for payload fetch\r\n  \"DownloadString\",        // WebClient string fetch → often script payload delivery\r\n  \"DownloadFile\"           // WebClient file fetch → download EXEs, DLLs, ransomware stagers\r\n]);\r\nDeviceProcessEvents\r\n| where ActionType == \"ProcessCreated\"\r\n| where FileName in~ (\"powershell.exe\",\"pwsh.exe\")\r\n| where ProcessCommandLine has \"Set-Alias\"\r\n| extend\r\n    AliasName = coalesce(\r\n        trim(@\"['\"\"]\", extract(@\"Set-Alias\\s+-Name\\s+('[^']+'|\"\"[^\"\"]+\"\"|\\S+)\", 1, ProcessCommandLine)), //account for the use of the -name switch\r\n        trim(@\"['\"\"]\", extract(@\"Set-Alias\\s+([^-][^\\s]*)\", 1, ProcessCommandLine)) //account for omitting the -name switch\r\n    ),\r\n    AliasTarget = coalesce(\r\n        trim(@\"['\"\"]\", extract(@\"Set-Alias\\s+(?:-Name\\s+('[^']+'|\"\"[^\"\"]+\"\"|\\S+)\\s+)?-Value\\s+('[^']+'|\"\"[^\"\"]+\"\"|\\S+)\", 2, ProcessCommandLine)), //account for the use of the -value switch\r\n        trim(@\"['\"\"]\", extract(@\"Set-Alias\\s+[^\\s]+\\s+([^\\s]+)\", 1, ProcessCommandLine)) //account for omitting the -value switch\r\n    )\r\n| where isnotempty(AliasName) and isnotempty(AliasTarget)\r\n| where AliasTarget in~ (HighRiskCmdlets)\r\n| project\r\n    Timestamp,\r\n    DeviceName,\r\n    AccountDomain,\r\n    AccountName,\r\n    ProcessId,\r\n    FileName,\r\n    ProcessCommandLine,\r\n    AliasName,\r\n    AliasTarget,\r\n    LogonId,\r\n    InitiatingProcessCommandLine"
query_type: kql
severity: medium
tactics:
    - TA0002
techniques:
