id: 019c53de-4024-74b8-a7cc-b7939f331e1b
name: Notepad.exe Executing Markdown from WindowsApps (Excluding Specific Version) - CrowdStrike Version
description: |-
    ---credit to @KQLWizard---
    This rule is a CrowdStrike translation from KQL based on @KQLWizard's detection rule: https://detections.ai/rules/019c5143-2be7-765f-9d0b-4d41499ff6d6
query: "#event_simpleName=ProcessRollup2\r\n| ParentBaseFileName=/notepad.exe/i\r\n| FilePath=/\\\\Program Files\\\\WindowsApps\\\\Microsoft.WindowsNotepad/i AND FilePath!=\"*11.2510*\"\r\n| parentCommandLine=\"*.md\"\r\n| table([@timestamp, ComputerName, ImageFileName], limit=1000)"
query_type: kql
severity: medium
tags:
    - kql
author: Lighkun Yagami
version: "5"
