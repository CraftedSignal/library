id: ab153a5c-1570-41f4-8e44-db446ce620d8
name: Monitoring Copilot Data Exfiltration via Graph API
description: DefenderXDR Custom Detection
query: "let CopilotGraphExfilCmds = dynamic([\"interactionHistory\",\"getAllEnterpriseInteractions\"]);\r\nGraphApiAuditEvents\r\n| where Timestamp > ago(1h)\r\n| extend ParseData = parse_url(RequestUri)\r\n| where ParseData has_any (CopilotGraphExfilCmds)"
query_type: kql
severity: medium
tactics:
    - TA0010
tags:
    - kql
author: Steven Lim
version: "1"
references:
    - https://learn.microsoft.com/en-us/defender-xdr/advanced-hunting-graphapiauditevents-table
