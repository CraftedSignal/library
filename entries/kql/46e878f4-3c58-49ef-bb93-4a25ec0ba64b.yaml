id: 46e878f4-3c58-49ef-bb93-4a25ec0ba64b
name: Interlock Ransomware Detection
description: 'KQL Query from file: Interlock Ransomware Detection'
query: "let InterlockIOC=externaldata(CISAfilename:string, CISAsha:string)\r\n[h'https://raw.githubusercontent.com/SlimKQL/Hunting-Queries-Detection-Rules/refs/heads/main/IOC/interlock_table3_hashes.csv']\r\nwith (format='csv', ignoreFirstRecord=true)\r\n| distinct CISAsha;\r\nDeviceFileEvents\r\n| where Timestamp > ago(30d)\r\n| where SHA256 has_any(InterlockIOC)\r\n| where ActionType <> \"FileDeleted\""
query_type: kql
severity: medium
tags:
    - kql
author: Steven Lim
version: "1"
references:
    - https://www.cisa.gov/news-events/cybersecurity-advisories/aa25-203a
