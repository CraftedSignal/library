id: a12d8d82-7860-472b-995d-ea424a8168ee
name: Detect Personal OneDrive Sync on corporate endpoints
description: KQL Query
query: "// https://www.microsoft.com/en-us/microsoft-365/roadmap?id=490064\n\nDeviceRegistryEvents \n| where TimeGenerated > ago(1h)\n| where ActionType == \"RegistryKeyCreated\" or ActionType == \"RegistryValueSet\"\n| where RegistryKey has \"HKEY_CURRENT_USER\\\\SOFTWARE\\\\Microsoft\\\\OneDrive\\\\Personal\"\n"
query_type: kql
tactics:
    - TA0010
    - TA0005
    - TA0003
techniques:
    - T1567.002
    - T1112
tags:
    - kql
version: "1"
