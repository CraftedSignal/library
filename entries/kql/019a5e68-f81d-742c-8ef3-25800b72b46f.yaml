id: 019a5e68-f81d-742c-8ef3-25800b72b46f
name: LANDFALL Android Spyware C2 Communication
description: Detects network connections to known Command and Control (C2) servers associated with the LANDFALL Android spyware. The spyware communicates over HTTPS, often on non-standard ports.
query: "DeviceNetworkEvents\r\n| where RemoteIP has_any (\"45.155.250.158\",\"46.246.28.75\",\"91.132.92.35\",\"92.243.65.240\",\"192.36.57.56\",\"194.76.224.127\") or RemoteUrl has_any (\"brightvideodesigns.com\",\"healthyeatingontherun.com\",\"hotelsitereview.com\",\"projectmanagerskills.com\")"
query_type: kql
severity: medium
techniques:
    - T1071.001
tags:
