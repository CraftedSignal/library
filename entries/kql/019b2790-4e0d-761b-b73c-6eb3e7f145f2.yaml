id: 019b2790-4e0d-761b-b73c-6eb3e7f145f2
name: Group Policy Discovery via Command Line and Network Activity
description: This rule detects attempts to discover Group Policy settings on a system. It identifies the execution of common command-line interpreters (cmd.exe, powershell.exe, wmic.exe, rundll32.exe) followed by specific commands or PowerShell cmdlets used for GPO enumeration. This includes native Windows commands like 'gpresult' and 'secedit', registry queries for policy settings, PowerShell cmdlets such as 'Get-GPO' and 'Get-GPResultantSetOfPolicy', and LDAP-related queries for 'groupPolicyContainer'. Additionally, it correlates these process events with network connections to SYSVOL shares or LDAP ports (389, 636) that also contain 'groupPolicyContainer' in the URL, indicating potential GPO access. The rule filters out common system processes to reduce noise.
query: "// MITRE T1615 - Group Policy Discovery\r\nlet Lookback = 1d;\r\nDeviceProcessEvents\r\n| where Timestamp >= ago(Lookback)\r\n// Common shells - LOLBins used during discovery\r\n| where FileName in~ (\r\n    \"cmd.exe\",\"powershell.exe\",\"pwsh.exe\",\r\n    \"wmic.exe\",\"rundll32.exe\"\r\n)\r\n// High-confidence Group Policy discovery commands\r\n| where (\r\n    // Native GPO & RSOP enumeration\r\n    ProcessCommandLine has_any (\r\n        \"gpresult\",\r\n        \"gpresult /r\",\r\n        \"gpresult /z\",\r\n        \"rsop.msc\",\r\n        \"secedit /export\",\r\n        \"secedit /analyze\"\r\n    )\r\n    // Registry-based policy discovery\r\n    or ProcessCommandLine has_any (\r\n        @\"reg query HKLM\\Software\\Policies\",\r\n        @\"reg query HKCU\\Software\\Policies\"\r\n    )\r\n    // PowerShell GPO discovery\r\n    or ProcessCommandLine has_any (\r\n        \"Get-GPO\",\r\n        \"Get-GPInheritance\",\r\n        \"Get-GPResultantSetOfPolicy\",\r\n        \"Get-DomainGPO\",\r\n        \"Get-DomainGPOLocalGroup\"\r\n    )\r\n    or ProcessCommandLine has_any (\r\n        \"ldapsearch\",  // For potential LDAP tools\r\n        \"groupPolicyContainer\"  // LDAP filter patterns\r\n    )\r\n)\r\n// Reduce OS / admin noise\r\n| where InitiatingProcessFileName !in~ (\r\n    \"gpscript.exe\",\r\n    \"svchost.exe\",\r\n    \"mmc.exe\",\r\n    \"Microsoft.Management.Infrastructure.Native.exe\"\r\n)\r\n// Enrich with SYSVOL access\r\n| join kind=leftouter (\r\n    DeviceNetworkEvents\r\n    | where Timestamp >= ago(Lookback)\r\n    | where RemotePort in (445, 389, 636)\r\n    | where RemoteUrl has_any (@\"\\SYSVOL\\\", \"groupPolicyContainer\")  // Added LDAP object targeting\r\n    | project DeviceId, RemoteIP, RemoteUrl, RemotePort\r\n) on DeviceId\r\n| extend RarityScore = rand()  // Placeholder; replace with actual rarity logic if using entity analytics\r\n| project Timestamp, DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine, RemoteIP, RemoteUrl, RemotePort, RarityScore\r\n| summarize Count=count() by DeviceName, FileName, InitiatingProcessFileName, AccountName, ProcessCommandLine"
