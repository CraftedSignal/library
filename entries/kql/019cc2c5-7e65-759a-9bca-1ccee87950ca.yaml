id: 019cc2c5-7e65-759a-9bca-1ccee87950ca
name: UWP/Store App AAD Broker Loopback Exempt
description: This rule detects the execution of 'CheckNetIsolation.exe' with the command-line arguments 'LoopbackExempt' and 'aad'. This specific command is used to exempt Universal Windows Platform (UWP) or Store apps from network loopback restrictions, often in the context of Azure Active Directory (AAD) authentication. While this can be a legitimate operation for development or specific application configurations, it can also be abused by malicious applications to bypass network isolation.
query: "// UWP/store app AAD Broker Loopback Exempt\r\nDeviceProcessEvents\r\n| where TimeGenerated > ago(30d)\r\n|where FileName contains \"CheckNetIsolation.exe\" and ProcessCommandLine has_all (\" LoopbackExempt\", \"aad\")"
query_type: kql
severity: medium
tags:
    - kql
version: "1"
