id: 019bb2eb-c974-75d4-a692-9377d1874c11
name: Medusa Ransomware C2 Communication
description: This query detects network communication to known Command and Control (C2) IP addresses used by the Medusa ransomware group, often via malicious SimpleHelp RMM servers.
query: "// Name: Medusa Ransomware C2 Communication\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-01-09\r\n// Description: This query detects network communication to known Command and Control (C2) IP addresses used by the Medusa ransomware group, often via malicious SimpleHelp RMM servers.\r\n// Tags: T1071, T1219\r\n// References: https://www.darktrace.com/blog/under-medusas-gaze-how-darktrace-uncovers-rmm-abuse-in-ransomware-campaigns\r\n// False Positives: Medium. IP addresses can be reassigned to benign services over time. If false positives occur, consider adding filters for specific ports (e.g., 7070, 15330 as mentioned in the source article) or processes associated with RMM tools.\r\nlet medusa_c2_ips = dynamic([\r\n    \"185.108.129.62\",\r\n    \"185.126.238.119\",\r\n    \"213.183.63.41\",\r\n    \"213.183.63.42\",\r\n    \"31.220.45.120\",\r\n    \"91.92.246.110\",\r\n    \"45.9.149.112\",\r\n    \"89.36.161.12\",\r\n    \"193.37.69.154\"\r\n]);\r\n// Search for network events where the remote IP is a known Medusa C2 address.\r\nDeviceNetworkEvents\r\n| where RemoteIP in (medusa_c2_ips)\r\n| extend timestamp = TimeGenerated, IPCustomEntity = RemoteIP, DeviceCustomEntity = DeviceName\r\n"
query_type: kql
severity: medium
tactics:
    - TA0011
techniques:
    - T1071
    - T1219
tags:
    - kql
author: Ethan Andrews + detections.ai
version: "4"
references:
    - https://www.darktrace.com/blog/under-medusas-gaze-how-darktrace-uncovers-rmm-abuse-in-ransomware-campaigns
