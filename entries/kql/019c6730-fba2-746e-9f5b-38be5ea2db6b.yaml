id: 019c6730-fba2-746e-9f5b-38be5ea2db6b
name: Service Hardening via sc.exe sdset
description: Detects the creation of a Windows service followed by the use of "sc.exe sdset" to apply a highly restrictive security descriptor. This specific TTP is used by the REF4033 group (UAT-8099) to harden their malicious 'WalletServiceInfo' service, making it difficult for administrators to stop or delete.
query: "// Name: REF4033 Service Hardening via sc.exe sdset\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-02-16\r\n// Description: Detects the creation of a Windows service followed by the use of \"sc.exe sdset\" to apply a highly restrictive security descriptor. This specific TTP is used by the REF4033 group (UAT-8099) to harden their malicious 'WalletServiceInfo' service, making it difficult for administrators to stop or delete.\r\n// False Positives: This activity is highly unusual for legitimate administration. False positives are unlikely but could occur if custom hardening scripts use this specific SDDL string.\r\n// References: https://www.elastic.co/security-labs/badiis-to-the-bone-new-insights-to-global-seo-poisoning-campaign\r\n// MITRE ATT&CK: T1543.003, T1564.010\r\nlet timeframe = 5m;\r\n// This is the specific, restrictive SDDL string used by the actor to prevent service modification.\r\nlet sddl_string = \"D:(D;;DCLCWPDTSD;;;IU)(D;;DCLCWPDTSD;;;SU)(D;;DCLCWPDTSD;;;BA)\";\r\n// Find service creation events via sc.exe.\r\nlet ServiceCreations = DeviceProcessEvents\r\n    | where Timestamp > ago(timeframe * 2)\r\n    | where FileName =~ \"sc.exe\" and ProcessCommandLine has \"create\"\r\n    // Parse the service name from the command line, handling both quoted and unquoted names.\r\n    | extend\r\n        QuotedServiceName = extract(\"create\\\\s+\\\"([^\\\"]+)\\\"\", 1, ProcessCommandLine),\r\n        UnquotedServiceName = extract(\"create\\\\s+([^\\\\s\\\"]+)\", 1, ProcessCommandLine)\r\n    | extend ServiceName = coalesce(QuotedServiceName, UnquotedServiceName)\r\n    | where isnotempty(ServiceName)\r\n    | project\r\n        CreationTime = Timestamp,\r\n        DeviceId,\r\n        DeviceName,\r\n        ServiceName,\r\n        CreationCommandLine = ProcessCommandLine,\r\n        InitiatingProcessCommandLine;\r\n// Find service hardening events using the specific malicious SDDL string.\r\nlet ServiceHardening = DeviceProcessEvents\r\n    | where Timestamp > ago(timeframe)\r\n    | where FileName =~ \"sc.exe\"\r\n    | where ProcessCommandLine has \"sdset\" and ProcessCommandLine has sddl_string\r\n    // Parse the service name from the command line.\r\n    | extend\r\n        QuotedServiceName = extract(\"sdset\\\\s+\\\"([^\\\"]+)\\\"\", 1, ProcessCommandLine),\r\n        UnquotedServiceName = extract(\"sdset\\\\s+([^\\\\s\\\"]+)\", 1, ProcessCommandLine)\r\n    | extend ServiceName = coalesce(QuotedServiceName, UnquotedServiceName)\r\n    | where isnotempty(ServiceName)\r\n    | project\r\n        HardeningTime = Timestamp,\r\n        AccountName,\r\n        DeviceId,\r\n        DeviceName,\r\n        ServiceName,\r\n        HardeningCommandLine = ProcessCommandLine,\r\n        HardeningInitiatingProcessCommandLine = InitiatingProcessCommandLine;\r\n// Join the creation and hardening events that occur on the same device for the same service within the specified timeframe.\r\nServiceHardening\r\n| join kind=inner (\r\n    ServiceCreations\r\n    )\r\n    on DeviceId, ServiceName\r\n| where HardeningTime > CreationTime and (HardeningTime - CreationTime) < timeframe\r\n| project\r\n    Timestamp = HardeningTime,\r\n    AccountName,\r\n    DeviceId,\r\n    DeviceName,\r\n    ServiceName,\r\n    CreationTime,\r\n    HardeningTime,\r\n    CreationCommandLine,\r\n    HardeningCommandLine,\r\n    InitiatingProcessCommandLine = HardeningInitiatingProcessCommandLine"
