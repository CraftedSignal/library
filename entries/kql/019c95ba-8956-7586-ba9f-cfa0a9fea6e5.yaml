id: 019c95ba-8956-7586-ba9f-cfa0a9fea6e5
name: Suspicious Shell from /var/tmp/ Executable
description: Detects a process with a short, alphanumeric filename executing from the /var/tmp/ directory and spawning a shell. This behavior is associated with the GRIDTIDE backdoor, which uses this technique for post-compromise reconnaissance and execution.
query: "// Name: Suspicious Shell from /var/tmp/ Executable\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-02-25\r\n// Description: Detects a process with a short, alphanumeric filename executing from the /var/tmp/ directory and spawning a shell. This behavior is associated with the GRIDTIDE backdoor, which uses this technique for post-compromise reconnaissance and execution.\r\n// Tactics: Execution\r\n// Techniques: T1059.004, T1033\r\n// References: https://cloud.google.com/blog/topics/threat-intelligence/disrupting-gridtide-global-espionage-campaign/\r\n// False Positive Sensitivity: Medium\r\nDeviceProcessEvents\r\n// Look for common shell processes being created on Linux systems.\r\n| where FileName in (\"sh\", \"bash\")\r\n// Filter for parent processes located specifically in the /var/tmp/ directory, a common staging area.\r\n| where InitiatingProcessFolderPath == \"/var/tmp/\"\r\n// The parent process filename should be short (1-10 chars) and alphanumeric, matching GRIDTIDE's pattern (e.g., 'xapt').\r\n| where InitiatingProcessFileName matches regex @\"^[a-zA-Z0-9]{1,10}$\"\r\n// False Positives: Legitimate scripts or temporary installers might exhibit this behavior.\r\n// Tuning: If legitimate processes are flagged, they can be added to an exclusion list based on InitiatingProcessFileName or InitiatingProcessCommandLine.\r\n| project-reorder\r\n    TimeGenerated,\r\n    DeviceName,\r\n    FileName,\r\n    ProcessCommandLine,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessCommandLine,\r\n    InitiatingProcessFolderPath,\r\n    AccountName\r\n"
