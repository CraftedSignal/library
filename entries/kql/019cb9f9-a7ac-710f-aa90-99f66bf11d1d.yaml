id: 019cb9f9-a7ac-710f-aa90-99f66bf11d1d
name: Inbound Email with Microsoft OAuth 'prompt=none' for Consent Phishing
description: This rule detects inbound emails containing a URL that initiates an OAuth 2.0 authorization flow for Microsoft Online, specifically looking for the 'prompt=none' parameter. This combination can be indicative of consent phishing attempts where an attacker tries to trick users into granting permissions to a malicious application without explicit interaction, often by pre-approving the prompt. The rule filters for inbound emails that were not blocked, suggesting they reached the user's inbox.
query: "let Lookback = 1h;\r\nEmailUrlInfo\r\n| where Timestamp > ago(Lookback)\r\n| where Url startswith \"https://login.microsoftonline.com/common/oauth2/v2.0/authorize\" and Url has \"prompt=none\"\r\n| join EmailEvents on NetworkMessageId\r\n| where EmailDirection == \"Inbound\"\r\n| where DeliveryAction <> \"Blocked\""
query_type: kql
severity: medium
tactics:
    - TA0001
techniques:
    - T1566
    - T1566.002
tags:
    - kql
author: Steven Lim
version: "4"
