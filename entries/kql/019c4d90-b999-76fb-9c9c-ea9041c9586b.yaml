id: 019c4d90-b999-76fb-9c9c-ea9041c9586b
name: Managed Identity Token Obtained via IMDS
description: This rule detects sign-ins by Azure Managed Identities where the token was likely obtained via the Instance Metadata Service (IMDS). It identifies these sign-ins by looking for 'ImdsIdentityProvider' in the UserAgent or 'Imds' in the ClientCredentialType within AADManagedIdentitySignInLogs. This activity could indicate lateral movement through abuse of managed identities attached to virtual machines.
query: |
    // Author: Daniel Jeremiah | Date: 2026/02/11
    // Ref: https://www.abstract.security/blog/moving-laterally-through-abuse-of-managed-identities-attached-to-vms

    /*
    Managed Identity token obtained via IMDS (curl to 169.254.169.254). Sign-in shows ClientCredentialType or UserAgent ImdsIdentityProvider.
    */
    AADManagedIdentitySignInLogs
    | where TimeGenerated > ago(24h)
    | where UserAgent contains "ImdsIdentityProvider" or ClientCredentialType contains "Imds"
    | project TimeGenerated, ServicePrincipalId, ResourceDisplayName, ResourceIdentity, UserAgent, ClientCredentialType, IPAddress
query_type: kql
severity: medium
tactics:
    - TA0008
    - TA0005
techniques:
    - T1550.001
tags:
    - kql
version: "2"
references:
    - https://www.abstract.security/blog/moving-laterally-through-abuse-of-managed-identities-attached-to-vms
