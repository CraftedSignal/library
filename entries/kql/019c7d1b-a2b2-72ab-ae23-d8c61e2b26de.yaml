name: Ultimate Lotus Blossom and Chrysalis IOC Hunt
description: This is a broad hunting query to find Indicators of Compromise (IOCs) associated with the Notepad++ supply-chain attack attributed to the Lotus Blossom actor and the Chrysalis backdoor. It searches for known file hashes, file paths, network indicators (IPs, domains, URLs), and user-agents across multiple event types.
query: "// Name: Lotus Blossom and Chrysalis IOC Hunt\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-02-20\r\n// Description: This is a broad hunting query to find Indicators of Compromise (IOCs) associated with the Notepad++ supply-chain attack attributed to the Lotus Blossom actor and the Chrysalis backdoor. It searches for known file hashes, file paths, network indicators (IPs, domains, URLs), and user-agents across multiple event types.\r\n// Tactic: Multiple\r\n// Technique: Multiple\r\n// False Positive Sensitivity: Medium\r\n// Reference: https://blog.hackandfix.com/the-notepad-supply-chain-attack-2025-2026-technical-breakdown-iocs/\r\n// IOCs are grouped by type for readability and maintenance.\r\nlet fileHashes = dynamic([\r\n    // SHA256\r\n    \"a511be5164dc1122fb5a7daa3eef9467e43d8458425b15a640235796006590c9\", \"02368c6b62cb392dddd35cfc6cb8c1154f7ebdceb9fb559cefc301982d6fbbf9\", \"0dcd846cdfdc793fab39a3c9860e0f6ab68cdbdcf4b03a87e8a02df0d3e1249f\", \"5dd766a7a378c97eb8c9fe9a4bff678e3c9a05386911f4296e094407b99c23d2\", \"6a7a8aa91109c25d57fe2ca71c150ca09afc1bf10c98376adf959dbc91010394\", \"8ea8b83645fba6e23d48075a0d3fc73ad2ba515b4536710cda4f1f232718f53e\", \"2da00de67720f5f13b17e9d985fe70f10f153da60c9ab1086fe58f069a156924\", \"77bfea78def679aa1117f569a35e8fd1542df21f7e00e27f192c907e61d63a2e\", \"3bdc4c0637591533f1d4198a72a33426c01f69bd2e15ceee547866f65e26b7ad\", \"9276594e73cda1c69b7d265b3f08dc8fa84bf2d6599086b9acc0bb3745146600\", \"f4d829739f2d6ba7e3ede83dad428a0ced1a703ec582fc73a4eee3df3704629a\", \"4a52570eeaf9d27722377865df312e295a7a23c3b6eb991944c2ecd707cc9906\", \"831e1ea13a1bd405f5bda2b9d8f2265f7b1db6c668dd2165ccc8a9c4c15ea7dd\", \"0a9b8df968df41920b6ff07785cbfebe8bda29e6b512c94a3b2a83d10014d2fd\", \"4c2ea8193f4a5db63b897a2d3ce127cc5d89687f380b97a1d91e0c8db542e4f8\", \"e7cd605568c38bd6e0aba31045e1633205d0598c607a855e2e1bca4cca1c6eda\", \"078a9e5c6c787e5532a7e728720cbafee9021bfec4a30e3c2be110748d7c43c5\", \"b4169a831292e245ebdffedd5820584d73b129411546e7d3eccf4663d5fc5be3\", \"7add554a98d3a99b319f2127688356c1283ed073a084805f14e33b4f6a6126fd\", \"fcc2765305bcd213b7558025b2039df2265c3e0b6401e4833123c461df2de51a\",\r\n    // SHA1\r\n    \"8e6e505438c21f3d281e1cc257abdbf7223b7f5a\", \"90e677d7ff5844407b9c073e3b7e896e078e11cd\", \"573549869e84544e3ef253bdba79851dcde4963a\", \"13179c8f19fbf3d8473c49983a199e6cb4f318f0\", \"4c9aac447bf732acc97992290aa7a187b967ee2c\", \"821c0cafb2aab0f063ef7e313f64313fc81d46cd\", \"06a6a5a39193075734a32e0235bde0e979c27228\", \"9c3ba38890ed984a25abb6a094b5dbf052f22fa7\", \"ca4b6fe0c69472cd3d63b212eb805b7f65710d33\", \"0d0f315fd8cf408a483f8e2dd1e69422629ed9fd\", \"2a476cfb85fbf012fdbe63a37642c11afa5cf020\"\r\n]);\r\nlet filePaths = dynamic([\r\n    \"ProShow\\\\load\",\r\n    \"Adobe\\\\Scripts\\\\alien.ini\",\r\n    \"Bluetooth\\\\BluetoothService\"\r\n]);\r\nlet c2IPs = dynamic([\r\n    \"95.179.213.0\", \"61.4.102.97\", \"59.110.7.32\", \"124.222.137.114\", \"212.30.60.8\", \"94.190.195.237\", \"146.70.113.105\", \"194.114.136.211\", \"8.216.128.215\", \"116.251.216.119\", \"217.69.5.44\", \"188.166.199.140\", \"172.233.246.7\", \"45.76.155.202\", \"45.32.144.255\", \"45.77.31.210\", \"2001:19f0:6801:950:5400:5ff:feb2\"\r\n]);\r\nlet c2Domains = dynamic([\r\n    \"api.skycloudcenter.com\", \"api.wiresguard.com\", \"cdncheck.it.com\", \"self-dns.it.com\", \"safe-dns.it.com\"\r\n]);\r\nlet c2URLs = dynamic([\r\n    \"http://45.76.155.202/update/update.exe\", \"http://45.32.144.255/update/update.exe\", \"http://95.179.213.0/update/update.exe\", \"http://95.179.213.0/update/install.exe\", \"http://95.179.213.0/update/AutoUpdater.exe\", \"http://45.76.155.202/list\", \"https://self-dns.it.com/list\", \"https://45.77.31.210/users/admin\", \"https://cdncheck.it.com/users/admin\", \"https://safe-dns.it.com/help/Get-Start\", \"https://45.77.31.210/api/update/v1\", \"https://45.77.31.210/api/FileUpload/submit\", \"https://cdncheck.it.com/api/update/v1\", \"https://cdncheck.it.com/api/Metadata/submit\", \"https://cdncheck.it.com/api/getInfo/v1\", \"https://cdncheck.it.com/api/FileUpload/submit\", \"https://safe-dns.it.com/resolve\", \"https://safe-dns.it.com/dns-query\", \"https://api.skycloudcenter.com/a/chat/s/70521ddf-a2ef-4adf-9cf0-6d8e24aaa821\", \"https://api.wiresguard.com/update/v1\", \"https://api.wiresguard.com/api/FileUpload/submit\", \"http://59.110.7.32:8880/uffhxpSy\", \"http://59.110.7.32:8880/api/getBasicInfo/v1\", \"http://59.110.7.32:8880/api/Metadata/submit\", \"http://124.222.137.114:9999/3yZR31VK\", \"http://124.222.137.114:9999/api/updateStatus/v1\", \"http://124.222.137.114:9999/api/Info/submit\", \"https://api.wiresguard.com/users/system\", \"https://api.wiresguard.com/api/getInfo/v1\"\r\n]);\r\nlet maliciousUserAgents = dynamic([\r\n    \"Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:143.0) Gecko/20100101 Firefox/143.3h\",\r\n    \"Mozilla/5.0 (Linux; Android 6.0; Nexus 5 Build/MRA58N) AppleWebKit/53736 (KHTML, like Gecko) Chrome/109.1.2.3\"\r\n]);\r\n(union with_source=TableName isfuzzy=true\r\n    (\r\n        // Search for malicious file hashes in file creation and process execution events.\r\n        DeviceFileEvents\r\n        | where ActionType in (\"FileCreated\", \"FileRenamed\") and (SHA1 in (fileHashes) or SHA256 in (fileHashes))\r\n        | project Timestamp, DeviceName, ReportId, IndicatorType=\"FileHash\", Indicator=coalesce(SHA256, SHA1), Context=pack(\"Action\", ActionType, \"FileName\", FileName, \"Process\", InitiatingProcessFileName)\r\n    ),\r\n    (\r\n        DeviceProcessEvents\r\n        | where SHA1 in (fileHashes) or SHA256 in (fileHashes)\r\n        | project Timestamp, DeviceName, ReportId, IndicatorType=\"FileHash\", Indicator=coalesce(SHA256, SHA1), Context=pack(\"FileName\", FileName, \"CommandLine\", ProcessCommandLine)\r\n    ),\r\n    (\r\n        // Search for malicious file paths.\r\n        DeviceFileEvents\r\n        | where FolderPath has_any (filePaths)\r\n        | project Timestamp, DeviceName, ReportId, IndicatorType=\"FilePath\", Indicator=FolderPath, Context=pack(\"FileName\", FileName, \"Process\", InitiatingProcessFileName)\r\n    ),\r\n    (\r\n        // Search for network connections to malicious IPs.\r\n        DeviceNetworkEvents\r\n        | where RemoteIP in (c2IPs)\r\n        | project Timestamp, DeviceName, ReportId, IndicatorType=\"IPAddress\", Indicator=RemoteIP, Context=pack(\"Process\", InitiatingProcessFileName, \"URL\", RemoteUrl)\r\n    ),\r\n    (\r\n        // Search for network connections to malicious domains or containing malicious URLs.\r\n        DeviceNetworkEvents\r\n        | where RemoteUrl has_any (c2Domains) or RemoteUrl has_any (c2URLs)\r\n        | extend MatchedIndicatorType = iif(RemoteUrl has_any (c2Domains), \"Domain\", \"URL\")\r\n        | project Timestamp, DeviceName, ReportId, IndicatorType=MatchedIndicatorType, Indicator=RemoteUrl, Context=pack(\"Process\", InitiatingProcessFileName, \"IP\", RemoteIP)\r\n    ),\r\n    (\r\n        // Search for network connections with malicious User-Agents.\r\n        DeviceNetworkEvents\r\n        | extend UserAgent = tostring(parse_json(AdditionalFields).UserAgent)\r\n        | where UserAgent in (maliciousUserAgents)\r\n        | project Timestamp, DeviceName, ReportId, IndicatorType=\"UserAgent\", Indicator=UserAgent, Context=pack(\"Process\", InitiatingProcessFileName, \"URL\", RemoteUrl)\r\n    )\r\n)\r\n// FP Tuning: This is a broad hunting query. IOCs, especially IP addresses, can be ephemeral or reused, potentially leading to false positives over time.\r\n// Review the context of any matches to determine if they are truly malicious.\r\n| project-reorder Timestamp, DeviceName, IndicatorType, Indicator, Context, TableName, ReportId\r\n"
