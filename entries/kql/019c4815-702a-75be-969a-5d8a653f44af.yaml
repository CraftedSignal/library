id: 019c4815-702a-75be-969a-5d8a653f44af
name: Ivanti EPMM Sleeper Shell Activation Parameter Detection
description: Detects HTTP requests containing the specific parameter 'k0f53cf964d387' in the query string or POST body. This parameter is the unique trigger used to activate the dormant 'base.Info' in-memory loader on vulnerable Ivanti EPMM instances.
query: "// Name: Ivanti EPMM Sleeper Shell Activation Parameter\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-02-10\r\n// Description: Detects HTTP requests containing the specific parameter 'k0f53cf964d387' in the query string or POST body. This parameter is the unique trigger used to activate the dormant 'base.Info' in-memory loader on vulnerable Ivanti EPMM instances.\r\n// MITRE ATT&CK: T1059.007 (JavaScript/JScript)\r\n// References: https://defusedcyber.com/ivanti-epmm-sleeper-shells-403jsp\r\n// False Positive Sensitivity: Medium. The parameter 'k0f53cf964d387' is highly specific to this threat. False positives are highly unlikely. Consider filtering for traffic destined for your known Ivanti EPMM servers to further increase fidelity.\r\n// Data sources: CommonSecurityLog, W3CIISLog, DeviceNetworkEvents, AzureDiagnostics\r\nlet suspiciousParam = \"k0f53cf964d387\";\r\n(union isfuzzy=true\r\n    (\r\n    // Check web proxy, firewall, and other network security appliance logs\r\n    CommonSecurityLog\r\n    // Search for the parameter in the URL (for GET requests) or the request body/message (for POST requests)\r\n    | where RequestURL has suspiciousParam or Message has suspiciousParam\r\n    | extend\r\n        Url = RequestURL,\r\n        DestinationIp = DestinationIP,\r\n        SourceIp = SourceIP,\r\n        HttpRequestMethod = RequestMethod,\r\n        Payload = Message\r\n    | project-reorder\r\n        TimeGenerated,\r\n        DeviceName,\r\n        Url,\r\n        HttpRequestMethod,\r\n        SourceIp,\r\n        DestinationIp,\r\n        DeviceVendor,\r\n        DeviceProduct,\r\n        Payload\r\n    ),\r\n    (\r\n    // Check IIS logs directly from the server\r\n    W3CIISLog\r\n    // The csUriQuery field contains the query string part of the URL. POST bodies are not typically logged here.\r\n    | where csUriQuery has suspiciousParam\r\n    | extend\r\n        Url = strcat(sSiteName, csUriStem, \"?\", csUriQuery),\r\n        DestinationIp = sIp,\r\n        SourceIp = cIp,\r\n        HttpRequestMethod = csMethod\r\n    | project-reorder TimeGenerated, Url, HttpRequestMethod, SourceIp, DestinationIp, Computer\r\n    ),\r\n    (\r\n    // Check endpoint network events which may capture web requests\r\n    DeviceNetworkEvents\r\n    // The RemoteUrl field contains the full URL. Some EDRs may populate a request body field.\r\n    | where RemoteUrl has suspiciousParam or (isnotempty(RequestBody) and RequestBody has suspiciousParam)\r\n    | extend\r\n        Url = RemoteUrl,\r\n        DestinationIp = RemoteIP,\r\n        SourceIp = LocalIP,\r\n        HttpRequestMethod = \"N/A\" // Method not always available here\r\n    | project-reorder TimeGenerated, Url, HttpRequestMethod, SourceIp, DestinationIp, DeviceName\r\n    ),\r\n    (\r\n    // Check Azure Web Application Firewall logs\r\n    AzureDiagnostics\r\n    | where Category == \"ApplicationGatewayFirewallLog\"\r\n    // Search for the parameter in the request URI or in the WAF details for a blocked request\r\n    | where requestUri_s has suspiciousParam or details_data_s has suspiciousParam\r\n    | extend\r\n        Url = requestUri_s,\r\n        DestinationIp = host_s,\r\n        SourceIp = clientIp_s,\r\n        HttpRequestMethod = requestMethod_s\r\n    | project-reorder\r\n        TimeGenerated,\r\n        Url,\r\n        HttpRequestMethod,\r\n        SourceIp,\r\n        DestinationIp,\r\n        Resource,\r\n        details_message_s\r\n    )\r\n)\r\n// Summarize the findings for easier analysis\r\n| summarize\r\n    StartTime = min(TimeGenerated),\r\n    EndTime = max(TimeGenerated),\r\n    TotalRequests = count(),\r\n    DestinationIps = make_set(DestinationIp),\r\n    Methods = make_set(HttpRequestMethod)\r\n    by SourceIp, Url, DeviceName"
