id: 019cfa32-1d0f-7664-a838-0091597df03e
name: Network Connection to Microstealer Malicious Domains
description: This rule detects network connections to a predefined list of known Microstealer malicious domains. These domains are often associated with malware command and control (C2) infrastructure, phishing, or other malicious activities. Monitoring connections to such domains can help identify compromised systems or active malware infections.
query: "let malicious_domains = dynamic([\r\n\"vrcpluginhub.com\",\"buradakimvar.com\",\"kittenscraft.com\",\"dashlune.xyz\",\r\n\"buradabmwking.com\",\"crushfall.com\",\"slumpcute.com\",\"banterplugins.com\",\r\n\"velyonar.com\",\"churilend.com\",\"zarvethion.com\",\"kittiesmc.com\",\r\n\"kittycraftmc.com\",\"welarith.com\",\"eldrynworld.com\",\"78smp.com\"\r\n]);\r\nDeviceNetworkEvents\r\n| where RemoteUrl has_any (malicious_domains)\r\n| project TimeGenerated, DeviceName, RemoteUrl, RemoteIP, InitiatingProcessFileName, InitiatingProcessCommandLine\r\n"
query_type: kql
severity: medium
tactics:
    - TA0011
techniques:
    - T1071.001
    - T1568.002
tags:
    - kql
version: "1"
