id: 019c2917-249f-716b-ae0e-5f2e275fb954
name: Notepad++ Updater Reconnaissance and DLL Sideloading
description: This rule detects suspicious activity related to Notepad++ updater (gup.exe or update.exe) executing reconnaissance commands or loading suspicious DLLs. Specifically, it looks for the updater process initiating common reconnaissance tools like cmd.exe, powershell.exe, or curl.exe with commands such as 'whoami', 'tasklist', 'systeminfo', 'netstat', 'ipconfig', or 'curl' that include redirection for staging. Additionally, it correlates this activity with the loading of suspicious DLLs (e.g., log.dll) from unusual locations like AppData or Temp folders, potentially indicating DLL sideloading.
query: "// Notepad++ Supply Chain Attack Detection\r\nlet Lookback = 90d;\r\n// Updater Execution\r\nlet SuspiciousUpdaterExecution = \r\n    DeviceProcessEvents\r\n    | where Timestamp > ago(Lookback)\r\n    | where InitiatingProcessFileName in~ (\"update.exe\", \"gup.exe\")\r\n    | where FileName in~ (\r\n        \"cmd.exe\",\r\n        \"powershell.exe\", \r\n        \"pwsh.exe\",\r\n        \"rundll32.exe\",\r\n        \"mshta.exe\", \r\n        \"curl.exe\",\r\n        \"wget.exe\",\r\n        \"certutil.exe\"\r\n    )\r\n    | where ProcessCommandLine has_any (\r\n        \"whoami\", \"tasklist\", \"systeminfo\", \"netstat\", \"ipconfig\",\r\n        \"http\", \"curl\", \"wget\", \"certutil\", \"bitsadmin\", \r\n        \"download\", \"upload\",\r\n        \"Invoke-Expression\", \"IEX\", \"iex\", \"FromBase64String\", \"Base64\"\r\n    )\r\n    and ProcessCommandLine has_any (\">\", \">>\", \".txt\", \".log\", \"-s\", \"-F\")\r\n    | project\r\n        DeviceId,\r\n        DeviceName,\r\n        UpdateTime = Timestamp,\r\n        UpdaterFile = FileName,\r\n        UpdaterPath = FolderPath,\r\n        UpdaterCommand = ProcessCommandLine,\r\n        UpdaterPID = ProcessId,\r\n        AccountName;\r\n// Post-Update activity\r\nlet PostUpdateActivity = \r\n    DeviceProcessEvents\r\n    | where Timestamp > ago(Lookback)\r\n    | where InitiatingProcessFileName in~ (\"update.exe\", \"gup.exe\")\r\n    | where FileName in~ (\r\n        \"cmd.exe\",\r\n        \"powershell.exe\",\r\n        \"pwsh.exe\", \r\n        \"rundll32.exe\",\r\n        \"mshta.exe\",\r\n        \"curl.exe\"\r\n    )\r\n    | where ProcessCommandLine has_any (\r\n        \"whoami\",\r\n        \"tasklist\", \r\n        \"systeminfo\",\r\n        \"netstat\",\r\n        \"ipconfig\",\r\n        \"http\",\r\n        \"curl\"\r\n    )\r\n    and ProcessCommandLine has_any (\"-F\", \"-s\", \">\", \">>\", \".txt\")\r\n    | project\r\n        DeviceId,\r\n        ActivityTime = Timestamp,\r\n        ProcessName = FileName,\r\n        CommandLine = ProcessCommandLine,\r\n        ProcessPath = FolderPath,\r\n        ParentProcess = InitiatingProcessFileName,\r\n        ProcessPID = ProcessId;\r\n// Dll Sideloading\r\nlet SuspiciousDLLLoads = \r\n    DeviceImageLoadEvents\r\n    | where Timestamp > ago(Lookback) \r\n    | where FolderPath has_any (\"\\\\AppData\\\\\", \"\\\\Temp\\\\\")\r\n    // Optional: Known malicious DLLs or suspicious loaders\r\n    | where FileName in~ (\r\n        \"log.dll\", \r\n        \"alien.dll\", \r\n        \"lua5.1.dll\", \r\n        \"alien.ini\"\r\n    ) \r\n    or InitiatingProcessFileName in~ (\r\n        \"BluetoothService.exe\", \r\n        \"script.exe\"\r\n    )\r\n    | project\r\n        DeviceId,\r\n        LoadTime = Timestamp,\r\n        LoadedModule = FileName,\r\n        ModulePath = FolderPath,\r\n        LoadingProcess = InitiatingProcessFileName;\r\n// Network Activity\r\nlet SuspiciousNetworkConnections = \r\n    DeviceNetworkEvents\r\n    | where Timestamp > ago(Lookback)\r\n    | where InitiatingProcessFileName in~ (\r\n        \"cmd.exe\",\r\n        \"powershell.exe\",\r\n        \"pwsh.exe\",\r\n        \"curl.exe\", \r\n        \"rundll32.exe\",\r\n        \"mshta.exe\"\r\n    )\r\n    | project\r\n        DeviceId,\r\n        ConnectionTime = Timestamp,\r\n        NetworkProcess = InitiatingProcessFileName,\r\n        RemoteUrl,\r\n        RemoteIP,\r\n        RemotePort;\r\n// Correlation\r\nSuspiciousUpdaterExecution\r\n| join kind=inner PostUpdateActivity on DeviceId\r\n    | where ActivityTime between (UpdateTime .. (UpdateTime + time(10m)))\r\n| join kind=leftouter SuspiciousDLLLoads on DeviceId\r\n    | where isnull(LoadTime) or LoadTime between (UpdateTime .. (UpdateTime + time(10m)))\r\n| join kind=leftouter SuspiciousNetworkConnections on DeviceId\r\n    | where isnull(ConnectionTime) or ConnectionTime between (UpdateTime .. (UpdateTime + time(10m)))\r\n| project\r\n    Timestamp = UpdateTime,\r\n    DeviceName,\r\n    AccountName,\r\n    UpdaterProcess = UpdaterFile,\r\n    UpdaterPath, \r\n    UpdaterCommand,\r\n    ChildProcess = ProcessName,\r\n    ChildCommand = CommandLine,\r\n    LoadedModule,\r\n    ModulePath,\r\n    RemoteUrl,\r\n    RemoteIP,\r\n    RemotePort\r\n| order by Timestamp desc"
