id: 019bfdda-ec23-7449-a9e3-fdd20d874881
name: New Phishing exploit Vercel to Host and Deliver Remote Access malware
description: This rule detects network connections to a predefined list of malicious domains, many of which are hosted on Vercel and appear to be associated with phishing campaigns. The domains often mimic legitimate services or financial documents, suggesting an attempt to deliver malware or steal credentials through phishing. The rule specifically looks for these domains in the 'RemoteUrl' field of 'DeviceNetworkEvents'.
query: "let MaliciousDomains = pack_array(\r\n    \"duepaymentinvoiceattached.vercel.app\",\r\n    \"paymentrequestoninvoicedueattached.vercel.app\",\r\n    \"invoice-110493.vercel.app\",\r\n    \"olierinvoiceunpaidmmpaid.vercel.app\",\r\n    \"paidrepotstatementinvoice.vercel.app\",\r\n    \"unpaidbillrequestedservicedetails.vercel.app\",\r\n    \"requestpaymentdueattachedts.vercel.app\",\r\n    \"outstandingstatementdetailsattachedrb.vercel.app\",\r\n    \"salesrepacctstatementdetails.vercel.app\",\r\n    \"remityourpendingpaymentdts.vercel.app\",\r\n    \"unpaidinvoiceremitaath.vercel.app\",\r\n    \"waybill-deliveryticket.vercel.app\",\r\n    \"invstatement2025.vercel.app\",\r\n    \"invstatement.vercel.app\",\r\n    \"windowscorps.vercel.app\",\r\n    \"invoices-attachedpdf.vercel.app\",\r\n    \"dhl-delivery-report.vercel.app\",\r\n    \"dhl-shipment-detail.vercel.app\",\r\n    \"express-delivery-note.vercel.app\",\r\n    \"docsignstatements.vercel.app\",\r\n    \"shipment-docspdf.surge.sh\",\r\n    \"mail.blta.ro\",\r\n    \"findhome.cl\"\r\n);\r\nDeviceNetworkEvents\r\n| where RemoteUrl has_any (MaliciousDomains)\r\n| project Timestamp, DeviceName, ActionType, RemoteUrl, RemoteIP, InitiatingProcessFileName\r\n| order by Timestamp desc"
query_type: kql
severity: medium
tactics:
    - TA0001
    - TA0011
techniques:
    - T1566
    - T1566.002
    - T1219.002
tags:
