id: e6a47fe9-3f49-49e5-9f08-02a86d31220e
name: Analyze Mail Bomb Attack by ISP
description: Analyze Mail Bomb Attack by ISP
query: "let QueryPeriod = 30d;\r\nlet MailBomber =\r\nEmailEvents\r\n| where Timestamp > ago(QueryPeriod)\r\n| where parse_json(tostring(parse_json(DetectionMethods).Spam))[0] == \"Mail bombing\";\r\nCloudAppEvents\r\n| where Timestamp > ago(QueryPeriod)\r\n| where IPAddress has_any(MailBomber)\r\n| summarize ISP_Attack_Count=count() by ISP\r\n| sort by ISP desc"
query_type: kql
severity: medium
tactics:
    - TA0040
    - TA0011
techniques:
    - T1667
    - T1071.003
    - T1499
    - T1498
tags:
    - kql
author: Steven Lim
version: "1"
