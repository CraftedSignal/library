id: 370b29db-f637-4778-a239-11fe5eada61a
name: SonicWall Firewall and Client Discovery Detection
description: Use MDE device discovery to determine if a SonicWall firewall present in your enterprise environment.
query: "let SonicFW =\r\nDeviceInfo\r\n| where TimeGenerated > ago(90d)\r\n| where Vendor has \"sonicwall\"\r\n| summarize arg_max(TimeGenerated, *) by DeviceName;\r\nDeviceProcessEvents\r\n| where TimeGenerated > ago(90d)\r\n| where InitiatingProcessVersionInfoProductName has \"SonicWall Client Protection Service\"\r\n| summarize arg_max(TimeGenerated, *) by DeviceName\r\n| union SonicFW"
query_type: kql
severity: medium
tags:
    - kql
author: Steven Lim
version: "1"
references:
    - https://www.sonicwall.com/support/notices/gen-7-sonicwall-firewalls-sslvpn-recent-threat-activity/250804095336430
