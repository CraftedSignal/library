id: 019c2d5e-1960-76dc-8b41-6e2db558a356
name: AI Agent Unusual Script Execution or Prompt Injection
description: This rule detects the execution of command-line interpreters (bash, powershell, cmd, python) that include commands for invoking expressions or downloading content (invoke-expression, curl, wget, Invoke-WebRequest) AND contain specific keywords associated with AI agents (moltbot, openclaw, clawdbot). This combination suggests an AI agent potentially executing arbitrary or malicious commands, possibly as a result of prompt injection or an unusual script execution scenario.
query: "//Prompt Injection / Unusual Script Execution by AI Agents\r\nDeviceProcessEvents\r\n| where InitiatingProcessFileName in (\"bash.exe\",\"powershell.exe\",\"cmd.exe\",\"python.exe\")\r\n  and ProcessCommandLine has_any(\"invoke-expression\",\"curl\",\"wget\",\"Invoke-WebRequest\")\r\n  and ProcessCommandLine has_any(\"moltbot\",\"openclaw\",\"clawdbot\")\r\n| project Timestamp, DeviceName, InitiatingProcessAccountName, InitiatingProcessFileName, ProcessCommandLine\r\n"
query_type: kql
severity: medium
tactics:
    - TA0002
techniques:
    - T1059
tags:
    - kql
author: Rudra Verma - CyberHawk
version: "6"
