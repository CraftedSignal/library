id: 019c0ea3-4dd8-75ab-9dd6-7d3c6d2f95da
name: Suspicious N8N web books linked to malicious Screen Connector Installers
description: 'This query looks for any emails containing N8N webhooks linked to malicious Screen Connect installers '
query: "// This query looks for any emails containing N8N webhooks linked to malicious Screen Connect installers\r\n\r\nEmailUrlInfo\r\n| where TimeGenerated >= ago(24h)\r\n| where Url contains \"n8n.cloud\"\r\n| join kind=inner EmailEvents on NetworkMessageId\r\n| where Subject contains \"for your review\"\r\n| project TimeGenerated, SenderFromAddress, RecipientEmailAddress, Url"
query_type: kql
severity: medium
techniques:
    - T1219
tags:
    - kql
author: CallistoGB
version: "2"
