id: 2c211010-aa79-4909-bdc7-50db19567a93
name: Hunting tunneling services as a core C2 obfuscation layer
description: ' '
query: "let domainList = \"global.rel.tunnels.api.visualstudio.com\";\r\nDeviceNetworkEvents \r\n| where ActionType == @\"DnsConnectionInspected\"\r\n| where parse_json(AdditionalFields)[\"direction\"] == 'Out'\r\n| extend Query = tostring(parse_json(AdditionalFields)[\"query\"])\r\n| where Query has_any(domainList) or Query matches regex @\"^.*\\.devtunnels\\.ms$\" or Query matches regex @\"^.*\\.trycloudflare\\.com$\""
query_type: kql
severity: medium
techniques:
    - T1572
tags:
    - kql
author: Steven Lim
version: "1"
