id: 0199949a-ce25-74fc-8109-d7a3ac76ca37
name: Audit AD Service Account Password Rotation Compliance
description: This KQL audit all your AD service accounts ( account with PasswordNeverExpires attribute set) whether the password was updated based your service account password rotation policy. (E.g In this KQL it's set to one year)
query: "ExposureGraphNodes \r\n| where NodeLabel == @\"user\"\r\n| where parse_json(NodeProperties).rawData.primaryProvider == \"ActiveDirectory\"\r\n| where parse_json(NodeProperties).rawData.userAccountControl[2] == 'PasswordNeverExpires'\r\n| extend PWUpdateTime = todatetime((NodeProperties).rawData.passwordUpdateTime)\r\n| where PWUpdateTime < ago(365d)"
query_type: kql
severity: medium
tags:
    - kql
author: Steven Lim
version: "2"
