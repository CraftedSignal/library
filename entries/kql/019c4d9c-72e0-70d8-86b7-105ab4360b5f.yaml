id: 019c4d9c-72e0-70d8-86b7-105ab4360b5f
name: Ivanti EPMM RCE Vulnerability Chain (CVE-2025-4427, CVE-2025-4428) and Sleeper Shells
description: "This rule detects potential exploitation attempts targeting Ivanti EPMM vulnerabilities (CVE-2025-4427/4428) and subsequent post-exploitation activities. It has two main parts:\n\n1. Web Request Analysis: It identifies web requests to the `/api/v2/featureusage` endpoint that contain suspicious patterns indicative of command injection or expression language injection attempts. \n\n2. Process Creation Analysis: It looks for unusual process creations where Java or Tomcat-related processes (`java.exe`, `javaw.exe`, `catalina.bat`, `catalina.sh`) spawn command-line interpreters (`cmd.exe`, `bash`, `sh`, `powershell.exe`) or processes whose command lines contain keywords like `sliver` or `implant`, suggesting the deployment of malicious implants or sleeper shells."
query: |-
    // Ivanti EPMM CVE-2025-4427/4428 and sleeper shells.
    // Author: Daniel Jeremiah | Date: 2026/02/11
    // Ref: https://www.wiz.io/blog/ivanti-epmm-rce-vulnerability-chain-cve-2025-4427-cve-2025-4428

    // Web requests to EPMM featureusage API with suspicious format/expression (ingest from WAF/proxy if available)
    CommonSecurityLog
    | where TimeGenerated > ago(30d)
    | where RequestURL contains "/api/v2/featureusage" and (RequestURL contains "format=" or RequestURL contains "${" or RequestURL contains "Runtime")
    | project TimeGenerated, DeviceName, RequestURL, SourceUserName, SourceIP, Activity

    // Process: Java/Tomcat spawning cmd or Sliver
    | union (
    DeviceProcessEvents
    | where ActionType == "ProcessCreated"
    | where InitiatingProcessFileName in ("java.exe", "javaw.exe", "catalina.bat", "catalina.sh")
    | where FileName in ("cmd.exe", "bash", "sh", "powershell.exe") or ProcessCommandLine contains "sliver" or ProcessCommandLine contains "implant"
    | project Timestamp, DeviceName, FileName, ProcessCommandLine, InitiatingProcessFileName, InitiatingProcessCommandLine
    )
query_type: kql
severity: medium
tactics:
    - TA0002
    - TA0011
    - TA0005
    - TA0004
techniques:
    - T1059
    - T1203
    - T1071.001
    - T1055
    - T1221
    - DS0015
    - DS0017
tags:
