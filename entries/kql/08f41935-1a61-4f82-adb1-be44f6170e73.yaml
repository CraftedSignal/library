id: 08f41935-1a61-4f82-adb1-be44f6170e73
name: Sentinel TI DNS Tunneling Detection
description: 'KQL Query from file: Sentinel TI DNS Tunneling Detection'
query: "let DNSTunnel =\r\nThreatIntelIndicators\r\n| where TimeGenerated > ago(365d)\r\n| where Tags has \"dns-tunneling\"\r\n| where ObservableKey == \"domain-name:value\"\r\n| project ObservableValue;\r\nDeviceEvents\r\n| where Timestamp > ago(1h)\r\n| where ActionType == @\"DnsQueryResponse\"\r\n| extend DNSHostQuery = tostring(parse_json(AdditionalFields).DnsQueryString)\r\n| where DNSHostQuery has_any(DNSTunnel)"
query_type: kql
severity: medium
tags:
    - kql
author: Steven Lim
version: "1"
