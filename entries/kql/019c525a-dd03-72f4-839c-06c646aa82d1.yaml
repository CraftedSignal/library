id: 019c525a-dd03-72f4-839c-06c646aa82d1
name: OpenClaw Malicious Skill Download and Execute
description: Detects when a known OpenClaw AI agent process spawns a shell to download and immediately execute a script. This is a common pattern used by malicious "Skills" to establish persistence or run further payloads, as detailed in the NSFOCUS report.
query: "// Name: OpenClaw Malicious Skill Download and Execute\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-02-12\r\n// Tactic: Execution, Defense Evasion\r\n// Technique: T1059.004, T1588.006\r\n// Description: Detects when a known OpenClaw AI agent process spawns a shell to download and immediately execute a script. This is a common pattern used by malicious \"Skills\" to establish persistence or run further payloads, as detailed in the NSFOCUS report.\r\n// False Positive Sensitivity: Medium\r\n// References: https://nsfocusglobal.com/openclaw-open-source-ai-agent-application-attack-surface-and-security-risk-system-analysis/\r\nDeviceProcessEvents\r\n// Look for shell processes being created, which are used to execute the malicious commands.\r\n| where FileName in~ (\"bash\", \"sh\")\r\n// The parent process should be a known OpenClaw agent executable.\r\n| where InitiatingProcessFileName in~ (\"openclaw\", \"clawdbot\", \"moltbot\")\r\n// The core of the detection looks for command lines that download or decode content and pipe it directly to another shell for execution.\r\n| where \r\n  (\r\n    // Detects patterns like 'curl ... | bash' or 'wget ... | sh'\r\n    (ProcessCommandLine has \"curl\" or ProcessCommandLine has \"wget\") and (ProcessCommandLine has \"| bash\" or ProcessCommandLine has \"| sh\")\r\n  ) or (\r\n    // Detects patterns like '... | base64 -D | bash'\r\n    ProcessCommandLine has \"base64\" and (ProcessCommandLine has \"| bash\" or ProcessCommandLine has \"| sh\")\r\n  )\r\n// FP Tuning: Legitimate but poorly written skills might use this pattern for benign purposes.\r\n// If false positives occur, consider adding more specific command-line arguments or excluding known safe scripts/parent processes.\r\n// For example, you could filter by specific parent command lines if a legitimate skill is causing noise:\r\n// | where InitiatingProcessCommandLine !has \"known_safe_skill_name\"\r\n| project\r\n    TimeGenerated,\r\n    DeviceName,\r\n    AccountName,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessCommandLine,\r\n    FileName,\r\n    ProcessCommandLine,\r\n    InitiatingProcessParentFileName"
query_type: kql
severity: medium
