id: 019c8a01-af02-75ea-879a-408ae3b8e0e4
name: 'ClickFix: Nslookup DNS Staging'
description: Detects instances where 'nslookup.exe' is initiated by 'explorer.exe'. This activity can be indicative of an adversary performing DNS queries for reconnaissance or command and control (C2) staging, especially when not part of a legitimate administrative script or user action. The rule excludes a common false positive related to conhost.exe.
query: "// ClickFix: Nslookup DNS Staging\r\nDeviceProcessEvents\r\n| where Timestamp >= ago(7d)\r\n| where FileName =~ \"nslookup.exe\"\r\n| where InitiatingProcessFileName =~ \"explorer.exe\"\r\n// Exclusions\r\n| where ProcessCommandLine != \"\\\\??\\\\C:\\\\windows\\\\system32\\\\conhost.exe 0xffffffff -ForceV1\""
query_type: kql
severity: medium
tactics:
    - TA0043
techniques:
    - T1596
    - T1596.003
tags:
    - kql
version: "2"
references:
    - https://thehackernews.com/2026/02/microsoft-discloses-dns-based-clickfix.html
