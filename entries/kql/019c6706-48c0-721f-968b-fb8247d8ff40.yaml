id: 019c6706-48c0-721f-968b-fb8247d8ff40
name: PXA Stealer - Suspicious Python Execution Masquerading as svchost.exe
description: This rule detects suspicious Python script execution masquerading as 'svchost.exe'. Specifically, it looks for 'svchost.exe' processes running from a user's profile directory that execute Python code containing 'import', 'requests', 'exec(', and references to 'http://' or 'https://' in the command line. This pattern is indicative of a Python-based malware or script attempting to download and execute additional code, potentially for command and control or further compromise, while trying to blend in with legitimate system processes.
query: "DeviceProcessEvents\r\n| where Timestamp > ago(7d)\r\n| where FileName =~ \"svchost.exe\"\r\n| where FolderPath has @\"\\Users\\\"\r\n| where ProcessCommandLine has \" -c \"\r\n| where ProcessCommandLine has_all (\"import\", \"requests\")\r\n| where ProcessCommandLine has \"exec(\"\r\n| where ProcessCommandLine has_any (\"http://\", \"https://\")\r\n| where ProcessVersionInfoOriginalFileName in~ (\"python.exe\", \"pythonw.exe\")\r\n| project Timestamp,\r\n          DeviceName,\r\n          AccountName,\r\n          FileName,\r\n          FolderPath,\r\n          ProcessCommandLine,\r\n          InitiatingProcessFileName,\r\n          InitiatingProcessCommandLine\r\n\r\n| order by Timestamp desc\r\n"
query_type: kql
severity: medium
tactics:
    - TA0002
    - TA0005
techniques:
    - T1059.006
    - T1036.005
tags:
    - kql
version: "6"
