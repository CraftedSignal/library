id: 019be22d-047c-76cd-9c88-49084163a239
name: Suspicious Pod Exec followed by Sensitive Blob Access
description: This detection identifies when a user or service principal executes a command inside an AKS pod ('kubectl exec') and then, using the same identity, accesses data in a sensitive Azure Blob Storage container within a short time frame. This pattern can indicate an attacker, having gained initial access to the Kubernetes API, is using a pod as a pivot point to discover and exfiltrate sensitive data.
query: |
    // Name: Suspicious Pod Exec followed by Sensitive Blob Access
    // Author: detections.ai
    // Date: 2026-01-21
    // MITRE ATT&CK: T1609 (Container Administration Command), T1078.004 (Cloud Accounts)
    //
    // Purpose:
    // This detection identifies when a user or service principal executes a command inside an AKS pod ('kubectl exec')
    // and then, using the same identity, accesses data in a sensitive Azure Blob Storage container within a short time frame.
    // This pattern can indicate an attacker, having gained initial access to the Kubernetes API, is using a pod as a pivot
    // point to discover and exfiltrate sensitive data.
    //
    // False Positive / Tuning Strategy:
    // - False positives may occur if administrators or automated processes legitimately perform these actions as part of their duties.
    // - To reduce noise, update the 'sensitive_containers' list with the exact names of your high-value storage containers.
    // - Add known administrative user UPNs or service principal ObjectIDs to the 'account_safelist' to exclude them from this detection.
    // - The 'timeWindow' can be adjusted. A shorter window increases fidelity but may miss slower, more methodical attackers.

    let timeWindow = 30m;
    let sensitive_containers = dynamic(["genetic-data-prod", "patient-records-archive"]); // TUNE: Add your sensitive container names here.
    let account_safelist = dynamic(["admin1@contoso.com", "devops-spn-id"]); // TUNE: Add legitimate admin UPNs or Service Principal ObjectIDs.

    // Find interactive exec commands in AKS pods, excluding safelisted accounts.
    let PodExecs = KubeAudit
    | where OperationName == "Microsoft.ContainerService/managedClusters/pods/exec/action"
    | extend UserIdentity = tostring(parse_json(User).username)
    | where isnotempty(UserIdentity) and not(UserIdentity in (account_safelist))
    | project ExecTime = TimeGenerated, UserIdentity, PodName = pod_name_s, PodNamespace = pod_namespace_s, ClusterName = clusterName_s;

    // Find access events to sensitive blob storage containers, excluding safelisted accounts.
    let SensitiveBlobAccess = StorageBlobLogs
    | where OperationName has_any ("GetBlob", "ListBlobs")
    | where ContainerName in (sensitive_containers)
    // Extract the user identity, preferring UPN but falling back to Object ID for service principals.
    | extend UserIdentity = iif(isnotempty(CallerUpn), CallerUpn, tostring(RequesterObjectId))
    | where isnotempty(UserIdentity) and not(UserIdentity in (account_safelist))
    | project AccessTime = TimeGenerated, UserIdentity, CallerIpAddress, ContainerName, StorageAccount = AccountName, Uri;

    // Join the two event streams on the user identity if blob access occurs shortly after a pod exec.
    PodExecs
    | join kind=inner (
        SensitiveBlobAccess
    ) on UserIdentity
    | where AccessTime between (ExecTime .. (ExecTime + timeWindow))
    | project
        StartTime = ExecTime,
        EndTime = AccessTime,
        UserIdentity,
        PodName,
        PodNamespace,
        ClusterName,
        CallerIpAddress,
        StorageAccount,
        ContainerName,
        BlobUri = Uri
query_type: kql
severity: medium
tactics:
    - TA0002
    - TA0005
    - TA0003
    - TA0004
    - TA0001
    - TA0010
techniques:
    - T1609
    - T1078.004
    - T1567.002
tags:
    - kql
version: "4"
