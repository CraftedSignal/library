id: 019cc900-97a2-766b-8bdd-4a76c6022df3
name: Potential DNS Data Exfiltration via Long Subdomains
description: This rule detects potential DNS exfiltration or command and control (C2) activity by identifying unusually long and complex DNS queries. It focuses on devices making a high number of DNS queries with an average length exceeding 60 characters and a subdomain depth of at least 4. The rule excludes common infrastructure domains and trusted cloud domains when queried by known legitimate processes to reduce false positives.
query: "let timeframe = 30d;\r\nlet LengthThreshold = 50;\r\nlet AvgLengthThreshold = 60;\r\nlet QueryCountThreshold = 50;\r\n//Only truly safe, infrastructure-level exclusions\r\nlet ExcludedDomains = dynamic([\r\n    \"_msdcs\",\r\n    \".local\",\r\n    \"windowsupdate.com\",\r\n    \"akamaized.net\",\r\n    \"akadns.net\",\r\n    \"cloudfront.net\",\r\n    \"gvt1.com\"\r\n]);\r\n// Cloud domains that are only safe when queried by known processes\r\nlet TrustedCloudDomains = dynamic([\r\n    \"amazonaws.com\",\r\n    \"azure.com\",\r\n    \"microsoft.com\",\r\n    \"google.com\"\r\n]);\r\n// Processes legitimately known to query cloud/CDN infrastructure\r\nlet TrustedProcesses = dynamic([\r\n    \"chrome.exe\",\r\n    \"msedge.exe\",\r\n    \"GoogleUpdate.exe\",\r\n    \"MicrosoftEdgeUpdate.exe\",\r\n    \"svchost.exe\",\r\n    \"wuauclt.exe\",\r\n    \"WindowsUpdateBox.exe\"\r\n]);\r\nDeviceNetworkEvents\r\n| where Timestamp > ago(timeframe)\r\n| where RemotePort == 53 or (RemotePort == 443 and ActionType == \"DnsQuery\")\r\n| where ActionType == \"DnsQuery\"\r\n| where isnotempty(RemoteUrl)\r\n| extend CleanDomain = tostring(parse_url(RemoteUrl).Host)\r\n| extend CleanDomain = iff(isempty(CleanDomain), RemoteUrl, CleanDomain)\r\n// Hard exclude safe infrastructure domains\r\n| where not(CleanDomain has_any (ExcludedDomains))\r\n//For cloud domains, only exclude if queried by a trusted process\r\n| where not(\r\n    CleanDomain has_any (TrustedCloudDomains)\r\n    and InitiatingProcessFileName has_any (TrustedProcesses)\r\n)\r\n| extend QueryLength = strlen(CleanDomain)\r\n| where QueryLength > LengthThreshold\r\n| extend SubdomainDepth = array_length(split(CleanDomain, \".\"))\r\n| where SubdomainDepth >= 4\r\n| summarize\r\n    QueryCount        = count(),\r\n    AvgLength         = round(avg(QueryLength), 1),\r\n    MaxLength         = max(QueryLength),\r\n    AvgSubdomainDepth = round(avg(SubdomainDepth), 1),\r\n    UniqueDomains     = dcount(CleanDomain),\r\n    SampleQueries     = make_set(CleanDomain, 5)\r\n  by DeviceName, InitiatingProcessFileName, InitiatingProcessAccountName\r\n| where QueryCount > QueryCountThreshold\r\n| where AvgLength > AvgLengthThreshold\r\n| extend SuspicionScore = QueryCount * AvgLength\r\n| sort by SuspicionScore desc\r\n| project\r\n    DeviceName,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessAccountName,\r\n    QueryCount,\r\n    AvgLength,\r\n    MaxLength,\r\n    AvgSubdomainDepth,\r\n    UniqueDomains,\r\n    SuspicionScore,\r\n    SampleQueries"
query_type: kql
severity: medium
tags:
    - kql
version: "2"
