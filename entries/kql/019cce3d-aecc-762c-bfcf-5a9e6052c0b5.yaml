id: 019cce3d-aecc-762c-bfcf-5a9e6052c0b5
name: Docusign Phishing Attempt via workers.dev Domain
description: This rule detects potential phishing attempts targeting Docusign users. It identifies emails containing URLs or network connections to specific domains (page-docusign-[a-z0-9]+\.workers\.dev) which are commonly used in phishing campaigns to mimic legitimate Docusign login pages or related services. The use of 'workers.dev' subdomains often indicates malicious infrastructure.
query: "let Lookback = 1h;\r\nlet OauthMSPhish =\r\nEmailUrlInfo\r\n| where Timestamp > ago(Lookback)\r\n| where Url matches regex @\"page-docusign-[a-z0-9]+\\.workers\\.dev\";\r\nDeviceNetworkEvents\r\n| where Timestamp > ago(Lookback)\r\n| where RemoteUrl matches regex @\"page-docusign-[a-z0-9]+\\.workers\\.dev\"\r\n| union OauthMSPhish"
query_type: kql
severity: medium
tactics:
    - TA0001
techniques:
    - T1566
    - T1566.002
tags:
    - kql
author: Steven Lim
version: "3"
