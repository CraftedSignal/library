id: 019cf57b-e3af-75bc-a836-8a9fed2bd1e4
name: SSH GSSAPI Authentication Attempt
description: This rule detects attempts to authenticate to SSH using GSSAPI (Generic Security Service Application Programming Interface). While GSSAPI can be used for legitimate authentication, its presence in logs might indicate an attacker attempting to use alternative authentication methods, potentially for lateral movement or privilege escalation, especially if unexpected in the environment.
query: "Syslog\r\n| where ProcessName == \"sshd\"\r\n| where SyslogMessage has_any (\"gssapi-with-mic\",\"gssapi-keyex\",\"GSSAPI\")\r\n| project TimeGenerated, Computer, HostIP, SeverityLevel, SyslogMessage\r\n| sort by TimeGenerated desc\r\n"
query_type: kql
severity: medium
tags:
    - kql
version: "1"
