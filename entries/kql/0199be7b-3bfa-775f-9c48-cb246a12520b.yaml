id: 0199be7b-3bfa-775f-9c48-cb246a12520b
name: RDP Nesting
description: |-
    Identifies when an RDP connection is made to a first system and then an RDP connection is made from the first system to another system with the same account within the 60 minutes. Additionally, if historically daily
    RDP connections are indicated by the logged EventID 4624 with LogonType = 10
query: "let endtime = 1d;\r\nlet starttime = 7d;\r\n// The threshold below excludes matching on RDP connection computer counts of 5 or more by a given account and IP in a given day.  Change the threshold as needed.\r\nlet threshold = 5;\r\nSentinelBB_Windows_SecurityEvents\r\n| where TimeGenerated >= ago(endtime) \r\n| where EventID == 4624 and LogonType == 10\r\n| where not(IpAddress ==\"0.0.0.0\")\r\n// Labeling the first RDP connection time, computer and ip\r\n| extend FirstHop = TimeGenerated, \r\n         FirstComputer = toupper(Computer), \r\n         FirstRDPIPAddress = IpAddress, \r\n         Account = tolower(TargetUserName),\r\n         SubjectUserSid\r\n| join kind=inner (\r\n    SentinelBB_Windows_SecurityEvents\r\n    | where TimeGenerated >= ago(endtime) \r\n    | where EventID == 4624 and LogonType == 10\r\n    // Labeling the second RDP connection time, computer and ip\r\n    | extend SecondHop = TimeGenerated, \r\n             SecondComputer = toupper(Computer), \r\n             SecondRDPIPAddress = IpAddress, \r\n             Account = tolower(TargetUserName),\r\n             SubjectUserSid\r\n    ) on Account,CustomerName\r\n// Make sure that the first connection is after the second connection --> SecondHop > FirstHop\r\n// Then identify only RDP to another computer from within the first RDP connection by only choosing matches where the Computer names do not match --> FirstComputer != SecondComputer\r\n// Then make sure the IPAddresses do not match by excluding connections from the same computers with first hop RDP connections to multiple computers --> FirstRDPIPAddress != SecondRDPIPAddress\r\n| where FirstComputer != SecondComputer and FirstRDPIPAddress != SecondRDPIPAddress and SecondHop > FirstHop\r\n// where the second hop occurs within 30 minutes of the first hop\r\n// Verify that the  rdp was not form the same originator\r\n| where SecondHop <= FirstHop + 10m and SecondComputer != FirstComputer and FirstRDPIPAddress != SecondRDPIPAddress\r\n| project TimeGenerated,CustomerName,Account, FirstHop, FirstComputer, FirstRDPIPAddress, SecondHop, SecondComputer, SecondRDPIPAddress, AccountType, Activity, LogonTypeName, ProcessName,SubjectUserSid\r\n// use left anti to exclude anything from the previous 7 days where the Account and IP has connected 5 or more computers.\r\n| join kind=leftanti (\r\n    SentinelBB_Windows_SecurityEvents\r\n    | where TimeGenerated >= ago(starttime) and TimeGenerated < ago(endtime)\r\n    | where EventID == 4624 and LogonType == 10\r\n    | summarize makeset(Computer), ComputerCount = dcount(Computer) by bin(TimeGenerated, 1d), CustomerName,Account = tolower(TargetUserName), IpAddress, SubjectUserSid\r\n    // Connection count to computer by same account and IP to exclude counts of 5 or more on a given day\r\n    | where ComputerCount >= threshold\r\n    | mvexpand set_Computer\r\n    | extend Computer = toupper(set_Computer)\r\n    ) on Account, CustomerName\r\n//\r\n| summarize \r\n    StartTime = min(TimeGenerated),\r\n    EndTime = max(TimeGenerated),\r\n    TotalCount = count() by CustomerName,Account,FirstHop,FirstComputer, FirstRDPIPAddress, SecondHop, SecondComputer, SecondRDPIPAddress, AccountType, Activity, LogonTypeName, ProcessName,SubjectUserSid"
query_type: kql
severity: medium
tags:
    - kql
author: Sotirios Mavrakis
version: "2"
references:
    - https://learn.microsoft.com/en-us/answers/questions/569926/rdp-nesting
