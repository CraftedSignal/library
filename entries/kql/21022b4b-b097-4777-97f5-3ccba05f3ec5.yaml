id: 21022b4b-b097-4777-97f5-3ccba05f3ec5
name: Check for Entra Legacy TLS Login
description: 'KQL Query from file: Check for Entra Legacy TLS Login'
query: "// Check for Entra Legacy TLS Login\n\nSigninLogs\n| where TimeGenerated > ago(90d)\n| where ResultType == \"0\"\n| mv-expand todynamic(AuthenticationProcessingDetails)\n| where AuthenticationProcessingDetails.key has \"Legacy TLS (TLS 1.0, 1.1, 3DES)\"\n| where AuthenticationProcessingDetails.value has \"True\"\n| summarize LegacyLogin=count() by UserPrincipalName\n| sort by LegacyLogin desc \n\n// Retirement: Migrating to TLS 1.2+ with the Deprecation of Outdated Security Protocols\n// https://azure.microsoft.com/en-us/updates/v2/migrating-to-tls-12-with-deprecation-of-outdated-security-protocols\n"
query_type: kql
tactics:
    - TA0005
    - TA0004
    - TA0042
    - TA0011
    - TA0003
    - TA0010
techniques:
    - T1055.005
    - T1588.004
    - T1573.001
    - T1219.001
    - T1176.002
    - T1052
