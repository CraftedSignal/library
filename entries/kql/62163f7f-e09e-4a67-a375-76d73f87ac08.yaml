id: 62163f7f-e09e-4a67-a375-76d73f87ac08
name: Glitch.me phishing URL scan
description: 'KQL Query from file: Glitch.me phishing URL scan'
query: "let WeeklyOSINT=externaldata(Type:string, Value:string, Source:string)\r\n[h'https://raw.githubusercontent.com/SlimKQL/Hunting-Queries-Detection-Rules/refs/heads/main/IOC/glitchme.csv'];\r\nlet OSINTURL =\r\nWeeklyOSINT\r\n| where Type == \"url\"\r\n| project Value;\r\nEmailUrlInfo\r\n| where TimeGenerated > ago(30d)\r\n| where Url has_any(OSINTURL)"
query_type: kql
severity: medium
tags:
    - kql
author: Steven Lim
version: "1"
references:
    - https://www.netskope.com/blog/glitch-hosted-phishing-uses-telegram-fake-captchas-to-target-navy-federal-credit-union-customers
