id: 019c9ab9-9aa8-70dd-b785-cf2a055e3b1f
name: Dohdoor Suspicious Argument Passing to LOLBins
description: Detects the execution of legitimate Windows binaries with command-line arguments containing URL patterns. This is a technique used by the Dohdoor malware campaign to pass C2 information to a sideloaded malicious DLL.
query: "// Name: Dohdoor Suspicious Argument Passing to LOLBins\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-02-26\r\n// Description: Detects the execution of legitimate Windows binaries with command-line arguments containing URL patterns. This is a technique used by the Dohdoor malware campaign to pass C2 information to a sideloaded malicious DLL.\r\n// False Positives: Medium. It is highly anomalous for these specific executables to be launched with a URL in the command line. However, legitimate software could potentially do this. Review the parent process and full command line for context.\r\n// References: https://blog.talosintelligence.com/new-dohdoor-malware-campaign/\r\n// Tags: T1218.011, T1059.003\r\nDeviceProcessEvents\r\n// Define the list of legitimate executables abused by Dohdoor\r\n| where FileName in~ (\"Fondue.exe\", \"mblctr.exe\", \"ScreenClippingHost.exe\")\r\n// Look for suspicious command-line arguments containing URL patterns or specific parameters used by Dohdoor\r\n| where ProcessCommandLine has_any (\"?sub=s\", \"?sub=d\", \"http://\", \"https://\")\r\n| project\r\n    Timestamp,\r\n    DeviceName,\r\n    AccountName,\r\n    FileName,\r\n    FolderPath,\r\n    ProcessCommandLine,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessFolderPath,\r\n    InitiatingProcessCommandLine,\r\n    SHA256\r\n"
