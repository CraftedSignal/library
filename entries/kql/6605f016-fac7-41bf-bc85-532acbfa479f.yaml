id: 6605f016-fac7-41bf-bc85-532acbfa479f
name: Detect Entra role changes in Microsoft Graph
description: ' '
query: "// Privilege Escalation: Detect role changes in Microsoft Graph\r\nGraphAPIAuditEvents\r\n| where Timestamp > ago(1h)\r\n| where RequestUri has_all (\"https://graph.microsoft.com/\", \"/directoryRoles/\", \"members/$ref\")\r\n| where RequestMethod == \"POST\"\r\n| where ResponseStatusCode in (\"204\")\r\n| extend Role = tostring(split(RequestUri, \"/\")[-3]) \r\n//Role and AccountObjectId can be looked up in Auditlogs\r\n| project AccountObjectId, RequestUri, ResponseStatusCode, Role"
query_type: kql
severity: medium
tactics:
    - TA0004
tags:
    - kql
author: Steven Lim
version: "1"
references:
    - Steven Lim
