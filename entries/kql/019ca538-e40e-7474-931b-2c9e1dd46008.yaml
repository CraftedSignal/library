id: 019ca538-e40e-7474-931b-2c9e1dd46008
name: Prometei UPlugPlay Service Creation
description: Detects the creation of the 'UPlugPlay' Windows Service, a known persistence mechanism for the Prometei botnet. The malware may create the service using the command-line tool 'sc.exe' or directly via Windows APIs, which generates Event ID 7045.
query: "// Name: Prometei UPlugPlay Service Creation\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-02-28\r\n// Description: Detects the creation of the 'UPlugPlay' Windows Service, a known persistence mechanism for the Prometei botnet. The malware may create the service using the command-line tool 'sc.exe' or directly via Windows APIs, which generates Event ID 7045.\r\n// MITRE TTPs: T1543.003 - Create or Modify System Process: Windows Service\r\n// References: https://www.esentire.com/blog/tenant-from-hell-prometeis-unauthorized-stay-in-your-windows-server\r\n// False Positive Sensitivity: Medium\r\nlet serviceName = \"UPlugPlay\";\r\nlet serviceDisplayName = \"UPlug-and-Play Host\";\r\nlet serviceImagePath = \"sqhost.exe\";\r\n(union isfuzzy=true\r\n    (\r\n        // Detect service creation via command line (sc.exe)\r\n        DeviceProcessEvents\r\n        | where FileName =~ \"sc.exe\" and ProcessCommandLine has \"create\"\r\n        | where \r\n            (\r\n                ProcessCommandLine has serviceName and \r\n                ProcessCommandLine has \"binPath=\" and \r\n                ProcessCommandLine contains serviceImagePath\r\n            ) \r\n            or \r\n            (\r\n                ProcessCommandLine has \"DisplayName=\" and \r\n                ProcessCommandLine contains serviceDisplayName\r\n            )\r\n        // FP Tuning: While specific, a legitimate but poorly named admin script could trigger this.\r\n        // If false positives occur, check the initiating process and user context for legitimacy.\r\n        | project\r\n            Timestamp,\r\n            DeviceName,\r\n            DetectionMethod = \"CommandLine (sc.exe)\",\r\n            AccountName = InitiatingProcessAccountName,\r\n            CommandLine = ProcessCommandLine,\r\n            ParentProcess = InitiatingProcessFileName,\r\n            ParentCommandLine = InitiatingProcessCommandLine\r\n    ),\r\n    (\r\n        // Detect service creation via Windows Security Event Log (more reliable for API-based creation)\r\n        SecurityEvent\r\n        | where EventID == 7045 // A service was installed in the system.\r\n        | where ServiceName =~ serviceName and ServiceFileName endswith serviceImagePath\r\n        | project\r\n            Timestamp,\r\n            DeviceName = Computer,\r\n            DetectionMethod = \"Windows Event (7045)\",\r\n            AccountName = Account,\r\n            CommandLine = strcat(\"Service Installed: \", ServiceName, \", Image Path: \", ServiceFileName),\r\n            ParentProcess = \"\",\r\n            ParentCommandLine = \"\"\r\n    )\r\n)\r\n"
query_type: kql
severity: medium
