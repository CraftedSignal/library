id: 019ca09d-076c-74ca-a35c-21ce2deed698
name: High Volume Registry Modifications to File Associations for Execution Prevention
description: Detects a high volume of modifications to the default 'open' command for various file extensions in the registry. This technique is used by malware to prevent users from running applications or opening documents, effectively causing a denial of service.
query: |
    // Name: File Association Hijacking for Execution Prevention
    // Author: Ethan Andrews + detections.ai
    // Date: 2026-02-27
    // Description: Detects a high volume of modifications to the default 'open' command for various file extensions in the registry. This technique is used by malware, as seen in the Fortinet report on a multi-stage campaign, to prevent users from running applications or opening documents, effectively causing a denial of service.
    // Mitre ATT&CK: T1499 - Endpoint Denial of Service, T1546.001 - Change Default File Association
    // References: https://www.fortinet.com/blog/threat-research/inside-a-multi-stage-windows-malware-campaign
    // False Positive Sensitivity: Medium
    // Comment Level: Medium
    // Define the threshold for the number of distinct file associations modified and the time window for aggregation.
    let threshold = 10;
    let timeWindow = 5m;
    DeviceRegistryEvents
    | where ActionType == "RegistryValueSet"
    // Focus on modifications to the default 'open' command for a file type, which is stored under the HKEY_CLASSES_ROOT hive.
    | where RegistryKey endswith @"\shell\open\command" and RegistryKey contains @"\SOFTWARE\Classes\"
    // The malware in the report sets the value to a 'cmd.exe /c echo...' command to display a message.
    | where RegistryValueData has_all ("cmd", "/c", "echo")
    | summarize
        StartTime = min(TimeGenerated),
        EndTime = max(TimeGenerated),
        ModifiedKeys = make_set(RegistryKey, 100),
        DistinctKeyCount = dcount(RegistryKey),
        ProcessName = tostring(any(InitiatingProcessFileName)),
        CommandLine = tostring(any(InitiatingProcessCommandLine))
        by bin(TimeGenerated, timeWindow), DeviceName, InitiatingProcessAccountName
    | where DistinctKeyCount > threshold
    // FP Tuning: Some legitimate software installers (e.g., for developer tools, media suites) or system updates might modify multiple file associations at once.
    // If legitimate processes (e.g., setup.exe, msiexec.exe) cause false positives, they can be excluded from this logic.
    // The threshold can also be adjusted based on environment norms.
    | extend
        timestamp = StartTime,
        hostName = DeviceName,
        accountName = InitiatingProcessAccountName
    | project-reorder
        timestamp,
        hostName,
        accountName,
        ProcessName,
        CommandLine,
        DistinctKeyCount,
        ModifiedKeys,
        StartTime,
        EndTime
query_type: kql
severity: medium
tactics:
    - TA0040
    - TA0004
    - TA0003
    - TA0005
techniques:
    - T1499
    - T1546.001
    - T1112
tags:
