id: 019cbf3a-91c8-7374-bac8-0b6217b79f06
name: Network Connection to Known Malicious Domains
description: This rule detects network connections from devices to a list of known malicious domains. These domains are often associated with command and control (C2) infrastructure or other malicious activities.
query: "let iocDomains = dynamic([\"singer-bodners-bau-at-s-account.workers.dev\",\"dibafef289.workers.dev\",\"ab-monvoisinproduction-com-s-account.workers.dev\",\"subzero908.workers.dev\",\"sandra-solorzano-duncanfamilyfarms-net-s-account.workers.dev\",\"tyler2miler-proton-me-s-account.workers.dev\",\"aarathe-ramraj-tipgroup-com-au-s-account.workers.dev\",\"andy-bardigans-com-s-account.workers.dev\",\"dennis-saltertrusss-com-s-account.workers.dev\",\"rockymountainhi.workers.dev\",\"workspace1717-outlook-com-s-account.workers.dev\",\"aiinnovationsfly.com\",\"astrolinktech.com\",\"s-union.workers.dev\",\"aurorahomellc.com\",\"ajansfly.com.tr\",\"steve-mike8777.workers.dev\",\"pelangiservice.com\",\"evobothub.org\",\"energycelllabsbl.com\",\"augmentedchiptech.com\",\"adventureshaven.com\"]);\r\nDeviceNetworkEvents\r\n| where isnotempty(RemoteUrl) and RemoteUrl has_any (iocDomains)\r\n| project TimeGenerated, DeviceName, RemoteUrl, RemoteIP, InitiatingProcessAccountName, InitiatingProcessFileName, ActionType\r\n| order by TimeGenerated desc"
query_type: kql
severity: medium
tactics:
    - TA0011
techniques:
    - T1071.001
tags:
    - kql
version: "1"
