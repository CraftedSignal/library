id: 019c7be9-b002-759b-a12b-45e467bdd34e
name: LNK Command-Line Padding for Obfuscation
description: Detects processes launched by Windows Explorer where the command line contains excessive whitespace or hidden control characters. This pattern is indicative of CVE-2025-9491, a technique used to hide malicious arguments from the LNK Properties dialog.
query: "// Name: LNK Command-Line Padding\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-02-20\r\n// Description: Detects processes launched by Windows Explorer where the command line contains excessive whitespace or hidden control characters. This pattern is indicative of CVE-2025-9491, a technique used to hide malicious arguments from the LNK Properties dialog.\r\n// False Positive Sensitivity: Medium\r\n// References: https://www.wietzebeukema.nl/blog/trust-me-im-a-shortcut?utm_source=tldrsec.com&utm_medium=referral&utm_campaign=tl-dr-sec-316-how-trail-of-bits-uses-claude-code-github-threat-intel-open-source-ai-pentesting-tools\r\n// MITRE TTPs: T1204.002, T1027.010, T1547.009\r\nlet padding_threshold = 260; // Corresponds to the character limit in the Explorer Properties UI.\r\nDeviceProcessEvents\r\n// This query looks for processes launched from a shortcut file (.lnk) that contain an unusually long command line padded with whitespace or control characters.\r\n| where\r\n    // The parent process is explorer.exe, which is typical when a user double-clicks a shortcut.\r\n    InitiatingProcessFileName =~ \"explorer.exe\"\r\n    and\r\n    (\r\n        // Detects command lines with a long sequence of spaces or tabs, exceeding the typical UI display limit.\r\n        ProcessCommandLine matches regex strcat('[ \\\\t]{', padding_threshold, ',}')\r\n        or\r\n        // Detects the presence of newline or carriage return characters, which are highly anomalous in a command line.\r\n        ProcessCommandLine has_any (\"\\r\", \"\\n\")\r\n    )\r\n// FP Tuning: Legitimate applications are unlikely to use this technique.\r\n// However, if false positives occur from custom scripts or specific applications, consider excluding them by adding 'and ProcessFileName !in (\"legit_app.exe\")'.\r\n| project-reorder\r\n    Timestamp,\r\n    DeviceName,\r\n    AccountName,\r\n    FileName,\r\n    ProcessCommandLine,\r\n    InitiatingProcessFileName,\r\n    FolderPath,\r\n    MD5,\r\n    SHA1,\r\n    SHA256"
