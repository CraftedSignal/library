id: 019a95bf-fe05-72cf-b511-d5a07e086a84
name: NotDoor Outlook backdoor detection
description: NotDoor is a Outlook Macros to monitor incoming emails for specific triggers, and when the system receives such an email, it executes code paths found in the VBA macro. This allows an attacker to exfiltrate data, upload files, and execute commands on the victim’s computer while using an inconspicuous application as the C2.
query: "union DeviceImageLoadEvents, DeviceProcessEvents, DeviceFileEvents, DeviceRegistryEvents\r\n| where \r\n    // DLL Sideloading Detection\r\n    (InitiatingProcessFileName =~ \"onedrive.exe\" and FileName =~ \"SSPICLI.dll\") or\r\n    // Suspicious PowerShell Detection  \r\n    (InitiatingProcessFileName =~ \"onedrive.exe\" and FileName =~ \"powershell.exe\" and ProcessCommandLine has \"encodedCommand\") or\r\n    // Malicious Macro File Detection\r\n    (FolderPath endswith @\"\\Microsoft\\Outlook\\VbaProject.otm\" and InitiatingProcessFileName != \"outlook.exe\") or\r\n    // Registry Modifications Detection\r\n    (RegistryKey has @\"HKEY_CURRENT_USER\\Software\\Microsoft\\Office\" and (\r\n        RegistryValueName =~ \"LoadMacroProviderOnBoot\" or\r\n        RegistryKey endswith @\"\\Security\\Level\" or \r\n        RegistryKey endswith @\"\\Common\\Security\\TrustedAddIns\"\r\n    ))\r\n| extend DetectionType = case(\r\n    InitiatingProcessFileName =~ \"onedrive.exe\" and FileName =~ \"SSPICLI.dll\", \"DLL Sideloading\",\r\n    InitiatingProcessFileName =~ \"onedrive.exe\" and FileName =~ \"powershell.exe\" and ProcessCommandLine has \"encodedCommand\", \"Suspicious PowerShell\", \r\n    FolderPath endswith @\"\\Microsoft\\Outlook\\VbaProject.otm\" and InitiatingProcessFileName != \"outlook.exe\", \"Malicious Macro File Creation\",\r\n    RegistryKey has @\"HKEY_CURRENT_USER\\Software\\Microsoft\\Office\", \"Outlook Security Registry Modification\",\r\n    \"Unknown\"\r\n)\r\n| extend Severity = case(\r\n    DetectionType == \"DLL Sideloading\", \"High\",\r\n    DetectionType == \"Suspicious PowerShell\", \"High\", \r\n    DetectionType == \"Malicious Macro File Creation\", \"Critical\",\r\n    DetectionType == \"Outlook Security Registry Modification\", \"Medium\",\r\n    \"Low\"\r\n)\r\n| project\r\n    Timestamp,\r\n    DeviceName,\r\n    DetectionType,\r\n    Severity,\r\n    InitiatingProcess = InitiatingProcessFileName,\r\n    TargetObject = case(\r\n        DetectionType == \"DLL Sideloading\", strcat(\"Loaded DLL: \", FolderPath, \"\\\\\", FileName),\r\n        DetectionType == \"Suspicious PowerShell\", strcat(\"Command: \", substring(ProcessCommandLine, 0, 200)),\r\n        DetectionType == \"Malicious Macro File Creation\", strcat(\"File: \", FolderPath, \"\\\\\", FileName),\r\n        DetectionType == \"Outlook Security Registry Modification\", strcat(\"Registry: \", RegistryKey, \"\\\\\", RegistryValueName, \" = \", coalesce(RegistryValueData, \"\")),\r\n        \"Unknown\"\r\n    ),\r\n    AdditionalContext = case(\r\n        DetectionType == \"DLL Sideloading\", \"OneDrive loading SSPICLI.dll - potential sideloading\",\r\n        DetectionType == \"Suspicious PowerShell\", \"PowerShell with encoded command launched by OneDrive\",\r\n        DetectionType == \"Malicious Macro File Creation\", \"VbaProject.OTM created by non-Outlook process\",\r\n        DetectionType == \"Outlook Security Registry Modification\", \"Outlook security settings modified to enable macros\",\r\n        \"No additional context\"\r\n    )\r\n| order by Severity desc, Timestamp desc"
query_type: kql
severity: medium
techniques:
    - T1574.001
    - T1027.010
    - T1137.005
    - T1112
tags:
