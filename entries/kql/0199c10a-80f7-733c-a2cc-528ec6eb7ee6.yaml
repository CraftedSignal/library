id: 0199c10a-80f7-733c-a2cc-528ec6eb7ee6
name: Azure Sentinel Analytics Rule Creation or Update
description: Detects the creation or update of an Azure Sentinel analytics rule. This can indicate administrative activity related to security monitoring configuration. Monitoring these changes is crucial for detecting potential tampering with detection capabilities or the introduction of malicious rules.
query: "SentinelAudit\r\n| where TimeGenerated > ago(180d)\r\n| where Description == \"Create or update analytics rule.\"\r\n| extend CallerIpAddress = tostring(ExtendedProperties.CallerIpAddress)\r\n| extend CallerName = tostring(ExtendedProperties.CallerName)\r\n| extend enabled = tostring(parse_json(tostring(parse_json(tostring(ExtendedProperties.OriginalResourceState)).properties)).enabled)\r\n| project TimeGenerated, SentinelResourceType, SentinelResourceName, CallerIpAddress, CallerName, enabled"
query_type: kql
severity: medium
tags:
    - kql
version: "1"
