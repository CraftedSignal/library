id: 019c1fa8-04d7-72de-9266-901ff88155ba
name: Notepad++ Malicious Update Activity
description: Detects a sequence of events associated with a malicious Notepad++ update. This malicious process executes reconnaissance commands.
query: "// Name: Notepad++ Malicious Update Activity\r\n// Author: @jsh0x\r\n// Date: 2026-02-02\r\n// Description: Detects a sequence of events associated with a malicious Notepad++ update. This malicious process executes reconnaissance commands and exfiltrates the collected data using curl.exe.\r\n// References: https://www.bleepingcomputer.com/news/security/notepad-plus-plus-fixes-flaw-that-let-attackers-push-malicious-update-files/\r\n// False Positive Sensitivity: Medium\r\nDeviceProcessEvents\r\n| where Timestamp > ago(30d)\r\n| where InitiatingProcessFileName =~ \"AutoUpdater.exe\"\r\n| where (ProcessCommandLine has_all (\"cmd\", \">>\", \"a.txt\") and ProcessCommandLine has_any (\"netstat\", \"systeminfo\", \"tasklist\", \"whoami\")) \r\n| project-reorder Timestamp,DeviceName,AccountName,FileName,FolderPath,ProcessCommandLine,InitiatingProcessFileName,InitiatingProcessCommandLine\r\n"
query_type: kql
severity: medium
