id: 019c09df-6499-7370-8a69-826a8ce6d291
name: ClawdBot VS Code Extension Dropping ScreenConnect RAT
description: This rule detects various activities associated with the ClawdBot campaign, which uses a fake VS Code extension to drop the ScreenConnect RAT. Detection logic includes suspicious network activity fetching malicious payloads (config.json, lightshot files, zoomupdate.msi) from known malicious domains or Dropbox, identification of known malicious file hashes, outbound connections to ScreenConnect C2 servers on port 8041, creation or start of ScreenConnect services, file dropping/staging in temporary directories, and execution of Code.exe or ScreenConnect binaries from temporary paths.
query: "// Detection: Fake ClawdBot VS Code Extension Dropping ScreenConnect RAT\r\n// IOCs from Jan 2026 campaign (clawdbot.getintwopc.site → config.json → Code.exe → ScreenConnect client)\r\n// Covers network fetches, file writes/downloads, suspicious outbound, service creation, and temp-based execution\r\n// 1. Suspicious network activity (config.json, lightshot files, zoomupdate.msi from malicious domains or Dropbox fallback)\r\nlet IOC=DeviceNetworkEvents\r\n    | where Timestamp > ago(30d)\r\n    | where RemoteUrl has_any (\"clawdbot.getintwopc.site\", \"darkgptprivate.com\", \"getintwopc.site\", \"meeting.bulletmailer.net\", \"bulletmailer.net\")\r\n       or RemoteUrl has \"dropbox.com\" and InitiatingProcessFileName has \"Code.exe\"   // fallback Dropbox delivery\r\n    | extend Activity = \"Suspicious VS Code ext payload fetch (config/lightshot/zoomupdate)\", Technique = \"T1218.011 / T1566.002\";\r\n    // 2. Known malicious hashes (Code.exe, DLLs, configs from campaign reports)\r\nlet IOC2=DeviceFileEvents\r\n    | where SHA256 in~ (\r\n        \"04ef48b104d6ebd05ad70f6685ade26c1905495456f52dfe0fb42f550bd43388\",\r\n        \"adbcdb613c04fd51936cb0863d2417604db0cd04792ab7cae02526d48944c77b\",\r\n        \"d1e0c26774cb8beabaf64f119652719f673fb530368d5b2166178191ad5fcbea\",\r\n        \"e20b920c7af988aa215c95bbaa365d005dd673544ab7e3577b60fecf11dcdea2\"\r\n      )\r\n    | extend Activity = \"Known ClawdBot/ScreenConnect dropper hash\", Technique = \"T1204.002\";\r\n    // 3. Suspicious outbound to ScreenConnect C2 port 8041 (non-private IPs)\r\nlet IOC3=DeviceNetworkEvents\r\n    | where (RemotePort == 8041 and not(ipv4_is_private(RemoteIP)) and RemoteIP != @\"127.0.0.1\") or (RemoteIP has_any (\"178.16.54.253\", \"179.43.176.32\"))   // known campaign IPs\r\n       or RemoteUrl has_any (\"meeting.bulletmailer.net\", \"bulletmailer.net\")\r\n    | extend Activity = \"Outbound to weaponized ScreenConnect C2 (port 8041)\", Technique = \"T1071.001\";\r\n    // 4. ScreenConnect service creation / start (often with random GUID like 083e4d30c7ea44f7)\r\nlet Service=DeviceEvents\r\n    | where ActionType in (\"ServiceInstalled\", \"ServiceStarted\")\r\n    | where AdditionalFields has_any (\"ScreenConnect\", \"ScreenConnect Client\", \"083e4d30c7ea44f7\")\r\n    | extend Activity = \"Suspicious ScreenConnect service install/start\", Technique = \"T1543.003\";\r\n    // 5. Files written to \\temp...ScreenConnect or Lightshot folders (common staging)\r\nlet FileDropping=DeviceFileEvents\r\n    | where ActionType in (\"FileCreated\", \"FileModified\")\r\n    | where FolderPath has @\"temp\" and (FolderPath has \"ScreenConnect\")\r\n    | extend Activity = \"ScreenConnect / Lightshot staging in %TEMP%\", Technique = \"T1218\";\r\n    // 6. Code.exe or ScreenConnect processes launched from temp / unusual paths\r\nlet ScreenconnectProcess=DeviceProcessEvents\r\n    | where FolderPath has @\"temp\"\r\n    | where FileName in~ (\"Code.exe\", \"ScreenConnect.ClientService.exe\", \"ScreenConnect.WindowsClient.exe\")\r\n    | extend Activity = \"Code.exe / ScreenConnect executed from temp folder\", Technique = \"T1059.003\";\r\n    // 7. Payload Downloading from Attacker Command And control\r\nlet InitialDownload=DeviceFileEvents\r\n    | where (FileOriginUrl has_any (\"clawdbot.getintwopc.site\",\"darkgptprivate.com\",\"getintwopc.site\") and FileName has_any (\"config.json\",\"lightshot.dll\",\"lightshot.exe\"))\r\n     or \r\n    (FileOriginUrl contains(\"dropbox\") and FileName has_any (\"zoomupdate.msi\"))\r\n    | extend Activity = \"ScreenConnect payload download\", Technique = \"T1218\";\r\nunion isfuzzy=true IOC,IOC2,IOC3,InitialDownload,Service,FileDropping,ScreenconnectProcess\r\n| where Timestamp > ago(30d)\r\n| project\r\n    Timestamp,\r\n    DeviceName, \r\n    InitiatingProcessAccountName,\r\n    FileName,\r\n    FolderPath,\r\n    SHA256,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessCommandLine,\r\n   RemoteIP,\r\n   RemoteUrl,\r\n   RemotePort,\r\n    FileOriginUrl,\r\n    ActionType,\r\n   Activity,\r\n   Technique,\r\n    AdditionalFields\r\n| extend AlertTitle = strcat(\"ClawdBot VS Code Ext → ScreenConnect RAT Activity - \", Activity)\r\n| summarize arg_max(Timestamp, *) by DeviceName, AlertTitle, SHA256\r\n| order by Timestamp desc"
