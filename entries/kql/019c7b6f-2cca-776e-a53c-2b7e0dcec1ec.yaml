id: 019c7b6f-2cca-776e-a53c-2b7e0dcec1ec
name: Suspicious TIP Registry Persistence with Large Binary Data
description: Detects modifications to the Text Input Processor (TIP) registry key with unusually large binary data, which can be indicative of malware hiding persistent code. This specific registry key is not commonly used for storing large amounts of data, making large writes suspicious.
query: |
    // Name: Suspicious TIP Registry Persistence
    // Author: Ethan Andrews + detections.ai
    // Date: 2026-02-20
    // Description: Detects modifications to the Text Input Processor (TIP) registry key with unusually large binary data, which this malware uses to hide persistent code.
    // MITRE ATT&CK: T1112, T1027.001
    // References: https://www.malwarebytes.com/blog/scams/2026/02/facebook-ads-spread-fake-windows-11-downloads-that-steal-passwords-and-crypto-wallets
    // False Positive Sensitivity: Medium
    DeviceRegistryEvents
    // Look for registry value set events
    | where ActionType == "RegistryValueSet"
    // Target the specific key used by the malware for persistence
    | where RegistryKey endswith @"\SYSTEM\Software\Microsoft\TIP\AggregateResults"
    // Alert if the data written is unusually large (over 100KB), indicative of a hidden binary blob
    | where isnotempty(RegistryValueData) and strlen(RegistryValueData) > 100000
    // This key is not commonly used for storing large amounts of data. If legitimate software in your environment does this,
    // consider increasing the size threshold or excluding the InitiatingProcessFileName.
    | project
        Timestamp,
        DeviceName,
        RegistryKey,
        RegistryValueName,
        RegistryValueData,
        InitiatingProcessAccountName,
        InitiatingProcessFileName,
        InitiatingProcessCommandLine,
        InitiatingProcessSHA256
query_type: kql
severity: medium
tactics:
    - TA0003
    - TA0005
techniques:
    - T1112
    - T1027.001
tags:
    - kql
author: Ethan Andrews
version: "2"
references:
    - https://www.malwarebytes.com/blog/scams/2026/02/facebook-ads-spread-fake-windows-11-downloads-that-steal-passwords-and-crypto-wallets
