id: 0199a4bd-f75c-7006-9d0d-cd9ac363140f
name: Notepad++ Plugin DLL Swap (CVE-2025-56383) — User-Writable + Recent Change/Rename + Load
description: Detects probable exploitation of the reported Notepad++ plugin DLL hijack by correlating DLL loads from Notepad++\plugins with recent file changes or swap-style renames, prioritising user-writable locations (Users/AppData/OneDrive) and weak trust. Outputs a Verdict and SuspicionScore for quick triage.
query: "let loads =\r\nDeviceImageLoadEvents\r\n| where Timestamp >= ago(30d)\r\n| where InitiatingProcessFileName =~ \"notepad++.exe\"\r\n| where FolderPath contains \"\\\\Notepad++\\\\plugins\\\\\"\r\n| where FileName endswith \".dll\"\r\n| extend ImageLoadTime = Timestamp\r\n| project DeviceName, ImageLoadTime, FileName, FolderPath, SHA1, InitiatingProcessFileName, InitiatingProcessFolderPath;\r\nlet mods =\r\nDeviceFileEvents\r\n| where Timestamp >= ago(30d)\r\n| where FolderPath contains \"\\\\Notepad++\\\\plugins\\\\\"\r\n| where ActionType in (\"FileCreated\",\"FileModified\",\"FileRenamed\")\r\n| project DeviceName, FileName, FolderPath, FileEventTime=Timestamp, ActionType, PreviousFileName;\r\nlet lastmod =\r\nmods\r\n| summarize MostRecentModTime = max(FileEventTime) by DeviceName, FileName, FolderPath;\r\nlet renames =\r\nmods\r\n| where ActionType == \"FileRenamed\"\r\n| where FileName startswith \"original-\" or PreviousFileName startswith \"original-\"\r\n      or FileName endswith \".bak\" or PreviousFileName endswith \".bak\"\r\n| summarize RecentRenameTime = max(FileEventTime) by DeviceName, FolderPath;\r\nloads\r\n| join kind=leftouter lastmod on DeviceName, FileName, FolderPath\r\n| join kind=leftouter renames on DeviceName, FolderPath\r\n| join kind=leftouter (\r\n    DeviceFileCertificateInfo\r\n    | summarize arg_max(Timestamp, IsSigned, IsTrusted, Signer, Issuer, SignatureType) by DeviceName, SHA1\r\n) on DeviceName, SHA1\r\n| extend RecentChangeMins = iif(isnotempty(MostRecentModTime), datetime_diff('minute', ImageLoadTime, MostRecentModTime), long(null))\r\n| extend RecentChange = iif(isnotempty(RecentChangeMins) and RecentChangeMins >= 0 and RecentChangeMins <= 1440, true, false)\r\n| extend RenameCloseMins = iif(isnotempty(RecentRenameTime), datetime_diff('minute', ImageLoadTime, RecentRenameTime), long(null))\r\n| extend RenamePattern = iif(isnotempty(RenameCloseMins) and RenameCloseMins >= 0 and RenameCloseMins <= 1440, true, false)\r\n| extend IsPluginUserWritable =\r\n    iif(FolderPath contains \"\\\\Users\\\\\", true,\r\n    iif(FolderPath contains \"\\\\AppData\\\\\", true,\r\n    iif(FolderPath contains \"\\\\OneDrive\\\\\", true, false)))\r\n| extend IsNppUserWritable =\r\n    iif(InitiatingProcessFolderPath contains \"\\\\Users\\\\\", true,\r\n    iif(InitiatingProcessFolderPath contains \"\\\\AppData\\\\\", true,\r\n    iif(InitiatingProcessFolderPath contains \"\\\\OneDrive\\\\\", true, false)))\r\n| extend WritableContext = iif(IsPluginUserWritable or IsNppUserWritable, true, false)\r\n| extend Untrusted = iif(IsSigned != true or IsTrusted != true, true, false)\r\n| extend SuspicionScore = iif(WritableContext,1,0) + iif(RecentChange,1,0) + iif(Untrusted,1,0) + iif(RenamePattern,2,0)\r\n| extend Verdict = iff(SuspicionScore >= 2, \"Possibly Malicious\", \"BAU\")\r\n| where (WritableContext or RenamePattern) and (Untrusted or RecentChange)\r\n| project ImageLoadTime, DeviceName, InitiatingProcessFileName, InitiatingProcessFolderPath,\r\n          FileName, FolderPath, SHA1, IsPluginUserWritable, IsNppUserWritable,\r\n          RecentChange, RenamePattern, IsSigned, IsTrusted, Signer, Issuer, SuspicionScore, Verdict\r\n| order by ImageLoadTime desc\r\n"
