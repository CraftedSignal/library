id: f3f66df1-744e-4d4b-b363-a659e0505b1c
name: Detecting Ransomware Recon with Zero Trust Telemetry
description: Port scanning is a common precursor to ransomware attacks, typically occurring during the reconnaissance phase. With Entra Global Secure Access deployed across your endpoints for zero-trust access, you can leverage KQL to detect port scan activity indicative of early-stage threat behavior.
query: "NetworkAccessTraffic\r\n| where TimeGenerated > ago(1h)\r\n| where TrafficType == \"private\"\r\n| summarize PortScan=dcount(DestinationPort) by DeviceId, SourceIp\r\n| sort by PortScan desc \r\n| where PortScan > 5"
query_type: kql
severity: medium
tactics:
    - TA0007
techniques:
    - T1046
tags:
    - kql
author: Steven Lim
version: "1"
