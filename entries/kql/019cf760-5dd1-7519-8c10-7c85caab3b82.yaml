id: 019cf760-5dd1-7519-8c10-7c85caab3b82
name: Azure AD Federation Trust Modified
description: Detects modifications to Azure AD federation settings or domain authentication methods. Such changes can be indicative of a Golden SAML attack, where an attacker establishes a new federation trust to forge SAML tokens and gain unauthorized access.
query: "// Name: Azure AD Federation Trust Modified\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-03-16\r\n// Description: Detects modifications to Azure AD federation settings or domain authentication methods. Such changes can be indicative of a Golden SAML attack, where an attacker establishes a new federation trust to forge SAML tokens and gain unauthorized access.\r\n// Tactic: Credential Access\r\n// Technique: T1550.004 - Use Alternate Authentication Material: SAML\r\n// Severity: High\r\n// References: https://learn.microsoft.com/en-us/azure/security/fundamentals/steps-secure-identity#task-3-detect-new-federation-trusts\r\nAuditLogs\r\n// Filter for operations related to federation and domain settings modification.\r\n| where OperationName in (\"Set domain authentication\", \"Set federation settings on domain\", \"Set company information\", \"Update domain\")\r\n| where Result == \"success\"\r\n// The \"Update domain\" and \"Set company information\" operations can be broad.\r\n// For environments with frequent, legitimate changes, consider removing them or filtering for specific modified properties\r\n// to reduce potential false positives. Example: | where todynamic(ModifiedProperties) has \"Federation\"\r\n| extend InitiatingUserOrApp = iff(isnotempty(InitiatedBy.user.userPrincipalName), InitiatedBy.user.userPrincipalName, InitiatedBy.app.displayName)\r\n| extend InitiatorIpAddress = tostring(parse_json(tostring(InitiatedBy)).user.ipAddress)\r\n// Expand the target resources to get a clear view of the affected domain.\r\n| mv-expand TargetResources\r\n| where isnotempty(TargetResources)\r\n| extend TargetDomain = tostring(TargetResources.displayName)\r\n// Project relevant fields for the alert.\r\n| project\r\n    TimeGenerated,\r\n    OperationName,\r\n    InitiatingUserOrApp,\r\n    InitiatorIpAddress,\r\n    TargetDomain,\r\n    Result,\r\n    TargetResources,\r\n    CorrelationId"
query_type: kql
severity: medium
tactics:
    - TA0006
    - TA0005
    - TA0003
techniques:
