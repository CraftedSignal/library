id: 019d0293-3a47-710f-9197-1794936aca82
name: Early Bird APC Injection into Explorer.exe
description: Detects 'Early Bird' Asynchronous Procedure Call (APC) injection into 'explorer.exe' processes. This technique involves a suspicious parent process (like a script interpreter) creating a suspended 'explorer.exe' process, then injecting malicious code using API calls such as 'QueueUserAPC' and 'WriteProcessMemory' before the process fully starts. This rule specifically looks for the combination of these events within a short timeframe.
query: "// Title: Early Bird APC Injection (Explorer.exe)\r\n// Author: Brandon + Detections.ai\r\n// Tactics and Techniques: T1055.004, T1059, T1564.003 \r\nlet timeframe = 10m;\r\n// Define suspicious parent processes that might launch a suspended explorer.exe for injection.\r\n// VOID#GEIST uses a python script to perform the injection. Other script interpreters are also included.\r\nlet suspiciousParents = dynamic([\"python.exe\", \"powershell.exe\", \"cmd.exe\", \"wscript.exe\", \"cscript.exe\", \"curl.exe\"]);\r\n// Find explorer.exe processes created by suspicious parents. This is the first step in Early Bird injection.\r\nlet potentialSuspendedExplorer =\r\n    DeviceProcessEvents\r\n    | where Timestamp > ago(timeframe)\r\n    | where FileName =~ \"explorer.exe\"\r\n    | where InitiatingProcessFileName in~ (suspiciousParents)\r\n    // FP Tuning: Legitimate software installers or updaters might exhibit similar behavior.\r\n    // If false positives occur, consider adding more specific command-line filters for the initiating process.\r\n    | project\r\n        CreationTime = Timestamp,\r\n        DeviceId,\r\n        DeviceName,\r\n        TargetProcessId = ProcessId,\r\n        TargetProcessName = FileName,\r\n        InjectorProcessId = InitiatingProcessId,\r\n        InjectorProcessName = InitiatingProcessFileName,\r\n        InjectorCommandLine = InitiatingProcessCommandLine;\r\n// Find injection-related API calls which are characteristic of APC injection.\r\nlet injectionEvents =\r\n    DeviceEvents\r\n    | where Timestamp > ago(timeframe)\r\n    // QueueUserAPC is the key API for this technique. WriteProcessMemory is used to write the shellcode into the target.\r\n    | where ActionType in (\"QueueUserApcThreadApiCall\", \"WriteProcessMemoryApiCall\")\r\n    | project\r\n        InjectionTime = Timestamp,\r\n        DeviceId,\r\n        ActionType,\r\n        TargetProcessId = ProcessId,\r\n        InjectorProcessId = ProcessId;\r\n// Join the process creation with the subsequent injection events to identify the full sequence.\r\npotentialSuspendedExplorer\r\n| join kind=inner (\r\n    injectionEvents\r\n) on DeviceId, TargetProcessId, InjectorProcessId\r\n// Ensure the injection happens right after the process is created, which is characteristic of the \"Early Bird\" technique.\r\n| where InjectionTime between (CreationTime .. (CreationTime + 30s))\r\n| summarize\r\n    StartTime = min(CreationTime),\r\n    EndTime = max(InjectionTime),\r\n    InjectionActions = make_set(ActionType, 5)\r\n    by DeviceId, DeviceName, TargetProcessId, TargetProcessName, InjectorProcessId, InjectorProcessName, InjectorCommandLine\r\n// A finding of both WriteProcessMemory and QueueUserApcThreadApiCall is a very strong indicator of this specific attack pattern.\r\n| where array_length(InjectionActions) > 1\r\n| extend\r\n    timestamp = StartTime,\r\n    HostName = DeviceName,\r\n    ProcessName = InjectorProcessName,\r\n    Description = strcat(\"Possible Early Bird APC injection into explorer.exe detected. Injector: '\", InjectorProcessName, \"' (PID: \", InjectorProcessId, \") targeted '\", TargetProcessName, \"' (PID: \", TargetProcessId, \").\")\r\n"
query_type: kql
severity: medium
