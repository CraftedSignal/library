id: be8cea6f-4259-471f-826c-6c352e42e966
name: 'VIP Account Monitoring: Entra ID, CA Policy, Role Changes & Sign-ins'
description: |-
    Detects activity related to high-value (VIP) accounts, including:

    - Azure AD account modifications
    - Conditional Access policy changes affecting the user
    - Role assignment changes
    - Mailbox rule creation/modification
    - Successful sign-ins

    Useful for tracking executive account abuse, targeted attacks, or policy misconfigurations.
query: "// --------------------------------------------------------------------------------------\r\n// VIP Account Activity Detection\r\n// Description:\r\n//   This KQL query collects changes and sign-ins related to sensitive or VIP accounts.\r\n//   It combines Entra ID audit logs, Conditional Access changes, role assignments,\r\n//   Exchange activity (e.g., inbox rules), and successful sign-ins.\r\n//\r\n// Watchlist requirements:\r\n//   - Alias: VIP\r\n//   - SearchKey column: AccountName (should contain UPNs, lowercase)\r\n//\r\n// How to tune:\r\n//   - Adjust the 'lookback' window as needed (e.g., 7d, 90d).\r\n//   - If OfficeActivity logs aren't available, remove the EXO_Changes section.\r\n//   - For Conditional Access detection via group assignments, use a separate query.\r\n//   - Add filters to exclude known admin/service accounts if needed.\r\n//   - Map the following fields for entity detection in Sentinel:\r\n//       - Account -> Target\r\n//       - Actor   -> Actor\r\n//       - IP/App  -> Extract from 'Details' or separate columns (optional).\r\n// --------------------------------------------------------------------------------------\r\n\r\n// ===== Time window to look back =====\r\nlet lookback = 30d;\r\n// ===== Load VIP account watchlist (alias: VIP, search key: AccountName) =====\r\nlet VIP = _GetWatchlist('VIP')\r\n          | project AccountName = tolower(tostring(AccountName))\r\n          | where isnotempty(AccountName);\r\n// ===== 1) Entra ID / Azure AD changes made to VIP accounts =====\r\nlet AAD_AccountChanges =\r\nAuditLogs\r\n| where TimeGenerated > ago(lookback)\r\n| extend ActorUPN = tostring(InitiatedBy.user.userPrincipalName)\r\n| mv-expand tr = TargetResources to typeof(dynamic)\r\n| extend TargetUPN = tolower(tostring(tr.userPrincipalName)),\r\n         TargetId  = tostring(tr.id),\r\n         TargetType = tostring(tr.type),\r\n         RawMods   = tostring(tr.modifiedProperties)\r\n| join kind=inner (VIP) on $left.TargetUPN == $right.AccountName\r\n| project\r\n    Time=TimeGenerated,\r\n    Source=\"AuditLogs\",\r\n    Action=coalesce(ActivityDisplayName, OperationName),\r\n    Actor=ActorUPN,\r\n    Target=coalesce(TargetUPN, TargetId, TargetType),\r\n    Details=iff(isempty(RawMods), tostring(AdditionalDetails), RawMods);\r\n// ===== 2) Conditional Access policy changes that directly affect VIP users =====\r\n// Note: this does NOT include CA impact through group assignments\r\nlet CA_Changes_DirectUser =\r\nAuditLogs\r\n| where TimeGenerated > ago(lookback)\r\n| where Category =~ \"Policy\" or ActivityDisplayName has_cs \"Conditional Access\"\r\n| extend ActorUPN = tostring(InitiatedBy.user.userPrincipalName)\r\n| mv-expand tr = TargetResources to typeof(dynamic)\r\n| extend TargetUPN = tolower(tostring(tr.userPrincipalName)),\r\n         trStr = tostring(tr),\r\n         PolicyName = tostring(tr.displayName)\r\n| join kind=inner (VIP) on $left.TargetUPN == $right.AccountName\r\n| project\r\n    Time=TimeGenerated,\r\n    Source=\"AuditLogs(CA)\",\r\n    Action=coalesce(ActivityDisplayName, OperationName),\r\n    Actor=ActorUPN,\r\n    Target=PolicyName,\r\n    Details=trStr;\r\n// ===== 3) Role assignments or privilege changes for VIP accounts =====\r\nlet Role_Assignments =\r\nAuditLogs\r\n| where TimeGenerated > ago(lookback)\r\n| where OperationName in~ (\r\n    \"Add member to role\",\r\n    \"Remove member from role\",\r\n    \"Add eligible member to role\",\r\n    \"Remove eligible member from role\"\r\n)\r\n| extend ActorUPN = tostring(InitiatedBy.user.userPrincipalName)\r\n| mv-expand tr = TargetResources to typeof(dynamic)\r\n| extend TargetUPN = tolower(tostring(tr.userPrincipalName)),\r\n         RoleName = tostring(tr.displayName)\r\n| join kind=inner (VIP) on $left.TargetUPN == $right.AccountName\r\n| project\r\n    Time=TimeGenerated,\r\n    Source=\"AuditLogs(Role)\",\r\n    Action=OperationName,\r\n    Actor=ActorUPN,\r\n    Target=TargetUPN,\r\n    Details=RoleName;\r\n// ===== 4) Exchange/Inbox rule or mailbox changes involving VIP accounts =====\r\n// Requires OfficeActivity ingestion (Unified Audit Log)\r\nlet EXO_Changes =\r\nOfficeActivity\r\n| where TimeGenerated > ago(lookback)\r\n| where RecordType in (\"ExchangeAdmin\",\"ExchangeItem\",\"ExchangeItemGroup\")\r\n| extend OwnerLower = tolower(tostring(MailboxOwnerUPN)),\r\n         UserIdLower = tolower(tostring(UserId))\r\n| join kind=inner (VIP) on $left.OwnerLower == $right.AccountName\r\n| project\r\n    Time=TimeGenerated,\r\n    Source=\"OfficeActivity\",\r\n    Action=Operation,\r\n    Actor=UserId,\r\n    Target=coalesce(MailboxOwnerUPN, UserId),\r\n    Details=tostring(Parameters);\r\n// ===== 5) Successful sign-ins from VIP accounts =====\r\nlet AuthSuccess =\r\nSigninLogs\r\n| where TimeGenerated > ago(lookback)\r\n| extend UPNLower = tolower(tostring(UserPrincipalName))\r\n| join kind=inner (VIP) on $left.UPNLower == $right.AccountName\r\n| where ResultType == 0\r\n| project\r\n    Time=TimeGenerated,\r\n    Source=\"SigninLogs\",\r\n    Action=\"Successful sign-in\",\r\n    Actor=\"—\",\r\n    Target=UserPrincipalName,\r\n    Details=strcat(\"AppId=\", AppId, \"; IP=\", IPAddress, \"; CA=\", tostring(ConditionalAccessStatus));\r\n// ===== Combine all results and sort by timestamp descending =====\r\nAAD_AccountChanges\r\n| union CA_Changes_DirectUser, Role_Assignments, EXO_Changes, AuthSuccess\r\n| sort by Time desc\r\n"
query_type: kql
severity: medium
techniques:
    - T1087
    - T1078
    - T1098
    - T1110
tags:
    - vip
    - exec-monitoring
    - identity-protection
    - ca-tracking
    - role-changes
    - break-glass
    - kql
author: Michael Fajkus
version: "1"
