id: 019cec23-b321-741d-952c-7e08548a2986
name: Storm-2561 Fake VPN Client Activity
description: |
    This query detects multiple TTPs associated with the Storm-2561 campaign that uses SEO poisoning to distribute fake VPN clients for credential theft. It looks for known file hashes, a specific code-signing certificate, malicious DLL side-loading and C2 communication patterns.
query: "let fileHashes = dynamic([\r\n\"57a50a1c04254df3db638e75a64d5dd3b0d6a460829192277e252dc0c157a62f\",\r\n\"862f004679d3b142d9d2c729e78df716aeeda0c7a87a11324742a5a8eda9b557\",\r\n\"6c9ab17a4aff2cdf408815ec120718f19f1a31c13fc5889167065d448a40dfe6\",\r\n\"6129d717e4e3a6fb4681463e421a5603b640bc6173fb7ba45a41a881c79415ca\",\r\n\"85c4837e3337165d24c6690ca63a3274dfaaa03b2ddaca7f1d18b3b169c6aac1\",\r\n\"98f21b8fa426fc79aa82e28669faac9a9c7fce9b49d75bbec7b60167e21963c9\",\r\n\"cfa4781ebfa5a8d68b233efb723dbde434ca70b2f76ff28127ecf13753bfe011\",\r\n\"26db3fd959f12a61d19d102c1a0fb5ee7ae3661fa2b301135cdb686298989179\",\r\n\"eb8b81277c80eeb3c094d0a168533b07366e759a8671af8bfbe12d8bc87650c9\",\r\n\"8ebe082a4b52ad737f7ed33ccc61024c9f020fd085c7985e9c90dc2008a15adc\"\r\n]);\r\nlet maliciousCompany = \"Taiyuan Lihua Near Information Technology Co., Ltd.\";\r\nlet c2_ips = dynamic([\"194.76.226.93\"]);\r\nlet suspiciousDomains = dynamic([\r\n\"vpn-connection.pro\",\"myconnection.pro\",\r\n\"checkpoint-vpn.com\",\"cisco-secure-client.es\",\"forticlient-for-mac.com\",\r\n\"forticlient-vpn.de\",\"forticlient-vpn.fr\",\"forticlient-vpn.it\",\r\n\"forticlient.ca\",\"forticlient.co.uk\",\"forticlient.no\",\"fortinet-vpn.com\",\r\n\"ivanti-vpn.org\",\"ivanti-secure-access.de\",\"ivanti-pulsesecure.com\",\r\n\"sonicwall-netextender.nl\",\"sophos-connect.org\",\"vpn-fortinet.com\",\r\n\"watchguard-vpn.com\"\r\n]);\r\nunion\r\n(\r\nDeviceProcessEvents\r\n| where SHA256 in (fileHashes) or ProcessVersionInfoCompanyName == maliciousCompany\r\n| project TimeGenerated, DeviceName, FileName, FolderPath, SHA256, ProcessCommandLine, InitiatingProcessFileName\r\n| extend Activity=\"Malicious Process Execution\"\r\n),\r\n(\r\nDeviceNetworkEvents\r\n| where RemoteIP in (c2_ips) or RemoteUrl has_any (suspiciousDomains) or RemoteUrl contains \"/iost/income_shit\"\r\n| project TimeGenerated, DeviceName, RemoteUrl, RemoteIP, InitiatingProcessFileName\r\n| extend Activity=\"Suspicious Network Communication\"\r\n),\r\n(\r\nDeviceRegistryEvents\r\n| where RegistryKey has @\"CurrentVersion\\RunOnce\"\r\n| where RegistryValueData contains \"Pulse.exe\"\r\n| project TimeGenerated, DeviceName, RegistryKey, RegistryValueData, InitiatingProcessFileName\r\n| extend Activity=\"RunOnce Persistence\"\r\n),\r\n(\r\nDeviceFileEvents\r\n| where FolderPath endswith @\"Pulse Secure\\ConnectionStore\\\" and FileName == \"connectionstore.dat\"\r\n| project TimeGenerated, DeviceName, FileName, FolderPath, InitiatingProcessFileName\r\n| extend Activity=\"VPN Credential File Access\"\r\n)\r\n| sort by TimeGenerated desc\r\n"
