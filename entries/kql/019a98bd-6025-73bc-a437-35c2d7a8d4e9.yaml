id: 019a98bd-6025-73bc-a437-35c2d7a8d4e9
name: Risky Sign-ins Detection Query (Success + Failed Logins)
description: |-
    Detects Entra ID sign-in attempts classified as low, medium or high risk
    The detection includes both successful and failed login attempts
query: "EntraIdSignInEvents\r\n| extend TimeGenerated = Timestamp\r\n| where RiskLevelDuringSignIn > 0\r\n| extend SignInResult = iff(ErrorCode == 0, \"Success\", \"Failure\")\r\n| project\r\n    TimeGenerated,\r\n    Timestamp,\r\n    AccountUpn,\r\n    Application,\r\n    ReportId,\r\n    SignInResult,\r\n    ErrorCode,\r\n    RiskLevelDuringSignIn,\r\n    RiskEventTypes,\r\n    RiskState,\r\n    IPAddress,\r\n    Country,\r\n    State,\r\n    City"
query_type: kql
severity: medium
tags:
    - kql
version: "2"
