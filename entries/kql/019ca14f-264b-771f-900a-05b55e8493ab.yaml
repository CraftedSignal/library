id: 019ca14f-264b-771f-900a-05b55e8493ab
name: NetSupport RAT Persistence and RunMRU Cleanup (IClickFix TTP)
description: Detects NetSupport RAT persistence established via a Registry Run key, followed by the clearing of the RunMRU history. This sequence of events is a known TTP associated with the IClickFix framework, where adversaries attempt to hide the initial execution command after achieving persistence.
query: "// Name: IClickFix - NetSupport RAT Persistence and RunMRU Cleanup\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-02-27\r\n// Description: Detects NetSupport RAT persistence via a Run key, followed by the clearing of the RunMRU history to hide the initial execution command, a TTP associated with the IClickFix framework.\r\n// MITRE TTPs: T1547.001, T1070.006\r\n// References: https://blog.sekoia.io/meet-iclickfix-a-widespread-wordpress-targeting-framework-using-the-clickfix-tactic/\r\n// False Positive Sensitivity: Medium. Legitimate use of NetSupport Manager by administrators could trigger the persistence part of this rule. The correlation with RunMRU cleanup significantly increases fidelity. Consider excluding known administrative hostnames or initiating processes if false positives occur.\r\nlet timeframe = 5m;\r\n// Find instances of NetSupport RAT's client32.exe being set as a Run key for persistence.\r\nlet Persistence = DeviceRegistryEvents\r\n| where Timestamp > ago(timeframe)\r\n| where ActionType == \"RegistryValueSet\"\r\n| where RegistryKey has \"Software\\\\Microsoft\\\\Windows\\\\CurrentVersion\\\\Run\" and RegistryValueData has \"client32.exe\"\r\n| project PersistenceTime = Timestamp, DeviceName, InitiatingProcessAccountName, InitiatingProcessCommandLine, RegistryKey, RegistryValueData;\r\n// Find commands used to clear the RunMRU history, which stores recently executed commands from the Run dialog.\r\nlet Cleanup = DeviceProcessEvents\r\n| where Timestamp > ago(timeframe)\r\n| where ProcessCommandLine has_all (\"Explorer\\\\RunMRU\") and \r\n        (\r\n            (ProcessCommandLine has \"reg\" and ProcessCommandLine has \"delete\") or\r\n            (ProcessCommandLine has \"powershell\" and ProcessCommandLine has \"Remove-ItemProperty\")\r\n        )\r\n| project CleanupTime = Timestamp, DeviceName, InitiatingProcessAccountName, ProcessCommandLine;\r\n// Join the two events on the same device and user account within the specified timeframe.\r\nPersistence\r\n| join kind=inner (\r\n    Cleanup\r\n) on DeviceName, InitiatingProcessAccountName\r\n| where CleanupTime > PersistenceTime and CleanupTime - PersistenceTime < timeframe\r\n| project\r\n    Timestamp = PersistenceTime,\r\n    DeviceName,\r\n    InitiatingProcessAccountName,\r\n    PersistenceCmd = InitiatingProcessCommandLine,\r\n    PersistenceKey = RegistryKey,\r\n    PersistenceValue = RegistryValueData,\r\n    CleanupCmd = ProcessCommandLine,\r\n    CleanupTime\r\n"
