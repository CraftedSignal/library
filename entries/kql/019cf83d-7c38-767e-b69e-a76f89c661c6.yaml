id: 019cf83d-7c38-767e-b69e-a76f89c661c6
name: Execution of Binaries Signed by Malicious TrustConnect Certificate
description: Detects the execution of files signed by "TrustConnect Software PTY LTD", a certificate issuer observed signing malware that impersonates legitimate workplace applications to deploy RMM backdoors. This rule identifies processes launched from binaries associated with this suspicious certificate.
query: "// Name: TrustConnect Signed Binary Execution\r\n// Author: Brandon + detections.ai\r\n// Date: 2026-03-16\r\n// Description: Detects the execution of files signed by \"TrustConnect Software PTY LTD\". This certificate has been observed signing malware that impersonates legitimate workplace applications to deploy RMM backdoors.\r\n// False Positives: Low. This detection is specific to a certificate issuer/signer linked to known malicious activity. Legitimate software should not be signed by this entity.\r\n// References: https://www.microsoft.com/en-us/security/blog/2026/03/03/signed-malware-impersonating-workplace-apps-deploys-rmm-backdoors/\r\n// Tactics: Resource Development, Masquerading\r\n// Techniques: T1588.003, T1036.005\r\nlet suspicious_hashes =\r\nDeviceFileCertificateInfo\r\n// Find files signed by the malicious certificate authority\r\n| where Issuer has \"TrustConnect Software PTY LTD\" or Signer has \"TrustConnect Software PTY LTD\"\r\n| distinct SHA1;\r\n// Find process execution events related to those files\r\nDeviceProcessEvents\r\n| join kind=inner(\r\n    DeviceFileCertificateInfo\r\n) on SHA1\r\n| where SHA1 in (suspicious_hashes)\r\n| project\r\n    TimeGenerated,\r\n    DeviceName,\r\n    FileName,\r\n    FolderPath,\r\n    ProcessCommandLine,\r\n    InitiatingProcessFileName,\r\n    SHA1,\r\n    Signer\r\n"
query_type: kql
severity: medium
tactics:
    - TA0042
    - TA0005
techniques:
    - T1588.003
    - T1036.005
    - T1036
tags:
    - kql
version: "2"
references:
    - https://www.microsoft.com/en-us/security/blog/2026/03/03/signed-malware-impersonating-workplace-apps-deploys-rmm-backdoors/
