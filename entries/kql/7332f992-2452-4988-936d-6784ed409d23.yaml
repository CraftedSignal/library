id: 7332f992-2452-4988-936d-6784ed409d23
name: Phishunt.io Phishing Domain List EmailUrl Detection
description: |-
    here we go with another quick and dirty one to detect Phishing Urls in Emails listed on phishunt.io Feed.

    Recommended Action move to Junk Mail Folder or Delete the Message
query: "let PhishuntURLs = externaldata (Url: string) [\"https://phishunt.io/feed.txt\"]\r\n//exclude false positives\r\n| where Url !in (\"https://www.google.com/chrome/\",\"https://www.microsoft.com/en-us/microsoft-teams/log-in\");\r\nEmailUrlInfo\r\n| where Url has_any (PhishuntURLs)\r\n| join EmailEvents on NetworkMessageId"
query_type: kql
severity: medium
tactics:
    - TA0001
techniques:
    - T1566
    - T1566.002
tags:
    - kql
author: Benjamin Zulliger
version: "1"
references:
    - https://phishunt.io/feed.txt
