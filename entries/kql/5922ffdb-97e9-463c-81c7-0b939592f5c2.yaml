id: 5922ffdb-97e9-463c-81c7-0b939592f5c2
name: Anonymous Blob Access Detection
description: 'KQL Query from file: Anonymous Blob Access Detection'
query: "CloudStorageAggregatedEvents\r\n| where Timestamp > ago(1h) \r\n| where not (ipv4_is_private(IPAddress))\r\n| where AnonymousSuccessfulOperations != \"\" and AnonymousSuccessfulOperations != \"0\"\r\n| extend Malicious = case(\r\nparse_json(AdditionalFields)[\"IsTorExitNode\"] == 'true',\"Yes\",\r\nparse_json(AdditionalFields)[\"IsKnownSuspiciousIp\"] == 'true', \"Yes\",\"\")\r\n| project Timestamp, ResourceGroup, StorageAccount, Malicious, IPAddress, UserAgentHeader "
query_type: kql
severity: medium
tags:
    - kql
author: Steven Lim
version: "1"
