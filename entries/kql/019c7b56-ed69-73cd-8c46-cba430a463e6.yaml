id: 019c7b56-ed69-73cd-8c46-cba430a463e6
name: Lunar Stealer Fake Windows 11 Installer Activity
description: 'Detects behavioral indicators associated with a malware campaign distributing a credential and crypto-wallet stealer disguised as a Windows 11 update. Detection is based on TTPs rather than IOCs for longevity: suspicious directory creation, obfuscated PowerShell execution, and registry-based persistence.'
query: "// Name: Lunar Stealer Fake Windows 11 Installer Activity\n// Author: tim@detections.ai\n// Date: 2026-02-20\n// Severity: High\n// Description: Detects behavioral indicators associated with a malware campaign distributing a \n//   credential and crypto-wallet stealer disguised as a Windows 11 update. Detection is based on\n//   TTPs rather than IOCs for longevity: suspicious directory creation, obfuscated PowerShell \n//   execution, and registry-based persistence.\n// References: https://www.malwarebytes.com/blog/scams/2026/02/facebook-ads-spread-fake-windows-11-downloads-that-steal-passwords-and-crypto-wallets\n// MITRE ATT&CK:\n// - T1204.002: User Execution: Malicious File\n// - T1059.001: Command and Scripting Interpreter: PowerShell\n// - T1112: Modify Registry\n// False Positives:\n// - \"LunarApplication\" is specific to this campaign but could theoretically be used by legitimate software\n// - The TIP\\AggregateResults registry key is legitimate; alerting focuses on non-system process writes\n// - PowerShell with -ExecutionPolicy Unrestricted can be used by admins; the script extensions add specificity\nlet timeframe = 1h;\n// Pattern 1: File creation in LunarApplication directory (T1204.002)\nlet file_events = DeviceFileEvents\n    | where Timestamp > ago(timeframe)\n    | where ActionType == \"FileCreated\"\n    | where FolderPath has @\"\\AppData\\Roaming\\LunarApplication\"\n    | project \n        Timestamp, \n        DeviceId, \n        DeviceName, \n        FileName, \n        FolderPath, \n        InitiatingProcessAccountName,\n        Tactic = \"Execution\", \n        Technique = \"T1204.002\", \n        Activity = \"LunarApplication_FileCreated\", \n        Details = FolderPath;\n// Pattern 2: Obfuscated PowerShell script execution from TEMP (T1059.001)\nlet process_events = DeviceProcessEvents\n    | where Timestamp > ago(timeframe)\n    | where FileName in~ (\"powershell.exe\", \"pwsh.exe\")\n    | where ProcessCommandLine has_any (\".yiz.ps1\", \".unx.ps1\")\n    | where ProcessCommandLine has_any (\n        \"-ExecutionPolicy Unrestricted\", \n        \"-ExecutionPolicy Bypass\",\n        \"-ep Unrestricted\",\n        \"-ep Bypass\"\n    )\n    | project \n        Timestamp, \n        DeviceId, \n        DeviceName, \n        FileName, \n        FolderPath = InitiatingProcessFolderPath, \n        InitiatingProcessAccountName,\n        Tactic = \"Execution\", \n        Technique = \"T1059.001\", \n        Activity = \"Suspicious_PowerShell_Script\", \n        Details = ProcessCommandLine;\n// Pattern 3: Registry persistence via TIP key (T1112)\nlet registry_events = DeviceRegistryEvents\n    | where Timestamp > ago(timeframe)\n    | where ActionType == \"RegistryValueSet\"\n    | where RegistryKey has @\"Software\\Microsoft\\TIP\\AggregateResults\"\n    // Exclude legitimate system processes\n    | where InitiatingProcessFileName !in~ (\"svchost.exe\", \"System\", \"TiWorker.exe\", \"TrustedInstaller.exe\")\n    | project \n        Timestamp, \n        DeviceId, \n        DeviceName, \n        FileName = InitiatingProcessFileName, \n        FolderPath = InitiatingProcessFolderPath, \n        InitiatingProcessAccountName,\n        Tactic = \"Persistence\", \n        Technique = \"T1112\", \n        Activity = \"Registry_Persistence_TIP\", \n        Details = RegistryKey;\n// Combine all behavioral indicators\nunion file_events, process_events, registry_events\n| summarize\n    StartTime = min(Timestamp),\n    EndTime = max(Timestamp),\n    Activities = make_set(Activity),\n    Tactics = make_set(Tactic),\n    Techniques = make_set(Technique),\n    Details = make_set(Details),\n    EventCount = count()\n    by DeviceId, DeviceName, InitiatingProcessAccountName\n| project\n    StartTime,\n    EndTime,\n    DeviceId,\n    DeviceName,\n    InitiatingProcessAccountName,\n    Activities,\n    Tactics,\n    Techniques,\n    Details,\n    EventCount"
query_type: kql
