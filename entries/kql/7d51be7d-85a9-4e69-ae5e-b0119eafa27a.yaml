id: 7d51be7d-85a9-4e69-ae5e-b0119eafa27a
name: Hunt for High Volume Phish ISP
description: 'KQL Query from file: Hunt for High Volume Phish ISP'
query: "//During my routine threat hunting, I observed that the ISP \"kuroit limited,\" which operates in the USA, London, and Amsterdam, is sending a significant number of malicious emails from gmail.com domains. This is something defenders should monitor and filter as necessary.\U0001F91D\n\nCloudAppEvents\n| where Application == \"Microsoft Exchange Online\"\n| where ActionType == \"TIMailData-Inline\"\n| where ActivityType == \"Securityevent\"\n| where ISP == \"kuroit limited\"\n| extend CAInternetMessageId = tostring(parse_json(RawEventData)[\"InternetMessageId\"])\n| join EmailEvents on $left.CAInternetMessageId == $right.InternetMessageId\n| where EmailDirection == \"Inbound\"\n"
query_type: kql
tactics:
    - TA0001
    - TA0043
    - TA0040
    - TA0005
techniques:
