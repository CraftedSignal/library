id: fd718718-f8c5-42ba-9970-f8c0f2098586
name: Suspicious Entra ID Actor Token Abuse - Cross-Tenant Impersonation (CVE-2025-55241)
description: Detects potential abuse of Microsoft Actor tokens for cross-tenant impersonation attacks targeting Entra ID tenants. This rule identifies suspicious audit log entries that may indicate exploitation of CVE-2025-55241, a critical vulnerability in Azure AD Graph API that allowed attackers to impersonate any user across Entra ID tenants using malicious Actor tokens.
query: "AuditLogs\r\n| where not(OperationName has \"group\")\r\n| where not(OperationName == \"Set directory feature on tenant\")\r\n| where InitiatedBy has \"user\"\r\n| where InitiatedBy.user.displayName has_any ( \"Office 365 Exchange Online\", \"Skype for Business Online\", \"Dataverse\", \"Office 365 SharePoint Online\", \"Microsoft Dynamics ERP\")"
query_type: kql
severity: medium
tactics:
    - TA0005
    - TA0004
techniques:
    - T1134
    - T1134.001
    - T1484
    - T1656
tags:
    - kql
author: Jason Nelson
version: "2"
references:
    - https://zeropath.com/blog/cve-2025-55241-azure-entra-elevation-of-privilege-summary
