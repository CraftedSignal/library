id: 8925f6d0-ae06-45cc-ad26-c037c6aa981b
name: CrowdStrike npm Packages Supply Chain Attack Shai-Hulud C2 Connections
description: "This rule detects network connections initiated by a process with a command line containing \"filesystem\", \"--json\", and \"--results=verified\", which is used to scan the entire filesystem.\n\nThis specific combination of command-line arguments is associated with the Shai-Hulud malware. "
query: "\r\nDeviceNetworkEvents\r\n| where InitiatingProcessCommandLine has_all (\"filesystem\", \"--json\", \"--results=verified\")\r\n| project Timestamp, DeviceName, ActionType, RemoteIP, RemoteUrl, InitiatingProcessFileName, InitiatingProcessCommandLine, InitiatingProcessParentFileName\r\n"
query_type: kql
severity: medium
tactics:
    - TA0001
techniques:
    - T1195
    - T1195.001
    - T1195.002
tags:
    - kql
version: "1"
references:
    - https://socket.dev/blog/ongoing-supply-chain-attack-targets-crowdstrike-npm-packages?utm_medium=feed
    - https://www.stepsecurity.io/blog/ctrl-tinycolor-and-40-npm-packages-compromised
