id: 019cf7b2-e076-77cf-a76e-81b881ae564b
name: Unusual or High-Risk Microsoft Graph API Actions
description: 'This rule detects several types of suspicious activities related to Microsoft Graph API calls, specifically targeting device management actions. It identifies: 1. Actions from an IP address not previously seen for a given caller identity. 2. Actions performed by a service principal that has not been observed before. 3. High-risk actions (e.g., device wipe, retire, remote lock, reset passcode) or device configuration changes occurring outside of business hours or on weekends. 4. Bulk device targeting, where a single caller identity performs actions on a large number of devices within a short time frame. These detections aim to identify potential compromise of accounts or malicious administrative actions.'
query: "// ============================================================\r\n// COMPOSITE: All Four Alert Conditions in a Single Scheduled Rule\r\n// Tag each hit with AlertType and Severity for triage efficiency\r\n// Run as: Scheduled Analytics Rule, every 1h, look back 1h\r\n// ============================================================\r\nlet AlertWindow     = 1h;\r\nlet LookbackWindow  = 30d;\r\nlet BurstWindow     = 15m;\r\nlet DeviceThreshold = 10;\r\nlet TZOffsetHours   = -6;\r\nlet BizStart        = 7;\r\nlet BizEnd          = 19;\r\nlet HighRiskActions = dynamic([\"/wipe\", \"/retire\", \"/resetPasscode\", \"/remoteLock\"]);\r\n// ── Shared base ──────────────────────────────────────────────\r\nlet BaseEvents =\r\n    MicrosoftGraphActivityLogs\r\n    | where TimeGenerated > ago(AlertWindow)\r\n    | where RequestMethod in (\"POST\", \"PATCH\")\r\n    | where RequestUri has_any(HighRiskActions)\r\n           or (RequestMethod == \"PATCH\" and RequestUri has \"/deviceConfigurations/\")\r\n    | extend CallerIdentity = iif(isnotempty(ServicePrincipalId), ServicePrincipalId, UserId)\r\n    | extend CallerType     = iif(isnotempty(ServicePrincipalId), \"ServicePrincipal\", \"User\")\r\n    | extend Action         = extract(@\"/(wipe|retire|resetPasscode|remoteLock)$\", 1, RequestUri)\r\n    | extend Action         = iif(isempty(Action), \"PatchDeviceConfig\", Action)\r\n    | extend TargetObjectId = extract(@\"/managedDevices/([^/]+)/\", 1, RequestUri)\r\n    | extend LocalTime      = TimeGenerated + (TZOffsetHours * 1h)\r\n    | extend HourOfDay      = hourofday(LocalTime)\r\n    | extend DayOfWeekNum   = toint(dayofweek(LocalTime) / 1d);\r\n// ── Baseline IP set ──────────────────────────────────────────\r\nlet KnownIPs =\r\n    MicrosoftGraphActivityLogs\r\n    | where TimeGenerated between (ago(LookbackWindow) .. ago(AlertWindow))\r\n    | where RequestUri has \"/deviceManagement/\"\r\n    | extend CallerIdentity = iif(isnotempty(ServicePrincipalId), ServicePrincipalId, UserId)\r\n    | summarize KnownIPSet = make_set(IPAddress, 500) by CallerIdentity;\r\n// ── Baseline SP set ──────────────────────────────────────────\r\nlet KnownSPs =\r\n    MicrosoftGraphActivityLogs\r\n    | where TimeGenerated between (ago(LookbackWindow) .. ago(AlertWindow))\r\n    | where isnotempty(ServicePrincipalId)\r\n    | summarize by ServicePrincipalId;\r\n// ── Signal 1: Unusual IP ─────────────────────────────────────\r\nlet UnusualIP =\r\n    BaseEvents\r\n    | join kind=leftouter KnownIPs on CallerIdentity\r\n    | where isempty(KnownIPSet) or not(set_has_element(KnownIPSet, IPAddress))\r\n    | extend AlertType = \"UnusualIP\", Severity = \"High\"\r\n    | project TimeGenerated, AlertType, Severity, CallerIdentity,\r\n              CallerType, IPAddress, Action, TargetObjectId, AppId, RequestUri;\r\n// ── Signal 2: New SP ─────────────────────────────────────────\r\nlet NewSP =\r\n    BaseEvents\r\n    | where isnotempty(ServicePrincipalId)\r\n    | join kind=leftanti KnownSPs on ServicePrincipalId\r\n    | extend AlertType = \"NewServicePrincipal\", Severity = \"Critical\"\r\n    | project TimeGenerated, AlertType, Severity,\r\n              CallerIdentity = ServicePrincipalId,\r\n              CallerType = \"ServicePrincipal\",\r\n              IPAddress, Action, TargetObjectId, AppId, RequestUri;\r\n// ── Signal 3: After Hours ────────────────────────────────────\r\nlet AfterHours =\r\n    BaseEvents\r\n    | where DayOfWeekNum in (0, 6)\r\n          or HourOfDay < BizStart\r\n          or HourOfDay >= BizEnd\r\n    | extend AlertType = \"AfterHoursAction\"\r\n    | extend Severity  = iif(Action in (\"wipe\", \"retire\"), \"High\", \"Medium\")\r\n    | project TimeGenerated, AlertType, Severity, CallerIdentity,\r\n              CallerType, IPAddress, Action, TargetObjectId, AppId, RequestUri;\r\n// ── Signal 4: Bulk Targeting ─────────────────────────────────\r\nlet BulkTarget =\r\n    BaseEvents\r\n    | where RequestMethod == \"POST\" and isnotempty(TargetObjectId)\r\n    | extend TimeBin = bin(TimeGenerated, BurstWindow)\r\n    | summarize\r\n        UniqueDevices = dcount(TargetObjectId),\r\n        DeviceList    = make_set(TargetObjectId, 50),\r\n        FirstEvent    = min(TimeGenerated),\r\n        Action        = take_any(Action),\r\n        IPAddress     = take_any(IPAddress),\r\n        AppId         = take_any(AppId),\r\n        RequestUri    = take_any(RequestUri)\r\n        by CallerIdentity, CallerType, TimeBin\r\n    | where UniqueDevices > DeviceThreshold\r\n    | extend TimeGenerated  = FirstEvent\r\n    | extend AlertType      = \"BulkDeviceTargeting\"\r\n    | extend Severity       = \"Critical\"\r\n    | extend TargetObjectId = tostring(DeviceList)\r\n    | project TimeGenerated, AlertType, Severity, CallerIdentity,\r\n              CallerType, IPAddress, Action, TargetObjectId, AppId, RequestUri;\r\n// ── Union all signals ────────────────────────────────────────\r\nunion UnusualIP, NewSP, AfterHours, BulkTarget\r\n| sort by\r\n    // Critical first, then by time\r\n    case(Severity == \"Critical\", 0, Severity == \"High\", 1, 2) asc,\r\n    TimeGenerated desc"
query_type: kql
severity: medium
