id: a7e68bfe-cccb-4689-9230-de3d01b28643
name: Antivirus Terminator by Storm-2603
description: |-
    Checks for the presence of the Antivirus Terminator files' hashes in the machine.
    i.e.: VMToolsEng.exe and ServiceMouse.sys
query: "// Source: https://research.checkpoint.com/2025/before-toolshell-exploring-storm-2603s-previous-ransomware-operations/\r\n// This query aims at detecting the EDR/Antivirus kill tool lately used by Storm-2603 in recent campaigns\r\n// The tool is composed by:\r\n// VMToolsEng.exe   – Custom Antivirus Terminator\r\n// ServiceMouse.sys – Vulnerable driver used by VMToolsEng.exe for killing Antivirus processes\r\n// The driver gets registered as a service under the name \"ServiceMouse\" (no robust detection, they can obviously change)\r\n\r\n// Looking for file presence on machine\r\nlet hashes = dynamic([\r\n                        \"aca888bbb300f75d69dd56bc22f87d0ed4e0f6b8ed5421ef26fc3523980b64ad\", //VMToolsEng.exe SHA256\r\n                        \"4709b47a402fdf58fe99a70fdadb58ee67fa61546d8c86241486668e61a879ca\"  //ServiceMouse.sys SHA256\r\n]);\r\nDeviceFileEvents\r\n| where SHA256 in (hashes)\r\n"
query_type: kql
severity: medium
tags:
    - Storm-2603
    - Antivirus Terminator
    - AToolsKrnl64.sys
    - kql
author: Nicholas Gobbo
version: "1"
references:
    - https://research.checkpoint.com/2025/before-toolshell-exploring-storm-2603s-previous-ransomware-operations/
