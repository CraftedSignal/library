id: 019c924b-1d7a-7058-a691-3eb97261df79
name: Detect Peak Traffic in Imperva WAF
description: This will show clearly the daily successful traffic for each day of the week, and then it will project the peak hours, medium and low hours of each day. And in the last column, it shows the Imperva rule that it hit, which also indicates if an attack was successful.
query: "//###############################################\r\n//##  PLATFORM: Imperva\r\n//##  AUTHOR: IGOR OLIVEIRA (Pr0fiLeRR)\r\n//##  LOCATION: Microsoft Sentinel | Logs\r\n//##  TITLE: Detect Peak Traffic in Imperva WAF\r\n//###############################################\r\nlet lookback_period = 7d;\r\nImpervaWAFCloud_CL\r\n    | where TimeGenerated > ago(lookback_period)\r\n    | extend DvcAction = act_s\r\n    | where DvcAction == \"REQ_PASSED\"\r\n    | extend \r\n        TimeGeneratedPST = datetime_utc_to_local(TimeGenerated, 'US/Pacific'),\r\n        Date = format_datetime(datetime_utc_to_local(TimeGenerated, 'US/Pacific'), 'yyyy-MM-dd'),\r\n        HourOfDay = hourofday(datetime_utc_to_local(TimeGenerated, 'US/Pacific')),\r\n        ImpervaRuleHit = Attack_Name_s\r\n    | summarize \r\n        HourlyCount = count(),\r\n        AttackTypes = make_set(ImpervaRuleHit)\r\n        by Date, HourOfDay\r\n    // Calculate percentiles per day\r\n    | join kind=inner (\r\n        ImpervaWAFCloud_CL\r\n        | where TimeGenerated > ago(lookback_period)\r\n        | extend DvcAction = act_s\r\n        | where DvcAction == \"REQ_PASSED\"\r\n        | extend \r\n            Date = format_datetime(datetime_utc_to_local(TimeGenerated, 'US/Pacific'), 'yyyy-MM-dd'),\r\n            HourOfDay = hourofday(datetime_utc_to_local(TimeGenerated, 'US/Pacific'))\r\n        | summarize HourlyCount = count() by Date, HourOfDay\r\n        | summarize \r\n            P90 = percentile(HourlyCount, 90),\r\n            P50 = percentile(HourlyCount, 50)\r\n            by Date\r\n    ) on Date\r\n    | extend \r\n        TrafficTier = case(\r\n            HourlyCount >= P90, \"\U0001F534 PEAK\",\r\n            HourlyCount >= P50, \"\U0001F7E1 MEDIUM\",\r\n            \"\U0001F7E2 LOW\"\r\n        ),\r\n        HourLabel = strcat(\"Hour \", HourOfDay, \": \", HourlyCount, \" (\", \r\n            case(\r\n                HourlyCount >= P90, \"\U0001F534 PEAK\",\r\n                HourlyCount >= P50, \"\U0001F7E1 MEDIUM\",\r\n                \"\U0001F7E2 LOW\"\r\n            ), \")\")\r\n    | order by Date desc, HourlyCount desc\r\n    | summarize \r\n        HourlyBreakdown = make_list(HourLabel),\r\n        DailyTotal = sum(HourlyCount),\r\n        PeakHours = countif(TrafficTier == \"\U0001F534 PEAK\"),\r\n        MediumHours = countif(TrafficTier == \"\U0001F7E1 MEDIUM\"),\r\n        LowHours = countif(TrafficTier == \"\U0001F7E2 LOW\"),\r\n        AllAttackTypes = make_set(AttackTypes)\r\n        by Date\r\n    | extend \r\n        DayOfWeek = case(\r\n            dayofweek(todatetime(Date)) == 0d, \"Sunday - WEEKEND\",\r\n            dayofweek(todatetime(Date)) == 1d, \"Monday\",\r\n            dayofweek(todatetime(Date)) == 2d, \"Tuesday\",\r\n            dayofweek(todatetime(Date)) == 3d, \"Wednesday\",\r\n            dayofweek(todatetime(Date)) == 4d, \"Thursday\",\r\n            dayofweek(todatetime(Date)) == 5d, \"Friday\",\r\n            dayofweek(todatetime(Date)) == 6d, \"Saturday - WEEKEND\",\r\n            \"Unknown\"\r\n        ),\r\n        NestedHours = strcat_array(HourlyBreakdown, \"\\n\"),\r\n        TrafficSummary = strcat(\r\n            \"Peak: \", PeakHours, \" hrs | \",\r\n            \"Medium: \", MediumHours, \" hrs | \",\r\n            \"Low: \", LowHours, \" hrs\"\r\n        ),\r\n        ImpervaRuleHit = strcat_array(array_concat(AllAttackTypes), \", \")\r\n    | project \r\n        Date,\r\n        DayOfWeek,\r\n        DailyTotal,\r\n        TrafficSummary,\r\n        NestedHours,\r\n        ImpervaRuleHit\r\n    | order by Date desc"
