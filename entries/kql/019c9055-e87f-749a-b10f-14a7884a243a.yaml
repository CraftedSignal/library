id: 019c9055-e87f-749a-b10f-14a7884a243a
name: macOS - Fake System Password Prompt via AppleScript
description: Detects the execution of 'osascript' to display a deceptive system dialog box mimicking a 'System Preferences' password prompt. This technique is used by malware like the Atomic macOS Stealer (AMOS) to trick users into entering their administrative password for credential theft.
query: "// Name: macOS - Fake System Password Prompt via AppleScript\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-02-24\r\n// Description: Detects the execution of 'osascript' to display a deceptive system dialog box mimicking a 'System Preferences' password prompt. This technique is used by malware like the Atomic macOS Stealer (AMOS) to trick users into entering their administrative password for credential theft.\r\n// Tactics: Credential Access, Defense Evasion\r\n// Techniques: T1204.001, T1056.002\r\n// False Positive Sensitivity: Medium\r\n// References: https://www.trendmicro.com/en_us/research/26/b/openclaw-skills-used-to-distribute-atomic-macos-stealer.html\r\nDeviceProcessEvents\r\n// Filter for the execution of osascript, the native macOS utility for running AppleScripts.\r\n| where FileName =~ \"osascript\"\r\n// Check for command line arguments used to create a fake password dialog.\r\n// The combination of \"display dialog\", \"password\", and \"System Preferences\" is highly indicative of a social engineering attempt.\r\n| where ProcessCommandLine has \"display dialog\" and ProcessCommandLine has \"password\" and ProcessCommandLine has \"System Preferences\"\r\n// FP Tuning: Legitimate (though poorly designed) administrative scripts might use similar prompts.\r\n// If false positives occur, consider filtering by specific parent processes or excluding known script hashes.\r\n// For example: `| where not(InitiatingProcessFileName in (\"legit_admin_tool.sh\"))`\r\n| project\r\n    Timestamp,\r\n    DeviceName,\r\n    AccountName,\r\n    FileName,\r\n    ProcessCommandLine,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessCommandLine,\r\n    InitiatingProcessParentFileName\r\n"
