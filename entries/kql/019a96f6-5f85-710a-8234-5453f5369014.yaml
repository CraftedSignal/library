id: 019a96f6-5f85-710a-8234-5453f5369014
name: Break-Glass Account Usage - On-Premises Active Directory
description: Detects any authentication activity (successful or failed) for emergency break-glass administrative accounts
query: "// Name: Break-Glass Account Usage - On-Premises Active Directory\r\n// MITRE ATT&CK: T1078.002, T1078.003\r\n// Description:\r\n// Detects any authentication activity (successful or failed) for emergency break-glass administrative accounts. Break-glass accounts have unrestricted Domain/Enterprise Admin privileges and should only be used during documented disaster recovery or critical incident response. Any usage represents either legitimate emergency access requiring executive notification, or unauthorized access indicating serious security breach.\r\n// Adversary objective: Persistent privileged access across entire on-premises infrastructure using legitimate credentials.\r\n// Data Sources:\r\n// - IdentityLogonEvents (Defender for Identity) - 30 day retention. Requires DfI sensors on all monitored domain controllers\r\nlet breakGlassAccounts = datatable(AccountName:string, AccountUpn:string)\r\n// add list of admin accounts\r\n[\r\n    \"displayname\", \"user.principalname\",\r\n    \"displayname\", \"user.principalname\"\r\n];\r\n// Normalize account identifiers for case-insensitive matching\r\nlet monitoredUsernames = breakGlassAccounts\r\n    | extend UsernameLower = tolower(AccountName)\r\n    | distinct UsernameLower;\r\nlet monitoredUpns = breakGlassAccounts\r\n    | extend UpnLower = tolower(AccountUpn)\r\n    | distinct UpnLower;\r\n// Query all logon activity for monitored accounts\r\nIdentityLogonEvents\r\n| where TimeGenerated > ago(7d)\r\n// Monitor all logon attempts (successful and failed)\r\n| where ActionType in (\"LogonSuccess\", \"LogonFailed\")\r\n// Normalize account fields for matching\r\n| extend AccountNameLower = tolower(AccountName)\r\n| extend AccountUpnLower = tolower(AccountUpn)\r\n| extend TargetAccountDisplayNameLower = tolower(TargetAccountDisplayName)\r\n// Match against break-glass account list (case-insensitive)\r\n| where AccountNameLower in (monitoredUsernames)\r\n    or AccountUpnLower in (monitoredUpns)\r\n    or TargetAccountDisplayNameLower in (monitoredUsernames)\r\n    or AccountNameLower in (monitoredUpns)\r\n// Extract additional fields from AdditionalFields JSON\r\n| extend\r\n    SourceAccountName = tostring(parse_json(AdditionalFields).SourceAccountName),\r\n    EncryptionType = tostring(parse_json(AdditionalFields).EncryptionType),\r\n    KerberosType = tostring(parse_json(AdditionalFields).KerberosType),\r\n    AttackTechniques = tostring(parse_json(AdditionalFields).AttackTechniques),\r\n    SourceComputerName = tostring(parse_json(AdditionalFields)[\"ACTOR.DEVICE\"][0]),\r\n    DestinationComputerOS = tostring(parse_json(AdditionalFields).DestinationComputerOperatingSystem)\r\n// Project all relevant context for investigation\r\n| project\r\n    TimeGenerated,\r\n    ActionType,\r\n    LogonType,\r\n    Protocol,\r\n    FailureReason,\r\n    AccountName,\r\n    AccountDomain,\r\n    AccountUpn,\r\n    AccountSid,\r\n    AccountDisplayName,\r\n    DeviceName,\r\n    IPAddress,\r\n    Port,\r\n    DestinationDeviceName,\r\n    DestinationIPAddress,\r\n    DestinationPort,\r\n    TargetAccountDisplayName,\r\n    Location,\r\n    ISP,\r\n    SourceAccountName,\r\n    EncryptionType,\r\n    KerberosType,\r\n    AttackTechniques,\r\n    SourceComputerName,\r\n    DestinationComputerOS,\r\n    ReportId,\r\n    AdditionalFields,\r\n    TenantId\r\n// Standardize fields for Sentinel entity mapping\r\n| extend\r\n    AccountIdentity = coalesce(AccountUpn, AccountName, TargetAccountDisplayName),\r\n    SourceIP = coalesce(IPAddress, \"N/A\"),\r\n    SourceHost = coalesce(DeviceName, SourceComputerName, \"N/A\"),\r\n    TargetHost = coalesce(DestinationDeviceName, \"N/A\")\r\n| order by TimeGenerated desc\r\n// Optional summary table\r\n// | summarize Actions=count() by bin(TimeGenerated, 1h), ActionType"
