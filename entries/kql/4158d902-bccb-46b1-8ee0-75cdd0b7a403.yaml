id: 4158d902-bccb-46b1-8ee0-75cdd0b7a403
name: Mustang Panda Call Notes Malware Campaign
description: Mustang Panda conducted a phishing campaign against Myanmar entities using a compromised embassy email. The lure involved a PDF with an embedded URL that delivered a ZIP archive containing a trojanized executable and malicious DLL. The malware disguised itself as a PDF, sideloaded the DLL, established persistence, and executed further payloads. It performed system reconnaissance, data exfiltration via SFTP, and defense evasion.
query: "let fileHashes = dynamic([\r\n    \"564a03763879aaed4da8a8c1d6067f4112d8e13bb46c2f80e0fcb9ffdd40384c\", // SolidPDFCreator.dll\r\n    \"fcf4efa82d477c924d42cc6b71aa672ab2381ca256769925ae34dabe2e77e025\"  // Call Notes.exe / MiediumInstStart.exe\r\n]);\r\nlet suspiciousProcesses = dynamic([\r\n    \"Call Notes.exe\",\r\n    \"MiediumInstStart.exe\"\r\n]);\r\nlet persistenceKeys = dynamic([\r\n    \"\\\\Software\\\\Microsoft\\\\Windows\\\\CurrentVersion\\\\Run\\\\MediumNetMonIt\",\r\n    \"\\\\Software\\\\Microsoft\\\\Windows\\\\CurrentVersion\\\\RunNotification\\\\StartupTNotiMediumNetMonIt\"\r\n]);\r\nlet remoteIPs = dynamic([\r\n    \"146.70.29.229\", // C2\r\n    \"202.59.10.106\"  // SFTP Exfil\r\n]);\r\nlet suspiciousPath = @\"C:\\ProgramData\\IDM\\logs\";\r\nlet suspiciousMutex = \"WilStaging_02\";\r\nlet suspiciousEventName = \"ghdudfxctysvac\"; \r\n\r\nunion isfuzzy=true\r\n(\r\n    // Search for suspicious file hashes being created or executed\r\n    union DeviceProcessEvents, DeviceFileEvents\r\n    | where SHA256 in~ (\"564a03763879aaed4da8a8c1d6067f4112d8e13bb46c2f80e0fcb9ffdd40384c\", \"fcf4efa82d477c924d42cc6b71aa672ab2381ca256769925ae34dabe2e77e025\")\r\n    | extend MatchedIndicator = SHA256, IndicatorType = \"FileHash\"\r\n    | project-reorder Timestamp, DeviceName, MatchedIndicator, IndicatorType, ActionType, FileName, FolderPath, ProcessCommandLine, InitiatingProcessCommandLine\r\n),\r\n(\r\n    // Search for suspicious process names\r\n    DeviceProcessEvents\r\n    | where FileName in~ (\"Call Notes.exe\",\"MiediumInstStart.exe\")\r\n    | extend MatchedIndicator = FileName, IndicatorType = \"ProcessName\"\r\n    | project-reorder Timestamp, DeviceName, MatchedIndicator, IndicatorType, ActionType, FileName, FolderPath, ProcessCommandLine, InitiatingProcessCommandLine\r\n),\r\n(\r\n    // Search for files dropped in a suspicious location\r\n    DeviceFileEvents\r\n    | where FolderPath has @\"C:\\ProgramData\\IDM\\logs\"\r\n    | extend MatchedIndicator = FolderPath, IndicatorType = \"FilePath\"\r\n    | project-reorder Timestamp, DeviceName, MatchedIndicator, IndicatorType, ActionType, FileName, FolderPath, InitiatingProcessCommandLine\r\n),\r\n(\r\n    // Search for registry keys used for persistence\r\n    DeviceRegistryEvents\r\n    | where RegistryKey has_any (\"\\\\Software\\\\Microsoft\\\\Windows\\\\CurrentVersion\\\\Run\\\\MediumNetMonIt\",\r\n    \"\\\\Software\\\\Microsoft\\\\Windows\\\\CurrentVersion\\\\RunNotification\\\\StartupTNotiMediumNetMonIt\")\r\n    | extend MatchedIndicator = RegistryKey, IndicatorType = \"RegistryKey\"\r\n    | project-reorder Timestamp, DeviceName, MatchedIndicator, IndicatorType, ActionType, RegistryKey, RegistryValueData\r\n),\r\n(\r\n    // Search for network connections to C2 or Exfil IPs\r\n    DeviceNetworkEvents\r\n    | where RemoteIP in~ (\"146.70.29.229\", \"202.59.10.106\")\r\n    | where (RemoteIP == \"146.70.29.229\" and RemotePort == 443) or (RemoteIP == \"202.59.10.106\" and RemotePort == 22)\r\n    | extend MatchedIndicator = strcat(RemoteIP, \":\", RemotePort), IndicatorType = \"NetworkIOC\"\r\n    | project-reorder Timestamp, DeviceName, MatchedIndicator, IndicatorType, ActionType, RemoteIP, RemotePort\r\n),\r\n(\r\n    // Search for specific mutex creation\r\n    DeviceEvents\r\n    | where ActionType == \"MutexCreated\" and AdditionalFields == \"WilStaging_02\"\r\n    | extend MatchedIndicator = \"WilStaging_02\", IndicatorType = \"Mutex\"\r\n    | project-reorder Timestamp, DeviceName, MatchedIndicator, IndicatorType, ActionType, ProcessCommandLine\r\n),\r\n(\r\n    // Search for a suspicious string that could be a named pipe or command line argument\r\n    DeviceEvents\r\n    | where ActionType == \"NamedPipeCreated\" and AdditionalFields == \"ghdudfxctysvac\"\r\n    | extend MatchedIndicator = \"ghdudfxctysvac\", IndicatorType = \"NamedPipe\"\r\n    | project-reorder Timestamp, DeviceName, MatchedIndicator, IndicatorType, ActionType, ProcessCommandLine\r\n),\r\n(\r\n    DeviceProcessEvents\r\n    | where ProcessCommandLine has \"ghdudfxctysvac\"\r\n    | extend MatchedIndicator = \"ghdudfxctysvac\", IndicatorType = \"CommandLine\"\r\n    | project-reorder Timestamp, DeviceName, MatchedIndicator, IndicatorType, ActionType, ProcessCommandLine\r\n)\r\n\r\n\r\n"
