id: 1c251d74-586b-425f-a595-f53fcfae855a
name: Detect Email Forwarding Creation Attempts Outside of Organization
description: "// Discover email forwarding creation attempts outside of your organization. \n"
query: "// Discover email forwarding creation attempts outside of your organization. \n// version 1.0\nOfficeActivity\n| where OfficeWorkload == \"Exchange\"\n| where Operation == \"Set-Mailbox\"\n| where RecordType == \"ExchangeAdmin\"\n| where Parameters contains \"ForwardingSmtpAddress\"\n| where Parameters !contains \"@domain\" //replace with your domain\n| project TimeGenerated, UserKey, Operation, Parameters, ClientIP\n"
query_type: kql
severity: medium
tags:
    - kql
author: Vibezz
version: "2"
