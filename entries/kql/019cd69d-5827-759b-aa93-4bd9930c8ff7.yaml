id: 019cd69d-5827-759b-aa93-4bd9930c8ff7
name: UDPGangster – Known C2 IP Communication
description: Detect traffic to the C2 server used by the backdoor linked to MuddyWater.
query: "let C2IP = \"64.7.198.12\";\r\nDeviceNetworkEvents\r\n| where RemoteIP == C2IP\r\n| project TimeGenerated, DeviceName, LocalIP, RemoteIP, Protocol, InitiatingProcessFileName, InitiatingProcessCommandLine\r\n"
query_type: kql
severity: medium
tags:
    - kql
version: "1"
