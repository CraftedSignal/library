id: ae5c89d8-2b1a-497f-909e-a5abaf68da9b
name: Detect Malicious Docusign
description: |-
    Suspicious Email Impersonating DocuSign Service Sent to {{RecipientEmailAddress}}
    Flags an inbound phishing email impersonating the DocuSign service using lookalike domains, URLs, or attachments.
query: "// Trusted DocuSign roots/subdomains\r\nlet TrustedDocu = @\"(?i)(^|\\.)docusign\\.(com|net)$\";\r\n\r\n// \"docusign\" typosquatting regex (case-insensitive):\r\n// allows separators between letters, leetspeak (o->0, s->5/$, i->1/l/|/!, g->9/q), and g/n transposition.\r\nlet DocuSquat = @\"(?i)d[\\W_]*[o0][\\W_]*[cсç¢][\\W_]*[uüv][\\W_]*[s5\\$][\\W_]*[i1l\\|!][\\W_]*(?:[gq9][\\W_]*n|n[\\W_]*[gq9])\";\r\n\r\n// ---- Attachments with DocuSign-looking names ----\r\nlet AttachWithDocu =\r\nEmailAttachmentInfo\r\n| extend AttachmentName = coalesce(\r\n        tostring(column_ifexists(\"FileName\",\"\")),\r\n        tostring(column_ifexists(\"AttachmentFileName\",\"\")),\r\n        tostring(column_ifexists(\"Name\",\"\")))\r\n| where isnotempty(AttachmentName)\r\n| where AttachmentName matches regex DocuSquat or tolower(AttachmentName) contains \"docusign\"\r\n| distinct NetworkMessageId;\r\n\r\n// ---- URLs/domains that look like DocuSign, split trusted vs untrusted ----\r\nlet UrlsDocu =\r\nEmailUrlInfo\r\n| extend UrlStr = tostring(Url), Dom = tostring(UrlDomain)\r\n| where UrlStr matches regex DocuSquat\r\n    or Dom matches regex DocuSquat\r\n    or ((tolower(Dom) startswith \"xn--\") and (tolower(UrlStr) has \"docu\" or tolower(UrlStr) has \"sign\")) // IDN/punycode hint\r\n| extend IsTrustedDocuUrl = iff(Dom matches regex TrustedDocu, true, false)\r\n| summarize\r\n    DocuUrls                  = make_set(Url, 100),\r\n    DocuUrlDomains            = make_set(UrlDomain, 100),\r\n    DocuUrlsTrusted           = make_set_if(Url, IsTrustedDocuUrl, 100),\r\n    DocuUrlsUntrusted         = make_set_if(Url, not(IsTrustedDocuUrl), 100),\r\n    DocuUrlDomainsTrusted     = make_set_if(UrlDomain, IsTrustedDocuUrl, 100),\r\n    DocuUrlDomainsUntrusted   = make_set_if(UrlDomain, not(IsTrustedDocuUrl), 100)\r\n  by NetworkMessageId;\r\n\r\n// ---- Aggregate recipients per message ----\r\nlet RecipientsByMsg =\r\nEmailEvents\r\n| extend Rcpt = tostring(column_ifexists(\"RecipientEmailAddress\",\"\"))\r\n| where isnotempty(Rcpt)\r\n| summarize Recipients = make_set(Rcpt, 1000) by NetworkMessageId;\r\n\r\n// ---- Main ----\r\nEmailEvents\r\n| extend Dom = tolower(coalesce(SenderMailFromDomain, SenderFromDomain))\r\n| where not(Dom matches regex TrustedDocu)   // exclude legit DocuSign sender roots/subdomains\r\n| where Dom matches regex DocuSquat\r\n   or tostring(Subject) matches regex DocuSquat\r\n   or NetworkMessageId in (AttachWithDocu)\r\n   or NetworkMessageId in (UrlsDocu | project NetworkMessageId)\r\n| join kind=leftouter UrlsDocu on NetworkMessageId\r\n| join kind=leftouter RecipientsByMsg on NetworkMessageId\r\n| extend DocuUrls                = coalesce(DocuUrls, dynamic([])),\r\n         DocuUrlsTrusted         = coalesce(DocuUrlsTrusted, dynamic([])),\r\n         DocuUrlsUntrusted       = coalesce(DocuUrlsUntrusted, dynamic([])),\r\n         DocuUrlDomains          = coalesce(DocuUrlDomains, dynamic([])),\r\n         DocuUrlDomainsTrusted   = coalesce(DocuUrlDomainsTrusted, dynamic([])),\r\n         DocuUrlDomainsUntrusted = coalesce(DocuUrlDomainsUntrusted, dynamic([])),\r\n         Recipients              = coalesce(Recipients, dynamic([]))\r\n| extend HasTrustedDocuUrlFlag   = array_length(DocuUrlDomainsTrusted) > 0\r\n| extend HasUntrustedDocuUrlFlag = array_length(DocuUrlsUntrusted) > 0\r\n| extend HasUntrustedDocuUrl     = toint(iif(HasTrustedDocuUrlFlag, 0, iif(HasUntrustedDocuUrlFlag, 1, 0)))\r\n// Sender/recipient/auth\r\n| extend SenderMailFromAddress = tostring(column_ifexists(\"SenderMailFromAddress\",\"\")),\r\n         SenderEmail = coalesce(SenderFromAddress, SenderMailFromAddress),\r\n         SenderIP = coalesce(tostring(column_ifexists(\"SenderIPv4\",\"\")), tostring(column_ifexists(\"SenderIP\",\"\"))),\r\n         RecipientEmailAddress = tostring(column_ifexists(\"RecipientEmailAddress\",\"\"))\r\n// ---- Delivery & Auth columns ----\r\n| extend\r\n    DeliveryAction          = tostring(column_ifexists(\"DeliveryAction\",\"\")),\r\n    DeliveryLocation        = tostring(column_ifexists(\"DeliveryLocation\",\"\")),\r\n    LatestDeliveryLocation  = tostring(column_ifexists(\"LatestDeliveryLocation\",\"\"))\r\n| extend DeliveryStatus = iff(isempty(LatestDeliveryLocation), DeliveryLocation, LatestDeliveryLocation)\r\n| extend AuthDetails = tostring(column_ifexists(\"AuthenticationDetails\",\"\"))\r\n| extend\r\n    SPF_raw   = tostring(coalesce(tostring(parse_json(AuthDetails).SPF),   extract(@\"(?i)spf[:=\\s]*([a-z]+)\",   1, AuthDetails))),\r\n    DKIM_raw  = tostring(coalesce(tostring(parse_json(AuthDetails).DKIM),  extract(@\"(?i)dkim[:=\\s]*([a-z]+)\",  1, AuthDetails))),\r\n    DMARC_raw = tostring(coalesce(tostring(parse_json(AuthDetails).DMARC), extract(@\"(?i)dmarc[:=\\s]*([a-z]+)\", 1, AuthDetails)))\r\n| extend\r\n    SPF   = iif(isempty(SPF_raw),   \"unknown\", tolower(SPF_raw)),\r\n    DKIM  = iif(isempty(DKIM_raw),  \"unknown\", tolower(DKIM_raw)),\r\n    DMARC = iif(isempty(DMARC_raw), \"unknown\", tolower(DMARC_raw))\r\n| project Timestamp,ReportId,\r\n          SenderEmail, SenderFromAddress, SenderMailFromAddress,\r\n          SenderFromDomain, SenderMailFromDomain, SenderIP,\r\n          Subject, RecipientEmailAddress, Recipients,DeliveryAction, DeliveryStatus, DeliveryLocation, LatestDeliveryLocation,SPF, DKIM, DMARC,\r\n          NetworkMessageId, UrlCount, AttachmentCount,\r\n          DocuUrlDomains, DocuUrlDomainsTrusted, DocuUrlDomainsUntrusted,\r\n          DocuUrls, DocuUrlsTrusted, DocuUrlsUntrusted,\r\n          HasUntrustedDocuUrl\r\n| where HasUntrustedDocuUrl == 1 and DeliveryStatus !contains \"Quarantine\"\r\n| order by Timestamp desc\r\n"
query_type: kql
severity: medium
tags:
    - kql
version: "1"
references:
    - https://github.com/sublime-security/sublime-rules/blob/main/detection-rules/abuse_docusign_sus_names.yml
