id: f511537c-1b6f-4005-a4e5-e2180c29ff18
name: Chrome Extension (CRX) - Malicious Extension Install Detection
description: Detects the creation of Chrome extension files (.crx) that match known malicious extension IDs. Malicious CRX files on endpoints can indicate an attacker dropped or installed a malicious extension (e.g., credential harvesters, redirectors, miners). The rule flags CRX creation with known bad IDs and requires available file hashes for further investigation.
query: "// ============================================================================\r\n// Chrome Extension (CRX) - Malicious Extension Install Detection\r\n// Author: KillBillKill98\r\n// Last Updated: 2025-09-18\r\n// ============================================================================\r\n// Tactic: Initial Access (TA0001) / Persistence (TA0003)\r\n// Technique: Spearphishing / Malicious Extension Install / Persistence via Browser Extensions\r\n// (no single ATT&CK technique precisely maps to malicious browser extension installs — map to relevant tactics)\r\n// Description & Rationale:\r\n//  - Detect creation of Chrome extension files (.crx) that match known malicious extension IDs.\r\n//  - Malicious CRX files on endpoints can indicate an attacker dropped/installed a malicious extension\r\n//    (credential harvesters, redirectors, miners, etc.). Flag CRX creation with known bad IDs and available file hashes.\r\n// ============================================================================\r\n\r\nlet MaliciousChromeExtensionID = dynamic([\r\n\"emedckhdnioeieppmeojgegjfkhdlaeo\",\"eaijffijbobmnonfhilihbejadplhddo\",\"lbneaaedflankmgmfbmaplggbmjjmbae\",\r\n\"hmiaoahjllhfgebflooeeefeiafpkfde\",\"pdkmmfdfggfpibdjbbghggcllhhainjo\",\"jiofmdifioeejeilfkpegipdjiopiekl\",\r\n\"acmfnomgphggonodopogfbmkneepfgnh\",\"hihblcmlaaademjlakdpicchbjnnnkbo\",\"ndlbedplllcgconngcnfmkadhokfaaln\",\r\n\"bibjgkidgpfbblifamdlkdlhgihmfohh\",\"pkgciiiancapdlpcbppfkmeaieppikkk\",\"epdjhgbipjpbbhoccdeipghoihibnfja\",\r\n\"bbdnohkpnbkdkmnkddobeafboooinpla\",\"befflofjcniongenjmbkgkoljhgliihe\",\"cedgndijpacnfbdggppddacngjfdkaca\",\r\n\"nnpnnpemnckcfdebeekibpiijlicmpom\",\"dpggmcodlahmljkhlmpgpdcffdaoccni\",\"cplhlgabfijoiabgkigdafklbhhdkahj\",\r\n\"egmennebgadmncfjafcemlecimkepcle\",\"mnhffkhmpnefgklngfmlndmkimimbphc\",\"oaikpkmjciadfpddlpjjdapglcihgdle\",\r\n\"fbmlcbhdmilaggedifpihjgkkmdgeljh\",\"kkodiihpgodmdankclfibbiphjkfdenh\",\"oeiomhmbaapihbilkfkhmlajkeegnjhe\",\r\n\"igbodamhgjohafcenbcljfegbipdfjpk\",\"bgejafhieobnfpjlpcjjggoboebonfcg\",\"llimhhconnjiflfimocjggfjdlmlhblm\",\r\n\"hodiladlefdpcbemnbbcpclbmknkiaem\",\"epikoohpebngmakjinphfiagogjcnddm\",\"pajkjnmeojmbapicmbpliphjmcekeaac\",\r\n\"ogbhbgkiojdollpjbhbamafmedkeockb\",\"eanofdhdfbcalhflpbdipkjjkoimeeod\",\"ekpkdmohpdnebfedjjfklhpefgpgaaji\",\r\n\"miglaibdlgminlepgeifekifakochlka\",\"mbindhfolmpijhodmgkloeeppmkhpmhc\",\"didhgeamncokiaegffipckhhcpnmlcbl\"\r\n]);\r\n\r\nDeviceFileEvents\r\n| where ActionType == \"FileCreated\"\r\n| where FileName endswith \".crx\"\r\n// FileName may be \"<extension_id>.crx\" or include the ID; check substrings against known IDs\r\n| where FileName has_any(MaliciousChromeExtensionID) or FolderPath has_any(\"Chrome\", \"Extensions\", \"Edge\")\r\n| where isnotempty(SHA1) or isnotempty(SHA256)\r\n| extend DetectionType = \"Malicious Chrome Extension (CRX) Created\"\r\n| project Timestamp,\r\n          DeviceId,\r\n          DeviceName,\r\n          FolderPath,\r\n          FileName,\r\n          SHA1,\r\n          SHA256,\r\n          InitiatingProcessFileName,\r\n          InitiatingProcessCommandLine,\r\n          ReportId,\r\n          DetectionType\r\n| order by Timestamp desc"
query_type: kql
severity: medium
