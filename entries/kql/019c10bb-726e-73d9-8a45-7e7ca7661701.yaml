id: 019c10bb-726e-73d9-8a45-7e7ca7661701
name: Vulnerable Anti-Cheat Driver Access
description: Detects processes opening a handle to the device symbolic link '\\.\HtAntiCheatDriver'. This is the static interface for the vulnerable GameDriverX64.sys driver (CVE-2025-61155) used by the Interlock ransomware group in Bring Your Own Vulnerable Driver (BYOVD) attacks to disable security software.
query: |-
    DeviceFileEvents
    | where FolderPath =~ "\\.\\HtAntiCheatDriver"
query_type: kql
severity: high
tactics:
    - TA0004
    - TA0005
techniques:
    - T1068
    - T1562.001
tags:
    - attack.t1068
    - attack.t1562.001
    - attack.defense_evasion
    - attack.privilege_escalation
    - cve.2025.61155
author: detections.ai
version: "2"
references:
    - Internal Intel ID 84413e18dcc8ea039bcf512168e32d8d75169e2b971e642a21f38cfb31b32cd5
    - https://www.cisa.gov/news-events/cybersecurity-advisories/aa25-203a
    - https://connect.securonix.com/threat-research-intelligence-62/cve-2025-61155-and-interlock-ransomware-a-converging-threat-198
data_sources:
    - file_event
    - windows
