id: 87436e89-11dd-42c1-926e-d0dc90a99eb1
name: Detect Microsoft Domain Spoofing in Inbound Emails
description: This rule detects inbound emails where the sender's domain contains "microsoft" but does not end with "microsoft.com". This is a common tactic used in phishing attacks to spoof legitimate Microsoft domains, tricking recipients into believing the email is from a trusted source.
query: "#### Let's say your organization is monitoring email traffic for potential phishing attacks. \n#### You are specifically concerned about attackers who might spoof email addresses to look like they are from microsoft, a well-known company.\n#### Attackers might use domains like \"microsoft-azure.com\" or \"support-microsoft.net\" to trick recipients into thinking the emails are legitimate. This KQl can help you identify those fake URL Domains\n\n#### Query:\n```KQL\nEmailEvents_CL\n| join EmailEvents_CL on NetworkMessageId_g\n| where EmailDirection_s == \"Inbound\"\n| where LatestDeliveryAction_s == \"Delivered\"\n| where SenderFromDomain_s contains \"microsoft\"\n| where SenderFromDomain_s !endswith \"microsoft.com\" \n```\n\n"
query_type: kql
tactics:
    - TA0001
    - TA0005
techniques:
    - T1566
    - T1672
tags:
    - kql
version: "1"
