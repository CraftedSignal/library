id: 019b2783-ef4b-75fa-af65-dda882c8e782
name: Curl to PowerShell Execution | Storm-0249 EDR Exploitation
description: Detects the use of curl.exe to download content from a remote source and pipe it directly into PowerShell for execution. This is a fileless execution technique used by adversaries like Storm-0249 to bypass traditional file-based defenses.
query: |
    // Name: Curl to PowerShell Execution
    // Author: detections.ai
    // Date: 2025-12-16
    // Description: Detects the use of curl.exe to download content from a remote source and pipe it directly into PowerShell for execution. This is a fileless execution technique used by adversaries like Storm-0249 to bypass traditional file-based defenses.
    // MITRE ATT&CK: T1059.001
    // References: https://reliaquest.com/blog/threat-spotlight-storm-0249-precision-endpoint-exploitation/
    // False Positive Sensitivity: Medium
    DeviceProcessEvents
    // Look for the execution of curl.exe, a command-line tool for transferring data with URL syntax.
    | where FileName =~ "curl.exe"
    // Check for command lines where curl's output is piped to PowerShell.
    // The pipe character "|" redirects the standard output of one command to the standard input of another.
    | where ProcessCommandLine has "|" and ProcessCommandLine contains "powershell"
    // FP Tuning: This technique can be used by legitimate administrators.
    // Consider filtering for command lines that do not contain scripts from trusted repositories or known internal tools.
    // Example: | where InitiatingProcessCommandLine !has "internal-admin-script.ps1"
    | project
        TimeGenerated,
        DeviceName,
        AccountName,
        FileName,
        ProcessCommandLine,
        InitiatingProcessFileName,
        InitiatingProcessCommandLine,
        MD5,
        SHA1,
        SHA256
query_type: kql
severity: medium
tactics:
    - TA0002
    - TA0005
techniques:
    - T1059.001
    - T1027.011
tags:
    - kql
version: "3"
references:
    - https://reliaquest.com/blog/threat-spotlight-storm-0249-precision-endpoint-exploitation/
