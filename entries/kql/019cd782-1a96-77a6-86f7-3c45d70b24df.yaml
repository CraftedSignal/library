id: 019cd782-1a96-77a6-86f7-3c45d70b24df
name: Office app spawns a LOLBin
description: 'KQL Query from file: Office app spawns a LOLBin'
query: "\r\nDeviceProcessEvents\r\n| where InitiatingProcessFileName in~ (\"excel.exe\",\"winword.exe\",\"powerpnt.exe\",\"mspub.exe\",\"visio.exe\",\"outlook.exe\",\"onenote.exe\")\r\n| where FileName in~ (\"msdt.exe\",\"schtasks.exe\",\"cscript.exe\",\"cmd.exe\",\"powershell.exe\",\"wscript.exe\",\"scrcons.exe\",\r\n                      \"regsvr32.exe\",\"hh.exe\",\"wmic.exe\",\"mshta.exe\",\"rundll32.exe\",\"msiexec.exe\",\"forfiles.exe\",\r\n                      \"scriptrunner.exe\",\"svchost.exe\",\"control.exe\",\"certutil.exe\")\r\n//\r\n// Exclude printing-related rundll32 executions (printer driver store + known functions)\r\n//\r\n| where not(\r\n    FileName =~ \"rundll32.exe\"\r\n    and (\r\n        // DLL path in the printer driver store\r\n        ProcessCommandLine has @\"\\windows\\system32\\spool\\drivers\\x64\\3\\\"\r\n        or FolderPath has @\"\\windows\\system32\\spool\\drivers\\x64\\3\\\"\r\n    )\r\n    and (\r\n        // Common printer-monitor exports seen in your data\r\n        ProcessCommandLine has_any (\"MonitorPrintJobStatus\", \"CheckDevice\")\r\n    )\r\n)\r\n| project Timestamp, DeviceName, ActionType, AccountName, AccountDomain, FileName, FolderPath, ProcessId,\r\n          ProcessCommandLine, InitiatingProcessFileName, InitiatingProcessCommandLine, InitiatingProcessFolderPath,\r\n          InitiatingProcessId, InitiatingProcessParentFileName, InitiatingProcessParentId, InitiatingProcessAccountDomain,\r\n          InitiatingProcessAccountName, ProcessVersionInfoCompanyName, ProcessVersionInfoProductName,\r\n          ProcessVersionInfoProductVersion, ProcessVersionInfoInternalFileName, ProcessVersionInfoOriginalFileName,\r\n          ProcessVersionInfoFileDescription, FileSize, SHA256, ReportId, DeviceId\r\n| order by Timestamp desc\r\n"
query_type: kql
severity: medium
tags:
    - kql
version: "2"
