id: 019c8a6b-fbcb-75af-a109-9a3fb9e8341d
name: Malicious AI Model File Execution via Python
description: This rule detects suspicious child processes (e.g., shells) spawned by a Python process shortly after it has accessed a .nemo or .safetensors model file. This behavior is indicative of a malicious model file exploiting a vulnerability (like those in Hydra) to achieve Remote Code Execution. The file access event serves as a contextual trigger, linking the suspicious behavior to the loading of a potentially compromised AI model.
query: "// Name: Malicious AI Model File Execution\r\n// Author: adarsh pandey\r\n// Date: 2026-02-23\r\n// Description: This rule detects suspicious child processes (e.g., shells) spawned by a Python process shortly after it has accessed a .nemo or .safetensors model file. This behavior is indicative of a malicious model file exploiting a vulnerability (like those in Hydra) to achieve Remote Code Execution. The file access event serves as a contextual trigger, linking the suspicious behavior to the loading of a potentially compromised AI model.\r\n// False Positive Sensitivity: Medium\r\n// References: https://unit42.paloaltonetworks.com/rce-vulnerabilities-in-ai-python-libraries/\r\n// Tactics: Execution\r\n// Techniques: T1059.006\r\n// Severity: High\r\nlet lookback = 15m;\r\n// Define suspicious child processes often used for command and control or second-stage execution.\r\nlet suspicious_children = dynamic([\"cmd.exe\", \"powershell.exe\", \"pwsh.exe\", \"sh\", \"bash\", \"curl.exe\", \"wget.exe\", \"cscript.exe\", \"wscript.exe\"]);\r\nlet python_interpreters = dynamic([\"python.exe\", \"python3.exe\", \"pythonw.exe\"]);\r\n// Find Python processes that have spawned a suspicious child process.\r\nlet python_spawning_suspicious_child =\r\nDeviceProcessEvents\r\n| where Timestamp > ago(lookback)\r\n// The parent process is a Python interpreter.\r\n| where InitiatingProcessFileName in~ (python_interpreters)\r\n// The spawned child process is on our suspicious list.\r\n| where FileName in~ (suspicious_children)\r\n| project ChildProcessCreationTime = Timestamp, DeviceId, InitiatingProcessId, InitiatingProcessCommandLine, ChildProcessCommandLine = ProcessCommandLine;\r\n// Find file events where a .nemo or .safetensors file was read, likely to be loaded into memory.\r\nDeviceFileEvents\r\n| where Timestamp > ago(lookback)\r\n// FileRead or FileAccessed indicates the model is being loaded.\r\n| where ActionType in (\"FileAccessed\", \"FileRead\")\r\n| where FileName endswith \".nemo\" or FileName endswith \".safetensors\"\r\n// The process accessing the file is a Python interpreter.\r\n| where InitiatingProcessFileName in~ (python_interpreters)\r\n// Correlate the file access with the suspicious process creation.\r\n| join kind=inner (python_spawning_suspicious_child) on DeviceId, InitiatingProcessId\r\n// The key correlation: the suspicious child process must be created shortly AFTER the model file is accessed.\r\n| where ChildProcessCreationTime > Timestamp and ChildProcessCreationTime < (Timestamp + 2m)\r\n// Potential False Positives: Some legitimate data science or MLOps tools might exhibit this behavior.\r\n// Review the Python script being run (InitiatingProcessCommandLine) and the child process command line for legitimacy.\r\n// Exclude trusted scripts or servers if this behavior is expected.\r\n// ex: | where InitiatingProcessCommandLine !contains \"trusted_ml_script.py\"\r\n| project\r\n    Timestamp,\r\n    DeviceName,\r\n    ModelFileName = FileName,\r\n    ModelFilePath = FolderPath,\r\n    PythonProcess = InitiatingProcessCommandLine,\r\n    SuspiciousChildProcess = ChildProcessCommandLine,\r\n    ParentProcessId = InitiatingProcessId\r\n"
query_type: kql
severity: medium
tactics:
    - TA0002
techniques:
