id: 019c9535-6e4c-765b-9944-3923a56cba7d
name: CVE-2026-1731 Malware Payloads Detection
description: This rule detects files by their SHA256 hash that are known to be associated with the exploitation of CVE-2026-1731. This includes payloads such as SparkRAT, VShell, and various web shells and droppers.
query: |
    // Name: CVE-2026-1731 Malware Payloads
    // Author: Ethan Andrews + detections.ai
    // Date: 2026-02-25
    // Description: This rule detects files by their SHA256 hash that are known to be associated with the exploitation of CVE-2026-1731. This includes payloads such as SparkRAT, VShell, and various web shells and droppers.
    // Tags: CVE-2026-1731, SparkRAT, VShell, Malware, IOC
    // Tactics: Execution, Persistence
    // Techniques: T1219, T1505.003
    // References: https://unit42.paloaltonetworks.com/beyondtrust-cve-2026-1731/
    // False Positive Sensitivity: Medium
    let lookback = 7d;
    // Define the list of known malicious file hashes associated with CVE-2026-1731 exploitation
    let maliciousHashes = dynamic([
        "9f431d5549a03aee92cfd2bdbbe90f1c91e965c99e90a0c9ad5a001f4e80c350", // SparkRAT
        "98a7b0900a9072bb40af579ec372da7b27af12b15868394df51fefe290ab176b", // VShell
        "66cceb2c2f1d9988b501832fd3b559775982e2fce4ab38fc4ffe71b74eafc726", // maintenance.php
        "679ee05d92a858b6fe70aeb6072eb804548f1732e18b6c181af122b833386afb", // d6
        "4762e944a0ce1f9aef243e11538f84f16b6f36560ed6e32dfd9a5f99e17e8e50", // Installer for SimpleHelp
        "98442387d466f27357d727b3706037a4df12a78602b93df973b063462a677761", // aws.php
        "cc2bc3750cc5125a50466f66ae4f2bedf1cac0e43477a78ed2fd88f3e987a292", // Bash Script
        "cf83e1357eefb8bdf1542850d66d8007d620e4050b5715dc83f4a921d36ce9ce", // file_save.php
        "0ecc867ce916d01640d76ec03de24d1d23585eb582e9c48a0364c62a590548ac"  // Unknown payload
    ]);
    DeviceFileEvents
    | where TimeGenerated > ago(lookback)
    // Match any file creation or modification event where the hash is in the malicious list
    | where SHA256 in (maliciousHashes)
    // FP-TUNING: Hash-based detections have a very low false positive rate. However, if a legitimate internal tool matches one of these hashes, it should be investigated and can be excluded here.
    // For example: | where FileName !~ "legit_tool.exe"
    | project
        timestamp = TimeGenerated,
        DeviceName,
        InitiatingProcessAccountName,
        FileName,
        FolderPath,
        SHA256,
        InitiatingProcessCommandLine
query_type: kql
severity: medium
tactics:
    - TA0011
    - TA0003
techniques:
    - T1219
    - T1505.003
tags:
    - kql
author: Ethan Andrews
version: "3"
references:
    - https://unit42.paloaltonetworks.com/beyondtrust-cve-2026-1731/
