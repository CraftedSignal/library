id: 019c0dac-a9f4-75fc-bde7-45e51499f080
name: PeckBirdy Persistent Victim ID File Creation
description: Detects the creation of a file named '___unique_id___' in a temporary directory. This file is a specific host artifact created by the PeckBirdy framework to store a persistent victim identifier for tracking purposes.
query: "DeviceFileEvents\r\n| where ActionType == \"FileCreated\"\r\n| where FileName == \"___unique_id___\"\r\n| where FolderPath contains @\"\\Temp\\\" or FolderPath contains @\"\\tmp\\\"\r\n| project\r\n    TimeGenerated,\r\n    DeviceName,\r\n    AccountName,\r\n    FileName,\r\n    FolderPath,\r\n    SHA256,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessCommandLine,\r\n    InitiatingProcessId"
query_type: kql
severity: medium
tactics:
    - TA0003
techniques:
    - T1547.001
    - T1012
tags:
    - kql
author: Kaung Khant Ko
version: "1"
references:
    - https://www.trendmicro.com/en_us/research/26/a/peckbirdy-script-framework.html
