id: 019c8a6b-6b65-76cc-88d4-96cf1acb592c
name: Hydra Instantiation Evasion in AI Model Configuration
description: This rule detects attempts to bypass security controls in AI/ML libraries that use the Hydra framework. It identifies when a model configuration file contains a '_target_' value that uses an implicit or non-standard import path to reference a dangerous function (e.g., 'some.module.os.system'). This is an evasion technique to achieve Remote Code Execution (RCE) while bypassing simple blocklists.
query: "// Name: Hydra Instantiation Evasion in AI Model Configuration\r\n// Author: adarsh pandey\r\n// Date: 2026-02-23\r\n// Description: This rule detects attempts to bypass security controls in AI/ML libraries that use the Hydra framework. It identifies when a model configuration file contains a '_target_' value that uses an implicit or non-standard import path to reference a dangerous function (e.g., 'some.module.os.system'). This is an evasion technique to achieve Remote Code Execution (RCE) while bypassing simple blocklists.\r\n// False Positive Sensitivity: Medium\r\n// References: https://unit42.paloaltonetworks.com/rce-vulnerabilities-in-ai-python-libraries/\r\n// Tactics: Execution\r\n// Techniques: T1059.006\r\n// Severity: High\r\n// Define the file extensions for AI/ML model configuration files.\r\nlet file_extensions = dynamic([\".json\", \".yaml\"]);\r\n// Specify the target table containing file data. This rule assumes a data source that provides file content or command lines that write file content.\r\n// You may need to replace 'DeviceFileEvents' with the actual table name in your environment.\r\nDeviceFileEvents\r\n// Filter for file creation or modification events.\r\n| where ActionType in (\"FileCreated\", \"FileModified\")\r\n// Filter for relevant configuration file types.\r\n| where FileName has_any (file_extensions) or FileName in~ (\"config.json\", \"model_config.yaml\")\r\n// Join with process events to get the command line that created/modified the file.\r\n| join kind=inner (DeviceProcessEvents | project ProcessCommandLine, InitiatingProcessCommandLine, ProcessCreationTime, DeviceId, ReportId) on DeviceId, ReportId\r\n// The time window for the join should be small to correlate the process and file event accurately.\r\n| where ProcessCreationTime between (ago(2m) .. Timestamp)\r\n// The core detection logic checks for the '_target_' keyword combined with a regex pattern matching an implicit import of a dangerous function.\r\n| where ProcessCommandLine has \"_target_\"\r\n    and (\r\n        ProcessCommandLine matches regex @\"['\"\"][\\w\\.]+\\.os\\.system['\"\"]\" or\r\n        ProcessCommandLine matches regex @\"['\"\"][\\w\\.]+\\.subprocess\\.run['\"\"]\" or\r\n        ProcessCommandLine matches regex @\"['\"\"][\\w\\.]+\\.subprocess\\.call['\"\"]\" or\r\n        ProcessCommandLine matches regex @\"['\"\"][\\w\\.]+\\.builtins\\.exec['\"\"]\" or\r\n        ProcessCommandLine matches regex @\"['\"\"][\\w\\.]+\\.eval['\"\"]\"\r\n    )\r\n// Potential False Positives: Highly customized or esoteric development environments might use complex module paths that could trigger this rule.\r\n// Review the full command line and initiating process to assess legitimacy. Exclude trusted build servers or developer machines if necessary.\r\n// ex: | where DeviceName !in (\"dev-machine-01\", \"ci-build-server\")\r\n| project\r\n    Timestamp,\r\n    DeviceName,\r\n    ActionType,\r\n    FileName,\r\n    FolderPath,\r\n    InitiatingProcessCommandLine,\r\n    ProcessCommandLine\r\n"
query_type: kql
severity: medium
tactics:
    - TA0002
techniques:
