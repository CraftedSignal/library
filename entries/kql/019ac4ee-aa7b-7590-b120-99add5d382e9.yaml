id: 019ac4ee-aa7b-7590-b120-99add5d382e9
name: LANDFALL Android Spyware Hash Detection
description: Detects known malicious files associated with the LANDFALL Android spyware by their SHA256 hash. This provides a high-fidelity method for identifying the presence of the spyware on an endpoint.
query: |
    // Name: LANDFALL Malware Hashes
    // Author: detections.ai
    // Date: 2025-11-27
    // Description: Detects known malicious files associated with the LANDFALL Android spyware by their SHA256 hash. This provides a high-fidelity method for identifying the presence of the spyware on an endpoint.
    // False Positive Sensitivity: Medium
    // Reference: https://unit42.paloaltonetworks.com/landfall-is-new-commercial-grade-android-spyware/
    // MITRE TTPs: T1204.002
    // Data Source: DeviceFileEvents, DeviceImageLoadEvents
    let Timeframe = 1d;
    // Known SHA256 hashes for LANDFALL spyware components and delivery files.
    let Landfall_Hashes = dynamic([
        "b06dec10e8ad0005ebb9da24204c96cb2e297bd8d418bc1c8983d066c0997756",
        "c0f30c2a2d6f95b57128e78dc0b7180e69315057e62809de1926b75f86516b2e",
        "9297888746158e38d320b05b27b0032b2cc29231be8990d87bc46f1e06456f93",
        "d2fafc7100f33a11089e98b660a85bd479eab761b137cca83b1f6d19629dd3b0",
        "384f073d3d51e0f2e1586b6050af62de886ff448735d963dfc026580096d81bd",
        "b975b499baa3119ac5c2b3379306d4e50b9610e9bba3e56de7dfd3927a96032d",
        "a62a2400bf93ed84ebadf22b441924f904d3fcda7d1507ba309a4b1801d44495",
        "29882a3c426273a7302e852aa77662e168b6d44dcebfca53757e29a9cdf02483",
        "2425f15eb542fca82892fd107ac19d63d4d112ddbfe698650f0c25acf6f8d78a",
        "b45817ffb0355badcc89f2d7d48eecf00ebdf2b966ac986514f9d971f6c57d18",
        "69cf56ac6f3888efa7a1306977f431fd1edb369a5fd4591ce37b72b7e01955ee",
        "211311468f3673f005031d5f77d4d716e80cbf3c1f0bb1f148f2200920513261",
        "ffeeb0356abb56c5084756a5ab0a39002832403bca5290bb6d794d14b642ffe2"
    ]);
    union DeviceFileEvents, DeviceImageLoadEvents
    | where Timestamp > ago(Timeframe)
    // Match any file creation, modification, or load event with a known malicious hash.
    | where SHA256 in (Landfall_Hashes)
    // Potential for False Positives: Extremely low. A hash match is a high-confidence indicator. A false positive could theoretically occur due to a hash collision or if a benign file was incorrectly added to the threat intelligence source.
    | project
        Timestamp,
        DeviceName,
        ActionType,
        FileName,
        FolderPath,
        SHA256,
        InitiatingProcessFileName,
        ReportId
    | sort by Timestamp desc
query_type: kql
severity: medium
tactics:
    - TA0002
techniques:
    - T1204.002
tags:
    - kql
version: "3"
references:
    - https://unit42.paloaltonetworks.com/landfall-is-new-commercial-grade-android-spyware/
