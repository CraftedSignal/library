id: 019c9699-5756-77cf-8e6e-0deaa2c8c7f0
name: Detect when AD Users get the Status of 'AtRisk'
description: This query detect when a AD user end up becoming Risky for some reason.
query: "//##########################################################\r\n//##  PLATFORM: Entra ID\r\n//##  AUTHOR: IGOR OLIVEIRA (Pr0fiLeRR)\r\n//##  LOCATION: Microsoft Sentinel | Logs\r\n//##  TITLE: Detect when AD Users get the Status of 'AtRisk'\r\n//##########################################################\r\nlet LookbackRiskyUsers = 1h;      // CHANGED: 90d → 1h (only recent risky user states. change this back for visualization if needed)\r\nlet LookbackRiskEvents = 24h;     // CHANGED: 90d → 24h (recent risk events for context)\r\nlet LookbackSignins = 1h;         // CHANGED: 90d → 1h (only very recent sign-ins)\r\nlet LookbackAuditLogs = 24h;      // CHANGED: 90d → 24h (recent admin actions)\r\nlet RiskThresholds = dynamic(['medium', 'high']);\r\nlet RiskStates = dynamic(['atRisk']);\r\n// Step 1: Get current risky users (most recent state per user)\r\nlet RiskyUsers = \r\n    AADRiskyUsers\r\n    | where TimeGenerated > ago(LookbackRiskyUsers)\r\n    | where RiskLevel in (RiskThresholds)\r\n    | where RiskState in (RiskStates)\r\n    | summarize arg_max(TimeGenerated, *) by UserPrincipalName\r\n    | project \r\n        UserPrincipalName,\r\n        UserDisplayName,\r\n        RiskyUser_TimeGenerated = TimeGenerated,\r\n        RiskState,\r\n        RiskLevel,\r\n        RiskDetail,\r\n        RiskLastUpdatedDateTime;\r\n// Step 2: Get associated risk events with parsed risk reasons\r\nlet RiskEventsRaw = \r\n    AADUserRiskEvents\r\n    | where TimeGenerated > ago(LookbackRiskEvents)\r\n    | where RiskLevel in (RiskThresholds)\r\n    | where RiskState in (RiskStates)\r\n    | project UserPrincipalName, RiskEventType, Source, DetectionTimingType, AdditionalInfo, TimeGenerated\r\n    | mv-apply AdditionalInfoItem = AdditionalInfo on (\r\n        where tostring(AdditionalInfoItem.Key) == \"riskReasons\"\r\n        | project RiskReasonsArray = parse_json(tostring(AdditionalInfoItem.Value))\r\n    )\r\n    | mv-expand RiskReason = RiskReasonsArray\r\n    | extend RiskReasonText = tostring(RiskReason);\r\n// Step 3: Summarize risk events\r\nlet RiskEvents = \r\n    RiskEventsRaw\r\n    | summarize \r\n        RiskEventTypes = make_set(RiskEventType),\r\n        RiskSources = make_set(Source),\r\n        DetectionTypes = make_set(DetectionTimingType),\r\n        RiskReasons = make_set(RiskReasonText),\r\n        RiskEventCount = dcount(TimeGenerated),\r\n        MostRecentRiskEvent = max(TimeGenerated)\r\n        by UserPrincipalName;\r\n// Step 4: Get recent sign-in activity\r\nlet RecentSignins = \r\n    SigninLogs\r\n    | where TimeGenerated > ago(LookbackSignins)\r\n    | summarize \r\n        RecentIPAddresses = make_set(IPAddress, 5),\r\n        RecentApps = make_set(AppDisplayName, 5),\r\n        RecentLocations = make_set(tostring(LocationDetails.city), 5),\r\n        SigninCount = count(),\r\n        LastSignin = max(TimeGenerated)\r\n        by UserPrincipalName;\r\n// Step 5: Get admin actions on user risk state\r\nlet AdminActions = \r\n    AuditLogs\r\n    | where TimeGenerated > ago(LookbackAuditLogs)\r\n    | extend \r\n        TargetUser = tostring(TargetResources[0].userPrincipalName),\r\n        Admin = tostring(InitiatedBy.user.userPrincipalName),\r\n        Action = OperationName,\r\n        ActionTime = parse_json(AdditionalDetails)[2].value\r\n    | summarize arg_max(TimeGenerated, *) by TargetUser\r\n    | project TargetUser, ActionTime, Action, Admin, Result;\r\n// Step 6: Get Risk Level transition history\r\nlet RiskLevelTransitions = \r\n    AADRiskyUsers\r\n    | where TimeGenerated > ago(LookbackRiskyUsers)\r\n    | project UserPrincipalName, TimeGenerated, RiskLevel, RiskState\r\n    | sort by UserPrincipalName asc, TimeGenerated asc\r\n    | serialize\r\n    | extend PreviousRiskLevel = prev(RiskLevel, 1)\r\n    | extend PreviousTime = prev(TimeGenerated, 1)\r\n    | where UserPrincipalName == prev(UserPrincipalName, 1)\r\n    | where RiskLevel != PreviousRiskLevel\r\n    | extend Transition = strcat(PreviousRiskLevel, \" → \", RiskLevel)\r\n    | summarize \r\n        RiskLevelHistory = make_list(pack('Time', TimeGenerated, 'From', PreviousRiskLevel, 'To', RiskLevel, 'Transition', Transition), 10)\r\n    by UserPrincipalName\r\n    | extend MostRecentTransition = tostring(RiskLevelHistory[0].Transition)\r\n    | project UserPrincipalName, RiskLevelHistory, MostRecentTransition;\r\n// Step 7: Get user identity information\r\nlet UserIdentity = \r\n    IdentityInfo\r\n    | where TimeGenerated > ago(LookbackRiskyUsers)\r\n    | summarize arg_max(TimeGenerated, *) by AccountUPN\r\n    | project AccountUPN, Department, JobTitle;\r\n// Step 8: Get admin identity information\r\nlet AdminIdentity = \r\n    IdentityInfo\r\n    | where TimeGenerated > ago(LookbackAuditLogs)\r\n    | summarize arg_max(TimeGenerated, *) by AccountUPN\r\n    | project \r\n        AdminUPN = AccountUPN, \r\n        AdminDepartment = Department, \r\n        AdminJobTitle = JobTitle;\r\n// FINAL DETECTION QUERY\r\nRiskyUsers\r\n| join kind=leftouter (RiskEvents) on UserPrincipalName\r\n| join kind=leftouter (RecentSignins) on UserPrincipalName\r\n| join kind=leftouter (AdminActions) on $left.UserPrincipalName == $right.TargetUser\r\n| join kind=leftouter (RiskLevelTransitions) on UserPrincipalName\r\n| join kind=leftouter (UserIdentity) on $left.UserPrincipalName == $right.AccountUPN\r\n| join kind=leftouter (AdminIdentity) on $left.Admin == $right.AdminUPN\r\n| where AdminDepartment != \"Information Security\" or isempty(AdminDepartment)\r\n// ADDED: Entity mapping fields for Sentinel\r\n| extend \r\n    AccountCustomEntity = UserPrincipalName,\r\n    HostCustomEntity = tostring(split(UserPrincipalName, \"@\")[1]),\r\n    IPCustomEntity = tostring(RecentIPAddresses[0])\r\n| project\r\n    TimeGenerated = RiskyUser_TimeGenerated,\r\n    UserPrincipalName,\r\n    UserDisplayName,\r\n    Department,\r\n    JobTitle,\r\n    Admin,\r\n    AdminDepartment,\r\n    AdminJobTitle,\r\n    RiskState,\r\n    RiskLevel,\r\n    MostRecentTransition,\r\n    RiskEventTypes,\r\n    RiskReasons,\r\n    RiskLevelHistory,\r\n    ActionTime,\r\n    Action,\r\n    Result,\r\n    RiskDetail,\r\n    RiskLastUpdatedDateTime,\r\n    RiskSources,\r\n    DetectionTypes,\r\n    MostRecentRiskEvent,\r\n    RecentIPAddresses,\r\n    RecentApps,\r\n    RecentLocations,\r\n    LastSignin,\r\n    AccountCustomEntity,\r\n    HostCustomEntity,\r\n    IPCustomEntity\r\n| sort by RiskLevel desc, TimeGenerated desc"
query_type: kql
severity: medium
tags:
    - kql
author: Igor Oliveira (Pr0fiLeRR)
version: "1"
