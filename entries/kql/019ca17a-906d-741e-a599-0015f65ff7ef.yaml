id: 019ca17a-906d-741e-a599-0015f65ff7ef
name: APT36 Deceptive Hard Link Creation
description: Detects the creation of a hard link using mklink.exe, where the source is in C:\ProgramData and the destination is an executable in a user's AppData or Temp directory. This technique was observed in an APT36 campaign to stage and execute payloads while evading path-based detections.
query: "// Name: APT36 Deceptive Hard Link Creation\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-02-27\r\n// Description: Detects the creation of a hard link using mklink.exe, where the source is in C:\\ProgramData and the destination is an executable in a user's AppData or Temp directory. This technique was observed in an APT36 campaign to stage and execute payloads while evading path-based detections.\r\n// Tactics: Defense Evasion\r\n// Techniques: T1036, T1564\r\n// References: https://www.cyfirma.com/research/apt36-multi-vector-execution-malware-campaign-targeting-indian-government-entities/\r\n// False Positive Sensitivity: Medium\r\nDeviceProcessEvents\r\n// Look for command prompt executions, which is used to launch mklink\r\n| where FileName =~ \"cmd.exe\"\r\n// The command line must contain 'mklink' and the '/h' flag for hard link creation\r\n| where ProcessCommandLine has_all (\"mklink\", \"/h\")\r\n// The source file is staged in the C:\\ProgramData directory, a common staging area for malware\r\n| where ProcessCommandLine has \"C:\\\\ProgramData\\\\\"\r\n// The destination (hard link) is an executable file created in a user-writable directory like AppData or Temp\r\n| where (ProcessCommandLine has \"\\\\AppData\\\\\" or ProcessCommandLine has \"\\\\Temp\\\\\") and ProcessCommandLine has \".exe\"\r\n// Potential for False Positives: Legitimate installers or software development tools might use mklink in a similar fashion.\r\n// To reduce noise, consider excluding known legitimate parent processes or specific command lines associated with trusted software.\r\n// | where InitiatingProcessFileName !in~ (\"legit_installer.exe\", \"dev_tool.exe\")\r\n| project AccountName, DeviceName, FileName, FolderPath, InitiatingProcessCommandLine, InitiatingProcessFileName, ProcessCommandLine"
