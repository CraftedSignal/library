id: 710ae7ee-e808-4178-a5d7-712997fca0bf
name: Malicious IP Network Connections Detection
description: This detection identifies network connections to specific malicious IP addresses known as indicators of compromise, related to malicious activities.
query: |-
    # Specific Malicious IPs Detection

    ## Description
    This detection identifies network connections to a specific set of known malicious IP addresses. These IPs have been identified as indicators of compromise associated with malicious activities.

    ## Detection Logic
    The query monitors network events for connections to any of the specified malicious IP addresses.

    ## Query
    ```kusto
    DeviceNetworkEvents
    | where (RemoteIP =~ "89.248.165.72" or RemoteIP =~ "116.204.211.22" or RemoteIP =~ "120.36.97.210" or RemoteIP =~ "47.88.21.70" or RemoteIP =~ "112.5.154.7" or RemoteIP =~ "193.149.176.112")
    ```

    ## Malicious IPs
    - 89.248.165.72
    - 116.204.211.22
    - 120.36.97.210
    - 47.88.21.70
    - 112.5.154.7
    - 193.149.176.112

    ## MITRE ATT&CK Mapping
    - **Tactic**: Command and Control
    - **Technique**: T1071 - Application Layer Protocol

    ## Severity
    High

    ## Investigation Steps
    1. Identify all devices that connected to these IPs
    2. Review the processes that initiated these connections
    3. Check for data exfiltration patterns
    4. Look for malware on affected systems
    5. Block these IPs at the firewall level
    6. Review historical logs for past connections
query_type: kql
version: "1"
