id: 019c39e4-4e89-74cf-b4ff-95778298c587
name: Multi-Platform Infostealer Activity Detection
description: This rule detects various activities associated with multiple infostealers targeting macOS and Windows. It identifies the mounting of malicious Disk Image (DMG) files for DigitStealer and Atomic Stealer, curl-based exfiltration attempts by DigitStealer and MacSync, and renamed Python binaries used by PXA Stealer. The rule also looks for process execution patterns related to PXA Stealer, process injection involving cvtres.exe, and VBS/batch file drops and AutoIT abuse by Eternidade Stealer. Additionally, it detects network connections and scheduled task creation by Crystal PDF, as well as known malicious file hashes and network communication with known command and control (C2) domains associated with these threats.
query: |
    // Author: Daniel Jeremiah | Date: 2026/02/07
    // Ref: https://www.microsoft.com/en-us/security/blog/2026/02/02/infostealers-without-borders-macos-python-stealers-and-platform-abuse/

    /*
    Infostealers are expanding beyond Windows to target macOS, Python-based stealers, and trusted platforms. Microsoft Defender Experts observed DigitStealer (fake DynamicLake DMG), MacSync (Terminal copy-paste), Atomic Stealer (fake AlliAi DMG), PXA Stealer (renamed Python svchost, cvtres injection), Eternidade Stealer via WhatsApp abuse, and malicious Crystal PDF installer. These queries detect mounting of malicious DMGs, curl exfiltration, renamed Python binaries, process injection, VBS/batch drops, AutoIT abuse, and Crystal PDF persistence and C2.
    */
    let KnownHashes = datatable(SHA256:string) [
        "3e20ddb90291ac17cef9913edd5ba91cd95437da86e396757c9d871a82b1282a",
        "da99f7570b37ddb3d4ed650bc33fa9fbfb883753b2c212704c10f2df12c19f63",
        "42d51feea16eac568989ab73906bbfdd41641ee3752596393a875f85ecf06417",
        "2c885d1709e2ebfcaa81e998d199b29e982a7559b9d72e5db0e70bf31b183a5f",
        "6168d63fad22a4e5e45547ca6116ef68bb5173e17e25fd1714f7cc1e4f7b41e1",
        "3bd6a6b24b41ba7f58938e6eb48345119bbaf38cd89123906869fab179f27433",
        "5d929876190a0bab69aea3f87988b9d73713960969b193386ff50c1b5ffeadd6",
        "bdd2b7236a110b04c288380ad56e8d7909411da93eed2921301206de0cb0dda1",
        "495697717be4a80c9db9fe2dbb40c57d4811ffe5ebceb9375666066b3dda73c3",
        "de07516f39845fb91d9b4f78abeb32933f39282540f8920fe6508057eedcbbea",
        "598da788600747cf3fa1f25cb4fa1e029eca1442316709c137690e645a0872bb",
        "3bc62aca7b4f778dabb9ff7a90fdb43a4fdd4e0deec7917df58a18eb036fac6e",
        "c72f8207ce7aebf78c5b672b65aebc6e1b09d00a85100738aabb03d95d0e6a95",
        "9d867ddb54f37592fa0ba1773323e2ba563f44b894c07ebfab4d0063baa6e777",
        "08a1f4566657a07688b905739055c2e352e316e38049487e5008fc3d1253d03b",
        "5970d564b5b2f5a4723e548374d54b8f04728473a534655e52e5decef920e733",
        "59855f0ec42546ce2b2e81686c1fbc51e90481c42489757ac03428c0daee6dfe",
        "a5b19195f61925ede76254aaad942e978464e93c7922ed6f064fab5aad901efc",
        "e7237b233fc6fda614e9e3c2eb3e03eeea94f4baf48fe8976dcc4bc9f528429e",
        "59347a8b1841d33afdd70c443d1f3208dba47fe783d4c2015805bf5836cff315",
        "e965eb96df16eac9266ad00d1087fce808ee29b5ee8310ac64650881bc81cf39"
    ];
    let KnownDomains = ["dynamiclake.org", "booksmagazinetx.com", "goldenticketsshop.com",
        "b93b559cf522386018e24069ff1a8b7a.pages.dev", "67e5143a9ca7d2240c137ef80f2641d6.pages.dev",
        "barbermoo.coupons", "barbermoo.fun", "barbermoo.shop", "barbermoo.space",
        "barbermoo.today", "barbermoo.top", "barbermoo.world", "barbermoo.xyz",
        "alli-ai.pro", "ai.foqguzz.com", "day.foqguzz.com", "bagumedios.cloud",
        "Negmari.com", "Ramiort.com", "Strongdwn.com"];
    union (
        DeviceProcessEvents
        | where FileName has_any ("mount_hfs", "mount") and ProcessCommandLine has_all ("-o nodev", "-o quarantine") and ProcessCommandLine contains "/Volumes/Install DynamicLake"
        | project Timestamp, DeviceName, Detection = "DigitStealer_DMG", Details = ProcessCommandLine,
        FileName, ProcessCommandLine, InitiatingProcessFileName,
        EventTable = "DeviceProcessEvents",
        EventType = "ProcessCreated",
        ActionType
        ,
        DeviceProcessEvents
        | where InitiatingProcessFileName has_any ("bash", "sh") and ProcessCommandLine has_all ("curl", "--retry 10") and ProcessCommandLine contains "hwid="
        | where ProcessCommandLine endswith "api/credentials" or ProcessCommandLine endswith "api/grabber" or ProcessCommandLine endswith "api/log"
        | project Timestamp, DeviceName, Detection = "DigitStealer_Exfil", Details = ProcessCommandLine,
        FileName, ProcessCommandLine, InitiatingProcessFileName,
        EventTable = "DeviceProcessEvents",
        EventType = "ProcessCreated",
        ActionType
        ,
        DeviceProcessEvents
        | where InitiatingProcessFileName =~ "zsh" and FileName =~ "curl"
        | where ProcessCommandLine has_all ("curl -k -X POST -H", "api-key: ", "--max-time", "-F file=@/tmp/", ".zip", "-F buildtxd=")
        | project Timestamp, DeviceName, Detection = "MacSync_Exfil", Details = ProcessCommandLine,
        FileName, ProcessCommandLine, InitiatingProcessFileName,
        EventTable = "DeviceProcessEvents",
        EventType = "ProcessCreated",
        ActionType
        ,
        DeviceProcessEvents
        | where FileName has_any ("mount_hfs", "mount") and ProcessCommandLine has_all ("-o nodev", "-o quarantine") and ProcessCommandLine contains "/Volumes/ALLI"
        | project Timestamp, DeviceName, Detection = "AtomicStealer_DMG", Details = ProcessCommandLine,
        FileName, ProcessCommandLine, InitiatingProcessFileName,
        EventTable = "DeviceProcessEvents",
        EventType = "ProcessCreated",
        ActionType
        ,
        DeviceProcessEvents
        | where InitiatingProcessFileName endswith "svchost.exe" and InitiatingProcessVersionInfoOriginalFileName == "pythonw.exe"
        | project Timestamp, DeviceName, Detection = "PXA_C1_RenamedPython", Details = ProcessCommandLine,
        FileName, ProcessCommandLine, InitiatingProcessFileName,
        EventTable = "DeviceProcessEvents",
        EventType = "ProcessCreated",
        ActionType
        ,
        DeviceNetworkEvents
        | where InitiatingProcessFileName endswith "svchost.exe" and InitiatingProcessVersionInfoOriginalFileName == "pythonw.exe"
        | project Timestamp, DeviceName, Detection = "PXA_C1_RenamedPython_Net", Details = RemoteUrl,
        FileName = InitiatingProcessFileName, ProcessCommandLine = InitiatingProcessCommandLine, InitiatingProcessFileName,
        EventTable = "DeviceNetworkEvents",
        EventType = "ConnectionSuccess",
        ActionType
        ,
        DeviceProcessEvents
        | where ProcessCommandLine has_all ("-y", "x", "C:", "Users", "Public", ".pdf") and ProcessCommandLine has_any (".jpg", ".png")
        | project Timestamp, DeviceName, Detection = "PXA_C2_ProcessExec", Details = ProcessCommandLine,
        FileName, ProcessCommandLine, InitiatingProcessFileName,
        EventTable = "DeviceProcessEvents",
        EventType = "ProcessCreated",
        ActionType
        ,
        DeviceProcessEvents
        | where FileName == "cvtres.exe" and InitiatingProcessFileName has "svchost.exe" and InitiatingProcessFolderPath !contains "system32"
        | project Timestamp, DeviceName, Detection = "PXA_C2_Inject", Details = ProcessCommandLine,
        FileName, ProcessCommandLine, InitiatingProcessFileName,
        EventTable = "DeviceProcessEvents",
        EventType = "ProcessCreated",
        ActionType
        ,
        DeviceFileEvents
        | where InitiatingProcessCommandLine has_all ("Downloads", ".vbs") and FileName has_any (".zip", ".lnk", ".bat") and FolderPath has_all ("\\Temp\\")
        | project Timestamp, DeviceName, Detection = "Eternidade_VBS_Drops", Details = strcat(FileName, " | ", FolderPath),
        FileName, ProcessCommandLine = InitiatingProcessCommandLine, InitiatingProcessFileName,
        EventTable = "DeviceFileEvents",
        EventType = "FileCreated",
        ActionType
        ,
        DeviceProcessEvents
        | where InitiatingProcessParentFileName == "wscript.exe" and InitiatingProcessCommandLine has_any ("instalar.bat", "python_install.bat") and ProcessCommandLine !has "conhost.exe"
        | project Timestamp, DeviceName, Detection = "Eternidade_Batch", Details = ProcessCommandLine,
        FileName, ProcessCommandLine, InitiatingProcessFileName,
        EventTable = "DeviceProcessEvents",
        EventType = "ProcessCreated",
        ActionType
        ,
        DeviceProcessEvents
        | where InitiatingProcessCommandLine has ".log" and InitiatingProcessVersionInfoOriginalFileName == "Autoit3.exe"
        | project Timestamp, DeviceName, Detection = "Eternidade_AutoIT", Details = ProcessCommandLine,
        FileName, ProcessCommandLine, InitiatingProcessFileName,
        EventTable = "DeviceProcessEvents",
        EventType = "ProcessCreated",
        ActionType
        ,
        DeviceNetworkEvents
        | where InitiatingProcessVersionInfoOriginalFileName == "CrystalPDF.exe"
        | project Timestamp, DeviceName, Detection = "CrystalPDF_Net", Details = RemoteUrl,
        FileName = InitiatingProcessFileName, ProcessCommandLine = InitiatingProcessCommandLine, InitiatingProcessFileName,
        EventTable = "DeviceNetworkEvents",
        EventType = "ConnectionSuccess",
        ActionType
        ,
        DeviceEvents
        | where InitiatingProcessVersionInfoProductName == "CrystalPDF" and ActionType == "ScheduledTaskCreated"
        | project Timestamp, DeviceName, Detection = "CrystalPDF_Persistence", Details = "ScheduledTaskCreated",
        FileName = InitiatingProcessFileName, ProcessCommandLine = InitiatingProcessCommandLine, InitiatingProcessFileName,
        EventTable = "DeviceEvents",
        EventType = "ScheduledTaskCreated",
        ActionType
        ,
        DeviceFileEvents
        | where SHA256 in ((KnownHashes) | project SHA256)
        | project Timestamp, DeviceName, Detection = "KnownHash", Details = strcat(FileName, " | ", SHA256),
        FileName, ProcessCommandLine = InitiatingProcessCommandLine, InitiatingProcessFileName,
        EventTable = "DeviceFileEvents",
        EventType = "FileCreated",
        ActionType
        ,
        DeviceNetworkEvents
        | where RemoteUrl has_any (KnownDomains)
        | project Timestamp, DeviceName, Detection = "KnownDomain", Details = RemoteUrl,
        FileName = InitiatingProcessFileName, ProcessCommandLine = InitiatingProcessCommandLine, InitiatingProcessFileName,
        EventTable = "DeviceNetworkEvents",
        EventType = "ConnectionSuccess",
        ActionType
    )
    | sort by Timestamp desc
query_type: kql
tags:
    - kql
version: "2"
