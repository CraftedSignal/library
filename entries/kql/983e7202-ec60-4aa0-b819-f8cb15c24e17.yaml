id: 983e7202-ec60-4aa0-b819-f8cb15c24e17
name: CISA Emergency Directive - Mitigate Microsoft Exchange Vulnerability
description: A post-authentication vulnerability (CVE-2025-53786) in Microsoft Exchange hybrid-joined configurations.
query: "let PatchVersion = dynamic([\"15.02.2562.017\",\"15.02.1748.026\",\"15.02.1748.024\",\"15.01.2507.057\",\"15.01.2507.055\"]);\r\nDeviceProcessEvents\r\n| where TimeGenerated > ago(90d)\r\n| where InitiatingProcessVersionInfoProductName has \"Microsoft® Exchange\"\r\n| summarize arg_max(TimeGenerated, *) by DeviceId\r\n| where not (InitiatingProcessVersionInfoProductVersion has_any(PatchVersion))"
query_type: kql
severity: medium
tactics:
    - TA0004
tags:
    - kql
author: Steven Lim
version: "1"
references:
    - https://www.cisa.gov/news-events/directives/ed-25-02-mitigate-microsoft-exchange-vulnerability
