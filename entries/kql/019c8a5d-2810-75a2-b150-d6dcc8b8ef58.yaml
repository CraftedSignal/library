id: 019c8a5d-2810-75a2-b150-d6dcc8b8ef58
name: Malicious VS Code Auto-Run Task for Download Cradle
description: Detects when a Visual Studio Code or Cursor task automatically executes a shell command that downloads and runs content from the internet. This behavior is indicative of the "Contagious Interview" campaign, where a malicious .vscode/tasks.json file is used to achieve execution when a user opens and trusts a workspace. The rule specifically looks for shell processes spawned by IDEs, where the command line contains both a download utility (e.g., curl, wget) and a shell-based executor (e.g., iex, sh, bash, cmd), and pipes or chains the downloader output directly into an executor.
query: "// Name: Malicious VS Code Auto-Run Task\r\n// Author: adarsh pandey\r\n// Date: 2026-02-23\r\n// Description: Detects when a Visual Studio Code or Cursor task automatically executes a shell command that downloads and runs content from the internet. This behavior is indicative of the \"Contagious Interview\" campaign, where a malicious .vscode/tasks.json file is used to achieve execution when a user opens and trusts a workspace.\r\n// False Positive Sensitivity: Medium\r\n// References: https://securitylabs.datadoghq.com/articles/ide-shepherd-release-article/\r\n// Tactics: Execution, Initial Access\r\n// Techniques: T1059.005, T1566.001\r\nlet ideProcesses = dynamic([\"Code.exe\", \"Cursor.exe\", \"code-oss\"]);\r\nlet shellProcesses = dynamic([\"powershell.exe\", \"pwsh.exe\", \"cmd.exe\", \"sh\", \"bash\", \"zsh\"]);\r\nlet downloaders = dynamic([\"curl\", \"wget\", \"irm\", \"Invoke-WebRequest\", \"Invoke-RestMethod\"]);\r\nlet executors = dynamic([\"iex\", \"Invoke-Expression\", \"sh\", \"bash\", \"cmd\"]);\r\nDeviceProcessEvents\r\n// Look for shell processes spawned by a common IDE process.\r\n| where InitiatingProcessFileName in~ (ideProcesses)\r\n| where FileName in~ (shellProcesses)\r\n// Identify command lines that contain both a download utility and a shell-based executor.\r\n| where ProcessCommandLine has_any (downloaders) and ProcessCommandLine has_any (executors)\r\n// Focus on commands that pipe or chain the downloader output directly into an executor, a strong indicator of a \"download cradle\".\r\n// This helps distinguish from legitimate, separate developer commands in an integrated terminal.\r\n// FP Note: Some legitimate bootstrap scripts or development tasks may use this pattern. Consider excluding known script paths or trusted repositories if noise occurs.\r\n| where ProcessCommandLine matches regex @'(\\||&&|;)\\s*(iex|Invoke-Expression|sh|bash|cmd)'\r\n| project\r\n    Timestamp,\r\n    DeviceName,\r\n    AccountName,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessCommandLine,\r\n    FileName,\r\n    ProcessCommandLine,\r\n    ParentProcessId,\r\n    ProcessId\r\n"
query_type: kql
severity: medium
