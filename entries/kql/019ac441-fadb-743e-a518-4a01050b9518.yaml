id: 019ac441-fadb-743e-a518-4a01050b9518
name: Water Gamayun APT Group Attack Detection
description: Water Gamayun Group is actively exploiting Windows MMC vulnerability to deliver hidden PowerShell payloads and final malware loaders.
query: "//A compromised legitimate site and a lookalike domain were used in tandem to deliver a double-extension RAR payload disguised as a PDF, abusing user trust.\r\n//The initial payload exploited MSC EvilTwin (CVE-2025-26633) to inject code into mmc.exe, leveraging TaskPad snap-in commands to kick off a series of hidden PowerShell stages.\r\n//A compromised website, layered obfuscation, password-protected archives, and process-hiding via a small .NET class kept user detection to a minimum while a decoy document was used to preserve the user's perception of a normal interaction.\r\n//Zscaler Threat Hunting attributed the campaign with high confidence to Water Gamayun based on TTPs consistent with public reporting, including their unique exploitation of MSC EvilTwin, signature obfuscation patterns, infrastructure dual-path design, window-hiding tradecraft, and specific social engineering themes\r\nlet startTime = ago(7d);\r\nlet endTime = now();\r\n\r\n// Water Gamayun IoCs from Zscaler research\r\nlet maliciousIPs = dynamic([\r\n    \"103.246.147.17\"\r\n]);\r\n\r\nlet maliciousDomains = dynamic([\r\n    \"belaysolutions.com\", \"belaysolutions.link \"\r\n]);\r\n\r\nlet maliciousHashes = dynamic([\r\n    \"ba25573c5629cbc81c717e2810ea5afc\", // Add more hashes from IoC\r\n    \"f3d83363ea68c707021bde0870121177\",\r\n    \"97e4a6cbe8bda4c08c868f7bcf801373\",\r\n    \"caaaef4cf9cf8e9312da1a2a090f8a2c\",\r\n    \"f645558e8e7d5e4f728020af6985dd3f\",\r\n    \"e4b6c675f33796b6cf4d930d7ad31f95\"\r\n]);\r\n\r\nlet maliciousFilenames = dynamic([\r\n    \"Hiring_assistant.pdf.rar\",\"UnRAR.exe\",\"as_it_1_fsdfcx.rar\",\"as_it_1_fsdfcx.txt\",\"ItunesC.rar\",\"doc.pdf\"\r\n]);\r\n\r\n// Define suspicious processes for post-exploitation reconnaissance\r\nlet susProcs = dynamic([\"route.exe\", \"quser.exe\", \"curl.exe\", \"setspn.exe\", \"klist.exe\", \"whoami.exe\", \"net.exe\", \"nltest.exe\"]);\r\n\r\n// TTP1: Suspicious file downloads with IoCs\r\nlet FileDownloads = \r\n    DeviceFileEvents\r\n    | where Timestamp between (startTime .. endTime)\r\n    | where FileName has \".pdf.rar\" or FileName has \".txt.rar\" or FileName has \".doc.rar\"\r\n       or FileName in~ (maliciousFilenames)\r\n       or MD5 in~ (maliciousHashes)\r\n    | where InitiatingProcessFileName in~ (\"msedge.exe\", \"chrome.exe\", \"firefox.exe\", \"winrar.exe\", \"7z.exe\")\r\n    | extend ReportId = strcat(\"FileDownload_\", DeviceId, \"_\", Timestamp)\r\n    | project \r\n        Timestamp, \r\n        DeviceId,\r\n        DeviceName, \r\n        TTP = \"TTP1-DoubleExtensionArchive\",\r\n        FileName, \r\n        FolderPath, \r\n        InitiatingProcessFileName,\r\n        MD5,\r\n        ReportId,\r\n        Evidence = strcat(\"Suspicious file: \", FileName, \" with hash: \", MD5);\r\n\r\n// TTP1: Suspicious process chain from archives with IoCs\r\nlet ArchiveProcessChain = \r\n    DeviceProcessEvents\r\n    | where Timestamp between (startTime .. endTime)\r\n    | where FileName in~ (\"mmc.exe\", \"powershell.exe\", \"cmd.exe\", \"msiexec.exe\", \"SilentPrism.exe\", \"Gamayun.exe\")\r\n       or FolderPath contains \"SilentPrism\"\r\n       or FolderPath contains \"Gamayun\"\r\n    | where (InitiatingProcessFileName has \"rar.exe\" or \r\n             InitiatingProcessFileName has \"7z.exe\" or \r\n             InitiatingProcessFileName has \"winrar.exe\" or\r\n             FolderPath contains \":\\\\temp\\\\\" or\r\n             FolderPath contains \":\\\\users\\\\public\\\\\" or\r\n             FolderPath contains \":\\\\windows\\\\temp\\\\\")\r\n    | extend ReportId = strcat(\"ProcessChain_\", DeviceId, \"_\", Timestamp)\r\n    | project \r\n        Timestamp, \r\n        DeviceId,\r\n        DeviceName, \r\n        TTP = \"TTP1-ArchiveProcessChain\",\r\n        InitiatingProcessFileName, \r\n        FileName, \r\n        FolderPath, \r\n        ProcessCommandLine,\r\n        ReportId,\r\n        Evidence = strcat(\"Suspicious process: \", FileName, \" launched from: \", InitiatingProcessFileName);\r\n\r\n// TTP2: Temporal proximity of post-exploitation commands\r\nlet PostExploitationCommands = \r\n    DeviceProcessEvents\r\n    | where Timestamp between (startTime .. endTime)\r\n    | where ProcessVersionInfoOriginalFileName in~ (susProcs)\r\n    | sort by DeviceId, Timestamp asc\r\n    | extend EventSessionId = row_window_session(Timestamp, 5m, 5m, DeviceId != prev(DeviceId))\r\n    | summarize \r\n        EventCount = dcount(ProcessVersionInfoOriginalFileName),\r\n        Binaries = make_set(ProcessVersionInfoOriginalFileName),\r\n        MinTimestamp = min(Timestamp),\r\n        MaxTimestamp = max(Timestamp),\r\n        CommandLines = make_set(strcat(ProcessVersionInfoOriginalFileName, \": \", coalesce(ProcessCommandLine, \"\"))),\r\n        DeviceName = any(DeviceName)\r\n        by DeviceId, EventSessionId\r\n    | where EventCount >= 3\r\n    | extend ReportId = strcat(\"PostExploit_\", DeviceId, \"_\", MinTimestamp)\r\n    | project \r\n        Timestamp = MinTimestamp,\r\n        DeviceId,\r\n        DeviceName,\r\n        TTP = \"TTP2-PostExploitationCommandCluster\",\r\n        EventCount,\r\n        Binaries,\r\n        ReportId,\r\n        Evidence = strcat(\"Multiple post-exploitation commands (\", tostring(EventCount), \"): \", tostring(Binaries));\r\n\r\n// TTP3: Obfuscated PowerShell payloads\r\nlet ObfuscatedPowerShell = \r\n    DeviceProcessEvents\r\n    | where Timestamp between (startTime .. endTime)\r\n    | where FileName =~ \"powershell.exe\"\r\n    | where (ProcessCommandLine contains \".Replace('_','')\" or\r\n             ProcessCommandLine contains \"-e \" or\r\n             ProcessCommandLine contains \"FromBase64String\" or\r\n             ProcessCommandLine contains \"DownloadString\" or\r\n             ProcessCommandLine contains \"WebClient\" or\r\n             ProcessCommandLine contains \"SilentPrism\" or\r\n             ProcessCommandLine contains \"Gamayun\")\r\n    | extend ReportId = strcat(\"PowerShell_\", DeviceId, \"_\", Timestamp)\r\n    | project \r\n        Timestamp, \r\n        DeviceId,\r\n        DeviceName, \r\n        TTP = \"TTP3-ObfuscatedPowerShell\",\r\n        InitiatingProcessFileName, \r\n        FileName, \r\n        ProcessCommandLine,\r\n        ReportId,\r\n        Evidence = strcat(\"Suspicious PowerShell command: \", substring(ProcessCommandLine, 0, 200));\r\n\r\n// TTP3: Network connections to known IoCs\r\nlet SuspiciousNetwork = \r\n    DeviceNetworkEvents\r\n    | where Timestamp between (startTime .. endTime)\r\n    | where RemoteIP in~ (maliciousIPs) \r\n       or RemoteUrl has_any (maliciousDomains)\r\n    | where InitiatingProcessFileName in~ (\"powershell.exe\", \"UnRAR.exe\", \"msiexec.exe\", \"mmc.exe\", \"rundll32.exe\", \"SilentPrism.exe\", \"Gamayun.exe\")\r\n    | extend ReportId = strcat(\"Network_\", DeviceId, \"_\", Timestamp)\r\n    | project \r\n        Timestamp, \r\n        DeviceId,\r\n        DeviceName, \r\n        TTP = \"TTP3-SuspiciousNetworkConnection\",\r\n        InitiatingProcessFileName, \r\n        RemoteIP, \r\n        RemoteUrl, \r\n        RemotePort,\r\n        ReportId,\r\n        Evidence = strcat(\"Connection from \", InitiatingProcessFileName, \" to known IoC: \", coalesce(RemoteUrl, RemoteIP));\r\n\r\n// TTP4: Specific Water Gamayun malware detection\r\nlet WaterGamayunMalware = \r\n    DeviceProcessEvents\r\n    | where Timestamp between (startTime .. endTime)\r\n    | where FileName in~ (\"SilentPrism.exe\", \"Gamayun.exe\", \"WaterGamayun.exe\")\r\n       or ProcessCommandLine contains \"SilentPrism\"\r\n       or ProcessCommandLine contains \"Gamayun\"\r\n       or InitiatingProcessSHA256 in~ (maliciousHashes)\r\n    | extend ReportId = strcat(\"Malware_\", DeviceId, \"_\", Timestamp)\r\n    | project \r\n        Timestamp, \r\n        DeviceId,\r\n        DeviceName, \r\n        TTP = \"TTP4-WaterGamayunMalware\",\r\n        InitiatingProcessFileName, \r\n        FileName, \r\n        FolderPath,\r\n        ProcessCommandLine,\r\n        InitiatingProcessSHA256,\r\n        ReportId,\r\n        Evidence = strcat(\"Water Gamayun malware detected: \", FileName);\r\n\r\nunion isfuzzy=true\r\n    FileDownloads,\r\n    ArchiveProcessChain,\r\n    PostExploitationCommands,\r\n    ObfuscatedPowerShell,\r\n    SuspiciousNetwork,\r\n    WaterGamayunMalware\r\n| sort by Timestamp desc\r\n| project \r\n    Timestamp,\r\n    DeviceId,\r\n    ReportId,\r\n    DeviceName, \r\n    TTP,\r\n    Evidence"
