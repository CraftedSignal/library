id: 8dd19c9e-4a91-4bf3-8501-907fbe8a8300
name: 'Detect Matanbuchus Deployment '
description: ' '
query: "let QueryPeriod = 1h;\r\nlet QuickAssistHost = dynamic([\"remoteassistance.support.services.microsoft.com\"]);\r\nMessageUrlInfo\r\n| where Timestamp > ago(QueryPeriod) \r\n| join MessageEvents on TeamsMessageId\r\n| where IsExternalThread == \"1\"\r\n| where ThreadType == \"chat\"\r\n| where DeliveryLocation == \"Teams\"\r\n| where Url has_any(QuickAssistHost)"
query_type: kql
severity: medium
techniques:
    - T1218
    - T1053
tags:
    - kql
author: Steven Lim
version: "1"
references:
    - https://thehackernews.com/2025/07/hackers-leverage-microsoft-teams-to.html
