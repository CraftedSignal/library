id: d6a33ff7-1c69-42b1-ad75-7004f5e7e556
name: C2 Beaconing Detection (ASIM)
description: "Detects potential Command and Control (C2) communication patterns based on ASIM-normalized network session data in Microsoft Sentinel. This detection covers three primary patterns: \n\n1) Periodic beaconing with low jitter \n2) Long-lived HTTP(S) long-polling sessions \n3) Network traffic with very consistent payload sizes\n\nSuch patterns can indicate covert communication with compromised systems or malware infections.\n\n"
query: "// ### Parameter declaration for tuning detection thresholds\r\n// Change these values to adjust lookback window, jitter tolerance, \r\n// minimum event counts, and thresholds for beaconing/long-polling detection.\r\ndeclare query_parameters (\r\n  lookback:timespan = 24h,         // Analysis time window\r\n  recentWindow:timespan = 6h,      // Only return results seen in this recent window\r\n  minEvents:int = 8,               // Minimum number of events per Src/Dst pair\r\n  beaconMinSec:int = 30,           // Minimum interval (sec) to consider as beaconing\r\n  beaconMaxSec:int = 3600,         // Maximum interval (sec) to consider as beaconing\r\n  maxJitterPct:real = 0.20,        // Maximum allowed jitter (std dev / mean interval)\r\n  longPollMinDuration:timespan = 60s // Minimum connection duration for long-poll detection\r\n);\r\n// ### Common allowlists and helper functions\r\n// Define HTTP ports, benign hostnames, and an IP check for private ranges.\r\nlet httpPorts = dynamic([80,443,8080,8443]);\r\nlet benignHosts = dynamic([\r\n  \"windowsupdate.com\",\"microsoft.com\",\"office365.com\",\"msedge.net\",\r\n  \"akamai.net\",\"akamaized.net\",\"cloudfront.net\",\"googleusercontent.com\",\"apple.com\"\r\n]);\r\nlet IsPrivate = (ip:string) { ipv4_is_private(ip) or (ip startswith \"fd\") };\r\n// ### 1) Periodic, low-jitter beaconing\r\n// Detects repeated outbound connections between the same Src/Dst/Port \r\n// with low variance in inter-event time (low jitter), indicating automated beacons.\r\nlet BeaconingPeriodic =\r\n_Im_NetworkSession(starttime=ago(lookback), endtime=now(), eventresult=\"Success\")\r\n| where NetworkDirection in~ (\"Outbound\",\"External\",\"NA\")\r\n| where isnotempty(SrcIpAddr) and isnotempty(DstIpAddr)\r\n| where not(IsPrivate(DstIpAddr))\r\n| where isempty(DstHostname) or not(tostring(DstHostname) has_any (benignHosts))\r\n| order by SrcIpAddr asc, DstIpAddr asc, DstPortNumber asc, EventStartTime asc\r\n| serialize\r\n| extend PrevTS = prev(EventStartTime),\r\n         SamePair = prev(SrcIpAddr)==SrcIpAddr and prev(DstIpAddr)==DstIpAddr and prev(DstPortNumber)==DstPortNumber\r\n| extend DeltaSec = iff(SamePair, toreal(datetime_diff('second', EventStartTime, PrevTS)), real(null))\r\n| where isnotempty(DeltaSec)\r\n| summarize\r\n    FirstSeen=min(EventStartTime), LastSeen=max(EventStartTime), Events=count(),\r\n    AvgDelta=avg(DeltaSec), StdevDelta=stdev(DeltaSec), MinDelta=min(DeltaSec),\r\n    P95Delta=percentile(DeltaSec,95), AvgBytes=avg(NetworkBytes), StdevBytes=stdev(NetworkBytes),\r\n    SourceIP=any(SrcIpAddr), SourceHost=any(SrcHostname),\r\n    DestinationIP=any(DstIpAddr), DestinationHost=any(DstHostname), DstPort=any(DstPortNumber)\r\n  by SrcIpAddr, SrcHostname, DstIpAddr, DstHostname, DstPortNumber\r\n| extend JitterPct = StdevDelta / AvgDelta,\r\n         BytesVarPct = iff(AvgBytes>0, StdevBytes/AvgBytes, 1.0)\r\n| where Events >= minEvents\r\n  and AvgDelta between (beaconMinSec .. beaconMaxSec)\r\n  and JitterPct <= maxJitterPct\r\n| extend Detection = \"Periodic beaconing (low jitter)\",\r\n         Score_real = 80 + (20 * (1 - JitterPct));\r\n// ### 2) Possible HTTP(S) long-polling\r\n// Identifies long-lived HTTP(S) connections, common in C2 channels that keep \r\n// TCP sessions open to avoid repeated handshakes and detection.\r\nlet LongPolling =\r\n_Im_NetworkSession(starttime=ago(lookback), endtime=now(), eventresult=\"Success\")\r\n| where NetworkDirection in~ (\"Outbound\",\"External\",\"NA\")\r\n| where (DstPortNumber in (httpPorts) or NetworkApplicationProtocol in~ (\"HTTP\",\"HTTPS\"))\r\n| where not(IsPrivate(DstIpAddr))\r\n| where isempty(DstHostname) or not(tostring(DstHostname) has_any (benignHosts))\r\n| extend SessionDuration = iff(isnotempty(EventEndTime), EventEndTime - EventStartTime, 0s)\r\n| where SessionDuration >= longPollMinDuration\r\n| summarize\r\n    FirstSeen=min(EventStartTime), LastSeen=max(EventStartTime), Events=count(),\r\n    AvgDuration=avg(SessionDuration), P95Duration=percentile(SessionDuration,95),\r\n    AvgSrcBytes=avg(tolong(SrcBytes)), AvgDstBytes=avg(tolong(DstBytes)),\r\n    SourceIP=any(SrcIpAddr), SourceHost=any(SrcHostname),\r\n    DestinationIP=any(DstIpAddr), DestinationHost=any(DstHostname), DstPort=any(DstPortNumber)\r\n  by SrcIpAddr, SrcHostname, DstIpAddr, DstHostname, DstPortNumber\r\n| where Events >= 5 and AvgDuration >= 2 * longPollMinDuration\r\n| extend SmallUp = iff(AvgSrcBytes <= 5*1024, 1, 0),\r\n         ModestDown = iff(AvgDstBytes <= 200*1024, 1, 0)\r\n| extend Detection = \"Possible HTTP long-polling\",\r\n         Score_real = 70 + 10*SmallUp + 10*ModestDown;\r\n// ### 3) Consistent-size beacons\r\n// Flags outbound sessions with very low variance in total bytes sent/received,\r\n// common in simplistic beacon protocols where each message is a fixed size.\r\nlet ConsistentSize =\r\n_Im_NetworkSession(starttime=ago(lookback), endtime=now(), eventresult=\"Success\")\r\n| where NetworkDirection in~ (\"Outbound\",\"External\",\"NA\")\r\n| where not(IsPrivate(DstIpAddr))\r\n| where isempty(DstHostname) or not(tostring(DstHostname) has_any (benignHosts))\r\n| summarize\r\n    FirstSeen=min(EventStartTime), LastSeen=max(EventStartTime), Events=count(),\r\n    AvgBytes=avg(NetworkBytes), StdevBytes=stdev(NetworkBytes),\r\n    SourceIP=any(SrcIpAddr), SourceHost=any(SrcHostname),\r\n    DestinationIP=any(DstIpAddr), DestinationHost=any(DstHostname), DstPort=any(DstPortNumber)\r\n  by SrcIpAddr, SrcHostname, DstIpAddr, DstHostname, DstPortNumber\r\n| extend SizeJitterPct = iff(AvgBytes>0, StdevBytes/AvgBytes, 1.0)\r\n| where Events >= minEvents and AvgBytes > 0 and SizeJitterPct < 0.10\r\n| extend Detection = \"Consistent-size beaconing\",\r\n         Score_real = 60 + toint(40 * (0.10 - SizeJitterPct) / 0.10);\r\n// ### Final output\r\n// Combine results from all three detection types, keep only recent matches, \r\n// and project key fields for Sentinel mapping and incident investigation.\r\nunion kind=outer BeaconingPeriodic, LongPolling, ConsistentSize\r\n| extend Score_real = todouble(column_ifexists(\"Score_real\", 0.0))\r\n| where LastSeen >= ago(recentWindow)\r\n| order by Score_real desc, Events desc, LastSeen desc\r\n| project FirstSeen, LastSeen, Events, Detection, Score_real,\r\n          SourceIP, SourceHost, DestinationIP, DestinationHost, DstPort,\r\n          AvgDelta, JitterPct, AvgBytes, BytesVarPct,\r\n          AvgDuration, P95Duration, AvgSrcBytes, AvgDstBytes, SizeJitterPct\r\n"
query_type: kql
