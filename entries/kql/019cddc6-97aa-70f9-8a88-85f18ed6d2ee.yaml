name: Analyzing AI MCP SaaS Usage In Your MDE Environment
description: KQL Query
query: "let AIMCPServer=externaldata(AIModel:string,AIAPIUrl:string,RiskScore:string)\r\n[h'https://raw.githubusercontent.com/SlimKQL/Hunting-Queries-Detection-Rules/refs/heads/main/IOC/AIMCPServer.csv']\r\nwith (format='csv', ignoreFirstRecord=true)\r\n| project AIAPIUrl;\r\nDeviceNetworkEvents\r\n| where Timestamp > ago(30d)\r\n| where RemoteUrl has_any(AIMCPServer)\r\n| extend AIMCP = replace_string(RemoteUrl, \"https://\", \"\")\r\n| summarize Count=count() by AIMCP\r\n| sort by Count desc "
query_type: kql
severity: medium
