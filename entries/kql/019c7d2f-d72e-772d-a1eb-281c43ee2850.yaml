id: 019c7d2f-d72e-772d-a1eb-281c43ee2850
name: Masqueraded Bluetooth Service Persistence via Non-Standard Path
description: Detects the creation or modification of a Windows service named 'BluetoothService' where its executable path points to a non-standard, user-writable location (e.g., AppData, Temp, ProgramData). This technique is often used by malware, such as the Chrysalis backdoor in the Lotus Blossom campaign, to establish persistence and evade detection by masquerading as a legitimate system service.
query: "// Name: Masqueraded Bluetooth Service Persistence\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-02-20\r\n// Description: Detects the creation of a Windows service named 'BluetoothService' that points to an executable in a non-standard, user-writable path (like AppData). This specific technique was used by the Chrysalis backdoor in the Lotus Blossom campaign to establish persistence.\r\n// Tactic: Persistence, Defense Evasion\r\n// Technique: T1543.003, T1036.004\r\n// False Positive Sensitivity: Medium\r\n// Reference: https://blog.hackandfix.com/the-notepad-supply-chain-attack-2025-2026-technical-breakdown-iocs/\r\nlet serviceName = \"BluetoothService\";\r\n// Define non-standard paths for service binaries, often abused by malware.\r\nlet nonStandardPathFragments = dynamic([\r\n    \"AppData\",\r\n    \"Roaming\",\r\n    \"Local\",\r\n    \"Temp\",\r\n    \"Public\",\r\n    \"ProgramData\",\r\n    \"Downloads\"\r\n]);\r\n(union isfuzzy=true\r\n    (\r\n        // Detect service creation via command line tools like sc.exe or PowerShell.\r\n        DeviceProcessEvents\r\n        | where (\r\n            (InitiatingProcessFileName =~ \"sc.exe\" and ProcessCommandLine has \"create\") or\r\n            (InitiatingProcessFileName in~ (\"powershell.exe\", \"pwsh.exe\") and ProcessCommandLine has \"New-Service\")\r\n          )\r\n        // Filter for the specific service name and a binary path in a non-standard location.\r\n        | where ProcessCommandLine has serviceName and ProcessCommandLine has_any (nonStandardPathFragments)\r\n        | project\r\n            Timestamp,\r\n            EventType = \"ServiceCreateProcess\",\r\n            DeviceName,\r\n            AccountName,\r\n            InitiatingProcessFileName,\r\n            ProcessCommandLine,\r\n            RegistryKey = \"N/A\",\r\n            RegistryValueData = \"N/A\",\r\n            SHA256\r\n    ),\r\n    (\r\n        // Detect service creation via direct registry modification.\r\n        DeviceRegistryEvents\r\n        | where ActionType in (\"RegistryKeyCreated\", \"RegistryValueSet\")\r\n        // Look for the ImagePath value being set for the specific service key.\r\n        | where RegistryKey endswith @\"\\Services\\BluetoothService\" and RegistryValueName =~ \"ImagePath\"\r\n        // Filter for paths pointing to non-standard locations.\r\n        | where RegistryValueData has_any (nonStandardPathFragments)\r\n        | project\r\n            Timestamp,\r\n            EventType = \"ServiceCreateRegistry\",\r\n            DeviceName,\r\n            AccountName = InitiatingProcessAccountName,\r\n            InitiatingProcessFileName,\r\n            ProcessCommandLine = InitiatingProcessCommandLine,\r\n            RegistryKey,\r\n            RegistryValueData,\r\n            SHA256 = InitiatingProcessSHA256\r\n    )\r\n)\r\n// FP Tuning: This behavior is highly anomalous. A legitimate service binary should reside in %SystemRoot% or %ProgramFiles%.\r\n// An alert here strongly indicates malicious persistence. No common FPs are expected.\r\n| project-reorder\r\n    Timestamp,\r\n    EventType,\r\n    DeviceName,\r\n    AccountName,\r\n    InitiatingProcessFileName,\r\n    ProcessCommandLine,\r\n    RegistryKey,\r\n    RegistryValueData,\r\n    SHA256\r\n"
