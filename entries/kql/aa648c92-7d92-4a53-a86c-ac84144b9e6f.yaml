id: aa648c92-7d92-4a53-a86c-ac84144b9e6f
name: DOM/iFrame based Clickjacking via XSS dumps Password Manager Credentials
description: "Identifies devices with vulnerable versions of popular password manager browser extensions installed and active. These versions are susceptible to credential theft via DOM manipulation by malicious web pages. Note: \nThis is potential for false positives; the exploit is Client-side, out of reach for traditional detection. The detection will only validate vulnerable versions for the following password manager vendors who have not remediated all the vulnerabilities in the report by researcher Marek Tóth."
query: "// title: DOM/iFrame based Clickjacking via XSS dumps Password Manager Credentials\r\n// author: Reyben T. Cortes\r\n// date: 2025-08-20\r\n// description: Identifies devices with vulnerable versions of popular password manager browser extensions installed and active. These versions are susceptible to credential theft via DOM manipulation by malicious web pages.\r\n// severity: High\r\n// Note: The exploit is Client-side out of reach for traditional detection. The detection will only validate vulnerable version for the following password manager vendor who have not remediated all the vulnerabilities in the report by researcher Marek Tóth.\r\n// references: https://marektoth.com/blog/dom-based-extension-clickjacking/#intusive-elements\r\n// tags: T1566, T1204, vulnerability, browser, extension, password manager, credential access\r\n\r\nDeviceTvmBrowserExtensions\r\n// Look at the last 30 days of extension data\r\n| where Timestamp > ago(30d)\r\n// Focus on the most common and supported browsers\r\n| where BrowserName in~ (\"Chrome\", \"Edge\", \"Firefox\")\r\n// Ensure the extension is enabled\r\n| where IsActivated == \"True\"\r\n// Correlate each extension with its specific vulnerable version\r\n| where\r\n    (ExtensionName matches regex \"(?i)Bitwarden\" and ExtensionVersion <= \"2025.7.0\") or\r\n    (ExtensionName matches regex \"(?i)1Password\" and ExtensionVersion <= \"8.11.4.27\") or\r\n    (ExtensionName matches regex \"(?i)iCloud.*Passwords\" and ExtensionVersion <= \"3.1.25\") or\r\n    (ExtensionName matches regex \"(?i)Enpass\" and ExtensionVersion <= \"6.11.6\") or\r\n    (ExtensionName matches regex \"(?i)LastPass\" and ExtensionVersion <= \"4.146.1\") or\r\n    (ExtensionName matches regex \"(?i)LogMeOnce\" and ExtensionVersion <= \"7.12.4\")\r\n// Confirm the extension has rights to interact with web pages\r\n| extend Permissions = todynamic(ExtensionPermissions)\r\n| where isnotempty(Permissions) and (Permissions has \"scripting\" or Permissions has \"activeTab\")\r\n// Get the most recent scan result for each unique extension on each device\r\n| summarize arg_max(Timestamp, *) by DeviceId, BrowserName, ExtensionId\r\n// Project the most relevant fields for investigation\r\n| project\r\n    Timestamp,\r\n    DeviceId,\r\n    DeviceName,\r\n    LoggedInOnUser,\r\n    BrowserName,\r\n    ExtensionName,\r\n    ExtensionVersion,\r\n    ExtensionId,\r\n    Permissions\r\n// Potential for False Positives: This detection alerts on the presence of a vulnerability, not active exploitation.\r\n// The primary source of FPs would be inaccurate version information in the DeviceTvmBrowserExtensions table.\r\n// Tuning: You can add specific devices or user groups to an exclusion list if they are part of a known, managed risk scenario.\r\n// For example: `| where DeviceName !in (\"test_machine_01\", \"dev_box_a\")`\r\n"
