id: 019be674-caf7-744e-b252-5feadfb090f8
name: Email URL Interaction
description: This simple query helps detect whether a user interacted with the URL within the email message or not.
query: "//\r\n/////  PLATFORM: Microsoft Exchange Online (Email Security Gateway)\r\n/////  AUTHOR: IGOR OLIVEIRA (#IO)\r\n/////  LOCATION: Microsoft Sentinel | Logs\r\n/////  TITLE: KQL to detect URL click over email message\r\n//\r\nlet URL_Click_Lookup = \r\nUrlClickEvents\r\n| where TimeGenerated > ago(90d)\r\n| where AccountUpn == \"username@domain.tld\"\r\n| where SenderEmailAddress contains \"domain.tld\"\r\n| join kind=leftouter EmailEvents on NetworkMessageId\r\n| project TimeGenerated, SenderFromAddress, Subject, AccountUpn, Url, ActionType, Workload, DeliveryAction;\r\nURL_Click_Lookup"
query_type: kql
severity: medium
techniques:
    - T1566.002
tags:
    - kql
version: "5"
