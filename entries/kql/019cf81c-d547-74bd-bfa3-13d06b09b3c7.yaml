id: 019cf81c-d547-74bd-bfa3-13d06b09b3c7
name: TrustConnectAgent Persistence Mechanism
description: Detects persistence mechanisms associated with malware signed by TrustConnect Software PTY LTD. The malware establishes persistence by creating a specific Run key or by registering a service masquerading as Adobe Acrobat Reader.
query: "// Name: TrustConnectAgent Persistence Mechanism\r\n// Author: Brandon + detections.ai\r\n// Date: 2026-03-16\r\n// Description: Detects persistence mechanisms associated with malware signed by TrustConnect Software PTY LTD. The malware establishes persistence by creating a specific Run key or by registering a service masquerading as Adobe Acrobat Reader.\r\n// Reference: https://www.microsoft.com/en-us/security/blog/2026/03/03/signed-malware-impersonating-workplace-apps-deploys-rmm-backdoors/\r\n// Tactic: Persistence\r\n// Technique IDs: T1547.001, T1543.003, T1036.005\r\n\r\nDeviceRegistryEvents\r\n// Search for two distinct persistence methods used by the malware.\r\n| where \r\n    // Condition 1: Detects the specific 'TrustConnectAgent' Run key value name, a high-fidelity indicator from the report.\r\n    RegistryValueName == \"TrustConnectAgent\"\r\n    // Condition 2: Detects the creation of a suspicious service masquerading as Adobe Acrobat Reader.\r\n    or (\r\n        RegistryKey has @\"Services\\Adobe Acrobat Reader\" and RegistryValueData has \"AdobeReader.exe\"\r\n        // Potential for False Positives: Legitimate Adobe software might create services with similar names.\r\n        // Tuning suggestion: Further filter by the initiating process if legitimate processes are causing noise.\r\n    )\r\n| project\r\n    TimeGenerated,\r\n    DeviceName,\r\n    RegistryKey,\r\n    RegistryValueName,\r\n    RegistryValueData,\r\n    InitiatingProcessCommandLine,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessAccountName"
query_type: kql
severity: medium
tactics:
    - TA0003
    - TA0004
    - TA0005
techniques:
    - T1547.001
    - T1543.003
    - T1036.005
tags:
