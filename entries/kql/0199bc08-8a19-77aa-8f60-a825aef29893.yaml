id: 0199bc08-8a19-77aa-8f60-a825aef29893
name: Query is used to find the SHA values of file.
description: 'KQL Query from file: Detects when a user uploads, shares, or sends executable files (e.g., .exe, .dll, .scr) through Office 365 services (OneDrive / SharePoint / Exchange). This Query is used to find the SHA values of file.'
query: "search in (OfficeActivity) \"username\"\r\n| project hash_sha256(\"file.exe\")"
query_type: kql
severity: medium
tags:
    - kql
version: "2"
