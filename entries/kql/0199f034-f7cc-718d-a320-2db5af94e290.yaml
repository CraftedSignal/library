id: 0199f034-f7cc-718d-a320-2db5af94e290
name: Oyster Malware C2 Traffic
description: Detects HTTP requests indicative of Oyster malware C2 beaconing, including GET requests to /reg with WordPressAgent User-Agent and application/json Content-Type, GET requests to /login with FingerPrint User-Agent, and GET/POST requests to /api/kcehc or POST requests to /api/jgfnsfnuefcnegfnehjbfncejfh.
query: "CommonSecurityLog\r\n| where isnotempty(RequestURL)\r\n| where\r\n    (RequestMethod =~ \"GET\" and RequestURL contains \"/reg\" and RequestUserAgent has \"WordPressAgent\" and AdditionalExtensions has \"Content-Type: application/json\")\r\n    or\r\n    (RequestMethod =~ \"GET\" and RequestURL contains \"/login\" and RequestUserAgent has \"FingerPrint\")\r\n    or\r\n    (RequestMethod in (\"GET\", \"POST\") and RequestURL contains \"/api/kcehc\")\r\n    or\r\n    (RequestMethod =~ \"POST\" and RequestURL contains \"/api/jgfnsfnuefcnegfnehjbfncejfh\")\r\n| project\r\n    TimeGenerated,\r\n    DeviceVendor,\r\n    DeviceProduct,\r\n    SourceIP,\r\n    DestinationIP,\r\n    DestinationPort,\r\n    RequestMethod,\r\n    RequestURL,\r\n    RequestUserAgent"
query_type: kql
severity: medium
tactics:
    - TA0011
techniques:
    - T1071.001
    - T1071
tags:
    - kql
author: Kaung Khant Ko
version: "2"
references:
    - https://malasada.tech/oyster-malware-delivery-via-teams-fake-app/
