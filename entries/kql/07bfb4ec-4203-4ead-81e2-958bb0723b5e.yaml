id: 07bfb4ec-4203-4ead-81e2-958bb0723b5e
name: Sentinel Threat Intelligence Nation-State Detection
description: KQL Query
query: "let NSIOC =\nThreatIntelIndicators\n| where TimeGenerated > ago(365d) \n| where Tags has \"nation-state\"\n| where ObservableKey == \"ipv4-addr:value\"\n| project ObservableValue;\nDeviceNetworkEvents\n| where TimeGenerated > ago(1h)\n| where RemoteIP has_any(NSIOC)\n"
query_type: kql
severity: medium
tags:
    - kql
author: Steven Lim
version: "1"
