id: 019c76be-c85c-7488-ad04-4a2d1228b8a1
name: CRESCENTHARVEST - Chrome App-Bound Key Decryption Artifact
description: Detects the creation of the file 'decrypted_appbound_key.txt' in the AppData\Roaming directory. This file is a specific artifact generated by the CRESCENTHARVEST malware after it successfully decrypts Chrome's app-bound encryption key, indicating browser credential compromise.
query: "// Name: CRESCENTHARVEST - Chrome App-Bound Key Decryption Artifact\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-02-19\r\n// Description: Detects the creation of the file 'decrypted_appbound_key.txt' in the AppData\\Roaming directory. This file is a specific artifact generated by the CRESCENTHARVEST malware after it successfully decrypts Chrome's app-bound encryption key, indicating browser credential compromise.\r\n// Tactics: Credential Access\r\n// Techniques: T1555.003\r\n// References: https://www.acronis.com/en/tru/posts/crescentharvest-iranian-protestors-and-dissidents-targeted-in-cyberespionage-campaign/\r\nDeviceFileEvents\r\n// Look for file creation events\r\n| where ActionType == \"FileCreated\"\r\n// Filter for the specific artifact file name created by the malware\r\n| where FileName =~ \"decrypted_appbound_key.txt\"\r\n// The malware saves this file to the user's AppData\\Roaming folder\r\n| where FolderPath has @\"\\AppData\\Roaming\"\r\n// FP Tuning: The filename is highly specific to this malware. False positives are not expected.\r\n| project\r\n    Timestamp,\r\n    DeviceName,\r\n    RequestAccountName,\r\n    ActionType,\r\n    FileName,\r\n    FolderPath,\r\n    SHA256,\r\n    InitiatingProcessAccountName,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessCommandLine,\r\n    InitiatingProcessId\r\n"
query_type: kql
