id: 03a0828c-84d2-405e-91ea-c545127dda05
name: User Added to Privileged Group Detection
description: This query monitors users added to specific privilege groups, helping identify unauthorized additions.
query: "#### This query identifies if any users are added to any privilege group that you want to keep an eye on. This query will help identify any user who is not suppose to be added on the list of privillege group. \n## Mitre Att&ck (Persistence)\n### T1098- Account Manipulation\n#### Query:\n```KQL\nIdentityDirectoryEvents\n| where ActionType == \"Group Membership changed\"\n| extend ToGroup = tostring(AdditionalFields.[\"TO.GROUP\"])\n| extend FromGroup = tostring(AdditionalFields.[\"FROM.GROUP\"])\n| where ToGroup in ('Security-Group', 'IT-Admin-Group')     // Specify the privilege group that you want to monitor\n| project TimeGenerated, Actor=AccountName, UserAdded=TargetAccountUpn, ToGroup, FromGroup\n```\n"
query_type: kql
version: "1"
