id: 019cfb90-bf00-72da-ba80-baa084e4dd6f
name: KQL detection for Click Fix related activity
description: 'Based on new click fix variant reported on here: https://atos.net/en/lp/cybershield/investigating-a-new-click-fix-variant'
query: "// Query to search for 'net use' along with 'http'\r\n// Designed to hunt for click fix related signals\r\nDeviceProcessEvents\r\n| where Timestamp > ago(30d)\r\n| where FileName in~ (\"net.exe\", \"cmd.exe\", \"powershell.exe\", \"pwsh.exe\")\r\n| where ProcessCommandLine has_all (\"net\",\"use\", \"http\")\r\n| project Timestamp, DeviceName, FileName, ProcessCommandLine, AccountName\r\n| sort by Timestamp desc"
query_type: kql
severity: medium
tags:
    - kql
author: Tony D
version: "1"
references:
    - https://atos.net/en/lp/cybershield/investigating-a-new-click-fix-variant
