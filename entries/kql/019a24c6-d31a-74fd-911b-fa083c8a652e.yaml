id: 019a24c6-d31a-74fd-911b-fa083c8a652e
name: Detection for WSUS Remote Code Execution (CVE-2025-59287)
description: This query looks for indicators of CVE-2025-59287 exploitation, a critical WSUS deserialization flaw (CVSS 9.8) enabling unauthenticated remote code execution. Focuses on network, process, and file artifacts associated with exploitation.
query: "// KQL Query: Detection for WSUS Remote Code Execution (CVE-2025-59287)\r\n// References:\r\n// - CISA Alert: https://www.cisa.gov/news-events/alerts/2025/10/24/cisa-adds-two-known-exploited-vulnerabilities-catalog\r\n// - HawkTrace PoC: https://gist.github.com/hawktrace/880b54fb9c07ddb028baaae401bd3951\r\n\r\nlet LookBack = 1h;\r\n\r\n// 1. Network Activity: External connections to WSUS ports\r\nlet WSUSNetworkConnections = \r\n    DeviceNetworkEvents\r\n    | where Timestamp > ago(LookBack)\r\n    | where ActionType == \"ConnectionSuccess\"\r\n    | where LocalPort in (8530, 8531)  // WSUS HTTP and HTTPS ports\r\n    | where RemoteIP startswith \"10.\" == false  // Filtering out internal IPs; adjust based on your environment\r\n    and RemoteIP != \"127.0.0.1\"\r\n    | distinct DeviceId;\r\n\r\n// 2. File Artifact: Modification of WSUS log files\r\nlet WSUSLogModification =\r\n    DeviceFileEvents\r\n    | where Timestamp > ago(LookBack)\r\n    | where ActionType in (\"FileCreated\", \"FileModified\")\r\n    | where FolderPath has @\"\\Program Files\\Update Services\\LogFiles\" \r\n    and FileName has \"SoftwareDistribution.log\"\r\n    | distinct DeviceId;\r\n\r\n// 3. Process Execution: Suspicious command and script execution chain\r\nlet SuspiciousCmdExecution =\r\n    DeviceProcessEvents\r\n    | where Timestamp > ago(LookBack)\r\n    | where (InitiatingProcessParentFileName =~ \"w3wp.exe\" or InitiatingProcessParentFileName =~ \"wsusservice.exe\")\r\n    and InitiatingProcessFileName =~ \"cmd.exe\"\r\n    | distinct DeviceId;\r\n\r\n// 4. Encoded PowerShell detection\r\nlet EncodedPowerShellExecution =\r\n    DeviceProcessEvents\r\n    | where Timestamp > ago(LookBack)\r\n    | where (InitiatingProcessCommandLine contains \"Powershell -EncodedCommand\" \r\n        or InitiatingProcessCommandLine contains \"Powershell -ec\")\r\n    and InitiatingProcessParentFileName =~ \"cmd.exe\"\r\n    | distinct DeviceId;\r\n\r\n// 5. Combine all suspicious process indicators\r\nlet AllSuspiciousProcesses = SuspiciousCmdExecution | union EncodedPowerShellExecution;\r\n\r\n// 6. Correlate all events to find devices with overlapping indicators\r\nAllSuspiciousProcesses\r\n| where DeviceId in (WSUSNetworkConnections) \r\n    and DeviceId in (WSUSLogModification)\r\n| distinct DeviceId\r\n// Join with process events to get detailed information for investigation\r\n| join kind=inner (\r\n    DeviceProcessEvents \r\n    | where Timestamp > ago(LookBack)\r\n    | extend ProcessDetails = strcat(InitiatingProcessFileName, \" - \", InitiatingProcessCommandLine)\r\n) on DeviceId\r\n| project Timestamp, DeviceId, ProcessDetails, InitiatingProcessFileName, InitiatingProcessCommandLine"
query_type: kql
severity: medium
techniques:
    - T1059.001
    - T1049
    - T1021.006
