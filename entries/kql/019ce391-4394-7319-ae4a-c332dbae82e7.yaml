id: 019ce391-4394-7319-ae4a-c332dbae82e7
name: Stryker-Pattern Mass Device Wipe / Destructive Intune Admin Actions
description: 'Detects mass device wipe, retire, or delete operations performed via Microsoft Intune, inspired by the Stryker/Handala attack. This rule combines five detection signals: static velocity threshold, bulk destructive actions from a single operator, first-time operator detection, UEBA anomaly correlation, and ML anomaly detection. Operations are categorized into Tier 1 (critical, zero baseline activity like wipe/retire) and Tier 2 (high, legitimate IT ops activity like device delete, subject to velocity and ML thresholds). Severity escalates based on the number of overlapping signals.'
query: "// =============================================================================\r\n// DETECTION: Stryker-Pattern Mass Device Wipe / Destructive Intune Admin Actions\r\n// VERSION: 1.1\r\n// =============================================================================\r\n// PURPOSE: Unified detection for mass device wipe/retire/delete operations via\r\n//          Microsoft Intune, inspired by the Stryker/Handala attack (March 2026).\r\n//          Combines five detection signals into one scheduled analytics rule:\r\n//            Signal 1 - Static velocity threshold (hard floor — belt)\r\n//            Signal 2 - Bulk destructive actions from a single operator\r\n//            Signal 3 - First-time operator (no history in 14-day baseline)\r\n//            Signal 4 - UEBA anomaly correlation (Anomalies + BehaviorAnalytics)\r\n//            Signal 5 - ML anomaly detection via series_decompose_anomalies()\r\n//                       (per-operator behavioral baseline — suspenders)\r\n//          Each signal fires independently; severity escalates on signal overlap.\r\n//          Operations are split into two tiers based on baseline analysis:\r\n//            Tier 1 (Critical) — Full device wipe/retire. In most environments\r\n//                                these actions are rare or nonexistent. ANY\r\n//                                occurrence should be treated as anomalous.\r\n//            Tier 2 (High) — Device delete. Legitimate IT ops activity typically\r\n//                            exists, so velocity thresholds and ML baselines apply.\r\n//\r\n// TABLES REQUIRED:\r\n//   - IntuneAuditLogs (Intune diagnostic settings -> Log Analytics)\r\n//   - Anomalies (Sentinel UEBA anomaly rules — must be enabled)\r\n//   - BehaviorAnalytics (Sentinel UEBA — must be enabled)\r\n//   - IdentityInfo (Sentinel UEBA — synced from Entra ID / Defender for Identity)\r\n//\r\n// MITRE ATT&CK:\r\n//   - Tactic: Impact (TA0040)\r\n//     - Technique: Data Destruction (T1485)\r\n//     - Technique: Disk Wipe (T1561) / Sub-technique: Disk Content Wipe (T1561.001)\r\n//   - Tactic: Persistence (TA0003)\r\n//     - Technique: Account Manipulation (T1098)\r\n//   - Tactic: Privilege Escalation (TA0004)\r\n//     - Technique: Abuse Elevation Control Mechanism (T1548)\r\n//\r\n// CONNECTOR PREREQUISITE: Intune Diagnostic Settings must be configured to send\r\n//   AuditLogs to the Log Analytics workspace backing Microsoft Sentinel.\r\n//   Path: Intune Admin Center > Reports > Diagnostic settings > Add diagnostic setting\r\n//   Categories: AuditLogs (required), OperationalLogs (recommended)\r\n//\r\n// DEPLOYMENT NOTES:\r\n//   1. Run the discovery query at the bottom of this file FIRST to map your\r\n//      environment's baseline wipe/retire/delete activity before deploying.\r\n//   2. Populate the SuppressedOperators and SuppressedApplications lists\r\n//      based on your discovery results.\r\n//   3. Adjust Tier1Threshold and Tier2Threshold based on your baseline.\r\n//   4. Set DetectionLookback to match your analytics rule frequency.\r\n//\r\n// AUTHOR: Nick Isakson\r\n// =============================================================================\r\n// TUNABLE THRESHOLDS\r\n// -----------------------------------------------------------------------------\r\n// Tier1Threshold: Number of Tier 1 (full device wipe/retire) actions that trigger\r\n//   Signal 1. Default 1 — in most environments, any wipe/retire is anomalous.\r\n//   Run the discovery query below to validate your baseline before adjusting.\r\nlet Tier1Threshold = 1;\r\n// Tier2Threshold: Number of Tier 2 (device delete) actions within the velocity\r\n//   window that triggers Signal 1. Default 5 accounts for routine IT ops.\r\n//   Lower for smaller environments (<500 devices), raise for larger fleets.\r\nlet Tier2Threshold = 5;\r\n// VelocityWindowMinutes: Sliding window for static velocity detection (Signal 1).\r\n//   Default 15m. Consider a companion rule at 60m with a higher threshold\r\n//   for slow-drip evasion detection.\r\nlet VelocityWindowMinutes = 15m;\r\n// BaselineLookbackDays: Historical lookback for first-time operator detection\r\n//   (Signal 3) and for the ML time-series baseline (Signal 5).\r\nlet BaselineLookbackDays = 14d;\r\n// UEBACorrelationWindow: Time window to correlate UEBA anomalies with\r\n//   destructive actions. Anomaly within 1 hour before or after the action.\r\nlet UEBACorrelationWindow = 60m;\r\n// DetectionLookback: The rule's query period. Match to analytics rule frequency.\r\nlet DetectionLookback = 30m;\r\n// MLSensitivity: Sensitivity for series_decompose_anomalies(). Controls how\r\n//   aggressively the algorithm flags deviations from baseline.\r\n//   Range: 0.0 (flag everything) to 5.0+ (only extreme outliers).\r\n//   Default 1.5 is moderate. Lower toward 1.0 for more sensitivity in small\r\n//   environments; raise toward 2.5 if results are noisy.\r\nlet MLSensitivity = 1.5;\r\n// MLSeriesBinSize: Time bin for per-operator activity series.\r\n//   Default 1d = one data point per day per operator.\r\nlet MLSeriesBinSize = 1d;\r\n// -----------------------------------------------------------------------------\r\n// OPERATION TIERS\r\n// -----------------------------------------------------------------------------\r\n// Tier 1: Full device destruction. Rare in most environments. ANY occurrence = alert.\r\nlet Tier1_CriticalOps = dynamic([\r\n    \"wipe ManagedDevice\",\r\n    \"Wipe ManagedDevice\",\r\n    \"retire ManagedDevice\",\r\n    \"Retire ManagedDevice\"\r\n]);\r\n// Tier 2: Device delete. Legitimate IT activity typically exists; thresholds apply.\r\nlet Tier2_HighOps = dynamic([\r\n    \"Delete ManagedDevice\"\r\n]);\r\n// Combined list for lookbacks\r\nlet AllDestructiveOps = array_concat(Tier1_CriticalOps, Tier2_HighOps);\r\n// -----------------------------------------------------------------------------\r\n// SUPPRESSION LISTS\r\n// -----------------------------------------------------------------------------\r\n// SuppressedOperators: Human UPNs performing routine device lifecycle ops.\r\n//   Populate from discovery query results. Suppression ONLY applies to Tier 2.\r\n//   Tier 1 events are NEVER suppressed.\r\n//   IMPORTANT: Review this list quarterly — stale entries create blind spots.\r\nlet SuppressedOperators = dynamic([\r\n    // \"svc-intune-lifecycle@yourdomain.com\"\r\n    // \"your-it-admin@yourdomain.com\"\r\n]);\r\n// SuppressedApplications: Automated Intune service applications to exclude.\r\n//   DuplicatePhoneRegistrationCleanup is a built-in Intune housekeeping app\r\n//   that removes stale device registrations. ActorType 5 = application identity.\r\nlet SuppressedApplications = dynamic([\r\n    \"DuplicatePhoneRegistrationCleanup\"\r\n]);\r\n// =============================================================================\r\n// STEP 1: Gather all destructive Intune actions in the detection window\r\n// =============================================================================\r\nlet CurrentEvents =\r\n    IntuneAuditLogs\r\n    | where TimeGenerated >= ago(DetectionLookback)\r\n    | where OperationName has_any (AllDestructiveOps)\r\n    // Parse Properties JSON for actor resolution and application identification\r\n    | extend PropertiesJson = todynamic(Properties)\r\n    | extend\r\n        ActorType = toint(PropertiesJson.Actor.ActorType),\r\n        ActorAppName = tostring(PropertiesJson.Actor.ApplicationName),\r\n        ActorUPN = tostring(PropertiesJson.Actor.UPN),\r\n        ActorName = tostring(PropertiesJson.Actor.Name),\r\n        ActorObjectId = tostring(PropertiesJson.Actor.ObjectId),\r\n        TargetInfo = tostring(PropertiesJson.TargetDisplayNames)\r\n    // Suppress known automated applications (ActorType 5 = application identity)\r\n    | where not(ActorAppName has_any (SuppressedApplications))\r\n    // Resolve operator identity with structured fallback chain:\r\n    //   1. Top-level Identity field if it contains a UPN (has @)\r\n    //   2. Actor.UPN from Properties JSON\r\n    //   3. Actor.Name from Properties JSON\r\n    //   4. ApplicationName if the actor is an application (ActorType 5)\r\n    //   5. Raw Identity field as last resort\r\n    | extend RawIdentity = tostring(Identity)\r\n    | extend Operator = case(\r\n        RawIdentity contains \"@\", RawIdentity,\r\n        isnotempty(ActorUPN), ActorUPN,\r\n        isnotempty(ActorName), ActorName,\r\n        ActorType == 5 and isnotempty(ActorAppName), strcat(\"APP:\", ActorAppName),\r\n        RawIdentity\r\n    )\r\n    // Classify operation tier\r\n    | extend OperationTier = iff(OperationName has_any (Tier1_CriticalOps), \"Tier1_Critical\", \"Tier2_High\")\r\n    // Apply human operator suppression ONLY to Tier 2\r\n    | where not(OperationTier == \"Tier2_High\" and Operator has_any (SuppressedOperators))\r\n    | project\r\n        TimeGenerated,\r\n        Operator,\r\n        ActorType,\r\n        ActorAppName,\r\n        OperationName,\r\n        OperationTier,\r\n        TargetInfo,\r\n        CorrelationId,\r\n        ResultType;\r\n// =============================================================================\r\n// STEP 2: Historical operator baseline (Signals 3 and 5)\r\n// =============================================================================\r\n// 2a: Distinct historical operators for first-time detection (Signal 3)\r\nlet HistoricalOperators =\r\n    IntuneAuditLogs\r\n    | where TimeGenerated between (ago(BaselineLookbackDays) .. ago(DetectionLookback))\r\n    | where OperationName has_any (AllDestructiveOps)\r\n    | extend PropertiesJson = todynamic(Properties)\r\n    | extend\r\n        ActorAppName = tostring(PropertiesJson.Actor.ApplicationName),\r\n        ActorUPN = tostring(PropertiesJson.Actor.UPN),\r\n        ActorName = tostring(PropertiesJson.Actor.Name),\r\n        ActorType = toint(PropertiesJson.Actor.ActorType)\r\n    | where not(ActorAppName has_any (SuppressedApplications))\r\n    | extend RawIdentity = tostring(Identity)\r\n    | extend Operator = case(\r\n        RawIdentity contains \"@\", RawIdentity,\r\n        isnotempty(ActorUPN), ActorUPN,\r\n        isnotempty(ActorName), ActorName,\r\n        ActorType == 5 and isnotempty(ActorAppName), strcat(\"APP:\", ActorAppName),\r\n        RawIdentity\r\n    )\r\n    | distinct Operator;\r\n// 2b: Daily time-series per operator for ML anomaly detection (Signal 5)\r\nlet OperatorTimeSeries =\r\n    IntuneAuditLogs\r\n    | where TimeGenerated >= ago(BaselineLookbackDays)\r\n    | where OperationName has_any (AllDestructiveOps)\r\n    | extend PropertiesJson = todynamic(Properties)\r\n    | extend\r\n        ActorAppName = tostring(PropertiesJson.Actor.ApplicationName),\r\n        ActorUPN = tostring(PropertiesJson.Actor.UPN),\r\n        ActorName = tostring(PropertiesJson.Actor.Name),\r\n        ActorType = toint(PropertiesJson.Actor.ActorType)\r\n    | where not(ActorAppName has_any (SuppressedApplications))\r\n    | extend RawIdentity = tostring(Identity)\r\n    | extend Operator = case(\r\n        RawIdentity contains \"@\", RawIdentity,\r\n        isnotempty(ActorUPN), ActorUPN,\r\n        isnotempty(ActorName), ActorName,\r\n        ActorType == 5 and isnotempty(ActorAppName), strcat(\"APP:\", ActorAppName),\r\n        RawIdentity\r\n    )\r\n    // Build daily counts per operator over the baseline window\r\n    | make-series ActionCount = count() on TimeGenerated from ago(BaselineLookbackDays) to now() step MLSeriesBinSize by Operator\r\n    // Apply ML anomaly detection to each operator's time-series\r\n    // series_decompose_anomalies() decomposes into baseline, seasonal, trend,\r\n    // and residual components, then flags points where the residual exceeds\r\n    // the sensitivity threshold (1 = positive anomaly, -1 = negative, 0 = normal)\r\n    | extend (AnomalyFlags, AnomalyScore, AnomalyBaseline) = series_decompose_anomalies(ActionCount, MLSensitivity)\r\n    // Extract the most recent data point's anomaly status\r\n    | extend\r\n        LatestAnomalyFlag = toint(array_slice(AnomalyFlags, -1, -1)[0]),\r\n        LatestAnomalyScore = toreal(array_slice(AnomalyScore, -1, -1)[0]),\r\n        LatestCount = toint(array_slice(ActionCount, -1, -1)[0]),\r\n        LatestBaseline = toreal(array_slice(AnomalyBaseline, -1, -1)[0])\r\n    // Only keep operators where the latest period is a positive anomaly (spike)\r\n    | where LatestAnomalyFlag == 1\r\n    | project\r\n        Operator,\r\n        ML_IsAnomaly = true,\r\n        ML_AnomalyScore = LatestAnomalyScore,\r\n        ML_ActualCount = LatestCount,\r\n        ML_ExpectedBaseline = LatestBaseline,\r\n        ML_DeviationFactor = iff(LatestBaseline > 0, round(toreal(LatestCount) / LatestBaseline, 2), toreal(LatestCount));\r\n// =============================================================================\r\n// STEP 3: Build per-operator summary for the detection window\r\n// =============================================================================\r\nlet OperatorSummary =\r\n    CurrentEvents\r\n    | summarize\r\n        TotalActions = count(),\r\n        Tier1Count = countif(OperationTier == \"Tier1_Critical\"),\r\n        Tier2Count = countif(OperationTier == \"Tier2_High\"),\r\n        FirstAction = min(TimeGenerated),\r\n        LastAction = max(TimeGenerated),\r\n        ActionTypes = make_set(OperationName),\r\n        OperationTiers = make_set(OperationTier),\r\n        TargetDevices = make_set(TargetInfo, 25),\r\n        ResultTypes = make_set(ResultType)\r\n        by Operator\r\n    | extend ActionSpanMinutes = datetime_diff('minute', LastAction, FirstAction)\r\n    // Signal 1: Static velocity threshold (hard floor)\r\n    | extend Signal_MassWipeVelocity = iff(\r\n        Tier1Count >= Tier1Threshold or Tier2Count >= Tier2Threshold,\r\n        true, false\r\n    )\r\n    // Signal 2: Bulk operations from single operator\r\n    | extend Signal_BulkWipeOperator = iff(TotalActions >= 2, true, false)\r\n    // Tier 1 presence flag for severity escalation\r\n    | extend HasTier1Event = iff(Tier1Count > 0, true, false);\r\n// =============================================================================\r\n// STEP 4: Enrich with Signal 3 — First-time operator detection\r\n// =============================================================================\r\nlet EnrichedWithBaseline =\r\n    OperatorSummary\r\n    | extend Signal_FirstTimeOperator = iff(\r\n        Operator !in (HistoricalOperators), true, false\r\n    );\r\n// =============================================================================\r\n// STEP 5: Enrich with Signal 4 — UEBA anomaly correlation\r\n// =============================================================================\r\n// 5a: Sentinel Anomalies\r\nlet RecentAnomalies =\r\n    Anomalies\r\n    | where TimeGenerated >= ago(DetectionLookback + UEBACorrelationWindow)\r\n    | where isnotempty(UserPrincipalName)\r\n    | project\r\n        AnomalyTime = TimeGenerated,\r\n        AnomalyOperator = UserPrincipalName,\r\n        AnomalyName = AnomalyTemplateName,\r\n        AnomalyScore = Score,\r\n        AnomalyDescription = Description;\r\n// 5b: BehaviorAnalytics\r\nlet RecentBehaviorAnomalies =\r\n    BehaviorAnalytics\r\n    | where TimeGenerated >= ago(DetectionLookback + UEBACorrelationWindow)\r\n    | where InvestigationPriority > 0\r\n    | where isnotempty(UserPrincipalName)\r\n    | project\r\n        BehaviorTime = TimeGenerated,\r\n        BehaviorOperator = UserPrincipalName,\r\n        BehaviorActivityType = ActivityType,\r\n        BehaviorPriority = InvestigationPriority,\r\n        BehaviorInsights = ActivityInsights;\r\n// 5c: Correlate Anomalies table with operators\r\nlet WithAnomalyCorrelation =\r\n    EnrichedWithBaseline\r\n    | join kind=leftouter (\r\n        RecentAnomalies\r\n    ) on $left.Operator == $right.AnomalyOperator\r\n    | extend AnomalyWithinWindow = iff(\r\n        isnotempty(AnomalyTime) and\r\n        AnomalyTime between ((FirstAction - UEBACorrelationWindow) .. (LastAction + UEBACorrelationWindow)),\r\n        true, false\r\n    )\r\n    | summarize\r\n        take_any(TotalActions),\r\n        take_any(Tier1Count),\r\n        take_any(Tier2Count),\r\n        take_any(FirstAction),\r\n        take_any(LastAction),\r\n        take_any(ActionTypes),\r\n        take_any(OperationTiers),\r\n        take_any(TargetDevices),\r\n        take_any(ActionSpanMinutes),\r\n        take_any(Signal_MassWipeVelocity),\r\n        take_any(Signal_BulkWipeOperator),\r\n        take_any(Signal_FirstTimeOperator),\r\n        take_any(HasTier1Event),\r\n        take_any(ResultTypes),\r\n        CorrelatedAnomalies = make_set_if(AnomalyName, AnomalyWithinWindow == true),\r\n        MaxAnomalyScore = max(iff(AnomalyWithinWindow == true, AnomalyScore, real(0)))\r\n        by Operator;\r\n// 5d: Correlate BehaviorAnalytics with operators\r\nlet WithFullUEBA =\r\n    WithAnomalyCorrelation\r\n    | join kind=leftouter (\r\n        RecentBehaviorAnomalies\r\n    ) on $left.Operator == $right.BehaviorOperator\r\n    | extend BehaviorWithinWindow = iff(\r\n        isnotempty(BehaviorTime) and\r\n        BehaviorTime between ((FirstAction - UEBACorrelationWindow) .. (LastAction + UEBACorrelationWindow)),\r\n        true, false\r\n    )\r\n    | summarize\r\n        take_any(TotalActions),\r\n        take_any(Tier1Count),\r\n        take_any(Tier2Count),\r\n        take_any(FirstAction),\r\n        take_any(LastAction),\r\n        take_any(ActionTypes),\r\n        take_any(OperationTiers),\r\n        take_any(TargetDevices),\r\n        take_any(ActionSpanMinutes),\r\n        take_any(Signal_MassWipeVelocity),\r\n        take_any(Signal_BulkWipeOperator),\r\n        take_any(Signal_FirstTimeOperator),\r\n        take_any(HasTier1Event),\r\n        take_any(ResultTypes),\r\n        take_any(CorrelatedAnomalies),\r\n        take_any(MaxAnomalyScore),\r\n        CorrelatedBehaviors = make_set_if(BehaviorActivityType, BehaviorWithinWindow == true),\r\n        MaxBehaviorPriority = max(iff(BehaviorWithinWindow == true, BehaviorPriority, 0))\r\n        by Operator\r\n    | extend Signal_UEBACorrelation = iff(\r\n        array_length(CorrelatedAnomalies) > 0 or array_length(CorrelatedBehaviors) > 0,\r\n        true, false\r\n    );\r\n// =============================================================================\r\n// STEP 6: Enrich with Signal 5 — ML anomaly detection\r\n// =============================================================================\r\nlet WithMLAnomaly =\r\n    WithFullUEBA\r\n    | join kind=leftouter (\r\n        OperatorTimeSeries\r\n    ) on Operator\r\n    | extend\r\n        Signal_MLAnomaly = iff(ML_IsAnomaly == true, true, false),\r\n        ML_AnomalyScore = coalesce(ML_AnomalyScore, real(0)),\r\n        ML_ActualCount = coalesce(ML_ActualCount, 0),\r\n        ML_ExpectedBaseline = coalesce(ML_ExpectedBaseline, real(0)),\r\n        ML_DeviationFactor = coalesce(ML_DeviationFactor, real(0));\r\n// =============================================================================\r\n// STEP 7: Enrich with IdentityInfo for role context\r\n// =============================================================================\r\nlet WithRoleContext =\r\n    WithMLAnomaly\r\n    | join kind=leftouter (\r\n        IdentityInfo\r\n        | where TimeGenerated >= ago(14d)\r\n        | summarize arg_max(TimeGenerated, *) by AccountUPN\r\n        | project\r\n            RoleOperator = AccountUPN,\r\n            AssignedRoles = AssignedRoles,\r\n            Department = Department,\r\n            JobTitle = JobTitle,\r\n            IsAccountEnabled = IsAccountEnabled\r\n    ) on $left.Operator == $right.RoleOperator;\r\n// =============================================================================\r\n// STEP 8: Final scoring, severity classification, and output\r\n// =============================================================================\r\nWithRoleContext\r\n| extend\r\n    // Count how many signals fired\r\n    SignalCount = toint(Signal_MassWipeVelocity)\r\n               + toint(Signal_BulkWipeOperator)\r\n               + toint(Signal_FirstTimeOperator)\r\n               + toint(Signal_UEBACorrelation)\r\n               + toint(Signal_MLAnomaly),\r\n    // Human-readable signal list\r\n    DetectionSignals = strcat_array(\r\n        array_concat(\r\n            iff(Signal_MassWipeVelocity == true, dynamic([\"MASS_WIPE_VELOCITY\"]), dynamic([])),\r\n            iff(Signal_BulkWipeOperator == true, dynamic([\"BULK_WIPE_OPERATOR\"]), dynamic([])),\r\n            iff(Signal_FirstTimeOperator == true, dynamic([\"FIRST_TIME_OPERATOR\"]), dynamic([])),\r\n            iff(Signal_UEBACorrelation == true, dynamic([\"UEBA_ANOMALY_CORRELATED\"]), dynamic([])),\r\n            iff(Signal_MLAnomaly == true, dynamic([\"ML_BEHAVIORAL_ANOMALY\"]), dynamic([]))\r\n        ), \", \"\r\n    )\r\n// Severity logic:\r\n//   ANY Tier 1 event = Critical (wipe/retire is rare in most environments)\r\n//   4-5 signals = Critical (overwhelming evidence of compromise)\r\n//   3 signals = High\r\n//   2 signals = Medium\r\n//   1 signal = Low (informational — single weak signal)\r\n| extend AlertSeverity = case(\r\n    HasTier1Event == true, \"Critical\",\r\n    SignalCount >= 4, \"Critical\",\r\n    SignalCount == 3, \"High\",\r\n    SignalCount == 2, \"Medium\",\r\n    SignalCount == 1, \"Low\",\r\n    \"Informational\"\r\n)\r\n// Only surface results where at least one signal fired\r\n| where SignalCount >= 1\r\n| project\r\n    FirstAction,\r\n    LastAction,\r\n    Operator,\r\n    TotalActions,\r\n    Tier1Count,\r\n    Tier2Count,\r\n    ActionSpanMinutes,\r\n    ActionTypes,\r\n    AlertSeverity,\r\n    HasTier1Event,\r\n    SignalCount,\r\n    DetectionSignals,\r\n    // Individual signal flags\r\n    Signal_MassWipeVelocity,\r\n    Signal_BulkWipeOperator,\r\n    Signal_FirstTimeOperator,\r\n    Signal_UEBACorrelation,\r\n    Signal_MLAnomaly,\r\n    // UEBA context\r\n    CorrelatedAnomalies,\r\n    MaxAnomalyScore,\r\n    CorrelatedBehaviors,\r\n    MaxBehaviorPriority,\r\n    // ML context\r\n    ML_AnomalyScore,\r\n    ML_ActualCount,\r\n    ML_ExpectedBaseline,\r\n    ML_DeviationFactor,\r\n    // Identity context\r\n    AssignedRoles,\r\n    Department,\r\n    JobTitle,\r\n    IsAccountEnabled,\r\n    // Action details\r\n    TargetDevices,\r\n    ResultTypes\r\n| order by AlertSeverity asc, SignalCount desc, TotalActions desc\r\n// =============================================================================\r\n// DISCOVERY QUERY (Run this BEFORE deploying the detection)\r\n// Purpose: Map your environment's baseline wipe/retire/delete activity to\r\n//          inform suppression lists and threshold tuning.\r\n// =============================================================================\r\n// let DestructiveOperations = dynamic([\r\n//     \"wipe ManagedDevice\", \"Wipe ManagedDevice\",\r\n//     \"retire ManagedDevice\", \"Retire ManagedDevice\",\r\n//     \"Delete ManagedDevice\"\r\n// ]);\r\n// IntuneAuditLogs\r\n// | where TimeGenerated >= ago(30d)\r\n// | where OperationName has_any (DestructiveOperations)\r\n// | extend PropertiesJson = todynamic(Properties)\r\n// | extend\r\n//     ActorType = toint(PropertiesJson.Actor.ActorType),\r\n//     ActorAppName = tostring(PropertiesJson.Actor.ApplicationName)\r\n// | extend RawIdentity = tostring(Identity)\r\n// | extend Operator = case(\r\n//     RawIdentity contains \"@\", RawIdentity,\r\n//     isnotempty(tostring(PropertiesJson.Actor.UPN)), tostring(PropertiesJson.Actor.UPN),\r\n//     isnotempty(tostring(PropertiesJson.Actor.Name)), tostring(PropertiesJson.Actor.Name),\r\n//     ActorType == 5 and isnotempty(ActorAppName), strcat(\"APP:\", ActorAppName),\r\n//     RawIdentity\r\n// )\r\n// | summarize\r\n//     TotalActions = count(),\r\n//     WipeCount = countif(OperationName has \"wipe\"),\r\n//     RetireCount = countif(OperationName has \"retire\"),\r\n//     DeleteCount = countif(OperationName has \"Delete\"),\r\n//     FirstSeen = min(TimeGenerated),\r\n//     LastSeen = max(TimeGenerated),\r\n//     ActionTypes = make_set(OperationName)\r\n//     by Operator, ActorType, ActorAppName\r\n// | order by TotalActions desc"
