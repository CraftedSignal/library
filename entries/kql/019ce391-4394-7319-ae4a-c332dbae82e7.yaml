id: 019ce391-4394-7319-ae4a-c332dbae82e7
name: Stryker-Pattern Mass Device Wipe / Destructive Intune Admin Actions
description: 'Detects mass device wipe, retire, or delete operations performed via Microsoft Intune, inspired by the Stryker/Handala attack. This rule combines five detection signals: static velocity threshold, bulk destructive actions from a single operator, first-time operator detection, UEBA anomaly correlation, and ML anomaly detection. Operations are categorized into Tier 1 (critical, zero baseline activity like wipe/retire) and Tier 2 (high, legitimate IT ops activity like device delete, subject to velocity and ML thresholds). Severity escalates based on the number of overlapping signals.'
query: "// =============================================================================\r\n// DETECTION: Stryker-Pattern Mass Device Wipe / Destructive Intune Admin Actions\r\n// VERSION: 2.1 (Production — Defender XDR Custom Detection Rule)\r\n// =============================================================================\r\n// PURPOSE: Unified detection for mass device wipe/retire/delete operations via\r\n//          Microsoft Intune, inspired by the Stryker/Handala attack (March 2026).\r\n//          Combines five detection signals into one custom detection rule:\r\n//            Signal 1 - Static velocity threshold (hard floor — belt)\r\n//            Signal 2 - Bulk destructive actions from a single operator\r\n//            Signal 3 - First-time operator (no history in 14-day baseline)\r\n//            Signal 4 - UEBA anomaly correlation (Anomalies + BehaviorAnalytics)\r\n//            Signal 5 - ML anomaly detection via series_decompose_anomalies()\r\n//                       (per-operator behavioral baseline — suspenders)\r\n//          Each signal fires independently; severity escalates on signal overlap.\r\n//          Operations are split into two tiers:\r\n//            Tier 1 (Critical) — Full device wipe/retire. ANY occurrence = alert.\r\n//            Tier 2 (High) — Device delete. Velocity thresholds and ML apply.\r\n//\r\n// DEFENDER XDR REQUIREMENTS:\r\n//   - Timestamp and ReportId must be present in the output\r\n//   - ReportId derived from CorrelationId (IntuneAuditLogs has no native ReportId)\r\n//   - Timestamp set to LastAction (most recent event per operator)\r\n//   - Do NOT filter on Timestamp — Defender pre-filters based on rule frequency\r\n//\r\n// TABLES REQUIRED:\r\n//   - IntuneAuditLogs (Intune diagnostic settings -> Log Analytics)\r\n//   - Anomalies (Sentinel UEBA anomaly rules — must be enabled)\r\n//   - BehaviorAnalytics (Sentinel UEBA — must be enabled)\r\n//   - IdentityInfo (Sentinel UEBA — synced from Entra ID / Defender for Identity)\r\n//\r\n// MITRE ATT&CK:\r\n//   - Tactic: Impact (TA0040)\r\n//     - Technique: Data Destruction (T1485)\r\n//     - Technique: Disk Wipe (T1561) / Sub-technique: Disk Content Wipe (T1561.001)\r\n//   - Tactic: Persistence (TA0003)\r\n//     - Technique: Account Manipulation (T1098)\r\n//   - Tactic: Privilege Escalation (TA0004)\r\n//     - Technique: Abuse Elevation Control Mechanism (T1548)\r\n//\r\n// AUTHOR: Nicholas Isakson\r\n// =============================================================================\r\n// TUNABLE THRESHOLDS\r\n// -----------------------------------------------------------------------------\r\nlet Tier1Threshold = 1;\r\nlet Tier2Threshold = 5;\r\nlet VelocityWindowMinutes = 15m;\r\nlet BaselineLookbackDays = 14d;\r\nlet UEBACorrelationWindow = 60m;\r\n// DetectionLookback: Set to match your Defender XDR custom detection rule\r\n//   frequency (1h, 3h, 12h, or 24h). Default 1d for daily frequency.\r\nlet DetectionLookback = 1d;\r\nlet MLSensitivity = 1.5;\r\nlet MLSeriesBinSize = 1d;\r\n// -----------------------------------------------------------------------------\r\n// OPERATION TIERS\r\n// -----------------------------------------------------------------------------\r\nlet Tier1_CriticalOps = dynamic([\r\n    \"wipe ManagedDevice\", \"Wipe ManagedDevice\",\r\n    \"retire ManagedDevice\", \"Retire ManagedDevice\"\r\n]);\r\nlet Tier2_HighOps = dynamic([\"Delete ManagedDevice\"]);\r\nlet AllDestructiveOps = array_concat(Tier1_CriticalOps, Tier2_HighOps);\r\n// -----------------------------------------------------------------------------\r\n// SUPPRESSION LISTS\r\n// -----------------------------------------------------------------------------\r\n// SuppressedOperators: Tier 2 only. Tier 1 events are NEVER suppressed.\r\nlet SuppressedOperators = dynamic([\r\n    \"\"\r\n]);\r\n// SuppressedApplications: Automated Intune housekeeping apps.\r\nlet SuppressedApplications = dynamic([\"DuplicatePhoneRegistrationCleanup\"]);\r\n// =============================================================================\r\n// STEP 1: Gather all destructive Intune actions in the detection window\r\n// =============================================================================\r\nlet CurrentEvents =\r\n    IntuneAuditLogs\r\n    | where TimeGenerated >= ago(DetectionLookback)\r\n    | where OperationName has_any (AllDestructiveOps)\r\n    | extend PropertiesJson = todynamic(Properties)\r\n    | extend\r\n        ActorType = toint(PropertiesJson.Actor.ActorType),\r\n        ActorAppName = tostring(PropertiesJson.Actor.ApplicationName),\r\n        ActorUPN = tostring(PropertiesJson.Actor.UPN),\r\n        ActorName = tostring(PropertiesJson.Actor.Name),\r\n        ActorObjectId = tostring(PropertiesJson.Actor.ObjectId),\r\n        TargetInfo = tostring(PropertiesJson.TargetDisplayNames)\r\n    | where not(ActorAppName has_any (SuppressedApplications))\r\n    | extend RawIdentity = tostring(Identity)\r\n    | extend Operator = case(\r\n        RawIdentity contains \"@\", RawIdentity,\r\n        isnotempty(ActorUPN), ActorUPN,\r\n        isnotempty(ActorName), ActorName,\r\n        ActorType == 5 and isnotempty(ActorAppName), strcat(\"APP:\", ActorAppName),\r\n        RawIdentity\r\n    )\r\n    | extend OperationTier = iff(OperationName has_any (Tier1_CriticalOps), \"Tier1_Critical\", \"Tier2_High\")\r\n    | where not(OperationTier == \"Tier2_High\" and Operator has_any (SuppressedOperators))\r\n    | extend ReportId = CorrelationId\r\n    | project\r\n        TimeGenerated,\r\n        ReportId,\r\n        Operator,\r\n        ActorType,\r\n        ActorAppName,\r\n        OperationName,\r\n        OperationTier,\r\n        TargetInfo,\r\n        ResultType;\r\n// =============================================================================\r\n// STEP 2: Historical operator baseline (Signals 3 and 5)\r\n// =============================================================================\r\nlet HistoricalOperators =\r\n    IntuneAuditLogs\r\n    | where TimeGenerated between (ago(BaselineLookbackDays) .. ago(DetectionLookback))\r\n    | where OperationName has_any (AllDestructiveOps)\r\n    | extend PropertiesJson = todynamic(Properties)\r\n    | extend\r\n        ActorAppName = tostring(PropertiesJson.Actor.ApplicationName),\r\n        ActorUPN = tostring(PropertiesJson.Actor.UPN),\r\n        ActorName = tostring(PropertiesJson.Actor.Name),\r\n        ActorType = toint(PropertiesJson.Actor.ActorType)\r\n    | where not(ActorAppName has_any (SuppressedApplications))\r\n    | extend RawIdentity = tostring(Identity)\r\n    | extend Operator = case(\r\n        RawIdentity contains \"@\", RawIdentity,\r\n        isnotempty(ActorUPN), ActorUPN,\r\n        isnotempty(ActorName), ActorName,\r\n        ActorType == 5 and isnotempty(ActorAppName), strcat(\"APP:\", ActorAppName),\r\n        RawIdentity\r\n    )\r\n    | distinct Operator;\r\nlet OperatorTimeSeries =\r\n    IntuneAuditLogs\r\n    | where TimeGenerated >= ago(BaselineLookbackDays)\r\n    | where OperationName has_any (AllDestructiveOps)\r\n    | extend PropertiesJson = todynamic(Properties)\r\n    | extend\r\n        ActorAppName = tostring(PropertiesJson.Actor.ApplicationName),\r\n        ActorUPN = tostring(PropertiesJson.Actor.UPN),\r\n        ActorName = tostring(PropertiesJson.Actor.Name),\r\n        ActorType = toint(PropertiesJson.Actor.ActorType)\r\n    | where not(ActorAppName has_any (SuppressedApplications))\r\n    | extend RawIdentity = tostring(Identity)\r\n    | extend Operator = case(\r\n        RawIdentity contains \"@\", RawIdentity,\r\n        isnotempty(ActorUPN), ActorUPN,\r\n        isnotempty(ActorName), ActorName,\r\n        ActorType == 5 and isnotempty(ActorAppName), strcat(\"APP:\", ActorAppName),\r\n        RawIdentity\r\n    )\r\n    | make-series ActionCount = count() on TimeGenerated from ago(BaselineLookbackDays) to now() step MLSeriesBinSize by Operator\r\n    | extend (AnomalyFlags, AnomalyScore, AnomalyBaseline) = series_decompose_anomalies(ActionCount, MLSensitivity)\r\n    | extend\r\n        LatestAnomalyFlag = toint(array_slice(AnomalyFlags, -1, -1)[0]),\r\n        LatestAnomalyScore = toreal(array_slice(AnomalyScore, -1, -1)[0]),\r\n        LatestCount = toint(array_slice(ActionCount, -1, -1)[0]),\r\n        LatestBaseline = toreal(array_slice(AnomalyBaseline, -1, -1)[0])\r\n    | where LatestAnomalyFlag == 1\r\n    | project\r\n        Operator,\r\n        ML_IsAnomaly = true,\r\n        ML_AnomalyScore = LatestAnomalyScore,\r\n        ML_ActualCount = LatestCount,\r\n        ML_ExpectedBaseline = LatestBaseline,\r\n        ML_DeviationFactor = iff(LatestBaseline > 0, round(toreal(LatestCount) / LatestBaseline, 2), toreal(LatestCount));\r\n// =============================================================================\r\n// STEP 3: Build per-operator summary for the detection window\r\n// =============================================================================\r\nlet OperatorSummary =\r\n    CurrentEvents\r\n    | summarize\r\n        TotalActions = count(),\r\n        ReportId = take_any(ReportId),\r\n        Tier1Count = countif(OperationTier == \"Tier1_Critical\"),\r\n        Tier2Count = countif(OperationTier == \"Tier2_High\"),\r\n        FirstAction = min(TimeGenerated),\r\n        LastAction = max(TimeGenerated),\r\n        ActionTypes = make_set(OperationName),\r\n        OperationTiers = make_set(OperationTier),\r\n        TargetDevices = make_set(TargetInfo, 25),\r\n        ResultTypes = make_set(ResultType)\r\n        by Operator\r\n    | extend ActionSpanMinutes = datetime_diff('minute', LastAction, FirstAction)\r\n    | extend Signal_MassWipeVelocity = iff(Tier1Count >= Tier1Threshold or Tier2Count >= Tier2Threshold, true, false)\r\n    | extend Signal_BulkWipeOperator = iff(TotalActions >= 2, true, false)\r\n    | extend HasTier1Event = iff(Tier1Count > 0, true, false);\r\n// =============================================================================\r\n// STEP 4: Enrich with Signal 3 — First-time operator detection\r\n// =============================================================================\r\nlet EnrichedWithBaseline =\r\n    OperatorSummary\r\n    | extend Signal_FirstTimeOperator = iff(Operator !in (HistoricalOperators), true, false);\r\n// =============================================================================\r\n// STEP 5: Enrich with Signal 4 — UEBA anomaly correlation\r\n// =============================================================================\r\nlet RecentAnomalies =\r\n    Anomalies\r\n    | where TimeGenerated >= ago(DetectionLookback + UEBACorrelationWindow)\r\n    | where isnotempty(UserPrincipalName)\r\n    | project AnomalyTime = TimeGenerated, AnomalyOperator = UserPrincipalName, AnomalyName = AnomalyTemplateName, AnomalyScore = Score, AnomalyDescription = Description;\r\nlet RecentBehaviorAnomalies =\r\n    BehaviorAnalytics\r\n    | where TimeGenerated >= ago(DetectionLookback + UEBACorrelationWindow)\r\n    | where InvestigationPriority > 0\r\n    | where isnotempty(UserPrincipalName)\r\n    | project BehaviorTime = TimeGenerated, BehaviorOperator = UserPrincipalName, BehaviorActivityType = ActivityType, BehaviorPriority = InvestigationPriority, BehaviorInsights = ActivityInsights;\r\nlet WithAnomalyCorrelation =\r\n    EnrichedWithBaseline\r\n    | join kind=leftouter (RecentAnomalies) on $left.Operator == $right.AnomalyOperator\r\n    | extend AnomalyWithinWindow = iff(isnotempty(AnomalyTime) and AnomalyTime between ((FirstAction - UEBACorrelationWindow) .. (LastAction + UEBACorrelationWindow)), true, false)\r\n    | summarize\r\n        ReportId = take_any(ReportId),\r\n        TotalActions = take_any(TotalActions),\r\n        Tier1Count = take_any(Tier1Count),\r\n        Tier2Count = take_any(Tier2Count),\r\n        FirstAction = take_any(FirstAction),\r\n        LastAction = take_any(LastAction),\r\n        ActionTypes = take_any(ActionTypes),\r\n        OperationTiers = take_any(OperationTiers),\r\n        TargetDevices = take_any(TargetDevices),\r\n        ActionSpanMinutes = take_any(ActionSpanMinutes),\r\n        Signal_MassWipeVelocity = take_any(Signal_MassWipeVelocity),\r\n        Signal_BulkWipeOperator = take_any(Signal_BulkWipeOperator),\r\n        Signal_FirstTimeOperator = take_any(Signal_FirstTimeOperator),\r\n        HasTier1Event = take_any(HasTier1Event),\r\n        ResultTypes = take_any(ResultTypes),\r\n        CorrelatedAnomalies = make_set_if(AnomalyName, AnomalyWithinWindow == true),\r\n        MaxAnomalyScore = max(iff(AnomalyWithinWindow == true, AnomalyScore, real(0)))\r\n        by Operator;\r\nlet WithFullUEBA =\r\n    WithAnomalyCorrelation\r\n    | join kind=leftouter (RecentBehaviorAnomalies) on $left.Operator == $right.BehaviorOperator\r\n    | extend BehaviorWithinWindow = iff(isnotempty(BehaviorTime) and BehaviorTime between ((FirstAction - UEBACorrelationWindow) .. (LastAction + UEBACorrelationWindow)), true, false)\r\n    | summarize\r\n        ReportId = take_any(ReportId),\r\n        TotalActions = take_any(TotalActions),\r\n        Tier1Count = take_any(Tier1Count),\r\n        Tier2Count = take_any(Tier2Count),\r\n        FirstAction = take_any(FirstAction),\r\n        LastAction = take_any(LastAction),\r\n        ActionTypes = take_any(ActionTypes),\r\n        OperationTiers = take_any(OperationTiers),\r\n        TargetDevices = take_any(TargetDevices),\r\n        ActionSpanMinutes = take_any(ActionSpanMinutes),\r\n        Signal_MassWipeVelocity = take_any(Signal_MassWipeVelocity),\r\n        Signal_BulkWipeOperator = take_any(Signal_BulkWipeOperator),\r\n        Signal_FirstTimeOperator = take_any(Signal_FirstTimeOperator),\r\n        HasTier1Event = take_any(HasTier1Event),\r\n        ResultTypes = take_any(ResultTypes),\r\n        CorrelatedAnomalies = take_any(CorrelatedAnomalies),\r\n        MaxAnomalyScore = take_any(MaxAnomalyScore),\r\n        CorrelatedBehaviors = make_set_if(BehaviorActivityType, BehaviorWithinWindow == true),\r\n        MaxBehaviorPriority = max(iff(BehaviorWithinWindow == true, BehaviorPriority, 0))\r\n        by Operator\r\n    | extend Signal_UEBACorrelation = iff(array_length(CorrelatedAnomalies) > 0 or array_length(CorrelatedBehaviors) > 0, true, false);\r\n// =============================================================================\r\n// STEP 6: Enrich with Signal 5 — ML anomaly detection\r\n// =============================================================================\r\nlet WithMLAnomaly =\r\n    WithFullUEBA\r\n    | join kind=leftouter (OperatorTimeSeries) on Operator\r\n    | extend\r\n        Signal_MLAnomaly = iff(ML_IsAnomaly == true, true, false),\r\n        ML_AnomalyScore = coalesce(ML_AnomalyScore, real(0)),\r\n        ML_ActualCount = coalesce(ML_ActualCount, 0),\r\n        ML_ExpectedBaseline = coalesce(ML_ExpectedBaseline, real(0)),\r\n        ML_DeviationFactor = coalesce(ML_DeviationFactor, real(0));\r\n// =============================================================================\r\n// STEP 7: Enrich with IdentityInfo for role context\r\n// =============================================================================\r\nlet WithRoleContext =\r\n    WithMLAnomaly\r\n    | join kind=leftouter (\r\n        IdentityInfo\r\n        | where TimeGenerated >= ago(14d)\r\n        | summarize arg_max(TimeGenerated, AssignedRoles, Department, JobTitle, IsAccountEnabled) by AccountUpn\r\n        | project Operator = AccountUpn, AssignedRoles, Department, JobTitle, IsAccountEnabled\r\n    ) on Operator;\r\n// =============================================================================\r\n// STEP 8: Final scoring, severity classification, and output\r\n// =============================================================================\r\nWithRoleContext\r\n| extend\r\n    SignalCount = toint(Signal_MassWipeVelocity) + toint(Signal_BulkWipeOperator) + toint(Signal_FirstTimeOperator) + toint(Signal_UEBACorrelation) + toint(Signal_MLAnomaly),\r\n    DetectionSignals = strcat_array(\r\n        array_concat(\r\n            iff(Signal_MassWipeVelocity == true, dynamic([\"MASS_WIPE_VELOCITY\"]), dynamic([])),\r\n            iff(Signal_BulkWipeOperator == true, dynamic([\"BULK_WIPE_OPERATOR\"]), dynamic([])),\r\n            iff(Signal_FirstTimeOperator == true, dynamic([\"FIRST_TIME_OPERATOR\"]), dynamic([])),\r\n            iff(Signal_UEBACorrelation == true, dynamic([\"UEBA_ANOMALY_CORRELATED\"]), dynamic([])),\r\n            iff(Signal_MLAnomaly == true, dynamic([\"ML_BEHAVIORAL_ANOMALY\"]), dynamic([]))\r\n        ), \", \"\r\n    )\r\n| extend AlertSeverity = case(\r\n    HasTier1Event == true, \"Critical\",\r\n    SignalCount >= 4, \"Critical\",\r\n    SignalCount == 3, \"High\",\r\n    SignalCount == 2, \"Medium\",\r\n    SignalCount == 1, \"Low\",\r\n    \"Informational\"\r\n)\r\n| where SignalCount >= 1\r\n| extend Timestamp = LastAction\r\n| project\r\n    Timestamp,\r\n    ReportId,\r\n    UserPrincipalName = Operator,\r\n    FirstAction,\r\n    LastAction,\r\n    Operator,\r\n    TotalActions,\r\n    Tier1Count,\r\n    Tier2Count,\r\n    ActionSpanMinutes,\r\n    ActionTypes,\r\n    AlertSeverity,\r\n    HasTier1Event,\r\n    SignalCount,\r\n    DetectionSignals,\r\n    Signal_MassWipeVelocity,\r\n    Signal_BulkWipeOperator,\r\n    Signal_FirstTimeOperator,\r\n    Signal_UEBACorrelation,\r\n    Signal_MLAnomaly,\r\n    CorrelatedAnomalies,\r\n    MaxAnomalyScore,\r\n    CorrelatedBehaviors,\r\n    MaxBehaviorPriority,\r\n    ML_AnomalyScore,\r\n    ML_ActualCount,\r\n    ML_ExpectedBaseline,\r\n    ML_DeviationFactor,\r\n    AssignedRoles,\r\n    Department,\r\n    JobTitle,\r\n    IsAccountEnabled,\r\n    TargetDevices,\r\n    ResultTypes\r\n| order by AlertSeverity asc, SignalCount desc, TotalActions desc\r\n// =============================================================================\r\n// DISCOVERY QUERY (Run this BEFORE deploying the detection)\r\n// Purpose: Map your environment's baseline wipe/retire/delete activity to\r\n//          inform suppression lists and threshold tuning.\r\n// =============================================================================\r\n// let DestructiveOperations = dynamic([\r\n//     \"wipe ManagedDevice\", \"Wipe ManagedDevice\",\r\n//     \"retire ManagedDevice\", \"Retire ManagedDevice\",\r\n//     \"Delete ManagedDevice\"\r\n// ]);\r\n// IntuneAuditLogs\r\n// | where TimeGenerated >= ago(30d)\r\n// | where OperationName has_any (DestructiveOperations)\r\n// | extend PropertiesJson = todynamic(Properties)\r\n// | extend\r\n//     ActorType = toint(PropertiesJson.Actor.ActorType),\r\n//     ActorAppName = tostring(PropertiesJson.Actor.ApplicationName)\r\n// | extend RawIdentity = tostring(Identity)\r\n// | extend Operator = case(\r\n//     RawIdentity contains \"@\", RawIdentity,\r\n//     isnotempty(tostring(PropertiesJson.Actor.UPN)), tostring(PropertiesJson.Actor.UPN),\r\n//     isnotempty(tostring(PropertiesJson.Actor.Name)), tostring(PropertiesJson.Actor.Name),\r\n//     ActorType == 5 and isnotempty(ActorAppName), strcat(\"APP:\", ActorAppName),\r\n//     RawIdentity\r\n// )\r\n// | summarize\r\n//     TotalActions = count(),\r\n//     WipeCount = countif(OperationName has \"wipe\"),\r\n//     RetireCount = countif(OperationName has \"retire\"),\r\n//     DeleteCount = countif(OperationName has \"Delete\"),\r\n//     FirstSeen = min(TimeGenerated),\r\n//     LastSeen = max(TimeGenerated),\r\n//     ActionTypes = make_set(OperationName)\r\n//     by Operator, ActorType, ActorAppName\r\n// | order by TotalActions desc"
