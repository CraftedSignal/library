id: 36484533-19ce-4e00-81a3-f3dbb17b96ab
name: MS Graph Enumeration Attack Detection
description: Detect suspicious graph user activity with behavioral analytics (UEBA)
query: "let AnomalousUsers =\r\nCloudAppEvents\r\n| where Timestamp > ago(48h)\r\n| where UncommonForUser has \"UserAgent\"\r\n and UncommonForUser has \"ISP\" \r\n and UncommonForUser has \"CountryCode\"\r\n| distinct AccountObjectId;\r\nGraphAPIAuditEvents\r\n| where Timestamp > ago(48h)\r\n| where AccountObjectId  has_any(AnomalousUsers)"
query_type: kql
severity: medium
tactics:
    - TA0043
tags:
    - kql
author: Steven Lim
version: "1"
