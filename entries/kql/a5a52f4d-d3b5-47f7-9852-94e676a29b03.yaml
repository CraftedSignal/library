id: a5a52f4d-d3b5-47f7-9852-94e676a29b03
name: CVE-2025-21298 Zero-Click RCE
description: 'KQL Query from file: CVE-2025-21298 Zero-Click RCE'
query: "// https://msrc.microsoft.com/update-guide/en-US/advisory/CVE-2025-21298\n\nlet InboundRTF =\nEmailAttachmentInfo\n| where FileType == \"rtf\"\n| join EmailEvents on NetworkMessageId\n| where EmailDirection == \"Inbound\" and LatestDeliveryAction != \"Blocked\"\n| distinct FileName;\nlet VulnerableEP =\nDeviceTvmSoftwareVulnerabilities \n| where CveId == \"CVE-2025-21298\"\n| distinct DeviceName;\nDeviceFileEvents \n| where ActionType == \"FileCreated\" and FileName endswith \".rtf\"\n| where InitiatingProcessFileName == \"outlook.exe\"\n| where parse_json(AdditionalFields)[\"FileType\"] == 'Rtf'\n| where FileName has_any(InboundRTF) and DeviceName has_any(VulnerableEP)\n\n"
query_type: kql
tactics:
    - TA0001
    - TA0005
techniques:
    - T1566.001
    - T1221
tags:
