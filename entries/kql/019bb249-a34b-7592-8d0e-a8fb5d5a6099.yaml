id: 019bb249-a34b-7592-8d0e-a8fb5d5a6099
name: Network Beaconing Detection - C2
description: This rule detects potential network beaconing activity by analyzing network connection events. It identifies repetitive outbound connections from a device to a remote IP and port with a consistent time interval (low jitter). The rule filters out known legitimate processes and domains to reduce false positives. It calculates the average time delta between connections, standard deviation, and interquartile range to identify beacon-like patterns. The rule also considers the number of unique devices connecting to the same remote endpoint to identify potentially compromised infrastructure.
query: "let starttime = 1d;\r\nlet endtime = 1s;\r\n// Set the minimum beacon sleep. Increase it to get less results. the format is (hour,minute,second.milisecond).\r\n// Be careful when changing the value. run \" print ['timespan'] = make_timespan(0, x, y) \" to verify you have the correct value set. \r\nlet TimeDeltaThresholdMin = make_timespan(0,0,0.001);  \r\nlet TotalEventsThresholdMin = 15;\r\nlet TotalEventsThresholdMax=toint(((totimespan(starttime) - totimespan(endtime))/TimeDeltaThresholdMin));\r\nlet JitterThreshold = 35; // jitter means how much the beacon interval varies, expressed as a percentage. Set to filter out false positives: small threshold means tighter filtering/fewer results.\r\n// Outlier thresholds. 1.5 means the value is a normal outlier, 3 means the value is far far out.\r\nlet OutlierThresholdMax = 2; //increase or decrease this value to get more or less results\r\n// Time delta data set can have some outliers. Define how many outliers are acceptable for a beacon. Values between 1 to 3 should be fine.\r\nlet OutlierCountMax = 3; // increasing the value provides more results.\r\n// Define how many devices can have the same beacon.\r\nlet CompromisedDeviceCountMax = 10; // increasing the value provides more results.\r\n//Common Microsoft/legitimate domains that cause false positives in beacon detection\r\nlet ipv4_regex = @\"\\b(?:(?:25[0-5]|2[0-4]\\d|1\\d\\d|[1-9]?\\d)\\.){3}(?:25[0-5]|2[0-4]\\d|1\\d\\d|[1-9]?\\d)\\b\";\r\nlet KnowGoodProcess = dynamic([\r\n    \"adsklicensingagent.exe\",\r\n    \"teamviewer_service.exe\"\r\n]);\r\nlet KnownGoodDomains = dynamic([\r\n    // Microsoft Update Services\r\n    \".cloud.microsoft\"\r\n    \".microsoft.com\",\r\n    \".static.microsoft\",\r\n    \".usercontent.microsoft\",\r\n    \"windowsupdate.com\",\r\n    \"download.windowsupdate.com\",\r\n    \"microsoft.com\",\r\n    \"wustat.windows.com\",\r\n    \"ntservicepack.microsoft.com\",\r\n    // Office 365 / Microsoft 365\r\n    \"office.com\",\r\n    \"office365.com\",\r\n    \"office.net\",\r\n    \"officeapps.live.com\",\r\n    \"outlook.com\",\r\n    \"outlook.office365.com\",\r\n    \"onmicrosoft.com\",\r\n    \"microsoftonline.com\",\r\n    \"microsoftonline-p.com\",\r\n    \"sharepoint.com\",\r\n    \"sharepointonline.com\",\r\n    // Microsoft CDN and Azure\r\n    \"azureedge.net\",\r\n    \"msecnd.net\",\r\n    \"vo.msecnd.net\",\r\n    \"msocdn.com\",\r\n    \"officecdn.microsoft.com\",\r\n    \"sharepointonline.com\",\r\n    \"azurewebsites.net\",\r\n    \"cloudapp.azure.com\",\r\n    \"windows.net\",\r\n    \"azure-api.net\",\r\n    \"arc.azure.com\",\r\n    \"guestconfiguration.azure.com\",\r\n    // Microsoft Services\r\n    \"live.com\",\r\n    \"live.net\",\r\n    \"microsoft.com\",\r\n    \"bing.com\",\r\n    \"skype.com\",\r\n    \"msftncsi.com\",\r\n    \"msn.com\",\r\n    // Common CDN Providers\r\n    \"akamaiedge.net\",\r\n    \"akamai.net\",\r\n    \"cloudflare.com\",\r\n    \"cloudfront.net\",\r\n    \"fastly.net\",\r\n    \"cdn77.org\",\r\n    // Google Services\r\n    \"google.com\",\r\n    \"googleapis.com\",\r\n    \"gstatic.com\",\r\n    \"googleusercontent.com\",\r\n    // Other Common Services\r\n    \"apple.com\",\r\n    \"icloud.com\",\r\n    \"amazon.com\",\r\n    \"amazonaws.com\",\r\n    \"dropbox.com\",\r\n    \"adobe.com\"\r\n]);\r\n// Get all beacon candidates just by jitter filtering.\r\nlet BeaconCandidates = materialize (\r\n    DeviceNetworkEvents\r\n    | where TimeGenerated between (ago(starttime)..ago(endtime))\r\n    | where RemoteIPType !in (\"Reserved\", \"Private\", \"LinkLocal\", \"Loopback\")\r\n    | where isnotempty(RemoteIP) and RemoteIP !in (\"0.0.0.0\") \r\n    | where not (ipv4_is_private(RemoteIP))\r\n    | where ActionType in (\"ConnectionSuccess\", \"ConnectionRequest\", \"ConnectionFailed\")\r\n    | where not(InitiatingProcessFileName in (KnowGoodProcess))\r\n    | summarize hint.strategy=shuffle make_set(TimeGenerated) by DeviceId, DeviceName, InitiatingProcessAccountName, InitiatingProcessAccountDomain, InitiatingProcessFileName, RemoteIP, RemotePort\r\n    | where array_length(set_TimeGenerated) > TotalEventsThresholdMin and array_length(set_TimeGenerated) < TotalEventsThresholdMax\r\n    | project DeviceId, DeviceName, InitiatingProcessAccountName, InitiatingProcessAccountDomain, InitiatingProcessFileName, RemoteIP, RemotePort, TimeGenerated=array_sort_asc(set_TimeGenerated)\r\n    | mv-apply TimeGenerated to typeof(datetime) on \r\n    (     \r\n        extend nextTimeGenerated = next(TimeGenerated, 1), \r\n               nextInitiatingProcessAccountName = next(InitiatingProcessAccountName, 1),\r\n               nextDeviceId = next(DeviceId, 1), \r\n               nextDeviceName = next(DeviceName, 1), \r\n               nextRemoteIP = next(RemoteIP, 1), \r\n               nextRemotePort = next(RemotePort, 1), \r\n               nextInitiatingProcessFileName = next(InitiatingProcessFileName, 1)\r\n        | extend TimeDeltaInSeconds = datetime_diff('second',nextTimeGenerated,TimeGenerated)\r\n        | where nextInitiatingProcessAccountName == InitiatingProcessAccountName \r\n            and nextDeviceId == DeviceId \r\n            and nextDeviceName == DeviceName \r\n            and nextInitiatingProcessFileName == InitiatingProcessFileName \r\n            and nextRemoteIP == RemoteIP \r\n            and nextRemotePort == RemotePort\r\n        | project TimeGenerated, TimeDeltaInSeconds, DeviceId, DeviceName, InitiatingProcessAccountName, InitiatingProcessFileName, RemoteIP, RemotePort\r\n        | summarize count(), min(TimeGenerated), max(TimeGenerated), \r\n            Duration=datetime_diff(\"second\", max(TimeGenerated), min(TimeGenerated)), \r\n            percentiles(TimeDeltaInSeconds, 5, 25, 50, 75, 95), \r\n            TimeDeltaList=make_list(TimeDeltaInSeconds) \r\n            by DeviceId, DeviceName, InitiatingProcessAccountName, InitiatingProcessFileName, RemoteIP, RemotePort \r\n        | extend (TimeDeltaInSeconds_min,TimeDeltaInSeconds_min_index,TimeDeltaInSeconds_max,TimeDeltaInSeconds_max_index,TimeDeltaInSeconds_avg,TimeDeltaInSeconds_stdev,TimeDeltaInSeconds_variance)=series_stats(TimeDeltaList)\r\n        | extend Jitter=(TimeDeltaInSeconds_stdev/TimeDeltaInSeconds_avg)*100,\r\n                 BeaconSleepMin=TimeDeltaInSeconds_avg - TimeDeltaInSeconds_stdev,\r\n                 BeaconSleepMax=TimeDeltaInSeconds_avg + TimeDeltaInSeconds_stdev\r\n        | extend IQR = (percentile_TimeDeltaInSeconds_95 - percentile_TimeDeltaInSeconds_5) // Interquartile Range - catches cases where jitter is “okay-ish” but the spread is still broad.\r\n        | where Jitter < JitterThreshold or (IQR < (0.5 * percentile_TimeDeltaInSeconds_50))\r\n    )\r\n    | join kind=leftouter\r\n        (\r\n        DeviceNetworkEvents\r\n        | where TimeGenerated > ago(starttime+1d)\r\n        | extend Host=tostring(parse_url(iif(RemoteUrl !startswith \"http\", strcat(@'http://',RemoteUrl),RemoteUrl)).Host)\r\n        | extend isIP = Host matches regex ipv4_regex\r\n        | extend domain = iff(isIP,Host,reverse(replace(@'([A-z0-9-]+\\.[A-z0-9-]+\\.[A-z0-9-]+)\\..*',@'\\1',reverse(Host))))\r\n        | extend baseDomain = iff(isIP,Host,tostring(extract(@\"([^.]+\\.[^.]+)$\", 1, domain)))\r\n        | project domain,baseDomain, RemoteIP\r\n        | where not(domain in (KnownGoodDomains) or baseDomain in (KnownGoodDomains) or domain has_any (KnownGoodDomains))\r\n        | summarize Domains = make_set_if(domain,isnotempty(domain)) by RemoteIP\r\n        ) on RemoteIP\r\n        | project-reorder DeviceId, DeviceName, InitiatingProcessAccountName, InitiatingProcessAccountDomain\r\n);\r\nlet PotentialBeacons = materialize (\r\n    BeaconCandidates\r\n    | summarize dcount(DeviceId) by InitiatingProcessFileName, RemoteIP, RemotePort\r\n    | where dcount_DeviceId <= CompromisedDeviceCountMax\r\n    | join kind=inner BeaconCandidates on InitiatingProcessFileName, RemoteIP, RemotePort\r\n    | project-away *1\r\n    );\r\nlet ImpossibleBeaconsByTimeDelta = materialize (\r\n    PotentialBeacons\r\n    | extend outliers = series_outliers(TimeDeltaList)\r\n    | mv-expand TimeDeltaList, outliers to typeof(double)\r\n    | where outliers > OutlierThresholdMax or outliers < (-1 * OutlierCountMax)\r\n    | summarize count(), make_set(outliers) \r\n        by DeviceId, DeviceName, InitiatingProcessAccountName, InitiatingProcessAccountDomain, InitiatingProcessFileName, RemoteIP, RemotePort\r\n    | where count_ > OutlierCountMax\r\n    );\r\nPotentialBeacons\r\n| join kind=leftantisemi ImpossibleBeaconsByTimeDelta \r\n    on DeviceId, DeviceName, InitiatingProcessAccountName, InitiatingProcessAccountDomain, InitiatingProcessFileName, RemoteIP, RemotePort\r\n| extend TimeGenerated = min_TimeGenerated\r\n| where Duration > 1000\r\n| where count_ > 15\r\n| where not(isempty(Domains) and array_length(Domains) <= 30 and Duration <= 7200 and count_ <= 30)\r\n| order by Jitter asc, TimeDeltaInSeconds_avg asc"
query_type: kql
severity: medium
