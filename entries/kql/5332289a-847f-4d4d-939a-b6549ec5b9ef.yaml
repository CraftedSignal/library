id: 5332289a-847f-4d4d-939a-b6549ec5b9ef
name: Emails Sent To Personal Emails
description: This detection looks at emails being sent from a users company email address to their personal email through comparing the sender and recipient email addresses to see if they contain similar strings. Users who are close to leaving the company and working their notice period etc should be monitored more closely and an increased number of emails being sent to a personal email can indicate data exfiltration.
query: "let PersonalDomains = dynamic([\"gmail.com\",\"outlook.com\",\"yahoo.com\",\"icloud.com\",\"proton.me\",\"zoho.com\",\"yandex.com\",\"mail.com\", \"hotmail.com\"]);\r\nlet suspiciousEmails =\r\nEmailEvents\r\n| extend SenderDomain    = tolower(tostring(split(SenderFromAddress,'@')[1])),\r\n         RecipientDomain = tolower(tostring(split(RecipientEmailAddress,'@')[1]))\r\n| where SenderDomain == \"company domain\"\r\n| where SenderFromAddress != RecipientEmailAddress\r\n| where SenderFromAddress !in (\"company group mailboxes\")\r\n| where RecipientDomain in (PersonalDomains)\r\n| extend SenderUser    = tolower(tostring(split(SenderFromAddress,'@')[0])),\r\n         RecipientUser = tolower(tostring(split(RecipientEmailAddress,'@')[0]))\r\n| extend SenderClean    = replace_regex(SenderUser, @\"[-_]\", \".\"),\r\n         RecipientClean = replace_regex(RecipientUser, @\"[-_]\", \".\")\r\n| extend SenderParts    = split(SenderClean, \".\"),\r\n         RecipientParts = split(RecipientClean, \".\")\r\n| extend sFirst = tostring(SenderParts[0]),\r\n         sLast  = tostring(SenderParts[array_length(SenderParts)-1]),\r\n         rFirst = tostring(RecipientParts[0]),\r\n         rLast  = tostring(RecipientParts[array_length(RecipientParts)-1]),\r\n         rSingle = tostring(iif(array_length(RecipientParts)==1, RecipientParts[0], \"\"))\r\n| where sFirst == rFirst \r\n   or sLast == rLast \r\n   or sFirst == rSingle \r\n   or sLast == rSingle \r\n   or (strlen(sLast) >= 3 and RecipientUser contains sLast)\r\n| summarize \r\n    EmailCount      = count(),\r\n    TotalAttachments = sum(AttachmentCount),\r\n    TotalUrls        = sum(UrlCount),\r\n    Subjects         = make_set(Subject, 1000)\r\n  by SenderFromAddress, RecipientEmailAddress, TimeGenerated, NetworkMessageId\r\n| where TotalAttachments >= 1 or TotalUrls >= 1;\r\nsuspiciousEmails\r\n| project NetworkMessageId, SenderFromAddress, RecipientEmailAddress, TotalAttachments, TotalUrls, Subjects, TimeGenerated  // keep TimeGenerated\r\n| join kind=leftouter (\r\n    EmailAttachmentInfo\r\n    | project NetworkMessageId, FileName, FileType, FileSize, SHA256\r\n) on NetworkMessageId\r\n| summarize \r\n    EmailsSent = dcount(NetworkMessageId),\r\n    TotalAttachments = sum(TotalAttachments),\r\n    TotalUrls = sum(TotalUrls),\r\n    Subjects = make_set(Subjects, 1000),\r\n    Attachments = make_set(pack_array(pack(\"FileName\", FileName, \"FileType\", FileType, \"FileSize\", FileSize, \"SHA256\", SHA256)), 200)\r\n  by SenderFromAddress, RecipientEmailAddress, DayWindow = bin(TimeGenerated, 24h)\r\n| where EmailsSent >= 3\r\n| order by DayWindow desc, (TotalAttachments + TotalUrls) desc"
query_type: kql
severity: medium
techniques:
    - T1567
tags:
    - kql
version: "1"
