id: 019cc390-a947-7607-a3d9-c17e5a0a198b
name: Aggressive File Association Hijacking via Registry
description: Detects attempts to aggressively hijack file associations by modifying the Windows Registry using 'reg.exe' or 'cmd.exe'. Specifically looks for command-line arguments indicating deletion of 'UserChoice' registry keys (which define default applications for file types) and addition of 'ApplicationAssociationToasts' keys (which can suppress notifications related to file association changes). This behavior is indicative of an attacker trying to silently change default applications to maintain persistence or execute malicious code.
query: "// Detect aggressive file association hijacking via reg.exe (UserChoice deletion + toast suppression)\r\nDeviceProcessEvents\r\n| where TimeGenerated > ago(30d)\r\n| where FileName =~ \"cmd.exe\" or FileName =~ \"reg.exe\"\r\n| where ProcessCommandLine has_all (\"delete\", \"UserChoice\")\r\n    or ProcessCommandLine has_all (\"add\", \"ApplicationAssociationToasts\")\r\n| summarize\r\n    Count = count(),\r\n    Devices = dcount(DeviceName),\r\n    DeviceList = make_set(DeviceName, 10),\r\n    Commands = make_set(ProcessCommandLine, 5),\r\n    parentcommand = make_set(InitiatingProcessCommandLine,10),\r\n    TimeMin = min(TimeGenerated),\r\n    TimeMax = max(TimeGenerated)\r\n    by InitiatingProcessFileName\r\n| sort by Count desc"
query_type: kql
severity: medium
tactics:
    - TA0004
    - TA0003
    - TA0005
techniques:
    - T1546.001
    - T1112
tags:
    - kql
version: "2"
