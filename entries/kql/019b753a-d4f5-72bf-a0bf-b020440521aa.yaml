id: 019b753a-d4f5-72bf-a0bf-b020440521aa
name: DarkSpectre-Associated Browser Extension Network Activity
description: Identifies outbound network connections from endpoints to domains associated with the DarkSpectre malicious browser extension campaigns, including Zoom Stealer, ShadyPanda, and GhostPoster infrastructure. This query is intended to support threat hunting and incident investigation by highlighting browser-initiated communications to known high-confidence infrastructure used for real-time data exfiltration, surveillance, and remote payload delivery. Results should be reviewed in context with initiating process, user activity, and installed browser extensions.
query: "//DarkSpectre: Unmasking the Threat Actor Behind 8.8 Million Infected Browsers https://www.koi.ai/blog/darkspectre-unmasking-the-threat-actor-behind-7-8-million-infected-browsers\r\nlet DarkSpectreDomains = dynamic([\r\n  \"meetingtv.us\",\r\n  \"webinarstvus.cloudfunctions.net\",\r\n  \"zoocorder.firebaseio.com\",\r\n  \"infinitynewtab.com\",\r\n  \"infinitytab.com\",\r\n  \"jt2x.com\",\r\n  \"zhuayuya.com\",\r\n  \"muo.cc\",\r\n  \"gmzdaily.com\",\r\n  \"websiteshare.cn\",\r\n  \"diytab.com\",\r\n  \"userscss.top\",\r\n  \"istartnewtab.com\",\r\n  \"letsearchesp.com\",\r\n  \"policies.extfans.com\"\r\n]);\r\nDeviceNetworkEvents\r\n| where TimeGenerated > ago(90d)\r\n| where RemoteUrl has_any (DarkSpectreDomains)\r\n"
query_type: kql
severity: medium
tags:
    - kql
author: Matthew Metcalf
version: "2"
references:
    - https://www.koi.ai/blog/darkspectre-unmasking-the-threat-actor-behind-7-8-million-infected-browsers
