id: dde4dd61-7847-403a-8ec5-4dc3f863268e
name: Detecting Commvault Exploitation in Azure
description: 'KQL Query from file: Detecting Commvault Exploitation in Azure'
query: "// https://thehackernews.com/2025/05/commvault-confirms-hackers-exploited.html\n// https://kb.commvault.com/article/87661\n\nlet CommVaultIOC = dynamic([\"108.69.148.100\", \"128.92.80.210\", \n\"184.153.42.129\", \"108.6.189.53\", \"159.242.42.20\"]);\nlet AzureActivityResult =\nAzureActivity\n| where TimeGenerated > ago(90d)\n| where CallerIpAddress has_any(CommVaultIOC);\nSigninLogs\n| where TimeGenerated > ago(90d)\n| where IPAddress has_any(CommVaultIOC)\n| union AzureActivityResult\n"
query_type: kql
tactics:
    - TA0001
    - TA0042
    - TA0005
    - TA0003
    - TA0008
techniques:
    - T1650
    - T1108
    - T1210
    - T1021
    - T1133
tags:
