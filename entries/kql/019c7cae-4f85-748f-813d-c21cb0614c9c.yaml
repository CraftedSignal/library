id: 019c7cae-4f85-748f-813d-c21cb0614c9c
name: Threat Intel HTTPS Request
description: This is highly adjustable script that tells us whether HTTPS request was successful, the reason why it was blocked or not, and on top of that, it explains the error code. This is still a work-in-progress but it already does 99% of the job.
query: "//####################################################################################################\r\n//##  PLATFORM: Imperva WAF\r\n//##  AUTHOR: Igor Oliveira, Nick Isakson\r\n//##  LOCATION: Microsoft Sentinel | Logs\r\n//##  TITLE: Threat Hunting KQL to investigate Imperva Web traffic/activities from A specific IP address\r\n//##  Reference: https://docs-cybersec.thalesgroup.com/bundle/cloud-application-security/page/error-codes.htm\r\n//####################################################################################################\r\nlet DFI_IoC = dynamic([\"45.135.193.11\"]);\r\nlet time_interval = ago(90d);\r\nImpervaWAFCloud_CL\r\n    | extend\r\n        SrcIpAddr = src_s,\r\n        DvcAction = act_s,\r\n        UrlOriginal = sourceServiceName_s,\r\n        QueryString = qstr_s,\r\n        Country = ccode_s,\r\n        AttackType = Attack_Name_s,\r\n        ErrorCode = case(\r\n            cn1_s == 403,\r\n            \"403 Forbidden Error - This error indicates the server understood a request but refuses to authorize it, meaning you lack permission to access the resource\",\r\n            cn1_s == 404,\r\n            \"404 Not Found Error - This error indicates the browser communicated with the server, but the requested webpage or resource could not be found\",\r\n            cn1_s\r\n        ),\r\n        BlockReason = case(\r\n            Attack_Name_s contains \"Centrix and HAPO\",\r\n            \"Fell into the condition of SrcIpAddr not being in (192.0.48.0/20, 139.138.106.10, 139.138.107.10, 216.194.107.123, 216.194.99.227, 216.117.81.80/28, 199.231.199.16/28)\",\r\n\t\t\tAttack_Name_s == \"Illegal Resource Access\",\r\n            \"Detect attempts to access Vulnerable or Administrative pages, or view or execute System Files. This is commonly done using URL guessing, Directory Traversal, or Command Injection techniques.\",\r\n\t\t\tAttack_Name_s == \"Normal\", \"NOT BLOCKED. Check next column on the right (DevAction)\",\r\n\t\t\tAttack_Name_s == \"IncapRules(Apply_LogAllTraffic)\", \"--> Imperva Alert when PageHitsCounter > 0 - If blocked, it's for a different reason\",\r\n\t\t\tAttack_Name_s == \"IncapRules(EA_LogAllTraffic)\", \"--> Imperva Alert when PageHitsCounter > 0 - If blocked, it's for a different reason\",\r\n\t\t\tAttack_Name_s\r\n        ),\r\n        HackingToolUsed = clapp_s,\r\n        DstPortNumber = spt_s,\r\n        DstIpAddr = sip_s,\r\n        UserAgent = requestClientApplication_s,\r\n        RequestedURL = request_s\r\n    // | where SrcIpAddr in (DFI_IoC)\r\n    | where TimeGenerated > time_interval\r\n    // Group simultaneous events (same timestamp)\r\n    | summarize \r\n        AttackTypes = make_list(AttackType),\r\n        BlockReasons = make_list(BlockReason),\r\n        DvcActions = make_list(DvcAction),\r\n        ErrorCodes = make_list(ErrorCode),\r\n        RequestedURLs = make_list(RequestedURL),\r\n        QueryStrings = make_list(QueryString),\r\n        EventCount = count()\r\n        by TimeGenerated, SrcIpAddr, DstPortNumber, DstIpAddr, UrlOriginal, HackingToolUsed, UserAgent\r\n    // Format arrays as readable strings\r\n    | extend\r\n        AttackType = strcat_array(AttackTypes, \"; \\n\"),\r\n        BlockReason = strcat_array(BlockReasons, \"; \\n\"),\r\n        DvcAction = strcat_array(DvcActions, \"; \\n\"),\r\n        ErrorCode = strcat_array(ErrorCodes, \" \\n\"),\r\n        RequestedURL = strcat_array(RequestedURLs, \"; \\n\"),\r\n        QueryString = strcat_array(QueryStrings, \" \\n\")\r\n    // Add grouping indicator\r\n    | extend GroupedEvents = case(\r\n        EventCount > 1, strcat(\"✓ \", EventCount, \" simultaneous events\"),\r\n        \"\"\r\n    )\r\n    | project-reorder \r\n        TimeGenerated,\r\n        GroupedEvents,\r\n        EventCount,\r\n        SrcIpAddr,\r\n\t\tDstPortNumber,\r\n        DstIpAddr,\r\n        UrlOriginal,\r\n        RequestedURL,\r\n        AttackType,\r\n        BlockReason,\r\n        DvcAction,\r\n        ErrorCode,\r\n        HackingToolUsed,\r\n        QueryString,\r\n        UserAgent"
query_type: kql
severity: medium
techniques:
    - T1071.001
tags:
    - kql
author: Igor Oliveira, Nick Isakson
version: "3"
