id: 019c910b-57c5-753d-8398-5d2da9a8911e
name: Fake Zoom Meeting Campaign (Teramind Stealth Agent)
description: KQL Query
query: "// Name: Fake Zoom Meeting Campaign (Teramind Stealth Agent)\n// Author: Subash Ghimire\n// Date: 2026-02-24\n// Description: This rule detects artifacts and behaviors associated with a campaign that uses a fake Zoom meeting page to install the Teramind surveillance tool in stealth mode.\n// References: https://www.malwarebytes.com/blog/scams/2026/02/fake-zoom-meeting-update-silently-installs-surveillance-software\n// Tactic: Multiple\n// Technique: Multiple\nlet fileHash = \"644ef9f5eea1d6a2bc39a62627ee3c7114a14e7050bafab8a76b9aa8069425fa\";\nlet serviceName = \"tsvchst\";\nlet domain = \"uswebzoomus.com\";\nlet filePathPattern = @\"C:\\ProgramData\\{4CEC2908-5CE4-48F0-A717-8FC833D8017A}\";\nlet fileNamePattern = \"zoom_agent_x64_s-i\";\nunion isfuzzy=true withsource=TableName\n// Malicious MSI by hash or name\n(\n    DeviceFileEvents\n    | where SHA256 == fileHash \n        or (FileName has fileNamePattern and FileName endswith \".msi\")\n    | project TimeGenerated, DeviceId, DeviceName,\n        FileName, FolderPath, SHA256,\n        ProcessCommandLine = \"\",\n        InitiatingProcessFileName,\n        RemoteUrl = \"\",\n        ActionType\n),\n//Suspicious dwm.exe from ProgramData\n(\n    DeviceProcessEvents\n    | where InitiatingProcessFileName =~ \"msiexec.exe\"\n    | where FileName =~ \"dwm.exe\"\n    | where FolderPath has @\"C:\\ProgramData\"\n    | where not(FolderPath matches regex @\"C:\\Windows\\System32\")\n    | project TimeGenerated, DeviceId, DeviceName,\n        FileName, FolderPath, SHA256 = \"\",\n        ProcessCommandLine,\n        InitiatingProcessFileName,\n        RemoteUrl = \"\",\n        ActionType = \"SuspiciousProcess\"\n),\n//Network to malicious domain\n(\n    DeviceNetworkEvents\n    | where RemoteUrl has domain\n    | project TimeGenerated, DeviceId, DeviceName,\n        FileName = \"\", FolderPath = \"\", SHA256 = \"\",\n        ProcessCommandLine = \"\",\n        InitiatingProcessFileName,\n        RemoteUrl,\n        ActionType\n),\n//Suspicious service install\n(\n    DeviceEvents\n    | where ActionType == \"ServiceInstalled\"\n    | where InitiatingProcessFileName has serviceName\n    | project TimeGenerated, DeviceId, DeviceName,\n        FileName = \"\", FolderPath = \"\", SHA256 = \"\",\n        ProcessCommandLine = \"\",\n        InitiatingProcessFileName,\n        RemoteUrl = \"\",\n        ActionType\n),\n//Suspicious folder creation\n(\n    DeviceFileEvents\n    | where ActionType == \"FileCreated\"\n    | where FolderPath has filePathPattern\n    | project TimeGenerated, DeviceId, DeviceName,\n        FileName, FolderPath, SHA256,\n        ProcessCommandLine = \"\",\n        InitiatingProcessFileName,\n        RemoteUrl = \"\",\n        ActionType\n)\n| summarize\n    FirstSeen = min(TimeGenerated),\n    LastSeen = max(TimeGenerated),\n    EvidenceCount = count(),\n    TablesInvolved = make_set(TableName)\nby DeviceId, DeviceName\n| order by EvidenceCount desc"
query_type: kql
severity: medium
tags:
    - kql
version: "2"
