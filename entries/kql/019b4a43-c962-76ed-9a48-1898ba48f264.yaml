id: 019b4a43-c962-76ed-9a48-1898ba48f264
name: Possible Detect Phishing domain
description: Try tio find out phishing domain based on mail history
query: "let BaselineWindow = 30d;\r\nlet DetectionWindow = 1h;\r\nlet UssualEmails = materialize(\r\nEmailEvents\r\n| where TimeGenerated > ago (BaselineWindow)\r\n| where isnotempty(SenderFromDomain)\r\n| distinct SenderFromDomain);\r\nEmailEvents\r\n| where TimeGenerated > ago (DetectionWindow)\r\n| where isnotempty(SenderFromDomain)\r\n| where SenderFromDomain !in~ (UssualEmails)\r\n| project TimeGenerated, SenderFromDomain, SenderFromAddress, RecipientEmailAddress, Subject, DeliveryAction, DeliveryLocation, LatestDeliveryAction, LatestDeliveryLocation\r\n"
query_type: kql
severity: medium
tactics:
    - TA0001
tags:
    - kql
author: '@bilous'
version: "1"
