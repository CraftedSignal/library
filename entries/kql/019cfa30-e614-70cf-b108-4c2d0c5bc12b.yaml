id: 019cfa30-e614-70cf-b108-4c2d0c5bc12b
name: MicroStealer Malware Detection
description: This rule detects the presence of MicroStealer malware by matching known MD5, SHA1, or SHA256 hashes of its binaries against file events on monitored devices. MicroStealer is a credential stealer that targets various applications to exfiltrate sensitive information.
query: "let microstealer_hashes = dynamic([\r\n\"23A705FA71DA6A9191618AEDC1144C4A\",\r\n\"755C21DD36A49086F98C87A172B900E6424F467A\",\r\n\"9CF1D4F87D9F2EDF53CE681B59C209F57A805E6157693E784D9D946FC3B17A04\",\r\n\"A137BF79A2D5F1C8104AF40EC93E4E66\",\r\n\"C83D75BF9F9FDA4E6EF7B2C575BC9D3D82D6590B\",\r\n\"05F0C8E89248D3477115D9F62B20CA8A95D925140C727E975AB9F3025A5AD01D\",\r\n\"04EA30CD1B74E2844BE939BD1FFE0084\",\r\n\"B7D0F8954BAFAB5E79AE96C07E683C229C9F7B72\",\r\n\"DF5E2B824C0FD40323A46019BFBC325F89B5B68697ED3C94B52189CF90E1BEC4\"\r\n]);\r\nDeviceFileEvents\r\n| where MD5 in (microstealer_hashes)\r\n    or SHA1 in (microstealer_hashes)\r\n    or SHA256 in (microstealer_hashes)\r\n| project TimeGenerated, DeviceName, FileName, FolderPath, MD5, SHA1, SHA256, InitiatingProcessFileName\r\n"
query_type: kql
severity: medium
