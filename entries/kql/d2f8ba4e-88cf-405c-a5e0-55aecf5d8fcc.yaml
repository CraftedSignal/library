id: d2f8ba4e-88cf-405c-a5e0-55aecf5d8fcc
name: Azure VNets Exposure Analysis
description: "\U0001F9E9 What This Reveals\n\n\U0001F535Inter-VNet Routing: You’re mapping out which VNets are configured to route traffic to other VNets.\n\U0001F535Potential Exposure Paths: This can help identify unintended or overly permissive routing configurations.\n\U0001F535Topology Insight: Useful for visualizing network architecture or validating segmentation policies.\n"
query: "ExposureGraphEdges \r\n| where EdgeLabel == @\"routes traffic to\"\r\n| where SourceNodeLabel has @\"microsoft.network/virtualnetworks\"\r\n| where TargetNodeLabel has @\"microsoft.network/virtualnetworks\"\r\n| project SourceNodeName, EdgeLabel, TargetNodeName\r\n| sort by SourceNodeName, TargetNodeName"
query_type: kql
severity: medium
tags:
    - kql
author: Steven Lim
version: "1"
