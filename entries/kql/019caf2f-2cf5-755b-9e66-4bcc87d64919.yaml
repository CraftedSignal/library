id: 019caf2f-2cf5-755b-9e66-4bcc87d64919
name: Specific Havoc DLL Sideloading Pairs
description: Detects instances of specific legitimate binaries loading known malicious proxy DLLs. This pattern targets the exact sideloading pairs identified in a campaign leveraging a modified Havoc C2 agent.
query: "// Name: Specific Havoc DLL Sideloading Pairs\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-03-02\r\n// Description: Detects instances of specific legitimate binaries loading known malicious proxy DLLs. This pattern targets the exact sideloading pairs identified in a campaign leveraging a modified Havoc C2 agent.\r\n// Tags: T1574.002\r\n// Tactics: Persistence, Defense Evasion\r\n// Techniques: Hijack Execution Flow\r\n// References: https://www.huntress.com/blog/fake-tech-support-havoc-command-control\r\n// False Positive Sensitivity: Medium\r\nDeviceImageLoadEvents\r\n// Define the specific process and DLL combinations used for sideloading.\r\n| where\r\n    (InitiatingProcessFileName =~ \"ADNotificationManager.exe\" and FileName =~ \"vcruntime140_1.dll\") or\r\n    (InitiatingProcessFileName =~ \"DLPUserAgent.exe\" and FileName =~ \"mpclient.dll\") or\r\n    (InitiatingProcessFileName =~ \"WerFault.exe\" and FileName =~ \"faultrep.dll\")\r\n// FP Tuning: This detection is specific to known pairings. However, if legitimate software uses similarly named DLLs,\r\n// false positives could occur. Investigate the FolderPath of the loaded DLL; in this attack, the malicious\r\n// DLL is typically dropped in the same directory as the legitimate executable.\r\n| project\r\n    Timestamp,\r\n    DeviceName,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessCommandLine,\r\n    FileName,\r\n    FolderPath,\r\n    SHA1,\r\n    SHA256,\r\n    MD5\r\n"
query_type: kql
severity: medium
