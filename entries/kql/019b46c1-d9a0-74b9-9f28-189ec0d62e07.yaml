id: 019b46c1-d9a0-74b9-9f28-189ec0d62e07
name: Exchange ActiveSync version check
description: |-
    Checking for Exchange ActiveSync version 16.1 or higher
    From Microsoft: We want to inform our users and organizations about an important upcoming change regarding Exchange ActiveSync (EAS) device connectivity to Exchange Online. Starting March 1, 2026, devices running ActiveSync versions lower than 16.1 will no longer be able to connect to our services. EAS 16.1 was released as a part of Exchange Server and Exchange Online in June 2016.
query: "// Checking for Exchange ActiveSync version 16.1 or higher\r\n// https://techcommunity.microsoft.com/blog/exchange/exchange-online-activesync-device-support-update/4477997\r\nCloudAppEvents\r\n| where UserAgent contains \"ActiveSync\"\r\n// This will parse RawEventData details and pull fields from this section\r\n| extend userDetails = parse_json(RawEventData)\r\n| extend UserId = tostring(userDetails.UserId)\r\n| extend version = tostring(userDetails.ActorInfoString)\r\n| distinct UserId, version\r\n| project UserId,version"
query_type: kql
severity: medium
tags:
    - kql
author: Tony D
version: "1"
references:
    - https://techcommunity.microsoft.com/blog/exchange/exchange-online-activesync-device-support-update/4477997
