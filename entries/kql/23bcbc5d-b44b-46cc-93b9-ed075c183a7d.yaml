id: 23bcbc5d-b44b-46cc-93b9-ed075c183a7d
name: GlobalProtect Login from Outside Canada
description: This rule detects GlobalProtect VPN login attempts originating from outside of Canada. This can help identify potential unauthorized access or policy violations where users are expected to connect from specific geographic regions.
query: "#### This query searches for any user logged In to GlobalProtect outside of Canada. \n#### Query:\n```KQL\nGlobalProtect_CL\n| where PanOSSourceRegion != \"CA\"     //Specify the country achronym according to your requirement. \n| where isnotnull(PanOSSourceRegion) and PanOSSourceRegion != \"\"\n```\n"
query_type: kql
tactics:
