id: 019ca111-2b79-72f2-a40f-3025208080cd
name: APT37 RubyGems operating_system.rb Hijacking
description: Detects modifications to the RubyGems 'operating_system.rb' file, a technique used by APT37's SNAKEDROPPER malware to achieve persistence by hijacking the Ruby interpreter's execution flow. The rule specifically looks for file creation or modification events on the 'operating_system.rb' file within the RubyGems directory structure, while excluding legitimate 'gem install' operations to reduce false positives.
query: |
    // Name: APT37 RubyGems operating_system.rb Hijacking
    // Author: Ethan Andrews + detections.ai
    // Date: 2026-02-27
    // Description: Detects modifications to the RubyGems 'operating_system.rb' file, a technique used by APT37's SNAKEDROPPER malware to achieve persistence by hijacking the Ruby interpreter's execution flow.
    // Tactic: Hijack Execution Flow
    // Technique: T1574
    // False Positive Sensitivity: Medium
    // References: https://www.zscaler.com/blogs/security-research/apt37-adds-new-capabilities-air-gapped-networks (dc523311465115e45fd810dae43cb12a19f7a3fe5a3ed100d926eb1d8c3e4376)
    DeviceFileEvents
    // Look for modifications to the specific RubyGems file used for hijacking. The path is specific to the version used by the malware.
    | where FolderPath endswith @"\lib\ruby\3.3.0\rubygems\operating_system.rb"
    // The malware modifies this file to inject its payload.
    | where ActionType in ("FileCreated", "FileModified")
    // FP Tuning: Exclude legitimate package management operations. Further tuning may be needed if other legitimate tools modify this file.
    | where not(InitiatingProcessCommandLine has "gem install")
    | summarize by DeviceId, DeviceName, InitiatingProcessAccountName, InitiatingProcessCommandLine, FileName, FolderPath, SHA1
query_type: kql
severity: medium
tactics:
    - TA0003
    - TA0004
    - TA0005
techniques:
    - T1574
tags:
    - kql
author: Ethan Andrews
version: "2"
references:
    - https://www.zscaler.com/blogs/security-research/apt37-adds-new-capabilities-air-gapped-networks
