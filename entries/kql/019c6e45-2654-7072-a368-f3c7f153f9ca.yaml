id: 019c6e45-2654-7072-a368-f3c7f153f9ca
name: Successful Malicious HTTPS Requests
description: KQL to detect suspicious HTTP requests
query: "//################################################################################################\r\n//##  PLATFORM: Imperva WAF\r\n//##  AUTHOR: IGOR OLIVEIRA\r\n//##  LOCATION: Microsoft Sentinel | Logs\r\n//##  TITLE: KQL to detect suspicious HTTP requests\r\n//##  Reference: https://docs-cybersec.thalesgroup.com/bundle/cloud-application-security/page/error-codes.htm\r\n//################################################################################################\r\nlet Malicious_QueryStrings = dynamic([\r\n    // Path Traversal\r\n    \"%2Fpasswd\", \"/passwd\", \"%2Fpassword\", \"/password\", \r\n    \"../\", \"%2E%2E%2F\", \"..%2F\", \"%2e%2e/\", \"..%5c\", \"%2e%2e%5c\",\r\n    \"etc/passwd\", \"%2Fetc%2Fpasswd\", \"/etc/shadow\", \"etc/shadow\",\r\n    \"/windows/win.ini\", \"win.ini\", \"boot.ini\", \"/etc/hosts\",\r\n    // XSS (Cross-Site Scripting)\r\n    \"<script>\", \"%3cscript%3e\", \"%3Cscript%3E\", \"</script>\",\r\n    \"javascript:\", \"%6A%61%76%61%73%63%72%69%70%74%3A\",\r\n    \"<iframe\", \"%3ciframe\", \"onerror=\", \"onload=\", \"onclick=\",\r\n    \"eval(\", \"alert(\", \"prompt(\", \"confirm(\",\r\n    // SQL Injection (non-regex patterns)\r\n    \"' or ''='\", \"admin'--\", \"union select\", \"UNION SELECT\", \r\n    \"' and '1'='1\", \"exec(\", \"execute(\", \"drop table\", \"DROP TABLE\",\r\n    // Command Injection\r\n    \";cat /etc/passwd\", \"|cat /etc/passwd\", \";id\", \"|id\",\r\n    \"&cat /etc/passwd\", \"$(cat /etc/passwd)\", \"`cat /etc/passwd`\",\r\n    \";ls -la\", \"|ls -la\", \";whoami\", \"|whoami\",\r\n    \";wget \", \";curl \", \"nc -e\", \"/bin/bash\", \"/bin/sh\",\r\n    // Local/Remote File Inclusion\r\n    \"php://filter\", \"php://input\", \"data://text/plain\",\r\n    \"expect://\", \"file://\", \"file:///etc/passwd\",\r\n    \"zip://\", \"phar://\", \"include(\", \"require(\",\r\n    // XXE/XML Injection\r\n    \"<!ENTITY\", \"<!DOCTYPE\", \"SYSTEM \\\"file:///\",\r\n    // LDAP Injection\r\n    \"*)(uid=*\", \"*)(objectClass=*\", \"admin*)(|(password=*\",\r\n    // Template Injection\r\n    \"{{7*7}}\", \"${7*7}\", \"{{config}}\", \"${env}\",\r\n    // Null Byte\r\n    \"%00\", \"\\0\", \"\\\\x00\",\r\n    // Encoded Attacks\r\n    \"%252e%252e%252f\", \"%c0%ae%c0%ae/\", \"%uff0e%uff0e/\"\r\n]);\r\nImpervaWAFCloud_CL\r\n    | where TimeGenerated > ago(30d)\r\n    | extend\r\n        SrcIpAddr = src_s,\r\n        DvcAction = act_s,\r\n        UrlOriginal = sourceServiceName_s,\r\n        QueryString = qstr_s,\r\n        Country = ccode_s,\r\n        City = cicode_s,\r\n        AttackType = Attack_Name_s,\r\n        HackingToolUsed = clapp_s,\r\n        DstPortNumber = spt_s,\r\n        DstIpAddr = sip_s,\r\n        UserAgent = requestClientApplication_s,\r\n        RequestedURL = request_s\r\n    // | where not(AttackType has_any (\"Normal\", \"IncapRules\"))\r\n    | where isnotempty(AttackType)\r\n    | where QueryString has_any (Malicious_QueryStrings)\r\n        or QueryString matches regex @\"['\\\"\"]?\\s*or\\s+['\\\"\"]?(\\d+)\\s*=\\s*\\1\"  // Matches N=N pattern (1=1, 2=2, etc.)\r\n        or QueryString matches regex @\"%27\\s*or\\s*%27(\\d+)%27\\s*=%s*%27\\1\"  // URL-encoded version\r\n    | where DvcAction == \"REQ_PASSED\"\r\n    // Stage 1: Count per IP + AttackType\r\n    | summarize\r\n        TimeStarts = min(TimeGenerated),\r\n        TimeEnds = max(TimeGenerated),\r\n        AttackTypeCount = count(),\r\n        DvcActions = make_set(DvcAction),\r\n        QueryStrings = make_set(QueryString)\r\n        by SrcIpAddr, AttackType\r\n    // Build formatted string\r\n    | extend AttackTypeFormatted =\r\n        strcat(AttackType, \" (\", AttackTypeCount, \")\")\r\n    // Stage 2: Rebuild per IP\r\n    | summarize\r\n        TimeStarts = min(TimeStarts),\r\n        TimeEnds = max(TimeEnds),\r\n        FirstSeen = min(AttackTypeCount),\r\n        TotalAttackCount = sum(AttackTypeCount),\r\n        AttackTypes = make_list(AttackTypeFormatted),\r\n        DvcActions = make_set(DvcActions),\r\n        QueryStrings = make_set(QueryStrings)\r\n        by SrcIpAddr\r\n    // Flatten the nested arrays from Stage 2\r\n    | extend \r\n        DvcActions = array_concat(DvcActions),\r\n        QueryStrings = array_concat(QueryStrings)\r\n    // Convert arrays to readable strings\r\n    | extend \r\n        AttackTypes = strcat_array(AttackTypes, \" ; \"),\r\n        DvcAction = strcat_array(DvcActions, \" ; \"),\r\n        QueryString = strcat_array(QueryStrings, \"\\n\")\r\n    | project\r\n        TimeStarts,\r\n        TimeEnds,\r\n        SrcIpAddr,\r\n        AttackTypes,\r\n        TotalAttackCount,\r\n        DvcAction,\r\n        QueryString\r\n    | sort by TotalAttackCount desc"
query_type: kql
severity: medium
techniques:
    - T1071.001
tags:
    - kql
author: Igor Oliveira
version: "9"
