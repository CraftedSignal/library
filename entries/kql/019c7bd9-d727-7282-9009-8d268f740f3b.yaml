id: 019c7bd9-d727-7282-9009-8d268f740f3b
name: MIMICRAT Malleable C2 Traffic Patterns
description: Detects outbound HTTPS traffic to specific URI paths and User-Agent strings hardcoded in MIMICRAT's malleable C2 profiles. These profiles impersonate legitimate web analytics traffic.
query: "// Name: MIMICRAT Malleable C2 Traffic Patterns\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-02-20\r\n// Description: Detects outbound HTTPS traffic to specific URI paths and User-Agent strings hardcoded in MIMICRAT's malleable C2 profiles. These profiles impersonate legitimate web analytics traffic.\r\n// False Positives: Low. The combination of these specific URI paths and the unique User-Agent string is highly unlikely to be generated by legitimate applications.\r\n// References: https://www.elastic.co/security-labs/mimicrat-custom-rat-mimics-c2-frameworks\r\n// Tactics: Command and Control\r\n// Techniques: T1071.001, T1568.002\r\nDeviceNetworkEvents\r\n// Look for network connections to the specific URI paths used by MIMICRAT for C2.\r\n| where RemoteUrl has \"/intake/organizations/events?channel=app\" or RemoteUrl has \"/discover/pcversion/metrics?clientver=ds\"\r\n// The User-Agent is often in AdditionalFields. The field name might vary based on your schema.\r\n| extend ParsedFields = parse_json(AdditionalFields)\r\n| extend UserAgent = tostring(ParsedFields.UserAgent)\r\n// Filter for the specific User-Agent pattern used by MIMICRAT, which includes a reference to Cortana.\r\n| where UserAgent startswith \"Mozilla/5.0 (Windows NT 10.0; Win64; x64; Cortana 1.14.9.19041;\" and UserAgent endswith \") Edge/18.19045\"\r\n| project\r\n    Timestamp,\r\n    DeviceName,\r\n    InitiatingProcessAccountName,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessCommandLine,\r\n    RemoteUrl,\r\n    RemoteIP,\r\n    UserAgent"
query_type: kql
severity: medium
tactics:
    - TA0011
techniques:
    - T1071.001
tags:
