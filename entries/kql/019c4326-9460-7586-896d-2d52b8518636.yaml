id: 019c4326-9460-7586-896d-2d52b8518636
name: Finger LoLBin Remote Command Pipe via ct.exe
description: Detects the use of the Windows 'finger' utility, often renamed to 'ct.exe', to download and pipe remote commands to cmd.exe. This is a key Living Off The Land Binary (LoLBin) technique used in the CrashFix campaign. The detection specifically looks for 'ct.exe' in the command line, the unique 'confirm@' argument indicating a C2 address, and the piping of output to 'cmd' often launched via 'start'.
query: |
    // Name: Finger LoLBin Remote Command Pipe
    // Author: Ethan Andrews + detections.ai
    // Date: 2026-02-09
    // Description: Detects the use of the Windows 'finger' utility, often renamed to 'ct.exe', to download and pipe remote commands to cmd.exe. This is a key LoLBin technique used in the CrashFix campaign.
    // MITRE ATT&CK: T1202 (Indirect Command Execution), T1105 (Ingress Tool Transfer), T1059.003 (Windows Command Shell)
    // References: https://www.microsoft.com/en-us/security/blog/2026/02/05/clickfix-variant-crashfix-deploying-python-rat-trojan/
    // False Positive Sensitivity: Medium
    DeviceProcessEvents
    // The core of this attack is the abuse of the finger utility, which is copied and renamed to 'ct.exe'.
    | where ProcessCommandLine has "ct.exe"
    // The command uses a unique 'confirm@' argument to pass the C2 address.
    | where ProcessCommandLine has "confirm@"
    // The output of the malicious command is then piped to cmd.exe for execution.
    | where ProcessCommandLine has_all ("|", "cmd")
    // The full command is often launched via 'cmd.exe /c start ...'. Including 'start' adds context and specificity.
    | where ProcessCommandLine has "start"
    // Extract the C2 IP address from the command line for entity mapping.
    | extend C2_IP = extract(@'confirm@([\d\.]+)', 1, ProcessCommandLine)
    // Map key fields to entities for incident context and investigation.
    | extend
        AccountCustomEntity = AccountName,
        HostCustomEntity = DeviceName,
        IpCustomEntity = C2_IP,
        CommandLineCustomEntity = ProcessCommandLine
    // Potential False Positives: This behavior is highly anomalous. However, if a legitimate tool named 'ct.exe' exists in your environment,
    // you may need to add exclusions based on the file path or parent process.
    // Example: | where not InitiatingProcessFolderPath in~ ('C:\\Program Files\\LegitSoftware\\')
query_type: kql
severity: medium
tactics:
    - TA0005
    - TA0011
    - TA0002
techniques:
    - T1202
    - T1105
    - T1059.003
tags:
    - kql
author: Ethan Andrews
version: "2"
references:
    - https://www.microsoft.com/en-us/security/blog/2026/02/05/clickfix-variant-crashfix-deploying-python-rat-trojan/
