id: 019cd69f-0461-766c-97ac-e7d4c913078d
name: ShadowAgent Malware Hash Detection
description: This rule detects the presence of known ShadowAgent malware files on devices by matching their SHA256 hashes. It queries 'DeviceFileEvents' to identify any files with SHA256 hashes that are part of a predefined list associated with ShadowAgent.
query: "let ShadowAgentHashes = dynamic([\r\n\"9680a1f6d24c499becf5d497abbc0ba7d140a4ad6c814336b45d9ee4189a07c0\",\r\n\"58d4429ac78b74b64843fe4fbdfd3f4a41ee1139a0b2c7a41dc8e10f0d207780\"\r\n]);\r\nDeviceFileEvents\r\n| where SHA256 in (ShadowAgentHashes)\r\n| project TimeGenerated, DeviceName, FileName, FolderPath, SHA256, InitiatingProcessFileName, InitiatingProcessCommandLine, AccountName\r\n"
query_type: kql
severity: medium
tags:
    - kql
version: "1"
