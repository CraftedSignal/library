id: 01997abc-667b-762c-94d2-31178bc64dc7
name: Defending against OAuth Attack
description: This KQL provide a detailed audit listing of your tenant consented OAuth apps and their granted permissions and number of users consented.
query: "OAuthAppInfo\r\n| mv-expand Permissions\r\n| extend AppPermission = tostring(parse_json(Permissions)[\"PermissionValue\"])\r\n| project AppName, AppStatus, PrivilegeLevel, AppPermission, IsAdminConsented, ConsentedUsersCount, AppOrigin\r\n| summarize NumberOfAppWithThisPermission=count() by AppOrigin, AppName, AppStatus, AppPermission, IsAdminConsented, ConsentedUsersCount\r\n| sort by AppOrigin, AppName, AppPermission, NumberOfAppWithThisPermission desc "
query_type: kql
severity: medium
tactics:
    - TA0003
    - TA0006
techniques:
    - T1671
    - T1528
tags:
    - kql
author: Steven Lim
version: "2"
