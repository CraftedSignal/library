name: Outlook New Requirements for High‐Volume Senders
description: 'KQL Query from file: Outlook New Requirements for High‐Volume Senders'
query: "// https://techcommunity.microsoft.com/blog/microsoftdefenderforoffice365blog/strengthening-email-ecosystem-outlook%e2%80%99s-new-requirements-for-high%e2%80%90volume-senders/4399730\n\nEmailEvents\n| where Timestamp > ago(3d) // Enforcement started on 5th May 2025\n| where EmailDirection == \"Inbound\"\n| where DeliveryAction == \"Blocked\"\n| where DeliveryLocation == @\"Failed\"\n| where SenderFromAddress == @\"postmaster@outlook.com\"\n| summarize RejectionCount=count() by RecipientEmailAddress // Impacted Users\n| sort by RejectionCount desc \n"
