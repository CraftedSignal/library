id: 55cd07ca-5fa8-4c34-b023-a6213e55ebf9
name: Custom Detection Rule for CUPS Installation in DefenderXDR
description: KQL Query
query: "// Custom Detection Rule for CUPS Installation in DefenderXDR\n\n// I’ve come up with an exciting idea! \U0001F605 How about a custom detection rule in DefenderXDR that identifies CUPS installations and automatically isolates the device if it detects an inbound UDP packet on port 631? This could serve as an auto-defense mechanism. What do you think—could it work? \U0001F914\n\n\n// Custom DefenderXDR Rule for CUPS Installation Detection and Isolation\n\nlet EndpointwithCUPS =\nDeviceTvmSoftwareInventory\n| where SoftwareName has \"cups\"\n| project DeviceName;\nDeviceNetworkEvents\n| where DeviceName has_any(EndpointwithCUPS)\n| where Protocol has \"Udp\" \n| where LocalPort in (631)\n| where ActionType == \"InboundConnectionAttempt\"\nor ActionType == \"ConnectionFailed\"\n\n//\n"
query_type: kql
tactics:
    - TA0011
techniques:
    - T1043
tags:
