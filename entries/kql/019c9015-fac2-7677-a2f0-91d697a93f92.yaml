id: 019c9015-fac2-7677-a2f0-91d697a93f92
name: Malicious 10xprofit Chrome Extensions Detected
description: Detects the presence of malicious Chrome extensions associated with the 10xprofit affiliate hijacking campaign. These extensions are installed as folders with the extension ID as the name in the user's browser profile directory. The rule identifies file events in common browser extension paths for Chrome and Edge, extracts the extension ID, and checks if it matches a known list of malicious IDs.
query: "// Name: Malicious 10xprofit Chrome Extensions Detected\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-02-24\r\n// Description: Detects the presence of malicious Chrome extensions associated with the 10xprofit affiliate hijacking campaign. These extensions are installed as folders with the extension ID as the name in the user's browser profile directory.\r\n// Severity: Medium\r\n// Status: Available\r\n// Tactics: Collection\r\n// Techniques: T1176\r\n// References: https://socket.dev/blog/malicious-chrome-extension-performs-hidden-affiliate-hijacking\r\nlet MaliciousExtensionIDs = dynamic([\r\n    \"pnpchphmplpdimbllknjoiopmfphellj\",\r\n    \"ahlnchhkedmjbdocaamkbmhppnligmoh\",\r\n    \"ljcgnobemekghgobhlplpehijemdgcgo\",\r\n    \"dnmfcojgjchpjcmjgpgonmhccibjopnb\",\r\n    \"mnacfoefejolpobogooghoclppjcgfcm\",\r\n    \"nigamacoibifjohkmepefofohfedblgg\",\r\n    \"johobikccpnmifjjpephegmfpipfbfme\",\r\n    \"kppfbknppimnoociaomjcdgkebdmenkh\",\r\n    \"aohfjaadlbiifnnajpobdhokecjokhab\",\r\n    \"gfdbbmngalhmegpkejhidhgdpmehlmnd\",\r\n    \"cpcojeeblggnjjgnpiicndnahfhjdobd\",\r\n    \"hkkkipfcdagiocekjdhobgmlkhejjfoj\",\r\n    \"jaojpdijbaolkhkifpgbjnhfbmckoojh\",\r\n    \"ekomkpgkmieaaekmaldmaljljahehkoi\",\r\n    \"hkhmodcdjhcidbcncgmnknjppphcpgmh\",\r\n    \"nipfdfkjnidadibpbflijepbllfkokac\",\r\n    \"behckapcoohededfbgjgkgefgkpodeho\",\r\n    \"dfnannaibdndmkienngjahldiofjbkmj\",\r\n    \"nhilffccdbcjcnoopblecppbhalagpaf\",\r\n    \"mabbblhhnmlckjbfppkopnccllieeocp\",\r\n    \"mjcgfimemamogfmekphcfdehfkkbmldn\",\r\n    \"mcaihdkeijgfhnlfcdehniplmaapadgb\",\r\n    \"mpgaodghdhmeljgogbeagpbhgdbfofgb\",\r\n    \"gjlbbcimkbncedhofeknicfkhgaocohl\",\r\n    \"nppjmiadmakeigiagilkfffplihgjlec\",\r\n    \"loiofaagnefbonjdjklhacdhfkolcfgi\",\r\n    \"mcaglpclodnaiimhicpjemhcinjfnjce\",\r\n    \"goikoilmhcgfidolicnbgggdpckdcoam\",\r\n    \"jmlgkeaofknfmnbpmlmadnfnfajdlehn\"\r\n]);\r\n// Search for file events which are a strong indicator of extension installation.\r\nDeviceFileEvents\r\n// Scoping to common browser extension paths reduces false positives.\r\n// Consider adding other browser paths if used in your environment (e.g., Brave, Vivaldi).\r\n| where FolderPath has_any (@\"\\Google\\Chrome\\User Data\\\", @\"\\Microsoft\\Edge\\User Data\\\")\r\n// The folder name for an extension is its ID.\r\n| extend ExtensionId = tostring(split(FolderPath, '\\\\')[-2])\r\n| where ExtensionId in (MaliciousExtensionIDs)\r\n// Summarize to reduce alert volume.\r\n| summarize FirstSeen=min(Timestamp), LastSeen=max(Timestamp), count() by DeviceName, InitiatingProcessAccountName, ExtensionId, FolderPath, FileName, InitiatingProcessCommandLine\r\n"
