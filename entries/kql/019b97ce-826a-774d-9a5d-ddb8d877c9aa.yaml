id: 019b97ce-826a-774d-9a5d-ddb8d877c9aa
name: Suspicious MSBuild Execution from Non-Standard Directory
description: Detects the execution of the Microsoft Build Engine (msbuild.exe) with a project file (.proj) located in a suspicious, non-standard directory such as C:\ProgramData. This is a known "Living off the Land" technique (T1127.001) used by adversaries, including the PHALT#BLYX campaign, to proxy code execution through a trusted binary and evade defenses.
query: |
    // Name: Suspicious MSBuild Execution from Non-Standard Directory
    // Author: detections.ai
    // Date: 2026-01-07
    // Description: Detects the execution of the Microsoft Build Engine (msbuild.exe) with a project file (.proj) located in a suspicious, non-standard directory such as C:\ProgramData. This is a known "Living off the Land" technique (T1127.001) used by adversaries, including the PHALT#BLYX campaign, to proxy code execution through a trusted binary and evade defenses.
    // False Positive Sensitivity: Medium
    // Tactics: Execution
    // Techniques: T1127.001
    // References: https://www.securonix.com/blog/analyzing-phaltblyx-how-fake-bsods-and-trusted-build-tools-are-used-to-construct-a-malware-infection/

    DeviceProcessEvents
    // Look for the creation of the msbuild.exe process.
    | where FileName =~ "msbuild.exe"
    // Ensure the command line contains a project file, as seen in the PHALT#BLYX campaign.
    | where ProcessCommandLine has ".proj"
    // Filter for project files being executed from suspicious, non-developer locations. The PHALT#BLYX campaign specifically used C:\ProgramData.
    | where ProcessCommandLine has_any (
            @"\ProgramData\",
            @"\Users\Public\",
            @"\PerfLogs\",
            @"\Windows\Temp\",
            @"\AppData\Local\Temp"
        )
        or ProcessCommandLine contains "v.proj" // Specific file name from the campaign.
    // FP Tuning: Legitimate build processes or software installers might use MSBuild in unexpected ways.
    // Consider filtering for specific parent processes (e.g., not Visual Studio - devenv.exe) or excluding known developer machines if false positives occur.
    | project
        TimeGenerated,
        DeviceName,
        AccountName,
        FileName,
        ProcessCommandLine,
        InitiatingProcessFileName,
        InitiatingProcessCommandLine,
        ReportId,
        ProcessId,
        InitiatingProcessId
query_type: kql
tactics:
    - TA0002
    - TA0005
techniques:
    - T1127.001
tags:
    - kql
version: "2"
references:
    - https://www.securonix.com/blog/analyzing-phaltblyx-how-fake-bsods-and-trusted-build-tools-are-used-to-construct-a-malware-infection/
