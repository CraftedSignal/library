id: 019c27b5-37b8-749d-9ab1-3fc1921df4e8
name: Core Banking System After Hours Logon Automation
description: This is a credential after-hours logon activity automation, whenever an employee that's not supposed to log on to the core banking system after hours do so, this will trigger and alert the SOC team.
query: "//############################################################################\r\n//##  Data Sources: Microsoft Entra ID / Defender for Identity and Cloud Apps\r\n//##  AUTHOR: IGOR OLIVEIRA (#IO)\r\n//##  Description: Log in of users who are not supposed to log in after hours, indicating possibility of compromised account.\r\n//############################################################################\r\nlet WeekDay = (day:int) {        \r\n    case(\r\n    day == time(1.00:00:00), \"Monday\",\r\n    day == time(2.00:00:00), \"Tuesday\",\r\n    day == time(3.00:00:00), \"Wednesday\",\r\n    day == time(4.00:00:00), \"Thursday\",\r\n    day == time(5.00:00:00), \"Friday\",\r\n    day == time(6.00:00:00), \"Saturday\",\r\n    \"Sunday\")\r\n};\r\nIdentityLogonEvents\r\n    | where TimeGenerated > ago(24h)\r\n    | extend PstTime = datetime_utc_to_local(TimeGenerated,\"US/Pacific\")\r\n    | extend Hour = hourofday(PstTime)\r\n    | extend Day = WeekDay(dayofweek(PstTime))\r\n    | where Day in (\"Sunday\") or Hour !between (7 .. 18) or (Day in (\"Saturday\") and Hour !between (7 .. 14))\r\n    | where AdditionalFields.Spns contains \"keystone\"\r\n    | join kind=inner IdentityInfo on AccountObjectId\r\n        | where JobTitle !contains (\"VP \") and JobTitle !contains (\"Senior VP\") and JobTitle !in (\"Director of Asset Recovery\")\r\n        | where Department !in (\"Information Systems\", \"Consumer Lending\", \"Project Delivery\")\r\n        | where Department !contains \"Executive\"\r\n        | where not (Department == (\"Training and Development\") and Hour >= 5)\r\n        | where not (Department == (\"Asset Recovery\") and (Hour between (7 .. 19))) or not (Department == (\"Asset Recovery\") and (Hour between (7 .. 19) and Day != \"Sunday\"))\r\n        | where not (Department in (\"Dealer Direct\", \"Underwriting\") and Day == \"Sunday\")\r\n        | where not (Department in (\"Mortgage\") and (Hour >= 6 and Hour <= 7))\r\n        | summarize arg_max(TimeGenerated, *) by AccountObjectId, bin(TimeGenerated, 5m)\r\n            | extend mgrSplit = split(Manager, \" \")\r\n            | extend ManagerEmail = strcat(mgrSplit[0], \".\", mgrSplit[1], \"@YOUR_DOMAIN.TLD\")\r\n            | project-reorder PstTime, Hour, Day, AccountDisplayName, JobTitle, Department, MailAddress, DeviceName, Manager, ManagerEmail, GroupMembership, AccountObjectId, AccountSID, AccountUPN"
query_type: kql
severity: medium
tags:
    - kql
author: Igor Oliveira
version: "2"
