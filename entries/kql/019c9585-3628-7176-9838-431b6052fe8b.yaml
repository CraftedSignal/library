id: 019c9585-3628-7176-9838-431b6052fe8b
name: IDE Spawning Shell with Download and Execution
description: Detects instances where a development environment like VS Code or Cursor spawns a shell process that then uses a download utility to fetch and execute remote content. This is a known TTP for the 'Contagious Interview' campaign which abuses IDE task auto-execution features.
query: "// Name: IDE Spawning Shell with Download and Execution\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-02-25\r\n// Description: Detects instances where a development environment like VS Code or Cursor spawns a shell process that then uses a download utility to fetch and execute remote content. This is a known TTP for the 'Contagious Interview' campaign which abuses IDE task auto-execution features.\r\n// MITRE ATT&CK Tactic(s): Execution, Command and Control, Initial Access\r\n// MITRE ATT&CK Technique(s): T1059.001, T1059.003, T1105, T1566.001\r\n// References: https://www.abstract.security/blog/contagious-interview-evolution-of-vscode-and-cursor-tasks-infection-chains\r\nDeviceProcessEvents\r\n// Look for process creation events where the parent is a known IDE\r\n| where InitiatingProcessFileName in~ (\"Code.exe\", \"Cursor.exe\")\r\n// Filter for shell child processes\r\n| where FileName in~ (\"cmd.exe\", \"powershell.exe\", \"bash\", \"sh\")\r\n// Check for command lines containing both a download utility and an execution keyword/pipe\r\n| where ProcessCommandLine has_any (\"curl\", \"wget\", \"iwr\", \"Invoke-WebRequest\")\r\n    and ProcessCommandLine has_any (\"|\", \"iex\", \"-Command\", \"sh\", \"bash\")\r\n// FP Tuning: Legitimate project setup scripts or developer tools might perform similar actions.\r\n// If noise occurs, consider filtering by trusted parent command lines, user accounts, or excluding known script paths.\r\n// Example: | where not (InitiatingProcessCommandLine contains 'trusted-project' and AccountName == 'build_admin')\r\n| project\r\n    TimeGenerated,\r\n    DeviceName,\r\n    AccountName,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessCommandLine,\r\n    FileName,\r\n    ProcessCommandLine,\r\n    ProcessId,\r\n    InitiatingProcessId"
query_type: kql
severity: medium
tactics:
