id: 019d26bc-be57-7428-bf33-1ea652048596
name: TeamPCP Privileged Kubernetes Pod Creation
description: Detects the creation of highly privileged Kubernetes pods in the 'kube-system' namespace matching the naming convention 'node-setup-*', indicative of TeamPCP lateral movement techniques. These pods request elevated privileges such as 'hostPID', 'hostNetwork', and 'privileged'.
query: "// Title: TeamPCP Privileged K8s Pod\n// Author: Brandon + detections.ai\n// Date: 2026-03-25\n// Platform: Kubernetes\n// Tactics: Lateral Movement, Privilege Escalation\n// Techniques: T1610\n// Reference: https://www.endorlabs.com/learn/teampcp-isnt-done\n// Description: Detects the creation of highly privileged Kubernetes pods in the 'kube-system' namespace matching the naming convention 'node-setup-*', indicative of TeamPCP lateral movement techniques.\nunion isfuzzy=true \n(\n    DeviceProcessEvents \n    | where ActionType == \"ProcessCreated\"\n), \nCloudAppEvents\n// Filter for Kubernetes pod creation events\n| where ActionType in~ (\"Create\", \"CreatePod\", \"PodCreated\")\n| extend EventData = tostring(RawEventData)\n// Identify Kubernetes related events and specific kube-system namespace\n| where (Application has \"Kubernetes\" or Application has \"Defender for Cloud\" or EventData has \"Pod\")\n    and EventData has \"kube-system\"\n// Match the specific naming convention used by the TeamPCP harvester\n| where EventData contains \"node-setup-\"\n// Ensure the pod requests elevated privileges observed in the campaign\n| where EventData has \"hostPID\" \n    and EventData has \"hostNetwork\" \n    and EventData has \"privileged\"\n// Potential FP: Legitimate node configuration scripts or daemonsets may use similar names and privileges.\n// Tune by excluding known cluster admin accounts or trusted automation identities here:\n// | where AccountName !has \"trusted-deployment-tool\"\n// | where IPAddress !in (\"192.168.1.100\") \n| project Timestamp, ActionType, Application, AccountName, IPAddress, ObjectName, RawEventData\n"
query_type: kql
severity: medium
tactics:
