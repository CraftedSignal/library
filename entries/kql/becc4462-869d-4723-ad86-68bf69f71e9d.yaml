name: Monthly Report Entra Eligible Role Activation
description: 'KQL Query from file: Monthly Report Entra Eligible Role Activation'
query: "// Monthly Report Entra Eligible Role Activation\n// https://www.linkedin.com/posts/activity-7195656523899965442-aZTj/\n\n// Entra offers an “Alert detail” view that monitors whether eligible administrators are activating their privileged roles. However, it lacks a built-in feature to measure the frequency of these activations. To overcome this, you can schedule the following KQL query to run every 30 days. This will generate a report detailing the activation history of eligible administrators’ roles over a specified timeframe. It’s important to adhere to the principle of least privilege and revoke any roles that are excessively provisioned and not necessary. \U0001F60E\n\nIdentityInfo\n| where Timestamp > ago(30d)\n| where AssignedRoles != \"\"\n| mv-expand AssignedRoles\n| extend EntraAdminRole = tostring(AssignedRoles)\n| distinct EntraAdminRole, AccountUpn\n| where AccountUpn != \"\"\n| sort by EntraAdminRole asc\n\n// MITRE ATT&CK Mapping\n\n// Based on the analysis, the KQL query can be associated with the following MITRE ATT&CK techniques:\n\n// T1078 - Valid Accounts:\n// The query identifies accounts with assigned roles, which can help detect unauthorized or suspicious account usage.\n// T1087 - Account Discovery:\n// By listing distinct roles and associated accounts, the query aids in discovering accounts and their privileges.\n// T1098 - Account Manipulation:\n// Monitoring changes in assigned roles can help detect potential account manipulation activities.\n"
