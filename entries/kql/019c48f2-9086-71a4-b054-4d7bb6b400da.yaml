id: 019c48f2-9086-71a4-b054-4d7bb6b400da
name: Anomalous Process Execution from SolarWinds Web Help Desk
description: This rule detects anomalous process executions originating from the SolarWinds Web Help Desk application. It monitors for any child processes spawned by the Web Help Desk application that are not part of a predefined allowlist of expected executables (java.exe, pg_dump.exe, reg.exe, conhost.exe, WerFault.exe) or command lines (mysqldump). This can indicate compromise or misuse of the application to execute arbitrary code.
query: "let windowStart = ago(30d);\r\nDeviceProcessEvents\r\n| where Timestamp >= windowStart\r\n| extend scopeLabel = case(\r\n    InitiatingProcessFolderPath has \"\\\\WebHelpDesk\\\\bin\\\\\" or InitiatingProcessParentFileName has \"\\\\Program Files\\\\WebHelpDesk\\\\bin\\\\\", \"solarwinds_whd\",\r\n    \"other\")\r\n| where scopeLabel == \"solarwinds_whd\"\r\n| where InitiatingProcessParentFileName !has \"pg_ctl.exe\"\r\n| where FileName !in~ (\"java.exe\", \"pg_dump.exe\", \"reg.exe\", \"conhost.exe\", \"WerFault.exe\")\r\n| where ProcessCommandLine !has \"mysqldump\"\r\n| summarize\r\n    firstSeen = min(Timestamp),\r\n    lastSeen  = max(Timestamp),\r\n    eventCount = count(),\r\n    devices = make_set(DeviceName, 50),\r\n    files = make_set(FileName, 100),\r\n    cmds = make_set(ProcessCommandLine, 100),\r\n    paths = make_set(FolderPath, 100),\r\n    hashes = make_set(SHA256, 100),\r\n    ipFiles = make_set(InitiatingProcessFileName, 100),\r\n    ipCmds = make_set(InitiatingProcessCommandLine, 100),\r\n    ipPaths = make_set(InitiatingProcessFolderPath, 100),\r\n    ipHashes = make_set(InitiatingProcessSHA256, 100),\r\n    ipParents = make_set(InitiatingProcessParentFileName, 100),\r\n    reportIds = make_set(ReportId, 100)\r\n  by DeviceId\r\n| order by lastSeen desc"
query_type: kql
severity: medium
tactics:
    - TA0002
    - TA0005
techniques:
    - DS0009
tags:
    - kql
version: "1"
