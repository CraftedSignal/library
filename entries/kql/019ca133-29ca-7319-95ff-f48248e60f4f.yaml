id: 019ca133-29ca-7319-95ff-f48248e60f4f
name: CastleLoader Anomalous AutoIt Execution
description: Detects the execution of AutoIt3.exe (or renamed versions) from non-standard paths or with suspicious script extensions, which is indicative of CastleLoader activity. This rule specifically looks for AutoIt interpreter execution, including renamed files with .pif or .com extensions, originating from common temporary or user-writable directories like AppData or Temp, and executing suspicious script file extensions such as .a3x, .t, or .vstm, or very short command lines.
query: "// Name: CastleLoader Anomalous AutoIt Execution\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-02-27\r\n// Description: Detects the execution of AutoIt3.exe (or renamed versions) from non-standard paths or with suspicious script extensions, which is indicative of CastleLoader activity.\r\n// False Positive Sensitivity: Medium\r\n// Reference: https://www.bitdefender.com/en-us/blog/labs/lummastealer-second-life-castleloader\r\n// Tactics: Execution\r\n// Techniques: T1059.005\r\nDeviceProcessEvents\r\n// Identify AutoIt interpreter execution, including renamed files.\r\n// CastleLoader has been observed renaming AutoIt3.exe to files with .pif or .com extensions.\r\n| where (ProcessVersionInfoOriginalFileName =~ \"AutoIt3.exe\" or FileName matches regex @\"(?i)\\.(pif|com)$\")\r\n// Filter for execution from common temporary or user-writable directories where malware often drops files.\r\n| where FolderPath has_any (@\"\\AppData\\Local\\\", @\"\\AppData\\Roaming\\\", @\"\\Temp\\\")\r\n// Look for suspicious script file extensions or very short command lines as seen with CastleLoader.\r\n// The script extensions .a3x and .t are specifically mentioned in the research.\r\n| where ProcessCommandLine matches regex @\"(?i)\\.(a3x|t|vstm)\\b\" or strlen(ProcessCommandLine) < 50\r\n// Potential for false positives: Legitimate automation scripts might use AutoIt.\r\n// To reduce noise, consider excluding known good parent processes, script paths, or specific command lines if legitimate AutoIt usage is identified.\r\n// For example: `and not (ParentProcessFileName == \"legit_app.exe\" and ProcessCommandLine contains \"known_script.au3\")`\r\n| project\r\n    TimeGenerated,\r\n    DeviceName,\r\n    AccountName,\r\n    FileName,\r\n    ProcessCommandLine,\r\n    ProcessVersionInfoOriginalFileName,\r\n    FolderPath,\r\n    InitiatingProcessParentFileName,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessCommandLine\r\n"
query_type: kql
severity: medium
tactics:
    - TA0002
techniques:
    - T1059.010
