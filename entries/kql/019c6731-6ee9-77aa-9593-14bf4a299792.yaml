id: 019c6731-6ee9-77aa-9593-14bf4a299792
name: REF4033 CbsMsgApi Loader Execution
description: Detects the execution of CbsMsgApi.exe, which is the initial loader used by the REF4033 group to install the BADIIS IIS module and create a persistence service. The detection is based on the specific filename or the known imphash of the loader.
query: "// Name: REF4033 CbsMsgApi Loader Execution\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-02-16\r\n// Description: Detects the execution of CbsMsgApi.exe, which is the initial loader used by the REF4033 group to install the BADIIS IIS module and create a persistence service.\r\n// False Positives: The filename is highly specific to this threat actor. False positives are unlikely.\r\n// References: https://www.elastic.co/security-labs/badiis-to-the-bone-new-insights-to-global-seo-poisoning-campaign\r\n// MITRE ATT&CK: T1543.003\r\nDeviceProcessEvents\r\n// Look for process creation events.\r\n| where ActionType == \"ProcessCreated\"\r\n// Detect by the specific filename or the known imphash of the loader.\r\n| where FileName =~ \"CbsMsgApi.exe\" or MD5 =~ \"1e4b23eee1b96b0cc705da1e7fb9e2f3\"\r\n| project\r\n    Timestamp,\r\n    DeviceId,\r\n    DeviceName,\r\n    ActionType,\r\n    FileName,\r\n    FolderPath,\r\n    ProcessCommandLine,\r\n    MD5,\r\n    SHA256,\r\n    InitiatingProcessAccountName,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessCommandLine\r\n"
query_type: kql
severity: medium
tactics:
    - TA0003
    - TA0004
techniques:
    - T1543.003
tags:
    - kql
author: Ethan Andrews
version: "2"
references:
    - https://www.elastic.co/security-labs/badiis-to-the-bone-new-insights-to-global-seo-poisoning-campaign
