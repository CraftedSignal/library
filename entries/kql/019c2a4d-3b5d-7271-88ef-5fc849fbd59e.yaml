id: 019c2a4d-3b5d-7271-88ef-5fc849fbd59e
name: Rclone Configuration File Creation
description: This rule detects the creation of 'rclone.conf' file on a device. The 'rclone.conf' file is a configuration file used by the Rclone utility, a command-line program for syncing files with various cloud storage services. The presence of this file often indicates the installation or use of Rclone, which can be leveraged by adversaries for data exfiltration to cloud storage.
query: "\r\n//Repo - T1567.002: Rclone exfiltration tool observed on host\r\nDeviceFileEvents\r\n| where ActionType  == 'FileCreated'\r\n| where FileName == 'rclone.conf'\r\n| project DeviceName, InitiatingProcessAccountName, InitiatingProcessFileName, FileName, FolderPath\r\n"
query_type: kql
severity: medium
tactics:
    - TA0010
techniques:
    - T1567.002
tags:
    - kql
version: "4"
