id: 019c2a46-f6b2-75c8-80ff-41e8babe7d21
name: Suspicious USB NIC (MITM Implant) Detected
description: This rule detects the connection of USB network interface cards (NICs) that are known to be used in Man-in-the-Middle (MITM) implants or other malicious hardware additions. It specifically looks for devices with Vendor IDs and Product IDs associated with suspicious chipsets like ASIX AX88772A (Hak5 LAN Turtle), ASIX AX88179, Realtek USB GbE (Pi-based dongles/implants), Realtek 10/100 USB Ethernet, and D-Link USB Ethernet (modded implants).
query: "// Known suspicious USB NIC chipsets often used in MITM implants\r\nlet SuspiciousNICs = datatable(VendorId:string, ProductId:string, Description:string)\r\n[\r\n    \"0B95\",\"772A\",\"ASIX AX88772A USB2Ethernet (Hak5 LAN Turtle)\",\r\n    \"0B95\",\"1790\",\"ASIX AX88179 USB3Ethernet\",\r\n    \"0BDA\",\"8153\",\"Realtek USB GbE (used in Pi-based dongles/implants)\",\r\n    \"0BDA\",\"8152\",\"Realtek 10/100 USB Ethernet\",\r\n    \"2001\",\"1A02\",\"D-Link USB Ethernet (seen in modded implants)\"\r\n];\r\nDeviceEvents\r\n| where TimeGenerated > ago(1h)\r\n| where ActionType == \"PnpDeviceConnected\"\r\n| extend DeviceName = tostring(parse_json(AdditionalFields).DeviceName),\r\n         DeviceClass = tostring(parse_json(AdditionalFields).DeviceClassGuid),\r\n         VendorId = tostring(parse_json(AdditionalFields).VendorId),\r\n         ProductId = tostring(parse_json(AdditionalFields).ProductId)\r\n| where DeviceClass == \"{4d36e972-e325-11ce-bfc1-08002be10318}\" // Network Adapters only\r\n| join kind=inner SuspiciousNICs on VendorId, ProductId\r\n| project\r\n    TimeGenerated,\r\n    DeviceId,\r\n    DeviceName,\r\n    VendorId,\r\n    ProductId,\r\n    Description,\r\n    InitiatingProcessAccountName,\r\n    ReportId\r\n| order by TimeGenerated desc"
query_type: kql
tactics:
    - TA0001
techniques:
    - T1200
tags:
    - kql
version: "3"
