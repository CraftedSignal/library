id: 019c1fe2-b4d2-7119-b0ef-ad170a2cc784
name: Correlated LDAP Recon and Kerberoasting
description: This rule detects a correlated attack chain involving LDAP Service Principal Name (SPN) enumeration followed by Kerberoasting activity. It identifies an actor performing LDAP queries for SPNs, then links that actor to subsequent Kerberos Ticket-Granting Service (TGS) requests for those service accounts within a defined time window. The rule specifically looks for a minimum number of unique service accounts targeted to trigger an alert, indicating a potential Kerberoasting attack.
query: "// KQL detection for Correlated LDAP Recon and Kerberoasting\r\n// Authors: Daniel Miller, Seumas Jarrett, Nicholas Isakson, Igor Oliveira (Refined for Detection)\r\n// Define the detection window and threshold\r\nlet Lookback = 24h; \r\nlet RoastThreshold = 2; // Minimum unique service accounts targeted to trigger alert\r\n// Step 1: Recon Events - Identify LDAP SPN Enumeration\r\nlet ReconEvents =\r\n    IdentityQueryEvents\r\n    | where TimeGenerated > ago(Lookback)\r\n    | where ActionType in (\"SamrQuery\", \"LdapSearch\", \"LDAP query\")\r\n    | where Query has \"servicePrincipalName\"\r\n    | extend NormalizedHost = tolower(tostring(split(DeviceName, \".\")[0]))\r\n    | project ReconTime = TimeGenerated, NormalizedHost, IPAddress, Query;\r\n// Step 2: Actor Attribution - Correlate Recon IP/Host to an Active User Session\r\nlet ActorContext =\r\n    ReconEvents\r\n    | join kind=inner (\r\n        DeviceLogonEvents\r\n        | where TimeGenerated > ago(Lookback)\r\n        | where LogonType in (\"Interactive\", \"RemoteInteractive\", \"Network\")\r\n        | extend NormalizedHost = tolower(tostring(split(DeviceName, \".\")[0]))\r\n        | project NormalizedHost, ActorAccount = AccountName, ActorDomain = AccountDomain, LogonTime = TimeGenerated\r\n    ) on NormalizedHost\r\n    // Ensure the logon was active near the time of recon (+/- 1 hour buffer)\r\n    | where LogonTime between ((ReconTime - 1h) .. (ReconTime + 1h))\r\n    | summarize arg_max(LogonTime, ActorAccount, ActorDomain) by NormalizedHost, IPAddress, ReconTime;\r\n// Step 3: Roast Events - Correlate Actor to TGS Requests for Service Accounts\r\nActorContext\r\n| join kind=inner (\r\n    IdentityLogonEvents\r\n    | where TimeGenerated > ago(Lookback)\r\n    | where Protocol == \"Kerberos\"\r\n    | where LogonType == \"Resource access\"\r\n    | where isnotempty(TargetAccountDisplayName)\r\n    | where TargetAccountDisplayName !endswith \"$\"\r\n    | where TargetAccountDisplayName !in (\"krbtgt\", \"kadmin\")\r\n    | project RoastTime = TimeGenerated, RoastAccount = AccountName, TargetAccountDisplayName, RoastDestinationIP = DestinationIPAddress\r\n) on $left.ActorAccount == $right.RoastAccount\r\n// Step 4: Time Correlation - Roast must follow Recon within 4 hours\r\n| where RoastTime between (ReconTime .. (ReconTime + 4h))\r\n// Step 5: Aggregate Results\r\n| summarize\r\n    FirstRecon = min(ReconTime),\r\n    FirstRoast = min(RoastTime),\r\n    LastRoast = max(RoastTime),\r\n    TargetedServices = make_set(TargetAccountDisplayName),\r\n    UniqueTargetsCount = dcount(TargetAccountDisplayName),\r\n    RoastDestinationIPs = make_set(RoastDestinationIP)\r\n    by ActorAccount, ActorDomain, NormalizedHost, IPAddress\r\n// Step 6: Threshold Filter\r\n| where UniqueTargetsCount > RoastThreshold\r\n// Step 7: Enrich with timing context for Triage\r\n| extend ReconToRoastLatency = FirstRoast - FirstRecon\r\n| extend RoastDuration = LastRoast - FirstRoast\r\n| extend AttackVelocity = case(\r\n    RoastDuration < 1m, \"High (Likely Scripted/Tool)\",\r\n    RoastDuration < 1h, \"Moderate (Manual/Mixed)\",\r\n    \"Low (Slow/Low)\"\r\n)\r\n| project\r\n    TimeGenerated = FirstRoast, // Timestamp for the alert\r\n    ActorAccount,\r\n    ActorDomain,\r\n    NormalizedHost,\r\n    SourceIP = IPAddress,\r\n    AttackVelocity,\r\n    UniqueTargetsCount,\r\n    TargetedServices,\r\n    ReconToRoastLatency,\r\n    RoastDuration,\r\n    RoastDestinationIPs\r\n| sort by TimeGenerated desc"
query_type: kql
severity: medium
tactics:
    - TA0006
techniques:
    - T1558.003
tags:
    - kql
author: Daniel Miller, Seumas Jarret, Nicholas Isakson, & Igor Oliveira
version: "1"
