id: 019ac4e4-621f-7253-b81a-4d39d0169407
name: High Volume Failed NTLM Logons Followed by Potential Relay
description: Detects a pattern indicative of an NTLM relay attack following an authentication coercion spray. The rule first identifies a single source IP generating a high volume of failed NTLM logon attempts across multiple critical servers in a short time. It then looks for a subsequent successful NTLM logon from that same source IP to a high-value target (like a Certificate Authority) using a machine account. This sequence is a strong indicator that an attacker coerced credentials and is now relaying them to escalate privileges.
query: |
    // Name: High Volume Failed NTLM Logons Followed by Potential Relay
    // Author: detections.ai
    // Date: 2025-11-27
    // Description: Detects a pattern indicative of an NTLM relay attack following an authentication coercion spray. The rule first identifies a single source IP generating a high volume of failed NTLM logon attempts across multiple critical servers in a short time. It then looks for a subsequent successful NTLM logon from that same source IP to a high-value target (like a Certificate Authority) using a machine account. This sequence is a strong indicator that an attacker coerced credentials and is now relaying them to escalate privileges.
    // False Positive Sensitivity: Medium
    // Reference: https://unit42.paloaltonetworks.com/authentication-coercion/
    // MITRE TTPs: T1557.001, T1078
    // Data Source: IdentityLogonEvents
    let Timeframe = 15m;
    let FailedLogonThreshold = 10;
    let DistinctServerThreshold = 3;

    // Define critical assets that might be targeted in a coercion spray. Customize this list.
    let CoercionTargets = dynamic([
        "DC01.corp.local", "DC02.corp.local", // Domain Controllers
        "RODC01.corp.local", // Read-Only Domain Controllers
        "RADIUS01.corp.local", // RADIUS Servers
        "CITRIX01.corp.local" // Citrix Servers
    ]);

    // Define high-value assets often targeted in relay attacks. Customize this list.
    let RelayTargets = dynamic([
        "CA-SERVER.corp.local", // Certificate Authority Servers
        "ADFS-SERVER.corp.local" // ADFS Servers
    ]);

    // Step 1: Identify a spray of failed NTLM logons from a single source to multiple critical servers.
    let FailedLogonSpray =
        IdentityLogonEvents
        | where Timestamp > ago(1h)
        | where ActionType == "LogonFailed"
        | where AuthenticationProtocol == "Ntlm"
        | where isnotempty(RemoteIPAddress)
        | where DeviceName has_any (CoercionTargets)
        | summarize
            StartTime = min(Timestamp),
            EndTime = max(Timestamp),
            FailedLogonCount = count(),
            TargetedServers = make_set(DeviceName)
            by AttackerIp = RemoteIPAddress, bin(Timestamp, Timeframe)
        | where FailedLogonCount >= FailedLogonThreshold and array_length(TargetedServers) >= DistinctServerThreshold;

    // Step 2: Look for a successful NTLM logon from the identified attacker IP using a machine account to a high-value target.
    IdentityLogonEvents
    | where Timestamp > ago(1h)
    | where ActionType == "LogonSuccess"
    | where AuthenticationProtocol == "Ntlm"
    | where AccountName endswith "$" // The relayed account is often a machine account.
    | where DeviceName has_any (RelayTargets) // The logon target is a high-value asset like a CA.
    | where isnotempty(RemoteIPAddress)
    // Join the successful logon with the failed spray activity from the same IP.
    | join kind=inner (FailedLogonSpray) on $left.RemoteIPAddress == $right.AttackerIp
    // Ensure the successful relay happens during or immediately after the failed logon spray.
    | where Timestamp between (StartTime .. (EndTime + Timeframe))
    // Potential for False Positives: Misconfigured services or scanners could cause failed logons.
    // However, the full pattern (spray -> successful machine account logon to CA) is high-fidelity.
    // Tune the thresholds and asset lists to match your environment's baseline activity.
    | project
        Timestamp, // Time of the successful relay attack.
        AttackerIp,
        RelayedAccount = AccountName,
        RelayTarget = DeviceName,
        StartTime, // Start time of the initial failed logon spray.
        FailedLogonCount,
        TargetedServers, // List of servers targeted in the initial spray.
        ReportId
query_type: kql
tactics:
