id: 0199a3f1-5245-7589-90af-0029966d8244
name: 'Threathunt: Seashell Blizzard Group - Known Cheapshot activity'
description: |-
    Microsoft Threat Intelligence observed Russian military Intelligence actor Seashell Blizzard conduct a phishing campaign using Excel attachments embedded with the custom CheapShot malware. CheapShot allows the actor to maintain persistence on targeted devices, likely to support intelligence collection. The actor primarily targeted critical infrastructure and key resources in Ukraine and Europe.

    Search for events in your network and locate potential CheapShot malware- related indicators.
    The file hashes are associated with CheapShot activity.
query: "let fileHashes = dynamic([\"771a55e5e3e252178739edec854140fd9b372162470b6b9baa72f1fed4645d3d\", \r\n\"c3f5087c5cf185f07f5628c79def95301efa51b9cb025b3041ee5fa0f894e136\",\"b1d3293ec0688e9bfbb6e2e472eeefb9584e94e2437494b69865290962859e99\",\"6c987777dd774479b781003466178d002befb32e209d6fe555eb30ef11aa6aba\"]); \r\nunion \r\n( \r\nDeviceFileEvents \r\n| where SHA256 in (fileHashes) \r\n| project Timestamp, DeviceId, DeviceName, FileName, InitiatingProcessFileName, FileHash = SHA256, SourceTable = \"DeviceFileEvents\" \r\n), \r\n( \r\nDeviceEvents \r\n| where SHA256 in (fileHashes) \r\n| project Timestamp, DeviceId, DeviceName, FileName, InitiatingProcessFileName, FileHash = SHA256, SourceTable = \"DeviceEvents\" \r\n), \r\n( \r\nDeviceImageLoadEvents \r\n| where SHA256 in (fileHashes) \r\n| project Timestamp, DeviceId, DeviceName, FileName, InitiatingProcessFileName, FileHash = SHA256, SourceTable = \"DeviceImageLoadEvents\" \r\n), \r\n( \r\nDeviceProcessEvents \r\n| where SHA256 in (fileHashes) \r\n| project Timestamp, DeviceId, DeviceName, FileName, InitiatingProcessFileName, FileHash = SHA256, SourceTable = \"DeviceProcessEvents\" \r\n) \r\n| order by Timestamp desc"
query_type: kql
severity: medium
