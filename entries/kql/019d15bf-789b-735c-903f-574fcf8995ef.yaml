id: 019d15bf-789b-735c-903f-574fcf8995ef
name: SmartScreen or Network Protection User Override/Bypass
description: This rule detects instances where a user has overridden Microsoft SmartScreen warnings or bypassed Network Protection. This could indicate a user intentionally accessing potentially malicious content or an attempt to circumvent security controls.
query: "let actions = dynamic([\"SmartScreenUserOverride\", \"NetworkProtectionUserBypassEvent\"]);\r\nDeviceEvents\r\n| where TimeGenerated > ago(1d)\r\n| where ActionType has_any (actions)\r\n| project RemoteUrl, InitiatingProcessAccountUpn, DeviceName, MachineGroup, ActionType, InitiatingProcessFileName\r\n"
query_type: kql
severity: medium
tags:
    - kql
version: "1"
