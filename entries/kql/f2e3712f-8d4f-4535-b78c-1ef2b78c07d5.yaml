id: f2e3712f-8d4f-4535-b78c-1ef2b78c07d5
name: Suspicious AI Model API Activity Across Local and Cloud Services
description: |-
    Detects potential misuse of AI model APIs by correlating process creation, network activity, and non-standard AI service ports.
    Covers Ollama, OpenAI, Azure OpenAI, Anthropic, Google Gemini, Mistral, Cohere, Copilot, OpenRouter, Together, and Perplexity.
query: "// ==============================================================================\r\n// Title: Suspicious AI Model Usage Across Local and Cloud APIs\r\n// Description: Detects potentially unauthorized use of AI model APIs (OpenAI, Ollama, Claude, Gemini, etc.)\r\n//              via process behavior, network activity, and non-standard AI-related ports.\r\n// Tuning Tips:\r\n//    Use allowlists for known developers or tools using AI APIs in your environment\r\n//    Add more domains or ports if your organization self-hosts LLMs or uses other services\r\n// ==============================================================================\r\nlet timeframe = 24h;\r\nlet common_tools = dynamic([\"go.exe\", \"curl.exe\", \"wget.exe\", \"python.exe\", \"python3.exe\", \"powershell.exe\", \"pwsh.exe\", \"node.exe\", \"java.exe\"]);\r\nlet ai_cmdline_indicators = dynamic([\r\n    \"ollama\", \"openai\", \"anthropic\", \"claude\", \"mistral\", \"cohere\", \"gemini\",\r\n    \"generativelanguage\", \"aiplatform\", \"gpt-3\", \"gpt-4\", \"gpt-4o\", \"gpt-4.1\", \"gpt-4o-mini\",\r\n    \"text-embedding\", \"chat/completions\", \"/v1/messages\", \"/v1/chat\", \"/api/generate\", \"/api/chat\",\r\n    \"openrouter\", \"together\", \"perplexity\", \"githubcopilot\", \"copilot\"\r\n]);\r\nlet ai_api_domains_openai     = dynamic([\"api.openai.com\"]);\r\nlet ai_api_domains_azure      = dynamic([\"openai.azure.com\"]);\r\nlet ai_api_domains_anthropic  = dynamic([\"api.anthropic.com\"]);\r\nlet ai_api_domains_google     = dynamic([\"generativelanguage.googleapis.com\", \"aiplatform.googleapis.com\"]);\r\nlet ai_api_domains_mistral    = dynamic([\"api.mistral.ai\"]);\r\nlet ai_api_domains_cohere     = dynamic([\"api.cohere.ai\"]);\r\nlet ai_api_domains_copilot    = dynamic([\"api.githubcopilot.com\", \"githubcopilot.com\", \"copilot-proxy.githubusercontent.com\", \"copilot.microsoft.com\"]);\r\nlet ai_api_domains_openrouter = dynamic([\"openrouter.ai\", \"api.openrouter.ai\"]);\r\nlet ai_api_domains_together   = dynamic([\"api.together.xyz\"]);\r\nlet ai_api_domains_perplexity = dynamic([\"api.perplexity.ai\"]);\r\nlet ai_api_domains_ollama     = dynamic([\"ollama.com\", \"ollama.ai\"]);\r\nlet ollama_port = 11434;\r\nlet suspicious_ai_ports = dynamic([11434, 1234, 5005, 7860, 4891, 8501, 5000, 1337, 31337, 8080]);\r\nlet net_ollama_port = DeviceNetworkEvents\r\n| where TimeGenerated >= ago(timeframe)\r\n| where RemotePort == ollama_port and InitiatingProcessFileName in~ (common_tools)\r\n| extend UserAgent = tostring(parse_json(AdditionalFields).UserAgent)\r\n| project TimeGenerated, DeviceId, DeviceName, AccountName = InitiatingProcessAccountName,\r\n          ProcessName = InitiatingProcessFileName, ProcessCommandLine = InitiatingProcessCommandLine,\r\n          RemoteIP, RemotePort, RemoteUrl, UserAgent, ActivityType = \"NetworkToOllamaPort\";\r\nlet net_ollama_remote = DeviceNetworkEvents\r\n| where TimeGenerated >= ago(timeframe)\r\n| where RemoteUrl has_any (ai_api_domains_ollama)\r\n| extend UserAgent = tostring(parse_json(AdditionalFields).UserAgent)\r\n| where UserAgent contains \"go-http-client\"\r\n| project TimeGenerated, DeviceId, DeviceName, AccountName = InitiatingProcessAccountName,\r\n          ProcessName = InitiatingProcessFileName, ProcessCommandLine = InitiatingProcessCommandLine,\r\n          RemoteIP, RemotePort, RemoteUrl, UserAgent, ActivityType = \"GoClientToOllamaUrl\";\r\nlet net_openai = DeviceNetworkEvents\r\n| where TimeGenerated >= ago(timeframe)\r\n| where RemoteUrl has_any (ai_api_domains_openai)\r\n| extend UserAgent = tostring(parse_json(AdditionalFields).UserAgent)\r\n| project TimeGenerated, DeviceId, DeviceName, AccountName = InitiatingProcessAccountName,\r\n          ProcessName = InitiatingProcessFileName, ProcessCommandLine = InitiatingProcessCommandLine,\r\n          RemoteIP, RemotePort, RemoteUrl, UserAgent, ActivityType = \"OpenAI_Network\";\r\nlet net_azure_openai = DeviceNetworkEvents\r\n| where TimeGenerated >= ago(timeframe)\r\n| where RemoteUrl has \"openai.azure.com\"\r\n| extend UserAgent = tostring(parse_json(AdditionalFields).UserAgent)\r\n| project TimeGenerated, DeviceId, DeviceName, AccountName = InitiatingProcessAccountName,\r\n          ProcessName = InitiatingProcessFileName, ProcessCommandLine = InitiatingProcessCommandLine,\r\n          RemoteIP, RemotePort, RemoteUrl, UserAgent, ActivityType = \"AzureOpenAI_Network\";\r\nlet net_anthropic = DeviceNetworkEvents\r\n| where TimeGenerated >= ago(timeframe)\r\n| where RemoteUrl has_any (ai_api_domains_anthropic)\r\n| extend UserAgent = tostring(parse_json(AdditionalFields).UserAgent)\r\n| project TimeGenerated, DeviceId, DeviceName, AccountName = InitiatingProcessAccountName,\r\n          ProcessName = InitiatingProcessFileName, ProcessCommandLine = InitiatingProcessCommandLine,\r\n          RemoteIP, RemotePort, RemoteUrl, UserAgent, ActivityType = \"Anthropic_Network\";\r\nlet net_google = DeviceNetworkEvents\r\n| where TimeGenerated >= ago(timeframe)\r\n| where RemoteUrl has_any (ai_api_domains_google)\r\n| extend UserAgent = tostring(parse_json(AdditionalFields).UserAgent)\r\n| project TimeGenerated, DeviceId, DeviceName, AccountName = InitiatingProcessAccountName,\r\n          ProcessName = InitiatingProcessFileName, ProcessCommandLine = InitiatingProcessCommandLine,\r\n          RemoteIP, RemotePort, RemoteUrl, UserAgent, ActivityType = \"GoogleGenAI_Network\";\r\nlet net_mistral = DeviceNetworkEvents\r\n| where TimeGenerated >= ago(timeframe)\r\n| where RemoteUrl has_any (ai_api_domains_mistral)\r\n| extend UserAgent = tostring(parse_json(AdditionalFields).UserAgent)\r\n| project TimeGenerated, DeviceId, DeviceName, AccountName = InitiatingProcessAccountName,\r\n          ProcessName = InitiatingProcessFileName, ProcessCommandLine = InitiatingProcessCommandLine,\r\n          RemoteIP, RemotePort, RemoteUrl, UserAgent, ActivityType = \"Mistral_Network\";\r\nlet net_cohere = DeviceNetworkEvents\r\n| where TimeGenerated >= ago(timeframe)\r\n| where RemoteUrl has_any (ai_api_domains_cohere)\r\n| extend UserAgent = tostring(parse_json(AdditionalFields).UserAgent)\r\n| project TimeGenerated, DeviceId, DeviceName, AccountName = InitiatingProcessAccountName,\r\n          ProcessName = InitiatingProcessFileName, ProcessCommandLine = InitiatingProcessCommandLine,\r\n          RemoteIP, RemotePort, RemoteUrl, UserAgent, ActivityType = \"Cohere_Network\";\r\nlet net_copilot = DeviceNetworkEvents\r\n| where TimeGenerated >= ago(timeframe)\r\n| where RemoteUrl has_any (ai_api_domains_copilot) or RemoteUrl has \"/copilot\"\r\n| extend UserAgent = tostring(parse_json(AdditionalFields).UserAgent)\r\n| project TimeGenerated, DeviceId, DeviceName, AccountName = InitiatingProcessAccountName,\r\n          ProcessName = InitiatingProcessFileName, ProcessCommandLine = InitiatingProcessCommandLine,\r\n          RemoteIP, RemotePort, RemoteUrl, UserAgent, ActivityType = \"Copilot_Network\";\r\nlet net_openrouter = DeviceNetworkEvents\r\n| where TimeGenerated >= ago(timeframe)\r\n| where RemoteUrl has_any (ai_api_domains_openrouter)\r\n| extend UserAgent = tostring(parse_json(AdditionalFields).UserAgent)\r\n| project TimeGenerated, DeviceId, DeviceName, AccountName = InitiatingProcessAccountName,\r\n          ProcessName = InitiatingProcessFileName, ProcessCommandLine = InitiatingProcessCommandLine,\r\n          RemoteIP, RemotePort, RemoteUrl, UserAgent, ActivityType = \"OpenRouter_Network\";\r\nlet net_together = DeviceNetworkEvents\r\n| where TimeGenerated >= ago(timeframe)\r\n| where RemoteUrl has_any (ai_api_domains_together)\r\n| extend UserAgent = tostring(parse_json(AdditionalFields).UserAgent)\r\n| project TimeGenerated, DeviceId, DeviceName, AccountName = InitiatingProcessAccountName,\r\n          ProcessName = InitiatingProcessFileName, ProcessCommandLine = InitiatingProcessCommandLine,\r\n          RemoteIP, RemotePort, RemoteUrl, UserAgent, ActivityType = \"TogetherAI_Network\";\r\nlet net_perplexity = DeviceNetworkEvents\r\n| where TimeGenerated >= ago(timeframe)\r\n| where RemoteUrl has_any (ai_api_domains_perplexity)\r\n| extend UserAgent = tostring(parse_json(AdditionalFields).UserAgent)\r\n| project TimeGenerated, DeviceId, DeviceName, AccountName = InitiatingProcessAccountName,\r\n          ProcessName = InitiatingProcessFileName, ProcessCommandLine = InitiatingProcessCommandLine,\r\n          RemoteIP, RemotePort, RemoteUrl, UserAgent, ActivityType = \"Perplexity_Network\";\r\nlet net_ai_suspicious_ports = DeviceNetworkEvents\r\n| where TimeGenerated >= ago(timeframe)\r\n| where RemotePort in (suspicious_ai_ports)\r\n| where InitiatingProcessFileName in~ (common_tools)\r\n| extend UserAgent = tostring(parse_json(AdditionalFields).UserAgent)\r\n| project TimeGenerated, DeviceId, DeviceName, AccountName = InitiatingProcessAccountName,\r\n          ProcessName = InitiatingProcessFileName, ProcessCommandLine = InitiatingProcessCommandLine,\r\n          RemoteIP, RemotePort, RemoteUrl, UserAgent, ActivityType = \"AI_Using_SuspiciousPort\";\r\nlet proc_ai_cmds = DeviceProcessEvents\r\n| where TimeGenerated >= ago(timeframe)\r\n| where ActionType == \"ProcessCreated\"\r\n| where ProcessCommandLine has_any (ai_cmdline_indicators)\r\n   or InitiatingProcessCommandLine has_any (ai_cmdline_indicators)\r\n| project TimeGenerated, DeviceId, DeviceName, AccountName,\r\n          ProcessName = FileName, ProcessCommandLine,\r\n          RemoteIP = tostring(null), RemotePort = toint(null), RemoteUrl = tostring(null),\r\n          UserAgent = tostring(null), ActivityType = \"AI_IndicatorsInCommandLine\";\r\nlet suspicious_events = union isfuzzy=true\r\n    net_ollama_port, net_ollama_remote,\r\n    net_openai, net_azure_openai, net_anthropic, net_google,\r\n    net_mistral, net_cohere, net_copilot, net_openrouter, net_together, net_perplexity,\r\n    net_ai_suspicious_ports, proc_ai_cmds;\r\nsuspicious_events\r\n| summarize StartTime = min(TimeGenerated), EndTime = max(TimeGenerated),\r\n            ActivityTypes = make_set(ActivityType), RemoteIPs = make_set(RemoteIP),\r\n            RemoteUrls = make_set(RemoteUrl), UserAgents = make_set(UserAgent)\r\n  by DeviceId, DeviceName, AccountName, ProcessName, ProcessCommandLine\r\n| extend ReportId = strcat(DeviceId, \"-\", tostring(hash_sha256(strcat(DeviceName, ProcessName, ProcessCommandLine))))\r\n| extend AlertTitle = \"Suspicious AI API activity across local and cloud tools\"\r\n| extend AlertDescription = strcat(\r\n    \"AI model activity detected on host \", DeviceName, \" by user \", AccountName,\r\n    \". Types: \", tostring(ActivityTypes), \". Process: \", ProcessName,\r\n    \" (\", ProcessCommandLine, \")\")\r\n| project DeviceId, TimeGenerated = StartTime, ReportId, AccountName, ProcessName, ProcessCommandLine,\r\n          EndTime, ActivityTypes, RemoteIPs, RemoteUrls, UserAgents\r\n"
query_type: kql
severity: medium
