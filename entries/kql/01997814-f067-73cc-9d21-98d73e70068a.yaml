id: 01997814-f067-73cc-9d21-98d73e70068a
name: EDR-Freeze - EDR Agent Process Suspension/Termination Attempt
description: Detects attempts to suspend or terminate Endpoint Detection and Response (EDR) agent processes by targeting their Process IDs (PIDs). The rule identifies suspicious command-line arguments and tools (e.g., procdump, WerFault) used to interact with processes, specifically looking for these actions against a predefined list of common EDR agent executable names. It correlates process creation events with process ID resolution to identify the targeted EDR agent.
query: "// Detect attempts to suspend/target EDR agent processes by PID using DeviceProcessEvents and SecurityEvent\r\n// Regex for common agent images is inlined with (?i) for case-insensitive matching — customize as needed.\r\n// Using ideas from detections posted by @Darvox, @Fsdr, @Thyaka, @KQLWizard, @Timpeck\r\n// Search multiple tables in sentinel for data, add suppression for known processes, add a list of known process names for edr's\r\n// Please test this, it should work but it needs testing. Posting without testing given what this is for.\r\n// Written in part using detections.ai, perplexity and microsoft copilot, along with human authoring.\r\n\r\n// goal is to combine all ideas found into a single search/query.\r\n\r\n\r\nunion\r\n(\r\n    // Branch 1: DeviceProcessEvents - extract attacker and targeted PID from commandlines (WerFaultSecure wrapper)\r\n    DeviceProcessEvents\r\n    | where isnotempty(tostring(column_ifexists(\"FileName\", \"\")))\r\n      and tostring(column_ifexists(\"FileName\", \"\")) =~ \"WerFaultSecure.exe\"\r\n    | extend EventTime = coalesce(column_ifexists(\"Timestamp\", datetime(null)),\r\n                                  column_ifexists(\"TimeGenerated\", datetime(null)),\r\n                                  column_ifexists(\"CreatedTime\", datetime(null)))\r\n    | where EventTime > ago(3d)\r\n    | where tostring(column_ifexists(\"InitiatingProcessFileName\", \"\")) !in~ (\"wermgr.exe\",\"svchost.exe\",\"csrss.exe\",\"WerFault.exe\")\r\n    | project\r\n        EventTime,\r\n        HostName = tostring(column_ifexists(\"DeviceName\", \"\")),\r\n        AccountName = tostring(column_ifexists(\"InitiatingProcessAccountName\", \"\")),\r\n        InitiatingProcessFileName = tostring(column_ifexists(\"InitiatingProcessFileName\", \"\")),\r\n        ProcessCommandLine = tostring(column_ifexists(\"ProcessCommandLine\", \"\"))\r\n    | extend _rawPID = extract(@\"/pid\\s+(\\d+)|-p\\s+(\\d+)|/p\\s+(\\d+)\", 1, ProcessCommandLine)\r\n    | where isnotempty(_rawPID)\r\n    | extend TargetedPID = tostring(tolong(_rawPID))\r\n    | project\r\n        EventTime,\r\n        HostName,\r\n        AccountName,\r\n        FreezingTool_branch1 = InitiatingProcessFileName,\r\n        FreezingToolCommandLine_branch1 = ProcessCommandLine,\r\n        TargetedProcess = \"Unknown\",\r\n        TargetedPID,\r\n        DataSource = \"DeviceProcessEvents\",\r\n        SourceTable = \"DeviceProcessEvents\"\r\n),\r\n(\r\n    // Branch 2: SecurityEvent 4688 - extract attacker and targeted PID from command line\r\n    SecurityEvent\r\n    | where EventID == 4688\r\n    | extend EventTime = coalesce(column_ifexists(\"TimeGenerated\", datetime(null)),\r\n                                  column_ifexists(\"Timestamp\", datetime(null)),\r\n                                  column_ifexists(\"CreatedTime\", datetime(null)))\r\n    | where EventTime > ago(1d)\r\n    | project\r\n        EventTime,\r\n        HostName = tostring(column_ifexists(\"Computer\", \"\")),\r\n        AccountName = tostring(column_ifexists(\"SubjectUserName\", \"\")),\r\n        CommandLine = tostring(column_ifexists(\"CommandLine\", \"\")),\r\n        NewProcessName = tostring(column_ifexists(\"NewProcessName\", \"\"))\r\n    | extend _rawPID = extract(@\"[/-]pid\\s+(\\d+)\", 1, CommandLine)\r\n    | where isnotempty(_rawPID)\r\n    | extend TargetedPID = tostring(_rawPID),\r\n             FreezingTool_branch2 = split(NewProcessName, \"\\\\\")[-1]\r\n    | project\r\n        EventTime,\r\n        HostName,\r\n        AccountName,\r\n        FreezingTool_branch2,\r\n        FreezingToolCommandLine_branch2 = CommandLine,\r\n        TargetedProcess = \"Unknown\",\r\n        TargetedPID,\r\n        DataSource = \"SecurityEvent\",\r\n        SourceTable = \"SecurityEvent\"\r\n)\r\n| extend\r\n    // Normalize attacker/tool and command-line fields from both branches\r\n    _ft = tostring(coalesce(column_ifexists(\"FreezingTool_branch1\", \"\"), column_ifexists(\"FreezingTool_branch2\", \"\"), \"\")),\r\n    _fcl = tostring(coalesce(column_ifexists(\"FreezingToolCommandLine_branch1\", \"\"), column_ifexists(\"FreezingToolCommandLine_branch2\", \"\"), \"\"))\r\n| where isnotempty(TargetedPID)\r\n// canonical numeric PID for safe comparisons\r\n| extend TargetedPID_int = toint(tolong(TargetedPID))\r\n// join to recent DeviceProcessEvents to resolve the targeted PID to an image (use HostName match)\r\n| join kind=leftouter (\r\n    DeviceProcessEvents\r\n    | extend ProcEventTime = coalesce(column_ifexists(\"Timestamp\", datetime(null)),\r\n                                      column_ifexists(\"TimeGenerated\", datetime(null)),\r\n                                      column_ifexists(\"CreatedTime\", datetime(null)))\r\n    | where ProcEventTime >= ago(5d)\r\n    | project\r\n        HostName_proc = tostring(column_ifexists(\"DeviceName\", \"\")),\r\n        ProcProcessId = tostring(column_ifexists(\"ProcessId\", \"\")),\r\n        ProcImage = tostring(column_ifexists(\"FileName\", \"\")),\r\n        ProcCommandLine = tostring(column_ifexists(\"ProcessCommandLine\", \"\")),\r\n        ProcEventTime\r\n) on $left.HostName == $right.HostName_proc\r\n// align PID types and keep only matching PID instances (reduces PID-reuse false matches)\r\n| extend ProcProcessId_int = toint(tolong(ProcProcessId))\r\n| where isnotempty(ProcProcessId_int) and TargetedPID_int == ProcProcessId_int\r\n| extend\r\n    AttackerProcess = tostring(_ft),\r\n    AttackerCommandLine = tostring(_fcl),\r\n    TargetImage = tostring(coalesce(ProcImage, \"Unknown\")),\r\n    TargetCommandLine = tostring(coalesce(ProcCommandLine, \"\")),\r\n    ProcEventTime = coalesce(ProcEventTime, datetime(null))\r\n| extend TargetImageOnly = tostring(split(TargetImage, \"\\\\\")[-1])\r\n// Inline, case-insensitive regex for common agent image names (no external let)\r\n| extend TargetIsEDR = iff(isnotempty(TargetImageOnly) and tostring(TargetImageOnly) matches regex @\"(?i)\\b(msmpeng|msmpengservice|mpcmdrun|sense|mssense|csagent|falcon|crowdstrike|csfalconservice|csfalconctl|sentinelagent|sentinelctl|cbsensor|carbonblack|taniumclient|zagent|kaspersky_agent|mcshield|traps)\\.exe\\b\", true, false)\r\n// Suspicious technique heuristics indicating explicit targeting or suspend-like activity\r\n| extend SuspiciousTechnique =\r\n    (\r\n        AttackerProcess has_any (\"procdump\",\"procDump\",\"werfault\",\"WerFault\",\"dumpcap\")\r\n        or AttackerCommandLine has_any (\"-p \",\"/pid\",\"/p \",\"NtSuspendProcess\",\"SuspendThread\",\"CreateRemoteThread\",\"OpenProcess\",\"PROCESS_SUSPEND_RESUME\")\r\n        or AttackerCommandLine has tostring(TargetedPID_int)\r\n    )\r\n// Ensure the resolved process instance aligns to the event time (avoid PID reuse false matches)\r\n| extend ProcTimeMatchesEvent = iff(isnotnull(ProcEventTime) and ProcEventTime <= EventTime + 30s and ProcEventTime >= EventTime - 5m, true, false)\r\n// Final decision: target is a known EDR/agent and attacker shows suspend/targeting clues and timing aligns\r\n| extend SuspendedAlert = iff(TargetIsEDR and SuspiciousTechnique and ProcTimeMatchesEvent, true, false)\r\n| where SuspendedAlert == true\r\n| sort by EventTime desc\r\n| project\r\n    timestamp = EventTime,\r\n    HostCustomEntity = HostName,\r\n    AccountCustomEntity = AccountName,\r\n    DetectionMethod = strcat(SourceTable, \": EDR-target suspension/pausing activity\"),\r\n    AttackerProcess,\r\n    AttackerCommandLine,\r\n    TargetedPID,\r\n    TargetImage = TargetImageOnly,\r\n    TargetCommandLine,\r\n    ProcEventTime,\r\n    EventTime,\r\n    DataSource,\r\n    SourceTable,\r\n    SuspiciousTechnique\r\n"
