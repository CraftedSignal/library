id: 019cd322-ec8d-712c-bf84-c8af08520896
name: OauthMSPhish Detection
description: 'KQL Query from file: OauthMSPhish Detection'
query: "let Lookback = 1h;\r\nlet OauthMSPhish =\r\nEmailUrlInfo\r\n| where Timestamp > ago(Lookback)\r\n| where UrlDomain matches regex @\"index-[a-z0-9]+(\\.[a-z0-9\\-]+)*\\.workers\\.dev\"\r\n| join EmailEvents on NetworkMessageId\r\n| where EmailDirection == \"Inbound\"\r\n| where DeliveryAction <> \"Blocked\";\r\nDeviceNetworkEvents\r\n| where Timestamp > ago(Lookback)\r\n| where RemoteUrl matches regex @\"index-[a-z0-9]+(\\.[a-z0-9\\-]+)*\\.workers\\.dev\"\r\n| union OauthMSPhish"
query_type: kql
severity: medium
tactics:
    - TA0001
techniques:
    - T1566
    - T1566.002
tags:
    - kql
author: Steven Lim
version: "2"
