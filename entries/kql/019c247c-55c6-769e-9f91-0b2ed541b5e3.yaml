id: 019c247c-55c6-769e-9f91-0b2ed541b5e3
name: Hunting PeckBirdy LOLBins Activity
description: This rule detects potential malware execution and persistence by correlating suspicious script and HTA activity with known malicious infrastructure. It flags mshta, wscript, and cscript executing remote HTA or script content, related network connections and downloads, temporary file artefacts, connections to listed suspicious domains and IPs, attempts to add Windows Defender exclusions, and fake browser update style process launches that retrieve executables over HTTP.
query: |-
    DeviceProcessEvents
    | where ActionType == "ProcessCreated"
    | where FileName =~ "mshta.exe"
    | where ProcessCommandLine contains "http" and (ProcessCommandLine contains "/hta" or ProcessCommandLine contains "github" or ProcessCommandLine contains "githubassets")
    | project Timestamp, DeviceName, FileName, ProcessCommandLine, InitiatingProcessFileName, InitiatingProcessCommandLine
    | union (
    DeviceProcessEvents
    | where ActionType == "ProcessCreated"
    | where FileName =~ "wscript.exe" or FileName =~ "cscript.exe"
    | where ProcessCommandLine contains "http" or ProcessCommandLine contains ".js" or ProcessCommandLine contains ".jse"
    | project Timestamp, DeviceName, FileName, ProcessCommandLine, InitiatingProcessFileName, InitiatingProcessCommandLine
    )
    | union (
    DeviceNetworkEvents
    | where ActionType in ("ConnectionSuccess", "ConnectionAttempt")
    | where RemoteUrl contains "/hta" or RemoteUrl contains "/wscript" or RemoteUrl contains "/html"
    | where InitiatingProcessCommandLine contains "mshta" or InitiatingProcessCommandLine contains "wscript"
    | project Timestamp, DeviceName, RemoteIP, RemoteUrl, InitiatingProcessFileName, InitiatingProcessCommandLine
    )
    | union (
    DeviceFileEvents
    | where ActionType in ("FileCreated", "FileModified")
    | where FileName =~ "___unique_id___"
    | where FolderPath contains "Temp" or FolderPath contains "Tmp"
    | project Timestamp, DeviceName, FileName, FolderPath, InitiatingProcessFileName, InitiatingProcessCommandLine
    )
    | union (
    DeviceNetworkEvents
    | where ActionType in ("ConnectionSuccess", "ConnectionAttempt")
    | where RemoteUrl contains "howtotell/default" or RemoteUrl contains "activate-windows"
    | project Timestamp, DeviceName, RemoteIP, RemoteUrl, InitiatingProcessFileName, InitiatingProcessCommandLine
    )
    | union (
    DeviceNetworkEvents
    | where ActionType in ("ConnectionSuccess", "ConnectionAttempt")
    | where RemoteUrl has_any (dynamic(["mkdmcdn.com", "center.myrnicrosoft.com", "oss-cdn.com", "github.githubassets.net"]))
    | project Timestamp, DeviceName, RemoteIP, RemoteUrl, InitiatingProcessFileName, InitiatingProcessCommandLine
    )
    | union (
    DeviceNetworkEvents
    | where ActionType in ("ConnectionSuccess", "ConnectionAttempt")
    | where RemoteIP in (dynamic(["47.238.219.111", "47.238.184.9"]))
    | project Timestamp, DeviceName, RemoteIP, RemoteUrl, InitiatingProcessFileName, InitiatingProcessCommandLine
    )
    | union (
    DeviceNetworkEvents
    | where ActionType in ("ConnectionSuccess", "ConnectionAttempt")
    | where RemoteUrl contains "myrnicrosoft.com"
    | project Timestamp, DeviceName, RemoteIP, RemoteUrl, InitiatingProcessFileName, InitiatingProcessCommandLine
    )
    | union (
    DeviceRegistryEvents
    | where ActionType in ("RegistryValueSet", "RegistryKeyAdded")
    | where RegistryKey contains "Windows Defender" and (RegistryKey contains "Exclusion" or RegistryValueData contains "Exclusion")
    | where InitiatingProcessFileName =~ "powershell.exe" or InitiatingProcessFileName endswith ".exe"
    | project Timestamp, DeviceName, RegistryKey, RegistryValueName, RegistryValueData, InitiatingProcessFileName, InitiatingProcessCommandLine
    )
    | union (
    DeviceProcessEvents
    | where ActionType == "ProcessCreated"
    | where ProcessCommandLine contains "Chrome" and (ProcessCommandLine contains "update" or ProcessCommandLine contains "setup" or ProcessCommandLine contains "download")
    | where ProcessCommandLine contains "http" or ProcessCommandLine contains ".exe"
    | project Timestamp, DeviceName, FileName, ProcessCommandLine, InitiatingProcessFileName, InitiatingProcessCommandLine
    )
query_type: kql
severity: medium
tactics:
    - TA0005
    - TA0002
    - TA0011
    - TA0001
    - TA0004
techniques:
    - T1218.005
    - T1059.005
    - T1105
    - T1071.001
    - T1566
    - T1548.002
tags:
