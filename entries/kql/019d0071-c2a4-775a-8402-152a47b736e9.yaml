id: 019d0071-c2a4-775a-8402-152a47b736e9
name: Crimson Kingsnake – Typosquat Domain Communication
description: This rule detects network connections to a list of domains identified as associated with phishing activities associated with Crimson Kingsnake. Monitoring these connections can help identify compromised systems or users attempting to access malicious sites.
query: "let ck_domains = dynamic([\r\n\"mail-simmonslegal.com\",\"simmonsimlegal.com\",\"simmonsslslegal.com\",\r\n\"simmonssslegal.com\",\"slsssimmonslegal.com\",\"sslsimmonslegal.com\",\r\n\"sssimmonsandsimms.com\",\"sssimmonslegal.com\",\"ssslsimslegal.com\",\r\n\"work-desk02.space\"\r\n]);\r\nDeviceNetworkEvents\r\n| where RemoteUrl has_any (ck_domains)\r\n| project TimeGenerated, DeviceName, RemoteUrl, InitiatingProcessFileName\r\n"
query_type: kql
severity: medium
tactics:
    - TA0001
techniques:
    - T1566
    - T1566.002
tags:
    - kql
version: "1"
