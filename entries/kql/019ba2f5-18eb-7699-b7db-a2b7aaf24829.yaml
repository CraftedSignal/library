id: 019ba2f5-18eb-7699-b7db-a2b7aaf24829
name: Suspicious PowerShell and MSBuild Activity with Defense Evasion and Persistence
description: This rule detects several suspicious activities often associated with post-exploitation and defense evasion. It identifies PowerShell commands used for recursively searching for msbuild.exe, tampering with Windows Defender settings (disabling real-time monitoring or adding exclusions), and downloading files from the internet to common temporary or application data directories. Additionally, it flags msbuild.exe executing suspicious .proj files from temporary directories, and any executable launched from temporary or program data folders by PowerShell or MSBuild. The rule also includes detection for persistence via .url file creation in the Startup folder and the dropping of specific suspicious files (.proj, pins.dat, staxs.exe, tybd7.exe) by PowerShell or MSBuild in temporary or program data directories.
query: "let LegitFiles = dynamic([\"OpenHandleCollector.exe\", \"VC_redist.x64.exe\", \"VC_redist.x86.exe\", \"DismHost.exe\", \"UDCInfInstaller.exe\"]); // add legit accordingly \r\nDeviceProcessEvents\r\n| where not(FileName in~ (LegitFiles))\r\n| where \r\n    // PowerShell recursively hunting msbuild.exe across C:\\\r\n    (\r\n        FileName =~ \"powershell.exe\"\r\n        and ProcessCommandLine has \"gci \"\r\n        and ProcessCommandLine has \"C:\\\\\"\r\n        and ProcessCommandLine has \"-filter msbuild.exe\"\r\n        and ProcessCommandLine has \"-r\"\r\n        and ProcessCommandLine has \"-ea 0\"\r\n    )\r\n    or\r\n    // Windows Defender tampering\r\n    (\r\n        FileName =~ \"powershell.exe\"\r\n        and (\r\n            ProcessCommandLine has \"Set-MpPreference\"\r\n            or ProcessCommandLine has \"Add-MpPreference\"\r\n        )\r\n        and ProcessCommandLine has_any (\r\n            \"DisableRealtimeMonitoring\",\r\n            \"ExclusionPath\",\r\n            \"ExclusionExtension\",\r\n            \"ExclusionProcess\"\r\n        )\r\n    )\r\n    or\r\n    // PowerShell downloading\r\n    (\r\n        FileName =~ \"powershell.exe\"\r\n        and (\r\n            ProcessCommandLine has \"iwr http\" \r\n            or ProcessCommandLine has \"Invoke-WebRequest http\"\r\n            or ProcessCommandLine has \"Start-BitsTransfer\"\r\n        )\r\n        and (\r\n            ProcessCommandLine has \"ProgramData\"\r\n            or ProcessCommandLine has \"Temp\"\r\n            or ProcessCommandLine has \"AppData\"\r\n        )\r\n        and ProcessCommandLine has_any (\".exe\", \".proj\", \".dll\", \".ps1\")\r\n    )\r\n    or\r\n    // MSBuild executing suspicious .proj file, spawned by PowerShell\r\n    (\r\n        FileName =~ \"msbuild.exe\"\r\n        and ProcessCommandLine has \".proj\"\r\n        and InitiatingProcessFileName =~ \"powershell.exe\"\r\n        and (\r\n            FolderPath contains \"ProgramData\"\r\n            or FolderPath contains \"Temp\"\r\n            or FolderPath contains \"AppData\"\r\n        )\r\n    )\r\n    or\r\n    // Suspicious executable launch from hidden path by PowerShell/MSBuild\r\n    (\r\n        FileName endswith \".exe\"\r\n        and (\r\n            FolderPath contains \"ProgramData\"\r\n            or FolderPath contains \"Temp\"\r\n        )\r\n        and InitiatingProcessFileName in~ (\"powershell.exe\", \"msbuild.exe\")\r\n    )\r\n// Union with file drops and persistence\r\n| union (\r\n    DeviceFileEvents\r\n    | where\r\n        // Persistence: .url created in Startup folder\r\n        (\r\n            FolderPath contains \"Startup\"\r\n            and (FileName endswith \".url\")\r\n            and ActionType == \"FileCreated\"\r\n        )\r\n        or\r\n        // Staging files dropped by suspicious parents\r\n        (\r\n            (\r\n                FolderPath contains \"ProgramData\"\r\n                or FolderPath contains \"Temp\"\r\n            )\r\n            and FileName has_any (\".proj\", \"pins.dat\", \"staxs.exe\", \"tybd7.exe\")\r\n            and InitiatingProcessFileName in~ (\"powershell.exe\", \"msbuild.exe\")\r\n            and ActionType == \"FileCreated\"\r\n        )\r\n)\r\n| project \r\n    Timestamp, \r\n    DeviceName, \r\n    AccountName,\r\n    ActionType,\r\n    FileName, \r\n    FolderPath, \r\n    ProcessCommandLine, \r\n    InitiatingProcessFileName, \r\n    InitiatingProcessCommandLine,\r\n    SHA256\r\n| order by Timestamp desc"
