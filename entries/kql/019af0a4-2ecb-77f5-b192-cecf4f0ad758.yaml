id: 019af0a4-2ecb-77f5-b192-cecf4f0ad758
name: Conhost Headless Execution via Pcalua (GOLD BLADE’s)
description: Detects the execution of 'conhost.exe' with the '--headless' argument, specifically when initiated by 'pcalua.exe'. This combination has been observed in attacks by the GOLD BLADE threat group for indirect command execution.
query: "DeviceProcessEvents\r\n// Look for the creation of conhost.exe with the specific '--headless' argument.\r\n| where FileName =~ \"conhost.exe\" and ProcessCommandLine has \"--headless\"\r\n// The parent process must be pcalua.exe, a LOLBin used by GOLD BLADE in this chain.\r\n| where InitiatingProcessFileName =~ \"pcalua.exe\"\r\n"
query_type: kql
severity: medium
tactics:
    - TA0005
techniques:
    - T1202
tags:
    - kql
version: "1"
