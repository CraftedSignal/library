id: 3d2450bb-1e81-4609-b953-8fd6d24593df
name: SharePoint ToolShell CVE-2025-53770 Exploitation - Web IIS
description: |
    Detects access to vulnerable SharePoint components potentially being exploited in CVE-2025-53770 through IIS web server logs.
    CVE-2025-53770 is a zero-day vulnerability in SharePoint that allows remote code execution.
query: |
    // Detects potential exploitation of SharePoint CVE-2025-53770 via IIS web server logs
    // Assumes the IIS logs are ingested into a table named 'IISLogs' with standard field mappings
    IISLogs
    | where (cs_method == "POST" and cs_uri_stem has "/_layouts/15/ToolPane.aspx" and cs_uri_query has "DisplayMode=Edit&a=/ToolPane.aspx"
        or cs_method == "GET" and cs_uri_stem has "/_layouts/15/spinstall0.aspx")
    | where cs_referer has "/_layouts/SignOut.aspx"
    // Adjust table and field names as needed to match your environment
query_type: kql
tags:
    - kql
version: "3"
