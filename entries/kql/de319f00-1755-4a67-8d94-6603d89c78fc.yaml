id: de319f00-1755-4a67-8d94-6603d89c78fc
name: Suspicious PrivEsc Tool Fetch Detected
description: Detects suspicious downloads or fetches of common privilege-escalation tools such as winPEAS, linPEAS, PowerUp, Seatbelt, SharpUp, WinPwn, PrivescCheck, Sherlock, Watson, BeRoot, LinEnum, LSE/LES, Linux Exploit Suggester, pspy, or GTFObins. These tools are often used by adversaries after initial access to enumerate the environment and attempt local privilege escalation.
query: "// Detects downloads/fetches of common privilege-escalation tooling (PEASS-NG, PowerUp, Seatbelt, \r\n// SharpUp, WinPwn, PrivescCheck, Sherlock, Watson, BeRoot, PowerView, LinEnum, LSE/LES,\r\n// Linux Exploit Suggester, pspy, GTFObins, etc.) via DeviceEvents only.\r\n//\r\n//\r\n// Tuning\r\nlet lookback = 30d;\r\nlet minHits  = 1;\r\nlet maxSets  = 100;\r\n// Tool keywords\r\nlet kw = dynamic([\r\n  \"winpeas\",\"linpeas\",\"peass-ng\",\"powerup\",\"powersploit\",\"powerview\",\"seatbelt\",\"sharpup\",\r\n  \"winpwn\",\"privesccheck\",\"sherlock\",\"watson\",\"beroot\",\"jaws\",\"wesng\",\"windows-exploit-suggester\",\r\n  \"linenum\",\"lse\",\"linux-smart-enumeration\",\"linux-exploit-suggester\",\"linux-exploit-suggester-2\",\r\n  \"les\",\"pspy\",\"gtfobins\"\r\n]);\r\n// Repo/host indicators\r\nlet repo = dynamic([\r\n  \"github.com/peass-ng/peass-ng\",\"raw.githubusercontent.com/peass-ng\",\r\n  \"github.com/PowerShellMafia/PowerSploit\",\"raw.githubusercontent.com/PowerShellMafia/PowerSploit\",\r\n  \"github.com/harmj0y/PowerUp\",\"raw.githubusercontent.com/harmj0y/PowerUp\",\r\n  \"github.com/GhostPack/Seatbelt\",\"raw.githubusercontent.com/GhostPack/Seatbelt\",\r\n  \"github.com/GhostPack/SharpUp\",\"raw.githubusercontent.com/GhostPack/SharpUp\",\r\n  \"github.com/S3cur3Th1sSh1t/WinPwn\",\"raw.githubusercontent.com/S3cur3Th1sSh1t/WinPwn\",\r\n  \"github.com/itm4n/PrivescCheck\",\"raw.githubusercontent.com/itm4n/PrivescCheck\",\r\n  \"github.com/rasta-mouse/Sherlock\",\"raw.githubusercontent.com/rasta-mouse/Sherlock\",\r\n  \"github.com/rasta-mouse/Watson\",\"raw.githubusercontent.com/rasta-mouse/Watson\",\r\n  \"github.com/AlessandroZ/BeRoot\",\"raw.githubusercontent.com/AlessandroZ/BeRoot\",\r\n  \"github.com/411Hall/JAWS\",\"raw.githubusercontent.com/411Hall/JAWS\",\r\n  \"github.com/AonCyberLabs/Windows-Exploit-Suggester\",\"raw.githubusercontent.com/AonCyberLabs/Windows-Exploit-Suggester\",\r\n  \"github.com/cfalta/Windows-Exploit-Suggester\",\"raw.githubusercontent.com/Windows-Exploit-Suggester\",\r\n  \"github.com/rebootuser/LinEnum\",\"raw.githubusercontent.com/rebootuser/LinEnum\",\r\n  \"github.com/dslul/lse\",\"raw.githubusercontent.com/dslul/lse\",\r\n  \"github.com/mzet-/linux-exploit-suggester\",\"raw.githubusercontent.com/mzet-/linux-exploit-suggester\",\r\n  \"github.com/jondonas/linux-exploit-suggester-2\",\"raw.githubusercontent.com/jondonas/linux-exploit-suggester-2\",\r\n  \"github.com/DominicBreuker/pspy\",\"raw.githubusercontent.com/DominicBreuker/pspy\",\r\n  // generic code/file hosts\r\n  \"raw.githubusercontent.com\",\"gist.github.com\",\"gitlab.com\",\"bitbucket.org\"\r\n]);\r\n// Normalize core fields and filter \"download-ish\" events\r\nlet base =\r\nDeviceEvents\r\n| where TimeGenerated >= ago(lookback)\r\n| extend AF_raw = column_ifexists(\"AdditionalFields\",\"\")\r\n| extend AF     = todynamic(AF_raw)\r\n| extend AF_str = tostring(AF_raw)\r\n// Safely pull common URL/filename keys from AdditionalFields bag\r\n| extend Url   = tostring(coalesce(AF[\"Url\"], AF[\"RequestUrl\"], AF[\"TargetUrl\"], AF[\"DestinationUrl\"], AF[\"RemoteUrl\"], AF[\"DownloadUrl\"]))\r\n| extend DFile = tostring(coalesce(AF[\"FileName\"], AF[\"DownloadedFileName\"], AF[\"TargetFileName\"]))\r\n| extend FileGuess = coalesce(DFile, FileName)\r\n| extend Cmd       = tostring(InitiatingProcessCommandLine)\r\n| extend DeviceGroup = column_ifexists(\"DeviceGroup\",\"\")\r\n| extend UrlHost = iff(isnotempty(Url), tostring(parse_url(Url).Host), \"\")\r\n| extend IsDownloadish = iif(tolower(ActionType) has \"download\" or AF_str has \"http\" or isnotempty(Url), true, false)\r\n| where IsDownloadish\r\n// Match logic across URL / filename / command line / AdditionalFields\r\n| where\r\n    tolower(Url) has_any (kw) or tolower(Url) has_any (repo)\r\n    or tolower(FileGuess) has_any (kw)\r\n    or tolower(FileName) has_any (kw)\r\n    or tolower(Cmd) has_any (kw)\r\n    or tolower(AF_str) has_any (kw)\r\n    // Heuristic: suspicious script/binary extensions from code/file hosts\r\n    or (Url has_any (dynamic([\".ps1\",\".psm1\",\".exe\",\".dll\",\".bat\",\".cmd\",\".msi\",\".js\",\".vbs\",\r\n                              \".zip\",\".7z\",\".tar\",\".gz\",\".tgz\",\".sh\",\".py\"]))\r\n        and tolower(Url) has_any (dynamic([\"github.com\",\"raw.githubusercontent.com\",\"gitlab.com\",\"bitbucket.org\"])))\r\n| project TimeGenerated, DeviceId, DeviceName, DeviceGroup, ActionType,\r\n          Url, UrlHost, FileName = FileGuess,\r\n          InitiatingProcessAccountName, InitiatingProcessAccountDomain,\r\n          InitiatingProcessFileName, InitiatingProcessFolderPath, InitiatingProcessCommandLine = Cmd,\r\n          ReportId, AdditionalFields;\r\n// Aggregate for incident-friendly output\r\nbase\r\n| summarize\r\n    FirstSeen = min(TimeGenerated),\r\n    LastSeen  = max(TimeGenerated),\r\n    Hits      = count(),\r\n    Urls      = make_set(Url, maxSets),\r\n    UrlHosts  = make_set(UrlHost, maxSets),\r\n    Files     = make_set(FileName, maxSets),\r\n    Procs     = make_set(InitiatingProcessFileName, 50),\r\n    CmdLines  = make_set(InitiatingProcessCommandLine, 50),\r\n    ReportIds = make_set(ReportId, maxSets)\r\n  by DeviceId, DeviceName, DeviceGroup, InitiatingProcessAccountName, InitiatingProcessAccountDomain\r\n| where Hits >= minHits\r\n| extend AnyUrl  = tostring(Urls[0]),\r\n         AnyHost = tostring(UrlHosts[0]),\r\n         AnyFile = tostring(Files[0]),\r\n         AnyProc = tostring(Procs[0])\r\n| project\r\n    TimeGenerated = LastSeen,\r\n    FirstSeen, LastSeen, Hits,\r\n    DeviceId, DeviceName, DeviceGroup,\r\n    AccountName = InitiatingProcessAccountName, AccountDomain = InitiatingProcessAccountDomain,\r\n    AnyUrl, AnyHost, AnyFile, AnyProc,\r\n    Urls, UrlHosts, Files, Procs, CmdLines, ReportIds\r\n| order by TimeGenerated desc\r\n// ========================================= /End Query =========================================\r\n"
