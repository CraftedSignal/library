id: 019c670c-11f0-75ca-b878-c767e75fe200
name: Renamed SimpleHelp RMM Deployment
description: Detects the creation or execution of files, often in C:\ProgramData, with a file description of 'SimpleHelp Remote Access Client' but using non-standard or renamed filenames. This is indicative of threat actors deploying the SimpleHelp RMM tool for persistence, as observed in campaigns exploiting CVE-2026-1731 in BeyondTrust.
query: |
    // Name: Renamed SimpleHelp RMM Deployment
    // Author: Ethan Andrews + detections.ai
    // Date: 2026-02-16
    // Description: Detects the creation or execution of files, often in C:\ProgramData, with a file description of 'SimpleHelp Remote Access Client' but using non-standard or renamed filenames. This is indicative of threat actors deploying the SimpleHelp RMM tool for persistence, as observed in campaigns exploiting CVE-2026-1731 in BeyondTrust.
    // False Positives: Legitimate, but unusually named, SimpleHelp installations could trigger this. The exclusion list of known legitimate filenames may need to be tuned for your environment.
    // References: https://arcticwolf.com/resources/blog-uk/update-arctic-wolf-observes-threat-campaign-targeting-beyondtrust-remote-support-following-cve-2026-1731/
    // Tactics: Persistence, Defense Evasion
    // Techniques: T1219, T1036.003, T1543.003
    let known_simplehelp_filenames = dynamic(["SimpleHelp.exe", "RemoteAccess.exe"]); // Add any other known legitimate SimpleHelp executable names used in your environment.
    let simplehelp_description = "SimpleHelp Remote Access Client";
    // Combine file creation and process execution events for better coverage.
    union DeviceFileEvents, DeviceProcessEvents
    | where
        // The report specifically notes deployment to the ProgramData directory.
        FolderPath startswith @"C:\ProgramData\"
        // Check the file description metadata from either file or process events.
        and (ProcessVersionInfoFileDescription  == simplehelp_description or ProcessVersionInfoFileDescription == simplehelp_description)
        // Exclude known legitimate filenames to reduce potential false positives.
        and FileName !in~ (known_simplehelp_filenames)
    | project
        Timestamp,
        DeviceName,
        ActionType,
        FileName,
        FolderPath,
        SHA1,
        FileDescription = ProcessVersionInfoFileDescription,
        InitiatingProcessFileName,
        InitiatingProcessCommandLine,
        ProcessCommandLine,
        AccountName
query_type: kql
severity: medium
tactics:
    - TA0011
    - TA0005
    - TA0003
    - TA0004
techniques:
    - T1219
    - T1036.003
    - T1543.003
tags:
