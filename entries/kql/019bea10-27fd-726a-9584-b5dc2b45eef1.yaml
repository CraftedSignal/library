id: 019bea10-27fd-726a-9584-b5dc2b45eef1
name: FortiGate Malicious SSO Login Activity
description: This rule detects successful SSO logins on FortiGate devices using usernames and source IP addresses associated with a known malicious campaign exploiting a SAML SSO bypass. The rule specifically looks for successful SSO logins (logid == "0100032001", method == "sso", status == "success") from a predefined list of malicious usernames or source IP addresses.
query: |
    // Name: FortiGate Malicious SSO Login Activity
    // Author: detections.ai
    // Date: 2026-01-23
    // Description: This rule detects successful SSO logins on FortiGate devices using usernames and source IP addresses associated with a known malicious campaign exploiting a SAML SSO bypass.
    // References:
    // - https://arcticwolf.com/resources/blog/arctic-wolf-observes-malicious-configuration-changes-fortinet-fortigate-devices-via-sso-accounts/
    // - https://www.fortinet.com/blog/psirt-blogs/analysis-of-sso-abuse-on-fortios
    // False Positive Sensitivity: Medium
    // MITRE TTPs: T1078.001, T1078.004

    let malicious_users = dynamic(["cloud-init@mail.io", "cloud-noc@mail.io"]);
    let malicious_ips = dynamic(["104.28.244.115", "104.28.212.114", "217.119.139.50", "37.1.209.19"]);

    // The table name 'Fortinet_Log_Event' is an example. Please replace with your actual table containing Fortinet logs.
    Fortinet_Log_Event
    // Filter for successful admin logins via SSO.
    | where logid == "0100032001" and method == "sso" and status == "success"
    // Match on known malicious indicators. Threat actors are likely to change these, so monitor for updates.
    | where user in~ (malicious_users) or srcip in (malicious_ips)
    // FP Tuning: The source IPs are from hosting providers. If legitimate remote administration occurs from these providers, consider adding filters to exclude expected source countries or Autonomous System Numbers (ASNs).
    | project
        TimeGenerated,
        devname,
        user,
        srcip,
        ui,
        msg,
        logid
query_type: kql
severity: medium
tactics:
    - TA0006
    - TA0005
    - TA0003
    - TA0004
    - TA0001
techniques:
    - T1606.002
    - T1078.001
    - T1078.004
tags:
    - kql
version: "2"
references:
    - https://arcticwolf.com/resources/blog/arctic-wolf-observes-malicious-configuration-changes-fortinet-fortigate-devices-via-sso-accounts/
    - https://www.fortinet.com/blog/psirt-blogs/analysis-of-sso-abuse-on-fortios
