id: 019c8a43-8477-714b-8583-46c603bcbac5
name: Medusa Ransomware C2 Communication
description: This rule detects network communication to or from known Command and Control (C2) IP addresses used by the Medusa ransomware group. The report indicates these IPs are often associated with malicious SimpleHelp RMM servers.
query: "// Name: Medusa Ransomware C2 Communication\r\n// Author: adarsh pandey\r\n// Date: 2026-02-23\r\n// Description: This rule detects network communication to or from known Command and Control (C2) IP addresses used by the Medusa ransomware group. The report indicates these IPs are often associated with malicious SimpleHelp RMM servers.\r\n// Tactics: Command and Control\r\n// Techniques: T1071, T1219\r\n// False Positive Sensitivity: Medium. Legitimate communication to these IPs is highly unlikely. However, IP addresses can be reallocated over time. If false positives occur, investigate the application responsible for the traffic and consider adding time-based constraints or other filters.\r\n// References: https://www.darktrace.com/blog/under-medusas-gaze-how-darktrace-uncovers-rmm-abuse-in-ransomware-campaigns\r\nlet MedusaC2Ips = dynamic([\r\n    \"185.108.129.62\",\r\n    \"185.126.238.119\",\r\n    \"213.183.63.41\",\r\n    \"213.183.63.42\",\r\n    \"31.220.45.120\",\r\n    \"91.92.246.110\",\r\n    \"45.9.149.112\",\r\n    \"89.36.161.12\",\r\n    \"193.37.69.154\"\r\n]);\r\n// Search across multiple network log sources for connections to the malicious IPs.\r\nunion isfuzzy=true DeviceNetworkEvents, CommonSecurityLog, VMConnection\r\n| where RemoteIP in (MedusaC2Ips)\r\n    or DestinationIP in (MedusaC2Ips)\r\n    or SourceIP in (MedusaC2Ips)\r\n| extend\r\n    // Normalize common fields for easier investigation.\r\n    timestamp = TimeGenerated,\r\n    Host = coalesce(DeviceName, Computer, HostName),\r\n    Account = coalesce(InitiatingProcessAccountName, UserName, RequestingUserName),\r\n    TargetIp = coalesce(RemoteIP, DestinationIP)\r\n| project-reorder\r\n    timestamp,\r\n    Host,\r\n    Account,\r\n    TargetIp,\r\n    SourceIP,\r\n    Action,\r\n    NetworkDirection,\r\n    InitiatingProcessFileName,\r\n    ProcessId,\r\n    RemotePort,\r\n    DestinationPort\r\n"
query_type: kql
severity: medium
tactics:
    - TA0011
techniques:
    - T1071
    - T1219
tags:
    - kql
version: "2"
references:
    - https://www.darktrace.com/blog/under-medusas-gaze-how-darktrace-uncovers-rmm-abuse-in-ransomware-campaigns
