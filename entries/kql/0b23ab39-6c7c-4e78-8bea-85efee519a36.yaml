id: 0b23ab39-6c7c-4e78-8bea-85efee519a36
name: Active Directory Enumeration via ADWS Detection
description: 'KQL Query from file: Active Directory Enumeration via ADWS Detection'
query: "let ADWS =\r\nDeviceNetworkEvents\r\n| where TimeGenerated > ago(1h)\r\n| where ActionType == \"InboundConnectionAccepted\"\r\n| where LocalPort == 9389\r\n| distinct DeviceName;\r\nSecurityEvent\r\n| where TimeGenerated > ago(1h)\r\n| where EventID == 1644 or EventID == 4662\r\n| where Computer has_any(ADWS)"
query_type: kql
severity: medium
tags:
    - kql
version: "1"
references:
    - https://ipurple.team/2025/08/12/active-directory-enumeration-adws/
