id: 019c4329-ee93-703d-becf-6842bee0b05a
name: OpenClaw Agentic Bot Detection
description: |-
    This analytic rule detects the presence, installation, or execution of a family of suspicious bot‑related tooling identified by the names openclaw, clawhub, moltbot, and clawdbot.
    It looks for indicators across process execution, file creation, and package‑install commands, ensuring coverage of initial deployment as well as runtime activity
query: "let BotNames = dynamic([\"openclaw\", \"clawhub\", \"moltbot\", \"clawdbot\"]);\r\nlet BotIndicators = dynamic([\r\n    \"openclaw\", \"clawhub\", \"moltbot\", \"clawdbot\",\r\n    \"openclaw.exe\", \"clawhub.exe\", \"moltbot.exe\", \"clawdbot.exe\",\r\n    \"openclaw.py\",  \"clawhub.py\",  \"moltbot.py\",  \"clawdbot.py\"\r\n]);\r\n// --- Process Execution ---\r\nDeviceProcessEvents\r\n| where TimeGenerated >= ago(30d)\r\n| where FileName has_any (BotIndicators)\r\n    or ProcessCommandLine has_any (BotNames)\r\n| extend DetectionType = \"Process Execution\"\r\n// --- Installation / File Drop ---\r\n| union (\r\n    DeviceFileEvents\r\n    | where ActionType in (\"FileCreated\", \"FileModified\", \"FileRenamed\")\r\n    | where FileName has_any (BotIndicators)\r\n        or FolderPath has_any (BotNames)\r\n    | extend DetectionType = \"File Install/Drop\"\r\n)\r\n// --- Script or Package Install (pip, npm, curl, git clone etc.) ---\r\n| union (\r\n    DeviceProcessEvents\r\n    | where ProcessCommandLine has_any (\r\n        \"pip install\", \"pip3 install\",\r\n        \"npm install\", \"pnpm add\",\r\n        \"curl\", \"wget\", \"git clone\"\r\n    )\r\n    | where ProcessCommandLine has_any (BotNames)\r\n    | extend DetectionType = \"Install Command\"\r\n)\r\n// Start - Tuning Block\r\n// 1. Browser deep-link / SafeLinks noise (Edge + Chrome)\r\n| where not (\r\n        FileName in~ (\"msedge.exe\", \"chrome.exe\")\r\n        and ProcessCommandLine has_any (\r\n            \"--single-argument\",\r\n            \"microsoft-edge:///?url=\",\r\n            \"chrome://\",\r\n            \"statics.teams.cdn.office.net\",\r\n            \"safelinks.protection.outlook.com\",\r\n            \"teams.microsoft.com\"\r\n        )\r\n    )\r\n// 2. Combined PDF excludes (Edge/Chrome + Acrobat)\r\n| where not (\r\n    (FileName in~ (\"msedge.exe\", \"chrome.exe\", \"Acrobat.exe\", \"AcroRd32.exe\")\r\n        and ProcessCommandLine has \".pdf\")\r\n    or\r\n    (InitiatingProcessFileName in~ (\"outlook.exe\", \"msedge.exe\", \"chrome.exe\", \"Acrobat.exe\", \"AcroRd32.exe\")\r\n        and (ProcessCommandLine has \".pdf\" or FileName has \".pdf\"))\r\n)\r\n// 3. Office applications opening normal documents\r\n| where not (\r\n        FileName in~ (\"winword.exe\", \"excel.exe\", \"powerpnt.exe\", \"outlook.exe\")\r\n        and ProcessCommandLine has_any (\".doc\", \".docx\", \".xls\", \".xlsx\", \".ppt\", \".pptx\")\r\n    )\r\n// End - Tuning Block\r\n| project TimeGenerated, DeviceName, InitiatingProcessParentFileName,\r\n     FileName, ProcessCommandLine, FolderPath, DetectionType\r\n| order by TimeGenerated desc\r\n"
query_type: kql
severity: medium
tactics:
    - TA0002
tags:
    - kql
author: Guy Jacobs
version: "2"
