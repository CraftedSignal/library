id: 019c8d5d-4194-738d-9cfb-a83a26c14583
name: MOONRISE RAT Process Hash Match
description: This rule detects the execution of processes whose SHA256 hash matches a known hash associated with the MOONRISE RAT malware. It queries DeviceProcessEvents for the last 24 hours and filters for processes with matching SHA256 hashes.
query: "//File/process hash match related to the MOONRISE RAT\r\nlet MoonriseHashes = dynamic([\r\n  \"c7fd265b23b2255729eed688a211f8c3bd2192834c00e4959d1f17a0b697cd5e\",\r\n  \"8a422b8c4c6f9a183848f8d3d95ace69abb870549b593c080946eaed9e5457ad\",\r\n  \"7609c7ab10f9ecc08824db6e3c3fa5cbdd0dff2555276e216abe9eebfb80f59b\",\r\n  \"ed5471d42bef6b32253e9c1aba49b01b8282fd096ad0957abcf1a1e27e8f7551\",\r\n  \"082fdd964976afa6f9c5d8239f74990b24df3dfa0c95329c6e9f75d33681b9f4\",\r\n  \"8d7c1bbdb6a8bf074db7fc1185ffd59af0faffb08e0eb46a373c948147787268\"\r\n]);\r\nDeviceProcessEvents\r\n| where TimeGenerated > ago(24h)\r\n| where SHA256 in (MoonriseHashes)\r\n| project TimeGenerated, DeviceName, AccountName, FileName, FolderPath, ProcessCommandLine,\r\n          InitiatingProcessFileName, InitiatingProcessFolderPath, InitiatingProcessCommandLine,\r\n          SHA256, ReportId\r\n| extend HostCustomEntity = DeviceName, AccountCustomEntity = AccountName\r\n"
query_type: kql
severity: medium
tags:
    - kql
author: Rudra Verma - CyberHawk
version: "4"
