id: 019c1f8e-1a49-75b5-813d-b83ae04601b1
name: Recon Exfiltration via Curl to Temp.sh
description: Detects the use of curl.exe to upload data to the temp.sh file-sharing service. This technique has been observed in post-compromise reconnaissance activities, including those following Notepad++ compromises.
query: "// Name: Recon Exfiltration via Curl to Temp.sh\r\n// Author: @jsh0x\r\n// Date: 2026-02-02\r\n// Description: Detects the use of curl.exe to upload data to the temp.sh file-sharing service. This technique has been observed in post-compromise reconnaissance activities, including those following Notepad++ compromises.\r\n// MITRE TTPs: T1105, T1567.002\r\n// References: https://doublepulsar.com/the-notepad-incident-how-a-likely-state-sponsored-threat-actor-is-using-notepad-to-hack-e5375547318d\r\n// False Positive Sensitivity: Medium\r\nDeviceProcessEvents\r\n| where Timestamp > ago(30d)\r\n| where FileName =~ \"curl.exe\"\r\n| where ProcessCommandLine has \"temp.sh\"\r\n| project-reorder Timestamp,DeviceName,AccountName,FileName,FolderPath,ProcessCommandLine,InitiatingProcessFileName,InitiatingProcessCommandLine\r\n"
query_type: kql
severity: medium
tactics:
    - TA0011
    - TA0010
techniques:
    - T1105
    - T1567.002
tags:
