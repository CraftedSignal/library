id: 019c9ffb-50fd-72fd-8f99-523ffb3c0ca9
name: RESURGE Known Malware Hashes
description: Detects the presence of files matching the SHA256 hashes of known RESURGE malware components, including the main 'libdsupgrade.so' library, the 'liblogblock.so' log tamperer, and the 'dsmain' utility. This rule identifies the creation or modification of these specific files on a device.
query: "// Name: RESURGE Known Malware Hashes\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-02-27\r\n// Description: Detects the presence of files matching the SHA256 hashes of known RESURGE malware components, including the main 'libdsupgrade.so' library, the 'liblogblock.so' log tamperer, and the 'dsmain' utility.\r\n// Severity: High\r\n// Tags: attack.persistence, attack.t1574.006, attack.defense_evasion, attack.t1014, malware.resurge\r\n// References: https://www.cisa.gov/news-events/analysis-reports/ar25-087a\r\n// False Positives: Low. Hash collisions are practically non-existent. Alerts would only be false positives in scenarios where these files are intentionally placed for research or testing.\r\n// Define the list of known SHA256 hashes for RESURGE components.\r\nlet RESURGE_Hashes = dynamic([\r\n    \"52bbc44eb451cb5e16bf98bc5b1823d2f47a18d71f14543b460395a1c1b1aeda\", // libdsupgrade.so\r\n    \"3526af9189533470bc0e90d54bafb0db7bda784be82a372ce112e361f7c7b104\", // liblogblock.so\r\n    \"b1221000f43734436ec8022caaa34b133f4581ca3ae8eccd8d57ea62573f301d\"  // dsmain\r\n]);\r\nDeviceFileEvents\r\n// Filter for file creation or modification events where the hash matches a known RESURGE component.\r\n| where SHA256 in (RESURGE_Hashes)\r\n// Summarize results to provide a single alert per device, listing all malicious files found.\r\n| summarize\r\n    StartTime = min(TimeGenerated),\r\n    EndTime = max(TimeGenerated),\r\n    FileNames = makeset(FileName),\r\n    FilePaths = makeset(FolderPath),\r\n    HashesFound = makeset(SHA256),\r\n    InitiatingProcesses = makeset(InitiatingProcessCommandLine)\r\n    by DeviceName, DeviceId, InitiatingProcessAccountName\r\n"
query_type: kql
severity: medium
tactics:
    - TA0003
    - TA0004
    - TA0005
techniques:
    - T1574.006
    - T1014
tags:
    - kql
author: Ethan Andrews
version: "2"
references:
    - https://www.cisa.gov/news-events/analysis-reports/ar25-087a
