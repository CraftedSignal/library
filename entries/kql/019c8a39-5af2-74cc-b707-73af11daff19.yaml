id: 019c8a39-5af2-74cc-b707-73af11daff19
name: IIS Module Masquerading and Staging (BADIIS Malware)
description: Detects the staging of malicious IIS modules that masquerade as system drivers. This rule specifically targets the behavior observed with the BADIIS malware, where its service component, running under svchost.exe, drops files with a '.sys' extension into the 'System32\drivers' directory before they are moved and loaded as IIS modules. This activity is highly anomalous as svchost.exe should not typically write files to the drivers directory.
query: "// Name: IIS Module Masquerading and Staging\r\n// Author: adarsh pandey\r\n// Date: 2026-02-23\r\n// Tactic: Persistence, Defense Evasion\r\n// Technique: T1036.005, T1505.004\r\n// Description: Detects the staging of malicious IIS modules that masquerade as system drivers. The BADIIS malware's service component, running under svchost.exe, drops files with a '.sys' extension into the 'System32\\drivers' directory before they are moved and loaded as IIS modules.\r\n// References: https://www.elastic.co/security-labs/badiis-to-the-bone-new-insights-to-global-seo-poisoning-campaign\r\n// False Positive Sensitivity: Medium\r\nlet suspiciousSysFiles = dynamic([\"WUDFPfprot.sys\", \"WppRecorderpo.sys\", \"WppRecorderrt.sys\"]);\r\nDeviceFileEvents\r\n| where ActionType == \"FileCreated\"\r\n// The malicious ServiceDLL (CbsMsgApi.dll) runs under svchost.exe and drops these files.\r\n| where InitiatingProcessFileName =~ \"svchost.exe\"\r\n// The files masquerade as drivers in the System32\\drivers folder.\r\n| where FolderPath endswith @\"\\System32\\drivers\\\" and FileName in (suspiciousSysFiles)\r\n// This behavior is highly anomalous. svchost.exe should not typically write files to the drivers directory.\r\n// False positives might occur with legitimate software installers or patchers that run as a service. If so, consider excluding by the InitiatingProcessCommandLine or file SHA256.\r\n"
query_type: kql
severity: medium
