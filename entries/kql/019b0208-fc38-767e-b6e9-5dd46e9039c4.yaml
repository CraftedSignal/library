id: 019b0208-fc38-767e-b6e9-5dd46e9039c4
name: Network Connection Initiated by Calculator Application
description: This rule detects instances where the calculator application (calc.exe) initiates a network connection. This behavior is highly unusual for a standard calculator application and could indicate malicious activity, such as an adversary using calc.exe as a proxy for network communication or injecting malicious code into it.
query: "// calc app audit ;D \r\nDeviceNetworkEvents\r\n| where Timestamp > ago(30d)\r\n| where InitiatingProcessFileName contains \"calc\"\r\n| summarize count(), dcount(DeviceName), make_set(DeviceName) by RemoteUrl, InitiatingProcessFileName, InitiatingProcessSHA256\r\n| invoke FileProfile(InitiatingProcessSHA256, 1000)"
query_type: kql
severity: medium
tactics:
    - TA0005
techniques:
    - T1218.015
tags:
    - kql
version: "1"
