id: 019b831e-6f79-7063-90e2-ca2edb5620d2
name: 'Rogue ScreenConnect: Common Social Engineering Tactics'
description: This rule detects network connections from devices to a predefined list of known malicious domains. It identifies attempts by internal systems to communicate with command and control servers, phishing sites, or other infrastructure associated with threat actors.
query: "let MaliciousDomains = dynamic([\r\n    \"0bd0.adrsxpjm0rga0n.de\",\r\n    \"rok628.mxhelp.top\",\r\n    \"yoc736.ikhelp.top\",\r\n    \"lory473.top\",\r\n    \"slplegalfinance.com\",\r\n    \"subjent25.zapto.org\",\r\n    \"pv-sq.innocreed.com\",\r\n    \"advancedaiinfrastructures.com\"\r\n]);\r\nDeviceNetworkEvents\r\n| where RemoteUrl in (MaliciousDomains)\r\n| project\r\n    TimeGenerated,\r\n    DeviceName,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessCommandLine,\r\n    RemoteUrl,\r\n    RemoteIP,\r\n    ReportId\r\n"
query_type: kql
severity: medium
tactics:
    - TA0011
techniques:
    - T1071.001
    - T1568.002
    - T1071
tags:
    - kql
version: "1"
