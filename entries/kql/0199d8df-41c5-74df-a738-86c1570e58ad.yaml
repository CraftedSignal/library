id: 0199d8df-41c5-74df-a738-86c1570e58ad
name: Snake Keylogger PowerShell Download and Execute
description: Detects a PowerShell command line pattern used by Snake Keylogger to download and execute a payload. This pattern involves using Invoke-WebRequest to fetch a file and Start-Process to run it, often with parameters to hide the execution window. The rule also looks for execution from a temporary directory, a common malware technique.
query: "DeviceProcessEvents\r\n| where FileName in~ (\"powershell.exe\", \"pwsh.exe\")\r\n| where ProcessCommandLine has_all (\"Invoke-WebRequest\", \"Start-Process\", \"-OutFile\")\r\n    and (ProcessCommandLine has_all (\"-WindowStyle\", \"Hidden\") or ProcessCommandLine has \"-w hidden\")\r\n    and ProcessCommandLine has \"-NoProfile\"\r\n| where ProcessCommandLine matches regex @'(\\$env:TEMP|\\\\AppData\\\\Local\\\\Temp\\\\[\\w-]+\\.exe)'\r\n| project\r\n    Timestamp,\r\n    DeviceName,\r\n    AccountName,\r\n    FileName,\r\n    ProcessCommandLine,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessCommandLine,\r\n    DeviceId"
query_type: kql
severity: medium
tactics:
    - TA0011
    - TA0002
    - TA0005
techniques:
    - T1105
    - T1059
    - T1564.011
    - T1036.005
tags:
    - kql
author: Kaung Khant Ko
version: "3"
references:
    - https://gbhackers.com/snake-keylogger/
