id: 0199e2d3-0f99-7543-919c-19073dd1dfa8
name: Detection for Sudo Chroot Privilege Escalation (CVE-2025-32463)
description: KQL Query
query: "let LookBack = 1h;\r\nlet SudoExploit =\r\nDeviceFileEvents\r\n| where Timestamp > ago(LookBack)\r\n| where ActionType == \"FileModified\"\r\n| where FileName has \"nsswitch.conf\" and FolderPath has \"/etc\"\r\n| project DeviceName;\r\nDeviceProcessEvents\r\n| where Timestamp > ago(LookBack)\r\n| where ProcessCommandLine startswith \"sudo -R\" or InitiatingProcessCommandLine startswith \"sudo -R\"\r\n| where DeviceName has_any(SudoExploit)"
query_type: kql
severity: medium
tags:
    - kql
version: "2"
references:
    - https://github.com/kh4sh3i/CVE-2025-32463/blob/main/exploit.sh
