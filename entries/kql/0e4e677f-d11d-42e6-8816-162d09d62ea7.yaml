id: 0e4e677f-d11d-42e6-8816-162d09d62ea7
name: Service Account Inventory
description: This rule identifies all service accounts in the environment by querying IdentityInfo logs. The goal is to audit the state of these accounts, helping to identify unused or stale service accounts (especially if disabled), ensure only necessary service accounts are active to reduce the attack surface, and support compliance and security posture assessments. This rule does not detect malicious activity but rather provides an inventory for security auditing.
query: "## \U0001F50D KQL Description\n#### The goal is to audit the state of service accounts in the environment. This helps in:\n#### 1.Identifying unused or stale service accounts (especially if disabled).\n#### 2.Ensuring only necessary service accounts are active, reducing the attack surface.\n#### 3.Supporting compliance and security posture assessments.\n## \U0001F9E9 MITRE ATT&CK Mapping\n#### Tactic:Persistence / Defense Evasion\n#### Goal: Adversaries may use service accounts to maintain access or avoid detection.\n#### Technique: Valid Accounts (T1078.002 - Domain Accounts / T1078.003 - Cloud Accounts)\n#### Attackers may use legitimate service accounts to persist in the environment or move laterally without triggering alerts.\n### Query:\n```KQL\nIdentityInfo\n| where Type == \"ServiceAccount\"\n| distinct  AccountName, Type, IsAccountEnabled;\n```\n"
query_type: kql
tactics:
    - TA0005
    - TA0003
    - TA0004
    - TA0001
techniques:
    - T1078
    - T1078.002
tags:
