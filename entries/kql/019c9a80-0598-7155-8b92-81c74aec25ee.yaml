id: 019c9a80-0598-7155-8b92-81c74aec25ee
name: Copilot Access to External Resources (XPIA)
description: This rule detects instances where Microsoft Copilot accesses external resources, specifically identifying events where 'XPIADetected' is true. This indicates Copilot interacting with resources outside its immediate environment, which could be a security concern if the accessed resources are sensitive or untrusted.
query: "CopilotActivity\r\n| extend LLM = parse_json(LLMEventData)\r\n| mv-expand AccessedResources = LLM.AccessedResources\r\n| extend XPIADetected = toboolean(AccessedResources.XPIADetected)\r\n| extend SiteUrl = tostring(AccessedResources.SiteUrl)\r\n| where XPIADetected == true\r\n"
query_type: kql
severity: medium
tactics:
    - TA0009
techniques:
    - T1530
    - DS0010
tags:
    - kql
author: Benjamin Zulliger
version: "1"
