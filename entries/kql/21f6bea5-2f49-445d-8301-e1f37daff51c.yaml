id: 21f6bea5-2f49-445d-8301-e1f37daff51c
name: Suspicious Spotlight Importer (.mdimporter) Creation
description: Detects the creation of a Spotlight importer bundle (.mdimporter) in a user's Library directory. This is a key step in the Sploitlight TCC bypass technique (CVE-2025-31199), where an attacker places a malicious importer to be executed with elevated privileges by the mds_stores process, allowing unauthorized access to TCC-protected data.
query: |
    // Name: Suspicious Spotlight Importer (.mdimporter) Creation
    // Author: detections.ai
    // Date: 2025-08-01
    // Description: Detects the creation of a Spotlight importer bundle (.mdimporter) in a user's Library directory. This is a key step in the Sploitlight TCC bypass technique (CVE-2025-31199), where an attacker places a malicious importer to be executed with elevated privileges by the mds_stores process, allowing unauthorized access to TCC-protected data.
    // False Positives: Legitimate application installers may create .mdimporter bundles in this location. This activity should be correlated with other suspicious actions. Consider excluding known good installers or signed software if noise occurs.
    // References: https://www.microsoft.com/en-us/security/blog/2025/07/28/sploitlight-analyzing-a-spotlight-based-macos-tcc-vulnerability/
    DeviceFileEvents
    // Look for file creation or rename events, which indicate a new bundle being placed.
    | where ActionType in ("FileCreated", "FileRenamed")
    // Filter for Spotlight importer bundles based on the file extension.
    | where FileName endswith ".mdimporter"
    // The key indicator is placement in a user's Library directory, not the system-wide one.
    // This path corresponds to /Users/<username>/Library/Spotlight/
    | where FolderPath has_all ("/Users/", "/Library/Spotlight/") and FolderPath endswith "/Library/Spotlight/"
    | project
        Timestamp,
        DeviceId,
        DeviceName,
        ActionType,
        FileName,
        FolderPath,
        InitiatingProcessAccountName,
        InitiatingProcessFileName,
        InitiatingProcessCommandLine,
        InitiatingProcessParentFileName,
        SHA256
query_type: kql
tactics:
    - TA0005
    - TA0004
techniques:
    - T1548.006
tags:
    - kql
version: "1"
references:
    - https://www.microsoft.com/en-us/security/blog/2025/07/28/sploitlight-analyzing-a-spotlight-based-macos-tcc-vulnerability/
