id: 8aa75ded-76d7-422e-88fb-be7a3c5384ca
name: DEVMAN ransomware detection
description: 'KQL Query from file: DEVMAN ransomware detection'
query: "let SMBProbe = 3;\r\nlet SuspiciousEP =\r\nDeviceNetworkEvents\r\n| where Timestamp > ago(1h)\r\n| where RemotePort == 445\r\n| where ActionType == \"ConnectionSuccess\" or ActionType == \"ConnectionFailed\"\r\n| summarize SMBConnection=dcount(LocalIP) by DeviceName\r\n| where SMBConnection > SMBProbe\r\n| project DeviceName;\r\nDeviceFileEvents\r\n| where Timestamp > ago(1h)\r\n| where ActionType == \"FileRenamed\"\r\n| where tolower(FileName) endswith \".devman\"\r\n| where DeviceName has_any(SuspiciousEP)"
query_type: kql
severity: medium
tactics:
    - TA0008
    - TA0040
    - TA0005
    - TA0006
    - TA0009
techniques:
    - T1021.002
    - T1486
    - T1070.004
    - T1496.003
    - T1557.001
    - T1036.003
tags:
    - kql
version: "1"
references:
