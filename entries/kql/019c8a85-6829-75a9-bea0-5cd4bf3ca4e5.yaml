id: 019c8a85-6829-75a9-bea0-5cd4bf3ca4e5
name: Obscura Ransomware Binary Execution
description: Detects the execution of the known Obscura ransomware binary based on its SHA256 hash. This provides a high-fidelity indicator of compromise.
query: "// Title: Obscura Ransomware Binary Hash\r\n// Author: adarsh pandey\r\n// Date: 2026-02-23\r\n// Description: Detects the execution of the known Obscura ransomware binary based on its SHA256 hash. This provides a high-fidelity indicator of compromise.\r\n// References: https://www.huntress.com/blog/obscura-ransomware-variant\r\n// MITRE ATT&CK: T1486\r\n// False Positive Sensitivity: Medium\r\nDeviceProcessEvents\r\n// Key part of the logic: match the known SHA256 hash of the Obscura ransomware binary\r\n| where SHA256 =~ \"c00a2d757349bfff4d7e0665446101d2ab46a1734308cb3704f93d20dc7aac23\"\r\n// FP Tuning: False positives are highly unlikely with a specific hash match. No tuning is typically required.\r\n| project\r\n    Timestamp,\r\n    DeviceName,\r\n    AccountName,\r\n    FileName,\r\n    ProcessCommandLine,\r\n    SHA256,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessCommandLine\r\n"
query_type: kql
severity: medium
tactics:
    - TA0040
techniques:
    - T1486
tags:
