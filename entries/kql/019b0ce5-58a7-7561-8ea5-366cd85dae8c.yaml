name: Clickfix Win + R Detection
description: 'KQL Query from file: Clickfix Win + R Detection'
query: "//Clickfix Win + R Detection\r\nlet commands = pack_array(\"iex\", \"iwr\", \" Invoke-Expression\", \"-Uri\");\r\nDeviceRegistryEvents\r\n| where Timestamp > ago(30d)\r\n| where RegistryKey contains \"RunMRU\"\r\n| where RegistryValueData startswith \"powershell\"\r\n| where RegistryValueData has_any (commands)"
query_type: kql
severity: medium
