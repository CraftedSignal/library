id: 019c23f4-da1e-76dc-9038-5f571c502728
name: Reconnaissance Command Sequence to File
description: Detects a sequence of reconnaissance commands (whoami, tasklist, systeminfo, netstat) executed by the command prompt and piped to a text file. This specific TTP was used in the Notepad++ supply chain attack to gather system information for exfiltration.
query: "// Name: Reconnaissance Command Sequence to File\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-02-03\r\n// Description: Detects a sequence of reconnaissance commands (whoami, tasklist, systeminfo, netstat) executed by the command prompt and piped to a text file. This specific TTP was used in the Notepad++ supply chain attack to gather system information for exfiltration.\r\n// False Positive Sensitivity: Medium\r\n// Reference: https://securelist.com/notepad-supply-chain-attack/118708/\r\n// MITRE TTPs: T1033, T1057, T1082, T1049\r\nDeviceProcessEvents\r\n// Look for process creation events\r\n| where ActionType == \"ProcessCreated\"\r\n// The process is the command prompt\r\n| where FileName endswith \"cmd.exe\"\r\n// The command line contains the specific sequence of reconnaissance tools used in the attack\r\n| where ProcessCommandLine has \"whoami\"\r\n    and ProcessCommandLine has \"tasklist\"\r\n    and ProcessCommandLine has \"systeminfo\"\r\n    and ProcessCommandLine has \"netstat\"\r\n    and ProcessCommandLine has \"-ano\"\r\n// The output of the commands is redirected to a file\r\n| where (ProcessCommandLine contains \">\" or ProcessCommandLine contains \">>\") and ProcessCommandLine endswith \".txt\"\r\n// The attack staged payloads and ran commands from these specific AppData directories.\r\n// Scoping to these paths reduces the chance of false positives.\r\n| where InitiatingProcessFolderPath has @\"\\AppData\\Roaming\\ProShow\\\"\r\n    or InitiatingProcessFolderPath has @\"\\AppData\\Roaming\\Adobe\\Scripts\\\"\r\n// FP Tuning: This query detects a single command-line execution containing all recon tools. The attack also used separate commands.\r\n// To detect that behavior, consider looking for any single one of these recon commands redirecting to a file, but add more contextual filters,\r\n// such as ensuring the grandparent process is GUP.exe.\r\n| project\r\n    Timestamp,\r\n    DeviceName,\r\n    AccountName,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessFolderPath,\r\n    FileName,\r\n    ProcessCommandLine,\r\n    SHA1,\r\n    InitiatingProcessId,\r\n    ProcessId\r\n"
query_type: kql
severity: medium
