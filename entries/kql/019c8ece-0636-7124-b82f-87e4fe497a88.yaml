id: 019c8ece-0636-7124-b82f-87e4fe497a88
name: Suspicious PowerShell Download Cradle for React2Shell Exploitation
description: Detects the execution of a PowerShell download cradle using encoded commands. This technique is used by actors exploiting CVE-2025-55182 (React2Shell) to download and execute second-stage payloads.
query: "// Name: Suspicious PowerShell Download Cradle for React2Shell\r\n// Author: adarsh pandey\r\n// Date: 2026-02-24\r\n// Description: Detects the execution of a PowerShell download cradle using encoded commands. This technique is used by actors exploiting CVE-2025-55182 (React2Shell) to download and execute second-stage payloads.\r\n// Tactics: Execution, Command and Control\r\n// Techniques: T1059.001, T1105\r\n// References: https://www.greynoise.io/blog/cve-2025-55182-react2shell-opportunistic-exploitation-in-the-wild-what-the-greynoise-observation-grid-is-seeing-so-far\r\nDeviceProcessEvents\r\n// Look for PowerShell core or Windows PowerShell process execution\r\n| where FileName in~ (\"powershell.exe\", \"pwsh.exe\")\r\n// Filter for command lines containing both an encoding flag and a download/execute commandlet\r\n| where ProcessCommandLine has_any (\"-enc\", \"-EncodedCommand\", \"-e\")\r\n    and ProcessCommandLine has_any (\"IEX\", \"DownloadString\")\r\n// Potential for False Positives: Some legitimate administrative or deployment scripts may use this pattern.\r\n// To reduce noise, consider excluding known good parent processes or specific command line patterns unique to your environment.\r\n// Example: | where InitiatingProcessFileName !~ \"legit_admin_tool.exe\"\r\n| project\r\n    TimeGenerated,\r\n    DeviceName,\r\n    AccountName,\r\n    FileName,\r\n    ProcessCommandLine,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessCommandLine,\r\n    MD5,\r\n    SHA256,\r\n    ReportId,\r\n    ProcessId,\r\n    InitiatingProcessId\r\n"
query_type: kql
severity: medium
tactics:
    - TA0002
    - TA0011
techniques:
    - T1059.001
