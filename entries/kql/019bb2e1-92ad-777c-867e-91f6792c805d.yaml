id: 019bb2e1-92ad-777c-867e-91f6792c805d
name: MuddyWater Masqueraded Binary Execution (CertificationKit.ini)
description: Detects the creation and subsequent execution of a masqueraded binary named "CertificationKit.ini" in the C:\ProgramData directory. This technique has been observed in recent MuddyWater campaigns where a .ini file extension is used to disguise an executable, which is then launched via cmd.exe.
query: "// Name: MuddyWater Masqueraded Binary Execution\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-01-12\r\n// Description: Detects the execution of a masqueraded binary with a .ini extension, a technique observed in recent MuddyWater campaigns. The rule looks for the creation and subsequent execution of \"CertificationKit.ini\" in the C:\\ProgramData directory.\r\n// False Positive Sensitivity: Medium\r\n// References: https://blog.synapticsystems.de/muddywater-when-your-build-system-becomes-an-ioc/\r\n// MITRE TTPs: T1204.002, T1059.003, T1027.009\r\nlet maliciousFilePath = @\"C:\\ProgramData\\CertificationKit.ini\";\r\nlet maliciousFileName = \"CertificationKit.ini\";\r\n(union isfuzzy=true\r\n    (\r\n        // Detects the creation of the specific INI file in the ProgramData directory.\r\n        DeviceFileEvents\r\n        | where ActionType == \"FileCreated\"\r\n        | where FolderPath =~ @\"C:\\ProgramData\\\" and FileName =~ maliciousFileName\r\n        // This specific file name and path combination is a strong indicator of this threat.\r\n        // Legitimate applications are unlikely to write a file with this name to this location.\r\n        | extend EventType = \"FileCreated\"\r\n    ),\r\n    (\r\n        // Detects the execution of the masqueraded INI file via the command prompt.\r\n        DeviceProcessEvents\r\n        | where FileName =~ \"cmd.exe\"\r\n        | where ProcessCommandLine has maliciousFilePath\r\n        | extend EventType = \"ProcessCreated\"\r\n    )\r\n)\r\n| project-reorder\r\n    Timestamp,\r\n    DeviceName,\r\n    EventType,\r\n    ActionType,\r\n    FileName,\r\n    FolderPath,\r\n    ProcessCommandLine,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessCommandLine,\r\n    AccountName\r\n"
query_type: kql
severity: medium
tactics:
    - TA0002
    - TA0005
techniques:
