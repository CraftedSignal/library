id: 019c22ae-23a2-7183-a5e8-d5b9fa24bff0
name: Lotus Blossom Chrysalis Backdoor Activity
description: This query hunts for indicators of compromise associated with the Notepad++ hosting breach attributed to the Lotus Blossom (aka Billbug) threat actor. It detects the Chrysalis backdoor execution chain, specific DLL side-loading techniques, and network connections to known malicious infrastructure.
query: "let timeframe = 30d;\r\n// Detect the specific execution chain from the Notepad++ compromise.\r\nlet ExecutionChain =\r\n    DeviceProcessEvents\r\n    | where Timestamp > ago(timeframe)\r\n    | where FileName =~ \"update.exe\" and InitiatingProcessFileName =~ \"GUP.exe\"\r\n    | join kind=inner (\r\n        DeviceProcessEvents\r\n        | where Timestamp > ago(timeframe)\r\n        | where FileName =~ \"GUP.exe\" and InitiatingProcessFileName =~ \"notepad++.exe\"\r\n    ) on $left.InitiatingProcessParentId == $right.ProcessId\r\n    | extend\r\n        ActivityType = \"Suspicious Execution Chain\",\r\n        SuspiciousProcess = FileName,\r\n        ParentProcess = InitiatingProcessFileName,\r\n        GrandparentProcess = InitiatingProcessFileName1\r\n    | project Timestamp, DeviceName, ActivityType, SuspiciousProcess, ParentProcess, GrandparentProcess, ProcessCommandLine, InitiatingProcessCommandLine;\r\nlet SideLoading =\r\n    DeviceImageLoadEvents\r\n    | where Timestamp > ago(timeframe)\r\n    // Look for the renamed Bitdefender binary loading the malicious DLL.\r\n    | where InitiatingProcessFileName =~ \"BluetoothService.exe\" and FileName =~ \"log.dll\"\r\n    | extend\r\n        ActivityType = \"DLL Side-Loading\",\r\n        SuspiciousProcess = InitiatingProcessFileName,\r\n        LoadedModule = FileName\r\n    | project Timestamp, DeviceName, ActivityType, SuspiciousProcess, LoadedModule, InitiatingProcessCommandLine;\r\n// Detect network connections to known C2 or malware download infrastructure.\r\nlet NetworkIOCs =\r\n    DeviceNetworkEvents\r\n    | where Timestamp > ago(timeframe)\r\n    | where RemoteUrl has \"api.skycloudcenter.com\" or RemoteIP == \"95.179.213.0\"\r\n    | extend\r\n        ActivityType = \"Malicious Network Connection (IOC)\",\r\n        SuspiciousProcess = InitiatingProcessFileName\r\n    | project Timestamp, DeviceName, ActivityType, SuspiciousProcess, InitiatingProcessCommandLine, RemoteUrl, RemoteIP;\r\n// Combine results from all detection methods.\r\nunion isfuzzy=true ExecutionChain, SideLoading, NetworkIOCs\r\n"
query_type: kql
severity: medium
techniques:
    - T1204.002
    - T1071.001
tags:
    - kql
version: "2"
