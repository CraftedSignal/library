id: 019cff99-eb12-739b-b182-29dd00a3b54a
name: Detection of Known Malicious Hashes (Nuso)
description: This rule detects the presence of files on endpoints that match a list of known malicious SHA256 hashes associated with the Nuso malware. It queries DeviceFileEvents to identify any file with a matching hash.
query: "let nuso_hashes = dynamic([\r\n\"1b9e6fe4b03285b2e768c57e320d84323ac9167598395918d56a12e568b0009a\",\r\n\"9c207c51c448f96eaae91241a39c8bb85e2307f2d2a99244763a53176cf4c02f\",\r\n\"c91413ad7c94c0e2694862b9d671d1204873bf65576ba2cb91fbd562a4ccf79b\"\r\n]);\r\nDeviceFileEvents\r\n| where SHA256 in (nuso_hashes)\r\n| project TimeGenerated, DeviceName, FileName\r\n"
query_type: kql
severity: medium
tactics:
    - TA0006
    - TA0002
techniques:
    - T1003
    - T1059
tags:
    - kql
version: "1"
