id: 019cf55a-5b82-752e-a120-d1d998f0bec0
name: Deep Link Usage Detection
description: This rule detects network connections to specific deep link patterns associated with messaging applications like Telegram, WhatsApp, and Signal. Such deep links can be used in phishing attempts or to initiate actions on a user's device through these applications.
query: "let deepLinkPatterns = dynamic([\r\n    \"tg://login?token=\",\r\n    \"wa.me/settings/linked_devices#\",\r\n    \"signal-qr://\"\r\n]);\r\nDeviceNetworkEvents\r\n| where RemoteUrl has_any (deepLinkPatterns)\r\n| project\r\n    TimeGenerated,\r\n    DeviceName,\r\n    ActionType,\r\n    RemoteUrl,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessCommandLine,\r\n    RemoteIP\r\n"
query_type: kql
severity: medium
tactics:
    - TA0001
    - TA0002
techniques:
    - T1566
    - T1204.001
tags:
    - kql
version: "1"
