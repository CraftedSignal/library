id: d4a19448-a886-4bdf-8a38-94f83c957d7f
name: Hunting Exposed JDWP
description: 'KQL Query from file: Hunting Exposed JDWP'
query: "let InternetFacing =\r\nDeviceInfo\r\n| where IsInternetFacing == true and isnotempty(PublicIP)\r\n| distinct DeviceId;\r\nDeviceNetworkEvents\r\n| where Timestamp > ago(30d)\r\n| where ActionType == \"ListeningConnectionCreated\"\r\n| where LocalIP != \"127.0.0.1\"\r\n| where LocalPort == \"5005\"\r\n| where InitiatingProcessCommandLine has \"jdwp\"\r\n| where DeviceId has_any(InternetFacing)"
query_type: kql
severity: medium
tactics:
    - TA0002
    - TA0008
    - TA0003
    - TA0001
    - TA0043
techniques:
    - T1021
    - T1210
    - T1133
    - T1203
    - T1592.004
tags:
