id: 019c08ad-b517-74c9-8e3d-565b1450bbec
name: ClawdBot Code.exe Masquerading in Temp
description: Detects the execution of 'Code.exe' from the '%TEMP%\Lightshot' directory. This specific path and filename combination is a strong indicator of the malicious 'ClawdBot' VS Code extension payload.
query: "DeviceProcessEvents\r\n| where ActionType == \"ProcessCreated\"\r\n| where FileName =~ \"Code.exe\"\r\n| where FolderPath contains @\"\\Temp\\Lightshot\\\" or FolderPath contains @\"\\tmp\\Lightshot\\\"\r\n| project\r\n    TimeGenerated,\r\n    DeviceName,\r\n    AccountName,\r\n    FileName,\r\n    FolderPath,\r\n    ProcessCommandLine,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessCommandLine,\r\n    ParentProcessId,\r\n    ProcessId\r\n"
query_type: kql
severity: medium
tactics:
    - TA0005
techniques:
    - T1036.003
tags:
    - kql
author: Kaung Khant Ko
version: "1"
references:
    - https://www.aikido.dev/blog/fake-clawdbot-vscode-extension-malware
