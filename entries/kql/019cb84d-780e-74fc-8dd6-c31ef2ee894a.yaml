id: 019cb84d-780e-74fc-8dd6-c31ef2ee894a
name: Anomalous Chrome Local File Access
description: Detects when the Google Chrome process (chrome.exe) reads or creates an unusually high number of files in sensitive user directories within a short time frame. This behavior is indicative of file and directory discovery (T1083) and could be a post-exploitation step of a browser-based attack, such as the Gemini panel hijacking described in CVE-2026-0628, where a compromised browser process is used to access local files outside of its sandbox.
query: "let FileCountThreshold = 15;\r\nlet sensitive_paths = dynamic([\r\n    @\"\\Documents\\\",\r\n    @\"\\Desktop\\\",\r\n    @\"\\.ssh\\\",\r\n    @\"\\.aws\\\",\r\n    @\"\\.gcp\\\",\r\n    @\"\\.azure\\\"\r\n]);\r\n// Define paths that are commonly and legitimately accessed by Chrome.\r\nlet noisy_paths_exclusions = dynamic([\r\n    @\"\\AppData\\Local\\Google\\Chrome\\User Data\\\",\r\n    @\"\\Downloads\\\"\r\n]);\r\nDeviceFileEvents\r\n| where InitiatingProcessFileName =~ \"chrome.exe\"\r\n| where ActionType in (\"FileRead\", \"FileCreated\")\r\n| where FolderPath has_any (sensitive_paths)\r\n| where not(FolderPath has_any (noisy_paths_exclusions))\r\n| summarize\r\n    StartTime = min(Timestamp),\r\n    EndTime = max(Timestamp),\r\n    AccessedFiles = make_set(FilePath, 100),\r\n    FileCount = dcount(FilePath)\r\n    by DeviceName, AccountName, InitiatingProcessCommandLine, bin(Timestamp, 5m)\r\n// Alert when the number of unique files accessed exceeds the defined threshold.\r\n| where FileCount > FileCountThreshold\r\n| project\r\n    StartTime,\r\n    EndTime,\r\n    DeviceName,\r\n    AccountName,\r\n    InitiatingProcessCommandLine,\r\n    FileCount,\r\n    AccessedFiles"
query_type: kql
severity: medium
techniques:
    - T1083
    - T1548.001
tags:
    - kql
author: Kaung Khant Ko
version: "2"
references:
    - https://unit42.paloaltonetworks.com/gemini-live-in-chrome-hijacking/
