id: 019c7beb-0f93-749c-9613-30c033fa06a1
name: Suspicious LNK-to-LOLBAS Execution from Explorer
description: Detects the execution of common Living Off The Land Binaries and Scripts (LOLBAS) initiated from Windows Explorer. The detection logic specifically looks for command lines that contain indicators of obfuscation or padding, which are common techniques used in malicious LNK (shortcut) files to hide their true purpose. This rule identifies processes like mshta.exe, powershell.exe, cmd.exe, certutil.exe, cscript.exe, and wscript.exe being launched by explorer.exe with suspicious command-line arguments.
query: "// Name: Suspicious LNK-to-LOLBAS Execution\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-02-20\r\n// Description: Detects the execution of common LOLBAS (Living Off The Land Binaries and Scripts) initiated from Windows Explorer. The command line contains indicators of obfuscation or padding, which are common techniques used in malicious LNK (shortcut) files to hide their true purpose.\r\n// False Positive Sensitivity: Medium\r\n// References: https://www.wietzebeukema.nl/blog/trust-me-im-a-shortcut?utm_source=tldrsec.com&utm_medium=referral&utm_campaign=tl-dr-sec-316-how-trail-of-bits-uses-claude-code-github-threat-intel-open-source-ai-pentesting-tools\r\n// MITRE TTPs: T1218.005, T1059.001, T1059.003\r\nlet lolbas_list = dynamic([\r\n    \"mshta.exe\",\r\n    \"powershell.exe\",\r\n    \"cmd.exe\",\r\n    \"certutil.exe\",\r\n    \"cscript.exe\",\r\n    \"wscript.exe\"\r\n]);\r\nlet padding_threshold = 50;\r\nDeviceProcessEvents\r\n| where\r\n    // The parent process is explorer.exe, which is typical when a user double-clicks a file.\r\n    InitiatingProcessFileName =~ \"explorer.exe\"\r\n    // The process is a known LOLBAS.\r\n    and FileName in~ (lolbas_list)\r\n    and\r\n    (\r\n        // Detects command lines with excessive padding, a technique to hide arguments in LNK files.\r\n        ProcessCommandLine matches regex strcat('[ \\\\t\\\\r\\\\n]{', padding_threshold, ',}')\r\n        or\r\n        // Detects common indicators of encoded or scripted commands.\r\n        ProcessCommandLine has_any (\"-enc\", \"-encodedcommand\", \"javascript:\", \"vbscript:\")\r\n    )\r\n// FP Tuning: Legitimate scripts, particularly PowerShell, may use encoded commands.\r\n// If false positives occur, consider excluding known safe scripts by their hash or command-line patterns.\r\n// Example: and not (FileName =~ \"powershell.exe\" and ProcessCommandLine contains \"safe_script.ps1\")\r\n| project-reorder\r\n    Timestamp,\r\n    DeviceName,\r\n    AccountName,\r\n    FileName,\r\n    ProcessCommandLine,\r\n    InitiatingProcessFileName,\r\n    FolderPath,\r\n    MD5,\r\n    SHA1,\r\n    SHA256\r\n"
