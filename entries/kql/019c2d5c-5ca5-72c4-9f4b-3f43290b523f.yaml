id: 019c2d5c-5ca5-72c4-9f4b-3f43290b523f
name: Suspicious VS Code Extension Execution (ClawBot)
description: This rule detects the execution of suspicious Visual Studio Code extensions, specifically those associated with known malicious extensions like ClawBot. It identifies instances where the VS Code executable initiates a process with command-line arguments containing keywords related to these malicious extensions.
query: "//Suspicious VS Code Extension Execution (Malicious ClawBot Extension)\r\nDeviceProcessEvents\r\n| where InitiatingProcessFileName in (\"Code.exe\", \"code-oss.exe\", \"Code-Insiders.exe\")\r\n| where ProcessCommandLine has_any(\"clawdbot\",\"moltbot\",\"openclaw\",\"ClawBotAgent\",\"clawbot-agent\")\r\n| extend SuspiciousExtension = ProcessCommandLine\r\n| project Timestamp, DeviceName, InitiatingProcessAccount, InitiatingProcessFileName, ProcessCommandLine, FolderPath\r\n"
query_type: kql
severity: medium
tactics:
    - TA0001
techniques:
    - T1195.002
tags:
    - kql
author: Rudra Verma - CyberHawk
version: "8"
