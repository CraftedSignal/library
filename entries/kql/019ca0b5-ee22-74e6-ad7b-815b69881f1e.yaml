id: 019ca0b5-ee22-74e6-ad7b-815b69881f1e
name: Dead#Vax Self-Parsing Batch Script Detection
description: Detects PowerShell executing a self-parsing command to extract a hidden payload from a batch file. This technique was observed in the Dead#Vax campaign. The malware reads its own batch file content to find a line starting with '@' which contains the next-stage encrypted payload.
query: |-
    // Name: Dead#Vax Self-Parsing Batch Script
    // Author: Ethan Andrews + detections.ai
    // Date: 2026-02-27
    // Description: Detects PowerShell executing a self-parsing command to extract a hidden payload from a batch file. This technique was observed in the Dead#Vax campaign.
    // The malware reads its own batch file content to find a line starting with '@' which contains the next-stage encrypted payload.
    // False Positives: Medium. Legitimate scripts could potentially use a similar pattern for configuration parsing, though it is uncommon.
    // Triage: Examine the source batch file being read. If it is heavily obfuscated or contains large encoded blocks, it is likely malicious.
    // MITRE ATT&CK: T1059.001 (Command and Scripting Interpreter: PowerShell), T1027 (Obfuscated Files or Information)
    // References: https://www.securonix.com/blog/deadvax-threat-research-security-advisory/
    DeviceProcessEvents
    // Look for PowerShell or known renamed variants executing the self-parsing logic
    | where (FileName has_any ("powershell.exe", "pwsh.exe", "mbs.exe") or ProcessVersionInfoOriginalFileName has_any ("powershell.exe", "pwsh.exe"))
      // The core of the detection: PowerShell is used to get content from a file and match a specific pattern.
      // The pattern '@\s+(.+)' looks for a line starting with '@' followed by one or more spaces, capturing the rest of the line.
      and ProcessCommandLine has_all ("Get-Content", "-match", "'@\\s+(.+)'")
      // Ensure the file being read is a batch/command script.
      and (ProcessCommandLine has ".cmd" or ProcessCommandLine has ".bat")
    | project-reorder DeviceName, AccountName, FileName, FolderPath, ProcessCommandLine, InitiatingProcessCommandLine
query_type: kql
severity: medium
tactics:
    - TA0002
    - TA0005
techniques:
    - T1059.001
    - T1027
tags:
    - kql
author: Ethan Andrews
version: "2"
references:
    - https://www.securonix.com/blog/deadvax-threat-research-security-advisory/
