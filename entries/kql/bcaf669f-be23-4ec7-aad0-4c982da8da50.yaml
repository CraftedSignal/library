id: bcaf669f-be23-4ec7-aad0-4c982da8da50
name: Internet facing devices vulnerablility report
description: 'KQL Query from file: Internet facing devices vulnerablility report'
query: "// https://www.greynoise.io/resources/how-resurgent-vulnerabilities-jeopardize-organizational-security\n\n// Internet facing devices vulnerablility report\n\nlet InternetFacing =\nDeviceInfo\n| where IsInternetFacing == true and isnotempty(PublicIP)\n| distinct DeviceId;\nDeviceTvmSoftwareVulnerabilities\n| where DeviceId has_any(InternetFacing)\n| summarize VulnerabilityCount=count() by DeviceName, VulnerabilitySeverityLevel\n| sort by VulnerabilityCount desc \n"
query_type: kql
tactics:
    - TA0007
    - TA0043
    - TA0042
techniques:
    - T1016.001
    - T1595.002
    - T1588.006
tags:
