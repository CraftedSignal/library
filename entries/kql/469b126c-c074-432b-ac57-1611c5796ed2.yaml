id: 469b126c-c074-432b-ac57-1611c5796ed2
name: CVE-2025-29824 PipeMagic Detection
description: 'KQL Query from file: CVE-2025-29824 PipeMagic Detection'
query: "// https://www.microsoft.com/en-us/security/blog/2025/04/08/exploitation-of-clfs-zero-day-leads-to-ransomware-activity/\n\nDeviceEvents\n| where ActionType == \"NamedPipeEvent\"\n| extend PipeName = tostring(parse_json(AdditionalFields)[\"PipeName\"])\n| where isnotempty(PipeName)\n| where PipeName matches regex \n@\"\\\\\\\\\\.\\\\pipe\\\\1\\.[0-9A-Fa-f]{32}\"\n"
query_type: kql
tactics:
    - TA0004
    - TA0002
techniques:
    - T1559
    - T1068
tags:
    - kql
version: "1"
