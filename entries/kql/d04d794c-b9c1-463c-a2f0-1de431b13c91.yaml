id: d04d794c-b9c1-463c-a2f0-1de431b13c91
name: SQL Injection Attempt
description: This rule detects potential SQL injection attempts by looking for specific keywords and patterns within the 'cs_uri_query' field of Cloudflare WAF logs. These patterns, such as 'UNION SELECT', '' OR 1=1', 'information_schema', and '--', are commonly used in SQL injection attacks to extract information, bypass authentication, or comment out parts of SQL queries. The rule aims to identify malicious requests targeting web applications that could lead to unauthorized database access or manipulation.
query: "CloudflareWAFLogs\r\n| where cs_uri_query has_any (\"UNION SELECT\", \"' OR 1=1\", \"information_schema\", \"--\")\r\n| project TimeGenerated, client_ip, http_request_uri, cs_uri_query\r\n"
query_type: kql
severity: medium
tactics:
    - TA0001
techniques:
    - T1190
tags:
    - kql
author: Garyson Pereira
version: "1"
