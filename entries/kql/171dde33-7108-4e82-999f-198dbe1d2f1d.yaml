id: 171dde33-7108-4e82-999f-198dbe1d2f1d
name: Hunt new browser extension installation on Microsoft Defender For Endpoint Devices.md
description: 'KQL Query from file: Hunt new browser extension installation on Microsoft Defender For Endpoint Devices.md'
query: "#### This KQL (Kusto Query Language) query is helps to detect the installation of new Chromium browser extensions on Microsoft Defender for Endpoint (MDE) devices. Specifically, it aims to identify when a new extension file (with a \".crx\" extension) is created in the \"Webstore Downloads\" folder. \n#### This is relevant for detecting malicious activities, such as the deployment of a fake extension to gather information.\n\n#### Query:\n```KQL\nDeviceFileEvents\n| where ActionType == \"FileCreated\"\n| where FolderPath contains \"Webstore Downloads\" and FileName endswith \".crx\"\n| extend ExtensionId = extract(@\"(?i)Downloads[\\\\/]|Webstore Downloads[\\\\/](.+?)_\\d+\\.crx\", 1, FolderPath)\n```\n\n##### Once you get the result downlaod the .crx file to analyze it on virustotal or any other threat feed to check if it is a fake or malicious extension.\n"
query_type: kql
tags:
    - kql
version: "1"
