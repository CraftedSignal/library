id: 019c4336-663d-7438-a38e-0413424c311c
name: SolarWinds Web Help Desk Post-Exploitation Process Anomaly
description: Detects the SolarWinds Web Help Desk service process (java.exe or wrapper.exe) spawning shell processes or the MSI installer to download and execute remote payloads. This behavior is a key indicator of post-exploitation activity related to CVE-2025-26399.
query: "// Name: SolarWinds Web Help Desk Post-Exploitation Process Anomaly\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-02-09\r\n// Description: Detects the SolarWinds Web Help Desk service process (java.exe or wrapper.exe) spawning shell processes or the MSI installer to download and execute remote payloads. This behavior is a key indicator of post-exploitation activity related to CVE-2025-26399.\r\n// Tactics: Initial Access, Execution\r\n// Techniques: T1190, T1203, T1059.003\r\n// False Positive Sensitivity: Medium\r\n// References: https://www.huntress.com/blog/active-exploitation-solarwinds-web-help-desk-cve-2025-26399\r\nDeviceProcessEvents\r\n// Look for process creation events\r\n| where InitiatingProcessFileName in~ (\"java.exe\", \"wrapper.exe\") // Parent process is the SolarWinds WHD service\r\n    and InitiatingProcessFolderPath has \"WebHelpDesk\"\r\n    and FileName in~ (\"cmd.exe\", \"powershell.exe\", \"msiexec.exe\") // Child process is a shell or installer\r\n    and (\r\n        ProcessCommandLine has \"/q /i\" // Silent MSI installation\r\n        or ProcessCommandLine has \"http\" // Command line contains a URL for download\r\n    )\r\n// FP Tuning: Legitimate administrative actions or auto-updates within SolarWinds WHD might spawn these processes.\r\n// If legitimate update servers are known, they can be excluded from the 'ProcessCommandLine' check.\r\n// Example: and ProcessCommandLine !has \"updates.solarwinds.com\"\r\n| project\r\n    TimeGenerated,\r\n    DeviceName,\r\n    AccountName,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessFolderPath,\r\n    InitiatingProcessCommandLine,\r\n    FileName,\r\n    FolderPath,\r\n    ProcessCommandLine,\r\n    MD5,\r\n    SHA256\r\n"
query_type: kql
severity: medium
tactics:
    - TA0001
    - TA0002
techniques:
    - T1190
    - T1059.003
tags:
