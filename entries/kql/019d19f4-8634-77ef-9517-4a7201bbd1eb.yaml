id: 019d19f4-8634-77ef-9517-4a7201bbd1eb
name: Unusual Process Network Connection to LOLC2 Service Endpoints
description: This rule detects unusual network connections from processes to legitimate service endpoints that are commonly abused for Command and Control (C2) activities (LOLC2). It specifically looks for connections to services like Telegram, Slack, Discord, GitHub, Google APIs, Pastebin, Dropbox, and others, originating from processes that are not recognized as legitimate applications for those services, and not from common system processes or standard program file paths. This helps identify potential adversary communication channels masquerading as legitimate traffic.
query: "// LOLC2 Hunt — Unusual processes connecting to C2-abusable legitimate service endpoints\r\n// https://lolc2.github.io/\r\nlet LOLC2_Domains = dynamic([\r\n    // Messaging & Chat\r\n    \"api.telegram.org\",\r\n    \"hooks.slack.com\",\r\n    \"slack.com\",\r\n    \"discord.com\",\r\n    \"cdn.discordapp.com\",\r\n    \"gateway.discord.gg\",\r\n    \"webexapis.com\",\r\n    // Google Services\r\n    \"gmail.googleapis.com\",\r\n    \"drive.googleapis.com\",\r\n    \"sheets.googleapis.com\",\r\n    \"calendar.googleapis.com\",\r\n    \"slides.googleapis.com\",\r\n    \"translate.googleapis.com\",\r\n    \"docs.google.com\",\r\n    \"mail.google.com\",\r\n    // Dev & Collaboration\r\n    \"api.github.com\",\r\n    \"raw.githubusercontent.com\",\r\n    \"gist.githubusercontent.com\",\r\n    \"pastebin.com\",\r\n    \"api.trello.com\",\r\n    \"api.notion.com\",\r\n    \"oauth.reddit.com\",\r\n    // Cloud Storage\r\n    \"api.dropboxapi.com\",\r\n    \"content.dropboxapi.com\",\r\n    // Social Media\r\n    \"api.twitter.com\",\r\n    \"api.x.com\",\r\n    \"graph.instagram.com\",\r\n    \"i.instagram.com\",\r\n    \"graph.facebook.com\",\r\n    \"www.strava.com\",\r\n    // Media & Entertainment\r\n    \"api.spotify.com\",\r\n    \"api.soundcloud.com\",\r\n    \"www.googleapis.com\",\r\n    \"lichess.org\",\r\n    // AI Services\r\n    \"api.openai.com\",\r\n    \"api.anthropic.com\",\r\n    // Security Tools (ironic)\r\n    \"www.virustotal.com\",\r\n    // Video & Conferencing\r\n    \"api.zoom.us\",\r\n    // Infrastructure\r\n    \"api.cloudflare.com\",\r\n    \"workers.dev\",\r\n    // Misc\r\n    \"duckduckgo.com\",\r\n    \"matrix.org\"\r\n]);\r\nlet LegitProcesses = dynamic([\r\n    \"telegram.exe\", \"tg.exe\",\r\n    \"slack.exe\",\r\n    \"discord.exe\", \"update.exe\",\r\n    \"chrome.exe\", \"msedge.exe\", \"firefox.exe\", \"brave.exe\", \"opera.exe\",\r\n    \"safari.exe\",\r\n    \"spotify.exe\",\r\n    \"zoom.exe\", \"zoomit.exe\",\r\n    \"dropbox.exe\",\r\n    \"notion.exe\",\r\n    \"webex.exe\", \"ciscocollabhost.exe\",\r\n    \"github desktop.exe\", \"git.exe\", \"git-remote-https.exe\",\r\n    \"trello.exe\",\r\n    \"code.exe\",\r\n    \"node.exe\",\r\n    \"python.exe\", \"python3.exe\", \"pythonw.exe\",\r\n    \"whatsapp.exe\",\r\n    \"instagram.exe\"\r\n]);\r\nDeviceNetworkEvents\r\n| where Timestamp > ago(7d)\r\n| where RemoteUrl has_any (LOLC2_Domains) or RemoteUrl has_any (LOLC2_Domains)\r\n| where not(InitiatingProcessFileName has_any (LegitProcesses))\r\n| where not(InitiatingProcessFileName in~ (\"svchost.exe\", \"system\", \"microsoftedgeupdate.exe\", \"msedgewebview2.exe\", \"widgets.exe\", \"searchhost.exe\", \"backgroundtaskhost.exe\"))\r\n| where not(InitiatingProcessFolderPath has_any (\"\\\\Program Files\\\\\", \"\\\\Program Files (x86)\\\\\", \"\\\\WindowsApps\\\\\"))\r\n| project\r\n    Timestamp,\r\n    DeviceName,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessFolderPath,\r\n    InitiatingProcessCommandLine,\r\n    InitiatingProcessParentFileName,\r\n    RemoteUrl,\r\n    RemoteIP,\r\n    RemotePort,\r\n    InitiatingProcessAccountName\r\n| extend ServiceHit = case(\r\n    RemoteUrl has \"telegram\", \"Telegram\",\r\n    RemoteUrl has \"slack\", \"Slack\",\r\n    RemoteUrl has \"discord\", \"Discord\",\r\n    RemoteUrl has \"github\", \"GitHub\",\r\n    RemoteUrl has \"pastebin\", \"Pastebin\",\r\n    RemoteUrl has \"dropbox\", \"Dropbox\",\r\n    RemoteUrl has \"notion\", \"Notion\",\r\n    RemoteUrl has \"trello\", \"Trello\",\r\n    RemoteUrl has \"reddit\", \"Reddit\",\r\n    RemoteUrl has \"spotify\", \"Spotify\",\r\n    RemoteUrl has \"openai\", \"OpenAI\",\r\n    RemoteUrl has \"anthropic\", \"Claude\",\r\n    RemoteUrl has \"virustotal\", \"VirusTotal\",\r\n    RemoteUrl has \"zoom\", \"Zoom\",\r\n    RemoteUrl has \"cloudflare\", \"Cloudflare\",\r\n    RemoteUrl has \"workers.dev\", \"Cloudflare Workers\",\r\n    RemoteUrl has \"twitter\" or RemoteUrl has \"api.x.com\", \"X/Twitter\",\r\n    RemoteUrl has \"instagram\", \"Instagram\",\r\n    RemoteUrl has \"facebook\", \"WhatsApp/Meta\",\r\n    RemoteUrl has \"googleapis\", \"Google API\",\r\n    RemoteUrl has \"google.com\", \"Google\",\r\n    RemoteUrl has \"matrix\", \"Matrix\",\r\n    RemoteUrl has \"lichess\", \"Lichess\",\r\n    RemoteUrl has \"duckduckgo\", \"DuckDuckGo\",\r\n    RemoteUrl has \"webex\", \"Cisco Webex\",\r\n    RemoteUrl has \"soundcloud\", \"SoundCloud\",\r\n    RemoteUrl has \"strava\", \"Strava\",\r\n    \"Other LOLC2 Service\"\r\n  )\r\n| sort by Timestamp desc"
