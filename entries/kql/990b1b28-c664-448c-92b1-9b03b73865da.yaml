id: 990b1b28-c664-448c-92b1-9b03b73865da
name: 'Akira Ransomware Activity: Suspicious Workstation Names in Logon Events'
description: Detects logon events (successful or failed) originating from workstations with suspicious or generic names, which can be an indicator of threat actor activity. This pattern has been associated with Akira ransomware campaigns.
query: "// title: Akira Ransomware Activity\r\n// id: 680423a6-f9f8-4b9a-a15e-2c9bc683cd2b\r\n// status: experimental\r\n// description: Detects logon events (successful or failed) originating from workstations with suspicious or generic names, which can be an indicator of threat actor activity. This pattern has been associated with Akira ransomware campaigns.\r\n// references:\r\n//   - https://www.huntress.com/blog/akira-ransomware-indicators\r\n//   - https://cybercx.com/blog/akira-ransomware/\r\n// author: mikecybersec\r\n// date: 2025-09-05\r\n// tags:\r\n//   - attack.ransomware\r\n//   - attack.t1021.001\r\n//   - threat_actor.akira\r\n// level: medium\r\n//\r\n// falsepositives:\r\n//   - Legitimate machines that have not been renamed from their default Windows installation name (e.g., 'WIN-XXXX', 'DESKTOP-XXXX') will trigger this detection.\r\n//   - Virtual machines can trigger this, if not renamed.\r\n//\r\nSecurityEvent\r\n// Logons (4624), failed logons (4625), and credential validation (4776)\r\n| where EventID in (4624, 4625, 4776)\r\n// Detects generic workstation names often used by threat actors or seen in default installations\r\n| where isnotempty(WorkstationName) and\r\n    (\r\n        WorkstationName startswith_ci \"WORKSTATION-\" or\r\n        WorkstationName startswith_ci \"PC-\" or\r\n        WorkstationName startswith_ci \"DESKTOP-\" or\r\n        WorkstationName startswith_ci \"WIN-\"\r\n    )\r\n"
query_type: kql
tactics:
