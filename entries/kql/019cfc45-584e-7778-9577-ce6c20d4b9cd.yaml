id: 019cfc45-584e-7778-9577-ce6c20d4b9cd
name: DLL Planting into System32/SysWOW64 by Non-System Processes
description: Detects the creation of DLL files in the `C:\Windows\System32` or `C:\Windows\SysWOW64` directories by processes that are not themselves located in these system directories. This behavior can indicate DLL planting, a technique used for persistence, privilege escalation, or defense evasion, often associated with DLL search order hijacking or side-loading. The rule excludes known legitimate activities such as printer driver installations and specific noisy legitimate software processes.
query: "// DLL Planting into System32/SysWOW64 by Non-System Processes\r\n// Hunt: Detect processes outside System32 dropping DLLs into protected directories\r\n// MITRE: T1574.001 (DLL Search Order Hijacking), T1574.002 (DLL Side-Loading)\r\nDeviceFileEvents\r\n| where Timestamp > ago(30d)\r\n| where ActionType == \"FileCreated\"\r\n| where FileName endswith \".dll\"\r\n// Target: DLLs dropped into System32 or SysWOW64\r\n| extend parsed_path = parse_path(FolderPath)\r\n| where parsed_path.DirectoryPath =~ @\"C:\\Windows\\System32\" or parsed_path.DirectoryPath =~ @\"C:\\Windows\\SysWOW64\"\r\n// Exclude: Initiating process IS in System32 (normal Windows behavior)\r\n| where InitiatingProcessFolderPath !startswith @\"C:\\Windows\\System32\\\" and InitiatingProcessFolderPath !startswith @\"C:\\Windows\\SysWOW64\\\"\r\n// Exclude: Known printer driver DLLs (they always install into System32)\r\n| where FileName !in~ (\"UNIDRV.DLL\", \"UNIDRVUI.DLL\", \"UNIRES.DLL\")\r\n// Exclude: Known noisy legitimate software\r\n| where InitiatingProcessFileName !in~ (\r\n    \"samplemanagercommand.exe\",\r\n    \"samplemanagerwcfservicehost.exe\",\r\n    \"samplemanagertimerqueueservice.exe\",\r\n    \"samplemanagerwcfwindowsservice.exe\",\r\n    \"momaps.exe\",\r\n    \"printerhost.exe\",\r\n    \"setuphost.exe\",\r\n    \"TiWorker.exe\",\r\n    \"msiexec.exe\",\r\n    \"DismHost.exe\",\r\n    \"poqexec.exe\"\r\n)\r\n// Exclude: Windows Update staging path\r\n| where InitiatingProcessFolderPath !startswith @\"C:\\$WINDOWS.~BT\\\"\r\n| summarize\r\n    EventCount = count(),\r\n    DLLsDropped = make_set(FileName, 50),\r\n    AffectedDevices = make_set(DeviceName, 50),\r\n    FirstSeen = min(Timestamp),\r\n    LastSeen = max(Timestamp)\r\n    by InitiatingProcessSHA1, InitiatingProcessFileName, InitiatingProcessFolderPath\r\n| invoke FileProfile(InitiatingProcessSHA1, 1000)\r\n| where GlobalPrevalence < 1000\r\n// Risk tiering for prioritization\r\n| extend RiskTier = case(\r\n    SignatureState == \"Unsigned\" and GlobalPrevalence < 10, \"CRITICAL\",\r\n    SignatureState == \"Unsigned\", \"HIGH\",\r\n    SignatureState == \"SignedInvalid\", \"HIGH\",\r\n    GlobalPrevalence < 10, \"MEDIUM\",\r\n    \"LOW\"\r\n)\r\n| project\r\n    RiskTier,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessFolderPath,\r\n    DLLsDropped,\r\n    EventCount,\r\n    AffectedDevices,\r\n    GlobalPrevalence,\r\n    SignatureState,\r\n    Signer,\r\n    SoftwareName,\r\n    FirstSeen,\r\n    LastSeen,\r\n    InitiatingProcessSHA1\r\n| sort by RiskTier asc, GlobalPrevalence asc"
query_type: kql
severity: medium
tactics:
    - TA0003
    - TA0004
    - TA0005
techniques:
