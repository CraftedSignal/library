id: a574e9bf-47a1-4295-be0c-c4f0e6841947
name: Suspicious Command Line Leading To File Downloads
description: 'This detection looks at users attempting to download files from the internet using powershell / cmd commands. It measures the number of commands against a baseline set over the past 14days and if a user has performed an unusual amount of commands (also more than 5) then an alert will be created. This will detect when an attacker has compromised a user and is now attempting to download payloads from the internet or a C2. '
query: "let SuspiciousVarRegex = @\"\\b(curl|wget|Invoke-WebRequest|iwr|-Uri|-OutFile|Invoke-RestMethod|irm|System\\.Net\\.WebClient|\\[System\\.Net\\.WebClient\\]::DownloadFile|\\[System\\.Net\\.WebClient\\]::DownloadString|System\\.Net\\.Http\\.HttpClient|\\[System\\.Net\\.Http\\.HttpClient\\]::GetStringAsync|\\[System\\.Net\\.Http\\.HttpClient\\]::GetStreamAsync|Net\\.WebRequest::Create|\\[System\\.Net\\.WebRequest\\]::Create|Start-BitsTransfer|sbits|bitsadmin|bitsadmin /transfer|certutil|certutil -urlcache|certutil -split -f|mshta|mshta http|rundll32|rundll32 url\\.dll,FileProtocolHandler|regsvr32|regsvr32 /i:http|scrobj\\.dll|hh\\.exe|hh\\.exe http|wmic|wmic os get /format:|wmic os get /format:http|desktopimgdownldr\\.exe|desktopimgdownldr|ieexec|ieexec\\.exe http)\\b\\s+(\\S+\\.\\S+|\\$[A-Za-z0-9_]+|%[A-Za-z0-9_]+%)\";\r\nlet Lookback = 14d;          \r\nlet Bucket = 1h;             \r\nlet CurrentWindow = 24h;     \r\nlet Sigma = 1.0;             \r\nlet MinCmds = 5;\r\nlet SuspiciousCMDs = dynamic([\r\n\"Invoke-WebRequest\", \"iwr\", \"-Uri\", \"-OutFile\", \"Invoke-RestMethod\", \"irm\", \"-Uri\", \"[System.Net.WebClient]::DownloadFile\", \"[System.Net.WebClient]::DownloadString\", \"System.Net.Http.HttpClient\", \"[System.Net.Http.HttpClient]::GetStringAsync\", \"[System.Net.Http.HttpClient]::GetStreamAsync\", \"Net.WebRequest::Create\", \"[System.Net.WebRequest]::Create\", \"Start-BitsTransfer\", \"sbits\", \"bitsadmin\", \"bitsadmin /transfer\", \"certutil\", \"mshta\", \"rundll32 url.dll,FileProtocolHandler\", \"regsvr32 /i:http\", \"scrobj.dll\", \"hh.exe\", \"wmic\", \"desktopimgdownldr.exe\", \"desktopimgdownldr\", \"ieexec\"]);\r\nlet SuspiciousCMDsB64 = dynamic([\r\n\"SW52b2tlLVdlYlJlcXVlc3Q=\", \"aXdy\", \"LVVyaQ==\", \"LU91dEZpbGU=\", \"SW52b2tlLVJlc3RNZXRob2Q=\", \"aXJt\", \"LVVyaQ==\", \"W1N5c3RlbS5OZXQuV2ViQ2xpZW50XTo6RG93bmxvYWRGaWxl\", \"W1N5c3RlbS5OZXQuV2ViQ2xpZW50XTo6RG93bmxvYWRTdHJpbmc=\", \"U3lzdGVtLk5ldC5IdHRwLkh0dHBDbGllbnQ=\", \"W1N5c3RlbS5OZXQuSHR0cC5IdHRwQ2xpZW50XTo6R2V0U3RyaW5nQXN5bmM=\", \"W1N5c3RlbS5OZXQuSHR0cC5IdHRwQ2xpZW50XTo6R2V0U3RyZWFtQXN5bmM=\", \"TmV0LldlYlJlcXVlc3Q6OkNyZWF0ZQ==\", \"W1N5c3RlbS5OZXQuV2ViUmVxdWVzdF06OkNyZWF0ZQ==\", \"U3RhcnQtQml0c1RyYW5zZmVy\", \"c2JpdHM=\", \"Yml0c2FkbWlu\", \"Yml0c2FkbWluIC90cmFuc2Zlcg==\", \"Y2VydHV0aWw=\", \"bXNodGE=\", \"cnVuZGxsMzIgdXJsLmRsbCxGaWxlUHJvdG9jb2xIYW5kbGVy\", \"cmVnc3ZyMzIgL2k6aHR0cA==\", \"c2Nyb2JqLmRsbA==\", \"aGguZXhl\", \"d21pYw==\", \"ZGVza3RvcGltZ2Rvd25sZHIuZXhl\", \"ZGVza3RvcGltZ2Rvd25sZHI=\", \"aWVleGVj\"]);\r\nlet AllSuspicious =\r\n    union isfuzzy=true\r\n        (DeviceProcessEvents | extend EventSource=\"Process\", Cmd=ProcessCommandLine),\r\n        (DeviceEvents | extend EventSource=\"Event\", Cmd=tostring(AdditionalFields.Command))\r\n    | where (\r\n        Cmd has_any (SuspiciousCMDs)\r\n        or (Cmd has_any (SuspiciousCMDsB64) and Cmd has_any (\"-enc\", \"-e\", \"-EncodedCommand\"))\r\n        or (Cmd matches regex SuspiciousVarRegex) )\r\n    | where Cmd !contains \"https://repos-droplet.digitalocean.com\"\r\n    | where Cmd !contains \"https://slackb.com/error\";\r\nlet Baseline =\r\n    AllSuspicious\r\n    | where TimeGenerated between (ago(Lookback) .. ago(CurrentWindow))\r\n    | summarize HourlyCount = count() by DeviceName, InitiatingProcessAccountName, bin(TimeGenerated, Bucket)\r\n    | summarize\r\n        AvgPerBucket = todouble(avg(HourlyCount)),\r\n        StdDevPerBucket = todouble(stdev(HourlyCount)),\r\n        P95 = todouble(percentile(HourlyCount, 95))\r\n      by DeviceName, InitiatingProcessAccountName;\r\nlet Current =\r\n    AllSuspicious\r\n    | where TimeGenerated > ago(CurrentWindow)\r\n    | summarize CurrentCount = todouble(count()), SampleCmds = make_set(Cmd)\r\n      by DeviceName, InitiatingProcessAccountName;\r\nBaseline\r\n| join kind=rightouter (\r\n    Current\r\n    | project DeviceNameCurrent = DeviceName, AccountCurrent = InitiatingProcessAccountName, CurrentCount, SampleCmds\r\n) on $left.DeviceName == $right.DeviceNameCurrent and $left.InitiatingProcessAccountName == $right.AccountCurrent\r\n| extend DeviceName = coalesce(DeviceName, DeviceNameCurrent),\r\n         InitiatingProcessAccountName = coalesce(InitiatingProcessAccountName, AccountCurrent),\r\n         AvgPerBucket = coalesce(AvgPerBucket, 0.0),\r\n         StdDevPerBucket = coalesce(StdDevPerBucket, 0.0),\r\n         P95 = coalesce(P95, 0.0),\r\n         CurrentCount = coalesce(CurrentCount, 0.0)\r\n| extend ZScore = iif(\r\n        StdDevPerBucket == 0.0,\r\n        iif(CurrentCount > AvgPerBucket, 100.0, 0.0),\r\n        (CurrentCount - AvgPerBucket) / StdDevPerBucket)\r\n| where (ZScore >= Sigma or CurrentCount >= P95) and CurrentCount >= MinCmds\r\n| project Timestamp = now(), DeviceName, InitiatingProcessAccountName, CurrentCount, SampleCmds, ZScore\r\n| order by ZScore desc"
query_type: kql
severity: medium
