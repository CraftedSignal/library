id: 1f58a181-f7c5-4be9-b992-4ea4d0327e3a
name: Rogue RDP Suspicious Activity Detection
description: KQL Query
query: "// Define suspicious RDP launch events from email-related temporary directories\r\nlet SuspiciousRDPLaunch = DeviceProcessEvents\r\n| where ActionType == \"ProcessCreated\"\r\n| where FileName =~ \"mstsc.exe\"\r\n| where CommandLine matches regex @\"(?i)\\\\AppData\\\\Local\\\\Microsoft\\\\Windows\\\\(INetCache|Temporary Internet Files)\\\\Content\\.Outlook\\\\[A-Z0-9]{8}\\\\[^\\\\]{1,255}\\.rdp$\"\r\n   or CommandLine matches regex @\"(?i)\\\\AppData\\\\Local\\\\Packages\\\\Microsoft\\.Outlook_[a-zA-Z0-9]{1,50}\\\\.{0,120}\\\\[^\\\\]{1,80}\\.rdp$\"\r\n   or CommandLine matches regex @\"(?i)\\\\AppData\\\\Local\\\\Microsoft\\\\Olk\\\\Attachments\\\\([^\\\\]{1,50}\\\\){0,5}[^\\\\]{1,80}\\.rdp$\"\r\n| project RDPLaunchTime = Timestamp, DeviceId, DeviceName, InitiatingProcessId = ProcessId, InitiatingProcessCommandLine = CommandLine, InitiatingProcessAccountName = AccountName, InitiatingProcessAccountUpn = AccountUpn, InitiatingProcessFolderPath = FolderPath;\r\n\r\n// Define suspicious file creation events by mstsc.exe (indicative of drive redirection)\r\nlet SuspiciousFileCreationByMstsc = DeviceFileEvents\r\n| where ActionType == \"FileCreated\"\r\n| where InitiatingProcessFileName =~ \"mstsc.exe\"\r\n// Exclude known legitimate RDP temporary file patterns as described in the intelligence\r\n| where not (\r\n    (FolderPath contains @\"\\AppData\\Local\\Temp\\\" and FileName matches regex @\"_TS[A-Z0-9]{4}\\.tmp$\")\r\n    or (FolderPath contains @\"\\AppData\\Local\\Microsoft\\Terminal Server Client\\\")\r\n)\r\n| project FileCreationTime = Timestamp, DeviceId, InitiatingProcessId = InitiatingProcessId, CreatedFileName = FileName, CreatedFilePath = FolderPath, InitiatingProcessCommandLine = InitiatingProcessCommandLine, InitiatingProcessAccountName = InitiatingProcessAccountName, InitiatingProcessAccountUpn = InitiatingProcessAccountUpn;\r\n\r\n// Join the two event types to find correlated activity supporting the hypothesis\r\nSuspiciousRDPLaunch\r\n| join kind=inner (\r\n    SuspiciousFileCreationByMstsc\r\n) on DeviceId, InitiatingProcessId\r\n// Ensure file creation happens within a reasonable time window after the RDP launch\r\n| where FileCreationTime between (RDPLaunchTime .. RDPLaunchTime + 1h)\r\n| summarize\r\n    count() by DeviceName, InitiatingProcessAccountName, InitiatingProcessAccountUpn, RDPLaunchTime, InitiatingProcessCommandLine,\r\n    make_list(pack(\"FileCreationTime\", FileCreationTime, \"CreatedFileName\", CreatedFileName, \"CreatedFilePath\", CreatedFilePath)) as CreatedFiles\r\n| order by RDPLaunchTime desc\r\n| extend HypothesisTested = \"This query investigates the hypothesis that 'Rogue RDP' campaigns are active, by correlating suspicious RDP file execution from email-related temporary directories with subsequent unusual file creation events by mstsc.exe, indicative of malicious drive redirection and potential data exfiltration or staging.\"\r\n| project-reorder HypothesisTested, DeviceName, InitiatingProcessAccountName, InitiatingProcessAccountUpn, RDPLaunchTime, InitiatingProcessCommandLine, CreatedFiles\r\n\r\nunion ProcessCreationEvents, FileCreationEvents\r\n| extend RuleName = \"Rogue RDP - Suspicious RDP Activity (File Execution & Drive Redirection)\"\r\n| extend Description = \"Detects suspicious activities associated with 'Rogue RDP' campaigns, including the execution of RDP connection files (.rdp) from email attachment-related temporary directories and the subsequent creation of files by mstsc.exe on the victim's system due to malicious drive redirection. These actions are indicative of an attacker establishing a malicious RDP session to exfiltrate data or establish persistence.\"\r\n| extend Severity = \"High\"\r\n| extend Tactics = \"Initial Access, Defense Evasion, Collection, Exfiltration\"\r\n| extend Techniques = \"T1566.001 (Phishing: Spearphishing Attachment), T1036.003 (Defense Evasion: Rename System Utilities), T1005 (Collection: Data from Local System), T1115 (Collection: Clipboard Data), T1041 (Exfiltration: Exfiltration Over C2 Channel), T1547.001 (Boot or Logon Autostart Execution: Registry Run Keys / Startup Folder), T1574.002 (Hijack Execution Flow: DLL Side-Loading)\"\r\n| extend Author = \"Chaitanya aka Mr.Alien \"\r\n| extend Date = \"2025-07-04\"\r\n| extend References = \"https://cloud.google.com/blog/topics/threat-intelligence/windows-rogue-remote-desktop-protocol\"\r\n| project-reorder Timestamp, DeviceName, InitiatingProcessFileName, InitiatingProcessCommandLine, TargetFileName, TargetFilePath, DetectionPoint, EventType, RuleName, Description, Severity, Tactics, Techniques, Author, Date, References"
