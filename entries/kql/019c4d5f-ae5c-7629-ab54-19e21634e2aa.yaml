id: 019c4d5f-ae5c-7629-ab54-19e21634e2aa
name: Azure Managed Identity Token Usage Followed by Administrative Activity
description: Detects when a Managed Identity successfully authenticates via the Azure Instance Metadata Service (IMDS) and subsequently performs administrative or enumeration actions within a short timeframe. This pattern can indicate an attacker has compromised a resource (e.g., a Virtual Machine) and is using its Managed Identity to move laterally or access other resources within the Azure environment. The rule correlates successful IMDS-based sign-ins with subsequent activities such as running commands on virtual machines, or listing/getting secrets and keys from Key Vaults, or other general administrative/alert-generating activities.
query: "// Name: Azure Managed Identity Token Usage from IMDS Followed by Administrative Activity\r\n// Author: detections.ai\r\n// Date: 2026-02-11\r\n// Description: Detects when a Managed Identity authenticates via the Instance Metadata Service (IMDS) and subsequently performs administrative or enumeration actions. This pattern can indicate an attacker has compromised a resource and is using its Managed Identity to move laterally or access other resources.\r\n// False Positive Sensitivity: Medium\r\n// MITRE TTPs: T1528, T1550.001\r\n// References: https://www.abstract.security/blog/moving-laterally-through-abuse-of-managed-identities-attached-to-vms\r\nlet timeframe = 1h;\r\n// Look for Managed Identity sign-ins that originate from the IMDS endpoint.\r\nlet imds_logons = AADManagedIdentitySignInLogs\r\n| where TimeGenerated > ago(timeframe)\r\n| where ResultType == 0 // Successful sign-ins only\r\n| where UserAgent has \"ImdsIdentityProvider\"\r\n| project LogonTime = TimeGenerated, ServicePrincipalId, ServicePrincipalName, ResourceDisplayName, IPAddress;\r\n// Look for subsequent administrative or enumeration activities performed by the same Managed Identity.\r\nAzureActivity\r\n| where TimeGenerated > ago(timeframe)\r\n| where isnotempty(Caller)\r\n| join kind=innerunique imds_logons on $left.Caller == $right.ServicePrincipalId\r\n// Ensure the activity happened after the token was acquired.\r\n| where TimeGenerated > LogonTime and TimeGenerated < LogonTime + 10m // Correlate activity within a 10-minute window after the logon.\r\n| where OperationNameValue has_any (\r\n    \"MICROSOFT.COMPUTE/VIRTUALMACHINES/RUNCOMMAND/ACTION\",\r\n    \"MICROSOFT.KEYVAULT/VAULTS/SECRETS/GET/ACTION\",\r\n    \"MICROSOFT.KEYVAULT/VAULTS/KEYS/GET/ACTION\",\r\n    \"MICROSOFT.KEYVAULT/VAULTS/SECRETS/LIST/ACTION\",\r\n    \"MICROSOFT.KEYVAULT/VAULTS/KEYS/LIST/ACTION\"\r\n    )\r\n    or CategoryValue has_any (\"Administrative\", \"Alert\") // Broaden detection for any admin-like activity.\r\n// FP Mitigation: Certain automated processes or startup scripts may legitimately use IMDS and perform actions.\r\n// Consider filtering out known Service Principal names or IP addresses associated with legitimate automation.\r\n// For example: | where ServicePrincipalName !in (\"known_automation_spn1\", \"known_automation_spn2\")\r\n| project\r\n    TimeGenerated,\r\n    OperationName,\r\n    Category,\r\n    Level,\r\n    ActivityStatus,\r\n    Caller,\r\n    CallerIpAddress,\r\n    SubscriptionId,\r\n    ResourceGroup,\r\n    Resource,\r\n    IMDSLogonTime = LogonTime,\r\n    IMDSServicePrincipalId = ServicePrincipalId,\r\n    IMDSServicePrincipalName = ServicePrincipalName,\r\n    IMDSResourceDisplayName = ResourceDisplayName\r\n"
