id: 019cf7b9-e491-7529-874d-156f0a0b54dd
name: Suspicious Commands Executed via Run Dialog
description: 'This is to search for the new Click-Fix variant as published by Atos. See article: https://atos.net/en/lp/cybershield/investigating-a-new-click-fix-variant'
query: "#event_simpleName=RegSystemConfigValueUpdate\r\n| RegObjectName=/\\\\SOFTWARE\\\\Microsoft\\\\Windows\\\\CurrentVersion\\\\Explorer\\\\RunMRU/i\r\n| RegStringValue=/(cmd|powershell|wscript\\.exe|cscript\\.exe|net1?\\.exe|sh\\.exe|bash\\.exe|schtasks\\.exe|regsvr32\\.exe|hh\\.exe|wmic\\.exe|mshta\\.exe|rundll32\\.exe|msiexec\\.exe|forfiles\\.exe|scriptrunner\\.exe|mftrace\\.exe|AppVLP\\.exe|svchost\\.exe|msbuild\\.exe)/i\r\n| table([@timestamp, ComputerName, UserName, ImageFileName, RegObjectName, RegValueName, RegStringValue], limit=1000)"
query_type: kql
severity: medium
tags:
    - kql
author: Lightkun Yagami
version: "1"
references:
    - https://atos.net/en/lp/cybershield/investigating-a-new-click-fix-variant
