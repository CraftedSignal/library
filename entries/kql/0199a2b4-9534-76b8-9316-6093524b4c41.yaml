id: 0199a2b4-9534-76b8-9316-6093524b4c41
name: ' KQL to detect hta (.html) execution'
description: This KQL detection will create an incident related to malicious .html execution on device
query: "\r\n// KQL to detect hta execution\r\nDeviceProcessEvents\r\n| where FileName == \"mshta.exe\"\r\n  and InitiatingProcessFileName == \"explorer.exe\"\r\n  and ProcessCommandLine has \".hta\"\r\n| project\r\n    Timestamp,\r\n    DeviceName,\r\n    DeviceId,\r\n    AccountDomain,\r\n    AccountName,\r\n    InitiatingProcessFileName,\r\n    ProcessCommandLine,\r\n    FolderPath = tostring(split(ProcessCommandLine, \"\\\"\")[0])\r\n| extend HTAFile = extract(@\"\\S+\\.hta\", 0, ProcessCommandLine)\r\n| where isnotempty(HTAFile)\r\n| project\r\n    Timestamp,\r\n    DeviceName,\r\n    DeviceId,\r\n    User = strcat(AccountDomain, \"\\\\\", AccountName),\r\n    HTAFile,\r\n    InitiatingProcessFileName,\r\n    ProcessCommandLine\r\n| order by Timestamp desc\r\n"
query_type: kql
severity: medium
tactics:
    - TA0005
techniques:
    - T1218.005
tags:
    - kql
author: Rudra Verma
version: "3"
