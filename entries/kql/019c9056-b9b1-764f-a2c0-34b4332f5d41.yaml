id: 019c9056-b9b1-764f-a2c0-34b4332f5d41
name: AMOS Stealer Data Exfiltration C2
description: Detects outbound network traffic to a known Atomic macOS Stealer (AMOS) command and control (C2) server. This activity is associated with the exfiltration of stolen data, such as credentials, browser data, and system information, compressed into a ZIP archive.
query: "// Name: AMOS Stealer Data Exfiltration C2\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-02-24\r\n// Description: Detects outbound network traffic to a known Atomic macOS Stealer (AMOS) command and control (C2) server. This activity is associated with the exfiltration of stolen data, such as credentials, browser data, and system information, compressed into a ZIP archive.\r\n// Tactics: Exfiltration\r\n// Techniques: T1041\r\n// False Positive Sensitivity: Medium\r\n// References: https://www.trendmicro.com/en_us/research/26/b/openclaw-skills-used-to-distribute-atomic-macos-stealer.html\r\nDeviceNetworkEvents\r\n// Filter for network connections to the specific AMOS C2 endpoint used for data exfiltration.\r\n| where RemoteUrl has \"socifiapp.com/api/reports/upload\"\r\n// The report indicates the exfiltration is done via an HTTP POST, often from a curl process.\r\n// While the HTTP method isn't always available in this table, the specific URL is a strong indicator.\r\n// FP Tuning: This is a specific IOC. False positives are highly unlikely. If any occur, it may indicate a typo or a reused domain, which would require further investigation.\r\n| project\r\n    Timestamp,\r\n    DeviceName,\r\n    InitiatingProcessAccountName,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessCommandLine,\r\n    RemoteUrl,\r\n    RemoteIP,\r\n    RemotePort\r\n"
query_type: kql
severity: medium
tactics:
    - TA0010
techniques:
    - T1041
tags:
    - kql
author: Ethan Andrews
version: "2"
references:
    - https://www.trendmicro.com/en_us/research/26/b/openclaw-skills-used-to-distribute-atomic-macos-stealer.html
