id: d3d38bf2-ec96-4c58-85e4-6eebc4dde7b0
name: SharePoint ToolShell CVE-2025-53770 Exploitation - Web IIS
description: Detects potential exploitation of the critical SharePoint “ToolShell” zero‑day vulnerability (CVE‑2025‑53770), in which attackers leverage unsafe deserialization of untrusted data in SharePoint’s ToolPane.aspx endpoint to achieve unauthenticated remote code execution via IIS worker process behavior.
query: "W3CIISLog\n| where ((csMethod == \"POST\" and csUriStem has \"/_layouts\" and csUriQuery has \"DisplayMode=Edit\") \n    or \n    (csMethod == \"GET\" and csUriStem has \"/_layouts/15/spinstall0.aspx\"))\n| where csReferer has \"/_layouts/SignOut.aspx\""
query_type: kql
severity: medium
tactics:
    - TA0001
techniques:
    - T1190
tags:
    - kql
version: "2"
