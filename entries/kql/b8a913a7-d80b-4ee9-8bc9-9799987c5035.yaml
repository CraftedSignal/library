name: Potential Notepad++ CVE-2025-49144 Exploitation
description: 'KQL Query from file: Potential Notepad++ CVE-2025-49144 Exploitation'
query: "// Detects potential exploitation of CVE-2025-49144 via regsvr32.exe launched by Notepad++ installer\nDeviceProcessEvents\n| where EventID == 1 // Sysmon Process Creation\n| where Channel == \"Microsoft-Windows-Sysmon/Operational\"\n| where tolower(FileName) == \"regsvr32.exe\"\n| where (startswith(ProcessCommandLine, \"regsvr32 /s\") and \n         ProcessCommandLine has @\"\\contextMenu\\NppShell.dll\")\n| where not(tolower(FolderPath) == \"c:\\windows\\system32\" or tolower(FolderPath) == \"c:\\windows\\syswow64\")\n// Exclude legitimate regsvr32.exe from Windows directories\n"
