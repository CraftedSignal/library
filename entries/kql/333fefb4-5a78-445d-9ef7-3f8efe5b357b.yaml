id: 333fefb4-5a78-445d-9ef7-3f8efe5b357b
name: Browser Spawning Command Interpreter via FileFix Attack
description: Detects suspicious process creation where a web browser spawns a command interpreter or scripting host. This behavior is indicative of the "FileFix" attack, where users are socially engineered to paste malicious commands into the File Explorer address bar opened by a browser's file upload functionality.
query: |-
    DeviceProcessEvents
    | where (InitiatingProcessFolderPath endswith "\\chrome.exe" or InitiatingProcessFolderPath endswith "\\firefox.exe" or InitiatingProcessFolderPath endswith "\\msedge.exe" or InitiatingProcessFolderPath endswith "\\iexplore.exe" or InitiatingProcessFolderPath endswith "\\brave.exe" or InitiatingProcessFolderPath endswith "\\opera.exe") and (FolderPath endswith "\\cmd.exe" or FolderPath endswith "\\powershell.exe" or FolderPath endswith "\\pwsh.exe" or FolderPath endswith "\\mshta.exe")
query_type: kql
severity: medium
tactics:
    - TA0002
    - TA0005
techniques:
    - T1204.001
    - T1059
    - T1086
    - T1218.005
    - T1170
    - T1204
tags:
    - kql
author: jsh0x
version: "1"
references:
    - https://mrd0x.com/filefix-clickfix-alternative/
