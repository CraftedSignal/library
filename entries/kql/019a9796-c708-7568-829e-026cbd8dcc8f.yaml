id: 019a9796-c708-7568-829e-026cbd8dcc8f
name: macOS LoginWindow Hooks & Authorization Plugins
description: This rule detects the creation or modification of files within specific macOS directories associated with LoginWindow hooks and Authorization Plugins. These locations are commonly abused by adversaries to establish persistence or elevate privileges by injecting malicious code that executes during the login process. The rule specifically looks for file events in '/Library/Security/SecurityAgentPlugins/', '/System/Library/CoreServices/SecurityAgentPlugins/', '/Library/Security/SecurityAgentPlugins.bundle', or any file activity within a 'loginwindow' path. It excludes activities initiated by legitimate installers and software updaters to reduce false positives. Additionally, it filters for files with low global prevalence, indicating potentially suspicious or custom binaries.
query: "// LoginWindow Hooks & Authorization Plugins\r\nlet ExcludedBinaries = dynamic([\"acrappyAPP\"]);\r\nDeviceFileEvents\r\n| where Timestamp > ago(24h)\r\n| where FolderPath has_any (\r\n    \"/Library/Security/SecurityAgentPlugins/\",\r\n    \"/System/Library/CoreServices/SecurityAgentPlugins/\",\r\n    \"/Library/Security/SecurityAgentPlugins.bundle\"\r\n    )\r\n    or (FolderPath contains \"/loginwindow\" and ActionType in (\"FileCreated\", \"FileModified\"))\r\n| where InitiatingProcessFileName !in (\"installer\", \"softwareupdated\", \"installd\")\r\n| invoke FileProfile(SHA1)\r\n| where GlobalPrevalence < 10000\r\n"
query_type: kql
severity: medium
tactics:
    - TA0003
    - TA0004
techniques:
    - T1547
    - T1556
tags:
    - kql
author: Benjamin Zulliger
version: "1"
references:
    - https://securitylab.github.com/research/macos-login-items/
    - https://objective-see.org/blog/blog_0x31.html
