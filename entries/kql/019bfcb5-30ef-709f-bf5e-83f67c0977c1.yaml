id: 019bfcb5-30ef-709f-bf5e-83f67c0977c1
name: Osiris Ransomware POORTRY Driver Load Detection
description: Detects the installation or loading of the POORTRY (Abyssworker) driver, a vulnerable driver used by Osiris ransomware in Bring Your Own Vulnerable Driver (BYOVD) attacks to terminate security software. This rule identifies the driver by its file name, service name, known hashes, and a masquerading technique where it pretends to be a Malwarebytes component.
query: "// Name: Osiris Ransomware BYOVD POORTRY Driver Load\n// Author: detections.ai\n// Date: 2026-01-27\n// Description: Detects the installation or loading of the POORTRY (Abyssworker) driver, a vulnerable driver used by Osiris ransomware in Bring Your Own Vulnerable Driver (BYOVD) attacks to terminate security software.\n// Severity: High\n// Tactics: Defense Evasion\n// Techniques: T1068, T1562.001\n// References: https://securityaffairs.com/187279/security/osiris-ransomware-emerges-leveraging-byovd-technique-to-kill-security-tools.html, https://otx.alienvault.com/pulse/697348b0134b41c432693dc5\n\nlet poortry_hashes = dynamic([\n    // SHA256\n    \"231e6bee1ee77d70854c1e3600342d8a69c18442f601cd201e033fa13cb8d5a5\",\n    \"39a0565f0c0adc4dc5b45c67134b3b488ddb9d67b417d32e9588235868316fac\",\n    \"44748c22baec61a0a3bd68b5739736fa15c479a3b28c1a0f9324823fc4e3fe34\",\n    \"44e007741f7650d1bd04cca3cd6dfd4f32328c401f95fb2d6d1fafce624cc99e\",\n    \"534bd6b99ed0e40ccbefad1656f03cc56dd9cc3f6d990cd7cb87af4cceebe144\",\n    \"5bd82a1b2db1bdc8ff74cacb53823edd8529dd9311a4248a86537a5b792939f8\",\n    \"5c2f663c8369af70f727cccf6e19248c50d7c157fe9e4db220fbe2b73f75c713\",\n    \"79bd876918bac1af641be10cfa3bb96b42c30d18ffba842e0eff8301e7659724\",\n    \"824e16f0664aaf427286283d0e56fdc0e6fa8698330fa13998df8999f2a6bb61\",\n    \"8c378f6200eec750ed66bde1e54c29b7bd172e503a5874ca2eead4705dd7b515\",\n    \"c189595c36996bdb7dce6ec28cf6906a00cbb5c5fe182e038bf476d74bed349e\",\n    \"c74509fcae41fc9f63667dce960d40907f81fae09957bb558d4c3e6a786dde7d\",\n    \"ce719c223484157c7f6e52c71aadaf496d0dad77e40b5fc739ca3c51e9d26277\",\n    \"d524ca33a4f20f70cb55985289b047defc46660b6f07f1f286fa579aa70cf57a\",\n    \"d78f7d9b0e4e1f9c6b061fb0993c2f84e22c3e6f32d9db75013bcfbba7b64bc3\",\n    \"fc39cca5d71b1a9ed3c71cca6f1b86cfe03466624ad78cdb57580dba90847851\",\n    \"fff586c95b510e6c8c0e032524026ef22297869a86d14075cd601ca8e20d4a16\",\n    // SHA1\n    \"10770be56c62b66af3ff2d48a0ae36c61218e7ac\",\n    \"3511c07428fef55e2ff2f3b38442a91b6422e10b\",\n    \"40367efb18e13a4a62f1a9a47dedec2f55a8b8f9\",\n    \"44f3067c0ae0f5bb46b1c5455f881eb646fba782\",\n    \"c026aa8c56c11ca7b385739a4d722c28e1b4bbb9\",\n    \"c4da0ec252fdfefee9ccccf72aeab726a0f903a9\",\n    \"fc0be142a0d7da29257e8bd112f9ac1ce705f425\",\n    // MD5\n    \"316a534a8f17de17c38ee3f7c37eedf4\",\n    \"8e024a4c90f17f1aedc7fc53d5ca23c6\",\n    \"94d53edb65a089cd1491b4b2e46714aa\",\n    \"c29dbcc9742f3464c890882a5aec889e\",\n    \"d634c9a618a48ce2b892b9992f7ccbd7\",\n    \"f33ed8098974bba785a0c86e629e1622\",\n    \"fda664fc5e941ce6ff9c7ff30094af96\"\n]);\nDeviceEvents\n// Look for driver loading or service installation events, which are key actions for BYOVD attacks.\n| where ActionType in (\"DriverLoad\", \"ServiceInstalled\")\n| where \n    // Match known indicators for the POORTRY driver file or its associated service name \"Abyssworker\".\n    (FileName =~ \"poortry.sys\" or ServiceName has \"Abyssworker\")\n    // Also look for the masquerading technique where the driver pretends to be from Malwarebytes.\n    or (FileDescription has \"Malwarebytes\" and not(FileName has \"mbam\"))\n    // Match known file hashes associated with the POORTRY driver.\n    or SHA256 in (poortry_hashes) or SHA1 in (poortry_hashes) or MD5 in (poortry_hashes)\n// FP Tuning: The 'Malwarebytes' logic may need tuning. If legitimate, non-'mbam' related Malwarebytes files exist in your environment,\n// they should be added to the exclusion list to prevent false positives.\n// For example: and not(FileName in ('other_mb_file.sys'))\n| project\n    Timestamp,\n    DeviceName,\n    ActionType,\n    FileName,\n    FolderPath,\n    SHA256,\n    SHA1,\n    MD5,\n    FileDescription,\n    ServiceName,\n    InitiatingProcessCommandLine,\n    InitiatingProcessAccountName\n"
