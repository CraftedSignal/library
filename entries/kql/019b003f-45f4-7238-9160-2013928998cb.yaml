id: 019b003f-45f4-7238-9160-2013928998cb
name: Consent.exe Loading Malicious DLL Outside System Directories
description: "Detects DLL side-loading attacks where consent.exe loads known malicious DLLs (version.dll, rtworkq.dll, wmsgapi.dll, and the older msimg32.dll) from non-standard locations. This technique is used by Shanya-packed malware including EDR Killer and CastleRAT to load malicious payloads while appearing as a legitimate Windows UAC process. \n"
query: "DeviceImageLoadEvents\r\n| where InitiatingProcessFileName == \"consent.exe\"\r\n| where FileName endswith \"version.dll\" \r\n    or FileName endswith \"tworkq.dll\" \r\n    or FileName endswith \"wmsgapi.dll\" \r\n    or FileName endswith \"msimg32.dll\"\r\n| where not(FileName startswith @\"C:\\Windows\\System32\") \r\n    and not(FileName startswith @\"C:\\Windows\\SysWOW64\")\r\n"
query_type: kql
severity: medium
tactics:
    - TA0003
    - TA0004
    - TA0005
techniques:
    - T1574.001
    - T1134.004
tags:
    - kql
version: "2"
