id: 019d2c45-fab2-74c1-bd01-5502f69b659d
name: Microsoft Teams Safe Links Click Events Summary
description: This rule analyzes URL click events within Microsoft Teams to identify and summarize actions taken on URLs, specifically focusing on Safe Links outcomes. It helps in understanding user interaction with links, potentially identifying malicious link clicks that Safe Links has intercepted or allowed, and assessing the adoption of Safe Links protection within the Teams environment.
query: |
    // Safe Links Click Events Telemetry for Teams
    // Confirm Safe Links outcomes and adoption in Teams
    // Source: https://techcommunity.microsoft.com/blog/microsoftdefenderforoffice365blog/safeguarding-microsoft-teams-with-microsoft-defender-for-office-365/4464086
    let lookback = 24h;
    UrlClickEvents
    | where Timestamp > ago(lookback) and Workload == "Teams"
    | summarize Clicks=count(), Users=dcount(AccountUpn) by ActionType
    | order by Clicks desc
query_type: kql
tactics:
    - TA0001
techniques:
    - T1566
    - T1566.002
tags:
    - kql
version: "1"
references:
    - https://techcommunity.microsoft.com/blog/microsoftdefenderforoffice365blog/safeguarding-microsoft-teams-with-microsoft-defender-for-office-365/4464086
