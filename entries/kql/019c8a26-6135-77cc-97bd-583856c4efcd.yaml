id: 019c8a26-6135-77cc-97bd-583856c4efcd
name: Obfuscated PowerShell MIMICRAT Downloader
description: Detects PowerShell commands using a combination of a hidden window flag, string slicing (.Substring), and arithmetic operators. This pattern is characteristic of the MIMICRAT Stage 1 downloader, which uses these techniques to obfuscate the C2 domain and evade static analysis.
query: |
    // Name: Obfuscated PowerShell MIMICRAT Downloader
    // Author: detections.ai
    // Date: 2026-02-23
    // Description: Detects PowerShell commands using a combination of a hidden window flag, string slicing (.Substring), and arithmetic operators. This pattern is characteristic of the MIMICRAT Stage 1 downloader, which uses these techniques to obfuscate the C2 domain and evade static analysis.
    // Mitre ATT&CK Tactic: Execution, Defense Evasion
    // Mitre ATT&CK Technique: T1059.001 - Command and Scripting Interpreter: PowerShell, T1027.005 - Obfuscated Files or Information: Indicator Removal from Tools
    // References: https://www.elastic.co/security-labs/mimicrat-custom-rat-mimics-c2-frameworks
    // False Positive Sensitivity: Medium
    DeviceProcessEvents
    | where FileName =~ "powershell.exe"
    // Key logic: Looks for the combination of a hidden window, string slicing, and arithmetic operators, which is highly indicative of the MIMICRAT downloader.
    | where (ProcessCommandLine has_any ("-WInDo Min", "-windowstyle hidden", "-w hidden"))
        and ProcessCommandLine has ".Substring"
        and ProcessCommandLine has_all ("/", "+")
    // Comment: While this combination is highly suspicious, some complex administrative or automation scripts might use similar constructs.
    // Review the full command line, parent process, and any resulting network connections to confirm malicious activity.
    // Consider adding exclusions for known legitimate scripts if false positives occur.
    | project
        Timestamp,
        DeviceName,
        AccountName,
        FileName,
        ProcessCommandLine,
        InitiatingProcessParentFileName,
        InitiatingProcessFileName,
        InitiatingProcessCommandLine,
        ReportId
query_type: kql
severity: medium
tactics:
    - TA0002
    - TA0005
techniques:
    - T1059.001
    - T1027.005
tags:
    - kql
version: "2"
references:
    - https://www.elastic.co/security-labs/mimicrat-custom-rat-mimics-c2-frameworks
