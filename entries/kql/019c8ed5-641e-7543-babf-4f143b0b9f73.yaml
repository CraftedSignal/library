id: 019c8ed5-641e-7543-babf-4f143b0b9f73
name: PCPcat Malware Installation Artifacts
description: KQL Query
query: "// Name: PCPcat Malware Installation Artifacts\r\n// Author: detections.ai\r\n// Date: 2026-02-24\r\n// Description: Detects the creation of files or execution of processes from directories associated with the PCPcat malware campaign, or the creation of its compromise marker file.\r\n// Tactics: Credential Access\r\n// Techniques: T1552\r\n// References: https://beelzebub.ai/blog/threat-huntinga-analysis-of-a-nextjs-exploit-campaign/\r\nlet pcpcat_marker_file = \".pcpcat_installed\"; // Compromise marker file created in user home directories.\r\nlet pcpcat_root_dir = \"/opt/pcpcat/\"; // Primary installation directory for root-level compromise.\r\nlet pcpcat_user_dir_fragment = \"/.local/pcpcat/\"; // Installation directory fragment for non-root compromise.\r\n(union isfuzzy=true\r\n    (\r\n        DeviceFileEvents\r\n        // Detects the creation of the compromise marker file or files within the malware directories.\r\n        | where ActionType == \"FileCreated\"\r\n        | where FileName == pcpcat_marker_file\r\n            or FolderPath has pcpcat_root_dir\r\n            or FolderPath contains pcpcat_user_dir_fragment\r\n        | extend\r\n            Activity = \"PCPcat file artifact created\",\r\n            SuspiciousPath = FolderPath,\r\n            SuspiciousFile = FileName,\r\n            SuspiciousProcess = InitiatingProcessFileName,\r\n            CommandLine = InitiatingProcessCommandLine\r\n    ),\r\n    (\r\n        DeviceProcessEvents\r\n        // Detects processes being executed from the PCPcat installation directories.\r\n        | where FolderPath has pcpcat_root_dir\r\n            or FolderPath contains pcpcat_user_dir_fragment\r\n        | extend\r\n            Activity = \"Process executed from PCPcat directory\",\r\n            SuspiciousPath = FolderPath,\r\n            SuspiciousFile = FileName,\r\n            SuspiciousProcess = FileName,\r\n            CommandLine = ProcessCommandLine\r\n    )\r\n)\r\n// These file paths and directories are highly specific to the PCPcat campaign.\r\n// False positives are unlikely unless these names are coincidentally used by legitimate software.\r\n| project\r\n    TimeGenerated,\r\n    DeviceName,\r\n    Activity,\r\n    SuspiciousPath,\r\n    SuspiciousFile,\r\n    SuspiciousProcess,\r\n    CommandLine,\r\n    AccountName,\r\n    AccountDomain,\r\n    SHA256\r\n"
query_type: kql
severity: medium
