id: 019c4f88-55e8-765b-8a45-816d78ba1937
name: Firewall Backup Checker
description: There are operation activities that requires me to daily check whether the firewall backup happened as it should have every night after-hours. The issue is that this is a manual task, requires me to go to a specific directory, find the XML files that are by the firewall and open it up to see if the file will have content. We can also check by the file size without actually opening the file since sometimes the backup fails.
query: "//###############################################################################################\r\n//##  PLATFORM: Palo Alto Firewall\r\n//##  AUTHOR: IGOR OLIVEIRA (#IO)\r\n//##  VERSION: 1.0 - Will need to improve this by finding a way to get the accurate file size log\r\n//##  LOCATION: Microsoft Sentinel | Logs\r\n//##  TITLE: KQL to search daily firewall backup that happens automatically from OPCON\r\n//###############################################################################################\r\nDeviceProcessEvents\r\n    | where TimeGenerated > ago (1d)\r\n    | where InitiatingProcessCommandLine contains \"Opcon\\\\InfrastructureReports\\\\NET_backup_PaloAlto\"\r\n    | where InitiatingProcessCommandLine has_any (\"rldpana\", \"rldpanp\", \"abcpan01\", \"abcpan02\")\r\n    | where DeviceName == \"vm00opconj02.DOMAIN.org\"\r\n    | extend ExtractedFileName = extract(@\"(\\d{4}-\\d{2}-\\d{2}\\.(abcpan|rldpan)(01|02|a|p)-config\\.xml)\", 1, InitiatingProcessCommandLine)\r\n    | project-reorder TimeGenerated, DeviceName, InitiatingProcessAccountName, AccountName, AccountUpn, ActionType, ExtractedFileName, MachineGroup//, FileSize"
query_type: kql
severity: medium
tags:
    - kql
author: Igor Oliveira
version: "1"
