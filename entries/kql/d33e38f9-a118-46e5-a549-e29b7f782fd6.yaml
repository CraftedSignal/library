id: d33e38f9-a118-46e5-a549-e29b7f782fd6
name: RedDirection Ad-Jacking Campaign Detection
description: This detection looks for activity associated with the Redirection ad-jacking campaign. It detects network connections to known malicious C2 domains and the installation of malicious browser extensions identified by their extension IDs.
query: "//\r\n// Title: RedDirection Ad-Jacking Campaign Activity\r\n//\r\n// Author: Rica Grande\r\n//\r\n// Date: 2025-07-09\r\n//\r\n// Description: This detection looks for activity associated with the RedDirection ad-jacking campaign. It detects network connections to known malicious C2 domains and the installation of malicious browser extensions identified by their extension IDs.\r\n//\r\n// References:\r\nhttps://blog.koi.security/google-and-microsoft-trusted-them-2-3-million-users-installed-them-they-were-malware-fb4ed4f40ff5\r\n//\r\n// False Positive Sensitivity: Medium\r\n// - The detection for malicious extension installation relies on file paths and a regex pattern to extract the extension ID. This may need tuning based on your environment's specific browser configurations or if legitimate extensions are flagged.\r\n//\r\n// Detection Comment Level: Medium\r\n//\r\n// ---\r\n\r\n// Define IOCs for the RedDirection campaign\r\nlet ioc_domains = dynamic([\r\n    \"admitab.com\", \"edmitab.com\", \"click.videocontrolls.com\", \"c.undiscord.com\",\r\n    \"click.darktheme.net\", \"c.jermikro.com\", \"c.untwitter.com\", \"c.unyoutube.net\",\r\n    \"admitclick.net\", \"addmitad.com\", \"admiitad.com\", \"abmitab.com\", \"admitlink.net\"\r\n]);\r\nlet extension_ids = dynamic([\r\n    \"kgmeffmlnkfnjpgmdndccklfigfhajen\", \"dpdibkjjgbaadnnjhkmmnenkmbnhpobj\", \"gaiceihehajjahakcglkhmdbbdclbnlf\",\r\n    \"mlgbkfnjdmaoldgagamcnommbbnhfnhf\", \"eckokfcjbjbgjifpcbdmengnabecdakp\", \"mgbhdehiapbjamfgekfpebmhmnmcmemg\",\r\n    \"cbajickflblmpjodnjoldpiicfmecmif\", \"pdbfcnhlobhoahcamoefbfodpmklgmjm\", \"eokjikchkppnkdipbiggnmlkahcdkikp\",\r\n    \"ihbiedpeaicgipncdnnkikeehnjiddck\", \"jjdajogomggcjifnjgkpghcijgkbcjdi\", \"mmcnmppeeghenglmidpmjkaiamcacmgm\",\r\n    \"ojdkklpgpacpicaobnhankbalkkgaafp\", \"lodeighbngipjjedfelnboplhgediclp\", \"hkjagicdaogfgdifaklcgajmgefjllmd\",\r\n    \"gflkbgebojohihfnnplhbdakoipdbpdm\", \"kpilmncnoafddjpnbhepaiilgkdcieaf\", \"caibdnkmpnjhjdfnomfhijhmebigcelo\"\r\n]);\r\n// Section 1: Detect network traffic to known RedDirection C2 domains\r\nDeviceNetworkEvents\r\n| where TimeGenerated > ago(30d)\r\n| where isnotempty(RemoteUrl)\r\n| where RemoteUrl has_any (ioc_domains)\r\n| extend EventType = \"C2 Domain Contact\"\r\n// Project common columns and cast types to string for union compatibility\r\n| project\r\n    TimeGenerated,\r\n    DeviceName,\r\n    EventType,\r\n    RemoteUrl,\r\n    RemoteIP,\r\n    RemotePort = tostring(RemotePort),\r\n    InitiatingProcessAccountName,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessCommandLine,\r\n    ReportId = tostring(ReportId),\r\n    ActionType,\r\n    Protocol\r\n| union (\r\n    // Section 2: Detect malicious extension .crx file creations\r\n    DeviceFileEvents\r\n    | where TimeGenerated > ago(30d)\r\n    | where ActionType == \"FileCreated\"\r\n    // Look for .crx files created in a temporary download folder for web extensions.\r\n    | where FolderPath has \"Webstore Downloads\" and FileName endswith \".crx\"\r\n    // The regex extracts the extension ID from the folder path. This logic may be specific to certain environments and could require tuning.\r\n    | extend ExtractedId = extract(@\"Webstore Downloads[\\\\/](.+?)_\\d+\\.crx\", 1, FolderPath)\r\n    | where ExtractedId in~ (extension_ids)\r\n    | extend Browser = case(\r\n        FolderPath has @\"Google\\Chrome\", \"Chrome\",\r\n        FolderPath has @\"Microsoft\\Edge\", \"Edge\",\r\n        \"Unknown\"\r\n    )\r\n    | extend EventType = \"Malicious Extension .crx Drop\"\r\n    // Project columns to align with DeviceNetworkEvents for the union operation\r\n    | project\r\n        TimeGenerated,\r\n        DeviceName,\r\n        EventType,\r\n        RemoteUrl = ExtractedId, // Store Extension ID\r\n        RemoteIP = Browser, // Store Browser name\r\n        RemotePort = FolderPath, // Store full path\r\n        InitiatingProcessAccountName,\r\n        InitiatingProcessFileName = FileName,\r\n        InitiatingProcessCommandLine,\r\n        ReportId = \"\", // Align schema\r\n        ActionType,\r\n        Protocol = \"\" // Align schema\r\n)\r\n| sort by TimeGenerated desc\r\n"
