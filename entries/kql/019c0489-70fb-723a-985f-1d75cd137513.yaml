id: 019c0489-70fb-723a-985f-1d75cd137513
name: ScreenConnect Malware Email Lure Detection
description: Detects emails containing threat-actor lure links to trojanized ScreenConnect MSI files, specifically targeting 'cld.pt' downloads with 'COMPROBANTE*.msi' patterns. The rule also looks for 'COMPROBANTE' keywords in email subjects as a fallback.
query: "// =============================================================================\n// ScreenConnect Malware Email Lure Detection (KQL)\n// =============================================================================\n// Description: Detects emails containing threat-actor lure link to trojanized\n//              ScreenConnect MSI (cld.pt download, COMPROBANTE*.msi).\n// Author: Daniel Jeremiah\n// Date: 2025-01-25\n// Reference: https://www.virustotal.com/gui/file/5ba4020759ca8c2c185fdd6f8c2d9e2ec7d21c860aeb0adb6c7622006eb57b6f\n// Data sources: EmailUrlInfo, EmailEvents (Microsoft 365 Defender / Sentinel).\n// =============================================================================\n\n// -----------------------------------------------------------------------------\n// 1. Exact lure URL â\x80\x93 specific campaign link\n// -----------------------------------------------------------------------------\nEmailUrlInfo\n| where Timestamp > ago(30d)\n| where Url contains \"cld.pt\"\n   and Url contains \"a35739a6-d227-456b-a54e-4285bd8ee3d7\"\n   and Url contains \"COMPROBANTE0005206667773.msi\"\n| join kind=inner (\n    EmailEvents\n    | where Timestamp > ago(30d)\n    | project NetworkMessageId, Timestamp, SenderMailFromAddress, SenderFromAddress,\n              RecipientEmailAddress, Subject, DeliveryAction, EmailDirection\n) on NetworkMessageId\n| project Timestamp, Url, UrlDomain, UrlLocation, SenderMailFromAddress, SenderFromAddress,\n         RecipientEmailAddress, Subject, DeliveryAction, EmailDirection;\n\n// -----------------------------------------------------------------------------\n// 2. cld.pt download + COMPROBANTE*.msi pattern (same TTP, variant links)\n// -----------------------------------------------------------------------------\nEmailUrlInfo\n| where Timestamp > ago(30d)\n| where UrlDomain has \"cld.pt\"\n   and (Url contains \"/dl/download/\" or Url contains \"/download/\")\n   and Url matches regex @\"COMPROBANTE[0-9]+\\.msi\"\n| join kind=inner (\n    EmailEvents\n    | where Timestamp > ago(30d)\n    | project NetworkMessageId, Timestamp, SenderMailFromAddress, SenderFromAddress,\n              RecipientEmailAddress, Subject, DeliveryAction, EmailDirection\n) on NetworkMessageId\n| project Timestamp, Url, UrlDomain, UrlLocation, SenderMailFromAddress, SenderFromAddress,\n         RecipientEmailAddress, Subject, DeliveryAction, EmailDirection;\n\n// -----------------------------------------------------------------------------\n// 3. EmailEvents-only: subject/body lure keywords + .msi (if URL not in EmailUrlInfo)\n// -----------------------------------------------------------------------------\nEmailEvents\n| where Timestamp > ago(30d)\n| where Subject contains \"COMPROBANTE\" or Subject contains \"comprobante\"\n   or Subject matches regex @\"(?i)comprobante\\s*[de\\s]*\\d+\"\n| project Timestamp, NetworkMessageId, SenderMailFromAddress, SenderFromAddress,\n         RecipientEmailAddress, Subject, DeliveryAction, EmailDirection, AttachmentCount;\n// Optional: join to EmailAttachmentInfo and filter FileName endswith \".msi\"\n\n// -----------------------------------------------------------------------------\n// 4. Any cld.pt MSI download link (broad; tune with allow-list if needed)\n// -----------------------------------------------------------------------------\nEmailUrlInfo\n| where Timestamp > ago(30d)\n| where UrlDomain has \"cld.pt\"\n   and (Url contains \".msi\" or Url endswith \"msi\")\n| join kind=inner (\n    EmailEvents\n    | where Timestamp > ago(30d)\n    | project NetworkMessageId, Timestamp, SenderMailFromAddress, RecipientEmailAddress,\n              Subject, DeliveryAction, EmailDirection\n) on NetworkMessageId\n| project Timestamp, Url, UrlDomain, UrlLocation, SenderMailFromAddress,\n         RecipientEmailAddress, Subject, DeliveryAction, EmailDirection"
query_type: kql
severity: medium
tactics:
    - TA0001
techniques:
