query: "let QueryPeriod = 30d;\r\nlet Plague=externaldata(NextronSHA:string, Nextronfilename:string)\r\n[h'https://raw.githubusercontent.com/SlimKQL/Hunting-Queries-Detection-Rules/refs/heads/main/IOC/PlagueIOCs.csv']\r\nwith (format='csv', ignoreFirstRecord=true)\r\n| project NextronSHA;\r\nlet DeviceEventScan =\r\nDeviceEvents\r\n| where Timestamp > ago(QueryPeriod)\r\n| where SHA256 has_any(Plague);\r\nlet DeviceFileEventScan =\r\nDeviceFileEvents\r\n| where Timestamp > ago(QueryPeriod)\r\n| where SHA256 has_any(Plague);\r\nlet DeviceImageLoadEventScan =\r\nDeviceImageLoadEvents\r\n| where Timestamp > ago(QueryPeriod)\r\n| where SHA256 has_any(Plague);\r\nDeviceProcessEvents\r\n| where Timestamp > ago(QueryPeriod)\r\n| where SHA256 has_any(Plague)\r\n| union DeviceImageLoadEventScan, DeviceFileEventScan, DeviceEventScan "
