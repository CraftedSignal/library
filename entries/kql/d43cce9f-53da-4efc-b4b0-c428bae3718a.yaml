id: d43cce9f-53da-4efc-b4b0-c428bae3718a
name: TTP & IOC´s - Ivanti CS Exploit Chain - MDifyLoader, Cobalt Strike, vshell, Fscan, DslogdRAT
description: Detects activity related to exploitation of Ivanti Connect Secure vulnerabilities (CVE-2025-0282, CVE-2025-22457) using MDifyLoader, Cobalt Strike, vshell, DslogdRAT, and Fscan. Includes file, process, and network-based IOCs from JPCERT report.
query: "// Ivanti CS Exploit Chain - MDifyLoader, Cobalt Strike, vshell, Fscan, DslogdRAT\n// This query attempts to detect process, file, and network activity related to the described TTPs and IOCs.\n// Adjust table names and field mappings as needed for your environment.\n\nlet mdifyloader_execution = DeviceProcessEvents\n    | where FileName in~ (\"push_detect.exe\", \"rmic.exe\", \"jli.dll\", \"Microsoft.WindowsAppRuntime.Bootstrap.dll\");\n\nlet cobaltstrike_beacon = DeviceProcessEvents\n    | where (ProcessCommandLine has_any (\"RC4\", \"google\", \"NewBeacon.dll\"))\n      and (InitiatingProcessFileName in~ (\"push_detect.exe\", \"rmic.exe\"));\n\nlet dslogdrat = DeviceProcessEvents\n    | where FileName =~ \"dslogd.exe\"\n      and ProcessCommandLine has \"-run\";\n\nlet vshell_exec = DeviceProcessEvents\n    | where FileName in~ (\"ws.exe\", \"ws_windows_amd64.exe\", \"ws_windows_amd2.exe\");\n\nlet fscan_loader = DeviceProcessEvents\n    | where FileName =~ \"python.exe\"\n      and ProcessCommandLine has \"k.bin\";\n\nlet fscan_dll = DeviceImageLoadEvents\n    | where FileName =~ \"python311.dll\";\n\nlet malware_hashes = DeviceProcessEvents\n    | where SHA256 in~ (\"45ecb7b23b328ab762d8519e69738a20eb0cd5618a10abb2c57a9c72582aa7e7\", \n                        \"9e91862b585fc4d213e9aaadd571435c1a007d326bd9b07b72dbecb77d1a27ac\",\n                        \"09087fc4f8c261a810479bb574b0ecbf8173d4a8365a73113025bd506b95e3d7\",\n                        \"1652ab693512cd4f26cc73e253b5b9b0e342ac70aa767524264fef08706d0e69\",\n                        \"699290a753f35ae3f05a7ea1984d95f6e6f21971a146714fca5708896e5e6218\",\n                        \"cff2afc651a9cba84a11a4e275cc9ec49e29af5fd968352d40aeee07fb00445e\",\n                        \"48f3915fb8d8ad39dc5267894a950efc863bcc660f1654187b3d77a302fd040f\",\n                        \"54350d677174269b4dc25b0ccfb0029d6aeac5abbbc8d39eb880c9fd95691125\",\n                        \"85f9819118af284e6b00ce49fb0c85ff0c0b9d7a0589e1bb56a275ed91314965\");\n\nlet c2_connections = DeviceNetworkEvents\n    | where RemoteIP in (\"172.237.6.207\", \"45.77.110.37\", \"38.6.229.42\", \"23.227.196.254\")\n       or RemoteUrl has_any (\"proxy.objectlook.com\", \"api.openedr.eu.org\", \"community.openedr.eu.org\", \"query.datasophos.com\");\n\n// Union all detection sources\nmdifyloader_execution\n| union cobaltstrike_beacon\n| union dslogdrat\n| union vshell_exec\n| union fscan_loader\n| union fscan_dll\n| union malware_hashes\n| union c2_connections\n"
query_type: kql
tags:
    - kql
version: "1"
