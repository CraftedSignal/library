id: 0199bd3e-0036-7068-8876-5c51b8be722a
name: 'New Redis RCE Alert: CVE-2025-49844'
description: 'KQL Query from file: New Redis RCE Alert: CVE-2025-49844'
query: "let RedisServer =\r\nDeviceProcessEvents\r\n| where Timestamp > ago(30d)\r\n| where InitiatingProcessFileName has \"redis-server\"\r\n| summarize arg_max(Timestamp, *) by DeviceId\r\n| project DeviceName;\r\nDeviceInfo\r\n| summarize arg_max(Timestamp, *) by DeviceName\r\n| where IsInternetFacing == true and isnotempty(PublicIP)\r\n| where DeviceName has_any(RedisServer)"
query_type: kql
severity: medium
tactics:
    - TA0009
techniques:
    - T1213
tags:
    - kql
author: Steven Lim
version: "2"
