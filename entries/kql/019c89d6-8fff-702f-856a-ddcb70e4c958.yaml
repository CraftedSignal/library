id: 019c89d6-8fff-702f-856a-ddcb70e4c958
name: SparkRAT and VShell IoCs from CVE-2026-1731 Campaign
description: This rule detects file hashes, network indicators (IPs, Domains), and URLs associated with SparkRAT, VShell, and other tools used in the exploitation of BeyondTrust CVE-2026-1731.
query: "// Name: SparkRAT and VShell IoCs from CVE-2026-1731 Campaign\r\n// Author: Adarsh Pandey\r\n// Date: 2026-02-23\r\n// Description: This rule detects file hashes, network indicators (IPs, Domains), and URLs associated with SparkRAT, VShell, and other tools used in the exploitation of BeyondTrust CVE-2026-1731.\r\n// MITRE TTPs: T1105 (Ingress Tool Transfer), T1583.003 (Acquire Infrastructure: C2 Domains)\r\n// References: https://unit42.paloaltonetworks.com/beyondtrust-cve-2026-1731/\r\n// False Positive Sensitivity: Medium. Legitimate file-sharing services like GitHub or transfer.weepee.io might be used for non-malicious purposes. Consider adding process or user context to filter these cases if they are noisy in your environment.\r\n\r\nlet fileHashes = dynamic([\r\n    // SparkRAT\r\n    \"9f431d5549a03aee92cfd2bdbbe90f1c91e965c99e90a0c9ad5a001f4e80c350\",\r\n    // VShell\r\n    \"98a7b0900a9072bb40af579ec372da7b27af12b15868394df51fefe290ab176b\",\r\n    // Other tools and webshells from the campaign\r\n    \"66cceb2c2f1d9988b501832fd3b559775982e2fce4ab38fc4ffe71b74eafc726\",\r\n    \"679ee05d92a858b6fe70aeb6072eb804548f1732e18b6c181af122b833386afb\",\r\n    \"4762e944a0ce1f9aef243e11538f84f16b6f36560ed6e32dfd9a5f99e17e8e50\",\r\n    \"98442387d466f27357d727b3706037a4df12a78602b93df973b063462a677761\",\r\n    \"cc2bc3750cc5125a50466f66ae4f2bedf1cac0e43477a78ed2fd88f3e987a292\",\r\n    \"cf83e1357eefb8bdf1542850d66d8007d620e4050b5715dc83f4a921d36ce9ce\",\r\n    \"0ecc867ce916d01640d76ec03de24d1d23585eb582e9c48a0364c62a590548ac\"\r\n]);\r\nlet remoteIPs = dynamic([\r\n    \"23.162.40.187\", \"37.19.221.180\", \"45.61.150.96\", \"70.23.0.66\", \"82.29.53.187\", \"82.29.72.16\",\r\n    \"83.138.53.139\", \"85.155.186.121\", \"92.223.44.134\", \"98.10.233.76\", \"134.122.13.34\", \"138.197.14.95\",\r\n    \"142.111.152.50\", \"144.172.103.200\", \"155.2.215.64\", \"178.128.212.209\", \"179.43.146.42\", \"64.31.28.221\",\r\n    \"64.95.10.115\"\r\n]);\r\nlet remoteDomainsAndUrls = dynamic([\r\n    \"aliyundunupdate.xyz\", \"transfer.weepee.io\", \"temp.sh\", \"raw.githubusercontent.com/nezhahq/scripts/main/agent/install.ps1\",\r\n    \"github.com/nicocha30/ligolo-ng/releases/download/\"\r\n]);\r\n\r\n// Search for file creation events with matching hashes\r\nlet file_events = DeviceFileEvents\r\n| where SHA256 in (fileHashes)\r\n| extend EventType = \"FileCreated\", Indicator = SHA256, IndicatorType = \"FileHash\"\r\n| project\r\n    Timestamp,\r\n    DeviceName,\r\n    EventType,\r\n    Indicator,\r\n    IndicatorType,\r\n    FileName,\r\n    FolderPath,\r\n    InitiatingProcessCommandLine;\r\n\r\n// Search for network connections to known malicious IPs or URLs\r\nlet network_events = DeviceNetworkEvents\r\n| where RemoteIP in (remoteIPs) or Url has_any (remoteDomainsAndUrls)\r\n| extend EventType = \"NetworkConnection\", Indicator = iif(RemoteIP in (remoteIPs), RemoteIP, Url), IndicatorType = iif(RemoteIP in (remoteIPs), \"IPAddress\", \"URL\")\r\n| project\r\n    Timestamp,\r\n    DeviceName,\r\n    EventType,\r\n    Indicator,\r\n    IndicatorType,\r\n    InitiatingProcessCommandLine = ProcessCommandLine,\r\n    RemoteIP,\r\n    RemoteUrl,\r\n    RemotePort;\r\n\r\n// Search for DNS queries to known malicious domains\r\nlet dns_events = DeviceDnsEvents\r\n| where DomainName has_any (remoteDomainsAndUrls)\r\n| extend EventType = \"DnsQuery\", Indicator = DomainName, IndicatorType = \"Domain\"\r\n| project\r\n    Timestamp,\r\n    DeviceName,\r\n    EventType,\r\n    Indicator,\r\n    IndicatorType,\r\n    InitiatingProcessCommandLine = ProcessCommandLine,\r\n    DomainName;\r\n\r\n// Combine results from all sources\r\nunion file_events, network_events, dns_events\r\n| summarize\r\n    StartTime = min(Timestamp),\r\n    EndTime = max(Timestamp),\r\n    Indicators = make_set(Indicator),\r\n    Processes = make_set(InitiatingProcessCommandLine)\r\n    by DeviceName, IndicatorType\r\n| order by StartTime asc\r\n"
