id: 019a01ee-1cd0-7249-8395-5fa0dadacb6f
name: PowerShell Adding Defender Exclusions
description: Detects the use of PowerShell to add exclusions to Microsoft Defender, which can be an attempt by an adversary to impair defenses and prevent detection of malicious activities.
query: "// Adding paths to Defender exclusions\r\nDeviceProcessEvents\r\n| where Timestamp > ago(30d)\r\n| where FileName =~ \"powershell.exe\"\r\n| where ProcessCommandLine contains \"Add-MpPreference\"\r\n| where ProcessCommandLine contains \"-ExclusionPath\"\r\n| project Timestamp, DeviceName, ProcessCommandLine, InitiatingProcessFileName,SHA256"
query_type: kql
severity: medium
tactics:
    - TA0005
    - TA0002
techniques:
    - T1562.001
    - T1059.001
tags:
    - kql
version: "1"
