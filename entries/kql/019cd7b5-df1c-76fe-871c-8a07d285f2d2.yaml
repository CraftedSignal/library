id: 019cd7b5-df1c-76fe-871c-8a07d285f2d2
name: Potential PrintNightmare Exploitation Detected
description: |-
    Detects potential exploitation of CVE-2021-1675 / CVE-2021-34527 (PrintNightmare) via anomalous SMB access to the IPC$ share targeting the "spoolss" named pipe (AccessMask: 0x3).

    This pattern is associated with RPC-based abuse of the Windows Print Spooler service, which may allow remote code execution or privilege escalation with SYSTEM privileges.
query: "SecurityEvent\r\n| where EventID == 5145\r\n| where ShareName == \"\\\\\\\\*\\\\IPC$\"\r\n| where RelativeTargetName has \"spoolss\"\r\n| where ObjectType =~ \"File\"\r\n| project TimeGenerated, Account, Activity, Computer, IpAddress, ShareName, RelativeTargetName, AccessMask, ObjectType"
query_type: kql
severity: medium
techniques:
    - T1210
    - T1547.012
tags:
    - kql
version: "3"
