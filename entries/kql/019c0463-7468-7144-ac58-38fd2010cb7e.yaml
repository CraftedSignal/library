id: 019c0463-7468-7144-ac58-38fd2010cb7e
name: ClawdBot Malware IOC Watchlist
description: This rule detects file and network indicators of compromise (IOCs) associated with the fake 'ClawdBot Agent' VS Code extension malware campaign. It looks for known malicious file hashes and network connections to C2 infrastructure, including specific C2 checks for ScreenConnect relay on port 8041.
query: "let maliciousHashes = dynamic([\r\n    \"adbcdb613c04fd51936cb0863d2417604db0cd04792ab7cae02526d48944c77b\", // extension.js\r\n    \"04ef48b104d6ebd05ad70f6685ade26c1905495456f52dfe0fb42f550bd43388\", // run.bat\r\n    \"e20b920c7af988aa215c95bbaa365d005dd673544ab7e3577b60fecf11dcdea2\", // Code.exe (ScreenConnect)\r\n    \"d1e0c26774cb8beabaf64f119652719f673fb530368d5b2166178191ad5fcbea\"  // DWrite.dll (Rust loader)\r\n    ]);\r\nlet maliciousDomains = dynamic([\r\n    \"meeting.bulletmailer.net\",\r\n    \"clawdbot.getintwopc.site\",\r\n    \"getintwopc.site\",\r\n    \"darkgptprivate.com\"\r\n    ]);\r\nlet maliciousIPs = dynamic([\r\n    \"179.43.176.32\",\r\n    \"178.16.54.253\"\r\n    ]);\r\nlet maliciousUrl = \"www.dropbox.com/scl/fi/tmwi4j86op04r9qo2xdgh/zoomupdate.msi\";\r\nlet c2Port = 8041;\r\n// Union different event types to search for file and network IOCs\r\nunion isfuzzy=true DeviceProcessEvents, DeviceFileEvents, DeviceNetworkEvents\r\n| where\r\n    // Match known malicious file hashes\r\n    SHA256 in (maliciousHashes) or\r\n    // Match known malicious network connections\r\n    (\r\n    (RemoteUrl in (maliciousDomains) or RemoteIP in (maliciousIPs)) or\r\n    (RemoteUrl has maliciousUrl) or\r\n    // Specific C2 check for ScreenConnect relay on port 8041\r\n    ((RemoteUrl =~ \"meeting.bulletmailer.net\" or RemoteIP =~ \"179.43.176.32\") and RemotePort == c2Port)\r\n    )\r\n| project\r\n    Timestamp,\r\n    DeviceName,\r\n    ActionType,\r\n    FileName,\r\n    FolderPath,\r\n    ProcessCommandLine,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessCommandLine,\r\n    RemoteUrl,\r\n    RemoteIP,\r\n    RemotePort,\r\n    SHA256,\r\n    AccountName"
query_type: kql
severity: medium
tactics:
    - TA0011
techniques:
    - T1105
    - T1071.001
    - T1219
tags:
    - kql
version: "7"
references:
    - https://www.aikido.dev/blog/fake-clawdbot-vscode-extension-malware
