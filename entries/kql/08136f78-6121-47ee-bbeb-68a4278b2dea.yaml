id: 08136f78-6121-47ee-bbeb-68a4278b2dea
name: KQL to calculate Tenant External Recipient Rate Limit
description: KQL Query
query: "// Tenant External Recipient Rate Limit or TERR\n// https://techcommunity.microsoft.com/blog/exchange/introducing-exchange-online-tenant-outbound-email-limits/4372797\n\nEmailEvents\n| where Timestamp > ago(30d)\n| where EmailDirection == \"Outbound\"\n| summarize OutboundEmailVol=count() by bin(Timestamp,1d)\n| sort by OutboundEmailVol desc \n\n"
query_type: kql
tactics:
    - TA0010
    - TA0009
    - TA0040
techniques:
    - T1020
    - T1114
    - T1667
tags:
    - kql
version: "1"
