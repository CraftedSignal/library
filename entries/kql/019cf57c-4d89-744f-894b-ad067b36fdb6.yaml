id: 019cf57c-4d89-744f-894b-ad067b36fdb6
name: SSH GSSAPI-with-MIC Authentication Success
description: This rule detects successful SSH authentications using the GSSAPI-with-MIC mechanism. This can indicate legitimate user logins or, in some cases, an adversary using valid credentials to access a system via SSH.
query: "Syslog\r\n| where ProcessName == \"sshd\"\r\n| where SyslogMessage has \"Accepted gssapi-with-mic\"\r\n| extend User = extract(@\"for ([^\\s]+)\", 1, SyslogMessage)\r\n| extend SrcIP = extract(@\"from ([0-9\\.]+)\", 1, SyslogMessage)\r\n| project TimeGenerated, Computer, HostIP, User, SrcIP, SyslogMessage\r\n| sort by TimeGenerated desc\r\n"
query_type: kql
severity: medium
tactics:
    - TA0008
techniques:
    - T1021.004
tags:
    - kql
version: "1"
