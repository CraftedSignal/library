id: d31a9ca3-102e-446d-b939-96fff419966a
name: Phishing Attacks Using Google Apps Script
description: 'KQL Query from file: Phishing Attacks Using Google Apps Script'
query: "let NMID =\r\nEmailUrlInfo\r\n| where TimeGenerated > ago(30d)\r\n| where UrlDomain =~ \"script.google.com\"\r\n| project NetworkMessageId;\r\nEmailEvents\r\n| where TimeGenerated > ago(30d)\r\n| where EmailDirection == \"Inbound\" and DeliveryAction != \"Blocked\"\r\n| where (LatestDeliveryLocation contains \"Inbox\" or LatestDeliveryLocation contains \"premises\") and LatestDeliveryAction == \"Delivered\"\r\nor (DeliveryAction has 'Delivered' and EmailAction !has 'Send to quarantine')\r\n| where NetworkMessageId has_any(NMID)\r\n| where SenderFromDomain != \"google.com\"\r\n| where Subject contains \"invoice\""
query_type: kql
severity: medium
tags:
    - kql
author: Steven Lim
version: "1"
references:
    - https://cofense.com/blog/behind-the-script-unmasking-phishing-attacks-using-google-apps-script
