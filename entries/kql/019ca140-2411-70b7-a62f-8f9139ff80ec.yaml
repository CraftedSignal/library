id: 019ca140-2411-70b7-a62f-8f9139ff80ec
name: Service Recovery Configuration Modification
description: Detects modifications to the registry values responsible for service recovery actions, specifically the 'FailureCommand' or 'FailureActions' values. This can indicate an attacker is configuring a service to execute a malicious payload upon failure for persistence or privilege escalation.
query: "// Name: Service Recovery Configuration Modification\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-02-27\r\n// Tactic: Persistence, Privilege Escalation\r\n// Technique: T1543.003, T1112\r\n// References: https://www.zerosalarium.com/2026/02/Defense-Evasion-The-service-run-failed-successfully.html\r\n// Description: Detects modifications to the registry values responsible for service recovery actions, specifically the 'FailureCommand' or 'FailureActions' values. This can indicate an attacker is configuring a service to execute a malicious payload upon failure for persistence or privilege escalation.\r\nDeviceRegistryEvents\r\n// Filter for registry value set/write operations\r\n| where ActionType == \"RegistryValueSet\"\r\n// Target the specific registry values used for service recovery actions\r\n| where RegistryValueName in~ (\"FailureCommand\", \"FailureActions\")\r\n// Ensure the modification is happening within the 'Services' registry hive\r\n| where RegistryKey startswith @\"HKEY_LOCAL_MACHINE\\SYSTEM\\CurrentControlSet\\Services\\\"\r\n// An attacker is setting a command, not clearing it. This helps reduce noise from legitimate cleanup.\r\n| where isnotempty(RegistryValueData)\r\n// False Positive Tuning: Legitimate software installers, updaters, or system management tools might modify these settings.\r\n// Exclude known benign processes or command lines if they cause noise in your environment.\r\n// For example: | where InitiatingProcessFileName !in~ (\"msiexec.exe\", \"trusted_updater.exe\")\r\n| project\r\n    Timestamp,\r\n    DeviceName,\r\n    InitiatingProcessAccountName,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessCommandLine,\r\n    RegistryKey,\r\n    RegistryValueName,\r\n    RegistryValueData,\r\n    PreviousRegistryValueData\r\n"
query_type: kql
