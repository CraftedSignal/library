id: 019d0bb3-17fd-765f-84f5-02d7aec986d7
name: Untitled Detection
description: KQL Query
query: " // Detect certutil -hashfile targeting browser credential stores\r\n// This is a reconnaissance/validation technique used by infostealers\r\n// to fingerprint browser data before or after exfiltration\r\nDeviceProcessEvents\r\n| where Timestamp > ago(90d)\r\n| where FileName =~ \"certutil.exe\"\r\n| where ProcessCommandLine has \"-hashfile\"\r\n| where ProcessCommandLine has_any (\r\n    \"Web Data\",           // Autofill, saved credit cards\r\n    \"Login Data\",         // Saved passwords\r\n    \"Cookies\",            // Session cookies\r\n    \"Preferences\",        // Browser config\r\n    \"Secure Preferences\", // Extension/security state\r\n    \"History\",            // Browsing history\r\n    \"Bookmarks\",          // Bookmarks\r\n    \"Local State\"         // Encryption key metadata\r\n)\r\n| where ProcessCommandLine has_any (\r\n    \"Chrome\", \"Edge\", \"Firefox\", \"Brave\", \"Opera\", \"Vivaldi\", \"Chromium\"\r\n)\r\n| extend BrowserDataFile = extract(@'[^\\\\]+$', 0, \r\n    extract(@'\"([^\"]+)\"\\s*$', 1, ProcessCommandLine))\r\n| extend BrowserTarget = case(\r\n    ProcessCommandLine has \"Chrome\", \"Chrome\",\r\n    ProcessCommandLine has \"Edge\", \"Edge\",\r\n    ProcessCommandLine has \"Firefox\", \"Firefox\",\r\n    ProcessCommandLine has \"Brave\", \"Brave\",\r\n    ProcessCommandLine has \"Opera\", \"Opera\",\r\n    \"Other\"\r\n)\r\n| summarize\r\n    FirstSeen = min(Timestamp),\r\n    LastSeen = max(Timestamp),\r\n    HashAttempts = count(),\r\n    BrowsersTargeted = make_set(BrowserTarget, 10),\r\n    FilesHashed = make_set(BrowserDataFile, 20),\r\n    ParentProcesses = make_set(InitiatingProcessFileName, 10)\r\n    by DeviceName, AccountName, InitiatingProcessSHA1,\r\n       InitiatingProcessFileName, InitiatingProcessFolderPath\r\n| extend Severity = case(\r\n    HashAttempts >= 6 and array_length(BrowsersTargeted) >= 2, \"CRITICAL\",\r\n    HashAttempts >= 3, \"HIGH\",\r\n    \"MEDIUM\"\r\n)\r\n| sort by Severity asc, HashAttempts desc"
query_type: kql
severity: medium
tags:
    - kql
version: "2"
