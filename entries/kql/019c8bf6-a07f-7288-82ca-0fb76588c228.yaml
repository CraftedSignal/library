id: 019c8bf6-a07f-7288-82ca-0fb76588c228
name: Python RAT Silent Execution Pattern
description: This rule detects Python processes that are executed with command-line arguments indicative of silent execution or output redirection to null devices, combined with execution from a temporary directory. This pattern was observed in the dYdX PyPI package compromise, where a RAT ran undetected using these techniques.
query: "// Name: Python RAT Silent Execution Pattern\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-02-23\r\n// Description: This rule detects Python processes that are executed with command-line arguments indicative of silent execution or output redirection to null devices, a technique used by the RAT in the dYdX PyPI package compromise to run undetected.\r\n// References: https://socket.dev/blog/malicious-dydx-packages-published-to-npm-and-pypi\r\n// Tags: T1059.006, T1027, supply chain, dYdX, RAT, Python\r\n// Search for process creation events\r\nDeviceProcessEvents\r\n| where\r\n    // Match on Python processes\r\n    ProcessVersionInfoOriginalFileName has \"python\" or InitiatingProcessFileName has \"python\"\r\n    // Match on command line arguments used to suppress output or hide windows\r\n    and ProcessCommandLine has_any (\"/dev/null\", \"CREATE_NO_WINDOW\")\r\n    // Correlate with execution from a temporary directory, as seen in the attack\r\n    and ProcessCommandLine has_any (\"/tmp/\", \"/var/tmp\", \"AppData\\\\Local\\\\Temp\")\r\n// FP-TUNING: Redirecting output to /dev/null or running scripts from temporary directories can be legitimate for some applications or administrative tasks.\r\n// The combination of these behaviors increases suspicion. For higher fidelity, consider filtering for specific parent processes or excluding known-good scripts.\r\n// Example: | where ParentProcessFileName !in (\"cron\", \"sshd\", \"my_legit_app.exe\")\r\n| extend\r\n    timestamp = TimeGenerated,\r\n    Host = DeviceName,\r\n    Account = InitiatingProcessAccountName,\r\n    CommandLine = ProcessCommandLine\r\n| project\r\n    timestamp,\r\n    Host,\r\n    Account,\r\n    CommandLine,\r\n    InitiatingProcessParentFileName,\r\n    InitiatingProcessCommandLine\r\n"
