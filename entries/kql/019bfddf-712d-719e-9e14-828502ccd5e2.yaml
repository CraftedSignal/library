id: 019bfddf-712d-719e-9e14-828502ccd5e2
name: PowerShell Execution via SyncAppvPublishingServer.vbs
description: Detects PowerShell execution initiated by the signed Microsoft App-V script 'SyncAppvPublishingServer.vbs'. This technique is used as a LOLBIN to proxy malicious PowerShell commands, as seen in campaigns delivering Amatera Stealer.
query: "DeviceProcessEvents\r\n| where ActionType == \"ProcessCreated\"\r\n| where FileName in~ (\"powershell.exe\", \"pwsh.exe\")\r\n| where InitiatingProcessFileName in~ (\"wscript.exe\", \"cscript.exe\")\r\n| where InitiatingProcessCommandLine has \"SyncAppvPublishingServer.vbs\"\r\n| project\r\n    Timestamp,\r\n    DeviceName,\r\n    AccountName,\r\n    FileName,\r\n    ProcessCommandLine,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessCommandLine,\r\n    InitiatingProcessParentFileName,\r\n    ProcessId,\r\n    InitiatingProcessId"
query_type: kql
severity: medium
tactics:
    - TA0005
    - TA0002
techniques:
    - T1216.002
    - T1059.001
tags:
    - kql
author: Kaung Khant Ko
version: "2"
references:
    - https://blackpointcyber.com/blog/novel-fake-captcha-chain-delivering-amatera-stealer/
