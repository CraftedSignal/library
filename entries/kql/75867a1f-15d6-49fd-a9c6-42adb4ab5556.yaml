id: 75867a1f-15d6-49fd-a9c6-42adb4ab5556
name: Detecting Blind Eagle APT-C-36
description: 'KQL Query from file: Detecting Blind Eagle APT-C-36'
query: "let EPaccessDuckDNS =\r\nDeviceNetworkEvents\r\n| where Timestamp > ago(1h)\r\n| where ActionType == \"ConnectionSuccess\"\r\n| where RemoteUrl has (\".duckdns.org\")\r\n| distinct DeviceName;\r\nDeviceFileEvents\r\n| where Timestamp > ago(1h)\r\n| where ActionType == \"FileCreated\"\r\n| where tolower(FileName) endswith \".vbs\"\r\n| where DeviceName has_any(EPaccessDuckDNS)"
query_type: kql
severity: medium
tactics:
    - TA0002
    - TA0011
techniques:
    - T1059.005
    - T1071.004
    - T1219
tags:
    - kql
author: Steven Lim
version: "1"
references:
    - https://www.trustwave.com/en-us/resources/blogs/spiderlabs-blog/tracing-blind-eagle-to-proton66/
