id: 7421f2fc-32c9-41e6-a026-d826f58399ef
name: Antivirus Terminator driver loading Storm-2603
description: Checks for driver loading in the system based on its hash
query: "// Source: https://research.checkpoint.com/2025/before-toolshell-exploring-storm-2603s-previous-ransomware-operations/\r\n// This query aims at detecting the EDR/Antivirus kill tool lately used by Storm-2603 in recent campaigns\r\n// The tool is composed by:\r\n// VMToolsEng.exe   – Custom Antivirus Terminator\r\n// ServiceMouse.sys – Vulnerable driver used by VMToolsEng.exe for killing Antivirus processes\r\n// The driver gets registered as a service under the name \"ServiceMouse\" (no robust detection, they can obviously change)\r\n\r\nDeviceImageLoadEvents\r\n| where SHA256 == \"4709b47a402fdf58fe99a70fdadb58ee67fa61546d8c86241486668e61a879ca\"  //ServiceMouse.sys SHA256"
query_type: kql
severity: medium
tags:
    - Storm-2603
    - Antivirus Terminator
    - AToolsKrnl64.sys
    - kql
author: Nicholas Gobbo
version: "1"
