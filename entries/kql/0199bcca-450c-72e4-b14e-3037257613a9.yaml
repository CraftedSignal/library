id: 0199bcca-450c-72e4-b14e-3037257613a9
name: 'Ransomware TTP: Shadow Copy Deletion via VSSAdmin'
description: This rule detects the use of the vssadmin.exe command-line tool to delete volume shadow copies. This is a common and high-confidence technique used by ransomware and other malicious actors to prevent system recovery and increase their leverage.
query: "ProcessEvents\r\n| where process_commandline has \"vssadmin.exe\" and process_commandline has \"Delete Shadows\""
query_type: kql
severity: medium
techniques:
    - T1490
tags:
    - kql
author: Alexander Nguyen
version: "3"
references:
    - https://github.com/4Al3xG4mesYY/KC7_achievements_and_reports/blob/main/Incident_Reports/Incident-Report_Balloons-Over-Iowa_updated.pdf
    - https://attack.mitre.org/techniques/T1490/
