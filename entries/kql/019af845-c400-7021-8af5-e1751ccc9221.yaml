id: 019af845-c400-7021-8af5-e1751ccc9221
name: ' LockBit 5.0 Ransomware Activity'
description: This query hunts for indicators of compromise (IOCs) and behaviors linked to the LockBit 5.0 ransomware variant. It identifies the creation of the ransom note, suspicious file renaming patterns using hexadecimal extensions, and network connections to known command-and-control (C2) infrastructure associated with LockBit activity.
query: "let timeframe = 30d;\r\nlet ransomNote = \"ReadMeForDecrypt.txt\";\r\nlet fileExtensionRegex = @\"\\.[a-f0-9]{16}$\";\r\nlet lb_hashes = dynamic([\r\n  \"7ea5afbc166c4e23498aa9747be81ceaf8dad90b8daa07a6e4644dc7c2277b82\", //Ransom.Win64.LOCKBIT.YXFIOZ \r\n  \"180e93a091f8ab584a827da92c560c78f468c45f2539f73ab2deb308fb837b38\", //Ransom.Win64.LOCKBIT.YXFIOZ\r\n  \"4dc06ecee904b9165fa699b026045c1b6408cc7061df3d2a7bc2b7b4f0879f4d\",//Ransom.Linux.LOCKBIT.THIBCBD \r\n  \"90b06f07eb75045ea3d4ba6577afc9b58078eafeb2cdd417e2a88d7ccf0c0273\",//Ransom.Linux.LOCKBIT.THIBCBD\r\n  \"98d8c7870c8e99ca6c8c25bb9ef79f71c25912fbb65698a9a6f22709b8ad34b6\"//Ransom.Linux.LOCKBIT.THIBEBD \r\n]);\r\nlet c2_ip = \"205.185.116.233\";\r\nlet c2_domain = \"karma0.xyz\";\r\n(union isfuzzy=true\r\n    (\r\n        // Hunt for the creation of the LockBit 5.0 ransom note\r\n        DeviceFileEvents\r\n        | where Timestamp > ago(timeframe)\r\n        | where ActionType == \"FileCreated\" and FileName =~ ransomNote\r\n        | where InitiatingProcessSHA256 in (lb_hashes) or SHA256 in (lb_hashes)\r\n        | extend RuleName = \"LockBit 5.0 Ransom Note Created\", EventSource = \"DeviceFileEvents\"\r\n        | project-reorder Timestamp, DeviceName, InitiatingProcessFileName, FileName, FolderPath, RuleName, EventSource\r\n    ),\r\n    (\r\n        // Hunt for files being renamed with the LockBit 5.0 16-character hexadecimal extension\r\n        DeviceFileEvents\r\n        | where Timestamp > ago(timeframe)\r\n        | where ActionType == \"FileRenamed\"\r\n        | where FileName matches regex fileExtensionRegex.\r\n        | where not(PreviousFileName matches regex fileExtensionRegex)\r\n        | where InitiatingProcessSHA256 in (lb_hashes) or SHA256 in (lb_hashes)\r\n        | extend RuleName = \"LockBit 5.0 File Renaming Pattern\", EventSource = \"DeviceFileEvents\"\r\n        | project-reorder Timestamp, DeviceName, InitiatingProcessFileName, PreviousFileName, FileName, FolderPath, RuleName, EventSource\r\n    ),\r\n    (\r\n        // Hunt for network connections to known LockBit 5.0 C2 infrastructure\r\n        DeviceNetworkEvents\r\n        | where Timestamp > ago(timeframe)\r\n        | where RemoteIP == c2_ip or RemoteUrl has c2_domain\r\n        | extend RuleName = \"LockBit 5.0 C2 Network Connection\", EventSource = \"DeviceNetworkEvents\"\r\n        | project-reorder Timestamp, DeviceName, InitiatingProcessFileName, RemoteIP, RemoteUrl, RuleName, EventSource\r\n    )\r\n)\r\n"
query_type: kql
severity: medium
techniques:
    - T1486
    - T1071
tags:
    - kql
version: "2"
