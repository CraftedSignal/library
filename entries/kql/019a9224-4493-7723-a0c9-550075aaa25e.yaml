id: 019a9224-4493-7723-a0c9-550075aaa25e
name: Artifical Intelligence Tools usage
description: "The current AI ecosystem has significant security gaps that can be weaponized for corporate espionage, supply-chain compromise, data harvesting, and even nation-state operations. \n\nThis KQL query identifies endpoints that are accessing, installing, or executing AI-related services or applications. The primary objective is to detect :\n\n- Unauthorized AI usage (Policy Violation)\n- Potential data exfiltration via AI platforms\n- Shadow IT activity involving local or cloud-based LLMs\n- High-risk AI deployments that bypass corporate policy\n"
query: "//---------------------------------------------------------------------------------\n// MS Defender HUNT: AI Usage - Per user\n//---------------------------------------------------------------------------------\nlet ExcludedAccounts = dynamic([\"claude.smith\", \"gemini_svc\", \"system\", \"network service\"]);\nlet ExcludedPaths = dynamic([@\":\\Windows\\System32\\\", @\":\\Windows\\SysWOW64\\\", @\"C:\\Program Files\\Common Files\\\"]);\nlet AIDomains = dynamic([\n    \"chat.openai.com\", \"api.openai.com\", \"openai.com\", \"oaiusercontent.com\",\n    \"bard.google.com\", \"gemini.google.com\", \"ai.google.dev\",\n    \"claude.ai\", \"api.anthropic.com\", \"cdn.anthropic.com\",\n    \"copilot.microsoft.com\", \"copilot.office.com\", \"bing.com/chat\", \n    \"deepseek.com\", \"chat.deepseek.com\", \"api.deepseek.com\",\n    \"meta.ai\", \"ai.meta.com\", \"llama.meta.com\",\n    \"perplexity.ai\", \"api.perplexity.ai\",\n    \"huggingface.co\", \"hf.space\",\n    \"mistral.ai\", \"api.mistral.ai\",\n    \"watsonx.ai\", \"api.watsonx.ai\",\n    \"x.ai\", \"grok.x.ai\",\n    \"stability.ai\", \"api.stability.ai\",\n    \"midjourney.com\", \"runwayml.com\",\n    \"ollama.ai\", \"ollama.com\", \"lmstudio.ai\"\n]);\nlet AIFilenames = dynamic([\n    \"chatgpt\", \"openai\", \"bard\", \"gemini\", \"claude\", \"anthropic\",\n    \"copilot\", \"bingchat\", \"deepseek\", \"llama\", \"metaai\", \"perplexity\",\n    \"huggingface\", \"transformers\", \"mistralai\", \"mistral\", \"grok\",\n    \"stablediffusion\", \"sdxl\", \"stability\", \"midjourney\", \"runwayml\",\n    \"ollama\", \"lmstudio\"\n]);\nlet AllEvents = (\n    DeviceNetworkEvents\n    | where InitiatingProcessAccountName !in~ (ExcludedAccounts)\n    | where not(InitiatingProcessFolderPath has_any (ExcludedPaths))\n    | where RemoteUrl has_any (AIDomains)\n    | project Timestamp, EventType=\"Network\", DeviceName, InitiatingProcessAccountName, ActivityDetail=RemoteUrl\n    | union (\n        DeviceFileEvents\n        | where InitiatingProcessAccountName !in~ (ExcludedAccounts)\n        | where not(FolderPath has_any (ExcludedPaths))\n        | where FileName has_any (AIFilenames)\n        | project Timestamp, EventType=\"File\", DeviceName, InitiatingProcessAccountName, ActivityDetail=FileName\n    )\n    | union (\n        DeviceProcessEvents\n        | where InitiatingProcessAccountName !in~ (ExcludedAccounts)\n        | where not(FolderPath has_any (ExcludedPaths))\n        | where InitiatingProcessFileName !in~ (\"svchost.exe\", \"SearchIndexer.exe\", \"Explorer.exe\")\n        | where FileName has_any (AIFilenames) or ProcessCommandLine has_any (AIFilenames)\n        | project Timestamp, EventType=\"Process\", DeviceName, InitiatingProcessAccountName, ActivityDetail=ProcessCommandLine\n    )\n);\nAllEvents\n| extend AI_Provider = case(\n    ActivityDetail has_any (\"openai\", \"chatgpt\"), \"OpenAI\",\n    ActivityDetail has_any (\"gemini\", \"bard\"), \"Google Gemini\",\n    ActivityDetail has_any (\"claude\", \"anthropic\"), \"Anthropic Claude\",\n    ActivityDetail has_any (\"copilot\", \"bingchat\"), \"MS Copilot\",\n    ActivityDetail has \"deepseek\", \"DeepSeek\",\n    ActivityDetail has_any (\"meta\", \"llama\"), \"Meta AI\",\n    ActivityDetail has \"perplexity\", \"Perplexity\",\n    ActivityDetail has_any (\"huggingface\", \"transformers\"), \"Hugging Face\",\n    ActivityDetail has_any (\"ollama\", \"lmstudio\"), \"Local LLM Tool\",\n    \"Other AI\"\n)\n| summarize \n    TotalEventCount = count(),\n    UniqueAIProviders = dcount(AI_Provider),\n    ListOfAIProviders = make_set(AI_Provider),\n    DevicesUsed = make_set(DeviceName),\n    FirstSeen = min(Timestamp),\n    LastSeen = max(Timestamp)\n    by InitiatingProcessAccountName\n| sort by TotalEventCount desc"
query_type: kql
severity: medium
techniques:
    - T1588.007
tags:
    - kql
author: IronBranded
version: "6"
references:
    - https://www.wiz.io/blog/wiz-research-uncovers-exposed-deepseek-database-leak
    - https://www.bbc.com/news/articles/cx2lzmygr84o
