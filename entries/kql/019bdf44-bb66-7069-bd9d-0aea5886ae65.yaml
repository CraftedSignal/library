id: 019bdf44-bb66-7069-bd9d-0aea5886ae65
name: Suspicious Child Process from Python AI Environment
description: Detects when a Python process spawns a shell or a network utility. This behavior can be indicative of Remote Code Execution (RCE) vulnerabilities being exploited in AI/ML libraries (e.g., CVE-2025-23304, CVE-2026-22584) that allow attackers to execute arbitrary code when a malicious model file is loaded.
query: |-
    DeviceProcessEvents
    | where (InitiatingProcessFolderPath endswith "\\python.exe" or InitiatingProcessFolderPath endswith "\\python3.exe" or InitiatingProcessFolderPath endswith "/python" or InitiatingProcessFolderPath endswith "/python3") and (FolderPath endswith "\\cmd.exe" or FolderPath endswith "\\powershell.exe" or FolderPath endswith "\\curl.exe" or FolderPath endswith "\\wget.exe" or FolderPath endswith "/sh" or FolderPath endswith "/bash" or FolderPath endswith "/zsh" or FolderPath endswith "/curl" or FolderPath endswith "/wget")
query_type: kql
severity: medium
tactics:
    - TA0002
techniques:
    - T1203
    - T1059.004
    - T1059.003
    - T1059.001
tags:
    - attack.execution
    - attack.t1203
    - attack.t1059.004
    - cve.2025.23304
    - cve.2026.22584
author: Parth Parmar
version: "3"
references:
    - https://unit42.paloaltonetworks.com/rce-vulnerabilities-in-ai-python-libraries/
data_sources:
    - process_creation
    - generic
