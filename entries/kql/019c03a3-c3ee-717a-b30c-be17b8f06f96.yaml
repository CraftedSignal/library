id: 019c03a3-c3ee-717a-b30c-be17b8f06f96
name: SyncAppvPublishingServer.vbs Execution via WScript/CScript
description: Detects the execution of SyncAppvPublishingServer.vbs via wscript.exe or cscript.exe. This legitimate Windows script can be abused by adversaries to proxy execution of malicious PowerShell commands, bypassing execution restrictions and evading defensive measures.
query: "DeviceProcessEvents\r\n| where FileName in~ (\"wscript.exe\", \"cscript.exe\")\r\n| where ProcessCommandLine has \"SyncAppvPublishingServer.vbs\""
query_type: kql
severity: medium
tactics:
    - TA0005
techniques:
    - T1216.002
tags:
    - kql
version: "1"
