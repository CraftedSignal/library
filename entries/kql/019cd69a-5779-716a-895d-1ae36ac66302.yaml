id: 019cd69a-5779-716a-895d-1ae36ac66302
name: High Volume UDP Connections from a Single Process
description: This rule detects a high volume of UDP network connections originating from a single process on a device. A count exceeding 50 UDP connections from the same process to the same remote IP address is considered anomalous and could indicate a UDP flood or other denial-of-service attempt.
query: "DeviceNetworkEvents\r\n| where Protocol == \"Udp\"\r\n| summarize ConnectionCount=count() by DeviceName, RemoteIP, InitiatingProcessFileName\r\n| where ConnectionCount > 50\r\n| sort by ConnectionCount desc\r\n"
query_type: kql
severity: medium
tactics:
    - TA0040
techniques:
    - T1498
    - T1498.001
tags:
    - kql
version: "1"
