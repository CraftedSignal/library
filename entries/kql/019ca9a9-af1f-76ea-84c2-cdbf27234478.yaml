id: 019ca9a9-af1f-76ea-84c2-cdbf27234478
name: Anomalous Service Principal Authentication
description: A service principal authenticating from an IP address it has never used in the past 14 days - the strongest signal of credential theft for NHIs, equivalent to “impossible travel” for human identities.
query: "let lookback = 14d;\r\nlet detection_window = 1h;\r\nlet baseline = AADServicePrincipalSignInLogs\r\n    | where TimeGenerated between (ago(lookback) .. ago(detection_window))\r\n    | where ResultType == 0\r\n    | summarize\r\n        KnownIPs = make_set(IPAddress, 100),\r\n        AvgDailyAuths = count() / 14.0\r\n        by ServicePrincipalId, ServicePrincipalName;\r\nAADServicePrincipalSignInLogs\r\n| where TimeGenerated > ago(detection_window)\r\n| where ResultType == 0\r\n| summarize\r\n    CurrentIPs = make_set(IPAddress),\r\n    AuthCount = count(),\r\n    Resources = make_set(ResourceDisplayName, 10)\r\n    by ServicePrincipalId, ServicePrincipalName\r\n| join kind=inner baseline\r\n    on ServicePrincipalId\r\n| mv-expand CurrentIP = CurrentIPs to typeof(string)\r\n| where KnownIPs !has CurrentIP\r\n| project\r\n    ServicePrincipalName, ServicePrincipalId,\r\n    NewIP = CurrentIP, AuthCount,\r\n    BaselineAvgDaily = round(AvgDailyAuths, 1),\r\n    ResourcesAccessed = Resources"
query_type: kql
severity: medium
tags:
    - kql
version: "1"
