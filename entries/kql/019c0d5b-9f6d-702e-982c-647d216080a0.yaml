id: 019c0d5b-9f6d-702e-982c-647d216080a0
name: PeckBirdy LOLBin API Pattern Execution
description: Detects the execution of mshta.exe or wscript.exe with a command line pattern matching the PeckBirdy C2 framework's API for fetching landing scripts. The pattern consists of a 32-character ID followed by '/hta', '/wscript', or '/html'.
query: "DeviceProcessEvents\r\n| where ActionType == \"ProcessCreated\"\r\n| where FileName in~ (\"mshta.exe\", \"wscript.exe\", \"cscript.exe\")\r\n| where ProcessCommandLine matches regex @\"\\/[a-zA-Z0-9]{32}\\/(hta|wscript|html)\"\r\n| project\r\n    TimeGenerated,\r\n    DeviceName,\r\n    AccountName,\r\n    FileName,\r\n    ProcessCommandLine,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessCommandLine,\r\n    ParentProcessId,\r\n    ProcessId\r\n"
query_type: kql
severity: medium
tactics:
    - TA0005
    - TA0002
techniques:
    - T1059.005
    - T1218.005
tags:
    - kql
author: Kaung Khant Ko
version: "1"
references:
    - https://www.trendmicro.com/en_us/research/26/a/peckbirdy-script-framework.html
