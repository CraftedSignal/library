id: 019c2d5d-4cd6-77eb-86ae-bc9b282ac13d
name: Network Connection to Known Typosquatting Domains
description: This rule detects network connections or DNS queries to a predefined list of malicious domains. These domains are likely associated with typosquatting or other malicious infrastructure used by adversaries.
query: "// Unusual Network Hosts / Typosquat Domain Access\r\nlet MaliciousDomains = dynamic([\r\n \"moltbot.you\", \"clawbot.ai\", \"clawdbot.you\"\r\n]);\r\nDeviceNetworkEvents\r\n| where RemoteUrl has_any (MaliciousDomains)\r\n       or RemoteDomain in (MaliciousDomains)\r\n| project Timestamp, DeviceName, InitiatingProcessFileName, RemoteUrl, RemoteIP, RemotePort\r\n"
query_type: kql
severity: medium
tactics:
    - TA0042
techniques:
    - T1583.001
    - T1608.005
tags:
    - kql
author: Rudra Verma - CyberHawk
version: "8"
