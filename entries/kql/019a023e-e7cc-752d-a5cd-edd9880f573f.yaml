id: 019a023e-e7cc-752d-a5cd-edd9880f573f
name: UTA0388 GOVERSHELL Activity Detection
description: Detects various activities associated with the UTA0388 threat actor and their GOVERSHELL malware family. This includes network connections to known C2 infrastructure, creation of persistence via scheduled tasks, and execution of the malware payload, often involving DLL side-loading. The detection logic covers network communication with known C2 domains and IPs, creation of scheduled tasks with specific names, execution of the malware from common staging directories with specific flags, and the dropping of GOVERSHELL DLLs or files with known hashes.
query: "// Name: UTA0388 GOVERSHELL Activity\n// Author: detections.ai\n// Date: 2025-10-20\n// Description: Detects various activities associated with the UTA0388 threat actor and their GOVERSHELL malware family. This includes network connections to known C2 infrastructure, creation of persistence via scheduled tasks, and execution of the malware payload, often involving DLL side-loading.\n// False Positive Sensitivity: Medium. The query combines high-fidelity IOCs with behavioral patterns. Scheduled task creation for 'MyGoTask' could be generic and may require tuning based on environment specifics.\n// References: \n// - https://www.volexity.com/blog/2025/10/08/apt-meets-gpt-targeted-operations-with-untamed-llms/\n// - https://raw.githubusercontent.com/volexity/threat-intel/refs/heads/main/2025/2025-10-08%20UTA0388/rules.yar\n// - https://raw.githubusercontent.com/volexity/threat-intel/refs/heads/main/2025/2025-10-08%20UTA0388/iocs.csv\n// Malware Family: GOVERSHELL\n// MITRE ATT&CK: T1071.001, T1573.002, T1053.005, T1574.002, T1059.001\n(\n    let lookback = 7d;\n    // Define IOCs and known artifacts for GOVERSHELL / UTA0388\n    let GovershellDomains = dynamic([\n        \"azure-app.store\", \"twmoc.info\", \"windows-app.store\", \"cdn-apple.info\", \n        \"sliddeshare.online\", \"doccloude.info\", \"api.twmoc.info\", \"onedrive.azure-app.store\", \n        \"outlook.windows-app.store\"\n    ]);\n    let GovershellIPs = dynamic([\n        \"104.194.152.137\", \"104.194.152.152\", \"185.144.28.68\", \"31.192.234.22\", \n        \"45.141.139.222\", \"74.119.193.175\", \"80.85.156.234\", \"80.85.154.48\", \n        \"80.85.157.117\", \"82.118.16.173\"\n    ]);\n    let GovershellTaskNames = dynamic([\"SystemHealthMonitor\", \"MyGoTask\", \"UPnPHostUpdater\"]);\n    let GovershellDlls = dynamic([\"te32.dll\", \"te64.dll\", \"libcef.dll\"]);\n    let GovershellExeFlags = dynamic([\"-run\", \"cuVn\"]);\n    let GovershellUriPaths = dynamic([\n        \"/fgbwwezskdfbeadgalidegsdfhfhaWhatHappenedTask\", \n        \"/fgbwwezskdfbeadgalidegsdfhfhaWhatCanIdoResult\"\n    ]);\n    let GovershellHashes = dynamic([\n        \"2ffe1e4f4df34e1aca3b8a8e93eee34bfc4b7876cedd1a0b6ca5d63d89a26301\", \"4c041c7c0d5216422d5d22164f83762be1e70f39fb8a791d758a816cdf3779a9\",\n        \"53af82811514992241e232e5c04e5258e506f9bc2361b5a5b718b4e4b5690040\", \"88782d26f05d82acd084861d6a4b9397d5738e951c722ec5afed8d0f6b07f95e\",\n        \"998e314a8babf6db11145687be18dc3b8652a3dd4b36c115778b7ca5f240aae4\", \"a5ee55a78d420dbba6dec0b87ffd7ad6252628fd4130ed4b1531ede960706d2d\",\n        \"ad5718f6810714bc6527cc86d71d34d8c556fe48706d18b5d14f0261eb27d942\", \"fbade9d8a040ed643b68e25e19cba9562d2bd3c51d38693fe4be72e01da39861\",\n        \"7d7d75e4d524e32fc471ef2d36fd6f7972c05674a9f2bac909a07dfd3e19dd18\", \"0414217624404930137ec8f6a26aebd8a3605fe089dbfb9f5aaaa37a9e2bad2e\",\n        \"126c3d21a1dae94df2b7a7d0b2f0213eeeec3557c21717e02ffaed690c4b1dbd\", \"4ee77f1261bb3ad1d9d7114474a8809929f4a0e7f9672b19048e1b6ac7acb15c\"\n    ]);\n    // Logic for Network Connections to C2 infrastructure\n    let NetworkIOCs = DeviceNetworkEvents\n        | where Timestamp > ago(lookback)\n        | where RemoteUrl has_any (GovershellDomains) \n            or RemoteIP in (GovershellIPs) \n            or RemoteUrl has_any (GovershellUriPaths)\n        | extend DetectionMethod = \"Network Connection to GOVERSHELL C2\", MatchedIndicator = case(\n            RemoteUrl has_any (GovershellDomains), RemoteUrl,\n            RemoteIP in (GovershellIPs), RemoteIP,\n            RemoteUrl has_any (GovershellUriPaths), RemoteUrl,\n            \"Unknown\")\n        | project Timestamp, DeviceName, DetectionMethod, MatchedIndicator, InitiatingProcessFileName, InitiatingProcessCommandLine, RemoteUrl, RemoteIP, RemotePort;\n    // Logic for Persistence Creation via Scheduled Task\n    let PersistenceCreation = DeviceProcessEvents\n        | where Timestamp > ago(lookback)\n        | where FileName =~ \"schtasks.exe\" and ProcessCommandLine has \"/create\" and ProcessCommandLine has_any (GovershellTaskNames)\n        | extend DetectionMethod = \"GOVERSHELL Persistence Task Creation\", MatchedIndicator = extract(@'(?i)/TN\\s+(\"([^\"]+)\"|([^\\s]+))', 1, ProcessCommandLine)\n        | project Timestamp, DeviceName, DetectionMethod, MatchedIndicator, InitiatingProcessFileName = FileName, InitiatingProcessCommandLine = ProcessCommandLine;\n    // Logic for Malware Execution from persistence location\n    let MalwareExecution = DeviceProcessEvents\n        | where Timestamp > ago(lookback)\n        | where FolderPath startswith \"C:\\\\ProgramData\\\\\" and ProcessCommandLine has_any (GovershellExeFlags)\n        | extend DetectionMethod = \"GOVERSHELL Execution from Staging Directory\", MatchedIndicator = ProcessCommandLine\n        | project Timestamp, DeviceName, DetectionMethod, MatchedIndicator, InitiatingProcessFileName = FileName, InitiatingProcessCommandLine = ProcessCommandLine;\n    // Logic for File Creation (Payload Drop)\n    let FileEvents = DeviceFileEvents\n        | where Timestamp > ago(lookback)\n        | where SHA256 in (GovershellHashes)\n            or (FileName in (GovershellDlls) and (FolderPath has \"C:\\\\ProgramData\\\\\" or FolderPath endswith \"\\\\lib\\\\\"))\n        | extend DetectionMethod = \"GOVERSHELL Payload Dropped\", MatchedIndicator = iff(SHA256 in (GovershellHashes), SHA256, FileName)\n        | project Timestamp, DeviceName, DetectionMethod, MatchedIndicator, InitiatingProcessFileName, InitiatingProcessCommandLine, FileName, FolderPath, SHA256;\n    // Union all detection methods\n    union NetworkIOCs, PersistenceCreation, MalwareExecution, FileEvents\n)\n"
