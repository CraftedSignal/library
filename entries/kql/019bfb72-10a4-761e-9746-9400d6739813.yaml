id: 019bfb72-10a4-761e-9746-9400d6739813
name: Sentinel Data Connector Status Anomaly Detection
description: |-
    Detects anomalies in data connector log volumes by comparing current log counts to 30-day averages, identifying significant deviations.

    This query monitors the health and performance of data connectors feeding into Microsoft Sentinel by analyzing log volumes from various sources over the past 30 days. It calculates hourly averages to establish a baseline and compares these to logs from the last hour to identify significant deviations.

    Specifically, the query detects "No Logs" (indicating a complete halt in log transmission), "Critical Spike" and "Elevated Spike" (indicating significantly higher log volumes, suggesting potential security incidents or increased activity), and "Critical Drop" and "Elevated Drop" (indicating significantly lower log volumes, which could point to misconfigurations or data source issues). The query provides detailed alerts for these anomalies, helping administrators proactively address potential issues with data connectors.
query: "\n// ========================================\n// Build 30-Day Historical Baseline\n// ========================================\n\n// Collect logs from a broad set of tables that represent different data connectors.\nlet LogsCount = union isfuzzy=true\n        CommonSecurityLog, \n        AzureActivity, \n        AzureDiagnostics, \n        SecurityAlert, \n        SecurityIncident, \n        SigninLogs, \n        OfficeActivity, \n        DeviceNetworkEvents, \n        DeviceFileEvents, \n        DeviceImageLoadEvents, \n        DeviceProcessEvents, \n        DeviceRegistryEvents, \n        DeviceInfo\n    // Pull logs only from the past 30 days for baseline calculations.\n    | where TimeGenerated >= ago(30d)\n    // Map each table type to a corresponding Data Connector label.\n    | extend DataConnector = case(\n            Type == \"CommonSecurityLog\",      \"Common Event Format (CEF) via AMA\",\n            Type == \"AzureActivity\",          \"Azure Activity\",\n            Type == \"AzureDiagnostics\",       \"Azure DDoS Protection\",\n            Type == \"SecurityAlert\",          \"Microsoft Defender\",\n            Type == \"SecurityIncident\",       \"Microsoft Defender\",\n            Type == \"SigninLogs\",             \"Microsoft 365\",\n            Type == \"OfficeActivity\",         \"Microsoft 365\",\n            Type startswith \"Device\",         \"Microsoft Defender for Endpoint\",\n                                              \"Other\"\n        )\n    // Ignore rows where connector mapping failed.\n    | where isnotempty(DataConnector)\n    // Build a complete hourly time series across 30 days to form baselines.\n    // make-series ensures hours without logs become Count = 0 (important for \"No Logs\" detection).\n    | make-series Count = count()\n        default = 0\n        on TimeGenerated\n        from ago(30d) to ago(1h)\n        step 1h\n        by DataConnector\n    // Expand time series back into individual rows.\n    | mv-expand Count, TimeGenerated\n    // Reorder columns for readability and normalize types.\n    | project-reorder TimeGenerated, DataConnector, Count\n    | extend TimeGenerated = todatetime(TimeGenerated)\n    | extend Count = toint(Count);\n\n// Compute the average hourly log count for each hour-of-day per connector.\n// This captures normal patterns (e.g., daytime spikes, nighttime drops).\nlet HourlyAverages = LogsCount\n    | extend HourOfDay = datetime_part(\"hour\", TimeGenerated)\n    | summarize HourlyAvg = avg(Count)\n        by HourOfDay, DataConnector;\n\n// Identify the current hour and extract its hour-of-day.\nlet CurrentHour = bin(now(), 1h);\nlet CurrentHourOfDay = datetime_part(\"hour\", CurrentHour);\n\n// Retrieve the expected baseline for THIS hour-of-day (not used directly later, but retained).\nlet AverageForCurrentHour = toscalar(\n    HourlyAverages\n    | where HourOfDay == CurrentHourOfDay\n    | project HourlyAvg\n);\n\n// ========================================\n// Evaluate Log Volume During Last Hour\n// ========================================\n\n// Count logs produced during the last hour using the same union and connector mapping.\nlet LastHourLogsCount = union isfuzzy=true\n        CommonSecurityLog, \n        AzureActivity, \n        AzureDiagnostics, \n        SecurityAlert, \n        SecurityIncident, \n        SigninLogs, \n        OfficeActivity, \n        DeviceNetworkEvents, \n        DeviceFileEvents, \n        DeviceImageLoadEvents, \n        DeviceProcessEvents, \n        DeviceRegistryEvents, \n        DeviceInfo\n    // Only include logs generated in the past 60 minutes.\n    | where TimeGenerated >= ago(1h)\n    // Map to connector names for comparison against baseline.\n    | extend DataConnector = case(\n            Type == \"CommonSecurityLog\",      \"Common Event Format (CEF) via AMA\",\n            Type == \"AzureActivity\",          \"Azure Activity\",\n            Type == \"AzureDiagnostics\",       \"Azure DDoS Protection\",\n            Type == \"SecurityAlert\",          \"Microsoft Defender\",\n            Type == \"SecurityIncident\",       \"Microsoft Defender\",\n            Type == \"SigninLogs\",             \"Microsoft 365\",\n            Type == \"OfficeActivity\",         \"Microsoft 365\",\n            Type startswith \"Device\",         \"Microsoft Defender for Endpoint\",\n                                              \"Other\"\n        )\n    | where isnotempty(DataConnector)\n    // Hour-level make-series ensures the last hour always produces a count.\n    | make-series Count = count()\n        default = 0\n        on TimeGenerated \n        from ago(1h) to now()\n        step 1h\n        by DataConnector\n    | mv-expand Count, TimeGenerated\n    | project-reorder TimeGenerated, DataConnector, Count\n    | extend TimeGenerated = todatetime(TimeGenerated)\n    | extend Count = toint(Count);\n\n// NOTE: The commented-out margin-of-error variables below were intentionally disabled\n// due to incorrect math impacts. Threshold multipliers are used directly instead.\n\n/*\n    let MarginOfError50 = 0.50 * AverageForCurrentHour;\n    let UpperThreshold50 = AverageForCurrentHour + MarginOfError50;\n    let LowerThreshold50 = AverageForCurrentHour - MarginOfError50;\n    ...etc\n*/\n\n// ========================================\n// Join Baseline to the Last Hour and Classify Anomalies\n// ========================================\n\nLastHourLogsCount\n| extend HourOfDay = datetime_part(\"hour\", TimeGenerated)\n| join kind=inner (HourlyAverages) on HourOfDay, DataConnector\n// Evaluate how the last-hour log count compares to historical norms.\n| extend Alert =\n    iff(\n        DataConnector != \"Microsoft Defender\",       // Reduce noise for Defender tables.\n        case(\n            Count == 0,                    \"No Logs\",          // Complete stop in logging.\n            Count > (HourlyAvg * 1.5),     \"Critical Spike\",   // +50% above expected.\n            Count > (HourlyAvg * 1.25),    \"Elevated Spike\",   // +25% above expected.\n            Count < (HourlyAvg * 0.5),     \"Critical Drop\",    // -50% below expected.\n            Count < (HourlyAvg * 0.75),    \"Elevated Drop\",    // -25% below expected.\n                                       \"Normal\"\n        ),\n        // Simplified thresholds for Defender alerts (volume spikes are normal behavior).\n        case(\n            Count == 0, \"No Logs\",\n                        \"Normal\"\n        )\n    )\n| where Alert != \"Normal\"   // Only output anomalies.\n// Add rule metadata for Sentinel Analytics Rule integration.\n| extend\n    RuleName = \"Sentinel Data Connector Anomaly Detection\",\n    RuleDescription = \"Detects anomalies in data connector log volumes by comparing current log counts to 30-day averages, identifying significant deviations.\"\n| project \n    TimeGenerated,\n    DataConnector,\n    Count,\n    HourlyAvg,\n    Alert,\n    RuleName,\n    RuleDescription\n"
query_type: kql
severity: medium
tags:
    - kql
version: "3"
