id: 019cd69d-f5cb-711d-8545-b562dbf20ea6
name: ShadowAgent – Malicious Domain Communication
description: Detect connections to the known C2 domain.
query: "let ShadowAgentDomains = dynamic([\r\n\"www.mydropboxbackup.com\"\r\n]);\r\nDeviceNetworkEvents\r\n| where RemoteUrl has_any (ShadowAgentDomains)\r\n| project TimeGenerated, DeviceName, RemoteUrl, RemoteIP, InitiatingProcessFileName, InitiatingProcessCommandLine\r\n"
query_type: kql
severity: medium
tags:
    - kql
version: "1"
