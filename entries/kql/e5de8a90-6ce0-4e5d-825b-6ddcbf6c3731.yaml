id: e5de8a90-6ce0-4e5d-825b-6ddcbf6c3731
name: known vulnerable password managers for Clickfix
description: The attacker then overlays fake intrusive elements (e.g. cookie banners, popups, or CAPTCHA) so that the user’s clicks fall on the hidden password manager controls, resulting in completing the forms with sensitive information.
query: "// Track access to known vulnerable password managers\r\nlet pwManagers = dynamic([\r\n    \"Bitwarden\",\r\n    \"1Password\",\r\n    \"Enpass\",\r\n    \"iCloud Passwords\",\r\n    \"LastPass\",\r\n    \"LogMeOnce\"\r\n]);\r\nDeviceTvmSoftwareInventory\r\n| where SoftwareName has_any (pwManagers)\r\n| where SoftwareVersion has_any (\"8.11.4.27\",\"2025.7.0\",\"6.11.6\",\"3.1.25\",\"4.146.3\",\"7.12.4\")"
query_type: kql
severity: medium
tactics:
    - TA0043
techniques:
    - T1598
    - T1598.003
tags:
    - kql
author: Vikas Khandelwal
version: "1"
references:
    - https://www.bleepingcomputer.com/news/security/major-password-managers-can-leak-logins-in-clickjacking-attacks/
