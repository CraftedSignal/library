id: 1f01abfc-8eb7-4b69-b7c5-d8d8f55455db
name: RMM Hunting with Sentinel TI
description: 'KQL Query from file: RMM Hunting with Sentinel TI'
query: "\nThreatIntelIndicators\n| where TimeGenerated > ago(365d)\n| where now() between (ValidFrom .. ValidUntil)\n| where isnotempty(Data.labels)\n| mv-expand Data.labels\n| where Data_labels has \"mitre\"\n| extend MitreID = parse_json(tostring(Data_labels)).Alias\n| where MitreID == \"T1219\" // Remote Access Tools \n| summarize IOCcount=count() by ObservableKey, Confidence\n| sort by IOCcount desc \n"
query_type: kql
tactics:
    - TA0011
techniques:
    - T1219
    - T1219.002
    - T1219.003
tags:
    - kql
version: "1"
