id: 019b2792-4298-754d-8d3e-3e7e144516d6
name: Group Policy Discovery via Command Line and Network Activity
description: This rule detects attempts to discover Group Policy settings on a Windows system. It identifies the execution of common command-line interpreters (cmd.exe, powershell.exe, wmic.exe, rundll32.exe) followed by specific commands or PowerShell cmdlets used for GPO enumeration. This includes native Windows commands like 'gpresult' and 'secedit', registry queries for policy settings, and PowerShell cmdlets such as 'Get-GPO' and 'Get-GPResultantSetOfPolicy'. Additionally, it looks for LDAP-related commands or patterns ('ldapsearch', 'groupPolicyContainer') that might indicate GPO discovery via directory services. The rule also correlates these process events with network connections to SYSVOL shares or LDAP ports (389, 636) to further confirm GPO-related activity.
query: "// MITRE T1615 - Group Policy Discovery\r\nlet Lookback = 1d;\r\nDeviceProcessEvents\r\n| where Timestamp >= ago(Lookback)\r\n// Common shells - LOLBins used during discovery\r\n| where FileName in~ (\r\n    \"cmd.exe\",\"powershell.exe\",\"pwsh.exe\",\r\n    \"wmic.exe\",\"rundll32.exe\"\r\n)\r\n// High-confidence Group Policy discovery commands\r\n| where (\r\n    // Native GPO & RSOP enumeration\r\n    ProcessCommandLine has_any (\r\n        \"gpresult\",\r\n        \"gpresult /r\",\r\n        \"gpresult /z\",\r\n        \"rsop.msc\",\r\n        \"secedit /export\",\r\n        \"secedit /analyze\"\r\n    )\r\n    // Registry-based policy discovery\r\n    or ProcessCommandLine has_any (\r\n        @\"reg query HKLM\\Software\\Policies\",\r\n        @\"reg query HKCU\\Software\\Policies\"\r\n    )\r\n    // PowerShell GPO discovery\r\n    or ProcessCommandLine has_any (\r\n        \"Get-GPO\",\r\n        \"Get-GPInheritance\",\r\n        \"Get-GPResultantSetOfPolicy\",\r\n        \"Get-DomainGPO\",\r\n        \"Get-DomainGPOLocalGroup\"\r\n    )\r\n    or ProcessCommandLine has_any (\r\n        \"ldapsearch\",  // For potential LDAP tools\r\n        \"groupPolicyContainer\"  // LDAP filter patterns\r\n    )\r\n)\r\n// Reduce OS / admin noise\r\n| where InitiatingProcessFileName !in~ (\r\n    \"gpscript.exe\",\r\n    \"svchost.exe\",\r\n    \"mmc.exe\",\r\n    \"Microsoft.Management.Infrastructure.Native.exe\"\r\n)\r\n// Enrich with SYSVOL access\r\n| join kind=leftouter (\r\n    DeviceNetworkEvents\r\n    | where Timestamp >= ago(Lookback)\r\n    | where RemotePort in (445, 389, 636)\r\n    | where RemoteUrl has_any (@\"\\SYSVOL\\\", \"groupPolicyContainer\")  // Added LDAP object targeting\r\n    | project DeviceId, RemoteIP, RemoteUrl, RemotePort\r\n) on DeviceId\r\n| extend RarityScore = rand()  // Placeholder; replace with actual rarity logic if using entity analytics\r\n| project Timestamp, DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine, RemoteIP, RemoteUrl, RemotePort, RarityScore\r\n\r\n| summarize Count=count() by DeviceName, FileName, InitiatingProcessFileName, AccountName, ProcessCommandLine\r\n"
query_type: kql
severity: medium
