id: 019c91c8-81ea-7408-9432-2222d2d14973
name: HoneyMyte Exfiltration to Pixeldrain
description: Detects data exfiltration patterns used by HoneyMyte scripts. The rule monitors for rar.exe compressing files with a specific password or curl.exe uploading data to the Pixeldrain file-sharing service.
query: "// Name: HoneyMyte Exfiltration to Pixeldrain\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-02-24\r\n// Description: Detects data exfiltration patterns used by HoneyMyte scripts. The rule monitors for rar.exe compressing files with a specific password or curl.exe uploading data to the Pixeldrain file-sharing service.\r\n// False Positive Sensitivity: Medium\r\n// References: https://securelist.com/honeymyte-updates-coolclient-uses-browser-stealers-and-scripts/118664/\r\n// Tactics: Exfiltration, Collection\r\n// RelevantTechniques: T1560.001, T1567.002\r\nDeviceProcessEvents\r\n| where\r\n    // Detects rar.exe used with the specific password \"PIXELDRAIN\" for archiving.\r\n    (FileName =~ \"rar.exe\" and ProcessCommandLine has \"-hpPIXELDRAIN\")\r\n    or\r\n    // Detects curl.exe uploading files to the Pixeldrain API endpoint.\r\n    // FP Note: While specific, legitimate use of Pixeldrain in a corporate environment is rare but possible.\r\n    (FileName =~ \"curl.exe\" and ProcessCommandLine has \"pixeldrain.com/api/file/\")\r\n| project\r\n    TimeGenerated,\r\n    DeviceName,\r\n    AccountName,\r\n    FileName,\r\n    ProcessCommandLine,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessCommandLine,\r\n    ReportId"
query_type: kql
severity: medium
tactics:
    - TA0009
    - TA0010
techniques:
    - T1560.001
    - T1567.002
tags:
    - kql
author: Ethan Andrews
version: "2"
references:
    - https://securelist.com/honeymyte-updates-coolclient-uses-browser-stealers-and-scripts/118664/
