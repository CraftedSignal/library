name: Detection of Malicious Code Signing Certificates
description: This rule identifies the use of specific malicious code signing certificates by matching their SHA1 thumbprints against a predefined list. These certificates are known to be associated with various threat actors or malicious software, indicating potential supply chain compromise or the use of signed malware.
query: "\r\n//https://www.nextron-systems.com/2026/01/14/free-converter-software-convert-any-system-from-clean-to-infected-in-seconds/\r\nlet MaliciousThumbprints = dynamic([\r\n    \"A6BD7B323D3135E4F13F5C198EA23163D622B538\", // BLUE TAKIN LTD\r\n    \"F38B5E3A3A9807A36BC947B75BF14BC8091C83A7\", // TAU CENTAURI LTD\r\n    \"8D4FB4A66FD31E36515B5E54D48F31B7715B8AF9\", // SPARROW TIDE LTD\r\n    \"D8263A1EA0C4D119C5346E1B26200377283774F4\", // TECHNODENIS LTD\r\n    \"02C4B0C7438F3AE718FFA47137B75151713F38EA\", // AMARYLLIS SIGNAL LTD\r\n    \"3B5253A4853056458675B5CB1903C05BC2DBBD1B\", // BLACK INDIGO LTD\r\n    \"ECE7440C53C235E5E69E57EACB9250154AF20DE0\", // LONG SOUND LTD\r\n    \"4217BAC417F82CC3416ACD4E3954DD17A1E8E23D\", // OR KAHOL LTD\r\n    \"FE8AC01467F8E21806BA338E69DF21B5B7E74E78\", // Astro Bright LTD\r\n    \"E3EFCCB48A282FE2091CBA889D79BF65DEF49607\"  // Mainstay Crypto LLC\r\n]);\r\nDeviceFileCertificateInfo\r\n| where SignerHash in~ (MaliciousThumbprints)\r\n| project Timestamp, DeviceName, SHA1, SignerHash, Signer, CertificateCreationTime"
