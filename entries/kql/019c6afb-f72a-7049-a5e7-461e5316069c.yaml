id: 019c6afb-f72a-7049-a5e7-461e5316069c
name: BQTLock UAC Bypass via Fodhelper
description: Detects when fodhelper.exe, a legitimate Windows utility, is used to spawn processes other than cmd.exe or conhost.exe. This behavior is commonly associated with UAC bypass techniques where fodhelper.exe is abused to execute arbitrary commands with elevated privileges without a UAC prompt.
query: "DeviceProcessEvents\r\n| where TimeGenerated >=ago(30d)\r\n| where InitiatingProcessFileName =~ \"fodhelper.exe\"\r\n| where not(FileName in~ (\"cmd.exe\", \"conhost.exe\"))\r\n| project\r\n    TimeGenerated,\r\n    DeviceName,\r\n    AccountName,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessCommandLine,\r\n    FileName,\r\n    FolderPath,\r\n    ProcessCommandLine\r\n"
query_type: kql
severity: medium
tactics:
    - TA0004
    - TA0005
techniques:
    - T1548.002
tags:
    - kql
version: "1"
