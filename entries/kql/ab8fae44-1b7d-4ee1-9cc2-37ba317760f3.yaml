id: ab8fae44-1b7d-4ee1-9cc2-37ba317760f3
name: Potentially Suspicious Command Executed via Run Box
description: KQL Query
query: "DeviceRegistryEvents \r\n| extend RegistryKey = strcat_delim(@'\\', RegistryKey, RegistryValueName)  |\r\n where (RegistryKey contains @'\\Microsoft\\Windows\\CurrentVersion\\Explorer\\RunMRU' and \r\n ((((RegistryValueData contains @'powershell' or RegistryValueData contains @'pwsh') or (RegistryValueType contains @'powershell' or RegistryValueType contains @'pwsh')) and \r\n ((RegistryValueData contains @' -e ' or RegistryValueData contains @' -ec ' or RegistryValueData contains @' -en ' or RegistryValueData contains @' -enc ' or RegistryValueData contains @' -enco' or RegistryValueData contains @'ftp' \r\n or RegistryValueData contains @'Hidden' or RegistryValueData contains @'http' or RegistryValueData contains @'iex' or RegistryValueData contains @'Invoke-') or (RegistryValueType contains @' -e ' or RegistryValueType contains @' -ec ' \r\n or RegistryValueType contains @' -en ' or RegistryValueType contains @' -enc ' or RegistryValueType contains @' -enco' or RegistryValueType contains @'ftp' or RegistryValueType contains @'Hidden' or RegistryValueType contains @'http' \r\n or RegistryValueType contains @'iex' or RegistryValueType contains @'Invoke-'))) or ((RegistryValueData contains @'wmic' or RegistryValueType contains @'wmic') and ((RegistryValueData contains @'shadowcopy' or \r\n RegistryValueData contains @'process call create') or (RegistryValueType contains @'shadowcopy' or RegistryValueType contains @'process call create')))))"
query_type: kql
severity: medium
tactics:
    - TA0002
techniques:
    - T1204
tags:
    - kql
version: "1"
references:
