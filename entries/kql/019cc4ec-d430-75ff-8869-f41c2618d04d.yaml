id: 019cc4ec-d430-75ff-8869-f41c2618d04d
name: FakeGit - StealC Browser Module Detected
description: This rule detects the presence of a specific browser credential extraction module associated with the StealC information stealer, as used in the FakeGit campaign. The detection is based on the module's SHA256 hash.
query: "// Name: FakeGit - StealC Browser Module Detected\r\n// Author: Brandon + detections.ai\r\n// Date: 2026-03-06\r\n// Description: This rule detects the presence of a specific browser credential extraction module associated with the StealC information stealer, as used in the FakeGit campaign. The detection is based on the module's SHA256 hash.\r\n// False Positives: Low. This is a hash-based detection for a known malicious component.\r\n// Tactics: Credential Access\r\n// Techniques: T1555.003, T1539\r\n// References: https://www.derp.ca/research/fakegit-luajit-github-campaign/\r\n\r\n// StealCHash = \"61ab1d22949eac0582e989ae065ec4caee9ac99998276317edda96735cd311fb\";\r\n\r\n// Search for the file being created on disk or loaded as a module into a process\r\nunion DeviceFileEvents, DeviceImageLoadEvents\r\n| where SHA256 == \"61ab1d22949eac0582e989ae065ec4caee9ac99998276317edda96735cd311fb\"\r\n| extend EventType = Type\r\n| project\r\n    Timestamp,\r\n    DeviceName,\r\n    EventType,\r\n    FileName,\r\n    FolderPath,\r\n    SHA256,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessCommandLine,\r\n    InitiatingProcessParentFileName,\r\n    InitiatingProcessSHA256\r\n"
query_type: kql
severity: medium
tactics:
    - TA0006
techniques:
    - T1555.003
    - T1539
tags:
    - kql
version: "2"
references:
    - https://www.derp.ca/research/fakegit-luajit-github-campaign/
