id: 159b803c-6331-4897-a5c4-dda70b631290
name: Hackers Exploit Cloudflare Tunnels to Infect Windows Systems With Python Malware
description: This rule detects potential malware infections and command and control activity by correlating email, endpoint file, and network events with indicators of compromise (IOCs) sourced from an external OSINT feed. It specifically looks for SHA256 hashes in email attachments, domains and URLs in email links, MD5, SHA1, and SHA256 hashes of created files on endpoints, and IP addresses and domains in network connections (both direct and HTTP inspected connections). The rule aims to identify initial access, execution, and command and control phases of an attack, potentially involving Cloudflare Tunnels as suggested by the rule's title and the OSINT source.
query: "// ============================================================================\r\n// Hackers Exploit Cloudflare Tunnels to Infect Windows Systems With Python Malware\r\n// Author: KillBillKill98\r\n// Last Updated: 2025-09-18\r\n// ============================================================================\r\n// Tactic(s): Initial Access (TA0001), Execution (TA0002), Command & Control (TA0011)\r\n// Technique(s): Phishing (T1566), Drive-by Compromise (T1189), File and Directory Discovery (T1083), Network Service Scanning (T1046)\r\n// Description & Rationale:\r\n//  - Pulls OSINT IOCs from an external CSV repository\r\n//  - Scans EmailAttachments, Email URLs, Endpoint file events, and Network events\r\n//  - Correlates detections across sources and indicators\r\n// ============================================================================\r\n\r\n// Define the base OSINT external data once\r\nlet WeeklyOSINT = externaldata(Type:string, Value:string, Source:string)\r\n[h'https://raw.githubusercontent.com/SlimKQL/Hunting-Queries-Detection-Rules/refs/heads/main/IOC/trycloudflare.csv'];\r\n\r\n// Define each Scan function, nesting the OSINT definitions it needs\r\nlet ScanEmailAttachments = () {\r\n    // These OSINT definitions are now local to this function's scope\r\n    let OSINTSHA256 = WeeklyOSINT | where Type == \"hash_sha256\" | project Value;\r\n\r\n    EmailAttachmentInfo\r\n    | where Timestamp > ago(30d)\r\n    | where SHA256 has_any(OSINTSHA256)\r\n    | extend IndicatorType = \"FileHash_SHA256\", IndicatorValue = SHA256\r\n    | project Timestamp, IndicatorType, IndicatorValue, FileName, SenderMailFromAddress, RecipientEmailAddress, NetworkMessageId, SHA256, SourceTable=\"EmailAttachmentInfo\"\r\n};\r\n\r\nlet ScanEmailURLs = () {\r\n    // Nesting the relevant OSINT here\r\n    let OSINTDOMAIN = WeeklyOSINT | where Type == \"domain\" | project Value;\r\n    let OSINTURL = WeeklyOSINT | where Type == \"url\" | project Value;\r\n\r\n    EmailUrlInfo\r\n    | where Timestamp > ago(30d)\r\n    | where UrlDomain has_any(OSINTDOMAIN) or Url has_any(OSINTURL)\r\n    | extend IndicatorType = iif(isnotempty(UrlDomain) and UrlDomain has_any(OSINTDOMAIN), \"Domain\", \"URL\"),\r\n             IndicatorValue = iif(isnotempty(UrlDomain) and UrlDomain has_any(OSINTDOMAIN), UrlDomain, Url)\r\n    | project Timestamp, IndicatorType, IndicatorValue, Url, UrlDomain, SenderMailFromAddress, RecipientEmailAddress, NetworkMessageId, SourceTable=\"EmailUrlInfo\"\r\n};\r\n\r\nlet ScanEndpointFiles = () {\r\n    // Nesting the relevant OSINT here\r\n    let OSINTMD5 = WeeklyOSINT | where Type == \"hash_md5\" | project Value;\r\n    let OSINTSHA1 = WeeklyOSINT | where Type == \"hash_sha1\" | project Value;\r\n    let OSINTSHA256 = WeeklyOSINT | where Type == \"hash_sha256\" | project Value;\r\n\r\n    DeviceFileEvents\r\n    | where Timestamp > ago(30d)\r\n    | where ActionType == \"FileCreated\"\r\n    | where MD5 has_any(OSINTMD5) or SHA1 has_any(OSINTSHA1) or SHA256 has_any(OSINTSHA256)\r\n    | extend IndicatorType = case(\r\n        MD5 has_any(OSINTMD5), \"FileHash_MD5\",\r\n        SHA1 has_any(OSINTSHA1), \"FileHash_SHA1\",\r\n        SHA256 has_any(OSINTSHA256), \"FileHash_SHA256\",\r\n        \"Unknown\" // Fallback\r\n        ),\r\n        IndicatorValue = case(\r\n        MD5 has_any(OSINTMD5), MD5,\r\n        SHA1 has_any(OSINTSHA1), SHA1,\r\n        SHA256 has_any(OSINTSHA256), SHA256,\r\n        \"Unknown\"\r\n        )\r\n    | project Timestamp, IndicatorType, IndicatorValue, DeviceName, InitiatingProcessFileName, FolderPath, FileName, MD5, SHA1, SHA256, SourceTable=\"DeviceFileEvents\"\r\n};\r\n\r\nlet ScanEndpointNetwork1 = () {\r\n    // Nesting the relevant OSINT here\r\n    let OSINTIP = WeeklyOSINT | where Type == \"ip\" | project Value;\r\n    let OSINTDOMAIN = WeeklyOSINT | where Type == \"domain\" | project Value;\r\n\r\n    DeviceNetworkEvents\r\n    | where Timestamp > ago(30d)\r\n    | where ActionType == \"ConnectionSuccess\"\r\n    | where RemoteIP has_any(OSINTIP) or RemoteUrl has_any(OSINTDOMAIN)\r\n    | extend IndicatorType = iif(isnotempty(RemoteIP) and RemoteIP has_any(OSINTIP), \"IPAddress\", \"Domain\"),\r\n             IndicatorValue = iif(isnotempty(RemoteIP) and RemoteIP has_any(OSINTIP), RemoteIP, RemoteUrl)\r\n    | project Timestamp, IndicatorType, IndicatorValue, DeviceName, InitiatingProcessFileName, RemoteIP, RemoteUrl, LocalIP, RemotePort, SourceTable=\"DeviceNetworkEvents_Connection\"\r\n};\r\n\r\nlet ScanEndpointNetwork2 = () {\r\n    // Nesting the relevant OSINT here\r\n    let OSINTDOMAIN = WeeklyOSINT | where Type == \"domain\" | project Value;\r\n\r\n    DeviceNetworkEvents\r\n    | where Timestamp > ago(30d)\r\n    | where ActionType == \"HttpConnectionInspected\"\r\n    | extend ConnectInfo = todynamic(AdditionalFields)\r\n    | extend HttpHost = ConnectInfo.host\r\n    | where HttpHost has_any(OSINTDOMAIN)\r\n    | extend IndicatorType = \"Domain\", IndicatorValue = HttpHost\r\n    | project Timestamp, IndicatorType, IndicatorValue, DeviceName, InitiatingProcessFileName, RemoteIP, HttpHost, SourceTable=\"DeviceNetworkEvents_HTTP\"\r\n};\r\n\r\n// Explicitly call each let function in the union\r\nunion ScanEmailAttachments(), ScanEmailURLs(), ScanEndpointFiles(), ScanEndpointNetwork1(), ScanEndpointNetwork2()\r\n\r\n| order by Timestamp desc\r\n"
