id: 019cbfe5-6239-7700-830a-d36e9b1f3a9b
name: Crytox Ransomware Encrypted File Creation
description: Detects the creation of files with the '.waiting' or '.wait' extension, which are appended by Crytox ransomware to encrypted files. This rule specifically looks for file creation events where the filename ends with these characteristic extensions, indicating potential ransomware activity.
query: |
    // title: Crytox Encrypted File Creation
    // id: 3152e55e-e108-4e6a-a2cb-34a6d34b004a
    // status: experimental
    // description: Detects the creation of files with the '.waiting' or '.wait' extension, which are appended by Crytox ransomware to encrypted files.
    // author: detections.ai
    // references:
    //   - https://www.zscaler.com/es/blogs/security-research/technical-analysis-crytox-ransomware
    // date: 2026-03-05
    // tags:
    //   - attack.impact
    //   - attack.t1486
    DeviceFileEvents
    // The detection is focused on file creation events.
    | where ActionType == "FileCreated"
    // Detects files being created with extensions used by Crytox ransomware.
    | where FileName endswith ".waiting" or FileName endswith ".wait"
query_type: kql
severity: medium
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - kql
version: "3"
references:
    - https://www.zscaler.com/es/blogs/security-research/technical-analysis-crytox-ransomware
