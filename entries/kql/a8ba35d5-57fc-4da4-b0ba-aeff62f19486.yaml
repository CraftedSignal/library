id: a8ba35d5-57fc-4da4-b0ba-aeff62f19486
name: Suspicious Command In RunMRU via ClickFix Technique
description: Detects suspicious commands written to the RunMRU registry key. This is a characteristic of the "ClickFix" social engineering technique, where a user is tricked into copying a malicious command and executing it via the Windows Run dialog (Win+R). This technique is notably used by Lumma Stealer affiliates.
query: |-
    DeviceRegistryEvents
    | where (InitiatingProcessFolderPath endswith "\\explorer.exe" and RegistryKey contains "\\Software\\Microsoft\\Windows\\CurrentVersion\\Explorer\\RunMRU") and ((RegistryValueData contains "mshta" and RegistryValueData contains "http") or (RegistryValueData startswith "powershell" and (RegistryValueData contains " -e " or RegistryValueData contains " -enc " or RegistryValueData contains " -encodedcommand " or RegistryValueData contains " -W Hidden" or RegistryValueData contains " -w h" or RegistryValueData contains " -NoP " or RegistryValueData contains "Invoke-Expression" or RegistryValueData contains "iex" or RegistryValueData contains "DownloadString" or RegistryValueData contains "DownloadFile" or RegistryValueData contains "FromBase64String" or RegistryValueData contains "Invoke-WebRequest" or RegistryValueData contains "iwr" or RegistryValueData contains "irm ")) or (RegistryValueData contains "✅" or RegistryValueData contains "bitsadmin" or RegistryValueData contains "forfiles" or RegistryValueData contains "curl" or RegistryValueData contains "msiexec" or RegistryValueData contains "javascript:" or RegistryValueData contains "vbscript:"))
query_type: kql
severity: medium
tags:
    - kql
version: "1"
