query: "let shoulder = 3d; // give me some data over last 3 days\r\nDeviceEvents // whats taking place in our devices\r\n| where TimeGenerated >= ago(shoulder) // looking over our shoulder X days from let statement\r\n// | summarize by ActionType // Use this to get more ActionTypes while commenting out everything else below\r\n// Lots to consider from actions so targeting this list for now, potentially adding more. Drop the comments to apply the ActionType Filter\r\n| where ActionType in (\"RemoteWipe\", \"Wipe\", \"Retire\", \"Delete\", \"RemoteLock\", \"ResetPasscode\", \"DisableLostMode\", \"EnableLostMode\", \"Fullscan\", \"Quickscan\", \"UpdateWindows\", \"Sync\", \"Rename\")\r\n// need you to step outside this query and look up fields with potential Ip coming from remote locations\r\n| extend Ip = coalesce(RemoteIP, ProcessRemoteSessionIP, InitiatingProcessRemoteSessionIP, FileOriginIP)\r\n| where isnotempty(Ip)\r\n| where Ip has_any (\"45.159.\",\"169.150.\",\"185.199.\",\"94.182.\", \"185.117.\", \"188.92.255.\") // sketch ball IPs associated with Iranian activity and Handala's sloppy work noted in Jan\r\n| summarize worries = count(), IP_list = make_set(Ip) by ActionType, InitiatingProcessAccountUpn, bin(TimeGenerated, 5m) // rack em and stack em please\r\n| where worries >= 3 // nail biting on 3 fingers\r\n| order by worries desc // give me order on the worries"
