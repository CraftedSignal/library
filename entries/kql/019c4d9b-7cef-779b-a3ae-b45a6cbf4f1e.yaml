id: 019c4d9b-7cef-779b-a3ae-b45a6cbf4f1e
name: Shadow Campaigns TGR-STA-1030 C2 DNS Activity
description: This rule detects DNS queries to known command and control (C2) domains associated with the 'Shadow Campaigns' (TGR-STA-1030) threat group. Specifically, it looks for DNS queries ending in '.me' or '.live' that match a list of hardcoded domain patterns identified by Unit 42 as being used by this threat actor for C2 communications.
query: |
    # Shadow Campaigns TGR-STA-1030 C2 domains. Unit 42.
    # Author: Daniel Jeremiah | Date: 2026/02/11
    # Ref: https://unit42.paloaltonetworks.com/shadow-campaigns-uncovering-global-espionage/

    alert dns any any -> any any (msg:"ET MALWARE Shadow Campaigns TGR-STA-1030 C2 DNS"; dns.query; content:".me"; pcre:"/(gouvn|dog3rj|zamstats|msonline\.help|pickupweb|servgate|abwxjp5|emezonhe|pr0fu5a|zrheblirsy)\.me/i"; reference:url,unit42.paloaltonetworks.com/shadow-campaigns-uncovering-global-espionage/; sid:21020901; rev:1;)
    alert dns any any -> any any (msg:"ET MALWARE Shadow Campaigns TGR-STA-1030 C2 DNS brackusi0n q74vn"; dns.query; content:".live"; pcre:"/(brackusi0n|q74vn)\.live/i"; reference:url,unit42.paloaltonetworks.com/shadow-campaigns-uncovering-global-espionage/; sid:21020902; rev:1;)
query_type: kql
tags:
    - kql
version: "2"
