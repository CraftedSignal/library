id: edac8717-394b-4ea3-bdc5-8740e009d43b
name: CitrixBleed Vulnerability CVE-2025-5777 Detection
description: Parses and projects data from a raw text file related to the CitrixBleed vulnerability CVE-2025-5777, listing IPs, domains, versions, and status details. Rule is valid.
query: "let CitrixBleedParsed = externaldata(rawLine:string)\r\n[\r\n  'https://raw.githubusercontent.com/GossiTheDog/scanning/main/CVE-2025-5777-CitrixBleed2-ElectricBoogaloo-patching.txt'\r\n]\r\nwith (\r\n  format='txt',\r\n  rowterminator='\\n'\r\n)\r\n| where isnotempty(rawLine)\r\n| parse rawLine with IP: string \",\" WildcardDomain: string \",\" Domain: string \",\" Version: string \",\" Status: string\r\n| project IP, WildcardDomain, Domain, Version, Status;\r\nCitrixBleedParsed"
query_type: kql
version: "1"
