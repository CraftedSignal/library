id: 019c248f-9524-74cc-8465-a2dcc0d08b59
name: Evasive Panda APT Activity
description: This rule detects activities associated with the Evasive Panda APT, specifically looking for network connections to known malicious IP addresses, the creation or modification of specific files and processes related to 'sohuva_update' and 'evteng.exe' in 'Microsoft\MF' or 'Microsoft\eHome' directories, and network connections to specific URLs containing 'dictionary.com' or 'p2p.hd.sohu.com' patterns. These indicators are linked to the MgBot malware and DNS poisoning tactics used by the Evasive Panda APT group.
query: |
    // Evasive Panda APT (MgBot, DNS poisoning). Ref: https://securelist.com/evasive-panda-apt/118576/

    DeviceNetworkEvents
    | where ActionType in ("ConnectionSuccess", "ConnectionAttempt")
    | where RemoteIP in (dynamic([
        "60.28.124.21", "123.139.57.103", "140.205.220.98", "112.80.248.27", "116.213.178.11",
        "60.29.226.181", "58.68.255.45", "61.135.185.29", "103.27.110.232", "117.121.133.33",
        "139.84.170.230", "103.96.130.107", "158.247.214.28", "106.126.3.78", "106.126.3.56"
    ]))
    | project Timestamp, DeviceName, RemoteIP, RemoteUrl, InitiatingProcessFileName, InitiatingProcessCommandLine

    DeviceProcessEvents
    | where ActionType == "ProcessCreated"
    | where FileName =~ "sohuva_update_10.2.29.1-lup-s-tp.exe" or FileName startswith "sohuva_update_"
    | project Timestamp, DeviceName, FileName, ProcessCommandLine, InitiatingProcessFileName, InitiatingProcessCommandLine

    DeviceProcessEvents
    | where ActionType == "ProcessCreated"
    | where FileName =~ "evteng.exe" and (ProcessCommandLine contains "eHome" or ProcessCommandLine contains "Microsoft\\MF")
    | project Timestamp, DeviceName, FileName, ProcessCommandLine, InitiatingProcessFileName, InitiatingProcessCommandLine

    DeviceFileEvents
    | where ActionType in ("FileCreated", "FileModified")
    | where FolderPath contains "Microsoft\\MF"
    | project Timestamp, DeviceName, FileName, FolderPath, InitiatingProcessFileName, InitiatingProcessCommandLine

    DeviceFileEvents
    | where ActionType in ("FileCreated", "FileModified")
    | where FolderPath contains "Microsoft\\eHome" and (FileName =~ "status.dat" or FileName =~ "perf.dat")
    | project Timestamp, DeviceName, FileName, FolderPath, InitiatingProcessFileName, InitiatingProcessCommandLine

    DeviceNetworkEvents
    | where ActionType in ("ConnectionSuccess", "ConnectionAttempt")
    | where RemoteUrl contains "dictionary.com" and RemoteUrl contains "image?id=" and RemoteUrl contains "dict-homepage.png"
    | project Timestamp, DeviceName, RemoteIP, RemoteUrl, InitiatingProcessFileName, InitiatingProcessCommandLine

    DeviceNetworkEvents
    | where ActionType in ("ConnectionSuccess", "ConnectionAttempt")
    | where RemoteUrl contains "p2p.hd.sohu.com" and RemoteUrl contains "/foxd/gz"
    | where RemoteUrl contains "sohunewplayer" or RemoteUrl contains "new=/66/157/" or RemoteUrl contains "ovztb0wktdmakeszwh2eha"
    | project Timestamp, DeviceName, RemoteIP, RemoteUrl, InitiatingProcessFileName, InitiatingProcessCommandLine
query_type: kql
severity: medium
tags:
    - kql
version: "4"
references:
    - ' https://securelist.com/evasive-panda-apt/118576/'
