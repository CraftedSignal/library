id: 019bd72d-3a63-770c-a02a-8da126623683
name: Cryptocurrency Mining Pool Connection Detected
description: This rule detects network connections to known cryptocurrency mining pools or domains associated with cryptocurrency mining activities. It specifically looks for keywords like 'miningpool', 'stratum', 'xmr', 'ethash', 'moneropool' in the remote URL or specific IP addresses like 'connect.moneropool.com' and 'pool.supportxmr.com'. This activity often indicates unauthorized resource hijacking (cryptojacking) on the affected device.
query: "\r\nDeviceNetworkEvents\r\n| where RemoteUrl has_any (\"miningpool\", \"stratum\", \"xmr\", \"ethash\", \"moneropool\")\r\n      or RemoteIP in (\"connect.moneropool.com\", \"pool.supportxmr.com\")\r\n| where RemoteUrl !contains \"microsoft.com\" and RemoteUrl !contains \"Filestreaming\"\r\n| project Timestamp, DeviceName, RemoteUrl, RemoteIP, RemotePort, InitiatingProcessFileName\r\n\r\n"
query_type: kql
severity: medium
tactics:
    - TA0040
techniques:
    - T1496
    - T1496.001
tags:
    - kql
version: "1"
