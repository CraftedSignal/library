id: 019b0dcd-205d-7468-b1b4-e21b2beac4ca
name: File Creation
description: This detection is a simple query for file creation based on the filename and the device where the file was created.
query: "// Query for file searches\r\n// Can comment out lines not needed using //\r\n// As written below this will search DeviceFileEvents\r\n// for files created within the last 30 days that match the parameters\r\n// Added Dec 2025\r\nDeviceFileEvents \r\n| where  Timestamp >= ago(30d)\r\n| where ActionType in (\"FileCreated\")\r\n| where FileName contains \"Employee Award\" \r\n| where DeviceName contains \"mycomputer\""
query_type: kql
severity: medium
tags:
    - kql
author: Tony D
version: "1"
