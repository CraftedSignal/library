id: b5861874-d101-46da-b659-2c4e12ee8644
name: Critical OpenSSH Vulnerabilities – Patch Prioritization
description: KQL Query
query: "// Critical OpenSSH Vulnerabilities – Patch Prioritization\n\n// The following KQL identified all your internet facing OpenSSH servers vulnerable to CVE-2025-26466 and CVE-2025-26465. You should get your IT infra engineers to prioritize patching these servers to version 9.9p2 that is released on 18th Feb 2025. Let's Go ! \U0001F6E1️\n\n// https://www.openwall.com/lists/oss-security/2025/02/18/1\n// https://www.openssh.com/releasenotes.html\n\nlet InternetFacingEP =\nDeviceInfo\n| where IsInternetFacing == true and isnotempty(PublicIP)\n| distinct DeviceId;\nlet OpenSSHFixedVersion = dynamic([\"9.9p2\"]); // https://www.openssh.com/releasenotes.html\nDeviceTvmSoftwareInventory\n| where SoftwareName has \"openssh\"\n| where not (SoftwareVersion has_any(OpenSSHFixedVersion))\n| where DeviceId has_any(InternetFacingEP)\n"
query_type: kql
tags:
    - kql
version: "1"
