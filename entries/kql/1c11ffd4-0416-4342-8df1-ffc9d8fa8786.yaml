id: 1c11ffd4-0416-4342-8df1-ffc9d8fa8786
name: Suspicious MSHTA Usage
description: 'KQL Query from file: Suspicious MSHTA Usage'
query: "// I have found in the various environments I have been in that mshta in the modern world is far and few between. \n// More often than not, it is used for malicious activity over odd edge cases.\n// Edge cases can be tuned out and this could become an effective detection for most environments.\n\nDeviceProcessEvents\n| where ProcessCommandLine contains \"mshta.exe\"\n| project Timestamp, AccountName, InitiatingProcessFileName, ProcessCommandLine, DeviceId, ReportId\n| sort by Timestamp desc\n"
query_type: kql
tactics:
    - TA0005
    - TA0002
techniques:
    - T1170
    - T1218.005
    - T1218
tags:
    - kql
version: "1"
