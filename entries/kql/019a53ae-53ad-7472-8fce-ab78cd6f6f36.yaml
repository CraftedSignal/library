id: 019a53ae-53ad-7472-8fce-ab78cd6f6f36
name: Entra Cross-Tenant Modifications
description: This detection looks for administrative activity that creates or updates Cross-Tenant Access Settings or Cross-Tenant Identity Synchronization Settings in Microsoft Entra ID (Azure AD). These settings control how identities, claims, and trust relationships are shared between Microsoft Entra tenants.
query: "// This detection looks for administrative activity that creates or updates Cross-Tenant Access Settings or Cross-Tenant Identity Synchronization Settings in Microsoft Entra ID (Azure AD). These settings control how identities, claims, and trust relationships are shared between Microsoft Entra tenants.\r\n\r\n// An attacker with sufficient privileges—typically Global Administrator, Entra ID Administrator, or Cross-Tenant Access Administrator—may abuse these configurations to establish persistent access or trust relationships between a compromised tenant and a controlled (attacker) tenant.\r\n// By adding or modifying a partner tenant configuration, the threat actor can enable automatic synchronization of user or group objects, effectively granting long-term access that survives password resets or conditional access revocations.\r\n\r\n// These actions should be rare and typically only performed during legitimate B2B or multi-tenant integrations.\r\n\r\nAuditLogs\r\n| where (Category == 'CrossTenantIdentitySynceSettings' and OperationName in~ ('Create a partner cross-tenant identity sync setting', 'Update a partner cross-tenant identity sync setting')) or (Category == 'CrossTenantAccessSettings' and OperationName in~ ('Add a partner to cross-tenant access setting', 'Update a partner cross-tenant access setting', 'Update the company default cross-tenant access setting'))"
query_type: kql
severity: medium
tactics:
    - TA0008
    - TA0003
    - TA0005
techniques:
    - T1484
    - T1484.002
tags:
    - kql
version: "2"
references:
    - https://www.crowdstrike.com/en-us/blog/compromising-identity-provider-federation/
    - https://www.invictus-ir.com/news/incident-response-in-azure
