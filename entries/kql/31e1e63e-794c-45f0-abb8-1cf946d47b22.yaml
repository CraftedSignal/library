id: 31e1e63e-794c-45f0-abb8-1cf946d47b22
name: Detecting Data Exfiltration via App ScreenShot
description: 'KQL Query from file: Detecting Data Exfiltration via App ScreenShot'
query: "// Detecting Application Performing ScreenShot For Potential Data Exfiltration\r\n// Whitelist Approved ScreenShot App Below\r\nlet WhitelistApp = dynamic([\"SnippingTool.exe\",\"snagiteditor.exe\",\"bomgar-scc.exe\"]);\r\nDeviceEvents\r\n| where TimeGenerated > ago(30d)\r\n| where ActionType == \"ScreenshotTaken\"\r\n| where not (InitiatingProcessFileName has_any(WhitelistApp))\r\n| summarize ScreenShotCount=count() by DeviceName, InitiatingProcessFileName\r\n| sort by ScreenShotCount desc "
query_type: kql
severity: medium
tags:
    - kql
author: Steven Lim
version: "1"
references:
    - https://www.koi.security/blog/spyvpn-the-vpn-that-secretly-captures-your-screen
