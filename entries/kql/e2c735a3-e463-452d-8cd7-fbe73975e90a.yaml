id: e2c735a3-e463-452d-8cd7-fbe73975e90a
name: KQLWiz PDF NTLM Leak Detector
description: 'KQL Query from file: KQLWiz PDF NTLM Leak Detector'
query: "// KQLWiz PDF NTLM Leak Detector\n// https://cybersecuritynews.com/zero-day-vulnerability-in-pdf-files-leaking-ntlm-data-in-adobe-foxit-reader/\n\nDeviceFileEvents \n| where ActionType == \"FileCreated\" and FileName endswith \".pdf\"\n| where parse_json(AdditionalFields)[\"FileType\"] == 'PDF'\n| where InitiatingProcessUniqueId != 0\n| join DeviceNetworkEvents on InitiatingProcessUniqueId\n| where RemotePort == \"445\" and Protocol == \"Tcp\"\n"
query_type: kql
tactics:
    - TA0006
    - TA0009
    - TA0008
techniques:
    - T1557.001
    - T1557
    - T1021.002
tags:
    - kql
version: "1"
