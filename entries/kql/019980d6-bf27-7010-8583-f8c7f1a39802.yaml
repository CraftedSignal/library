id: 019980d6-bf27-7010-8583-f8c7f1a39802
name: Personal OneDrive Account Added on Corporate Device
description: Detects modifications to the Windows Registry by 'OneDrive.exe' when the initiating process command line does not correspond to a legitimate update operation. This could indicate an attempt to establish persistence or modify OneDrive's behavior for malicious purposes, potentially by an adversary using a compromised OneDrive account or malware like CreepyDrive.
query: "let timerange = 30d;\r\nDeviceRegistryEvents \r\n|where Timestamp > ago(timerange)\r\n| where InitiatingProcessVersionInfoOriginalFileName == @\"OneDrive.exe\"\r\n| where RegistryValueData matches regex @\"C:\\\\Users\\\\[^\\\\]+\\\\OneDrive\\\\\"\r\n| where InitiatingProcessCommandLine != @\"updateInstalled /background\"\r\n// check in InitiatingProcessCommandLine for email address used to connect to onedriv"
query_type: kql
severity: medium
techniques:
    - T1567.002
tags:
    - kql
author: 'F S '
version: "3"
