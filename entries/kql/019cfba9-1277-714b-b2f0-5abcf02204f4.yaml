id: 019cfba9-1277-714b-b2f0-5abcf02204f4
name: Malicious Domain Click Detection
description: This rule detects when a user clicks on a URL that contains a domain identified as malicious. The rule specifically looks for `UrlClickEvents` where the extracted domain from the URL matches any of the domains listed in the `malicious_domains` array. This can indicate a successful phishing attempt or an accidental click on a known malicious link.
query: "let malicious_domains = dynamic([\r\n    \"skimresources.com\",\r\n    \"crsons.net\",\r\n    \"afghantarin.com\",\r\n    \"medinex.in\",\r\n    \"cabinetzeukeng.net\",\r\n    \"rnedinex.com\"\r\n]);\r\nUrlClickEvents\r\n| extend Domain = tostring(parse_url(Url).Host)\r\n| where Domain has_any (malicious_domains)\r\n| project TimeGenerated, AccountUpn, Url, Domain, ActionType\r\n"
query_type: kql
severity: medium
tactics:
    - TA0001
    - TA0002
techniques:
    - T1566
    - T1566.002
    - T1204.001
tags:
    - kql
version: "1"
