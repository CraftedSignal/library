id: 019c04db-65d2-7499-81ff-b5e307137b81
name: Microsoft Office Spawning Suspicious Child Process
description: Detects Microsoft Office applications (Word, Excel, PowerPoint, Outlook) spawning suspicious child processes like command shells or script interpreters. This behavior can be indicative of malicious macro execution or exploitation of vulnerabilities, such as CVE-2026-21509, where an embedded OLE object leads to code execution.
query: |
    // Name: OLE Compatibility Mitigation Tampering
    // Author: detections.ai
    // Date: 2026-01-28
    // Description: Detects the modification or deletion of the registry value that mitigates the OLE security feature bypass vulnerability (CVE-2026-21509). This activity could indicate an attacker attempting to disable security controls or an erroneous administrative action, leaving the host vulnerable. This rule detects tampering events, not the absence of the key on a system.
    //
    // Tactics: Defense Evasion
    // Techniques: T1112
    //
    // References:
    // - https://msrc.microsoft.com/update-guide/vulnerability/CVE-2026-21509
    //
    // False Positive Sensitivity: Medium
    // - A system administrator may modify this key for legitimate troubleshooting, although this is not recommended. Investigate the context of the change, such as the initiating process and user account.

    // Define the registry value details for the mitigation
    let mitigation_value_name = "Compatibility Flags";
    let correct_mitigation_value_hex = "400"; // The DWORD value 0x00000400 is often stored as "400" (Hex)
    let correct_mitigation_value_dec = "1024"; // or "1024" (Decimal) in registry events.

    DeviceRegistryEvents
    // Filter for registry value modifications or deletions
    | where ActionType in ("RegistryValueSet", "RegistryValueDeleted")
    // The mitigation applies to any CLSID under the COM Compatibility key.
    // This path fragment covers both MSI and ClickToRun Office installations.
    | where RegistryKey has @"\Software\Microsoft\Office\Common\COM Compatibility\"
      and RegistryValueName == mitigation_value_name
    // Logic to detect tampering:
    // 1. A value is set, but it's not the correct mitigation value.
    // 2. The mitigation value is deleted.
    | where (ActionType == "RegistryValueSet" and RegistryValueData !in (correct_mitigation_value_hex, correct_mitigation_value_dec))
        or (ActionType == "RegistryValueDeleted")
    | project
        Timestamp,
        DeviceName,
        ActionType,
        RegistryKey,
        RegistryValueName,
        RegistryValueData, // The incorrect value that was set
        PreviousRegistryValueData, // The value before the change
        InitiatingProcessAccountName,
        InitiatingProcessFileName,
        InitiatingProcessCommandLine,
        ReportId
query_type: kql
severity: medium
tactics:
    - TA0002
    - TA0005
techniques:
