id: da33e557-133b-4191-b6e5-3d0d01ee8142
name: Check for Azure Outdated Security Protocols
description: 'KQL Query from file: Check for Azure Outdated Security Protocols'
query: "// Azure: Deprecation of Outdated Security Protocols\n\n// On October 31 2024, Azure Resource Manager will be retiring support for TLS 1.0 and TLS 1.1. After that date, any incoming calls to Azure using TLS 1.0/1.1 will fail. This is part of an Azure-wide initiative to enhance security. Do you know any of Azure cloud native services are still running the outdated security protocols ? You still have time to remediate by running the below KQL to tell you which services is still running the outdated protocols \U0001F609\n\n//Azure: Depreciation of outdated security protocol by 31 Oct 2024\n\nlet TLSVersion = \"1.0\"; \nsearch in (ApiManagementGatewayLogs, AzureDiagnostics, SQLSecurityAuditEvents,\nStorageBlobLogs, StorageFileLogs, StorageQueueLogs, StorageTableLogs)\nTimeGenerated between (ago(30d) .. now())\nand (\nClientTlsVersion has TLSVersion\nor tlsVersion_s has TLSVersion\nor client_tls_version_name_s has TLSVersion\nor TlsVersion has TLSVersion\n)\n\n// Retirement: Migrating to TLS 1.2+ with the Deprecation of Outdated Security Protocols\n// Link: https://azure.microsoft.com/en-us/updates/v2/migrating-to-tls-12-with-deprecation-of-outdated-security-protocols\n"
query_type: kql
tactics:
    - TA0010
    - TA0011
techniques:
    - T1052
    - T1052.001
    - T1572
    - T1090
    - T1090.001
    - T1090.002
    - T1090.003
    - T1090.004
