id: 019ca538-319f-740b-8279-ca44c976da76
name: Prometei Botnet Firewall Manipulation
description: Detects the use of 'netsh.exe' to create firewall rules with names specific to the Prometei botnet. Prometei creates rules to allow its own C2 traffic ("Secure Socket Tunneling Protocol (HTTP)") and to block other potential attackers ("Banned brute IPs") as part of its system hardening.
query: "// Name: Prometei Firewall Manipulation\r\n// Author: Ethan Andrews + detections.ai\r\n// Date: 2026-02-28\r\n// Description: Detects the use of 'netsh.exe' to create firewall rules with names specific to the Prometei botnet. Prometei creates rules to allow its own C2 traffic (\"Secure Socket Tunneling Protocol (HTTP)\") and to block other potential attackers (\"Banned brute IPs\") as part of its system hardening.\r\n// MITRE TTPs: T1562.004 - Impair Defenses: Disable or Modify System Firewall\r\n// References: https://www.esentire.com/blog/tenant-from-hell-prometeis-unauthorized-stay-in-your-windows-server\r\n// False Positive Sensitivity: Medium\r\nDeviceProcessEvents\r\n// Look for netsh.exe, the command-line tool for managing network configurations\r\n| where FileName =~ \"netsh.exe\"\r\n// Filter for commands that add a new firewall rule\r\n| where ProcessCommandLine has \"advfirewall\" and ProcessCommandLine has \"firewall\" and ProcessCommandLine has \"add\" and ProcessCommandLine has \"rule\"\r\n// Check for the specific, unique rule names used by Prometei\r\n| where ProcessCommandLine has_any (\"Secure Socket Tunneling Protocol (HTTP)\", \"Banned brute IPs\")\r\n// FP Tuning: The rule names are highly specific to Prometei. However, if false positives occur, investigate the parent process to determine if it's part of a legitimate administrative or security script.\r\n| project\r\n    Timestamp,\r\n    DeviceName,\r\n    AccountName = InitiatingProcessAccountName,\r\n    FileName,\r\n    CommandLine = ProcessCommandLine,\r\n    ParentProcess = InitiatingProcessFileName,\r\n    ParentCommandLine = InitiatingProcessCommandLine,\r\n    SHA256\r\n"
query_type: kql
severity: medium
tactics:
    - TA0005
techniques:
    - T1562.004
tags:
