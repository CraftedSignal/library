id: 019c8a25-9749-76b8-b373-51681ac7009b
name: MIMICRAT C2 Network Activity
description: This rule detects network traffic consistent with the MIMICRAT C2 protocol. It identifies connections to a known C2 domain combined with specific URI paths used for check-in and data exfiltration.
query: "// Name: MIMICRAT C2 Network Activity\r\n// Author: detections.ai\r\n// Date: 2026-02-23\r\n// Description: This rule detects network traffic consistent with the MIMICRAT C2 protocol. It identifies connections to a known C2 domain combined with specific URI paths used for check-in and data exfiltration.\r\n// Mitre ATT&CK Tactic: Command and Control\r\n// Mitre ATT&CK Technique: T1071.001 - Application Layer Protocol: Web Protocols\r\n// References: https://www.elastic.co/security-labs/mimicrat-custom-rat-mimics-c2-frameworks\r\n// False Positive Sensitivity: Medium\r\nlet mimicrat_domain = \"d15mawx0xveem1.cloudfront.net\";\r\nlet mimicrat_uris = dynamic([\r\n    \"/intake/organizations/events?channel=app\",\r\n    \"/discover/pcversion/metrics?clientver=ds\"\r\n]);\r\nDeviceNetworkEvents\r\n// Key logic: Look for traffic to the specific C2 domain and URI paths.\r\n| where RemoteUrl has mimicrat_domain\r\n  and (\r\n    RemoteUrl has mimicrat_uris[0] or\r\n    RemoteUrl has mimicrat_uris[1]\r\n  )\r\n// Comment: The combination of a specific CloudFront subdomain and unique URI paths provides a high-fidelity signal.\r\n// False positives are unlikely but could occur if the domain is repurposed.\r\n// For enhanced detection, consider correlating this activity with proxy logs that may contain the unique cookie values mentioned in the report (e.g., AFUAK, ARCHUID).\r\n| project\r\n    Timestamp,\r\n    DeviceName,\r\n    InitiatingProcessAccountName,\r\n    InitiatingProcessFileName,\r\n    InitiatingProcessCommandLine,\r\n    RemoteUrl,\r\n    RemoteIP,\r\n    ReportId\r\n"
query_type: kql
severity: medium
