id: 019d23f7-3506-7671-9798-8356ab0b8bfa
name: Moduba Cloaking and Redirect Campaign Activity via Specific Domains and Beaconing
description: |
    Detects URL clicks associated with the Moduba cloaking and redirect campaign using UrlClickEvents. Focuses on specific domain IOCs, redirect chains, and beaconing behaviors.
query: "let SuspiciousDomains = dynamic([\r\n    \"go.moduba.com\", \r\n    \"yildizlarrenault.com.tr\", \r\n    \"analytics.moduba.com\"\r\n]);\r\nUrlClickEvents\r\n| where isnotempty(Url)\r\n| where Url has_any (SuspiciousDomains)\r\n    or Url contains \"/exec/j?url=\"\r\n    or Url contains \"/pip/go.php\"\r\n    or Url contains \"beacon.min.js\"\r\n| where ActionType == \"ClickAllowed\"\r\n| project TimeGenerated, AccountUpn, Url, ActionType, NetworkMessageId, IPAddress\r\n| sort by TimeGenerated desc\r\n"
query_type: kql
severity: medium
tags:
    - kql
version: "1"
