id: 019ca098-bb89-757c-a9e1-3fafdbb0025e
name: DJVU Ransomware Mutex Detection
description: This rule detects the creation of specific mutexes known to be associated with DJVU ransomware activity. The rule looks for the exact mutex names '{FBB4BCC6-05C7-4ADD-B67B-A98A697323C1}' or '{1D6FC66E-D1F3-422C-8A53-C0BBCF3D900D}'. The detection is based on process creation events on Windows systems where these mutex names are observed.
query: |-
    title: DJVU Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with DJVU ransomware activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://blogs.blackberry.com/en/2022/09/djvu-the-ransomware-that-seems-strangely-familiar'
      - 'https://tria.ge/230108-wwfvvaec82/behavioral2/analog?proc=100&main_event=Mutex&mutant=%7B1D6FC66E-D1F3-422C-8A53-C0BBCF3D900D%7D'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.djvu'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '{FBB4BCC6-05C7-4ADD-B67B-A98A697323C1}'
          - '{1D6FC66E-D1F3-422C-8A53-C0BBCF3D900D}'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.djvu
author: '@adhikara13'
version: "1"
references:
    - https://blogs.blackberry.com/en/2022/09/djvu-the-ransomware-that-seems-strangely-familiar
    - https://tria.ge/230108-wwfvvaec82/behavioral2/analog?proc=100&main_event=Mutex&mutant=%7B1D6FC66E-D1F3-422C-8A53-C0BBCF3D900D%7D
data_sources:
    - process_creation
    - windows
