id: 019ca0a3-9316-7023-852e-b2bcb87c12fe
name: ZCryptor Ransomware Mutex Detection
description: The rule detects the creation of specific mutexes associated with ZCryptor ransomware activity. It specifically looks for a mutex named 'zcrypt1.0'. The detection is based on process creation logs from Windows systems.
query: |-
    title: ZCryptor Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with ZCryptor ransomware activity.
    author: '@adhikara13'
    date: 2024/07/19
    references:
      - 'https://www.helpnetsecurity.com/2016/05/27/zcryptor-ransomware-spreads-via-removable-drives/'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.zcryptor'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'zcrypt1.0'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.zcryptor
author: '@adhikara13'
version: "1"
references:
    - https://www.helpnetsecurity.com/2016/05/27/zcryptor-ransomware-spreads-via-removable-drives/
data_sources:
    - process_creation
    - windows
