id: 019ca0a0-a43d-77df-9b68-976232390685
name: Sharp Dragon Loader Mutex Detection
description: The rule detects the creation of processes that utilize specific mutex names known to be associated with the Sharp Dragon loader. Specifically, it looks for the mutex name 'mt_app_http_get_zed2vsp'. This indicates potential Sharp Dragon malware execution on a Windows system.
query: |-
    title: Sharp Dragon Loader Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Sharp Dragon loader activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://x.com/t3ft3lb/status/1740661367299010957'
      - 'https://research.checkpoint.com/2024/sharp-dragon-expands-towards-africa-and-the-caribbean/'
      - 'https://notes.netbytesec.com/2024/05/inside-sharppandas-malware-targeting.html'
    tags:
      - 'attack.execution.t1204'
      - 'malware.loader.sharp_dragon'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'mt_app_http_get_zed2vsp'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0002
techniques:
    - T1204
tags:
    - attack.execution.t1204
    - malware.loader.sharp_dragon
author: '@adhikara13'
version: "1"
references:
    - https://x.com/t3ft3lb/status/1740661367299010957
    - https://research.checkpoint.com/2024/sharp-dragon-expands-towards-africa-and-the-caribbean/
    - https://notes.netbytesec.com/2024/05/inside-sharppandas-malware-targeting.html
data_sources:
    - process_creation
    - windows
