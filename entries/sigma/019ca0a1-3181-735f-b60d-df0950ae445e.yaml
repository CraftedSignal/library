id: 019ca0a1-3181-735f-b60d-df0950ae445e
name: SpiceRAT Mutex Detection
description: 'This rule detects the creation of specific mutexes known to be associated with SpiceRAT malware activity. The detection is based on two distinct mutex names: ''{00866F68-6C46-4ABD-A8D6-2246FE482F99}'' and ''{00861111-3333-4ABD-GGGG-2246FE482F99}''. The rule monitors process creation events on Windows systems for the presence of these mutex names.'
query: |-
    title: SpiceRAT Mutex Detection
    status: experimental
    description: Detects known mutexes associated with SpiceRAT activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://medium.com/@MateoPappa/letsdefend-spicerat-medium-881a474c0982'
      - 'https://blog.talosintelligence.com/new-spicerat-sneakychef/'
    tags:
      - 'attack.command_and_control.t1219'
      - 'malware.rat.spicerat'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '{00866F68-6C46-4ABD-A8D6-2246FE482F99}'
          - '{00861111-3333-4ABD-GGGG-2246FE482F99}'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0011
techniques:
    - T1219
tags:
    - attack.command_and_control.t1219
    - malware.rat.spicerat
author: '@adhikara13'
version: "1"
references:
    - https://medium.com/@MateoPappa/letsdefend-spicerat-medium-881a474c0982
    - https://blog.talosintelligence.com/new-spicerat-sneakychef/
data_sources:
    - process_creation
    - windows
