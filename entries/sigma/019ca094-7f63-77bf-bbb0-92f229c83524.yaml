id: 019ca094-7f63-77bf-bbb0-92f229c83524
name: Azov Wiper Mutex Detection
description: This rule detects the creation of specific mutexes known to be associated with the Azov wiper malware. The mutex names 'Local\Kasimir_C', 'Local\Kasimir_E', and 'Local\azov' are monitored. The detection is based on process creation events on Windows systems where these mutex names are observed.
query: |-
    title: Azov Wiper Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Azov wiper activity.
    author: '@adhikara13'
    date: 2024/08/01
    references:
      - 'https://www.trendmicro.com/vinfo/us/threat-encyclopedia/malware/ransom.win64.azvo.thjcabb'
      - 'https://blog.talosintelligence.com/threat-roundup-1021-1028-2/'
      - 'https://tria.ge/221031-vjjkjacdbq/behavioral1/analog?main_event=Mutex'
    tags:
      - 'attack.impact.t1485'
      - 'malware.wiper.azov'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Local\Kasimir_C'
          - 'Local\Kasimir_E'
          - 'Local\azov'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1485
tags:
    - attack.impact.t1485
    - malware.wiper.azov
author: '@adhikara13'
version: "1"
references:
    - https://www.trendmicro.com/vinfo/us/threat-encyclopedia/malware/ransom.win64.azvo.thjcabb
    - https://blog.talosintelligence.com/threat-roundup-1021-1028-2/
    - https://tria.ge/221031-vjjkjacdbq/behavioral1/analog?main_event=Mutex
