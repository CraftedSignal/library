id: 019abed0-02da-713c-be8a-80724bec09aa
name: FlexibleFerret Malicious HTTP Communication Detection
description: Detects HTTP/HTTPS communication to known FlexibleFerret payload hosting domains.
query: |+
    ---
    title: FlexibleFerret HTTP Communication to Malicious Domains
    id: a1b2c3d4-aaab-4e5f-8a9b-0c1d2e3f4a5b
    status: experimental
    description: Detects HTTP/HTTPS communication to known FlexibleFerret payload hosting domains
    author: Claude Opus 4.5
    date: 2025/11/26
    references:
        - https://www.jamf.com/blog/flexibleferret-malware-continues-to-adapt/
    tags:
        - attack.command_and_control
        - attack.t1071.001
        - attack.execution
        - attack.t1105
    logsource:
        category: proxy
        product: any
    detection:
        selection_domain:
            c-uri|contains:
                - 'evaluza.com'
                - 'proficiencycert.com'
                - 'zynoracreative.com'
        selection_payload:
            c-uri|contains:
                - '.patch'
                - 'updrv8'
                - 'drvMac'
                - 'drv-Arm64'
                - 'drv-Intel'
        condition: selection_domain or selection_payload
    falsepositives:
        - Unlikely - known malicious infrastructure
    level: critical

query_type: sigma
severity: critical
tactics:
    - TA0002
    - TA0011
techniques:
    - T1071.001
    - T1105
