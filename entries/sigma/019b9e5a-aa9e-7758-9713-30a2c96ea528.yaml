id: 019b9e5a-aa9e-7758-9713-30a2c96ea528
name: Multiple HTTP Requests with Small Response Bodies (C2 Beaconing)
description: Detects HTTP C2 beaconing patterns based on burst request counts with small response bodies (1-499 bytes). This rule correlates multiple HTTP requests to the same destination within a short timespan, where each response has a small body size. This pattern is indicative of command and control (C2) communication.
query: "title: Small HTTP Response Body\r\nid: 1349bd36-1f23-4081-9f71-6ff585782126\r\nname: http_small_response\r\nstatus: test\r\ndescription: Detects HTTP responses with small body sizes between 1-499 bytes. This is a base rule for correlation-based C2 beacon detection.\r\nreferences:\r\n    - https://attack.mitre.org/techniques/T1071/001/\r\nauthor: SimSpace\r\ndate: 2026-01-01\r\ntags:\r\n    - attack.command-and-control\r\n    - attack.t1071.001\r\nlogsource:\r\n    product: zeek\r\n    service: http\r\ndetection:\r\n    selection:\r\n        response_body_len|gt: 0\r\n        response_body_len|lt: 500\r\n    condition: selection\r\nfalsepositives:\r\n    - Legitimate API endpoints with small responses\r\n    - Health checks and monitoring\r\nlevel: informational\r\n---\r\ntitle: Multiple HTTP Requests with Small Response Bodies\r\nid: 355d5d7f-1b42-41ae-8fc7-952b083b4218\r\nstatus: test\r\ndescription: |\r\n  Detects HTTP C2 beaconing patterns based on burst request counts with small response bodies (1-499 bytes). Basic correlation counts requests to the same destination within 5 seconds.\r\n  \r\n  IMPLEMENTATION NOTE: Production deployments require statistical enrichment beyond simple event counting to achieve acceptable false positive rates:\r\n  - URI diversity analysis: dc(uri) <= 2 indicates repeated beacon paths\r\n  - Response size variance: dc(response_body_len) <= 3 indicates consistent C2 response patterns  \r\n  - User-agent consistency: Single UA across requests indicates automated beaconing\r\n  \r\n  SIGMA correlation syntax cannot express multivariate statistical analysis. Platform-specific implementations (Splunk SPL, KQL, EQL) must add these statistical checks.\r\nreferences:\r\n    - https://attack.mitre.org/techniques/T1071/001/\r\nauthor: SimSpace\r\ndate: 2026-01-01\r\ntags:\r\n    - attack.command-and-control\r\n    - attack.t1071.001\r\nlogsource:\r\n    product: zeek\r\n    service: http\r\ndetection:\r\n    selection:\r\n        response_body_len|exists: true\r\n    condition: selection\r\ncorrelation:\r\n    type: event_count\r\n    rules:\r\n        - http_small_response\r\n    group-by:\r\n        - id.orig_h\r\n        - id.resp_h\r\n        - id.resp_p\r\n    timespan: 5s\r\n    condition:\r\n        gte: 5\r\nfalsepositives:\r\n    - Legitimate applications with rapid API polling\r\nlevel: high"
query_type: sigma
