id: 019c2f16-a7f0-72ed-85f5-ae603090cafc
name: Mimikatz Keywords in Windows Event Logs
description: The rule detects the use of Mimikatz by searching for specific keywords within Windows event logs. These keywords include Mimikatz module commands (e.g., 'dpapi::masterkey', 'kerberos::golden', 'lsadump::', 'sekurlsa::'), artifacts associated with Mimikatz (e.g., 'mimidrv.sys', 'mimilib.dll'), and PowerShell commands commonly used with Mimikatz (e.g., 'Invoke-Mimikatz', 'Invoke-Mimikittenz'). The detection logic specifically excludes events with EventID 15.
query: |-
    title: Mimikatz Use - Event Log Keywords
    id: b2c3d4e5-f6a7-4890-b123-mimikatz002
    status: experimental
    description: |
        Detects Mimikatz keywords in Windows event logs (built-in, Sysmon, PowerShell).
        Covers module commands, artifacts (mimidrv.sys, mimilib.dll), and Invoke-Mimikatz.
    references:
        - https://tools.thehacker.recipes/mimikatz/modules
    author: Daniel Jeremiah
    date: 2026/02/05
    tags:
        - attack.credential-access
        - attack.s0002
        - attack.t1003.001
        - attack.t1003.002
        - attack.t1003.004
        - attack.t1003.006
    logsource:
        product: windows
    detection:
        keywords:
            - 'dpapi::masterkey'
            - 'eo.oe.kiwi'
            - 'event::clear'
            - 'event::drop'
            - 'gentilkiwi.com'
            - 'kerberos::golden'
            - 'kerberos::ptc'
            - 'kerberos::ptt'
            - 'kerberos::tgt'
            - 'Kiwi Legit Printer'
            - 'lsadump::'
            - 'mimidrv.sys'
            - '\mimilib.dll'
            - 'misc::printnightmare'
            - 'misc::shadowcopies'
            - 'misc::skeleton'
            - 'privilege::backup'
            - 'privilege::debug'
            - 'privilege::driver'
            - 'sekurlsa::'
            - 'Invoke-Mimikatz'
            - 'Invoke-Mimikittenz'
        filter:
            EventID: 15
        condition: keywords and not filter
    falsepositives:
        - Authorized red team
    level: high
query_type: sigma
severity: high
tactics:
    - TA0006
techniques:
    - T1003.001
    - T1003.002
    - T1003.004
    - T1003.006
tags:
    - attack.credential-access
    - attack.s0002
    - attack.t1003.001
    - attack.t1003.002
    - attack.t1003.004
    - attack.t1003.006
author: Daniel Jeremiah
version: "2"
references:
    - https://tools.thehacker.recipes/mimikatz/modules
data_sources:
    - windows
