id: f34ffc27-0b13-4c21-9f1b-57a6510fe647
name: ToyMaker Fake Admin Account Creation Detection
description: Detects the creation of a fake user account with a specific name and password pattern by ToyMaker threat actor to gain administrative access.
query: |-
    title: ToyMaker - Fake User Account Creation
    id: 84024431-2123-4567-89ab-cdef01234567
    status: experimental
    description: Detects the creation of a fake user account named 'support' with a specific password pattern and adding it to the local administrators group, a tactic used by the ToyMaker initial access broker.
    references:
        - https://blog.talosintelligence.com/toymaker-initial-access-broker/
    author: Aaron Mog
    date: 2025-05-01
    logsource:
        category: process_creation
        product: windows
    detection:
        selection_user_add:
            Image|endswith: '\net.exe'
            CommandLine|contains|all:
                - 'net user'
                - 'support'
                - 'Sup0rtadmin'
                - '/add'
        selection_group_add:
            Image|endswith: '\net.exe'
            CommandLine|contains|all:
                - 'net localgroup'
                - 'administrators'
                - 'support'
                - '/add'
        condition: 1 of selection_*
    falsepositives:
        - Legitimate administrative activity (unlikely with this specific username and password pattern)
    level: medium
    tags:
        - attack.persistence
        - attack.t1136
        - attack.privilege_escalation
        - attack.t1098
        - cti.toymaker
query_type: sigma
severity: medium
tags:
    - attack.persistence
    - attack.t1136
    - attack.privilege_escalation
    - attack.t1098
    - cti.toymaker
author: Aaron Mog
version: "1"
