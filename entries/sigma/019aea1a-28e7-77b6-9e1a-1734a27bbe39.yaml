id: 019aea1a-28e7-77b6-9e1a-1734a27bbe39
name: Intellexa Front Company Infrastructure
description: Detects network traffic to infrastructure associated with newly identified front companies linked to the Intellexa Predator spyware syndicate.
query: |
    title: Intellexa Front Company Infrastructure
    id: 2542339e-d502-418c-a7ba-f2dec7184a1e
    status: experimental
    description: Detects network traffic to infrastructure associated with newly
      identified front companies linked to the Intellexa Predator spyware syndicate.
    references:
      - https://www.recordedfuture.com/research/intellexas-global-corporate-web
    author: detections.ai
    date: 2025-12-04
    tags:
      - attack.t1583.001
      - attack.t1583.004
      - detection.emerging-threats
    logsource:
      - category: dns
      - category: proxy
      - category: firewall
    detection:
      # Detects DNS queries for domains of Intellexa front companies
      selection_domains_dns:
        dns.question.name:
          - 'pulse-fzco.com'
          - 'zelus-analytics.com'
          - 'apollowebtech.com'
          - 'pulseadvertise.com'
          - 'morningstartec.com'
      # Detects network connections to domains of Intellexa front companies
      selection_domains_net:
        destination.domain:
          - 'pulse-fzco.com'
          - 'zelus-analytics.com'
          - 'apollowebtech.com'
          - 'pulseadvertise.com'
          - 'morningstartec.com'
      # Detects network connections to the IP address hosting the front company domains
      selection_ip:
        destination.ip: '173.236.243.198'
      condition: 1 of them
    falsepositives:
      - The domains are highly specific to the Intellexa-linked front companies and
        are unlikely to generate false positives.
      - The IP address 173.236.243.198 belongs to a shared hosting provider
        (DREAMHOST-AS). While it hosts the malicious domains, it may also host
        legitimate sites. Alerts on the IP alone should be correlated with other
        activity to reduce potential noise.
    level: high
query_type: sigma
severity: high
tags:
    - attack.t1583.001
    - attack.t1583.004
    - detection.emerging-threats
author: detections.ai
version: "2"
references:
    - https://www.recordedfuture.com/research/intellexas-global-corporate-web
