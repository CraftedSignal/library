id: 019ca097-5f89-715d-a4c0-715814fcec52
name: CryptoLuck Ransomware Mutex Detection
description: This rule detects the creation of specific mutexes associated with CryptoLuck ransomware. The rule specifically looks for a mutex named 'CryptoLuck_Instance'. The presence of this mutex indicates potential CryptoLuck ransomware activity on a Windows system.
query: |-
    title: CryptoLuck Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with CryptoLuck ransomware activity.
    author: '@adhikara13'
    date: 2025/07/15
    references:
      - 'https://www.trendmicro.com/vinfo/au/threat-encyclopedia/malware/ransom_cryptoluck.a'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.cryptoluck'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'CryptoLuck_Instance'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.cryptoluck
author: '@adhikara13'
version: "1"
references:
    - https://www.trendmicro.com/vinfo/au/threat-encyclopedia/malware/ransom_cryptoluck.a
data_sources:
    - process_creation
    - windows
