id: 019aa75f-b3b3-7249-bd20-3a9585a7b0d3
name: AWS Network Firewall Geographic IP Blocking
description: This rule configures AWS Network Firewall to block outbound traffic to IPs located in high-risk countries, such as Russia and China, as a preventive security measure.
query: "title: AWS Network Firewall - Geographic IP Blocking\nid: 202501028-202501029-anfw\nstatus: stable\ndescription: |\n  This rule showcases a common AWS Network Firewall configuration that blocks all outbound traffic to IP addresses\n  geolocated in specific high-risk countries (examples: Russia/RU, China/CN). Geographic blocking is a common security\n  control that customers configure based on their risk tolerance and business requirements. Organizations with no\n  business operations in certain countries may choose to block traffic to reduce their attack surface, as many threat\n  actors operate from specific geographic regions. AWS Network Firewall uses Suricata as its underlying engine with\n  GeoIP capabilities. This is not a specific threat detection but rather a preventive control based on geographic\n  risk assessment.\n  \n  Suricata Rules (Examples):\n  drop ip $HOME_NET any -> any any (msg:\"Egress traffic to RU IP\"; geoip:dst,RU; metadata:geo RU; flow:to_server; sid:202501028;)\n  drop ip $HOME_NET any -> any any (msg:\"Egress traffic to CN IP\"; geoip:dst,CN; metadata:geo CN; flow:to_server; sid:202501029;)\nreferences:\n  - https://docs.aws.amazon.com/network-firewall/latest/developerguide/suricata-examples.html\n  - https://aws.github.io/aws-security-services-best-practices/guides/network-firewall/\n  - https://attack.mitre.org/techniques/T1071/\nauthor: AWS Network Firewall Customer Example\ndate: 2025/01/24\ntags:\n  - attack.command_and_control\n  - attack.t1071\nlogsource:\n  category: firewall\n  product: aws_network_firewall\ndetection:\n  selection:\n    direction: outbound\n    source_network: internal\n    destination_country:\n      - RU\n      - CN\n  condition: selection\nfalsepositives:\n  - Legitimate business traffic to blocked countries\n  - VPN or proxy services located in blocked countries\n  - CDN nodes in blocked countries serving legitimate content\nlevel: low\n"
