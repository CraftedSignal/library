    logsource:
        category: ps_script
        product: windows
    detection:
        selection_scenario:
            ScriptBlockText|contains: 'scenario'
        selection_incoming_call:
            ScriptBlockText|contains: 'incomingCall'
        condition: selection_scenario and selection_incoming_call
    falsepositives:
        - None expected
    level: high
