id: 019d2697-ca8c-700c-9a54-74a19f165179
name: Toast Notification Fake Incoming Call Scenario Constructed via PowerShell
description: |
    Detects PowerShell script blocks containing the scenario="incomingCall" XML attribute, which triggers Windows' special incoming call notification UI with accept/dismiss buttons and an avatar image loaded from an attacker-controlled URL. Sourced from the toastnotify-bof repository incoming-call.xml example payload. Near-zero legitimate enterprise use of this attribute in PowerShell.
query: |
    title: Toast Notification Fake Incoming Call Scenario Constructed via PowerShell
    id: f4a1b2c3-d4e5-4f67-8901-abcdef123409
    status: experimental
    description: >
        Detects PowerShell script blocks containing the scenario="incomingCall" XML attribute,
        which triggers Windows' special incoming call notification UI with accept/dismiss buttons
        and an avatar image loaded from an attacker-controlled URL. Sourced from the
        toastnotify-bof repository incoming-call.xml example payload. Near-zero legitimate
        enterprise use of this attribute in PowerShell.
    references:
        - https://ipurple.team/2026/03/25/toast-notifications/
        - https://brmk.me/2026/03/18/toast-my-way.html
    author: Detection Engineering
