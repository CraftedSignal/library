id: 019ca098-262d-7384-bf58-18c291531e6c
name: Darkrace Ransomware Mutex Detection
description: The rule detects the creation of specific mutex names ('CheckMutex') that are known to be associated with Darkrace ransomware activity. This detection focuses on identifying a characteristic behavior of the Darkrace ransomware, which is the creation of these mutexes during its execution. The rule is triggered when a process creates a mutex with one of the specified names.
query: |-
    title: Darkrace Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Darkrace ransomware activity.
    author: '@adhikara13'
    date: 2025/07/16
    references:
      - 'https://cyble.com/blog/unmasking-the-darkrace-ransomware-gang'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.darkrace'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'CheckMutex'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.darkrace
author: '@adhikara13'
version: "1"
references:
    - https://cyble.com/blog/unmasking-the-darkrace-ransomware-gang
data_sources:
    - process_creation
    - windows
