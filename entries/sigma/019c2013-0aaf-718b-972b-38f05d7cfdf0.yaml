id: 019c2013-0aaf-718b-972b-38f05d7cfdf0
name: Canary SPN Kerberoasting Detection
description: 'Detects Kerberos service ticket requests (TGS) for canary Service Principal Names (SPNs). Any request for a ticket to a canary SPN is highly indicative of a Kerberoasting attack (T1558.003) or other reconnaissance activity, as these accounts have no legitimate purpose. Creation of Canary SPNs can be found here: https://github.com/fluffybunnies-h4x/CyberDeception?tab=readme-ov-file#creating-a-canary-spn-account'
query: |-
    title: Canary SPN Kerberoasting Detection
    id: 16b16d2b-4ac2-4f72-aef4-b3d224a9b439
    status: experimental
    description: 'Detects Kerberos service ticket requests (TGS) for canary Service Principal Names (SPNs). Any request for a ticket to a canary SPN is highly indicative of a Kerberoasting attack (T1558.003) or other reconnaissance activity, as these accounts have no legitimate purpose. Creation of Canary SPNs can be found here: https://github.com/fluffybunnies-h4x/CyberDeception?tab=readme-ov-file#creating-a-canary-spn-account'
    references:
      - https://github.com/fluffybunnies-h4x/CyberDeception
      - https://www.sans.org/white-papers/
      - https://bloodhound.readthedocs.io/
      - https://canarytokens.org/
    author: detections.ai
    date: 2026-02-02
    tags:
      - attack.credential_access
      - attack.t1558.003
    logsource:
      product: windows
      service: security
    detection:
      selection:
        EventID: 4769
        ServiceName:
          - 'svc_sqlreport'
          - 'svc_sqlbackup'
          - 'svc_iis_admin'
          - 'svc_exchange'
      condition: selection
    falsepositives:
      - Since these are canary accounts with no legitimate purpose, false positives should be extremely rare. Any alert should be treated as a true positive and investigated.
      - Ensure the list of service names in the detection logic is accurate and exclusively contains canary accounts.
    level: critical
