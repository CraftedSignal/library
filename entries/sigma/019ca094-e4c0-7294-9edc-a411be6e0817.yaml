id: 019ca094-e4c0-7294-9edc-a411be6e0817
name: Beast Ransomware Mutex Detection
description: The rule detects the creation of specific mutexes associated with the Beast ransomware. It looks for mutex names 'BEAST HERE?'. This activity is indicative of the Beast ransomware executing on a Windows system, likely as part of its encryption or operational phases.
query: |-
    title: Beast Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Beast ransomware activity.
    author: '@adhikara13'
    date: 2025/01/15
    references:
      - 'https://www.cybereason.com/blog/threat-analysis-beast-ransomware'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.beast'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'BEAST HERE?'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.beast
author: '@adhikara13'
version: "1"
references:
    - https://www.cybereason.com/blog/threat-analysis-beast-ransomware
data_sources:
    - process_creation
    - windows
