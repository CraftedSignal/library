id: 019ca095-429a-74ef-8d18-7198005faa2d
name: BlackHunt Ransomware Mutex Detection
description: This rule detects the creation of specific mutexes associated with BlackHunt ransomware activity. The rule triggers if a process creates a mutex named 'BlackKeys' or 'BLACK_HUNT_MUTEX'. These mutex names are known indicators of BlackHunt ransomware, suggesting an active infection or an attempt to prevent multiple instances of the ransomware from running simultaneously. The detection relies on monitoring process creation events for these specific mutex names.
query: |-
    title: BlackHunt Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with BlackHunt ransomware activity.
    author: '@adhikara13'
    date: 2024/08/01
    references:
      - 'https://x.com/malwrhunterteam/status/1744499157442666907'
      - 'https://www.rapid7.com/blog/post/2024/02/05/exploring-the-not-so-secret-code-of-blackhunt-ransomware-2/'
      - 'https://www.trendmicro.com/vinfo/ae/threat-encyclopedia/malware/ransom.win32.blackhunt.thlbhbb'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.blackhunt'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'BlackKeys'
          - 'BLACK_HUNT_MUTEX'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.blackhunt
author: '@adhikara13'
version: "1"
references:
