id: 019ca098-a6df-71b0-af80-e3c934bead78
name: DireWolf Ransomware Mutex Detection
description: Detects known mutexes associated with DireWolf ransomware activity. Specifically, it looks for the mutex named 'Global\direwolfAppMutex'.
query: |-
    title: DireWolf Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with DireWolf ransomware activity.
    author: '@adhikara13'
    date: 2025/07/16
    references:
      - 'https://www.trustwave.com/en-us/resources/blogs/spiderlabs-blog/dire-wolf-strikes-new-ransomware-group-targeting-global-sectors/'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.direwolf'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Global\direwolfAppMutex'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.direwolf
author: '@adhikara13'
version: "1"
references:
    - https://www.trustwave.com/en-us/resources/blogs/spiderlabs-blog/dire-wolf-strikes-new-ransomware-group-targeting-global-sectors/
data_sources:
    - process_creation
    - windows
