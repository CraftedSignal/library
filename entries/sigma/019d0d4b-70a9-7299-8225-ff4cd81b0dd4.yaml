id: 019d0d4b-70a9-7299-8225-ff4cd81b0dd4
name: Sideloading of jli.dll in USOShared Directory
description: Detects the loading of jli.dll from the C:\ProgramData\USOShared directory. This behavior is indicative of DLL sideloading via a legitimate Java process, a consistent post-exploitation tactic used by the LeakNet ransomware group.
query: |
    title: Sideloading of jli.dll in USOShared Directory
    id: a8894281-8b15-41d3-99a6-5224175f3824
    status: experimental
    description: Detects the loading of jli.dll from the C:\ProgramData\USOShared
      directory. This behavior is indicative of DLL sideloading via a legitimate
      Java process, a consistent post-exploitation tactic used by the LeakNet
      ransomware group.
    author: detections.ai
    references:
      - https://reliaquest.com/blog/threat-spotlight-casting-a-wider-net-clickfix-deno-and-leaknets-scaling-threat
    date: 2026-03-20
    tags:
      - attack.ta0005
      - attack.t1574.001
    logsource:
      category: image_load
      product: windows
    detection:
      # Detects the specific DLL loaded from the USOShared directory
      # Note: The USOShared directory is typically associated with Windows Update, making the presence of Java DLLs highly suspicious. If false positives occur, consider verifying the Image process loading the DLL.
      selection:
        ImageLoaded|endswith: '\ProgramData\USOShared\jli.dll'
      condition: selection
    falsepositives:
      - Highly unlikely. Any presence of jli.dll in this directory should be
        investigated.
    level: high
