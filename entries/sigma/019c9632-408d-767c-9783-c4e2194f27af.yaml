id: 019c9632-408d-767c-9783-c4e2194f27af
name: Claude Code Spawns Suspicious Shell Or LOLBIN Child Process
description: Detects Claude Code spawning suspicious child processes, consistent with abuse of project configuration hooks or MCP initialisation commands.
query: |
    title: Claude Code Spawns Suspicious Shell Or LOLBIN Child Process
    id: 6c2f4e21-1c1c-4a0b-9c57-1b2a0f6d3c44
    status: experimental
    description: >-
      Detects Claude Code spawning suspicious child processes, consistent with abuse
      of project configuration hooks or MCP initialisation commands.
    author: Daniel Jeremiah
    date: 2026-02-24
    references:
      - >-
        https://research.checkpoint.com/2026/rce-and-api-token-exfiltration-through-claude-code-project-files-cve-2025-59536/
    tags:
      - attack.execution
      - attack.t1059
      - attack.defense_evasion
    logsource:
      category: process_creation
      product: windows
    detection:
      selection_parent:
        ParentImage|endswith:
          - \claude.exe
          - \claude
      selection_child:
        Image|endswith:
          - \cmd.exe
          - \powershell.exe
          - \pwsh.exe
          - \wscript.exe
          - \cscript.exe
          - \mshta.exe
          - \rundll32.exe
          - \regsvr32.exe
          - \certutil.exe
          - \bitsadmin.exe
          - \curl.exe
          - \wget.exe
          - \python.exe
          - \python3.exe
          - \node.exe
      condition: selection_parent and selection_child
    falsepositives:
      - Developers intentionally invoking shells or tools from Claude Code for
        legitimate automation
      - Pentesting
    level: high
    associated_cves:
      - CVE-2025-59536
query_type: sigma
severity: medium
tactics:
    - TA0002
    - TA0005
techniques:
    - T1059
    - T1059.001
    - T1218.005
    - T1218.011
    - T1218.010
    - T1059.006
tags:
