id: 019ca096-7973-7101-b8c6-d823ed44fccc
name: CHARON Ransomware Mutex Detection
description: Detects the creation of specific mutexes known to be associated with the CHARON ransomware. The rule looks for the mutex name 'OopsCharonHere'.
query: |-
    title: CHARON Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with CHARON ransomware activity.
    author: '@adhikara13'
    date: 2025/07/30
    references:
      - 'https://www.trendmicro.com/vinfo/us/threat-encyclopedia/malware/ransom.win64.charon.thgbcbe'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.charon'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'OopsCharonHere'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.charon
author: '@adhikara13'
version: "1"
references:
    - https://www.trendmicro.com/vinfo/us/threat-encyclopedia/malware/ransom.win64.charon.thgbcbe
data_sources:
    - process_creation
    - windows
