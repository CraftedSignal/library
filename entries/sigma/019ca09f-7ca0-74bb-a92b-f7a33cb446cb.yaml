id: 019ca09f-7ca0-74bb-a92b-f7a33cb446cb
name: Redeemer Ransomware Mutex Detection
description: This rule detects the creation of a mutex named 'RedeemerMutex'. This mutex is known to be associated with Redeemer ransomware activity. The detection is based on monitoring process creation events for specific mutex names.
query: |-
    title: Redeemer Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Redeemer ransomware activity.
    author: '@adhikara13'
    date: 2025/07/15
    references:
      - 'https://cyble.com/blog/redeemer-ransomware-back-action/'
      - 'https://www.cloudsek.com/blog/what-is-redeemer-ransomware-and-how-does-it-spread-a-technical-analysis'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.redeemer'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'RedeemerMutex'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.redeemer
author: '@adhikara13'
version: "1"
references:
    - https://cyble.com/blog/redeemer-ransomware-back-action/
    - https://www.cloudsek.com/blog/what-is-redeemer-ransomware-and-how-does-it-spread-a-technical-analysis
data_sources:
    - process_creation
    - windows
