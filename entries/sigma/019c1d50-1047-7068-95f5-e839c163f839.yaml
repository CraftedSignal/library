id: 019c1d50-1047-7068-95f5-e839c163f839
name: AMSI Scan Buffer Patching via In-Memory Modification
description: |
    Detects behavior consistent with an AMSI bypass where the AmsiScanBuffer function is located and patched in memory to always return an error. This technique disables script content scanning and is commonly used by post-exploitation frameworks and staged malware payloads.
query: "title: AMSI Scan Buffer Patching via In-Memory Modification\r\nid: d1e8c9a7-6b42-4f5d-9c2a-3e8f1b6a4d90\r\nstatus: experimental\r\ndescription: >\r\n  Detects behavior consistent with an AMSI bypass where the AmsiScanBuffer\r\n  function is located and patched in memory to always return an error. This\r\n  technique disables script content scanning and is commonly used by\r\n  post-exploitation frameworks and staged malware payloads.\r\nauthor: Thaung Htet\r\ndate: 2026-02-02\r\nreferences:\r\n  - https://securelist.com/escan-supply-chain-attack/118688/\r\n  - https://www.securityweek.com/escan-antivirus-delivers-malware-in-supply-chain-attack/\r\n  - https://www.morphisec.com/blog/critical-escan-threat-bulletin/\r\n  - https://www.infosecurity-magazine.com/news/escan-antivirus-breach-delivers/\r\ntags:\r\n  - attack.defense_evasion\r\n  - attack.t1562.001\r\n  - attack.execution\r\nlogsource:\r\n  product: windows\r\n  category: process_access\r\ndetection:\r\n  amsi_target:\r\n    TargetImage|endswith:\r\n      - '\\amsi.dll'\r\n  suspicious_access:\r\n    GrantedAccess:\r\n      - '0x1F0FFF'\r\n      - '0x1FFFFF'\r\n      - '0x1010'\r\n  suspicious_source:\r\n    SourceImage|endswith:\r\n      - '\\powershell.exe'\r\n      - '\\pwsh.exe'\r\n      - '\\wscript.exe'\r\n      - '\\cscript.exe'\r\n      - '\\mshta.exe'\r\n  condition: amsi_target and suspicious_access and suspicious_source\r\nfalsepositives:\r\n  - Security products performing introspection\r\n  - Advanced debugging or malware research tools\r\nlevel: critical\r\n"
