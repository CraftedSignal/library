    logsource:
      category: file_event
      product: windows
    detection:
      selection_path:
        TargetFilename|contains|all:
          - ProgramData
          - IntelDriver
          - boot64x.w
      selection_parent:
        ParentImage|endswith:
          - \powershell.exe
          - \mbs.exe
          - \cmd.exe
          - \wscript.exe
      condition: selection_path and selection_parent
    level: critical
