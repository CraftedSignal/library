id: 019cf832-1aff-72b7-88fc-87d96a380b8a
name: BeardShell C2 via Icedrive
description: Detects outbound network traffic to Icedrive domains from non-browser and non-Icedrive client processes, which could indicate C2 communication by the BeardShell implant used by Sednit (APT28).
query: |
    title: BeardShell C2 via Icedrive
    id: 52b9a60b-1bf3-49e2-b914-dd6e7081c0a2
    status: experimental
    description: Detects outbound network traffic to Icedrive domains from
      non-browser and non-Icedrive client processes, which could indicate C2
      communication by the BeardShell implant used by Sednit (APT28).
    author: detections.ai
    references:
      - https://www.welivesecurity.com/en/eset-research/sednit-reloaded-back-trenches/
    date: 2026-03-16
    tags:
      - attack.command_and_control
      - attack.t1102
      - attack.t1071.001
      - attack.g0049
    logsource:
      category: network_connection
      product: windows
    detection:
      selection:
        # Detects connections to Icedrive domains, a known C2 channel for BeardShell
        DestinationHostname|endswith: '.icedrive.net'
      filter:
        # Filters out legitimate processes known to connect to Icedrive
        Image|endswith:
          - '\icedrive.exe'
          - '\chrome.exe'
          - '\firefox.exe'
          - '\msedge.exe'
      condition: selection and not filter
    falsepositives:
      - Other legitimate applications or scripts that interact with Icedrive could
        trigger this rule. Consider tuning the filter by adding other legitimate
        processes specific to your environment.
    level: medium
query_type: sigma
severity: medium
tactics:
    - TA0011
techniques:
    - T1102
    - T1071.001
