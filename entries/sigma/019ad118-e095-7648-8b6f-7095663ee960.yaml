query: "title: SocGholish PowerShell Reconnaissance With Obfuscation\r\nid: 82e40888-75a9-4261-86cb-d7172ea42de0\r\nstatus: experimental\r\ndescription: >-\r\n  Detects PowerShell reconnaissance commands associated with SocGholish/RomCom\r\n  activity, where PowerShell is invoked with embedded double quotes to evade\r\n  simple detections.\r\nreferences:\r\n  - >-\r\n    https://arcticwolf.com/resources/blog/romcom-utilizing-socgholish-to-deliver-mythic-agent-to-usa-companies-supporting-ukraine/\r\nauthor: Georg Lauenstein\r\ndate: 2025-12-03\r\ntags:\r\n  - attack.execution\r\n  - attack.t1059.001\r\n  - attack.discovery\r\n  - detection.emerging-threats\r\nlogsource:\r\n  category: process_creation\r\n  product: windows\r\ndetection:\r\n  selection_obfuscation:\r\n    CommandLine|contains:\r\n      - p\"\"owershell\r\n  selection_recon:\r\n    CommandLine|contains:\r\n      - System.DirectoryServices.DirectorySearcher\r\n      - samaccountname\r\n      - operatingSystem=\r\n      - key=clear\r\n  condition: all of selection_*\r\nfalsepositives:\r\n  - Legitimate but unusual scripting activity.\r\nlevel: high\r\n"
