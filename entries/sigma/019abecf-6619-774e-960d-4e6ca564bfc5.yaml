name: FlexibleFerret Suspicious Ad-hoc App Execution
description: Detects execution of ad-hoc signed applications from suspicious locations, used by FlexibleFerret credential harvesting.
query: |
    ---
    title: FlexibleFerret Ad-hoc Signed Application Execution
    id: a1b2c3d4-1234-4e5f-8a9b-0c1d2e3f4a5b
    status: experimental
    description: Detects execution of ad-hoc signed applications from suspicious locations, used by FlexibleFerret credential harvesting
    author: Claude Opus 4.5
    date: 2025/11/26
    references:
        - https://www.jamf.com/blog/flexibleferret-malware-continues-to-adapt/
    tags:
        - attack.execution
        - attack.t1204.002
        - attack.defense_evasion
        - attack.t1553.002
    logsource:
        category: process_creation
        product: macos
    detection:
        selection_location:
            Image|contains:
                - '/var/tmp/'
                - '/tmp/'
                - 'CDrivers'
        selection_app:
            Image|endswith: '.app/Contents/MacOS/'
        condition: selection_location and selection_app
    falsepositives:
        - Legitimate applications temporarily stored in temp directories
    level: high
query_type: sigma
severity: high
