id: 019ca099-09c1-721f-a442-e4aa0a12e89c
name: DUSTTRAP Dropper Mutex Detection
description: Detects known mutexes associated with DUSTTRAP dropper activity. The rule specifically looks for the mutex name 'ICMzUEkdLNayBdWF' during process creation events on Windows systems.
query: |-
    title: DUSTTRAP Dropper Mutex Detection
    status: experimental
    description: Detects known mutexes associated with DUSTTRAP dropper activity.
    author: '@adhikara13'
    date: 2024/05/22
    references:
      - 'https://cloud.google.com/blog/topics/threat-intelligence/apt41-arisen-from-dust'
    tags:
      - 'attack.execution.t1204'
      - 'malware.dropper.dusttrap'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'ICMzUEkdLNayBdWF'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0002
techniques:
    - T1204
tags:
    - attack.execution.t1204
    - malware.dropper.dusttrap
author: '@adhikara13'
version: "1"
references:
    - https://cloud.google.com/blog/topics/threat-intelligence/apt41-arisen-from-dust
data_sources:
    - process_creation
    - windows
