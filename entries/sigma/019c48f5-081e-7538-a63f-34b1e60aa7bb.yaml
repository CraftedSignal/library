id: 019c48f5-081e-7538-a63f-34b1e60aa7bb
name: UAC Bypass via ms-settings Registry Hijack
description: The rule detects modifications to specific registry keys associated with UAC bypass techniques, particularly those leveraging fodhelper.exe. It monitors changes to the 'ms-settings\Shell\Open\command\(Default)' and 'ms-settings\Shell\Open\command\DelegateExecute' registry values. These modifications are indicative of an attempt to bypass User Account Control by hijacking the execution flow of a trusted process.
query: "title: UAC Bypass via ms-settings Registry Hijack\r\nid: 8d4c9f2a-7e5b-4c3d-9f6a-5b8c7d9e4f2a\r\nstatus: experimental\r\ndescription: Detects modification of ms-settings Shell\\Open\\command registry keys used for UAC bypass via fodhelper.exe. Monitors both the Default value (payload) and DelegateExecute value (COM handler removal). This registry key should never be modified by legitimate software.\r\nreferences:\r\n    - https://attack.mitre.org/techniques/T1548.002/\r\n    - https://attack.mitre.org/techniques/T1112/\r\n    - https://github.com/winscripting/UAC-bypass/blob/master/FodhelperBypass.ps1\r\nauthor: SimSpace\r\ndate: 2026-01-01\r\nmodified: 2026-01-19\r\ntags:\r\n    - attack.privilege-escalation\r\n    - attack.defense-evasion\r\n    - attack.t1548.002\r\n    - attack.t1112\r\nlogsource:\r\n    category: registry_set\r\n    product: windows\r\ndetection:\r\n    selection:\r\n        TargetObject|endswith:\r\n            - '\\ms-settings\\Shell\\Open\\command\\(Default)'\r\n            - '\\ms-settings\\Shell\\Open\\command\\DelegateExecute'\r\n    condition: selection\r\nfields:\r\n    - TargetObject\r\n    - Details\r\n    - User\r\nfalsepositives:\r\n    - None\r\nlevel: critical"
