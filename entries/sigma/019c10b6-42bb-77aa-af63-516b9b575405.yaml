id: 019c10b6-42bb-77aa-af63-516b9b575405
name: Interlock Hotta Killer Service Creation
description: Detects the creation or start of a Windows service with a name pattern 'UpdateCheckerX64_{random-numbers}'. This is a characteristic behavior of the 'Hotta Killer' tool used by the Interlock ransomware group to load a vulnerable driver (CVE-2025-61155) for disabling security products.
query: |
    title: Interlock Hotta Killer Service Creation
    id: 1fbbec12-a8e8-4258-a25d-4c8ce19a9a02
    status: experimental
    description: Detects the creation or start of a Windows service with a name
      pattern 'UpdateCheckerX64_{random-numbers}'. This is a characteristic behavior
      of the 'Hotta Killer' tool used by the Interlock ransomware group to load a
      vulnerable driver (CVE-2025-61155) for disabling security products.
    references:
