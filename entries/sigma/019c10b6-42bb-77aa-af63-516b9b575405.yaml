      product: windows
    detection:
      selection:
        # Detects the specific service name pattern used by the 'Hotta Killer' tool
        ServiceName|startswith: 'UpdateCheckerX64_'
      condition: selection
    falsepositives:
      - Legitimate software using a similar naming convention.
    level: high
    associated_cves:
      - CVE-2025-61155
