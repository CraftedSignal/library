id: 019c1d3d-daef-7218-a7a6-fa0e9141d450
name: eScan Antivirus Exception Abuse via MwMonitor Registry Modification
description: |
    Detects modification of the eScan for Windows MwMonitor registry key to add critical system directories (C:\Windows, C:\Program Files, C:\Program Files (x86)) to antivirus exceptions. This behavior significantly weakens endpoint protection and may indicate malicious tampering or supply-chain abuse.
query: "title: eScan Antivirus Exception Abuse via MwMonitor Registry Modification\r\nid: c4b3a6f1-1c2a-4c9e-9e42-6c7e8d5c1b90\r\nstatus: experimental\r\ndescription: >\r\n  Detects modification of the eScan for Windows MwMonitor registry key to add\r\n  critical system directories (C:\\Windows, C:\\Program Files, C:\\Program Files (x86))\r\n  to antivirus exceptions. This behavior significantly weakens endpoint protection\r\n  and may indicate malicious tampering or supply-chain abuse.\r\nauthor: Thaung Htet\r\ndate: 2026-02-02\r\nreferences:\r\n  - https://securelist.com/escan-supply-chain-attack/118688/\r\n  - https://www.securityweek.com/escan-antivirus-delivers-malware-in-supply-chain-attack/\r\n  - https://www.morphisec.com/blog/critical-escan-threat-bulletin/\r\n  - https://www.infosecurity-magazine.com/news/escan-antivirus-breach-delivers/\r\ntags:\r\n  - attack.defense_evasion\r\n  - attack.t1562.001\r\nlogsource:\r\n  product: windows\r\n  category: registry_event\r\ndetection:\r\n  escan_registry_key:\r\n    TargetObject|contains:\r\n      - '\\SOFTWARE\\WOW6432Node\\MicroWorld\\eScan for Windows\\MwMonitor'\r\n  suspicious_exclusions:\r\n    Details|contains:\r\n      - 'C:\\Windows'\r\n      - 'C:\\Program Files'\r\n      - 'C:\\Program Files (x86)'\r\n  condition: escan_registry_key and suspicious_exclusions\r\nfalsepositives:\r\n  - Legitimate eScan configuration changes by administrators\r\n  - Troubleshooting or temporary exclusion during software installation\r\nlevel: high\r\n"
