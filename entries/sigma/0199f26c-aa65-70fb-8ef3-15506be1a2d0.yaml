    id: 2917d21d-dd6c-4b66-ae4f-0c14a689f3cc
    status: experimental
    description: Detects network connections from web browsers to domains associated
      with the UNC5142 EtherHiding technique, including a specific blockchain node
      and malicious Cloudflare Pages domains.
