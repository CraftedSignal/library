id: 25ec9ae7-03d0-481e-be6c-a5ba3be55db9
name: Bonadan Actor Command Line Activity
description: Detects command line patterns associated with the threat actor Bonadan (also known as APT27, Emissary Panda, Lucky Mouse, Bronze Union, G0065). This rule identifies the use of certutil for decoding payloads, wmic for process creation, and schtasks for persistence in suspicious directories.
query: |
    title: Bonadan Actor Command Line Activity
    id: 783ca8c8-e72a-497d-83fd-3defb9c79eff
    status: experimental
    description: Detects command line patterns associated with the threat actor Bonadan (also known as APT27, Emissary Panda, Lucky Mouse, Bronze Union, G0065). This rule identifies the use of certutil for decoding payloads, wmic for process creation, and schtasks for persistence in suspicious directories.
    references:
      - https://attack.mitre.org/groups/G0065/
      - https://www.cisa.gov/news-events/cybersecurity-advisories/aa22-152a
      - https://www.secureworks.com/research/bronze-union-lures-japanese-targets-with-new-datper-malware
    author: detections.ai
    date: 2025-08-29
    tags:
      - attack.g0065
      - attack.execution
      - attack.persistence
      - attack.defense_evasion
      - attack.t1047
      - attack.t1140
      - attack.t1053.005
    logsource:
      category: process_creation
      product: windows
    detection:
        # Reusable selection for suspicious world-writable directories often used for staging
      suspicious_paths:
        CommandLine|contains:
          - 'C:\ProgramData\'
          - 'C:\Users\Public\'
          - 'C:\Windows\Temp\'
        # Certutil used to decode a file
      certutil_decode:
        Image|endswith: '\certutil.exe'
        CommandLine|contains|all:
          - '-decode'
        CommandLine|contains:
          - '.exe'       # Output file is an executable or library
          - '.dll'
        # WMIC used for process creation
      wmic_create:
        Image|endswith: '\wmic.exe'
        CommandLine|contains|all:
          - 'process'
          - 'call'
          - 'create'
        # Schtasks used for persistence with masquerading
      schtasks_create:
        Image|endswith: '\schtasks.exe'
        CommandLine|contains|all:
          - '/create'
          - '/tr'
        CommandLine|contains:
          - 'Microsoft\Windows\Ras\Manager'       # Known task names used for masquerading
          - 'Microsoft\Windows\URas\Manager'
        # The condition combines the specific tool usage with the suspicious path context
      condition: (certutil_decode and suspicious_paths) or (wmic_create and suspicious_paths) or (schtasks_create and suspicious_paths)
    falsepositives:
      - Legitimate administrative scripts may use these utilities to write files or create processes in these directories. However, it is uncommon.
      - If false positives occur, consider adding more specific command-line arguments or parent process information to the rule.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0002
    - TA0003
    - TA0005
    - TA0004
techniques:
    - T1047
    - T1140
