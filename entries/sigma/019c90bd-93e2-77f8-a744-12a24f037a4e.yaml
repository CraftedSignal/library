id: 019c90bd-93e2-77f8-a744-12a24f037a4e
name: XWorm LATAM - WMI Spawned PowerShell With Cloudinary
description: Detects a low-noise XWorm execution chain described by ANY.RUN where WmiPrvSE.exe spawns PowerShell that uses WebClient to fetch Cloudinary-hosted content and performs in-memory Assembly.Load.
query: |
    title: XWorm LATAM - WMI Spawned PowerShell With Cloudinary
    id: 0b29d1f3-3d2a-4c5b-8f33-9f15d6e1b6f9
    status: experimental
    description: >-
      Detects a low-noise XWorm execution chain described by ANY.RUN where
      WmiPrvSE.exe spawns PowerShell that uses WebClient to fetch Cloudinary-hosted
      content and performs in-memory Assembly.Load.
    author: Daniel Jeremiah
    date: 2026-02-24T00:00:00.000Z
    references:
      - https://any.run/cybersecurity-blog/xworm-latam-campaign/
    logsource:
      product: windows
      category: process_creation
      service: powershell-classic
    detection:
      selection_parent:
        ParentImage|endswith: \WmiPrvSE.exe
      selection_child:
        Image|endswith:
          - \powershell.exe
          - \pwsh.exe
      selection_cmd:
        CommandLine|contains|all:
          - System.Net.WebClient
          - cloudinary
          - Assembly.Load
      condition: selection_parent and selection_child and selection_cmd
    falsepositives:
      - Rare; validate the Cloudinary URL and follow-on network to ddns / port 7000
        as described in reporting.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0002
    - TA0004
    - TA0003
    - TA0005
techniques:
    - T1047
    - T1546.003
    - T1059.001
    - T1620
author: Daniel Jeremiah
version: "3"
references:
    - https://any.run/cybersecurity-blog/xworm-latam-campaign/
data_sources:
    - process_creation
    - windows
