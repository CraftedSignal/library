id: 019c964c-895e-7069-98d1-50bf419fdaf2
name: Github Certificate Auth Disabled
description: "Detects action of SSH ertificate Auth being disabled. This would mean password auth is allowed. \nThis could indicate an Authentication downgrade attack, disabling Security controls.\n"
query: "title: Github Certificate Auth Disabled\nid: b82a9b87-2156-468d-a376-716cff093d9e\nstatus: experimental\ndescription: >\n  Detects action of SSH ertificate Auth being disabled. This would mean password\n  auth is allowed. \n\n  This could indicate an Authentication downgrade attack, disabling Security\n  controls.\nreferences:\n  - >-\n    https://docs.github.com/en/enterprise-cloud@latest/admin/monitoring-activity-in-your-enterprise/reviewing-audit-logs-for-your-enterprise/audit-log-events-for-your-enterprise#ssh_certificate_authority\ntags:\n  - attack.persistence\n  - attack.privilege-escalation\n  - attack.t1562.010\nlogsource:\n  product: github\n  category: audit\ndetection:\n  selection_action:\n    - ssh_certificate_requirement.disable\n  filter_automations:\n    TargetFilename|contains:\n      - '%automation_scripts%'\n  condition: selection_action and not filter_automations\nlevel: medium\nauthor: zendannyy\nfalsepositives:\n  - Legitimate administrative actions to change authentication methods.\n    (Correlate with change management)\n"
query_type: sigma
severity: medium
