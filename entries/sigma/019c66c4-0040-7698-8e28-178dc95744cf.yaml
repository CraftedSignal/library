id: 019c66c4-0040-7698-8e28-178dc95744cf
name: BADIIS Malware Masquerading as Driver File
description: Detects the creation of files with a .sys extension in the C:\Windows\System32\drivers\ directory that are actually portable executables (DLLs/EXEs). This is a staging technique used by the REF4033 group to deploy the BADIIS malware.
query: |
    title: BADIIS Malware Masquerading as Driver File
    id: 3569c218-4fe5-4592-93bc-19be0dd6a8b4
    status: experimental
    description: >-
      Detects the creation of files with a .sys extension in the
      C:\Windows\System32\drivers\ directory that are actually portable executables
      (DLLs/EXEs). This is a staging technique used by the REF4033 group to deploy
      the BADIIS malware.
    author: tim@detections.ai
    references:
      - >-
        https://www.elastic.co/security-labs/badiis-to-the-bone-new-insights-to-global-seo-poisoning-campaign
    date: 2026-02-16T00:00:00.000Z
    tags:
      - attack.t1036.005
      - attack.t1505.004
    logsource:
      category: file_event
      product: windows
      service: sysmon
    detection:
      selection:
        TargetFilename|endswith:
          - '\WUDFPfprot.sys'
          - '\WppRecorderpo.sys'
          - '\WppRecorderrt.sys'
      condition: selection
    falsepositives:
      - This detection is based on specific filenames used by the threat actor and
        is therefore considered high fidelity. False positives are unlikely.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0005
techniques:
    - T1036.005
    - T1036
