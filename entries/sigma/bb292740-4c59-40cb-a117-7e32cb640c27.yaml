id: bb292740-4c59-40cb-a117-7e32cb640c27
name: Salesforce Suspicious Activity Related to ShinyHunters Campaign
description: Detects suspicious activities in Salesforce environments consistent with the TTPs of the ShinyHunters threat group (also tracked as UNC6040/UNC6240). The attack involves social engineering (vishing) to trick users into authorizing malicious OAuth applications that impersonate legitimate tools like 'Salesforce Data Loader'. This rule looks for key indicators such as the installation of unreviewed packages, creation of impersonating connected apps, elevation of permissions to 'full' API access, and large data exports.
query: |
    title: Salesforce Suspicious Activity Related to ShinyHunters Campaign
    id: cd18615f-fccd-40c2-9305-80f5ae161837
    status: experimental
    description: |
      Detects suspicious activities in Salesforce environments consistent with the TTPs of the ShinyHunters threat group (also tracked as UNC6040/UNC6240).
      The attack involves social engineering (vishing) to trick users into authorizing malicious OAuth applications that impersonate legitimate tools like 'Salesforce Data Loader'.
      This rule looks for key indicators such as the installation of unreviewed packages, creation of impersonating connected apps, elevation of permissions to 'full' API access, and large data exports.
    references:
      - https://blog.vorlon.io/shinyhunters-salesforce-response-tips
    author: detections.ai
    date: 2025-08-13
    tags:
      - attack.initial_access
      - attack.t1566.004
      - attack.t1078.004
      - attack.exfiltration
      - attack.t1530
      - threat_actor.shinyhunters
      - threat_actor.unc6040
      - threat_actor.unc6240
    logsource:
      product: salesforce
      category: cloud
    detection:
      unreviewed_package:
            # Detects when a managed package is installed without undergoing Salesforce's security review process.
        EventType: 'nonSecurityReviewedManagedPackageInstalled'
      new_suspicious_app:
            # Detects the creation of a new connected app with names known to be used for impersonation in this campaign.
        EventType: 'ConnectedAppCreated'
        AppName:
          - 'Salesforce Data Loader'
          - 'My Ticket Portal'
      scope_elevation:
            # Detects when a connected app's permissions are updated to include 'full' API access, a high-risk permission.
        EventType: 'ConnectedAppUpdated'
        Scope|contains: 'full'
      large_export:
            # Detects potentially anomalous large data exports via reports.
        EventType: 'ReportExport'
        RowsProcessed|gt: 5000     # This threshold may need to be adjusted based on normal business operations.
      condition: 1 of them
    falsepositives:
      - Legitimate administrators may install unreviewed packages from trusted developers, though this should be rare and verified.
      - Legitimate applications may be created with names similar to those listed.
      - Large data exports may be part of normal business intelligence, data migration, or backup activities.
      - An administrator may legitimately grant 'full' scope to a trusted application during setup or troubleshooting.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0010
    - TA0001
    - TA0005
    - TA0003
    - TA0004
    - TA0009
techniques:
