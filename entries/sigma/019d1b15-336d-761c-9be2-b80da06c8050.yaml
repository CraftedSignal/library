name: Langflow Public Build Endpoint Access (CVE-2026-33017)
description: Detects HTTP POST requests targeting the Langflow public flow build endpoint, which is vulnerable to unauthenticated Remote Code Execution (CVE-2026-33017).
query: |
    title: Langflow Public Build Endpoint Access (CVE-2026-33017)
    id: 6211f4a1-0836-4406-8742-cad8341452f5
    status: experimental
    description: Detects HTTP POST requests targeting the Langflow public flow build
      endpoint, which is vulnerable to unauthenticated Remote Code Execution
      (CVE-2026-33017).
    author: tim@detections.ai
    references:
      - https://www.sysdig.com/blog/cve-2026-33017-how-attackers-compromised-langflow-ai-pipelines-in-20-hours
    date: 2026-03-23
    tags:
      - attack.initial-access
      - attack.t1190
      - cve.2026-33017
    logsource:
      category: webserver
    detection:
      selection:
        cs-method: 'POST'
        cs-uri-stem|contains: '/api/v1/build_public_tmp/'
        cs-uri-stem|endswith: '/flow'
      condition: selection
    falsepositives:
      - Legitimate public flow builds if intended by the organization and exposed.
    level: high
