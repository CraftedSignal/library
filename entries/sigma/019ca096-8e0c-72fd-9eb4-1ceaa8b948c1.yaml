id: 019ca096-8e0c-72fd-9eb4-1ceaa8b948c1
name: ChiChi Ransomware Mutex Detection
description: This rule detects the creation of specific mutexes associated with the ChiChi ransomware. The detection is based on the presence of the mutex name 'chichigotmanagedyou'. The rule leverages process creation logs from Windows systems to identify these mutexes, indicating potential ChiChi ransomware activity. False positives are considered unlikely due to the unique nature of the mutex name.
query: |-
    title: ChiChi Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with ChiChi ransomware activity.
    author: '@adhikara13'
    date: 2025/07/13
    references:
      - 'https://id-ransomware.blogspot.com/2021/11/chichi-ransomware.html'
      - 'https://x.com/demonslay335/status/1461020406052274178'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.chichi'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'chichigotmanagedyou'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.chichi
author: '@adhikara13'
version: "1"
references:
    - https://id-ransomware.blogspot.com/2021/11/chichi-ransomware.html
    - https://x.com/demonslay335/status/1461020406052274178
data_sources:
    - process_creation
    - windows
