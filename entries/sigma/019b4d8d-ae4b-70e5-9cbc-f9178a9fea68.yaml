id: 019b4d8d-ae4b-70e5-9cbc-f9178a9fea68
name: Hidden File Attribute Assignment via Attrib
description: Detects the use of attrib.exe to set system (+s) and hidden (+h) attributes on an executable file in a suspicious folder. This technique was observed being used by threat actors to hide payloads like SparkRAT.
query: "title: Hidden File Attribute Assignment via Attrib\r\nid: 5fbd04ff-91f0-413a-a8bc-f472e5f765c9\r\nstatus: experimental\r\ndescription: >-\r\n  Detects the use of attrib.exe to set system (+s) and hidden (+h) attributes on\r\n  an executable file in a suspicious folder. This technique was observed being\r\n  used by threat actors to hide payloads like SparkRAT.\r\nreferences:\r\n  - >-\r\n    https://www.huntress.com/blog/trial-error-typos-malware-attacks-sophisticated\r\nauthor: tim@detections.ai\r\ndate: 2025-12-23T00:00:00.000Z\r\ntags:\r\n  - attack.t1564.001\r\n  - attack.defense_evasion\r\nlogsource:\r\n  category: process_creation\r\n  product: windows\r\n  service: sysmon\r\ndetection:\r\n  base:\r\n    Image|endswith: \\attrib.exe\r\n    CommandLine|contains|all:\r\n      - ' +s '\r\n      - ' +h '\r\n      - .exe\r\n  paths:\r\n    CommandLine|contains:\r\n      - \\Appdata\\Local\\Temp\\\r\n      - C:\\Users\\Public\\\r\n      - C:\\ProgramData\\\r\n      - C:\\Windows\\System32\\0409\\\r\n  condition: base and paths\r\nfalsepositives:\r\n  - Review the parent process and the executable being hidden for legitimacy.\r\nlevel: medium\r\n"
