id: 019ca09a-b6d0-70c8-b932-76e6849cd96c
name: Hamster Ransomware Mutex Detection
description: Detects the creation of specific mutexes ('HamsterLiveHere') that are known to be associated with Hamster ransomware activity. This rule focuses on identifying the presence of these unique mutex names as an indicator of compromise by Hamster ransomware.
query: |-
    title: Hamster Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Hamster ransomware activity.
    author: '@adhikara13'
    date: 2024/08/01
    references:
      - 'https://id-ransomware.blogspot.com/2021/11/hamster-ransomware.html'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.hamster'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'HamsterLiveHere'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.hamster
author: '@adhikara13'
version: "1"
references:
    - https://id-ransomware.blogspot.com/2021/11/hamster-ransomware.html
data_sources:
    - process_creation
    - windows
