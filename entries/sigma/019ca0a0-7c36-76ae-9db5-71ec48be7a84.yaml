id: 019ca0a0-7c36-76ae-9db5-71ec48be7a84
name: Satan Ransomware Mutex Detection
description: The rule detects the creation of specific mutexes associated with Satan ransomware activity. It looks for mutex names 'SSSS_Scan' or 'SATAN_CRYPT'. The detection is based on process creation events on Windows systems.
query: |-
    title: Satan Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Satan ransomware activity.
    author: '@adhikara13'
    date: 2024/12/19
    references:
      - 'https://www.trendmicro.com/vinfo/fi/threat-encyclopedia/malware/ransom.win32.satana.a'
      - 'https://bartblaze.blogspot.com/2020/01/satan-ransomware-rebrands-as-5ss5c.html'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.satan'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'SSSS_Scan'
          - 'SATAN_CRYPT'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.satan
author: '@adhikara13'
version: "1"
references:
    - https://www.trendmicro.com/vinfo/fi/threat-encyclopedia/malware/ransom.win32.satana.a
    - https://bartblaze.blogspot.com/2020/01/satan-ransomware-rebrands-as-5ss5c.html
data_sources:
    - process_creation
    - windows
