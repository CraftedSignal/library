id: 019ab6f1-9afe-75eb-bc34-9950c76e71d9
name: Shai-Hulud Malicious NPM Package Installation Detected - Second Coming
description: Detects the installation of specific NPM packages that have been identified as compromised by the Shai-Hulud "Second Coming" worm. Installation of these packages can lead to credential theft and further propagation of the malware.
query: |
    title: Shai-Hulud Malicious NPM Package Installation Detected - Second Coming
    id: 93c53a94-da55-4b76-88d4-b7afa0f1a778
    status: experimental
    description: Detects the installation of specific NPM packages that have been
      identified as compromised by the Shai-Hulud "Second Coming" worm. Installation
      of these packages can lead to credential theft and further propagation of the
      malware.
    references:
      - https://www.aikido.dev/blog/shai-hulud-strikes-again-hitting-zapier-ensdomains
    author: detections.ai
    date: 2025-11-24
    tags:
      - attack.t1195.002
      - detection.emerging-threats
    logsource:
      category: process_creation
      product: all
    detection:
      selection_base:
        Image|endswith:
          - '\npm.cmd'
          - '\npm'
          - '\yarn.cmd'
          - '\yarn'
          - '\pnpm.cmd'
          - '\pnpm'
          - '\bun.exe'
          - '\bun'
        CommandLine|contains:
          # Catches common installation commands for various package managers
          - ' install '
          - ' i '
          - ' add '
