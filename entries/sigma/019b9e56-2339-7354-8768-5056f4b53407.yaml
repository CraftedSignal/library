name: Suspicious Process Access with Full Access Rights
description: Detects processes accessing other processes with full access rights (0x1FFFFF), often used for process injection or code manipulation prior to privilege escalation.
query: "title: Suspicious Process Access with Full Access Rights\r\nid: e86ce92a-d3d9-4404-a693-ec4526759e18\r\nstatus: test\r\ndescription: Detects processes accessing other processes with full access rights (0x1FFFFF), often used for process injection or code manipulation prior to privilege escalation.\r\nreferences:\r\n    - https://attack.mitre.org/techniques/T1055/\r\nauthor: SimSpace\r\ndate: 2026-01-01\r\ntags:\r\n    - attack.defense-evasion\r\n    - attack.t1055\r\n    - attack.privilege-escalation\r\n    - attack.t1134.004\r\nlogsource:\r\n    product: windows\r\n    category: process_access\r\ndetection:\r\n    selection_access:\r\n        GrantedAccess: '0x1FFFFF'\r\n    selection_suspicious_source:\r\n        SourceImage|contains:\r\n            - '\\Users\\Public\\'\r\n            - '\\Windows\\Temp\\'\r\n            - '\\Downloads\\'\r\n            - '\\AppData\\Local\\Temp\\'\r\n    selection_target:\r\n        TargetImage|endswith:\r\n            - '\\cmd.exe'\r\n            - '\\powershell.exe'\r\n            - '\\pwsh.exe'\r\n            - '\\lsass.exe'\r\n            - '\\svchost.exe'\r\n    condition: selection_access and (selection_suspicious_source or selection_target)\r\nfalsepositives:\r\n    - None currently known.\r\nlevel: medium"
