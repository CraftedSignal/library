id: 34be092b-d0bd-4bec-bca3-1b152aac0c58
name: Suspicious NetScan Network Share Artifact
description: |
    This rule leverages Windows Security logs to detect potential lateral movement or staging activity  involving a known artifact used by NetScan, a portable network scanning tool.  Specifically, it monitors for attempts to write or delete files like `delete.me` across network shares.
query: "title: Suspicious NetScan Network Share Artifact\r\nid: 8edd6c45-e2e6-480c-a21a-aeea7e525f47\r\nstatus: experimental\r\ndescription: >\r\n  This rule leverages Windows Security logs to detect potential lateral movement\r\n  or staging activity  involving a known artifact used by NetScan, a portable\r\n  network scanning tool.  Specifically, it monitors for attempts to write or\r\n  delete files like `delete.me` across network shares.\r\nauthor: Tim Peck\r\nreferences:\r\n  - https://thedfirreport.com/2024/01/29/buzzing-on-christmas-eve-trigona-ransomware-in-3-hours/\r\n  - https://content.vectra.ai/hubfs/downloadable-assets/RansomOps-Post-Incident-Report.pdf\r\n  - https://www.microsoft.com/en-us/security/blog/2023/07/06/the-five-day-job-a-blackbyte-ransomware-intrusion-case-study/\r\n  - https://securityaffairs.com/145960/malware/new-cactus-ransomware.html\r\n  - https://www.trendmicro.com/vinfo/us/security/news/ransomware-spotlight/ransomware-spotlight-royal\r\n  - https://unit42.paloaltonetworks.com/medusa-ransomware-escalation-new-leak-site/\r\n  - https://news.sophos.com/en-us/2023/12/21/akira-again-the-ransomware-that-keeps-on-taking/\r\n  - https://www.sentinelone.com/anthology/inc-ransom/\r\ndate: 2025/08/01\r\nlogsource:\r\n  product: windows\r\n  service: security\r\ndetection:\r\n  selection1:\r\n    EventID: 5145\r\n  selection2:\r\n    RelativeTargetName:\r\n      - 'delete.me'\r\n      - 'delete.me:Zone.Identifier'\r\n    Accesses|contains:\r\n      - 'WriteData (or AddFile)' # As it appears in the logs / Documentation\r\n      - 'DELETE'\r\n    ObjectType: File\r\n  condition: selection1 and selection2\r\nlevel: medium\r\ntags:\r\n  - attack.discovery\r\n  - attack.T1135\r\n  - threat.akira\r\n  - threat.fivehands\r\n  - threat.trigona\r\n  - threat.blackbyte\r\n  - threat.cactus\r\n  - threat.royal\r\n  - threat.medusa\r\n  - threat.lockbit3\r\n  - threat.inc_ransom\r\n  - threat.aki_rat\r\nfalsepositives:\r\n  - Authorized scanning activity\r\n"
