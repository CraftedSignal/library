id: 019cd964-4229-72d9-a450-d43f641718f5
name: Dead#Vax Self-Parsing PowerShell Loader
description: Detects PowerShell attempting to read a specific batch file named 'rEgX.cmd' using Get-Content, a signature behavior of the Dead#Vax self-parsing loader. This technique is used to extract a hidden payload from the script itself.
query: |
    title: Dead#Vax Self-Parsing PowerShell Loader
    id: 9f1bb9f8-bdaf-42f8-947d-a89f5e40c68f
    status: experimental
    description: >-
      Detects PowerShell attempting to read a specific batch file named 'rEgX.cmd'
      using Get-Content, a signature behavior of the Dead#Vax self-parsing loader.
      This technique is used to extract a hidden payload from the script itself.
    author: detections.ai
    references:
      - https://www.securonix.com/blog/deadvax-threat-research-security-advisory/
    date: 2026-03-10T00:00:00.000Z
    tags:
      - attack.t1059.001
      - attack.t1027
      - attack.s1029
    logsource:
      category: process_creation
      product: windows
    detection:
      selection_process:
        Image|endswith:
          - \powershell.exe
          - \pwsh.exe
          - \mbs.exe
      selection_cmdline:
        CommandLine|contains|all:
          - Get-Content
          - rEgX.cmd
      condition: all of selection_*
    falsepositives:
      - The filename 'rEgX.cmd' is specific, but could potentially be used by
        legitimate scripts. The combination with 'Get-Content' significantly reduces
        the likelihood of false positives.
    level: high
query_type: sigma
severity: high
