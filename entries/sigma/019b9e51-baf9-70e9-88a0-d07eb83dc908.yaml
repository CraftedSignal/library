id: 019b9e51-baf9-70e9-88a0-d07eb83dc908
name: Scheduled Task Running as SYSTEM with Suspicious Command Lines
description: Detects scheduled tasks configured to run as SYSTEM executing suspicious binaries or commands, often used for privilege escalation and defense evasion.
query: |
    title: Scheduled Task Running as SYSTEM with Suspicious Command Lines
    id: 4e35f69c-6c2d-46d1-908c-bd043adcef52
    status: test
    description: >-
      Detects scheduled tasks configured to run as SYSTEM executing suspicious
      binaries or commands, often used for privilege escalation and defense evasion.
    references:
      - https://attack.mitre.org/techniques/T1053/005/
      - https://attack.mitre.org/techniques/T1548/
    author: SimSpace
    date: 2026-01-01T00:00:00.000Z
    tags:
      - attack.privilege-escalation
      - attack.t1053.005
      - attack.defense-evasion
      - attack.t1548
    logsource:
      product: windows
      service: security
    detection:
      selection_event:
        EventID: 4698
      selection_system:
        TaskContent|contains:
          - <UserId>S-1-5-18</UserId>
          - <UserId>NT AUTHORITY\\SYSTEM</UserId>
          - <UserId>SYSTEM</UserId>
      selection_suspicious:
        TaskContent|contains:
          - WindowsSandbox.exe
          - cmd.exe
          - powershell.exe
          - pwsh.exe
          - wscript.exe
          - cscript.exe
          - mshta.exe
          - regsvr32.exe
          - rundll32.exe
      condition: selection_event and selection_system and selection_suspicious
    falsepositives:
      - None currently known.
    level: high
query_type: sigma
severity: medium
tactics:
    - TA0004
    - TA0005
    - TA0002
    - TA0003
techniques:
    - T1053.005
    - T1548
tags:
    - attack.privilege-escalation
    - attack.t1053.005
    - attack.defense-evasion
    - attack.t1548
author: SimSpace
version: "1"
references:
    - https://attack.mitre.org/techniques/T1053/005/
    - https://attack.mitre.org/techniques/T1548/
data_sources:
    - windows
    - security
