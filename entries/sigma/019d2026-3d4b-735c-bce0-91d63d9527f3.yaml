id: 019d2026-3d4b-735c-bce0-91d63d9527f3
name: ValleyRAT Config File Creation
description: Detects the creation of the ValleyRAT configuration file 'bb.jpg' in the public download directory. This activity is actively associated with Silver Fox (Void Arachne) campaigns targeting South Asia.
query: |
    title: ValleyRAT Config File Creation
    id: 1d9d37f6-a435-4093-b107-0314a7614d60
    status: experimental
    description: Detects the creation of the ValleyRAT configuration file 'bb.jpg'
      in the public download directory. This activity is actively associated with
      Silver Fox (Void Arachne) campaigns targeting South Asia.
    author: detections.ai
    references:
      - https://blog.sekoia.io/silver-fox-the-only-tax-audit-where-the-fine-print-installs-malware/
    date: 2026-03-24
    tags:
      - attack.command-and-control
      - attack.t1105
    logsource:
      category: file_event
      product: windows
    detection:
      # Detects the specific file path and name used by ValleyRAT to store its downloaded configuration file
      selection:
        TargetFilename|endswith: '\users\public\download\bb.jpg'
      condition: selection
    falsepositives:
      - It is highly unlikely to have a legitimate image file named 'bb.jpg'
        automatically dropped in the specific 'C:\Users\Public\Downloads' directory.
        If false positives occur (e.g., from an automated backup or specific user
        action), consider filtering by trusted processes (Image) or correlating with
        unusual network connections.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0011
techniques:
    - T1105
