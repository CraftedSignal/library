name: Canary Account Authentication Attempt
description: 'Detects authentication attempts (successful or failed) against designated canary user accounts. Any such attempt is highly suspicious as these accounts have no legitimate purpose and indicate credential theft or discovery activity. Creation of Canary Accounts with scripts and other strategies can be found here: https://github.com/fluffybunnies-h4x/CyberDeception?tab=readme-ov-file#canary-accounts'
query: |
    title: Canary Account Authentication Attempt
    id: a5cee33c-8b90-45f1-a478-cacea37e7c17
    status: experimental
    description: >-
      Detects authentication attempts (successful or failed) against designated
      canary user accounts. Any such attempt is highly suspicious as these accounts
      have no legitimate purpose and indicate credential theft or discovery
      activity. Creation of Canary Accounts with scripts and other strategies can be
      found here:
      https://github.com/fluffybunnies-h4x/CyberDeception?tab=readme-ov-file#canary-accounts
    references:
      - https://github.com/fluffybunnies-h4x/CyberDeception
      - https://www.sans.org/white-papers/41
      - https://bloodhound.readthedocs.io/
      - https://canarytokens.org/
    author: detections.ai
    date: 2026-02-02T00:00:00.000Z
    tags:
      - attack.initial_access
      - attack.defense_evasion
      - attack.privilege_escalation
      - attack.persistence
      - attack.discovery
      - attack.t1078
      - attack.t1087.002
    logsource:
      product: windows
      service: security
    detection:
      selection:
        EventID:
          - 4624
          - 4625
          - 4648
          - 4776
        TargetUserName:
          - svc_backup
          - svc_sqlreport
          - admin_temp
          - helpdesk_admin
          - svc_scanner
          - IT_Admin
      condition: selection
    falsepositives:
      - Since these are canary accounts with no legitimate use, false positives
        should be extremely rare.
      - Ensure the list of target usernames is accurate and exclusively contains
        canary accounts created for deception purposes.
    level: critical
