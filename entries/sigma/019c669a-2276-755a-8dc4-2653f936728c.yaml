id: 019c669a-2276-755a-8dc4-2653f936728c
name: OpenClaw Install Script Execution by Content
description: This rule detects the execution of a bash or sh script that contains multiple identifiers related to OpenClaw installation. It specifically looks for command lines ending with '/bash' or '/sh' and containing 'openclaw', combined with additional OpenClaw-specific strings such as 'run_remote_bash', 'OPENCLAW_INSTALL_SH_NO_RUN', 'OPENCLAW_USE_GUM', 'All your chats, one OpenClaw', '.openclaw/openclaw.json', or 'openclaw.ai/install.sh'. This content-based detection aims to identify OpenClaw install script execution even if the script is renamed.
query: |
    title: OpenClaw Install Script Execution by Content
    id: b2c3d4e5-f6a7-4b9c-0d1e-openclaw02
    status: experimental
    description: |
        bash or sh executed with command line containing multiple OpenClaw script identifiers. Detects run of the install script even when saved under a different name (content-based). Use with process command-line logging.
    author: Daniel Jeremiah
    date: 2026/02/16
    tags:
        - attack.t1059.004
        - attack.t1105
    logsource:
        category: process_creation
        product: linux
    detection:
        selection_image:
            Image|endswith|any:
                - '/bash'
                - '/sh'
            CommandLine|contains: 'openclaw'
        selection_content:
            CommandLine|contains|any:
                - 'run_remote_bash'
                - 'OPENCLAW_INSTALL_SH_NO_RUN'
                - 'OPENCLAW_USE_GUM'
                - 'All your chats, one OpenClaw'
                - '.openclaw/openclaw.json'
                - 'openclaw.ai/install.sh'
        condition: selection_image and selection_content
    falsepositives:
        - Legitimate OpenClaw install or dev
    level: medium
query_type: sigma
severity: medium
tactics:
    - TA0002
    - TA0011
techniques:
    - T1059.004
    - T1105
tags:
    - attack.t1059.004
    - attack.t1105
author: Daniel Jeremiah
version: "2"
data_sources:
    - process_creation
    - linux
