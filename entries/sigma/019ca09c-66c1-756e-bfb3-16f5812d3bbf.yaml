id: 019ca09c-66c1-756e-bfb3-16f5812d3bbf
name: Makop Ransomware Mutex Detection
description: The rule detects the creation of specific mutex names ('m23071644') associated with Makop ransomware activity. It monitors process creation events on Windows systems for these mutexes, indicating potential ransomware infection or execution.
query: |-
    title: Makop Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Makop ransomware activity.
    author: '@adhikara13'
    date: 2025/07/13
    references:
      - 'https://cybergeeks.tech/makop-ransomware/'
      - 'https://x.com/darb0ng/status/1270539362942386176'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.makop'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'm23071644'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.makop
