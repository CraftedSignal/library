id: 019ca0a0-f1cc-725a-94f0-e9e2d773362d
name: Skuld Stealer Mutex Detection
description: This rule detects the creation of specific mutexes that are known to be associated with the Skuld stealer malware. The detection is based on the exact string match of the mutex name 'global\3575651c-bb47-448e-a514-22865732bbc'. The rule leverages process creation logs to identify these mutexes, indicating potential Skuld stealer activity on a Windows system.
query: |-
    title: Skuld Stealer Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Skuld stealer activity.
    author: '@adhikara13'
    date: 2025/01/15
    references:
      - 'https://research.checkpoint.com/2025/from-trust-to-threat-hijacked-discord-invites-used-for-multi-stage-malware-delivery/'
      - 'https://www.secureblink.com/cyber-security-news/discord-malware-hijacks-expired-invite-links-to-steal-crypto-wallets-in-2025'
    tags:
      - 'attack.credential_access.t1555'
      - 'malware.stealer.skuld'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'global\3575651c-bb47-448e-a514-22865732bbc'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0006
techniques:
    - T1555
tags:
    - attack.credential_access.t1555
    - malware.stealer.skuld
author: '@adhikara13'
version: "1"
references:
    - https://research.checkpoint.com/2025/from-trust-to-threat-hijacked-discord-invites-used-for-multi-stage-malware-delivery/
    - https://www.secureblink.com/cyber-security-news/discord-malware-hijacks-expired-invite-links-to-steal-crypto-wallets-in-2025
data_sources:
    - process_creation
    - windows
