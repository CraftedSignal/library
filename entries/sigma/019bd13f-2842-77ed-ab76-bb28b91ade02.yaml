id: 019bd13f-2842-77ed-ab76-bb28b91ade02
name: UAT-8837 China-Nexus APT - Multi-Stage Attack Chain
description: 'This rule detects a multi-stage attack chain associated with UAT-8837, a China-nexus APT group. It correlates several distinct activities: initial reconnaissance (pinging google.com, system enumeration via tasklist, netstat, whoami, quser, hostname, net user), modification of RDP RestrictedAdmin settings, Earthworm tunneling to public IP addresses on specific ports (1433, 443, 447, 448, 80), the use of Active Directory enumeration tools (SharpHound, Certipy, dsquery, dsget, setspn), deployment of post-compromise tools in staging directories (Desktop, Temp, public\music, Users\public\videos, Users\public\Music) often masquerading with .ico extensions, and the creation of backdoored user accounts or localgroup additions. The rule requires either Earthworm tunneling, a combination of AD reconnaissance and post-compromise tool deployment, or at least two distinct stages from initial reconnaissance, RDP modification, AD reconnaissance, post-compromise tools, and backdoored accounts to trigger a detection. This correlation aims to reduce false positives and identify advanced persistent threat activity.'
query: "title: UAT-8837 China-Nexus APT - Multi-Stage Attack Chain\nid: 789abcde-f012-3456-789a-bcdef0123456\nstatus: experimental\ndescription: |\n    Detects UAT-8837 China-nexus APT activities targeting critical infrastructure in North America. Correlates initial reconnaissance (ping google.com, system enumeration), RDP RestrictedAdmin modification, Earthworm tunneling to any public routable IP addresses, AD enumeration tools (SharpHound, Certipy, dsquery, dsget, setspn), post-compromise tool deployment in staging directories (Desktop, Temp, public\\music) with .ico masquerading, and backdoored account creation. Requires correlation of multiple attack stages for high-confidence detection.\nreferences:\n    - https://blog.talosintelligence.com/uat-8837/\nauthor: Daniel Jeremiah\ndate: 2025/01/18\ntags:\n    - attack.initial_access\n    - attack.discovery\n    - attack.command_and_control\n    - attack.persistence\n    - attack.lateral_movement\n    - attack.t1189\n    - attack.t1082\n    - attack.t1083\n    - attack.t1087.002\n    - attack.t1482\n    - attack.t1572\n    - attack.t1090\n    - attack.t1136\n    - attack.t1078\n    - attack.t1219\n    - attack.t1027\nlogsource:\n    category: process_creation\n    product: windows\ndetection:\n    initial_recon:\n        Image|endswith: '\\cmd.exe'\n        CommandLine|re: 'ping google\\.com'\n        CommandLine|re: '(tasklist /svc|netstat -aon -p TCP|whoami|quser|hostname|net user)'\n    rdp_modification:\n        Image|endswith: '\\reg.exe'\n        CommandLine|re: 'HKLM\\\\System\\\\CurrentControlSet\\\\Control\\\\Lsa.*DisableRestrictedAdmin.*/d 00000000'\n    earthworm_tunneling:\n        Image|re: '\\\\.(ico|exe)$'\n        CommandLine|re: 'rssocks'\n        CommandLine|re: '-d \\b(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\b'\n        CommandLine|re: '-e (1433|443|447|448|80)'\n    ad_recon_tools:\n        Image|endswith|any:\n            - '\\SharpHound.exe'\n            - '\\SharpHound.ps1'\n            - '\\certipy.exe'\n            - '\\certipy.py'\n            - '\\dsquery.exe'\n            - '\\dsget.exe'\n            - '\\setspn.exe'\n        CommandLine|re: '(SharpHound|Invoke-BloodHound|certipy|dsquery user|dsget user|setspn -[LQ]|nltest /DCLIST)'\n    post_compromise_tools:\n        Image|re: '(\\\\\\\\Desktop\\\\\\\\|\\\\\\\\windows\\\\\\\\temp\\\\\\\\|\\\\\\\\windows\\\\\\\\public\\\\\\\\music\\\\\\\\|\\\\\\\\Users\\\\\\\\public\\\\\\\\videos\\\\\\\\|\\\\\\\\Users\\\\\\\\public\\\\\\\\Music\\\\\\\\)'\n        Image|re: '\\\\.(ico|exe|ps1)$'\n        CommandLine|re: '(dwagent.*-S -m installer|SharpHound|Invoke-BloodHound|certipy|GoTokenTheft|GoExec|Invoke-WMIExec|wec\\\\.ico|goe\\\\.ico)'\n    backdoored_accounts:\n        Image|endswith: '\\net.exe'\n        CommandLine|re: 'net (user.*(/add /domain|/domain)|localgroup.*/add)'\n    condition: \n        earthworm_tunneling or\n        (ad_recon_tools and post_compromise_tools) or\n        (2 of (initial_recon, rdp_modification, ad_recon_tools, post_compromise_tools, backdoored_accounts))\nfalsepositives:\n    - Security assessments and penetration testing\n    - Routine AD management and troubleshooting\nlevel: high\n"
query_type: sigma
severity: medium
version: "2"
