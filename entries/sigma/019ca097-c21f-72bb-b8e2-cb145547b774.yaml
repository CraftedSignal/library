id: 019ca097-c21f-72bb-b8e2-cb145547b774
name: d0glun Ransomware Mutex Detection
description: The rule detects the creation of a specific mutex named 'dawdhahdaw'. This mutex name is associated with d0glun ransomware activity. The detection is based on monitoring process creation events on Windows systems.
query: |-
    title: d0glun Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with d0glun ransomware activity.
    author: '@adhikara13'
    date: 2024/08/01
    references:
      - 'https://app.any.run/tasks/24679d01-a0c3-4b91-adc1-db5937e6e651/'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.d0glun'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'dawdhahdaw'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.d0glun
author: '@adhikara13'
version: "1"
references:
