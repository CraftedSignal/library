id: 019cf834-2128-76ab-bee5-5caa31b668fd
name: SlimAgent HTML Log Artifact
description: Detects the creation of HTML files with specific formatting tags used by the SlimAgent keylogger, a tool used by Sednit (APT28).
query: |
    title: SlimAgent HTML Log Artifact
    id: 0bb8a00d-53a2-4f4e-9e2b-2c58b2067a6e
    status: experimental
    description: 'Detects the creation of HTML files with specific formatting tags
      used by the SlimAgent keylogger, a tool used by Sednit (APT28).'
    author: detections.ai
    references:
      - https://www.welivesecurity.com/en/eset-research/sednit-reloaded-back-trenches/
    date: 2026-03-16
    tags:
      - attack.input_capture
      - attack.t1056.001
      - attack.hide_artifacts
      - attack.t1564
      - attack.g0049
    logsource:
      category: file_creation
      product: windows
    detection:
      selection:
        TargetFileName|endswith: '.html'
        Contents|contains|all:
          # Note: This detection requires a log source that can inspect file content on creation.
          - '<font size=4 color=blue>'
          - '<font color=red>'
          - '<font color=green>'
      condition: selection
    falsepositives:
      - Legitimate HTML files that happen to contain the same specific font tags,
        although this is considered unlikely.
    level: medium
query_type: sigma
severity: medium
tactics:
    - TA0009
    - TA0006
techniques:
    - T1056.001
