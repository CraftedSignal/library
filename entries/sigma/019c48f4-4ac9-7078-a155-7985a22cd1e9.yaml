id: 019c48f4-4ac9-7078-a155-7985a22cd1e9
name: Multiple Short-Lived SSH Sessions from Single Source
description: Detects 5 or more quick SSH sessions from a single IP address within 5 minutes, indicating credential validation attacks, automated scanning, or brute-force attempts.
query: "title: SSH Session Opened\r\nname: ssh_session_opened\r\nid: 1a2b3c4d-5e6f-7a8b-9c0d-1e2f3a4b5c6d\r\nlogsource:\r\n    product: linux\r\n    service: sshd\r\ndetection:\r\n    selection:\r\n        - 'session opened for user'\r\n        - 'Accepted password for'\r\n        - 'Accepted publickey for'\r\n    condition: selection\r\n---\r\ntitle: SSH Session Closed\r\nname: ssh_session_closed\r\nid: 7b8c9d0e-1f2a-3b4c-5d6e-7f8a9b0c1d2e\r\nlogsource:\r\n    product: linux\r\n    service: sshd\r\ndetection:\r\n    selection:\r\n        - 'session closed for user'\r\n        - 'Connection closed by'\r\n        - 'Received disconnect from'\r\n    condition: selection\r\n---\r\ntitle: Short-Lived SSH Session\r\nid: f2a3b4c5-d6e7-8f9a-0b1c-2d3e4f5a6b7c\r\nname: short_lived_ssh_session\r\nstatus: experimental\r\ndescription: Detects SSH sessions that close within 10 seconds of opening, indicating potential credential validation, automated scanning, or reconnaissance activity.\r\nreferences:\r\n    - https://attack.mitre.org/techniques/T1078/\r\n    - https://attack.mitre.org/techniques/T1110/\r\nauthor: SimSpace\r\ndate: 2026-01-19\r\ntags:\r\n    - attack.initial-access\r\n    - attack.credential-access\r\n    - attack.t1078\r\n    - attack.t1110\r\ncorrelation:\r\n    type: temporal_ordered\r\n    rules:\r\n        - ssh_session_opened\r\n        - ssh_session_closed\r\n    group-by:\r\n        - src_ip\r\n        - user\r\n    timespan: 10s\r\nfields:\r\n    - src_ip\r\n    - user\r\n    - ComputerName\r\nfalsepositives:\r\n    - Monitoring scripts performing quick connection tests\r\n    - Automated commands via SSH (ansible, puppet, saltstack)\r\n    - CI/CD systems running brief tasks\r\n    - Network scanning tools performing service enumeration\r\nlevel: informational\r\n---\r\ntitle: Multiple Short-Lived SSH Sessions from Single Source\r\nid: 2a04eda2-f373-47f2-bf23-9faf7668bca4\r\nstatus: experimental\r\ndescription: Detects 5 or more quick SSH sessions from a single IP address within 5 minutes, indicating credential validation attacks, automated scanning, or brute-force attempts.\r\nreferences:\r\n    - https://attack.mitre.org/techniques/T1078/\r\n    - https://attack.mitre.org/techniques/T1110/\r\nauthor: SimSpace\r\ndate: 2026-01-19\r\ntags:\r\n    - attack.credential-access\r\n    - attack.t1078\r\n    - attack.t1110\r\ncorrelation:\r\n    type: event_count\r\n    rules:\r\n        - short_lived_ssh_session\r\n    group-by:\r\n        - src_ip\r\n    timespan: 5m\r\n    condition:\r\n        gte: 5\r\nfields:\r\n    - src_ip\r\n    - user\r\n    - ComputerName\r\nfalsepositives:\r\n    - CI/CD systems executing multiple rapid deployments\r\n    - Configuration management tools running parallel tasks\r\n    - Automated testing frameworks\r\n    - Legitimate administrative scripts performing health checks\r\nlevel: medium"
query_type: sigma
