name: Suspicious Browser-Triggered Payload Execution
description: "Detects unexpected file creation and execution originating from common browser processes (e.g., Chrome, Firefox, Edge) combined with anomalous network content that may indicate injected payloads served via web traffic. Based on MITRE DET0349 detection guidance. \n"
query: "title: Suspicious Browser-Triggered Payload Execution\nid: AN0590-CI01\nstatus: experimental\ndescription: >\n  Detects unexpected file creation and execution originating from common browser\n  processes (e.g., Chrome, Firefox, Edge) combined with anomalous network\n  content that may indicate injected payloads served via web traffic. Based on\n  MITRE DET0349 detection guidance. \nauthor: Senior Detection Engineer\ndate: 2025-12-28T00:00:00.000Z\nreferences:\n  - >-\n    https://attack.mitre.org/detectionstrategies/DET0349/\n    :contentReference[oaicite:1]{index=1}\nlogsource:\n  product: windows\n  service: security\n  definition:\n    - EventID:\n        - 4688\n  category: process_creation\nlevel: high\ndetection:\n  selection_browser_parent:\n    ParentImage|endswith:\n      - \\chrome.exe\n      - \\firefox.exe\n      - \\msedge.exe\n  selection_suspicious_child:\n    Image|endswith:\n      - .exe\n      - .dll\n      - .js\n      - .vbs\n  condition: selection_browser_parent and selection_suspicious_child\nfields:\n  - ParentImage\n  - Image\n  - CommandLine\n  - CreatorProcessId\nfalsepositives:\n  - Legitimate browser extensions or automated downloads that execute helper\n    applications.\nmutable_elements:\n  MonitoredExtensions:\n    - .exe\n    - .dll\n    - .js\n    - .vbs\n  SuspiciousParentProcesses:\n    - chrome.exe\n    - firefox.exe\n    - msedge.exe\ntags:\n  - \"[attack.tactic: execution]\"\n  - \"[attack.tactic: initial_access]\"\n  - \"[attack.technique: T1659]\"\n"
