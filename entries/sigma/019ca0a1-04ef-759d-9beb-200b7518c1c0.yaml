id: 019ca0a1-04ef-759d-9beb-200b7518c1c0
name: Socelars Stealer Mutex Detection
description: This rule detects the creation of a process that utilizes specific mutex names ('patatoes') known to be associated with the Socelars stealer malware. The detection is based on monitoring process creation events and checking for the presence of these mutex names.
query: |-
    title: Socelars Stealer Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Socelars stealer activity.
    author: '@adhikara13'
    date: 2024/08/01
    references:
      - 'https://www.trendmicro.com/vinfo/jp/threat-encyclopedia/malware/trojanspy.win32.socelars.d'
    tags:
      - 'attack.credential_access.t1555'
      - 'malware.stealer.socelars'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'patatoes'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0006
techniques:
    - T1555
tags:
    - attack.credential_access.t1555
    - malware.stealer.socelars
author: '@adhikara13'
version: "1"
references:
    - https://www.trendmicro.com/vinfo/jp/threat-encyclopedia/malware/trojanspy.win32.socelars.d
data_sources:
    - process_creation
    - windows
