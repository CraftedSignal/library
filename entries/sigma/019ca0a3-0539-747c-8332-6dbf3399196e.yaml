id: 019ca0a3-0539-747c-8332-6dbf3399196e
name: Xeno RAT Mutex Detection
description: This rule detects the creation of specific mutexes associated with the Xeno RAT malware. It looks for mutex names starting with 'xeno_rat_nd' followed by five alphanumeric characters, optionally ending with '-admin'. The detection is based on the `MutexName` field within process creation logs.
query: |-
    title: Xeno RAT Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Xeno rat activity.
    author: '@adhikara13'
    date: 2024/08/01
    references:
      - 'https://app.any.run/tasks/b1aee0cb-c267-447f-a996-a991fcb0dee7/'
      - 'https://tria.ge/250630-d62aeszkw5/behavioral2/analog?main_event=Mutex&mutant=Xeno_rat_nd8912d-admin'
    tags:
      - 'attack.command_and_control.t1219'
      - 'malware.rat.xeno'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'xeno_rat_nd<5 Alphanumeric Characters>'
          - 'xeno_rat_nd<5 Alphanumeric Characters>-admin'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0011
techniques:
    - T1219
tags:
    - attack.command_and_control.t1219
    - malware.rat.xeno
author: '@adhikara13'
version: "1"
references:
    - https://app.any.run/tasks/b1aee0cb-c267-447f-a996-a991fcb0dee7/
    - https://tria.ge/250630-d62aeszkw5/behavioral2/analog?main_event=Mutex&mutant=Xeno_rat_nd8912d-admin
data_sources:
    - process_creation
    - windows
