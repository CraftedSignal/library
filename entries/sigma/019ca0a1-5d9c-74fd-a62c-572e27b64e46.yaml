id: 019ca0a1-5d9c-74fd-a62c-572e27b64e46
name: StaryDobry Loader Mutex Detection
description: This rule detects the creation of specific mutexes associated with the StaryDobry loader. The detection is based on the presence of the mutex name 'com_curruser_mttx'. This activity indicates the potential execution or presence of the StaryDobry malware on a Windows system.
query: |-
    title: StaryDobry Loader Mutex Detection
    status: experimental
    description: Detects known mutexes associated with StaryDobry loader activity.
    author: '@adhikara13'
    date: 2025/07/30
    references:
      - 'https://securelist.ru/starydobry-campaign-spreads-xmrig-miner-via-torrents/111841/'
    tags:
      - 'attack.execution.t1204'
      - 'malware.loader.starydobry'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'com_curruser_mttx'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0002
techniques:
    - T1204
tags:
    - attack.execution.t1204
    - malware.loader.starydobry
author: '@adhikara13'
version: "1"
references:
    - https://securelist.ru/starydobry-campaign-spreads-xmrig-miner-via-torrents/111841/
data_sources:
    - process_creation
    - windows
