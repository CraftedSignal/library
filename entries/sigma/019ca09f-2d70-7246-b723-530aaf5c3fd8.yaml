id: 019ca09f-2d70-7246-b723-530aaf5c3fd8
name: Quasar RAT Mutex Detection
description: The rule detects the creation of specific mutexes known to be associated with Quasar RAT activity. It looks for mutex names matching 'QSR_MUTEX_<uniqueid>'.
query: |-
    title: Quasar RAT Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Quasar rat activity.
    author: '@adhikara13'
    date: 2024/08/01
    references:
      - 'https://daniyyell.com/threat%20hunting/tools/malware%20analysis/Using-Velociraptor-to-Detect-and-Hunt-for-Affected-Systems-Unknown-Malware-Analysis/#20-velocirator-selected-artifacts'
    tags:
      - 'attack.command_and_control.t1219'
      - 'malware.rat.quasar'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'QSR_MUTEX_<uniqueid>'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0011
techniques:
    - T1219
tags:
    - attack.command_and_control.t1219
    - malware.rat.quasar
author: '@adhikara13'
version: "1"
references:
    - https://daniyyell.com/threat%20hunting/tools/malware%20analysis/Using-Velociraptor-to-Detect-and-Hunt-for-Affected-Systems-Unknown-Malware-Analysis/#20-velocirator-selected-artifacts
data_sources:
    - process_creation
    - windows
