name: LeakNet C2 Beaconing Pattern
description: Detects network traffic matching the specific URI structure used by LeakNet for command-and-control beaconing. This behavior has been consistently observed across multiple LeakNet incidents following initial access.
query: |
    title: LeakNet C2 Beaconing Pattern
    id: 243b6765-63de-4541-839e-0fff67b792e4
    status: experimental
    description: Detects network traffic matching the specific URI structure used by
      LeakNet for command-and-control beaconing. This behavior has been consistently
      observed across multiple LeakNet incidents following initial access.
    author: detections.ai
    references:
      - https://reliaquest.com/blog/threat-spotlight-casting-a-wider-net-clickfix-deno-and-leaknets-scaling-threat
    date: 2026-03-20
    tags:
      - attack.ta0011
      - attack.t1071.001
    logsource:
      category: proxy
    detection:
      # Detects the specific URI pattern observed in LeakNet C2 beaconing check-ins
      # Note: If this overlaps with legitimate SaaS applications, consider adding a filter for trusted destination IPs/Domains or focusing on newly registered domains.
      selection:
        c-uri|contains: '/intake/organizations/events?channel=app'
      condition: selection
    falsepositives:
      - Unknown legitimate applications sharing this exact URI path and query
        structure.
    level: high
