id: 019ca099-1d3a-718f-8eaf-be20b9a3eeeb
name: Eagerbee Backdoor Mutex Detection
description: This rule detects the creation or presence of specific mutex names (`mstoolFtip32W`) that are known to be associated with the Eagerbee backdoor. The detection focuses on identifying these unique mutexes as indicators of Eagerbee activity on a Windows system, likely during process creation events.
query: |-
    title: Eagerbee Backdoor Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Eagerbee backdoor activity.
    author: '@adhikara13'
    date: 2024/07/19
    references:
      - 'https://www.elastic.co/de/security-labs/introducing-the-ref5961-intrusion-set'
      - 'https://securelist.com/eagerbee-backdoor/115175/'
    tags:
      - 'attack.persistence.t1547'
      - 'malware.backdoor.eagerbee'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'mstoolFtip32W'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0003
    - TA0004
techniques:
    - T1547
tags:
    - attack.persistence.t1547
    - malware.backdoor.eagerbee
author: '@adhikara13'
version: "1"
references:
    - https://www.elastic.co/de/security-labs/introducing-the-ref5961-intrusion-set
    - https://securelist.com/eagerbee-backdoor/115175/
data_sources:
    - process_creation
    - windows
