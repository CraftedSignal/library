id: 019c480b-06cb-7087-8ebb-616ec17773a0
name: Equation Editor Spawning MSHTA
description: Monitors for the Microsoft Equation Editor process (EQNEDT32.exe) spawning an MSHTA process (mshta.exe). This behavior is highly indicative of CVE-2018-0802 exploitation, as seen in XWorm campaigns.
query: |
    title: Equation Editor Spawning MSHTA
    id: 232d95d2-7ede-4945-9da7-d44c9aef4f11
    status: experimental
    description: Monitors for the Microsoft Equation Editor process (EQNEDT32.exe)
      spawning an MSHTA process (mshta.exe). This behavior is highly indicative of
      CVE-2018-0802 exploitation, as seen in XWorm campaigns.
    references:
      - https://www.fortinet.com/blog/threat-research/deep-dive-into-new-xworm-campaign-utilizing-multiple-themed-phishing-emails
    author: detections.ai
    date: 2026-02-10
    tags:
      - attack.t1203
      - attack.t1218.005
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        ParentImage|endswith: '\EQNEDT32.EXE' # Detects the legacy Equation Editor as the parent process.
        Image|endswith: '\mshta.exe' # Detects the Microsoft HTML Application Host as the child process.
      condition: selection
    falsepositives:
      - This behavior is highly anomalous. False positives are considered unlikely
        as EQNEDT32.EXE is a deprecated component and has no legitimate reason to
        spawn mshta.exe.
    level: high
