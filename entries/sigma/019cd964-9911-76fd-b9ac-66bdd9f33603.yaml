id: 019cd964-9911-76fd-b9ac-66bdd9f33603
name: Dead#Vax Self-Parsing Script Execution
description: Detects a specific script execution pattern where a batch file, often named 'rEgX.cmd', is read by a PowerShell process (or a renamed variant like 'mbs.exe') to extract a hidden, encrypted payload from its own content. This self-parsing technique, used by the Dead#Vax malware, looks for lines starting with a specific marker (e.g., '@') to bypass traditional file-based detection.
query: |
    title: Dead#Vax Self-Parsing Script Execution
    id: 18b5135e-8c13-4274-a0d9-c3bd2ff052f6
    status: experimental
    description: >-
      Detects a specific script execution pattern where a batch file, often named
      'rEgX.cmd', is read by a PowerShell process (or a renamed variant like
      'mbs.exe') to extract a hidden, encrypted payload from its own content. This
      self-parsing technique, used by the Dead#Vax malware, looks for lines starting
      with a specific marker (e.g., '@') to bypass traditional file-based detection.
    author: detections.ai
    references:
      - https://www.securonix.com/blog/deadvax-threat-research-security-advisory/
    date: 2026-03-10
    tags:
      - attack.execution
      - attack.defense_evasion
      - attack.t1059.001
      - attack.t1059.003
      - attack.t1027
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        Image|endswith:
          - '\powershell.exe'
          - '\mbs.exe' # Known renamed PowerShell executable used by Dead#Vax
        CommandLine|contains|all:
          - 'Get-Content' # Command to read the content of the script file
          - 'rEgX.cmd' # Specific filename the malware copies itself to before parsing
          - '-match' # PowerShell operator used for regex matching
          - "'^@" # Start of the specific regex pattern used to identify the payload line
      condition: selection
    falsepositives:
      - This detection is highly specific to the Dead#Vax TTPs. False positives are
        unlikely unless an administrator coincidentally uses a script named
        'rEgX.cmd' with a similar self-parsing logic.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0002
    - TA0005
techniques:
    - T1059.001
    - T1059.003
    - T1027
