id: 019c3523-7581-7291-a60c-2ff0b7846e2d
name: C2 URL Embedded in User-Agent
description: Detects HTTP requests where the User-Agent string contains a full URL pointing to 'temp.sh'. This technique was observed in the Notepad++ supply chain attack where attackers passed the URL of exfiltrated data back to their C2 server within the User-Agent header.
query: |
    title: C2 URL Embedded in User-Agent
    id: e0835edc-8d4c-4f6f-a63c-64a14e396b9c
    status: experimental
    description: >-
      Detects HTTP requests where the User-Agent string contains a full URL pointing
