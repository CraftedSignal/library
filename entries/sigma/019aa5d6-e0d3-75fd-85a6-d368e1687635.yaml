id: 019aa5d6-e0d3-75fd-85a6-d368e1687635
name: CryptnetUrlCache Abuse
description: Detects suspicious file writes or modifications within the 'CryptnetUrlCache' directory. Malware abuses this directory to hide payloads and configuration files, blending in with legitimate system activity.
query: "title: CryptnetUrlCache Abuse\r\nid: 7c1010c4-40aa-4d82-acd9-0c62039f1a06\r\nstatus: experimental\r\ndescription: Detects suspicious file writes or modifications within the\r\n  'CryptnetUrlCache' directory. Malware abuses this directory to hide payloads\r\n  and configuration files, blending in with legitimate system activity.\r\nreferences:\r\n  - https://medium.com/@shubhandrew/analysis-of-a-powershell-script-leading-to-3-differrent-malware-families-asyncrat-dcrat-f7e9c12149aa\r\nauthor: Subhankar H.\r\ndate: 2025-11-21\r\ntags:\r\n  - attack.defense_evasion\r\n  - attack.t1564.001\r\nlogsource:\r\n  category: file_event\r\n  product: windows\r\ndetection:\r\n  # Detects file creation or modification events in the CryptnetUrlCache directory\r\n  selection:\r\n    TargetFilename|contains: '\\CryptnetUrlCache\\'\r\n    # Filter for the legitimate svchost.exe process which commonly writes to this cache\r\n  filter_main:\r\n    Image|endswith: '\\svchost.exe'\r\n  condition: selection and not filter_main\r\nfalsepositives:\r\n  - Legitimate applications other than svchost.exe that handle certificate or\r\n    URL caching might write to this directory. Tuning may be required to exclude\r\n    other known good processes. Investigate the process and its command line for\r\n    suspicious activity.\r\nlevel: medium\r\n"
