id: 019b4679-619b-7447-ba26-3b360a78a813
name: RAT Service Spoofing via "Windows Real-time Protection Service"
description: |
    Detects the creation of a Windows service named "NSecRTS" with the display name "Windows Real-time Protection Service" and an executable path in a suspicious "NSEC" folder. This behavior is associated with a China-linked RAT observed in an Indian Income Tax-themed phishing campaign.
query: |
    title: RAT Service Spoofing via "Windows Real-time Protection Service"
    id: f3cc7bac-16ec-494a-968c-a82ddd8dead2
    status: experimental
    description: >
      Detects the creation of a Windows service named "NSecRTS" with the display
      name "Windows Real-time Protection Service" and an executable path in a
      suspicious "NSEC" folder. This behavior is associated with a China-linked RAT
      observed in an Indian Income Tax-themed phishing campaign.
    references:
      - >-
        https://www.seqrite.com/blog/indian-income-tax-themed-phishing-campaign-targets-local-businesses/
    author: tim@detections.ai
    date: 2025-12-22T00:00:00.000Z
    tags:
      - attack.persistence
      - attack.t1543.003
      - attack.defense_evasion
      - attack.t1036.004
    logsource:
      product: windows
      category: service_creation
      service: system
    detection:
      selection:
        ServiceName: NSecRTS
        DisplayName: Windows Real-time Protection Service
        ImagePath|contains: \Common Files\NSEC\NSecRTS.exe
      condition: selection
    falsepositives:
      - Unlikely due to the specific combination of service name, display name, and
        path.
    level: high
