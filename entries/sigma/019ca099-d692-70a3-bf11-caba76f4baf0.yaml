id: 019ca099-d692-70a3-bf11-caba76f4baf0
name: Gamarue Backdoor Mutex Detection
description: This rule detects the creation of processes that utilize specific mutex names associated with the Gamarue backdoor. The detection is based on a direct match of the 'MutexName' field against a predefined list of known Gamarue mutexes. The rule aims to identify potential Gamarue backdoor activity on Windows systems by monitoring process creation events for these unique mutex identifiers.
query: |-
    title: Gamarue Backdoor Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Gamarue backdoor activity.
    author: '@adhikara13'
    date: 2025/08/08
    references:
      - 'https://blog.talosintelligence.com/threat-roundup-0617-0624/'
    tags:
      - 'attack.persistence.t1547'
      - 'malware.backdoor.gamarue'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '345rdxcvgt567yhjm'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0003
    - TA0004
techniques:
    - T1547
tags:
    - attack.persistence.t1547
    - malware.backdoor.gamarue
author: '@adhikara13'
version: "1"
