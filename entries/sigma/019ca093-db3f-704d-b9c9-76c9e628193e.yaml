id: 019ca093-db3f-704d-b9c9-76c9e628193e
name: ArrowRAT Mutex Detection
description: The rule detects the creation of specific mutexes known to be associated with ArrowRAT malware. It specifically looks for the mutex name 'ArrowRAT_Mutex_ArrowRAT'. This activity indicates the presence and execution of ArrowRAT on a Windows system.
query: |-
    title: ArrowRAT Mutex Detection
    status: experimental
    description: Detects known mutexes associated with ArrowRAT activity.
    author: '@adhikara13'
    date: 2024/12/19
    references:
      - 'https://tria.ge/230504-pqel9scc96'
    tags:
      - 'attack.command_and_control.t1219'
      - 'malware.rat.arrowrat'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'ArrowRAT_Mutex_ArrowRAT'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0011
techniques:
    - T1219
tags:
    - attack.command_and_control.t1219
    - malware.rat.arrowrat
author: '@adhikara13'
version: "1"
references:
    - https://tria.ge/230504-pqel9scc96
data_sources:
    - process_creation
    - windows
