id: 019ca097-1199-77ae-8bac-03c8acbd7c13
name: Contacto Ransomware Mutex Detection
description: The rule detects the creation of a specific mutex named 'Global\ContactoMutex'. This mutex is known to be associated with the Contacto ransomware. The detection is based on monitoring process creation events on Windows systems for the presence of this particular mutex name. The primary goal is to identify potential Contacto ransomware activity by detecting this unique identifier used by the malware.
query: |-
    title: Contacto Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Contacto ransomware activity.
    author: '@adhikara13'
    date: 2025/01/22
    references:
      - 'https://app.any.run/tasks/917a636f-aed8-4368-81a6-1ee2634c50ec'
      - 'https://gbhackers.com/new-contacto-ransomware-evades-av-detection'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.contacto'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Global\ContactoMutex'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.contacto
author: '@adhikara13'
version: "1"
references:
    - https://app.any.run/tasks/917a636f-aed8-4368-81a6-1ee2634c50ec
    - https://gbhackers.com/new-contacto-ransomware-evades-av-detection
data_sources:
    - process_creation
    - windows
