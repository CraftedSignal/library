id: 019ca0a2-13c7-7468-a1e8-57a2d9c8ebb3
name: Tonto Team Loader Mutex Detection
description: 'The rule detects the creation of specific mutexes known to be associated with the Tonto Team loader malware. It looks for two distinct mutex names: ''{A931568B-94AF-449D-B7F6-6585EF9E9839}'' and ''QuitMutex<pid>''. The detection is based on process creation events where these mutex names are observed. This activity is indicative of the Tonto Team loader executing on a system.'
query: |-
    title: Tonto Team Loader Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Tonto Team loader activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://www.f6.ru/blog/tonto-team/'
      - 'https://www.group-ib.com/blog/tonto-team/'
    tags:
      - 'attack.execution.t1204'
      - 'malware.loader.tonto_team'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '{A931568B-94AF-449D-B7F6-6585EF9E9839}'
          - 'QuitMutex<pid>'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0002
techniques:
    - T1204
tags:
    - attack.execution.t1204
    - malware.loader.tonto_team
author: '@adhikara13'
version: "1"
references:
    - https://www.f6.ru/blog/tonto-team/
    - https://www.group-ib.com/blog/tonto-team/
data_sources:
    - process_creation
    - windows
