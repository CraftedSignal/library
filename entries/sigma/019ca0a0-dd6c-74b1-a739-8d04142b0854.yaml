id: 019ca0a0-dd6c-74b1-a739-8d04142b0854
name: SingleCamper Backdoor Mutex Detection
description: This rule detects the creation of specific mutexes, 'Global\srvmutex' or 'SnipMutex', which are known to be associated with the SingleCamper backdoor. The detection is based on process creation events on Windows systems.
query: |-
    title: SingleCamper Backdoor Mutex Detection
    status: experimental
    description: Detects known mutexes associated with SingleCamper backdoor activity.
    author: '@adhikara13'
    date: 2025/01/22
    references:
      - 'https://www.proofpoint.com/us/blog/threat-insight/10-things-i-hate-about-attribution-romcom-vs-transferloader'
      - 'https://unit42.paloaltonetworks.com/snipbot-romcom-malware-variant/'
    tags:
      - 'attack.persistence.t1547'
      - 'malware.backdoor.singlecamper'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Global\srvmutex'
          - 'SnipMutex'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0003
    - TA0004
techniques:
    - T1547
tags:
    - attack.persistence.t1547
    - malware.backdoor.singlecamper
author: '@adhikara13'
version: "1"
references:
    - https://www.proofpoint.com/us/blog/threat-insight/10-things-i-hate-about-attribution-romcom-vs-transferloader
    - https://unit42.paloaltonetworks.com/snipbot-romcom-malware-variant/
data_sources:
    - process_creation
    - windows
