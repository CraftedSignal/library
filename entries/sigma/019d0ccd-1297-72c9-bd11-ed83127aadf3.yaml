id: 019d0ccd-1297-72c9-bd11-ed83127aadf3
name: GitHub Force Push Detected
description: |
    Detects a 'git push --force' event in GitHub audit logs. A force push overwrites the remote repository's history with the local history, which is a potentially destructive action.
    This technique was notably used in the supply chain attack against the 'aquasecurity/trivy-action' repository, where attackers force-pushed malicious versions to existing version tags.
query: |
    title: GitHub Force Push Detected
    id: 790343cb-e59a-4c28-b195-cb7f484543ee
    status: experimental
    description: |
      Detects a 'git push --force' event in GitHub audit logs. A force push overwrites the remote repository's history with the local history, which is a potentially destructive action.
      This technique was notably used in the supply chain attack against the 'aquasecurity/trivy-action' repository, where attackers force-pushed malicious versions to existing version tags.
    author: detections.ai
    references:
      - https://thehackernews.com/2026/03/trivy-security-scanner-github-actions.html
    date: 2026-03-20
    tags:
      - attack.defense_evasion
      - attack.t1554
      - attack.t1078
    logsource:
      product: github
      category: audit
    detection:
      selection:
        # Corresponds to a push operation in the audit log
        action: 'git.push'
        # This field is true when a force push (--force) is used
        data.push.force: true
      condition: selection
    falsepositives:
      - Legitimate force pushes by developers, though this is often against best
        practices for shared branches.
    level: medium
query_type: sigma
severity: medium
