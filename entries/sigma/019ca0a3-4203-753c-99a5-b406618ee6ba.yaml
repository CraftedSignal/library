id: 019ca0a3-4203-753c-99a5-b406618ee6ba
name: XLoader Stealer Mutex Detection
description: Detects known mutexes associated with XLoader stealer activity by looking for specific mutex names created during process creation events on Windows systems.
query: |-
    title: XLoader Stealer Mutex Detection
    status: experimental
    description: Detects known mutexes associated with XLoader stealer activity.
    author: '@adhikara13'
    date: 2025/07/13
    references:
      - 'https://cyble.com/blog/xloader-returns-with-new-infection-technique/'
    tags:
      - 'attack.credential_access.t1555'
      - 'malware.stealer.xloader'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'fBEQVtAy'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0006
techniques:
    - T1555
