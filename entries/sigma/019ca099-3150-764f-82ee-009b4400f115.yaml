id: 019ca099-3150-764f-82ee-009b4400f115
name: EKANS Ransomware Mutex Detection
description: This rule detects the creation of a mutex named 'EKANS'. This mutex name is known to be associated with the EKANS ransomware. The detection is based on monitoring process creation events in Windows environments for the presence of this specific mutex name.
query: |-
    title: EKANS Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with EKANS ransomware activity.
    author: '@adhikara13'
    date: 2024/08/01
    references:
      - 'https://id-ransomware.blogspot.com/2020/01/ekans-snake-ransomware.html'
      - 'https://www.dragos.com/blog/industry-news/ekans-ransomware-and-ics-operations/'
      - 'https://www.acronis.com/en-sg/blog/posts/snakeekans-ransomware-attacks-industrial-control-systems-acronis-stops-it/'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.ekans'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'EKANS'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.ekans
author: '@adhikara13'
version: "1"
references:
    - https://id-ransomware.blogspot.com/2020/01/ekans-snake-ransomware.html
    - https://www.dragos.com/blog/industry-news/ekans-ransomware-and-ics-operations/
    - https://www.acronis.com/en-sg/blog/posts/snakeekans-ransomware-attacks-industrial-control-systems-acronis-stops-it/
data_sources:
    - process_creation
    - windows
