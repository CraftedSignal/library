id: 7c36cf4e-24fb-4a08-bfa7-eecb49cd350a
name: SharePoint Webshell Creation via CVE-2025-53770
description: Detects the creation of `spinstall0.aspx`, a known indicator of successful post-exploitation of the SharePoint vulnerability CVE-2025-53770.
query: |
    title: SharePoint Webshell Creation via CVE-2025-53770
    id: 0fe34c78-ba0a-4583-87c5-bd22842e8eaf
    status: experimental
    description: Detects the creation of `spinstall0.aspx`, a known indicator of
      successful post-exploitation of the SharePoint vulnerability CVE-2025-53770.
    references:
      - https://msrc.microsoft.com/blog/2025/07/customer-guidance-for-sharepoint-vulnerability-cve-2025-53770/
    author: Aaron Mog - detections.ai
    date: 2025-07-20
    tags:
      - attack.t1037
      - cve.2025.53770
    logsource:
      category: file_event
      product: windows
    detection:
      selection:
        TargetFilename|contains|all:
          # Detects file creation in a common SharePoint layouts directory.
          # The path uses the 8.3 short name format as seen in the reference blog.
          - '\MICROS~1\WEBSER~1\16\TEMPLATE\LAYOUTS\' # Looks for the specific webshell filename or a name containing the base name.
          - 'spinstall0'
      condition: selection
    falsepositives:
      - Unlikely
    level: high
query_type: sigma
severity: high
tactics:
    - TA0003
    - TA0004
techniques:
    - T1037
