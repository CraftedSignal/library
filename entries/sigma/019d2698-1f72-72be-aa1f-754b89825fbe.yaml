id: 019d2698-1f72-72be-aa1f-754b89825fbe
name: ToastNotify.exe Phishing Tool Process Execution
description: |
    Detects any execution of ToastNotify.exe, the .NET assembly used to dispatch phishing toast notifications impersonating legitimate applications. This catch-all rule fires when the binary runs with an unrecognized or absent subcommand. In environments that support rule ordering, evaluate subcommand-specific rules (getaumid, sendtoast, custom) before this rule. ToastNotify.exe has no known legitimate enterprise use.
query: |
    title: ToastNotify.exe Phishing Tool Process Execution
    id: f4a1b2c3-d4e5-4f67-8901-abcdef123408
