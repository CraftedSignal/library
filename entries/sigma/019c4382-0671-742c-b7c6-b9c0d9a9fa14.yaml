id: 019c4382-0671-742c-b7c6-b9c0d9a9fa14
name: SolarWinds Web Help Desk Exploitation - Zoho RMM and Velociraptor
description: This rule detects the execution of 'TOOLSIQ.EXE' (Zoho ManageEngine RMM) or 'Velociraptor.exe' when their parent process is either 'java.exe' or 'wrapper.exe'. This specific parent-child process relationship is indicative of post-exploitation activity, particularly in the context of a compromised SolarWinds Web Help Desk host, as described in the rule's context. The rule aims to identify the deployment of remote monitoring and management tools or C2 frameworks following an initial compromise.
query: |
    title: SolarWinds Web Help Desk Exploitation - Zoho RMM and Velociraptor
    id: a1b2c3d4-e5f6-4a5b-8c9d-solarwinds005
    status: experimental
    description: |
        In this attack, threat actors deploy Zoho ManageEngine RMM (TOOLSIQ.EXE) and Velociraptor from an exploited Web Help Desk host. The Zoho agent provides unattended remote access. Velociraptor is abused as a C2 framework. Process creation of TOOLSIQ.EXE or Velociraptor.exe with a parent chain from java.exe or wrapper.exe indicates post-exploitation activity.
    references:
        - https://www.huntress.com/blog/active-exploitation-solarwinds-web-help-desk-cve-2025-26399
    author: Daniel Jeremiah
    date: 2026/02/07
    tags:
        - attack.execution
        - attack.t1219
        - cve.2025.26399
    logsource:
        category: process_creation
        product: windows
    detection:
        selection_image:
            Image|endswith|any:
                - '\TOOLSIQ.EXE'
                - '\Velociraptor.exe'
        context_parent:
            ParentImage|endswith|any:
                - '\java.exe'
                - '\wrapper.exe'
                - '\TOOLSIQ.EXE'
        condition: selection_image and context_parent
    falsepositives:
        - Legitimate Zoho Assist or Velociraptor DFIR usage
    level: high
query_type: sigma
severity: high
tactics:
    - TA0002
    - TA0011
techniques:
    - T1219
tags:
