id: 019ca09c-f5c4-7700-b364-ccee7f7ebe47
name: MedusaLocker Ransomware Mutex Detection
description: This rule detects the creation of specific mutexes known to be associated with MedusaLocker ransomware. The detection is based on the presence of the mutex name '8761ABBD-7F85-42EE-B272-A76179687C63'. The rule is designed to identify MedusaLocker activity by monitoring for these unique mutex identifiers.
query: |-
    title: MedusaLocker Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with MedusaLocker ransomware activity.
    author: '@adhikara13'
    date: 2025/07/16
    references:
      - 'https://cyble.com/blog/unmasking-medusalocker-ransomware/'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.medusalocker'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '8761ABBD-7F85-42EE-B272-A76179687C63'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.medusalocker
author: '@adhikara13'
version: "1"
references:
    - https://cyble.com/blog/unmasking-medusalocker-ransomware/
data_sources:
    - process_creation
    - windows
