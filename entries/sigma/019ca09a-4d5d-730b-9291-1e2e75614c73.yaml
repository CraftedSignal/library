id: 019ca09a-4d5d-730b-9291-1e2e75614c73
name: GrimAgent Backdoor Mutex Detection
description: This rule detects the creation of specific mutexes known to be associated with the GrimAgent backdoor. The detection logic specifically looks for a mutex named 'mymutex'. The primary goal is to identify GrimAgent activity, potentially indicating persistence or active infection.
query: |-
    title: GrimAgent Backdoor Mutex Detection
    status: experimental
    description: Detects known mutexes associated with GrimAgent backdoor activity.
    author: '@adhikara13'
    date: 2024/07/19
    references:
      - 'https://www.group-ib.com/blog/grimagent/'
    tags:
      - 'attack.persistence.t1547'
      - 'malware.backdoor.grimagent'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'mymutex'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0003
    - TA0004
techniques:
    - T1547
tags:
    - attack.persistence.t1547
    - malware.backdoor.grimagent
author: '@adhikara13'
version: "1"
references:
    - https://www.group-ib.com/blog/grimagent/
data_sources:
    - process_creation
    - windows
