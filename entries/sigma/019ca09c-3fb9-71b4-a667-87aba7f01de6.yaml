id: 019ca09c-3fb9-71b4-a667-87aba7f01de6
name: Luxy Stealer Mutex Detection
description: The rule detects the creation of specific mutexes known to be associated with the Luxy stealer malware. It specifically looks for the mutex name 'DBPC303NG10hWTOR7NoN'. This activity is indicative of the Luxy stealer running on a system, which typically aims to steal credentials and other sensitive information.
query: |-
    title: Luxy Stealer Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Luxy stealer activity.
    author: '@adhikara13'
    date: 2024/07/19
    references:
      - 'https://app.any.run/tasks/449fa9a2-cccc-4d03-822c-dd6ccbf0a883'
    tags:
      - 'attack.credential_access.t1555'
      - 'malware.stealer.luxy'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'DBPC303NG10hWTOR7NoN'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0006
techniques:
    - T1555
tags:
    - attack.credential_access.t1555
    - malware.stealer.luxy
author: '@adhikara13'
version: "1"
references:
    - https://app.any.run/tasks/449fa9a2-cccc-4d03-822c-dd6ccbf0a883
data_sources:
    - process_creation
    - windows
