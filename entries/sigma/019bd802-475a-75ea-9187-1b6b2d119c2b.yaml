id: 019bd802-475a-75ea-9187-1b6b2d119c2b
name: Active Directory Reconnaissance with dsquery
description: Detects the use of 'dsquery.exe' to perform broad Active Directory user reconnaissance. Threat actors like UAT-8837 use this legitimate tool to enumerate all users in a domain to identify high-value targets.
query: |
    title: Active Directory Reconnaissance with dsquery
    id: f636a50f-a4fe-4b1d-acf1-188d44c12f0e
    status: experimental
    description: Detects the use of 'dsquery.exe' to perform broad Active Directory
      user reconnaissance. Threat actors like UAT-8837 use this legitimate tool to
      enumerate all users in a domain to identify high-value targets.
    references:
      - https://blog.talosintelligence.com/uat-8837/
    author: detections.ai
    date: 2026-01-19
    tags:
      - attack.t1087.002
      - attack.discovery
    logsource:
      product: windows
      category: process_creation
    detection:
      selection_img:
        # Detects the execution of the dsquery tool
        Image|endswith: '\dsquery.exe'
      selection_all_users:
        # Detects the command to query all users in the domain
        CommandLine|contains|all:
          - 'user'
          - '-limit 0'
      selection_all_users_filter:
        # Detects an alternative command to query all user objects
        CommandLine|contains|all:
          - '*'
          - '-filter'
          - 'objectClass=user'
          - '-limit 0'
      condition: selection_img and (selection_all_users or selection_all_users_filter)
    falsepositives:
      - Legitimate administrative activity.
    level: medium
query_type: sigma
severity: medium
tactics:
    - TA0007
techniques:
    - T1087.002
tags:
    - attack.t1087.002
    - attack.discovery
author: detections.ai
version: "2"
references:
