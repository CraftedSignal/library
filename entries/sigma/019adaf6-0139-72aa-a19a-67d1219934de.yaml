id: 019adaf6-0139-72aa-a19a-67d1219934de
name: Suspicious PowerShell HTTP Call to Non-RFC1918 Dot-Quad or Hex-Encoded IPv4 Address
description: Detects PowerShell (powershell.exe or pwsh.exe) execution where an HTTP/HTTPS URL points directly to a dot-quad IPv4 address or a hex-encoded IPv4 address, excluding RFC1918 private ranges. Threat actors commonly use raw or hex IP literals to avoid domain filtering and deliver staged payloads.
query: "title: Suspicious PowerShell HTTP Call to Non-RFC1918 Dot-Quad or Hex-Encoded\n  IPv4 Address\nid: f27c7781-0cd9-40d4-a201-4e7bbd9154c5\nstatus: experimental\ndescription: >-\n  Detects PowerShell (powershell.exe or pwsh.exe) execution where an HTTP/HTTPS\n  URL points directly to a dot-quad IPv4 address or a hex-encoded IPv4 address,\n  excluding RFC1918 private ranges. Threat actors commonly use raw or hex IP\n  literals to avoid domain filtering and deliver staged payloads.\nreferences:\n  - https://attack.mitre.org/techniques/T1105/\n  - https://attack.mitre.org/techniques/T1059/001/\ntags:\n  - attack.command_and_control\n  - attack.execution\n  - attack.defense_evasion\n  - attack.t1105\n  - attack.t1059.001\nauthor: Mëngøh (Firestrike::Labs)\ndate: 2025-12-01\nlogsource:\n  category: process_creation\n  product: windows\n  service: security\ndetection:\n  selection_regex:\n    CommandLine|re: |\n      (?ix)\n      (?:powershell|pwsh) (?:\\.exe)?\n      .* https?://\n      (\n        (0x[0-9a-f]+|\\d{1,3}) \n        \\.\n        (0x[0-9a-f]+|\\d{1,3})\n        \\.\n        (0x[0-9a-f]+|\\d{1,3})\n        \\.\n        (0x[0-9a-f]+|\\d{1,3})\n      )\n\n  selection_rfc1918:\n    CommandLine|re: |\n      (?ix)\n      (?:powershell|pwsh) (?:\\.exe)?\n      .* https?://\n      (\n        10 \\.\\d{1,3}\\.\\d{1,3}\\.\\d{1,3}\n        |\n        172\\.(1[6-9]|2[0-9]|3[0-1])\\.\\d{1,3}\\.\\d{1,3}\n        |\n        192\\.168\\.\\d{1,3}\\.\\d{1,3}\n      )\n\n  condition: selection_regex and not selection_rfc1918\n\nfields:\n  - CommandLine\n  - ParentImage\n  - Image\n  - User\n\nfalsepositives:\n  - Rare; legitimate scripted testing, diagnostics, or automation that use\n    direct public IP URLs from PowerShell.\nlevel: high\n"
