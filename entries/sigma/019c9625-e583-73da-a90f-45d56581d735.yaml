id: 019c9625-e583-73da-a90f-45d56581d735
name: GRIDTIDE Suspected xapt systemd Service Creation
description: |
    Detects creation or modification of a systemd service file referencing xapt or related artefacts,
    consistent with reported GRIDTIDE Linux persistence patterns.
query: |
    title: GRIDTIDE Suspected xapt systemd Service Creation
    id: 1c6b2e5d-0a1c-4c64-8f0d-3b6cc5a5d7a9
    status: experimental
    description: >
      Detects creation or modification of a systemd service file referencing xapt or
      related artefacts,

      consistent with reported GRIDTIDE Linux persistence patterns.
    author: Daniel Jeremiah
    date: 2026-02-24T00:00:00.000Z
    references:
      - >-
        https://cloud.google.com/blog/topics/threat-intelligence/disrupting-gridtide-global-espionage-campaign/
    tags:
      - attack.persistence
      - attack.t1543.002
    logsource:
      product: linux
      category: process_creation
    detection:
      selection_systemctl:
        Image|endswith:
          - /systemctl
          - /systemctl.exe
        CommandLine|contains:
          - enable
          - start
      selection_service_path:
        CommandLine|contains:
          - /etc/systemd/system/
          - .service
      selection_xapt:
        CommandLine|contains:
          - xapt
          - xapt.service
      condition: selection_systemctl and selection_service_path and selection_xapt
    falsepositives:
      - Legitimate service administration involving similarly named files
    level: high
query_type: sigma
severity: medium
tactics:
    - TA0003
    - TA0004
techniques:
    - T1543.002
tags:
    - attack.persistence
    - attack.t1543.002
author: Daniel Jeremiah
version: "2"
references:
    - https://cloud.google.com/blog/topics/threat-intelligence/disrupting-gridtide-global-espionage-campaign/
data_sources:
    - process_creation
    - linux
