id: 019ca0a2-cab3-70c7-8406-8dedf4b7d0c3
name: WailingCrab Backdoor Mutex Detection
description: The rule detects the creation of processes that utilize specific mutex names associated with the WailingCrab backdoor. Specifically, it looks for a mutex named '823264'. This activity is indicative of the WailingCrab malware operating on a Windows system.
query: |-
    title: WailingCrab Backdoor Mutex Detection
    status: experimental
    description: Detects known mutexes associated with WailingCrab backdoor activity.
    author: '@adhikara13'
    date: 2025/07/12
    references:
      - 'https://www.ibm.com/think/x-force/wailingcrab-malware-misues-mqtt-messaging-protocol'
    tags:
      - 'attack.persistence.t1547'
      - 'malware.backdoor.wailingcrab'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '823264'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0003
    - TA0004
techniques:
    - T1547
tags:
    - attack.persistence.t1547
    - malware.backdoor.wailingcrab
author: '@adhikara13'
version: "1"
references:
    - https://www.ibm.com/think/x-force/wailingcrab-malware-misues-mqtt-messaging-protocol
data_sources:
    - process_creation
    - windows
