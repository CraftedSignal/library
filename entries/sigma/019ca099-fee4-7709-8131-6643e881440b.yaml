id: 019ca099-fee4-7709-8131-6643e881440b
name: GarrantyDecrypt Ransomware Mutex Detection
description: This rule detects the creation of specific mutexes associated with the GarrantyDecrypt ransomware. The detection is based on the presence of the mutex name '666_nop_nop_nop_nop'. This activity is indicative of the GarrantyDecrypt ransomware executing on a system.
query: |-
    title: GarrantyDecrypt Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with GarrantyDecrypt ransomware activity.
    author: '@adhikara13'
    date: 2024/08/01
    references:
      - 'https://id-ransomware.blogspot.com/2018/10/garrantydecrypt-ransomware.html'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.garrantydecrypt'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '666_nop_nop_nop_nop'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.garrantydecrypt
author: '@adhikara13'
version: "1"
references:
    - https://id-ransomware.blogspot.com/2018/10/garrantydecrypt-ransomware.html
data_sources:
    - process_creation
    - windows
