id: 019ca09d-09a3-766e-9774-5d9685c92ba3
name: Meduza Stealer Mutex Detection
description: This rule detects the creation of a process that utilizes a mutex name associated with the Meduza stealer malware. Specifically, it looks for the mutex pattern 'mmm-<uniqueid>'.
query: |-
    title: Meduza Stealer Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Meduza stealer activity.
    author: '@adhikara13'
    date: 2024/08/01
    references:
      - 'https://app.any.run/tasks/6aa87dc7-0625-462e-a8b3-41776473a28f/'
    tags:
      - 'attack.credential_access.t1555'
      - 'malware.stealer.meduza'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'mmm-<uniqueid>'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0006
techniques:
    - T1555
tags:
    - attack.credential_access.t1555
    - malware.stealer.meduza
author: '@adhikara13'
version: "1"
references:
    - https://app.any.run/tasks/6aa87dc7-0625-462e-a8b3-41776473a28f/
data_sources:
    - process_creation
    - windows
