id: 019cf83d-0c20-7798-a4a9-a394e444aa5c
name: Slopoly PowerShell C2 Beacon
description: Detects the C2 communication of the Slopoly PowerShell backdoor, used by the Hive0163 group. It looks for specific HTTP POST requests containing a JSON body with characteristic keys.
query: |
    title: Slopoly PowerShell C2 Beacon
    id: f1f08306-9ce9-417a-a234-99c7ff1b988d
    status: experimental
    description: Detects the C2 communication of the Slopoly PowerShell backdoor,
      used by the Hive0163 group. It looks for specific HTTP POST requests
      containing a JSON body with characteristic keys.
    author: detections.ai
    references:
      - https://www.ibm.com/think/x-force/slopoly-start-ai-enhanced-ransomware-attacks
    date: 2026-03-16
    tags:
      - attack.t1071.001
      - attack.t1059.001
      - attack.command_and_control
      - detection.emerging_threats
    logsource:
      category: proxy
      product: windows
    detection:
      selection:
        # Detects POST requests to the specific C2 endpoint
        c-uri-path|contains: '/api/commands'
        cs-method: 'POST'
          # The request body contains all the specific JSON keys used by Slopoly
          # Note: This field name can vary (e.g., http.request.body.content, cs-bytes). Adjust as needed for your environment.
        http_body|contains|all:
          - '"action":'
          - '"bot_ip":'
          - '"elevated":'
          - '"session_id":'
          - '"user":'
          - '"bot":'
        # Filter for requests made by PowerShell
      filter:
        c-useragent|contains:
          - 'PowerShell'
          - 'WinHttpClient'
      condition: selection and filter
    falsepositives:
      - Legitimate custom applications that may use a similar API structure,
        although the combination of PowerShell and these specific keys is unlikely.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0011
    - TA0002
techniques:
    - T1071.001
    - T1059.001
tags:
    - attack.t1071.001
    - attack.t1059.001
    - attack.command_and_control
    - detection.emerging_threats
author: detections.ai
version: "2"
references:
    - https://www.ibm.com/think/x-force/slopoly-start-ai-enhanced-ransomware-attacks
data_sources:
    - proxy
    - windows
