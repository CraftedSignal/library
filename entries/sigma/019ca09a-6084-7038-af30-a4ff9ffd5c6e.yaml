id: 019ca09a-6084-7038-af30-a4ff9ffd5c6e
name: GRIMPULL Loader Mutex Detection
description: This rule detects the creation of processes that utilize specific mutex names associated with the GRIMPULL loader. The detection is based on the presence of the mutex name 'aff391c406ebc4c3' during process creation events on Windows systems. The rule aims to identify potential GRIMPULL loader activity by monitoring for these known indicators.
query: |-
    title: GRIMPULL Loader Mutex Detection
    status: experimental
    description: Detects known mutexes associated with GRIMPULL loader activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://cloud.google.com/blog/topics/threat-intelligence/cybercriminals-weaponize-fake-ai-websites'
    tags:
      - 'attack.execution.t1204'
      - 'malware.loader.grimpull'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'aff391c406ebc4c3'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0002
techniques:
    - T1204
tags:
    - attack.execution.t1204
    - malware.loader.grimpull
author: '@adhikara13'
version: "1"
references:
    - https://cloud.google.com/blog/topics/threat-intelligence/cybercriminals-weaponize-fake-ai-websites
data_sources:
    - process_creation
    - windows
