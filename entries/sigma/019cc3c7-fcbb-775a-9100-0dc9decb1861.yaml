id: 019cc3c7-fcbb-775a-9100-0dc9decb1861
name: Malicious AI Extension C2 Communication
description: Detects network connections to known command-and-control (C2) domains used by malicious AI browser extensions for data exfiltration.
query: |
    title: Malicious AI Extension C2 Communication
    id: 587dcde1-64a1-4fd2-a9f7-2b93030e8797
    status: experimental
    description: Detects network connections to known command-and-control (C2)
      domains used by malicious AI browser extensions for data exfiltration.
    author: detections.ai
    references:
      - https://www.microsoft.com/en-us/security/blog/2026/03/05/malicious-ai-assistant-extensions-harvest-llm-chat-histories/
    date: 2026-03-06
    tags:
      - attack.t1071.001
      - attack.t1041
      - attack.exfiltration
      - attack.command_and_control
    logsource:
      category: network_connection
      product: windows
    detection:
      selection:
        # Detects connections to domains associated with malicious AI extensions
        DestinationHostname|endswith:
          - 'chatsaigpt.com'
          - 'deepaichats.com'
          - 'chataigpt.pro'
          - 'chatgptsidebar.pro'
      condition: selection
    falsepositives:
      - Legitimate traffic to these domains is not expected. False positives are
        unlikely.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0010
    - TA0011
techniques:
    - T1071.001
    - T1041
tags:
    - attack.t1071.001
    - attack.t1041
    - attack.exfiltration
    - attack.command_and_control
author: detections.ai
version: "3"
references:
    - https://www.microsoft.com/en-us/security/blog/2026/03/05/malicious-ai-assistant-extensions-harvest-llm-chat-histories/
