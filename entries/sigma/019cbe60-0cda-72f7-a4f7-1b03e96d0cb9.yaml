id: 019cbe60-0cda-72f7-a4f7-1b03e96d0cb9
name: Seedworm Fakeset C2 Domains
description: Detects network traffic to known command and control (C2) domains used by the Iranian APT group Seedworm to distribute the Fakeset backdoor. These domains are hosted on the Backblaze cloud storage service.
query: |
    title: Seedworm Fakeset C2 Domains
    id: cc9f9819-6463-4569-a9ee-75a6724217ae
    status: experimental
    description: Detects network traffic to known command and control (C2) domains
      used by the Iranian APT group Seedworm to distribute the Fakeset backdoor.
      These domains are hosted on the Backblaze cloud storage service.
    author: detections.ai
    references:
      - https://www.security.com/threat-intelligence/iran-cyber-threat-activity-us
    date: 2026-03-05
    tags:
      - attack.command_and_control
      - attack.t1102
      - attack.g0069
    logsource:
      category: network_traffic # Examples: dns, proxy, netflow logs
    detection:
      selection:
        # These domains, hosted on Backblaze, were used to download the Fakeset backdoor
        - destination.domain:
            - 'gitempire.s3.us-east-005.backblazeb2.com'
            - 'elvenforest.s3.us-east-005.backblazeb2.com'
        - dns.question.name:
            - 'gitempire.s3.us-east-005.backblazeb2.com'
            - 'elvenforest.s3.us-east-005.backblazeb2.com'
      condition: selection
    falsepositives:
      - False positives are highly unlikely as these specific hostnames are directly
        linked to malware distribution.
    level: high
query_type: sigma
severity: high
