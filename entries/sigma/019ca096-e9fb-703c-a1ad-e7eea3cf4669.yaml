id: 019ca096-e9fb-703c-a1ad-e7eea3cf4669
name: CLRLoad Loader Mutex Detection
description: This rule detects the creation of processes that utilize specific mutex names ('Wo0r0KGWhYGO') known to be associated with the CLRLoad loader malware. The detection is based on monitoring process creation events on Windows systems and checking for the presence of these unique mutex names. The primary goal is to identify potential CLRLoad loader activity, which is often linked to initial execution and malware loading.
query: |-
    title: CLRLoad Loader Mutex Detection
    status: experimental
    description: Detects known mutexes associated with CLRLoad loader activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://www.welivesecurity.com/2022/09/06/worok-big-picture/'
    tags:
      - 'attack.execution.t1204'
      - 'malware.loader.clrload'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Wo0r0KGWhYGO'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0002
techniques:
    - T1204
tags:
    - attack.execution.t1204
    - malware.loader.clrload
author: '@adhikara13'
version: "1"
references:
    - https://www.welivesecurity.com/2022/09/06/worok-big-picture/
data_sources:
    - process_creation
    - windows
