id: 019ca11f-c6ce-7116-8708-5c78cabfabf0
name: Ivanti Connect Secure (ICS) RESURGE Malware Hash Detection
description: This rule detects the presence of specific file hashes associated with the RESURGE malware, which targets Ivanti Connect Secure devices, as published by CISA in AR25-087A. A match indicates a high probability of compromise on an Ivanti Connect Secure appliance.
query: |+
    title: RESURGE (Ivanti Connect Secure) Published Hashes - CISA AR25-087A
    id: 0f1f2d1a-4c7f-45b0-9b9c-4d0d2461e6be
    status: experimental
    description: >
      This rule is a simple way to spot a possible RESURGE-related compromise on an Ivanti Connect
      Secure device using file fingerprints published by CISA. If it matches, it means a file seen
      on your system has the same identity as a file CISA linked to real, confirmed incident
      response work. That is why this alert should be treated as high priority. Start by
      confirming the asset is truly an Ivanti Connect Secure appliance and that the match is not
      coming from a lab image or a known test file. If the match is on a production system, assume
      the device may be untrusted: reduce or block its internet exposure, capture logs, and
      preserve evidence for follow up. Then look for other unusual changes around the same time,
      such as new files, modified system settings, unexpected administrator actions, or unfamiliar
      outbound connections. A hash match is very specific, so false alarms should be rare.
    author: Daniel Jeremiah
    date: 2026-02-27
    references:
      - https://www.cisa.gov/news-events/analysis-reports/ar25-087a
    logsource:
      product: linux
      category: process_creation
    detection:
      selection_hashes:
        Hashes|contains:
          - "SHA256=52BBC44EB451CB5E16BF98BC5B1823D2F47A18D71F14543B460395A1C1B1AEDA"
          - "SHA256=3526AF9189533470BC0E90D54BAFB0DB7BDA784BE82A372CE112E361F7C7B104"
          - "SHA256=B1221000F43734436EC8022CAAA34B133F4581CA3AE8ECCD8D57EA62573F301D"
      condition: selection_hashes
    falsepositives:
      - Unlikely; hashes are specific.
    level: high

query_type: sigma
severity: high
author: Daniel Jeremiah
version: "2"
references:
    - https://www.cisa.gov/news-events/analysis-reports/ar25-087a
data_sources:
    - process_creation
    - linux
