id: 019ca2f2-6982-746b-bf61-536387f5a9c3
name: Keystone After Hours Logon - Correlated with Identity Info
description: |
    Correlates IdentityLogonEvents and IdentityInfo on AccountObjectId to detect
    after-hours access to Keystone core banking system enriched with user identity.
    Note: The following logic is NOT expressible in Sigma and must be applied
    post-conversion in native KQL, SPL or whatever query language you use and want
    to convert to:
      - Timezone conversion (UTC to PST)
      - WeekDay function and day-of-week filtering
      - Hour-based filtering per department
      - summarize arg_max with bin(TimeGenerated, 5m)
      - ManagerEmail construction via mgrSplit
      - project-reorder
query: |
    title: Keystone After Hours Logon - Correlated with Identity Info
    author: Igor Oliveira (Pr0fiLeRR)
