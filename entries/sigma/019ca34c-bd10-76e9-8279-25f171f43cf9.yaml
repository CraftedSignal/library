    author: Daniel Jeremiah
    date: 2026-02-25T00:00:00.000Z
    references:
      - >-
        https://cloud.google.com/blog/topics/threat-intelligence/net-ntlmv1-deprecation-rainbow-tables
    logsource:
      product: windows
      service: security
    detection:
      selection_event:
        EventID:
          - 4624
      selection_package:
        LmPackageName|contains:
          - LM
          - NTLMv1
          - NTLM V1
      condition: selection_event and selection_package
    falsepositives:
      - Legacy devices or applications still using older authentication; validate
        and plan remediation.
    level: medium
