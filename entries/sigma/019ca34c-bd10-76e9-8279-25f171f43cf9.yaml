id: 019ca34c-bd10-76e9-8279-25f171f43cf9
name: NTLMv1 or LM Authentication Observed
description: |
    This rule is meant to help analysts quickly spot a high-confidence indicator related to Google NetNTLMv1 Deprecation RainbowTables. It is written to be easy to understand and to keep false alarms low by focusing on a very specific match: a Windows logon event that explicitly shows LM or NTLMv1 as the package used. A match does not automatically prove an attacker is currently active, and it does not prove a file was executed, but it does mean the event is important because it lines up with a public threat intelligence source. When this triggers, start by identifying the host, user, and timeframe involved, then decide whether the activity is expected for that system. If it is unexpected, preserve the related logs and any files, and look for nearby events that could explain how the indicator appeared, such as a download, a new process, or a new connection. If the same indicator appears on multiple systems, treat it as a scoping signal and expand the investigation window. Use the reference link (https://cloud.google.com/blog/topics/threat- intelligence/net-ntlmv1-deprecation-rainbow-tables) to document where the indicator came from and to support incident notes and reporting.
query: |
    title: "NTLMv1 or LM Authentication Observed"
    id: e83c962b-d6b0-4956-86e4-5caa930d1564
    status: experimental
    description: >
      This rule is meant to help analysts quickly spot a high-confidence indicator
      related to Google NetNTLMv1 Deprecation RainbowTables. It is written to be
      easy to understand and to keep false alarms low by focusing on a very specific
      match: a Windows logon event that explicitly shows LM or NTLMv1 as the package
      used. A match does not automatically prove an attacker is currently active,
      and it does not prove a file was executed, but it does mean the event is
      important because it lines up with a public threat intelligence source. When
      this triggers, start by identifying the host, user, and timeframe involved,
      then decide whether the activity is expected for that system. If it is
      unexpected, preserve the related logs and any files, and look for nearby
      events that could explain how the indicator appeared, such as a download, a
      new process, or a new connection. If the same indicator appears on multiple
      systems, treat it as a scoping signal and expand the investigation window. Use
