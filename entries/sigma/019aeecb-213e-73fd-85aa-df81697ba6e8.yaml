    logsource:
      category: webserver
      service: apache
      product: linux
    detection:
      base:
        http.method: POST
        http.request.header.content-type|contains: multipart/form-data
      nextjs_headers:
        http.request.header|contains|all:
          - Next-Action
          - X-Nextjs-Request-Id
      critical_patterns:
        http.request.body.content|contains:
          - __proto__
          - $1:constructor:constructor
          - '"_prefix":'
          - vm#runInThisContext
          - child_process#execSync
          - process.mainModule.require
          - '["$1:a:a"]'
          - fs#readFileSync
          - execSync("whoami
          - execSync("id
          - /etc/passwd
          - dns.resolve
          - .oastify.com
      condition: base and nextjs_headers and critical_patterns
    falsepositives:
      - Authorized security scanning
      - Penetration testing
    level: critical
    associated_cves:
      - CVE-2025-55182
      - CVE-2025-66478
