id: 019d17f1-1ad0-7051-bd29-86364b636a2f
name: PolyShell Webshell Activity and C2 Communication
description: This rule detects PolyShell webshell activity on Linux systems, specifically targeting Magento e-commerce platforms. It identifies processes executing from or targeting a suspicious media directory (`/var/www/prod/shared/pub/media/custom_options/quote/i/n/`) in conjunction with `curl` processes retrieving payloads from the `gsocket.io` C2 network. The detection logic combines indicators of webshell presence (execution from a specific directory) with C2 communication (curl to gsocket.io).
query: "title: PolyShell Webshell Detection\r\nid: 12345678-1234-1234-1234-123456789abc\r\nstatus: experimental\r\ndescription: Detects PolyShell webshell activity on Magento e-commerce platforms, including process execution from suspicious media directories and curl-based payload retrieval from the gsocket C2 network.\r\nreferences:\r\n    - https://www.bleepingcomputer.com/news/security/new-polyshell-flaw-allows-unauthenticated-rce-on-magento-e-stores/\r\n    - https://medium.com/@instatunnel/websocket-chaos-the-real-time-protocol-thats-really-insecure-3fa91ca23ee2\r\ntags:\r\n    - attack.execution\r\n    - attack.t1059\r\n    - attack.command_and_control\r\n    - attack.t1105\r\n    - attack.persistence\r\n    - attack.t1505.003\r\nauthor: tom.saul\r\ndate: 2026-03-23\r\nlogsource:\r\n    category: process_creation\r\n    product: linux\r\ndetection:\r\n    selection_webshell:\r\n        # Key logic to identify processes executing in or targeting the suspicious media directory.\r\n        - CurrentDirectory|contains: '/var/www/prod/shared/pub/media/custom_options/quote/i/n/'\r\n        - Image|contains: '/var/www/prod/shared/pub/media/custom_options/quote/i/n/'\r\n        - CommandLine|contains: '/var/www/prod/shared/pub/media/custom_options/quote/i/n/'\r\n    selection_c2:\r\n        # Detects the curl process fetching payloads from the gsocket C2/proxy network\r\n        Image|endswith: '/curl'\r\n        CommandLine|contains: 'gsocket.io'\r\n    condition: selection_webshell and selection_c2\r\nfalsepositives:\r\n    - Legitimate curl usage to gsocket.io endpoints\r\n    - Development or staging environments using the same directory structure\r\nlevel: high"
