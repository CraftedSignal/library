    references:
        - https://www.jamf.com/blog/flexibleferret-malware-continues-to-adapt/
    tags:
        - attack.discovery
        - attack.t1016
        - attack.reconnaissance
        - attack.t1590
    logsource:
        category: proxy
        product: any
    detection:
        selection:
            c-uri|contains:
                - 'api.ipify.org'
                - 'ipinfo.io'
                - 'ifconfig.me'
        condition: selection
    falsepositives:
        - Legitimate applications checking external IP
        - Network diagnostic tools
    level: low

