    title: FlexibleFerret IP Lookup for Victim Profiling
    id: a1b2c3d4-7777-4e5f-8a9b-0c1d2e3f4a5b
    status: experimental
    description: Detects queries to IP lookup services used by FlexibleFerret for victim identification
    author: Claude Opus 4.5
