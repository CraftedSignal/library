id: 019ca099-eb8e-77ea-bb53-746b197ba6e2
name: GandCrab Ransomware Mutex Detection
description: 'This rule detects the creation of specific mutexes known to be associated with GandCrab ransomware. The rule looks for two distinct mutex names: ''Global\pc_group=<Pc_Group>&ransom_id=<Victim_id>'' and ''AversSucksForever''. The presence of either of these mutexes indicates potential GandCrab ransomware activity on a Windows system.'
query: |-
    title: GandCrab Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with GandCrab ransomware activity.
    author: '@adhikara13'
    date: 2024/08/01
    references:
      - 'https://www.acronis.com/en-sg/blog/posts/gandcrab/'
      - 'https://www.trendmicro.com/vinfo/us/threat-encyclopedia/malware/ransom.win32.gandcrab.tioiboch'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.gandcrab'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Global\pc_group=<Pc_Group>&ransom_id=<Victim_id>'
          - 'AversSucksForever'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.gandcrab
author: '@adhikara13'
version: "1"
references:
    - https://www.acronis.com/en-sg/blog/posts/gandcrab/
    - https://www.trendmicro.com/vinfo/us/threat-encyclopedia/malware/ransom.win32.gandcrab.tioiboch
data_sources:
    - process_creation
    - windows
