id: 019ca09d-d1df-752f-bc4b-9819658dd1b6
name: NodeSnake RAT Mutex Detection
description: This rule detects the creation of specific mutexes known to be associated with the NodeSnake Remote Access Trojan (RAT). The detection is triggered when a process creates a mutex named 'Global\NodeSnakeMutex'. This activity is indicative of NodeSnake RAT execution or presence on a system.
query: |-
    title: NodeSnake RAT Mutex Detection
    status: experimental
    description: Detects known mutexes associated with NodeSnake rat activity.
    author: '@adhikara13'
    date: 2024/05/22
    references:
      - 'https://cyberpress.org/interlock-ransomware-deploys-nodesnake-rat'
    tags:
      - 'attack.command_and_control.t1219'
      - 'malware.rat.nodesnake'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Global\NodeSnakeMutex'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0011
techniques:
    - T1219
tags:
    - attack.command_and_control.t1219
    - malware.rat.nodesnake
author: '@adhikara13'
version: "1"
references:
    - https://cyberpress.org/interlock-ransomware-deploys-nodesnake-rat
data_sources:
    - process_creation
    - windows
