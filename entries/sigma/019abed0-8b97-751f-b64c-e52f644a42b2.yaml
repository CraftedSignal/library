id: 019abed0-8b97-751f-b64c-e52f644a42b2
name: FlexibleFerret Malware File Creation in /var/tmp
description: Detects creation of suspicious files in /var/tmp consistent with FlexibleFerret malware staging behavior on macOS systems.
query: |+
    ---
    title: FlexibleFerret Suspicious File Creation in var/tmp
    id: a1b2c3d4-dddd-4e5f-8a9b-0c1d2e3f4a5b
    status: experimental
    description: Detects creation of suspicious files in /var/tmp consistent with FlexibleFerret staging behavior
    author: Claude Opus 4.5
    date: 2025/11/26
    references:
        - https://www.jamf.com/blog/flexibleferret-malware-continues-to-adapt/
    tags:
        - attack.execution
        - attack.t1059.004
        - attack.defense_evasion
        - attack.t1036
    logsource:
        category: file_event
        product: macos
    detection:
        selection_path:
            TargetFilename|startswith: '/var/tmp/'
        selection_files:
            TargetFilename|endswith:
                - 'macpatch.sh'
                - 'cdrivMac.sh'
                - 'CDrivers.zip'
                - 'drivfixer.sh'
                - '.patch'
                - 'driv.go'
        condition: selection_path and selection_files
    falsepositives:
        - Legitimate software using similar naming conventions
    level: high

query_type: sigma
severity: high
