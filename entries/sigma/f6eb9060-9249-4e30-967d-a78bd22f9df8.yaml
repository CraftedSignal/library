id: f6eb9060-9249-4e30-967d-a78bd22f9df8
name: JavaScript Reflective Code Loading
description: Detects common JavaScript patterns used for reflective code loading and dynamic code execution. Adversaries use these techniques to obfuscate malicious code and evade static analysis by executing code from strings or other dynamic sources.
query: "title: JavaScript Reflective Code Loading\r\nid: 9c6515c3-5486-4345-9e20-3842a83f6110\r\nstatus: experimental\r\ndescription: Detects common JavaScript patterns used for reflective code loading and dynamic code execution. Adversaries use these techniques to obfuscate malicious code and evade static analysis by executing code from strings or other dynamic sources.\r\nreferences:\r\n  - https://attack.mitre.org/techniques/T1059/007/\r\n  - https://attack.mitre.org/techniques/T1027/\r\nauthor: detections.ai\r\ndate: 2025-08-12\r\ntags:\r\n  - attack.defense_evasion\r\n  - attack.t1027\r\n  - attack.execution\r\n  - attack.t1059.007\r\nlogsource:\r\n  category: file_script   # This category is for script block logging (e.g., from EDRs)\r\n  product: browser\r\ndetection:\r\n  selection_str:\r\n        # Detects direct execution of code from strings\r\n    ScriptBlockText|contains:\r\n      - 'eval('\r\n      - 'new Function('\r\n      - '.constructor('\r\n      - 'setTimeout(\"'\r\n      - 'setTimeout('''\r\n      - 'setInterval(\"'\r\n      - 'setInterval('''\r\n      - 'document.write(\"<script'\r\n      - 'document.write(''<script'\r\n  selection_innerhtml:\r\n        # Detects injection of script tags via innerHTML property\r\n    ScriptBlockText|contains|all:\r\n      - '.innerHTML'\r\n      - '<script'\r\n  condition: 1 of selection_*\r\nfalsepositives:\r\n  - Some legitimate, albeit poorly written, web applications or browser extensions may use these functions.\r\n  - Advertising and analytics scripts sometimes use these techniques for dynamic content loading. Tuning may be required to exclude known scripts or trusted sources.\r\nlevel: high\r\n"
