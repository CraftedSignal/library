id: 019ca099-ac59-76c0-be8c-85377f873f35
name: Fog Ransomware Mutex Detection
description: 'This rule detects the creation of specific mutexes associated with Fog ransomware activity. It looks for two distinct mutex names: ''6jSf6QFH0VGR5XL4RGYarc5YVpB4W1H3'' and ''BgGnsEdRrztEhEfg0vF8ZaFPYtoyg4lDQ''. The detection is based on process creation events in Windows environments where these mutex names are observed.'
query: |-
    title: Fog Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Fog ransomware activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://www.trendmicro.com/vinfo/us/threat-encyclopedia/malware/ransom.win32.fog.thdodbe'
      - 'https://app.threat.zone/submission/efe469fe-d299-42d0-baf0-c01a2f5af95d/dynamic-scan-report/behaviour/mutex'
      - 'https://www.ionsec.io/resources/clearing-the-mist-unveiling-fog-ransomware'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.fog'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '6jSf6QFH0VGR5XL4RGYarc5YVpB4W1H3'
          - 'BgGnsEdRrztEhEfg0vF8ZaFPYtoyg4lDQ'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.fog
author: '@adhikara13'
version: "1"
references:
    - https://www.trendmicro.com/vinfo/us/threat-encyclopedia/malware/ransom.win32.fog.thdodbe
    - https://app.threat.zone/submission/efe469fe-d299-42d0-baf0-c01a2f5af95d/dynamic-scan-report/behaviour/mutex
    - https://www.ionsec.io/resources/clearing-the-mist-unveiling-fog-ransomware
data_sources:
    - process_creation
    - windows
