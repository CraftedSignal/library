id: 019ca09d-3523-707b-8b99-90038081dc04
name: Money Message Ransomware Mutex Detection
description: The rule detects the creation of specific mutex names associated with Money Message ransomware. It looks for the mutex '12345-12345-12235-12354' during process creation events on Windows systems. The presence of this mutex indicates potential Money Message ransomware activity.
query: |-
    title: Money Message Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Money Message ransomware activity.
    author: '@adhikara13'
    date: 2025/07/16
    references:
      - 'https://cyble.com/blog/demystifying-money-message-ransomware'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.money_message'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '12345-12345-12235-12354'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.money_message
author: '@adhikara13'
version: "1"
references:
    - https://cyble.com/blog/demystifying-money-message-ransomware
data_sources:
    - process_creation
    - windows
