id: 019ca09a-12d5-7511-bc71-bac41e0a30bf
name: Glupteba Backdoor Mutex Detection
description: The rule detects the presence of specific mutex names associated with the Glupteba backdoor. It looks for the mutexes 'Global\h48yorbq6rm87zot', 'Global\y7ze3fznx1u0yc2z', and 'Global\Mp6c3Ygukx29GbDk'. The detection is triggered if any of these mutexes are found, indicating potential Glupteba activity on a Windows system.
query: |-
    title: Glupteba Backdoor Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Glupteba backdoor activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://rt-solar.ru/solar-4rays/blog/3832/'
      - 'https://github.com/sophoslabs/IoCs/blob/master/Trojan-Glupteba'
      - 'https://www.trendmicro.com/vinfo/ae/threat-encyclopedia/malware/trojan.win32.glupteba.ta'
    tags:
      - 'attack.persistence.t1547'
      - 'malware.backdoor.glupteba'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Global\h48yorbq6rm87zot'
          - 'Global\y7ze3fznx1u0yc2z'
          - 'Global\Mp6c3Ygukx29GbDk'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0003
    - TA0004
techniques:
    - T1547
tags:
    - attack.persistence.t1547
    - malware.backdoor.glupteba
author: '@adhikara13'
version: "1"
references:
    - https://rt-solar.ru/solar-4rays/blog/3832/
    - https://github.com/sophoslabs/IoCs/blob/master/Trojan-Glupteba
    - https://www.trendmicro.com/vinfo/ae/threat-encyclopedia/malware/trojan.win32.glupteba.ta
data_sources:
    - process_creation
    - windows
