id: 019cfc41-40be-7303-961d-8e04c18fa8fe
name: CursorJack - Executable Dropped and Launched from Temp Directory
description: |
    Detects execution of a binary from common staging directories shortly after
    creation. Maps to the CursorJack PoC where run.bat drops p.exe to %TEMP%
    before execution. Rule is parent-agnostic for broader coverage but should be
    correlated with Cursor process activity for highest confidence.
query: |-
    title: CursorJack - Executable Dropped and Launched from Temp Directory
    id: c582b93d-f439-47e4-c3c4-e7b2c2c8b95f
    status: experimental
    description: |
      Detects execution of a binary from common staging directories shortly after
      creation. Maps to the CursorJack PoC where run.bat drops p.exe to %TEMP%
      before execution. Rule is parent-agnostic for broader coverage but should be
      correlated with Cursor process activity for highest confidence.
    author: tim@detections.ai
    references:
      - https://www.proofpoint.com/us/blog/threat-insight/cursorjack-weaponizing-deeplinks-exploit-cursor-ide
    date: 2026-03-17T00:00:00.000Z
    tags:
      - attack.execution
      - attack.t1204.001
      - attack.t1105
      - attack.defense_evasion
      - attack.t1036.005
    logsource:
      category: process_creation
      product: windows
      service: security
    detection:
      selection_staging_path:
        Image|contains:
          - '\AppData\Local\Temp\'
          - '\Windows\Temp\'
          - '\ProgramData\'
          - '\Users\Public\'
        Image|endswith:
          - .exe
          - .bat
          - .cmd
          - .ps1
      filter_known_installers:
        Image|contains:
          - '\AppData\Local\Temp\sis'
          - '\AppData\Local\Temp\7z'
          - 'SquirrelTemp'
          - 'Update.exe'
      condition: selection_staging_path and not filter_known_installers
    falsepositives:
      - Software installers and auto-updaters frequently stage to Temp directories.
        This rule requires correlation with Cursor/MCP activity or Rule 1/2 alerts
        to reduce noise. Consider using as a correlated hunt query rather than a
        standalone alert in high-noise environments.
    level: high
query_type: sigma
severity: medium
