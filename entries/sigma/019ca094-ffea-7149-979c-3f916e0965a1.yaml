id: 019ca094-ffea-7149-979c-3f916e0965a1
name: Big Head Ransomware Mutex Detection
description: The rule detects the creation of specific mutexes associated with Big Head ransomware activity. It looks for processes creating mutexes named '8bikfjjD4JpkkAqrz' or 'v6PdkcEldmq3vfupE'. This detection is based on the `process_creation` log category on Windows systems, specifically monitoring for these known ransomware-related mutex names.
query: |-
    title: Big Head Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Big Head ransomware activity.
    author: '@adhikara13'
    date: 2025/01/09
    references:
      - 'https://www.trendmicro.com/en_us/research/23/g/tailing-big-head-ransomware-variants-tactics-and-impact.html'
      - 'https://www.tanium.com/blog/attacks-ransomware-payments-spike-in-2023-cyber-threat-intelligence-roundup/'
      - 'https://rayblog.rising.com.cn/2024/07/bighead%E5%8B%92%E7%B4%A2%E8%BD%AF%E4%BB%B6%E5%88%86%E6%9E%90/'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.big_head'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '8bikfjjD4JpkkAqrz'
          - 'v6PdkcEldmq3vfupE'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.big_head
author: '@adhikara13'
version: "1"
references:
    - https://www.trendmicro.com/en_us/research/23/g/tailing-big-head-ransomware-variants-tactics-and-impact.html
    - https://www.tanium.com/blog/attacks-ransomware-payments-spike-in-2023-cyber-threat-intelligence-roundup/
    - https://rayblog.rising.com.cn/2024/07/bighead%E5%8B%92%E7%B4%A2%E8%BD%AF%E4%BB%B6%E5%88%86%E6%9E%90/
data_sources:
    - process_creation
    - windows
