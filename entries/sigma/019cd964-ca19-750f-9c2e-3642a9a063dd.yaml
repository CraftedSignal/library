id: 019cd964-ca19-750f-9c2e-3642a9a063dd
name: DeadVax Self-Parsing Script Payload Extraction
description: Detects a PowerShell script attempting to read the content of a command or batch file (.cmd) to extract a payload. This technique was observed in the DeadVax campaign where a batch script invokes PowerShell to parse its own content, looking for a line starting with '@' which contains the next stage's Base64-encoded payload.
query: |
    title: DeadVax Self-Parsing Script Payload Extraction
    id: bc3b5e27-cd5f-4b9f-9ec4-6ebe1b4da48d
    status: experimental
    description: >-
      Detects a PowerShell script attempting to read the content of a command or
      batch file (.cmd) to extract a payload. This technique was observed in the
      DeadVax campaign where a batch script invokes PowerShell to parse its own
      content, looking for a line starting with '@' which contains the next stage's
      Base64-encoded payload.
    author: detections.ai
    references:
      - https://www.securonix.com/blog/deadvax-threat-research-security-advisory/
    date: 2026-03-10T00:00:00.000Z
    tags:
      - attack.execution
      - attack.defense_evasion
      - attack.t1059.001
      - attack.t1059.003
      - attack.t1140
    logsource:
      category: powershell_script
      product: windows
    detection:
      selection:
        ScriptBlockText|contains|all:
          - Get-Content
          - .cmd
          - '-match'
          - ^@
      condition: selection
    falsepositives:
      - Legitimate but unusual administrative scripts that parse batch files for
        configuration or data. The combination of all elements, especially matching
        a line starting with '@', significantly reduces the likelihood of false
        positives.
    level: medium
query_type: sigma
severity: medium
