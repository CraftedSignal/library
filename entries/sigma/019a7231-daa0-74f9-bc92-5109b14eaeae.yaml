name: Cephalus Ransomware Critical Service Stoppage
description: Detects attempts to stop critical services like Veeam and MSSQL, a behavior associated with Cephalus ransomware to ensure successful encryption and hinder recovery.
query: "title: Cephalus Ransomware Critical Service Stoppage\r\nid: 0b47b4b7-43be-410c-b699-f741ae4fccd8\r\nstatus: experimental\r\ndescription: >-\r\n  Detects attempts to stop critical services like Veeam and MSSQL, a behavior\r\n  associated with Cephalus ransomware to ensure successful encryption and hinder\r\n  recovery.\r\nreferences:\r\n  - https://asec.ahnlab.com/en/90878/\r\n  - https://lazyadmin.nl/powershell/stop-service/\r\nauthor: detections.ai, Georg Lauenstein\r\ndate: 2025-11-10T00:00:00.000Z\r\ntags:\r\n  - attack.impact\r\n  - attack.t1489\r\nlogsource:\r\n  category: process_creation\r\n  product: windows\r\n  service: security\r\ndetection:\r\n  selection_cli:\r\n    Image|endswith:\r\n      - \\net.exe\r\n      - \\sc.exe\r\n    CommandLine|contains: 'stop'\r\n  selection_pwsh:\r\n    Image|endswith:\r\n      - \\powershell.exe\r\n      - \\pwsh.exe\r\n    CommandLine|contains: 'Stop-Service'\r\n  selection_services:\r\n    CommandLine|contains:\r\n      - 'Veeam'\r\n      - 'SQL'\r\n      - 'MSSQL'\r\n  condition: (selection_cli or selection_pwsh) and selection_services\r\nfalsepositives:\r\n  - Legitimate administrative activity.\r\n  - Automated system management scripts.\r\nlevel: high\r\n"
