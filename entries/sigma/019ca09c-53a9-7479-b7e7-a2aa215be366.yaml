id: 019ca09c-53a9-7479-b7e7-a2aa215be366
name: MagnetLoader Mutex Detection
description: The rule detects the creation of processes that utilize specific mutex names associated with MagnetLoader malware. It specifically looks for the mutex name 'SM0:220:304:WilStaging_02_p1h'. Detection of this mutex name indicates potential MagnetLoader activity on the system.
query: |-
    title: MagnetLoader Mutex Detection
    status: experimental
    description: Detects known mutexes associated with MagnetLoader activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://unit42.paloaltonetworks.com/cobalt-strike-memory-analysis/'
    tags:
      - 'attack.execution.t1204'
      - 'malware.loader.magnetloader'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'SM0:220:304:WilStaging_02_p1h'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0002
techniques:
    - T1204
tags:
    - attack.execution.t1204
    - malware.loader.magnetloader
author: '@adhikara13'
version: "1"
references:
    - https://unit42.paloaltonetworks.com/cobalt-strike-memory-analysis/
data_sources:
    - process_creation
    - windows
