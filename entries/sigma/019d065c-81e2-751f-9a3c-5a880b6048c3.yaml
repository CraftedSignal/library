id: 019d065c-81e2-751f-9a3c-5a880b6048c3
name: GHOSTBLADE Dataminer Artifacts
description: Detects process command lines containing strings characteristic of the GHOSTBLADE dataminer, a payload deployed by UNC6353 via the DarkSword exploit. These strings are hardcoded file paths used for data collection and exfiltration.
query: |
    title: GHOSTBLADE Dataminer Artifacts
    id: 03d484fe-01a1-4497-bed5-608e44df6145
    status: experimental
    description: >-
      Detects process command lines containing strings characteristic of the
      GHOSTBLADE dataminer, a payload deployed by UNC6353 via the DarkSword exploit.
      These strings are hardcoded file paths used for data collection and
      exfiltration.
    author: detections.ai
    references:
      - https://iverify.io/blog/darksword-ios-exploit-kit-explained
      - https://www.lookout.com/threat-intelligence/article/darksword
      - https://cloud.google.com/blog/topics/threat-intelligence/darksword-ios-exploit-chain
    date: 2026-03-19
    tags:
      - attack.collection
      - attack.t1005
    logsource:
      category: process_creation
    detection:
      selection:
        # These strings are hardcoded paths and filenames used by the GHOSTBLADE implant for data staging and collection.
        CommandLine|contains:
          - '/private/var/tmp/wifi_passwords.txt'
          - '/private/var/tmp/wifi_passwords_securityd.txt'
          - '/.com.apple.mobile_container_manager.metadata.plist'
          - '/installed_apps.txt'
          - 'icloud_dump_'
      condition: selection
    falsepositives:
      - Highly unlikely due to the specificity of the file paths and strings.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0009
techniques:
    - T1005
