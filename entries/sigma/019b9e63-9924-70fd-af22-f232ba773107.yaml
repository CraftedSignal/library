id: 019b9e63-9924-70fd-af22-f232ba773107
name: VS Code Server Named Pipe Creation via CMD
description: Detects cmd.exe executing VS Code server components with named pipe usage, indicating VS Code remote server or tunnel activity that may be used for legitimate development or malicious C2 channels
query: |
    title: VS Code Server Named Pipe Creation via CMD
    id: e64df892-b727-498e-baf4-185b50cebe5f
    status: test
    description: >-
      Detects cmd.exe executing VS Code server components with named pipe usage,
      indicating VS Code remote server or tunnel activity that may be used for
      legitimate development or malicious C2 channels
    references:
      - https://attack.mitre.org/techniques/T1219/
      - https://code.visualstudio.com/docs/remote/tunnels
    author: SimSpace
    date: 2026-01-01T00:00:00.000Z
    tags:
      - attack.command-and-control
      - attack.t1219
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        Image|endswith: \cmd.exe
        CommandLine|contains|all:
          - .vscode
          - \\.\pipe\
      condition: selection
    falsepositives:
      - None currently known.
    level: medium
