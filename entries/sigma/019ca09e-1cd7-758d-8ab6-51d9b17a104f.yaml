id: 019ca09e-1cd7-758d-8ab6-51d9b17a104f
name: Pay2Key Ransomware Mutex Detection
description: This rule detects the creation of specific mutex names ('BooYYoYnYoooY') that are known to be associated with Pay2Key ransomware activity. The detection is based on monitoring process creation events in Windows environments.
query: |-
    title: Pay2Key Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Pay2Key ransomware activity.
    author: '@adhikara13'
    date: 2025/07/12
    references:
      - 'https://github.com/TheRavenFile/Daily-Hunt/blob/main/Pay2Key%20Ransomware'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.pay2key'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'BooYYoYnYoooY'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.pay2key
author: '@adhikara13'
version: "1"
references:
    - https://github.com/TheRavenFile/Daily-Hunt/blob/main/Pay2Key%20Ransomware
data_sources:
    - process_creation
    - windows
