id: 019bb804-ad47-73ae-acf7-62868302d4c1
name: Fake Stripe Payment Iframe
description: Detects the injection of a malicious iframe with attributes that impersonate the legitimate Stripe payment interface. This technique is used by Magecart actors to steal credit card data by replacing the real payment form with a clone.
query: |
    title: Fake Stripe Payment Iframe
    id: 370d3beb-f506-4e8d-ae43-5af4e52eb7c3
    status: experimental
    description: Detects the injection of a malicious iframe with attributes that
      impersonate the legitimate Stripe payment interface. This technique is used by
      Magecart actors to steal credit card data by replacing the real payment form
      with a clone.
    references:
      - https://www.silentpush.com/blog/magecart/?utm_source=feedly&utm_medium=rss&utm_campaign=magecart
    author: detections.ai
    date: 2026-01-13
    tags:
      - attack.t1566.002
      - attack.t1056.001
      - attack.collection
    logsource:
      category: proxy
      # product: web-proxy, waf, etc.
    detection:
      # Detects key attributes used to impersonate a legitimate Stripe payment iframe
      selection:
        c-body|contains|all:
          - '<iframe'
          - 'name="__privateStripeFrame"'
          - 'title="Secure payment input frame"'
      condition: selection
    fields:
      - c-uri
      - c-body
      - src_ip
      - dest_host
    falsepositives:
      - Extremely low. This combination of attributes is highly specific to this
        malicious activity. A false positive would require a legitimate developer to
        coincidentally use these exact non-standard iframe attributes.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0001
    - TA0009
    - TA0006
techniques:
    - T1566.002
    - T1056.001
tags:
