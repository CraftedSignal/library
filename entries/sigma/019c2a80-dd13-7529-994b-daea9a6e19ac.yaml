id: 019c2a80-dd13-7529-994b-daea9a6e19ac
name: Potential DeadVax Self-Parsing Script Execution
description: |
    Detects the execution of a PowerShell command characteristic of the DeadVax malware family. The threat actor uses a self-parsing batch script that invokes PowerShell to read its own content (`Get-Content`). It then uses a regular expression to find and extract a payload from a line starting with the '@' symbol. This technique is used to hide the next stage payload from static analysis.
query: |
    title: Potential DeadVax Self-Parsing Script Execution
    id: 3a732655-f843-4a32-92ae-ffc74a971c5a
    status: experimental
    description: |
      Detects the execution of a PowerShell command characteristic of the DeadVax malware family. The threat actor uses a self-parsing batch script that invokes PowerShell to read its own content (`Get-Content`). It then uses a regular expression to find and extract a payload from a line starting with the '@' symbol. This technique is used to hide the next stage payload from static analysis.
    references:
      - https://www.securonix.com/blog/deadvax-threat-research-security-advisory/
    author: "detections.ai, Securonix Threat Research"
    date: 2026-02-04
    tags:
      - attack.t1059.001
      - attack.t1059.003
      - attack.t1140
      - attack.execution
      - attack.defense_evasion
    logsource:
      category: process_creation
      product: windows
    detection:
      selection_process:
        # Detects PowerShell or known renamed variants used by the malware
        Image|endswith:
          - '\powershell.exe'
          - '\pwsh.exe'
          - '\mbs.exe' # Renamed powershell.exe as observed in the DeadVax campaign
      selection_logic:
        CommandLine|contains|all:
          - 'Get-Content' # Reads the content of the script file
          - 'match' # Uses regex to find the payload line. The report also mentions 'watch', which could be a typo.
          - "'^@" # Specific regex pattern to find lines starting with '@' which contain the payload
      condition: all of selection_*
    falsepositives:
      - Legitimate administrative or development scripts could potentially use a
        similar self-parsing mechanism, although this specific pattern is highly
        suspicious.
      - Filter based on parent processes or script locations if legitimate use cases
        are found.
    level: high
query_type: sigma
severity: high
