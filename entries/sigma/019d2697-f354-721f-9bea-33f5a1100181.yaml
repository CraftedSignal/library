id: 019d2697-f354-721f-9bea-33f5a1100181
name: Toast Notification XML with Protocol Action Button Constructed via PowerShell
description: |
    Detects PowerShell constructing toast notification XML containing an activationType attribute combined with a protocol scheme. This pattern creates a clickable notification button that launches a URI handler, the primary mechanism for delivering phishing links via toast notifications. Covers both msteams:// protocol links and generic protocol handlers.
query: |
    title: Toast Notification XML with Protocol Action Button Constructed via PowerShell
    id: f4a1b2c3-d4e5-4f67-8901-abcdef123404
    status: experimental
    description: >
        Detects PowerShell constructing toast notification XML containing an activationType
        attribute combined with a protocol scheme. This pattern creates a clickable notification
        button that launches a URI handler, the primary mechanism for delivering phishing links
        via toast notifications. Covers both msteams:// protocol links and generic protocol handlers.
    references:
        - https://ipurple.team/2026/03/25/toast-notifications/
        - https://brmk.me/2026/03/18/toast-my-way.html
    author: Detection Engineering
    date: 2026/03/25
    modified: 2026/03/25
    tags:
        - attack.reconnaissance
        - attack.t1598.003
    logsource:
        category: ps_script
        product: windows
    detection:
        selection_activation:
            ScriptBlockText|contains: 'activationType'
        selection_protocol:
            ScriptBlockText|contains:
                - 'protocol'
                - 'msteams://'
        condition: selection_activation and selection_protocol
    falsepositives:
        - Legitimate Teams integration scripts constructing toast XML with protocol action handlers
    level: medium
