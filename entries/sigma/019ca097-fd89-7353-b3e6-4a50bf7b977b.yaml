id: 019ca097-fd89-7353-b3e6-4a50bf7b977b
name: DarkBit Ransomware Mutex Detection
description: The rule detects the creation of specific mutex names ('Global\dbdbdbdb') that are known to be associated with DarkBit ransomware activity. This detection is based on monitoring process creation events for these particular mutexes.
query: |-
    title: DarkBit Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with DarkBit ransomware activity.
    author: '@adhikara13'
    date: 2024/05/22
    references:
      - 'https://cyble.com/blog/uncovering-the-dark-side-of-darkbit-ransomware/'
      - 'https://blogs.blackberry.com/en/2023/02/darkbit-ransomware-targets-israel'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.darkbit'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Global\dbdbdbdb'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.darkbit
author: '@adhikara13'
version: "1"
references:
    - https://cyble.com/blog/uncovering-the-dark-side-of-darkbit-ransomware/
    - https://blogs.blackberry.com/en/2023/02/darkbit-ransomware-targets-israel
data_sources:
    - process_creation
    - windows
