id: 019ca093-f09a-767b-8e47-f7ba08dcccbe
name: AstraLocker Ransomware Mutex Detection
description: The rule detects the creation of specific mutexes associated with AstraLocker ransomware. It specifically looks for a mutex named 'EncryptedWithAstraLocker'. The detection logic is based on the 'process_creation' log category on Windows systems, focusing on the 'MutexName' field. This indicates an attempt to identify the presence or activity of AstraLocker ransomware by monitoring for its known mutex identifiers.
query: |-
    title: AstraLocker Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with AstraLocker ransomware activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://www.reversinglabs.com/blog/smash-and-grab-astralocker-2-pushes-ransomware-direct-from-office-docs'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.astralocker'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'EncryptedWithAstraLocker'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.astralocker
author: '@adhikara13'
version: "1"
references:
    - https://www.reversinglabs.com/blog/smash-and-grab-astralocker-2-pushes-ransomware-direct-from-office-docs
data_sources:
    - process_creation
    - windows
