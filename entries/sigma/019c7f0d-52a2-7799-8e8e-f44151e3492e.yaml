id: 019c7f0d-52a2-7799-8e8e-f44151e3492e
name: MIMICRAT PowerShell ETW Disable and AMSI Bypass
description: Detects PowerShell script content consistent with ETW disable (EventProvider.m_enabled) and AMSI bypass (AmsiUtils.amsiInitFailed) described in the MIMICRAT ClickFix chain.
query: |
    title: "MIMICRAT PowerShell ETW Disable and AMSI Bypass"
    id: 0b2d3b31-1ef6-4d1c-9b6a-2a1a55f6e5b7
    status: experimental
    description: >-
      Detects PowerShell script content consistent with ETW disable
      (EventProvider.m_enabled) and AMSI bypass (AmsiUtils.amsiInitFailed) described
      in the MIMICRAT ClickFix chain.
    author: Daniel Jeremiah
    date: 2026-02-21T00:00:00.000Z
    references:
      - >-
        https://www.elastic.co/security-labs/mimicrat-custom-rat-mimics-c2-frameworks
    logsource:
      product: windows
      category: ps_script
      service: powershell-classic
    detection:
      selection:
        ScriptBlockText|contains|all:
          - System.Diagnostics.Eventing.EventProvider
          - m_enabled
          - GetField
          - SetValue
          - System.Management.Automation.AmsiUtils
          - amsiInitFailed
      condition: selection
    falsepositives:
      - Unknown; this combination is uncommon and generally suspicious
    level: high
    tags:
      - attack.defense_evasion
      - attack.t1562.002
      - attack.t1562.001
      - attack.execution
query_type: sigma
severity: medium
tactics:
    - TA0002
    - TA0005
techniques:
    - T1562.002
    - T1562.001
    - T1059.001
author: Daniel Jeremiah
version: "4"
references:
    - https://www.elastic.co/security-labs/mimicrat-custom-rat-mimics-c2-frameworks
