id: 019ca098-3b29-71f9-9ac5-405ba1f57b7f
name: DarkTortilla Loader Mutex Detection
description: This rule detects the creation of specific mutexes known to be associated with the DarkTortilla loader. The rule specifically looks for the mutex name 'NUkiklN<yjUKNj' during process creation events on Windows systems. The presence of this mutex name indicates potential DarkTortilla malware activity.
query: |-
    title: DarkTortilla Loader Mutex Detection
    status: experimental
    description: Detects known mutexes associated with DarkTortilla loader activity.
    author: '@adhikara13'
    date: 2025/07/16
    references:
      - 'https://cyble.com/blog/sophisticated-darktortilla-malware-spreading-via-phishing-sites/'
    tags:
      - 'attack.execution.t1204'
      - 'malware.loader.darktortilla'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'NUkiklN<yjUKNj'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0002
techniques:
    - T1204
tags:
    - attack.execution.t1204
    - malware.loader.darktortilla
author: '@adhikara13'
version: "1"
references:
    - https://cyble.com/blog/sophisticated-darktortilla-malware-spreading-via-phishing-sites/
data_sources:
    - process_creation
    - windows
