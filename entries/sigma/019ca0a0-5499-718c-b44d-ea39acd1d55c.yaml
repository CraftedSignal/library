id: 019ca0a0-5499-718c-b44d-ea39acd1d55c
name: Ryuk Ransomware Mutex Detection
description: This rule detects the creation of specific mutexes known to be associated with Ryuk ransomware activity. The rule specifically looks for a mutex named 'rykmutex'. The presence of this mutex indicates a high probability of Ryuk ransomware execution on the system.
query: |-
    title: Ryuk Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Ryuk ransomware activity.
    author: '@adhikara13'
    date: 2023/06/09
    references:
      - 'https://blog.talosintelligence.com/threat-roundup-0602-0609-23/'
      - 'https://www.trendmicro.com/vinfo/us/threat-encyclopedia/malware/ransom.win64.ryuk.smb'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.ryuk'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'rykmutex'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.ryuk
author: '@adhikara13'
version: "1"
references:
    - https://blog.talosintelligence.com/threat-roundup-0602-0609-23/
    - https://www.trendmicro.com/vinfo/us/threat-encyclopedia/malware/ransom.win64.ryuk.smb
data_sources:
    - process_creation
    - windows
