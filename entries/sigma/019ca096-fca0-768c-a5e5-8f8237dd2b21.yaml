id: 019ca096-fca0-768c-a5e5-8f8237dd2b21
name: CoinHelper Miner Mutex Detection
description: The rule detects the creation of processes that utilize specific mutex names associated with CoinHelper miner activity. Specifically, it looks for the mutex name 'QPRZ<digit>bWvXh'. The detection is based on the 'process_creation' log category on Windows systems.
query: |-
    title: CoinHelper Miner Mutex Detection
    status: experimental
    description: Detects known mutexes associated with CoinHelper miner activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://decoded.avast.io/janrubin/toss-a-coin-to-your-helper/'
    tags:
      - 'attack.impact.t1496'
      - 'malware.miner.coinhelper'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'QPRZ<digit>bWvXh'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1496
tags:
    - attack.impact.t1496
    - malware.miner.coinhelper
author: '@adhikara13'
version: "1"
references:
    - https://decoded.avast.io/janrubin/toss-a-coin-to-your-helper/
data_sources:
    - process_creation
    - windows
