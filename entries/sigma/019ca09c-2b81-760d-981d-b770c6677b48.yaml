id: 019ca09c-2b81-760d-981d-b770c6677b48
name: Lumma Stealer Mutex Detection
description: The rule detects the creation of specific mutexes known to be associated with the Lumma stealer malware. It looks for a mutex named 'sodfksdkfalksdasgpkprgasdgrrkgwhrterheegwsdfwef'. The detection is based on process creation events in Windows environments.
query: |-
    title: Lumma Stealer Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Lumma stealer activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://www.mcafee.com/blogs/other-blogs/mcafee-labs/lumma-stealer-on-the-rise-how-telegram-channels-are-fueling-malware-proliferation/'
    tags:
      - 'attack.credential_access.t1555'
      - 'malware.stealer.lumma'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'sodfksdkfalksdasgpkprgasdgrrkgwhrterheegwsdfwef'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0006
techniques:
    - T1555
tags:
    - attack.credential_access.t1555
    - malware.stealer.lumma
author: '@adhikara13'
version: "1"
references:
    - https://www.mcafee.com/blogs/other-blogs/mcafee-labs/lumma-stealer-on-the-rise-how-telegram-channels-are-fueling-malware-proliferation/
data_sources:
    - process_creation
    - windows
