id: 019ca094-93f3-710c-9ac2-9f4aa12cf715
name: Babuk Ransomware Mutex Detection
description: This rule detects the creation of a specific mutex named 'DoYouWantToHaveSexWithCuongDong'. This mutex name is known to be associated with Babuk ransomware activity. The detection is based on monitoring process creation events on Windows systems for the presence of this particular mutex.
query: |-
    title: Babuk Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Babuk ransomware activity.
    author: '@adhikara13'
    date: 2025/07/15
    references:
      - 'https://cyble.com/blog/deep-dive-into-builder-of-notorious-babuk-ransomware/'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.babuk'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'DoYouWantToHaveSexWithCuongDong'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.babuk
author: '@adhikara13'
version: "1"
references:
    - https://cyble.com/blog/deep-dive-into-builder-of-notorious-babuk-ransomware/
data_sources:
    - process_creation
    - windows
