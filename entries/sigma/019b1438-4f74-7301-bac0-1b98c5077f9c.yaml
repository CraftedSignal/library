id: 019b1438-4f74-7301-bac0-1b98c5077f9c
name: TAG-160 Logistics Phishing IOCs
description: Detects network traffic to domains associated with the TAG-160 cluster's phishing campaigns, which primarily target the logistics sector.
query: |
    title: TAG-160 Logistics Phishing IOCs
    id: cf97463e-db42-441f-9b65-3870dfc4620c
    status: experimental
    description: Detects network traffic to domains associated with the TAG-160
      cluster's phishing campaigns, which primarily target the logistics sector.
    references:
      - https://www.recordedfuture.com/research/graybravos-castleloader-activity-clusters-target-multiple-industries
    author: detections.ai
    date: 2025-12-12
    tags:
      - attack.t1566
      - attack.t1583.001
      - attack.initial_access
      - attack.resource_development
    logsource:
      category: dns # This rule can be adapted for other network logs like proxy, firewall, or EDR network events.
      product: any
    detection:
      # Detects DNS queries for domains used in TAG-160 phishing campaigns
      selection:
        query:
          - 'cdlfreightlogistics.com'
          - 'dperforms.info'
          - 'englandloglstics.com'
          - 'englanglogistlcs.com'
          - 'hometownlogisticsllc.com'
          - 'leemanlogisticsinc.com'
          - 'loadplannig.com'
          - 'loads.icu'
          - 'loadsplanning.com'
          - 'loadsschedule.com'
          - 'loadstracking.com'
          - 'loadstrucking.com'
          - 'mcentireinc.com'
          - 'mcloads.com'
          - 'mlxfreightinc.com'
          - 'mrlogsol.ca'
          - 'pinaccletruckllc.com'
          - 'rateconfirmations.com'
          - 'redlightninglogistics.com'
          - 'redlightninglogisticsinc.com'
          - 'starshiplogisticsgroupllc.com'
          - 'tenderloads.com'
          - 'trucksscheduling.com'
      condition: selection
    falsepositives:
      - These domains are highly specific to threat actor activity. False positives
        may occur if any of these domains expire and are later repurposed for
        legitimate use.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0001
    - TA0042
techniques:
