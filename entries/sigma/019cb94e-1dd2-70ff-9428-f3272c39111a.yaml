id: 019cb94e-1dd2-70ff-9428-f3272c39111a
name: PLASMAGRID DGA Traffic
description: Detects DNS queries for domains that match the pattern used by the PLASMAGRID malware's Domain Generation Algorithm (DGA). This malware, delivered by the Coruna iOS exploit kit, uses a DGA seeded with "lazarus" to generate 15-character domains with a ".xyz" TLD for command and control fallback.
query: |
    title: PLASMAGRID DGA Traffic
    id: 044595a3-7361-4bcb-87f7-18b6b3410447
    status: experimental
    description: Detects DNS queries for domains that match the pattern used by the
      PLASMAGRID malware's Domain Generation Algorithm (DGA). This malware,
      delivered by the Coruna iOS exploit kit, uses a DGA seeded with "lazarus" to
      generate 15-character domains with a ".xyz" TLD for command and control
      fallback.
    author: detections.ai
    references:
      - https://cloud.google.com/blog/topics/threat-intelligence/coruna-powerful-ios-exploit-kit
      - https://www.wired.com/story/coruna-iphone-hacking-toolkit-us-government/
      - https://thehackernews.com/2026/03/coruna-ios-exploit-kit-uses-23-exploits.html
    date: 2026-03-04
    tags:
      - attack.command_and_control
      - attack.t1568.002
    logsource:
      category: dns
      product: zeek
    detection:
      selection:
        # Detects DNS queries for 15-character domains ending in .xyz, matching the PLASMAGRID DGA pattern.
        query|re: '^[a-zA-Z0-9]{15}\.xyz$'
      condition: selection
    falsepositives:
      - This detection is based on a specific DGA pattern (15 alphanumeric
        characters + .xyz TLD). While specific, there is a possibility of collision
        with legitimate, algorithmically generated domains from CDNs or other
        services.
    level: medium
query_type: sigma
severity: medium
