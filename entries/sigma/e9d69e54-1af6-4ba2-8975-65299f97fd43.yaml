id: e9d69e54-1af6-4ba2-8975-65299f97fd43
name: Suspicious DNS Lookup to Known Tor Proxy Services
description: |
    Detects DNS lookups to common Tor proxy gateways such as tor2web and onion.* mirrors. These domains are often used to proxy access to hidden services from non-Tor browsers and are frequently used by threat actors for staging, data exfiltration or ransomware payments.
query: "title: Suspicious DNS Lookup to Known Tor Proxy Services\r\nid: 44c5a9e8-e2e6-480c-a21a-aeea7e525f47\r\nstatus: experimental\r\ndescription: >\r\n  Detects DNS lookups to common Tor proxy gateways such as tor2web and onion.*\r\n  mirrors. These domains are often used to proxy access to hidden services from\r\n  non-Tor browsers and are frequently used by threat actors for staging, data\r\n  exfiltration or ransomware payments.\r\nauthor: Tim Peck\r\nreferences:\r\n  - https://blogs.juniper.net/en-us/threat-research/dreambus-botnet-resurfaces-targets-rocketmq-vulnerability\r\n  - https://link.springer.com/article/10.1007/s11416-023-00476-z\r\ndate: 2025/08/04\r\nlogsource:\r\n  product: windows\r\n  category: dns_query\r\n  service: sysmon\r\ndetection:\r\n  selection:\r\n    EventID: 3\r\n    DestinationHostname|contains:\r\n      # onion.* # Block all domains containing \"onion.\" rather than known proxies\r\n      - onion.cab\r\n      - onion.casa\r\n      - onion.city\r\n      - onion.direct\r\n      - onion.dog\r\n      - onion.gg\r\n      - onion.ink\r\n      - onion.it\r\n      - onion.link\r\n      - onion.lt\r\n      - onion.lu\r\n      - onion.ly\r\n      - onion.moe\r\n      - onion.nu\r\n      - onion.nz\r\n      - onion.pet\r\n      - onion.plus\r\n      - onion.re\r\n      - onion.rip\r\n      - onion.sh\r\n      - onion.to\r\n      - onion.top\r\n      - onion.ws\r\n      - onion.xyz\r\n      - t2w.pw\r\n      - tor2web\r\n      - hiddenservice.net\r\n      - tor-gateways.de\r\n      - cyber-hub.pw\r\n  condition: selection\r\nlevel: high\r\ntags:\r\n  - attack.command_and_control\r\n  - attack.T1090.003\r\n  - threat.DreamBus\r\n  - threat.Hive_ransomware\r\nfalsepositives:\r\n  - Authorized access to Tor proxy services\r\n"
