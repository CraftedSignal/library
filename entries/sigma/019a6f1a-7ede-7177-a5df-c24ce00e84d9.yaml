id: 019a6f1a-7ede-7177-a5df-c24ce00e84d9
name: LANDFALL Spyware C2 Communication
description: Detects network connections to Command and Control (C2) servers associated with the LANDFALL Android spyware. LANDFALL communicates over HTTPS, often on non-standard ports.
query: |
    title: LANDFALL Spyware C2 Communication
    id: f289c45b-5b3d-493c-99aa-b95244197a78
    status: experimental
    description: Detects network connections to Command and Control (C2) servers
      associated with the LANDFALL Android spyware. LANDFALL communicates over
      HTTPS, often on non-standard ports.
    references:
      - https://unit42.paloaltonetworks.com/landfall-is-new-commercial-grade-android-spyware/
    author: detections.ai
    date: 2025-11-10
    tags:
      - attack.command_and_control
      - attack.t1071.001
      - attack.exfiltration
      - attack.t1041
      - detection.emerging_threats
    logsource:
      category: network_connection
      product: zeek
    detection:
      selection:
        # Known C2 domains and IPs from the report
        DestinationHostname|endswith:
          - 'brightvideodesigns.com'
          - 'healthyeatingontherun.com'
          - 'hotelsitereview.com'
          - 'projectmanagerskills.com'
        DestinationIp:
          - '45.155.250.158'
          - '46.246.28.75'
          - '91.132.92.35'
          - '92.243.65.240'
          - '192.36.57.56'
          - '194.76.224.127'
      condition: selection
    falsepositives:
      - This detection relies on static indicators. If the C2 infrastructure is
        taken down or the IP addresses are reallocated to benign services, this
        could lead to false positives.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0011
    - TA0010
techniques:
    - T1071.001
    - T1041
tags:
    - attack.command_and_control
    - attack.t1071.001
    - attack.exfiltration
    - attack.t1041
    - detection.emerging_threats
author: detections.ai
version: "2"
