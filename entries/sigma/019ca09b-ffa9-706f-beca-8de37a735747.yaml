id: 019ca09b-ffa9-706f-beca-8de37a735747
name: LoptikMod Backdoor Mutex Detection
description: The rule detects the creation of specific mutexes associated with the LoptikMod backdoor. It specifically looks for a mutex named '08808'. The detection is based on process creation events in Windows environments.
query: |-
    title: LoptikMod Backdoor Mutex Detection
    status: experimental
    description: Detects known mutexes associated with LoptikMod backdoor activity.
    author: '@adhikara13'
    date: 2025/01/15
    references:
      - 'https://ti.qianxin.com/blog/articles/analysis-of-the-attack-activity-of-the-apt-q-38-using-pdf-document-decoys-en/?utm_source=chatgpt.com'
      - 'https://www.trellix.com/blogs/research/from-click-to-compromise-unveiling-the-sophisticated-attack-of-donot-apt-group-on-southern-european-government-entities/'
    tags:
      - 'attack.persistence.t1547'
      - 'malware.backdoor.loptikmod'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '08808'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0003
    - TA0004
techniques:
    - T1547
tags:
    - attack.persistence.t1547
