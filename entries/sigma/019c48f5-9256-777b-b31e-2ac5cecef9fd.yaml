id: 019c48f5-9256-777b-b31e-2ac5cecef9fd
name: HTTP POST Beaconing to Single External IP
description: This rule detects multiple HTTP POST requests originating from the same host to the same external IP address within a 10-minute window, with a minimum of 5 such events. This pattern is indicative of potential command and control (C2) beaconing activity, where a compromised system periodically communicates with an external server.
query: "title: HTTP POST Request to External IP\r\nname: http_post_external\r\nid: e7f8a9b0-c1d2-3456-e789-012345678901\r\nstatus: test\r\ndescription: Detects base HTTP POST requests to external IP addresses for correlation.\r\nreferences:\r\n    - https://attack.mitre.org/techniques/T1071/001/\r\nauthor: SimSpace\r\ndate: 2026-01-19\r\ntags:\r\n    - attack.command-and-control\r\n    - attack.t1071.001\r\nlogsource:\r\n    product: zeek\r\n    service: http\r\ndetection:\r\n    selection:\r\n        method: 'POST'\r\n    filter_internal:\r\n        id.resp_h|startswith:\r\n            - '10.'\r\n            - '172.16.'\r\n            - '172.17.'\r\n            - '172.18.'\r\n            - '172.19.'\r\n            - '172.20.'\r\n            - '172.21.'\r\n            - '172.22.'\r\n            - '172.23.'\r\n            - '172.24.'\r\n            - '172.25.'\r\n            - '172.26.'\r\n            - '172.27.'\r\n            - '172.28.'\r\n            - '172.29.'\r\n            - '172.30.'\r\n            - '172.31.'\r\n            - '192.168.'\r\n            - '127.'\r\n    condition: selection and not filter_internal\r\nfields:\r\n    - id.orig_h\r\n    - id.resp_h\r\n    - uri\r\n    - user_agent\r\nfalsepositives:\r\n    - Unknown\r\nlevel: informational\r\n---\r\ntitle: HTTP POST Beaconing to Single External IP\r\nid: f8a9b0c1-d2e3-4567-f890-123456789012\r\nstatus: test\r\ndescription: Detects multiple HTTP POST requests to the same external IP address within a 10-minute window, indicating potential C2 beaconing activity.\r\nreferences:\r\n    - https://attack.mitre.org/techniques/T1071/001/\r\nauthor: SimSpace\r\ndate: 2026-01-19\r\ntags:\r\n    - attack.command-and-control\r\n    - attack.t1071.001\r\ncorrelation:\r\n    type: event_count\r\n    rules:\r\n        - http_post_external\r\n    group-by:\r\n        - id.orig_h\r\n        - id.resp_h\r\n    timespan: 10m\r\n    condition:\r\n        gte: 5\r\nfalsepositives:\r\n    - Unknown\r\nlevel: high"
query_type: sigma
version: "1"
