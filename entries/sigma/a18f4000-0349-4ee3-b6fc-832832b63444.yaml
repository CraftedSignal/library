name: Suspicious mshta.exe Execution via PowerShell
description: Detects execution of mshta.exe from PowerShell, often used for malware delivery via malicious URLs.
query: "title: Suspicious mshta.exe Execution via PowerShell\r\nid: e3a1b2c3-d4e5-6789-0123-456789abcdef\r\nstatus: experimental\r\ndescription: Detects execution of mshta.exe from PowerShell, often used for malware delivery via malicious URLs.\r\nauthor: Thaung Htet\r\ndate: 2025-02-07\r\nreferences:\r\n    - https://attack.mitre.org/techniques/T1218/005/\r\n    - https://redcanary.com/threat-detection-report/techniques/mshta/\r\ntags:\r\n    - attack.defense-evasion\r\n    - attack.execution\r\n    - attack.command-and-control\r\n    - attack.t1218.005\r\nlogsource:\r\n    category: process_creation\r\n    product: windows\r\ndetection:\r\n    selection:\r\n        ParentImage|endswith: '\\powershell.exe'\r\n        Image|endswith: '\\mshta.exe'\r\n        CommandLine|contains:\r\n            - 'http'\r\n            - 'https'\r\n            - 'tinyurl'\r\n            - 'bit.ly'\r\n            - 'goo.gl'\r\n            - 'htm'\r\n            - 'hta'\r\n    condition: selection\r\nfalsepositives:\r\n    - Legitimate IT administration tasks using mshta.exe\r\nlevel: high"
