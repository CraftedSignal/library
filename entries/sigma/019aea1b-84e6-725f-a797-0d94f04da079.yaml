id: 019aea1b-84e6-725f-a797-0d94f04da079
name: JSKit iOS Exploitation Framework Detected in Network Traffic
description: Detects unique strings associated with the JSKit iOS exploitation framework in network traffic. This framework is used by multiple threat actors, including the commercial surveillance vendor Intellexa, to deliver spyware like Predator.
query: |
    title: JSKit iOS Exploitation Framework Detected in Network Traffic
    id: 1c8b9c2d-81ed-4824-99f8-59bf6e45a7c7
    status: experimental
    description: Detects unique strings associated with the JSKit iOS exploitation
      framework in network traffic. This framework is used by multiple threat
      actors, including the commercial surveillance vendor Intellexa, to deliver
      spyware like Predator.
    references:
      - https://cloud.google.com/blog/topics/threat-intelligence/intellexa-zero-day-exploits-continue/
    author: detections.ai
    date: 2025-12-04
    tags:
      - attack.t1059.007
      - attack.ta0002
      - detection.emerging-threats
    logsource:
      category: proxy
    detection:
      # Unique debug strings and function names from the JSKit framework found in HTTP response bodies
      selection:
        - 'braaz x5 gadget:'
        - 'no braaz x5'
        - 'using exploit 7'
        - 'no forged braaz x5'
      condition: selection
    falsepositives:
      - The strings are highly specific to the JSKit framework and are unlikely to
        occur in legitimate traffic.
      - The string 'using exploit 7' is the most generic and could potentially
        appear in developer comments, but the risk is low.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0002
