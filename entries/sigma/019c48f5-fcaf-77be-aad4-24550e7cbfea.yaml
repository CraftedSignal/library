id: 019c48f5-fcaf-77be-aad4-24550e7cbfea
name: PowerShell Download Cradle with Immediate Execution
description: Detects PowerShell download cradles that use commands like Invoke-RestMethod, Invoke-WebRequest, iwr, irm, curl, wget, Net.WebClient, DownloadString, DownloadData, or Start-BitsTransfer to download content, immediately followed by execution via Invoke-Expression or IEX. This technique is often used for fileless malware execution.
query: "title: PowerShell Download Cradle with Immediate Execution\r\nid: bec54d3e-5f53-42b4-8019-3d0b77193b43\r\nstatus: test\r\ndescription: Detects PowerShell download cradles using Invoke-RestMethod or Invoke-WebRequest piped to Invoke-Expression for fileless malware execution.\r\nreferences:\r\n    - https://attack.mitre.org/techniques/T1059/001/\r\n    - https://attack.mitre.org/techniques/T1105/\r\nauthor: SimSpace\r\ndate: 2026-01-19\r\ntags:\r\n    - attack.execution\r\n    - attack.t1059.001\r\n    - attack.command-and-control\r\n    - attack.t1105\r\nlogsource:\r\n    product: windows\r\n    service: powershell\r\ndetection:\r\n    selection_download:\r\n        ScriptBlockText|contains:\r\n            - 'Invoke-RestMethod'\r\n            - 'Invoke-WebRequest'\r\n            - 'iwr'\r\n            - 'irm'\r\n            - 'curl'\r\n            - 'wget'\r\n            - 'Net.WebClient'\r\n            - 'DownloadString'\r\n            - 'DownloadData'\r\n            - 'Start-BitsTransfer'\r\n    selection_execute:\r\n        ScriptBlockText|contains:\r\n            - '| Invoke-Expression'\r\n            - '| IEX'\r\n            - '|IEX'\r\n            - 'IEX('\r\n            - 'IEX ('\r\n            - 'Invoke-Expression('\r\n            - 'Invoke-Expression ('\r\n    condition: selection_download and selection_execute\r\nlevel: high"
