    logsource:
      category: webserver
    detection:
      selection_path:
        c-uri-stem|contains: '/mifs/403.jsp'
      selection_payload_query:
        c-uri-query|contains: 'yv66vg'
      selection_payload_body:
        cs-post-data|contains: 'yv66vg'
      condition: selection_path and (selection_payload_query or selection_payload_body)
    falsepositives: |
      The string 'yv66vg' could legitimately appear in other Base64 encoded data,
      but the combination with the specific URI path makes false positives
      unlikely.
    level: high
