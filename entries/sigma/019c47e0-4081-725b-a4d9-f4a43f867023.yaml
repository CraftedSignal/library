id: 019c47e0-4081-725b-a4d9-f4a43f867023
name: Java Bytecode Delivery in Ivanti EPMM
description: |
    Detects attempts to deliver a Base64-encoded Java class to an Ivanti EPMM
    server. This is characteristic of the "Sleeper Shell" campaign where attackers
    plant a dormant in-memory backdoor. The rule looks for the Base64 string
    'yv66vg', which corresponds to the 'CAFEBABE' Java magic bytes, in requests
    targeting the known vulnerable path.
query: |
    title: Java Bytecode Delivery in Ivanti EPMM
    id: cf5807d2-82e2-4b27-865b-1010e326cdf2
    status: experimental
    description: |
      Detects attempts to deliver a Base64-encoded Java class to an Ivanti EPMM
      server. This is characteristic of the "Sleeper Shell" campaign where attackers
      plant a dormant in-memory backdoor. The rule looks for the Base64 string
      'yv66vg', which corresponds to the 'CAFEBABE' Java magic bytes, in requests
      targeting the known vulnerable path.
    references:
      - https://defusedcyber.com/ivanti-epmm-sleeper-shells-403jsp
    author: tim@detections.ai
    date: 2026-02-10T00:00:00.000Z
