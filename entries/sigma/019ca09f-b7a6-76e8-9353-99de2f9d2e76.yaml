id: 019ca09f-b7a6-76e8-9353-99de2f9d2e76
name: RevClient RAT Mutex Detection
description: The rule detects the creation of specific mutexes associated with the RevClient Remote Access Trojan (RAT). It specifically looks for a mutex named 'ZhengReversePC'. The presence of this mutex indicates potential RevClient RAT activity on a Windows system.
query: |-
    title: RevClient RAT Mutex Detection
    status: experimental
    description: Detects known mutexes associated with RevClient rat activity.
    author: '@adhikara13'
    date: 2024/07/19
    references:
      - 'https://asec.ahnlab.com/en/57873/'
    tags:
      - 'attack.command_and_control.t1219'
      - 'malware.rat.revclient'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'ZhengReversePC'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0011
techniques:
    - T1219
tags:
    - attack.command_and_control.t1219
    - malware.rat.revclient
author: '@adhikara13'
version: "1"
references:
    - https://asec.ahnlab.com/en/57873/
data_sources:
    - process_creation
    - windows
