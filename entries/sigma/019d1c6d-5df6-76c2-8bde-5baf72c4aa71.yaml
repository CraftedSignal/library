id: 019d1c6d-5df6-76c2-8bde-5baf72c4aa71
name: Suspicious Node.js Automatic Installation
description: Detects the unexpected installation of Node.js by an unusual parent process (such as VS Code, cmd, or PowerShell). This behavior is indicative of the StoatWaffle downloader, which automatically fetches and installs the Node.js runtime if it is absent from the target environment.
query: |
    title: Suspicious Node.js Automatic Installation
    id: 64558fe9-3888-4ad8-b2e1-928da650373a
    status: experimental
    description: Detects the unexpected installation of Node.js by an unusual parent
      process (such as VS Code, cmd, or PowerShell). This behavior is indicative of
      the StoatWaffle downloader, which automatically fetches and installs the
      Node.js runtime if it is absent from the target environment.
    author: detections.ai
    references:
      - https://thehackernews.com/2026/03/north-korean-hackers-abuse-vs-code-auto.html
    date: 2026-03-23
    tags:
      - attack.execution
      - attack.t1059
    logsource:
      category: process_creation
      product: windows
    detection:
      # Targets Windows Installer executing a Node.js MSI package
      selection_msi:
        Image|endswith: '\msiexec.exe'
        CommandLine|contains|all:
          - 'node'
          - '.msi'

      # [FP Tuning] Limits detection to common shells and VS Code to reduce noise.
      # If legitimate bootstrap scripts trigger this, exclude known IT/DevOps script paths here.
      selection_parent:
        ParentImage|endswith:
          - '\cmd.exe'
          - '\powershell.exe'
          - '\pwsh.exe'
          - '\code.exe'

      condition: selection_msi and selection_parent
    falsepositives:
      - Legitimate developer setups or automated environment bootstrap scripts.
      - IT software deployment tools that wrap PowerShell or CMD scripts to install
        software.
    level: medium
query_type: sigma
severity: medium
tactics:
    - TA0002
    - TA0005
techniques:
    - T1059
    - T1218.007
