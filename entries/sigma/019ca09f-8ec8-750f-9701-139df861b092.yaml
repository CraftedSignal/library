id: 019ca09f-8ec8-750f-9701-139df861b092
name: RedLine Stealer Mutex Detection
description: This rule detects the creation of specific mutexes known to be associated with the RedLine stealer malware. The detection is triggered when a process creates a mutex named 'winter750'.
query: |-
    title: RedLine Stealer Mutex Detection
    status: experimental
    description: Detects known mutexes associated with RedLine stealer activity.
    author: '@adhikara13'
    date: 2024/05/22
    references:
      - 'https://www.mcafee.com/blogs/other-blogs/mcafee-labs/redline-stealer-a-novel-approach/'
      - 'https://www.securityhq.com/blog/april-2024-threat-advisory-top-5'
    tags:
      - 'attack.credential_access.t1555'
      - 'malware.stealer.redline'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'winter750'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0006
techniques:
    - T1555
tags:
    - attack.credential_access.t1555
    - malware.stealer.redline
author: '@adhikara13'
version: "1"
references:
    - https://www.mcafee.com/blogs/other-blogs/mcafee-labs/redline-stealer-a-novel-approach/
    - https://www.securityhq.com/blog/april-2024-threat-advisory-top-5
data_sources:
    - process_creation
    - windows
