id: 01997535-15ba-746b-9c35-aad6fd1767c2
name: ChillyHell Malware Shell Profile Injection
description: Detects modification of shell profile files (.zshrc, .bash_profile, .profile) by processes named 'applet' or 'qtop'. This is a fallback persistence mechanism used by the ChillyHell malware.
query: |
    title: ChillyHell Malware Shell Profile Injection
    id: a9d8b2b9-8a62-4aae-ae3f-5cbfd981474a
    status: experimental
    description: >-
      Detects modification of shell profile files (.zshrc, .bash_profile, .profile)
      by processes named 'applet' or 'qtop'. This is a fallback persistence
      mechanism used by the ChillyHell malware.
    references:
      - https://www.jamf.com/blog/chillyhell-a-modular-macos-backdoor/
    author: Kaung Khant Ko
    date: 2025-09-23T00:00:00.000Z
    tags:
      - attack.persistence
      - attack.t1546.004
    logsource:
      category: file_event
      product: macos
    detection:
      selection:
        TargetFilename|endswith:
          - /.bash_profile
          - /.profile
          - /.zshrc
        Image|endswith:
          - /applet
          - /qtop
      condition: selection
    falsepositives:
      - Legitimate administrative scripts or tools that modify user shell profiles.
    level: high
query_type: sigma
severity: medium
tactics:
    - TA0003
    - TA0004
techniques:
    - T1546.004
