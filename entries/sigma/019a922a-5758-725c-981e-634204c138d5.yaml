id: 019a922a-5758-725c-981e-634204c138d5
name: DigitStealer Credential and Data Collection
description: Detects the collection and staging of sensitive user data, such as credentials from keychains, browser profiles, and cryptocurrency wallets, by compressing them into an archive. This behavior is a key component of the DigitStealer infostealer's data theft process.
query: |
    title: DigitStealer Credential and Data Collection
    id: 76454869-9739-4379-925e-8eebaaec0d39
    status: experimental
    description: Detects the collection and staging of sensitive user data, such as
      credentials from keychains, browser profiles, and cryptocurrency wallets, by
      compressing them into an archive. This behavior is a key component of the
      DigitStealer infostealer's data theft process.
    references:
      - https://www.jamf.com/blog/jtl-digitstealer-macos-infostealer-analysis/
    author: detections.ai
    date: 2025-11-17
    tags:
      - attack.collection
      - attack.credential_access
      - attack.exfiltration
      - attack.t1005
      - attack.t1555.001
      - attack.t1555.003
      - attack.t1041
    logsource:
      product: macos
      category: process_creation
    detection:
      selection_bin:
        Image|endswith:
          # Detects common compression utilities
          - '/zip'
          - '/tar'
      selection_paths:
        CommandLine|contains:
          # Detects command lines targeting sensitive user data paths
          # Keychain
          - 'Library/Keychains/login.keychain-db' # Browsers
          - 'Library/Application Support/Google/Chrome'
          - 'Library/Application Support/BraveSoftware/Brave-Browser'
          - 'Library/Application Support/Microsoft Edge'
          - 'Library/Application Support/Firefox/Profiles' # Crypto Wallets
          - 'Library/Application Support/Ledger Live'
          - 'Library/Application Support/Exodus'
          - 'Library/Application Support/Coinomi'
          - 'Library/Application Support/atomic/Local Storage'
          - 'Library/Application Support/Wasabi/client/Wallets'
          - 'Library/Application Support/Guarda'
          - '.electrum/wallets' # Other sensitive apps
          - 'Library/Application Support/Telegram Desktop/tdata' # User directories
          - '/Desktop'
          - '/Documents'
          - '/Downloads'
      condition: selection_bin and selection_paths
    falsepositives:
      - Legitimate user backup activity.
    level: medium
query_type: sigma
severity: medium
tactics:
    - TA0009
    - TA0010
    - TA0006
techniques:
    - T1005
    - T1555.001
    - T1555.003
    - T1074
tags:
