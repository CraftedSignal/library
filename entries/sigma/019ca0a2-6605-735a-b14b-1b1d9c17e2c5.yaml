id: 019ca0a2-6605-735a-b14b-1b1d9c17e2c5
name: UDPGangster Backdoor Mutex Detection
description: This rule detects the creation of specific mutexes associated with the UDPGangster backdoor. The detection logic looks for the mutex name 'xhxhxhxhxhxpp'. The presence of this mutex name indicates potential UDPGangster backdoor activity on the system.
query: |-
    title: UDPGangster Backdoor Mutex Detection
    status: experimental
    description: Detects known mutexes associated with UDPGangster backdoor activity.
    author: '@adhikara13'
    date: 2025/12/30
    references:
      - 'https://www.fortinet.com/blog/threat-research/udpgangster-campaigns-target-multiple-countries'
    tags:
      - 'attack.persistence.t1547'
      - 'malware.backdoor.udpgangster'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'xhxhxhxhxhxpp'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0003
    - TA0004
techniques:
    - T1547
tags:
    - attack.persistence.t1547
    - malware.backdoor.udpgangster
author: '@adhikara13'
version: "1"
references:
    - https://www.fortinet.com/blog/threat-research/udpgangster-campaigns-target-multiple-countries
data_sources:
    - process_creation
    - windows
