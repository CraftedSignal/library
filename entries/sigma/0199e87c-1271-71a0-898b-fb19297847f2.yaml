id: 0199e87c-1271-71a0-898b-fb19297847f2
name: Execution of 7-Character Executable from ADMIN$ Share
description: Detects the execution of an executable with a 7-character lowercase alphanumeric name from the ADMIN$ share. This pattern is often associated with lateral movement techniques where tools like PsExec are used with randomly named service executables.
query: |
    title: Execution of 7-Character Executable from ADMIN$ Share
    id: 7e4a3555-199b-4bc7-a96c-8d7941c6d039
    status: experimental
    description: Detects the execution of an executable with a 7-character lowercase
      alphanumeric name from the ADMIN$ share. This pattern is often associated with
      lateral movement techniques where tools like PsExec are used with randomly
      named service executables.
    references:
      - https://attack.mitre.org/techniques/T1021/002/
    author: mikecybersec
    date: 2025-10-15
    tags:
      - attack.lateral_movement
      - attack.t1021.002
      - CobaltStrike
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        # Detects execution from the ADMIN$ share of an executable with a 7-character lowercase alphanumeric name.
        # Example: C:\Windows\ADMIN$\qwoiuzp.exe
        Image|re: '.*\\ADMIN$\\([a-z0-9]{7})\.exe$'
      condition: selection
    falsepositives:
      - Legitimate administrative tools that happen to match this specific naming
        convention, although this is unlikely.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0008
techniques:
    - T1021.002
