id: 019a9229-3a02-728b-b8f8-4fc05dfd3bf4
name: DigitStealer In-Memory Execution
description: Detects the in-memory execution of AppleScript or JXA payloads via osascript, a technique used by the DigitStealer malware to download and run malicious code while evading file-based detections.
query: |
    title: DigitStealer In-Memory Execution
    id: 4524c9b8-5045-48dd-8fe7-e3a7d4dcc04f
    status: experimental
    description: Detects the in-memory execution of AppleScript or JXA payloads via
      osascript, a technique used by the DigitStealer malware to download and run
      malicious code while evading file-based detections.
    references:
      - https://www.jamf.com/blog/jtl-digitstealer-macos-infostealer-analysis/
    author: detections.ai
    date: 2025-11-17
    tags:
      - attack.t1059.002
      - attack.t1059.004
      - attack.t1027
    logsource:
      product: macos
      category: process_creation
    detection:
      selection:
        Image|endswith: '/osascript' # Detects the execution of the target script interpreter
        ParentImage|endswith:
          # The parent process must be a shell
          - '/bash'
          - '/sh'
          - '/zsh'
        ParentCommandLine|contains|all:
          # The parent's command line must show a piped command from curl to osascript
          - 'nohup'
          - 'curl'
          - '|'
          - 'osascript'
      condition: selection
    falsepositives:
      - Legitimate but unusual administrative scripts.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0002
    - TA0005
techniques:
    - T1059.002
    - T1059.004
    - T1027
    - T1059.007
tags:
