id: 019cfc3d-f735-779d-9a6f-fbc71c02dd11
name: CursorJack - Cursor IDE Spawning Download or Staging Utility
description: |
    Detects Cursor IDE spawning download utilities or LOLBins commonly used for
    payload staging. Directly maps to the CursorJack technique where a malicious
    MCP deeplink encodes a command that downloads and executes a remote payload.
    Low false-positive rate — these child processes have no legitimate use when
    launched directly by Cursor.
query: |
    title: CursorJack - Cursor IDE Spawning Download or Staging Utility
    id: a359f75b-d217-45c2-a1a2-c5f0a0f6d73d
    status: experimental
    description: |
      Detects Cursor IDE spawning download utilities or LOLBins commonly used for
      payload staging. Directly maps to the CursorJack technique where a malicious
      MCP deeplink encodes a command that downloads and executes a remote payload.
      Low false-positive rate — these child processes have no legitimate use when
      launched directly by Cursor.
    author: tim@detections.ai
    references:
      - https://www.proofpoint.com/us/blog/threat-insight/cursorjack-weaponizing-deeplinks-exploit-cursor-ide
      - https://github.com/EmergingThreats/threatresearch/tree/master/CursorJack
    date: 2026-03-17
    tags:
      - attack.initial_access
      - attack.t1566.002
      - attack.execution
      - attack.t1204.001
      - attack.t1059.001
      - attack.t1059.003
      - attack.t1059.004
      - attack.t1105
      - attack.persistence
      - attack.t1546
    logsource:
      category: process_creation
      product: all
    detection:
      selection_parent:
        ParentImage|endswith:
          - '\Cursor.exe'
          - '/cursor'
        # Catches Electron subprocess chains (renderer/helper → child)
        # where direct parent may not be Cursor.exe itself
      selection_parent_path:
        ParentImage|contains:
          - '\Cursor\resources\'
          - '/Cursor/resources/'
          - '/cursor/resources/'
      selection_child_downloader:
        Image|endswith:
          # Windows — download/staging LOLBins
          - '\curl.exe'
          - '\wget.exe'
          - '\certutil.exe'
          - '\bitsadmin.exe'
          - '\mshta.exe'
          - '\wscript.exe'
          - '\cscript.exe'
          - '\rundll32.exe'
          - '\regsvr32.exe'
          - '\msiexec.exe'
          - '\installutil.exe'
          # Linux/macOS — download utilities
          - '/curl'
          - '/wget'
          - '/fetch' # FreeBSD fetch
          - '/osascript' # macOS AppleScript
      condition: (selection_parent or selection_parent_path) and selection_child_downloader
    falsepositives:
      - Unlikely. Cursor has no legitimate need to spawn these utilities directly.
        If curl/wget FPs occur, filter on CommandLine containing known MCP package
        registry URLs (e.g., registry.npmjs.org).
    level: high
query_type: sigma
severity: high
