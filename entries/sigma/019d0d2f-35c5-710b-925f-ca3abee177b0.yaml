id: 019d0d2f-35c5-710b-925f-ca3abee177b0
name: Suspicious ZimbraWeb App Password Creation
description: Detects the creation of an app-specific password named 'ZimbraWeb' via Zimbra SOAP API. This specific persistent credential name is a known mechanism utilized in the Operation GhostMail campaign by a Russian APT.
query: "title: Suspicious ZimbraWeb App Password Creation\nid: 30167298-b0bb-4a37-94c1-7322b840416d\nstatus: experimental\ndescription: Detects the creation of an app-specific password named 'ZimbraWeb'\n  via Zimbra SOAP API. This specific persistent credential name is a known\n  mechanism utilized in the Operation GhostMail campaign by a Russian APT.\nauthor: detections.ai\nreferences:\n  - https://www.seqrite.com/blog/operation-ghostmail-zimbra-xss-russian-apt-ukraine/\ndate: 2026-03-20\ntags:\n  - attack.persistence\n  - attack.t1098.001\nlogsource:\n  category: webserver\ndetection:\n  selection:\n    # Detects the specific SOAP request method and the hardcoded app name 'ZimbraWeb' in the URI/Payload\n    # Note: Standard web access logs may not capture HTTP POST bodies. If your SIEM logs the payload \n    # in a different field (e.g., 'request_body', 'payload', or via WAF logs), adjust the field name below.\n    c-uri|contains|all:\n      - 'CreateAppSpecificPasswordRequest'\n      - 'ZimbraWeb'\n  condition: selection\nfalsepositives:\n  - Legitimate users creating an app password explicitly named 'ZimbraWeb'\n    (highly unlikely).\n  - If false positives occur, consider filtering by known internal IPs or\n    correlating with suspicious Zimbra webmail logins.\nlevel: high\n"
query_type: sigma
severity: high
