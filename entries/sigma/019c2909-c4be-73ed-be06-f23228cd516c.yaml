id: 019c2909-c4be-73ed-be06-f23228cd516c
name: Malicious OpenClaw Agent Execution
description: Detects the execution of processes named 'openclaw-agent.exe' or 'openclaw-agent'. These binaries are being distributed as malicious 'prerequisites' in weaponized OpenClaw AI agent skills to install infostealers and other malware.
query: |
    title: Malicious OpenClaw Agent Execution
    id: df775247-5eb7-4c6c-b4db-8c4960cd306d
    status: experimental
    description: Detects the execution of processes named 'openclaw-agent.exe' or
      'openclaw-agent'. These binaries are being distributed as malicious
      'prerequisites' in weaponized OpenClaw AI agent skills to install infostealers
      and other malware.
    references:
      - https://blog.virustotal.com/2026/02/from-automation-to-infection-how.html
    author: detections.ai
    date: 2026-02-04
    tags:
      - attack.t1204.002
      - attack.t1059.003
    logsource:
      category: process_creation
      product: all
    detection:
      selection:
        # Detects the specific malicious agent names for Windows and Linux/macOS
        Image|endswith:
          - '\openclaw-agent.exe'
          - '/openclaw-agent'
      condition: selection
    falsepositives:
      - medium
    level: high
