id: 019ca0a3-5696-724f-a18a-f76a814b3c3a
name: Xtreme RAT Mutex Detection
description: This rule detects the creation of specific mutexes known to be associated with the Xtreme RAT (Remote Access Trojan) malware. The detection is triggered when a process creates a mutex named 'XTREMEUPDATE'. The presence of these mutexes indicates potential Xtreme RAT activity on a Windows system.
query: |-
    title: Xtreme RAT Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Xtreme rat activity.
    author: '@adhikara13'
    date: 2024/08/01
    references:
      - 'https://blog.talosintelligence.com/threat-roundup-0221-0228/'
      - 'https://tria.ge/201109-zfdsa4p7qe/behavioral2/analog?main_event=Mutex&q=xtreme'
    tags:
      - 'attack.command_and_control.t1219'
      - 'malware.rat.xtreme'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'XTREMEUPDATE'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0011
techniques:
    - T1219
tags:
    - attack.command_and_control.t1219
    - malware.rat.xtreme
author: '@adhikara13'
version: "1"
references:
    - https://blog.talosintelligence.com/threat-roundup-0221-0228/
    - https://tria.ge/201109-zfdsa4p7qe/behavioral2/analog?main_event=Mutex&q=xtreme
data_sources:
    - process_creation
    - windows
