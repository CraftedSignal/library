id: 019ca09c-e112-7163-8662-a86472090394
name: Matrix Ransomware Mutex Detection
description: The rule detects the creation of specific mutexes ('OurMainMutex999' or 'OurMainMutex999net') which are known to be associated with Matrix ransomware activity. This detection focuses on identifying the presence of these unique mutex names as an indicator of compromise by Matrix ransomware.
query: |-
    title: Matrix Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Matrix ransomware activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://github.com/sophoslabs/IoCs/blob/4b06149929305d1431a425d2b271a0e04f855f4a/Ransomware-Matrix'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.matrix'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'OurMainMutex999'
          - 'OurMainMutex999net'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.matrix
author: '@adhikara13'
version: "1"
references:
    - https://github.com/sophoslabs/IoCs/blob/4b06149929305d1431a425d2b271a0e04f855f4a/Ransomware-Matrix
data_sources:
    - process_creation
    - windows
