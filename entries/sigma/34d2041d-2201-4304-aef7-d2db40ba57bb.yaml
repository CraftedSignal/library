name: Tycoon Phishing Kit OAuth Application Impersonation
description: "Detects indicators of compromise (IOCs) and suspicious OAuth consent activity \nlinked to the Tycoon/ODx phishing kits. These campaigns impersonate Microsoft \nOAuth apps to bypass MFA and harvest Microsoft 365 credentials.\n"
query: "title: Tycoon Phishing Kit OAuth Application Impersonation\nstatus: stable\ndescription: |\n  Detects indicators of compromise (IOCs) and suspicious OAuth consent activity \n  linked to the Tycoon/ODx phishing kits. These campaigns impersonate Microsoft \n  OAuth apps to bypass MFA and harvest Microsoft 365 credentials.\nreferences:\n  - >-\n    https://rhisac.org/threat-intelligence/microsoft-oauth-app-impersonation-leads-to-mfa-phishing/\nauthor: Aryan, Detections.ai, GPT-5\ndate: 2025-08-16T00:00:00.000Z\ntags:\n  - attack.initial_access\n  - attack.credential_access\n  - attack.defense_evasion\n  - attack.t1566\n  - attack.t1528\n  - attack.t1111\n  - attack.t1078\n  - attack.t1071.001\n  - attack.t1556.003\n  - platform.azure\n  - platform.office365\n  - platform.saas\n  - category.phishing\n  - category.oauth_abuse\n  - category.cloud_identity\n  - product.azure\n  - product.azuread\n  - product.microsoft365\nlogsource:\n  category: proxy\n  product: azure\ndetection:\n  selection_app_id:\n    AppId:\n      - 14b2864e-3cff-4d33-b5cd-7f14ca272ea4\n      - 85da47ec-2977-40ab-af03-f3d45aaab169\n      - 355d1228-1537-4e90-80a6-dae111bb4d70\n      - 6628b5b8-55af-42b4-9797-5cd5c148313c\n      - b0d8ea55-bc29-436c-9f8b-f8829030261d\n      - 22c606e8-7d68-4a09-89d9-c3c563a453a0\n      - 31c6b531-dd95-4361-93df-f5a9c906da39\n      - 055399fa-29b9-46ab-994d-4ae06f40bada\n      - 6a77659d-dd6f-4c73-a555-aed25926a05f\n      - 21f81c9e-475d-4c26-9308-1de74a286f73\n      - 987c259f-da29-4575-8072-96c610204830\n      - db2eb385-c02f-44fc-b204-ade7d9f418b1\n      - f99a0806-7650-4d78-acef-71e445dfc844\n      - fdcf7337-92bf-4c70-9888-ea234b6ffb0d\n      - fe0e32ca-d09e-4f80-af3c-5b086d4b8e66\n  selection_domains:\n    destination.domain|re:\n      - (?i)azureapplicationregistration\\.(pages\\.dev|com|net)\n      - (?i)yrqwvevbjcfv\\..*\n      - (?i)gmlygt\\..*\n      - (?i)pw5\\.haykovx\\..*\n      - (?i)chikeukohandco\\.com\n  selection_ip:\n    destination.ip:\n      - 2a00:b703:fff2:35::1\n  selection_user_agent:\n    http.user_agent|contains:\n      - axios/1.7.9\n      - axios/1.8.2\n  selection_oauth_consent:\n    OperationName|contains: Consent to application\n  condition: >\n    selection_app_id or ( selection_oauth_consent and ( selection_domains or\n    selection_ip or selection_user_agent ) ) or ( 2 of ( selection_domains,\n    selection_ip, selection_user_agent ) )\nfalsepositives:\n  - Legitimate apps may use Axios user agents.\n  - Some listed domains may later be cleaned and reused.\n  - Investigate before blocking — confirm via OAuth consent logs and user\n    context.\nlevel: high\n"
