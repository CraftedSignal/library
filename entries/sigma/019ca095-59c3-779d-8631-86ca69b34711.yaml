id: 019ca095-59c3-779d-8631-86ca69b34711
name: BlackMatter Ransomware Mutex Detection
description: The rule detects the creation of specific mutexes known to be associated with BlackMatter ransomware. It specifically looks for a mutex named '0d216858b68c0bcae655c2eaffeee2ad'. The detection is based on process creation events where this mutex name is observed.
query: |-
    title: BlackMatter Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with BlackMatter ransomware activity.
    author: '@adhikara13'
    date: 2025/07/13
    references:
      - 'https://cyble.com/blog/dissecting-blackmatter-ransomware/'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.blackmatter'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '0d216858b68c0bcae655c2eaffeee2ad'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.blackmatter
author: '@adhikara13'
version: "1"
references:
    - https://cyble.com/blog/dissecting-blackmatter-ransomware/
data_sources:
    - process_creation
    - windows
