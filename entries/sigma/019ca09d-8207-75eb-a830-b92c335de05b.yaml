id: 019ca09d-8207-75eb-a830-b92c335de05b
name: Netdooka RAT Mutex Detection
description: The rule detects the creation of specific mutex names associated with Netdooka RAT activity. The mutex name '3f0d73e2-4b8e-4539-90fd-812330bb39c8' is used as an indicator for this malware. This detection focuses on process creation events on Windows systems.
query: |-
    title: Netdooka RAT Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Netdooka rat activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://www.trendmicro.com/en_se/research/22/e/netdooka-framework-distributed-via-privateloader-ppi.html'
    tags:
      - 'attack.command_and_control.t1219'
      - 'malware.rat.netdooka'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '3f0d73e2-4b8e-4539-90fd-812330bb39c8'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0011
techniques:
    - T1219
tags:
    - attack.command_and_control.t1219
    - malware.rat.netdooka
author: '@adhikara13'
version: "1"
references:
    - https://www.trendmicro.com/en_se/research/22/e/netdooka-framework-distributed-via-privateloader-ppi.html
data_sources:
    - process_creation
    - windows
