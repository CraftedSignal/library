id: 019c6e96-7a2c-7103-9c87-ea50d1c568b7
name: K8s User Execution To Pod
description: |
    Detects interactive shell execution within a container in a production Kubernetes namespace, using the 'exec' command.

    Running this command in a pod allows a user to establish a temporary shell session and execute any process/commands in the pod.
query: |
    title: K8s User Execution To Pod
    id: 12345678-1234-1234-1234-123456789012
    status: experimental
    description: >
      Detects interactive shell execution within a container in a production
      Kubernetes namespace, using the 'exec' command.


      Running this command in a pod allows a user to establish a temporary shell
      session and execute any process/commands in the pod.
    tags:
      - attack.t1609
      - attack.execution
      - attack.resource.container
      - container.execution
      - container.kubernetes
    author: zendannyy
    references:
      - https://attack.mitre.org/techniques/T1609
    logsource:
      product: kubernetes
      service: audit
    detection:
      selection_verb_resource_subresource:
        verb:
          - create
          - get
        objectRef.resource: pods
        objectRef.subresource: exec
      selection_session_status:
        stage: ResponseComplete
      selection_authorization_status:
        kubernetes.audit.annotations.authorization_k8s_io/decision: Allow
      selection_prod_namespace:
        objectRef.namespace:
          - prod
          - production
          - default
      filter_authorized_users:
        user.username|startswith:
          - ci-admin
          - 'system:'
      condition: >-
        selection_verb_resource_subresource and selection_session_status and
        selection_authorization_status and selection_prod_namespace and not
        filter_authorized_users
    falsepositives:
      - Legitimate administrative debugging by authorized users (SRE, etc).
    level: medium
query_type: sigma
severity: medium
tactics:
    - TA0002
    - TA0004
techniques:
    - T1609
tags:
    - attack.t1609
    - attack.execution
    - attack.resource.container
    - container.execution
    - container.kubernetes
author: zendannyy
version: "2"
references:
    - https://attack.mitre.org/techniques/T1609
data_sources:
    - kubernetes
    - audit
