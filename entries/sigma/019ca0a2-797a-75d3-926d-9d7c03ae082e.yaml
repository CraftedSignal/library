id: 019ca0a2-797a-75d3-926d-9d7c03ae082e
name: Underground Ransomware Mutex Detection
description: This rule detects the creation of specific mutex names associated with the 'Underground' ransomware. The detection is based on a direct match of the mutex name '8DC1F7B9D2F4EA58'. The rule is designed to identify activity related to this particular ransomware variant.
query: |-
    title: Underground Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Underground ransomware activity.
    author: '@adhikara13'
    date: 2024/08/01
    references:
      - 'https://app.any.run/tasks/4f71bbd3-4e7b-41ac-bf4b-1817442ea5bf/'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.underground'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '8DC1F7B9D2F4EA58'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.underground
author: '@adhikara13'
version: "1"
references:
    - https://app.any.run/tasks/4f71bbd3-4e7b-41ac-bf4b-1817442ea5bf/
data_sources:
    - process_creation
    - windows
