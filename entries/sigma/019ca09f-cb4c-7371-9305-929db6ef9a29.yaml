id: 019ca09f-cb4c-7371-9305-929db6ef9a29
name: RevengeRAT Mutex Detection
description: The rule detects the creation of specific mutex names associated with RevengeRAT malware. It looks for mutexes named 'RV_MUTEX-<random>', which are known indicators of RevengeRAT activity. This detection focuses on the process creation logs within Windows environments to identify these mutexes.
query: |-
    title: RevengeRAT Mutex Detection
    status: experimental
    description: Detects known mutexes associated with RevengeRAT activity.
    author: '@adhikara13'
    date: 2025/07/12
    references:
      - 'https://www.fortinet.com/blog/threat-research/malware-analysis-revenge-rat-sample'
    tags:
      - 'attack.command_and_control.t1219'
      - 'malware.rat.revengerat'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'RV_MUTEX-<random>'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0011
techniques:
    - T1219
tags:
    - attack.command_and_control.t1219
    - malware.rat.revengerat
author: '@adhikara13'
version: "1"
references:
    - https://www.fortinet.com/blog/threat-research/malware-analysis-revenge-rat-sample
data_sources:
    - process_creation
    - windows
