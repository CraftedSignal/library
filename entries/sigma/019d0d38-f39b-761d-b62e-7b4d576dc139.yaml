id: 019d0d38-f39b-761d-b62e-7b4d576dc139
name: Yuze Reverse Proxy Execution
description: Detects the execution of the open-source Yuze tool via rundll32 to establish a reverse SOCKS5 proxy tunnel. The Warlock ransomware group has been observed using this lightweight C-based tunneling tool to maintain persistent C&C access across multiple ports.
query: |
    title: Yuze Reverse Proxy Execution
    id: 4010b3f5-8672-4896-8c04-420907c681de
    status: experimental
    description: Detects the execution of the open-source Yuze tool via rundll32 to
      establish a reverse SOCKS5 proxy tunnel. The Warlock ransomware group has been
      observed using this lightweight C-based tunneling tool to maintain persistent
      C&C access across multiple ports.
    author: detections.ai
    references:
      - https://www.trendmicro.com/en_us/research/26/c/dissecting-a-warlock-attack.html
    date: 2026-03-20
    tags:
      - attack.command-and-control
      - attack.t1095
    logsource:
      category: process_creation
      product: windows
    detection:
      # Target the execution of the rundll32 process
      selection_img:
        - Image|endswith: '\rundll32.exe'
        - OriginalFileName: 'RUNDLL32.EXE'
      # Match the specific Yuze DLL export function and argument for reverse proxy connections
      selection_cmd:
        CommandLine|contains|all:
          - 'RunYuze'
          - 'reverse'
      # Placeholder to filter out potential false positives if an internal tool uses similar naming
      # filter_fp:
      #   ParentImage|endswith: '\approved_admin_tool.exe'
      condition: selection_img and selection_cmd # and not filter_fp
    falsepositives:
      - Extremely unlikely. False positives would only occur if a legitimate
        application shares the same specific export name (RunYuze) and command-line
        arguments. Tuning may be required if security tools trigger on the command
        line structure.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0005
    - TA0011
techniques:
