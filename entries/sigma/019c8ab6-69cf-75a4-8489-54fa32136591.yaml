id: 019c8ab6-69cf-75a4-8489-54fa32136591
name: Microsoft Office Application Spawning Shell
description: Detects Microsoft Office applications such as Word or Excel spawning a command-line interpreter (cmd.exe or powershell.exe). This behavior is often associated with malicious documents that execute macros to run commands on the victim's system. The MuddyWater group has been observed using this technique in their 'Operation Olalampo' campaign.
query: |
    title: Microsoft Office Application Spawning Shell
    id: 8677be0f-4a01-4cf6-87aa-ff5023a7e5ee
    status: experimental
    description: Detects Microsoft Office applications such as Word or Excel
      spawning a command-line interpreter (cmd.exe or powershell.exe). This behavior
      is often associated with malicious documents that execute macros to run
      commands on the victim's system. The MuddyWater group has been observed using
      this technique in their 'Operation Olalampo' campaign.
    author: Shikha Sangwan
    references:
      - https://thehackernews.com/2026/02/muddywater-targets-mena-organizations.html
      - https://www.group-ib.com/blog/muddywater-operation-olalampo/
    date: 2026-02-23
    tags:
      - attack.t1566.001
      - attack.t1204.002
      - attack.t1059.003
      - attack.t1059.001
      - threat.group.muddywater
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        ParentImage|endswith:
          - '\winword.exe'
          - '\excel.exe'
          - '\powerpnt.exe'
        Image|endswith:
          - '\cmd.exe'
          - '\powershell.exe'
      condition: selection
    falsepositives:
      - Legitimate scripts or add-ins within Office applications may spawn shell
        processes. It's recommended to filter based on command-line arguments or
        parent/child process relationships specific to known benign activity in your
        environment.
    level: medium
query_type: sigma
