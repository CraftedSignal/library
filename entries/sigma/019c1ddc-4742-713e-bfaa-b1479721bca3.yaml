id: 019c1ddc-4742-713e-bfaa-b1479721bca3
name: eScan Supply Chain Attack - Malicious reload.exe with Fake Signature
description: |
    Detects execution or presence of a maliciously replaced eScan component reload.exe distributed via a compromised update server. The malicious binary uses an invalid fake digital signature and replaces the legitimate eScan executable.
query: "title: eScan Supply Chain Attack - Malicious reload.exe with Fake Signature\r\nid: 7f3c2e3a-9c8b-4a6f-9e2a-ec9a9e8b1234\r\nstatus: experimental\r\ndescription: >\r\n  Detects execution or presence of a maliciously replaced eScan component\r\n  reload.exe distributed via a compromised update server. The malicious\r\n  binary uses an invalid fake digital signature and replaces the legitimate\r\n  eScan executable.\r\nauthor: Thaung Htet\r\ndate: 2026-01-22\r\nreferences:\r\n  - https://securelist.com/escan-supply-chain-attack/118688/\r\n  - https://www.securityweek.com/escan-antivirus-delivers-malware-in-supply-chain-attack/\r\n  - https://www.morphisec.com/blog/critical-escan-threat-bulletin/\r\n  - https://www.infosecurity-magazine.com/news/escan-antivirus-breach-delivers/\r\ntags:\r\n  - attack.supply_chain\r\n  - attack.execution\r\n  - attack.t1553\r\n  - malware.escan\r\nlogsource:\r\n  category: process_creation\r\n  product: windows\r\ndetection:\r\n  selection_path:\r\n    Image|endswith: '\\escan\\reload.exe'\r\n    Image|contains:\r\n      - '\\Program Files (x86)\\escan\\'\r\n  selection_cert:\r\n    SignatureStatus: 'Invalid'\r\n    CertificateSerialNumber: '68525dadf70c773d41609ff7ca499fb5'\r\n  condition: selection_path and selection_cert\r\nfalsepositives:\r\n  - Legitimate eScan reload.exe updates with temporary signature issues (unlikely)\r\n  - Corrupted installations unrelated to malicious activity\r\nlevel: high\r\n"
