query: "title: Cl0p Ransomware Associated Domains\r\nid: a81db3e1-ee47-4c68-9058-d71306d1c731\r\nstatus: experimental\r\ndescription: Detects DNS queries for domains known to be associated with Clop\r\n  ransomware command and control (C2) or data leak site operations.\r\nreferences:\r\n  - https://theravenfile.com/2025/11/04/clop-ransomware-dissecting-network/\r\nauthor: detections.ai, Georg Lauenstein\r\ndate: 2025-11-09\r\ntags:\r\n  - attack.command_and_control\r\n  - attack.t1071.001\r\n  - detection.emerging_threats\r\nlogsource:\r\n  category: dns_query\r\n  product: windows\r\ndetection:\r\n  selection:\r\n    # List of domains associated with Clop ransomware operations\r\n    QueryName|endswith:\r\n      - 'pubstorm.com'\r\n      - 'pubstorm.net'\r\n      - 'he1p-me.com'\r\n      - 'cl-leaks.com'\r\n      - 'he1p-center.com'\r\n      - 'goto-pay.com'\r\n      - 'in2pay.com'\r\n  condition: selection\r\nfalsepositives:\r\n  - These domains are highly specific to Clop ransomware. However, a domain\r\n    could expire and be re-registered for legitimate purposes in the future.\r\nlevel: high\r\n"
