id: 019ca0a0-07dd-753a-9fff-7b7e26c89c6e
name: Risen Ransomware Mutex Detection
description: This rule detects the creation of specific mutexes associated with Risen ransomware. It looks for the mutex name 'risen_mutex' during process creation events on Windows systems. The presence of these mutexes indicates potential Risen ransomware activity, which typically involves encrypting files and demanding a ransom.
query: |-
    title: Risen Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Risen ransomware activity.
    author: '@adhikara13'
    date: 2024/07/19
    references:
      - 'https://motasem-notes.net/ranswomare-analysis-reverse-engineering-risen-ransomware-letsdefend-walkthrough/'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.risen'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'risen_mutex'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.risen
author: '@adhikara13'
version: "1"
references:
    - https://motasem-notes.net/ranswomare-analysis-reverse-engineering-risen-ransomware-letsdefend-walkthrough/
data_sources:
    - process_creation
    - windows
