id: 019d2697-df76-7072-bd4a-5ec6b73b6342
name: WinRT Toast Notification API Loaded via PowerShell
description: |
    Detects PowerShell script blocks loading the WinRT ToastNotificationManager API or using the ContentType=WindowsRuntime type accelerator syntax. Used by attackers to programmatically send fake toast notifications impersonating legitimate applications such as Microsoft Edge, Teams, or Windows Security.
query: |
    title: WinRT Toast Notification API Loaded via PowerShell
    id: f4a1b2c3-d4e5-4f67-8901-abcdef123401
    status: experimental
    description: >
        Detects PowerShell script blocks loading the WinRT ToastNotificationManager API or
        using the ContentType=WindowsRuntime type accelerator syntax. Used by attackers to
        programmatically send fake toast notifications impersonating legitimate applications
        such as Microsoft Edge, Teams, or Windows Security.
    references:
        - https://ipurple.team/2026/03/25/toast-notifications/
        - https://brmk.me/2026/03/18/toast-my-way.html
    author: Detection Engineering
    date: 2026/03/25
    modified: 2026/03/25
    tags:
        - attack.execution
        - attack.t1059.001
    logsource:
        category: ps_script
        product: windows
    detection:
        selection:
            ScriptBlockText|contains:
                - 'ToastNotificationManager'
                - 'ContentType=WindowsRuntime'
        condition: selection
    falsepositives:
        - Legitimate enterprise notification frameworks using PowerShell WinRT APIs
        - Internal IT tooling that dispatches toast notifications programmatically
    level: medium
query_type: sigma
severity: medium
tactics:
    - TA0002
techniques:
    - T1059.001
