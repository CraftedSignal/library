id: 019cf834-a250-7413-9819-337eedc07a77
name: BeardShell Execution Guardrail
description: Detects suspicious modules loaded by taskhost.exe or taskhostw.exe, which is a known execution guardrail for the BeardShell implant used by Sednit (APT28).
query: |
    title: BeardShell Execution Guardrail
    id: 353a6c03-db16-4b3d-bb47-cafb1e71c8c7
    status: experimental
    description: 'Detects suspicious modules loaded by taskhost.exe or
      taskhostw.exe, which is a known execution guardrail for the BeardShell implant
      used by Sednit (APT28).'
    author: detections.ai
    references:
      - https://www.welivesecurity.com/en/eset-research/sednit-reloaded-back-trenches/
    date: 2026-03-16
    tags:
      - attack.t1480
      - attack.t1129
      - attack.g0049
    logsource:
      category: image_load
      product: windows
    detection:
      selection_parent:
        # Detects the parent process guardrail for BeardShell
        Image|endswith:
          - '\taskhost.exe'
          - '\taskhostw.exe'
      selection_module:
        # Detects the specific DLL name used by BeardShell
        ImageLoaded|endswith: '\tcpiphlpsvc.dll'
      filter_legit:
        # Exclude the legitimate DLL located in the default system directories to reduce false positives.
        ImageLoaded:
          - 'C:\Windows\System32\tcpiphlpsvc.dll'
          - 'C:\Windows\SysWOW64\tcpiphlpsvc.dll'
      condition: selection_parent and selection_module and not filter_legit
    falsepositives:
      - Legitimate third-party software that uses a DLL with the same name and is
        loaded by taskhost(w).exe from a non-standard directory.
    level: medium
query_type: sigma
severity: medium
tactics:
    - TA0005
    - TA0002
techniques:
