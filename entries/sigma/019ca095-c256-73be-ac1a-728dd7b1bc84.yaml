id: 019ca095-c256-73be-ac1a-728dd7b1bc84
name: Bluesky Ransomware Mutex Detection
description: This rule detects the creation of a specific mutex name, 'Global\EA408C6BF0D12F526F821798C3F54C9A', which is known to be associated with Bluesky ransomware activity. The detection is based on monitoring process creation events for the presence of this unique mutex identifier.
query: |-
    title: Bluesky Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Bluesky ransomware activity.
    author: '@adhikara13'
    date: 2024/07/19
    references:
      - 'https://app.any.run/tasks/d537c305-659f-4ac8-86b5-92f79b951763'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.bluesky'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Global\EA408C6BF0D12F526F821798C3F54C9A'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.bluesky
author: '@adhikara13'
version: "1"
