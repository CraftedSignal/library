id: 019ca09e-07d6-7089-9c9d-d00dcb23c2a0
name: Paradies Clipper Mutex Detection
description: The rule detects the presence of specific mutex names ('7CmLQX') that are known to be associated with the Paradies Clipper malware. This indicates potential activity of the Paradies Clipper malware on the system.
query: |-
    title: Paradies Clipper Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Paradies Clipper activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://perception-point.io/blog/behind-the-attack-paradies-clipper-malware/'
    tags:
      - 'attack.collection.t1115'
      - 'malware.clipper.paradies_clipper'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '7CmLQX'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0009
techniques:
    - T1115
tags:
    - attack.collection.t1115
    - malware.clipper.paradies_clipper
author: '@adhikara13'
version: "1"
references:
    - https://perception-point.io/blog/behind-the-attack-paradies-clipper-malware/
data_sources:
    - process_creation
    - windows
