id: 019ca0bd-18b0-726c-83c5-e8c0f16b5f01
name: Chrysalis Backdoor Mutex Detection
description: This rule detects the creation of processes that utilize specific mutex names associated with the Chrysalis backdoor. The detection is based on the presence of the mutex name 'Global\Jdhfv_1.0.1'. This activity is indicative of the Chrysalis backdoor operating on a system, likely for persistence or to ensure single instance execution.
query: |-
    title: Chrysalis Backdoor Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Chrysalis backdoor activity.
    author: '@adhikara13'
    date: 2026/02/27
    references:
      - 'https://www.rapid7.com/blog/post/tr-chrysalis-backdoor-dive-into-lotus-blossoms-toolkit/'
    tags:
      - 'attack.persistence.t1547'
      - 'malware.backdoor.chrysalis'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Global\Jdhfv_1.0.1'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0003
    - TA0004
techniques:
    - T1547
tags:
    - attack.persistence.t1547
    - malware.backdoor.chrysalis
author: '@adhikara13'
version: "1"
references:
    - https://www.rapid7.com/blog/post/tr-chrysalis-backdoor-dive-into-lotus-blossoms-toolkit/
data_sources:
    - process_creation
    - windows
