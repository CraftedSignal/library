id: 019ca095-d9ae-75bc-9dbc-d3c06c39e41d
name: Borat RAT Mutex Detection
description: This rule detects the creation of processes that utilize specific mutex names associated with the Borat Remote Access Trojan (RAT). The detection is triggered when a process creates a mutex named 'boratratmutex_sa8xofh1budx'. This mutex name is a known indicator of compromise for the Borat RAT, suggesting active malware presence or execution on the system. The rule leverages process creation logs to identify these mutexes.
query: |-
    title: Borat Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Borat activity.
    author: '@adhikara13'
    date: 2024/08/01
    references:
      - 'https://app.any.run/tasks/4dd0d438-f35d-489b-964a-ddf851becea3/'
    tags:
      - 'attack.command_and_control.t1219'
      - 'malware.rat.borat'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'boratratmutex_sa8xofh1budx'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0011
techniques:
    - T1219
tags:
    - attack.command_and_control.t1219
    - malware.rat.borat
author: '@adhikara13'
version: "1"
references:
    - https://app.any.run/tasks/4dd0d438-f35d-489b-964a-ddf851becea3/
data_sources:
    - process_creation
    - windows
