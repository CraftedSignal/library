    author: Daniel Jeremiah
    date: 2026-02-25
    references:
      - https://cloud.google.com/blog/topics/threat-intelligence/new-malware-russia-coldriver
    logsource:
      product: windows
      category: process_creation
    detection:
      selection_reg:
        Image|endswith:
          - '\reg.exe'
        CommandLine|re: '(?i)HKEY_CURRENT_USER\\SOFTWARE\\Classes\\\.pietas.*\s/v\s+ratio\b'
      selection_schtasks:
        Image|endswith:
          - '\schtasks.exe'
        CommandLine|re: '(?i)/Create\b.*\bSystem health check\b.*Python38-64\\pythonw\.exe'
      condition: selection_reg or selection_schtasks
    level: high
    tags:
      - attack.t1112
      - attack.t1053.005
      - attack.t1105
    falsepositives:
      - "Rare: legitimate admin testing that exactly matches published indicators"
