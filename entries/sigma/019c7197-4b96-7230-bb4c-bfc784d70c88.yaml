id: 019c7197-4b96-7230-bb4c-bfc784d70c88
name: Suspicious WebView2 Usage For AI Service C2
description: Detects non-browser processes that spawn the WebView2 process (msedgewebview2.exe) which subsequently makes network connections to known AI platforms like copilot.microsoft.com or grok.com. This behavior is indicative of malware using an embedded browser for covert Command and Control (C2) communications, as described by Check Point Research.
query: |
    title: Suspicious WebView2 Usage For AI Service C2
    id: 7ab0c2fc-b4c2-42ef-8e9b-c51427bce65a
    status: experimental
    description: >-
      Detects non-browser processes that spawn the WebView2 process
      (msedgewebview2.exe) which subsequently makes network connections to known AI
      platforms like copilot.microsoft.com or grok.com. This behavior is indicative
      of malware using an embedded browser for covert Command and Control (C2)
      communications, as described by Check Point Research.
    author: detections.ai
    references:
      - https://research.checkpoint.com/2026/ai-in-the-middle-turning-web-based-ai-services-into-c2-proxies-the-future-of-ai-driven-attacks/
    date: 2026-02-18
    tags:
      - attack.command_and_control
      - attack.t1071.001
      - attack.t1211
    logsource:
      - product: windows
        category: process_creation
      - product: windows
        category: network_connection
    detection:
      # Detects the creation of the WebView2 process
      proc_creation:
        category: process_creation
        Image|endswith: '\msedgewebview2.exe'
      # Filters for legitimate parent processes that commonly use WebView2
      filter_legit_parent:
        category: process_creation
        ParentImage|endswith:
          - '\msedge.exe'
          - '\chrome.exe'
          - '\firefox.exe'
          - '\Teams.exe'
          - '\OUTLOOK.EXE'
      # Detects network connections from WebView2 to specific AI services
      net_connection:
        category: network_connection
        Image|endswith: '\msedgewebview2.exe'
        DestinationHostname:
          - 'copilot.microsoft.com'
          - 'grok.com'
      # The condition requires correlation between the process creation and network connection events for the same process instance within a short timeframe.
      timeframe: 1m
      condition: (proc_creation and not filter_legit_parent) near net_connection
    falsepositives:
      - Legitimate third-party applications that embed WebView2 to interact with AI
        services. The filter list may need to be expanded to include other
        legitimate applications used in your environment (e.g., other Microsoft
        Office applications).
    level: medium
query_type: sigma
severity: medium
tactics:
    - TA0011
    - TA0005
techniques:
    - T1071.001
    - T1211
