id: 019ca0a2-f0ad-7643-b162-51e06a48d24e
name: WhiteSnake Stealer Mutex Detection
description: The rule detects the presence of specific mutex names ('kwnmsgyyay') that are known to be associated with the WhiteSnake stealer malware. This detection is based on monitoring process creation events for these particular mutexes.
query: |-
    title: WhiteSnake Stealer Mutex Detection
    status: experimental
    description: Detects known mutexes associated with WhiteSnake stealer activity.
    author: '@adhikara13'
    date: 2025/01/22
    references:
      - 'https://cyble.com/blog/new-whitesnake-stealer-offered-for-sale-via-maas-model/'
    tags:
      - 'attack.credential_access.t1555'
      - 'malware.stealer.whitesnake'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'kwnmsgyyay'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0006
techniques:
    - T1555
tags:
    - attack.credential_access.t1555
    - malware.stealer.whitesnake
author: '@adhikara13'
version: "1"
references:
    - https://cyble.com/blog/new-whitesnake-stealer-offered-for-sale-via-maas-model/
data_sources:
    - process_creation
    - windows
