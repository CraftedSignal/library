id: 019ca097-3803-763a-8af6-fbeac8909916
name: Crypt0r Ransomware Mutex Detection
description: This rule detects the creation of specific mutexes known to be associated with Crypt0r ransomware. The detection is based on the presence of the mutex name 'crypt0r-mutex'. The rule leverages process creation logs to identify these mutexes, indicating potential Crypt0r ransomware activity on a Windows system.
query: |-
    title: Crypt0r Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Crypt0r ransomware activity.
    author: '@adhikara13'
    date: 2025/07/13
    references:
      - 'https://id-ransomware.blogspot.com/2019/01/crypt0r-ransomware_10.html'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.crypt0r'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'crypt0r-mutex'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.crypt0r
author: '@adhikara13'
version: "1"
references:
    - https://id-ransomware.blogspot.com/2019/01/crypt0r-ransomware_10.html
data_sources:
    - process_creation
    - windows
