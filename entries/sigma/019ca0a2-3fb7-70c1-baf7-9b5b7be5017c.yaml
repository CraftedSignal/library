id: 019ca0a2-3fb7-70c1-baf7-9b5b7be5017c
name: Trojanized Plink Backdoor Mutex Detection
description: The rule detects the creation of specific mutexes associated with Trojanized Plink backdoor activity. Specifically, it looks for a mutex named 'Global\WindowsSvchost'. The detection is based on process creation events where this mutex name is observed.
query: |-
    title: Trojanized Plink Backdoor Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Trojanized Plink backdoor activity.
    author: '@adhikara13'
    date: 2024/07/19
    references:
      - 'https://blog.talosintelligence.com/lazarus-collectionrat/'
    tags:
      - 'attack.persistence.t1547'
      - 'malware.backdoor.trojanized_plink'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Global\WindowsSvchost'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0003
    - TA0004
techniques:
    - T1547
tags:
    - attack.persistence.t1547
    - malware.backdoor.trojanized_plink
author: '@adhikara13'
version: "1"
references:
    - https://blog.talosintelligence.com/lazarus-collectionrat/
data_sources:
    - process_creation
    - windows
