id: 019ca095-6dfd-73ad-b3c2-af1141600fc8
name: Blackmoon Botnet Mutex Detection
description: This rule detects the creation of specific mutex names ('kongxin1123') which are known to be associated with the Blackmoon botnet. The detection is based on monitoring process creation events on Windows systems for these particular mutexes, indicating potential Blackmoon botnet activity.
query: |-
    title: Blackmoon Botnet Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Blackmoon botnet activity.
    author: '@adhikara13'
    date: 2024/08/01
    references:
      - 'https://www.secrss.com/articles/40299'
    tags:
      - 'attack.command_and_control.t1071'
      - 'malware.botnet.blackmoon'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'kongxin1123'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0011
techniques:
    - T1071
tags:
    - attack.command_and_control.t1071
    - malware.botnet.blackmoon
author: '@adhikara13'
version: "1"
references:
    - https://www.secrss.com/articles/40299
data_sources:
    - process_creation
    - windows
