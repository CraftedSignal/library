id: 019ca097-24d5-705f-82af-ccf34fab71db
name: Conti Ransomware Mutex Detection
description: This rule detects the creation of specific mutexes known to be associated with Conti ransomware activity. The rule looks for the exact mutex names 'kjsidugidf99439' or 'hsfjuukjzloqu28oajh727190'. Detection of these mutexes indicates a high probability of Conti ransomware execution on a Windows system.
query: |-
    title: Conti Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Conti ransomware activity.
    author: '@adhikara13'
    date: 2024/07/19
    references:
      - 'https://www.trendmicro.com/vinfo/us/threat-encyclopedia/malware/ransom.win32.conti.fajl'
      - 'https://cyble.com/blog/new-ransomware-strains-emerging-from-leaked-contis-source-code/'
      - 'https://vipre.com/blog/how-conti-ransomware-works-plus-analysis'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.conti'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'kjsidugidf99439'
          - 'hsfjuukjzloqu28oajh727190'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.conti
author: '@adhikara13'
version: "1"
references:
    - https://www.trendmicro.com/vinfo/us/threat-encyclopedia/malware/ransom.win32.conti.fajl
    - https://cyble.com/blog/new-ransomware-strains-emerging-from-leaked-contis-source-code/
    - https://vipre.com/blog/how-conti-ransomware-works-plus-analysis
data_sources:
    - process_creation
    - windows
