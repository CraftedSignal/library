id: 019ca0a1-c609-715f-adfc-ad155abe5d2b
name: TeslaCrypt Ransomware Mutex Detection
description: 'This rule detects the creation of specific mutex names associated with TeslaCrypt ransomware activity. The detection is based on a static list of known mutex strings: ''8765-123rvr4'', ''2134-1234-1324-2134-1324-2134'', ''System1230123'', ''dslhufdks3'', and ''9_9_9_9''. The rule triggers when any of these mutex names are observed, indicating potential TeslaCrypt infection or execution.'
query: |-
    title: TeslaCrypt Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with TeslaCrypt ransomware activity.
    author: '@adhikara13'
    date: 2024/08/01
    references:
      - 'https://blog.checkpoint.com/wp-content/uploads/2016/05/Tesla-crypt-whitepaper_V3.pdf'
      - 'https://www.mcafee.com/blogs/other-blogs/mcafee-labs/new-teslacrypt-ransomware-arrives-via-spam/'
      - 'https://www.secureworks.com/research/teslacrypt-ransomware-threat-analysis'
      - 'https://www.microsoft.com/en-us/wdsi/threats/malware-encyclopedia-description?Name=Ransom:Win32/Tescrypt.R'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.teslacrypt'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '8765-123rvr4'
          - '2134-1234-1324-2134-1324-2134'
          - 'System1230123'
          - 'dslhufdks3'
          - '9_9_9_9'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
