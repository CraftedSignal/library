id: 90fb5e57-2449-4c0f-b288-a1fb6d39d81e
name: FIDO Key AiTM Bypass via Cross-Device Sign-In
description: Detects successful user authentication using the FIDO2/WebAuthn cross-device (hybrid) sign-in feature. This technique can be abused by attackers in Adversary-in-the-Middle (AiTM) phishing campaigns to bypass FIDO key protections, as seen in the PoisonSeed campaign.
query: |
    title: FIDO Key AiTM Bypass via Cross-Device Sign-In
    id: f51666f8-7c7b-49ec-8404-8c7a6b20099f
    status: experimental
    description: Detects successful user authentication using the FIDO2/WebAuthn cross-device (hybrid) sign-in feature. This technique can be abused by attackers in Adversary-in-the-Middle (AiTM) phishing campaigns to bypass FIDO key protections, as seen in the PoisonSeed campaign.
    references:
      - https://expel.com/blog/poisonseed-bypassing-fido-keys-to-fetch-user-accounts/
    author: detections.ai
    date: 2025-07-18
    tags:
      - attack.t1566.002
      - attack.t1550.002
      - attack.credential_access
    logsource:
      product: okta
      service: okta
    detection:
      selection:
            # Corresponds to a successful user login event
        eventType: 'user.authentication.sso'
        outcome.result: 'SUCCESS'
            # Specifies the authentication was via a FIDO2/WebAuthn credential
        authenticationContext.credentialType: 'FIDO2(WebAuthn)'
            # The key part: indicates the use of the cross-device (hybrid) sign-in feature
        debugContext.debugData.authenticators.transport: 'hybrid'
      condition: selection
    falsepositives:
      - Legitimate use of the cross-device sign-in feature is expected. This detection should be used to alert security teams to this type of authentication so it can be correlated with other signals, such as unusual geolocation, time of day, or preceding phishing alerts. If this feature is disabled by policy, any alert should be treated as high-fidelity.
    level: medium
query_type: sigma
severity: medium
