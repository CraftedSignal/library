id: 019ca094-bdac-74bf-aef4-71744b309052
name: BazarLoader Mutex Detection
description: 'This rule detects the presence of specific mutex names that are known to be associated with BazarLoader malware activity. The rule looks for two distinct mutex names: ''{b837ef4f-10ee-4821-ac76-2331eb32a23f}'' and ''{0caa6ebb-cf78-4b01-9b0b-51032c9120ce}''. The detection is triggered when a process creates or attempts to create a mutex with either of these names. This activity is indicative of BazarLoader execution on a Windows system.'
query: |-
    title: BazarLoader Mutex Detection
    status: experimental
    description: Detects known mutexes associated with BazarLoader activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://www.0ffset.net/reverse-engineering/analysing-the-main-bazarloader/'
    tags:
      - 'attack.execution.t1204'
      - 'malware.loader.bazarloader'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '{b837ef4f-10ee-4821-ac76-2331eb32a23f}'
          - '{0caa6ebb-cf78-4b01-9b0b-51032c9120ce}'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0002
techniques:
    - T1204
tags:
    - attack.execution.t1204
    - malware.loader.bazarloader
author: '@adhikara13'
version: "1"
references:
    - https://www.0ffset.net/reverse-engineering/analysing-the-main-bazarloader/
data_sources:
    - process_creation
    - windows
