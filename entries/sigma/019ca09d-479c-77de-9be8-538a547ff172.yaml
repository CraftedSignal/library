id: 019ca09d-479c-77de-9be8-538a547ff172
name: NailaoLocker Ransomware Mutex Detection
description: The rule detects the creation of specific mutexes associated with the NailaoLocker ransomware. It looks for the mutex name 'Global\lockv7'. This activity is indicative of the NailaoLocker ransomware executing on a system.
query: |-
    title: NailaoLocker Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with NailaoLocker ransomware activity.
    author: '@adhikara13'
    date: 2025/07/12
    references:
      - 'https://www.orangecyberdefense.com/global/blog/cert-news/meet-nailaolocker-a-ransomware-distributed-in-europe-by-shadowpad-and-plugx-backdoors'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.nailaolocker'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Global\lockv7'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.nailaolocker
author: '@adhikara13'
version: "1"
references:
    - https://www.orangecyberdefense.com/global/blog/cert-news/meet-nailaolocker-a-ransomware-distributed-in-europe-by-shadowpad-and-plugx-backdoors
data_sources:
    - process_creation
    - windows
