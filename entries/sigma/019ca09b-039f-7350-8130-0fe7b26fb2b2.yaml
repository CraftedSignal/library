id: 019ca09b-039f-7350-8130-0fe7b26fb2b2
name: HijackLoader Mutex Detection
description: The rule detects the creation of processes that utilize specific mutex names ('BOGLVGAU') known to be associated with HijackLoader malware activity. This detection is based on monitoring process creation events and checking for the presence of these unique mutex names.
query: |-
    title: HijackLoader Mutex Detection
    status: experimental
    description: Detects known mutexes associated with HijackLoader activity.
    author: '@adhikara13'
    date: 2025/07/16
    references:
      - 'https://app.any.run/tasks/7a48176e-b683-4472-98fd-b824935db29f'
    tags:
      - 'attack.execution.t1204'
      - 'malware.loader.hijackloader'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'BOGLVGAU'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0002
techniques:
    - T1204
tags:
    - attack.execution.t1204
    - malware.loader.hijackloader
author: '@adhikara13'
version: "1"
references:
    - https://app.any.run/tasks/7a48176e-b683-4472-98fd-b824935db29f
data_sources:
    - process_creation
    - windows
