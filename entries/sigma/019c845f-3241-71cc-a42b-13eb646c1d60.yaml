id: 019c845f-3241-71cc-a42b-13eb646c1d60
name: Attachment Interaction Detection
description: |
    This KQL script detects if end user interacted with an  attachment in a potential phishing/BEC incident.
query: "---\ntitle: Attachment Interaction Detection\nauthor: Igor Oliveira (Pr0fiLeRR)\nid: ccfc04b4-f6ad-459f-b332-bef83c7bc725\nreferences:\n  - https://sigmahq.io/sigma-specification/specification/sigma-rules-specification.html\n  - https://detections.ai/rules/019bdfb2-48f4-7028-8abc-90875258a4e8\ndescription: >\n  This KQL script detects if end user interacted with an \n  attachment in a potential phishing/BEC incident.\nstatus: stable\ntags:\n  - attack.t1566.001\ndate: 2026-02-21\nlogsource:\n  product: windows\n  category: email\ndetection:\n  selection_main:\n    filename|endswith:\n      # This can be any extension or a suspicious extension that shouldn't be sent by email on traditional business communication.\n      - '.pdf'\n    actiontype: 'FileCreated'\n    initiatingprocessfilename: 'outlook.exe'\n  selection_domain:\n    senderfromdomain: 'senderdomain.tld'\n    recipientdomain: 'recipientdomain.tld'\n  filter:\n    senderfromdomain: 'recipientdomain.tld'\n  condition: selection_main and selection_domain and not filter\nfields:\n  - FileName\n  - EmailAttachmentInfo\n  - ActionType\n  - InitiatingProcessFileName\n  - DeviceName\n  - RequestAccountName\n  - SenderFromAddress\n  - RecipientEmailAddress\n  - EmailDetails\nfalsepositives:\n  - Upon investigation, it was discovered that email was intentionally sent by\n    this legitimate sender, which turned out not to be a malicious message\nlevel: medium # based on impact, likelyhood, detection confidence, and environment sensitivity\n..."
query_type: sigma
severity: medium
techniques:
    - T1566.001
tags:
    - attack.t1566.001
author: Igor Oliveira (Pr0fiLeRR)
version: "6"
references:
    - https://sigmahq.io/sigma-specification/specification/sigma-rules-specification.html
    - https://detections.ai/rules/019bdfb2-48f4-7028-8abc-90875258a4e8
data_sources:
    - email
    - windows
