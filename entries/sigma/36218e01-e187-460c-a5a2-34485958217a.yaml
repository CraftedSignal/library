id: 36218e01-e187-460c-a5a2-34485958217a
name: Malicious PyPI Package Deepseek Campaign Activity
description: Detects process execution or network connections related to the malicious PyPI packages 'deepseeek' and 'deepseekai', which steal environment variables and send them to a Pipedream C2.
query: "title: Malicious PyPI Package Deepseek Campaign Activity\nid: 57121047-1234-4567-8901-abcdefghijkl \ndescription: Detects process execution or network connections related to the malicious PyPI packages 'deepseeek' and 'deepseekai', which steal environment variables and send them to a Pipedream C2.\nauthor: Aaron Mog\ndate: 2025/05/06\nreferences:\n    - https://www.ptsecurity.com/ww-en/analytics/esc-threat-intelligence/malicious-packages-deepseeek-and-deepseekai-published-in-python-package-index/\nlogsource:\n    category: process_creation\n    product: windows\ndetection:\n    selection_process:\n        Image|endswith:\n            - '\\python.exe'\n            - '\\pythonw.exe'\n            - '\\python3.exe'\n            - '\\python3w.exe'\n        CommandLine|contains:\n            - ' deepseeek'\n            - ' deepseekai'\n    selection_network:\n        category: network_connection\n        product: windows\n        Initiated: 'true'\n        DestinationHostname: 'eoyyiyqubj7mquj.m.pipedream.net'\n    condition: 1 of selection_*\nfalsepositives:\n    - Legitimate use of Python executing commands with similar names (unlikely for these specific names).\n    - Network traffic to pipedream.net for legitimate purposes (check specific hostname).\nlevel: high\ntags:\n    - attack.command_and_control\n    - attack.t1102.001 # Web Service\n    - attack.t1598.003 # Supply Chain Compromise: Compromise Software Supply Chain\n    - supply_chain\n    - pypi\n    - deepseek\nioc:\n    - deepseeek # PyPI package name\n    - deepseekai # PyPI package name\n    - eoyyiyqubj7mquj.m.pipedream.net # C2 hostname"
query_type: sigma
severity: medium
tags:
    - attack.command_and_control
    - attack.t1102.001
    - attack.t1598.003
    - supply_chain
    - pypi
    - deepseek
author: Aaron Mog
version: "1"
