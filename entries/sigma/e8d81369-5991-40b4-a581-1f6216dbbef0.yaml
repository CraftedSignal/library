id: e8d81369-5991-40b4-a581-1f6216dbbef0
name: RondoDox Botnet Activity Detection Query with IOC Hunting
description: 'Detects host-based and network activity associated with the RondoDox botnet, including defense evasion, system sabotage, persistence, and known IOCs. '
query: |
    title: "RondoDox Botnet Activity Detection Query with IOC Hunting"
    id: e13b315f-2dba-48a8-bf1a-9c4932bfbb21
    status: experimental
    description: "Detects host-based and network activity associated with the
      RondoDox botnet, including defense evasion, system sabotage, persistence, and
      known IOCs. "
    references:
      - https://www.fortinet.com/blog/threat-research/rondobox-unveiled-breaking-down-a-botnet-threat
    author: Chaitanya B (Mr.Alien)
    date: 2025-07-10
    tags:
      - attack.defense_evasion
      - attack.persistence
      - attack.impact
      - attack.t1562
      - attack.t1543.002
      - attack.t1485
      - malware.rondodox
    logsource:
      - category: process_creation
        product: linux
      - category: network_connection
        product: linux
    detection:
      selection_trap:
        # Detects the downloader script disabling common signals to evade interruption
        CommandLine|contains|all:
          - 'trap'
          - 'SIGTTOU'
          - 'SIGTTIN'
          - 'SIGTSTP'
          - 'SIGHUP'
          - 'SIGPIPE'
          - 'SIGINT'
          - 'SIGQUIT'
          - 'SIGTERM'
      selection_sabotage:
        # Detects renaming of critical system binaries to disrupt system functions
        Image|endswith:
          - '/mv'
          - '/rename'
        CommandLine|contains:
          - '/iptables'
          - '/ufw'
          - '/passwd'
          - '/chpasswd'
          - '/shutdown'
          - '/poweroff'
          - '/halt'
          - '/reboot'
      selection_persistence:
        # Detects creation of the persistence symlink in rc.d directories
        Image|endswith: '/ln'
        CommandLine|contains|all:
          - '-s'
          - '/etc/init.d/rondo'
          - '/etc/rc3.d/S99rondo'
      selection_hash:
        # Detects known RondoDox malware hashes
        sha256:
