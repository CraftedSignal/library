query: |-
    title: Canary Network Share Reconnaissance
    id: beb67092-31fa-4098-b7e9-042900a3706b
    status: experimental
    description: "Detects access to hidden or decoy network shares that are not used by legitimate processes. This activity is indicative of network reconnaissance and lateral movement attempts. Walkthrough of Canary Shares can be found here: https://github.com/fluffybunnies-h4x/CyberDeception/blob/main/README.md#canary-shares"
    references:
      - https://github.com/fluffybunnies-h4x/CyberDeception
      - https://www.sans.org/white-papers/41
      - https://bloodhound.readthedocs.io/
      - https://canarytokens.org/
    author: detections.ai
    date: 2026-02-02
    tags:
      - attack.discovery
      - attack.lateral_movement
      - attack.t1135
    logsource:
      product: windows
      service: security
      category: file_access
    detection:
      selection:
        EventID: 5145
        ShareName|endswith:
          - '\IT_Admin$'
          - '\Backup_Archive$'
          - '\HR_Confidential$'
          - '\Finance_Reports$'
          - '\Executive_Data$'
          - '\Password_Vault$'
          - '\Domain_Backup$'
      condition: selection
    falsepositives:
      - False positives should be extremely rare as these shares have no legitimate purpose.
      - Accidental access by a legitimate user is possible but should be investigated.
      - Ensure the share names in the detection logic are exclusively used for canary assets.
    level: high
