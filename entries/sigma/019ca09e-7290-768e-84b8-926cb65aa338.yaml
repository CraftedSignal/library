id: 019ca09e-7290-768e-84b8-926cb65aa338
name: Phobos Ransomware Mutex Detection
description: 'This rule detects the creation of specific mutexes known to be associated with Phobos ransomware activity. The rule looks for two distinct mutex names: ''Global\u003c\u003cBID\u003e\u003e300AF62D00000001'' and ''Global\u003c\u003cBID\u003e\u003eC4BA364700000001''. The presence of either of these mutexes indicates potential Phobos ransomware infection or execution on a Windows system.'
query: |-
    title: Phobos Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Phobos ransomware activity.
    author: '@adhikara13'
    date: 2025/07/05
    references:
      - 'https://tria.ge/250705-gy63gstydt/behavioral2/analog?&main_event=Mutex'
      - 'https://app.any.run/tasks/4145f893-dccf-4f5c-964d-634b2951365c/'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.phobos'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Global\<<BID>>300AF62D00000001'
          - 'Global\<<BID>>C4BA364700000001'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.phobos
author: '@adhikara13'
version: "1"
references:
