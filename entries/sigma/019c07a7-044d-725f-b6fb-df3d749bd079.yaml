id: 019c07a7-044d-725f-b6fb-df3d749bd079
name: CVE-2026-21509 - Office Application Network Connection to Suspicious Destination
description: |
    Detects network connections initiated by Microsoft Office applications that may indicate CVE-2026-21509 exploitation. The Shell.Explorer.1 embedded browser component can establish outbound connections to attacker-controlled servers without user awareness. This rule monitors for Office processes making HTTP/HTTPS connections, especially to non-Microsoft and non-CDN destinations.
query: |
    title: CVE-2026-21509 - Office Application Network Connection to Suspicious Destination
    id: 3e4f5a6b-7c8d-9e0f-1a2b-3c4d5e6f7a8b
    status: experimental
    description: >
      Detects network connections initiated by Microsoft Office applications that
      may indicate CVE-2026-21509 exploitation. The Shell.Explorer.1 embedded
      browser component can establish outbound connections to attacker-controlled
      servers without user awareness. This rule monitors for Office processes making
      HTTP/HTTPS connections, especially to non-Microsoft and non-CDN destinations.
    references:
      - https://msrc.microsoft.com/update-guide/vulnerability/CVE-2026-21509
      - https://www.365iwebdesign.co.uk/news/2026/01/28/microsoft-office-zero-day-cve-2026-21509/
    author: tim@detections.ai
    date: 2026-01-28T00:00:00.000Z
    modified: 2026-01-28T00:00:00.000Z
    tags:
      - attack.command_and_control
      - attack.t1071.001
      - attack.t1105
      - cve.2026-21509
    logsource:
      category: network_connection
      product: windows
      service: sysmon
    detection:
      selection_office:
        Image|endswith:
          - '\WINWORD.EXE'
          - '\EXCEL.EXE'
          - '\POWERPNT.EXE'
          - '\MSPUB.EXE'
      selection_outbound:
        Initiated: 'true'
        DestinationPort:
          - 80
          - 443
          - 8080
          - 8443
      filter_microsoft:
        DestinationHostname|endswith:
          - '.microsoft.com'
          - '.office.com'
          - '.office365.com'
          - '.windows.net'
          - '.microsoftonline.com'
          - '.live.com'
          - '.msn.com'
          - '.sharepoint.com'
          - '.akamai.net'
          - '.akamaized.net'
          - '.cloudflare.com'
      condition: selection_office and selection_outbound and not filter_microsoft
    falsepositives:
      - Legitimate Office web queries
      - Documents with embedded web content from trusted sources
      - OneDrive/SharePoint sync operations
    level: medium
    associated_cves:
      - CVE-2026-21509
query_type: sigma
severity: medium
