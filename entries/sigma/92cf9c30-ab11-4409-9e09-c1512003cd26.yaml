name: Suspicious mshta.exe Execution from cmd.exe
description: Detects suspicious execution of mshta.exe from cmd.exe with embedded JavaScript and registry modifications.
query: "title: Suspicious mshta.exe Execution from cmd.exe\r\nid: e1d3b5c4-8a8d-4d39-bf6c-5678f3e47abc\r\nstatus: experimental\r\ndescription: Detects suspicious execution of mshta.exe from cmd.exe with embedded JavaScript and registry modifications.\r\nauthor: Thaung Htet\r\ndate: 2025-02-07\r\nreferences:\r\n    - https://attack.mitre.org/techniques/T1218/005/\r\n    - https://redcanary.com/threat-detection-report/techniques/mshta/\r\ntags:\r\n    - attack.defense-evasion\r\n    - attack.execution\r\n    - attack.persistence\r\n    - attack.t1218.005\r\nlogsource:\r\n    category: process_creation\r\n    product: windows\r\ndetection:\r\n    selection:\r\n        ParentImage|endswith: '\\cmd.exe'\r\n        Image|endswith: '\\mshta.exe'\r\n        CommandLine|contains:\r\n            - 'javascript:'\r\n            - 'ActiveXObject'\r\n            - 'WScript.Shell'\r\n            - 'RegRead'\r\n            - 'HKCU\\\\software'\r\n    condition: selection\r\nfalsepositives:\r\n    - Legitimate administrative scripts using mshta.exe\r\nlevel: high"
