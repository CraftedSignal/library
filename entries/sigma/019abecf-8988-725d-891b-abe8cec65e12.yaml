id: 019abecf-8988-725d-891b-abe8cec65e12
name: FlexibleFerret Payload Extraction Detection
description: Detects extraction of FlexibleFerret malware payload archive to the CDrivers directory on macOS systems.
query: |+
    ---
    title: FlexibleFerret Archive Extraction to CDrivers Directory
    id: a1b2c3d4-3333-4e5f-8a9b-0c1d2e3f4a5b
    status: experimental
    description: Detects extraction of FlexibleFerret payload archive to the CDrivers directory
    author: Claude Opus 4.5
    date: 2025/11/26
    references:
        - https://www.jamf.com/blog/flexibleferret-malware-continues-to-adapt/
    tags:
        - attack.execution
        - attack.t1059.004
        - attack.defense_evasion
        - attack.t1140
    logsource:
        category: process_creation
        product: macos
    detection:
        selection_unzip:
            Image|endswith:
                - '/unzip'
                - '/tar'
                - '/ditto'
        selection_payload:
            CommandLine|contains:
                - 'CDrivers.zip'
                - '/var/tmp/CDrivers'
        condition: selection_unzip and selection_payload
    falsepositives:
        - Unlikely in normal operations
    level: critical

query_type: sigma
severity: critical
tactics:
    - TA0002
    - TA0005
techniques:
    - T1059.004
    - T1140
tags:
    - attack.execution
    - attack.t1059.004
    - attack.defense_evasion
    - attack.t1140
author: Claude Opus 4.5
version: "1"
