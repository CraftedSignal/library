id: 019b9e54-40b0-7198-a7ef-6da4401c8b84
name: Windows Sandbox Execution by Non-Interactive Account
description: Detects Windows Sandbox launched by non-interactive accounts such as SYSTEM or service accounts, indicating automated malicious execution.
query: |
    title: Windows Sandbox Execution by Non-Interactive Account
    id: b085de10-8d83-467c-818d-2d5a2e503df4
    status: test
    description: >-
      Detects Windows Sandbox launched by non-interactive accounts such as SYSTEM or
      service accounts, indicating automated malicious execution.
    references:
      - https://attack.mitre.org/techniques/T1564/
    author: SimSpace
    date: 2026-01-01T00:00:00.000Z
    tags:
      - attack.defense-evasion
      - attack.t1564
    logsource:
      category: process_creation
      product: windows
      service: security
    detection:
      selection_image:
        ParentImage|endswith: \WindowsSandbox.exe
      selection_user:
        User|contains:
          - SYSTEM
          - LOCAL SERVICE
          - NETWORK SERVICE
      condition: selection_image and selection_user
    falsepositives:
      - None currently known.
    level: high
