id: 019ca0a0-4002-7058-afcf-df35c0a08dc0
name: RUDEBIRD Backdoor Mutex Detection
description: The rule detects the creation of a process that utilizes specific mutex names ('VV.0') known to be associated with the RUDEBIRD backdoor. This indicates potential RUDEBIRD backdoor activity on the system.
query: |-
    title: RUDEBIRD Backdoor Mutex Detection
    status: experimental
    description: Detects known mutexes associated with RUDEBIRD backdoor activity.
    author: '@adhikara13'
    date: 2024/07/19
    references:
      - 'https://www.elastic.co/de/security-labs/introducing-the-ref5961-intrusion-set'
    tags:
      - 'attack.persistence.t1547'
      - 'malware.backdoor.rudebird'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'VV.0'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0003
    - TA0004
techniques:
    - T1547
tags:
    - attack.persistence.t1547
    - malware.backdoor.rudebird
author: '@adhikara13'
version: "1"
references:
    - https://www.elastic.co/de/security-labs/introducing-the-ref5961-intrusion-set
data_sources:
    - process_creation
    - windows
