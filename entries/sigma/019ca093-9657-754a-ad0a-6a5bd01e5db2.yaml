id: 019ca093-9657-754a-ad0a-6a5bd01e5db2
name: Allcome Clipper Mutex Detection
description: The rule detects the creation of processes that utilize specific mutex names associated with the Allcome clipper malware. Specifically, it looks for the mutex name '08841d-18c7-4e2d-f7e29d'. This indicates potential Allcome clipper activity on a Windows system.
query: |-
    title: Allcome Clipper Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Allcome clipper activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://www.gdatasoftware.com/blog/2022/02/37239-allcome-clipbanker-is-a-newcomer-in-malware-underground-forums'
    tags:
      - 'attack.collection.t1115'
      - 'malware.clipper.allcome'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '08841d-18c7-4e2d-f7e29d'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0009
techniques:
    - T1115
tags:
    - attack.collection.t1115
    - malware.clipper.allcome
author: '@adhikara13'
version: "1"
references:
    - https://www.gdatasoftware.com/blog/2022/02/37239-allcome-clipbanker-is-a-newcomer-in-malware-underground-forums
data_sources:
    - process_creation
    - windows
