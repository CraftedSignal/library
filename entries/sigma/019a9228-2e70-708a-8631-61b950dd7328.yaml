id: 019a9228-2e70-708a-8631-61b950dd7328
name: DigitStealer DMG with Malicious MSI Dropper
description: Detects the creation of malicious disk images (.dmg) or a dropper file (.msi) associated with the DigitStealer macOS infostealer campaign.
query: |
    title: DigitStealer DMG with Malicious MSI Dropper
    id: 3c5dc88c-4bb7-4548-8e36-b53d981b9018
    status: experimental
    description: Detects the creation of malicious disk images (.dmg) or a dropper
      file (.msi) associated with the DigitStealer macOS infostealer campaign.
    references:
      - https://www.jamf.com/blog/jtl-digitstealer-macos-infostealer-analysis/
    author: detections.ai
    date: 2025-11-17
    tags:
      - attack.initial_access
      - attack.t1566.002
      - attack.execution
      - attack.t1204.002
    logsource:
      product: macos
      category: file_creation
    detection:
      selection:
        # Detects specific filenames used in the DigitStealer campaign
        TargetFilename|endswith:
          - 'Drag Into Terminal.msi' # Highly anomalous .msi file on macOS, used as a dropper
          - 'DynamicLake.dmg'
          - 'GoogleDriver.dmg'
      condition: selection
    falsepositives:
      - These filenames are specific to this malware campaign. Future variants may
        use different names.
    level: high
query_type: sigma
severity: high
