id: 019ba4b6-b6e0-75a6-a729-c4f5063b9b85
name: Rust Reqwest Library Default User-Agent
description: Detects outbound network traffic with a User-Agent header indicating the use of the Rust 'reqwest' HTTP client library. This User-Agent is used by the RustyWater implant, associated with the MuddyWater APT group, for command and control (C2) communications.
query: |
    title: Rust Reqwest Library Default User-Agent
    id: 31c3291e-28e9-455b-8a73-0339d1c8bd33
    status: experimental
    description: Detects outbound network traffic with a User-Agent header
      indicating the use of the Rust 'reqwest' HTTP client library. This User-Agent
      is used by the RustyWater implant, associated with the MuddyWater APT group,
      for command and control (C2) communications.
    references:
      - https://www.cloudsek.com/blog/reborn-in-rust-muddywater-evolves-tooling-with-rustywater-implant#executive-summary
    author: tim@detections.ai
    date: 2026-01-09
    tags:
      - attack.command_and_control
      - attack.t1071.001
      - attack.g0069
    logsource:
      category: proxy
      product: any
    detection:
      selection:
        # The RustyWater implant uses the default User-Agent of the Rust 'reqwest' library for C2.
        c-user-agent|startswith: 'reqwest/'
      condition: selection
    falsepositives:
      - Legitimate applications developed in Rust may also use the 'reqwest' library
        for HTTP requests. Correlate with other suspicious indicators or create
        exceptions for known good software.
    level: medium
