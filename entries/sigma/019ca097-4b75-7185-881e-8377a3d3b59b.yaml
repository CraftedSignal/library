id: 019ca097-4b75-7185-881e-8377a3d3b59b
name: CryptoFortress Ransomware Mutex Detection
description: The rule detects the creation of specific mutex names ('Catawba!') which are known to be associated with CryptoFortress ransomware activity. This detection is based on monitoring process creation events on Windows systems and checking for the presence of these particular mutex names.
query: |-
    title: CryptoFortress Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with CryptoFortress ransomware activity.
    author: '@adhikara13'
    date: 2025/07/16
    references:
      - 'https://app.any.run/tasks/bda9ff74-d070-4c46-be17-add51e71fe21/'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.cryptofortress'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Catawba!'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.cryptofortress
author: '@adhikara13'
version: "1"
references:
    - https://app.any.run/tasks/bda9ff74-d070-4c46-be17-add51e71fe21/
data_sources:
    - process_creation
    - windows
