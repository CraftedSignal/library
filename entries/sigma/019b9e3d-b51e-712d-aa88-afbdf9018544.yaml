id: 019b9e3d-b51e-712d-aa88-afbdf9018544
name: DNS Query to Typosquatted AWS Domain
description: Detects DNS queries to domains using common AWS typosquatting patterns such as 'awscloud', 'compute-aws', or billing/security lures.
query: |
    title: DNS Query to Typosquatted AWS Domain
    id: 41f7ced0-1a19-460f-811b-20c64077941a
    status: test
    description:
      Detects DNS queries to domains using common AWS typosquatting patterns such as
      'awscloud', 'compute-aws', or billing/security lures.
    references:
      - https://attack.mitre.org/techniques/T1583/001/
    author: SimSpace
    date: 2026-01-01
    tags:
      - attack.initial-access
      - attack.t1566.002
    logsource:
      category: dns
      product: windows
    detection:
      selection:
        QueryName|contains:
          - awscloud
          - compute-aws
          - aws-compute
          - amazo0aws
          - ec2-bill
          - s3-bucket
          - aws-bill
          - aws-invoice
          - aws-security
          - aws-verify
          - aws-login
          - amazon-bill
      filter:
        QueryName|endswith:
          - .awscloud.com
          - .awscloud.com.
          - .amazonaws.com
          - .aws.amazon.com
          - .amazonaws.com.
      condition: selection and not filter
    level: high
query_type: sigma
severity: medium
tactics:
    - TA0001
    - TA0042
techniques:
    - T1583.001
    - T1566.002
tags:
    - attack.initial-access
    - attack.t1566.002
author: SimSpace
version: "2"
references:
    - https://attack.mitre.org/techniques/T1583/001/
data_sources:
    - dns
    - windows
