id: 019ca0a1-86af-70fe-818b-db3701d68960
name: Suncrypt Ransomware Mutex Detection
description: This rule detects the creation of specific mutex names associated with Suncrypt ransomware. The detection is based on a direct match of known, unique mutex strings, indicating the presence or activity of Suncrypt ransomware on a Windows system.
query: |-
    title: Suncrypt Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Suncrypt ransomware activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://www.pico-t.co.jp/product/minerva-tpp/suncrypt%E3%83%A9%E3%83%B3%E3%82%B5%E3%83%A0%E3%82%A6%E3%82%A7%E3%82%A2%E3%81%AF%E6%96%B0%E3%81%9F%E3%81%AA%E7%89%B9%E6%80%A7%E6%A9%9F%E8%83%BD%E3%82%92%E8%A3%85%E5%82%99/'
      - 'https://security.packt.com/suncrypt-ransomware/'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.suncrypt'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '0c91c96fd7124f21a0193cf842e3495f6daf84a394f44013e92a87ad9d2ef4a0ceec9dd2e2eca22e'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
