name: VexTrio Malicious Adtech TDS Domain
description: Detects DNS queries to domains associated with the VexTrio Traffic Distribution System (TDS) and related malicious adtech platforms as detailed in Infoblox research. These platforms are used to redirect users from compromised websites to scams, malware, and other malicious content.
