id: 019ca096-52b6-7233-b6a9-48b10e24b760
name: Celestial RAT Mutex Detection
description: Detects known mutexes associated with Celestial RAT activity. The rule specifically looks for mutex names matching 'celestial_<uniqueid>'.
query: |-
    title: Celestial RAT Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Celestial rat activity.
    author: '@adhikara13'
    date: 2024/08/01
    references:
      - 'https://app.any.run/tasks/14d1c3db-c5c9-464d-95be-232cd8703aa6/'
    tags:
      - 'attack.command_and_control.t1219'
      - 'malware.rat.celestial'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'celestial_<uniqueid>'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0011
techniques:
    - T1219
tags:
    - attack.command_and_control.t1219
    - malware.rat.celestial
author: '@adhikara13'
version: "1"
references:
    - https://app.any.run/tasks/14d1c3db-c5c9-464d-95be-232cd8703aa6/
data_sources:
    - process_creation
    - windows
