id: 019d0658-db41-7356-8fb9-9fbc2a0036bc
name: DarkSword C2 and Delivery Domains
description: Detects network connections to domains identified as being part of the DarkSword iOS exploit kit delivery or command-and-control infrastructure. The DarkSword exploit kit is actively being used by multiple threat actors (UNC6353, UNC6748, PARS Defense) to target iOS users.
query: |
    title: DarkSword C2 and Delivery Domains
    id: 5b0d4c46-6f78-48aa-969f-e10fb5ee6c5d
    status: experimental
    description: Detects network connections to domains identified as being part of
      the DarkSword iOS exploit kit delivery or command-and-control infrastructure.
      The DarkSword exploit kit is actively being used by multiple threat actors
      (UNC6353, UNC6748, PARS Defense) to target iOS users.
    author: detections.ai
    references:
      - https://iverify.io/blog/darksword-ios-exploit-kit-explained
      - https://www.lookout.com/threat-intelligence/article/darksword
      - https://cloud.google.com/blog/topics/threat-intelligence/darksword-ios-exploit-chain
    date: 2026-03-19
    tags:
      - attack.initial_access
      - attack.command_and_control
      - attack.t1566.002
      - attack.t1071.001
    logsource:
      category: network
      product:
      service:
    detection:
      selection:
        # List of domains associated with DarkSword delivery and C2
        destination.domain:
          - 'static.cdncounter.net'
          - 'sqwas.shapelie.com'
          - 'snapshare.chat'
          - 'sahibndn.io'
          - 'e5.malaymoil.com'
          - '7aac.gov.ua'
          - 'novosti.dn.ua'
      condition: selection
    falsepositives:
      - The domains '7aac.gov.ua' (Ukrainian court) and 'novosti.dn.ua' (Ukrainian
        news agency) are legitimate sites that were compromised for watering hole
        attacks. Legitimate traffic to these sites is expected. Correlate with other
        indicators or focus on alerts from non-Ukrainian geo-locations if possible
        to reduce noise.
    level: high
query_type: sigma
severity: high
