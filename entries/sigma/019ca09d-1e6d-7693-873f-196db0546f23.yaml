id: 019ca09d-1e6d-7693-873f-196db0546f23
name: Moisha Ransomware Mutex Detection
description: The rule detects the creation of specific mutex names associated with Moisha ransomware activity. It looks for the mutex 'Global\__w3616de3-6u4b-32fc-97b1-de928faadf50'. This detection is based on the presence of these unique mutex strings, which are indicators of the ransomware's execution.
query: |-
    title: Moisha Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Moisha ransomware activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://cyble.com/blog/moisha-ransomware-in-action'
      - 'https://app.any.run/tasks/11f66692-6cf7-4672-b6ba-a0095ac4dd3c'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.moisha'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Global\__w3616de3-6u4b-32fc-97b1-de928faadf50'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
