      like '.top' or '.vip'. This pattern indicates potential command and control
      (C2) communication from Gh0st RAT malware.
    falsepositives:
      - Pattern_based_on_brand_and_TLD
    references:
      - https://unit42.paloaltonetworks.com/impersonation-campaigns-deliver-gh0st-rat/
