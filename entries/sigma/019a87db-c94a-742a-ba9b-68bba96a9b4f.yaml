id: 019a87db-c94a-742a-ba9b-68bba96a9b4f
name: MALWARE Gh0st RAT Impersonation Domain TLS (Campaign Trio/Chorus)
description: This rule detects TLS connections to domains associated with Gh0st RAT impersonation campaigns, specifically 'Campaign Trio' and 'Campaign Chorus'. It looks for specific strings ('i4tools', 'youdao', 'deepseek') in the TLS Server Name Indication (SNI) field, combined with top-level domains like '.top' or '.vip'. This pattern indicates potential command and control (C2) communication from Gh0st RAT malware.
query: |
    alert tls $HOME_NET any -> $EXTERNAL_NET any (msg:"MALWARE Gh0st RAT Impersonation Domain TLS (Campaign Trio/Chorus)"; flow:to_server,established; tls.sni; content:"i4tools"; nocase; fast_pattern; pcre:"/(?:i4tools|youdao|deepseek).*\.(?:top|vip)$/i"; reference:url,https://unit42.paloaltonetworks.com/impersonation-campaigns-deliver-gh0st-rat/; classtype:trojan-activity; sid:1000001; rev:1; metadata: >-
      author detections.ai, created_at 2025-11-15, updated_at 2025-11-15,
      malware_family Gh0st_RAT, attack_target Client_Endpoint, deployment Perimeter,
      confidence Medium, signature_severity Major, tag Impersonation, tag
      Campaign_Trio, tag Campaign_Chorus, mitre_tactic_id TA0001, mitre_tactic_name
      Initial_Access, mitre_technique_id T1566, mitre_technique_name Phishing,
      fp_note Pattern_based_on_brand_and_TLD;)
    logsource:
      category: network_connection
    title: MALWARE Gh0st RAT Impersonation Domain TLS (Campaign Trio/Chorus)
