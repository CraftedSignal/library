name: LeakyStealer C2 Communication
description: Detects outbound HTTP POST requests to the LeakyStealer C2 server 'everstead.group' using a specific user-agent and URI paths.
query: "title: LeakyStealer C2 Communication\r\nid: 16a5e48a-dd7c-4a91-986b-53e7f7fa8354\r\nstatus: experimental\r\ndescription: Detects outbound HTTP POST requests to the LeakyStealer C2 server\r\n  'everstead.group' using a specific user-agent and URI paths.\r\nreferences:\r\n  - https://hybrid-analysis.blogspot.com/2025/11/leakyinjector-and-leakystealer-duo.html\r\nauthor: detections.ai, Georg Lauenstein\r\ndate: 2025-11-09\r\ntags:\r\n  - attack.t1071.001\r\nlogsource:\r\n  category: proxy\r\ndetection:\r\n  selection:\r\n    cs-method: 'POST' # Detects POST requests used for C2 communication\r\n    cs-host|contains: 'everstead.group' # C2 domain used by LeakyStealer\r\n    cs-uri|endswith:\r\n      # Specific URIs for beaconing and data exfiltration\r\n      - '/api/beacon'\r\n      - '/api/beacon/history'\r\n    c-useragent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64)' # Hard-coded user agent\r\n  condition: selection\r\nfalsepositives:\r\n  - Legitimate traffic if the C2 domain is sinkholed or repurposed.\r\nlevel: high\r\n"
