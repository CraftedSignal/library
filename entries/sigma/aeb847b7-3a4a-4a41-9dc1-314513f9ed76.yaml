id: aeb847b7-3a4a-4a41-9dc1-314513f9ed76
name: Renamed Procdump tool used for dumping LSASS process
description: Detects scenarios where an attacker attempts to dump the LSASS process content using a renamed version of the Procdump tool.
query: "title: Renamed Procdump tool used for dumping LSASS process\ndescription: Detects scenarios where an attacker attempts to dump the LSASS process content using a renamed version of the Procdump tool.\nreferences:\n- https://www.intrinsec.com/apt27-analysis/\n- https://learn.microsoft.com/en-us/sysinternals/downloads/procdump\ntags:\n- attack.execution\n- attack.t1569.002\nauthor: mdecrevoisier\nstatus: experimental\nlogsource:\n  product: windows\n  category: process_creation\ndetection:\n  selection_name:\n    - Image|endswith: '\\procdump.exe'\n    - OriginalFilename: 'procdump.exe'\n\n  selection_paramters:\n    CommandLine|contains|all:\n      - accepteula\n      - '-ma' # Write a 'Full' dump file.\n  condition: selection_name or selection_paramters\nfalsepositives:\n- None \nlevel: high"
query_type: sigma
severity: high
