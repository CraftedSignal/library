id: 019ca098-11cc-7368-b750-ff13735b8dbf
name: DarkComet RAT Mutex Detection
description: This rule detects the creation of specific mutex names known to be associated with the DarkComet Remote Access Trojan (RAT). The mutex names include patterns like 'DC_MUTEX-<7 Alphanumeric Characters>', 'DCMIN_MUTEX-<7 Alphanumeric Characters>', and exact strings 'DCMUTEX' and 'DCPERSFWBP'. The detection is based on process creation events where these mutex names are observed.
query: |-
    title: DarkComet RAT Mutex Detection
    status: experimental
    description: Detects known mutexes associated with DarkComet rat activity.
    author: '@adhikara13'
    date: 2024/08/01
    references:
      - 'https://blog.talosintelligence.com/ding-your-rat-has-been-delivered/'
      - 'https://any.run/cybersecurity-blog/darkcomet-rat-technical-analysis/'
      - 'https://blog.talosintelligence.com/threat-roundup-0122/'
      - 'https://tria.ge/240426-n1ymfsba99/behavioral2/analog?q=DCPERSFWBP&main_event=Mutex'
    tags:
      - 'attack.command_and_control.t1219'
      - 'malware.rat.darkcomet'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'DC_MUTEX-<7 Alphanumeric Characters>'
          - 'DCMIN_MUTEX-<7 Alphanumeric Characters>'
          - 'DCMUTEX'
          - 'DCPERSFWBP'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0011
techniques:
    - T1219
tags:
    - attack.command_and_control.t1219
    - malware.rat.darkcomet
author: '@adhikara13'
version: "1"
references:
    - https://blog.talosintelligence.com/ding-your-rat-has-been-delivered/
    - https://any.run/cybersecurity-blog/darkcomet-rat-technical-analysis/
    - https://blog.talosintelligence.com/threat-roundup-0122/
    - https://tria.ge/240426-n1ymfsba99/behavioral2/analog?q=DCPERSFWBP&main_event=Mutex
data_sources:
    - process_creation
    - windows
