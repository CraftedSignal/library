id: 019ca098-4f89-707f-ba20-389a4ca138e1
name: DarkTrack RAT Mutex Detection
description: This rule detects the creation of specific mutex names associated with the DarkTrack Remote Access Trojan (RAT). The mutex name 'I_AM_DT<uniqueid>' is a known indicator of DarkTrack activity. Detection of this mutex suggests that a DarkTrack RAT may be active on the system, potentially indicating a compromise related to command and control (C2) operations.
query: |-
    title: DarkTrack RAT Mutex Detection
    status: experimental
    description: Detects known mutexes associated with DarkTrack rat activity.
    author: '@adhikara13'
    date: 2024/08/01
    references:
      - 'https://app.any.run/tasks/720cbf18-903d-4a55-9ea1-4e8a92b4ee4d/'
    tags:
      - 'attack.command_and_control.t1219'
      - 'malware.rat.darktrack'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'I_AM_DT<uniqueid>'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0011
techniques:
    - T1219
tags:
    - attack.command_and_control.t1219
    - malware.rat.darktrack
author: '@adhikara13'
version: "1"
references:
