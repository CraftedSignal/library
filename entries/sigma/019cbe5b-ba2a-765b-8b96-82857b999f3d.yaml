id: 019cbe5b-ba2a-765b-8b96-82857b999f3d
name: Seedworm Malware Signed with 'Amy Cherne' Certificate
description: Detects files signed with a code-signing certificate issued to 'Amy Cherne'. This certificate was observed being used by the Iranian APT group Seedworm (aka MuddyWater) to sign new backdoors named Dindoor and Fakeset.
query: |
    title: Seedworm Malware Signed with 'Amy Cherne' Certificate
    id: 66b2ef63-573e-46cd-87d3-36512a5db122
    status: experimental
    description: Detects files signed with a code-signing certificate issued to 'Amy
      Cherne'. This certificate was observed being used by the Iranian APT group
      Seedworm (aka MuddyWater) to sign new backdoors named Dindoor and Fakeset.
    author: detections.ai
    references:
      - https://www.security.com/threat-intelligence/iran-cyber-threat-activity-us
    date: 2026-03-05
    tags:
      - attack.defense_evasion
      - attack.t1588.003
      - attack.g0069
    logsource:
      product: windows
      category: file_event # This could also be process_creation if the EDR enriches events with signature info
    detection:
      selection:
        # Certificate subject used to sign Dindoor and Fakeset backdoors
        Signature: 'Amy Cherne'
      condition: selection
    falsepositives:
      - The certificate could have been stolen from a legitimate individual or
        entity. However, given its use in signing known malware, any detection
        should be treated as highly suspicious.
    level: high
