id: 019cd7d5-6d9b-7499-af31-126be21fb2d2
name: HeaconLoad Golang Downloader Beacon
description: Detects the beaconing activity of the HeaconLoad Golang downloader, a component of the BoryptGrab campaign. This malware sends HTTP POST requests containing system information to the "/healthcheck" endpoint on port 8088.
query: |
    title: HeaconLoad Golang Downloader Beacon
    id: 63757886-f798-4180-9dba-93454c563198
    status: experimental
    description: >-
      Detects the beaconing activity of the HeaconLoad Golang downloader, a
      component of the BoryptGrab campaign. This malware sends HTTP POST requests
      containing system information to the "/healthcheck" endpoint on port 8088.
    author: detections.ai
    references:
      - >-
        https://www.trendmicro.com/en_us/research/26/c/boryptgrab-stealer-targets-users-via-deceptive-github-pages.html
    date: 2026-03-10T00:00:00.000Z
    tags:
      - attack.t1071.001
      - attack.command_and_control
      - detection.emerging-threats
    logsource:
      category: webserver
    detection:
      selection:
        http.request.method: POST
        url.path|endswith: /healthcheck
        destination.port: 8088
      condition: selection
    falsepositives:
      - Legitimate applications may use a "/healthcheck" endpoint, but the
        combination with a POST request and the non-standard port 8088 is highly
        indicative of HeaconLoad activity. Consider tuning by destination IP address
        if false positives occur.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0011
techniques:
    - T1071.001
tags:
    - attack.t1071.001
    - attack.command_and_control
    - detection.emerging-threats
author: detections.ai
version: "2"
references:
    - https://www.trendmicro.com/en_us/research/26/c/boryptgrab-stealer-targets-users-via-deceptive-github-pages.html
data_sources:
