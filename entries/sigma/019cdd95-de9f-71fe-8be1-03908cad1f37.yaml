id: 019cdd95-de9f-71fe-8be1-03908cad1f37
name: GitHub Actions Pwn Request Vulnerability
description: Detects a vulnerable GitHub Actions workflow configuration known as a "Pwn Request". This occurs when a workflow is triggered by `pull_request_target` but checks out and executes untrusted code from the head of the pull request (`${{ github.event.pull_request.head.sha }}`). This allows an attacker to run arbitrary code with the permissions of the target repository, including access to secrets. This pattern was actively exploited by the 'hackerbot-claw' campaign. This rule should be applied to files in the `.github/workflows/` directory.
query: |
    title: GitHub Actions Pwn Request Vulnerability
    id: 1a71a6cc-ebbd-4441-a16f-7b4af86e2e23
    status: experimental
    description: >-
      Detects a vulnerable GitHub Actions workflow configuration known as a "Pwn
      Request". This occurs when a workflow is triggered by `pull_request_target`
      but checks out and executes untrusted code from the head of the pull request
      (`${{ github.event.pull_request.head.sha }}`). This allows an attacker to run
      arbitrary code with the permissions of the target repository, including access
      to secrets. This pattern was actively exploited by the 'hackerbot-claw'
      campaign. This rule should be applied to files in the `.github/workflows/`
      directory.
    author: detections.ai
    references:
      - https://www.stepsecurity.io/blog/hackerbot-claw-github-actions-exploitation#indicators-of-compromise
    date: 2026-03-11
    tags:
      - attack.t1195.001
      - attack.execution
    logsource:
      category: file_event # This rule is intended to be run against the content of files.
      product: generic
    detection:
      # The field name 'file_content' is a placeholder. You may need to replace it with the field from your data source that contains the file's text content.
      selection_trigger:
        file_content|contains: 'pull_request_target:' # Detects the vulnerable trigger event.
      selection_checkout:
        file_content|contains: 'uses: actions/checkout@' # Detects the use of the standard checkout action.
      selection_ref:
        file_content|contains: 'ref: ${{ github.event.pull_request.head.sha }}' # Detects the checkout of untrusted code from the pull request head.
      condition: all of selection_*
    falsepositives:
      - This pattern is a known insecure practice. While there might be rare,
        complex scenarios where this is used intentionally with other compensating
        controls, it should almost always be considered a vulnerability requiring
        immediate remediation.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0002
    - TA0001
techniques:
    - T1195
    - T1195.001
