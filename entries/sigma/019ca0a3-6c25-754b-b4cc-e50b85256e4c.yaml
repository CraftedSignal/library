id: 019ca0a3-6c25-754b-b4cc-e50b85256e4c
name: YaRAT Mutex Detection
description: This rule detects the creation of processes that utilize specific mutex names associated with YaRAT (Yet Another Remote Access Tool) malware. Specifically, it looks for the mutex name 'YandexDisk'. The presence of this mutex name is a strong indicator of YaRAT activity, as it is a known identifier for this particular RAT. This detection helps identify command and control (C2) communication or other malicious operations performed by YaRAT on a compromised system.
query: |-
    title: YaRAT Mutex Detection
    status: experimental
    description: Detects known mutexes associated with YaRAT activity.
    author: '@adhikara13'
    date: 2024/12/19
    references:
      - 'https://global.ptsecurity.com/en/research/pt-esc-threat-intelligence/apt31-cloud-attacks/'
    tags:
      - 'attack.command_and_control.t1219'
      - 'malware.rat.yarat'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'YandexDisk'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0011
techniques:
    - T1219
tags:
    - attack.command_and_control.t1219
    - malware.rat.yarat
author: '@adhikara13'
version: "1"
references:
    - https://global.ptsecurity.com/en/research/pt-esc-threat-intelligence/apt31-cloud-attacks/
data_sources:
    - process_creation
    - windows
