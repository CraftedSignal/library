id: 019ca096-6631-7690-a5bb-95ced64a83a4
name: Cerber Ransomware Mutex Detection
description: Detects known mutexes associated with Cerber ransomware activity. The rule specifically looks for mutex names matching 'SHELL.{<uuid>}'.
query: |-
    title: Cerber Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Cerber ransomware activity.
    author: '@adhikara13'
    date: 2025/07/13
    references:
      - 'https://any.run/malware-trends/cerber/'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.cerber'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'SHELL.{<uuid>}'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.cerber
author: '@adhikara13'
version: "1"
references:
    - https://any.run/malware-trends/cerber/
data_sources:
    - process_creation
    - windows
