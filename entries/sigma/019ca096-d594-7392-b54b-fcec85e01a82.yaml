id: 019ca096-d594-7392-b54b-fcec85e01a82
name: Claimloader Mutex Detection
description: This rule detects the creation of specific mutex names associated with Claimloader malware activity. The mutex names observed include patterns like 'TB<yearmonthdate>', 'MTM<yearmonthdate>', 'CATM<yearmonthdate>', and fixed strings such as 'GameBoxABC', 'GameGpu0428', 'GameFind057', and 'GameBoxTV59'. Detection relies on monitoring process creation events for these specific mutex names, indicating potential Claimloader execution or presence on a Windows system.
query: |-
    title: Claimloader Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Claimloader activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://www.ibm.com/think/x-force/hive0154-targeting-us-philippines-pakistan-taiwan'
    tags:
      - 'attack.execution.t1204'
      - 'malware.loader.claimloader'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'TB<yearmonthdate>'
          - 'MTM<yearmonthdate>'
          - 'CATM<yearmonthdate>'
          - 'GameBoxABC'
          - 'GameGpu0428'
          - 'GameFind057'
          - 'GameBoxTV59'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0002
techniques:
    - T1204
tags:
    - attack.execution.t1204
    - malware.loader.claimloader
author: '@adhikara13'
version: "1"
references:
    - https://www.ibm.com/think/x-force/hive0154-targeting-us-philippines-pakistan-taiwan
data_sources:
    - process_creation
    - windows
