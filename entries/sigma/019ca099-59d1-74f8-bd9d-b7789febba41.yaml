id: 019ca099-59d1-74f8-bd9d-b7789febba41
name: Exela Stealer Mutex Detection
description: This rule detects the creation of processes that utilize specific mutex names associated with the Exela stealer. The detection is triggered when a process creates a mutex with the name 'Exela | Stealar | on top |'. This activity is indicative of the Exela stealer operating on a system, as these mutexes are known to be used by this malware family for various purposes, such as ensuring single instance execution or inter-process communication. The rule leverages process creation logs to identify the presence of these mutexes.
query: |-
    title: Exela Stealer Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Exela stealer activity.
    author: '@adhikara13'
    date: 2025/07/16
    references:
      - 'https://cyble.com/blog/exela-stealer-spotted-targeting-social-media-giants/'
    tags:
      - 'attack.credential_access.t1555'
      - 'malware.stealer.exela'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Exela | Stealar | on top |'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0006
techniques:
    - T1555
tags:
    - attack.credential_access.t1555
    - malware.stealer.exela
author: '@adhikara13'
version: "1"
references:
