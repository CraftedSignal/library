id: 019c48f4-ebec-73e4-916e-71ea54b7b46e
name: UAC Bypass via Fodhelper Spawning a Process
description: The rule detects the `fodhelper.exe` process spawning any child process. This activity is considered highly suspicious because `fodhelper.exe` does not typically spawn child processes during normal operation. Such behavior is indicative of a User Account Control (UAC) bypass exploitation attempt, specifically leveraging `fodhelper.exe`.
query: "title: UAC Bypass via Fodhelper Spawning a Process\r\nid: 0a093941-0b7d-4c0b-acee-bbfffdfff751\r\nstatus: experimental\r\ndescription: Detects fodhelper.exe spawning any child process. Fodhelper.exe does not spawn child processes during normal operation, making any child process creation highly suspicious and indicative of UAC bypass exploitation.\r\nreferences:\r\n    - https://attack.mitre.org/techniques/T1548.002/\r\n    - https://github.com/winscripting/UAC-bypass/blob/master/FodhelperBypass.ps1\r\nauthor: SimSpace\r\ndate: 2026-01-01\r\ntags:\r\n    - attack.privilege-escalation\r\n    - attack.t1548.002\r\nlogsource:\r\n    category: process_creation\r\n    product: windows\r\ndetection:\r\n    selection:\r\n        ParentImage|endswith: '\\fodhelper.exe'\r\n    condition: selection\r\nfields:\r\n    - Image\r\n    - CommandLine\r\n    - ParentImage\r\n    - User\r\nfalsepositives:\r\n    - None - fodhelper.exe does not spawn child processes in normal operation\r\nlevel: critical"
