id: 019c9626-4985-7524-986d-c70689b08698
name: GRIDTIDE Suspicious Artefact Name Execution
description: |
    Detects execution of processes with filenames referenced in GRIDTIDE reporting, such as xapt and related components.
query: |
    title: GRIDTIDE Suspicious Artefact Name Execution
    id: 6e6b2db1-7c11-4f6a-9c4b-4a8c8a8e8c2e
    status: experimental
    description: >
      Detects execution of processes with filenames referenced in GRIDTIDE
      reporting, such as xapt and related components.
    author: Daniel Jeremiah
    date: 2026-02-24T00:00:00.000Z
    references:
      - >-
        https://cloud.google.com/blog/topics/threat-intelligence/disrupting-gridtide-global-espionage-campaign/
    tags:
      - attack.execution
      - attack.t1204
    logsource:
      product: linux
      category: process_creation
      service: audit
    detection:
      selection:
        Image|endswith:
          - /xapt
          - /fire
          - /pmp
        CommandLine|contains:
          - xapt
          - vpn_bridge.config
          - hamcore.se2
      condition: selection
    falsepositives:
      - Unknown, expected to be low in most environments
    level: high
query_type: sigma
severity: medium
tactics:
    - TA0002
techniques:
    - T1204
tags:
    - attack.execution
    - attack.t1204
author: Daniel Jeremiah
version: "2"
references:
    - https://cloud.google.com/blog/topics/threat-intelligence/disrupting-gridtide-global-espionage-campaign/
data_sources:
    - process_creation
    - linux
    - audit
