id: 019ca09b-8cea-749d-a11f-f5d3f59e67b6
name: Kivars Backdoor Mutex Detection
description: The rule detects the creation of specific mutex names associated with the Kivars backdoor. It looks for mutexes matching the pattern 'uni-web-<uniqueid>'. This activity is indicative of the Kivars backdoor establishing persistence or coordinating its operations on a compromised system.
query: |-
    title: Kivars Backdoor Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Kivars backdoor activity.
    author: '@adhikara13'
    date: 2024/08/01
    references:
      - 'https://x.com/rst_cloud/status/1896196308873969727'
    tags:
      - 'attack.persistence.t1547'
      - 'malware.backdoor.kivars'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'uni-web-<uniqueid>'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0003
    - TA0004
techniques:
    - T1547
tags:
    - attack.persistence.t1547
    - malware.backdoor.kivars
author: '@adhikara13'
version: "1"
references:
    - https://x.com/rst_cloud/status/1896196308873969727
data_sources:
    - process_creation
    - windows
