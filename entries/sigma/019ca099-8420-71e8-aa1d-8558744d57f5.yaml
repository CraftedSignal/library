id: 019ca099-8420-71e8-aa1d-8558744d57f5
name: Fangao Loader Mutex Detection
description: The rule detects the creation of specific mutex names associated with the Fangao loader. It specifically looks for a mutex named 'UniqueMutexName' during process creation events on Windows systems. This activity is indicative of the Fangao loader executing on a system.
query: |-
    title: Fangao Loader Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Fangao loader activity.
    author: '@adhikara13'
    date: 2025/07/30
    references:
      - 'https://ics-cert.kaspersky.ru/publications/reports/2025/03/27/operation-salmonslalom/'
    tags:
      - 'attack.execution.t1204'
      - 'malware.loader.fangao'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'UniqueMutexName'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0002
techniques:
    - T1204
tags:
    - attack.execution.t1204
    - malware.loader.fangao
author: '@adhikara13'
version: "1"
references:
    - https://ics-cert.kaspersky.ru/publications/reports/2025/03/27/operation-salmonslalom/
data_sources:
    - process_creation
    - windows
