id: f7fa10a3-cbf6-415b-9570-b24f5a1c051d
name: Execute base64 encoded PowerShell
description: |
    This detection identifies attempts to execute PowerShell commands that have been obfuscated using Base64 encoding. Attackers frequently employ Base64 encoding to conceal malicious scripts, evade signature-based antivirus solutions, and make it more difficult for security analysts to quickly understand their true intent.
query: "title: Execute base64 encoded PowerShell\r\ndescription: >\r\n  This detection identifies attempts to execute PowerShell commands that have\r\n  been obfuscated using Base64 encoding. Attackers frequently employ Base64\r\n  encoding to conceal malicious scripts, evade signature-based antivirus\r\n  solutions, and make it more difficult for security analysts to quickly\r\n  understand their true intent.\r\nauthor: Zaki Zarkasih (FPT Metrodata Indonesia)\r\nreferences:\r\n  - https://unit42.paloaltonetworks.com/unit42-pulling-back-the-curtains-on-encodedcommand-powershell-attacks/\r\n  - https://attack.mitre.org/techniques/T1027/002/\r\n  - https://redcanary.com/blog/threat-detection/investigating-powershell-attacks/\r\nstatus: experimental\r\nlogsource:\r\n  product: windows\r\n  service: powershell\r\n  category: ps_script\r\ndetection:\r\n  selection:\r\n    EventID: 4103\r\n    Message|contains:\r\n      - FromBase64String\r\n      - Set-ItemProperty\r\n      - '[Text.Encoding]::UNICODE.GetString'\r\n  condition: selection\r\nfalsepositives:\r\n  - Rare in clean environments; may occur in red team or testing scenarios\r\nlevel: high\r\ntags:\r\n  - attack.defense_evasion\r\n  - attack.t1027.002\r\nruletype: sigma"
