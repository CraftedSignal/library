id: 019c23d7-fb34-7212-bf94-2e83f4b380e9
name: OtterCookie Persistence Mechanisms
description: |
    Detects persistence mechanisms used by the OtterCookie malware, part of the Lazarus "Contagious Interview" campaign. It specifically looks for the creation of a 'NodeHelper' registry run key and a 'NodeUpdate' scheduled task.
query: |
    title: OtterCookie Persistence Mechanisms
    id: d3c7a4c4-0071-4660-b2a5-ad628c6a9ce8
    status: experimental
    description: >
      Detects persistence mechanisms used by the OtterCookie malware, part of the
      Lazarus "Contagious Interview" campaign. It specifically looks for the
      creation of a 'NodeHelper' registry run key and a 'NodeUpdate' scheduled task.
    references:
      - https://redasgard.com/blog/hunting-lazarus-part3-infrastructure-too-perfect
    author: tim@detections.ai
    date: 2026-02-03T00:00:00.000Z
    tags:
      - attack.persistence
      - attack.t1547.001
      - attack.t1053.005
      - attack.g0032
    logsource:
      product: windows
    detection:
      selection_registry:
        TargetObject|endswith: '\Software\Microsoft\Windows\CurrentVersion\Run\NodeHelper'
        Details|contains: node
      selection_schtask_cli:
        Image|endswith: \schtasks.exe
        CommandLine|contains|all:
          - '/create'
          - '/tn'
          - 'NodeUpdate'
      selection_schtask_log:
        TaskName|contains: 'NodeUpdate'
        EventID:
          - 106
          - 4698
      condition: selection_registry or 1 of selection_schtask_*
    falsepositives: >
      Legitimate software using the names 'NodeHelper' or 'NodeUpdate' for
      persistence could trigger this rule, although it is unlikely. Consider
      adding filters for legitimate software paths if false positives occur.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0003
    - TA0004
    - TA0002
techniques:
    - T1547.001
    - T1053.005
tags:
    - attack.persistence
    - attack.t1547.001
    - attack.t1053.005
    - attack.g0032
