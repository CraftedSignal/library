id: 019c5cfd-80f0-735e-9ff6-4c84a2d03f72
name: Remcos RAT (SmartApeSG) - Registry Run Key Shotcut Persistence
description: Detects Remcos RAT persistence via HKCU Run key "Shotcut video editor" pointing to shotcut.exe under AppData\Local\2120206 (DLL sideloading). All five strings required to avoid false positives.
query: |
    title: Remcos RAT (SmartApeSG) - Registry Run Key Shotcut Persistence
    id: f6a7b8c9-d0e1-9f0a-3b4c-5d6e7f8a9b0c
    status: experimental
    description: >-
      Detects Remcos RAT persistence via HKCU Run key "Shotcut video editor"
      pointing to shotcut.exe under AppData\Local\2120206 (DLL sideloading). All
      five strings required to avoid false positives.
    references:
      - https://app.any.run/tasks/361eb125-357d-4c59-b83e-9d27d0f314ce
      - https://malpedia.caad.fkie.fraunhofer.de/details/win.remcos
      - https://blog.talosintelligence.com/picking-apart-remcos
      - >-
        https://www.broadcom.com/support/security-center/protection-bulletin/new-clickfix-campaign-delivers-remcos-rat-to-italian-users
      - https://isc.sans.edu/diary/32474
    author: PCAP Analysis
    date: 2026/02/14
    modified: 2026/02/14
    logsource:
      category: registry_set
      product: windows
    detection:
      selection:
        - TargetObject|contains: \CurrentVersion\Run
        - Details|contains: Shotcut video editor
        - Details|contains: '2120206'
        - Details|contains: shotcut.exe
        - Details|contains: AppData\Local
      condition: selection
    falsepositives:
      - Legitimate Shotcut installed to AppData\Local in a folder named 2120206
        (unusual)
    level: high
    tags:
      - attack.persistence
      - attack.t1547.001
      - malware.remcos
      - campaign.smartapesg
