id: 019c1d5c-951b-73a9-8604-0ac7c958cfd3
name: Suspicious CorelDefrag Scheduled Task Executing PowerShell
description: |
    Detects creation of a scheduled task named Microsoft\Windows\Defrag\CorelDefrag configured to execute an obfuscated PowerShell payload on a daily basis. This task mimics a legitimate Windows Defrag task to maintain persistence.
query: "title: Suspicious CorelDefrag Scheduled Task Executing PowerShell\r\nid: 4f9c7e2a-3d61-4c8b-9a5e-1f8b6d2e7a94\r\nstatus: experimental\r\ndescription: >\r\n  Detects creation of a scheduled task named\r\n  Microsoft\\Windows\\Defrag\\CorelDefrag configured to execute an obfuscated\r\n  PowerShell payload on a daily basis. This task mimics a legitimate Windows\r\n  Defrag task to maintain persistence.\r\nauthor: Thaung Htet\r\ndate: 2026-02-02\r\nreferences:\r\n  - https://securelist.com/escan-supply-chain-attack/118688/\r\n  - https://www.securityweek.com/escan-antivirus-delivers-malware-in-supply-chain-attack/\r\n  - https://www.morphisec.com/blog/critical-escan-threat-bulletin/\r\n  - https://www.infosecurity-magazine.com/news/escan-antivirus-breach-delivers/\r\ntags:\r\n  - attack.persistence\r\n  - attack.t1053.005\r\n  - attack.defense_evasion\r\nlogsource:\r\n  product: windows\r\n  category: scheduled_task\r\ndetection:\r\n  task_name:\r\n    TaskName|contains:\r\n      - '\\Microsoft\\Windows\\Defrag\\CorelDefrag'\r\n  condition: task_name\r\nfalsepositives:\r\n  - None expected\r\nlevel: critical\r\n"
