id: 019abed0-699a-747b-9a57-4154fefb416f
name: FlexibleFerret Stage 1 - Curl Download
description: Detects curl command downloading payloads to /var/tmp, indicating potential initial delivery stage of FlexibleFerret malware.
query: |+
    ---
    title: FlexibleFerret Stage 1 - Curl Download to var/tmp
    id: a1b2c3d4-1111-4e5f-8a9b-0c1d2e3f4a5b
    status: experimental
    description: Detects curl command downloading payload to /var/tmp directory, characteristic of FlexibleFerret initial stage delivery
    author: Claude Opus 4.5
    date: 2025/11/26
    references:
        - https://www.jamf.com/blog/flexibleferret-malware-continues-to-adapt/
    tags:
        - attack.execution
        - attack.t1059.004
        - attack.defense_evasion
        - attack.t1036
        - attack.initial_access
        - attack.t1566
    logsource:
        category: process_creation
        product: macos
    detection:
        selection_curl:
            CommandLine|contains: 'curl'
        selection_output:
            CommandLine|contains:
                - '/var/tmp/macpatch.sh'
                - '/var/tmp/cdrivMac.sh'
                - '-o /var/tmp/'
                - '> /var/tmp/'
        condition: selection_curl and selection_output
    falsepositives:
        - Legitimate software installers downloading to temp directories
        - System administrators using curl for legitimate purposes
    level: high

query_type: sigma
severity: high
tactics:
    - TA0002
    - TA0005
    - TA0001
techniques:
