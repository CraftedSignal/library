id: eac5638d-7fae-43f0-ac90-26d40836877e
name: Mshta Spawning Shell Process
description: Detects the execution of a shell process (like cmd.exe or powershell.exe) spawned by the Microsoft HTML Application Host (mshta.exe). This behavior is often associated with malicious HTA files that use scripting objects like "WScript.Shell" to execute arbitrary commands, as seen in campaigns distributing Epsilon Red ransomware.
query: |
    title: Mshta Spawning Shell Process
    id: efd2ee33-65d0-41dc-8851-a87380ea22e2
    status: experimental
    description: Detects the execution of a shell process (like cmd.exe or powershell.exe) spawned by the Microsoft HTML Application Host (mshta.exe). This behavior is often associated with malicious HTA files that use scripting objects like "WScript.Shell" to execute arbitrary commands, as seen in campaigns distributing Epsilon Red ransomware.
    references:
      - https://www.cloudsek.com/blog/threat-actors-lure-victims-into-downloading-hta-files-using-clickfix-to-spread-epsilon-red-ransomware
    author: detections.ai
    date: 2025-08-01
    tags:
      - attack.execution
      - attack.t1218.005
      - attack.t1059.003
      - attack.t1059.001
      - attack.t1059.005
    logsource:
      category: process_creation
      product: windows
    detection:
      selection_parent:
        ParentImage|endswith: '\mshta.exe'     # Parent process is the Microsoft HTML Application host
      selection_child:
        Image|endswith:     # Detects common shell and script interpreters
          - '\cmd.exe'
          - '\powershell.exe'
          - '\wscript.exe'
          - '\cscript.exe'
      condition: selection_parent and selection_child
    falsepositives:
      - Legitimate administrative scripts or some legacy applications may use HTA files to launch command-line tools.
      - To reduce noise, consider adding filters for known legitimate parent/child process command-line combinations in your environment.
    level: high
query_type: sigma
severity: high
