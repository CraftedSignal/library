name: Mshta Executing Remote HTA File from Command Prompt
description: Detects the execution of a remote HTA file using mshta.exe, where the parent process is cmd.exe. This is a common technique for code execution via malicious HTA files.
query: "title: Mshta Executing Remote HTA File from Command Prompt\r\nid: 520fd8f2-66ae-4a4e-bb82-7d470141237e\r\nstatus: experimental\r\ndescription: Detects the execution of a remote HTA file using mshta.exe, where\r\n  the parent process is cmd.exe. This is a common technique for code execution\r\n  via malicious HTA files.\r\nreferences:\r\n  - https://attack.mitre.org/techniques/T1218/005/\r\nauthor: detections.ai\r\ndate: 2025-07-10\r\ntas:\r\n  - attack.execution\r\n  - attack.t1218.005\r\nlogsource:\r\n  category: process_creation\r\n  product: windows\r\ndetection:\r\n  selection:\r\n    ParentImage|endswith: '\\cmd.exe' # Parent process is command prompt\r\n    Image|endswith: '\\mshta.exe' # Mshta.exe is used to execute the HTA file\r\n    CommandLine|contains|all:\r\n      # Command line must contain both a URL and .hta extension\r\n      - 'http'\r\n      - '.hta'\r\n  condition: selection\r\nfalsepositives:\r\n  - Legitimate administrative scripts or legacy applications might use this\r\n    method for execution. Scrutinize the URL being accessed.\r\nlevel:\r\n"
