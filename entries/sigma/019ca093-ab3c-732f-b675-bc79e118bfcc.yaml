id: 019ca093-ab3c-732f-b675-bc79e118bfcc
name: Anatova Ransomware Mutex Detection
description: The rule detects the creation of specific mutexes known to be associated with the Anatova ransomware. It looks for a process creating a mutex with the exact name '6a8c9937zFIwHPZ309UZMZYVnwScPB2pR2MEx5SY7B1xgbruoO'. This activity is indicative of Anatova ransomware execution or presence on a Windows system.
query: |-
    title: Anatova Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Anatova ransomware activity.
    author: '@adhikara13'
    date: 2024/07/19
    references:
      - 'https://whitehat.eu/anatova-ransomware-experts-believe-it-will-be-a-dangerous-threat/'
      - 'https://www.mcafee.com/blogs/other-blogs/mcafee-labs/happy-new-year-2019-anatova-is-here/'
      - 'https://www.fortinet.com/blog/threat-research/looking-into-anatova-ransomware'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.anatova'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '6a8c9937zFIwHPZ309UZMZYVnwScPB2pR2MEx5SY7B1xgbruoO'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.anatova
author: '@adhikara13'
version: "1"
references:
    - https://whitehat.eu/anatova-ransomware-experts-believe-it-will-be-a-dangerous-threat/
    - https://www.mcafee.com/blogs/other-blogs/mcafee-labs/happy-new-year-2019-anatova-is-here/
    - https://www.fortinet.com/blog/threat-research/looking-into-anatova-ransomware
data_sources:
    - process_creation
    - windows
