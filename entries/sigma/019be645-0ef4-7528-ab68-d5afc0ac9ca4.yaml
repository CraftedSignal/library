name: TamperedChef Mshta Payload Execution
description: Detects a process chain where the Microsoft HTML Application Host (mshta.exe) launches the TamperedChef secondary payload 'ManualFinderApp.exe'.
query: |
    title: TamperedChef Mshta Payload Execution
    id: 49e9f301-16b4-4b12-a14b-c8463f6a87bd
    status: experimental
    description: Detects a process chain where the Microsoft HTML Application Host
      (mshta.exe) launches the TamperedChef secondary payload 'ManualFinderApp.exe'.
    references:
      - https://www.sophos.com/en-us/blog/tamperedchef-serves-bad-ads-with-infostealers-as-the-main-course
    author: detections.ai
    date: 2026-01-22
    tags:
      - attack.execution
      - attack.t1218.005
    logsource:
      product: windows
      category: process_creation
    detection:
      selection:
        # Detects the secondary payload associated with the TamperedChef campaign
        Image|endswith: '\ManualFinderApp.exe' # The payload is executed by mshta.exe, a common LOLBAS used to run script-based payloads
        ParentImage|endswith: '\mshta.exe'
      condition: selection
    falsepositives:
      - This parent-child process relationship is highly specific to this threat.
        False positives are unlikely.
    level: high
