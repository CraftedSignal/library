query: "title: Suspicious Network Discovery Utilities Hunt\nid: 3879e462-7cdc-4fc4-a597-b440d322a527\nstatus: experimental\ndescription: |\n  Detects activity related to Network Discovery.\n  Here, one group of network commands has to match for the rule to trigger. \nauthor: zendannyy\nreferences:\n  - https://attack.mitre.org/techniques/T1016/\ntags:\n  - attack.discovery\nlogsource:\n  product: linux\n  service: audit\ndetection:\n  selection_net_utilities:\n    CommandLine|contains:\n      - dig\n      - ifconfig -a\n      - netstat -a\n      - networksetup\n      - nslookup\n      - route\n  selection_net_checks:\n    - ping\n    - traceroute\n  condition: 1 of selection_*\nfalsepositives:\n  - Legitimate automation that uses network & system profiling utilities\nlevel: medium\n"
