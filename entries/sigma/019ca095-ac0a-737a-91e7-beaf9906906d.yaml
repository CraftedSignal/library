id: 019ca095-ac0a-737a-91e7-beaf9906906d
name: BlotchyQuasar RAT Mutex Detection
description: This rule detects the creation of specific mutexes known to be associated with the BlotchyQuasar Remote Access Trojan (RAT). The rule specifically looks for the mutex name '44474877AKs8XXT4SylAo2kAlUS2kYkala!'. Detection of this mutex indicates potential BlotchyQuasar RAT activity on a Windows system.
query: |-
    title: BlotchyQuasar RAT Mutex Detection
    status: experimental
    description: Detects known mutexes associated with BlotchyQuasar rat activity.
    author: '@adhikara13'
    date: 2024/12/19
    references:
      - 'https://www.ibm.com/think/x-force/x-force-hive0129-targeting-financial-institutions-latam-banking-trojan'
    tags:
      - 'attack.command_and_control.t1219'
      - 'malware.rat.blotchyquasar'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '44474877AKs8XXT4SylAo2kAlUS2kYkala!'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0011
techniques:
    - T1219
tags:
    - attack.command_and_control.t1219
    - malware.rat.blotchyquasar
author: '@adhikara13'
version: "1"
references:
    - https://www.ibm.com/think/x-force/x-force-hive0129-targeting-financial-institutions-latam-banking-trojan
data_sources:
    - process_creation
    - windows
