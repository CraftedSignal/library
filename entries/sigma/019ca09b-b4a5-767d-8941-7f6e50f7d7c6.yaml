id: 019ca09b-b4a5-767d-8941-7f6e50f7d7c6
name: Koxic Ransomware Mutex Detection
description: This rule detects the creation of specific mutexes known to be associated with Koxic ransomware. The detection is based on the presence of the mutex name '_atus_'. The primary goal is to identify Koxic ransomware activity on Windows systems.
query: |-
    title: Koxic Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Koxic ransomware activity.
    author: '@adhikara13'
    date: 2025/07/15
    references:
      - 'https://cyble.com/blog/koxic-ransomware-deep-diveanalysis/'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.koxic'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '_atus_'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.koxic
author: '@adhikara13'
version: "1"
references:
    - https://cyble.com/blog/koxic-ransomware-deep-diveanalysis/
data_sources:
    - process_creation
    - windows
