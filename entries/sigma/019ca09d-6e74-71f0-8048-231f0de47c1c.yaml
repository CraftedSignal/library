id: 019ca09d-6e74-71f0-8048-231f0de47c1c
name: Nemty Ransomware Mutex Detection
description: The rule detects the creation of specific mutexes ('hate' or 'just_a_game') that are known to be associated with Nemty ransomware activity. This detection is based on monitoring process creation events for these particular mutex names.
query: |-
    title: Nemty Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Nemty ransomware activity.
    author: '@adhikara13'
    date: 2024/07/19
    references:
      - 'https://securityaffairs.com/90396/malware/nemty-ransomware.html'
      - 'https://id-ransomware.blogspot.com/2019/08/nemty-ransomware.html'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.nemty'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'hate'
          - 'just_a_game'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.nemty
author: '@adhikara13'
version: "1"
references:
    - https://securityaffairs.com/90396/malware/nemty-ransomware.html
    - https://id-ransomware.blogspot.com/2019/08/nemty-ransomware.html
data_sources:
    - process_creation
    - windows
