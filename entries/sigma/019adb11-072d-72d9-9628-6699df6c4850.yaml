id: 019adb11-072d-72d9-9628-6699df6c4850
name: Suspicious Curl/Wget HTTP Call to Non-RFC1918 Dot-Quad or Hex-Encoded IPv4 Address
description: Detects curl or wget execution where an HTTP/HTTPS URL points directly to a dot-quad IPv4 address or a hex-encoded IPv4 address, excluding RFC1918 private ranges, APIPA, and local loopback. Threat actors commonly use raw or hex IP literals to bypass domain-based filtering and download staged payloads.
query: |
    title: >-
      Suspicious Curl/Wget HTTP Call to Non-RFC1918 Dot-Quad or Hex-Encoded IPv4
      Address
    id: 0c6f5c63-9b2f-4c9a-9a0c-5f8f2c41dd77
    status: experimental
    description: >-
      Detects curl or wget execution where an HTTP/HTTPS URL points directly to a
      dot-quad IPv4 address or a hex-encoded IPv4 address, excluding RFC1918 private
      ranges, APIPA, and local loopback. Threat actors commonly use raw or hex IP
      literals to bypass domain-based filtering and download staged payloads.
    references:
      - https://attack.mitre.org/techniques/T1105/
    tags:
      - attack.t1105
      - attack.command_and_control
      - attack.execution
      - attack.defense_evasion
      - attack.impact
    author: Mengoh
    date: 2025-12-01
    logsource:
      category: process_creation
    detection:
      selection_regex:
        CommandLine|re: |
          (?ix)
          (?:curl|wget) (?:\.exe)?          # curl or wget executable
          .* https?://                    # URL prefix
          (
            (0x[0-9a-f]+|\d{1,3})           # octet 1 (hex or decimal)
            \.
            (0x[0-9a-f]+|\d{1,3})           # octet 2
            \.
            (0x[0-9a-f]+|\d{1,3})           # octet 3
            \.
            (0x[0-9a-f]+|\d{1,3})           # octet 4
          )
      selection_private_ip:
        CommandLine|re: |
          (?ix)
          (?:curl|wget) (?:\.exe)?
          .* https?://
          (
            10\.\d{1,3}\.\d{1,3}\.\d{1,3}                     # RFC1918 10.0.0.0/8
            |
            172\.(1[6-9]|2[0-9]|3[0-1])\.\d{1,3}\.\d{1,3}      # RFC1918 172.16-31
            |
            192\.168\.\d{1,3}\.\d{1,3}                         # RFC1918 192.168/16
            |
            127\.\d{1,3}\.\d{1,3}\.\d{1,3}                     # Loopback 127/8
            |
            169\.254\.\d{1,3}\.\d{1,3}                         # APIPA 169.254/16
          )
      condition: selection_regex and not selection_private_ip
    fields:
      - CommandLine
      - ParentImage
      - Image
      - User
    level: high
query_type: sigma
severity: medium
tactics:
    - TA0011
    - TA0002
    - TA0005
techniques:
    - T1105
tags:
    - attack.t1105
    - attack.command_and_control
    - attack.execution
    - attack.defense_evasion
    - attack.impact
author: Mengoh
version: "2"
references:
    - https://attack.mitre.org/techniques/T1105/
data_sources:
