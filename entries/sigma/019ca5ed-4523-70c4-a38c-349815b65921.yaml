id: 019ca5ed-4523-70c4-a38c-349815b65921
name: Identity Enrichment for RiskyUsers Action Detection
description: |
    Enrichment rule pulling identity details from IdentityInfo table.
    Correlated with AuditLogs via AccountUPN to enrich admin and target
    user identity details including department and job title.
    Used in correlation with Rule 09198296-c7e9-43a7-b85f-6aaa70d281c5
    via correlation rule 5841b08f-f363-4139-a70a-5cc91e13efc3.
    Note: Multiple join fallback logic (by UPN, last name, full name)
    and StrippedAdminName prefix removal are handled natively in KQL.
query: "---\r\ntitle: Identity Enrichment for RiskyUsers Action Detection\r\nauthor: Igor Oliveira (Pr0fiLeRR)\r\nid: bcfe183a-d422-4d3c-ab81-2013e7b54756\r\ndescription: |\r\n  Enrichment rule pulling identity details from IdentityInfo table.\r\n  Correlated with AuditLogs via AccountUPN to enrich admin and target\r\n  user identity details including department and job title.\r\n  Used in correlation with Rule 09198296-c7e9-43a7-b85f-6aaa70d281c5\r\n  via correlation rule 5841b08f-f363-4139-a70a-5cc91e13efc3.\r\n  Note: Multiple join fallback logic (by UPN, last name, full name)\r\n  and StrippedAdminName prefix removal are handled natively in KQL.\r\nstatus: experimental\r\ndate: 2026-02-28\r\nmodified: 2026-02-28\r\nlogsource:\r\n  product: azure\r\n  service: identityinfo\r\ndetection:\r\n  selection:\r\n    AccountUPN|exists: true\r\n    AccountDisplayName|exists: true\r\n    Department|exists: true\r\n  filter_infosec:\r\n    Department: 'Information Security'\r\n  condition: selection and not filter_infosec\r\nfields:\r\n  - AccountUPN\r\n  - AccountDisplayName\r\n  - Department\r\n  - JobTitle\r\nfalsepositives:\r\n  - None\r\nlevel: informational\r\n..."
query_type: sigma
severity: medium
author: Igor Oliveira (Pr0fiLeRR)
version: "1"
data_sources:
    - azure
    - identityinfo
