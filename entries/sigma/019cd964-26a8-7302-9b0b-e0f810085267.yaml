id: 019cd964-26a8-7302-9b0b-e0f810085267
name: Script Self-Parsing Payload Extraction
description: Detects instances where PowerShell is used to read the contents of a batch file (specifically looking for '.cmd' or '.bat' extensions) to extract a payload. This logic focuses on the 'Get-Content' cmdlet being applied to a script file, which is a key component of the campaign's self-parsing and payload extraction mechanism, as seen in the Dead#Vax campaign.
query: |
    title: Script Self-Parsing Payload Extraction
    id: 197ebf5b-f801-4ad4-9ebc-eadc15d7a70f
    status: experimental
    description: Detects instances where PowerShell is used to read the contents of
      a batch file (specifically looking for '.cmd' or '.bat' extensions) to extract
      a payload. This logic focuses on the 'Get-Content' cmdlet being applied to a
      script file, which is a key component of the campaign's self-parsing and
      payload extraction mechanism, as seen in the Dead#Vax campaign.
    author: detections.ai
    references:
      - https://www.securonix.com/blog/deadvax-threat-research-security-advisory/
    date: 2026-03-10
    tags:
      - attack.t1059.003
      - attack.t1140
      - attack.t1027
      - attack.defense_evasion
      - attack.execution
    logsource:
      category: process_creation
      product: windows
    detection:
      selection_process:
        - Image|endswith:
            # Detects common PowerShell executables
            - '\powershell.exe'
            - '\pwsh.exe'
        - OriginalFileName:
            # Catches renamed PowerShell instances
            - 'PowerShell.Exe'
            - 'pwsh.dll'
        - Image|endswith: '\mbs.exe' # Specific renamed binary from Dead#Vax campaign
      selection_get_content:
        CommandLine|contains: 'Get-Content' # Key cmdlet for reading file content
      selection_script_file:
        CommandLine|contains:
          # Looks for batch file extensions in the command line
          - '.cmd'
          - '.bat'
      condition: all of selection_*
    falsepositives:
      - Legitimate administrative or deployment scripts may read the contents of
        other scripts for various purposes.
      - This behavior might be seen in CI/CD pipelines or complex automation
        frameworks. Tuning may be required to exclude known good scripts or parent
        processes associated with such tools.
    level: medium
query_type: sigma
severity: medium
