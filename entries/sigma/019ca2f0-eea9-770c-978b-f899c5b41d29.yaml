id: 019ca2f0-eea9-770c-978b-f899c5b41d29
name: Identity Info Enrichment for Keystone Logon
description: |
    Enrichment rule pulling identity details from IdentityInfo table.
    Correlated with IdentityLogonEvents via AccountObjectId.
    Manager email construction (mgrSplit, ManagerEmail) is handled
    natively in KQL post-conversion.
query: "---\r\ntitle: Identity Info Enrichment for Keystone Logon\r\naythor: Igor Oliveira (Pr0fiLeRR)\r\nid: 2b2fb88a-2c30-4036-b694-88f197b35481\r\ndescription: |\r\n  Enrichment rule pulling identity details from IdentityInfo table.\r\n  Correlated with IdentityLogonEvents via AccountObjectId.\r\n  Manager email construction (mgrSplit, ManagerEmail) is handled\r\n  natively in KQL post-conversion.\r\nstatus: stable\r\ndate: 2026-02-04\r\nlogsource:\r\n  product: microsoft365defender\r\n  category: authentication\r\n  service: identityinfo\r\ndetection:\r\n  selection:\r\n    AccountObjectId|exists: true\r\n  condition: selection\r\nfields:\r\n  - AccountObjectId\r\n  - AccountDisplayName\r\n  - JobTitle\r\n  - Department\r\n  - MailAddress\r\n  - Manager\r\n  - GroupMembership\r\n  - AccountSID\r\n  - AccountUPN\r\nfalsepositives:\r\n  - None\r\nlevel: informational\r\n..."
query_type: sigma
severity: medium
version: "1"
