id: aef04c3b-9516-4c47-9cd8-4f442449bbf1
name: O365 Email Containing Monero Cryptocurrency Information
description: Hunts for Office 365 emails that contain URLs of popular Monero exchanges or keywords related to Monero wallet addresses. This could indicate phishing attempts, scams, or other illicit activities.
query: |
    title: O365 Email Containing Monero Cryptocurrency Information
    id: bb397883-2eff-4f74-ab2d-f264a059da34
    status: experimental
    description: Hunts for Office 365 emails that contain URLs of popular Monero exchanges or keywords related to Monero wallet addresses. This could indicate phishing attempts, scams, or other illicit activities.
    author: detections.ai
    date: 2025-08-18
    tags:
      - attack.t1566
      - attack.initial_access
      - threat_hunt.financial
    logsource:
      product: o365
      service: threat_management
    detection:
      selection_keywords:
        Email.Body|contains:
                # Keywords related to Monero wallets
          - 'monero address'
          - 'xmr address'
          - 'monero wallet'
          - 'xmr wallet'
      selection_urls:
        Url|contains:
                # Popular Monero or privacy coin exchanges
          - 'localmonero.co'
          - 'tradeogre.com'
          - 'bisq.network'
          - 'changenow.io'
          - 'godex.io'
                # General large exchanges where Monero might be traded
          - 'kraken.com'
          - 'binance.com'
          - 'kucoin.com'
      condition: 1 of them
    falsepositives:
      - Legitimate financial newsletters, cryptocurrency-related news, or personal discussions about Monero.
      - Consider filtering results to only include emails from external senders to reduce noise from internal discussions.
    level: medium
query_type: sigma
severity: medium
tactics:
    - TA0001
techniques:
    - T1566
    - T1566.002
tags:
    - attack.t1566
    - attack.initial_access
    - threat_hunt.financial
author: detections.ai
version: "1"
data_sources:
    - o365
    - threat_management
