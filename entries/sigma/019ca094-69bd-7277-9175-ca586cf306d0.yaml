id: 019ca094-69bd-7277-9175-ca586cf306d0
name: AvosLocker Ransomware Mutex Detection
description: This rule detects the creation of specific mutexes known to be associated with AvosLocker ransomware activity. The detection logic looks for processes creating mutexes named 'ievah8eVki3Ho4oo' or 'Cheic0WaZie6zeiy'. The presence of these mutexes indicates a high probability of AvosLocker ransomware execution on a Windows system.
query: |-
    title: AvosLocker Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with AvosLocker ransomware activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://cyble.com/blog/deep-dive-analysis-avoslocker-ransomware/'
      - 'https://www.threatdown.com/blog/avoslocker-enters-the-ransomware-scene-asks-for-partners/'
      - 'https://hatching.io/blog/tt-2021-08-12/'
      - 'https://www.cyfirma.com/research/avoslocker-ransomware-report/'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.avoslocker'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'ievah8eVki3Ho4oo'
          - 'Cheic0WaZie6zeiy'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.avoslocker
author: '@adhikara13'
version: "1"
references:
    - https://cyble.com/blog/deep-dive-analysis-avoslocker-ransomware/
    - https://www.threatdown.com/blog/avoslocker-enters-the-ransomware-scene-asks-for-partners/
    - https://hatching.io/blog/tt-2021-08-12/
    - https://www.cyfirma.com/research/avoslocker-ransomware-report/
data_sources:
    - process_creation
    - windows
