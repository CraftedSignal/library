id: 019ca09b-3ea1-74ef-b5a8-76ea54ee88d5
name: Jason RAT Mutex Detection
description: The rule detects the creation of specific mutex names associated with the Jason RAT malware. It looks for mutexes named 'jason_<uniqueid>'.
query: |-
    title: Jason RAT Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Jason rat activity.
    author: '@adhikara13'
    date: 2024/08/01
    references:
      - 'https://app.any.run/tasks/2852bf84-8870-47b7-828e-8233e55aee54/'
    tags:
      - 'attack.command_and_control.t1219'
      - 'malware.rat.jason'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'jason_<uniqueid>'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0011
techniques:
    - T1219
tags:
    - attack.command_and_control.t1219
    - malware.rat.jason
author: '@adhikara13'
version: "1"
references:
    - https://app.any.run/tasks/2852bf84-8870-47b7-828e-8233e55aee54/
data_sources:
    - process_creation
    - windows
