id: 019b9e60-b139-718a-8102-5e26d6b2e74c
name: Base64-Encoded PowerShell with Network Connection
description: 'Detects PowerShell processes using base64-encoded commands that establish outbound network connections within 5 minutes, indicating potential tool transfer or C2 activity. This rule correlates two base rules: one for base64-encoded PowerShell process creation and another for PowerShell network connections.'
query: "title: Base64-Encoded PowerShell Process\r\nid: a3c5d7e9-4f2b-4a8c-9d1e-6b7c8d9e0f1a\r\nname: base64_powershell_process\r\nstatus: test\r\ndescription: Detects PowerShell processes using base64-encoded commands. This is a base rule for correlation with network activity.\r\nreferences:\r\n    - https://attack.mitre.org/techniques/T1059/001/\r\nauthor: SimSpace\r\ndate: 2026-01-01\r\ntags:\r\n    - attack.execution\r\n    - attack.t1059.001\r\nlogsource:\r\n    category: process_creation\r\n    product: windows\r\ndetection:\r\n    selection:\r\n        Image|endswith: '\\powershell.exe'\r\n        CommandLine|contains:\r\n            - ' -e '\r\n            - ' -enc '\r\n            - ' -encodedcommand '\r\n            - ' -EncodedCommand '\r\n    condition: selection\r\nfalsepositives:\r\n    - Legitimate administrative scripts\r\n    - Software deployment tools\r\nlevel: informational\r\n---\r\ntitle: PowerShell Network Connection\r\nid: 8c9d5e0f-4a3b-4f9c-8d2e-6b7a8c9d0e1f\r\nname: powershell_network_connection\r\nstatus: test\r\ndescription: Detects PowerShell processes establishing outbound network connections.\r\nreferences:\r\n    - https://attack.mitre.org/techniques/T1059/001/\r\nauthor: SimSpace\r\ndate: 2026-01-01\r\ntags:\r\n    - attack.execution\r\n    - attack.t1059.001\r\nlogsource:\r\n    category: network_connection\r\n    product: windows\r\ndetection:\r\n    selection:\r\n        Image|endswith: '\\powershell.exe'\r\n        Initiated: 'true'\r\n    condition: selection\r\nfalsepositives:\r\n    - Legitimate PowerShell scripts making web requests\r\n    - Windows Update or system maintenance\r\nlevel: informational\r\n---\r\ntitle: Base64-Encoded PowerShell with Network Connection\r\nid: 7b8c4d9e-3f2a-4e8b-9c1d-5a6e7f8b9c0d\r\nstatus: test\r\ndescription: Detects PowerShell processes using base64-encoded commands that establish outbound network connections within 5 minutes, indicating potential tool transfer or C2 activity.\r\nreferences:\r\n    - https://attack.mitre.org/techniques/T1105/\r\n    - https://attack.mitre.org/techniques/T1059/001/\r\nauthor: SimSpace\r\ndate: 2026-01-01\r\ntags:\r\n    - attack.command-and-control\r\n    - attack.t1105\r\n    - attack.execution\r\n    - attack.t1059.001\r\nlogsource:\r\n    category: process_creation\r\n    product: windows\r\ndetection:\r\n    selection:\r\n        Image|exists: true\r\n    condition: selection\r\ncorrelation:\r\n    type: temporal\r\n    rules:\r\n        - base64_powershell_process\r\n        - powershell_network_connection\r\n    group-by:\r\n        - ProcessId\r\n    timespan: 2m\r\n    condition:\r\n        gte: 1\r\nfalsepositives:\r\n    - Legitimate administrative tools using encoded PowerShell with network access\r\n    - System management scripts\r\nlevel: high"
