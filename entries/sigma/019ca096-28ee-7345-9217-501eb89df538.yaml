id: 019ca096-28ee-7345-9217-501eb89df538
name: CastleLoader Mutex Detection
description: Detects known mutexes associated with CastleLoader activity. The rule specifically looks for the mutex name '10KCnWHtIoABhkL2Cl3u' during process creation events.
query: |-
    title: CastleLoader Mutex Detection
    status: experimental
    description: Detects known mutexes associated with CastleLoader activity.
    author: '@adhikara13'
    date: 2025/07/29
    references:
      - 'https://app.any.run/tasks/8483dc5f-e69d-4085-8f3f-09702fb60ef9/'
    tags:
      - 'attack.execution.t1204'
      - 'malware.loader.castleloader'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '10KCnWHtIoABhkL2Cl3u'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0002
techniques:
    - T1204
tags:
    - attack.execution.t1204
    - malware.loader.castleloader
author: '@adhikara13'
version: "1"
references:
    - https://app.any.run/tasks/8483dc5f-e69d-4085-8f3f-09702fb60ef9/
data_sources:
    - process_creation
    - windows
