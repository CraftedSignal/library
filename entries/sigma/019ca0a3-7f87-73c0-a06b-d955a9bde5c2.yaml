id: 019ca0a3-7f87-73c0-a06b-d955a9bde5c2
name: Yokai Backdoor Mutex Detection
description: This rule detects the creation of processes that utilize specific mutex names associated with the Yokai backdoor. The detection is based on the presence of the mutex name 'k1tpddvivh74fo1et725okr1c1'. This activity is indicative of the Yokai backdoor running on a system, potentially for persistence or to ensure a single instance of the malware.
query: |-
    title: Yokai Backdoor Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Yokai backdoor activity.
    author: '@adhikara13'
    date: 2024/12/30
    references:
      - 'https://www.ibm.com/think/x-force/hive0154-drops-updated-toneshell-backdoor'
    tags:
      - 'attack.persistence.t1547'
      - 'malware.backdoor.yokai'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'k1tpddvivh74fo1et725okr1c1'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0003
    - TA0004
techniques:
    - T1547
tags:
    - attack.persistence.t1547
    - malware.backdoor.yokai
author: '@adhikara13'
version: "1"
references:
    - https://www.ibm.com/think/x-force/hive0154-drops-updated-toneshell-backdoor
data_sources:
    - process_creation
    - windows
