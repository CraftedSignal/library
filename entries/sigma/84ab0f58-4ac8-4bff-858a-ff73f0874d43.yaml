id: 84ab0f58-4ac8-4bff-858a-ff73f0874d43
name: Silent File Downloads via Curl
description: Detects the use of curl to silently download a file from a remote server, often initiated by a command-line interpreter. This technique is used by adversaries, such as in the Epsilon Red ransomware campaign, to fetch payloads without user interaction.
query: |
    title: Silent File Downloads via Curl
    id: 27bd006e-9c12-4cb4-806d-6f80c447cbc7
    status: experimental
    description: Detects the use of curl to silently download a file from a remote server, often initiated by a command-line interpreter. This technique is used by adversaries, such as in the Epsilon Red ransomware campaign, to fetch payloads without user interaction.
    references:
      - https://www.cloudsek.com/blog/threat-actors-lure-victims-into-downloading-hta-files-using-clickfix-to-spread-epsilon-red-ransomware
    author: detections.ai
    date: 2025-07-26
    tags:
      - attack.command_and_control
      - attack.t1071.001
      - attack.defense_evasion
      - attack.t1027
    logsource:
      category: process_creation
      product: windows
    detection:
      selection_base:
        ParentImage|endswith:  # Checks for common script interpreters as parent
          - '\cmd.exe'
          - '\powershell.exe'
        Image|endswith: '\curl.exe'  # Detects the execution of the curl tool
        CommandLine|contains: 'http'  # Ensures the download is from a web server
      selection_flags_short:
        CommandLine|contains|all:
          - '-s'  # Silent mode flag
          - '-o'  # Output to file flag
      selection_flags_long:
        CommandLine|contains|all:
          - '--silent'  # Silent mode long flag
          - '--output'  # Output to file long flag
      condition: selection_base and (selection_flags_short or selection_flags_long)
    falsepositives:
      - Legitimate administrative scripts executed via cmd or powershell may use curl to download files. Baseline legitimate usage in your environment.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0011
    - TA0005
techniques:
    - T1105
    - T1071.001
    - T1027
tags:
