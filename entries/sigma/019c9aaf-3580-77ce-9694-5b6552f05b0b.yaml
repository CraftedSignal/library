id: 019c9aaf-3580-77ce-9694-5b6552f05b0b
name: Dohdoor DLL Sideloading
description: Detects the execution of legitimate Windows executables from non-standard public directories. This is a technique used by the Dohdoor malware to sideload a malicious DLL (e.g., propsys.dll, batmeter.dll).
query: |
    title: Dohdoor DLL Sideloading
    id: da30562b-e9e4-417d-b47a-8e33d446dcbf
    status: experimental
    description: Detects the execution of legitimate Windows executables from
      non-standard public directories. This is a technique used by the Dohdoor
      malware to sideload a malicious DLL (e.g., propsys.dll, batmeter.dll).
    author: detections.ai
    references:
      - https://blog.talosintelligence.com/new-dohdoor-malware-campaign/
    date: 2026-02-26
    tags:
      - attack.t1574.002
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        # Detects specific legitimate Windows executables known to be abused by Dohdoor
        Image|endswith:
          - '\Fondue.exe'
          - '\mblctr.exe'
          - '\ScreenClippingHost.exe' # These executables are run from non-standard, world-writable directories where the malicious DLL is dropped
        Image|startswith:
          - 'C:\ProgramData\'
          - 'C:\Users\Public\'
      condition: selection
    falsepositives:
      - This activity is highly unusual and is unlikely to be legitimate. However,
        poorly written software installers or custom administrative scripts might
        trigger this rule.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0003
    - TA0004
    - TA0005
techniques:
    - T1574.001
