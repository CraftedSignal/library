id: 019ca095-96bf-735e-8ca5-aeac8a4dfce5
name: BlackSuit Ransomware Mutex Detection
description: The rule detects the creation of specific mutex names associated with BlackSuit ransomware activity. It specifically looks for the mutex 'Global\WLm87eV1oNRx6P3E4Cy9'. The detection is based on process creation events in Windows environments.
query: |-
    title: BlackSuit Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with BlackSuit ransomware activity.
    author: '@adhikara13'
    date: 2025/01/15
    references:
      - 'https://unit42.paloaltonetworks.com/threat-assessment-blacksuit-ransomware-ignoble-scorpius/'
      - 'https://www.trendmicro.com/vinfo/us/threat-encyclopedia/malware/ransom.win32.blacksuit.ypdjb'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.blacksuit'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Global\WLm87eV1oNRx6P3E4Cy9'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.blacksuit
author: '@adhikara13'
version: "1"
references:
    - https://unit42.paloaltonetworks.com/threat-assessment-blacksuit-ransomware-ignoble-scorpius/
    - https://www.trendmicro.com/vinfo/us/threat-encyclopedia/malware/ransom.win32.blacksuit.ypdjb
data_sources:
    - process_creation
    - windows
