id: 019ca09a-3926-744a-8258-34a6b7216888
name: Graven Crypter Mutex Detection
description: This rule detects the creation of specific mutexes known to be associated with the Graven crypter. The detection is based on the exact string match of the mutex name '7ce3e80173264ea19b05306b865eadf9'. The rule targets process creation events on Windows systems.
query: |-
    title: Graven Crypter Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Graven crypter activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://www.ibm.com/think/x-force/itg23-crypters-cooperation-between-cybercriminal-groups'
    tags:
      - 'attack.defense_evasion.t1027'
      - 'malware.crypter.graven'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '7ce3e80173264ea19b05306b865eadf9'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0005
techniques:
    - T1027
tags:
    - attack.defense_evasion.t1027
    - malware.crypter.graven
author: '@adhikara13'
version: "1"
references:
    - https://www.ibm.com/think/x-force/itg23-crypters-cooperation-between-cybercriminal-groups
data_sources:
    - process_creation
    - windows
