id: 019bd6ba-108f-758f-bbb1-eba379082873
name: CScript NTFS Shortname Execution
description: Detects cscript.exe executing a JScript file using a legacy NTFS 8.3 shortname. This is a known technique used by Gootloader during its persistence phase to obfuscate the script's path and name.
query: "title: CScript NTFS Shortname Execution\nid: ddf2cf6f-9fd0-4a7b-aaeb-5ee5f8f7221b\nstatus: experimental\ndescription: Detects cscript.exe executing a JScript file using a legacy NTFS\n  8.3 shortname. This is a known technique used by Gootloader during its\n  persistence phase to obfuscate the script's path and name.\nreferences:\n  - https://expel.com/blog/gootloaders-malformed-zip/\nauthor: tim@detections.ai\ndate: 2026-01-19\ntags:\n  - attack.execution\n  - attack.defense_evasion\n  - attack.t1059.007\n  - attack.t1027.013\nlogsource:\n  category: process_creation\n  product: windows\ndetection:\n  selection:\n    Image|endswith: \n      - '\\cscript.exe' \n      - '\\wscript.exe'\n    # Detects command line arguments like 'WORKWI~1.JS'\n    CommandLine|re: '(?i).*\\s.*~[1-9]\\.js.*'\n  condition: selection\nfalsepositives:\n  - Legitimate legacy scripts or applications might use NTFS 8.3 shortnames,\n    although this is uncommon in modern environments.\nlevel: medium\n"
