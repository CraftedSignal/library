      - cve.2025.32433
      - network.protocol.ssh
      - product.erlang
    logsource:
      category: intrusion_detection_system
    detection:
        # This detection looks for IDS alerts related to the Erlang/OTP SSH vulnerability.
      selection_keywords:
        Signature|contains:
          - 'Erlang OTP SSH'
          - 'CVE-2025-32433'
      selection_pattern:
        Signature|contains:
          - 'Pre-Auth'       # Catches alerts for actions happening before authentication
          - 'Remote Code Execution'
          - 'RCE'
          - 'Connection Protocol Message Before Authentication'
      condition: all of selection_*
    falsepositives:
