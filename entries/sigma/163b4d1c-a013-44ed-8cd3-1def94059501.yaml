name: Erlang/OTP SSH Pre-Authentication RCE Attempt (CVE-2025-32433)
description: Detects attempts to exploit CVE-2025-32433, a remote code execution vulnerability in the Erlang/OTP SSH daemon. The exploit involves sending SSH connection protocol messages (codes >= 80) before authentication is complete.
query: |
    title: Erlang/OTP SSH Pre-Authentication RCE Attempt (CVE-2025-32433)
    id: 12f00439-44b1-4eaa-854f-e2bcea652143
    status: experimental
    description: Detects attempts to exploit CVE-2025-32433, a remote code execution vulnerability in the Erlang/OTP SSH daemon. The exploit involves sending SSH connection protocol messages (codes >= 80) before authentication is complete.
    references:
      - https://unit42.paloaltonetworks.com/erlang-otp-cve-2025-32433/
      - https://nvd.nist.gov/vuln/detail/CVE-2025-32433
