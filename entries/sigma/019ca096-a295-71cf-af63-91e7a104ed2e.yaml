id: 019ca096-a295-71cf-af63-91e7a104ed2e
name: CHIMNEYSWEEP Backdoor Mutex Detection
description: This rule detects the creation of specific mutexes that are known to be associated with the CHIMNEYSWEEP backdoor. The mutex names monitored are 'rerunadmn', 'subttoadmn', 'runupdate', 'runupdateok', 'baserun', 'heyirunadmn', and 'corerun'. Detection of any of these mutexes indicates potential CHIMNEYSWEEP backdoor activity on a Windows system.
query: |-
    title: CHIMNEYSWEEP Backdoor Mutex Detection
    status: experimental
    description: Detects known mutexes associated with CHIMNEYSWEEP backdoor activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://cloud.google.com/blog/topics/threat-intelligence/likely-iranian-threat-actor-conducts-politically-motivated-disruptive-activity-against/'
    tags:
      - 'attack.persistence.t1547'
      - 'malware.backdoor.chimneysweep'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'rerunadmn'
          - 'subttoadmn'
          - 'runupdate'
          - 'runupdateok'
          - 'baserun'
          - 'heyirunadmn'
          - 'corerun'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0003
    - TA0004
techniques:
    - T1547
tags:
    - attack.persistence.t1547
    - malware.backdoor.chimneysweep
author: '@adhikara13'
version: "1"
references:
    - https://cloud.google.com/blog/topics/threat-intelligence/likely-iranian-threat-actor-conducts-politically-motivated-disruptive-activity-against/
data_sources:
    - process_creation
    - windows
