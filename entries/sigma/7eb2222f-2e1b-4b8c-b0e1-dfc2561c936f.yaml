id: 7eb2222f-2e1b-4b8c-b0e1-dfc2561c936f
name: Malicious JavaScript Obfuscation - JSFireTruck Pattern
description: Detects potential malicious JavaScript obfuscated using the JSFireTruck technique, characterized by the repeated use of characters like [], (), !, and +. This rule looks for the presence of multiple distinct characters from the core JSFireTruck set within web response bodies.
query: |-
    title: Malicious JavaScript Obfuscation - JSFireTruck Pattern
    id: a1b2c3d4-e5f6-7890-1234-567890abcdef
    related:
      - https://unit42.paloaltonetworks.com/malicious-javascript-using-jsfiretruck-as-obfuscation/
    status: experimental
    description: Detects potential malicious JavaScript obfuscated using the JSFireTruck technique, characterized by the repeated use of characters like [], (), !, and +. This rule looks for the presence of multiple distinct characters from the core JSFireTruck set within web response bodies.
    references:
      - https://unit42.paloaltonetworks.com/malicious-javascript-using-jsfiretruck-as-obfuscation/
    author: Detections.ai
    date: 2025-06-19
    logsource:
      category: web # Adjust based on your log source (e.g., proxy, waf, nids)
      product: whatever_your_product_is # Placeholder for your specific product/platform
    detection:
      selection:
        # Look for the presence of multiple distinct JSFireTruck characters within the response body field.
        # The core JSFireTruck characters are [], (), !, +.
        # This heuristic relies on the technique's heavy use of these specific characters.
        # Adjust the required count (e.g., 3, 4, 5) based on testing to balance false positives and true positives.
        http.response.body|contains:
          - '['
          - ']'
          - '('
          - ')'
          - '!'
          - '+'
      condition: selection | count(1) >= 4 # Requires at least 4 distinct characters from the list to be present
    fields:
      - http.request.method
      - http.request.url
      - http.response.status_code
      - source.ip
      - destination.ip
      - user.agent
    tags:
      - attack.defense_evasion
      - attack.obfuscation
      - attack.t1027 # Obfuscated Files or Information
      - attack.t1027.002 # Obfuscated Files or Information: Software Packing
      - attack.t1027.006 # Obfuscated Files or Information: HTML Smuggling
      - attack.impact
      - attack.t1189 # Drive-by Compromise
      - attack.t1566 # Phishing
      - attack.t1598 # Phishing
      - attack.t1105 # Ingress Tool Transfer
      - attack.t1204 # User Execution
      - attack.t1071.001 # Application Layer Protocol: Web Protocols
      - malware
      - malvertising
      - phishing
      - javascript
      - obfuscation
      - JSFireTruck
    falsepositives:
      - Legitimate, heavily obfuscated JavaScript using similar, but less common, character sets.
      - Websites with unusual content that coincidentally contains combinations of these characters (less likely with a higher count threshold).
    level: medium
