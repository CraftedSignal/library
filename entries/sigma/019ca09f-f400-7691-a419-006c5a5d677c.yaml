id: 019ca09f-f400-7691-a419-006c5a5d677c
name: Rimawi RAT Mutex Detection
description: The rule detects the creation of specific mutexes associated with the Rimawi RAT. It specifically looks for mutexes named 'AZSXDCFVGBHNqwertyui'. The detection is based on process creation events on Windows systems.
query: |-
    title: Rimawi RAT Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Rimawi rat activity.
    author: '@adhikara13'
    date: 2024/12/19
    references:
      - 'https://tria.ge/240623-ntewrsyhpg/behavioral15'
      - 'https://app.any.run/tasks/eeed2f54-4dbb-43d8-ac4a-5dc3b24c2419'
    tags:
      - 'attack.command_and_control.t1219'
      - 'malware.rat.rimawi'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'AZSXDCFVGBHNqwertyui'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0011
techniques:
    - T1219
tags:
    - attack.command_and_control.t1219
    - malware.rat.rimawi
author: '@adhikara13'
version: "1"
references:
    - https://tria.ge/240623-ntewrsyhpg/behavioral15
    - https://app.any.run/tasks/eeed2f54-4dbb-43d8-ac4a-5dc3b24c2419
data_sources:
    - process_creation
    - windows
