id: 019d0002-d376-7536-94b9-6b015bd30a04
name: LeakNet Deno-Based In-Memory Loader
description: Detects the execution of the Deno runtime with specific command-line arguments used by the LeakNet group to execute a base64-encoded JavaScript payload directly in memory. This "Bring Your Own Runtime" (BYOR) technique helps evade file-based detections.
query: |
    title: LeakNet Deno-Based In-Memory Loader
    description: Detects the execution of the Deno runtime with specific
      command-line arguments used by the LeakNet group to execute a base64-encoded
      JavaScript payload directly in memory. This "Bring Your Own Runtime" (BYOR)
      technique helps evade file-based detections.
    references:
      - https://reliaquest.com/blog/threat-spotlight-casting-a-wider-net-clickfix-deno-and-leaknets-scaling-threat
    author: Akshay Gaikwad
    date: 2026-03-18
    tags:
      - attack.execution
      - attack.defense_evasion
      - attack.t1059.007
      - attack.t1620
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        Image|endswith: '\deno.exe' # Detects the Deno runtime executable.
        CommandLine|contains|all:
          - '-A' # The '-A' or '--allow-all' flag grants all permissions (read, write, net, etc.) to the script.
          - 'data:application/javascript' # Specifies the media type of the data URL, indicating an inline script.
          - 'base64,' # Indicates the following data is a base64 encoded payload.
      condition: selection
    falsepositives:
      - This activity should be investigated to confirm it is not part of a
        legitimate development or deployment process.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0002
    - TA0005
techniques:
    - T1059.007
    - T1620
