id: 019d2698-51b3-762e-97e6-cea93ba96c3c
name: ToastNotify.exe Notification Phishing Dispatch via sendtoast Argument
description: |
    Detects execution of ToastNotify.exe with the sendtoast subcommand, which dispatches a phishing notification with a title and body text using a specified AUMID for impersonation. Review CommandLine for Windows.Defender.SecurityCenter, MSTeams_8wekyb3d8bbwe, or MSEdge to identify the application being impersonated.
query: |
    title: ToastNotify.exe Notification Phishing Dispatch via sendtoast Argument
    id: f4a1b2c3-d4e5-4f67-8901-abcdef123406
    status: experimental
    description: >
        Detects execution of ToastNotify.exe with the sendtoast subcommand, which dispatches
        a phishing notification with a title and body text using a specified AUMID for
        impersonation. Review CommandLine for Windows.Defender.SecurityCenter,
        MSTeams_8wekyb3d8bbwe, or MSEdge to identify the application being impersonated.
    references:
