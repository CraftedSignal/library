id: 019ca09b-edef-71bc-ae80-e2e57e655fe3
name: Leprechaun Loader Mutex Detection
description: The rule detects the creation of processes that utilize specific mutex names known to be associated with the Leprechaun loader. Specifically, it looks for the mutex name 'LeprechaunHvnc'. This indicates potential execution or activity of the Leprechaun malware loader on a Windows system.
query: |-
    title: Leprechaun Loader Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Leprechaun loader activity.
    author: '@adhikara13'
    date: 2024/12/19
    references:
      - 'https://gurucul.com/blog/leprechaun-a-new-malware-loader/'
    tags:
      - 'attack.execution.t1204'
      - 'malware.loader.leprechaun'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'LeprechaunHvnc'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0002
techniques:
    - T1204
tags:
    - attack.execution.t1204
    - malware.loader.leprechaun
author: '@adhikara13'
version: "1"
references:
    - https://gurucul.com/blog/leprechaun-a-new-malware-loader/
data_sources:
    - process_creation
    - windows
