id: 019d0d37-f911-7795-9b9b-809a95dc10b6
name: Msiexec Remote Supabase Download
description: Detects the execution of msiexec.exe to download and install a remote MSI payload from Supabase cloud storage. This technique is known to be used by the Warlock ransomware group to silently deploy the Velociraptor C&C framework while evading network detections.
query: |
    title: Msiexec Remote Supabase Download
    id: 5b77bd09-8ab4-49b4-a94c-d4a351c54199
    status: experimental
    description: Detects the execution of msiexec.exe to download and install a
      remote MSI payload from Supabase cloud storage. This technique is known to be
      used by the Warlock ransomware group to silently deploy the Velociraptor C&C
      framework while evading network detections.
    author: detections.ai
    references:
      - https://www.trendmicro.com/en_us/research/26/c/dissecting-a-warlock-attack.html
    date: 2026-03-20
    tags:
      - attack.execution
      - attack.defense-evasion
      - attack.t1218.007
    logsource:
      category: process_creation
      product: windows
    detection:
      # Target the Windows Installer process
      selection_img:
        - Image|endswith: '\msiexec.exe'
        - OriginalFileName: 'msiexec.exe'
      # Detect remote URL structures pointing to Supabase storage for an MSI payload
      selection_cmd:
        CommandLine|contains|all:
          - '://'
          - '.supabase.co/storage/'
          - '.msi'
      condition: selection_img and selection_cmd
    falsepositives:
      - Legitimate remote installations of administrative tools or software hosted
        on Supabase. Filter by specific parent processes or known benign hashes/URLs
        if false alerts occur.
    level: high
query_type: sigma
severity: high
