id: 019ca0a3-18e8-757b-abd6-1ae1cd29ce8f
name: XenoStealer Mutex Detection
description: This rule detects the creation of processes that utilize specific mutex names associated with XenoStealer malware. The detection is based on the presence of the mutex 'aMdFrsHoGcGgAKUyLCoEIuoHpvwCAzaz', which is a known indicator of XenoStealer activity. This activity falls under the 'process_creation' category within Windows environments.
query: |-
    title: XenoStealer Mutex Detection
    status: experimental
    description: Detects known mutexes associated with XenoStealer activity.
    author: '@adhikara13'
    date: 2025/07/30
    references:
      - 'https://www.huorong.cn/document/tech/vir_report/1833'
    tags:
      - 'attack.credential_access.t1555'
      - 'malware.stealer.xenostealer'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'aMdFrsHoGcGgAKUyLCoEIuoHpvwCAzaz'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0006
techniques:
    - T1555
tags:
    - attack.credential_access.t1555
    - malware.stealer.xenostealer
author: '@adhikara13'
version: "1"
references:
    - https://www.huorong.cn/document/tech/vir_report/1833
data_sources:
    - process_creation
    - windows
