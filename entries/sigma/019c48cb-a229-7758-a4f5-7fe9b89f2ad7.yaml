id: 019c48cb-a229-7758-a4f5-7fe9b89f2ad7
name: Notepad++ Supply Chain C2 Signaling Via User-Agent
description: Detects anomalous network traffic where the User-Agent header contains a URL pointing to 'temp.sh'. This technique was used in the Notepad++ supply chain attack to exfiltrate system information and signal the C2 server.
query: |
    title: Notepad++ Supply Chain C2 Signaling Via User-Agent
    id: 29053eb3-958f-473d-aec1-49af0f528201
    status: experimental
    description: >-
      Detects anomalous network traffic where the User-Agent header contains a URL
      pointing to 'temp.sh'. This technique was used in the Notepad++ supply chain
      attack to exfiltrate system information and signal the C2 server.
    references:
      - https://securelist.com/notepad-supply-chain-attack/118708/
    author: Aaron Mog - detections.ai
    date: 2026-02-10T00:00:00.000Z
    tags:
      - attack.t1071.001
      - attack.t1041
    logsource:
      category: network_connection
    detection:
      selection:
        http.host: temp.sh
        http.user_agent|startswith: https://temp.sh/
      condition: selection
    falsepositives:
      - Custom applications or scripts that interact with temp.sh in a non-standard
        way could potentially trigger this rule, but this is unlikely.
    level: high
query_type: sigma
severity: high
