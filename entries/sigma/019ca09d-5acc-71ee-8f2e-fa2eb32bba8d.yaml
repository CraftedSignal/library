id: 019ca09d-5acc-71ee-8f2e-fa2eb32bba8d
name: Nefilim Ransomware Mutex Detection
description: 'The rule detects the creation of specific mutexes known to be associated with Nefilim ransomware activity. It looks for two distinct mutex names: ''ONA MOYA ROZA I YA EE LUBLUUUUUUUU, ONA MOYA DOZA - SEGODNYA ZATYANU'' and ''Den''gi plyvut v karmany rekoy. My khodim po krayu nozha...''. The detection is triggered when a process creates a mutex with either of these names.'
query: |-
    title: Nefilim Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Nefilim ransomware activity.
    author: '@adhikara13'
    date: 2024/08/01
    references:
      - 'https://www.trendmicro.com/vinfo/us/threat-encyclopedia/malware/ransom.win32.nefilim.g'
      - 'https://blog.qualys.com/vulnerabilities-threat-research/2021/05/12/nefilim-ransomware'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.nefilim'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'ONA MOYA ROZA I YA EE LUBLUUUUUUUU, ONA MOYA DOZA - SEGODNYA ZATYANU'
          - 'Den''gi plyvut v karmany rekoy. My khodim po krayu nozha...'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.nefilim
author: '@adhikara13'
version: "1"
references:
    - https://www.trendmicro.com/vinfo/us/threat-encyclopedia/malware/ransom.win32.nefilim.g
    - https://blog.qualys.com/vulnerabilities-threat-research/2021/05/12/nefilim-ransomware
data_sources:
    - process_creation
    - windows
