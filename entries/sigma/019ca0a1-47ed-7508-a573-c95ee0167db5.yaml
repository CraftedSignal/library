id: 019ca0a1-47ed-7508-a573-c95ee0167db5
name: StarCat Ransomware Mutex Detection
description: The rule detects the creation of specific mutexes associated with StarCat ransomware. It looks for a mutex named 'start_cat_encrypt'. The presence of this mutex indicates potential StarCat ransomware activity on a Windows system.
query: |-
    title: StarCat Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with StarCat ransomware activity.
    author: '@adhikara13'
    date: 2024/12/15
    references:
      - 'https://tria.ge/241215-jkxb8szkhq/behavioral2/analog?main_event=Mutex&q=start_cat_encrypt'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.starcat'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'start_cat_encrypt'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.starcat
author: '@adhikara13'
version: "1"
references:
    - https://tria.ge/241215-jkxb8szkhq/behavioral2/analog?main_event=Mutex&q=start_cat_encrypt
data_sources:
    - process_creation
    - windows
