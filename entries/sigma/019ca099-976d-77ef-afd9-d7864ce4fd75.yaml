id: 019ca099-976d-77ef-afd9-d7864ce4fd75
name: FFDroider Stealer Mutex Detection
description: The rule detects known mutexes associated with FFDroider stealer activity. Specifically, it looks for the mutex name '37238328-1324242-5456786-8fdff0-67547552436675' during process creation events on Windows systems.
query: |-
    title: FFDroider Stealer Mutex Detection
    status: experimental
    description: Detects known mutexes associated with FFDroider stealer activity.
    author: '@adhikara13'
    date: 2024/07/19
    references:
      - 'https://www.zscaler.com/blogs/security-research/ffdroider-stealer-targeting-social-media-platform-users'
    tags:
      - 'attack.credential_access.t1555'
      - 'malware.stealer.ffdroider'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '37238328-1324242-5456786-8fdff0-67547552436675'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0006
techniques:
    - T1555
tags:
    - attack.credential_access.t1555
    - malware.stealer.ffdroider
author: '@adhikara13'
version: "1"
references:
    - https://www.zscaler.com/blogs/security-research/ffdroider-stealer-targeting-social-media-platform-users
data_sources:
    - process_creation
    - windows
