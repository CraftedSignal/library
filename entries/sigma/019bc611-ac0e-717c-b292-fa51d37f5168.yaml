id: 019bc611-ac0e-717c-b292-fa51d37f5168
name: Equation Editor Spawning Shell
description: Detects the Microsoft Equation Editor (EQNEDT32.EXE) spawning a shell process. This behavior is highly anomalous and is a strong indicator of exploitation of vulnerabilities like CVE-2017-11882, as seen in a Remcos RAT campaign.
query: "title: Equation Editor Spawning Shell\r\nid: 0e98b92d-b8aa-4632-8831-bd74c6406a1f\r\nstatus: experimental\r\ndescription: Detects the Microsoft Equation Editor (EQNEDT32.EXE) spawning a\r\n  shell process. This behavior is highly anomalous and is a strong indicator of\r\n  exploitation of vulnerabilities like CVE-2017-11882, as seen in a Remcos RAT\r\n  campaign.\r\nreferences:\r\n  - https://www.fortinet.com/blog/threat-research/new-remcos-campaign-distributed-through-fake-shipping-document\r\nauthor: vexalius\r\ndate: 2026-01-16\r\ntags:\r\n  - attack.execution\r\n  - attack.t1203\r\n  - attack.t1059\r\n  - cve.2017.11882\r\nlogsource:\r\n  category: process_creation\r\n  product: windows\r\ndetection:\r\n  selection_parent:\r\n    ParentImage|endswith: '\\EQNEDT32.EXE' # Parent process is the Equation Editor\r\n  selection_child:\r\n    Image|endswith:\r\n      # Child process is a command-line interpreter\r\n      - '\\powershell.exe'\r\n      - '\\cmd.exe'\r\n      - '\\wscript.exe'\r\n  condition: all of selection_*\r\nfalsepositives:\r\n  - Legitimate use of Equation Editor should not spawn these processes. Any hits\r\n    are highly suspicious and should be investigated.\r\nlevel: high\r\n"
