id: 019ca097-88de-705a-acba-9c857f239c6b
name: Cybergate RAT Mutex Detection
description: This rule detects the creation of specific mutexes known to be associated with Cybergate RAT activity. The detection is based on a predefined list of mutex names, including '***MUTEX***_SAIR', 'SPY_NET_RATMUTEX', '_x_X_PASSWORDLIST_X_x_', '_x_X_BLOCKMOUSE_X_x_', 'xX_PROXY_SERVER_Xx', and '_x_X_UPDATE_X_x_'. The presence of any of these mutexes indicates potential Cybergate RAT infection or activity on a Windows system.
query: |-
    title: Cybergate RAT Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Cybergate rat activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://blog.talosintelligence.com/threat-roundup-0414-0421/'
      - 'https://blog.cyber5w.com/cybergate-malware-analysis'
    tags:
      - 'attack.command_and_control.t1219'
      - 'malware.rat.cybergate'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '***MUTEX***_SAIR'
          - 'SPY_NET_RATMUTEX'
          - '_x_X_PASSWORDLIST_X_x_'
          - '_x_X_BLOCKMOUSE_X_x_'
          - 'xX_PROXY_SERVER_Xx'
          - '_x_X_UPDATE_X_x_'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0011
techniques:
    - T1219
tags:
    - attack.command_and_control.t1219
    - malware.rat.cybergate
author: '@adhikara13'
version: "1"
references:
    - https://blog.talosintelligence.com/threat-roundup-0414-0421/
    - https://blog.cyber5w.com/cybergate-malware-analysis
data_sources:
    - process_creation
    - windows
