id: 019ca09a-8e21-7403-95b6-aa2383334576
name: Gunra Ransomware Mutex Detection
description: The rule detects the creation of specific mutexes known to be associated with the Gunra ransomware. It looks for the mutex name 'kjsidugiaadf99439' during process creation events on Windows systems. The presence of this mutex indicates potential Gunra ransomware activity, which typically involves encrypting files and demanding a ransom, falling under the impact category of data encryption.
query: |-
    title: Gunra Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Gunra ransomware activity.
    author: '@adhikara13'
    date: 2025/07/12
    references:
      - 'https://github.com/TheRavenFile/Daily-Hunt/blob/main/Gunra%20Ransomware'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.gunra'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'kjsidugiaadf99439'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.gunra
author: '@adhikara13'
version: "1"
references:
