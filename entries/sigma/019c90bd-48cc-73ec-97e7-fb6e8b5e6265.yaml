id: 019c90bd-48cc-73ec-97e7-fb6e8b5e6265
name: WebView2 Accessing AI Webchat Domains From Unusual Parent
description: Detects `msedgewebview2.exe` connecting to Grok/Copilot when the parent is not a browser/Office app, matching the AI-in-the-middle C2 proxy technique.
query: |
    title: WebView2 Accessing AI Webchat Domains From Unusual Parent
    id: 7cc7b9e1-6a0e-4d28-a2f5-3e3d1dd58a0c
    status: experimental
    description: >-
      Detects `msedgewebview2.exe` connecting to Grok/Copilot when the parent is not
      a browser/Office app, matching the AI-in-the-middle C2 proxy technique.
    author: Daniel Jeremiah
    date: 2026-02-24T00:00:00.000Z
    references:
      - >-
        https://research.checkpoint.com/2026/ai-in-the-middle-turning-web-based-ai-services-into-c2-proxies-the-future-of-ai-driven-attacks/
    logsource:
      product: windows
      category: network_connection
    detection:
      selection_proc:
        Image|endswith: \msedgewebview2.exe
      selection_domain:
        DestinationHostname:
          - grok.com
          - copilot.microsoft.com
      filter_common_parents:
        ParentImage|endswith:
          - \msedge.exe
          - \chrome.exe
          - \firefox.exe
          - \Teams.exe
          - \OUTLOOK.EXE
          - \WINWORD.EXE
          - \EXCEL.EXE
          - \POWERPNT.EXE
      condition: selection_proc and selection_domain and not filter_common_parents
    falsepositives:
      - Legitimate applications embedding WebView2 for AI features (tune parent
        allowlist to your environment)
    level: medium
    tags:
      - attack.command_and_control
      - attack.defense_evasion
query_type: sigma
severity: medium
tactics:
    - TA0011
    - TA0005
techniques:
    - T1071.001
    - T1572
