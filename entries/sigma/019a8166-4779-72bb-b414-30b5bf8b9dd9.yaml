id: 019a8166-4779-72bb-b414-30b5bf8b9dd9
name: Contagious Interview Malware Delivery via JSON Storage Services
description: Detects network connections from Node.js to specific JSON storage services known to be abused by the 'Contagious Interview' campaign. Threat actors host malicious code on these services, which is then fetched and executed by trojanized applications as part of a social engineering scheme.
query: |
    title: Contagious Interview Malware Delivery via JSON Storage Services
    id: 5d22d310-d8a9-404c-9912-c52bc1dd822e
    status: experimental
    description: >-
      Detects network connections from Node.js to specific JSON storage services
      known to be abused by the 'Contagious Interview' campaign. Threat actors host
      malicious code on these services, which is then fetched and executed by
      trojanized applications as part of a social engineering scheme.
    references:
      - >-
        https://blog.nviso.eu/2025/11/13/contagious-interview-actors-now-utilize-json-storage-services-for-malware-delivery/
    author: detections.ai
    date: 2025-11-14T00:00:00.000Z
    tags:
      - attack.t1105
      - attack.t1071.001
      - attack.t1204.002
      - attack.t1059.007
      - detection.emerging-threats
    logsource:
      category: network_connection
      product: windows
      service: sysmon
    detection:
      selection:
        Image|endswith: \node.exe
        DestinationHostname|endswith:
          - jsonkeeper.com
          - api.jsonsilo.com
          - api.npoint.io
      condition: selection
    falsepositives:
      - Legitimate use of these JSON storage services by developers for testing or
        small projects may trigger this rule. Consider tuning by filtering for
        specific developer workstations or projects if false positives occur.
    level: medium
query_type: sigma
severity: medium
