id: 019ca0a2-0066-71b3-b1a3-1f7f1f23a55b
name: Toneshell Backdoor Mutex Detection
description: This rule detects the creation of specific mutexes known to be associated with the Toneshell backdoor. The rule looks for mutex names 'Fool87012900137' or 'Global\SingleCorporation12AD8B' during process creation events on Windows systems.
query: |-
    title: Toneshell Backdoor Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Toneshell backdoor activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://www.ibm.com/think/x-force/hive0154-targeting-us-philippines-pakistan-taiwan'
      - 'https://intezer.com/blog/frankenstein-variant-of-the-toneshell-backdoor-targeting-myanmar/'
    tags:
      - 'attack.persistence.t1547'
      - 'malware.backdoor.toneshell'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Fool87012900137'
          - 'Global\SingleCorporation12AD8B'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0003
    - TA0004
techniques:
    - T1547
tags:
    - attack.persistence.t1547
    - malware.backdoor.toneshell
author: '@adhikara13'
version: "1"
references:
    - https://www.ibm.com/think/x-force/hive0154-targeting-us-philippines-pakistan-taiwan
    - https://intezer.com/blog/frankenstein-variant-of-the-toneshell-backdoor-targeting-myanmar/
data_sources:
    - process_creation
    - windows
