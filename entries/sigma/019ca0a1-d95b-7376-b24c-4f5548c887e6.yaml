id: 019ca0a1-d95b-7376-b24c-4f5548c887e6
name: TinyNote Backdoor Mutex Detection
description: This rule detects the creation of specific mutexes associated with the TinyNote backdoor. The detection is triggered when a process creates a mutex named 'NASA&USA'. This activity is indicative of TinyNote backdoor persistence or execution on a Windows system.
query: |-
    title: TinyNote Backdoor Mutex Detection
    status: experimental
    description: Detects known mutexes associated with TinyNote backdoor activity.
    author: '@adhikara13'
    date: 2025/01/15
    references:
      - 'https://research.checkpoint.com/2023/malware-spotlight-camaro-dragons-tinynote-backdoor'
    tags:
      - 'attack.persistence.t1547'
      - 'malware.backdoor.tinynote'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'NASA&USA'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0003
    - TA0004
techniques:
    - T1547
tags:
    - attack.persistence.t1547
    - malware.backdoor.tinynote
author: '@adhikara13'
version: "1"
references:
    - https://research.checkpoint.com/2023/malware-spotlight-camaro-dragons-tinynote-backdoor
data_sources:
    - process_creation
    - windows
