id: 019d2006-ab60-7086-8168-a74435f5b561
name: Suspicious Authentication via Synthetic iOS Safari User Agent
description: Detects authentication attempts utilizing a specific synthetic mobile user agent (iOS 18 paired with Safari Version/26.x) observed in the EvilTokens device code phishing campaign. Version 26 does not exist on iOS 18.
query: |
    title: Suspicious Authentication via Synthetic iOS Safari User Agent
    id: b8f7486c-bc04-4897-9f75-4e3c4eaabc64
    status: experimental
    description: Detects authentication attempts utilizing a specific synthetic
      mobile user agent (iOS 18 paired with Safari Version/26.x) observed in the
      EvilTokens device code phishing campaign. Version 26 does not exist on iOS 18.
    author: tim@detections.ai
    references:
      - https://www.huntress.com/blog/railway-paas-m365-token-replay-campaign
    date: 2026-03-24
    tags:
      - attack.ta0005
      - attack.t1036.004
    logsource:
      product: azure
      category: signin
    detection:
      selection:
        UserAgent|contains|all:
          - 'OS 18'
          - 'Version/26'
      condition: selection
    falsepositives:
      - Minimal, as this is a synthetically generated, mismatched user agent string.
      - If false positives do occur from security scanners, consider tuning by
        restricting the logic to originate only from known cloud provider IP ranges
        (e.g., Railway PaaS).
    level: high
query_type: sigma
severity: high
