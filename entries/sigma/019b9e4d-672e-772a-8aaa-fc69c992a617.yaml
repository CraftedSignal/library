id: 019b9e4d-672e-772a-8aaa-fc69c992a617
name: Encoded PowerShell Command in Registry Value
description: Detects registry values containing Base64-encoded PowerShell commands. Attackers use this technique to obfuscate malicious commands in the registry for persistence or execution.
query: |
    title: Encoded PowerShell Command in Registry Value
    id: 36d69345-451c-410f-ae8d-ad8d813188ed
    status: test
    description: >-
      Detects registry values containing Base64-encoded PowerShell commands.
      Attackers use this technique to obfuscate malicious commands in the registry
      for persistence or execution.
    references:
      - https://attack.mitre.org/techniques/T1548/002/
      - https://attack.mitre.org/techniques/T1112/
      - https://attack.mitre.org/techniques/T1027/
    author: SimSpace
    date: 2026-01-01T00:00:00.000Z
    tags:
      - attack.privilege-escalation
      - attack.t1548.002
      - attack.defense-evasion
      - attack.t1112
      - attack.t1027
    logsource:
      category: registry_set
      product: windows
    detection:
      selection_powershell:
        Details|contains: powershell
      selection_encoded:
        Details|contains:
          - ' -e '
          - ' -enc '
          - ' -encoded'
          - ' -en '
      condition: selection_powershell and selection_encoded
    falsepositives:
      - Legitimate software using encoded PowerShell for configuration
    level: high
query_type: sigma
severity: medium
tactics:
    - TA0004
    - TA0005
    - TA0003
    - TA0002
techniques:
    - T1548.002
    - T1112
    - T1027
    - T1059.001
