id: 019ca09e-f011-771e-9d79-b2f3033dc75f
name: Prysmax Stealer Mutex Detection
description: This rule detects the creation of a specific mutex named 'Global\PrysmaxSingleInstanceMutex'. This mutex is known to be associated with the Prysmax stealer malware. The presence of this mutex indicates potential Prysmax stealer activity on the system.
query: |-
    title: Prysmax Stealer Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Prysmax stealer activity.
    author: '@adhikara13'
    date: 2024/08/01
    references:
      - 'https://tria.ge/250523-p83f2sdq2x/behavioral1/analog?main_event=Mutex&q=PrysmaxSingleInstanceMutex'
      - 'https://app.any.run/tasks/79a8e967-de3b-41ff-bc8d-0d50cce834fa/'
    tags:
      - 'attack.credential_access.t1555'
      - 'malware.stealer.prysmax'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Global\PrysmaxSingleInstanceMutex'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0006
techniques:
    - T1555
tags:
    - attack.credential_access.t1555
    - malware.stealer.prysmax
author: '@adhikara13'
version: "1"
references:
