id: 0199a629-9662-749d-884d-fabaa225d5f5
name: VMware Service Discovery Suspicious Binary Execution (CVE-2025-41244)
description: |
    Detects potential exploitation of CVE-2025-41244, a local privilege escalation vulnerability in VMware Tools and Aria Operations.
    An attacker can stage a malicious binary in a world-writable directory (e.g., /tmp) which is then executed with root privileges by the VMware service discovery mechanism when it attempts to determine the binary's version.
query: |
    title: VMware Service Discovery Suspicious Binary Execution (CVE-2025-41244)
    id: f3834429-e271-43b3-9990-1d030a8206cf
    status: experimental
    description: |
      Detects potential exploitation of CVE-2025-41244, a local privilege escalation vulnerability in VMware Tools and Aria Operations.
      An attacker can stage a malicious binary in a world-writable directory (e.g., /tmp) which is then executed with root privileges by the VMware service discovery mechanism when it attempts to determine the binary's version.
    references:
      - https://blog.nviso.eu/2025/09/29/you-name-it-vmware-elevates-it-cve-2025-41244/
    author: Aaron Mog - detections.ai
    date: 2025-10-02
    tags:
      - attack.privilege_escalation
      - attack.t1068
      - attack.t1036.005
      - cve.2025.41244
    logsource:
      category: process_creation
      product: linux
    detection:
      selection_parent:
        # Identifies the parent process as a VMware service discovery script runner
        ParentImage|endswith: '/sh'
        ParentCommandLine|contains:
          - 'get-versions.sh' # Credential-less service discovery script
          - '/tmp/VMware-SDMP-Scripts' # Credential-based service discovery script
      selection_child:
        # Identifies a suspicious child process executed with root privileges from a world-writable directory
        User: 'root'
        Image|startswith:
          - '/tmp/'
          - '/var/tmp/'
          - '/dev/shm/'
        Image|endswith:
          # Binaries that can be targeted by the vulnerable regex patterns
          - '/httpd'
          - '/httpd-prefork'
          - '/httpd2-prefork'
          - '/mysqld'
          - '/nginx'
          - '/vmware-dr'
          - '/dataserver'
        CommandLine|contains:
          # Version flags used to trigger the execution
          - ' -v'
          - ' -V'
          - ' --version'
      condition: selection_parent and selection_child
    falsepositives:
      - Legitimate custom scripts run by VMware tools could potentially trigger this
        rule, although it is unlikely they would execute binaries from
        world-writable directories with these specific names and arguments.
      - If false positives occur, consider adding more specific paths or excluding
        legitimate binaries if necessary.
    level: high
    associated_cves:
      - CVE-2025-41244
query_type: sigma
severity: high
