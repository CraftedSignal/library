id: 9f62353a-2036-4bd8-a4e2-7ba4ad04ac3a
name: KimJongRAT Initial Execution and Stealer Activity
description: Detects initial execution patterns and stealer activities used by KimJongRAT PE and PowerShell variants, including LNK/HTA execution, certutil decoding, rundll32 execution, and PowerShell-based data collection.
query: |
    title: KimJongRAT Initial Execution and Stealer Activity
    id: 8d1f2a3b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
    related:
      - https://unit42.paloaltonetworks.com/kimjongrat-stealer-variant-powershell/
    status: experimental
    description: Detects initial execution patterns and stealer activities used by
      KimJongRAT PE and PowerShell variants, including LNK/HTA execution, certutil
      decoding, rundll32 execution, and PowerShell-based data collection.
    author: "Detections.ai  - Hunter"
    date: 2025-06-28
    logsource:
      category: process_creation
      product: windows
    detection:
      # Condition 1a: Initial LNK execution leading to HTA download via curl.exe
      hta_download_curl:
        ParentImage|endswith: '\cmd.exe'
        Image|endswith: '\curl.exe'
        CommandLine|all:
          - 'http'
          - '.hta'
          - '%temp%'

      # Condition 1b: Initial LNK execution leading to HTA download via powershell.exe (Invoke-WebRequest)
      hta_download_powershell:
        ParentImage|endswith: '\powershell.exe'
        Image|endswith: '\powershell.exe'
        CommandLine|all:
          - 'Invoke-WebRequest'
          - 'http'
          - '.hta'
          - '%temp%'

      # Condition 2: Direct HTA execution (often from the downloaded HTA)
      direct_hta_execution:
        Image|endswith: '\mshta.exe'
        CommandLine|contains: '.hta'

      # Condition 3: HTA spawning certutil.exe for decoding embedded payloads
      hta_certutil_decode:
        ParentImage|endswith: '\mshta.exe'
        Image|endswith: '\certutil.exe'
        CommandLine|contains:
          - '-decode'
          - 'decodehex'

      # Condition 4: HTA spawning rundll32.exe to execute a dropped DLL (e.g., sys.dll with 's' export)
      hta_rundll32_dll_execution:
        ParentImage|endswith: '\mshta.exe'
        Image|endswith: '\rundll32.exe'
        CommandLine|contains:
          - '.dll,s' # Specific export function 's' mentioned for sys.dll
          - '%localappdata%'
          - '%temp%'

      # Condition 5: PowerShell stealer specific command line patterns indicating data collection/exfiltration
      powershell_stealer_behavior:
        Image|endswith: '\powershell.exe'
        CommandLine|all:
          # All these must be present for high fidelity
          - 'Invoke-Expression'
          - 'FromBase64String'
        CommandLine|contains:
          # At least one of these must be present
          - 'Compress-Archive'
          - 'micro.log.zip'
          - 'pipe.zip'
          - 'Login Data' # Indicates browser data theft
          - 'Web Data'
          - 'Cookies'
          - 'key4.db' # Firefox specific
          - 'key3.db' # Firefox specific
          - 'logins.json' # Firefox specific
          - 'extensions.txt' # List of browser extensions

      condition: 1 of hta_download_curl or 1 of hta_download_powershell or 1 of
        direct_hta_execution or 1 of hta_certutil_decode or 1 of
        hta_rundll32_dll_execution or 1 of powershell_stealer_behavior
    falsepositives:
      - Legitimate administrative scripts or software installers that use similar
        techniques (e.g., downloading HTA, using certutil for decoding, or
        PowerShell for archiving).
      - Developers or IT staff using `certutil` or `mshta` for legitimate purposes.
      - Legitimate PowerShell scripts that compress archives or process browser data
        (less common in this specific combination).
    level: high
    tags:
      - attack.initial_access
      - attack.execution
      - attack.defense_evasion
      - attack.collection
      - attack.t1566.001 # Phishing: Spearphishing Attachment
      - attack.t1204.002 # User Execution: Malicious File
      - attack.t1059.001 # PowerShell
      - attack.t1059.005 # Visual Basic
      - attack.t1218.001 # Signed Binary Proxy Execution: Compiled HTML File
      - attack.t1218.005 # Signed Binary Proxy Execution: Mshta
      - attack.t1218.011 # Signed Binary Proxy Execution: Rundll32
      - attack.t1027 # Obfuscated Files or Information
      - attack.t1036.003 # Masquerading: Rename System Utilities
      - attack.t1070.004 # File Deletion
      - attack.t1497.001 # Virtualization/Sandbox Evasion: System Checks
      - attack.t1082 # System Information Discovery
      - attack.t1083 # File and Directory Discovery
      - attack.t1539 # Steal Web Session Cookie
      - attack.t1555.003 # Credentials from Web Browsers
      - attack.t1115 # Clipboard Data
      - attack.t1056.001 # Input Capture: Keylogging
      - attack.t1071.001 # Application Layer Protocol: Web Protocols
      - attack.t1105 # Ingress Tool Transfer
      - attack.t1041 # Exfiltration Over C2 Channel
    references:
      - https://unit42.paloaltonetworks.com/kimjongrat-stealer-variant-powershell/
