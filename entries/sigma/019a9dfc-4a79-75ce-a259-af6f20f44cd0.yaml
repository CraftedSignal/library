id: 019a9dfc-4a79-75ce-a259-af6f20f44cd0
name: Suspicious VBScript DNS Query to AI API Domains
description: Detects Windows VBScript processes (wscript.exe or cscript.exe) performing DNS queries for AI/LLM API domains. This behavior is a key indicator of malware like PROMPTFLUX and WormGPT, which leverage these APIs for dynamic code generation and evasion. This activity is highly suspicious as VBScript engines rarely perform external network operations to these types of services. Sysmon event id 22 is the best way to detect this behavior on endpoints.
query: |
    title: Suspicious VBScript DNS Query to AI API Domains
    id: 9fea6907-8313-4d47-a371-38d614a16598
    status: experimental
    description: >-
      Detects Windows VBScript processes (wscript.exe or cscript.exe) performing DNS
      queries for AI/LLM API domains. This behavior is a key indicator of malware
      like PROMPTFLUX and WormGPT, which leverage these APIs for dynamic code
      generation and evasion. This activity is highly suspicious as VBScript engines
      rarely perform external network operations to these types of services. Sysmon
      event id 22 is the best way to detect this behavior on endpoints.
    references:
      - https://cloud.google.com/blog/topics/threat-intelligence/threat-actor-usage-of-ai-tools
      - https://thehackernews.com/2025/11/google-uncovers-promptflux-malware-that.html
      - https://cyberpress.org/promptflux-malware/
      - https://github.com/bobby-tablez/FT-Sysmon-Config
    author: detections.ai
    date: 2025-11-19
    tags:
      - attack.command_and_control
      - attack.t1071.001
      - attack.defense_evasion
      - attack.t1027
    logsource:
      category: dns_query
      product: windows
    detection:
      # Detects VBScript execution hosts
      selection_process:
        Image|endswith:
          - '\wscript.exe'
          - '\cscript.exe'
      # Detects DNS queries to common AI/LLM API domains
      selection_domain:
        QueryName|endswith:
          - '.googleapis.com' # Google APIs (Gemini)
          - '.openai.com' # OpenAI
          - '.anthropic.com' # Anthropic (Claude)
          - '.x.ai' # xAI (Grok)
          - '.mistral.ai' # Mistral
          - '.cohere.ai' # Cohere
          - '.huggingface.co' # Hugging Face
          - 'api.together.xyz' # Together AI
          - 'api.replicate.com' # Replicate
          - 'api.groq.com' # Groq
          - 'api.perplexity.ai' # Perplexity
      condition: selection_process and selection_domain
    falsepositives:
      - Legitimate VBScript-based tools interacting with AI services.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0011
    - TA0005
techniques:
    - T1071.004
    - T1027
