id: 019ca0a2-8c1f-77db-9bc7-3b5b3c2b6f59
name: VanHelsing Ransomware Mutex Detection
description: The rule detects the creation of specific mutex names associated with VanHelsing ransomware. It looks for the mutex 'Global\VanHelsing'.
query: |-
    title: VanHelsing Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with VanHelsing ransomware activity.
    author: '@adhikara13'
    date: 2025/07/16
    references:
      - 'https://www.fortinet.com/blog/threat-research/ransomware-roundup-vanhelsing'
      - 'https://www.cyfirma.com/research/vanhelsing-ransomware/'
      - 'https://www.tripwire.com/state-of-security/vanhelsing-ransomware-what-you-need-know'
      - 'https://www.bleepingcomputer.com/news/security/new-vanhelsing-ransomware-targets-windows-arm-esxi-systems/'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.vanhelsing'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Global\VanHelsing'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.vanhelsing
author: '@adhikara13'
version: "1"
references:
    - https://www.fortinet.com/blog/threat-research/ransomware-roundup-vanhelsing
    - https://www.cyfirma.com/research/vanhelsing-ransomware/
    - https://www.tripwire.com/state-of-security/vanhelsing-ransomware-what-you-need-know
    - https://www.bleepingcomputer.com/news/security/new-vanhelsing-ransomware-targets-windows-arm-esxi-systems/
data_sources:
    - process_creation
    - windows
