name: 'CastleLoader Staging - AutoIt Launching '
description: Detects AutoIt launching `jsc.exe`, matching the CastleLoader stage that hollows into `jsc.exe` per ANY.RUN analysis.
query: |
    title: 'CastleLoader Staging - AutoIt Launching '
    id: 6b2d9f1a-3c4e-4d5f-9a0b-1c2d3e4f5a6b
    status: experimental
    description: >-
      Detects AutoIt launching `jsc.exe`, matching the CastleLoader stage that
      hollows into `jsc.exe` per ANY.RUN analysis.
    author: Daniel Jeremiah
    date: 2026-02-24T00:00:00.000Z
    references:
      - https://any.run/cybersecurity-blog/castleloader-malware-analysis/
    logsource:
      product: windows
      category: process_creation
      service: security
    detection:
      selection_parent:
        ParentImage|endswith:
          - \AutoIt3.exe
          - \autoit3.exe
      selection_child:
        Image|endswith: \jsc.exe
      condition: selection_parent and selection_child
    level: high
    tags:
      - attack.defense_evasion
      - attack.t1055
