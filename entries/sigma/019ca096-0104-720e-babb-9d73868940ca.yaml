id: 019ca096-0104-720e-babb-9d73868940ca
name: BTCWare Ransomware Mutex Detection
description: The rule detects the presence of specific mutex names ('PAYDAYDAYPAY') that are known to be associated with BTCWare ransomware activity. This detection is based on process creation events where these mutexes are observed.
query: |-
    title: BTCWare Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with BTCWare ransomware activity.
    author: '@adhikara13'
    date: 2025/08/08
    references:
      - 'https://app.any.run/tasks/1d763bab-767d-4357-9905-8836c5812adc/'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.btcware'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'PAYDAYDAYPAY'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.btcware
author: '@adhikara13'
version: "2"
references:
    - https://app.any.run/tasks/1d763bab-767d-4357-9905-8836c5812adc/
data_sources:
    - process_creation
    - windows
