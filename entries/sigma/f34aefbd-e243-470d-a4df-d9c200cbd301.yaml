id: f34aefbd-e243-470d-a4df-d9c200cbd301
name: Atomic Stealer (AMOS) Credential Access Detection
description: Detects command-line patterns associated with Atomic Stealer attempting to harvest credentials via fake password prompts using AppleScript and unlocking the macOS Keychain.
query: |-
    title: Atomic Stealer (AMOS) Credential Access
    status: experimental
    description: Detects command-line patterns associated with Atomic Stealer attempting to harvest credentials via fake password prompts using AppleScript and unlocking the macOS Keychain.
    author: Detections.ai
    date: 2025-05-09
    references:
      - https://www.picussecurity.com/resource/blog/atomic-stealer-dissecting-2024s-most-notorious-macos-infostealer
    logsource:
      category: process_creation
      product: macos
    detection:
      selection_osascript_prompt:
        Image|endswith: '/osascript'
        CommandLine|contains:
          - 'display dialog'
          - 'with hidden answer'
      selection_security_unlock:
        Image|endswith: '/security'
        CommandLine|contains: 'unlock-keychain'
      condition: 1 of selection_*
    fields:
      - CommandLine
      - ParentCommandLine
      - User
      - Image
    tags:
      - attack.credential_access
      - attack.t1555.001
      - attack.execution
      - attack.t1059.002
      - macos
      - infostealer
      - atomicstealer
      - amos
query_type: sigma
severity: medium
tags:
    - attack.credential_access
    - attack.t1555.001
    - attack.execution
    - attack.t1059.002
    - macos
    - infostealer
    - atomicstealer
    - amos
author: Detections.ai
version: "1"
