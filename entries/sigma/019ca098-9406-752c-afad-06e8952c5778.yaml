id: 019ca098-9406-752c-afad-06e8952c5778
name: Dharma Ransomware Mutex Detection
description: The rule detects the creation of specific mutexes known to be associated with Dharma ransomware activity. It specifically looks for a mutex named 'Global\syncronize_<uniqueid>', where '<uniqueid>' likely represents a variable or dynamically generated string.
query: |-
    title: Dharma Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Dharma ransomware activity.
    author: '@adhikara13'
    date: 2025/01/05
    references:
      - 'https://cymulate.com/blog/immediate-threat-analysis-new-dharma-ransomware/'
      - 'https://www.threatdown.com/blog/a-deep-dive-into-phobos-ransomware/'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.dharma'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Global\syncronize_<uniqueid>'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.dharma
author: '@adhikara13'
version: "1"
references:
    - https://cymulate.com/blog/immediate-threat-analysis-new-dharma-ransomware/
    - https://www.threatdown.com/blog/a-deep-dive-into-phobos-ransomware/
data_sources:
    - process_creation
    - windows
