id: 019ca0a2-b57c-74e8-84f4-ca0915c253ba
name: Vohuk Ransomware Mutex Detection
description: The rule detects the creation of a specific mutex named 'Global\VohukMutex'. This mutex name is associated with Vohuk ransomware activity, indicating a potential infection or execution of this malware.
query: |-
    title: Vohuk Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Vohuk ransomware activity.
    author: '@adhikara13'
    date: 2025/07/16
    references:
      - 'https://www.tanium.com/blog/qbot-malware-in-svg-files-cyber-threat-intelligence-roundup'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.vohuk'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Global\VohukMutex'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.vohuk
author: '@adhikara13'
version: "1"
references:
