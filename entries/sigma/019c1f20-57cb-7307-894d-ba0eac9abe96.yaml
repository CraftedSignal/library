id: 019c1f20-57cb-7307-894d-ba0eac9abe96
name: Interlock Ransomware Hotta Killer BYOVD Tool
description: Detects the installation of the "Hotta Killer" tool, a Bring-Your-Own-Vulnerable-Driver (BYOVD) process killer used by the Interlock ransomware group to terminate security software. This is identified by the creation of a specific kernel driver file (`UpdateCheckerX64.sys`) and a corresponding Windows service with a distinct naming pattern (`UpdateCheckerX64_{random-numbers}`).
query: |
    title: Interlock Ransomware Hotta Killer BYOVD Tool
    id: 6ccc1554-7e68-4abb-9dad-84dbf6142125
    status: experimental
    description: Detects the installation of the "Hotta Killer" tool, a
      Bring-Your-Own-Vulnerable-Driver (BYOVD) process killer used by the Interlock
      ransomware group to terminate security software. This is identified by the
      creation of a specific kernel driver file (`UpdateCheckerX64.sys`) and a
      corresponding Windows service with a distinct naming pattern
      (`UpdateCheckerX64_{random-numbers}`).
    references:
      - https://www.fortinet.com/blog/threat-research/interlock-ransomware-new-techniques-same-old-tricks
    author: detections.ai
    date: 2026-02-02
    tags:
      - attack.defense_evasion
      - attack.t1562.001
      - attack.privilege_escalation
      - attack.t1068
      - attack.persistence
      - attack.t1543.003
      - cve.2025.61155
    logsource:
      product: windows
    detection:
      selection_service:
        category: service_creation # Detects the creation of the malicious kernel driver service
        ServiceName|startswith: 'UpdateCheckerX64_'
        ImagePath|endswith: '\UpdateCheckerX64.sys'
      selection_file_create:
        category: file_creation # Detects the creation of the vulnerable driver file on disk
        TargetFilename|endswith: '\UpdateCheckerX64.sys'
      selection_file_hash:
        # Detects the known malicious driver by its SHA1 hash
        # This can apply to file creation, process creation, or image load events
        Hashes|contains: 'SHA1=7556AE58C215B8245A43F764F0676C7A8F0FDD1A'
      condition: 1 of them
    falsepositives:
      - The driver is a renamed version of a legitimate but vulnerable anti-cheat
        driver. While the specific name 'UpdateCheckerX64.sys' and service pattern
        appear unique to the malware, false positives could occur if other software
        renames and uses this driver.
    level: high
query_type: sigma
severity: high
