id: 019ca09e-8885-7117-a3b1-f18bf3ddefd9
name: Phoenix Backdoor Mutex Detection
description: This rule detects the creation of processes that utilize specific mutex names associated with the Phoenix backdoor. The detection is triggered when a process creates a mutex named 'sysprocupdate.exe'. This activity is indicative of the Phoenix backdoor attempting to ensure only a single instance of itself is running on a system, a common technique for malware persistence and control.
query: |-
    title: Phoenix Backdoor Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Phoenix backdoor activity.
    author: '@adhikara13'
    date: 2025/12/30
    references:
      - 'https://www.group-ib.com/blog/muddywater-espionage/'
    tags:
      - 'attack.persistence.t1547'
      - 'malware.backdoor.phoenix'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'sysprocupdate.exe'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0003
    - TA0004
techniques:
    - T1547
tags:
    - attack.persistence.t1547
    - malware.backdoor.phoenix
author: '@adhikara13'
version: "1"
references:
    - https://www.group-ib.com/blog/muddywater-espionage/
data_sources:
    - process_creation
    - windows
