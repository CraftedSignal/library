id: 019abecf-f29c-71e8-8621-1567da274478
name: FlexibleFerret Host File Creation Detection
description: Detects creation of .host file in temp directories by FlexibleFerret malware for identifying machines on macOS systems.
query: |+
    ---
    title: FlexibleFerret Host Identifier File Creation
    id: a1b2c3d4-eeee-4e5f-8a9b-0c1d2e3f4a5b
    status: experimental
    description: Detects creation of .host file in temp directory used by FlexibleFerret for machine identification
    author: Claude Opus 4.5
    date: 2025/11/26
    references:
        - https://www.jamf.com/blog/flexibleferret-malware-continues-to-adapt/
    tags:
        - attack.execution
        - attack.t1059
        - attack.discovery
        - attack.t1082
    logsource:
        category: file_event
        product: macos
    detection:
        selection:
            TargetFilename|endswith: '.host'
            TargetFilename|contains:
                - '/var/tmp/'
                - '/tmp/'
                - 'TMPDIR'
        condition: selection
    falsepositives:
        - Some legitimate applications may create .host files
    level: medium

query_type: sigma
severity: medium
tactics:
    - TA0002
    - TA0007
techniques:
    - T1059
    - T1082
