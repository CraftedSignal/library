id: 019cc3ec-6f19-72f3-a652-c90a8187286e
name: CL-UNK-1068 Custom FRP Tunneling Tool
description: Detects CL-UNK-1068's custom-compiled Fast Reverse Proxy (FRP) variant based on unique command-line artifacts.
query: |
    title: CL-UNK-1068 Custom FRP Tunneling Tool
    id: 28da68ee-670b-46a4-8618-860ba0f37341
    status: experimental
    description: Detects CL-UNK-1068's custom-compiled Fast Reverse Proxy (FRP)
      variant based on unique command-line artifacts.
    author: detections.ai
    references:
      - https://unit42.paloaltonetworks.com/cl-unk-1068-targets-critical-sectors/
    date: 2026-03-06
    tags:
      - attack.t1090.002
      - attack.command_and_control
    logsource:
      category: process_creation
      # The 'product' field must be a single string, not a list.
      # Since the CommandLine patterns include both Windows and Linux specific indicators,
      # and the category is generic, removing 'product' makes the rule apply broadly
      # to process creation logs across different operating systems.
      # Alternatively, this rule could be split into two separate rules, one for Windows and one for Linux.
      # For this correction, we remove the invalid list for 'product'.
    detection:
      selection:
        CommandLine|contains:
          - 'frpforzhangwei'
          - '10014-win-nic-32-v'
          - '20012-linux-64-V'
          - '10013-linux-64-V'
      condition: selection
    falsepositives:
      - Unlikely
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0011
techniques:
    - T1090.002
tags:
    - attack.t1090.002
