id: e5199ac5-91f8-44b2-a053-0b7922dfb172
name: AI Bot Prompt Injection and LLM Abuse Detection
description: Detects possible prompt injection or abuse of AI models like LLMs via unusual process and API call patterns
query: |
    title: AI Bot Prompt Injection and LLM Abuse Detection
    id: e3a89f10-55c5-4d4b-985b-6d674f9e0021
    status: experimental
    description: Detects possible prompt injection or abuse of AI models like LLMs
      via unusual process and API call patterns
    author: Chaitanya Bobhate
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        Image|endswith:
          - '\\python.exe'
          - '\\powershell.exe'
        CommandLine|contains:
          - 'curl'
          - 'openai'
          - 'POST'
          - 'prompt='
          - 'api.openrouter.ai'
      condition: selection
    fields:
      - CommandLine
      - ParentImage
      - User
    falsepositives:
      - Legitimate automation using LLM APIs
    level: high
query_type: sigma
severity: high
techniques:
    - T1059.001
    - T1203
    - T1071.001
    - T1566.001
    - T1001
    - T1106
    - T1027
author: Chaitanya Bobhate
version: "1"
data_sources:
    - process_creation
    - windows
