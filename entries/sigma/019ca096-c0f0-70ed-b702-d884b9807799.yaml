id: 019ca096-c0f0-70ed-b702-d884b9807799
name: Cl0p Ransomware Mutex Detection
description: This rule detects the creation of specific mutexes known to be associated with Cl0p ransomware activity. The detection is based on a predefined list of unique mutex names that Cl0p ransomware has been observed to use. The rule triggers when any of these mutex names are identified during process creation events on Windows systems.
query: |-
    title: Cl0p Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Cl0p ransomware activity.
    author: '@adhikara13'
    date: 2024/07/19
    references:
      - 'https://cyble.com/blog/cl0p-ransomware-active-threat-plaguing-businesses-worldwide/'
      - 'https://www.otorio.com/blog/ransomware-targeting-industry-4-0/'
      - 'https://id-ransomware.blogspot.com/2019/02/clop-ransomware.html'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.cl0p'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - ''')(%QU#jimf0932ijrkpo32jr3lfwe'
          - 'LifeBeHappy#-#-#666^_-'
          - 'CLOP#666'
          - '^_-HappyLife^_-'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.cl0p
author: '@adhikara13'
version: "1"
references:
    - https://cyble.com/blog/cl0p-ransomware-active-threat-plaguing-businesses-worldwide/
    - https://www.otorio.com/blog/ransomware-targeting-industry-4-0/
    - https://id-ransomware.blogspot.com/2019/02/clop-ransomware.html
data_sources:
    - process_creation
    - windows
