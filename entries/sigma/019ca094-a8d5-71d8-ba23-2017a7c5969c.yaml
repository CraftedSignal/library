id: 019ca094-a8d5-71d8-ba23-2017a7c5969c
name: BADNEWS RAT Mutex Detection
description: The rule detects the creation of specific mutexes ('rendumm' or 'RfmbFv8D') that are known to be associated with the BADNEWS Remote Access Trojan (RAT). This activity indicates the presence and potential execution of the BADNEWS malware on a Windows system.
query: |-
    title: BADNEWS RAT Mutex Detection
    status: experimental
    description: Detects known mutexes associated with BADNEWS rat activity.
    author: '@adhikara13'
    date: 2024/08/01
    references:
      - 'https://www.antiy.cn/research/notice&report/research_report/20221027.html'
      - 'https://rayblog.rising.com.cn/2024/08/2024%e5%b9%b47%e6%9c%88%ef%bc%9apatchwork%e7%bb%84%e7%bb%87%e9%92%88%e5%af%b9%e6%88%91%e5%9b%bd%e7%a7%91%e7%a0%94%e6%95%99%e8%82%b2%e9%a2%86%e5%9f%9f%e7%9a%84%e6%94%bb%e5%87%bb%e4%ba%8b%e4%bb%b6/'
    tags:
      - 'attack.command_and_control.t1219'
      - 'malware.rat.badnews'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'rendumm'
          - 'RfmbFv8D'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
