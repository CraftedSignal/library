id: 019c1d46-a93c-7257-9782-2adc391903b9
name: eScan Antivirus Database Sabotage via ODS Registry Modification
description: |
    Detects modification of eScan antivirus database-related registry values, such as setting WTBases_new to an abnormal value (e.g., 999) under the ODS registry key. This behavior may prevent signature updates or force the antivirus engine into an inconsistent state.
query: "title: eScan Antivirus Database Sabotage via ODS Registry Modification\r\nid: 9b7c4a61-2d8f-4e3a-9c6d-1a4f8e2b7d52\r\nstatus: experimental\r\ndescription: >\r\n  Detects modification of eScan antivirus database-related registry values, such as setting WTBases_new to an abnormal value (e.g., 999) under the ODS registry key. This behavior may prevent signature updates or force the antivirus engine into an inconsistent state.\r\nauthor: Thaung Htet\r\ndate: 2026-02-02\r\nreferences:\r\n  - https://securelist.com/escan-supply-chain-attack/118688/\r\n  - https://www.securityweek.com/escan-antivirus-delivers-malware-in-supply-chain-attack/\r\n  - https://www.morphisec.com/blog/critical-escan-threat-bulletin/\r\n  - https://www.infosecurity-magazine.com/news/escan-antivirus-breach-delivers/\r\ntags:\r\n  - attack.defense_evasion\r\n  - attack.t1562.001\r\nlogsource:\r\n  product: windows\r\n  category: registry_event\r\ndetection:\r\n  escan_ods_key:\r\n    TargetObject|contains:\r\n      - '\\SOFTWARE\\WOW6432Node\\MicroWorld\\eScan for Windows\\ODS'\r\n  suspicious_db_value:\r\n    TargetObject|endswith:\r\n      - '\\WTBases_new'\r\n  abnormal_value:\r\n    Details:\r\n      - '999'\r\n  condition: escan_ods_key and suspicious_db_value and abnormal_value\r\nfalsepositives:\r\n  - Unlikely; abnormal database values are rarely set legitimately\r\n  - Manual testing in lab environments\r\nlevel: high"
