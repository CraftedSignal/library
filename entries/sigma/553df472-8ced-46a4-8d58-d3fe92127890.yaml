id: 553df472-8ced-46a4-8d58-d3fe92127890
name: IOC with SharePoint ToolPane Exploitation - CVE-2025-53770 (ToolShell)
description: Detects exploitation attempts of the SharePoint ToolShell 0-day (CVE-2025-53770) using known IOCs and behavior patterns
query: |
    title: IOC with SharePoint ToolPane Exploitation - CVE-2025-53770 (ToolShell)
    id: 2025-07-cve53770-toolshell-iocs
    description: Detects exploitation attempts of the SharePoint ToolShell 0-day
      (CVE-2025-53770) using known IOCs and behavior patterns
    status: experimental
    author: Chaitanya Bobhate
    date: 2025/07/23
    references:
      - https://msrc.microsoft.com/update-guide/vulnerability/CVE-2025-53770
      - https://blog.eyecybersecurity.com/sharepoint-cve-2025-53770-toolshell-analysis
    logsource:
      category: webserver
      product: Microsoft SharePoint
    detection:
      keywords:
        - "/_layouts/15/ToolPane.aspx"
        - "/_layouts/16/ToolPane.aspx"
        - "/_layouts/SignOut.aspx"
        - "/_layouts/15/spinstall0.aspx"
        - "spinstall1.aspx"
        - "spinstall2.aspx"
        - "debug_dev.js"
        - "info.js"
      method:
        cs-method: POST
      user_agents:
        user-agent|contains:
          - "Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:120.0)"
          - "Mozilla/5.0+(Windows+NT+10.0;+Win64;+x64;+rv:120.0)+Gecko/20100101+Fir\
            efox/120.0"
      ioc_ips:
        c-ip|contains:
          - "107.191.58.76"
          - "104.238.159.149"
          - "96.9.125.147"
          - "45.191.66.77"
          - "45.77.155.170"
          - "64.176.50.109"
          - "206.166.251.228"
          - "34.72.225.196"
          - "34.121.207.116"
          - "141.164.60.10"
          - "134.199.202.205"
          - "188.130.206.168"
          - "131.226.2.6"
      conditions:
        all:
          - method
          - keywords
          - user_agents
          - ioc_ips
      condition: all of conditions
    fields:
      - cs-uri-stem
      - cs-method
      - c-ip
      - user-agent
      - cs-bytes
      - sc-status
    level: critical
    tags:
      - attack.initial_access
      - attack.T1190
      - cve.2025-53770
      - toolshell
      - ioc
    falsepositives:
      - Admins accessing ToolPane.aspx for debugging
      - Penetration test simulation
query_type: sigma
severity: medium
tactics:
    - TA0001
techniques:
    - T1190
tags:
    - attack.initial_access
    - attack.T1190
    - cve.2025-53770
    - toolshell
    - ioc
author: Chaitanya Bobhate
version: "1"
references:
    - https://msrc.microsoft.com/update-guide/vulnerability/CVE-2025-53770
    - https://blog.eyecybersecurity.com/sharepoint-cve-2025-53770-toolshell-analysis
data_sources:
    - webserver
    - Microsoft SharePoint
