id: ac987f26-5bea-4794-8315-0334a35ce814
name: Chromium Browser Auto Capture Flags
description: Detects the execution of Chromium-based browsers with command-line flags that automatically accept camera/microphone access or select desktop capture sources, which can be used for spying.
query: |-
    title: Chromium Browser Auto Capture Flags
    id: 00000000-0000-0000-0000-000000000000 # Placeholder - replace with a unique ID
    status: experimental
    description: Detects the execution of Chromium-based browsers with command-line flags that automatically accept camera/microphone access or select desktop capture sources, which can be used for spying.
    author: Detections.ai
    date: 2025-06-17
    references:
        - https://mrd0x.com/spying-with-chromium-browsers-camera
        - https://mrd0x.com/spying-with-chromium-browsers-screensharing
    logsource:
        category: process_creation
        product: windows
    detection:
        selection:
            Image|endswith:
                - '\chrome.exe'
                - '\msedge.exe'
                - '\brave.exe' # Add other Chromium browsers as needed
                - '\opera.exe'
                - '\vivaldi.exe'
        keywords:
            # Detects automatic camera/microphone access bypass
            - '--auto-accept-camera-and-microphone-capture'
            # Detects automatic screen/window/tab capture bypass
            - '--auto-select-desktop-capture-source='
        condition: selection and keywords
    falsepositives:
        - Legitimate development or testing scenarios (rare in production environments)
    level: high
    tags:
        - attack.collection
        - attack.t1113 # Screen Capture
        - attack.t1123 # Audio Capture
query_type: sigma
severity: high
tactics:
    - TA0009
techniques:
    - T1113
    - T1123
