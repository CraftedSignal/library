id: 019ca09a-ddaf-770b-8658-843639fea5f7
name: HelloXD Ransomware Mutex Detection
description: The rule detects the presence of specific mutex names associated with the HelloXD ransomware. It looks for the mutex 'With best wishes And good intentions...' during process creation events on Windows systems. This indicates potential HelloXD ransomware activity, which typically encrypts files and demands a ransom, aligning with the impact tactic T1486 (Data Encrypted for Impact).
query: |-
    title: HelloXD Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with HelloXD ransomware activity.
    author: '@adhikara13'
    date: 2024/12/19
    references:
      - 'https://unit42.paloaltonetworks.com/helloxd-ransomware/'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.helloxd'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'With best wishes And good intentions...'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.helloxd
author: '@adhikara13'
version: "1"
references:
    - https://unit42.paloaltonetworks.com/helloxd-ransomware/
data_sources:
    - process_creation
    - windows
