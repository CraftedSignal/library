id: 019c8e79-cd3f-776f-a54d-db4c20cac009
name: Detection of Email URL Interaction
description: |
    This simple script detects whether a user clicked on a URL in an email message. It uses the 'UrlClickEvents' table in Sentinel to identify such interactions, as well as the 'EmailEvents' table to correlate the email message with the URL click event.
query: "---\r\ntitle: Detection of Email URL Interaction\r\nauthor: Igor Oliveira (Pr0fiLeRR)\r\nid: 743f6019-b73a-4147-8b14-1aeb89d37522\r\nreferences:\r\n  - https://detections.ai/rules/019be674-caf7-744e-b252-5feadfb090f8\r\n  - https://sigmahq.io/sigma-specification/specification/sigma-rules-specification.html\r\ndescription: >\r\n  This simple script detects whether a user clicked on a URL in an email\r\n  message. It uses the 'UrlClickEvents' table in Sentinel to identify such\r\n  interactions, as well as the 'EmailEvents' table to correlate the email\r\n  message with the URL click event.\r\nstatus: stable\r\ndate: 2026-02-23T00:00:00.000Z\r\nlogsource:\r\n  product: windows\r\n  category: email\r\ndetection:\r\n  selection:\r\n    accountusername: username@domain.tld\r\n    senderemailaddress|contains|any: domain.tld\r\ncondition: selection\r\nfields:\r\n  - accountusername\r\n  - senderemailaddress\r\n  - url\r\n  - actiontype\r\nfalsepositives:\r\n  - Legitimate email interactions where users click on URLs from trusted senders.\r\n  - Marketing emails or newsletters that contain links and are frequently\r\n    clicked by users.\r\n  - Internal communications within an organization that include URLs, such as\r\n    company announcements or updates.\r\n  - Phishing simulations conducted by security teams to test user awareness and\r\n    response to potential threats.\r\nlevel: medium\r\ntags:\r\n  - attack.t1566.002\r\n..."
query_type: sigma
severity: medium
