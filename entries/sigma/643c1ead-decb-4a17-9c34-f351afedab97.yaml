id: 643c1ead-decb-4a17-9c34-f351afedab97
name: Storm-2603 ToolShell Ransomware Activity
description: Detects suspicious activity related to Storm-2603 ransomware operations, including ToolShell exploitation, DLL sideloading, BYOVD AV-killers, and multi-ransomware deployment (LockBit, Warlock).
query: |4
    title: Storm-2603 ToolShell Ransomware Activity
    id: 3e6b6d26-d3d7-11ee-b5f2-3b5f579a1652
    description: Detects suspicious activity related to Storm-2603 ransomware operations, including ToolShell exploitation, DLL sideloading, BYOVD AV-killers, and multi-ransomware deployment (LockBit, Warlock).
    status: experimental
    author: CyRAC Threat Intel Team
    date: 2025/07/31
    references:
      - https://www.cybersecurity-help.cz/blog/2896.html
      - https://www.microsoft.com/security/blog
      - https://blogs.jpcert.or.jp/en/2025/07/ivanti_cs.html
    logsource:
      category: process_creation
      product: windows
    detection:
      selection_toolshell_exploit:
        CommandLine|contains:
          - 'clink_x86.exe'
          - 'MpCmdRun.exe'
          - '7z.exe'
      selection_antivirus_terminator:
        Image|endswith:
          - '\VMToolsEng.exe'
        CommandLine|contains:
          - 'ServiceMouse.sys'
      selection_c2_domains:
        CommandLine|contains:
          - 'update.updatemicfosoft.com'
          - 'microsfot.org'
      selection_ransomware_hashes:
        Hashes|contains:
          - 'f711b14efb7792033b7ac954ebcfaec8141eb0abafef9c17e769ff96e8fecdf3'
          - '035998b724044d20d583fffa393907c7fef11ad8b93b4d423ad8cb8e53f248b7'
          # Add all remaining hashes similarly...
      condition: selection_toolshell_exploit or selection_antivirus_terminator or selection_c2_domains or selection_ransomware_hashes
    fields:
      - CommandLine
      - Image
      - ParentImage
      - Hashes
      - User
    falsepositives:
      - Administrative or EDR testing tools
    level: high
    tags:
      - attack.execution
      - attack.t1059.003
      - attack.t1218.011
      - attack.defense_evasion
      - attack.t1112
      - attack.t1562.001
