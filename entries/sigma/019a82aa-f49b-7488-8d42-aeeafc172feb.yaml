id: 019a82aa-f49b-7488-8d42-aeeafc172feb
name: PHISHING Known Malicious JARM Fingerprint (Harbor Freight Phish)
description: This rule detects network connections to external hosts exhibiting a specific JARM fingerprint (27d40d40d00040d00042d43d00041df04c41293ba84f6efe3a613b22f983e6) that has been associated with a phishing campaign, specifically targeting Harbor Freight. JARM fingerprints are used to identify unique TLS server configurations, and this particular hash indicates a known malicious infrastructure.
query: |
    alert tls $HOME_NET any -> $EXTERNAL_NET any (msg:"PHISHING Known Malicious JARM Fingerprint (Harbor Freight Phish)"; flow:to_server,established; tls.jarm.hash; content:"27d40d40d00040d00042d43d00041df04c41293ba84f6efe3a613b22f983e6"; fast_pattern; # Detects specific JARM fingerprint associated with a phishing campaign. Note: JARM hash collisions are possible, but unlikely for this specific hash. Monitor for FPs if this hash is observed in legitimate software.
     reference:url,https://www.silentpush.com/blog/threat-hunting-phishing/; classtype:trojan-activity; sid:1000001; rev:1; metadata: author detections.ai, created_at 2025-11-14, updated_at 2025-11-14, attack_target Any, deployment Perimeter, confidence High, signature_severity Major, tag Phishing, mitre_tactic_id TA0011, mitre_tactic_name Command_and_Control, mitre_technique_id T1071.001, mitre_technique_name Application_Layer_Protocol_Web_Protocols, fp_note Specific_JARM_fingerprint;)
query_type: sigma
severity: medium
tactics:
    - TA0011
    - TA0001
techniques:
    - T1566
    - T1071.001
version: "2"
references:
    - https://www.silentpush.com/blog/threat-hunting-phishing/
