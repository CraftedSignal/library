id: 019bc791-c6fc-72ca-be34-610f05a79b26
name: Suspicious High-Priority Service Creation For EDR Evasion
description: |
    Detects the creation or modification of a Windows service to belong to a high-priority service group.
    Adversaries may use this technique, as seen with the EDRStartupHinder tool, to ensure their malicious service runs before security products, allowing them to disable or tamper with EDR/AV solutions before they can initialize.
query: |
    title: Suspicious High-Priority Service Creation For EDR Evasion
    id: b35b8cf5-5e4a-4164-b1eb-c440fe091295
    status: experimental
    description: >
      Detects the creation or modification of a Windows service to belong to a
      high-priority service group.

      Adversaries may use this technique, as seen with the EDRStartupHinder tool, to
      ensure their malicious service runs before security products, allowing them to
      disable or tamper with EDR/AV solutions before they can initialize.
    references:
      - https://www.zerosalarium.com/2026/01/edrstartuphinder-edr-startup-process-blocker.html
    author: tim@detections.ai
    date: 2026-01-16T00:00:00.000Z
    tags:
      - attack.persistence
      - attack.privilege_escalation
      - attack.defense_evasion
      - attack.t1543.003
      - attack.t1562.001
    logsource:
      category: registry_set
      product: windows
      service: system
    detection:
      selection:
        TargetObject|endswith: '\Group'
        Details|contains:
          - 'TDI'
          - 'FSFilter Infrastructure'
          - 'Boot File System'
          - 'Filter'
          - 'PNP_TDI'
      condition: selection
    falsepositives:
      - Legitimate driver or third-party software installations (e.g., VPN clients,
        file system filters) may create services in these high-priority groups.
      - Investigation should focus on the associated service executable
        ('ImagePath') and the parent process responsible for the change. An
        executable in a temporary or user-writable directory is highly suspicious.
    level: high
query_type: sigma
severity: high
