id: 019ca094-188d-760b-b6a2-be571d6e02ae
name: Atharvan Backdoor Mutex Detection
description: This rule detects the creation of specific mutexes associated with the Atharvan backdoor. The detection is triggered when a process creates a mutex named 'SAPTARISHI-ATHARVAN-101'. This activity is indicative of the Atharvan backdoor attempting to ensure only a single instance of itself is running on a system, a common technique for malware persistence and control.
query: |-
    title: Atharvan Backdoor Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Atharvan backdoor activity.
    author: '@adhikara13'
    date: 2025/07/30
    references:
      - 'https://www.security.com/threat-intelligence/clasiopa-materials-research'
    tags:
      - 'attack.persistence.t1547'
      - 'malware.backdoor.atharvan'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'SAPTARISHI-ATHARVAN-101'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0003
    - TA0004
techniques:
    - T1547
tags:
    - attack.persistence.t1547
    - malware.backdoor.atharvan
author: '@adhikara13'
version: "1"
references:
    - https://www.security.com/threat-intelligence/clasiopa-materials-research
data_sources:
    - process_creation
    - windows
