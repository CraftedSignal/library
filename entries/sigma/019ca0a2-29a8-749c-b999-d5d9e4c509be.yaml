id: 019ca0a2-29a8-749c-b999-d5d9e4c509be
name: Trinity Ransomware Mutex Detection
description: This rule detects the creation of specific mutexes associated with Trinity ransomware. The detection is based on the `MutexName` field containing the string '48065934119990121'. The rule is designed to identify Trinity ransomware activity by monitoring for these unique mutexes.
query: |-
    title: Trinity Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Trinity ransomware activity.
    author: '@adhikara13'
    date: 2025/07/12
    references:
      - 'https://cyble.com/blog/in-the-shadow-of-venus-trinity-ransomwares-covert-ties'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.trinity'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '48065934119990121'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.trinity
author: '@adhikara13'
version: "1"
references:
    - https://cyble.com/blog/in-the-shadow-of-venus-trinity-ransomwares-covert-ties
data_sources:
    - process_creation
    - windows
