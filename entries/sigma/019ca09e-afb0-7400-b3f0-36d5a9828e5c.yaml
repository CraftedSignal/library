id: 019ca09e-afb0-7400-b3f0-36d5a9828e5c
name: ProjectWood Backdoor Mutex Detection
description: This rule detects the creation of specific mutexes associated with the ProjectWood backdoor. The detection is based on the presence of the mutex name 'IMPROVING CLIENT Want Wood To Exit?'. This activity is indicative of the ProjectWood backdoor running on a Windows system.
query: |-
    title: ProjectWood Backdoor Mutex Detection
    status: experimental
    description: Detects known mutexes associated with ProjectWood backdoor activity.
    author: '@adhikara13'
    date: 2025/07/30
    references:
      - 'https://www.welivesecurity.com/en/eset-research/unveiling-wolfsbane-gelsemiums-linux-counterpart-to-gelsevirine/'
    tags:
      - 'attack.persistence.t1547'
      - 'malware.backdoor.projectwood'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'IMPROVING CLIENT Want Wood To Exit?'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0003
    - TA0004
techniques:
    - T1547
tags:
    - attack.persistence.t1547
    - malware.backdoor.projectwood
author: '@adhikara13'
version: "1"
references:
    - https://www.welivesecurity.com/en/eset-research/unveiling-wolfsbane-gelsemiums-linux-counterpart-to-gelsevirine/
data_sources:
    - process_creation
    - windows
