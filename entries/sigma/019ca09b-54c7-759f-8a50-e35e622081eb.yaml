id: 019ca09b-54c7-759f-8a50-e35e622081eb
name: Karma Ransomware Mutex Detection
description: The rule detects the creation of specific mutex names associated with Karma ransomware activity. It specifically looks for a mutex named 'KARMA'. This detection is based on the presence of these mutexes, which are known indicators of Karma ransomware execution.
query: |-
    title: Karma Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Karma ransomware activity.
    author: '@adhikara13'
    date: 2025/01/12
    references:
      - 'https://cyble.com/blog/a-deep-dive-analysis-of-karma-ransomware'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.karma'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'KARMA'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.karma
author: '@adhikara13'
version: "1"
references:
    - https://cyble.com/blog/a-deep-dive-analysis-of-karma-ransomware
data_sources:
    - process_creation
    - windows
