id: 019ca093-81e1-70cb-9627-ac8a55a6be00
name: AiLock Ransomware Mutex Detection
description: Detects the creation of a process that utilizes the mutex name 'FAUST'. This specific mutex name is associated with AiLock ransomware activity, indicating a potential infection or execution of this malware.
query: |-
    title: AiLock Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with AiLock ransomware activity.
    author: '@adhikara13'
    date: 2025/07/16
    references:
      - 'https://medium.com/s2wblog/detailed-analysis-of-ailock-ransomware-1d3263beff15'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.ailock'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'FAUST'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
