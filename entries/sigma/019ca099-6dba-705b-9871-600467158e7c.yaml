    - https://www.nextron-systems.com/2024/01/29/analysis-of-falsefont-backdoor-used-by-peach-sandstorm-threat-actor/
    - https://www.cyfirma.com/news/weekly-intelligence-report-29-mar-2024/
data_sources:
