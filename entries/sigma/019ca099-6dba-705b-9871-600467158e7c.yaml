id: 019ca099-6dba-705b-9871-600467158e7c
name: FalseFront Backdoor Mutex Detection
description: The rule detects the creation of specific mutex names associated with the FalseFront backdoor. It looks for the mutex '864H!NKLNB*x_H?5' during process creation events on Windows systems. The presence of this mutex indicates potential FalseFront backdoor activity, which is known for persistence mechanisms.
query: |-
    title: FalseFront Backdoor Mutex Detection
    status: experimental
    description: Detects known mutexes associated with FalseFront backdoor activity.
    author: '@adhikara13'
    date: 2024/07/19
    references:
      - 'https://unit42.paloaltonetworks.com/curious-serpens-falsefont-backdoor/'
      - 'https://www.nextron-systems.com/2024/01/29/analysis-of-falsefont-backdoor-used-by-peach-sandstorm-threat-actor/'
      - 'https://www.cyfirma.com/news/weekly-intelligence-report-29-mar-2024/'
    tags:
      - 'attack.persistence.t1547'
      - 'malware.backdoor.falsefront'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '864H!NKLNB*x_H?5'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0003
    - TA0004
techniques:
    - T1547
tags:
    - attack.persistence.t1547
    - malware.backdoor.falsefront
author: '@adhikara13'
version: "1"
references:
