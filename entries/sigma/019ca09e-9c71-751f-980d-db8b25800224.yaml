id: 019ca09e-9c71-751f-980d-db8b25800224
name: PrincessLocker Ransomware Mutex Detection
description: The rule detects the creation of specific mutex names ('hoJUpcvgHA') that are known to be associated with PrincessLocker ransomware activity. This detection is based on monitoring process creation events for these particular mutexes.
query: |-
    title: PrincessLocker Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with PrincessLocker ransomware activity.
    author: '@adhikara13'
    date: 2024/08/01
    references:
      - 'https://x.com/ValthekOn/status/1029566037589729280'
      - 'https://www.trendmicro.com/vinfo/tw/threat-encyclopedia/malware/ransom_princesslocker.b'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.princesslocker'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'hoJUpcvgHA'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.princesslocker
author: '@adhikara13'
version: "1"
