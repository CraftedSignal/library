id: a7d4797f-8878-4cab-8a13-8829e42f3eb4
name: UpCrypter Malware User-Agent Impersonation
description: Detects a specific, outdated Internet Explorer user-agent string used by the UpCrypter malware for C2 communications. This User-Agent string is highly specific and outdated, making legitimate use extremely unlikely in modern environments.
query: |
    title: UpCrypter Malware User-Agent Impersonation
    id: aecdf1aa-b702-4b5c-9f62-b54f4beab6ff
    status: experimental
    description: Detects a specific, outdated Internet Explorer user-agent string used by the UpCrypter malware for C2 communications.
    references:
      - https://www.fortinet.com/blog/threat-research/phishing-campaign-targeting-companies-via-upcrypter
    author: detections.ai
    date: 2025-08-29
    tags:
      - attack.t1071.001
      - malware.upcrypter
    logsource:
      category: proxy
    detection:
      selection:
        # This specific User-Agent string for IE8 on Windows NT 6.0 (Vista/Server 2008) is used by the malware.
        http.user_agent: 'Mozilla/4.0 (compatible; MSIE 8.0; Windows NT 6.0; WOW64; Trident/4.0; SLCC1; .NET CLR 2.0.50727; Media Center PC 5.0; .NET CLR 3.5.21022; .NET CLR 3.5.30729; .NET CLR 3.0.30618; InfoPath.2; OfficeLiveConnector.1.3; OfficeLivePatch.0.0)'
      condition: selection
    falsepositives:
      # This User-Agent is highly specific and outdated. Legitimate use is extremely unlikely in modern environments.
      # However, some legacy applications or systems might still use it.
      - Legitimate legacy applications or systems.
    level: high
query_type: sigma
severity: high
