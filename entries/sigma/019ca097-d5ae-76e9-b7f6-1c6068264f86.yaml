id: 019ca097-d5ae-76e9-b7f6-1c6068264f86
name: D3F@ck Loader Mutex Detection
description: This rule detects the creation of specific mutexes, 'Little further', which are known to be associated with the D3F@ck loader. The detection is based on monitoring process creation events on Windows systems for these particular mutex names. The rule aims to identify the presence and activity of the D3F@ck loader by flagging these unique mutexes.
query: |-
    title: D3F@ck Loader Mutex Detection
    status: experimental
    description: Detects known mutexes associated with D3F@ck loader activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://app.any.run/tasks/bc01e10a-8d7b-4641-bb42-22c5fe8ff579'
    tags:
      - 'attack.execution.t1204'
      - 'malware.loader.d3f@ck'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Little further'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0002
techniques:
    - T1204
tags:
    - attack.execution.t1204
    - malware.loader.d3f@ck
author: '@adhikara13'
version: "1"
references:
    - https://app.any.run/tasks/bc01e10a-8d7b-4641-bb42-22c5fe8ff579
data_sources:
    - process_creation
    - windows
