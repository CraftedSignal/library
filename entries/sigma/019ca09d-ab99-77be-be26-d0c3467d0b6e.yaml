id: 019ca09d-ab99-77be-be26-d0c3467d0b6e
name: Nitrogen Ransomware Mutex Detection
description: The rule detects the creation of specific mutex names associated with Nitrogen ransomware activity. It specifically looks for the mutex 'nvxkjcv7yxctvgsdfjhv6esdvsx'. This indicates the presence or execution of the Nitrogen ransomware on a Windows system.
query: |-
    title: Nitrogen Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Nitrogen ransomware activity.
    author: '@adhikara13'
    date: 2025/07/16
    references:
      - 'https://any.run/cybersecurity-blog/nitrogen-ransomware-report/'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.nitrogen'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'nvxkjcv7yxctvgsdfjhv6esdvsx'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.nitrogen
author: '@adhikara13'
version: "1"
references:
    - https://any.run/cybersecurity-blog/nitrogen-ransomware-report/
data_sources:
    - process_creation
    - windows
