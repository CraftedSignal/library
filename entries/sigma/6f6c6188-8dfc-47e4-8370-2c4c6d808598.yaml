id: 6f6c6188-8dfc-47e4-8370-2c4c6d808598
name: Suspicious mshta.exe Execution from Explorer.exe
description: Detects execution of mshta.exe from explorer.exe with an inline HTA script that reads and executes code from the registry.
query: "title: Suspicious mshta.exe Execution from Explorer.exe\r\nid: 12ab34cd-56ef-78gh-90ij-klmnopqrstuv\r\nstatus: experimental\r\ndescription: Detects execution of mshta.exe from explorer.exe with an inline HTA script that reads and executes code from the registry.\r\nauthor: Thaung Htet\r\ndate: 2025-02-07\r\nreferences:\r\n    - https://attack.mitre.org/techniques/T1218/005/\r\n    - https://redcanary.com/threat-detection-report/techniques/mshta/\r\ntags:\r\n    - attack.defense-evasion\r\n    - attack.execution\r\n    - attack.persistence\r\n    - attack.t1218.005\r\nlogsource:\r\n    category: process_creation\r\n    product: windows\r\ndetection:\r\n    selection:\r\n        ParentImage|endswith: '\\explorer.exe'\r\n        Image|endswith: '\\mshta.exe'\r\n        CommandLine|contains:\r\n            - 'hta:application'\r\n            - 'ActiveXObject'\r\n            - 'WScript.Shell'\r\n            - 'RegRead'\r\n            - 'HKCU\\Software\\AppDataLow\\Software\\Microsoft'\r\n            - 'resizeTo(1,1)'\r\n    condition: selection\r\nfalsepositives:\r\n    - Legitimate use of mshta.exe for internal automation\r\nlevel: high"
