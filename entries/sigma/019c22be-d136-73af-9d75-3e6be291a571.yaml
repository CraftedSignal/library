name: Possible DLL Hijacking of log.dll
description: The rule detects the loading of log.dll into a process where the process executable is not located in the standard Bitdefender installation directories.
query: "title: Possible DLL Hijacking of log.dll\r\nid: 2cf63975-dde1-419a-b624-385631e6212c\r\nstatus: experimental\r\ndescription: >-\r\n  The rule detects the loading of log.dll into a process where the process\r\n  executable is not located in the standard Bitdefender installation\r\n  directories.\r\nreferences:\r\n  - >-\r\n    https://www.rapid7.com/blog/post/tr-chrysalis-backdoor-dive-into-lotus-blossoms-toolkit/\r\nauthor: Daniel Koifman (KoifSec, CardinalOps)\r\ndate: 2026-02-03T00:00:00.000Z\r\ntags:\r\n  - attack.persistence\r\n  - attack.privilege-escalation\r\n  - attack.defense-evasion\r\n  - attack.t1574.001\r\nlogsource:\r\n  product: windows\r\n  category: image_load\r\ndetection:\r\n  selection_dll:\r\n    - ImageLoaded|endswith: \\log.dll\r\n  selection_filter:\r\n    - Image|contains:\r\n        - '\\program files\\bitdefender'\r\n        - '\\program files (x86)\\bitdefender'\r\n  condition: selection_dll and not selection_filter\r\nlevel: critical\r\n"
