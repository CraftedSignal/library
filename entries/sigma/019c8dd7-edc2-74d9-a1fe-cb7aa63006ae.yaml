id: 019c8dd7-edc2-74d9-a1fe-cb7aa63006ae
name: Linux Hardware Addition via USB Devices
description: Hunts for unwarranted hardware additions through USB device connections. In an environment where USB devices are not permitted.
query: |
    title: Linux Hardware Addition via USB Devices
    id: abae85d2-d52d-4273-a6ef-fac8693826bf
    status: experimental
    description: >-
      Hunts for unwarranted hardware additions through USB device connections. In an
      environment where USB devices are not permitted.
    references:
      - https://attack.mitre.org/techniques/T1200/
      - https://attack.mitre.org/detectionstrategies/DET0069/
    author: zendannyy
    date: 2026-02-21T00:00:00.000Z
    tags:
      - attack.initial_access
      - attack.t1200
      - linux.usb
    logsource:
      category: sysmon_status
      product: linux
    detection:
      selection_usb_devices:
        action: add
        subsystem: usb
      selection_device_types:
        device_type:
          - storage
          - network
          - hid
      selection_timing_pattern:
        timeframe: 5m
      condition: selection_usb_devices and selection_device_types | count() by device_id >= 3
    falsepositives:
      - Legitimate USB device usage
      - User productivity devices
    level: medium
query_type: sigma
severity: medium
tactics:
    - TA0001
techniques:
    - T1200
tags:
    - attack.initial_access
    - attack.t1200
    - linux.usb
author: zendannyy
version: "1"
references:
    - https://attack.mitre.org/techniques/T1200/
    - https://attack.mitre.org/detectionstrategies/DET0069/
data_sources:
    - sysmon_status
    - linux
