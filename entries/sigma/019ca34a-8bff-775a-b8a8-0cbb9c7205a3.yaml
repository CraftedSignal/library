    author: Daniel Jeremiah
    date: 2026-02-25T00:00:00.000Z
    references:
      - >-
        https://cloud.google.com/blog/topics/threat-intelligence/defense-against-shinyhunters-cybercrime-saas
    logsource:
      product: windows
      category: process_creation
      service: security
    detection:
      selection_img:
        Image|endswith: \\aws.exe
      selection_cmd:
        CommandLine|contains:
          - ' s3 '
          - ' sync '
          - ' cp '
      condition: selection_img and selection_cmd
    falsepositives:
      - Legitimate administration and automation; validate role, bucket scope, and
        time window.
    level: medium
