id: 019ca0a1-b1dd-7259-a67a-b40ca5da005f
name: TaRRaK Ransomware Mutex Detection
description: This rule detects the creation of a process that utilizes a mutex named 'TaRRaK'. This specific mutex name is associated with the TaRRaK ransomware, indicating potential ransomware activity on the system.
query: |-
    title: TaRRaK Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with TaRRaK ransomware activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://decoded.avast.io/threatresearch/decrypted-tarrak-ransomware/'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.tarrak'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'TaRRaK'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.tarrak
author: '@adhikara13'
version: "1"
references:
    - https://decoded.avast.io/threatresearch/decrypted-tarrak-ransomware/
data_sources:
    - process_creation
    - windows
