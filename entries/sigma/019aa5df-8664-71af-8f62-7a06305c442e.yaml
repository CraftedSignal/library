id: 019aa5df-8664-71af-8f62-7a06305c442e
name: PowerShell Download with Custom Headers and Subsequent Execution
description: Detects a PowerShell script that uses Invoke-WebRequest with custom headers to download a file, which is then executed via Start-Process. This technique is used by malware to bypass simple network filtering or for C2 authentication. It was observed in a campaign delivering multiple RAT families including AsyncRAT, DCRAT, and PUREHVNC.
query: "title: PowerShell Download with Custom Headers and Subsequent Execution\r\nid: 2546b001-59eb-4924-8f50-851557a7440a\r\nstatus: experimental\r\ndescription: >-\r\n  Detects a PowerShell script that uses Invoke-WebRequest with custom headers to\r\n  download a file, which is then executed via Start-Process. This technique is\r\n  used by malware to bypass simple network filtering or for C2 authentication.\r\n  It was observed in a campaign delivering multiple RAT families including\r\n  AsyncRAT, DCRAT, and PUREHVNC.\r\nreferences:\r\n  - >-\r\n    https://medium.com/@shubhandrew/analysis-of-a-powershell-script-leading-to-3-differrent-malware-families-asyncrat-dcrat-f7e9c12149aa\r\nauthor: Subhankar H.\r\ndate: 2025-11-21T00:00:00.000Z\r\ntags:\r\n  - attack.execution\r\n  - attack.t1059.001\r\n  - attack.command_and_control\r\n  - attack.t1105\r\nlogsource:\r\n  category: process_creation\r\n  product: windows\r\ndetection:\r\n  selection:\r\n    Image|endswith: \\powershell.exe\r\n    CommandLine|contains|all:\r\n      - Invoke-WebRequest\r\n      - '-Headers'\r\n      - '-OutFile'\r\n      - Start-Process\r\n  condition: selection\r\nfalsepositives:\r\n  - Legitimate administrative or deployment scripts may use this combination of\r\n    commands.\r\n  - Consider adding more specific command-line arguments, parent processes, or\r\n    user context to reduce potential noise.\r\nlevel: medium\r\n"
