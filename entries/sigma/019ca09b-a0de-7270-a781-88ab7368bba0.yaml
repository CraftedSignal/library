id: 019ca09b-a0de-7270-a781-88ab7368bba0
name: KiwiStealer Mutex Detection
description: The rule detects the creation of specific mutexes associated with KiwiStealer malware. It looks for the mutex name 'rabadaisunique' in process creation events on Windows systems. This activity is indicative of KiwiStealer attempting to ensure only one instance of itself is running.
query: |-
    title: KiwiStealer Mutex Detection
    status: experimental
    description: Detects known mutexes associated with KiwiStealer activity.
    author: '@adhikara13'
    date: 2024/08/01
    references:
      - 'https://www.ctfiot.com/219079.html'
    tags:
      - 'attack.credential_access.t1555'
      - 'malware.stealer.kiwistealer'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'rabadaisunique'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0006
techniques:
    - T1555
tags:
    - attack.credential_access.t1555
    - malware.stealer.kiwistealer
author: '@adhikara13'
version: "1"
references:
    - https://www.ctfiot.com/219079.html
data_sources:
    - process_creation
    - windows
