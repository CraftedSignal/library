id: 019ca096-15a0-724c-b2bf-37433b4eb8d0
name: BunnyLoader Mutex Detection
description: This rule detects the creation of specific mutexes known to be associated with BunnyLoader malware activity. The rule specifically looks for the mutex name 'BunnyLoader_MUTEXCONTROL'. Detection of this mutex indicates a high probability of BunnyLoader execution on the system.
query: |-
    title: BunnyLoader Mutex Detection
    status: experimental
    description: Detects known mutexes associated with BunnyLoader activity.
    author: '@adhikara13'
    date: 2024/05/22
    references:
      - 'https://www.cyfirma.com/news/weekly-intelligence-report-06-oct-2023/'
      - 'https://www.zscaler.com/blogs/security-research/bunnyloader-newest-malware-service'
    tags:
      - 'attack.execution.t1204'
      - 'malware.loader.bunnyloader'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'BunnyLoader_MUTEXCONTROL'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0002
techniques:
    - T1204
tags:
    - attack.execution.t1204
    - malware.loader.bunnyloader
author: '@adhikara13'
version: "1"
references:
    - https://www.cyfirma.com/news/weekly-intelligence-report-06-oct-2023/
    - https://www.zscaler.com/blogs/security-research/bunnyloader-newest-malware-service
data_sources:
    - process_creation
    - windows
