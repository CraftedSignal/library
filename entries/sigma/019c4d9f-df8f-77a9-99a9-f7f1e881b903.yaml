id: 019c4d9f-df8f-77a9-99a9-f7f1e881b903
name: UNC1069-style AI Lure Archive Launching Executable
description: |
    Archive or browser/Office recently opened then child process is executable from user temp or downloads. AI/crypto social engineering campaigns often use ZIP with double-extension executables.
query: |
    title: UNC1069-style AI Lure Archive Launching Executable
    id: a6b7c8d9-e0f1-4a0b-4253-unc106901
    status: experimental
    description: |
      Archive or browser/Office recently opened then child process is executable from user temp or downloads. AI/crypto social engineering campaigns often use ZIP with double-extension executables.
    references:
      - https://cloud.google.com/blog/topics/threat-intelligence/cybercriminals-weaponize-fake-ai-websites
    author: Daniel Jeremiah
    date: 2026/02/11
    tags:
      - attack.t1566
      - attack.t1204
      - attack.execution
    logsource:
      category: process_creation
      product: windows
    detection:
      selection_child:
        Image|endswith: '.exe'
        Image|contains|any:
          - '\Temp\'
          - '\Downloads\'
          - '\AppData\Local\Temp\'
      selection_parent:
        ParentImage|endswith|any:
          - '\explorer.exe'
          - '\WinRAR.exe'
          - '\7z.exe'
          - '\msiexec.exe'
      condition: selection_child and selection_parent
    falsepositives:
      - User installing software from downloaded archive
    level: medium
query_type: sigma
severity: medium
tactics:
    - TA0002
    - TA0001
techniques:
    - T1566
    - T1204
tags:
    - attack.t1566
    - attack.t1204
    - attack.execution
author: Daniel Jeremiah
version: "3"
references:
    - https://cloud.google.com/blog/topics/threat-intelligence/cybercriminals-weaponize-fake-ai-websites
data_sources:
    - process_creation
    - windows
