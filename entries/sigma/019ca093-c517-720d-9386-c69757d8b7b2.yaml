id: 019ca093-c517-720d-9386-c69757d8b7b2
name: AridGopher Backdoor Mutex Detection
description: The rule detects the creation of processes that utilize specific mutex names associated with the AridGopher backdoor. It specifically looks for mutexes named 'ABCMedia' or 'SoftTookkitPSA'. This indicates potential activity of the AridGopher malware on a Windows system.
query: |-
    title: AridGopher Backdoor Mutex Detection
    status: experimental
    description: Detects known mutexes associated with AridGopher backdoor activity.
    author: '@adhikara13'
    date: 2025/07/12
    references:
      - 'https://www.deepinstinct.com/blog/arid-gopher-the-newest-micropsia-malware-variant'
    tags:
      - 'attack.persistence.t1547'
      - 'malware.backdoor.aridgopher'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'ABCMedia'
          - 'SoftTookkitPSA'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0003
    - TA0004
techniques:
    - T1547
tags:
    - attack.persistence.t1547
    - malware.backdoor.aridgopher
author: '@adhikara13'
version: "1"
references:
    - https://www.deepinstinct.com/blog/arid-gopher-the-newest-micropsia-malware-variant
data_sources:
    - process_creation
    - windows
