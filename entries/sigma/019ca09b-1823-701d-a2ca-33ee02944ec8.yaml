id: 019ca09b-1823-701d-a2ca-33ee02944ec8
name: Hydra Ransomware Mutex Detection
description: This rule detects the creation of specific mutexes known to be associated with Hydra ransomware activity. The detection logic specifically looks for the mutex name 'Local\$hYdr4Rans$'. This indicates a high-confidence detection of Hydra ransomware execution or presence on a Windows system.
query: |-
    title: Hydra Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Hydra ransomware activity.
    author: '@adhikara13'
    date: 2025/07/13
    references:
      - 'https://id-ransomware.blogspot.com/2020/09/flamingo-ransomware.html'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.hydra'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Local\$hYdr4Rans$'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.hydra
author: '@adhikara13'
version: "1"
references:
    - https://id-ransomware.blogspot.com/2020/09/flamingo-ransomware.html
data_sources:
    - process_creation
    - windows
