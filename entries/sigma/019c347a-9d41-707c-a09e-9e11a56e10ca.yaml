id: 019c347a-9d41-707c-a09e-9e11a56e10ca
name: APT28 Phantom Net Voxel - COM Hijack prnfldr.dll CLSID_Printers
description: This rule detects potential COM hijacking activity associated with APT28's Phantom Net Voxel operation. Specifically, it looks for command-line executions that involve the CLSID_Printers identifier ('2227A280-3AEA-1069-A2DE-08002B30309D') or the 'prnfldr.dll' file, particularly when 'regsvr32' is used. The detection is contextualized by checking if the process originates from common Microsoft Office applications (WINWORD.EXE, EXCEL.EXE) or script hosts (wscript.exe, cscript.exe), indicating a potential initial access vector or execution from a malicious macro.
query: |
    title: APT28 Phantom Net Voxel - COM Hijack prnfldr.dll CLSID_Printers
    id: a1b2c3d4-e5f6-4a5b-8c9d-apt28com001
    status: experimental
    description: |
        APT28 Operation Phantom Net Voxel: COM hijack via CLSID_Printers, prnfldr.dll.
        Office macro drops DLL and registers InProcServer32; regsvr32 /n /i triggers DllInstall.
        Context: parent from Office or script host.
    references:
        - https://www.trellix.com/blogs/research/apt28-stealthy-campaign-leveraging-cve-2026-21509-cloud-c2/
        - https://blog.sekoia.io/apt28-operation-phantom-net-voxel/
    author: Daniel Jeremiah
    date: 2026/02/03
    tags:
        - attack.persistence
        - attack.t1547.001
        - attack.defense-evasion
    logsource:
        category: process_creation
        product: windows
    detection:
        selection_reg:
            CommandLine|contains|all:
                - 'CLSID'
                - '2227A280-3AEA-1069-A2DE-08002B30309D'
        selection_regsvr32:
            CommandLine|contains|all:
                - 'regsvr32'
                - 'prnfldr.dll'
        selection_path:
            CommandLine|contains: 'prnfldr.dll'
        context_parent:
            ParentImage|endswith|any:
                - '\WINWORD.EXE'
                - '\EXCEL.EXE'
                - '\wscript.exe'
                - '\cscript.exe'
        condition: (selection_reg or selection_regsvr32 or selection_path) and context_parent
    falsepositives:
        - Legitimate printer driver installation
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0003
    - TA0005
    - TA0004
techniques:
    - T1547.001
tags:
    - attack.persistence
    - attack.t1547.001
    - attack.defense-evasion
author: Daniel Jeremiah
version: "2"
references:
    - https://www.trellix.com/blogs/research/apt28-stealthy-campaign-leveraging-cve-2026-21509-cloud-c2/
    - https://blog.sekoia.io/apt28-operation-phantom-net-voxel/
data_sources:
    - process_creation
    - windows
