id: 019ca095-835c-764e-9539-2afa03e3b93d
name: BlackStore Ransomware Mutex Detection
description: The rule detects the creation of specific mutexes known to be associated with BlackStore ransomware. Specifically, it looks for a mutex named 'Global\FSWiper'. The presence of this mutex indicates potential BlackStore ransomware activity on a Windows system.
query: |-
    title: BlackStore Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with BlackStore ransomware activity.
    author: '@adhikara13'
    date: 2025/07/16
    references:
      - 'https://buaq.net/go-185382.html'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.blackstore'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Global\FSWiper'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.blackstore
author: '@adhikara13'
version: "1"
references:
    - https://buaq.net/go-185382.html
data_sources:
    - process_creation
    - windows
