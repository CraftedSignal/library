id: 019ca0a0-1b69-75cd-87af-1974910ce846
name: ROADSWEEP Ransomware Mutex Detection
description: 'The rule detects the creation of a specific mutex name: ''abcdefghijklmnoklmnopqrstuvwxyz01234567890abcdefghijklmnopqrstuvwxyz01234567890''. This mutex name is associated with ROADSWEEP ransomware activity. The detection is based on monitoring process creation events in Windows environments for the presence of this exact mutex name.'
query: |-
    title: ROADSWEEP Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with ROADSWEEP ransomware activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://cloud.google.com/blog/topics/threat-intelligence/likely-iranian-threat-actor-conducts-politically-motivated-disruptive-activity-against/'
      - 'https://securelist.com/ransomware-and-wiper-signed-with-stolen-certificates/108350/'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.roadsweep'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'abcdefghijklmnoklmnopqrstuvwxyz01234567890abcdefghijklmnopqrstuvwxyz01234567890'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.roadsweep
author: '@adhikara13'
version: "1"
references:
    - https://cloud.google.com/blog/topics/threat-intelligence/likely-iranian-threat-actor-conducts-politically-motivated-disruptive-activity-against/
    - https://securelist.com/ransomware-and-wiper-signed-with-stolen-certificates/108350/
data_sources:
    - process_creation
    - windows
