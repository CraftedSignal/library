id: 0199da4d-3260-720e-b60f-3e1942642028
name: Potential Anti-Malware Analysis Tool Execution - Process and Memory Analysis
description: Detects the execution of common process and memory analysis tools. The presence of these tools on a standard user endpoint could indicate reconnaissance, reverse engineering, or an attempt by malware to check for an analysis environment. This list is based on tools blacklisted by the Stealit malware.
query: |
    title: Potential Anti-Malware Analysis Tool Execution - Process and Memory Analysis
    id: a0f0ada4-0771-40e7-baaf-158a2612043d
    status: experimental
    description: Detects the execution of common process and memory analysis tools.
      The presence of these tools on a standard user endpoint could indicate
      reconnaissance, reverse engineering, or an attempt by malware to check for an
      analysis environment. This list is based on tools blacklisted by the Stealit
      malware.
    references:
      - https://www.fortinet.com/blog/threat-research/stealit-campaign-abuses-nodejs-single-executable-application
    author: detections.ai
    date: 2025-10-11
    tags:
      - attack.defense_evasion
      - attack.t1518.001
    logsource:
      category: process_creation
      product: windows
    detection:
      # Detects the execution of common process and memory analysis tools blacklisted by Stealit
      selection:
        Image|endswith:
          - '\procmon.exe'
          - '\procexp.exe'
          - '\processhacker.exe'
          - '\cheatengine-x86_64.exe'
          - '\cheatengine-i386.exe'
          - '\cheat engine.exe'
          - '\artmoney.exe'
      condition: selection
    falsepositives:
      - Security analysts, system administrators, developers, and power users
        legitimately use these tools. This rule is intended for environments where
        such tools are not standard and their presence requires investigation.
    level: medium
query_type: sigma
severity: medium
tactics:
    - TA0007
    - TA0005
techniques:
    - T1518.001
    - T1622
