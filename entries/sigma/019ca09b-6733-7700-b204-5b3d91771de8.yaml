id: 019ca09b-6733-7700-b204-5b3d91771de8
name: KawaLocker Ransomware Mutex Detection
description: The rule detects the creation of specific mutexes ('SAY_HI_2025') that are known to be associated with KawaLocker ransomware activity. This detection is based on monitoring process creation events for these particular mutex names.
query: |-
    title: KawaLocker Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with KawaLocker ransomware activity.
    author: '@adhikara13'
    date: 2025/07/12
    references:
      - 'https://github.com/TheRavenFile/Daily-Hunt/blob/main/Kawa%20Ransomware'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.kawalocker'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'SAY_HI_2025'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.kawalocker
author: '@adhikara13'
version: "1"
references:
    - https://github.com/TheRavenFile/Daily-Hunt/blob/main/Kawa%20Ransomware
data_sources:
    - process_creation
    - windows
