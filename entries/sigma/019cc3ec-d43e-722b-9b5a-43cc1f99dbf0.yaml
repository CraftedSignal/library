id: 019cc3ec-d43e-722b-9b5a-43cc1f99dbf0
name: CL-UNK-1068 Reconnaissance Batch Script Execution
description: Detects the execution of specific batch scripts (hp.bat, hpp.bat, a.bat) used by the CL-UNK-1068 actor for host reconnaissance and information gathering.
query: |
    title: CL-UNK-1068 Reconnaissance Batch Script Execution
    id: 0c1ad426-7707-475c-ab88-f13e9da29809
    status: experimental
    description: Detects the execution of specific batch scripts (hp.bat, hpp.bat,
      a.bat) used by the CL-UNK-1068 actor for host reconnaissance and information
      gathering.
    author: detections.ai
    references:
      - https://unit42.paloaltonetworks.com/cl-unk-1068-targets-critical-sectors/
    date: 2026-03-06
    tags:
      - attack.t1059.003
      - attack.discovery
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        # Detects specific batch file names used by CL-UNK-1068 for reconnaissance
        Image|endswith:
          - '\hp.bat'
          - '\hpp.bat'
          - '\a.bat' # Batch files are executed by the command interpreter
        ParentImage|endswith: '\cmd.exe'
      condition: selection
    falsepositives:
      - Legitimate administrative or custom scripts with the same names.
    level: high
    fields:
      - CommandLine
      - ParentCommandLine
      - CurrentDirectory
query_type: sigma
severity: high
tactics:
    - TA0007
    - TA0002
techniques:
