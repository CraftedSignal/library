id: 019ad857-3e78-76ab-884f-6011bc8b0afd
name: Suspicious Mshta HTTP Call to Non-RFC1918 Dot-Quad or Hex-Encoded IPv4 Address
description: Detects mshta execution where an HTTP/HTTPS URL targets a host expressed as a dot-quad IPv4 address or hex-encoded IPv4 address, excluding RFC1918 private address ranges. Threat actors frequently use raw or hex-encoded IP literals to evade domain filtering and deliver malicious HTA payloads.
query: |
    title: Suspicious Mshta HTTP Call to Non-RFC1918 Dot-Quad or Hex-Encoded IPv4 Address
    id: 7da1bc11-8150-4f4d-8c2b-5fae92c88a9f
    status: experimental
    description: >-
      Detects mshta execution where an HTTP/HTTPS URL targets a host expressed as a
      dot-quad IPv4 address or hex-encoded IPv4 address, excluding RFC1918 private
      address ranges. Threat actors frequently use raw or hex-encoded IP literals to
      evade domain filtering and deliver malicious HTA payloads.
    references:
      - https://attack.mitre.org/techniques/T1218/005/
      - https://attack.mitre.org/techniques/T1105/
    tags:
      - attack.defense_evasion
      - attack.execution
      - attack.command_and_control
      - attack.t1218.005
      - attack.t1105
    author: Firestrike::Labs
    date: 2025-11-30T00:00:00.000Z
    logsource:
      category: process_creation
      product: windows
      service: security
    detection:
      selection_regex:
        CommandLine|re: |
          (?ix) mshta (?:\.exe)? .* https?:\/\/ (
            (0x[0-9a-f]+|\d{1,3})
            \.
            (0x[0-9a-f]+|\d{1,3})
            \.
            (0x[0-9a-f]+|\d{1,3})
            \.
            (0x[0-9a-f]+|\d{1,3})
          )
      selection_rfc1918:
        CommandLine|re: |
          (?ix) mshta (?:\.exe)? .* https?:\/\/ (
            10 \.\d{1,3}\.\d{1,3}\.\d{1,3}
            |
            172\.(1[6-9]|2[0-9]|3[0-1])\.\d{1,3}\.\d{1,3}
            |
            192\.168\.\d{1,3}\.\d{1,3}
          )
      condition: selection_regex and not selection_rfc1918
    fields:
      - CommandLine
      - ParentImage
      - Image
      - User
    falsepositives:
      - Legitimate mshta testing or tooling in controlled lab environments using
        direct public IP addresses.
    level: high
query_type: sigma
severity: medium
tactics:
    - TA0005
    - TA0002
    - TA0011
techniques:
    - T1218.005
    - T1105
