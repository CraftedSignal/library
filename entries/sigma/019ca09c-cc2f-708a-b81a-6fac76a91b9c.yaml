id: 019ca09c-cc2f-708a-b81a-6fac76a91b9c
name: Matanbuchus Loader Mutex Detection
description: This rule detects the creation of specific mutex names associated with the Matanbuchus loader. The rule looks for mutexes matching the pattern 'sync<UniqueID>', where <UniqueID> is a variable string. This activity is indicative of Matanbuchus loader execution.
query: |-
    title: Matanbuchus Loader Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Matanbuchus loader activity.
    author: '@adhikara13'
    date: 2024/07/19
    references:
      - 'https://www.morphisec.com/blog/ransomware-threat-matanbuchus-3-0-maas-levels-up/'
    tags:
      - 'attack.execution.t1204'
      - 'malware.loader.matanbuchus'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'sync<UniqueID>'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0002
techniques:
    - T1204
tags:
    - attack.execution.t1204
    - malware.loader.matanbuchus
author: '@adhikara13'
version: "1"
references:
    - https://www.morphisec.com/blog/ransomware-threat-matanbuchus-3-0-maas-levels-up/
data_sources:
    - process_creation
    - windows
