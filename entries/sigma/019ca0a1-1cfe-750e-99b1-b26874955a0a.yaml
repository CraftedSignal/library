id: 019ca0a1-1cfe-750e-99b1-b26874955a0a
name: SpeedStealer Mutex Detection
description: The rule detects the creation of specific mutexes associated with SpeedStealer malware. It specifically looks for a mutex named 'gamcop'. The detection is based on monitoring process creation events on Windows systems.
query: |-
    title: SpeedStealer Mutex Detection
    status: experimental
    description: Detects known mutexes associated with SpeedStealer activity.
    author: '@adhikara13'
    date: 2025/07/30
    references:
      - 'https://cacts.cn/anquanjujiao/495.html'
    tags:
      - 'attack.credential_access.t1555'
      - 'malware.stealer.speedstealer'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'gamcop'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0006
techniques:
    - T1555
tags:
    - attack.credential_access.t1555
    - malware.stealer.speedstealer
author: '@adhikara13'
version: "1"
references:
    - https://cacts.cn/anquanjujiao/495.html
data_sources:
    - process_creation
    - windows
