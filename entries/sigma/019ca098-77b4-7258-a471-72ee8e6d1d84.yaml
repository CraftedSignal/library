id: 019ca098-77b4-7258-a471-72ee8e6d1d84
name: DFKRAT Backdoor Mutex Detection
description: This rule detects the creation of specific mutex names ('loasd6asdg6') that are known to be associated with the DFKRAT backdoor. The detection logic specifically looks for these mutex names within process creation events on Windows systems. The presence of these mutexes indicates potential DFKRAT backdoor activity, which is often related to persistence mechanisms.
query: |-
    title: DFKRAT Backdoor Mutex Detection
    status: experimental
    description: Detects known mutexes associated with DFKRAT backdoor activity.
    author: '@adhikara13'
    date: 2025/01/27
    references:
      - 'https://rt-solar.ru/solar-4rays/blog/4124/'
    tags:
      - 'attack.persistence.t1547'
      - 'malware.backdoor.dfkrat'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'loasd6asdg6'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0003
    - TA0004
techniques:
    - T1547
tags:
    - attack.persistence.t1547
    - malware.backdoor.dfkrat
author: '@adhikara13'
version: "1"
