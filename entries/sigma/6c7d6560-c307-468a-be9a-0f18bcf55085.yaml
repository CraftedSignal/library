id: 6c7d6560-c307-468a-be9a-0f18bcf55085
name: Salesforce SOQL Query for Sensitive Credentials
description: |
    Detects Salesforce Object Query Language (SOQL) queries that may be attempting to access or exfiltrate sensitive credentials like passwords, API keys, or tokens stored within Salesforce objects. This activity was observed in the UNC6395 campaign where attackers targeted AWS keys, Snowflake tokens, and passwords.
query: |
    title: Salesforce SOQL Query for Sensitive Credentials
    id: b829f8f9-1295-4394-a9aa-76db9525b6c9
    status: experimental
    description: >
      Detects Salesforce Object Query Language (SOQL) queries that may be attempting
      to access or exfiltrate sensitive credentials like passwords, API keys, or
      tokens stored within Salesforce objects. This activity was observed in the
      UNC6395 campaign where attackers targeted AWS keys, Snowflake tokens, and
      passwords.
    references:
      - https://www.reveal.security/blog/unc6395-targets-salesforce-via-drift-when-your-saas-ecosystem-becomes-the-attack-vector
    author: detections.ai
    date: 2025-08-27T00:00:00.000Z
    tags:
      - attack.credential_access
      - attack.t1552.001
      - cloud
      - saas
      - salesforce
    logsource:
      category: cloud
      product: salesforce
    detection:
      selection_keywords:
        QUERY|contains:
          - password
          - pwd
          - secret
          - token
          - aws_key
          - aws_secret
          - snowflake
      selection_akia:
        QUERY|contains: AKIA
      condition: selection_keywords or selection_akia
    falsepositives:
      - Legitimate queries for fields that happen to contain these keywords (e.g., a
        field named 'Token_Status__c').
    level: high
query_type: sigma
severity: high
tactics:
    - TA0006
    - TA0009
techniques:
    - T1552.001
    - T1213.004
