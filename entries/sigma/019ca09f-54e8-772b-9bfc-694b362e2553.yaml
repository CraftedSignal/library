id: 019ca09f-54e8-772b-9bfc-694b362e2553
name: RAWorld Ransomware Mutex Detection
description: This rule detects the creation of specific mutexes known to be associated with RAWorld ransomware activity. The rule specifically looks for the mutex name 'For whom the bell tolls, it tolls for thee'. Detection of this mutex indicates a high probability of RAWorld ransomware execution on the system.
query: |-
    title: RAWorld Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with RAWorld ransomware activity.
    author: '@adhikara13'
    date: 2025/07/16
    references:
      - 'https://unit42.paloaltonetworks.com/ra-world-ransomware-group-updates-tool-set/'
      - 'https://www.trendmicro.com/en_us/research/24/c/multistage-ra-world-ransomware.html'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.raworld'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'For whom the bell tolls, it tolls for thee'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.raworld
author: '@adhikara13'
version: "1"
references:
    - https://unit42.paloaltonetworks.com/ra-world-ransomware-group-updates-tool-set/
    - https://www.trendmicro.com/en_us/research/24/c/multistage-ra-world-ransomware.html
data_sources:
    - process_creation
    - windows
