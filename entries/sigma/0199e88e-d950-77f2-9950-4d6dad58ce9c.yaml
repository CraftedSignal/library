id: 0199e88e-d950-77f2-9950-4d6dad58ce9c
name: MonsterV2 Mutex Creation
description: Detects the creation of a mutex with a specific pattern used by the MonsterV2 malware, a sophisticated RAT, loader, and stealer.
query: |
    title: MonsterV2 Mutex Creation
    id: 174dd877-6e17-41f9-a0d9-146e336b45bb
    status: experimental
    description: Detects the creation of a mutex with a specific pattern used by the
      MonsterV2 malware, a sophisticated RAT, loader, and stealer.
    references:
      - https://www.proofpoint.com/us/blog/threat-insight/when-monster-bytes-tracking-ta585-and-its-arsenal
    author: detections.ai
    date: 2025-10-15
    tags:
      - attack.t1543.003
      - malware.monsterv2
    logsource:
      product: windows
      category: process_access # This typically corresponds to Sysmon Event ID 10.
    detection:
      selection:
        # MonsterV2 creates a mutex with the format "Mutant-<unique_id_64_characters>" in the \BaseNamedObjects directory.
        TargetObject|startswith: '\BaseNamedObjects\Mutant-'
      condition: selection
    falsepositives:
      - Unlikely, but possible if other software uses this mutex naming convention.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0005
techniques:
    - T1480.002
