id: 9f434344-a0d4-4d09-9695-8895feea311f
name: APT28 - Regsvr32 LOLBin Execution with Remote Payload
description: Detects use of regsvr32.exe to load remote script/control objects from suspicious URLs, a technique used by APT28 and others.
query: |
    title: APT28 - Regsvr32 LOLBin Execution with Remote Payload
    id: b27c1c3a-apt28-regsvr32
    description: Detects use of regsvr32.exe to load remote script/control objects
      from suspicious URLs, a technique used by APT28 and others.
    author: Chaitanya Bobhate (@mralien)
    status: experimental
    tags:
      - attack.execution
      - attack.t1218.010
      - attack.t1105
      - apt.apt28
    logsource:
      product: windows
      category: process_creation
    detection:
      selection:
        Image|endswith: '\regsvr32.exe'
        CommandLine|contains:
          - 'http'
          - '.sct'
          - '.ocx'
      condition: selection
    fields:
      - CommandLine
      - Image
      - ParentImage
      - User
    falsepositives:
      - Software installation using regsvr32 legitimately
    level: high
query_type: sigma
severity: medium
tags:
    - attack.execution
    - attack.t1218.010
    - attack.t1105
    - apt.apt28
author: Chaitanya Bobhate (@mralien)
version: "1"
