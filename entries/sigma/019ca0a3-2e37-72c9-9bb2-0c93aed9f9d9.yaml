id: 019ca0a3-2e37-72c9-9bb2-0c93aed9f9d9
name: XieBroRAT Mutex Detection
description: The rule detects the creation of a process that utilizes specific mutex names associated with XieBroRAT malware. Specifically, it looks for the mutex name 'pLONGFEIFFmm1'. This indicates potential XieBroRAT activity on a Windows system, likely related to its command and control or persistence mechanisms. The detection is based on process creation events where these mutex names are observed.
query: |-
    title: XieBroRAT Mutex Detection
    status: experimental
    description: Detects known mutexes associated with XieBroRAT activity.
    author: '@adhikara13'
    date: 2024/12/19
    references:
      - 'https://app.any.run/tasks/c2f62dff-09bd-4498-b528-9154c87dc101?malconf=682e320dafec3767f7fee726'
    tags:
      - 'attack.command_and_control.t1219'
      - 'malware.rat.xiebrorat'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'pLONGFEIFFmm1'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0011
techniques:
    - T1219
tags:
    - attack.command_and_control.t1219
    - malware.rat.xiebrorat
author: '@adhikara13'
version: "1"
references:
