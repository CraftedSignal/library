id: 019c48f4-95a3-7319-9c7e-0a590d3e2a15
name: Suspicious PowerShell Commands in Registry
description: This rule detects suspicious PowerShell commands that are written to the Windows registry. It specifically looks for registry events where the 'Details' field contains keywords indicative of PowerShell execution ('powershell', 'pwsh') combined with suspicious command elements. These suspicious elements include obfuscation flags or download capabilities such as 'iex', 'Invoke-Expression', 'DownloadString', 'DownloadFile', 'Net.WebClient', 'FromBase64String', '-w hidden', '-windowstyle hidden', '-ep bypass', '-executionpolicy bypass', '-enc ', and '-encodedcommand'. The presence of such commands in the registry may indicate a persistence mechanism, a configuration backdoor, or automated malware execution.
query: "title: Suspicious PowerShell Commands in Registry\r\nid: e6d22d2f-b3ed-497e-9160-32699a9430d5\r\nstatus: experimental\r\ndescription: Detects suspicious PowerShell commands with obfuscation flags or download capabilities written to the registry. May indicate persistence mechanism, configuration backdoor, or automated malware execution.\r\nreferences:\r\n  - https://attack.mitre.org/techniques/T1112/\r\n  - https://attack.mitre.org/techniques/T1059.001/\r\nauthor: SimSpace\r\ndate: 2026-01-19\r\ntags:\r\n  - attack.persistence\r\n  - attack.defense-evasion\r\n  - attack.execution\r\n  - attack.t1112\r\n  - attack.t1059.001\r\nlogsource:\r\n    category: registry_event\r\n    product: windows\r\ndetection:\r\n    selection_powershell:\r\n        Details|contains:\r\n            - 'powershell'\r\n            - 'pwsh'\r\n    selection_suspicious:\r\n        Details|contains:\r\n            - 'iex'\r\n            - 'Invoke-Expression'\r\n            - 'DownloadString'\r\n            - 'DownloadFile'\r\n            - 'Net.WebClient'\r\n            - 'FromBase64String'\r\n            - '-w hidden'\r\n            - '-windowstyle hidden'\r\n            - '-ep bypass'\r\n            - '-executionpolicy bypass'\r\n            - '-enc '\r\n            - '-encodedcommand'\r\n    condition: selection_powershell and selection_suspicious\r\nfields:\r\n    - TargetObject\r\n    - Details\r\n    - User\r\nfalsepositives:\r\n    - Unknown\r\nlevel: medium"
