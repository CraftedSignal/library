id: 019ae5a5-1604-7357-bd1d-71db1d99436a
name: React Server Components (RSC) Prototype Pollution & RCE Attempt
description: Detects attempts to exploit CVE-2025-55182 (React) and CVE-2025-66478 (Next.js) by identifying Prototype Pollution vectors (__proto__, constructor) specifically targeting the React Flight protocol (RSC headers/params). Covers both clear-text and common JSON escape sequences. The rule also correlates with 500 errors to identify potential successful exploitation or blind probing attempts.
query: "title: React Server Components (RSC) Prototype Pollution & RCE Attempt\nid: cve-2025-55182-rsc-combined\nstatus: stable\ndescription: >\n    Detects attempts to exploit CVE-2025-55182 (React) and CVE-2025-66478 (Next.js) by identifying \n    Prototype Pollution vectors (__proto__, constructor) specifically targeting the React Flight \n    protocol (RSC headers/params). Covers both clear-text and common JSON escape sequences.\nauthor: Aaron Mog - detections.ai\ndate: 2025/12/03\nreferences:\n    - https://react.dev/blog/2025/12/03/server-components-security-update\n    - https://wiz.io/blog/cve-2025-55182-react-rce\nlogsource:\n    category: web_server\n    definition: 'Requirements: Logs must include HTTP headers, URI query parameters, and Request Body.'\ndetection:\n    # ---------------------------------------------------------\n    # 1. Target Identification (The \"Where\")\n    # ---------------------------------------------------------\n    selection_rsc_context:\n        - http_headers|contains: 'RSC: 1'\n        - cs-uri-query|contains: '_rsc='\n        - http_content_type|contains: 'text/x-component'\n\n    # ---------------------------------------------------------\n    # 2. Attack Vector Identification (The \"What\")\n    # ---------------------------------------------------------\n    selection_pollution_payload:\n        request_body|contains|all:\n            # Matches standard and escaped variations of __proto__\n            # Note: Regex is resource intensive; 'contains' is faster if your SIEM supports case-insensitive\n            - '__proto__' \n        \n    selection_pollution_variants:\n        request_body|contains:\n            - '\"constructor\"'\n            - '\"prototype\"'\n            - '\\u005f\\u005fproto\\u005f\\u005f'  # JSON escaped __proto__\n            - '\\\\u005f\\\\u005fproto\\\\u005f\\\\u005f' # Double escaped (common in logs)\n\n    # ---------------------------------------------------------\n    # 3. Anomaly / Impact Correlation (The \"Outcome\")\n    # ---------------------------------------------------------\n    # Optional: Correlate with 500 errors to find successful \"crashes\" (blind probing)\n    selection_server_error:\n        sc-status: 500\n\n    condition:\n        # LOGIC:\n        # 1. Must be RSC traffic AND contain pollution keywords (High Confidence)\n        (selection_rsc_context and (selection_pollution_payload or selection_pollution_variants))\n        \n        # OR\n        \n        # 2. RSC traffic resulting in 500 errors with suspicious keywords (Medium Confidence / Fuzzing Detection)\n        or (selection_rsc_context and selection_server_error and (selection_pollution_payload or selection_pollution_variants))\n\nfields:\n    - c-ip\n    - cs-method\n    - cs-uri\n    - http_user_agent\nfalsepositives:\n    - Security scanners (authorized)\n    - Developers testing the patch in staging environments\nlevel: critical\ntags:\n    - attack.initial_access\n    - attack.t1190\n    - cve.2025.55182"
