id: 019ca094-0423-733e-8b0d-83a57e8bce4b
name: AsyncRAT Mutex Detection
description: Detects the creation of specific mutexes known to be associated with AsyncRAT malware. The rule looks for mutex names matching 'AsyncMutex_<uniqueid>', which are characteristic of AsyncRAT activity. This detection helps identify potential AsyncRAT infections on Windows systems by monitoring process creation events for these unique mutex patterns.
query: |-
    title: AsyncRAT Mutex Detection
    status: experimental
    description: Detects known mutexes associated with AsyncRAT activity.
    author: '@adhikara13'
    date: 2024/08/01
    references:
      - 'https://blog.talosintelligence.com/nanocore-netwire-and-asyncrat-spreading/'
      - 'https://blog.qualys.com/vulnerabilities-threat-research/2022/08/16/asyncrat-c2-framework-overview-technical-analysis-and-detection'
    tags:
      - 'attack.command_and_control.t1219'
      - 'malware.rat.asyncrat'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'AsyncMutex_<uniqueid>'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0011
techniques:
    - T1219
tags:
    - attack.command_and_control.t1219
    - malware.rat.asyncrat
author: '@adhikara13'
version: "1"
references:
    - https://blog.talosintelligence.com/nanocore-netwire-and-asyncrat-spreading/
    - https://blog.qualys.com/vulnerabilities-threat-research/2022/08/16/asyncrat-c2-framework-overview-technical-analysis-and-detection
data_sources:
    - process_creation
    - windows
