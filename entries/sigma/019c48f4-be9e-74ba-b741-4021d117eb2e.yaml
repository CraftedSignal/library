id: 019c48f4-be9e-74ba-b741-4021d117eb2e
name: UAC Bypass Registry Key Deletion
description: The rule detects the deletion of specific registry keys associated with UAC bypass techniques. Specifically, it looks for deletions where the 'TargetObject' field contains the string '\ms-settings\Shell\Open\command'. This activity is indicative of anti-forensics, as an attacker might delete these keys to remove evidence of privilege escalation after performing a UAC bypass.
query: "title: UAC Bypass Registry Key Deletion\r\nid: 8129b607-a3af-47ad-bd64-09d90b47a6e8\r\nstatus: experimental\r\ndescription: Detects deletion of ms-settings registry keys used for UAC bypass techniques, indicating anti-forensics activity to remove evidence of privilege escalation.\r\nreferences:\r\n    - https://attack.mitre.org/techniques/T1070/\r\n    - https://attack.mitre.org/techniques/T1548/002/\r\nauthor: SimSpace\r\ndate: 2026-01-01\r\nmodified: 2026-01-19\r\ntags:\r\n    - attack.defense-evasion\r\n    - attack.privilege-escalation\r\n    - attack.t1070\r\n    - attack.t1548.002\r\nlogsource:\r\n    category: registry_delete\r\n    product: windows\r\ndetection:\r\n    selection:\r\n        TargetObject|contains: '\\ms-settings\\Shell\\Open\\command'\r\n    condition: selection\r\nfields:\r\n    - TargetObject\r\n    - User\r\n    - Image\r\nfalsepositives:\r\n    - Unknown\r\nlevel: high"
