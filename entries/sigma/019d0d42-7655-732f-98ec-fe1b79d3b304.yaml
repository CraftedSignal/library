id: 019d0d42-7655-732f-98ec-fe1b79d3b304
name: Claude.com Open Redirect Abuse
description: Detects access to the claude.com open redirect endpoint pointing to external domains. Attackers can abuse this trusted domain to bypass ad validation and email filters to deliver malicious payloads, such as prompt injections.
query: |
    title: Claude.com Open Redirect Abuse
    id: b7e443a9-e8ca-41bb-9503-88b749c15d50
    status: experimental
    description: Detects access to the claude.com open redirect endpoint pointing to
      external domains. Attackers can abuse this trusted domain to bypass ad
      validation and email filters to deliver malicious payloads, such as prompt
      injections.
    author: detections.ai
    references:
      - https://pages.oasis.security/rs/106-PZV-596/images/claudyday-vulnerability.pdf
    date: 2026-03-20
    tags:
      - attack.initial-access
      - attack.t1566.002
      - attack.t1190
    logsource:
      category: proxy
    detection:
      # Matches the vulnerable Claude.com redirect endpoint
      selection_endpoint:
        cs-host: 'claude.com'
        cs-uri-stem|startswith: '/redirect/'

      # Identifies external URL targets embedded in the path or query string
      selection_target:
        - cs-uri-stem|contains:
            - '/http://'
            - '/https://'
            - '/http%3A'
            - '/https%3A'
        - cs-uri-query|contains:
            - 'http://'
            - 'https://'
            - 'http%3A'
            - 'https%3A'

      # Placeholder for tuning: Add legitimate domains Anthropic might redirect to natively.
      # This helps reduce false positives from normal application behavior.
      filter_trusted_domains:
        cs-uri-stem|contains:
          - 'anthropic.com'
          - 'claude.ai'
        cs-uri-query|contains:
          - 'anthropic.com'
          - 'claude.ai'

      condition: selection_endpoint and selection_target and not 1 of filter_*
    falsepositives:
      - Legitimate internal redirects used by Anthropic.
      - Users manually sharing legitimate, non-malicious links through the
        redirector.
    level: medium
query_type: sigma
severity: medium
tactics:
    - TA0001
techniques:
    - T1566.002
    - T1190
tags:
    - attack.initial-access
