id: 019abbe7-2f1f-760b-9cfa-2ca79228e008
name: RONINGLOADER NSIS Installer File Drop
description: Detects the creation of files in a directory known to be created by a malicious NSIS installer associated with the RONINGLOADER campaign.
query: |
    title: RONINGLOADER NSIS Installer File Drop
    id: 6b2eebec-524f-4dab-bb4c-1d6a78437995
    status: experimental
    description: Detects the creation of files in a directory known to be created by
      a malicious NSIS installer associated with the RONINGLOADER campaign.
    references:
      - https://www.elastic.co/security-labs/roningloader
    author: detections.ai
    date: 2025-11-25
    tags:
      - attack.execution
      - attack.t1204.002
    logsource:
      category: file_event
      product: windows
    detection:
      selection:
        # Detects file creation in the specific directory used by the RONINGLOADER malicious installer.
        TargetFilename|startswith: 'C:\Program Files\Snieoatwtregoable\'
      condition: selection
    falsepositives:
      - This path is highly specific to this malware campaign and is not expected to
        be used by legitimate software. False positives are highly unlikely.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0002
techniques:
    - T1204.002
