id: 019ca09f-df10-737b-84b9-0c0abb04a9c4
name: Rhadamanthys Stealer Mutex Detection
description: The rule detects the creation of processes that utilize specific mutex names associated with the Rhadamanthys stealer. Specifically, it looks for the mutex name 'Global\MSCTF.Asm.{digits}', where '{digits}' represents a variable sequence of numbers. This mutex pattern is a known indicator of Rhadamanthys stealer activity, suggesting the presence of this malware on the system.
query: |-
    title: Rhadamanthys Stealer Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Rhadamanthys stealer activity.
    author: '@adhikara13'
    date: 2024/05/22
    references:
      - 'https://elis531989.medium.com/dancing-with-shellcodes-analyzing-rhadamanthys-stealer-3c4986966a88'
    tags:
      - 'attack.credential_access.t1555'
      - 'malware.stealer.rhadamanthys'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Global\MSCTF.Asm.{digits}'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0006
techniques:
    - T1555
tags:
    - attack.credential_access.t1555
    - malware.stealer.rhadamanthys
author: '@adhikara13'
version: "1"
references:
    - https://elis531989.medium.com/dancing-with-shellcodes-analyzing-rhadamanthys-stealer-3c4986966a88
data_sources:
