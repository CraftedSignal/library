id: 019ca0a2-dd67-7072-ae80-5c10621746c0
name: WannaCry Ransomware Mutex Detection
description: This rule detects the presence of specific mutex names associated with WannaCry ransomware activity. The rule looks for processes creating or interacting with mutexes named 'MsWinZonesCacheCounterMutexA' or 'Global\MsWinZonesCacheCounterMutexW'. These mutexes are known indicators of WannaCry infection.
query: |-
    title: WannaCry Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with WannaCry ransomware activity.
    author: '@adhikara13'
    date: 2025/01/09
    references:
      - 'https://www.group-ib.com/blog/echoes/'
      - 'https://www.elastic.co/blog/wcrywanacry-ransomware-technical-analysis'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.wannacry'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'MsWinZonesCacheCounterMutexA'
          - 'Global\MsWinZonesCacheCounterMutexW'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.wannacry
author: '@adhikara13'
version: "1"
references:
    - https://www.group-ib.com/blog/echoes/
    - https://www.elastic.co/blog/wcrywanacry-ransomware-technical-analysis
data_sources:
    - process_creation
    - windows
