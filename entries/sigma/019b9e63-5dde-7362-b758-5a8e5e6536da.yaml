name: VS Code Remote Tunnel Without Authentication
description: Detects VS Code CLI (code.exe) executed with the --without-connection-token parameter, which disables authentication for remote tunnel access.
query: |
    title: VS Code Remote Tunnel Without Authentication
    id: 55f749da-a8b4-47a9-ae22-546b61455f4a
    status: test
    description: >-
      Detects VS Code CLI (code.exe) executed with the --without-connection-token
      parameter, which disables authentication for remote tunnel access.
    references:
      - https://attack.mitre.org/techniques/T1219/
      - https://code.visualstudio.com/docs/remote/tunnels
    author: SimSpace
    date: 2026-01-01T00:00:00.000Z
    tags:
      - attack.command-and-control
      - attack.t1219
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        Image|endswith: \code.exe
        CommandLine|contains: '--without-connection-token'
      condition: selection
    falsepositives:
      - None currently known.
    level: high
