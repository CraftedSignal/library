id: c5fa1afa-f85a-4b3f-9d70-f134e112f947
name: Suspicious PowerShell LNK Execution via User Interaction
description: |
    Detects the execution of a suspicious PowerShell dropper script, often initiated by a user clicking a malicious file (e.g., LNK). This pattern is common in phishing campaigns, including those by groups like Kimsuky. The detection looks for PowerShell commands that use common evasion techniques (like hidden windows or bypassing execution policies).
query: |
    title: Suspicious PowerShell LNK Execution via User Interaction
    id: fce115f8-5c86-4c4e-aa6d-b3f3f621804b
    status: experimental
    description: >
      Detects the execution of a suspicious PowerShell dropper script, often
      initiated by a user clicking a malicious file (e.g., LNK). This pattern is
      common in phishing campaigns, including those by groups like Kimsuky. The
      detection looks for PowerShell commands that use common evasion techniques
      (like hidden windows or bypassing execution policies).
    references:
      - https://www.securonix.com/blog/analyzing-deepdrive-north-korean-threat-actors-observed-exploiting-trusted-platforms-for-targeted-attacks/
    author: detections.ai
    date: 2025-08-25T00:00:00.000Z
    tags:
      - attack.initial_access
      - attack.t1566.001
      - attack.execution
      - attack.t1204.002
      - attack.defense_evasion
      - attack.t1027
      - group.kimsuky
    logsource:
      category: process_creation
      product: windows
      service: security
    detection:
      process:
        Image|endswith: \powershell.exe
        ParentImage|endswith: \explorer.exe
      evasion_flags:
        CommandLine|contains:
          - ' -w hidden'
          - ' -windowstyle hidden'
          - ' -w 1'
          - ' -ep bypass'
          - ' -executionpolicy bypass'
          - ' -noni'
          - ' -noninteractive'
      condition: process and evasion_flags
    falsepositives:
      - Legitimate but complex administration scripts might use a similar
        combination of commands and flags. However, such scripts being launched
        directly by a user from explorer.exe is uncommon and warrants investigation.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0001
    - TA0002
    - TA0005
techniques:
    - T1566.001
    - T1204.002
    - T1027
