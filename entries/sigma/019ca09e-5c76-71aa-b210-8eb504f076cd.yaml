id: 019ca09e-5c76-71aa-b210-8eb504f076cd
name: Persian RAT Mutex Detection
description: This rule detects the creation of processes that utilize specific mutex names associated with Persian RAT activity. The detection is based on the presence of the string 'Persian' within the MutexName field during process creation events on Windows systems. This indicates potential command and control (C2) communication or other malicious operations by the Persian RAT.
query: |-
    title: Persian RAT Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Persian RAT activity.
    author: '@adhikara13'
    date: 2024/07/19
    references:
      - 'https://cyble.com/blog/new-persian-remote-world-selling-a-suite-of-malicious-tools/'
    tags:
      - 'attack.command_and_control.t1219'
      - 'malware.rat.persian_rat'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Persian'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0011
techniques:
    - T1219
tags:
    - attack.command_and_control.t1219
    - malware.rat.persian_rat
author: '@adhikara13'
version: "1"
references:
    - https://cyble.com/blog/new-persian-remote-world-selling-a-suite-of-malicious-tools/
data_sources:
    - process_creation
    - windows
