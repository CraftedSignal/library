id: 019c1d4a-6e51-7162-965e-f03569507a88
name: eScan CONSCTLX.exe Replacement Indicative of Persistent Payload
description: |
    Detects replacement or modification of the eScan CONSCTLX.exe component located in C:\Program Files (x86)\eScan\. Replacing this binary may allow execution of a persistent next-stage payload under the guise of a trusted antivirus process.
query: "title: eScan CONSCTLX.exe Replacement Indicative of Persistent Payload\r\nid: a6f3e8b2-4c91-4d6a-9f2a-7e3c9b1d4f88\r\nstatus: experimental\r\ndescription: >\r\n  Detects replacement or modification of the eScan CONSCTLX.exe component located in C:\\Program Files (x86)\\eScan\\. Replacing this binary may allow execution of a persistent next-stage payload under the guise of a trusted antivirus process.\r\nauthor: Thaung Htet\r\ndate: 2026-02-02\r\nreferences:\r\n  - https://securelist.com/escan-supply-chain-attack/118688/\r\n  - https://www.securityweek.com/escan-antivirus-delivers-malware-in-supply-chain-attack/\r\n  - https://www.morphisec.com/blog/critical-escan-threat-bulletin/\r\n  - https://www.infosecurity-magazine.com/news/escan-antivirus-breach-delivers/\r\ntags:\r\n  - attack.persistence\r\n  - attack.defense_evasion\r\n  - attack.t1554\r\nlogsource:\r\n  product: windows\r\n  category: file_event\r\ndetection:\r\n  escan_binary:\r\n    TargetFilename|endswith:\r\n      - '\\Program Files (x86)\\eScan\\CONSCTLX.exe'\r\n  suspicious_action:\r\n    EventType:\r\n      - FileCreate\r\n      - FileOverwrite\r\n      - FileDelete\r\n  condition: escan_binary and suspicious_action\r\nfalsepositives:\r\n  - Legitimate eScan software updates or reinstallations\r\n  - Authorized repair operations\r\nlevel: critical"
