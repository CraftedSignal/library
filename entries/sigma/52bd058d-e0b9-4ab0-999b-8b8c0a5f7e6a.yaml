id: 52bd058d-e0b9-4ab0-999b-8b8c0a5f7e6a
name: Potential TryCloudflare Tunnel Misuse via Scripting
description: Detects potential misuse of TryCloudflare tunnels for malware delivery or C2 communication by monitoring command-line arguments of common scripting and download tools. Adversaries leverage legitimate services like TryCloudflare to host malicious payloads and evade detection.
query: |-
    title: Potential TryCloudflare Tunnel Misuse via Scripting
    id: 5971481b-a01c-4b2e-a22f-1a9c3b71e84d
    status: stable
    description: Detects potential misuse of TryCloudflare tunnels for malware delivery or C2 communication by monitoring command-line arguments of common scripting and download tools. Adversaries leverage legitimate services like TryCloudflare to host malicious payloads and evade detection.
    author: Detections.ai
    date: 2025-07-08
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        Image|endswith:
          - '\powershell.exe'
          - '\pwsh.exe'
          - '\cmd.exe'
          - '\wscript.exe'
          - '\cscript.exe'
          - '\mshta.exe'
          - '\curl.exe'
          - '\wget.exe'
        CommandLine|contains: '.trycloudflare.com'
      condition: selection
      falsepositives:
        - Legitimate use of TryCloudflare tunnels for development or authorized purposes. Organizations should whitelist known legitimate uses.
    level: high
    tags:
      - attack.command_and_control
      - attack.t1071.001 # Application Layer Protocol: Web Protocols
      - attack.t1102.002 # Web Service: Bidirectional Communication
      - attack.t1567.002 # Exfiltration Over Web Service: Exfiltration to Cloud Storage
      - attack.t1059.001 # Command and Scripting Interpreter: PowerShell
      - attack.t1059.003 # Command and Scripting Interpreter: Windows Command Shell
      - attack.t1218.005 # Signed Binary Proxy Execution: Mshta
      - attack.t1202 # Indirect Command Execution
    references:
      - https://www.forcepoint.com/blog/x-labs/asyncrat-reloaded-python-trycloudflare-malware
