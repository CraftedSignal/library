id: 019c9638-fe76-71df-9f32-6ebc1a0aa453
name: Agent Tesla Multi Stage - Script Engine Download Or Decode Primitives
description: Detects script engines using common download or decoding primitives that frequently appear in staged malware delivery.
query: |
    title: Agent Tesla Multi Stage - Script Engine Download Or Decode Primitives
    id: 9a3c2f4a-2d69-4c9d-8e7a-45f0d6c15b21
    status: experimental
    description: >-
      Detects script engines using common download or decoding primitives that
      frequently appear in staged malware delivery.
    author: Daniel Jeremiah
    date: 2026-02-24T00:00:00.000Z
    references:
      - >-
        https://www.fortinet.com/blog/threat-research/unmasking-agent-tesla-deep-dive-into-multi-stage-campaign
    tags:
      - attack.execution
      - attack.t1059
      - attack.command_and_control
      - attack.t1105
    logsource:
      product: windows
      category: process_creation
    detection:
      selection_script_engine:
        Image|endswith:
          - \powershell.exe
          - \pwsh.exe
          - \cmd.exe
          - \wscript.exe
          - \cscript.exe
          - \mshta.exe
      selection_download_or_decode:
        CommandLine|contains:
          - Invoke-WebRequest
          - 'iwr '
          - Start-BitsTransfer
          - 'bitsadmin '
          - System.Net.WebClient
          - DownloadString
          - DownloadFile
          - FromBase64String
          - certutil -decode
          - 'curl '
          - 'wget '
      condition: selection_script_engine and selection_download_or_decode
    falsepositives:
      - Administrative scripting and software deployment
    level: high
query_type: sigma
severity: medium
tactics:
    - TA0002
    - TA0011
    - TA0005
techniques:
    - T1059
    - T1105
    - T1059.001
    - T1218.005
tags:
    - attack.execution
    - attack.t1059
    - attack.command_and_control
    - attack.t1105
author: Daniel Jeremiah
version: "2"
references:
    - https://www.fortinet.com/blog/threat-research/unmasking-agent-tesla-deep-dive-into-multi-stage-campaign
data_sources:
    - process_creation
    - windows
