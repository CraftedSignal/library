id: 019ca098-e2f8-70c8-9ae8-d838b45ea34e
name: Ducktail Stealer Mutex Detection
description: The rule detects the creation of specific mutexes ('ICollectVASD') which are known to be associated with the Ducktail stealer malware. This indicates potential Ducktail stealer activity on the system, aiming to prevent multiple instances of the malware from running simultaneously.
query: |-
    title: Ducktail Stealer Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Ducktail stealer activity.
    author: '@adhikara13'
    date: 2024/05/22
    references:
      - 'https://www.duskrise.com/2023/10/25/the-duck-is-hiring-in-italy-ducktail-spread-via-compromised-linkedin-profiles/'
      - 'https://www.appgate.com/blog/vietnamese-information-stealer-campaigns-target-professionals-on-linkedin'
    tags:
      - 'attack.credential_access.t1555'
      - 'malware.stealer.ducktail'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'ICollectVASD'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0006
techniques:
    - T1555
tags:
    - attack.credential_access.t1555
    - malware.stealer.ducktail
author: '@adhikara13'
version: "1"
references:
    - https://www.duskrise.com/2023/10/25/the-duck-is-hiring-in-italy-ducktail-spread-via-compromised-linkedin-profiles/
    - https://www.appgate.com/blog/vietnamese-information-stealer-campaigns-target-professionals-on-linkedin
data_sources:
    - process_creation
    - windows
