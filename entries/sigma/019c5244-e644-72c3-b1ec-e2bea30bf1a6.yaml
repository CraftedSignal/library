id: 019c5244-e644-72c3-b1ec-e2bea30bf1a6
name: Suspicious Chrome Script Staging
description: |
    Detects the creation of a JavaScript file in unusual subdirectories of the Google Chrome user data or application support folders. This behavior was observed in the 'graphalgo' campaign by the Lazarus Group to stage second-stage payloads.
query: |
    title: Suspicious Chrome Script Staging
    id: 10daa371-446e-4666-b4a1-48f940118d71
    status: experimental
    description: >
      Detects the creation of a JavaScript file in unusual subdirectories of the
      Google Chrome user data or application support folders. This behavior was
      observed in the 'graphalgo' campaign by the Lazarus Group to stage
      second-stage payloads.
    references:
      - https://www.reversinglabs.com/blog/inside-graphalgo
    author: tim@detections.ai
    date: 2026-02-12T00:00:00.000Z
    tags:
      - attack.t1547.001
      - attack.t1106
    logsource:
      category: file_event
      product: windows
    detection:
      selection:
        TargetFilename|endswith:
          - '\AppData\Local\Google\Chrome\User Data\Scripts\startup.js'
          - '\AppData\Local\Scripts\startup.js'
          - '/.config/google-chrome/Scripts/startup.js'
          - '/.config/Scripts/startup.js'
          - '/Library/Application Support/Google/Chrome/Scripts/startup.js'
          - '/Library/Application Support/Scripts/startup.js'
      condition: selection
    falsepositives:
      - It is highly unlikely that legitimate applications will write a 'startup.js'
        file to these specific, non-standard directories.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0003
    - TA0004
techniques:
    - T1547.001
tags:
    - attack.t1547.001
    - attack.t1106
author: tim@detections.ai
version: "3"
references:
    - https://www.reversinglabs.com/blog/inside-graphalgo
data_sources:
    - file_event
