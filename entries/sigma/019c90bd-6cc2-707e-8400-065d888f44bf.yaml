id: 019c90bd-6cc2-707e-8400-065d888f44bf
name: BQTLock-like Fodhelper UAC Bypass Registry Staging
description: Detects registry modifications consistent with the fodhelper.exe UAC bypass technique (ms-settings handler), which is explicitly referenced in ANY.RUN's BQTLock behavioral writeup.
query: |
    title: BQTLock-like Fodhelper UAC Bypass Registry Staging
    id: 8a66c7e4-7e93-4a8b-a0e3-9d7dba5ed1f7
    status: experimental
    description: >-
      Detects registry modifications consistent with the fodhelper.exe UAC bypass
      technique (ms-settings handler), which is explicitly referenced in ANY.RUN's
      BQTLock behavioral writeup.
    author: Daniel Jeremiah
    date: 2026-02-24T00:00:00.000Z
    references:
      - https://any.run/cybersecurity-blog/emerging-ransomware-bqtlock-greenblood/
    logsource:
      product: windows
      category: registry_set
      service: security
    detection:
      selection:
        TargetObject|contains:
          - \Software\Classes\ms-settings\Shell\Open\command\(Default)
          - \Software\Classes\ms-settings\Shell\Open\command\DelegateExecute
      condition: selection
    falsepositives:
      - Very rare; validate follow-on execution of fodhelper.exe and the written
        command value.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0004
    - TA0005
techniques:
    - T1548.002
author: Daniel Jeremiah
version: "3"
references:
    - https://any.run/cybersecurity-blog/emerging-ransomware-bqtlock-greenblood/
data_sources:
    - registry_set
    - windows
