id: 019cfc26-1a7b-74dd-9174-52f30319c434
name: LampoRAT Telegram C2 Communication
description: Detects command and control (C2) communication to a specific Telegram Bot API endpoint hardcoded in the LampoRAT malware. This activity is associated with the Boggy Serpens (MuddyWater) threat actor.
query: |
    title: LampoRAT Telegram C2 Communication
    id: b87f3cc0-3c92-4d1a-8302-824ebfa65625
    status: experimental
    description: Detects command and control (C2) communication to a specific
      Telegram Bot API endpoint hardcoded in the LampoRAT malware. This activity is
      associated with the Boggy Serpens (MuddyWater) threat actor.
    author: detections.ai
    references:
      - https://unit42.paloaltonetworks.com/boggy-serpens-threat-assessment/
    date: 2026-03-17
    tags:
      - attack.command_and_control
      - attack.t1102.002
      - attack.g0059
    logsource:
      category: proxy
      product: any
    detection:
      selection:
        # Detects the hardcoded Telegram Bot API token used by LampoRAT
        # This field may need to be adapted to your specific log source (e.g., url.original, DestinationUrl)
        c-uri|contains: 'api.telegram.org/bot8398566164:AAEJbk6EOirZ_ybm4PJ-q8mOpr1RkZx1H7Q'
      condition: selection
    falsepositives:
      - This is a hardcoded token for a specific malware family. False positives are
        not expected.
    level: critical
query_type: sigma
severity: critical
