id: 019cf838-683b-7107-8763-05895630ebd2
name: Interlock Ransomware Self-Deletion
description: Detects the self-deletion mechanism of the Interlock ransomware. The malware executes `rundll32.exe` to call a function within a randomly named DLL file with a `.wasd` extension, passing its own file path as an argument to be deleted.
query: |
    title: Interlock Ransomware Self-Deletion
    id: 510d308e-585d-479b-a96a-7ab9e9731208
    status: experimental
    description: Detects the self-deletion mechanism of the Interlock ransomware.
      The malware executes `rundll32.exe` to call a function within a randomly named
      DLL file with a `.wasd` extension, passing its own file path as an argument to
      be deleted.
    author: detections.ai
    references:
      - https://www.ibm.com/think/x-force/slopoly-start-ai-enhanced-ransomware-attacks
    date: 2026-03-16
    tags:
      - attack.t1070.004
      - attack.t1218.011
      - detection.emerging_threats
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        Image|endswith: '\rundll32.exe' # Detect execution of the rundll32.exe utility
        CommandLine|contains|all:
          - '.wasd' # The unique file extension for the temporary deletion DLL
          - ', run' # The specific function exported by the DLL to perform the deletion
      condition: selection
    falsepositives:
      - This behavior is highly specific to the Interlock ransomware and its
        associated tools. False positives are considered unlikely.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0005
techniques:
    - T1070.004
    - T1218.011
