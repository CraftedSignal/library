id: 019c9635-1732-726f-b0a0-5dc8faf946df
name: Claude Code Suspicious Project Configuration File Created Or Modified
description: Detects creation or modification of repository controlled Claude Code project configuration files (.claude/settings.json or .mcp.json) which were abused for code execution and token exfiltration.
query: |
    title: Claude Code Suspicious Project Configuration File Created Or Modified
    id: 8a9f9b2c-3a9f-4b55-9b4a-5d6a3c1f0e21
    status: experimental
    description: Detects creation or modification of repository controlled Claude
      Code project configuration files (.claude/settings.json or .mcp.json) which
      were abused for code execution and token exfiltration.
    author: Daniel Jeremiah
    date: 2026-02-24
    references:
      - https://research.checkpoint.com/2026/rce-and-api-token-exfiltration-through-claude-code-project-files-cve-2025-59536/
    tags:
      - attack.initial_access
      - attack.t1195
      - attack.persistence
    logsource:
      category: file_event
      product: windows
    detection:
      selection:
        TargetFilename|endswith:
          - '\.claude\settings.json'
          - '\.mcp.json'
      condition: selection
    falsepositives:
      - Legitimate use of Claude Code project configuration in development
        repositories
    level: medium
    associated_cves:
      - CVE-2025-59536
query_type: sigma
severity: medium
tactics:
    - TA0003
    - TA0001
techniques:
    - T1195.002
tags:
    - attack.initial_access
    - attack.t1195
    - attack.persistence
author: Daniel Jeremiah
version: "2"
references:
    - https://research.checkpoint.com/2026/rce-and-api-token-exfiltration-through-claude-code-project-files-cve-2025-59536/
data_sources:
