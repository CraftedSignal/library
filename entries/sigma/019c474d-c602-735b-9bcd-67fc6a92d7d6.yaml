id: 019c474d-c602-735b-9bcd-67fc6a92d7d6
name: NTDS.dit Theft Attempt via Print Utility
description: Detects attempts to access or exfiltrate the Active Directory database (NTDS.dit) using the 'print.exe' utility. This specific technique was observed in post-exploitation activities following the compromise of SolarWinds Web Help Desk servers.
query: "title: NTDS.dit Theft Attempt via Print Utility\r\ndescription: Detects attempts to access or exfiltrate the Active Directory\r\n  database (NTDS.dit) using the 'print.exe' utility. This specific technique was\r\n  observed in post-exploitation activities following the compromise of\r\n  SolarWinds Web Help Desk servers.\r\nreferences:\r\n  - https://www.microsoft.com/en-us/security/blog/2026/02/06/active-exploitation-solarwinds-web-help-desk/\r\n  - https://attack.mitre.org/techniques/T1003/003/\r\nauthor: \"Akshay Gaikwad\"\r\ntags:\r\n  - attack.credential_access\r\n  - attack.t1003.003\r\nlogsource:\r\n  category: process_creation\r\n  product: windows\r\ndetection:\r\n  selection:\r\n    # Detects the use of the print.exe utility\r\n    Image|endswith: '\\print.exe' # Looks for specific command-line arguments used to copy the NTDS.dit file\r\n    CommandLine|contains|all:\r\n      - 'print'\r\n      - '/D:'\r\n      - '\\windows\\ntds\\ntds.dit'\r\n  condition: selection\r\nfalsepositives:\r\n  - This technique is highly specific and anomalous. False positives are not\r\n    expected.\r\nlevel: critical\r\n"
