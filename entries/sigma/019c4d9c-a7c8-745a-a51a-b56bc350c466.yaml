id: 019c4d9c-a7c8-745a-a51a-b56bc350c466
name: Ivanti EPMM CVE-2025-4428 Feature Usage API Exploit
description: The rule detects attempts to exploit Ivanti EPMM vulnerabilities CVE-2025-4427 and CVE-2025-4428. Specifically, it looks for unauthenticated or suspicious requests to the `/api/v2/featureusage` endpoint that contain parameters indicative of exploitation, such as `format` parameters with values like `${`, `Runtime`, `exec`, or `getRuntime`.
query: |
    title: Ivanti EPMM CVE-2025-4428 Feature Usage API Exploit
    id: e4f5a6b7-c8d9-4e8f-2031-ivanti001
    status: experimental
    description: |
        Suspicious or unauthenticated request to EPMM /api/v2/featureusage with format/expression parameters indicative of CVE-2025-4427/4428 exploitation.
    references:
        - https://www.wiz.io/blog/ivanti-epmm-rce-vulnerability-chain-cve-2025-4427-cve-2025-4428
    author: Daniel Jeremiah
    date: 2026/02/11
    tags:
        - attack.t1190
        - attack.exploitation
        - cve.2025.4427
        - cve.2025.4428
    logsource:
        category: webserver
        product: ivanti_epmm
    detection:
        selection_url:
            c-uri|contains: '/api/v2/featureusage'
        selection_params:
            c-uri|re: 'format=.*(\$\{|Runtime|exec|getRuntime)'
        condition: selection_url and selection_params
    falsepositives:
        - Legitimate admin API usage with complex format strings
    level: high
query_type: sigma
severity: high
tactics:
    - TA0001
    - TA0006
techniques:
    - T1190
    - T1212
tags:
    - attack.t1190
    - attack.exploitation
    - cve.2025.4427
    - cve.2025.4428
author: Daniel Jeremiah
version: "2"
references:
    - https://www.wiz.io/blog/ivanti-epmm-rce-vulnerability-chain-cve-2025-4427-cve-2025-4428
data_sources:
    - webserver
