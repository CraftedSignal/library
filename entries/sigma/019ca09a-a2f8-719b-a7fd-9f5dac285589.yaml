id: 019ca09a-a2f8-719b-a7fd-9f5dac285589
name: GuptiMiner Mutex Detection
description: This rule detects the creation of specific mutex names that are known to be associated with GuptiMiner activity. The mutex names include patterns like 'Mutex_ONLY_ME_V<version>', 'SLDV<2-3 numeric>', 'GlobalMIVOD_V4', 'MIVOD_6', and 'MTX_EX01'. Detection of these mutexes indicates the presence or execution of the GuptiMiner malware on a Windows system, which is known for cryptocurrency mining and backdoor capabilities.
query: |-
    title: GuptiMiner Mutex Detection
    status: experimental
    description: Detects known mutexes associated with GuptiMiner activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://decoded.avast.io/janrubin/guptiminer-hijacking-antivirus-updates-for-distributing-backdoors-and-casual-mining/'
    tags:
      - 'attack.impact.t1496'
      - 'malware.miner.guptiminer'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Mutex_ONLY_ME_V<version>'
          - 'SLDV<2-3 numeric>'
          - 'GlobalMIVOD_V4'
          - 'MIVOD_6'
          - 'MTX_EX01'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1496
tags:
    - attack.impact.t1496
