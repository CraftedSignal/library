id: 019c7828-cb48-7229-a44b-dc4e04ef5b45
name: RMM Tools Process Creation
description: "Detects process creation for common RMM tools (AnyDesk, Bomgar/BeyondTrust, TeamViewer). \nThe idea here would be to alert on non approved RMM tools, and anything outside of the one or few approved tools would be suspicious.\n"
query: "title: RMM Tools Process Creation\nid: a7f2c8e1-4b9d-4e3a-8f1c-2d5e6a9b0c3d\ndescription: |\n  Detects process creation for common RMM tools (AnyDesk, Bomgar/BeyondTrust, TeamViewer). \n  The idea here would be to alert on non approved RMM tools, and anything outside of the one or few approved tools would be suspicious.\n\nstatus: experimental\nlogsource:\n  product: windows\n  service: sysmon\n  category: process_creation\ndetection:\n  selection_rmm:\n    Image|contains:\n      - 'anydesk'\n      - 'bomgar'\n      - 'teamviewer'\n  condition: selection_rmm\nfields:\n  - Image\n  - Computer\n  - User\n  - ParentImage\n  - CommandLine\nfalsepositives:\n  - RMM tools that are approved or in the process of being approved internally.\nlevel: medium\nauthor: zendannyy\n"
query_type: sigma
severity: medium
