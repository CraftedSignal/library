id: 019c4de3-be30-7258-8707-ae7d1e9d46d3
name: Microsoft ClickFix Lampion-Style PowerShell to WScript
description: |
    PowerShell (parent explorer) launches WScript with minimized window and Invoke-WebRequest. Lampion campaign pattern per Microsoft blog.
query: |-
    title: Microsoft ClickFix Lampion-Style PowerShell to WScript
    id: d4e5f6a7-b8c9-4d0e-1f20-0123456789ab
    status: experimental
    description: |
        PowerShell (parent explorer) launches WScript with minimized window and Invoke-WebRequest. Lampion campaign pattern per Microsoft blog.
    references:
        - https://www.microsoft.com/en-us/security/blog/2025/08/21/think-before-you-clickfix-analyzing-the-clickfix-social-engineering-technique/
    author: Daniel Jeremiah
    date: 2026/02/11
    tags:
        - attack.t1059.001
        - attack.t1059.007
    logsource:
        category: process_creation
        product: windows
    detection:
        selection_ps:
            InitiatingProcessFileName: 'powershell.exe'
            InitiatingProcessParentFileName: 'explorer.exe'
        selection_wscript:
            Image|endswith: '\WScript.exe'
            CommandLine|contains|all:
                - 'PowerShell.exe'
                - 'windowstyle minimized'
                - 'Invoke-WebRequest'
        condition: selection_ps and selection_wscript
    falsepositives:
        - Legitimate deployment script using same pattern
    level: high
query_type: sigma
severity: medium
tactics:
    - TA0002
    - TA0011
techniques:
    - T1059.001
    - T1059.007
    - T1105
author: Daniel Jeremiah
version: "3"
references:
    - https://www.microsoft.com/en-us/security/blog/2025/08/21/think-before-you-clickfix-analyzing-the-clickfix-social-engineering-technique/
