id: 019ca094-50f7-75ea-a014-649074faa566
name: Avaddon Ransomware Mutex Detection
description: This rule detects the creation of processes that utilize specific mutex names associated with Avaddon ransomware. The detection is based on the presence of the mutex '{2A0E9C7B-6BE8-4306-9F73-1057003F605B}' during process creation events. This indicates potential Avaddon ransomware activity on the system.
query: |-
    title: Avaddon Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Avaddon ransomware activity.
    author: '@adhikara13'
    date: 2024/07/19
    references:
      - 'https://bbs.360.cn/thread-15888858-1-1.html'
      - 'https://id-ransomware.blogspot.com/2020/06/avaddon-ransomware.html'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.avaddon'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '{2A0E9C7B-6BE8-4306-9F73-1057003F605B}'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.avaddon
author: '@adhikara13'
version: "1"
references:
    - https://bbs.360.cn/thread-15888858-1-1.html
    - https://id-ransomware.blogspot.com/2020/06/avaddon-ransomware.html
data_sources:
    - process_creation
    - windows
