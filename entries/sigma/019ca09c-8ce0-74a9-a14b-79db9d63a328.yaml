id: 019ca09c-8ce0-74a9-a14b-79db9d63a328
name: Mamona Ransomware Mutex Detection
description: The rule detects the creation of specific mutexes known to be associated with Mamona ransomware. It looks for the mutex name 'Global\Fxo16jmdgujs437' during process creation events on Windows systems. The presence of this mutex indicates potential Mamona ransomware activity.
query: |-
    title: Mamona Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Mamona ransomware activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://app.threat.zone/submission/2236ec1f-eaaa-4b19-b864-4059dac59efa/dynamic-scan-report/behaviour/mutex'
      - 'https://blog.eclecticiq.com/global-group-emerging-ransomware-as-a-service'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.mamona'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Global\Fxo16jmdgujs437'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.mamona
author: '@adhikara13'
version: "1"
references:
    - https://app.threat.zone/submission/2236ec1f-eaaa-4b19-b864-4059dac59efa/dynamic-scan-report/behaviour/mutex
    - https://blog.eclecticiq.com/global-group-emerging-ransomware-as-a-service
data_sources:
    - process_creation
    - windows
