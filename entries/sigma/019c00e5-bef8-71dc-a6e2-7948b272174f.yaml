id: 019c00e5-bef8-71dc-a6e2-7948b272174f
name: Suspicious Execution Gate Variable Creation
description: Detects the creation or setting of the specific environment variable 'ALLUSERSPROFILE_X'. This variable is used as a mandatory execution gate by a malware campaign delivering Amatera Stealer to ensure that the initial user-assisted execution step was completed.
query: |
    title: Suspicious Execution Gate Variable Creation
    id: fd7e5ca8-da5c-4fc2-978a-42c235544228
    status: experimental
    description: >-
      Detects the creation or setting of the specific environment variable
      'ALLUSERSPROFILE_X'. This variable is used as a mandatory execution gate by a
      malware campaign delivering Amatera Stealer to ensure that the initial
      user-assisted execution step was completed.
    references:
      - https://blackpointcyber.com/blog/novel-fake-captcha-chain-delivering-amatera-stealer/
    author: detections.ai
    date: 2026-01-27
    tags:
      - attack.defense_evasion
      - attack.t1480
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        # Detects the command line setting the specific environment variable used as an execution gate
        CommandLine|contains: 'ALLUSERSPROFILE_X='
      condition: selection
    falsepositives:
      - The variable name 'ALLUSERSPROFILE_X' is highly specific to this malware
        campaign. False positives are considered highly unlikely.
    level: high
