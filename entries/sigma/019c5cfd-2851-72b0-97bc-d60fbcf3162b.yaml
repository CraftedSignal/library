name: KongTuke Malware - Process from SoftwareProtectionPlatform Path
description: Detects KongTuke Python payload or launcher from fake SoftwareProtectionPlatform - Image path must contain SoftwareProtectionPlatform and command line must reference udp.pyw or run.pyw. run.pyw SHA256 6afbe1f38351f6bfdd478240a4792e96f7e2789e5aaf02abbbe2c4c9a368f736, udp.pyw SHA256 efed49010d4da096af63c48a36fb4ca61ac05b4e553bdec6ed76b9590725a99c for correlation.
query: |
    title: KongTuke Malware - Process from SoftwareProtectionPlatform Path
    id: d4e5f6a7-b8c9-7d8e-1f2a-3b4c5d6e7f8a
    status: experimental
    description: >-
      Detects KongTuke Python payload or launcher from fake
      SoftwareProtectionPlatform - Image path must contain
      SoftwareProtectionPlatform and command line must reference udp.pyw or run.pyw.
      run.pyw SHA256
      6afbe1f38351f6bfdd478240a4792e96f7e2789e5aaf02abbbe2c4c9a368f736, udp.pyw
      SHA256 efed49010d4da096af63c48a36fb4ca61ac05b4e553bdec6ed76b9590725a99c for
      correlation.
    references:
      - https://malpedia.caad.fkie.fraunhofer.de/details/js.kongtuke
      - https://isc.sans.edu/diary/32498
      - >-
        https://www.recordedfuture.com/research/tag-124-multi-layered-tds-infrastructure-extensive-user-base
      - >-
        https://trustwave.com/en-us/resources/blogs/spiderlabs-blog/yet-another-nodejs-backdoor-yanb-a-modern-challenge
    author: "Daniel Jeremiah"
    date: 2026/02/14
    modified: 2026/02/14
    logsource:
      category: process_creation
      product: windows
    detection:
      selection_path:
        - Image|contains: SoftwareProtectionPlatform
      selection_image:
        - Image|endswith: \run.exe
        - Image|endswith: \python.exe
        - Image|endswith: \pythonw.exe
      selection_args:
        - CommandLine|contains: udp.pyw
        - CommandLine|contains: run.pyw
      condition: selection_path and selection_image and selection_args
    falsepositives:
      - Legitimate Python/run.exe under SoftwareProtectionPlatform with udp.pyw or
        run.pyw (unusual)
    level: medium
    tags:
      - attack.execution
      - attack.t1059.006
      - malware.kongtuke
