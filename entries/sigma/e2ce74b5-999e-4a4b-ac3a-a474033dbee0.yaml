id: e2ce74b5-999e-4a4b-ac3a-a474033dbee0
name: Discord Invite Loop Hole - PowerShell Downloader from Pastebin
description: Detects the execution of a PowerShell command that downloads and executes a script from Pastebin, as seen in the Discord Invite Loop Hole campaign. This is the first stage after the user is tricked into pasting the command.
query: "title: Discord Invite Loop Hole - PowerShell Downloader from Pastebin\nid: 1a2b3c4d-5e6f-7890-1234-567890abcdef \nstatus: experimental\ndescription: Detects the execution of a PowerShell command that downloads and executes a script from Pastebin, as seen in the Discord Invite Loop Hole campaign. This is the first stage after the user is tricked into pasting the command.\nreferences:\n    - https://research.checkpoint.com/2025/from-trust-to-threat-hijacked-discord-invites-used-for-multi-stage-malware-delivery/\nauthor: Detections.ai\ndate: 2025-06-19\nlogsource:\n    category: process_creation\n    product: windows\ndetection:\n    selection:\n        Image|endswith:\n            - '\\powershell.exe'\n            - '\\pwsh.exe'\n        CommandLine|contains:\n            - 'iex'\n            - 'Invoke-Expression'\n        CommandLine|all:\n            - 'iwr'\n            - 'pastebin.com/raw/'\n    condition: selection\nfields:\n    - CommandLine\n    - ParentCommandLine\n    - Image\n    - ParentImage\n    - User\n    - Hashes\n    - Product\n    - Company\ntags:\n    - attack.execution\n    - attack.defense_evasion\n    - attack.persistence\n    - attack.t1059.001 # PowerShell\n    - attack.t1105 # Ingress Tool Transfer\n    - detection.emerging_threats\nfalsepositives:\n    - Legitimate scripts downloading from Pastebin (less common for raw execution)\nlevel: high"
