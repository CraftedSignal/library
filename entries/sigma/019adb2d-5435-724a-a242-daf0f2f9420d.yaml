id: 019adb2d-5435-724a-a242-daf0f2f9420d
name: Suspicious CMD Input Redirection from Local File
description: Detects cmd.exe execution using /c or /k with input redirection ("<") from a file, which is commonly abused to execute staged payloads, scripts, or configuration files without directly invoking them.
query: |
    title: Suspicious CMD Input Redirection from Local File
    id: 3c7e3b58-8e4a-4d45-9d72-7f0b62f813f2
    status: experimental
    description: >-
      Detects cmd.exe execution using /c or /k with input redirection ("<") from a
      file, which is commonly abused to execute staged payloads, scripts, or
      configuration files without directly invoking them.
    references:
      - https://attack.mitre.org/techniques/T1059/003/
    tags:
      - attack.execution
      - attack.defense_evasion
      - attack.t1059.003
      - observation.seen_in_the_wild
    author: Marcus Mingo
    date: 2025-12-01T00:00:00.000Z
    logsource:
      category: process_creation
      product: windows
      service: security
    detection:
      selection_regex:
        CommandLine|re: |
          (?ix)
          cmd (?:\.exe)?              # cmd executable
          .* \/(?:c|k)                # /c or /k
          .* < .* \.\w{1,6}       # input redirection from a file with extension
      condition: selection_regex
    fields:
      - CommandLine
      - ParentImage
      - Image
      - User
    level: medium
query_type: sigma
severity: medium
tactics:
    - TA0002
    - TA0005
techniques:
    - T1059.003
tags:
    - attack.execution
    - attack.defense_evasion
    - attack.t1059.003
    - observation.seen_in_the_wild
author: Marcus Mingo
version: "3"
references:
