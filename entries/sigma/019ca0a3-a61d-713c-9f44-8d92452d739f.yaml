id: 019ca0a3-a61d-713c-9f44-8d92452d739f
name: Zenrat Mutex Detection
description: This rule detects the creation of specific mutexes that are known to be associated with Zenrat malware activity. The rule specifically looks for a mutex named 'System.Byte[]'. The presence of this mutex name is considered indicative of Zenrat malware.
query: |-
    title: Zenrat Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Zenrat activity.
    author: '@adhikara13'
    date: 2024/07/19
    references:
      - 'https://www.proofpoint.com/us/blog/threat-insight/zenrat-malware-brings-more-chaos-calm'
    tags:
      - 'attack.command_and_control.t1219'
      - 'malware.rat.zenrat'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'System.Byte[]'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0011
techniques:
    - T1219
tags:
    - attack.command_and_control.t1219
    - malware.rat.zenrat
author: '@adhikara13'
version: "1"
references:
    - https://www.proofpoint.com/us/blog/threat-insight/zenrat-malware-brings-more-chaos-calm
data_sources:
    - process_creation
    - windows
