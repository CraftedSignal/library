id: 019ca0a0-90e8-747b-9ec0-234967acae1d
name: Scarabey Ransomware Mutex Detection
description: The rule detects the creation of specific mutexes known to be associated with Scarabey ransomware. The detection is triggered when a process creates a mutex with the name 'STOPSCARABSTOPSCARABSTOPSCARABSTOPSCARABSTOPSCARAB'.
query: |-
    title: Scarabey Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Scarabey ransomware activity.
    author: '@adhikara13'
    date: 2017/12/19
    references:
      - 'https://www.malwarebytes.com/blog/news/2018/01/scarab-ransomware-new-variant-changes-tactics'
      - 'https://id-ransomware.blogspot.com/2017/12/scarabey-ransomware.html'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.scarabey'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'STOPSCARABSTOPSCARABSTOPSCARABSTOPSCARABSTOPSCARAB'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.scarabey
author: '@adhikara13'
version: "1"
references:
    - https://www.malwarebytes.com/blog/news/2018/01/scarab-ransomware-new-variant-changes-tactics
    - https://id-ransomware.blogspot.com/2017/12/scarabey-ransomware.html
data_sources:
    - process_creation
    - windows
