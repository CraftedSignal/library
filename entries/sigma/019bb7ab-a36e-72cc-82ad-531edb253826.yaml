id: 019bb7ab-a36e-72cc-82ad-531edb253826
name: Suspicious PowerShell String Normalization
description: Detects PowerShell commands that utilize string normalization obfuscation techniques before Base64 decoding. This rule identifies a generic pattern where one or two placeholder characters are replaced with a literal character, a technique used by malware like SHADOW#REACTOR to bypass static string analysis of the encoded payload.
query: |
    title: Suspicious PowerShell String Normalization
    id: 73a7bf6e-a8a7-4d9a-854e-efe7880bc5ba
    status: experimental
    description: Detects PowerShell commands that utilize string normalization
      obfuscation techniques before Base64 decoding. This rule identifies a generic
      pattern where one or two placeholder characters are replaced with a literal
      character, a technique used by malware like SHADOW#REACTOR to bypass static
      string analysis of the encoded payload.
    references:
      - https://www.securonix.com/blog/shadowreactor-text-only-staging-net-reactor-and-in-memory-remcos-rat-deployment/
    author: tim@detections.ai
    date: 2026-01-13
    tags:
      - attack.t1059.001
      - attack.t1027
    logsource:
      category: ps_script
      product: windows
    detection:
      selection_generic_replace:
        # Detects the generic pattern of replacing one or two non-alphanumeric or placeholder characters with a single alphanumeric character.
        ScriptBlockText|re: '(?i)\.replace\s*\(\s*''[^'']{1,2}''\s*,\s*''[A-Za-z0-9]''\s*\)'
      selection_b64:
        # Looks for subsequent Base64 decoding, a common follow-on action
        ScriptBlockText|contains: 'FromBase64String'
      condition: selection_generic_replace and selection_b64
    falsepositives:
      - Legitimate but unconventional administrative or development scripts.
    level: medium
query_type: sigma
severity: medium
tactics:
    - TA0002
    - TA0005
techniques:
    - T1059.001
    - T1027
