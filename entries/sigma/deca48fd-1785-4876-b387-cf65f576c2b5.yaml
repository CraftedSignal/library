id: deca48fd-1785-4876-b387-cf65f576c2b5
name: Sudo Chroot Option Usage
description: Detects the execution of the `sudo` command with the `chroot` option (`-C` or `--chroot`). This could be an indicator of an attempt to exploit privilege escalation vulnerabilities like CVE-2025-32463.
query: |-
    title: Sudo Chroot Option Usage
    id: 9d1e3f8c-5b2a-4c7d-8e1f-2a3b4c5d6e7f
    status: experimental
    description: Detects the execution of the `sudo` command with the `chroot` option (`-C` or `--chroot`). This could be an indicator of an attempt to exploit privilege escalation vulnerabilities like CVE-2025-32463.
    author: Detections.ai
    date: 2025-07-04
    references:
        - https://www.stratascale.com/vulnerability-alert-CVE-2025-32463-sudo-chroot
    logsource:
        category: process_creation
        product: linux
    detection:
        selection:
            Image|endswith: '/sudo'
            CommandLine|contains:
                - ' -C '
                - ' --chroot'
        condition: selection
    falsepositives:
        - Legitimate administrative use of `sudo` with `chroot` for system maintenance or containerization.
    level: medium
    tags:
        - attack.privilege_escalation
        - cve.2025.32463
        - vulnerability.exploitation
