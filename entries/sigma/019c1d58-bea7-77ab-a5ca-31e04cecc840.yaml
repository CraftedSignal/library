id: 019c1d58-bea7-77ab-a5ca-31e04cecc840
name: Suspicious PowerShell Payload Stored in Registry via Corel Value
description: |
    Detects storage of a PowerShell-based persistent payload in the Windows registry under a non-standard GUID-based key using the Corel value. This technique is used by the final stage of the eScan supply-chain attack to establish stealthy persistence after environment validation.
query: "title: Suspicious PowerShell Payload Stored in Registry via Corel Value\r\nid: e3f91a72-8b6d-4a7f-9e21-4c6d2b8f1a53\r\nstatus: experimental\r\ndescription: >\r\n  Detects storage of a PowerShell-based persistent payload in the Windows registry under a non-standard GUID-based key using the Corel value.\r\n  This technique is used by the final stage of the eScan supply-chain attack to establish stealthy persistence after environment validation.\r\nauthor: Thaung Htet\r\ndate: 2026-02-02\r\nreferences:\r\n  - https://securelist.com/escan-supply-chain-attack/118688/\r\n  - https://www.securityweek.com/escan-antivirus-delivers-malware-in-supply-chain-attack/\r\n  - https://www.morphisec.com/blog/critical-escan-threat-bulletin/\r\n  - https://www.infosecurity-magazine.com/news/escan-antivirus-breach-delivers/\r\ntags:\r\n  - attack.persistence\r\n  - attack.defense_evasion\r\n  - attack.t1053\r\n  - attack.t1547\r\nlogsource:\r\n  product: windows\r\n  category: registry_event\r\ndetection:\r\n  suspicious_registry_key:\r\n    TargetObject|contains:\r\n      - '\\Software\\E9F9EEC3-86CA-4EBE-9AA4-1B55EE8D114E'\r\n  suspicious_value_name:\r\n    TargetObject|endswith:\r\n      - '\\Corel'\r\n  powershell_indicators:\r\n    Details|contains:\r\n      - 'powershell'\r\n      - 'Invoke-Expression'\r\n      - 'IEX'\r\n      - 'FromBase64String'\r\n      - 'DownloadString'\r\n  condition: suspicious_registry_key and suspicious_value_name\r\nfalsepositives:\r\n  - Custom enterprise software (should be validated if seen)\r\nlevel: critical"
