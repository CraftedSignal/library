id: 019a6f17-87c1-718c-b553-35b826dbdcee
name: LANDFALL Spyware SELinux Policy Helper Execution
description: Detects the execution of the LANDFALL spyware's SELinux policy manipulation helper (`l.so`). The spyware's loader (`b.so`) sets a `PRELOAD_PATH` environment variable pointing to `l.so` and uses `LD_PRELOAD` to inject another payload into the benign `/system/bin/id` process. This behavior is specific to the "interactive" execution mode of the spyware.
query: |
    title: LANDFALL Spyware SELinux Policy Helper Execution
    id: f57b4275-710b-4f50-98a7-1268d7267a44
    status: experimental
    description: Detects the execution of the LANDFALL spyware's SELinux policy
      manipulation helper (`l.so`). The spyware's loader (`b.so`) sets a
      `PRELOAD_PATH` environment variable pointing to `l.so` and uses `LD_PRELOAD`
      to inject another payload into the benign `/system/bin/id` process. This
      behavior is specific to the "interactive" execution mode of the spyware.
    references:
      - https://unit42.paloaltonetworks.com/landfall-is-new-commercial-grade-android-spyware/
    author: detections.ai
    date: 2025-11-10
    tags:
      - attack.privilege_escalation
      - attack.defense_evasion
      - attack.t1548.004
      - cve.2025.21042
      - detection.emerging_threats
    logsource:
      product: linux # This rule is intended for Android systems, which are based on the Linux kernel.
      category: process_creation
    detection:
      selection:
        Image|endswith: '/sh' # The command is dispatched via a shell wrapper as noted in the report.
        CommandLine|contains|all:
          - 'LD_PRELOAD=' # Core part of the injection technique.
          - 'PRELOAD_PATH=/data/data/com.samsung.ipservice/files/l.so' # Specific path to the SELinux helper library.
          - '/system/bin/id' # Benign process used to host the payload.
      condition: selection
    falsepositives:
      - Highly unlikely due to the combination of a specific, non-standard
        environment variable (`PRELOAD_PATH`), file path, and abused system binary.
    level: high
query_type: sigma
severity: high
