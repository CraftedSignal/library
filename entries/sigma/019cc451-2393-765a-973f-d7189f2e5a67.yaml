id: 019cc451-2393-765a-973f-d7189f2e5a67
name: Moonrise Malware Detected (Initial execution of powershell)
description: "The rule detects the processes that are executed by the Moonrise malware, which is a backdoor used by the APT29 group. \nThe rule is based on the analysis of the malware's behavior and the processes it creates during execution.\n"
query: "title: Moonrise Malware Detected (Initial execution of powershell)\nid: edbb7b35-0982-4b19-a7a9-beb5b1a210eb\nstatus: stable\ndescription: >\n  The rule detects the processes that are executed by the Moonrise malware,\n  which is a backdoor used by the APT29 group. \n\n  The rule is based on the analysis of the malware's behavior and the processes\n  it creates during execution.\nreferences:\n  - https://any.run/cybersecurity-blog/moonrise-rat-detected\n  - >-\n    https://app.any.run/tasks/d3e5e733-3b0d-4cf7-a7a8-ea1553cd16b9/?utm_source=twitter&utm_medium=post&utm_campaign=moonrise&utm_term=180226&utm_content=linktoservice\nauthor: Luís Marques, SIBS Cyberwatch @remotecodeexecution\ndate: 2026-03-03T00:00:00.000Z\ntags:\n  - attack.Execution\n  - attack.T1059.001\nlogsource:\n  category: process_creation\n  product: windows\n  service: sysmon\ndetection:\n  selection_parent:\n    ParentImage: '*\\Temp\\WindowsServices\\svchost.exe'\n  selection_commandline:\n    CommandLine|contains:\n      - powershell -Command\n      - Get-PnpDevice\n      - Class Camera -Status OK\n      - Select-Object -Property FriendlyName, InstanceId\n      - ConvertTo-Json\n  sysmon_event:\n    EventCode: Win-Sysmon-1-Create-Process\n  groupby:\n    user: '*'\n  condition: all of them\nfalsepositives:\n  - Legitimate use of PowerShell for system administration.\n  - Security researchers analyzing system processes.\n  - Automated scripts that may use similar command lines for legitimate purposes.\nlevel: critical\n"
