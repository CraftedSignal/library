id: 019ca0a0-cadb-7689-95c3-b13e3fffc5f3
name: SilverFox RAT Mutex Detection
description: The rule detects the creation of processes that utilize specific mutex names associated with the SilverFox RAT. Specifically, it looks for the mutex name 'Global\IsUserAnAdmin'. This indicates potential SilverFox RAT activity on a Windows system.
query: |-
    title: SilverFox RAT Mutex Detection
    status: experimental
    description: Detects known mutexes associated with SilverFox rat activity.
    author: '@adhikara13'
    date: 2025/07/30
    references:
      - 'https://www.xtcaq.com/nd.jsp?id=9361'
    tags:
      - 'attack.command_and_control.t1219'
      - 'malware.rat.silverfox'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Global\IsUserAnAdmin'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0011
techniques:
    - T1219
tags:
    - attack.command_and_control.t1219
    - malware.rat.silverfox
author: '@adhikara13'
version: "1"
references:
    - https://www.xtcaq.com/nd.jsp?id=9361
data_sources:
    - process_creation
    - windows
