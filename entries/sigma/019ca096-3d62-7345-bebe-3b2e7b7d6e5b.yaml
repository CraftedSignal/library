id: 019ca096-3d62-7345-bebe-3b2e7b7d6e5b
name: CastleRAT Mutex Detection
description: This rule detects the presence of specific mutex names associated with CastleRAT malware activity. The detection is based on a predefined list of unique mutex strings that CastleRAT is known to use for process synchronization or to indicate its presence on a system. The rule triggers if any of these mutex names are observed, indicating a high likelihood of CastleRAT infection.
query: |-
    title: CastleRAT Mutex Detection
    status: experimental
    description: Detects known mutexes associated with CastleRAT activity.
    author: '@adhikara13'
    date: 2025/12/30
    references:
      - 'https://www.recordedfuture.com/research/from-castleloader-to-castlerat-tag-150-advances-operations'
    tags:
      - 'attack.command_and_control.t1219'
      - 'malware.rat.castlerat'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'BunBubunKLagfsw'
          - 'GoldVekRogerS'
          - 'Thickwick3'
          - 'BabaiMazai'
          - 'KolokolBozhii'
          - 'OaoaPupaa'
          - 'fsAiodwsfSAFuiefS'
          - 'sPEJIOGDsionsgfdUewg'
          - 'FkgfIJGgJgdiJGDGHDjMGjia'
          - 'sdgiregdsssaFWIFS'
          - 'fsAiodwsfSAFuiefS2'
          - 'XmGetzKAM8Bw8NCBTUYo5e'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0011
techniques:
    - T1219
tags:
    - attack.command_and_control.t1219
    - malware.rat.castlerat
author: '@adhikara13'
version: "1"
references:
    - https://www.recordedfuture.com/research/from-castleloader-to-castlerat-tag-150-advances-operations
data_sources:
    - process_creation
    - windows
