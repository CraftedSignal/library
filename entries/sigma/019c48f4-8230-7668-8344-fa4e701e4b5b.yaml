id: 019c48f4-8230-7668-8344-fa4e701e4b5b
name: Linux SSH Failed Logon Attempt
description: This rule detects a successful SSH login that occurs within 10 minutes after 10 or more failed SSH login attempts targeting the same user, regardless of the source IP address. This scenario is indicative of a brute-force attack where the attacker might be changing source IPs but consistently targeting a specific user account.
query: "title: Linux SSH Failed Logon Attempt\r\nid: e75359ec-8852-4919-a1ce-bca6cabd7316\r\nname: ssh_failed_logon\r\nstatus: experimental\r\ndescription: Detects failed SSH password authentication attempts\r\nreferences:\r\n    - https://attack.mitre.org/techniques/T1110/001/\r\n    - https://attack.mitre.org/techniques/T1133/\r\nauthor: SimSpace\r\ndate: 2026-01-19\r\ntags:\r\n  - attack.credential-access\r\n  - attack.initial-access\r\n  - attack.t1110.001\r\n  - attack.t1133\r\nlogsource:\r\n    product: linux\r\n    service: sshd\r\n    definition: Requires SSH auth logging. Uses keyword matching on raw logs.\r\ndetection:\r\n    selection:\r\n        - 'Failed password'\r\n    condition: selection\r\nfields:\r\n    - src_ip\r\n    - user\r\nfalsepositives:\r\n    - Users mistyping passwords\r\n    - Expired credentials\r\nlevel: informational\r\n---\r\ntitle: Linux SSH Successful Logon\r\nid: 7f8b3c2d-9e4a-4b5c-8d6e-1a2b3c4d5e6f\r\nname: ssh_successful_logon\r\nstatus: experimental\r\ndescription: Detects successful SSH password authentication\r\nreferences:\r\n    - https://attack.mitre.org/techniques/T1078/\r\nauthor: SimSpace\r\ndate: 2026-01-19\r\ntags:\r\n  - attack.initial-access\r\n  - attack.persistence\r\n  - attack.t1078\r\nlogsource:\r\n    product: linux\r\n    service: sshd\r\n    definition: Requires SSH auth logging. Uses keyword matching on raw logs.\r\ndetection:\r\n    selection:\r\n        - 'Accepted password'\r\n    condition: selection\r\nfields:\r\n    - src_ip\r\n    - user\r\nfalsepositives:\r\n    - Unknown\r\nlevel: informational\r\n---\r\ntitle: Multiple SSH Failed Logons - Single Source\r\nid: b753e8c5-fd55-4b41-ac65-b5ed83aa3ebb\r\nname: multiple_ssh_failed_logons_single_source\r\nstatus: experimental\r\ndescription: Detects 10+ failed SSH logins from a single IP in 10 minutes\r\nreferences:\r\n    - https://attack.mitre.org/techniques/T1110/001/\r\nauthor: SimSpace\r\ndate: 2026-01-19\r\ntags:\r\n  - attack.credential-access\r\n  - attack.t1110.001\r\nlogsource:\r\n    product: linux\r\n    service: sshd\r\ncorrelation:\r\n  type: event_count\r\n  rules:\r\n    - ssh_failed_logon\r\n  group-by:\r\n    - src_ip\r\n  timespan: 10m\r\n  condition:\r\n    gte: 10\r\nfalsepositives:\r\n    - Users repeatedly mistyping passwords\r\n    - Authorized security testing\r\n    - Misconfigured automation\r\nlevel: medium\r\n---\r\ntitle: SSH Brute Force Success - Single Source\r\nid: c8d4e6f7-a1b2-4c3d-9e5f-2a3b4c5d6e7f\r\nstatus: experimental\r\ndescription: Detects successful login after 10+ failed attempts from same IP\r\nreferences:\r\n    - https://attack.mitre.org/techniques/T1110/001/\r\n    - https://attack.mitre.org/techniques/T1133/\r\nauthor: SimSpace\r\ndate: 2026-01-19\r\ntags:\r\n  - attack.credential-access\r\n  - attack.initial-access\r\n  - attack.t1110.001\r\n  - attack.t1133\r\nlogsource:\r\n    product: linux\r\n    service: sshd\r\ncorrelation:\r\n  type: temporal_ordered\r\n  rules:\r\n    - multiple_ssh_failed_logons_single_source\r\n    - ssh_successful_logon\r\n  group-by:\r\n    - src_ip\r\n  timespan: 10m\r\nfalsepositives:\r\n    - Unlikely\r\n    - Authorized pentesting\r\nlevel: high\r\n---\r\ntitle: Multiple SSH Failed Logons - Targeted User\r\nid: a8f4d9c2-7e31-4b28-9d45-1f6a8c5e3b91\r\nname: multiple_ssh_failed_logons_targeted_user\r\nstatus: experimental\r\ndescription: Detects 10+ failed logins against one user in 10 minutes, any IP\r\nreferences:\r\n    - https://attack.mitre.org/techniques/T1110/001/\r\nauthor: SimSpace\r\ndate: 2026-01-19\r\ntags:\r\n  - attack.credential-access\r\n  - attack.t1110.001\r\nlogsource:\r\n    product: linux\r\n    service: sshd\r\ncorrelation:\r\n  type: event_count\r\n  rules:\r\n    - ssh_failed_logon\r\n  group-by:\r\n    - user\r\n  timespan: 10m\r\n  condition:\r\n    gte: 10\r\nfalsepositives:\r\n    - User forgot password\r\n    - Service account issues\r\n    - Admin testing\r\nlevel: medium\r\n---\r\ntitle: SSH Brute Force Success - Targeted User\r\nid: d9e5f7a8-b2c3-4d5e-9f6a-3b4c5d6e7f8a\r\nstatus: experimental\r\ndescription: Detects successful login after 10+ failed attempts against one user. Catches attacks where IP changes but username stays the same.\r\nreferences:\r\n    - https://attack.mitre.org/techniques/T1110/001/\r\n    - https://attack.mitre.org/techniques/T1133/\r\nauthor: SimSpace\r\ndate: 2026-01-19\r\ntags:\r\n  - attack.credential-access\r\n  - attack.initial-access\r\n  - attack.t1110.001\r\n  - attack.t1133\r\nlogsource:\r\n    product: linux\r\n    service: sshd\r\ncorrelation:\r\n  type: temporal_ordered\r\n  rules:\r\n    - multiple_ssh_failed_logons_targeted_user\r\n    - ssh_successful_logon\r\n  group-by:\r\n    - user\r\n  timespan: 10m\r\nfalsepositives:\r\n    - Users behind NAT or VPN with rotating IPs\r\n    - Cloud SSH tools with load balancing\r\n    - Mobile users changing networks\r\nlevel: high"
