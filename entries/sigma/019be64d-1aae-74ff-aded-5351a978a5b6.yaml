id: 019be64d-1aae-74ff-aded-5351a978a5b6
name: TamperedChef C2 Domain Communication
description: Detects network connections or DNS queries to command and control (C2) domains associated with the TamperedChef malvertising campaign.
query: |
    title: TamperedChef C2 Domain Communication
    id: 37db9688-5745-4b99-ab5d-b87453e37cfa
    status: experimental
    description: Detects network connections or DNS queries to command and control
      (C2) domains associated with the TamperedChef malvertising campaign.
    references:
      - https://www.sophos.com/en-us/blog/tamperedchef-serves-bad-ads-with-infostealers-as-the-main-course
    author: detections.ai
    date: 2026-01-22
    tags:
      - attack.command_and_control
      - attack.t1071.001
    logsource:
      category: network_connection
      product: windows
    detection:
      selection:
        DestinationHostname|contains:
          # List of domains associated with the TamperedChef campaign
          - 'pdf-tool.appsuites.ai7'
          - 'pdfsmartkit.com'
          - 'fastonestartpdf.com'
          - 'pdfhubspot.com'
          - 'pdfdoccentral.com'
          - 'pdffilehub.net'
          - 'pdfonestarthub.com'
          - 'pdfonestartlive.com'
          - 'download04.pdfgj.com'
          - 'pdfappsuite.com'
          - 'pdffacts.net'
          - 'pdftraining.com'
          - 'smarteasypdf.com'
          - 'pdffacts.com'
          - 'pdfonestart.com'
          - 'pdf-kiosk.net'
          - 'pdfmeta.com'
          - 'pdf-kiosk.com'
          - 'easyonestartpdf.com'
          - 'download02.pdfgj.com'
          - 'pdfworker.com'
          - 'getsmartpdf.com'
          - 'pdfscraper.com'
          - 'appsuites.ai'
          - 'pdfts.site'
          - 'click4pdf.com'
          - 'onestartbrowser.com'
          - 'vault.appsuites.ai'
          - 'fullpdf.com'
          - 'portal.manualfinder.app'
          - 'mka3e8.com'
      condition: selection
    falsepositives:
      - False positives are unlikely as these domains are directly linked to the
        TamperedChef campaign infrastructure.
    level: high
query_type: sigma
severity: high
