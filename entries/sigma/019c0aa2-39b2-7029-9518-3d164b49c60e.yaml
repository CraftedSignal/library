id: 019c0aa2-39b2-7029-9518-3d164b49c60e
name: Children Protection Extension DGA C2 Traffic
description: Detects network traffic to fallback command and control (C2) domains generated by the 'Children Protection' malicious browser extension. The extension uses a Domain Generation Algorithm (DGA) based on the current date to provide resilient C2 infrastructure.
query: |
    title: Children Protection Extension DGA C2 Traffic
    id: 42776fa8-e10a-44c2-8f8c-a49954341683
    status: experimental
    description: >-
      Detects network traffic to fallback command and control (C2) domains generated
      by the 'Children Protection' malicious browser extension. The extension uses a
      Domain Generation Algorithm (DGA) based on the current date to provide
      resilient C2 infrastructure.
    references:
      - https://www.security.com/threat-intelligence/chrome-extensions-are-you-getting-more-you-bargained
    author: detections.ai
    date: 2026-01-29
    tags:
      - attack.command_and_control
      - attack.t1568.002
      - attack.t1071.001
    logsource:
      category: proxy
    detection:
      selection:
        url.original|re: '://([a-z0-9]{7})\.live/\1\.json' # Matches the DGA pattern where the subdomain and filename are identical, e.g., http://k8n1z40.live/k8n1z40.json
        url.scheme: 'http'
        destination.port: 80
      condition: all of selection
    falsepositives:
      - The DGA pattern is highly specific to this malware. False positives are
        considered unlikely.
    level: high
query_type: sigma
severity: high
