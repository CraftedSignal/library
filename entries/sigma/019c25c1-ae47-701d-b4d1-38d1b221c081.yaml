name: Suspicious DLL Loading from Notepad++ Attack Chain
description: Detects the loading of specific DLLs from AppData paths associated with the Notepad++ supply chain attack. This activity is related to DLL sideloading and Lua script execution techniques used by the threat actor. Sysmon EVID 7 is critical for detecting the library load.
query: |
    title: Suspicious DLL Loading from Notepad++ Attack Chain
    id: a090747a-11f0-49be-be91-26a374a4216e
    status: experimental
    description: >-
      Detects the loading of specific DLLs from AppData paths associated with the
      Notepad++ supply chain attack. This activity is related to DLL sideloading and
      Lua script execution techniques used by the threat actor. Sysmon EVID 7 is
      critical for detecting the library load.
    references:
      - https://securelist.com/notepad-supply-chain-attack/118708/
      - https://github.com/bobby-tablez/FT-Sysmon-Config
    author: detections.ai
    date: 2026-02-03T00:00:00.000Z
    tags:
      - attack.t1574.002
      - attack.t1059.006
    logsource:
      category: image_load
      product: windows
      service: sysmon
    detection:
      selection_chain2:
        ImageLoaded|endswith:
          - \AppData\Roaming\Adobe\Scripts\alien.dll
          - \AppData\Roaming\Adobe\Scripts\lua5.1.dll
      selection_chain3:
        ImageLoaded|endswith: \AppData\Roaming\Bluetooth\log.dll
      condition: 1 of them
    falsepositives:
      - These file paths and DLL names are highly specific to the described attack
        chains, making false positives unlikely.
    level: high
