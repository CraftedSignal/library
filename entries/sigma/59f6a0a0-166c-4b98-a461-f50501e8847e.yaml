      condition: (selection_github_upload and selection_indicators) or selection_iocs
    falsepositives:
      - Legitimate developer or CI/CD scripts that interact with GitHub repositories
        to upload logs or system information.
      - The IOC part of the detection may trigger on legitimate scripts if the
        strings are too generic, although the selected IOCs are reasonably specific.
        It is recommended to baseline legitimate PowerShell scripts that interact
        with the GitHub API in your environment.
