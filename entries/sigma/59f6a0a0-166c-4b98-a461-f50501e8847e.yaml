id: 59f6a0a0-166c-4b98-a461-f50501e8847e
name: Detect Kimsuky PowerShell Exfiltration to private Github repositories as attack infrastructure (PAT)
description: Detects PowerShell activity associated with the Kimsuky threat actor, where system information is collected and exfiltrated to a private GitHub repository, or where other IOCs related to this campaign are observed. This technique was observed in a campaign distributing the XenoRAT malware.
query: |
    title: "Detect Kimsuky PowerShell Exfiltration to private Github repositories as
      attack infrastructure (PAT)"
    id: 4c96618d-79df-44ae-8bca-572046e43d49
    status: experimental
    description: Detects PowerShell activity associated with the Kimsuky threat
      actor, where system information is collected and exfiltrated to a private
      GitHub repository, or where other IOCs related to this campaign are observed.
      This technique was observed in a campaign distributing the XenoRAT malware.
    references:
      - https://www.enki.co.kr/en/media-center/tech-blog/dissecting-kimsuky-s-attacks-on-south-korea-in-depth-analysis-of-github-based-malicious-infrastructure
    author: Chaitanya B (Mr.Alien)
    date: 2025-07-15
    tags:
      - attack.t1567.001
      - attack.t1059.001
      - attack.t1082
      - threat_group.kimsuky
      - malware.xenorat
    logsource:
      category: powershell_script
      product: windows
    detection:
      # This rule is best implemented using PowerShell Script Block Logging (Event ID 4104)
      # It may be adapted for process creation logs, but command lines may be obfuscated.
      selection_github_upload:
        ScriptBlockText|contains|all:
          - 'api.github.com/repos/' # Use of the GitHub API for repositories
          - '/contents/log/' # Specific path for log exfiltration
          - 'Invoke-RestMethod' # Command used for the API call
          - 'Authorization' # Header used for authentication
      selection_indicators:
        ScriptBlockText|contains:
          # Specific filename patterns used by the malware
          - '-0956_info.txt'
          - '-XXX-kkk.txt' # WMI/CIM commands used for system information discovery
          - 'Get-CimInstance Win32_OperatingSystem'
          - 'Get-WmiObject -Class Win32_ComputerSystem'
          - 'Get-NetIPAddress'
      selection_iocs:
        ScriptBlockText|contains:
          # Specific GitHub repos/users
          - '/Dasi274/hole_311/'
          - '/Dasi274/star/'
          - '/luckmask/asp/'
          # Specific RAT filenames
          - 'xxx.rtf'
          - 'eula.rtf'
          # Mutexes
          - 'Dansweit_Hk65'
          - 'Cheetah_0716'
          # C2 IPs
          - '158.247.230.196'
          - '216.244.74.115'
          - '165.154.78.9'
          - '101.36.114.190'
          - '80.71.157.55'
          - '139.99.36.158'
          - '158.247.253.215'
          - '141.164.41.17'
          - '118.194.249.201'
          - '158.247.202.109'
          - '45.61.161.103'
          # Dropbox URLs - more generic parts of the URL are used for broader detection
          - 'dl.dropboxusercontent.com/scl/fi/c6ba7iwuke57d75j3mmte/eula.rtf'
          - 'dl.dropboxusercontent.com/scl/fi/okglg167i8kuwna1m2lxm/bie70er.rtf'
          - 'dl.dropboxusercontent.com/scl/fi/67j5162v19rtngxkexau5/bie70er.rtf'
          - 'dl.dropboxusercontent.com/scl/fi/ti6rphsns0xsvx1ekb02f/bie70er.rtf'
