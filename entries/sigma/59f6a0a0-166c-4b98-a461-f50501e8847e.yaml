          - 'dl.dropboxusercontent.com/scl/fi/nanwt6elsuxziz05hnlt4/cjfansgmlans1-x.txt'
          - 'dl.dropboxusercontent.com/scl/fi/hpv3jd8o9annkala8vskb/hhopp.rtf'
          - 'dl.dropboxusercontent.com/scl/fi/bqicute746gcts2utf903/pong_race.rtf'
          # Email
          - 'janman8907@gmail.com'
          # Hashes - may be present in script text if used for verification or as string artifacts
          - 'a56edfef94008c77abfb4e151df934d9'
          - '30d5f17d5e3f85be18220a7cab0b9fff'
