id: 019ca09f-196a-7254-ad05-11e74b46e881
name: PYSA Ransomware Mutex Detection
description: The rule detects the creation of a mutex named 'Pysa'. This specific mutex name is associated with PYSA ransomware activity. The detection is based on monitoring process creation events on Windows systems and looking for the presence of this mutex name. The primary goal is to identify potential PYSA ransomware infections by detecting a known indicator of compromise.
query: |-
    title: PYSA Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with PYSA ransomware activity.
    author: '@adhikara13'
    date: 2024/05/22
    references:
      - 'https://www.acronis.com/en-us/blog/posts/pysa-ransomware/'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.pysa'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Pysa'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.pysa
author: '@adhikara13'
version: "1"
references:
    - https://www.acronis.com/en-us/blog/posts/pysa-ransomware/
data_sources:
    - process_creation
    - windows
