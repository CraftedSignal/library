id: 019ca09d-bf20-733d-a16d-f69aa9d14291
name: Noblis Ransomware Mutex Detection
description: The rule detects the creation of specific mutexes associated with Noblis ransomware activity. It looks for a mutex named 'mutex_rr_windows'.
query: |-
    title: Noblis Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Noblis ransomware activity.
    author: '@adhikara13'
    date: 2024/05/18
    references:
      - 'https://app.any.run/tasks/e2f4531f-e73b-4a14-99da-48f13dddf5ac/'
      - 'https://cyble.com/blog/threat-actor-targets-russian-gaming-community-with-wannacry-imitator/'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.noblis'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'mutex_rr_windows'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.noblis
author: '@adhikara13'
version: "1"
references:
    - https://app.any.run/tasks/e2f4531f-e73b-4a14-99da-48f13dddf5ac/
    - https://cyble.com/blog/threat-actor-targets-russian-gaming-community-with-wannacry-imitator/
data_sources:
    - process_creation
    - windows
