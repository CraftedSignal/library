id: 019d2698-3d7c-749a-9a45-bda0c36d7a05
name: ToastNotify.exe AUMID Enumeration via getaumid Argument
description: |
    Detects execution of ToastNotify.exe with the getaumid subcommand, which enumerates registered Application User Model IDs from the HKCU and HKLM notification settings registry hives. This is the reconnaissance phase of a toast notification phishing attack, used to identify trusted AUMIDs to impersonate.
query: |
    title: ToastNotify.exe AUMID Enumeration via getaumid Argument
    id: f4a1b2c3-d4e5-4f67-8901-abcdef123405
    status: experimental
    description: >
        Detects execution of ToastNotify.exe with the getaumid subcommand, which enumerates
        registered Application User Model IDs from the HKCU and HKLM notification settings
