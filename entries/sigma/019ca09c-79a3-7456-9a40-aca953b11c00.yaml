id: 019ca09c-79a3-7456-9a40-aca953b11c00
name: Mallox Ransomware Mutex Detection
description: This rule detects the creation of specific mutexes (89A72EF01) that are known to be associated with Mallox ransomware activity. The presence of these mutexes indicates a high probability of Mallox ransomware execution on a Windows system.
query: |-
    title: Mallox Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Mallox ransomware activity.
    author: '@adhikara13'
    date: 2024/08/01
    references:
      - 'https://www.sangfor.com/farsight-labs-threat-intelligence/cybersecurity/new-mallox-ransomware-variant-discovered-wild'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.mallox'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '89A72EF01'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.mallox
author: '@adhikara13'
version: "1"
references:
    - https://www.sangfor.com/farsight-labs-threat-intelligence/cybersecurity/new-mallox-ransomware-variant-discovered-wild
data_sources:
    - process_creation
    - windows
