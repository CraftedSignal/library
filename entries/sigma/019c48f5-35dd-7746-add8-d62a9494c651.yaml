id: 019c48f5-35dd-7746-add8-d62a9494c651
name: Windows Event Logs Cleared
description: The rule detects when Windows Event Logs are cleared. Specifically, it looks for Event ID 1102, which indicates the Security log was cleared, or Event ID 104, which indicates the System log was cleared. This activity is often associated with anti-forensics techniques to hide malicious actions.
query: "title: Windows Event Logs Cleared\r\nid: 3e8c2003-7bb0-4631-a7f1-ecbbe563ed8d\r\nstatus: experimental\r\ndescription: Detects when Windows Event Logs are cleared, including Security (EventID 1102) and System (EventID 104) logs. Often indicates anti-forensics activity to hide malicious actions.\r\nreferences:\r\n  - https://attack.mitre.org/techniques/T1070/001/\r\n  - https://learn.microsoft.com/en-us/windows/security/threat-protection/auditing/event-1102\r\nauthor: SimSpace\r\ndate: 2026-01-19\r\ntags:\r\n  - attack.defense-evasion\r\n  - attack.t1070.001\r\nlogsource:\r\n    product: windows\r\ndetection:\r\n    selection_sec_eid:\r\n      EventID: 1102\r\n    selection_sys_eid:\r\n      EventID: 104\r\n    condition: selection_sec_eid or selection_sys_eid\r\nfields:\r\n    - EventID\r\n    - Channel\r\n    - SubjectUserName\r\n    - SubjectDomainName\r\nfalsepositives:\r\n    - Administrative maintenance\r\n    - Log Rotation\r\nlevel: medium"
