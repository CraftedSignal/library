id: 019ce207-c2ee-7098-8f5e-f463e7895b91
name: Potential AiTM Activity from Multiple User IP Addresses
description: Detects when a single user account successfully signs in from two or more distinct IP addresses within a short timeframe. This can be an indicator of an adversary-in-the-middle (AiTM) attack where both the legitimate user and the attacker have active, authenticated sessions from different locations.
query: |
    title: Potential AiTM Activity from Multiple User IP Addresses
    id: 1916027e-6e42-48fa-9b6a-5ca11b0e4f58
    status: experimental
    description: >-
      Detects when a single user account successfully signs in from two or more
      distinct IP addresses within a short timeframe. This can be an indicator of an
      adversary-in-the-middle (AiTM) attack where both the legitimate user and the
      attacker have active, authenticated sessions from different locations.
    author: detections.ai
    references:
      - https://www.microsoft.com/en-us/security/blog/2026/03/04/inside-tycoon2fa-how-a-leading-aitm-phishing-kit-operated-at-scale/
    date: 2026-03-12
    tags:
      - attack.credential_access
      - attack.t1539
      - attack.t1557
    logsource:
      product: azure
      service: signinlogs
    detection:
      selection:
        resultType: 0 # Identifies successful sign-in events.
        status.errorCode: 0
      # Correlate events over a 1-hour window.
      timeframe: 1h
      # Group by user and trigger if more than one distinct IP is seen.
      condition: selection | group_by(userPrincipalName) | where
        count(distinct(ipAddress)) > 1
    falsepositives:
      - Legitimate user activity where a user rapidly switches networks (e.g., from
        office Wi-Fi to a mobile hotspot).
      - Use of VPNs, proxies, or cloud services that may cause the source IP address
        to change during a session.
      - Consider tuning the timeframe or adding filters for known corporate IP
        ranges to reduce noise.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0006
    - TA0009
techniques:
    - T1557
    - T1539
tags:
    - attack.credential_access
