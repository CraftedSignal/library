id: 019ca09c-1471-733d-b9c6-e259d7e3f42c
name: Lorenz Ransomware Mutex Detection
description: The rule detects the creation of a process that utilizes a mutex named 'wolf'. This specific mutex name is associated with Lorenz ransomware activity. The detection is based on monitoring process creation events and checking for the presence of this particular mutex name.
query: |-
    title: Lorenz Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Lorenz ransomware activity.
    author: '@adhikara13'
    date: 2024/07/19
    references:
      - 'https://lmntrix.com/blog/lmntrix-vs-lorenz-ransomware/'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.lorenz'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'wolf'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.lorenz
author: '@adhikara13'
version: "1"
references:
    - https://lmntrix.com/blog/lmntrix-vs-lorenz-ransomware/
data_sources:
    - process_creation
    - windows
