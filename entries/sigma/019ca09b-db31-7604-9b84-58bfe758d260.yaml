id: 019ca09b-db31-7604-9b84-58bfe758d260
name: Latrodectus Loader Mutex Detection
description: The rule detects the creation of a process that utilizes specific mutex names associated with the Latrodectus loader. Specifically, it looks for the mutex name 'runnung'. This activity is indicative of Latrodectus malware execution.
query: |-
    title: Latrodectus Loader Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Latrodectus loader activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://www.elastic.co/security-labs/spring-cleaning-with-latrodectus'
      - 'https://www.proofpoint.com/us/blog/threat-insight/latrodectus-spider-bytes-ice'
      - 'https://www.vmray.com/latrodectus-a-year-in-the-making/'
    tags:
      - 'attack.execution.t1204'
      - 'malware.loader.latrodectus'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'runnung'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0002
techniques:
    - T1204
tags:
    - attack.execution.t1204
    - malware.loader.latrodectus
author: '@adhikara13'
version: "1"
references:
    - https://www.elastic.co/security-labs/spring-cleaning-with-latrodectus
    - https://www.proofpoint.com/us/blog/threat-insight/latrodectus-spider-bytes-ice
    - https://www.vmray.com/latrodectus-a-year-in-the-making/
data_sources:
    - process_creation
    - windows
