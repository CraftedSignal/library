id: 019ca0a1-72ac-701b-a847-5abd05c6d2a4
name: Stealc Stealer Mutex Detection
description: This rule detects the creation of specific mutexes known to be associated with the Stealc stealer malware. The rule specifically looks for mutex names 'GentleSpade' and '5rjtejk5rytrr'. The presence of these mutexes indicates potential Stealc stealer activity on a Windows system.
query: |-
    title: Stealc Stealer Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Stealc stealer activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://app.any.run/tasks/9777d1a9-134f-453a-a74b-18c6ea1bb030/'
      - 'https://app.threat.zone/submission/51bd0182-a70d-40ca-b081-c4902a37b88b/dynamic-scan-report/behaviour/mutex'
    tags:
      - 'attack.credential_access.t1555'
      - 'malware.stealer.stealc'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'GentleSpade'
          - '5rjtejk5rytrr'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0006
techniques:
    - T1555
tags:
    - attack.credential_access.t1555
    - malware.stealer.stealc
author: '@adhikara13'
version: "1"
references:
    - https://app.any.run/tasks/9777d1a9-134f-453a-a74b-18c6ea1bb030/
    - https://app.threat.zone/submission/51bd0182-a70d-40ca-b081-c4902a37b88b/dynamic-scan-report/behaviour/mutex
data_sources:
    - process_creation
    - windows
