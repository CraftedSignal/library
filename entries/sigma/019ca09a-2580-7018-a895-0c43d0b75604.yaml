id: 019ca09a-2580-7018-a895-0c43d0b75604
name: GoldenSpy Backdoor Mutex Detection
description: The rule detects the creation of processes that utilize specific mutex names associated with the GoldenSpy backdoor. Specifically, it looks for the mutex 'nb_app_log_mutex'. The presence of this mutex indicates potential GoldenSpy backdoor activity on a Windows system.
query: |-
    title: GoldenSpy Backdoor Mutex Detection
    status: experimental
    description: Detects known mutexes associated with GoldenSpy backdoor activity.
    author: '@adhikara13'
    date: 2024/12/19
    references:
      - 'https://www.trendmicro.com/vinfo/de/threat-encyclopedia/malware/backdoor.win32.goldenspy.ypah-a'
    tags:
      - 'attack.persistence.t1547'
      - 'malware.backdoor.goldenspy'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'nb_app_log_mutex'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0003
    - TA0004
techniques:
    - T1547
tags:
    - attack.persistence.t1547
    - malware.backdoor.goldenspy
author: '@adhikara13'
version: "1"
references:
    - https://www.trendmicro.com/vinfo/de/threat-encyclopedia/malware/backdoor.win32.goldenspy.ypah-a
data_sources:
    - process_creation
    - windows
