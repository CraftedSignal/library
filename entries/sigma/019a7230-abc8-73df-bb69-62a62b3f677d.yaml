id: 019a7230-abc8-73df-bb69-62a62b3f677d
name: Cephalus Ransomware Sideloading via SentinelOne Executable
description: Detects potential DLL sideloading activity associated with Cephalus ransomware, where a legitimate SentinelOne executable is launched from a non-standard path and loads a malicious DLL.
query: |
    title: Cephalus Ransomware Sideloading via SentinelOne Executable
    id: 1e796df8-5877-4b65-a095-74d2203ec509
    status: experimental
    description: >-
      Detects potential DLL sideloading activity associated with Cephalus
      ransomware, where a legitimate SentinelOne executable is launched from a
      non-standard path and loads a malicious DLL.
    references:
      - https://asec.ahnlab.com/en/90878/
      - https://www.huntress.com/blog/cephalus-ransomware
      - >-
        https://www.scworld.com/news/cephalus-ransomware-abuses-sentinelone-executable-for-dll-sideloading
    author: detections.ai, Georg Lauenstein
    date: 2025-11-10T00:00:00.000Z
    tags:
      - attack.defense_evasion
      - attack.t1574.001
    logsource:
      category: image_load
      product: windows
    detection:
      selection:
        Image|endswith: \SentinelBrowserNativeHost.exe
        ImageLoaded|endswith: \SentinelAgentCore.dll
      susp_path:
        Image|contains:
          - \Users\
          - \ProgramData\
          - \Windows\Temp\
          - \Temp\
          - \Downloads\
          - \Desktop\
      condition: selection and susp_path
    falsepositives:
      - Legitimate administrative or diagnostic activities.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0003
    - TA0004
    - TA0005
techniques:
    - T1574.001
