id: 019a0790-8211-7210-ad71-fb9646bb05b2
name: Fake Homebrew and Software Phishing Domains
description: These domains are actively used in phishing campaigns impersonating legitimate software platforms like Homebrew, LogMeIn, and TradingView to distribute Odyssey Stealer and AMOS malware. Blocking these domains can prevent access to malicious download sites.
query: |
    title: Fake Homebrew and Software Phishing Domains
    id: a6c9b7bb-7432-48db-934c-d3e9c0b6a7be
    status: experimental
    description: These domains are actively used in phishing campaigns impersonating
      legitimate software platforms like Homebrew, LogMeIn, and TradingView to
      distribute Odyssey Stealer and AMOS malware. Blocking these domains can
      prevent access to malicious download sites.
    references:
      - https://hunt.io/blog/macos-odyssey-amos-malware-campaign
    author: detections.ai
    date: 2025-10-21
    tags:
      - attack.t1566.002
      - attack.t1566.001
    logsource:
      category: network_connection # This rule can be adapted for 'dns' or 'proxy' log categories.
    detection:
      selection:
        DestinationHostname|endswith:
          # Detects connections to known malicious domains.
          - 'homebrewonline.org'
          - 'homebrewupdate.org'
          - 'homebrewclubs.org'
          - 'homebrewfaq.org'
          - 'logmeln.com'
          - 'logmeeine.com'
          - 'tradingviewen.com'
          - 'sites-phantom.com'
          - 'filmoraus.com'
      condition: selection
    falsepositives:
      - Unlikely, as these are specific domains associated with a malicious campaign.
    level: high
query_type: sigma
severity: high
