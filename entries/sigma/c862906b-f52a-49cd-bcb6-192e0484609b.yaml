    - attack.t1027.010
author: Jamari Donovan(JDtheHiddenOne)
version: "1"
references:
    - https://www.googlecloudcommunity.com/gc/Community-Blog/Counting-Characters-to-Find-Obfuscated-Commands/ba-p/875162
