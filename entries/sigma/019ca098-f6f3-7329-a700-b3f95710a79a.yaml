id: 019ca098-f6f3-7329-a700-b3f95710a79a
name: Dustman Wiper Mutex Detection
description: This rule detects the creation of specific mutexes associated with the Dustman wiper malware. The mutex name 'Down With Bin Salman' is a strong indicator of this particular wiper's activity. Detection of this mutex suggests that the Dustman wiper may be active on the system, potentially leading to data destruction.
query: |-
    title: Dustman Wiper Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Dustman wiper activity.
    author: '@adhikara13'
    date: 2024/05/22
    references:
      - 'https://www.sonicwall.com/blog/dustman-malware-overwrites-logical-drives-data-with-down-with-saudi-kingdom-down-with-bin-salman'
    tags:
      - 'attack.impact.t1485'
      - 'malware.wiper.dustman'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Down With Bin Salman'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1485
tags:
    - attack.impact.t1485
    - malware.wiper.dustman
author: '@adhikara13'
version: "1"
references:
    - https://www.sonicwall.com/blog/dustman-malware-overwrites-logical-drives-data-with-down-with-saudi-kingdom-down-with-bin-salman
data_sources:
