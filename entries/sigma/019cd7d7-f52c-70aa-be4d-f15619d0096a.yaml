id: 019cd7d7-f52c-70aa-be4d-f15619d0096a
name: BoryptGrab Stealer Download via Build Name
description: Detects HTTP requests to download the BoryptGrab stealer, which uses a specific URL pattern containing a hardcoded build name. This activity is characteristic of the initial launchers used in the BoryptGrab campaign to fetch the main stealer component from a C2 server.
query: |
    title: BoryptGrab Stealer Download via Build Name
    id: 477ecdd4-842c-4288-8e67-d2ca81613543
    status: experimental
    description: >-
      Detects HTTP requests to download the BoryptGrab stealer, which uses a
      specific URL pattern containing a hardcoded build name. This activity is
      characteristic of the initial launchers used in the BoryptGrab campaign to
      fetch the main stealer component from a C2 server.
    author: detections.ai
    references:
      - >-
        https://www.trendmicro.com/en_us/research/26/c/boryptgrab-stealer-targets-users-via-deceptive-github-pages.html
    date: 2026-03-10T00:00:00.000Z
    tags:
      - attack.t1105
      - attack.command_and_control
      - detection.emerging-threats
    logsource:
      category: webserver
    detection:
      selection:
        url.path:
          - /api/CryptoByte
          - /api/Crypto_Byte
          - /api/Data
          - /api/Kassay
          - /api/Leon
          - /api/Pisechka
          - /api/Shrek
          - /api/Sonic
          - /api/Sonic2
          - /api/Sonic_new1
          - /api/Sonic_new2
          - /api/Yaropolk
          - /api/Yarostnick
          - /api/Yasno
          - /api/bigdick
          - /api/wm_detect
      condition: selection
    falsepositives:
      - The combination of the '/api/' path and these specific build names is highly
        indicative of malicious activity. However, legitimate applications could
        coincidentally use a similar API path, though it is unlikely.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0011
techniques:
    - T1105
tags:
    - attack.t1105
    - attack.command_and_control
    - detection.emerging-threats
