id: 019ca0a0-b7c9-771d-8744-3de70ac4d9b7
name: SHELBY Backdoor Mutex Detection
description: Detects known mutexes associated with SHELBY backdoor activity. Specifically, it looks for the mutex name 'Global\GHS<UniqueID>'.
query: |-
    title: SHELBY Backdoor Mutex Detection
    status: experimental
    description: Detects known mutexes associated with SHELBY backdoor activity.
    author: '@adhikara13'
    date: 2025/01/15
    references:
      - 'https://www.elastic.co/security-labs/the-shelby-strategy'
    tags:
      - 'attack.persistence.t1547'
      - 'malware.backdoor.shelby'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Global\GHS<UniqueID>'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0003
    - TA0004
techniques:
    - T1547
tags:
    - attack.persistence.t1547
    - malware.backdoor.shelby
author: '@adhikara13'
version: "1"
references:
    - https://www.elastic.co/security-labs/the-shelby-strategy
data_sources:
    - process_creation
    - windows
