id: 019ca09a-78bb-709f-8ffb-796355beb496
name: Gryphon Ransomware Mutex Detection
description: The rule detects the creation of specific mutexes associated with Gryphon ransomware. It specifically looks for a mutex named 'GIVEMEBTC'. The detection is based on monitoring process creation events in Windows environments.
query: |-
    title: Gryphon Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Gryphon ransomware activity.
    author: '@adhikara13'
    date: 2025/01/27
    references:
      - 'https://app.any.run/tasks/e04d831c-a42d-4f5b-9ff0-efee309eaa59/'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.gryphon'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'GIVEMEBTC'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.gryphon
author: '@adhikara13'
version: "1"
references:
    - https://app.any.run/tasks/e04d831c-a42d-4f5b-9ff0-efee309eaa59/
data_sources:
    - process_creation
    - windows
