id: 019ca34d-0e82-7028-9f1c-d542d4df94b2
name: Detect Residential Proxy Network Disruption
description: |
    This rule is meant to help analysts quickly spot a high-confidence indicator related to Google Residential Proxy Network Disruption. It is written to be easy to understand and to keep false alarms low by focusing on a very specific match: a DNS lookup to a specific domain mentioned in the report. A match does not automatically prove an attacker is currently active, and it does not prove a file was executed, but it does mean the event is important because it lines up with a public threat intelligence source. When this triggers, start by identifying the host, user, and timeframe involved, then decide whether the activity is expected for that system. If it is unexpected, preserve the related logs and any files, and look for nearby events that could explain how the indicator appeared, such as a download, a new process, or a new connection. If the same indicator appears on multiple systems, treat it as a scoping signal and expand the investigation window. Use the reference link (https://cloud.google.com/blog/topics/threat-intelligence/disrupting-largest- residential-proxy-network) to document where the indicator came from and to support incident notes and reporting.
