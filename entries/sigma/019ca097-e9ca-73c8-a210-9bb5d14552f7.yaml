id: 019ca097-e9ca-73c8-a210-9bb5d14552f7
name: DarkAngels Ransomware Mutex Detection
description: This rule detects the creation of specific mutexes associated with the DarkAngels ransomware. The detection is based on the presence of the mutex name 'DarkAngels'. The rule aims to identify potential DarkAngels ransomware activity on Windows systems by monitoring process creation events for these mutexes.
query: |-
    title: DarkAngels Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with DarkAngels ransomware activity.
    author: '@adhikara13'
    date: 2025/07/15
    references:
      - 'https://cyble.com/blog/rebranded-babuk-ransomware-in-action-darkangels-ransomware-performs-targeted-attack/'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.darkangels'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'DarkAngels'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.darkangels
author: '@adhikara13'
version: "1"
references:
    - https://cyble.com/blog/rebranded-babuk-ransomware-in-action-darkangels-ransomware-performs-targeted-attack/
data_sources:
    - process_creation
    - windows
