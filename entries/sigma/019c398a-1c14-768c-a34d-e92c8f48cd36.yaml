id: 019c398a-1c14-768c-a34d-e92c8f48cd36
name: 'Detect DeadVax Self-Parsing Loader  '
description: |
    In this attack, malware uses a renamed copy of PowerShell to read a hidden file and run it. The file contains more malware that gets executed in memory. What makes this suspicious is that the activity is started by a batch or command script, not by the user directly. A normal user would run programs by double-clicking or from a menu. Here, one script launches another, which then reads and runs hidden content. This is a common pattern in multi-stage attacks where each step hides the next. Security teams should look for this chain: a batch or command window starts a process that reads a specific file and executes what it finds. This rule helps catch that behaviour before the full malware takes over.
query: |
    title: "Detect DeadVax Self-Parsing Loader  "
    id: c3d4e5f6-a7b8-4c5d-9e0f-deadvax001
    status: experimental
    description: >
      In this attack, malware uses a renamed copy of PowerShell to read a hidden
      file and run it. The file contains more malware that gets executed in memory.
      What makes this suspicious is that the activity is started by a batch or
      command script, not by the user directly. A normal user would run programs by
      double-clicking or from a menu. Here, one script launches another, which then
      reads and runs hidden content. This is a common pattern in multi-stage attacks
      where each step hides the next. Security teams should look for this chain: a
      batch or command window starts a process that reads a specific file and
      executes what it finds. This rule helps catch that behaviour before the full
      malware takes over.
    references:
      - https://www.securonix.com/blog/deadvax-threat-research-security-advisory/
    author: Daniel Jeremiah
    date: 2026/02/07
    tags:
      - attack.execution
      - attack.t1059.001
      - attack.t1027
    logsource:
      category: process_creation
      product: windows
    detection:
      selection_image:
        Image|endswith: \mbs.exe
      selection_cmdline:
        CommandLine|contains|all:
          - rEgX.cmd
          - Get-Content
      selection_selfparse:
        CommandLine|contains|any:
          - '-Raw'
          - startswith
          - '@'
      context_parent:
        ParentImage|endswith|any:
          - \cmd.exe
          - \rEgX.cmd
          - \conhost.exe
      condition: selection_image and selection_cmdline and context_parent
    falsepositives:
      - Legitimate batch invoking powershell with Get-Content on specific script
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0002
    - TA0005
techniques:
    - T1059.001
    - T1027
tags:
