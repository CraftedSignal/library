id: 019ca09e-c6b6-77ed-8572-a7b6eff9ca93
name: Protego RAT Mutex Detection
description: The rule detects the creation of specific mutexes known to be associated with the Protego Remote Access Trojan (RAT). It specifically looks for a mutex named 'kiuwqyergljkwef'. This activity is indicative of Protego RAT execution or presence on a system.
query: |-
    title: Protego RAT Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Protego rat activity.
    author: '@adhikara13'
    date: 2025/07/30
    references:
      - 'https://www.secrss.com/articles/80795'
      - 'https://ti.qianxin.com/blog/articles/apt-q-36-impersonates-university-domain-names-to-steal-secrets-en/'
    tags:
      - 'attack.command_and_control.t1219'
      - 'malware.rat.protego'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'kiuwqyergljkwef'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0011
techniques:
    - T1219
tags:
    - attack.command_and_control.t1219
    - malware.rat.protego
author: '@adhikara13'
version: "1"
references:
    - https://www.secrss.com/articles/80795
    - https://ti.qianxin.com/blog/articles/apt-q-36-impersonates-university-domain-names-to-steal-secrets-en/
data_sources:
    - process_creation
    - windows
