id: 019c5cfd-6f79-73e8-96a5-6eccf5ab6c93
name: Remcos RAT (SmartApeSG) - Shotcut
description: Detects Remcos RAT execution via shotcut.exe running from AppData\Local\2120206 (DLL sideloading). Requires full path to avoid false positives from other Shotcut installs.
query: |
    title: Remcos RAT (SmartApeSG) - Shotcut
    id: a7b8c9d0-e1f2-0a1b-4c5d-6e7f8a9b0c1d
    status: experimental
    description: >-
      Detects Remcos RAT execution via shotcut.exe running from
      AppData\Local\2120206 (DLL sideloading). Requires full path to avoid false
      positives from other Shotcut installs.
    references:
      - https://app.any.run/tasks/361eb125-357d-4c59-b83e-9d27d0f314ce
      - https://malpedia.caad.fkie.fraunhofer.de/details/win.remcos
      - https://blog.talosintelligence.com/picking-apart-remcos
      - >-
        https://www.broadcom.com/support/security-center/protection-bulletin/new-clickfix-campaign-delivers-remcos-rat-to-italian-users
      - https://isc.sans.edu/diary/32474
    author: "Daniel Jeremiah"
    date: 2026/02/14
    modified: 2026/02/14
    logsource:
      category: process_creation
      product: windows
      service: security
    detection:
      selection_path:
        - Image|endswith: \shotcut.exe
        - Image|contains: '2120206'
        - Image|contains: AppData\Local
      condition: selection_path
    falsepositives:
      - Legitimate Shotcut installed under AppData\Local in a folder named 2120206
        (unusual)
    level: high
    tags:
      - attack.execution
      - attack.t1574.002
      - malware.remcos
      - campaign.smartapesg
query_type: sigma
severity: high
