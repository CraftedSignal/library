id: 019c1f08-4dff-71b7-b542-605e2284f1bf
name: Notepad++ Supply Chain Attack - Suspicious GUP Network Connection
description: |
    Detects WinGUp (gup.exe) making network connections to domains other than the  legitimate Notepad++ update infrastructure. Per Kevin Beaumont, gup.exe should  only connect to notepad-plus-plus.org, github.com, and release-assets.githubusercontent.com.
query: "title: Notepad++ Supply Chain Attack - Suspicious GUP Network Connection\nid: c29j7f6g-dh8e-8i1f-ej0h-6g7i8j9e0f1g\nstatus: experimental\ndescription: >\n  Detects WinGUp (gup.exe) making network connections to domains other than the \n  legitimate Notepad++ update infrastructure. Per Kevin Beaumont, gup.exe\n  should \n  only connect to notepad-plus-plus.org, github.com, and\n  release-assets.githubusercontent.com.\nreferences:\n  - https://doublepulsar.com/small-numbers-of-notepad-users-reporting-security-woes-371d7a3fd2d9\n  - https://notepad-plus-plus.org/news/hijacked-incident-info-update/\n  - https://www.helpnetsecurity.com/2026/02/02/2025-notepad-supply-chain-compromise/\nauthor: tim@detections.ai\ndate: 2026/02/02\ntags:\n  - attack.command_and_control\n  - attack.t1071.001\n  - attack.initial_access\n  - attack.t1195.002\n  - notepad++\nlogsource:\n  category: network_connection\n  product: windows\n  service: sysmon\ndetection:\n  selection_gup:\n    Image|endswith:\n      - '\\gup.exe'\n      - '\\GUP.exe'\n  filter_legitimate_domains:\n    DestinationHostname|endswith:\n      - 'notepad-plus-plus.org'\n      - 'github.com'\n      - 'githubusercontent.com'\n  condition: selection_gup and not filter_legitimate_domains\nfalsepositives:\n  - GUP checking for plugin updates from third-party repositories\nlevel: high\n"
