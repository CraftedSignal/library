id: 019ca099-44eb-773c-95dc-5e59a6d31b06
name: Embargo Ransomware Mutex Detection
description: The rule detects the creation of specific mutexes known to be associated with Embargo ransomware activity. It specifically looks for mutexes named 'LoadUpOnGunsBringYourFriends' or 'IntoTheFloodAgainSameOldTrip' during process creation events on Windows systems.
query: |-
    title: Embargo Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Embargo ransomware activity.
    author: '@adhikara13'
    date: 2024/05/22
    references:
      - 'https://cyble.com/blog/the-rust-revolution-new-embargo-ransomware-steps-in/'
      - 'https://www.welivesecurity.com/en/eset-research/embargo-ransomware-rocknrust/'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.embargo'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'LoadUpOnGunsBringYourFriends'
          - 'IntoTheFloodAgainSameOldTrip'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.embargo
author: '@adhikara13'
version: "1"
references:
    - https://cyble.com/blog/the-rust-revolution-new-embargo-ransomware-steps-in/
    - https://www.welivesecurity.com/en/eset-research/embargo-ransomware-rocknrust/
data_sources:
    - process_creation
    - windows
