id: 019a5e26-d54b-77a9-b4ab-8e12a94998dd
name: LANDFALL Android Spyware C2 Communication
description: Detects network connections to known Command and Control (C2) servers associated with the LANDFALL Android spyware. The spyware communicates over HTTPS, often on non-standard ports.
query: |
    title: LANDFALL Android Spyware C2 Communication
    id: 774c9aeb-41c9-4590-b99a-99857442bbfc
    status: experimental
    description: Detects network connections to known Command and Control (C2)
      servers associated with the LANDFALL Android spyware. The spyware communicates
      over HTTPS, often on non-standard ports.
    references:
      - https://unit42.paloaltonetworks.com/landfall-is-new-commercial-grade-android-spyware/
    author: detections.ai
    date: 2025-11-07
    tags:
      - attack.command_and_control
      - attack.t1071.001
      - attack.t1573.002
      - malware.landfall
      - os.android
    logsource:
      category: network_connection
      product: zeek
    detection:
      # Selection for known LANDFALL C2 domains
      selection_domain:
        destination.domain:
          - 'brightvideodesigns.com'
          - 'healthyeatingontherun.com'
          - 'hotelsitereview.com'
          - 'projectmanagerskills.com'
        # Selection for known LANDFALL C2 IP addresses
      selection_ip:
        destination.ip:
          - '45.155.250.158'
          - '46.246.28.75'
          - '91.132.92.35'
          - '92.243.65.240'
          - '192.36.57.56'
          - '194.76.224.127'
      condition: selection_domain or selection_ip
    falsepositives:
      - Legitimate traffic to these indicators if they have been sinkholed or
        reassigned.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0011
techniques:
    - T1071.001
    - T1573.002
tags:
    - attack.command_and_control
    - attack.t1071.001
    - attack.t1573.002
    - malware.landfall
    - os.android
author: detections.ai
version: "2"
