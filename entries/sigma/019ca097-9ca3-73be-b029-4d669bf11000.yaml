id: 019ca097-9ca3-73be-b029-4d669bf11000
name: Cylance Ransomware Mutex Detection
description: This rule detects the creation of specific mutexes associated with Cylance ransomware activity. The detection is triggered when a process creates a mutex named 'CylanceMutex'. This indicates potential ransomware execution or preparation on a Windows system.
query: |-
    title: Cylance Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Cylance ransomware activity.
    author: '@adhikara13'
    date: 2024/05/22
    references:
      - 'https://www.broadcom.com/support/security-center/protection-bulletin/cylance-ransomware-targets-both-windows-and-linux'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.cylance'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'CylanceMutex'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.cylance
author: '@adhikara13'
version: "1"
references:
    - https://www.broadcom.com/support/security-center/protection-bulletin/cylance-ransomware-targets-both-windows-and-linux
data_sources:
    - process_creation
    - windows
