id: 019ca097-73de-75db-86e3-9445393a26e4
name: Crytox Ransomware Mutex Detection
description: The rule detects the creation of specific mutex names associated with Crytox ransomware. It looks for mutexes starting with 'itkd' or 'CSWS' followed by four characters that are generated based on the target Process ID (PID). This detection is based on known indicators of Crytox ransomware activity.
query: |-
    title: Crytox Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Crytox ransomware activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://labs.k7computing.com/index.php/encrypted-chaos-analysis-of-crytox-ransomware/'
      - 'https://www.trendmicro.com/vinfo/jp/threat-encyclopedia/malware/ransom.win64.crytox.a'
      - 'https://www.zscaler.com/blogs/security-research/technical-analysis-crytox-ransomware'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.crytox'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'itkd<4_characters_generated_based_on_targetPID>'
          - 'CSWS<4_characters_generated_based_on_targetPID>'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.crytox
author: '@adhikara13'
version: "1"
references:
    - https://labs.k7computing.com/index.php/encrypted-chaos-analysis-of-crytox-ransomware/
    - https://www.trendmicro.com/vinfo/jp/threat-encyclopedia/malware/ransom.win64.crytox.a
    - https://www.zscaler.com/blogs/security-research/technical-analysis-crytox-ransomware
data_sources:
