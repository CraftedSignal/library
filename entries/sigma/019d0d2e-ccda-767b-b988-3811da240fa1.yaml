id: 019d0d2e-ccda-767b-b988-3811da240fa1
name: Operation GhostMail DNS Exfiltration
description: Detects DNS resolution requests to the Operation GhostMail exfiltration subdomains (*.i.zimbrasoft.com.ua) and main domain. DNS exfiltration is the primary channel used by this APT to steal credentials and 2FA codes even when HTTPS is blocked.
query: |
    title: Operation GhostMail DNS Exfiltration
    id: ec4fc129-abb4-4d70-b5cd-8848cb805a84
    status: experimental
    description: Detects DNS resolution requests to the Operation GhostMail
      exfiltration subdomains (*.i.zimbrasoft.com.ua) and main domain. DNS
      exfiltration is the primary channel used by this APT to steal credentials and
      2FA codes even when HTTPS is blocked.
    author: detections.ai
    references:
      - https://www.seqrite.com/blog/operation-ghostmail-zimbra-xss-russian-apt-ukraine/
    date: 2026-03-20
    tags:
      - attack.exfiltration
      - attack.t1071.004
    logsource:
      category: dns
    detection:
      selection:
        # Detects DNS queries resolving to the malicious C2 domain used for exfiltration
        query|endswith:
          - '.zimbrasoft.com.ua'
          - 'zimbrasoft.com.ua'
      condition: selection
    falsepositives:
      - None expected. This is a known malicious C2 domain associated with Operation
        GhostMail.
    level: critical
