id: 019ca0a3-bb59-72ef-8aa6-c0cdd3fe9698
name: Zola Ransomware Mutex Detection
description: This rule detects the creation of specific mutex names associated with Zola ransomware activity. The detection is based on the presence of the mutex '4B991369-7C7C-47AA-A81E-EF6ED1F5E24C'. The rule monitors process creation events on Windows systems to identify these mutexes, which are indicators of Zola ransomware execution or presence.
query: |-
    title: Zola Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Zola ransomware activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://www.acronis.com/en-gb/tru/posts/zola-ransomware-the-many-faces-of-the-proton-family/'
      - 'https://www.loginsoft.com/post/zola-ransomware'
      - 'https://cyberinsider.com/zola-ransomware-springs-to-action-as-latest-proton-variant/'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.zola'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '4B991369-7C7C-47AA-A81E-EF6ED1F5E24C'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.zola
author: '@adhikara13'
version: "1"
references:
    - https://www.acronis.com/en-gb/tru/posts/zola-ransomware-the-many-faces-of-the-proton-family/
    - https://www.loginsoft.com/post/zola-ransomware
    - https://cyberinsider.com/zola-ransomware-springs-to-action-as-latest-proton-variant/
data_sources:
    - process_creation
    - windows
