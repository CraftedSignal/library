id: 995ac93c-7e9e-45d1-a616-a4a9b083d103
name: DarkVision RAT DLL Hijacking
description: Detects potential DLL hijacking attempts used by DarkVision RAT for privilege escalation. The malware places a malicious 'DXGI.dll' in a non-standard path to be loaded by 'WinSAT.exe'.
query: |
    title: DarkVision RAT DLL Hijacking
    id: 79c7dfae-6310-46de-86b8-3c730de119d1
    status: experimental
    description: Detects potential DLL hijacking attempts used by DarkVision RAT for privilege escalation. The malware places a malicious 'DXGI.dll' in a non-standard path to be loaded by 'WinSAT.exe'.
    references:
      - https://any.run/malware-trends/darkvision/
    author: detections.ai
    date: 2025-09-04
    tags:
      - attack.privilege_escalation
      - attack.t1574.001
      - malware.darkvision
    logsource:
      category: image_load
      product: windows
    detection:
      selection:
            # Detects WinSAT.exe loading the DXGI.dll, a target for hijacking
        Image|endswith: '\WinSAT.exe'
        ImageLoaded|endswith: '\DXGI.dll'
      filter_legit_path:
            # Filters out legitimate loads from the default system directory
        ImageLoaded|startswith: 'C:\Windows\System32\'
      condition: selection and not filter_legit_path
    falsepositives:
        # This behavior is highly suspicious. However, legitimate software that bundles its own version of DXGI.dll could cause a false positive if it's placed in a directory where WinSAT.exe is executed.
      - Legitimate software side-loading a non-system DXGI.dll for valid reasons.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0003
    - TA0004
    - TA0005
techniques:
    - T1574.001
tags:
    - attack.privilege_escalation
    - attack.t1574.001
    - malware.darkvision
author: detections.ai
version: "1"
