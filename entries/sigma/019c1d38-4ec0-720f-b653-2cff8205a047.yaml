id: 019c1d38-4ec0-720f-b653-2cff8205a047
name: eScan Antivirus Component Deletion with Backup Creation
description: |
    Detects deletion of eScan antivirus components, including the Remote Support Utility (tvqsapp.exe), preceded or accompanied by creation of ZIP backups in C:\ProgramData\esfsbk. This behavior may indicate malicious tampering or defense evasion associated with eScan supply chain compromise.
query: "title: eScan Antivirus Component Deletion with Backup Creation\r\nid: 8d7f6b92-3f6c-4b44-9a8e-ec1c2f5a9c31\r\nstatus: experimental\r\ndescription: >\r\n  Detects deletion of eScan antivirus components, including the Remote Support\r\n  Utility (tvqsapp.exe), preceded or accompanied by creation of ZIP backups\r\n  in C:\\ProgramData\\esfsbk. This behavior may indicate malicious tampering\r\n  or defense evasion associated with eScan supply chain compromise.\r\nauthor: Thaung Htet\r\ndate: 2026-02-02\r\nreferences:\r\n  - https://securelist.com/escan-supply-chain-attack/118688/\r\n  - https://www.securityweek.com/escan-antivirus-delivers-malware-in-supply-chain-attack/\r\n  - https://www.morphisec.com/blog/critical-escan-threat-bulletin/\r\n  - https://www.infosecurity-magazine.com/news/escan-antivirus-breach-delivers/\r\ntags:\r\n  - attack.defense_evasion\r\n  - attack.t1562.001\r\nlogsource:\r\n  product: windows\r\n  category: file_event\r\ndetection:\r\n  escan_file_targets:\r\n    TargetFilename|contains:\r\n      - '\\\\Common Files\\\\MicroWorld\\\\WGWIN\\\\'\r\n      - '\\\\MicroWorld\\\\'\r\n  escan_remote_support:\r\n    TargetFilename|endswith:\r\n      - '\\\\tvqsapp.exe'\r\n  escan_backup_creation:\r\n    TargetFilename|startswith: 'C:\\\\ProgramData\\\\esfsbk\\\\'\r\n    TargetFilename|endswith: '.zip'\r\n  condition: escan_backup_creation and (escan_file_targets or escan_remote_support)\r\nfalsepositives:\r\n  - Legitimate eScan uninstallation or software update\r\n  - Authorized administrative cleanup processes\r\nlevel: high\r\n"
