id: 2d2dba8e-54b0-4b1e-ad3c-58eee8053454
name: Suspicious Shortcut File Creation via PowerShell
description: |
    This detection looks for a method of creating potentially malicious LNK (Shortcut) files by using the CreateShortcut() function. Shortcuts or symbolic links are used to reference other files or programs that will be opened or executed when the shortcut is  clicked or executed by a system startup process.
query: "title: Suspicious Shortcut File Creation via PowerShell\r\nid: 8d13b414-e2e6-480c-a21a-aeea7e525f47\r\nstatus: experimental\r\ndescription: >\r\n  This detection looks for a method of creating potentially malicious LNK (Shortcut) files by using the CreateShortcut() function.\r\n  Shortcuts or symbolic links are used to reference other files or programs that will be opened or executed when the shortcut is \r\n  clicked or executed by a system startup process.\r\nauthor: Tim Peck\r\nreferences:\r\n  - https://blog.talosintelligence.com/emerging-interlock-ransomware/\r\n  - https://www.zscaler.com/blogs/security-research/agent-tesla-rat-delivered-quantum-builder-new-ttps\r\n  - https://redcanary.com/threat-detection-report/threats/yellow-cockatoo/\r\n  - https://www.crowdstrike.com/en-us/blog/solarmarker-backdoor-technical-analysis/\r\n  - https://www.esentire.com/blog/socgholish-sets-sights-on-victim-peers\r\n  - https://www.security.com/threat-intelligence/shuckworm-russia-ukraine-military\r\ndate: 2025/07/28\r\nlogsource:\r\n  product: windows\r\n  service: powershell\r\ndetection:\r\n  selection1:\r\n    ScriptBlockText|contains:\r\n      - 'CreateShortcut('\r\n      - '.CreateShortcut.'\r\n  selection2:\r\n    ScriptBlockText|contains:\r\n      - 'WScript.Shell'\r\n  condition: all of selection*\r\nlevel: medium\r\ntags:\r\n  - attack.persistence\r\n  - attack.T1547.009\r\n  - threat.interlock\r\n  - threat.steep#maverick\r\n  - threat.agent tesla\r\n  - threat.yellow_cockatoo\r\n  - threat.solarmarker\r\n  - threat.socgholish\r\n  - threat.shuckworm\r\n  - threat.pxa stealer\r\n  - threat.dark pink\r\nfalsepositives:\r\n  - Legitimate system management scripts creating shortcuts"
