id: 019ca09e-3090-7417-8399-9e25a36c3e52
name: Payload Ransomware Mutex Detection
description: This rule detects the creation of specific mutexes associated with Payload ransomware activity. The detection is triggered when a process creates a mutex named 'MakeAmericaGreatAgain'. This activity is indicative of the Payload ransomware attempting to ensure only one instance of itself is running on a system.
query: |-
    title: Payload Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Payload ransomware activity.
    author: '@adhikara13'
    date: 2026/02/27
    references:
      - 'https://www.reddit.com/r/MalwareAnalysis/comments/1reut0s/new_payload_ransomware_malware_analysis/'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.payload'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'MakeAmericaGreatAgain'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.payload
author: '@adhikara13'
version: "1"
references:
    - https://www.reddit.com/r/MalwareAnalysis/comments/1reut0s/new_payload_ransomware_malware_analysis/
data_sources:
    - process_creation
    - windows
