id: 019ca093-6cca-721f-9611-8253cee83578
name: 5ss5c Ransomware Mutex Detection
description: The rule detects the creation of specific mutexes associated with the 5ss5c ransomware. It looks for the mutex name '5ss5c_CRYPT' during process creation events on Windows systems. The presence of this mutex indicates potential 5ss5c ransomware activity.
query: |-
    title: 5ss5c Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with 5ss5c ransomware activity.
    author: '@adhikara13'
    date: 2024/12/19
    references:
      - 'https://bartblaze.blogspot.com/2020/01/satan-ransomware-rebrands-as-5ss5c.html'
      - 'https://digital.nhs.uk/cyber-alerts/2020/cc-3344'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.5ss5c'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '5ss5c_CRYPT'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.5ss5c
author: '@adhikara13'
version: "1"
references:
    - https://bartblaze.blogspot.com/2020/01/satan-ransomware-rebrands-as-5ss5c.html
    - https://digital.nhs.uk/cyber-alerts/2020/cc-3344
data_sources:
    - process_creation
    - windows
