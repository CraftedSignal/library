id: 019bd122-2a73-727b-84fe-eaacdc746f75
name: APT24 BADAUDIO - Cobalt Strike Beacon Watermark Detection
description: Detects Cobalt Strike Beacon payloads, specifically those associated with the APT24 BADAUDIO campaign, by looking for a unique watermark hash in command-line arguments or specific beacon executable/DLL names during process creation. The rule targets the Cobalt Strike Beacon watermark hash "BeudtKgqnlm0Ruvf+VYxuw==" and a generic "Watermark_Hash" string, alongside process images ending with '\beacon.exe' or '\beacon.dll'.
query: |
    title: APT24 BADAUDIO - Cobalt Strike Beacon Watermark Detection
    id: 6d7e8f90-1234-5678-9abc-def012345678
    status: experimental
    description: |
        Detects Cobalt Strike Beacon payloads delivered by BADAUDIO malware. BADAUDIO downloads, decrypts, and executes AES-encrypted payloads in memory, with one identified payload being Cobalt Strike Beacon. The specific Cobalt Strike Beacon watermark hash used in APT24 campaigns is "BeudtKgqnlm0Ruvf+VYxuw==". This rule detects process creation or network activity associated with Cobalt Strike Beacon, particularly when preceded by BADAUDIO downloader activity or connections to known BADAUDIO C2 infrastructure.
    references:
        - https://cloud.google.com/blog/topics/threat-intelligence/apt24-pivot-to-multi-vector-attacks
    author: Daniel Jeremiah
    date: 2025/01/18
    tags:
        - attack.command_and_control
        - attack.t1071.001
        - attack.t1055
    logsource:
        category: process_creation
        product: windows
    detection:
        selection:
            CommandLine|contains|any:
                - 'BeudtKgqnlm0Ruvf+VYxuw=='
                - 'Watermark_Hash'
            Image|endswith|any:
                - '\beacon.exe'
                - '\beacon.dll'
        condition: selection
    falsepositives:
        - Red team exercises using Cobalt Strike with different watermarks
        - Security testing and penetration testing activities
        - Legitimate security tools with similar naming conventions
    level: high
query_type: sigma
severity: high
tactics:
    - TA0011
    - TA0005
    - TA0004
techniques:
    - T1071.001
    - T1055
