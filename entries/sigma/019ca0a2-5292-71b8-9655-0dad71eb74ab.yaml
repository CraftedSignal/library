id: 019ca0a2-5292-71b8-9655-0dad71eb74ab
name: Typhon Stealer Mutex Detection
description: Detects known mutexes associated with Typhon stealer activity. The rule specifically looks for the mutex name 'GOJJL2LPIZM04XC0NQ4I' in process creation events on Windows systems.
query: |-
    title: Typhon Stealer Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Typhon stealer activity.
    author: '@adhikara13'
    date: 2025/07/15
    references:
      - 'https://cyble.com/blog/phishing-site-used-to-spread-typhon-stealer/'
    tags:
      - 'attack.credential_access.t1555'
      - 'malware.stealer.typhon'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'GOJJL2LPIZM04XC0NQ4I'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0006
techniques:
    - T1555
tags:
    - attack.credential_access.t1555
    - malware.stealer.typhon
author: '@adhikara13'
version: "1"
references:
    - https://cyble.com/blog/phishing-site-used-to-spread-typhon-stealer/
data_sources:
    - process_creation
    - windows
