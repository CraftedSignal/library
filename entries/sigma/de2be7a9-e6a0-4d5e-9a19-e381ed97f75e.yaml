id: de2be7a9-e6a0-4d5e-9a19-e381ed97f75e
name: Havoc Remote Injector Execution
description: Detects the execution of a malicious conhost.exe variant used by Havoc to inject its payload into cmd.exe, as described by Fortinet. This variant is typically found in the 'drivers' directory and launched with specific command-line arguments.
query: |-
    title: Havoc Remote Injector Execution
    id: 2f1e2d3c-4a5b-6789-0123-456789abcdef
    description: Detects the execution of a malicious conhost.exe variant used by Havoc to inject its payload into cmd.exe, as described by Fortinet. This variant is typically found in the 'drivers' directory and launched with specific command-line arguments.
    author: Detections.ai
    date: 2025-06-24
    references:
        - https://www.fortinet.com/blog/threat-research/dissecting-a-malicious-havoc-sample
    logsource:
        category: process_creation
        product: windows
    detection:
        selection:
            Image|contains: '\drivers\conhost.exe' # Malicious conhost.exe is placed in the drivers directory
            CommandLine|contains|all:
                - '-f'
                - 'conhost.dll'
                - '--path'
                - 'cmd.exe'
                - '-ER'
                - '--ln'
        condition: selection
    falsepositives:
        - Legitimate conhost.exe is typically located in C:\Windows\System32 and does not use these specific command-line parameters or reside in the 'drivers' directory.
    level: high
    tags:
        - attack.execution
        - attack.t1059.003 # Command and Scripting Interpreter: Windows Command Shell
        - attack.t1055 # Process Injection (precursor activity)
        - attack.t1036.003 # Masquerading: Rename System Utility (or misplacing it)
        - attack.t1574.001 # Hijack Execution Flow: DLL Side-Loading (conhost.dll)
        - malware.havoc
query_type: sigma
severity: high
tactics:
