id: 019c6d04-c79c-727b-85be-aad28f700be1
name: GS7 RMM MSI Installer Execution
description: Detects the execution of msiexec.exe to install an MSI package with a naming convention characteristic of the GS7 threat actor. GS7 uses specific, automated naming conventions for their malicious RMM installers, such as 'em_[8 alphanumeric]_installer' or 'Win_[18-20 digits]_installer'.
query: |
    title: GS7 RMM MSI Installer Execution
    id: b052e470-38dd-42ea-b680-664051bfd36f
    status: experimental
    description: Detects the execution of msiexec.exe to install an MSI package with
      a naming convention characteristic of the GS7 threat actor. GS7 uses specific,
      automated naming conventions for their malicious RMM installers, such as
      'em_[8 alphanumeric]_installer' or 'Win_[18-20 digits]_installer'.
    author: detections.ai
    references:
      - https://socradar.io/wp-content/uploads/2026/02/Operation-DoppelBrand_-Weaponizing-Fortune-500-Brands-for-Credential-Theft-and-Remote-Access.pdf
    date: 2026-02-17
    tags:
      - attack.execution
      - attack.t1218.007
      - attack.t1204.002
      - attack.defense_evasion
      - attack.t1036.005
    logsource:
      category: process_creation
      product: windows
    detection:
      selection_msiexec:
        Image|endswith: '\msiexec.exe'
      filter_pattern_em:
        # Detects pattern like: em_a1b2c3d4_installer.msi
        CommandLine|contains: 'em_????????_installer'
      filter_pattern_win:
        # Detects pattern like: Win_1705410830192183500_installer.msi
        # This pattern is broader and may require tuning if legitimate installers match.
        CommandLine|contains|all:
          - 'Win_'
          - '_installer.msi'
      condition: selection_msiexec and (filter_pattern_em or filter_pattern_win)
    falsepositives:
      - Legitimate software installers that coincidentally match these specific
        naming patterns.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0002
    - TA0005
techniques:
    - T1218.007
    - T1204.002
    - T1036.005
