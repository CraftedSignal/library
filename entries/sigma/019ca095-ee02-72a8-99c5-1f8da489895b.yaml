id: 019ca095-ee02-72a8-99c5-1f8da489895b
name: BqtLock Ransomware Mutex Detection
description: The rule detects the creation of specific mutexes associated with BqtLock ransomware activity. It looks for the mutex name 'Global\{00A0B0C0-D0E0-F000-1000-200030004000\}' during process creation events on Windows systems.
query: |-
    title: BqtLock Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with BqtLock ransomware activity.
    author: '@adhikara13'
    date: 2024/12/19
    references:
      - 'https://app.any.run/tasks/1b84c310-4494-4125-a7f2-8b15ae7dc7a9/'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.bqtlock'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Global\{00A0B0C0-D0E0-F000-1000-200030004000}'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.bqtlock
author: '@adhikara13'
version: "1"
references:
    - https://app.any.run/tasks/1b84c310-4494-4125-a7f2-8b15ae7dc7a9/
data_sources:
    - process_creation
    - windows
