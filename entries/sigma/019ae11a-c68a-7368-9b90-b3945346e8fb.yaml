id: 019ae11a-c68a-7368-9b90-b3945346e8fb
name: ShadyPanda Malicious Chrome Extension ID
description: Detects the presence of malicious Google Chrome extension IDs associated with the ShadyPanda campaign. These extensions can act as a backdoor, enabling remote code execution and data exfiltration.
query: |
    title: ShadyPanda Malicious Chrome Extension ID
    id: 97ef7b0b-4ea2-4cd3-a64e-4dcfd5eddfb5
    status: experimental
    description: Detects the presence of malicious Google Chrome extension IDs
      associated with the ShadyPanda campaign. These extensions can act as a
      backdoor, enabling remote code execution and data exfiltration.
    references:
      - https://www.koi.ai/blog/4-million-browsers-infected-inside-shadypanda-7-year-malware-campaign
    author: detections.ai
    date: 2025-12-02
    tags:
      - attack.t1574.005
      - attack.defense_evasion
    logsource:
      category: file_event
      product: windows
    detection:
      # Detects the base path for Google Chrome extensions
      base_path:
        file.path|contains|all:
          - '\Google\Chrome\User Data\'
          - '\Extensions\'
      # List of malicious extension IDs provided in the report
      extension_ids:
        file.path|contains:
          - 'bpgaffohfacaamplbbojgbiicfgedmoi'
          - 'cdgonefipacceedbkflolomdegncceid'
