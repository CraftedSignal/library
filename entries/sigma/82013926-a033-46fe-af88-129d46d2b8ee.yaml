          - '45.61.134.36'
          - '107.170.35.225'
          - '185.156.73.73'
          - '185.215.113.209'
          - '185.215.113.75'

      selection_ioc_urls:
        Details|contains:
          - 'pivqmane.com/doc/fb.mp4'
          - 'pivqmane.com/testonload.mp4'
          - '185.215.113.16/test/amnew.exe'
          - '185.215.113.43/Zu7JuNko/index.php'

      selection_ioc_hashes:
