id: 82013926-a033-46fe-af88-129d46d2b8ee
name: Chaos Ransomware Activity Detection
description: Detects indicators and behaviors related to the Chaos ransomware group including command-line patterns, suspicious registry changes, and specific known IOCs.
query: |-
    title: Chaos Ransomware Activity Detection
    id: e51e47a2-34f4-4d62-8a68-0a7b1c102539
    status: experimental
    description: Detects indicators and behaviors related to the Chaos ransomware group including command-line patterns, suspicious registry changes, and specific known IOCs.
    references:
      - https://blog.talosintelligence.com/chaos-ransomware-2025
      - MITRE ATT&CK
    author: Chaitanya B
    date: 2025/07/27
    logsource:
      category: process_creation
      product: windows
    detection:
      selection_keywords:
        CommandLine|contains:
          - 'Encryptor.exe /lkey:'
          - 'net user '
          - 'vssadmin delete shadows /all'
          - 'ldapsearch'
          - 'reg add HKEY_LOCAL_MACHINE\\Software\\Microsoft\\Windows NT\\CurrentVersion\\Winlogon\\SpecialAccounts\\Userlist'
          - 'ScreenConnect'
          - 'Splashtop'
          - 'AnyDesk'
          - 'Syncro RMM'
          - 'wininit.exe copy'
          - 'wmic product where name='
          - 'powershell.exe -noexit -command Set-Location'

      selection_iocs_ip:
        CommandLine|contains:
          - '144.172.103.42'
          - '45.61.134.36'
          - '107.170.35.225'

      selection_iocs_hash:
        CommandLine|contains:
          - '7c4b465159e1c7dbbe67f0eeb3f58de1caba293999a49843a0818480f05be14e'
          - '11cfea4100ba3731d859148d2011c7225d337db22797f7e111c0f2876e986490'
