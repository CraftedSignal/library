id: 019d0ccd-b135-736b-bd1d-a4f79eff6cf9
name: Multiple GitHub Force Pushes to Tags Detected
description: |
    Detects a high volume of 'git push --force' events specifically targeting tags from a single user or to a single repository within a short timeframe.
    This is a strong indicator of a tag poisoning campaign, similar to the one used in the supply chain attack against the 'aquasecurity/trivy-action' repository where 75 tags were force-pushed to point to malicious code.
query: |
    title: Multiple GitHub Force Pushes to Tags Detected
    id: 5f612a04-d1c0-4219-bb56-eff88b83b4b0
    status: experimental
    description: |
      Detects a high volume of 'git push --force' events specifically targeting tags from a single user or to a single repository within a short timeframe.
      This is a strong indicator of a tag poisoning campaign, similar to the one used in the supply chain attack against the 'aquasecurity/trivy-action' repository where 75 tags were force-pushed to point to malicious code.
    author: detections.ai
    references:
      - https://thehackernews.com/2026/03/trivy-security-scanner-github-actions.html
    date: 2026-03-20
    tags:
      - attack.defense_evasion
      - attack.t1554
      - attack.t1078
    logsource:
      product: github
      category: audit
    detection:
      selection:
        # Corresponds to a push operation in the audit log
        action: 'git.push'
        # This field is true when a force push (--force) is used
        data.push.force: true
        # This filters for pushes that target a tag reference
        data.push.ref|startswith: 'refs/tags/'
      # The timeframe over which the events are aggregated
      timeframe: 1h
      # The condition triggers if 10 or more force pushes to tags are seen from the same actor OR to the same repository
      condition: selection | count() by actor >= 10 or selection | count() by repo >= 10
    falsepositives:
      - Highly unlikely, but could be triggered by a major, automated repository
        refactoring that involves re-tagging.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0001
    - TA0005
    - TA0003
    - TA0004
techniques:
