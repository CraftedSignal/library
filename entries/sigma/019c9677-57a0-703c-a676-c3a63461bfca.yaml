id: 019c9677-57a0-703c-a676-c3a63461bfca
name: OpenClaw Workspace Data Packaged For Exfiltration
description: Detects archiving of OpenClaw workspace data which may contain plaintext conversations and secrets, consistent with collection and staging for exfiltration.
query: |
    title: OpenClaw Workspace Data Packaged For Exfiltration
    id: 7a6b5c4d-3e2f-4a1b-9c8d-7e6f5a4b3c55
    status: experimental
    description: >-
      Detects archiving of OpenClaw workspace data which may contain plaintext
      conversations and secrets, consistent with collection and staging for
      exfiltration.
    author: Daniel Jeremiah
    date: 2026-02-25T00:00:00.000Z
    references:
      - >-
        https://www.catonetworks.com/blog/cato-ctrl-when-openclaw-ai-personal-assistant-becomes-backdoor/
    tags:
      - attack.collection
      - attack.t1560
      - attack.exfiltration
    logsource:
      product: linux
      category: process_creation
      service: audit
    detection:
      selection_archive:
        Image|endswith:
          - /tar
          - /zip
          - /7z
      selection_args:
        CommandLine|contains:
          - /.openclaw/workspace/
      condition: selection_archive and selection_args
    falsepositives:
      - Legitimate backups of user home directories
    level: medium
query_type: sigma
severity: medium
tactics:
    - TA0009
    - TA0010
techniques:
    - T1560
tags:
    - attack.collection
    - attack.t1560
    - attack.exfiltration
author: Daniel Jeremiah
version: "2"
references:
    - https://www.catonetworks.com/blog/cato-ctrl-when-openclaw-ai-personal-assistant-becomes-backdoor/
data_sources:
    - process_creation
    - linux
    - audit
