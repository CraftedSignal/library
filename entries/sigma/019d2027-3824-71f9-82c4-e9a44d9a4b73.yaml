id: 019d2027-3824-71f9-82c4-e9a44d9a4b73
name: Silver Fox Python WhatsApp Stealer File Creation
description: Detects the creation of specific file artifacts (WhatsAppData.zip, whatsapp_backup.lock) associated with a Python-based WhatsApp stealer deployed by the Silver Fox (Void Arachne) intrusion set. This malware is designed to collect credentials and host data.
query: |
    title: Silver Fox Python WhatsApp Stealer File Creation
    id: 297c7882-a4c5-4859-b312-d0611c68254b
    status: experimental
    description: Detects the creation of specific file artifacts (WhatsAppData.zip,
      whatsapp_backup.lock) associated with a Python-based WhatsApp stealer deployed
      by the Silver Fox (Void Arachne) intrusion set. This malware is designed to
      collect credentials and host data.
    author: detections.ai
    references:
      - https://blog.sekoia.io/silver-fox-the-only-tax-audit-where-the-fine-print-installs-malware/
    date: 2026-03-24
    tags:
      - attack.collection
      - attack.t1005
      - attack.t1560.001
    logsource:
      category: file_event
      product: windows
    detection:
      # Detects specific archive and lock files dropped by the Python stealer mimicking WhatsApp
      selection:
        TargetFilename|endswith:
          - '\WhatsAppBackup\WhatsAppData.zip'
          - '\whatsapp_backup.lock'
      condition: selection
    falsepositives:
      - Legitimate third-party WhatsApp backup or migration utilities might use
        similar temporary lock files or archive names. If false positives occur,
        consider filtering by trusted processes (e.g., known backup software
        executables) or correlating with unusual network connections to unknown IP
        addresses.
    level: high
query_type: sigma
severity: high
