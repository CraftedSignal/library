name: Hannibal Stealer Activity
description: Detects activity associated with the Hannibal Stealer, a .NET info-stealer known for targeting cryptocurrency wallets, VPN configurations, and browser data.
query: "title: Hannibal Stealer Activity\r\nid: ab8d941c-d385-45cb-80b5-19a72c571077\r\nstatus: experimental\r\ndescription: >-\r\n  Detects activity associated with the Hannibal Stealer, a .NET info-stealer\r\n  known for targeting cryptocurrency wallets, VPN configurations, and browser\r\n  data.\r\nreferences:\r\n  - >-\r\n    https://medium.com/@shubhandrew/analysis-of-hannibal-stealer-newer-version-of-sharp-stealer-155f0d6b093e\r\nauthor: Subhankar H.\r\ndate: 2025-11-21T00:00:00.000Z\r\ntags:\r\n  - attack.credential_access\r\n  - attack.collection\r\n  - attack.exfiltration\r\n  - attack.t1555\r\n  - attack.t1560\r\n  - attack.t1056.001\r\nlogsource:\r\n  product: windows\r\n  category: network_connection\r\ndetection:\r\n  c2_connection:\r\n    category: network_connection\r\n    DestinationIp: 45.61.141.160\r\n    DestinationPort: 8001\r\n  file_staging:\r\n    category: file_creation\r\n    TargetFilename|contains:\r\n      - \\Wallets\\Armory\\\r\n      - \\Wallets\\AtomicWallet\\\r\n      - \\Wallets\\Bytecoin\\\r\n      - \\Wallets\\Electrum\\\r\n      - \\Wallets\\Ethereum\\\r\n      - \\VPN\\CyberGhost\\\r\n      - \\VPN\\ExpressVPN\\\r\n      - \\VPN\\NordVPN\\\r\n  firefox_dll_hijack:\r\n    category: image_load\r\n    ImageLoaded|endswith:\r\n      - \\mozglue.dll\r\n      - \\nss3.dll\r\n  filter_legit_process:\r\n    Image|endswith:\r\n      - \\firefox.exe\r\n      - \\thunderbird.exe\r\n  condition: >-\r\n    c2_connection or file_staging or (firefox_dll_hijack and not\r\n    filter_legit_process)\r\nfalsepositives:\r\n  - The network detection is high-fidelity based on the C2 IOC.\r\n  - The file staging detection may trigger on legitimate backup software, but\r\n    the specific paths are characteristic of this stealer.\r\n  - The Firefox DLL load detection may trigger on other legitimate applications\r\n    that integrate Mozilla components; tuning by excluding legitimate processes\r\n    may be required.\r\nlevel: high\r\n"
