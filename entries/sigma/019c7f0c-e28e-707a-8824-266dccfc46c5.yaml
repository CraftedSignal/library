id: 019c7f0c-e28e-707a-8824-266dccfc46c5
name: PowerShell ExecutionPolicy Unrestricted With Stdin Command Execution
description: Detects PowerShell launched with ExecutionPolicy Unrestricted and stdin command execution (-Command -), matching behavior described in fake Windows 11 installer campaign.
query: |-
    title: PowerShell ExecutionPolicy Unrestricted With Stdin Command Execution
    id: 9b4b8f1d-8a6a-4f4f-b9e7-8a0d7d4a5c2b
    status: experimental
    description: Detects PowerShell launched with ExecutionPolicy Unrestricted and stdin command execution (-Command -), matching behavior described in fake Windows 11 installer campaign.
    author: Daniel Jeremiah
    date: 2026-02-21
    references:
      - https://www.malwarebytes.com/blog/scams/2026/02/facebook-ads-spread-fake-windows-11-downloads-that-steal-passwords-and-crypto-wallets
    logsource:
      product: windows
      category: process_creation
    detection:
      selection:
        Image|endswith: '\powershell.exe'
        CommandLine|contains|all:
          - '-ExecutionPolicy Unrestricted'
          - '-Command -'
          - '-InputFormat Text'
      condition: selection
    falsepositives:
      - 'Rare: administrators intentionally running PowerShell with Unrestricted policy and stdin'
    level: high
    tags:
      - attack.execution
      - attack.t1059.001
      - attack.defense_evasion
      - attack.t1562.001
query_type: sigma
severity: medium
tactics:
    - TA0002
    - TA0005
    - TA0003
    - TA0004
techniques:
    - T1059.001
    - T1562.001
    - T1547
author: Daniel Jeremiah
version: "3"
references:
    - https://www.malwarebytes.com/blog/scams/2026/02/facebook-ads-spread-fake-windows-11-downloads-that-steal-passwords-and-crypto-wallets
