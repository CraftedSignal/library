id: 019c4d9b-454f-73ee-957d-a6c1cde8eba4
name: Shadow Campaigns Diaoyu Loader Process
description: This rule detects the execution of processes with command lines containing specific strings associated with the Diaoyu loader, a component of the Shadow Campaigns espionage activity. The rule looks for the presence of 'pic1.png', 'padeqav', 'admin-bar-sprite', or 'DiaoYu' within the command line arguments of newly created processes. This activity is linked to Unit 42 TGR-STA-1030.
query: |
    title: Shadow Campaigns Diaoyu Loader Process
    id: c2d3e4f5-a6b7-4c6d-0e1f-shadow001
    status: experimental
    description: |
        Diaoyu loader execution: command line contains pic1.png, padeqav, admin-bar-sprite, or DiaoYu. Unit 42 TGR-STA-1030.
    references:
        - https://unit42.paloaltonetworks.com/shadow-campaigns-uncovering-global-espionage/
    author: Daniel Jeremiah
    date: 2026/02/11
    tags:
        - attack.execution
        - attack.t1059
    logsource:
        category: process_creation
        product: windows
    detection:
        selection_cmd:
            CommandLine|contains|any:
                - 'pic1.png'
                - 'padeqav'
                - 'admin-bar-sprite'
                - 'DiaoYu'
        condition: selection_cmd
    falsepositives:
        - Legitimate dev/debug referencing same strings
    level: high
query_type: sigma
severity: high
tactics:
    - TA0002
techniques:
    - T1059
tags:
    - attack.execution
    - attack.t1059
author: Daniel Jeremiah
version: "2"
references:
    - https://unit42.paloaltonetworks.com/shadow-campaigns-uncovering-global-espionage/
data_sources:
    - process_creation
    - windows
