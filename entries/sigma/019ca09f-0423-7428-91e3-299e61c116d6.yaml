id: 019ca09f-0423-7428-91e3-299e61c116d6
name: PureRAT Mutex Detection
description: This rule detects the creation of specific mutexes known to be associated with PureRAT malware activity. The detection is based on the presence of the mutex name '6ad742cc0dd3'. The rule leverages process creation logs to identify these mutexes, indicating potential PureRAT command and control or other malicious operations.
query: |-
    title: PureRAT Mutex Detection
    status: experimental
    description: Detects known mutexes associated with PureRAT activity.
    author: '@adhikara13'
    date: 2025/07/22
    references:
      - 'https://www.esentire.com/blog/ghost-crypt-powers-purerat-with-hypnosis'
    tags:
      - 'attack.command_and_control.t1219'
      - 'malware.rat.purerat'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '6ad742cc0dd3'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0011
techniques:
    - T1219
tags:
    - attack.command_and_control.t1219
    - malware.rat.purerat
author: '@adhikara13'
version: "1"
references:
    - https://www.esentire.com/blog/ghost-crypt-powers-purerat-with-hypnosis
data_sources:
    - process_creation
    - windows
