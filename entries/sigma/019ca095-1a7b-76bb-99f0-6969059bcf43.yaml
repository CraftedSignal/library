id: 019ca095-1a7b-76bb-99f0-6969059bcf43
name: Black Basta Ransomware Mutex Detection
description: This rule detects the creation of specific mutexes known to be associated with Black Basta ransomware. The rule looks for process creation events where the MutexName field matches either 'dsajdhas.0' or 'ofijweiuhuewhcsaxs.mutex'. The detection is based on unique mutex names identified in Black Basta ransomware activity, making false positives unlikely for these specific strings.
query: |-
    title: Black Basta Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Black Basta ransomware activity.
    author: '@adhikara13'
    date: 2025/07/12
    references:
      - 'https://unit42.paloaltonetworks.com/threat-assessment-black-basta-ransomware/'
      - 'https://www.zscaler.com/blogs/security-research/back-black-basta'
      - 'https://www.deepinstinct.com/blog/black-basta-ransomware-threat-emergence'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.black_basta'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'dsajdhas.0'
          - 'ofijweiuhuewhcsaxs.mutex'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.black_basta
author: '@adhikara13'
version: "1"
references:
    - https://unit42.paloaltonetworks.com/threat-assessment-black-basta-ransomware/
    - https://www.zscaler.com/blogs/security-research/back-black-basta
    - https://www.deepinstinct.com/blog/black-basta-ransomware-threat-emergence
data_sources:
