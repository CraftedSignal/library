id: 019ca0a1-9e29-7278-b0b5-12d6a9e386b6
name: Surtr Ransomware Mutex Detection
description: The rule detects the creation of specific mutexes associated with Surtr ransomware. It looks for a mutex named 'SurtrMUTEX'. The detection is based on process creation events on Windows systems.
query: |-
    title: Surtr Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Surtr ransomware activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://www.trendmicro.com/vinfo/us/threat-encyclopedia/malware/ransom.win64.surtr.a'
      - 'https://areteir.com/article/surtr-ransomware-pays-tribute-to-revil/'
      - 'https://malgamy.github.io/malware-analysis/YARA_Surtr_Ransomware/'
      - 'https://www.piolink.com/_dev/data/file/security/ckm921ke7j3wzr8.pdf'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.surtr'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'SurtrMUTEX'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.surtr
author: '@adhikara13'
version: "1"
references:
    - https://www.trendmicro.com/vinfo/us/threat-encyclopedia/malware/ransom.win64.surtr.a
    - https://areteir.com/article/surtr-ransomware-pays-tribute-to-revil/
    - https://malgamy.github.io/malware-analysis/YARA_Surtr_Ransomware/
    - https://www.piolink.com/_dev/data/file/security/ckm921ke7j3wzr8.pdf
data_sources:
    - process_creation
    - windows
