id: 019c1d40-e0b7-775d-9000-6ddd03e8d460
name: eScan Antivirus Update Server Hijacking via Hosts File
description: |
    Detects modification of the Windows hosts file to redirect eScan antivirus   update servers (e.g., update1.mwti.net) to the non-routable IP address 2.3.4.0. This behavior prevents antivirus updates and is indicative of defense evasion or supply-chain related tampering.
query: "title: eScan Antivirus Update Server Hijacking via Hosts File\r\nid: f2a9d6c4-7b31-4a9f-8c3e-1e9b7a2c4d11\r\nstatus: experimental\r\ndescription: >\r\n  Detects modification of the Windows hosts file to redirect eScan antivirus   update servers (e.g., update1.mwti.net) to the non-routable IP address 2.3.4.0. This behavior prevents antivirus updates and is indicative of defense evasion or supply-chain related tampering.\r\nauthor: Thaung Htet\r\ndate: 2026-02-02\r\nreferences:\r\n  - https://securelist.com/escan-supply-chain-attack/118688/\r\n  - https://www.securityweek.com/escan-antivirus-delivers-malware-in-supply-chain-attack/\r\n  - https://www.morphisec.com/blog/critical-escan-threat-bulletin/\r\n  - https://www.infosecurity-magazine.com/news/escan-antivirus-breach-delivers/\r\ntags:\r\n  - attack.defense_evasion\r\n  - attack.t1562.001\r\nlogsource:\r\n  product: windows\r\n  category: file_event\r\ndetection:\r\n  hosts_file:\r\n    TargetFilename|endswith:\r\n      - '\\Windows\\System32\\drivers\\etc\\hosts'\r\n  escan_update_domains:\r\n    FileContent|contains:\r\n      - 'update1.mwti.net'\r\n      - 'update2.mwti.net'\r\n      - 'update.mwti.net'\r\n      - 'mwti.net'\r\n  redirect_ip:\r\n    FileContent|contains:\r\n      - '2.3.4.0'\r\n  condition: hosts_file and escan_update_domains and redirect_ip\r\nfalsepositives:\r\n  - Rare; manual hosts file modifications during testing\r\n  - Malware analysis labs using sinkhole IPs\r\nlevel: high"
