id: 0199f2b6-a6bc-7329-becf-6a370ae6c1fa
name: Suspicious Child Process Spawned by npm
description: Detects the Node Package Manager (npm) or npx spawning child processes commonly used to download remote files. This behavior is often seen in malicious npm packages that use post-install scripts to fetch and execute second-stage payloads, as seen with the AdaptixC2 framework delivery.
query: |
    title: Suspicious Child Process Spawned by npm
    id: a26badfc-41d9-4238-b3ba-ebee0d001889
    status: experimental
    description: Detects the Node Package Manager (npm) or npx spawning child
      processes commonly used to download remote files. This behavior is often seen
      in malicious npm packages that use post-install scripts to fetch and execute
      second-stage payloads, as seen with the AdaptixC2 framework delivery.
    references:
      - https://securelist.com/adaptixc2-agent-found-in-an-npm-package/117784/
    author: detections.ai
    date: 2025-10-17
    tags:
      - attack.execution
      - attack.t1059
      - attack.t1547
      - attack.t1105
      - attack.t1195.002
    logsource:
      category: process_creation
      product:
        - windows
        - linux
        - macos
    detection:
      # Parent process is npm or npx
      parent_process:
        ParentImage|endswith:
          - '\npm.exe'
          - '\npx.exe'
          - '/npm'
          - '/npx'
        # Child process is a common command-line downloader
      child_downloader:
        Image|endswith:
          - '\curl.exe'
          - '\wget.exe'
          - '/curl'
          - '/wget'
        # Child process is PowerShell performing a download
      child_ps_download:
        Image|endswith:
          - '\powershell.exe'
          - '\pwsh.exe'
        CommandLine|contains:
          - 'DownloadFile'
          - 'DownloadString'
          - 'Invoke-WebRequest'
          - 'iwr'
          - 'System.Net.WebClient'
        # Child process is certutil performing a download
      child_certutil_download:
        Image|endswith: '\certutil.exe'
        CommandLine|contains|all:
          - '-urlcache'
          - '-f'
        # Child process is bitsadmin performing a download
      child_bitsadmin_download:
        Image|endswith: '\bitsadmin.exe'
        CommandLine|contains: '/transfer'
        # The condition combines the parent process with any of the suspicious child processes
      condition: parent_process and 1 of child_*
    falsepositives:
      - Some legitimate npm packages may download required binaries or dependencies
        during installation (e.g., puppeteer downloading Chromium, or node-sass
        downloading binaries). Tuning may be required to exclude known safe
        packages, download sources, or specific command lines.
    level: high
query_type: sigma
severity: medium
tactics:
    - TA0002
    - TA0011
    - TA0001
techniques:
    - T1059
    - T1105
    - T1195.002
author: detections.ai
version: "2"
references:
    - https://securelist.com/adaptixc2-agent-found-in-an-npm-package/117784/
