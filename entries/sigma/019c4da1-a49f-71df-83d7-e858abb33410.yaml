id: 019c4da1-a49f-71df-83d7-e858abb33410
name: Script Host Launched by Run Dialog or Browser (ClickFix Technique)
description: This rule detects the execution of script hosts (PowerShell, wscript, cscript) that are launched by either the Windows Run dialog (rundll32, dllhost) or common web browsers (Chrome, Microsoft Edge, Firefox). The script host execution is further narrowed down by looking for command-line arguments indicative of script execution, such as encoded commands or invocation of functions like 'Invoke-' or 'IEX('. This pattern is often associated with the 'ClickFix' social engineering technique where users are tricked into pasting malicious commands into the Run dialog or clicking links that trigger script execution from a browser.
query: |
    title: ClickFix Run Dialog or Browser Spawning Script Host
    id: c8d9e0f1-a2b3-4c2d-6475-clickfix02
    status: experimental
    description: |
        Script (PowerShell, wscript, cscript) launched by Run (rundll32/dllhost as parent) or by browser (chrome/msedge/firefox). Common when user pastes ClickFix instructions into Run or follows link.
    references:
        - https://www.microsoft.com/en-us/security/blog/2025/08/21/think-before-you-clickfix-analyzing-the-clickfix-social-engineering-technique/
    author: Daniel Jeremiah
    date: 2026/02/11
    tags:
        - attack.t1059
        - attack.t1204
    logsource:
        category: process_creation
        product: windows
    detection:
        selection_child:
            Image|endswith|any:
                - '\powershell.exe'
                - '\pwsh.exe'
                - '\wscript.exe'
                - '\cscript.exe'
            CommandLine|contains|any:
                - '-EncodedCommand'
                - '-Enc'
                - 'Invoke-'
                - 'IEX('
        selection_parent:
            ParentImage|endswith|any:
                - '\rundll32.exe'
                - '\dllhost.exe'
                - '\chrome.exe'
                - '\msedge.exe'
                - '\firefox.exe'
        condition: selection_child and selection_parent
    falsepositives:
        - Legitimate automation or support scripts launched from browser
    level: medium
query_type: sigma
severity: medium
tactics:
    - TA0002
techniques:
    - T1059
    - T1204
tags:
