id: 019ca097-aeff-7159-b727-20ce0db308be
name: Cyst Loader Mutex Detection
description: Detects known mutexes associated with Cyst loader activity. The rule specifically looks for mutex names matching the pattern 'syst' followed by exactly 10 digits.
query: |-
    title: Cyst Loader Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Cyst loader activity.
    author: '@adhikara13'
    date: 2024/07/19
    references:
      - 'https://www.proofpoint.com/us/threat-insight/post/microsoft-word-intruder-integrates-cve-2017-0199-utilized-cobalt-group-target'
    tags:
      - 'attack.execution.t1204'
      - 'malware.loader.cyst'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'syst<10 digits>'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0002
techniques:
    - T1204
tags:
    - attack.execution.t1204
    - malware.loader.cyst
author: '@adhikara13'
version: "1"
references:
