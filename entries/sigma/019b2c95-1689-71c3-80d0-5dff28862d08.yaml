id: 019b2c95-1689-71c3-80d0-5dff28862d08
name: ESXi vCenter Management Disabled by RansomHouse MrAgent
description: Detects the execution of the command to stop the vCenter remote management service (vpxa) on an ESXi host. This is a technique used by the RansomHouse MrAgent tool to inhibit system recovery and impair defenses before deploying the Mario encryptor.
query: |
    title: ESXi vCenter Management Disabled by RansomHouse MrAgent
    id: af1ad23e-464e-44df-9f56-59f9d829b609
    status: experimental
    description: Detects the execution of the command to stop the vCenter remote
      management service (vpxa) on an ESXi host. This is a technique used by the
      RansomHouse MrAgent tool to inhibit system recovery and impair defenses before
      deploying the Mario encryptor.
    references:
      - https://unit42.paloaltonetworks.com/ransomhouse-encryption-upgrade/
    author: detections.ai
    date: 2025-12-17
    tags:
      - attack.impact
      - attack.defense_evasion
      - attack.t1490
      - attack.t1562.001
    logsource:
      category: process_creation
      product: linux
    detection:
      selection:
        # Detects the command used to stop the vCenter agent service on an ESXi host
        CommandLine|contains|all:
          - '/etc/init.d/vpxa'
          - 'stop'
      condition: selection
    falsepositives:
      - Legitimate administrative activity.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0040
    - TA0005
techniques:
    - T1490
    - T1562.001
