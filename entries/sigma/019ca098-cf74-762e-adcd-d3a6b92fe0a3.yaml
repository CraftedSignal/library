id: 019ca098-cf74-762e-adcd-d3a6b92fe0a3
name: DragonForce Ransomware Mutex Detection
description: This rule detects the creation of specific mutex names associated with DragonForce ransomware. The detection is triggered when a process creates a mutex named 'dragonforce_encrypted_system'. This activity is indicative of the DragonForce ransomware encrypting a system, as mutexes are often used by malware to ensure only one instance is running or to signal certain operational states.
query: |-
    title: DragonForce Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with DragonForce ransomware activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://www.group-ib.com/blog/dragonforce-ransomware/'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.dragonforce'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'dragonforce_encrypted_system'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.dragonforce
author: '@adhikara13'
version: "1"
references:
    - https://www.group-ib.com/blog/dragonforce-ransomware/
data_sources:
    - process_creation
    - windows
