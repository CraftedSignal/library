id: 019d2fa1-cd93-713a-a6d9-1deb67acf123
name: BRUSHWORM Misspelled Photoes Directory File Creation
description: Detects the creation or modification of files within the misspelled 'Photoes' directory (e.g., \ProgramData\Photoes\). This directory is utilized by the BRUSHWORM backdoor for its main installation and by the BRUSHLOGGER keylogger for storing keystroke log files.
query: |
    title: BRUSHWORM Misspelled Photoes Directory File Creation
    id: e62b9da6-964c-4eee-8429-e4a9154d52fc
    status: experimental
    description: Detects the creation or modification of files within the misspelled
      'Photoes' directory (e.g., \ProgramData\Photoes\). This directory is utilized
      by the BRUSHWORM backdoor for its main installation and by the BRUSHLOGGER
      keylogger for storing keystroke log files.
    author: detections.ai
    references:
      - https://www.elastic.co/security-labs/brushworm-targets-financial-services
    date: 2026-03-27
    tags:
      - attack.persistence
      - attack.defense-evasion
      - attack.t1036.005
    logsource:
      category: file_event
      product: windows
    detection:
      selection:
        # Matches the misspelled 'Photoes' directory used for malware installation and keystroke logging
        TargetFilename|contains: '\ProgramData\Photoes\'
      condition: selection
    falsepositives:
      - Highly unlikely, though possible if a user manually creates a directory with
        this specific misspelling in ProgramData.
    level: high
query_type: sigma
severity: high
