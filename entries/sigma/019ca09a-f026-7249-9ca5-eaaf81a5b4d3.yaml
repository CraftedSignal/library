id: 019ca09a-f026-7249-9ca5-eaaf81a5b4d3
name: Hermes Ransomware Mutex Detection
description: The rule detects the creation of specific mutexes ('tech') that are known to be associated with Hermes ransomware activity. This detection is based on monitoring process creation events for these mutex names.
query: |-
    title: Hermes Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Hermes ransomware activity.
    author: '@adhikara13'
    date: 2024/08/01
    references:
      - 'https://www.malwarebytes.com/blog/news/2018/03/hermes-ransomware-distributed-to-south-koreans-via-recent-flash-zero-day'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.hermes'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'tech'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.hermes
author: '@adhikara13'
version: "1"
references:
    - https://www.malwarebytes.com/blog/news/2018/03/hermes-ransomware-distributed-to-south-koreans-via-recent-flash-zero-day
data_sources:
    - process_creation
    - windows
