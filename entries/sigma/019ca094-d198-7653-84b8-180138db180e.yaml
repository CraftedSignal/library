id: 019ca094-d198-7653-84b8-180138db180e
name: BBTok Loader Mutex Detection
description: Detects known mutexes associated with BBTok loader activity. The rule specifically looks for the mutex names 'TiiSbtvhvbCMW' and 'KOKKIIKKKOOOO' during process creation events on Windows systems.
query: |-
    title: BBTok Loader Mutex Detection
    status: experimental
    description: Detects known mutexes associated with BBTok loader activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://www.gdatasoftware.com/blog/2024/09/38039-bbtok-deobfuscating-net-loader'
    tags:
      - 'attack.execution.t1204'
      - 'malware.loader.bbtok'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'TiiSbtvhvbCMW'
          - 'KOKKIIKKKOOOO'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0002
techniques:
    - T1204
tags:
    - attack.execution.t1204
    - malware.loader.bbtok
author: '@adhikara13'
version: "1"
references:
    - https://www.gdatasoftware.com/blog/2024/09/38039-bbtok-deobfuscating-net-loader
data_sources:
    - process_creation
    - windows
