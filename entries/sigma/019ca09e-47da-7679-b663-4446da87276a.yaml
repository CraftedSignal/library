id: 019ca09e-47da-7679-b663-4446da87276a
name: PegasusRAT Mutex Detection
description: The rule detects the creation of a process that utilizes a mutex named 'PEGASUS'. This specific mutex name is associated with PegasusRAT, a type of Remote Access Trojan (RAT). The detection logic is based on the presence of this mutex name, indicating potential PegasusRAT activity on a Windows system.
query: |-
    title: PegasusRAT Mutex Detection
    status: experimental
    description: Detects known mutexes associated with PegasusRAT activity.
    author: '@adhikara13'
    date: 2024/12/19
    references:
      - 'https://github.com/GuinnessShep/pegasusrat/blob/dbfdde88b23bca59d1d490149359c42bf019013b/Pegasus%20Hvnc%20V2/Pantheon%20V2/Program.cs#L29'
    tags:
      - 'attack.command_and_control.t1219'
      - 'malware.rat.pegasusrat'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'PEGASUS'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0011
techniques:
    - T1219
tags:
    - attack.command_and_control.t1219
    - malware.rat.pegasusrat
author: '@adhikara13'
version: "1"
references:
    - https://github.com/GuinnessShep/pegasusrat/blob/dbfdde88b23bca59d1d490149359c42bf019013b/Pegasus%20Hvnc%20V2/Pantheon%20V2/Program.cs#L29
data_sources:
    - process_creation
    - windows
