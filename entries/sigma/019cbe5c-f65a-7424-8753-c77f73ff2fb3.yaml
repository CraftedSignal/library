id: 019cbe5c-f65a-7424-8753-c77f73ff2fb3
name: Rclone Data Exfiltration to Wasabi Cloud Storage
description: Detects the use of Rclone to exfiltrate data to a Wasabi cloud storage bucket. This technique was observed being used by the Iranian APT group Seedworm.
query: |
    title: Rclone Data Exfiltration to Wasabi Cloud Storage
    id: 8126e805-8b29-4b3e-9ec1-82c073ef799c
    status: experimental
    description: Detects the use of Rclone to exfiltrate data to a Wasabi cloud
      storage bucket. This technique was observed being used by the Iranian APT
      group Seedworm.
    author: detections.ai
    references:
      - https://www.security.com/threat-intelligence/iran-cyber-threat-activity-us
    date: 2026-03-05
    tags:
      - attack.exfiltration
      - attack.t1567.002
      - attack.g0069
    logsource:
      category: process_creation
      product: windows
    detection:
      selection_img:
        # Detects the rclone process
        - Image|endswith: '\rclone.exe'
        - OriginalFileName: 'rclone.exe'
      selection_cli:
        CommandLine|contains|all:
          - 'copy' # Rclone command for copying data
          - 'wasabi:' # Specific cloud provider destination mentioned in the report
      condition: 1 of selection_img and selection_cli
    falsepositives:
      - Rclone is a legitimate tool often used by system administrators for cloud
        data management. Legitimate use of Rclone to back up data to Wasabi will
        trigger this rule. Consider tuning by filtering for specific users, hosts,
        or unusual parent processes.
    level: medium
query_type: sigma
severity: medium
tactics:
    - TA0010
techniques:
    - T1567.002
tags:
    - attack.exfiltration
    - attack.t1567.002
    - attack.g0069
