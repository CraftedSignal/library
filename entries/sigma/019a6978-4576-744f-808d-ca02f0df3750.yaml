name: Cl0p Oracle EBS Exploit Hashes
description: Detects files associated with the Cl0p ransomware group's exploitation of the Oracle E-Business Suite vulnerability (CVE-2025-61882).
query: |
    title: Cl0p Oracle EBS Exploit Hashes
    id: 1853d0a9-41d0-472f-8ba4-d012bc4a0b7b
    status: experimental
    description: Detects files associated with the Cl0p ransomware group's
      exploitation of the Oracle E-Business Suite vulnerability (CVE-2025-61882).
    references:
      - https://theravenfile.com/2025/11/04/clop-ransomware-dissecting-network/
    author: detections.ai, Georg Lauenstein
    date: 2025-11-09
    tags:
      - attack.exploitation_for_client_access
      - attack.t1203
      - cve.2025.61882
      - detection.emerging_threats
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        # Hashes associated with Oracle EBS exploit tools used by Cl0p
        Hashes|contains:
          - 'SHA256=7b6bd5e04e367a2334c445d51efece97e4c614e88dffb4772b104cabf31235d'
          - 'SHA256=aa0d5859d633b62bccffb0690f7d35ba8979a3be5f3b5a4b69f60d60c75d4ff21'
          - 'SHA256=6f1f538e4a8e3493ddb6f49fcdc9c614bdd14f3e2f78aa44f0143b3f34b852c1b'
      condition: selection
    falsepositives:
      - Unlikely, as the detection is based on specific file hashes. A hash
        collision is theoretically possible but highly improbable.
    level: critical
