id: 019c0889-2dae-75f0-802e-ded7adf9f590
name: Visual Studio Code Spawning Web-to-Node Execution
description: |
    Detects instances where Visual Studio Code spawns a shell process to download a remote script via tools like 'curl' or 'wget' and pipe it directly into the Node.js runtime. This technique has been observed in the "Contagious Interview" campaign, where threat actors abuse VS Code's 'tasks.json' to execute malicious payloads in memory.
query: |
    title: Visual Studio Code Spawning Web-to-Node Execution
    id: b5965931-b3a7-4d87-867f-395c48dbe7b8
    status: experimental
    description: |
      Detects instances where Visual Studio Code spawns a shell process to download a remote script via tools like 'curl' or 'wget' and pipe it directly into the Node.js runtime. This technique has been observed in the "Contagious Interview" campaign, where threat actors abuse VS Code's 'tasks.json' to execute malicious payloads in memory.
    references:
      - https://www.jamf.com/blog/threat-actors-expand-abuse-of-visual-studio-code/
    author: detections.ai, Swachchhanda Shrawan Poudel
    date: 2026-01-29
    tags:
      - attack.execution
      - attack.t1059.007
      - attack.t1204.002
      - attack.t1588.006
    logsource:
      category: process_creation
      product: windows
    detection:
      selection_img:
        ParentImage|endswith: '\Code.exe'
      selection_cli:
        CommandLine|contains:
          - 'curl'
          - 'wget'
        CommandLine|contains|all:
          - '|'
          - 'node'
      condition: all of selection_*
    falsepositives:
      - Legitimate developer scripts or build processes might use this technique,
        although it is uncommon. Review the executed script's origin and purpose to
        determine legitimacy.
    level: high
