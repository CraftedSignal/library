id: 019c8d37-7ef5-70e8-95b2-576e166fc15d
name: Linux Content Injection Leading to Process Execution
description: Detects successful content injection leading to process execution
query: |-
    title: Linux Content Injection Leading to Process Execution
    id: b2c3d4e5-1659-4cde-b234-567890123456
    status: experimental
    description: Detects successful content injection leading to process execution
    references:
      - https://attack.mitre.org/techniques/T1659/
    author: zendannyy
    date: 2026-02-21
    tags:
      - attack.initial-access
      - attack.t1659
    logsource:
      product: linux
      category: process_creation
      service: apache
    detection:
      selection_web_processes:
        ParentImage|endswith:
          - /apache2
          - /nginx
          - /httpd
          - /lighttpd
      selection_suspicious_commands:
        Image|endswith:
          - /bash
          - /sh
          - /python
          - /perl
        CommandLine|contains:
          - curl
          - nc -
          - /dev/tcp/
          - wget
      condition: selection_web_processes and selection_suspicious_commands
    falsepositives:
      - Legitimate web application scripts
    level: high
query_type: sigma
severity: medium
tactics:
    - TA0001
    - TA0011
    - TA0002
techniques:
    - T1659
    - T1105
tags:
    - attack.initial-access
    - attack.t1659
author: zendannyy
version: "1"
references:
    - https://attack.mitre.org/techniques/T1659/
data_sources:
    - process_creation
    - linux
    - apache
