id: 019ca09c-b6f0-7690-8e42-4ee5ef4d1ec5
name: MasonRAT Mutex Detection
description: The rule detects the creation of specific mutex names ('rmldKj40qW2UTlEe') which are known to be associated with MasonRAT activity. This indicates the presence and execution of the MasonRAT malware on a system.
query: |-
    title: MasonRAT Mutex Detection
    status: experimental
    description: Detects known mutexes associated with MasonRAT activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://daniyyell.com/threat%20hunting/tools/malware%20analysis/Threat-Hunting-on-Windows-Server-2016-Uncovering-Hidden-C2-Malware-Using-Elastic-SIEM/'
    tags:
      - 'attack.command_and_control.t1219'
      - 'malware.rat.masonrat'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'rmldKj40qW2UTlEe'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0011
techniques:
    - T1219
tags:
    - attack.command_and_control.t1219
    - malware.rat.masonrat
author: '@adhikara13'
version: "1"
references:
    - https://daniyyell.com/threat%20hunting/tools/malware%20analysis/Threat-Hunting-on-Windows-Server-2016-Uncovering-Hidden-C2-Malware-Using-Elastic-SIEM/
data_sources:
    - process_creation
    - windows
