id: 019ca09f-40be-7203-b1ce-70922c75fe09
name: QuietSieve Stealer Mutex Detection
description: The rule detects the creation of specific mutexes known to be associated with the QuietSieve stealer malware. The detection is based on the presence of the mutex name 'Global\lCHBaUZcohRgQcOfdIFaf'. This activity indicates potential QuietSieve stealer infection on a Windows system.
query: |-
    title: QuietSieve Stealer Mutex Detection
    status: experimental
    description: Detects known mutexes associated with QuietSieve stealer activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://unit42.paloaltonetworks.com/gamaredon-primitive-bear-ukraine-update-2021/'
      - 'https://www.trendmicro.com/vinfo/us/threat-encyclopedia/malware/trojanspy.msil.quietsieve.lsa'
    tags:
      - 'attack.credential_access.t1555'
      - 'malware.stealer.quietsieve'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Global\lCHBaUZcohRgQcOfdIFaf'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0006
techniques:
    - T1555
tags:
    - attack.credential_access.t1555
    - malware.stealer.quietsieve
author: '@adhikara13'
version: "1"
references:
    - https://unit42.paloaltonetworks.com/gamaredon-primitive-bear-ukraine-update-2021/
    - https://www.trendmicro.com/vinfo/us/threat-encyclopedia/malware/trojanspy.msil.quietsieve.lsa
data_sources:
    - process_creation
    - windows
