id: 019b9e08-813b-74aa-b6fb-0a8e620e40f0
name: Bulbature Network Reconnaissance Command
description: Detects a specific command used by the Bulbature malware (associated with UAT-7290) to obtain the local network interface's name. This is part of its system reconnaissance routine.
query: |
    title: Bulbature Network Reconnaissance Command
    id: af7fe623-f36c-4dce-989f-95e0574cd4fc
    status: experimental
    description: Detects a specific command used by the Bulbature malware
      (associated with UAT-7290) to obtain the local network interface's name. This
      is part of its system reconnaissance routine.
    references:
      - https://blog.talosintelligence.com/uat-7290/
    author: tim@detections.ai
    date: 2026-01-08
    tags:
      - attack.t1016
      - attack.t1082
      - detection.threat-hunting
    logsource:
      product: linux
      category: process_creation
    detection:
      selection:
        CommandLine|contains|all:
          # Detects reading of the kernel routing table
          - 'cat'
          - '/proc/net/route' # Detects use of awk for text processing
          - 'awk' # Detects filtering for the default route (destination 0.0.0.0)
          - '00000000'
      condition: selection
    falsepositives:
      - Legitimate system administration scripts.
    level: medium
query_type: sigma
