id: 019be645-8b52-7531-b7de-cddce36d47f0
name: TamperedChef Execution from Unusual Path
description: Detects the execution of the TamperedChef payload 'PDF Editor.exe' from its specific, non-standard installation directories within user profiles.
query: |
    title: TamperedChef Execution from Unusual Path
    id: 38fe4723-c560-4943-b411-c913ddf902a3
    status: experimental
    description: Detects the execution of the TamperedChef payload 'PDF Editor.exe'
      from its specific, non-standard installation directories within user profiles.
    references:
      - https://www.sophos.com/en-us/blog/tamperedchef-serves-bad-ads-with-infostealers-as-the-main-course
    author: detections.ai
    date: 2026-01-22
    tags:
      - attack.execution
      - attack.t1204.002
    logsource:
      product: windows
      category: process_creation
    detection:
      selection:
        Image|endswith:
          # Detects execution from the two known installation paths for TamperedChef
          - '\PDF Editor\PDF Editor.exe'
          - '\AppData\Local\Programs\PDF Editor\PDF Editor.exe'
      condition: selection
    falsepositives:
      - Legitimate software named 'PDF Editor.exe' might exist. However, the
        specific installation paths are characteristic of the TamperedChef malware,
        reducing the likelihood of false positives.
    level: high
query_type: sigma
severity: high
