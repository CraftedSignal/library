id: 019be11a-3037-77c3-8940-89151f29557a
name: InvisibleFerret Dual-Channel C2 Traffic
description: Detects C2 network traffic associated with the InvisibleFerret RAT, used by the PurpleBravo group. This malware uses a plaintext HTTP channel for beaconing, data exfiltration, and payload delivery to specific URI endpoints.
query: |
    title: InvisibleFerret Dual-Channel C2 Traffic
    id: 0a3544fe-502b-4894-b3ef-262817b281c0
    status: experimental
    description: Detects C2 network traffic associated with the InvisibleFerret RAT,
      used by the PurpleBravo group. This malware uses a plaintext HTTP channel for
      beaconing, data exfiltration, and payload delivery to specific URI endpoints.
    references:
      - https://www.recordedfuture.com/research/purplebravos-targeting-it-software-supply-chain
    author: detections.ai
    date: 2026-01-21
    tags:
      - attack.t1071
      - attack.t1095
      - attack.command_and_control
      - detection.emerging_threats
    logsource:
      category: proxy
    detection:
      selection:
        # Detects HTTP POST requests to specific URI paths used by InvisibleFerret for C2 communications
        http.method: 'POST'
        url.path|endswith:
          - '/keys'
          - '/uploads'
          - '/brow'
          - '/adc'
      condition: selection
    falsepositives:
      - Legitimate web services that use similar API endpoints.
    level: medium
