id: 019c274e-13bf-725e-bc47-55bf141136dd
name: Rapid ICMP Echo Request Flood
description: Detects a high frequency of ICMP Echo Request (Type 8) packets, which could indicate a Denial of Service (DoS) attack.
query: |
    title: Rapid ICMP Echo Request Flood
    id: 2a9207f4-7937-4436-85c4-c99d344dad96
    status: experimental
    description: Detects a high frequency of ICMP Echo Request (Type 8) packets,
      which could indicate a Denial of Service (DoS) attack.
    references:
      - https://medium.com/@ma8163942/from-zero-to-alert-detecting-dos-attacks-with-custom-suricata-rules-57e4171d916b
    author: detections.ai
    date: 2026-02-04
    tags:
      - attack.impact
      - attack.t1498.001
    logsource:
      category: network_traffic # This rule is designed for logs that record network traffic details, such as from a firewall, IDS/IPS, or Zeek.
    detection:
      selection:
        # Corresponds to ICMP Echo Request (ping).
        network.transport: 'icmp'
        icmp.type: 8
        icmp.code: 0
        # The timeframe over which the events are counted.
      timeframe: 1s # The condition aggregates events by source IP and triggers if the count exceeds the threshold.
      condition: selection | count() by source.ip > 50
    falsepositives:
      - Network diagnostic tools
      - Misconfigured network monitoring systems
    level: high
query_type: sigma
severity: high
tactics:
    - TA0040
techniques:
    - T1498.001
tags:
    - attack.impact
    - attack.t1498.001
author: detections.ai
version: "3"
references:
    - https://medium.com/@ma8163942/from-zero-to-alert-detecting-dos-attacks-with-custom-suricata-rules-57e4171d916b
data_sources:
    - network_traffic
