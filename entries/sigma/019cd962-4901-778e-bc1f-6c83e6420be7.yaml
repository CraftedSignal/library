id: 019cd962-4901-778e-bc1f-6c83e6420be7
name: Self-Parsing Script Payload Extraction
description: Detects a PowerShell process reading its own or another script's content to extract a hidden payload. This technique was observed in the Dead#Vax campaign to deobfuscate and execute payloads stored within the script file itself.
query: |
    title: Self-Parsing Script Payload Extraction
    id: 6f2f5b9a-ecd0-4fc9-8730-95d1c4076556
    status: experimental
    description: Detects a PowerShell process reading its own or another script's
      content to extract a hidden payload. This technique was observed in the
      Dead#Vax campaign to deobfuscate and execute payloads stored within the script
      file itself.
    author: detections.ai
    references:
      - https://www.securonix.com/blog/deadvax-threat-research-security-advisory/
    date: 2026-03-10
    tags:
      - attack.execution
      - attack.defense_evasion
      - attack.t1059.001
      - attack.t1027
      - attack.t1140
    logsource:
      category: process_creation
      product: windows
    detection:
      selection_base:
        Image|endswith:
          - '\powershell.exe'
          - '\pwsh.exe'
          - '\mbs.exe' # Renamed PowerShell binary used by Dead#Vax
      selection_pattern_1:
        CommandLine|contains|all:
          - 'Get-Content' # Reads the content of a file
        CommandLine|contains:
          - '.cmd' # Command script
          - '.bat' # Batch script
          - '.wsf' # Windows Script File
      selection_pattern_2:
        CommandLine|contains|all:
          - '-match' # Used to find a specific line
          - '@' # The specific marker for the payload line in the Dead#Vax campaign
      condition: selection_base and (1 of selection_pattern_*)
    falsepositives:
      - Legitimate administrative or deployment scripts may read the content of
        other scripts, which could trigger this rule. Tuning may be required based
        on environment-specific tools and practices.
    level: medium
query_type: sigma
severity: medium
tactics:
    - TA0002
    - TA0005
techniques:
    - T1059.001
    - T1027
    - T1140
