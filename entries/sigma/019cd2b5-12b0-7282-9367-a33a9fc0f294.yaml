id: 019cd2b5-12b0-7282-9367-a33a9fc0f294
name: Obfuscated Inline Script Execution
description: |
    Detects Node.js or Python processes executing highly obfuscated or large inline expressions via the '-e' (Node.js) or '-c' (Python) flags.
    This technique is a primary execution method for stagers associated with North Korean APTs, such as DEV#POPPER and OmniStealer, which are often hidden in legitimate-looking configuration files.
query: |
    title: Obfuscated Inline Script Execution
    description: >
      Detects Node.js or Python processes executing highly obfuscated or large
      inline expressions via the '-e' (Node.js) or '-c' (Python) flags.

      This technique is a primary execution method for stagers associated with North
      Korean APTs, such as DEV#POPPER and OmniStealer, which are often hidden in
      legitimate-looking configuration files.
    references:
      - >-
        https://www.esentire.com/blog/north-korean-apt-malware-analysis-dev-popper-rat-and-omnistealer-everyday-im-shufflin
    author: tim@detections.ai
    date: 2026-03-09T00:00:00.000Z
    tags:
      - attack.t1059.007
      - attack.t1059.006
      - attack.t1027.010
      - attack.execution
      - attack.defense_evasion
    logsource:
      category: process_creation
      product: windows
      service: sysmon
    detection:
      node_proc:
        Image|endswith:
          - \node.exe
          - /node
      node_cmd1:
        CommandLine|contains:
          - ' -e '
          - ' --eval '
          - ' --eval='
          - ' -e='
      node_cmd2:
        CommandLine|contains:
          - global['
          - global["
          - atob(
          - Buffer.from(
          - require(
          - eval(
          - Function(
          - .toString(
          - fromCharCode
      python_proc:
        Image|endswith:
          - \python.exe
          - \python3.exe
          - /python
          - /python3
      python_cmd1:
        CommandLine|contains: ' -c '
      python_cmd2:
        CommandLine|contains:
          - exec(
          - eval(
          - base64.b64decode(
          - urllib.request
          - subprocess.Popen
          - subprocess.run
          - zlib.decompress
          - __import__(
          - compile(
      condition: (node_proc and node_cmd*) or (python_proc and python_cmd*)
    falsepositives:
      - Legitimate build scripts, automation tools, or developer utilities may use
        long inline scripts.
      - Consider tuning this rule by adding a command-line length threshold (e.g., >
        500 characters) or filtering based on parent processes if false positives
        occur.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0002
    - TA0005
techniques:
    - T1059.007
    - T1059.006
    - T1027.010
