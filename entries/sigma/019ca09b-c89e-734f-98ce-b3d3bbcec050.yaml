id: 019ca09b-c89e-734f-98ce-b3d3bbcec050
name: Kraken Ransomware Mutex Detection
description: The rule detects the creation of specific mutex names associated with Kraken ransomware. It looks for mutexes named 'Microsoft-Kraken-<ComputerName>'. The detection logic is based on the 'process_creation' log source category on Windows systems, specifically monitoring the 'MutexName' field.
query: |-
    title: Kraken Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Kraken ransomware activity.
    author: '@adhikara13'
    date: 2024/08/01
    references:
      - 'https://ietresearch.onlinelibrary.wiley.com/doi/10.1049/ise2.12004'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.kraken'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Microsoft-Kraken-<ComputerName>'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.kraken
author: '@adhikara13'
version: "1"
references:
    - https://ietresearch.onlinelibrary.wiley.com/doi/10.1049/ise2.12004
data_sources:
    - process_creation
    - windows
