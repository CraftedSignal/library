id: 019c8dd8-d37b-743d-a3f2-e3935e6e6ca1
name: macOS Hardware Addition via USB Devices
description: "Hunts for unwarranted hardware additions through USB device connections in macOS Unified Logs. In an environment where USB devices are not permitted. \nIn the absence of system.log, which used to show USB entries in previous macOS versions, this rule attempts to watch for this activity.\n"
query: "title: macOS Hardware Addition via USB Devices\nid: abae85d2-d52d-4273-a6ef-fac8693826bf\nstatus: experimental\ndescription: >\n  Hunts for unwarranted hardware additions through USB device connections in\n  macOS Unified Logs. In an environment where USB devices are not permitted. \n\n  In the absence of system.log, which used to show USB entries in previous macOS\n  versions, this rule attempts to watch for this activity.\nreferences:\n  - >-\n    https://www.mac4n6.com/blog/2020/5/4/analysis-of-apple-unified-logs-quarantine-edition-entry-7-exploring-usbmsc-devices-with-style\n  - https://attack.mitre.org/detectionstrategies/DET0069/\nauthor: zendannyy\ndate: 2026-02-21T00:00:00.000Z\ntags:\n  - attack.initial-access\n  - attack.t1200\n  - macos.usb\nlogsource:\n  product: macos\ndetection:\n  selection_usb_devices:\n    action: mounted\n  selection_device_types:\n    device_type:\n      - storage\n      - network\n      - hid\n  selection_timing_pattern:\n    timeframe: 5m\n  condition: selection_usb_devices and selection_device_types | count() by device_id >= 3\nfalsepositives:\n  - Legitimate USB device usage\n  - User productivity devices\nlevel: medium\n"
query_type: sigma
