id: 369c7e7c-811f-4598-ac73-958954080695
name: Fake Kling AI Malware Execution Detection
description: Detects execution of executables disguised as media/archive files with deceptive filenames from download or app data directories, linked to the Fake Kling AI campaign.
query: |
    title: Fake Kling AI - Deceptive File Execution
    id: 9f7500db-05ca-4790-802d-460cacd00c61
    related:
        - https://research.checkpoint.com/2025/impersonated-kling-ai-site-installs-malware/
    status: experimental # Or testing/stable based on your testing
    description: Detects execution of executables disguised as media/archive files with deceptive filenames from user download/app data directories, linked to Fake Kling AI campaign.
    references:
        - https://research.checkpoint.com/2025/impersonated-kling-ai-site-installs-malware/
    author: Robert Fly
    date: 2025/05/21
    logsource:
        category: process_creation
        product: windows
    detection:
        selection:
            Image|endswith: '.exe'
            Image|contains:
                - '\Downloads\'
                - '\AppData\Local\'
                - '\AppData\Roaming\'
            Image|contains:
                - '.jpg'
                - '.mp4'
                - '.zip'
        condition: selection
    falsepositives:
        - Legitimate software installers or updaters with unusual naming conventions.
        - User-executed scripts or tools with similar file naming patterns (less likely).
    level: high
    tags:
        - attack.execution
        - attack.t1204
        - attack.t1204.002
        - attack.data_component.process_creation
        - mitigation.user_training
        - mitigation.execution_prevention
        - mitigation.behavior_prevention_on_endpoint
        - campaign.fake_kling_ai
        - software.purehvnc_rat
query_type: sigma
severity: medium
techniques:
    - T1204
    - T1204.002
author: Robert Fly
version: "1"
