id: 019ca0a1-ecb7-753a-9cde-ccd996b20b8e
name: Tisak Ransomware Mutex Detection
description: This rule detects the creation of specific mutexes associated with Tisak ransomware. The rule specifically looks for a mutex named 'Global\TisakMutex'. The presence of this mutex indicates potential Tisak ransomware activity on the system.
query: |-
    title: Tisak Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Tisak ransomware activity.
    author: '@adhikara13'
    date: 2024/08/01
    references:
      - 'https://www.trendmicro.com/vinfo/us/threat-encyclopedia/malware/ransom.win32.celancyc.smyxdja'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.tisak'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Global\TisakMutex'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.tisak
author: '@adhikara13'
version: "1"
references:
    - https://www.trendmicro.com/vinfo/us/threat-encyclopedia/malware/ransom.win32.celancyc.smyxdja
data_sources:
    - process_creation
    - windows
