id: 019ca09a-ca24-7118-84e0-cdc39626cef0
name: HelloKitty Ransomware Mutex Detection
description: This rule detects the creation of specific mutexes associated with HelloKitty ransomware. The detection is triggered when a process creates a mutex named 'HELLOKITTYMutex'. This activity is indicative of HelloKitty ransomware execution or presence on a system.
query: |-
    title: HelloKitty Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with HelloKitty ransomware activity.
    author: '@adhikara13'
    date: 2025/07/12
    references:
      - 'https://www.sentinelone.com/anthology/hello-kitty/'
      - 'https://cloud.google.com/blog/topics/threat-intelligence/unc2447-sombrat-and-fivehands-ransomware-sophisticated-financial-threat'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.hellokitty'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'HELLOKITTYMutex'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.hellokitty
author: '@adhikara13'
version: "1"
references:
    - https://www.sentinelone.com/anthology/hello-kitty/
    - https://cloud.google.com/blog/topics/threat-intelligence/unc2447-sombrat-and-fivehands-ransomware-sophisticated-financial-threat
data_sources:
    - process_creation
    - windows
