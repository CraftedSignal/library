id: 019c48f4-cffe-7787-8a4c-1fe2e3c9bdd8
name: UAC Bypass via Command Interpreter Launching Fodhelper
description: The rule detects instances where command interpreters such as cmd.exe, powershell.exe, pwsh.exe, wscript.exe, or cscript.exe launch fodhelper.exe. This specific parent-child process relationship is indicative of a potential User Account Control (UAC) bypass attempt. While legitimate administrative scripts might occasionally involve fodhelper.exe, this pattern is considered suspicious and warrants investigation due to its common use in privilege escalation techniques.
query: "title: UAC Bypass via Command Interpreter Launching Fodhelper\r\nid: 5e8d7a3f-9b4c-4e2d-8a6f-7c5d9e8f6a4b\r\nstatus: experimental\r\ndescription: Detects command interpreters (cmd.exe, PowerShell) launching fodhelper.exe, which may indicate a UAC bypass attempt. While legitimate administrative scripts may call fodhelper, this pattern warrants investigation.\r\nreferences:\r\n    - https://attack.mitre.org/techniques/T1548.002/\r\n    - https://attack.mitre.org/techniques/T1059.001/\r\nauthor: SimSpace\r\ndate: 2026-01-01\r\nmodified: 2026-01-19\r\ntags:\r\n    - attack.privilege-escalation\r\n    - attack.execution\r\n    - attack.t1548.002\r\n    - attack.t1059.001\r\nlogsource:\r\n    category: process_creation\r\n    product: windows\r\ndetection:\r\n    selection:\r\n        ParentImage|endswith:\r\n            - '\\cmd.exe'\r\n            - '\\powershell.exe'\r\n            - '\\pwsh.exe'\r\n            - '\\wscript.exe'\r\n            - '\\cscript.exe'\r\n        Image|endswith: '\\fodhelper.exe'\r\n    condition: selection\r\nfields:\r\n    - Image\r\n    - CommandLine\r\n    - ParentImage\r\n    - User\r\nfalsepositives:\r\n    - Unknown\r\nlevel: high"
