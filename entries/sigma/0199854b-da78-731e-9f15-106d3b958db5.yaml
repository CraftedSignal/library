id: 0199854b-da78-731e-9f15-106d3b958db5
name: LINE VIPER Malware Packet Capture Command on Cisco ASA
description: Detects the execution of a packet capture command with a specific buffer size known to be used by the LINE VIPER malware on Cisco ASA devices. LINE VIPER is a sophisticated malware designed to target Cisco ASA devices, often deployed by the RayInitiator bootkit.
query: |
    title: LINE VIPER Malware Packet Capture Command on Cisco ASA
    id: e81b9078-c584-4b83-8771-9b629f72d113
    status: experimental
    description: Detects the execution of a packet capture command with a specific
      buffer size known to be used by the LINE VIPER malware on Cisco ASA devices.
      LINE VIPER is a sophisticated malware designed to target Cisco ASA devices,
      often deployed by the RayInitiator bootkit.
    references:
      - https://www.ncsc.gov.uk/static-assets/documents/malware-analysis-reports/RayInitiator-LINE-VIPER/ncsc-mar-rayinitiator-line-viper.pdf
    author: detections.ai
    date: 2025-09-26
    tags:
      - attack.t1040
      - attack.t1202
      - malware.line_viper
    logsource:
      product: cisco
      service: asa
    detection:
      selection:
        # Corresponds to the packet capture command used by LINE VIPER, which uses a highly specific buffer size.
        # Example from report: capture <name> buffer 10066410 interface <interface> match <filter>
        message|contains|all:
          - 'capture '
          - 'buffer 10066410'
      condition: selection
    falsepositives:
      - Legitimate administrative activity.
    level: high
query_type: sigma
severity: high
tactics:
