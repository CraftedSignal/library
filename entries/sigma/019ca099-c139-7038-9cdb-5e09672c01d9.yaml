id: 019ca099-c139-7038-9cdb-5e09672c01d9
name: FROSTRIFT Backdoor Mutex Detection
description: This rule detects the creation of processes that utilize specific mutex names associated with the FROSTRIFT backdoor. The detection is based on the presence of the mutex name '7d9196467986'. This activity is indicative of FROSTRIFT backdoor persistence or execution on a Windows system.
query: |-
    title: FROSTRIFT Backdoor Mutex Detection
    status: experimental
    description: Detects known mutexes associated with FROSTRIFT backdoor activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://cloud.google.com/blog/topics/threat-intelligence/cybercriminals-weaponize-fake-ai-websites'
    tags:
      - 'attack.persistence.t1547'
      - 'malware.backdoor.frostrift'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '7d9196467986'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0003
    - TA0004
techniques:
    - T1547
tags:
    - attack.persistence.t1547
    - malware.backdoor.frostrift
author: '@adhikara13'
version: "1"
references:
    - https://cloud.google.com/blog/topics/threat-intelligence/cybercriminals-weaponize-fake-ai-websites
data_sources:
    - process_creation
    - windows
