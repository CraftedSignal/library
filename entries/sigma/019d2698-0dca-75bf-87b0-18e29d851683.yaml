id: 019d2698-0dca-75bf-87b0-18e29d851683
name: ToastNotify.exe Custom Base64 XML Payload Subcommand Executed
description: |
    Detects execution of ToastNotify.exe with the custom subcommand, which accepts a base64-encoded XML toast payload decoded at runtime via CryptStringToBinaryA. This is the most flexible attack mode, supporting protocol links, fake input forms, external images, and spoofed application UI. The XML content is not recoverable from the command line alone.
query: |
    title: ToastNotify.exe Custom Base64 XML Payload Subcommand Executed
    id: f4a1b2c3-d4e5-4f67-8901-abcdef123407
