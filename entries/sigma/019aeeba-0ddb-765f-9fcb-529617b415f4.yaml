id: 019aeeba-0ddb-765f-9fcb-529617b415f4
name: RedLoader Distinctive User-Agent
description: |
    Detects a distinctive User-Agent string used by the initial RedLoader DLL for command and control (C2) communications. This activity is associated with the GOLD BLADE threat group (also known as RedCurl).
