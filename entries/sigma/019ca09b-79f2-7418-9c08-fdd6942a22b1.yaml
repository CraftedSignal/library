id: 019ca09b-79f2-7418-9c08-fdd6942a22b1
name: Keyzetsu Clipper Mutex Detection
description: Detects known mutexes associated with Keyzetsu Clipper activity. This rule specifically looks for the presence of a mutex named '2ILdX2JpexVZieT6mPv2i6Jp3HNFPlby' during process creation events on Windows systems.
query: |-
    title: Keyzetsu Clipper Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Keyzetsu Clipper activity.
    author: '@adhikara13'
    date: 2025/07/14
    references:
      - 'https://cyble.com/blog/multiple-new-clipper-malware-variants-discovered-in-the-wild/'
    tags:
      - 'attack.collection.t1115'
      - 'malware.clipper.keyzetsu_clipper'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '2ILdX2JpexVZieT6mPv2i6Jp3HNFPlby'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0009
techniques:
    - T1115
tags:
    - attack.collection.t1115
    - malware.clipper.keyzetsu_clipper
author: '@adhikara13'
version: "1"
references:
    - https://cyble.com/blog/multiple-new-clipper-malware-variants-discovered-in-the-wild/
data_sources:
    - process_creation
    - windows
