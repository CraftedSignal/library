    logsource:
      product: windows
    detection:
      selection_signer:
        # Detects drivers signed by known abused certificate authorities
        category: driver_load
        Signature|contains:
          - 'Changsha Hengxiang Information Technology Co., Ltd.'
          - 'Fuzhou Dingxin Trade Co., Ltd.'
      selection_random_svc:
        # Detects creation of a service with a 5-character random name pointing to a driver file
        category: service_creation
        ImagePath|endswith: '.sys'
        ServiceName: '?????'
      selection_masquerade:
        # Detects drivers masquerading as legitimate CrowdStrike drivers
        category: driver_load
        Description: 'CrowdStrike Falcon Sensor Driver'
        Signature|ne: 'CrowdStrike, Inc.'
      condition: 1 of them
    falsepositives:
      - The 'selection_random_svc' may trigger on legitimate software that uses
        short, generated service names for drivers. Tuning by excluding known
        legitimate service names or ImagePaths may be necessary.
    level: high
