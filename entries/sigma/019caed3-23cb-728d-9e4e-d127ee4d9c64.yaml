id: 019caed3-23cb-728d-9e4e-d127ee4d9c64
name: Unitree Go2 Suspicious Script Creation
description: |
    Detects the creation or modification of Python scripts in the /unitree/etc/programming/ directory on Unitree Go2 robots. This activity is a strong indicator of exploitation of CVE-2026-27509 or CVE-2026-27510, where an attacker uploads a malicious script for remote code execution.
query: |
    title: Unitree Go2 Suspicious Script Creation
    id: e9be9e6d-a606-41f8-b2bd-7ca2999f989e
    status: experimental
    description: >
      Detects the creation or modification of Python scripts in the
      /unitree/etc/programming/ directory on Unitree Go2 robots. This activity is a
      strong indicator of exploitation of CVE-2026-27509 or CVE-2026-27510, where an
      attacker uploads a malicious script for remote code execution.
    author: tim@detections.ai
    references:
      - https://boschko.ca/unitree-go2-rce/
    date: 2026-03-02T00:00:00.000Z
    tags:
      - attack.t1204.002
      - attack.t1059.006
      - attack.t1546
      - cve.2026.27509
      - cve.2026.27510
    logsource:
      category: file_event
      product: linux
      service: audit
    detection:
      selection:
        TargetFilename|startswith: '/unitree/etc/programming/'
        TargetFilename|endswith: '.py'
      condition: selection
    falsepositives:
      - Legitimate use of the robot's programming feature via the official mobile
        app will create Python scripts in this directory.
    level: high
    associated_cves:
      - CVE-2026-27509
      - CVE-2026-27510
