id: 019c48f4-a6c2-774d-b36e-f91d2429ef00
name: Tar Archive Creation in User-Writable Directories
description: The rule detects the creation of tar archive files (including .tar, .tar.gz, .tgz, and .tar.bz2) within common user-writable directories on Windows systems. Specifically, it looks for these archive files being created in paths containing '\Downloads\', '\Temp\', '\Public\', '\Desktop\', '\AppData\Local\Temp\', or 'C:\ProgramData\'. This activity could indicate data staging for exfiltration, where an attacker collects and archives data before moving it out of the compromised system.
query: "title: Tar Archive Creation in User-Writable Directories\r\nid: 8d7e6f5c-4b3a-2c1d-0e9f-8a7b6c5d4e3f\r\nstatus: test\r\ndescription: Detects creation of tar archive files in user-writable directories, indicating potential data staging for exfiltration.\r\nreferences:\r\n    - https://attack.mitre.org/techniques/T1560/001/\r\nauthor: SimSpace\r\ndate: 2026-01-19\r\ntags:\r\n    - attack.collection\r\n    - attack.t1560.001\r\nlogsource:\r\n    category: file_event\r\n    product: windows\r\ndetection:\r\n    selection_extension:\r\n        TargetFilename|endswith:\r\n            - '.tar'\r\n            - '.tar.gz'\r\n            - '.tgz'\r\n            - '.tar.bz2'\r\n    selection_paths:\r\n        TargetFilename|contains:\r\n            - '\\Downloads\\'\r\n            - '\\Temp\\'\r\n            - '\\Public\\'\r\n            - '\\Desktop\\'\r\n            - '\\AppData\\Local\\Temp\\'\r\n            - 'C:\\ProgramData\\'\r\n    condition: selection_extension and selection_paths\r\nfields:\r\n    - TargetFilename\r\n    - Image\r\n    - User\r\nfalsepositives:\r\n    - Unknown\r\nlevel: low"
