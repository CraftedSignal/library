id: 019c966c-115b-734e-bc85-f719c3b0f4bf
name: Muddled Libra File Sharing And Exfil
description: Detects access to file sharing and exfiltration services reported in the Unit 42 Muddled Libra operational playbook, including S3 Browser and multiple upload services.
query: |
    title: "Muddled Libra File Sharing And Exfil"
    id: 9c1b2a7d-6d32-4f2f-8a91-2d7a1c3f4b22
    status: experimental
    description: >-
      Detects access to file sharing and exfiltration services reported in the Unit
      42 Muddled Libra operational playbook, including S3 Browser and multiple
      upload services.
    author: Daniel Jeremiah
    date: 2026-02-24T00:00:00.000Z
    references:
      - https://unit42.paloaltonetworks.com/muddled-libra-ops-playbook/
    tags:
      - attack.exfiltration
      - attack.t1567.002
    logsource:
      category: proxy
      product: any
    detection:
      selection_domains:
        cs-host|contains:
          - upload.ee
          - uploadnow.io
          - limewire.com
          - we.tl
          - filetransfer.io
          - filebin.io
          - s3browser.com
          - fast.com
          - trycloudflare.com
      selection_urls:
        c-uri|contains:
          - upload.ee
          - uploadnow.io
          - limewire.com
          - we.tl
          - filetransfer.io
          - filebin.io
          - s3browser.com
          - fast.com
          - trycloudflare.com
      condition: selection_domains or selection_urls
    level: medium
query_type: sigma
severity: medium
tactics:
    - TA0010
techniques:
    - T1567.002
