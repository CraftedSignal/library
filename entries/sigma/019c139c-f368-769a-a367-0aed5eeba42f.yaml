id: 019c139c-f368-769a-a367-0aed5eeba42f
name: VIMC UNITY Trojan Execution
description: |
    Detects execution of the VIMC UNITY campaign trojan/loader. The malware is delivered via phishing email with subject "VIMC UNITY --LUMUT PORT LAYTIME" and attachment VIMC UNITY.gz (gzip containing the PE). The binary masquerades as or abuses Java Control Panel (javacpl.exe).
query: |
    title: VIMC UNITY Trojan Execution
    id: f1a2b3c4-d5e6-7890-1234-567890abcdef
    status: experimental
    description: >
      Detects execution of the VIMC UNITY campaign trojan/loader. The malware is
      delivered via phishing email with subject "VIMC UNITY --LUMUT PORT LAYTIME"
      and attachment VIMC UNITY.gz (gzip containing the PE). The binary masquerades
      as or abuses Java Control Panel (javacpl.exe).
    references:
      - https://app.any.run/tasks/829e49d8-266a-4e5f-9cab-353c268a4943
    author: Daniel Jeremiah
    date: 2026/01/31
    hashes:
      - 3541b846fb46d75c6d400b6a0584b3a49ef62613624f49837e1f779a0957e9cb
    tags:
      - attack.execution
      - attack.t1204
      - attack.t1566.001
    logsource:
      category: process_creation
      product: windows
      service: security
    detection:
      selection_hash:
        SHA256|contains: 3541b846fb46d75c6d400b6a0584b3a49ef62613624f49837e1f779a0957e9cb
      selection_javacpl_context:
        Image|endswith: \javacpl.exe
        ParentImage|re: .*\\(Temp|TEMP|AppData|Downloads|ProgramData)\\.*
      selection_xclient_spawn:
        Image|endswith:
          - \XClient.exe
          - \shost.exe
        ParentImage|re: .*\\(Temp|TEMP|AppData|ProgramData)\\.*\.exe
      selection_dropper_context:
        Image|re: .*\\(Temp|TEMP|Users\\.*\\AppData\\Local\\Temp|Downloads)\\.*\.exe
        ParentImage|endswith:
          - \OUTLOOK.EXE
          - \explorer.exe
          - \msedge.exe
          - \chrome.exe
        CommandLine|contains:
          - VIMC
          - UNITY
          - laytime
      condition: >-
        selection_hash or selection_javacpl_context or selection_xclient_spawn or
        selection_dropper_context
    falsepositives:
      - Legitimate security testing (e.g. POC, authorized testing) using the C2 as
        testing
    level: high
query_type: sigma
severity: high
tactics:
    - TA0002
    - TA0001
techniques:
