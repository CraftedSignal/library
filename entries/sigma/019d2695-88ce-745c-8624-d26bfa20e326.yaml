id: 019d2695-88ce-745c-8624-d26bfa20e326
name: Application AUMID Enumeration via PowerShell
description: |
    Detects PowerShell enumerating Application User Model IDs via the notification settings registry hive, the Get-StartApps cmdlet, or the System.AppUserModel.ID extended property on .lnk shortcuts. Attackers use these to discover trusted AUMIDs to impersonate in fake toast notifications.
query: |
    title: Application AUMID Enumeration via PowerShell
    id: f4a1b2c3-d4e5-4f67-8901-abcdef123402
    status: experimental
    description: >
        Detects PowerShell enumerating Application User Model IDs via the notification
        settings registry hive, the Get-StartApps cmdlet, or the System.AppUserModel.ID
        extended property on .lnk shortcuts. Attackers use these to discover trusted AUMIDs
        to impersonate in fake toast notifications.
    references:
        - https://ipurple.team/2026/03/25/toast-notifications/
        - https://brmk.me/2026/03/18/toast-my-way.html
    author: Detection Engineering
    date: 2026/03/25
    modified: 2026/03/25
    tags:
        - attack.discovery
        - attack.t1518
    logsource:
        category: ps_script
        product: windows
    detection:
        selection:
            ScriptBlockText|contains:
                - 'Notifications\Settings'
                - 'getaumid'
                - 'Get-StartApps'
                - 'AppUserModel.ID'
        condition: selection
    falsepositives:
        - IT scripts that audit notification permissions or enumerate installed applications
        - Software inventory tooling using Get-StartApps
    level: low
query_type: sigma
severity: low
tactics:
    - TA0007
techniques:
    - T1518
