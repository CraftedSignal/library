id: 019d0659-35ae-7028-84e2-4d7f7ef5eaa8
name: DarkSword Exploit Kit File Names
description: Detects web requests for specific JavaScript file names that are part of the DarkSword iOS exploit chain. The presence of these requests strongly suggests a device is being targeted with the exploit kit.
query: |
    title: DarkSword Exploit Kit File Names
    id: e48f5c6a-3558-4544-8723-25880045efb4
    status: experimental
    description: Detects web requests for specific JavaScript file names that are
      part of the DarkSword iOS exploit chain. The presence of these requests
      strongly suggests a device is being targeted with the exploit kit.
    author: detections.ai
    references:
      - https://iverify.io/blog/darksword-ios-exploit-kit-explained
      - https://www.lookout.com/threat-intelligence/article/darksword
      - https://cloud.google.com/blog/topics/threat-intelligence/darksword-ios-exploit-chain
    date: 2026-03-19
    tags:
      - attack.initial_access
      - attack.t1189
    logsource:
      product: webserver
      service: http
    detection:
      selection:
        # Detects requests for specific JS files used in the DarkSword exploit chain
        cs_uri_stem|contains:
          - '/rce_loader.js'
          - '/rce_module.js'
          - '/rce_worker_18.4.js'
          - '/rce_worker_18.6.js'
          - '/rce_worker_18.7.js'
          - '/sbx0_main_18.4.js'
          - '/sbx1_main.js'
          - '/pe_main.js'
      condition: selection
    falsepositives:
      - Unlikely, as these file names are specific to the exploit kit. However,
        other software could potentially use similar generic names.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0001
techniques:
    - T1189
tags:
    - attack.initial_access
