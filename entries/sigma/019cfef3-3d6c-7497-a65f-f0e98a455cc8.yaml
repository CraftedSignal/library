id: 019cfef3-3d6c-7497-a65f-f0e98a455cc8
name: Living Off The Land Binary (LOLBAS) Network Connections
description: Detects abuse of legitimate Windows binaries making network connections for malicious purposes
query: |
    title: Living Off The Land Binary (LOLBAS) Network Connections
    id: e7d4b8f2-9a5c-4b1e-8f7d-3c6a9b2e5d4f
    status: test
    description: >-
      Detects abuse of legitimate Windows binaries making network connections for
      malicious purposes
    references:
      - https://attack.mitre.org/techniques/T1218/
      - https://lolbas-project.github.io/
    author: zendannyy
    date: 2026/03/16
    tags:
      - attack.defense-evasion
      - attack.execution
      - attack.t1218
    logsource:
      category: process_creation
      product: windows
      service: security
    detection:
      selection_regsvr32_network:
        Image|endswith: \regsvr32.exe
        CommandLine|contains:
          - /i:http
          - /i:ftp
          - .sct
          - scrobj.dll
        CommandLine|contains|all:
          - /s
          - /u
      selection_certutil_download:
        Image|endswith: \certutil.exe
        CommandLine|contains|all:
          - '-urlcache'
          - '-verifyctl'
          - '-split'
        CommandLine|contains:
          - http://
          - https://
          - ftp://
      selection_mshta_network:
        Image|endswith: \mshta.exe
        CommandLine|contains:
          - http://
          - https://
          - ftp://
          - 'javascript:'
          - 'vbscript:'
      selection_installutil_network:
        Image|endswith: \InstallUtil.exe
        CommandLine|contains|all:
          - http://
          - https://
          - /logfile=
          - /U
      selection_msiexec_network:
        Image|endswith: \msiexec.exe
        CommandLine|contains:
          - /i http
          - /package http
          - /a http
          - http://
          - https://
      filter_legitimate_sources:
        CommandLine|contains:
          - microsoft.com
          - windowsupdate.com
          - download.windowsupdate.com
      condition: any of selection* and not filter_legitimate_sources
    falsepositives:
      - Administrative scripts making network connections with these binaries
      - Software deployment tools making network connections with these binaries
    level: medium
query_type: sigma
severity: medium
tactics:
    - TA0005
    - TA0002
techniques:
    - T1218
tags:
    - attack.defense-evasion
    - attack.execution
    - attack.t1218
author: zendannyy
version: "1"
references:
    - https://attack.mitre.org/techniques/T1218/
    - https://lolbas-project.github.io/
data_sources:
    - process_creation
    - windows
    - security
