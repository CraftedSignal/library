id: 019ca095-2d61-723b-b5bd-858382205c93
name: BlackBerserk Ransomware Mutex Detection
description: Detects the creation of specific mutexes ('Global\BlackMutex') known to be associated with BlackBerserk ransomware activity. The rule specifically looks for these mutex names, indicating a high confidence in identifying this particular ransomware.
query: |-
    title: BlackBerserk Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with BlackBerserk ransomware activity.
    author: '@adhikara13'
    date: 2024/08/01
    references:
      - 'https://tria.ge/230728-cqg16sah59/behavioral1/analog?main_event=Mutex&q=BlackMutex'
      - 'https://id-ransomware.blogspot.com/2023/07/blackberserk-ransomware.html'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.blackberserk'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'Global\BlackMutex'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
