id: 019b9e4c-76a9-7696-973f-ad4338a94af7
name: CMD Executing Document Extension as PE Binary
description: Detects cmd.exe spawning processes with document file extensions, indicating a PE binary masquerading as a document
query: |
    title: CMD Executing Document Extension as PE Binary
    id: d0308b64-354d-4695-94ee-51bf144f6ef3
    status: test
    description: Detects cmd.exe spawning processes with document file extensions,
      indicating a PE binary masquerading as a document
    references:
      - https://attack.mitre.org/techniques/T1204/002/
      - https://attack.mitre.org/techniques/T1036/
    author: SimSpace
    date: 2026-01-01
    tags:
      - attack.execution
      - attack.t1204.002
      - attack.defense-evasion
      - attack.t1036
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        ParentImage|endswith: '\cmd.exe'
        Image|endswith:
          - '.pdf'
          - '.doc'
          - '.docx'
          - '.xls'
          - '.xlsx'
          - '.ppt'
          - '.pptx'
          - '.txt'
          - '.rtf'
      condition: selection
    falsepositives:
      - None known
    level: critical
query_type: sigma
severity: medium
