id: 019be0f1-6d13-70bd-9c2c-ffca57cc96df
name: PylangGhost/GolangGhost C2 Traffic
description: Detects C2 network traffic associated with PylangGhost and GolangGhost, RATs used by the PurpleBravo group. The malware sends an RC4-encrypted payload via an HTTP POST request to known C2 servers.
query: |
    title: PylangGhost/GolangGhost C2 Traffic
    id: dd2859b6-896d-4d7d-b9b5-e16a2bf9cd30
    status: experimental
    description: Detects C2 network traffic associated with PylangGhost and
      GolangGhost, RATs used by the PurpleBravo group. The malware sends an
      RC4-encrypted payload via an HTTP POST request to known C2 servers.
    references:
      - https://www.recordedfuture.com/research/purplebravos-targeting-it-software-supply-chain
    author: detections.ai
    date: 2026-01-21
    tags:
      - attack.t1071.001
      - attack.command_and_control
      - detection.emerging_threats
    logsource:
      category: proxy
    detection:
      selection_http:
        # Detects HTTP POST requests with specific User-Agents and Content-Type used by the malware
        http.method: 'POST'
        http.header.content_type: 'application/octet-stream'
        http.user_agent|startswith:
          - 'python-requests'
          - 'Go-http-client'
      selection_c2:
        # List of known GolangGhost C2 servers from the report
        destination.ip:
          - '31.57.243.29'
          - '31.57.243.55'
          - '31.57.243.190'
          - '38.134.148.218'
          - '38.146.28.177'
          - '63.176.219.134'
          - '151.243.101.229'
          - '154.58.204.15'
          - '154.62.226.22'
          - '158.62.198.177'
          - '173.211.70.246'
          - '206.206.127.80'
          - '206.206.127.135'
          - '212.81.47.217'
      condition: selection_http and selection_c2
    falsepositives:
      - Unlikely
    level: high
query_type: sigma
severity: high
tactics:
    - TA0011
techniques:
    - T1071.001
tags:
    - attack.t1071.001
    - attack.command_and_control
    - detection.emerging_threats
author: detections.ai
