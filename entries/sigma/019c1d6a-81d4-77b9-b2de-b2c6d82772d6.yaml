id: 019c1d6a-81d4-77b9-b2de-b2c6d82772d6
name: PowerShell Execution of Registry-Resident Payload
description: |
    Detects PowerShell retrieving, decoding, and executing a payload stored inside the Windows registry.
query: |-
    title: PowerShell Execution of Registry-Resident Payload
    id: 8c71b3a9-2f9a-4d03-b51c-e9f9eec386ca
    status: stable
    description: >
      Detects PowerShell retrieving, decoding, and executing a payload
      stored inside the Windows registry.
    author: Thaung Htet
    date: 2026-02-02
    tags:
      - attack.execution
      - attack.t1059.001
      - attack.t1027
    logsource:
      category: process_creation
      product: windows
    detection:
      powershell:
        Image|endswith:
          - '\powershell.exe'
          - '\pwsh.exe'
      registry_read:
        CommandLine|contains:
          - 'E9F9EEC3-86CA-4EBE-9AA4-1B55EE8D114E'
          - 'Get-ItemProperty'
      decode_exec:
        CommandLine|contains:
          - 'FromBase64String'
          - 'IEX'
      condition: powershell and registry_read and decode_exec
    falsepositives:
      - Rare red-team simulations
    level: critical
query_type: sigma
severity: medium
tactics:
    - TA0002
    - TA0005
techniques:
    - T1059.001
    - T1027
tags:
    - attack.execution
    - attack.t1059.001
    - attack.t1027
author: Thaung Htet
version: "1"
data_sources:
    - process_creation
    - windows
