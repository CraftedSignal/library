id: 019ca09d-97e2-7369-aa5b-4814e1e95cef
name: Nexe Backdoor Mutex Detection
description: This rule detects the presence of specific mutex names ('dsds') that are known to be associated with the Nexe backdoor. The detection is based on process creation events in Windows environments. The Nexe backdoor is linked to the Patchwork APT group and is known for sophisticated evasion techniques. The rule aims to identify persistence mechanisms or active infections by this malware.
query: |-
    title: Nexe Backdoor Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Nexe backdoor activity.
    author: '@adhikara13'
    date: 2025/07/14
    references:
      - 'https://cyble.com/blog/nexe-backdoor-unleashed-patchwork-apt-groups-sophisticated-evasion-of-defenses/'
    tags:
      - 'attack.persistence.t1547'
      - 'malware.backdoor.nexe'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'dsds'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0003
    - TA0004
techniques:
    - T1547
tags:
    - attack.persistence.t1547
    - malware.backdoor.nexe
author: '@adhikara13'
version: "1"
references:
    - https://cyble.com/blog/nexe-backdoor-unleashed-patchwork-apt-groups-sophisticated-evasion-of-defenses/
data_sources:
    - process_creation
    - windows
