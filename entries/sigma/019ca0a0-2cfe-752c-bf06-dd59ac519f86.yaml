id: 019ca0a0-2cfe-752c-bf06-dd59ac519f86
name: Rook Ransomware Mutex Detection
description: Detects known mutexes associated with Rook ransomware activity. The rule specifically looks for the mutex name 'asfgjkl878645165456fa888' during process creation events on Windows systems.
query: |-
    title: Rook Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Rook ransomware activity.
    author: '@adhikara13'
    date: 2024/07/19
    references:
      - 'https://www.infosecinstitute.com/resources/malware-analysis/rook-ransomware-analysis/'
      - 'https://seguranca-informatica.pt/rook-ransomware-analysis/'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.rook'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'asfgjkl878645165456fa888'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.rook
author: '@adhikara13'
version: "1"
references:
    - https://www.infosecinstitute.com/resources/malware-analysis/rook-ransomware-analysis/
    - https://seguranca-informatica.pt/rook-ransomware-analysis/
data_sources:
    - process_creation
    - windows
