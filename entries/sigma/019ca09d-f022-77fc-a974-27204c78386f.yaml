id: 019ca09d-f022-77fc-a974-27204c78386f
name: Pandora Ransomware Mutex Detection
description: This rule detects the creation of specific mutexes ('ThisisMutexa' or 'FFFFFMutex') that are known to be associated with Pandora ransomware activity. The detection is based on monitoring process creation events for these mutex names.
query: |-
    title: Pandora Ransomware Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Pandora ransomware activity.
    author: '@adhikara13'
    date: 2024/07/19
    references:
      - 'https://www.avertium.com/resources/threat-reports/in-depth-pandora-ransomware'
      - 'https://www.fortinet.com/blog/threat-research/looking-inside-pandoras-box'
      - 'https://cyble.com/blog/deep-dive-analysis-pandora-ransomware/'
      - 'https://app.any.run/tasks/a6b6fe42-6b10-471e-9fc8-8bc8b793601d'
    tags:
      - 'attack.impact.t1486'
      - 'malware.ransomware.pandora'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'ThisisMutexa'
          - 'FFFFFMutex'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0040
techniques:
    - T1486
tags:
    - attack.impact.t1486
    - malware.ransomware.pandora
author: '@adhikara13'
version: "1"
references:
    - https://www.avertium.com/resources/threat-reports/in-depth-pandora-ransomware
    - https://www.fortinet.com/blog/threat-research/looking-inside-pandoras-box
    - https://cyble.com/blog/deep-dive-analysis-pandora-ransomware/
    - https://app.any.run/tasks/a6b6fe42-6b10-471e-9fc8-8bc8b793601d
data_sources:
    - process_creation
    - windows
