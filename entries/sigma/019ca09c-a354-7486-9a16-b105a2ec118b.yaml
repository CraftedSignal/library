id: 019ca09c-a354-7486-9a16-b105a2ec118b
name: Mars Stealer Mutex Detection
description: 'This rule detects the creation of specific mutexes that are known to be associated with the Mars Stealer malware. The rule looks for three distinct mutex names: ''67820366929896267194'', ''92550737836278980100'', and ''86223203794583053453''. The detection is based on process creation logs from Windows systems, specifically monitoring for these unique mutex names. The presence of any of these mutexes indicates potential Mars Stealer activity on the system.'
query: |-
    title: Mars Stealer Mutex Detection
    status: experimental
    description: Detects known mutexes associated with Mars stealer activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://www.esentire.com/blog/esentire-threat-intelligence-malware-analysis-mars-stealer'
      - 'https://x-junior.github.io/malware%20analysis/2022/05/19/MarsStealer.html'
      - 'https://3xp0rt.com/posts/mars-stealer/'
    tags:
      - 'attack.credential_access.t1555'
      - 'malware.stealer.mars'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - '67820366929896267194'
          - '92550737836278980100'
          - '86223203794583053453'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0006
techniques:
    - T1555
tags:
    - attack.credential_access.t1555
    - malware.stealer.mars
author: '@adhikara13'
version: "1"
references:
    - https://www.esentire.com/blog/esentire-threat-intelligence-malware-analysis-mars-stealer
    - https://x-junior.github.io/malware%20analysis/2022/05/19/MarsStealer.html
    - https://3xp0rt.com/posts/mars-stealer/
data_sources:
    - process_creation
    - windows
