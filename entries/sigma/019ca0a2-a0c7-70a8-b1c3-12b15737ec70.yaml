id: 019ca0a2-a0c7-70a8-b1c3-12b15737ec70
name: VipersoftX Stealer Mutex Detection
description: 'The rule detects the presence of specific mutex names associated with the VipersoftX stealer. It looks for two distinct mutex names: ''acb2f45f62c34c94bbd6e86734eb01a1'' and ''8cda13f8-a407-4a48-8284-411709e090''. The detection is based on process creation events on Windows systems where these mutex names are observed.'
query: |-
    title: VipersoftX Stealer Mutex Detection
    status: experimental
    description: Detects known mutexes associated with VipersoftX stealer activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://labs.k7computing.com/index.php/in-depth-analysis-of-a-2025-vipersoftx-variant/'
    tags:
      - 'attack.credential_access.t1555'
      - 'malware.stealer.vipersoftx'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'acb2f45f62c34c94bbd6e86734eb01a1'
          - '8cda13f8-a407-4a48-8284-411709e090'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0006
techniques:
    - T1555
tags:
    - attack.credential_access.t1555
    - malware.stealer.vipersoftx
author: '@adhikara13'
version: "1"
references:
    - https://labs.k7computing.com/index.php/in-depth-analysis-of-a-2025-vipersoftx-variant/
data_sources:
    - process_creation
    - windows
