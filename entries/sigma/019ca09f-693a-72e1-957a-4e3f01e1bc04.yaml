id: 019ca09f-693a-72e1-957a-4e3f01e1bc04
name: RecordBreaker Stealer Mutex Detection
description: The rule detects the creation of specific mutexes known to be associated with the RecordBreaker stealer. It looks for a mutex named 'iqroq5112542785672901323' during process creation events on Windows systems. The presence of this mutex indicates potential RecordBreaker stealer activity.
query: |-
    title: RecordBreaker Stealer Mutex Detection
    status: experimental
    description: Detects known mutexes associated with RecordBreaker stealer activity.
    author: '@adhikara13'
    date: 2024/07/16
    references:
      - 'https://any.run/cybersecurity-blog/raccoon-stealer-v2-malware-analysis/'
    tags:
      - 'attack.credential_access.t1555'
      - 'malware.stealer.recordbreaker'
    logsource:
      category: process_creation
      product: windows
    detection:
      selection:
        MutexName:
          - 'iqroq5112542785672901323'
      condition: selection
    falsepositives:
      - 'Legitimate applications using similar mutex names (unlikely for these specific strings)'
    level: critical
query_type: sigma
severity: critical
tactics:
    - TA0006
techniques:
    - T1555
tags:
    - attack.credential_access.t1555
    - malware.stealer.recordbreaker
author: '@adhikara13'
version: "1"
