id: 019c8dd8-1145-7787-b21d-47dd23ca6b7c
name: OpenClaw Suspicious Download and Execute Pattern
description: Detects a pattern associated with the 'ClawHavoc' campaign where processes related to the OpenClaw AI framework download and immediately execute content from the internet. This is often seen in malicious 'prerequisite' or 'setup' scripts exploiting CVE-2026-25253.
query: |
    title: OpenClaw Suspicious Download and Execute Pattern
    id: b70924be-98e3-478e-83d8-939d8b4698b9
    status: experimental
    description: Detects a pattern associated with the 'ClawHavoc' campaign where
      processes related to the OpenClaw AI framework download and immediately
      execute content from the internet. This is often seen in malicious
      'prerequisite' or 'setup' scripts exploiting CVE-2026-25253.
    author: detections.ai
    references:
      - https://flare.io/learn/resources/blog/widespread-openclaw-exploitation
    date: 2026-02-24
    tags:
      - attack.t1059.001
      - attack.t1059.004
      - attack.t1588.006
      - attack.t1203
      - cve.2026.25253
    logsource:
      category: process_creation
      product: windows
    detection:
      parent:
        # Parent process is a known interpreter used by OpenClaw
        ParentImage|endswith:
          - '/python'
          - '/python3'
          - '\python.exe'
          - '\python3.exe'
          - '/node'
          - '\node.exe'
      downloader:
        # Looks for common download utilities in the command line
        CommandLine|contains:
          - 'curl '
          - 'wget '
      executor:
        # Looks for patterns that pipe the downloaded content directly into an interpreter
        CommandLine|contains:
          - '| bash'
          - '| sh'
          - '| zsh'
          - '| python'
      condition: parent and downloader and executor
    falsepositives:
      - Legitimate software installation, automation, or update scripts may use
        similar patterns to download and execute components. Tuning may be required
        to exclude known good scripts or sources.
    level: high
query_type: sigma
severity: high
tactics:
    - TA0002
    - TA0042
techniques:
