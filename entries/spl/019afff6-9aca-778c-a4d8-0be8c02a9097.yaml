id: 019afff6-9aca-778c-a4d8-0be8c02a9097
name: AWS IAM Principal Creation Followed by Policy Attachment
description: Detects when a new AWS IAM Principal (User, Role, or Group) is created and then has a policy attached to it by the same actor within a 10-minute time frame. This sequence is a suspicious TTP often used by attackers to provision a new, privileged "shadow" account or role for persistence and lateral movement, bypassing existing accounts or role assumption paths.
query: "```\r\nauthor: Tayvion P. (@tayontech)\r\n\r\ndescription: \r\nDetects when a new AWS IAM Principal (User, Role, or Group) is created and then \r\nhas a policy attached to it by the same actor within a 10 minute time frame. \r\nThis sequence is a suspicious TTP often used by attackers to provision a new, privileged \"shadow\" account \r\nor role for persistence and lateral movement, bypassing existing accounts or role assumption paths.\r\n\r\nUpdate: Detection has been tuned to identify managed & inline policies that may contain privilege escaltion permssions.\r\n\r\ntags:\r\n  - attack.persistence\r\n  - attack.privilege_escalation\r\n  - attack.t1136 \r\n  - attack.t1098 \r\n```\r\n\r\nindex=cloudtrail eventSource=\"iam.amazonaws.com\"\r\n eventName IN (\r\n  \"CreateUser\",\"CreateRole\",\"CreateGroup\",\"CreateServiceLinkedRole\",\r\n  \"AttachUserPolicy\",\"AttachRolePolicy\",\"AttachGroupPolicy\",\r\n  \"PutUserPolicy\",\"PutRolePolicy\",\"PutGroupPolicy\",\r\n  \"AddUserToGroup\"\r\n  )\r\n\r\n  | eval target_principal = coalesce('requestParameters.userName','requestParameters.roleName','requestParameters.groupName')\r\n\r\n  | eval action_type = case(\r\n      eventName IN (\"CreateUser\",\"CreateRole\",\"CreateGroup\",\"CreateServiceLinkedRole\"), \"principal_create\",\r\n      eventName IN (\"AttachUserPolicy\",\"AttachRolePolicy\",\"AttachGroupPolicy\",\"PutUserPolicy\",\"PutRolePolicy\",\"PutGroupPolicy\",\"AddUserToGroup\"), \"priv_assign\",\r\n      true(), \"other\"\r\n  )\r\n\r\n  | sort 0 userIdentity.accountId target_principal _time\r\n  | streamstats current=f last(action_type) as prev_action_type last(_time) as prev_action_time\r\n    by userIdentity.accountId, target_principal\r\n  | eval seconds_since_prev = _time - prev_action_time\r\n\r\n  | where action_type=\"priv_assign\"\r\n    AND prev_action_type=\"principal_create\"\r\n    AND seconds_since_prev<=600\r\n\r\n  | eval attach_kind = case(\r\n      eventName IN (\"AttachUserPolicy\",\"AttachRolePolicy\",\"AttachGroupPolicy\"), \"policy_arn_attach\",\r\n      eventName IN (\"PutUserPolicy\",\"PutRolePolicy\",\"PutGroupPolicy\"), \"inline_policy_put\",\r\n      eventName=\"AddUserToGroup\", \"group_membership\",\r\n      true(), \"other\"\r\n  )\r\n\r\n  | eval inline_policy = if(\r\n      attach_kind=\"inline_policy_put\",\r\n      coalesce(urldecode('requestParameters.policyDocument'), 'requestParameters.policyDocument'),\r\n      null()\r\n  )\r\n  | eval inline_policy = if(attach_kind=\"inline_policy_put\", replace(inline_policy, \"\\\\\\\\\\\"\", \"\\\"\"), inline_policy)\r\n\r\n  | eval policy_identifier = case(\r\n      attach_kind=\"policy_arn_attach\", 'requestParameters.policyArn',\r\n      attach_kind=\"inline_policy_put\", inline_policy,\r\n      attach_kind=\"group_membership\", 'requestParameters.groupName',\r\n      true(), null()\r\n  )\r\n\r\n  | eval keep_managed = if(\r\n      attach_kind=\"policy_arn_attach\"\r\n      AND match('requestParameters.policyArn', \"(?i)/(admin[^/]*|[^/]*fullaccess[^/]*|[^/]*write[^/]*|[^/]*execution[^/]*|[^/]*poweruser[^/]*)$\"),\r\n      1, 0\r\n  )\r\n  | eval keep_group = if(attach_kind=\"group_membership\", 1, 0)\r\n\r\n  | eval keep_inline=0\r\n  | appendpipe [\r\n      | where attach_kind=\"inline_policy_put\"\r\n\r\n      | eval raw_action_star   = if(match(inline_policy,\"\\\"Action\\\"\\\\s*:\\\\s*\\\"\\\\*\\\"\"), 1, 0)\r\n      | eval raw_resource_star = if(match(inline_policy,\"\\\"Resource\\\"\\\\s*:\\\\s*\\\"\\\\*\\\"\"), 1, 0)\r\n\r\n      | spath input=inline_policy path=Statement{} output=stmt\r\n      | eval spath_ok = if(isnotnull(stmt), 1, 0)\r\n      | eval stmt = if(spath_ok=1, stmt, \"{\\\"Action\\\":\\\"__UNPARSEABLE__\\\"}\")\r\n      | mvexpand stmt\r\n\r\n      | spath input=stmt path=Action{} output=actions_mv\r\n      | spath input=stmt path=Action  output=action_single\r\n      | eval actions = coalesce(actions_mv, action_single)\r\n\r\n      | spath input=stmt path=NotAction{} output=notactions_mv\r\n      | spath input=stmt path=NotAction  output=notaction_single\r\n      | eval notactions = coalesce(notactions_mv, notaction_single)\r\n\r\n      | spath input=stmt path=Resource{} output=resources_mv\r\n      | spath input=stmt path=Resource  output=resource_single\r\n      | eval resources = coalesce(resources_mv, resource_single)\r\n\r\n      | spath input=stmt path=Condition output=condition\r\n\r\n      | eval actions=mvjoin(actions,\",\")\r\n      | eval resources=mvjoin(resources,\",\")\r\n\r\n      | eval has_wild_action   = if(like(actions,\"%*%\") OR raw_action_star=1, 1, 0)\r\n      | eval has_star_resource = if(like(resources,\"%*%\") OR raw_resource_star=1, 1, 0)\r\n      | eval has_notaction     = if(isnotnull(notactions), 1, 0)\r\n      | eval has_condition     = if(isnotnull(condition), 1, 0)\r\n\r\n      | eval priv_escalation_perms = if(\r\n          match(\r\n              actions,\r\n              \"(?i)^(iam|sts|organizations|kms):.*(Create|Put|Attach|Set|Update|Add|Delete|AssumeRole|PassRole)\"\r\n          ),\r\n          1, 0\r\n      )\r\n\r\n      | eval keep_inline = if(\r\n          priv_escalation_perms=1\r\n          OR has_notaction=1\r\n          OR (has_wild_action=1 AND has_star_resource=1 AND has_condition=0),\r\n          1, 0\r\n      )\r\n      | where keep_inline=1\r\n\r\n      | eval keep_managed=0, keep_group=0\r\n  ]\r\n\r\n  | where keep_managed=1 OR keep_inline=1 OR keep_group=1\r\n\r\n  | stats\r\n      min(_time) as initial_detection_time\r\n      values(sourceIPAddress) as sourceip\r\n      values(eventName) as action\r\n      values(target_principal) as principal_created\r\n      values(policy_identifier) as policy_attached\r\n      values(userAgent) as useragent\r\n      values(userIdentity.accountId) as cloudaccount\r\n    by userIdentity.arn\r\n\r\n  | eval initial_detection_time = strftime(initial_detection_time, \"%F %T %Z\")"
