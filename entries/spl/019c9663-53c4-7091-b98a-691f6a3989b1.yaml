id: 019c9663-53c4-7091-b98a-691f6a3989b1
name: Contagious Interview IDE Tasks Abuse (VS Code and Cursor)
description: Detects signs that VS Code or Cursor were used to run unwanted commands by monitoring changes to `.vscode\tasks.json` or `.cursor\tasks.json`, and identifying cases where the IDE starts a shell or download tool with suspicious download links or script execution patterns. It also includes a network pivot to link related staging URLs to host activity and possible payload delivery.
query: "/* \nContagious Interview VS Code and Cursor tasks infection chains (Splunk SPL)\nAuthor: Daniel Jeremiah\nDate: 2026-02-24\nReference: https://www.abstract.security/blog/contagious-interview-evolution-of-vscode-and-cursor-tasks-infection-chains\n*/\n\n(\n  (\n    (sourcetype=XmlWinEventLog:Microsoft-Windows-Sysmon/Operational OR sourcetype=*edr* OR sourcetype=*process*)\n    (\n      ParentImage=\"*\\\\Code.exe\" OR ParentImage=\"*\\\\cursor.exe\" OR parent_process_name=\"Code.exe\" OR parent_process_name=\"cursor.exe\"\n      OR Image=\"*\\\\Code.exe\" OR Image=\"*\\\\cursor.exe\" OR process_name=\"Code.exe\" OR process_name=\"cursor.exe\"\n    )\n  )\n  OR\n  (\n    (sourcetype=XmlWinEventLog:Microsoft-Windows-Sysmon/Operational OR sourcetype=*edr* OR sourcetype=*file*)\n    (EventCode=11 OR action IN (\"FileCreated\",\"FileModified\",\"FileWrite\",\"Created\",\"Modified\"))\n  )\n  OR\n  (\n    sourcetype=*proxy* OR sourcetype=*zscaler* OR sourcetype=*bluecoat* OR sourcetype=*squid* OR sourcetype=*pan:traffic*\n  )\n)\n| eval host_id=coalesce(dest,host,Computer,DeviceName),\n       user_id=coalesce(user,User,AccountName,InitiatingProcessAccountName),\n       image=coalesce(Image,process,ProcessName,process_name),\n       parent=coalesce(ParentImage,parent_process,ParentProcessName,parent_process_name),\n       cmd=coalesce(CommandLine,process_command_line,cmdline,ProcessCommandLine),\n       fp=coalesce(TargetFilename,file_path,FilePath,filepath,object_path),\n       url=coalesce(url,uri,request,cs_uri,request_url,http_url,RemoteUrl)\n| eval is_tasks_file=if(like(lower(fp),\"%\\\\.vscode\\\\tasks.json\") OR like(lower(fp),\"%\\\\.cursor\\\\tasks.json\"),1,0)\n| eval is_ide_parent=if(like(parent,\"%\\\\Code.exe\") OR like(parent,\"%\\\\cursor.exe\"),1,0)\n| eval is_susp_child=if(\n    like(lower(image),\"%\\\\powershell.exe\") OR like(lower(image),\"%\\\\pwsh.exe\") OR like(lower(image),\"%\\\\cmd.exe\")\n    OR like(lower(image),\"%\\\\bash%\") OR like(lower(image),\"%\\\\sh%\") OR like(lower(image),\"%\\\\zsh%\")\n    OR like(lower(image),\"%\\\\wscript.exe\") OR like(lower(image),\"%\\\\cscript.exe\") OR like(lower(image),\"%\\\\mshta.exe\")\n    OR like(lower(image),\"%\\\\curl.exe\") OR like(lower(image),\"%\\\\wget.exe\") OR like(lower(image),\"%\\\\node.exe\")\n  ,1,0)\n| eval has_staging=if(\n    like(lower(cmd),\"%gist.githubusercontent.com%\")\n    OR like(lower(cmd),\"%short.gy%\")\n    OR like(lower(cmd),\"%drive.google.com/file/d/%\")\n    OR like(lower(cmd),\"%driveusercontent.google.com/download%\")\n    OR like(lower(cmd),\"%.vercel.app%\")\n    OR like(lower(cmd),\"%| bash%\")\n    OR like(lower(cmd),\"%invoke-webrequest%\")\n    OR like(lower(cmd),\"%iwr%\")\n    OR like(lower(cmd),\"%iex(%\")\n    OR like(lower(url),\"%gist.githubusercontent.com%\")\n    OR like(lower(url),\"%short.gy%\")\n    OR like(lower(url),\"%drive.google.com/file/d/%\")\n    OR like(lower(url),\"%driveusercontent.google.com/download%\")\n    OR like(lower(url),\"%.vercel.app%\")\n  ,1,0)\n| eval match_type=case(\n    is_tasks_file=1, \"tasks_file_modified_or_created\",\n    is_ide_parent=1 AND is_susp_child=1 AND has_staging=1, \"ide_spawns_shell_or_downloader_with_staging\",\n    has_staging=1 AND is_ide_parent=0, \"staging_in_proxy_or_cmdline\",\n    is_ide_parent=1 AND is_susp_child=1, \"ide_spawns_shell_or_downloader\",\n    1=1, \"other\"\n)\n| where match_type!=\"other\"\n| stats\n    count\n    min(_time) as firstSeen\n    max(_time) as lastSeen\n    values(host_id) as host\n    values(user_id) as user\n    values(match_type) as match_type\n    values(parent) as parent_process\n    values(image) as process\n    values(cmd) as command_line\n    values(fp) as file_path\n    values(url) as url\n    values(sourcetype) as sourcetype\n  by host_id\n| convert ctime(firstSeen) ctime(lastSeen)\n| sort - lastSeen"
query_type: spl
severity: medium
tags:
    - spl
author: Daniel Jeremiah
version: "8"
references:
    - Detects signs that VS Code or Cursor were used to run unwanted commands by monitoring changes to `.vscode\tasks.json` or `.cursor\tasks.json`, and identifying cases where the IDE starts a shell or download tool with suspicious download links or script execution patterns. It also includes a network pivot for related staging URLs to help link host activity to possible payload delivery.
