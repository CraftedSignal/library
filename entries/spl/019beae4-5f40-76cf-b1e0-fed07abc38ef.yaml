id: 019beae4-5f40-76cf-b1e0-fed07abc38ef
name: Python-Based APC Injection for AsyncRAT
description: Detects the execution of a Python script with a specific command-line pattern used to inject AsyncRAT into memory. The pattern involves an input binary file, a key file argument, and a text file containing the key. This behavior is associated with a multi-stage AsyncRAT campaign.
query: "`Detection: Python-Based APC Injection for AsyncRAT - Author: Parth Parmar - MITRE ATT&CK: T1055.004, T1027.002 - References: https://www.trendmicro.com/en_us/research/26/a/analyzing-a-a-multi-stage-asyncrat-campaign-via-mdr.html`\nindex=*\n  (sourcetype=\"WinEventLog:Microsoft-Windows-Sysmon/Operational\" OR sourcetype=\"WinEventLog:Security\" OR sourcetype=\"WinEventLog:System\" OR sourcetype=\"WinEventLog:Application\" OR sourcetype=WinRegistry OR sourcetype=WinHostMon OR sourcetype=\"ms:aad:signin\" OR sourcetype=\"XmlWinEventLog:Microsoft-Windows-Sysmon/Operational\" OR sourcetype=\"XmlWinEventLog:Security\" OR sourcetype=\"XmlWinEventLog:System\" OR sourcetype=\"XmlWinEventLog:Application\" OR sourcetype=\"WinEventLog:ForwardedEvents\") \n  Image=\"*\\\\python.exe\" AND CommandLine=\"*.py*\" AND CommandLine=\"*.bin*\" AND CommandLine=\"*-k*\" AND CommandLine=\"*.txt*\" AND ImagePath=\"C:\\\\Users\\\\*\\\\AppData\\\\Local\\\\*\" \n  NOT (ImagePath=\"C:\\\\Program Files\\\\*\" OR ImagePath=\"C:\\\\Python\\\\*\" OR ImagePath=\"C:\\\\ProgramData\\\\*\")"
query_type: spl
severity: medium
tactics:
    - TA0002
    - TA0005
    - TA0004
techniques:
    - T1059.006
    - T1055.004
    - T1027.002
tags:
    - spl
author: Parth Parmar
version: "2"
references:
    - https://www.trendmicro.com/en_us/research/26/a/analyzing-a-a-multi-stage-asyncrat-campaign-via-mdr.html
