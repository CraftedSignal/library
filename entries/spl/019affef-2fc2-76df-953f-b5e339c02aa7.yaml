id: 019affef-2fc2-76df-953f-b5e339c02aa7
name: AWS IAM Policy Modification and Immediate Attachment
description: Detects a sequence of events where an AWS IAM Policy is modified or created and then immediately attached to a principal (user, role, or group) within a short time window (10 minutes). This behavior is highly suspicious and often indicates a rapid privilege escalation attempt or a lateral movement step where an attacker grants themselves new permissions for immediate use.
query: "```\r\nauthor: Tayvion P. (@tayontech)\r\n\r\ndescription: \r\nDetects a sequence of events where an AWS IAM Policy is modified or created and then immediately attached to a principal within a short time window. \r\nThis behavior is highly suspicious and often indicates a rapid privilege escalation attempt or a lateral movement step where an attacker grants \r\nthemselves new permissions for immediate use.\r\n\r\nUpdate: Detection has been tuned to identify managed & inline policies that may contain privilege escaltion permssions.\r\n\r\ntags:\r\n  - attack.privilege_escalation\r\n  - attack.defense_evasion\r\n  - attack.t1098 \r\n  - attack.t1562.001 \r\n```\r\nindex=\"cloudtrail\" eventSource=\"iam.amazonaws.com\"\r\neventName IN (\r\n  \"CreatePolicy\",\"CreatePolicyVersion\",\"SetDefaultPolicyVersion\",\"DeletePolicyVersion\",\r\n  \"AttachUserPolicy\",\"AttachRolePolicy\",\"AttachGroupPolicy\",\r\n  \"PutUserPolicy\",\"PutRolePolicy\",\"PutGroupPolicy\"\r\n)\r\n\r\n\r\n| eval action_type = case(\r\n    eventName IN (\"CreatePolicy\",\"CreatePolicyVersion\",\"SetDefaultPolicyVersion\",\"DeletePolicyVersion\"), \"policy_change\",\r\n    eventName IN (\"AttachUserPolicy\",\"AttachRolePolicy\",\"AttachGroupPolicy\",\"PutUserPolicy\",\"PutRolePolicy\",\"PutGroupPolicy\"), \"policy_attach\",\r\n    true(), \"other\"\r\n)\r\n\r\n| eval attach_kind = case(\r\n    eventName IN (\"AttachUserPolicy\",\"AttachRolePolicy\",\"AttachGroupPolicy\"), \"policy_arn_attach\",\r\n    eventName IN (\"PutUserPolicy\",\"PutRolePolicy\",\"PutGroupPolicy\"), \"inline_policy_put\",\r\n    true(), \"other\"\r\n)\r\n\r\n| eval policy_identifier = case(\r\n    attach_kind=\"policy_arn_attach\", 'requestParameters.policyArn',\r\n    attach_kind=\"inline_policy_put\", coalesce(urldecode('requestParameters.policyDocument'), 'requestParameters.policyDocument'),\r\n    true(), null()\r\n)\r\n\r\n| eval policy_arn = coalesce('requestParameters.policyArn','responseElements.policy.arn')\r\n| where isnotnull(policy_arn)\r\n\r\n| sort 0 userIdentity.accountId policy_arn _time\r\n| streamstats current=f last(action_type) as prev_action_type last(_time) as prev_action_time\r\n  by userIdentity.accountId, policy_arn\r\n| eval seconds_since_prev = _time - prev_action_time\r\n\r\n| eval is_managed_chain = if(\r\n    attach_kind=\"policy_arn_attach\"\r\n    AND action_type=\"policy_attach\"\r\n    AND prev_action_type=\"policy_change\"\r\n    AND seconds_since_prev<=600,\r\n    1, 0\r\n)\r\n\r\n| eval keep_managed = if(\r\n    is_managed_chain=1\r\n    AND match(\r\n        'requestParameters.policyArn',\r\n        \"(?i)/(admin[^/]*|[^/]*fullaccess[^/]*|[^/]*write[^/]*|[^/]*execution[^/]*|[^/]*poweruser[^/]*)$\"\r\n    ),\r\n    1, 0\r\n)\r\n\r\n| eval keep_inline=0\r\n| appendpipe [\r\n    | where attach_kind=\"inline_policy_put\"\r\n\r\n    | eval raw_action_star   = if(match(policy_identifier,\"\\\"Action\\\"\\\\s*:\\\\s*\\\"\\\\*\\\"\"), 1, 0)\r\n    | eval raw_resource_star = if(match(policy_identifier,\"\\\"Resource\\\"\\\\s*:\\\\s*\\\"\\\\*\\\"\"), 1, 0)\r\n\r\n    | spath input=policy_identifier path=Statement{} output=stmt\r\n    | eval spath_ok = if(isnotnull(stmt), 1, 0)\r\n    | eval stmt = if(spath_ok=1, stmt, \"{\\\"Action\\\":\\\"__UNPARSEABLE__\\\"}\")\r\n    | mvexpand stmt\r\n\r\n    | spath input=stmt path=Action{} output=actions_mv\r\n    | spath input=stmt path=Action  output=action_single\r\n    | eval actions = coalesce(actions_mv, action_single)\r\n\r\n    | spath input=stmt path=NotAction{} output=notactions_mv\r\n    | spath input=stmt path=NotAction  output=notaction_single\r\n    | eval notactions = coalesce(notactions_mv, notaction_single)\r\n\r\n    | spath input=stmt path=Resource{} output=resources_mv\r\n    | spath input=stmt path=Resource  output=resource_single\r\n    | eval resources = coalesce(resources_mv, resource_single)\r\n\r\n    | spath input=stmt path=Condition output=condition\r\n\r\n    | eval actions=mvjoin(actions,\",\")\r\n    | eval resources=mvjoin(resources,\",\")\r\n\r\n    | eval has_wild_action   = if(like(actions,\"%*%\") OR raw_action_star=1, 1, 0)\r\n    | eval has_star_resource = if(like(resources,\"%*%\") OR raw_resource_star=1, 1, 0)\r\n    | eval has_notaction     = if(isnotnull(notactions), 1, 0)\r\n    | eval has_condition     = if(isnotnull(condition), 1, 0)\r\n\r\n    | eval priv_escalation_perms = if(\r\n        match(\r\n            actions,\r\n            \"(?i)^(iam|sts|organizations|kms):.*(Create|Put|Attach|Set|Update|Add|Delete|AssumeRole|PassRole)\"\r\n        ),\r\n        1, 0\r\n    )\r\n\r\n    | eval keep_inline = if(\r\n        priv_escalation_perms=1\r\n        OR has_notaction=1\r\n        OR (has_wild_action=1 AND has_star_resource=1 AND has_condition=0),\r\n        1, 0\r\n    )\r\n    | where keep_inline=1\r\n\r\n    | eval keep_managed=0, is_managed_chain=0\r\n]\r\n\r\n| where keep_managed=1 OR keep_inline=1\r\n\r\n| eval target_principal = coalesce('requestParameters.userName','requestParameters.roleName','requestParameters.groupName')\r\n\r\n| stats\r\n    min(_time) as initial_detection_time\r\n    values(sourceIPAddress) as sourceip\r\n    values(eventName) as action\r\n    values(target_principal) as target_principal\r\n    values(policy_identifier) as policy_attached\r\n    values(userAgent) as useragent\r\n    values(userIdentity.accountId) as cloud_account\r\n  by userIdentity.arn\r\n\r\n| eval initial_detection_time = strftime(initial_detection_time, \"%F %T %Z\")"
