id: 019b06c7-03a3-72ac-a9c8-11b0482d8db7
name: 'Linux Network Connection Discovery '
description: "Behavior is tied to enumeration of network services, relating to the discovery tactic.\nWhere \"network_connection_discovery`\"is a lookup table of “ifconfig.me” and related services "
query: "```\ndescription: \nBehavior is tied to enumeration of network services, relating to the discovery tactic.\nWhere `network_connection_discovery` is a lookup table of “ifconfig.me” and related services \n```\n\nindex=linux_process\n| spath input=_raw\n| fields host_name user_name parent_process_command_line process_command_line process_path\n| rex field=process_command_line\n“(?P<domain>(?:https?://)?(?:[\\w-]+\\.)*[\\w-]+\\.(com|net|org|io|xyz|dev|app|co|ru|cn|uk|de|fr)(?:/|:|\\s|$))”\n\n| lookup network_connection_discovery domain AS domain OUTPUT process_command_line\n| stats \n    count(process_command_line) AS process_count \n    values(domain) AS domains \n    dc(domain) AS unique_domains\n    BY host_name user_name\n    ```keep only “suspiciously” frequent commands```\n| where process_count > 5\t\t\t\n| table host_name user_name process_count\n"
