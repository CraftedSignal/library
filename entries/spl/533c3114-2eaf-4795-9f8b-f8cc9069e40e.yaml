id: 533c3114-2eaf-4795-9f8b-f8cc9069e40e
name: 'Emails with attached Windows Shortcut (.lnk) files '
description: |-
    This search will find all inbound emails with attachments with filenames ending .lnk, indicative of a Windows Shortcut file.
    This has been observed in the Serpentin#Cloud campaign
query: "index=\"email\" file_name=\"*.lnk\" Direction=inbound\r\n| eval Timestamp=strftime(_time,\"%Y-%m-%d %H:%M:%S:%Q\")\r\n| stats earliest(Timestamp) as earliest latest(Timestamp) as latest values(file_name) as file_name values(action) as action values(recipient) as recipient values(subject) as subject count by sender"
query_type: spl
severity: medium
tactics:
    - TA0001
techniques:
    - T1566.001
tags:
    - email
    - serpentine#cloud
    - lnk_file
    - spl
author: Salten Fisk
version: "1"
references:
    - https://www.securonix.com/blog/analyzing_serpentinecloud-threat-actors-abuse-cloudflare-tunnels-threat-research/
