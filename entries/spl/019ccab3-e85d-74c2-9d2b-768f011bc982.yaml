id: 019ccab3-e85d-74c2-9d2b-768f011bc982
name: Malicious udev Rule for Persistence
description: Detects the creation or modification of udev rules that execute suspicious commands or scripts from unusual locations. Udev rules are used by the Linux kernel device manager to handle hardware events and can be abused for persistence.
query: "` Detects malicious udev rules for persistence, udev functions as a middleman between user space and the kernel level `\nindex=linux_auditd\nProcesses.original_file_name IN (\"*/etc/udev/rules.d/*\", \"*/run/udev/rules.d/*\", \"*/usr/lib/udev/rules.d/*\") \nProcesses.original_file_name=\"*.rules\" Processes.process IN (\"*RUN+=*\", \"*/tmp/*\", \"*/dev/shm/*\", \"*bash -c*\")"
query_type: spl
severity: medium
tactics:
    - TA0003
    - TA0004
techniques:
    - T1546.017
tags:
    - spl
author: zendannyy
version: "1"
references:
    - 'https://www.elastic.co/security-labs/sequel-on-persistence-mechanisms tags:'
