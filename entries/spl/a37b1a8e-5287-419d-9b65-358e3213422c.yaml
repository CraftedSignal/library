id: a37b1a8e-5287-419d-9b65-358e3213422c
name: Suspicious Command Execution Associated with ClickFix
description: |
    Detects suspicious command-line activity associated with the "ClickFix" social engineering technique.
    Threat actors trick users into pasting and executing malicious commands that typically use scripting engines or built-in utilities to download and run subsequent payloads.
    This rule identifies patterns seen in recent NetSupport RAT, Latrodectus, and Lumma Stealer campaigns using this vector.
query: (Image="*\\mshta.exe" CommandLine="*http*") OR (Image IN ("*\\powershell.exe", "*\\pwsh.exe") CommandLine IN ("*http*", "*IEX*", "*Invoke-Expression*", "*DownloadString*", "*DownloadFile*", "* -e *", "* -enc *")) OR (Image="*\\curl.exe" CommandLine IN ("*http*", "*.live*", "*r2.dev*")) OR (Image="*\\cscript.exe" CommandLine IN ("*.txt*", "*.js*")) OR (Image="*\\findstr.exe" ParentImage="*\\cmd.exe" CommandLine IN ("*opssvc*", "*wrsa*", "*bdservicehost*", "*SophosHealth*", "*AvastUI*", "*AVGUI*", "*nsWscSvc*", "*ekrn*"))
query_type: spl
severity: medium
tags:
    - spl
author: '@AaronMogS2S'
version: "1"
