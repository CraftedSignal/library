id: 019ca129-7cb1-7233-8bc9-d9ee02c0f7a1
name: Cisco Catalyst SD-WAN CVE-2026-20127 Hunt
description: 'This rule detects potential indicators of compromise related to CVE-2026-20127 in Cisco Catalyst SD-WAN systems. It focuses on two main areas: 1) suspicious successful SSH authentications for the ''vmanage-admin'' account, and 2) SD-WAN control plane connection events indicating a new ''up'' state. The first part looks for specific log entries related to publickey authentication for ''vmanage-admin'' from any source IP. The second part identifies control connection state changes to ''up'' and extracts peer type, peer system IP, and public IP from the raw logs. The rule aims to surface events that require human confirmation by comparing them against known network designs and change records, as these events can indicate unexpected relationships between devices or unauthorized privileged access.'
query: |+
    ## Cisco Catalyst SD-WAN CVE-2026-20127 hunts (Splunk SPL)
    ## Author: Daniel Jeremiah
    ## Date: 2026-02-27
    ## Refs:

    ## Description:
    ## These queries help you review the most important signs of potential compromise for Cisco
    ## Catalyst SD WAN systems discussed in guidance for CVE 2026 20127. They focus on successful
    ## privileged access and on control plane connection events that may indicate an unexpected
    ## relationship between devices. In many environments there are only a few legitimate sources for
    ## this kind of access, which makes these checks useful and usually low noise. If you see results,
    ## confirm the device is in scope, then compare the source address, device role, and timing against
    ## your known network design and change records. If you cannot explain the activity, treat it as
    ## suspicious: restrict management access, preserve logs, and review what changed afterwards. The
    ## goal is to surface exactly the events that require human confirmation in a clear, repeatable
    ## way.

    ## - https://www.rapid7.com/blog/post/etr-critical-cisco-catalyst-vulnerability-exploited-in-the-wild-cve-2026-20127
    ## - https://sec.cloudapps.cisco.com/security/center/content/CiscoSecurityAdvisory/cisco-sa-sdwan-rpa-EHchtZk

    ### 1) auth.log: suspicious SSH acceptance for vmanage-admin
    (index=os OR index=network OR index=sdwan OR index=linux) ("Accepted publickey for vmanage-admin from")
    | stats count min(_time) as first_seen max(_time) as last_seen values(host) as hosts values(source) as sources values(_raw) as examples by src_ip
    | convert ctime(first_seen) ctime(last_seen)

    ### 2) SD-WAN peering events (control-connection-state-change up)
    (index=network OR index=sdwan) ("control-connection-state-change" AND "new-state:up" AND "peer-type:")
    | rex field=_raw "peer-type:(?<peer_type>[^\\s]+)"
    | rex field=_raw "peer-system-ip:(?<peer_system_ip>[^\\s]+)"
    | rex field=_raw "public-ip:(?<public_ip>[^\\s]+)"
    | stats count min(_time) as first_seen max(_time) as last_seen values(_raw) as examples by host peer_type peer_system_ip public_ip
    | convert ctime(first_seen) ctime(last_seen)

query_type: spl
