id: 019c94c2-5e5a-779b-b431-0a23a3e4ba2e
name: CVE-2026-2329 Hunt
description: This rule detects HTTP requests targeting the '/cgi-bin/api.values.get' endpoint with a 'request' parameter, which is indicative of exploitation attempts for CVE-2026-2329 in Grandstream GXP1600 series IP phones. This vulnerability allows for information disclosure.
query: "/* \nGrandstream GXP1600 CVE-2026-2329 hunt\nAuthor: Daniel Jeremiah\nDate: 2026-02-24\nReference: https://www.rapid7.com/blog/post/ve-cve-2026-2329-critical-unauthenticated-stack-buffer-overflow-in-grandstream-gxp1600-voip-phones-fixed/\n*/\n\n(index=* sourcetype=*)\n(\n  (uri_path=\"/cgi-bin/api.values.get\" OR url_path=\"/cgi-bin/api.values.get\" OR path=\"/cgi-bin/api.values.get\" OR cs_uri_stem=\"/cgi-bin/api.values.get\" OR url=\"*/cgi-bin/api.values.get*\")\n  AND\n  (\n    uri_query=\"*request=*\"\n    OR url_query=\"*request=*\"\n    OR query_string=\"*request=*\"\n    OR cs_uri_query=\"*request=*\"\n    OR url=\"*request=*\"\n  )\n)\n| eval endpoint=coalesce(uri_path,url_path,path,cs_uri_stem)\n| eval q=coalesce(uri_query,url_query,query_string,cs_uri_query)\n| stats count min(_time) as firstSeen max(_time) as lastSeen values(host) as host values(src_ip) as src_ip values(dest_ip) as dest_ip values(http_method) as http_method values(status) as status values(url) as url values(q) as query values(user_agent) as user_agent values(sourcetype) as sourcetype by endpoint\n| convert ctime(firstSeen) ctime(lastSeen)\n| sort - lastSeen"
query_type: spl
severity: medium
tags:
    - spl
version: "4"
