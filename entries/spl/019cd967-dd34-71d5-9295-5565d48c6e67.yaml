id: 019cd967-dd34-71d5-9295-5565d48c6e67
name: Scheduled Task Launches VBScript from Suspicious Directory
description: This detection rule identifies a persistence mechanism observed in the Dead#Vax campaign. It detects the Windows Script Host (wscript.exe) being launched by the Task Scheduler engine (taskeng.exe or svchost.exe) to execute a VBScript from a suspicious, user-writable directory such as AppData or a specific ProgramData path like 'ProgramData\IntelDriver'. This behavior is indicative of malicious persistence.
query: |
    `comment: This detection rule identifies a persistence mechanism observed in the Dead#Vax campaign. It detects the Windows Script Host (wscript.exe) being launched by the Task Scheduler engine to execute a VBScript from a suspicious, user-writable directory.`

    | tstats `security_content_summariesonly` count min(_time) as firstTime max(_time) as lastTime from datamodel=Endpoint.Processes where (Processes.process_name="wscript.exe") AND (Processes.parent_process_name="taskeng.exe" OR Processes.parent_process_name="svchost.exe") by Processes.dest Processes.user Processes.parent_process_name Processes.process_name Processes.process
    | `drop_dm_object_name(Processes)`

    `comment: Filter for command-lines that indicate a VBS file is being run from AppData or the specific ProgramData path used by the malware.`
    | search (process="*.vbs*" AND (process="*AppData*" OR process="*ProgramData\\IntelDriver*"))

    `comment: Format the output for readability and include key fields for investigation.`
    | table firstTime, lastTime, dest, user, parent_process_name, process_name, process, count

    `comment: FP Tuning: Legitimate applications may use scheduled tasks to run VBS scripts from AppData for updates or maintenance. If false positives occur, you may need to add exclusions for known legitimate script paths or parent processes.`
    | `suspicious_scheduled_task_vbs_launcher_filter`
query_type: spl
severity: medium
tactics:
    - TA0002
    - TA0003
    - TA0004
    - TA0005
techniques:
