id: 019c4f32-a5f6-701b-b6e0-6bf46fa599c2
name: PowerShell Long Obfuscated Commands
description: Detects PowerShell command lines that exceed a certain length of characters or more, which may indicate obfuscated or automated malicious activity. It also specifically looks for common PowerShell download and execution patterns within the command line.
query: |
    ``` Detects PowerShell command lines that exceed a certain length, which may indicate obfuscated or automated malicious activity. ```

    index=sysmon
    Image IN ("*powershell.exe", "*pwsh*") OR CommandLine IN ("*.downloadstring(*", "*.downloadfile(*", "*;iex(*")
    | regex CommandLine="^.{100,}"
    | table User ParentImage Image ParentCommandLine CommandLine
query_type: spl
severity: medium
techniques:
    - T1059.001
tags:
    - spl
author: zendannyy
version: "1"
