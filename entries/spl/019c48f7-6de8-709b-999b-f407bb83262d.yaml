id: 019c48f7-6de8-709b-999b-f407bb83262d
name: Scheduled Task Creation and Execution with Network Logon
description: This rule detects a sequence of events on a Windows machine that could indicate a scheduled task being created and executed after a network logon. Specifically, it looks for a successful network logon (EventCode 4624, Logon_Type 3) followed by the creation of a scheduled task (EventCode 4698), and then the execution of a process (powershell.exe, pwsh.exe, cmd.exe, wscript.exe, or cscript.exe) that is a child of a scheduled task host process (taskeng.exe, taskhostw.exe, taskhost.exe, or svchost.exe with 'Schedule' in its command line). All these events must occur on the same computer within a 10-minute window.
query: "(\r\n    (index=windows source=WinEventLog:Security EventCode=4624 Logon_Type=3 \r\n        NOT Account_Name IN (\"*$\", \"ANONYMOUS LOGON\"))\r\n    OR \r\n    (index=windows source=WinEventLog:Security EventCode=4698)\r\n    OR \r\n    (index=windows source=WinEventLog:Microsoft-Windows-Sysmon/Operational EventCode=1 \r\n        Image IN (\"*\\\\powershell.exe\", \"*\\\\pwsh.exe\", \"*\\\\cmd.exe\", \"*\\\\wscript.exe\", \"*\\\\cscript.exe\")\r\n        (ParentImage IN (\"*\\\\taskeng.exe\", \"*\\\\taskhostw.exe\", \"*\\\\taskhost.exe\")\r\n         OR (ParentImage=\"*\\\\svchost.exe\" ParentCommandLine=\"*Schedule*\")))\r\n) \r\n| eval UserName=coalesce(Account_Name, User) \r\n| eval event_type=case(\r\n    EventCode=4624, \"network_logon\",\r\n    EventCode=4698, \"task_created\",\r\n    EventCode=1, \"task_execution\"\r\n  ) \r\n| bin _time span=10m \r\n| stats count(eval(event_type=\"network_logon\")) as logons,\r\n        count(eval(event_type=\"task_created\")) as tasks_created,\r\n        count(eval(event_type=\"task_execution\")) as tasks_executed,\r\n        values(eval(if(event_type=\"network_logon\", Account_Name, null()))) as logon_users,\r\n        values(eval(if(event_type=\"network_logon\", Source_Network_Address, null()))) as remote_ip,\r\n        values(eval(if(event_type=\"task_created\", Task_Name, null()))) as task_names,\r\n        values(eval(if(event_type=\"task_execution\", Image, null()))) as executed_images,\r\n        min(_time) as first_event,\r\n        max(_time) as last_event\r\n        by _time, ComputerName \r\n| where logons >= 1 AND tasks_created >= 1 AND tasks_executed >= 1\r\n| eval logon_users=mvfilter(logon_users!=\"-\")\r\n| eval first_event=strftime(first_event, \"%Y-%m-%d %H:%M:%S\"), last_event=strftime(last_event, \"%Y-%m-%d %H:%M:%S\") \r\n| table first_event, last_event, ComputerName, logon_users, remote_ip, task_names, executed_images"
query_type: spl
tags:
    - spl
version: "1"
