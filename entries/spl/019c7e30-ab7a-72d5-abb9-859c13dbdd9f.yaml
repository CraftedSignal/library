id: 019c7e30-ab7a-72d5-abb9-859c13dbdd9f
name: GitHub Programmatic SSH Key Created
description: Detects the addition of an SSH public key to a GitHub account using programmatic access (Personal Access Tokens, OAuth, or GitHub Apps). Unlike keys added via the Web UI, programmatic creation often bypasses manual verification steps and provides long-lived access that survives password resets and MFA changes. This is a common technique for attackers to establish persistent command line access to repositories.
query: "````\r\nAuthor: Tayvion P (@tayontech\r\nDescription: \r\n  Detects the addition of an SSH public key to a GitHub account using programmatic access (Personal Access Tokens, OAuth, or GitHub Apps). Unlike keys added via the Web UI, programmatic creation often bypasses manual verification steps and provides long-lived access that survives password resets and MFA changes. This is a common technique for attackers to establish persistent command line access to repositories.\r\n````\r\nindex=\"github\" action=\"public_key.create\"\r\n| where isnotnull(programmatic_access_type) AND programmatic_access_type!=\"\"\r\n| stats\r\n    min(_time) as initial_detection_time\r\n    values(action) as action\r\n    values(operation_type) as operation_type\r\n    values(title) as token_name\r\n    values(hashed_token) as hashed_token\r\n    values(programmatic_access_type) as programmatic_access_type\r\n    values(token_scopes) as token_scopes\r\n    values(business) as business\r\n    values(user_agent) as useragent\r\n  by actor, token_id\r\n| eval initial_detection_time = strftime(initial_detection_time, \"%F %T %Z\")"
query_type: spl
severity: medium
tactics:
    - TA0003
    - TA0004
    - TA0005
    - TA0001
techniques:
    - T1098
    - T1098.001
    - T1078
    - T1136
tags:
