id: f3363545-1be3-4a8a-8509-01e63a68dc05
name: Detect Local File Inclusion / Remote File Inclusion (LFI/RFI)
description: This rule detects attempts at Local File Inclusion (LFI) or Remote File Inclusion (RFI) vulnerabilities by analyzing web server logs for specific patterns in the request URI. It looks for directory traversal sequences ('../'), attempts to access common sensitive files like '/etc/passwd', or patterns indicating file inclusion via HTTP or file:// protocols.
query: "index=web_logs OR index=waf_logs\r\n(request_uri=\"*\" OR uri_path=\"*\")\r\n| regex request_uri=\"(?i)(\\.\\./|etc/passwd|input=.*http|input=file://)\"\r\n| stats count by src_ip, request_uri, http_user_agent, _time\r\n"
query_type: spl
severity: medium
tactics:
    - TA0001
    - TA0002
    - TA0043
techniques:
    - T1190
    - T1203
    - T1595.002
    - T1595.003
    - DS0015
tags:
    - spl
version: "1"
