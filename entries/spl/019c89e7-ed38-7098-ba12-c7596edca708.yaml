id: 019c89e7-ed38-7098-ba12-c7596edca708
name: CVE-2026-1731 Infrastructure Communication
description: This rule detects network communication to known malicious IP addresses and domains associated with CVE-2026-1731 infrastructure. It correlates network traffic data from the Network_Traffic datamodel (for IP-based communication) and Web datamodel (for domain-based communication) to identify connections to these indicators of compromise (IOCs). The rule specifically looks for outbound connections to a predefined list of IP addresses and domains, including those that might be used for OAST (Out-of-Band Application Security Testing) services, which can be abused by attackers.
query: |-
    /* CVE-2026-1731 Infrastructure Communication - Simple SPL */

    (
      | tstats summariesonly=true allow_old_summaries=true
          count
          min(_time) as firstTime
          max(_time) as lastTime
        from datamodel=Network_Traffic
        where nodename=All_Traffic
          dest_ip IN ("23.162.40.187","37.19.221.180","45.61.150.96","70.23.0.66","82.29.53.187","82.29.72.16","83.138.53.139","85.155.186.121","92.223.44.134","98.10.233.76","134.122.13.34","138.197.14.95","142.111.152.50","144.172.103.200","155.2.215.64","178.128.212.209","179.43.146.42","64.31.28.221","64.95.10.115")
        by All_Traffic.src_ip All_Traffic.dest_ip All_Traffic.dest_port All_Traffic.user
      | `drop_dm_object_name("All_Traffic")`
      | eval ioc_type="ip", dest=dest_ip, src=src_ip
      | fields firstTime lastTime count src dest dest_port user ioc_type
    )
    | append
    [
      | tstats summariesonly=true allow_old_summaries=true
          count
          min(_time) as firstTime
          max(_time) as lastTime
        from datamodel=Web
        where nodename=Web
          (
            url_domain IN ("aliyundunupdate.xyz","transfer.weepee.io","temp.sh","raw.githubusercontent.com","github.com")
            OR match(url_domain,"(?i)\\.oast\\.pro$|\\.oastify\\.com$|\\.oast\\.fun$")
          )
        by Web.src Web.dest Web.user Web.url Web.url_domain
      | `drop_dm_object_name("Web")`
      | eval ioc_type="domain", dest=url_domain, src=coalesce(src, dest)
      | fields firstTime lastTime count src dest user url ioc_type
    ]
    | stats
        sum(count) as count
        min(firstTime) as firstTime
        max(lastTime) as lastTime
        values(dest_port) as dest_port
        values(url) as url
        values(ioc_type) as ioc_type
      by src dest user
    | `ctime(firstTime)`
    | `ctime(lastTime)`
    | sort -count
query_type: spl
severity: medium
tactics:
    - TA0011
    - TA0010
techniques:
    - T1105
    - T1041
tags:
    - spl
version: "2"
