name: Public Access Granted to GCS Bucket
description: Detects when a Cloud Storage bucket's IAM policy is changed to add public access to all users.
query: "index=<gcp data>  sourcetype=\"gcp:audit:json\"\ndata.resource.type=\"gcs_bucket\" data.protoPayload.methodName=\"storage.setIamPermissions\" \"data.protoPayload.serviceData.policyDelta.bindingDeltas{}.action\"=\"ADD\" \"data.protoPayload.serviceData.policyDelta.bindingDeltas{}.member\"=\"*allUsers*\" "
query_type: spl
severity: medium
techniques:
    - T1530
tags:
    - Google Cloud
    - GCP
