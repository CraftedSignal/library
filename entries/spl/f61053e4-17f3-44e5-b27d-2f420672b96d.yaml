id: f61053e4-17f3-44e5-b27d-2f420672b96d
name: Potential Proxy Bypass Detected
description: This rule detects potential proxy bypass attempts by identifying network connections on common web ports (80, 443) that are allowed by the network firewall but do not appear in the proxy logs. It correlates network traffic from the Network_Traffic data model with proxy traffic from the Web data model. The rule specifically filters for external-bound traffic by excluding private and multicast IP addresses.
query: |
    | tstats `summariesonly` count min(_time) as firstTime max(_time) as lastTime from datamodel=Network_Traffic where All_Traffic.action=allowed (All_Traffic.dest_port=80 OR All_Traffic.dest_port=443) by All_Traffic.src, All_Traffic.dest, All_Traffic.dest_port
    `comment("Get all allowed network traffic on common web ports (80, 443) from the Network_Traffic data model. This represents all connections, including those that may have bypassed the proxy.")`
    | `drop_dm_object_name("All_Traffic")`
    | join type=left src, dest, dest_port [
        | tstats `summariesonly` count from datamodel=Web by Web.src, Web.dest, Web.dest_port
        `comment("Subsearch: Get all traffic from the Web data model to identify connections that correctly went through the proxy.")`
        | `drop_dm_object_name("Web")`
        | rename count as proxy_event_count
    ]
    `comment("Correlate all network traffic with proxy-specific traffic using a left join. The goal is to find network events that have no matching proxy event for the same source, destination, and port.")`
    | where isnull(proxy_event_count)
    `comment("Filter for events that exist in Network_Traffic but are missing from the Web data model. This is the core logic to identify a potential proxy bypass.")`
    | where NOT (cidrmatch("10.0.0.0/8", dest) OR cidrmatch("172.16.0.0/12", dest) OR cidrmatch("192.168.0.0/16", dest) OR cidrmatch("224.0.0.0/4", dest))
    `comment("Filter out internal, private, and multicast destination addresses to focus on external-bound traffic.")`
    | `security_content_ctime(firstTime)`
    | `security_content_ctime(lastTime)`
    | table firstTime, lastTime, src, dest, dest_port, count
    `comment("This detection may generate false positives for legitimate applications that do not use system proxy settings (e.g., some software updaters, thick clients) or for network segments intentionally not routed through the proxy. Consider filtering by adding a line like: | where dest NOT IN (known_good_bypassed_dest1, known_good_bypassed_dest2)")`
query_type: spl
tactics:
    - TA0011
techniques:
    - T1090
    - T1090.002
tags:
    - spl
version: "1"
