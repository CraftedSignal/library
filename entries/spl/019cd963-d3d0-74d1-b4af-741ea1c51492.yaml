id: 019cd963-d3d0-74d1-b4af-741ea1c51492
name: PowerShell Reading Batch/Command Files
description: This rule detects PowerShell processes (powershell.exe, pwsh.exe, mbs.exe) that are executing commands to read the content of batch (.bat) or command (.cmd) files. This behavior has been observed in campaigns like Dead#Vax for self-parsing and in-memory payload extraction. The detection specifically looks for `Get-Content` or its alias `gc` within the PowerShell command line, targeting files with `.cmd` or `.bat` extensions.
query: |
    tstats `security_content_summariesonly` count min(_time) as firstTime max(_time) as lastTime from datamodel=Endpoint.Processes where (Processes.process_name IN ("powershell.exe", "pwsh.exe", "mbs.exe")) AND (Processes.process IN ("*Get-Content*", "*gc*")) AND (Processes.process IN ("*.cmd*", "*.bat*")) by Processes.dest Processes.user Processes.parent_process_name Processes.process_name Processes.process Processes.pid
    | `drop_dm_object_name(Processes)`
    | `security_content_ctime(firstTime)`
    | `security_content_ctime(lastTime)`
    | eval comment="This search detects PowerShell processes reading .bat or .cmd files, a technique used in the Dead#Vax campaign for self-parsing and in-memory payload extraction."
    | eval comment_fp="FP Tuning: Legitimate admin scripts may use this pattern. Consider filtering by parent process or excluding known script paths/names."
    | rename dest as host, user as user, parent_process_name as parent_process, process_name as process_name, process as process_commandline, pid as process_id
query_type: spl
severity: medium
tactics:
    - TA0002
techniques:
    - T1059.001
    - T1059
tags:
    - spl
version: "2"
