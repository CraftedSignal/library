id: 019a0b1f-60e1-719b-9704-43b698916b70
name: Curly COMrades MucorAgent COM Hijacking
description: Detects the modification of specific CLSID registry keys related to the .NET NGEN scheduled task. This Component Object Model (COM) hijacking technique is used by the threat actor 'Curly COMrades' to establish persistence for their 'MucorAgent' backdoor.
query: |
    #
    # Metadata
    #
    name: "Curly COMrades MucorAgent COM Hijacking"
    author: "detections.ai"
    date: "2025-10-22"
    version: "1"
    description: "Detects the modification of specific CLSID registry keys related to the .NET NGEN scheduled task. This Component Object Model (COM) hijacking technique is used by the threat actor 'Curly COMrades' to establish persistence for their 'MucorAgent' backdoor."
    references:
      - "https://www.bitdefender.com/en-us/blog/businessinsights/curly-comrades-new-threat-actor-targeting-geopolitical-hotbeds"
    tags:
      analytic_story:
        - "Curly COMrades"
      asset_type: "Endpoint"
      confidence: 90
      impact: 80
      kill_chain_phases:
        - "Persistence"
        - "Defense Evasion"
      mitre_attack_id:
        - "T1546.015"
        - "T1112"
      observable:
        - "dest"
        - "process_name"
        - "process"
      product:
        - "Splunk Enterprise"
        - "Splunk Enterprise Security"
        - "Splunk Cloud"
      required_datamodels:
        - "Endpoint.Processes"
      security_domain: "endpoint"

    #
    # Search
    #
    `tstats` `security_content_summariesonly` count min(_time) as firstTime max(_time) as lastTime from datamodel=Endpoint.Processes where (Processes.process_name=reg.exe OR Processes.process_name=regedt32.exe) AND Processes.process="* add *" AND Processes.process="*\\InprocServer32*" AND (Processes.process="*\\{de434264-8fe9-4c0b-a83b-89ebeebff78e}*" OR Processes.process="*\\{613fba38-a3df-4ab8-9674-5604984a299a}*") by Processes.dest Processes.user Processes.parent_process_name Processes.process_name Processes.process Processes.process_id Processes.parent_process_id
    | `drop_dm_object_name(Processes)`

    #
    # Filter
    #
    | `security_content_ctime(firstTime)`
    | `security_content_ctime(lastTime)`
    | `curly_comrades_mucoragent_com_hijacking_filter`

    #
    # How to Implement
    #
    # To successfully implement this search, you need to be ingesting logs with
    # process execution details, including command-line arguments, from your hosts.
    # This is typically provided by a security agent, such as Sysmon (Event ID 1),
    # or other EDR solutions, and mapped to the Endpoint.Processes data model.

    #
    # Known False Positives
    #
    # While this is a highly specific technique, legitimate system repair utilities or
    # .NET framework updates could theoretically modify these registry keys, though it is
    # highly unlikely. Investigate the parent process and any related file modifications
    # to confirm malicious activity.
query_type: spl
severity: medium
tactics:
    - TA0004
    - TA0003
    - TA0005
techniques:
    - T1546.015
    - T1112
tags:
    - spl
version: "3"
references:
    - https://www.bitdefender.com/en-us/blog/businessinsights/curly-comrades-new-threat-actor-targeting-geopolitical-hotbeds
