    - id: 019c4d4c-f33b-72b1-8000-a03c8bf81bde
      name: Muddled Libra - AD Enumeration for SPN Hunting
      description: Detects the execution of Active Directory enumeration tools (ADRecon, ADExplorer) that result in the creation of 'ComputerSPNs.csv'. Muddled Libra uses this file to identify critical services (Veeam, MSSQL, Exchange) for targeting via their Service Principal Names (SPNs).
