      description: This rule detects potential exploitation attempts against Grandstream GXP1600 series IP phones targeting CVE-2026-2329. It specifically looks for HTTP requests to the `/cgi-bin/api.values.get` endpoint where the `request` parameter in the URI query string has a length greater than or equal to 65 characters, which is indicative of an oversized request parameter often used in buffer overflow or similar vulnerabilities.
