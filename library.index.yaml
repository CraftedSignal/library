    - id: 019c77a3-b885-73ce-b427-8a451e508ad3
      name: Break Glass Account Sign-in Detected
      description: This rule detects sign-in attempts by 'Break Glass' accounts. Break Glass accounts are emergency access accounts typically used in situations where normal administrative access methods are unavailable. Monitoring their usage is critical due to the high privileges usually associated with these accounts. The rule joins sign-in logs with a watchlist of identities to specifically identify activity related to these designated accounts.
      query_type: kql
      severity: medium
      tactics:
        - TA0003
        - TA0004
        - TA0005
        - TA0001
      techniques:
