    - id: 01997233-64c2-7388-9806-bb8365470985
      name: '[IA] - SMB/NTLM Negotiation to Unknown Remote IPs'
      description: |-
        NetworkSignatureInspected just means the network sensor saw and matched a signature (it inspected the packet) — it doesn’t mean the flow was blocked. That’s the problem.
        If your machines are negotiating SMB or NTLM with unknown remote IPs, you’ve got a real risk on your hands: data leakage, credential relay, or worm-style propagation. SMB to the Internet is almost never legitimate; if you don’t recognize the remote IP, treat it as suspicious.

        The KQL query includes multiple conditions to detect not only default connections on legacy (139) or modern (445) SMB ports, but also cases where SMB is running over non-standard ports (attempts to evade simple port-based detection). It also extracts the SMB negotiation state so you can spot repeated or incomplete negotiation attempts (useful to detect scanning, failed auths, or relay attempts).
      query_type: kql
      severity: medium
      tactics:
        - TA0008
        - TA0006
        - TA0009
      techniques:
        - T1021.002
        - T1557.001
      tags:
        - kql
      author: Sergio Albea
      version: "1"
      file: entries/kql/01997233-64c2-7388-9806-bb8365470985.yaml
    - id: 01997244-aaf0-76a8-b32a-c1c8f25a2a27
      name: '[IC] - Communication at risk due to the encryption algorithms (Ciphers) in use'
      description: This query is using the DeviceNetworkEvents table to filter by connections where there are encryption algorithms used. Then, I take a list of the encryption algorithms database from the well-known site iana.org which is an entity that monitors the global allocation of IP addresses, autonomous systems, DNS domain name root servers and other Internet Protocol resources. Finally, It list cases where there are multiple connections established using non-recommended or non-valid datagram transport layer security (DTLS), which could mean that our users are not protected against eavesdropping, tampering or message forgery.
      query_type: kql
      severity: medium
      tactics:
        - TA0005
      techniques:
        - T1600
      tags:
        - kql
      author: Sergio Albea
      version: "2"
      references:
        - https://www.iana.org/assignments/tls-parameters/tls-parameters-4.csv
        - https://medium.com/detect-fyi/use-kql-to-surface-non-recommended-tls-parameters-iana-based-642ec8aec633
      file: entries/kql/01997244-aaf0-76a8-b32a-c1c8f25a2a27.yaml
    - id: 01997248-c1e6-7021-ba07-7eded02e7142
      name: '[IC] - Identifying methods used to establish secure communication over insecure channels'
      description: |-
        In this case, I have been researching about the 'curve' value into AdditionalFields field of DeviceNetworkEvents table which I identified into iana.org as two groups 'Elliptic curve' and 'Diffie-Hellman groups'.

        These 2 kinds of encryption groups work to secure communication over an insecure channel, are classified by Internet Assigned Numbers Authority (IANA), as if are 'recommended' and the Datagram Transport Layer Security status. In addition, to take into account, the mentioned site mention: "If an item is not marked as 'Recommended', it does not necessarily mean that it is flawed; rather, it indicates that the item either has not been through the IETF consensus process, has limited applicability, or is intended only for specific use cases"

        Therefore, this KQL Query is oriented to identify if the current encryption to secure your communications is enough or if due to the level of sensitive of your information, would need to be reviewed.
      query_type: kql
      severity: medium
      tactics:
        - TA0011
        - TA0005
      techniques:
        - T1573.002
        - T1600
        - T1600.001
      tags:
        - kql
      author: Sergio Albea
      version: "2"
      references:
        - https://medium.com/detect-fyi/use-kql-to-surface-non-recommended-tls-parameters-iana-based-642ec8aec633
        - https://www.iana.org/assignments/tls-parameters/tls-parameters-8.csv
      file: entries/kql/01997248-c1e6-7021-ba07-7eded02e7142.yaml
