    - id: 019ae8fc-a692-70a9-9ef9-14819838b96e
      name: Device Registration using Windows Hello for Business after Device Code Phishing
      description: |-
        This detection correlates suspicious device code authentication behaviour in Azure AD with a successful creation of a Windows Hello for Business (WHfB) credential within the same 24 hours.

        Microsoft allows specific application and resource combinations (permitted by CA) access without a previously registered device. Even more, one of these combinations allows the registration of a device.

        An access token issued for the Microsoft Authentication Broker application and the Intune Enrollment resource can be used to authenticate and initiate the device join process.

        Therefore, an attacker can leverage the token to bypass CA, register device, and establish persistence. Once registered, attacker gets a Primary Refresh Token (PRT), valid for 90 days.

        Attackers often push further to configure WHfB (Windows Hello For Business) on the registered device. WHfB issues TPM-backed, cryptographic credentials that Entra recognizes as a strong, phishing-resistant, passwordless authentication method.

        Device registration unlocks persistence, but WHfB unlocks the ability to bypass stricter authentication-strength requirements.

        Analysts: Check for IP mismatches, since in the Device Code authentication event we will see the victims IP, the WHfB registration event will contain the attackers IP.
      query_type: kql
      severity: medium
      tactics:
        - TA0006
        - TA0003
        - TA0005
      techniques:
        - T1078
        - T1550
        - T1136
        - T1556
        - T1098
        - T1562
      tags:
        - kql
      author: Will Shaw
