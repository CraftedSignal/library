    - id: 019c7e2c-71b0-7702-8283-c6161a6a5766
      name: GitHub Personal Access Token Creation
      description: Detects the creation of a new Personal Access Token (PAT) in GitHub. Attackers frequently create PATs after gaining initial access to an account to maintain persistence that survives a password reset. Tokens with broad scopes (repo, admin:org) allow for full repository exfiltration and administrative manipulation of the organization.
      query_type: spl
      severity: medium
      tactics:
        - TA0003
        - TA0004
      techniques:
