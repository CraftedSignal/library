    - id: 019c8a96-d219-71c8-997e-1ac5a9bddb53
      name: OAST DNS Tunneling for Exfiltration
      description: Detects potential DNS tunneling used for system fingerprinting and exfiltration. The query looks for DNS requests to known Out-of-Band Application Security Testing (OAST) domains where the query name contains a long, hexadecimal-encoded string. This pattern is indicative of attackers using DNS to bypass egress firewalls, as seen in post-exploitation of CVE-2026-1731.
      query_type: kql
      severity: medium
      tactics:
