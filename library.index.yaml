    - id: b6ad17a4-e9f2-43f1-a15e-12cef8876016
      name: SmartScreen + NetworkProtection Correlation with Network Logs
      description: This rule correlates Microsoft Defender for Endpoint (MDE) SmartScreen and Network Protection blocks with network activity logs. It specifically looks for instances where SmartScreenUrlWarning or ExploitGuardNetworkProtectionBlocked events occur due to 'CustomBlockList' or 'CustomPolicy' settings. The rule then joins these events with DeviceNetworkEvents to identify the associated URLs, remote IP addresses, and ports involved in the blocked network communication. The primary goal is to identify and provide context for network access attempts that are blocked by custom security policies, indicating potential malicious or unwanted website access.
      query_type: kql
      severity: medium
      tactics:
        - TA0001
        - TA0011
      techniques:
