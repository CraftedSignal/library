      name: Detect Action Performed on RiskyUsers by Non-InfoSec Members
      description: This query will work every 30 minutes to see if anyone that's not InfoSec performed any administrative Identity actions on users. This will also depend on your company policy, if only Information Security members are allowed to perform actions on risky users such as dismissing users, then this will trigger.
