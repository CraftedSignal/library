    - id: 019c8ae8-5269-7718-a095-93766517eb97
      name: PowerShell In-Memory .NET Assembly Load
      description: Detects PowerShell commands that attempt to load a .NET assembly directly into memory using reflection. This is common in fileless malware delivery, such as the Remcos RAT campaign described in the provided intel, which uses reflection to load the final RAT stage from a steganographic JPEG, making disk-based detection ineffective.
      query_type: kql
      severity: medium
