      file: entries/kql/019c1b91-248d-7046-bf42-cef17520a6b5.yaml
    - id: 019c1b92-7ca3-76ff-8446-f054909c81e5
      name: ClawdBot Malware Hash Detection
      description: This rule detects the presence or execution of known malicious file hashes associated with the ClawdBot campaign. It monitors file creation/modification events, process creation events, and module/image load events across devices for specific SHA256 hashes. The identified hashes correspond to components like 'Code.exe', 'zoomupdate.msi', 'DWrite.dll', 'extension.js', and 'run.bat', which are known to be part of the ClawdBot malware.
      query_type: kql
      severity: medium
      tactics:
        - TA0002
      techniques:
        - T1059
      tags:
        - kql
