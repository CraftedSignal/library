      name: IDE Extension Host Malicious Connection
      description: Detects network connections originating from IDE processes (Visual Studio Code, Cursor) to known malicious or suspicious domains associated with malicious extensions or workspace configurations. This rule specifically targets outbound network connections from 'Code.exe', 'Cursor.exe', or 'code-oss' processes to a predefined list of malicious domains.
