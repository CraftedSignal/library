    - id: 019c77a1-cfe4-72de-bf39-4a2b1f436e87
      name: Azure AD External User Invitation from Common Public Domains
      description: This rule detects when an external user is invited to Azure Active Directory (AAD) from a common, publicly available email domain (e.g., gmail.com, outlook.com, yahoo.com). This can be an indicator of an attacker attempting to establish persistence or gain initial access by inviting an external account they control, or it could be a legitimate business process for collaboration with external parties using personal email addresses.
      query_type: kql
      severity: medium
      tactics:
