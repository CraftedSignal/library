    - id: 019c7c02-e004-70bd-9958-8cde0347c283
      name: Signal-Based Rootkit Command Trigger Detected
      description: This detection identifies the use of the 'kill' command with a specific, non-standard real-time signal (-59). Rootkits like 'Singularity' use these 'magic' signals as an out-of-band communication channel to trigger actions within a malicious kernel module, such as toggling stealth features or granting root privileges.
