    - id: 019c93aa-b798-741a-8aef-b30a176314ab
      name: BCDedit Boot Configuration Modification
      description: Detects attempts to modify the Boot Configuration Data (BCD) using bcdedit.exe. This rule specifically looks for commands that delete boot entries or values, enable safe boot with networking, disable recovery, or ignore boot status policy failures. Such modifications can be used by adversaries to establish persistence, evade defenses, or disrupt system recovery.
      query_type: kql
      severity: medium
      tactics:
        - TA0005
      techniques:
        - T1562.001
      tags:
        - kql
