    - id: 019c8cfa-0da5-731d-ab08-261386310886
      name: Suspicious File Creation and Network Connection to Telegram API
      description: 'This rule detects a suspicious sequence of events: a file named ''host.exe'' being created in the Windows Startup folder, a ''runtime.zip'' file being created in the local temporary directory, and subsequent network communication to the Telegram API (api.telegram.org) from the same device. This pattern is indicative of malware establishing persistence, staging data, and exfiltrating it via Telegram, potentially associated with malware like Small Sieve.'
