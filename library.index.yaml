    - id: 019ada76-6a78-73db-b4b5-9217efe29626
      name: Newly Observed .CFD Domain Access
      description: The .cfd Top-Level Domain (TLD) is often linked to malicious activities such as phishing, malware distribution, and command-and-control (C2) operations. This query detects new allowed network connections to .cfd domains that have appeared for the first time in your environment within the past 24 hours. Monitoring these connections can serve as an early warning sign of potential security breaches or users being targeted by phishing attacks. The query also provides valuable context for each newly observed domain, including its first-ever occurrence within a 30-day window, the total recent access count, and the users involved—enabling analysts to quickly evaluate the associated risk.
      query_type: kql
      severity: medium
      techniques:
        - T1566
        - T1071
      tags:
        - kql
      author: Navdeep Sharma
      version: "2"
      file: entries/kql/019ada76-6a78-73db-b4b5-9217efe29626.yaml
