    - id: 019a0193-addc-7631-aa23-bd6bb1e85549
      name: Potential DNS Poisoning
      description: |-
        _ldap._tcp.dc._msdcs.ad.domain.com is a DNS query used by AD clients to locate Domain Controllers that can provide LDAP services for the ad.domain.com domain, ensuring users and computers can authenticate, query directory data, and function inside the AD forest.

        This SPL query flags IP addresses returned by DNS for the AD DC-locator SRV query (_ldap._tcp.dc._msdcs.ad.domain.com.) that are not known/approved Domain Controllers in your inventory, and that show up frequently (more than 10 hits in the selected time range).

        This can be for the use case where an attacker has compromised or poisoned a DNS server / resolver and is advertising their IP(s) as Domain Controllers (SRV/A glue in _msdcs) so clients attempt LDAP/Kerberos against attacker-controlled hosts.
      query_type: spl
      severity: medium
      tactics:
        - TA0042
        - TA0005
      techniques:
        - T1584.002
        - T1207
      tags:
        - spl
      author: Cyb3rSn0rlax
      version: "3"
      references:
        - https://learn.microsoft.com/en-us/openspecs/windows_protocols/ms-adts/7fcdce70-5205-44d6-9c3a-260e616a2f04
      file: entries/spl/019a0193-addc-7631-aa23-bd6bb1e85549.yaml
