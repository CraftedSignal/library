    - id: baf02c76-ac77-403b-b227-d982d4de8b1c
      name: 'Threat Hunt: RoKRAT Malware - Injection and Steganography'
      description: |-
        A new RoKRAT variant tied to APT37 delivers payloads via oversized LNK shortcuts, executing a two‑stage encrypted shellcode loader that uses steganography to conceal content. The malware achieves fileless execution by injecting into trusted processes (e.g., mspaint.exe, notepad.exe) and hides C2 activity within legitimate cloud storage services such as pCloud, Yandex Disk, and Dropbox, often leveraging hardcoded API tokens.

        High‑level TTPs:

        Initial Access: Malicious LNK files in compressed archives.
        Execution & Persistence: PowerShell/BAT‑driven staged loaders with XOR decryption.
        Defense Evasion: Process injection into signed Windows binaries; steganography for payload concealment.
        Command & Control: Use of trusted cloud service APIs with embedded tokens to obfuscate malicious traffic.
      query_type: kql
      severity: medium
      tactics:
        - TA0002
      techniques:
        - T1567.002
        - T1059.001
        - T1059.003
      tags:
        - ROKRAT
        - APT37
        - MALWARE
        - kql
      author: Aamir Muhammad
