    - id: 01997f04-cf45-702c-8613-5ad4fe11ee03
      name: YiBackdoor registry persistence
      description: This rule detects the creation of a registry run key (Run or RunOnce) that attempts to establish persistence by executing a DLL via regsvr32. It specifically looks for registry value data containing 'regsvr32' followed by a DLL path. The rule then correlates this registry event with a file creation event for the same DLL on the same device within a specified timeframe, indicating a potential persistence mechanism where a malicious DLL is dropped and then configured to run at startup.
      query_type: kql
      severity: medium
      tactics:
        - TA0003
      techniques:
