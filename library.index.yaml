    - id: 0199f2e8-81e8-707b-a81e-fc18ea6acf1f
      name: SAP NetWeaver RMI-P4 Deserialization Command Execution
      description: |
        Detects exploitation attempts of CVE-2025-42944, a critical insecure deserialization vulnerability in SAP NetWeaver AS Java RMI-P4 module. This rule identifies when SAP Java processes spawn system shells or execute suspicious commands, which is indicative of successful exploitation of the deserialization flaw. Attackers can exploit this vulnerability by sending malicious serialized Java objects to exposed RMI-P4 ports (typically 50004 or 50014), leading to arbitrary OS command execution with full system privileges. This pattern detects the post-exploitation behavior where the   compromised Java process spawns interactive shells, creates scheduled tasks, or executes system commands.
      query_type: sigma
