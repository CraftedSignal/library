      file: entries/sigma/019c4ba6-9380-7139-9493-bc002ad5f4a0.yaml
    - id: 019c4bab-1844-750a-a8f2-3758f7995648
      name: Firewall Automated Configuration Change Monitoring
      description: Automate daily manual monitoring of Firewall changes that are performed by the Security Engineer. Additionally, this can be fine-tuned (more on that on next upcoming queries) into an automated rule such as Custom Detection Rule in Defender, Analytics Rule in Sentinel, or Saved Search with Alert Actions within Splunk (SPL) to detect potential changes by unknown authorized individual.
      query_type: kql
      severity: medium
      techniques:
        - T1562
      tags:
        - kql
      author: Igor Oliveira
      version: "4"
      file: entries/kql/019c4bab-1844-750a-a8f2-3758f7995648.yaml
    - id: 019c4c7e-ac3f-74b1-8f11-e41415cb46c0
      name: Suspicious Azure Blob Enumeration by Insider
      description: This rule detects suspicious enumeration of Azure Blob, File, Table, Queue, or DFS storage accounts by internal users. It identifies devices making network connections to public Azure storage URLs using potentially suspicious processes (e.g., PowerShell, Python, AzCopy, curl, wget, WinSCP, FileZilla, Storage Explorer). The rule then analyzes the distinct storage accounts accessed and uses a Jaccard index to identify unusual naming conventions among the accessed storage accounts, potentially indicating an insider attempting to discover or exfiltrate data from unfamiliar storage resources.
      query_type: kql
      severity: medium
      tactics:
        - TA0010
        - TA0009
      techniques:
        - T1567.002
        - T1530
        - DS0010
      tags:
        - kql
      version: "3"
      file: entries/kql/019c4c7e-ac3f-74b1-8f11-e41415cb46c0.yaml
    - id: 019c4c9f-258e-75e9-a676-8f2297185b2e
      name: Python Interpreter Masquerading as System Process
      description: Detects the execution of a Python interpreter that has been renamed to a common system process name, such as 'svchost.exe'. This is a known TTP used by malware like PXA Stealer to evade detection and blend in with normal system activity. The rule also attempts to correlate this activity with network connections to identify potential C2 communication.
      query_type: kql
      severity: medium
      tactics:
        - TA0005
        - TA0002
      techniques:
        - T1036
        - T1036.003
        - T1059.006
      tags:
        - kql
      version: "5"
      references:
        - https://www.microsoft.com/en-us/security/blog/2026/02/02/infostealers-without-borders-macos-python-stealers-and-platform-abuse/
      file: entries/kql/019c4c9f-258e-75e9-a676-8f2297185b2e.yaml
    - id: 019c4cf5-f574-748c-9574-62e8ac2791e3
      name: SHub Stealer Password Validation via DSCL
      description: |
        Detects the use of 'dscl . authonly' to validate user passwords, a technique
        used by the SHub Stealer malware to verify credentials before exfiltration.
        The malware typically executes this command from a shell or AppleScript
        interpreter.
      query_type: sigma
      severity: medium
      tactics:
        - TA0006
      tags:
        - attack.t1056.002
        - attack.credential-access
      author: tim@detections.ai
      version: "3"
      references:
        - https://securitylabs.datadoghq.com/articles/tech-impersonators-clickfix-and-macos-infostealers/
      data_sources:
        - process_creation
        - macos
      file: entries/sigma/019c4cf5-f574-748c-9574-62e8ac2791e3.yaml
    - id: 019c4cfe-36c6-708e-9fbf-43c1a9a1909b
      name: Suspicious Access to VMware Virtual Disk File
      description: |
        Detects access to VMware virtual disk files (.vmdk). This technique was
        observed being used by the Muddled Libra (Scattered Spider) threat group,
        where they would power down Domain Controllers, mount their disks to a rogue
        VM, and steal the NTDS.dit and SYSTEM hives for offline credential extraction.
        This method bypasses security monitoring that would typically occur on the
        Domain Controller itself.
      query_type: sigma
      severity: medium
      tactics:
        - TA0006
      techniques:
        - T1003.003
        - T1003
      tags:
