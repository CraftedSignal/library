    - id: 019c7e30-ab7a-72d5-abb9-859c13dbdd9f
      name: GitHub Programmatic SSH Key Created
      description: Detects the addition of an SSH public key to a GitHub account using programmatic access (Personal Access Tokens, OAuth, or GitHub Apps). Unlike keys added via the Web UI, programmatic creation often bypasses manual verification steps and provides long-lived access that survives password resets and MFA changes. This is a common technique for attackers to establish persistent command line access to repositories.
      query_type: spl
      severity: medium
      tactics:
        - TA0003
        - TA0004
        - TA0005
        - TA0001
      techniques:
