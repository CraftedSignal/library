      description: Detects the creation of the file 'decrypted_appbound_key.txt' in the AppData\Roaming directory. This file is a specific artifact generated by the CRESCENTHARVEST malware after it successfully decrypts Chrome's app-bound encryption key, indicating browser credential compromise.
