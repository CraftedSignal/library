    - id: 019c4dc3-9356-7178-9445-c8d53f5ff029
      name: CastleLoader Anti-Analysis DNS Check
      description: Detects a behavioral pattern associated with CastleLoader's anti-analysis technique, where a process initiates a DNS query that fails (NXDOMAIN) and is immediately followed by a successful network connection to a different destination. This can indicate an attempt to check for sandboxing or sinkholing environments.
      query_type: kql
      severity: medium
      tactics:
        - TA0005
        - TA0007
      techniques:
        - T1497.003
      tags:
        - kql
