      name: CHAMELEON#NET Time-Based Evasion via Chained Ping Commands
      description: Detects a defense evasion technique used by CHAMELEON#NET where the malware introduces significant delays using multiple 'ping 127.0.0.1 -n <number> > nul' commands chained together. This tactic is designed to bypass automated sandbox analysis by exceeding typical execution timeouts.
