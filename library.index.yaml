    - id: 019c8ec3-7485-742e-a52b-fb123377600a
      name: OAuth App Consent Grant - Possible Illicit Consent Grant Attack
      description: This rule detects attempts to grant consent to OAuth applications, which could indicate an illicit consent grant attack. It specifically looks for successful operations related to consenting to applications, adding app role assignments to service principals, adding delegated permission grants, or adding OAuth2PermissionGrants within audit logs. The rule extracts details such as the target application, the user who consented, their initiating IP address, and the permissions granted.
