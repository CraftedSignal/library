    - id: 019c77a7-c8d5-7538-bc17-101afb700cf2
      name: Modification of Azure Break Glass Account Properties
      description: This rule detects modifications to properties of 'break glass' accounts. It joins a watchlist of identity categories containing 'Break Glass' accounts with Azure Audit Logs to identify specific operations performed on these accounts. The rule focuses on changes to user principal names, operation names, activity display names, results, and AAD operation types.
      query_type: kql
      severity: medium
      tactics:
        - TA0005
        - TA0003
        - TA0004
        - TA0001
      techniques:
