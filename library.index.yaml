    - id: 019c2a46-f2a3-769d-9e77-119c3118aab7
      name: Successful Azure AD Sign-in from Suspicious User-Agent Outside ANZ
      description: This rule detects successful sign-ins to Azure Active Directory (AAD) from IP addresses outside of New Zealand and Australia, where the User-Agent string matches a list of known suspicious User-Agents. It filters out many legitimate User-Agents to reduce false positives, including those from Microsoft applications, mobile devices, and common system services. The rule aims to identify potential unauthorized access attempts or compromised accounts leveraging unusual client software or scripts.
      query_type: kql
      tactics:
