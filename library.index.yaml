    - id: 019c9498-5a64-777e-bb83-c89baecfa27b
      name: MSHTA to RegAsm Malware Sideloading
      description: Detects the MSHTA utility (mshta.exe) executing a remote script which then spawns a .NET registration utility (RegAsm.exe or RegSvcs.exe). This specific execution chain is a high-confidence indicator of malware loaders like XWorm and Lumma Stealer, often delivered via ClickFix social engineering lures.
      query_type: kql
      severity: medium
      tactics:
        - TA0005
      techniques:
        - T1218.005
        - T1218.009
      tags:
