      description: This rule detects processes that are initiated by an executable and access the Discord local storage leveldb directory. This activity could indicate an attempt to exfiltrate Discord user data, such as authentication tokens, which are often stored in this location. Attackers frequently target these files to gain unauthorized access to user accounts.
