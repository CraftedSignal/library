    - id: 019c4de3-dbca-7779-aa7d-621a8b0d6034
      name: Microsoft ClickFix PowerShell/MSHTA from Explorer Run Dialog
      description: This rule detects the execution of PowerShell, pwsh, mshta, or curl initiated by explorer.exe (specifically from the Run dialog) when the command line contains indicators of web requests, expression invocation, or encoded commands. This behavior is often associated with the 'ClickFix' social engineering technique, where users are tricked into running malicious one-liners from the Windows Run dialog. The rule looks for common PowerShell commandlets like 'Invoke-WebRequest', 'Invoke-Expression', or their aliases, as well as '-EncodedCommand' or methods like 'DownloadString' and 'FromBase64String', indicating an attempt to fetch and execute remote content or obfuscated commands.
      query_type: sigma
      severity: medium
      tactics:
        - TA0002
      techniques:
        - T1059.001
        - T1204
      tags:
        - attack.t1059.001
        - attack.t1204
      author: Daniel Jeremiah
      version: "2"
      references:
        - https://www.microsoft.com/en-us/security/blog/2025/08/21/think-before-you-clickfix-analyzing-the-clickfix-social-engineering-technique/
      data_sources:
        - process_creation
        - windows
      file: entries/sigma/019c4de3-dbca-7779-aa7d-621a8b0d6034.yaml
    - id: 019c4de3-f323-721d-84f7-53707eaea9ca
      name: Microsoft ClickFix RunMRU Suspicious Command
      description: This rule detects suspicious commands being set in the RunMRU registry key by explorer.exe. It specifically looks for the presence of LOLBins such as powershell, mshta, and curl, as well as obfuscation techniques like caret (^) and ProxyCommand, or patterns indicative of encoded/script execution (e.g., Invoke-Expression, FromBase64String, -eC). This activity is associated with the 'ClickFix' social engineering technique.
      query_type: sigma
      severity: high
      tactics:
        - TA0002
        - TA0003
        - TA0004
      techniques:
        - T1059
