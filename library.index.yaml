      description: "This rule detects suspicious execution of MSBuild.exe from non-standard user-writable temporary or roaming directories. Adversaries often abuse MSBuild.exe, a legitimate Microsoft utility, to proxy execution of malicious code, bypassing application control defenses. The rule specifically looks for MSBuild.exe running from common temporary or user-controlled paths like AppData\\Local\\Temp, AppData\\Roaming, C:\\Temp, or C:\\Users\\Public, which is indicative of potential malicious activity such as process injection or execution of infostealers like Lumma Stealer.\n\nActions: \nReview the parent process (InitiatingProcess*) for suspicious names and command lines.\n Correlate with other indicators such as network connections, file writes, or registry changes. \nInvestigate the dropped files or payloads around the execution timestamp."
      query_type: kql
      severity: medium
      tactics:
        - TA0005
        - TA0004
      techniques:
        - T1127.001
        - T1055
      tags:
        - kql
      version: "1"
      references:
