      name: Suspicious Service DLL in Ringtones Folder
      description: Detects the loading of a ServiceDLL by svchost.exe from the highly unusual 'Ringtones' directory. This behavior is a specific indicator of the BADIIS malware loader (CbsMsgApi.exe) which creates a service pointing to a malicious DLL in this location for persistence and evasion.
