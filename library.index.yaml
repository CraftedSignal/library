    - id: 019c4da1-6bf6-702c-a3b9-4fb336d13a1b
      name: ClickFix / CrashFix Python RAT Activity
      description: 'This rule detects suspicious activities associated with the ClickFix / CrashFix Python RAT. It identifies three main patterns: the execution of ''finger.exe'' as a potential fetch mechanism, PowerShell execution with encoded commands originating from web browsers or common system utilities, and Python script execution from suspicious temporary or download directories, indicative of RATs like ModeloRAT or CastleRAT.'
      query_type: kql
      tags:
        - kql
      version: "2"
      file: entries/kql/019c4da1-6bf6-702c-a3b9-4fb336d13a1b.yaml
    - id: 019c4da1-883b-7601-91a7-acbbb89edda0
      name: ClickFix Finger Fetching PowerShell Payload
      description: This rule detects the execution of 'finger.exe' with a command line containing an '@' symbol, which is indicative of ClickFix campaigns fetching obfuscated PowerShell payloads. Legitimate use of 'finger.exe' is rare on Windows, making this a high-fidelity detection for ClickFix delivery.
      query_type: sigma
      severity: high
      tactics:
