    - id: 019c8a6a-cd09-7171-8462-2a8bb18e0123
      name: Suspicious Hydra _target_ Value in AI Model Configuration
      description: This rule detects attempts to exploit Remote Code Execution (RCE) vulnerabilities in AI/ML libraries that use the Hydra framework. It scans AI model configuration files (e.g., .json, .yaml) for the '_target_' key being set to a dangerous callable like 'builtins.exec', 'os.system', or 'eval'. A positive match indicates a potentially malicious model file designed to execute arbitrary code upon being loaded.
