    - id: 019a11a2-dee5-709c-8db0-005ee2c5fd8a
      name: macOS ClickFix Attack with Base64 encrypted curl Command
      description: This rule detects a sequence of events indicative of a potential macOS ClickFix attack. It looks for a base64 encoded command executed by 'bash' or 'zsh', immediately followed (within 10 seconds) by a 'curl' command that initiates a network connection to a URL. The rule specifically excludes a whitelisted curl command to reduce false positives. The correlation of base64 execution, a subsequent curl command, and a successful network connection to the domain extracted from the curl command suggests an attempt to download and execute malicious content, possibly after decoding it.
      query_type: kql
      severity: medium
      tactics:
        - TA0011
        - TA0010
        - TA0002
        - TA0005
      techniques:
        - T1059
        - T1059.004
