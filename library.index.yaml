      name: Windows Admin Center Service Hijack Detection
      description: Detects when the Windows Admin Center service ('SmeSvc') is stopped, and shortly thereafter, a different process starts listening on the WAC port (TCP/6516). This behavior is a key indicator of CVE-2026-20965 exploitation, where an attacker hijacks the service to intercept administrator credentials.
