    - id: 019c8cfe-e799-77dc-922a-ba7600b6dfc8
      name: OpenClaw Domain Resolution
      description: This rule detects DNS lookups to domains associated with OpenClaw, Moltbot, or Clawdbot infrastructure. It specifically looks for DNS requests containing "clawhub.ai", "openclaw.ai", "open-claw.me", "molt.bot", "openclaw.bot", "onlycrabs.ai", "moltbook.com", or "thecolony.cc". To reduce noise, it excludes DNS requests originating from known mail or DNS resolver processes such as "perl", "surgemail", "named", "smtpd", "MailService", "pdns_recursor", "unbound", "systemd-resolved", "MailEnable SMTP Connector", and "opendkim".
      query_type: kql
      tactics:
        - TA0011
      techniques:
        - T1071.004
        - T1568
      tags:
        - kql
      version: "2"
