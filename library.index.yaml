    - id: 019c3eae-a93f-73ea-8962-6fccce63764a
      name: Diaoyu Loader Execution Guardrail Detection
      description: This detection identifies the execution of a process from a directory that also contains a zero-byte file named 'pic1.png'. This specific behavior is a known execution guardrail for the 'Diaoyu' loader, used by the TGR-STA-1030 group to evade automated sandbox analysis.
