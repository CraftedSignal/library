      name: BeyondTrust RCE Handshake Injection (CVE-2026-1731)
      description: Detects attempts to exploit a remote code execution vulnerability (CVE-2026-1731) in BeyondTrust Remote Support software. The attack involves sending a specially crafted 'remoteVersion' parameter during a WebSocket handshake to trigger a command injection.
