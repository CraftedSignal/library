    - id: 019c48f4-be9e-74ba-b741-4021d117eb2e
      name: UAC Bypass Registry Key Deletion
      description: The rule detects the deletion of specific registry keys associated with UAC bypass techniques. Specifically, it looks for deletions where the 'TargetObject' field contains the string '\ms-settings\Shell\Open\command'. This activity is indicative of anti-forensics, as an attacker might delete these keys to remove evidence of privilege escalation after performing a UAC bypass.
