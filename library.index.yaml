    - id: 019c9358-95e7-7059-9d1e-afd115b9941f
      name: Folder Mounted as Drive
      description: This rule will detect if a folder is mounted as a Virtual Drive. Windows allow its users to mount any folder in the system as a logical virtual drive for a long time. When mounted as a virtual drive, the folder appears and acts just like any other drive or partition alongside other drives like C drive, D drive, etc., in the root of the File Explorer.
      query_type: sigma
