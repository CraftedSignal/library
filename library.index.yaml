    - id: 019bb206-1a43-76ec-91ad-e8de46b209c0
      name: '[IA] - Threat Intelligence Feed Evaluation based on URL IOCs'
      description: "TIFCE (Threat Intelligence Feed Content Evaluation) is a simple way to measure if a TI feed is actually useful based on four things — uniqueness, real matches, confirmed maliciousness, and activity.\n\U0001F6A8 TIFCE allows using one detection per IOC type (URLs, domains, file hashes) instead of dozens of rules per feed, keeping detections clean, centralized, and easy to maintain.\nIf you rely on threat intelligence for detection, it can be a good solution to how to evaluate current or new TI feeds."
