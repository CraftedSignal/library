    - id: 019c4d53-2a8e-70eb-bb9b-96c2a40084d5
      name: Muddled Libra - NTDS Decryption Artifacts Detected
      description: Detects the creation of specific files ('result', 'result.kerb') in common user folders. These filenames are known artifacts of tools like GoSecretsDump used to decrypt the NTDS.dit database, a technique observed in Muddled Libra's playbook after they exfiltrate the database from a Domain Controller.
