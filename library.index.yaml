    - id: c4857cfe-4ec3-4ceb-a629-b27bb43f0990
      name: Unusual Interactive Sign-In from New Country (30-Day Baseline)
      description: |
        This detection identifies interactive sign-ins from countries that a user has not accessed from in the past 30 days, based on successful logins. It highlights unusual geographic access patterns, such as remote work via VPNs, possible account compromise, or other travel-related anomalies.

        Only interactive sign-ins are included to reduce noise from background service logins and token refreshes.

        Recommended Extensions:

        1. Trusted Applications Watchlist
           Use a Sentinel watchlist (e.g., `TrustedAppsWatchlist`) to maintain known or expected applications (like SAP Cloud Identity Services, Microsoft Teams, Outlook Mobile) that frequently authenticate across multiple countries or devices. This helps suppress expected behavior and avoids alert fatigue.

        2. Workation / Remote User Watchlist
           Create a watchlist (e.g., `WorkationUsers`) with UPNs or user aliases of employees who are temporarily working abroad or from rotating locations. This allows legitimate, location-shifting activity to be filtered out of alerting, reducing false positives during travel seasons or flexible remote work arrangements.
      query_type: kql
      severity: medium
      tactics:
        - TA0006
        - TA0001
      techniques:
        - T1078
        - T1078.004
      tags:
        - VPN
        - UnusualLogin
        - InteractiveSignIn
        - SentinelDetection
        - RemoteWork
        - Workation
        - kql
      author: Michael Fajkus
      version: "1"
      references:
        - 'https://learn.microsoft.com/en-us/azure/azure-monitor/reference/tables/signinlogs  '
      file: entries/kql/c4857cfe-4ec3-4ceb-a629-b27bb43f0990.yaml
