    - id: 019c9496-8b60-751c-8ff9-5619dfbcc8fc
      name: ClickFix PowerShell Execution via Run Dialog
      description: Detects PowerShell processes launched by Windows Explorer, which is characteristic of a user executing a command from the 'Run' dialog (Win+R). The detection targets command lines associated with the "ClickFix" social engineering technique, which tricks users into running malicious code. This includes looking for encoded commands or specific strings from the "reCAPTCHA Phish" toolkit.
      query_type: kql
      severity: medium
      tactics:
