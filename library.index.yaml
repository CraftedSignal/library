    - id: 019c425e-5791-71bd-95c8-3dd413ec92d9
      name: NAS or IoT Device Acting as an Outbound SSH/SFTP Relay
      description: Detects when a Network Attached Storage (NAS) or Internet of Things (IoT) device establishes multiple or high-volume outbound SSH/SFTP connections to an external IP address. This behavior can indicate that the device has been compromised and is being used as an 'Operational Relay Box' (ORB) to proxy malicious traffic, mask C2 communications, or exfiltrate data.
