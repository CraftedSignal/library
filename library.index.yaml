    - id: 019c94c2-5e5a-779b-b431-0a23a3e4ba2e
      name: CVE-2026-2329 Hunt
      description: This rule detects HTTP requests targeting the '/cgi-bin/api.values.get' endpoint with a 'request' parameter, which is indicative of exploitation attempts for CVE-2026-2329 in Grandstream GXP1600 series IP phones. This vulnerability allows for information disclosure.
