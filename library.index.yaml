    - id: 019c77a0-5023-724e-aeea-d82cd81acfc1
      name: Guest User from Public Domain Added to AAD Security Group
      description: This rule detects when a guest user from a common public email domain (e.g., gmail.com, outlook.com) is invited to an Azure Active Directory (AAD) tenant and subsequently added to an AAD security group. This could indicate an attempt to grant unauthorized access to an external account or a misconfiguration allowing guest users to be added to sensitive groups.
      query_type: kql
      severity: medium
      tactics:
        - TA0005
        - TA0003
        - TA0004
        - TA0001
      techniques:
