    - id: 019c8a8e-90a0-72bc-b5ab-c452f9981661
      name: AD Discovery via AdsiSearcher from ProgramData
      description: Detects PowerShell commands using AdsiSearcher to count computer objects in Active Directory. This is a specific discovery technique observed in the BeyondTrust CVE-2026-1731 exploitation campaign where it was executed via a malicious RMM tool dropped in C:\ProgramData.
