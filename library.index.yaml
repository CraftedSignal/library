    - id: 1436c43e-b287-43c0-a4ef-7532bbc28fa1
      name: Potential Golden dMSA Attack Via KDS Root Key Retrieval
      description: |
        Detects attempts to read the Key Distribution Service (KDS) Root Key from Active Directory. This is often a preliminary step in the Golden dMSA attack, where an attacker with high privileges attempts to retrieve the key material needed to forge tickets for Delegated Managed Service Accounts (dMSA) to establish domain persistence. The rule looks for access to the 'msKds-ProvRootKey' object, identified either by its name or its schema ID GUID 'aa02fd41-17e0-4f18-8687-b2239649736b'.
      query_type: sigma
