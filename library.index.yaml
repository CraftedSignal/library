    - id: 01997814-f067-73cc-9d21-98d73e70068a
      name: EDR-Freeze - EDR Agent Process Suspension/Termination Attempt
      description: Detects attempts to suspend or terminate Endpoint Detection and Response (EDR) agent processes by targeting their Process IDs (PIDs). The rule identifies suspicious command-line arguments and tools (e.g., procdump, WerFault) used to interact with processes, specifically looking for these actions against a predefined list of common EDR agent executable names. It correlates process creation events with process ID resolution to identify the targeted EDR agent.
      query_type: kql
      severity: medium
      tactics:
        - TA0005
        - TA0040
        - TA0004
        - TA0006
      techniques:
        - T1562.001
        - T1489
        - T1055
        - T1003.001
      tags:
        - kql
      version: "2"
      file: entries/kql/01997814-f067-73cc-9d21-98d73e70068a.yaml
    - id: 01997883-82d9-760e-9ae7-474a4f7576fa
      name: EDR-Freeze/EDR-Sleep
      description: |
        Detects potential abuse of LOLBAS techniques (e.g., WerFaultSecure.exe, rundll32.exe, comsvcs.dll) associated with EDR-Freeze attacks. These attacks suspend EDR or AV processes by exploiting Windows Error Reporting to create a race condition, leaving the system unmonitored.

        The rule triggers when a known LOLBAS executable is run and the device stops reporting telemetry, with no legitimate shutdown or logoff activity recorded, suggesting the endpoint security agent may have been suspended.
      query_type: kql
      severity: medium
      tactics:
        - TA0005
      techniques:
        - T1562.001
        - T1218
      tags:
        - kql
      author: Michael Fajkus
      version: "2"
      references:
        - https://github.com/TwoSevenOneT/EDR-Freeze
        - https://www.bleepingcomputer.com/news/security/new-edr-freeze-tool-uses-windows-wer-to-suspend-security-software/
        - https://binarydefense.com/resources/blog/dont-freeze-me-out-bro-arc-labs-technical-analysis-of-edr-freeze
      file: entries/kql/01997883-82d9-760e-9ae7-474a4f7576fa.yaml
