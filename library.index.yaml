      file: entries/kql/019c8ec4-0cb3-73ff-9353-e8201f64dcf5.yaml
    - id: 019c8ec4-6a78-766d-8757-d52d1365cf16
      name: Azure Storage Account Public/Anonymous Access Enabled
      description: This rule detects when public or anonymous access is enabled for an Azure Storage Account. This configuration change can lead to potential data exposure, as it allows unauthenticated users to access blobs within the storage account. The rule specifically looks for 'STORAGEACCOUNTS/WRITE' or 'STORAGEACCOUNTS/BLOBSERVICES/WRITE' operations that successfully modify the storage account configuration to allow public access.
      query_type: kql
      severity: medium
      tactics:
        - TA0001
      techniques:
        - T1190
      tags:
        - kql
      author: Rudra Verma - CyberHawk
      version: "4"
      file: entries/kql/019c8ec4-6a78-766d-8757-d52d1365cf16.yaml
    - id: 019c8ec8-ea3d-715d-b252-f354e3fae451
      name: Suspicious Code.exe Execution from Temp Directory
      description: Detects the execution of a process named 'Code.exe' from a temporary directory, a behavior associated with the fake 'ClawdBot Agent' VS Code extension. This malware drops a weaponized ScreenConnect client renamed to 'Code.exe' into a temp folder to masquerade as the legitimate Visual Studio Code process.
