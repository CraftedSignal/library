      description: Detects a process execution where the parent process is explorer.exe and its command line indicates it is launching an LNK file from within a ZIP archive. This is a common TTP for initial access, where users are tricked into opening malicious LNK files embedded in ZIP archives. This version specifically looks for rundll32.exe as the child process, which is a common technique for proxy execution.
