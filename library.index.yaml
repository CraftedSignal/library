      version: "2"
      file: entries/kql/019c4dc2-8a21-70ef-80ac-fcafdfe03b6c.yaml
    - id: 019c4dc2-9ca0-746a-ab17-7d02972b8080
      name: macOS ClickFix curl Pipe to zsh/sh
      description: This rule detects suspicious process creation activity on macOS systems where `curl` output is piped directly into a shell, specifically `zsh` or `sh`. This technique is often used by attackers to execute malicious scripts directly from a remote source without writing them to disk. The rule looks for `zsh` processes with command lines containing `curl` and a pipe character, or `curl` processes with a pipe character in their command line. This behavior is associated with campaigns like Datadog Tech Impersonators (ClickFix).
      query_type: sigma
      version: "2"
      file: entries/sigma/019c4dc2-9ca0-746a-ab17-7d02972b8080.yaml
    - id: 019c4dc2-ae82-713f-bbed-23b392671110
      name: ClickFix macOS osascript Execution from Network
      description: This rule detects the execution of 'osascript' on macOS when its parent command line contains 'curl'. This pattern is indicative of a stager piping a curl response directly to osascript, often without writing a script to disk, as described in the ClickFix and MacSync/SHub delivery patterns by Datadog.
      query_type: sigma
      severity: high
      tactics:
