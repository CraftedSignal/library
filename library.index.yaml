    - id: 019bd0df-5970-7468-a2cc-3db0efcb19b6
      name: Turla Kazuar v3 COM Evasion Techniques
      description: Detects COM-based evasion techniques implemented in the Kazuar v3 loader (hpbprndiLOC.dll). This loader uses sophisticated patchless methods to bypass Event Tracing for Windows (ETW) and the Antimalware Scan Interface (AMSI) without modifying memory pages, making detection more difficult. The evasion techniques include COM object manipulation using CoCreateInstance, CLSIDFromString, and IIDFromString to interact with COM objects that can disable ETW and AMSI. Instead of patching EventWrite or EtwEventWrite functions in memory, the loader uses COM interfaces to disable ETW providers without leaving memory modification artifacts. The loader also uses COM objects to disable AmsiScanBuffer functionality without directly patching the function, and implements indirect function calls through control flow redirection to evade static analysis and make reverse engineering more difficult. These techniques are particularly sophisticated because they avoid traditional memory patching methods that are easily detected by security tools. The rule detects processes loading hpbprndiLOC.dll that also show indicators of COM-based ETW/AMSI bypass attempts.
      query_type: sigma
      version: "3"
      file: entries/sigma/019bd0df-5970-7468-a2cc-3db0efcb19b6.yaml
    - id: 019bd0df-6bb1-732e-ab65-e3f37b7b79dd
      name: Turla Kazuar v3 Data Exfiltration
      description: |
        Detects data exfiltration activity by Turla's Kazuar v3 loader. After performing system reconnaissance, the VBScript loader sends collected information to the C2 server via HTTP POST requests. The exfiltration process collects system information including OS version, boot time, processor architecture, computer name, username, domain, running processes, and file listings, formats the data as plain text, and sends it via HTTP POST to the requestor.php endpoint on the C2 server. The loader uses WinHttp.WinHttpRequest.5.1 with SSL certificate validation disabled and sets User-Agent to "Mozilla/4.0 (compatible; MSIE 7.0; Windows NT 10.0; Win64; x64; Trident/7.0; .NET4.0C; .NET4.0E)" to appear as legitimate browser traffic. The requestor.php endpoint is a specific indicator of Kazuar v3 C2 communication. This rule detects POST requests to this endpoint targeting any internet-routable IPv4 address, as Turla may use different C2 servers across campaigns. The combination of the specific endpoint name and POST method is a strong indicator of Kazuar v3 data exfiltration.
      query_type: sigma
      severity: medium
      tactics:
        - TA0010
        - TA0011
      techniques:
        - T1041
        - T1071.001
      tags:
        - attack.exfiltration
        - attack.t1041
        - attack.t1071.001
      author: Daniel Jeremiah
      version: "2"
      references:
        - https://r136a1.dev/2026/01/14/command-and-evade-turlas-kazuar-v3-loader/
      data_sources:
        - network_connection
