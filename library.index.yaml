    - id: 019c8ec4-0cb3-73ff-9353-e8201f64dcf5
      name: Windows Admin Center Service Hijack Detection
      description: This rule detects when the legitimate Windows Admin Center (WAC) service ('SmeSvc.exe') is stopped, and shortly thereafter, a different, potentially malicious process starts listening on the WAC default port (TCP/6516). This behavior is a key indicator for the exploitation of CVE-2026-20965, where an attacker hijacks the service to intercept credentials and steal administrator access tokens.
      query_type: kql
      severity: medium
      tactics:
        - TA0006
        - TA0005
        - TA0002
      techniques:
        - T1562.001
        - T1569.002
        - T1059.003
