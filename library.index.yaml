    - id: 019c1b6d-b7c8-7421-9bb3-7d05ea60c757
      name: ClawdBot VS Code Extension Installation and Activation
      description: This rule detects the installation and activation of the ClawdBot extension, likely within Visual Studio Code. It looks for the creation of specific files (extension.js, package.json, run.bat) within known VS Code extension paths and correlates this with the execution of 'Code.exe' or 'code.exe'. The rule specifically triggers when at least two of these files are found in the specified paths, indicating a potential extension installation.
