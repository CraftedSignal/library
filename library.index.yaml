    - id: 019c48f5-817a-7169-8d1d-590d179e5cb1
      name: Explorer.exe Spawns PowerShell with Network Download Command
      description: This rule detects when 'explorer.exe' spawns PowerShell, and the PowerShell command line contains indicators of network communication for downloading content. Specifically, it looks for HTTP/HTTPS URLs or common PowerShell cmdlets and aliases used for web requests and file downloads (e.g., 'iwr', 'Invoke-WebRequest', 'wget', 'curl', 'DownloadString', 'DownloadFile', 'WebClient', 'Net.WebClient', 'BitsTransfer', 'Start-BitsTransfer', 'Invoke-RestMethod'). This behavior can indicate the execution of a download cradle, often used in initial access or command and control phases to retrieve additional malicious payloads.
