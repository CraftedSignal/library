      version: "4"
      file: entries/kql/019c8ead-f169-719d-8772-af28c031476a.yaml
    - id: 019c8eae-be4a-75dd-b39e-83507de76156
      name: High-Privilege Role Assigned in Azure AD
      description: This rule detects when a high-privilege role is assigned to a user in Azure Active Directory. It specifically looks for 'Add member to role', 'Add eligible member to role', or 'Add scoped member to role' operations that successfully assign one of a predefined list of privileged roles (e.g., Global Administrator, Security Administrator, Application Administrator) to a user. This activity can indicate privilege escalation or unauthorized access within an Azure AD environment.
      query_type: kql
      severity: medium
      tactics:
        - TA0003
        - TA0004
      techniques:
        - T1098.003
      tags:
        - kql
      author: Rudra Verma - CyberHawk
      version: "4"
      file: entries/kql/019c8eae-be4a-75dd-b39e-83507de76156.yaml
    - id: 019c8eb3-0cd1-74cc-8ed7-0b1fe20a779e
      name: New Local Account Created or Added to Administrators Group
      description: This rule detects the creation of new local user accounts or the addition of existing accounts to the local Administrators group on Windows systems. It specifically looks for Windows Security Event IDs 4720 (A user account was created) and 4732 (A member was added to a security-enabled local group) or 4728 (A member was added to a security-enabled global group) or 4756 (A member was added to a security-enabled universal group), filtering for 'User' account types and ensuring that for Event ID 4732, the group is the 'Administrators' group (identified by SID S-1-5-32-544 or group name). This activity can indicate an adversary establishing persistence or escalating privileges.
      query_type: kql
      severity: medium
      tactics:
        - TA0004
        - TA0003
      techniques:
        - T1136.001
        - T1098
      tags:
        - kql
      author: Rudra Verma - CyberHawk
      version: "4"
      file: entries/kql/019c8eb3-0cd1-74cc-8ed7-0b1fe20a779e.yaml
    - id: 019c8eb3-da37-7419-9633-b0ad4d216a26
      name: Sign-in via Legacy Protocol (MFA/CA Bypass)
      description: This rule detects successful sign-ins to Microsoft 365 services that occur via legacy authentication protocols. These protocols (e.g., Exchange ActiveSync, IMAP4, POP3, SMTP AUTH) do not support modern authentication methods like Multi-Factor Authentication (MFA) or Conditional Access policies, making them a potential bypass vector for adversaries who have compromised user credentials. The rule identifies the user, the specific legacy client application used, and provides details on the source IP address and country.
      query_type: kql
      severity: medium
      tactics:
        - TA0005
        - TA0003
        - TA0004
        - TA0001
        - TA0006
      techniques:
        - T1078
        - T1556.006
      tags:
        - kql
      author: Rudra Verma - CyberHawk
      version: "4"
      file: entries/kql/019c8eb3-da37-7419-9633-b0ad4d216a26.yaml
    - id: 019c8eb4-e2c9-724c-8875-87653349243a
      name: MFA Push Fatigue - Repeated MFA Challenges to Same User
      description: This rule detects potential MFA push fatigue attacks by identifying a high volume of failed multi-factor authentication challenges for a single user within a short time window. It aggregates sign-in logs, specifically looking for result types indicative of MFA failures, and alerts if a user receives more than a defined threshold of MFA challenges within a 30-minute period.
      query_type: kql
      severity: medium
      tactics:
        - TA0006
      techniques:
        - T1621
      tags:
        - kql
      author: Rudra Verma - CyberHawk
      version: "4"
      file: entries/kql/019c8eb4-e2c9-724c-8875-87653349243a.yaml
    - id: 019c8eb5-b948-730d-ad8a-5f9db6b5a8ec
      name: PowerShell Base64 Encoded Command Execution
      description: This rule detects the execution of PowerShell or PowerShell Core (pwsh.exe) with command-line arguments indicating the use of Base64 encoded commands. Adversaries often use Base64 encoding to obfuscate malicious PowerShell scripts, making them harder to detect by signature-based methods and to evade basic command-line logging. This detection specifically looks for the '-EncodedCommand', '-enc', or '-ec' flags (and their variations in casing) which are used to execute Base64 encoded strings as PowerShell commands.
      query_type: kql
      severity: medium
      tactics:
        - TA0002
        - TA0005
      techniques:
        - T1059.001
        - T1027
      tags:
        - kql
      author: Rudra Verma - CyberHawk
      version: "4"
      file: entries/kql/019c8eb5-b948-730d-ad8a-5f9db6b5a8ec.yaml
    - id: 019c8eb8-2564-7732-b721-05106bb51678
      name: Suspicious Process Spawned from Office Applications
      description: This rule detects the creation of suspicious child processes by Microsoft Office applications. This behavior is commonly associated with malicious macros embedded in Office documents or phishing attacks that leverage Office documents to execute arbitrary commands. The rule specifically looks for Office applications (Word, Excel, PowerPoint, Outlook, OneNote, Publisher, Visio, Access) spawning known suspicious executables like command prompts, PowerShell, script interpreters (wscript, cscript), and various utility tools (mshta, regsvr32, rundll32, certutil, bitsadmin, wmic, schtasks, whoami, net, netsh, nslookup, curl).
      query_type: kql
      severity: medium
      tactics:
        - TA0001
        - TA0002
      techniques:
        - T1566.001
        - T1059.001
      tags:
        - kql
      author: Rudra Verma - CyberHawk
      version: "4"
      file: entries/kql/019c8eb8-2564-7732-b721-05106bb51678.yaml
    - id: 019c8eb9-0f84-76fb-a9fc-8d8e6462e166
      name: Scheduled Task Creation with Suspicious Payload
      description: This rule detects the creation of scheduled tasks (`schtasks.exe /create`) where the command line arguments contain suspicious executables or paths commonly associated with malicious activity. This indicates a potential persistence mechanism being established by an adversary.
      query_type: kql
      severity: medium
      tactics:
        - TA0003
        - TA0002
        - TA0004
        - TA0005
      techniques:
        - T1053.005
        - T1059.001
        - T1218.005
        - T1218.010
        - T1218.011
      tags:
        - kql
      author: Rudra Verma - CyberHawk
      version: "4"
      file: entries/kql/019c8eb9-0f84-76fb-a9fc-8d8e6462e166.yaml
    - id: 019c8eb9-ba26-70da-a92f-c0aaa79288ec
      name: PsExec-Based Lateral Movement Detection
      description: This rule detects the execution of PsExec or similar tools (psexec.exe, psexec64.exe, paexec.exe) which are commonly used for lateral movement within a network. It also identifies the use of PsExec service (psexesvc.exe) or command-line arguments indicative of PsExec activity, such as accessing administrative shares (ADMIN$, C$, IPC$) or the '-accepteula' flag.
      query_type: kql
      severity: medium
      tactics:
        - TA0008
      techniques:
        - T1021.002
      tags:
        - kql
      author: Rudra Verma - CyberHawk
      version: "4"
      file: entries/kql/019c8eb9-ba26-70da-a92f-c0aaa79288ec.yaml
    - id: 019c8ebb-550f-7361-9333-14a10a68c4d8
      name: UAC Bypass via HKCU Registry Key Hijacking
      description: This rule detects attempts to bypass User Account Control (UAC) by monitoring modifications or creations of specific registry keys. Adversaries often manipulate these registry keys to achieve privilege escalation without triggering a UAC prompt, allowing them to execute malicious code with elevated permissions. The rule specifically looks for changes to registry paths commonly abused in UAC bypass techniques, such as those related to ms-settings, mscfile, Environment\UserInitMprLogonScript, exefile, Folder, and Image File Execution Options.
      query_type: kql
      severity: medium
      tactics:
        - TA0004
        - TA0005
      techniques:
        - T1548.002
      tags:
        - kql
      author: Rudra Verma - CyberHawk
      version: "4"
      file: entries/kql/019c8ebb-550f-7361-9333-14a10a68c4d8.yaml
    - id: 019c8ebc-1730-7107-b257-8bb11c8f2341
      name: High Volume DNS Queries with Long Subdomains (DNS Tunneling)
      description: This rule detects potential DNS tunneling or data exfiltration by identifying high volumes of DNS queries with unusually long subdomains from a single process on a device. It aggregates DNS connection inspection events, extracts the subdomain length, and then summarizes the count of queries, unique domains, and average subdomain length within a 10-minute window. An alert is triggered if the query count exceeds 100 or if more than 50 unique domains are observed, combined with subdomain lengths greater than 30 characters.
      query_type: kql
      severity: medium
      tactics:
        - TA0011
        - TA0010
      techniques:
        - T1071.004
        - T1048.003
      tags:
        - kql
      author: Rudra Verma - CyberHawk
      version: "4"
      file: entries/kql/019c8ebc-1730-7107-b257-8bb11c8f2341.yaml
    - id: 019c8ebd-7c1f-767c-8666-fe10d372b807
      name: C2 Beaconing - Periodic Outbound Connections to Single External IP
      description: This rule detects potential C2 beaconing behavior by identifying devices that make a high number of periodic outbound connections (20 or more within an hour) to a single external IP address on common web and C2-related ports (80, 443, 8080, 8443, 4444, 5555, 8888, 9001). The rule summarizes these connections by device, remote IP, and initiating process, highlighting sustained communication patterns indicative of command and control.
      query_type: kql
      severity: medium
      tactics:
        - TA0011
      techniques:
        - T1071
        - T1071.001
      tags:
        - kql
      author: Rudra Verma - CyberHawk
      version: "4"
      file: entries/kql/019c8ebd-7c1f-767c-8666-fe10d372b807.yaml
    - id: 019c8ebe-4428-7468-a75f-b2c1424e43e3
      name: Device Connected to Known Malicious IP (TI Feed Match)
      description: This rule detects outbound network connections from devices to IP addresses identified as malicious by a threat intelligence feed. It joins device network events with threat intelligence indicators, specifically looking for successful connections or connection requests to IPs with a confidence score greater than 50. The alert provides details about the device, the remote IP, the initiating process, and the threat intelligence context.
      query_type: kql
      severity: medium
      tactics:
        - TA0011
      techniques:
        - T1071
      tags:
        - kql
      author: Rudra Verma - CyberHawk
      version: "4"
      file: entries/kql/019c8ebe-4428-7468-a75f-b2c1424e43e3.yaml
    - id: 019c8ebf-0d73-75a9-9382-5715bee8b656
      name: Potential Port Scan - Single Host Hitting Many Ports/Hosts
      description: This rule detects potential port scanning activity from a single host. It identifies scenarios where a device attempts to connect to a large number of unique remote ports (20 or more) or a large number of unique remote IP addresses (25 or more) within a 10-minute window. This behavior is indicative of an adversary attempting to discover open ports or active hosts on a network.
      query_type: kql
      severity: medium
      tactics:
        - TA0007
      techniques:
        - T1046
      tags:
        - kql
      author: Rudra Verma - CyberHawk
      version: "4"
      file: entries/kql/019c8ebf-0d73-75a9-9382-5715bee8b656.yaml
    - id: 019c8ec0-6b51-7244-8b2f-a923f21bc08a
      name: Suspicious Process Connecting on Non-Standard External Port
      description: This rule detects suspicious processes (e.g., powershell.exe, cmd.exe, mshta.exe) making outbound network connections to public IP addresses on non-standard ports. This behavior can indicate command and control (C2) communication or data exfiltration attempts, as adversaries often use non-standard ports to evade detection.
      query_type: kql
      severity: medium
      tactics:
        - TA0011
        - TA0002
        - TA0010
      techniques:
