    - id: 8e39bc3a-01a1-4a61-a199-39092a607e5e
      name: Unicode Homograph Attack Detection in URLs (Network & Email)
      description: |-
        Detects potential Unicode-based homograph attacks by scanning for non-ASCII characters in both DeviceNetworkEvents.RemoteUrl and EmailUrlInfo.Url. These attacks leverage visually deceptive domain names—using characters from non-Latin scripts (e.g., Cyrillic "а" instead of Latin "a")—to mimic legitimate sites and deceive users.

        The detection covers both network activity and email delivery paths, helping uncover phishing attempts, credential harvesting links, or other malicious redirects.

        Recommendation: If available, include telemetry from DNS logs (e.g., DnsEvents) and firewall/proxy logs to improve detection coverage and correlate threats across multiple layers of the kill chain.
      query_type: kql
      severity: medium
      techniques:
        - T1566.002
        - T1204.001
        - T1583.001
        - T1598.003
      tags:
        - unicode
        - homograph
        - phishing
        - kql
        - sentinel
