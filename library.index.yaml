    - id: 019a2602-01b3-75fc-972a-6cb6c02690b2
      name: Threat Hunt - WSUS-remote-code-execution - CVE-2025-59287
      description: |-
        A critical remote code execution vulnerability, CVE-2025-59287, affects Windows Server Update Services (WSUS), enabling unauthenticated attackers to execute arbitrary code via unsafe deserialization in the AuthorizationCookie.
        Actively exploited since October 2025, this flaw targets WSUS servers on ports 8530/8531, often leaving forensic artifacts like modified SoftwareDistribution.log files and suspicious process chains involving w3wp.exe or wsusservice.exe spawning cmd.exe, powershell.exe, or net.exe.
        The provided KQL query for Microsoft Defender XDR correlates network, file, and process events to detect exploitation attempts.
      query_type: kql
      severity: medium
      techniques:
        - T1190
        - T1059.001
        - T1059.003
      tags:
        - kql
      author: AwaisM
      version: "2"
      references:
        - https://hawktrace.com/blog/CVE-2025-59287-UNAUTH
      file: entries/kql/019a2602-01b3-75fc-972a-6cb6c02690b2.yaml
    - id: 019a263d-fde7-718c-98f5-4b600390ed63
      name: CLSID override
      description: This rule detects modifications to the HKEY_CURRENT_USER\SOFTWARE\Classes\CLSID\{CLSID}\InProcServer32 registry key where the RegistryValueData ends with ".dll" and does not point to common system directories (%systemroot%, C:\Program Files (x86)\, C:\Program Files\). This behavior is indicative of CLSID hijacking, a technique used by adversaries to achieve persistence or privilege escalation by redirecting legitimate COM object calls to a malicious DLL.
      query_type: kql
      severity: medium
      tactics:
        - TA0003
        - TA0004
        - TA0005
      techniques:
        - T1574.001
      tags:
