    - id: 019c62b6-34e5-744c-849e-26a1502ec0e1
      name: IOC-based Detection for Ardent Stealer
      description: This rule detects the presence of specific Indicators of Compromise (IOCs) across various log sources. The IOCs include file hashes (SHA1, SHA256), IP addresses, URLs, and file paths associated with potential data exfiltration or malware activity. Specifically, it looks for these IOCs in fields such as SourceIP, DestinationIP, LocalIP, RemoteIP, SenderIPv4, RequestURL, Url, RemoteUrl, SHA256, SHA1, InitiatingProcessSHA1, InitiatingProcessSHA256, FolderPath, and InitiatingProcessFolderPath across DeviceEvents, DeviceProcessEvents, DeviceFileEvents, DeviceNetworkEvents, SecurityEvent, CommonSecurityLog, EmailEvents, EmailAttachmentInfo, EmailUrlInfo, UrlClickEvents, and SigninLogs. The IOCs listed suggest a focus on information stealer malware, particularly those targeting browser data, Telegram sessions, and Discord tokens, as well as general file exfiltration (e.g., 'ardent.zip').
      query_type: kql
      tags:
        - kql
      version: "1"
      file: entries/kql/019c62b6-34e5-744c-849e-26a1502ec0e1.yaml
    - id: 019c62b6-484d-7718-b13d-6047e567f483
      name: Email Attachment Executable or DLL
      description: This rule detects emails containing executable attachments (files ending with .exe or .dll) that are identified as Microsoft Windows executables. It joins information about email attachments with email event details to provide context such as the subject, sender, and recipient of the email.
