    - id: 019c48f5-081e-7538-a63f-34b1e60aa7bb
      name: UAC Bypass via ms-settings Registry Hijack
      description: The rule detects modifications to specific registry keys associated with UAC bypass techniques, particularly those leveraging fodhelper.exe. It monitors changes to the 'ms-settings\Shell\Open\command\(Default)' and 'ms-settings\Shell\Open\command\DelegateExecute' registry values. These modifications are indicative of an attempt to bypass User Account Control by hijacking the execution flow of a trusted process.
