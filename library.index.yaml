      name: Clawdbot ScreenConnect C2 Connection
      description: Detects outbound network connections to the command-and-control (C2) infrastructure used by the weaponized ScreenConnect client dropped by the fake 'ClawdBot Agent' VS Code extension. This provides direct evidence of active remote access by the threat actor.
