      author: Rudra Verma - CyberHawk
      version: "4"
      file: entries/kql/019c8ec0-6b51-7244-8b2f-a923f21bc08a.yaml
    - id: 019c8ec1-2c6b-72af-8a7f-549684411aba
      name: Mass Azure Resource Deletion (Wiper / Destructive Attack)
      description: This rule detects a high volume of Azure resource deletions by a single user within a short timeframe (30 minutes). This behavior is indicative of a destructive attack or wiper activity, where an adversary attempts to delete critical cloud infrastructure to disrupt operations or cause data loss. The rule specifically looks for 'delete' operations that were successful and counts them per caller and IP address, triggering an alert if the count exceeds a defined threshold.
      query_type: kql
      severity: medium
      tactics:
        - TA0040
      techniques:
        - T1485
      tags:
        - kql
      author: Rudra Verma - CyberHawk
      version: "4"
      file: entries/kql/019c8ec1-2c6b-72af-8a7f-549684411aba.yaml
    - id: 019c8ec2-3ca1-70d7-b118-44dae67e6283
      name: High-Volume Azure Key Vault Secret/Key Access
      description: This rule detects high-volume access to Azure Key Vault secrets, keys, or certificates within a one-hour window. It specifically looks for successful read operations on secrets, keys, and certificates, as well as modifications to access policies. A high volume (more than 10 accesses) from a single caller within an hour is flagged as potential credential harvesting.
      query_type: kql
      severity: medium
      tactics:
        - TA0006
      techniques:
        - T1555.006
      tags:
        - kql
      author: Rudra Verma
      version: "4"
      file: entries/kql/019c8ec2-3ca1-70d7-b118-44dae67e6283.yaml
    - id: 019c8ec3-63ac-718c-86e6-3097a5a94c69
      name: Suspicious Windows Admin Center Logon from External Tenant
      description: This rule detects logon events from Windows Admin Center (WAC) virtual accounts where the account's domain is external to the organization's tenant. This pattern is a key indicator for the exploitation of CVE-2026-20965, where an attacker uses a forged token from an external tenant to gain unauthorized access.
