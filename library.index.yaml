        - windows
      file: entries/sigma/019c4de3-f323-721d-84f7-53707eaea9ca.yaml
    - id: 019c4de4-0502-70ea-8c33-b289f0f3591b
      name: Microsoft ClickFix - File Hash IOCs
      description: This rule detects the presence of specific file hashes associated with the Microsoft ClickFix social engineering technique. It identifies files on devices that match a predefined list of SHA256 hashes, indicating potential compromise or interaction with the ClickFix malware.
      query_type: kql
      tags:
        - kql
      version: "2"
      file: entries/kql/019c4de4-0502-70ea-8c33-b289f0f3591b.yaml
    - id: 019c4de4-1ecd-7339-97c0-f751c53fe9dd
      name: Microsoft ClickFix - PowerShell to WScript Execution
      description: This rule detects a specific social engineering technique, dubbed 'ClickFix', where PowerShell is used to launch WScript or CScript. The detection specifically looks for PowerShell being initiated by explorer.exe, indicating a user interaction (e.g., clicking a malicious file or link), and then launching WScript.exe or cscript.exe. The PowerShell command line is expected to contain '-windowstyle minimized -Command' and 'Invoke-WebRequest', suggesting an attempt to download and execute a script in a hidden window.
      query_type: kql
      tags:
        - kql
      version: "2"
      file: entries/kql/019c4de4-1ecd-7339-97c0-f751c53fe9dd.yaml
    - id: 019c4de4-41f0-705a-aed9-73b2ef4e94ad
      name: Microsoft ClickFix - Network IOCs
      description: This rule detects network connections to known malicious domains and IP addresses associated with the Microsoft ClickFix social engineering technique. It specifically looks for RemoteUrl matching a list of identified domains or RemoteIP matching a list of identified IP addresses within the last 30 days from device network events.
      query_type: kql
      tags:
        - kql
      version: "2"
      file: entries/kql/019c4de4-41f0-705a-aed9-73b2ef4e94ad.yaml
    - id: 019c4de4-5884-71df-8547-48626cc1cd38
      name: Microsoft ClickFix - RunMRU Suspicious Commands
      description: This rule detects suspicious commands being added to the Run Most Recently Used (MRU) registry key, often associated with the Microsoft ClickFix social engineering technique. It looks for modifications to the 'RunMRU' registry key by 'explorer.exe' where the 'RegistryValueData' contains specific keywords or patterns. These patterns include the '✅' character, a combination of common scripting/execution tools (powershell, mshta, curl, msiexec) with non-Latin characters, 'mshta' not in typical benign values, 'bitsadmin', 'forfiles', 'ProxyCommand=', or 'cmd'/'powershell' commands with obfuscation techniques, web requests, or code execution indicators.
      query_type: kql
      severity: medium
      tags:
        - kql
      version: "3"
      file: entries/kql/019c4de4-5884-71df-8547-48626cc1cd38.yaml
    - id: 019c4de5-97bb-7548-a7ce-e4f728cdf1c7
      name: Files Copied to USB Drives - Enriched with Intune Device Control Identifiers
      description: Detects files being written to USB-mounted removable drives. The rule enriches these alerts with USB device identifiers such as VID_PID, InstancePathId, and SerialNumberId, gathered from fleet-wide Plug and Play (PnP) events. This enrichment allows security analysts to cross-reference the detected USB devices against an organization's approved device exclusion list, potentially managed by solutions like Microsoft Intune, to differentiate legitimate data transfers from potential data exfiltration attempts.
      query_type: kql
      severity: medium
      tactics:
        - TA0010
      techniques:
        - T1052.001
      tags:
        - kql
      author: Nicholas Isakson
      version: "3"
      file: entries/kql/019c4de5-97bb-7548-a7ce-e4f728cdf1c7.yaml
    - id: 019c4f32-a5f6-701b-b6e0-6bf46fa599c2
