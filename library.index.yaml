    - id: 019bec71-24d1-73c8-b883-2ef01da9a5f9
      name: KONNI Scheduled Task Persistence with Obfuscated PowerShell
      description: This rule detects the KONNI malware's persistence mechanism, which involves creating a scheduled task disguised as a OneDrive startup task. The task is configured to execute hourly and launches an obfuscated PowerShell script. The detection logic specifically looks for the creation of a scheduled task using 'schtasks.exe' with hourly execution, a command line containing 'OneDrive' and 'Startup Task', and a hidden PowerShell window. Additionally, it detects the execution phase where 'powershell.exe' is launched by 'schtasks.exe', reading a file from 'C:\ProgramData\VljE', and performing XOR decryption. A third selection identifies obfuscated PowerShell execution involving 'Invoke-Expression', text encoding, and XOR decryption. The rule triggers if either the task creation pattern is observed or if both the task execution and obfuscated execution patterns are observed.
      query_type: sigma
      version: "2"
      file: entries/sigma/019bec71-24d1-73c8-b883-2ef01da9a5f9.yaml
    - id: 019bec71-3dcd-7528-a1e8-73f704187991
      name: KONNI AI-Generated PowerShell Backdoor Execution
      description: This rule detects various stages of the KONNI AI-generated PowerShell backdoor execution chain. It identifies the initial LNK loader executing obfuscated PowerShell, the creation of a scheduled task for persistence (specifically looking for 'OneDrive' and 'Startup' in the task name and hourly/monthly execution), XOR decryption activities involving PowerShell and specific file paths like 'C:\ProgramData\VljE', the creation of a staging directory 'C:\ProgramData\VljE', and the extraction of CAB files into 'ProgramData'. The detection logic combines these elements, looking for the LNK loader, or a combination of scheduled task creation with XOR decryption, or staging directory creation with XOR decryption, or CAB file extraction.
      query_type: sigma
      version: "2"
      file: entries/sigma/019bec71-3dcd-7528-a1e8-73f704187991.yaml
    - id: 019bec80-eeae-7485-a51b-38d1311418df
      name: PyPI Impersonation Cryptomining Malware Execution
      description: 'This rule detects patterns indicative of cryptomining malware execution, specifically targeting those distributed via impersonated PyPI packages. It looks for Python processes exhibiting characteristics such as: 1. Command lines containing keywords related to mining, cryptocurrency, hashing, and mining pools. 2. Python processes making suspicious network connections to stratum+tcp or mining pools. 3. Python processes engaging in resource-intensive operations like multiprocessing or threading, often utilizing all available CPU cores. 4. Python processes executing obfuscated code, potentially involving base64, zlib, or gzip decoding, combined with network requests. The rule triggers if any of these conditions are met, or if a combination of suspicious network activity and resource-intensive behavior, or obfuscated execution and resource-intensive behavior, is observed.'
      query_type: sigma
      severity: high
      tactics:
        - TA0002
        - TA0040
        - TA0011
      techniques:
        - T1496
        - T1059.006
        - T1071
      tags:
        - attack.execution
        - attack.command_and_control
        - attack.t1496
        - attack.t1059.006
        - attack.t1071
      author: Daniel Jeremiah
      version: "2"
      references:
        - https://socket.dev/blog/pypi-package-impersonates-sympy-to-deliver-cryptomining-malware
      data_sources:
        - process_creation
        - linux
      file: entries/sigma/019bec80-eeae-7485-a51b-38d1311418df.yaml
    - id: 019bec81-0302-7408-b54c-fe901276053e
      name: PyPI Package Impersonation with Cryptomining Malware
      description: This rule detects potential PyPI package impersonation attacks, specifically targeting packages that mimic 'sympy' and deliver cryptomining malware. It identifies suspicious package installation patterns, including the use of custom index URLs or extra index URLs, and the presence of specific installation flags like '--no-deps', '--no-cache-dir', or '--force-reinstall' in conjunction with 'sympy' related package names. Additionally, it looks for suspicious Python execution patterns involving code that imports, executes, or evaluates base64-encoded data, often associated with network communication libraries (urllib, requests, http.client, socket). The rule combines these indicators to identify malicious activity related to cryptomining malware delivered via PyPI.
      query_type: sigma
      version: "2"
      file: entries/sigma/019bec81-0302-7408-b54c-fe901276053e.yaml
    - id: 019bec86-7881-746b-aee6-3f8fbe7e6450
      name: Inetutils Telnetd Authentication Bypass Exploitation Attempt
      description: This rule detects exploitation attempts targeting Inetutils Telnetd's authentication bypass vulnerability. It specifically looks for patterns in network data during Telnet negotiation (destination port 23, TELNET protocol) that indicate an attempt to inject '-f' into the USER environment variable. This can occur either directly during Telnet negotiation or through a combination of IAC (Interpret As Command) negotiation for environment variables and subsequent USER variable injection with the '-f' flag, potentially alongside specific terminal configurations like 'XTERM-256COLOR' or 'screen-256color' and common baud rates.
      query_type: sigma
      version: "2"
      file: entries/sigma/019bec86-7881-746b-aee6-3f8fbe7e6450.yaml
    - id: 019bec86-8df1-72fe-b2ba-8a73f0f13cdb
      name: Inetutils Telnetd Post-Exploitation Activity
      description: 'This rule detects post-exploitation activities originating from the `telnetd` process, specifically targeting scenarios following an Inetutils Telnetd authentication bypass. It identifies three main categories of malicious activity: reconnaissance, SSH key injection for persistence, and malware deployment. Reconnaissance activities are detected by commands like `uname -a`, `id`, `cat /proc/cpuinfo`, or `cat /etc/passwd` executed via common shells (`/bin/sh`, `/bin/bash`, `/bin/ash`). SSH key injection is identified by `echo` commands attempting to write SSH public keys (e.g., `ssh-rsa`, `ssh-ed25519`) into `~/.ssh/authorized_keys` or `/root/.ssh/authorized_keys`. Malware deployment is detected by `nohup` commands executing `curl` or `wget` to download and pipe content to interpreters like `python`, `python3`, `sh`, or `bash`.'
      query_type: sigma
      severity: high
      tactics:
        - TA0007
        - TA0003
        - TA0004
        - TA0011
      techniques:
        - T1083
        - T1098.004
        - T1105
      tags:
        - attack.discovery
        - attack.persistence
        - attack.command_and_control
        - attack.t1083
