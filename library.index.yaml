      name: OpenClaw Agentic Bot Detection
      description: |-
        This analytic rule detects the presence, installation, or execution of a family of suspicious bot‑related tooling identified by the names openclaw, clawhub, moltbot, and clawdbot.
        It looks for indicators across process execution, file creation, and package‑install commands, ensuring coverage of initial deployment as well as runtime activity
