    - id: 019a265a-c643-761f-b45e-e9fa741311b9
      name: 'Telemetry Validation: M365 & Azure Data Source'
      description: |-
        This hunting query verifies the availability and health of critical Microsoft 365, Azure, and Defender data sources that are essential for visibility in the case of incident response.

        Ensuring these log sources are active is fundamental for maintaining readiness to conduct full-scope investigations when an incident occurs without data loss or visibility gaps.

        The query enumerates all key log tables within the Log Analytics workspace and checks whether they:

        Are present and actively ingesting data (logs seen within the last 7 days)
        Are stale (no new events within the last 7 days)
        Are missing entirely, indicating the data connector is disabled or misconfigured

        The output provides a quick health status (✅ Active, ⚠️ Stale, or ❌ Missing) for each core log source
      query_type: kql
      severity: medium
      tags:
        - kql
      author: IronBr@nded
      version: "2"
      file: entries/kql/019a265a-c643-761f-b45e-e9fa741311b9.yaml
    - id: 019a2660-9614-7468-9810-3af263030b43
      name: 'Telemetry Validation: Microsoft Defender Stack'
      description: "This hunting query validates the health and availability of Microsoft Defender telemetry sources across environments based on their respective common data tables.\nThis includes the different Defender solution: \n\n    Defender for Endpoint\n    Defender for Identity\n    Defender for Office 365\n    Defender for Cloud Apps\n    Defender for Cloud\n\nThe query enumerates all key log tables within the Log Analytics workspace and checks whether they:\n\n    Are present and actively ingesting data (logs seen within the last 7 days)\n\n    Are stale (no new events within the last 7 days)\n\n    Are missing entirely, indicating the data connector is disabled or misconfigured\n\nThe output provides a quick health status (✅ Active, ⚠️ Stale, or ❌ Missing) for each core log source\nMonitoring these sources ensures that critical endpoint, identity, email, and cloud security telemetry is being ingested into Microsoft Sentinel as a singular method."
      query_type: kql
      severity: medium
      tags:
        - kql
      author: IronBr@nded
      version: "3"
      file: entries/kql/019a2660-9614-7468-9810-3af263030b43.yaml
    - id: 019a266c-dd20-7606-8010-0ee73c1ac892
      name: 'Security Hardening : Devices Without Recent Antivirus Scan'
      description: |-
        This query identifies onboarded devices in the environment that have not completed a successful antivirus scan within the last 30 days. It provides visibility into endpoint compliance, ensuring that all devices are actively monitored and protected by Microsoft Defender or other antivirus solutions.

        Maintaining up-to-date AV scan activity is critical as devices without recent scans may harbor unobserved threats or be at increased risk of compromise.
      query_type: kql
      severity: medium
      tags:
        - kql
      author: IronBr@nded
      version: "1"
      file: entries/kql/019a266c-dd20-7606-8010-0ee73c1ac892.yaml
    - id: 019a2679-124b-75ac-a5f0-61042a764b1c
      name: 'Security Hardening: Legacy Authentication Protocols'
      description: |-
        This query identifies user sign-ins leveraging legacy authentication protocols in Azure Active Directory (AAD). Legacy authentication methods, such as IMAP, POP3, Exchange ActiveSync, SMTP, and older Outlook protocols, do not support modern security features like multi-factor authentication (MFA). Their use increases the risk of account compromise, brute force attacks, and credential theft.

        Monitoring for legacy authentication activity is a critical security control to detect potential unauthorized access or accounts bypassing modern security protections.
      query_type: kql
      severity: medium
      tactics:
        - TA0001
        - TA0005
      techniques:
        - T1078
      tags:
        - kql
      author: IronBr@nded
      version: "1"
      references:
        - https://learn.microsoft.com/en-us/entra/identity/conditional-access/policy-block-legacy-authentication
        - https://www.bleepingcomputer.com/news/microsoft/microsoft-365-to-block-file-access-via-legacy-auth-protocols-by-default/
        - https://learn.microsoft.com/en-us/exchange/clients-and-mobile-in-exchange-online/deprecation-of-basic-authentication-exchange-online
      file: entries/kql/019a2679-124b-75ac-a5f0-61042a764b1c.yaml
