    - id: 019c2a46-4a43-71fa-aead-487fd26e6706
      name: Direct Send Email Spoofing Detection
      description: This rule detects potential direct send email spoofing attempts where an email fails SPF, DKIM, and DMARC authentication checks, but passes Composite Authentication (CompAuth). Additionally, it looks for emails where the sender's local part (username before the @) matches the recipient's local part, suggesting an attempt to impersonate an internal user. The rule also filters out emails that were blocked and those sent via internal connectors, focusing on external spoofing attempts. It further excludes emails originating from specific countries (New Zealand, Australia) which can be customized.
      query_type: kql
      severity: medium
      tactics:
        - TA0005
      techniques:
        - T1672
      tags:
        - kql
      version: "4"
      file: entries/kql/019c2a46-4a43-71fa-aead-487fd26e6706.yaml
    - id: 019c2a46-e6b9-71c9-9743-3b92271c2b3a
      name: Microsoft Teams External Communication from Non-Whitelisted Domains
      description: This rule detects Microsoft Teams chat or call activity initiated by external users whose domains are not present in a pre-defined whitelist. It specifically looks for 'ChatCreated' or 'CallParticipantDetail' actions from external users and filters out activity from known, whitelisted external domains. This can help identify potentially unauthorized or suspicious communication with external entities.
      query_type: kql
      tactics:
