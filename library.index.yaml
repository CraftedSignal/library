    - id: 019a3231-a622-7396-bf33-eb232538f3f5
      name: '[IC] - Monitor Exclusion into Conditional Access Policies'
      description: |-
        This KQL Query helps to keep an eye on accounts that are being excluded from Conditional Access (CA) policies which they should be blocked by it and which specific field triggered the CA detection and got them excluded.

        The aim of this case is to identify:

        Spot CA policies with a high number of exclusions.
        Find exclusions that don’t make sense, like skipping MFA when it’s mandatory for privileged accounts.
        Catch new exclusions that might not have been approved.
        Check how exclusions are actually working (e.g., excluding a device is fine, but if it’s connecting from risky countries or open networks, that’s a problem—hopefully, other CA policies cover this).
        Identify unexpected exclusions, which could mean an attacker got in and excluded themselves to bypass CA controls
      query_type: kql
      severity: medium
      tactics:
        - TA0006
        - TA0005
        - TA0003
      techniques:
        - T1556.006
      tags:
        - kql
      author: Sergio Albea
      version: "1"
      file: entries/kql/019a3231-a622-7396-bf33-eb232538f3f5.yaml
    - id: 019a3240-973b-7769-b5fb-f6accb5858d6
      name: '[EX] - Detect sensitive and confidential files sent by Email'
      description: To detect sensitive or confidential information sent by email from our users, I discovered that DefenderXDR is registering events when some user or services is reading files tagged or marked as sensitive. Basically, it has a "SensitiveFileRead" ActionType in the DeviceFileEvents table which indicates that a process on the monitored device has accessed a file classified as sensitive. This could include files with personally identifiable information (PII), intellectual property, or other data deemed sensitive based on the organization’s data protection policies or Microsoft’s predefined rules. This event type is essential for tracking access to sensitive data, helping to identify potential data leakage or unauthorized access attempts.
      query_type: kql
      severity: medium
      tactics:
        - TA0010
        - TA0009
      techniques:
        - T1114
      tags:
        - kql
      author: Sergio Albea
      version: "1"
      file: entries/kql/019a3240-973b-7769-b5fb-f6accb5858d6.yaml
    - id: 019a3244-041a-717e-b28c-2df497b366f5
      name: '[IC] - Detect WordPress plugins from HTTP requests'
      description: |-
        One of the ongoing threats that I feel we face daily is the use of multiple plugins and add-ons across various sites from devices so I focus on identifying common platforms where users might connect and utilize different features. I started with WordPress plugins to gather information and monitor user activity, particularly to stay informed about any connections to specific WordPress sites that employ unknown plugins.

        Additionally, if you have installed a WordPress site on any of your devices and it is integrated with Microsoft Defender for Endpoint, this query can be adapted to detect the plugins in use by the users connectives —both from within and externally. It can also help identify potential attacks and vulnerabilities, such as outdated plugin versions.
