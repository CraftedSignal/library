    - id: a49c1304-657e-4727-9944-f8a7cd60fb34
      name: Insecure Service Binary ACL
      description: |-
        This detection identifies Windows service installations (Event ID 4697) where potentially dangerous permissions like Everyone:Full Control or Authenticated Users:Full Control may be assigned to the service executable.
        Such configurations can lead to privilege escalation via service binary hijacking.

        Note:
        Field index positions in EventData.Data[] may vary depending on the system and must be manually verified using parse_xml(EventData).
        This detection requires the following audit subcategory to be enabled:

        Audit Policy: Audit Kernel Object (under Object Access)
      query_type: kql
      severity: medium
      techniques:
        - T1548.002
      tags:
        - service-permissions
        - insecure-acl
        - privilege-escalation
        - event4697
        - kql
