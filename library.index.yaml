    - id: 019c4f88-55e8-765b-8a45-816d78ba1937
      name: Firewall Backup Checker
      description: There are operation activities that requires me to daily check whether the firewall backup happened as it should have every night after-hours. The issue is that this is a manual task, requires me to go to a specific directory, find the XML files that are by the firewall and open it up to see if the file will have content. We can also check by the file size without actually opening the file since sometimes the backup fails.
