    - id: 019c8ecf-668d-770d-a9bf-4a72be259c64
      name: React2Shell Scanning Activity Detection
      description: Detects inbound web traffic with User-Agent strings commonly associated with automated tools and scanners exploiting CVE-2025-55182 (React2Shell). This rule identifies suspicious User-Agents such as 'Go-http-client/1.1', 'Assetnote/1.0.0', 'aiohttp', and 'python-requests' in web traffic logs, which are often used by attackers to scan for and exploit vulnerabilities in public-facing applications.
