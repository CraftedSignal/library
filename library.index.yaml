      version: "4"
      file: entries/kql/019c8ead-275a-7784-98dd-3643f62933ea.yaml
    - id: 019c8ead-f169-719d-8772-af28c031476a
      name: MFA or Strong Authentication Disabled/Removed
      description: This rule detects when multi-factor authentication (MFA) or strong authentication settings are disabled or removed for a user account. It specifically looks for successful audit log entries related to operations such as 'Disable Strong Authentication', 'Update user', 'Update StsRefreshTokensValidFrom', 'Admin registered security info', or 'Admin deleted security info'. This activity could indicate an adversary attempting to maintain persistent access to a compromised account by weakening its authentication requirements.
      query_type: kql
      severity: medium
      tactics:
        - TA0006
        - TA0005
        - TA0003
      techniques:
        - T1556
        - T1556.006
      tags:
