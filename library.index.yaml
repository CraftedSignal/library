    - id: 019c4d9b-454f-73ee-957d-a6c1cde8eba4
      name: Shadow Campaigns Diaoyu Loader Process
      description: This rule detects the execution of processes with command lines containing specific strings associated with the Diaoyu loader, a component of the Shadow Campaigns espionage activity. The rule looks for the presence of 'pic1.png', 'padeqav', 'admin-bar-sprite', or 'DiaoYu' within the command line arguments of newly created processes. This activity is linked to Unit 42 TGR-STA-1030.
