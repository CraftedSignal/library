    - id: 019c4d5f-ae5c-7629-ab54-19e21634e2aa
      name: Azure Managed Identity Token Usage Followed by Administrative Activity
      description: Detects when a Managed Identity successfully authenticates via the Azure Instance Metadata Service (IMDS) and subsequently performs administrative or enumeration actions within a short timeframe. This pattern can indicate an attacker has compromised a resource (e.g., a Virtual Machine) and is using its Managed Identity to move laterally or access other resources within the Azure environment. The rule correlates successful IMDS-based sign-ins with subsequent activities such as running commands on virtual machines, or listing/getting secrets and keys from Key Vaults, or other general administrative/alert-generating activities.
      query_type: kql
      severity: medium
      tactics:
