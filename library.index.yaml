    - id: 019c4d90-dc11-7258-9657-bda0af03342d
      name: Azure VM Run Command by Managed Identity
      description: This rule detects potential lateral movement within Azure by identifying instances where a Managed Identity of one Virtual Machine (VM) is used to execute commands on another VM. It specifically looks for Azure Activity logs where the caller is a Service Principal, the 'InitiatedBy' field (xms_mirid) contains 'resourcegroups', and the operation name indicates a 'runCommand' or a 'Microsoft.Compute' action. This combination suggests that a Managed Identity is being leveraged to perform actions across VMs, which could be indicative of an attacker moving laterally after compromising a VM with an attached Managed Identity.
      query_type: kql
      severity: medium
      tactics:
        - TA0008
        - TA0002
      techniques:
        - T1651
      tags:
