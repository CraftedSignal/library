    - id: 019c48f5-9256-777b-b31e-2ac5cecef9fd
      name: HTTP POST Beaconing to Single External IP
      description: This rule detects multiple HTTP POST requests originating from the same host to the same external IP address within a 10-minute window, with a minimum of 5 such events. This pattern is indicative of potential command and control (C2) beaconing activity, where a compromised system periodically communicates with an external server.
      query_type: sigma
      version: "1"
      file: entries/sigma/019c48f5-9256-777b-b31e-2ac5cecef9fd.yaml
    - id: 019c48f5-a82b-7573-9760-33cada9a607f
      name: Large File Transfer Through Web Proxy to External IP
      description: This rule detects large outbound file transfers, specifically those exceeding 1MB per file, from an internal host to an external IP address, as tracked by Zeek's file logs. It serves as a baseline for volume aggregation. A correlated rule then aggregates these individual transfers, triggering an alert if the total volume of files transferred to a specific external IP from a specific internal host exceeds 15MB within a 10-minute window. This aggregation aims to detect exfiltration attempts where data might be split into smaller chunks to evade single-file size limits.
      query_type: sigma
      version: "1"
      file: entries/sigma/019c48f5-a82b-7573-9760-33cada9a607f.yaml
    - id: 019c48f5-b76d-75df-8189-91289e304ddb
      name: Multiple HTTP Requests with Small Response Bodies
      description: Detects HTTP C2 beaconing patterns based on multiple requests (at least 5 within 5 seconds) to the same destination (source IP, destination IP, and destination port) where each request has a small response body (between 1 and 499 bytes). This rule correlates with 'Small HTTP Response Body' to identify burst request counts indicative of C2 activity.
      query_type: sigma
      version: "1"
      file: entries/sigma/019c48f5-b76d-75df-8189-91289e304ddb.yaml
    - id: 019c48f5-c78e-76ba-ae92-1ab14984562c
      name: Overly Permissive File Permissions via chmod 777
      description: This rule detects the use of the 'chmod' command to set overly permissive file permissions, specifically '777' (read, write, and execute for all users) in either octal or symbolic notation. It looks for 'chmod' as the executed command and then checks its arguments for '777', '0777', 'a=rwx', 'ugo+rwx', or 'a+rwx'. This activity can indicate a misconfiguration, a security vulnerability being introduced, or an attempt to bypass security controls.
      query_type: sigma
      severity: low
      tactics:
