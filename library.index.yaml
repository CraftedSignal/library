    - id: 4ee825be-88df-4abc-8f94-2247db0c8cff
      name: Root Shell Spawned via GTFOBin-like Parent (Linux, DeviceProcessEvents)
      description: "Detects potential GTFOBins abuse on Linux systems where a root shell is spawned by a suspicious parent process (e.g., find, perl, vim, tar, etc.).\nThis rule relies on DeviceProcessEvents in Microsoft Defender XDR and is intended for environments where Auditd, Sysmon for Linux, or similar native logging is not available.\n\n Note: This detection does not cover all GTFOBins. It focuses specifically on cases where:\n-   A root-owned shell is spawned\n-   The parent process is known to be capable of shell escape or privilege abuse\n-   The child command appears interactive or escape-like\n\nIt does not detect:\n-   Non-shell-based GTFOBin techniques (e.g., file exfiltration via scp, curl, etc.)\n-   GTFOBin usage that doesn't result in a new shell (e.g., privilege escalation via  \n     misconfigured capabilities)\n-   Abuse of GTFOBins run under non-root accounts\n\nThe query includes logic to detect both high-signal exploitation patterns and suspicious shell spawns, while excluding common false positives (e.g., package post-install scripts and benign environment checks)."
      query_type: kql
      severity: medium
      techniques:
        - T1059.004
        - T1548.001
        - T1212
        - T1055.012
      tags:
        - Linux
        - GTFOBins
        - Root Shell
        - Escape Detection
        - Post Exploitation
        - kql
      author: Michael Fajkus
      version: "1"
      references:
        - https://gtfobins.github.io/
      file: entries/kql/4ee825be-88df-4abc-8f94-2247db0c8cff.yaml
