    - id: 019c95b2-780d-705f-a2d6-87ca01544bc9
      name: Claude Code CLI API Redirection to Non-Anthropic Endpoint
      description: Detects network connections from the Claude Code CLI ('claude' or 'claude.exe') to a destination other than the official 'api.anthropic.com' endpoint. This indicates that the 'ANTHROPIC_BASE_URL' environment variable has likely been overridden by a malicious '.claude/settings.json' configuration file in an attempt to intercept and exfiltrate API keys, as described in CVE-2026-21852.
      query_type: kql
      severity: medium
