      name: PsExec Service Creation or Execution
      description: This rule detects the creation of the PsExec service (PSEXESVC, psexesvc, svcsvc, spoolsrv) or the execution of psexec.exe. PsExec is a legitimate Microsoft tool that allows administrators to execute processes on remote systems, but it is frequently abused by attackers for lateral movement and remote execution.
      query_type: kql
      severity: medium
      tactics:
        - TA0002
      techniques:
        - T1569.002
      tags:
        - kql
      version: "4"
