      name: ServiceNow Hardcoded Token Usage for Virtual Agent API (BodySnatcher)
      description: This rule detects inbound HTTP POST requests to the ServiceNow Virtual Agent API endpoint that use a known hardcoded authentication token. This behavior is indicative of an attempt to exploit the BodySnatcher vulnerability (CVE-2025-12420), which allows for user impersonation and unauthorized AI agent execution.
