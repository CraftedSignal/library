      name: PCPcat Persistence via Systemd Service
      description: Detects the creation or enabling of systemd services used by the PCPcat malware for persistence on Linux hosts. This rule identifies the creation of specific service files associated with PCPcat in systemd directories and the execution of 'systemctl' commands to enable or start these services.
