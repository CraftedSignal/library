    - id: 01997015-e817-720b-9293-cb04750ea4be
      name: Detecting EDR/AV Freeze
      description: |-
        The attack uses WerFaultSecure.exe (Windows Error Reporting component) running with PPL (Protected Process Light) protection at the WinTCB level to call MiniDumpWriteDump on any process, bypassing PPL.
        It leverages the CREATE_SUSPENDED flag during process creation and uses OpenProcess with PROCESS_SUSPEND_RESUME to suspend/resume PPL processes.
      query_type: kql
      severity: medium
      tactics:
        - TA0004
        - TA0005
      techniques:
        - T1562.001
        - T1055.001
      tags:
        - kql
      version: "2"
      references:
        - https://www.zerosalarium.com/2025/09/EDR-Freeze-Puts-EDRs-Antivirus-Into-Coma.html
      file: entries/kql/01997015-e817-720b-9293-cb04750ea4be.yaml
    - id: 019970be-ebb0-7629-9dd6-c280fd5764a4
      name: EDR-Freeze - WerFaultSecure Unusual Parent Process
      description: |+
        This rule detects instances where 'WerFaultSecure.exe' is launched by an unusual parent process. 'WerFaultSecure.exe' is a legitimate Windows error reporting tool, but its execution by non-standard parent processes can indicate malicious activity, such as process injection, credential dumping, or defense evasion. The rule assigns a suspicion score based on the parent process and command-line parameters, filtering for medium to critical risk levels. It also extracts the target PID and identifies suspicious parameters or dump types.

      query_type: kql
      severity: medium
      tactics:
        - TA0005
        - TA0004
        - TA0006
      techniques:
        - T1055
        - T1003
      tags:
        - kql
      author: FSDR
      version: "1"
      references:
        - https://www.zerosalarium.com/2025/09/EDR-Freeze-Puts-EDRs-Antivirus-Into-Coma.html
      file: entries/kql/019970be-ebb0-7629-9dd6-c280fd5764a4.yaml
