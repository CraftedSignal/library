    - id: 019c77ab-b7d0-715c-a6eb-404cc1b13134
      name: Unfamiliar Sign-in After Admin MFA Change
      description: This rule detects suspicious activity where an 'unfamiliar sign-in properties' alert occurs shortly after an administrator has changed a user's Multi-Factor Authentication (MFA) method. It correlates security alerts for unfamiliar sign-ins with audit logs indicating MFA method changes for the same user within a short timeframe. The rule then checks if the user's sign-in activity shows multiple IP addresses or locations, indicating a potential compromise or MFA bypass after the change.
      query_type: kql
      severity: medium
      tactics:
        - TA0005
        - TA0003
        - TA0004
        - TA0001
        - TA0006
      techniques:
