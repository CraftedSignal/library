    - id: 019c1b91-248d-7046-bf42-cef17520a6b5
      name: Multi-Stage Threat Correlation for APT/Malware Detection
      description: This rule correlates multiple indicators of compromise (IOCs) across file, network, and process events to detect potential advanced persistent threats (APTs) or sophisticated malware. It looks for specific file paths associated with tools like Lightshot, ScreenConnect, or suspicious VS Code extensions, combined with network connections to known malicious domains/IPs or unusual ports, and the execution of suspicious processes like 'Code.exe' outside of its legitimate VS Code path or 'ScreenConnect' related executables. A high threat score is assigned if multiple types of these indicators are observed on the same device and account within a 30-day window.
      query_type: kql
      severity: medium
      tactics:
        - TA0011
        - TA0002
      techniques:
        - T1105
        - T1219.002
        - T1071
        - T1090
        - T1059
