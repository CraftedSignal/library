    - id: 019c4da1-c60c-77ad-a75c-270c2bed3cd7
      name: Possible ClickFix Encoded Payload Fetch
      description: This rule detects HTTP traffic that may indicate a ClickFix social engineering attack. Specifically, it looks for HTTP responses with a 'Content-Type' of 'text/plain' and content within the HTTP header that matches patterns associated with PowerShell, encoded commands, or 'iex' (Invoke-Expression), suggesting the delivery of an encoded PowerShell payload.
      query_type: kql
      tags:
