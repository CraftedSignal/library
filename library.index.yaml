      name: Suspicious ServiceNow AI Agent Invocation (BodySnatcher)
      description: This rule detects attempts to exploit the BodySnatcher vulnerability (CVE-2025-12420) by invoking a specific internal AI agent topic ("AIA-Agent Invoker AutoChat") via the Virtual Agent API. This behavior is a key step in the exploit chain, allowing an attacker to execute arbitrary AI agents under an impersonated user's context.
