    - id: 019c4d5a-d28b-77cd-8d4c-b39f4160719c
      name: Muddled Libra - PST Exfiltration via S3 Browser
      description: Detects the execution of S3 Browser or Office installation executables, followed by network traffic from the same host to known cloud storage or file-sharing sites within a short time window. This behavior aligns with Muddled Libra's method of staging and exfiltrating sensitive data, such as PST files, to attacker-controlled cloud buckets.
