      file: entries/sigma/019c8aca-8cd0-72c6-88bb-8702fb1e71c6.yaml
    - id: 019c8ae3-f9a8-728f-9c89-d6cd872b8a2a
      name: WMI Spawning PowerShell via JScript
      description: Detects a Windows Script Host process (wscript.exe or cscript.exe) using WMI to spawn a PowerShell process. This technique is used by malware, such as in the Remcos RAT delivery chain, to break the parent-child process relationship and evade detections based on process ancestry.
