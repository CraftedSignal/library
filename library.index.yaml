      name: Suspicious PowerShell Download Cradle for React2Shell Exploitation
      description: Detects the execution of a PowerShell download cradle using encoded commands. This technique is used by actors exploiting CVE-2025-55182 (React2Shell) to download and execute second-stage payloads.
