    - id: 019c7728-aa73-71df-aab6-db18f5db36be
      name: Grandstream Suspected Reverse Shell (Post-Exploitation)
      description: Detects potential reverse shell activity originating from a Grandstream VoIP device. This is a high-fidelity indicator of compromise following the successful exploitation of CVE-2026-2329. This version uses DeviceNetworkEvents.
