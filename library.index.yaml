      name: Fileless Node.js Execution via STDIN or Eval
      description: Detects a Node.js process spawning a child Node.js process that executes code from STDIN ('-') or an evaluated string ('-e'). This behavior is characteristic of fileless execution and was observed in a developer-targeting campaign for C2 task execution. The rule specifically looks for a Node.js process where its parent is also a Node.js process, and the command line contains either ' - ' or ' -e '.
