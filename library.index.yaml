    - id: 019c8aca-8cd0-72c6-88bb-8702fb1e71c6
      name: Rundll32 Execution Without Command Line Arguments
      description: Detects the execution of "rundll32.exe" without any command-line arguments. This is highly unusual behavior, as "rundll32.exe" is intended to load and run functions from DLLs, which requires specifying a DLL path in the command line. This technique is used by malware like ValleyRAT (as part of the Winos4.0 framework) to inject modular plugins into memory.
      query_type: sigma
      severity: high
      tactics:
