    - id: 019c77b6-ac6d-73eb-8d2f-693deb16b462
      name: Suspicious RDP Configuration Changes via Registry and Netsh
      description: This rule detects suspicious modifications to Remote Desktop Protocol (RDP) configurations via `reg.exe` and `netsh.exe`. Specifically, it looks for attempts to enable RDP by setting `fDenyTSConnections` to 0, modify the `UserAuthentication` setting in `RDP-Tcp` to 0, or add a firewall rule to allow RDP traffic on port 3389. These actions can indicate an adversary attempting to establish or facilitate remote access to a system.
      query_type: kql
      severity: medium
      tactics:
