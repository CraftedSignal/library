      file: entries/kql/019c4d90-dc11-7258-9657-bda0af03342d.yaml
    - id: 019c4d91-0654-77b7-b901-d87b4c3ec43d
      name: Azure Managed Identity Lateral Movement via VM Run Command
      description: Detects lateral movement where a Managed Identity of one Azure resource (e.g., VM) is used to execute code or access another resource. This is identified by successful 'Microsoft.Compute/virtualMachines/runCommand' operations where the caller is a ServicePrincipal (indicated by a GUID) and the 'InitiatedBy' field contains 'resourcegroups', suggesting the action was initiated by a resource rather than a direct user.
      query_type: sigma
      severity: high
