      file: entries/kql/d9a03a1d-9b38-4d49-b47c-5dbc04aba864.yaml
    - id: d9b11755-0e7a-4a36-8d20-2c54236e41fc
      name: 'Threat Hunt: RPC-to-LDAP Abuse for DoS/DDoS Attacks - Win-DOS Research based'
      description: |-
        This hunting query detects potential abuse of the MS-RPC protocol for DoS/DDoS attacks by monitoring outbound LDAP-related DNS queries originating from Domain Controllers.

        It is inspired by the SafeBreach “Win-DOS Epidemic” research, which revealed a technique where attackers abuse RPC calls to trigger massive LDAP query floods. The query flags high-volume _ldap queries to external (non-private) IPs, with extra scrutiny on processes like lsass.exe and svchost.exe that, if abused, may indicate system-level compromise or protocol exploitation.
        The detection is filtered to DC naming conventions (DC*) to reduce false positives and maintain high fidelity.

        Stage 1 logic integrated from SlimKQL.
      query_type: kql
      severity: medium
      techniques:
        - T1498.001
        - T1071.004
        - T1046
      tags:
        - kql
      author: AwaisM
      version: "1"
      references:
        - https://www.safebreach.com/blog/win-dos-epidemic-abusing-rpc-for-dos-and-ddos/
      file: entries/kql/d9b11755-0e7a-4a36-8d20-2c54236e41fc.yaml
